<figure class="viz" id="fig-cpt-stability-plasticity-tradeoff">
<svg viewBox="0 0 760 560" role="img" aria-label="Stability-plasticity tradeoff diagram for continual pretraining. Three operating points lie on a downward-sloping tradeoff frontier: too-hot learning rate (high plasticity, low stability), too-cold learning rate (low plasticity, high stability), and a sweet-spot point above the frontier (re-warm to 10-30% peak plus replay) that achieves better balance than the naive tradeoff.">
  <defs>
    <marker id="cpt-arrow-up" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M5 0 L10 10 L0 10 z" fill="var(--ink-soft)" class="v-label"/>
    </marker>
    <marker id="cpt-arrow-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)" class="v-label"/>
    </marker>
    <marker id="cpt-arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--v-accent,#2563eb)"/>
    </marker>
  </defs>
  <style>
    #fig-cpt-stability-plasticity-tradeoff .axis-label {
      font: 600 15px var(--sans,sans-serif);
      fill: var(--ink-soft);
    }
    #fig-cpt-stability-plasticity-tradeoff .pt-caption {
      font: 700 14px var(--sans,sans-serif);
    }
    #fig-cpt-stability-plasticity-tradeoff .pt-sub {
      font: 400 12px var(--sans,sans-serif);
      fill: var(--muted,#6b7280);
    }
    #fig-cpt-stability-plasticity-tradeoff .pt-note {
      font: 400 11px var(--sans,sans-serif);
      fill: var(--muted,#6b7280);
    }
    #fig-cpt-stability-plasticity-tradeoff .sweet-caption {
      font: 700 15px var(--sans,sans-serif);
      fill: var(--v-accent,#2563eb);
    }
    #fig-cpt-stability-plasticity-tradeoff .sweet-sub {
      font: 500 12px var(--sans,sans-serif);
      fill: var(--v-accent,#2563eb);
    }
    #fig-cpt-stability-plasticity-tradeoff .frontier-label {
      font: 400 11px var(--sans,sans-serif);
      fill: var(--muted,#6b7280);
    }
    #fig-cpt-stability-plasticity-tradeoff .lift-label {
      font: 500 11px var(--sans,sans-serif);
      fill: var(--v-accent,#2563eb);
    }
  </style>

  
  
  <line x1="120" y1="470" x2="120" y2="62" stroke="var(--ink-soft)" stroke-width="1.8" marker-end="url(#cpt-arrow-up)"/>
  
  <line x1="120" y1="470" x2="688" y2="470" stroke="var(--ink-soft)" stroke-width="1.8" marker-end="url(#cpt-arrow-right)"/>

  
  <text x="120" y="50" text-anchor="middle" class="axis-label">plasticity (learn D_new)</text>
  <text x="690" y="466" text-anchor="end" class="axis-label">stability (keep D_base)</text>

  
  <line x1="160" y1="120" x2="640" y2="440"
        stroke="var(--ink-soft)" stroke-width="1.4"
        stroke-dasharray="7 5" opacity="0.38"/>
  
  <text x="540" y="385" text-anchor="start" class="frontier-label" transform="rotate(-28,540,385)">naive tradeoff frontier</text>

  
  <rect x="340" y="195" width="200" height="100" rx="14"
        fill="var(--v-accent,#2563eb)" fill-opacity="0.10"
        stroke="var(--v-accent,#2563eb)" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="350" y="215" class="frontier-label" fill="var(--v-accent,#2563eb)" opacity="0.75" font-weight="600" font-size="11">GOOD CPT region</text>

  
  
  <line x1="393" y1="310" x2="432" y2="265"
        stroke="var(--v-accent,#2563eb)" stroke-width="1.3"
        stroke-dasharray="4 3" opacity="0.65"
        marker-end="url(#cpt-arrow-accent)"/>
  <text x="348" y="325" class="lift-label">+replay lifts</text>
  <text x="348" y="339" class="lift-label">above frontier</text>

  

  
  <circle cx="185" cy="145" r="9"
          fill="var(--v-warn,#e0a106)" stroke="var(--v-warn,#e0a106)" stroke-width="1.5" opacity="0.92"/>
  
  <text x="204" y="140" class="pt-caption" fill="var(--v-warn,#e0a106)">Too-hot LR</text>
  <text x="204" y="156" class="pt-sub">forgets D_base badly, learns D_new fast</text>
  
  <text x="14" y="140" class="pt-note">(re-warm to</text>
  <text x="14" y="154" class="pt-note">full peak)</text>
  
  <line x1="81" y1="146" x2="174" y2="146"
        stroke="var(--muted,#6b7280)" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.55"/>

  
  <circle cx="608" cy="425" r="9"
          fill="var(--v-accent2,#3b82f6)" stroke="var(--v-accent2,#3b82f6)" stroke-width="1.5" opacity="0.85"/>
  
  <text x="480" y="403" class="pt-caption" fill="var(--v-accent2,#3b82f6)">Too-cold LR</text>
  <text x="480" y="419" class="pt-sub">keeps D_base, barely learns D_new</text>
  
  <line x1="610" y1="421" x2="610" y2="407"
        stroke="var(--muted,#6b7280)" stroke-width="0.8" opacity="0.55"/>
  
  <text x="580" y="496" class="pt-note">(tiny LR)</text>

  
  
  <circle cx="440" cy="255" r="18"
          fill="none" stroke="var(--v-accent,#2563eb)" stroke-width="1.5" opacity="0.28"/>
  
  <circle cx="440" cy="255" r="13"
          fill="var(--v-accent,#2563eb)" stroke="var(--v-accent,#2563eb)" stroke-width="2" opacity="0.95"/>
  
  <text x="462" y="248" class="sweet-caption">The sweet spot</text>
  <text x="462" y="265" class="sweet-sub">re-warm to ~10-30% peak + replay</text>

</svg>
<figcaption><b>The stability-plasticity tradeoff in continual pretraining.</b> A too-high learning rate moves the model far up the plasticity axis (fast new-domain learning) but sacrifices stability (catastrophic forgetting of D_base), while a too-low rate preserves D_base but fails to absorb D_new. The re-warm-to-10-30%-peak plus replay recipe achieves a sweet spot <em>above</em> the naive tradeoff frontier — better on both axes simultaneously — by combining a moderate LR boost with a small fraction of base-distribution replay data.</figcaption>
</figure>
