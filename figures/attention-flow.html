<figure class="viz" id="fig-attention-flow">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 812 250" role="img" aria-label="Scaled dot-product attention data flow: Q times K-transpose gives scores, row-wise softmax gives weights, times V gives the output.">
  <defs>
    <marker id="af-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-attention-flow .lbl{ font:600 13px var(--sans,sans-serif); }
    #fig-attention-flow .dim{ font:400 10px var(--mono,monospace); }
    #fig-attention-flow .op{ font:600 18px var(--serif,serif); }
    #fig-attention-flow .cap{ font:500 10.5px var(--sans,sans-serif); }
    #fig-attention-flow text{ fill: var(--ink-soft); }
    #fig-attention-flow .dim{ fill: var(--muted); }
    #fig-attention-flow .sm{ font:600 12.5px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-attention-flow .gline{ stroke: var(--v-grid); }
    @media (prefers-color-scheme: dark){
      #fig-attention-flow .gline{ stroke: var(--ink-soft); opacity: 0.55; }
    }
    :root[data-theme="dark"] #fig-attention-flow .gline{ stroke: var(--ink-soft); opacity: 0.55; }
    :root[data-theme="light"] #fig-attention-flow .gline{ stroke: var(--v-grid); }
  </style>

  
  <g data-anim="1">
    <rect x="14" y="78" width="58" height="84" rx="6" class="v-fill v-accent-s" fill-opacity="1" stroke-width="1.5"/>
    <text x="43" y="124" text-anchor="middle" class="op v-accent" fill="var(--accent)">Q</text>
    <text x="43" y="176" text-anchor="middle" class="dim">L × d</text>
  </g>
  <text x="86" y="126" text-anchor="middle" class="op">×</text>

  
  <g data-anim="1">
    <rect x="100" y="92" width="84" height="56" rx="6" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="142" y="126" text-anchor="middle" class="op v-accent" fill="var(--accent)">Kᵀ</text>
    <text x="142" y="162" text-anchor="middle" class="dim">d × L</text>
  </g>
  <text x="200" y="126" text-anchor="middle" class="op">=</text>

  
  <g data-anim="2">
    <rect x="216" y="80" width="80" height="80" rx="4" class="v-fill v-grid" stroke-width="1.2"/>
    <g class="v-grid" stroke-width="0.8" opacity="0.7">
      <line x1="216" y1="100" x2="296" y2="100"/><line x1="216" y1="120" x2="296" y2="120"/><line x1="216" y1="140" x2="296" y2="140"/>
      <line x1="236" y1="80" x2="236" y2="160"/><line x1="256" y1="80" x2="256" y2="160"/><line x1="276" y1="80" x2="276" y2="160"/>
    </g>
    <text x="256" y="180" text-anchor="middle" class="cap dim">QKᵀ / √d</text>
    <text x="256" y="193" text-anchor="middle" class="cap dim">L × L scores</text>
  </g>

  
  <line x1="300" y1="120" x2="338" y2="120" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#af-arrow)"/>
  <text x="319" y="110" text-anchor="middle" class="cap">softmax</text>
  <text x="319" y="136" text-anchor="middle" class="cap dim">per row</text>

  
  <g data-anim="3">
    <rect x="342" y="80" width="80" height="80" rx="4" class="v-fill v-grid" stroke-width="1.2"/>
    <g class="v-grid" stroke-width="0.8" opacity="0.7">
      <line x1="342" y1="100" x2="422" y2="100"/><line x1="342" y1="120" x2="422" y2="120"/><line x1="342" y1="140" x2="422" y2="140"/>
      <line x1="362" y1="80" x2="362" y2="160"/><line x1="382" y1="80" x2="382" y2="160"/><line x1="402" y1="80" x2="402" y2="160"/>
    </g>
    
    <rect x="342" y="100" width="80" height="20" class="v-accent viz-pulse" fill="var(--accent)" fill-opacity="0.5"/>
    <text x="382" y="180" text-anchor="middle" class="cap dim">attention weights</text>
    <text x="382" y="193" text-anchor="middle" class="cap dim">each row sums to 1</text>
  </g>
  <text x="438" y="126" text-anchor="middle" class="op">×</text>

  
  <g data-anim="4">
    <rect x="452" y="78" width="58" height="84" rx="6" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="481" y="124" text-anchor="middle" class="op v-accent" fill="var(--accent)">V</text>
    <text x="481" y="176" text-anchor="middle" class="dim">L × d</text>
  </g>
  <text x="524" y="126" text-anchor="middle" class="op">=</text>

  
  <g data-anim="5">
    <rect x="540" y="78" width="58" height="84" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
    <rect x="540" y="98" width="58" height="20" class="viz-pulse" fill="var(--good,#2f9e6e)" fill-opacity="0.45"/>
    <text x="569" y="124" text-anchor="middle" class="op" fill="var(--good,#2f9e6e)">O</text>
    <text x="569" y="176" text-anchor="middle" class="dim">L × d</text>
  </g>

  
  <g data-anim="5">
    <line x1="382" y1="120" x2="540" y2="108" class="v-accent-s" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
    <text x="630" y="100" class="cap dim">one query's</text>
    <text x="630" y="113" class="cap dim">output row =</text>
    <text x="630" y="126" class="cap dim">weighted Σ of V</text>
  </g>
</svg>
<figcaption><b>Scaled dot-product attention as soft retrieval.</b> Each query compares against every key (<b>QKᵀ/√d</b>), a row-wise <b>softmax</b> turns those scores into weights that sum to one, and the output is the weighted sum of the value vectors. The highlighted row traces a single query producing a single output vector.</figcaption>
</figure>
