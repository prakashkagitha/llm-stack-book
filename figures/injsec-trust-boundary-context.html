<figure class="viz" id="fig-injsec-trust-boundary-context">
<svg viewBox="0 0 820 600" role="img" aria-label="Trust boundaries inside a single LLM context window: system prompt and user message are trusted by convention while tool results and retrieved documents are untrusted environment data, all processed identically by the model.">
<defs>
  <marker id="tbc-dn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="tbc-rt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#999)"/>
  </marker>
  <marker id="tbc-bl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>
<style>
  #fig-injsec-trust-boundary-context text { font-family: var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-injsec-trust-boundary-context .win-title { font: 700 13px var(--sans,sans-serif); }
  #fig-injsec-trust-boundary-context .seg-title { font: 600 12px var(--sans,sans-serif); }
  #fig-injsec-trust-boundary-context .seg-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-injsec-trust-boundary-context .src-lbl { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-injsec-trust-boundary-context .model-lbl { font: 600 11px var(--sans,sans-serif); }
  #fig-injsec-trust-boundary-context .warn-lbl { font: 600 9px var(--sans,sans-serif); }
  #fig-injsec-trust-boundary-context .boundary-lbl { font: italic 10px var(--sans,sans-serif); fill: var(--muted,#888); }
</style>


<rect x="120" y="12" width="560" height="26" rx="5" fill="var(--surface-3,#ddd)" stroke="var(--border-2,#aaa)" stroke-width="1.5"/>
<text x="400" y="30" text-anchor="middle" class="win-title">LLM Context Window (one flat token stream)</text>
<rect x="120" y="38" width="560" height="392" fill="none" stroke="var(--border-2,#aaa)" stroke-width="1.5"/>


<rect x="132" y="50" width="436" height="54" rx="5" fill="var(--good,#2f9e6e)" fill-opacity="0.14" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
<text x="144" y="68" class="seg-title" fill="var(--good,#2f9e6e)">System Prompt</text>
<text x="144" y="83" class="seg-sub">role + policy, conventionally high authority</text>
<text x="144" y="96" class="seg-sub">(NOT cryptographically enforced)</text>


<rect x="132" y="114" width="436" height="44" rx="5" fill="var(--surface-3,#eee)" stroke="var(--border-2,#bbb)" stroke-width="1.5"/>
<text x="144" y="132" class="seg-title">User Message</text>
<text x="144" y="147" class="seg-sub">trusted-by-default; the user can be the attacker (direct injection)</text>


<text x="400" y="182" text-anchor="middle" class="boundary-lbl">trust boundary (convention only — no delimiter the model can verify)</text>
<line x1="132" y1="198" x2="568" y2="198" stroke="var(--muted,#999)" stroke-width="1.5" stroke-dasharray="6 4"/>


<rect x="132" y="210" width="436" height="74" rx="5" fill="var(--accent,#c62828)" fill-opacity="0.12" stroke="var(--accent,#c62828)" stroke-width="1.5"/>
<text x="144" y="228" class="seg-title" fill="var(--accent,#c62828)">Tool Result: web_fetch — fetched web page HTML</text>

<rect x="144" y="235" width="412" height="30" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.22" stroke="var(--warn,#e0a106)" stroke-width="0.8"/>
<text x="152" y="247" class="warn-lbl" fill="var(--warn,#c07800)">[!] UNTRUSTED — may contain adversarial</text>
<text x="152" y="259" class="warn-lbl" fill="var(--warn,#c07800)">instructions disguised as a SYSTEM message</text>


<rect x="132" y="292" width="436" height="44" rx="5" fill="var(--accent,#c62828)" fill-opacity="0.12" stroke="var(--accent,#c62828)" stroke-width="1.5"/>
<text x="144" y="311" class="seg-title" fill="var(--accent,#c62828)">Tool Result: db_query</text>
<text x="144" y="325" class="seg-sub">database rows</text>


<rect x="132" y="346" width="436" height="44" rx="5" fill="var(--accent,#c62828)" fill-opacity="0.12" stroke="var(--accent,#c62828)" stroke-width="1.5"/>
<text x="144" y="365" class="seg-title" fill="var(--accent,#c62828)">Retrieved Document / Email Body</text>
<text x="144" y="379" class="seg-sub">RAG corpus chunk, user upload, inbox</text>



<line x1="576" y1="52" x2="576" y2="156" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
<line x1="576" y1="52"  x2="584" y2="52"  stroke="var(--good,#2f9e6e)" stroke-width="2"/>
<line x1="576" y1="156" x2="584" y2="156" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
<text x="588" y="99"  class="seg-sub" fill="var(--good,#2f9e6e)" font-weight="700">TRUSTED</text>
<text x="588" y="112" class="seg-sub" fill="var(--good,#2f9e6e)">(by convention)</text>


<line x1="576" y1="210" x2="576" y2="390" stroke="var(--accent,#c62828)" stroke-width="2"/>
<line x1="576" y1="210" x2="584" y2="210" stroke="var(--accent,#c62828)" stroke-width="2"/>
<line x1="576" y1="390" x2="584" y2="390" stroke="var(--accent,#c62828)" stroke-width="2"/>
<text x="588" y="296" class="seg-sub" fill="var(--accent,#c62828)" font-weight="700">UNTRUSTED</text>
<text x="588" y="309" class="seg-sub" fill="var(--accent,#c62828)">(from environment)</text>


<text x="118" y="70"  class="src-lbl" text-anchor="end">developer</text>
<text x="118" y="132" class="src-lbl" text-anchor="end">end user</text>
<text x="118" y="311" class="src-lbl" text-anchor="end">environ-</text>
<text x="118" y="322" class="src-lbl" text-anchor="end">ment</text>


<line x1="119" y1="67"  x2="130" y2="67"  stroke="var(--muted,#999)" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#tbc-rt)"/>
<line x1="119" y1="129" x2="130" y2="129" stroke="var(--muted,#999)" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#tbc-rt)"/>
<line x1="119" y1="313" x2="130" y2="307" stroke="var(--muted,#999)" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#tbc-rt)"/>


<line x1="400" y1="432" x2="400" y2="448" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#tbc-dn)"/>


<rect x="120" y="450" width="560" height="50" rx="6" fill="var(--surface-3,#eee)" stroke="var(--border-2,#aaa)" stroke-width="1.5"/>
<text x="400" y="469" text-anchor="middle" class="model-lbl">Model: predicts next token</text>
<text x="400" y="482" text-anchor="middle" class="seg-sub">weights ALL segments through the SAME attention</text>
<text x="400" y="493" text-anchor="middle" class="seg-sub">no privileged instruction register — no hard boundary</text>


<line x1="400" y1="502" x2="400" y2="518" stroke="var(--accent2,#3b82f6)" stroke-width="1.3" marker-end="url(#tbc-dn)"/>
<rect x="340" y="520" width="120" height="26" rx="5" fill="var(--accent2,#3b82f6)" fill-opacity="0.18" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="400" y="537" text-anchor="middle" class="seg-sub" fill="var(--accent2,#3b82f6)" font-weight="700">Tool Call / Action</text>


<text x="400" y="568" text-anchor="middle" class="boundary-lbl">Any segment — including red untrusted</text>
<text x="400" y="581" text-anchor="middle" class="boundary-lbl">boxes — can trigger the downstream tool call</text>

</svg>
<figcaption><b>Everything the model reads arrives as undifferentiated tokens in one context window.</b> The dotted line marks a trust boundary that exists only by convention — the model cannot cryptographically distinguish system-prompt instructions from attacker-crafted text in a tool result or retrieved document. The same attention mechanism processes all five regions; position bias provides modest non-enforced preference for earlier tokens.</figcaption>
</figure>
