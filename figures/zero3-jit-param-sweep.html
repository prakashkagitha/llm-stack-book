<figcaption><b>Only one unit is ever unsharded; the window slides, peak memory stays flat.</b> This rank permanently holds a 1/N slice of every unit; the gather window all-gathers one unit just before it is needed (example: L2 in the forward sweep), computes, and frees it -- then in the backward sweep re-gathers the same unit, computes its gradient, and reduce-scatters so only this rank's grad shard remains. The memory gauge stays flat at roughly (1/N of the whole model) + (one full unit) throughout, nowhere near the off-scale ghost line marking where full-replication DDP memory would sit -- this is how a model far larger than one GPU trains.</figcaption>
</figure>
