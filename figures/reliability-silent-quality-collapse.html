<figcaption><b>Availability and latency stay green while the quality SLI silently drifts below its threshold.</b> The raw, noisy user-signal line makes the decline ambiguous for weeks; a frozen anchored canary eval, immune to traffic-mix noise, tracks the true drift and crosses the threshold far earlier -- the gap between "DETECTED" and "noticed too late" is the mean-time-to-detect you buy by running a canary at a fixed cadence.</figcaption>
