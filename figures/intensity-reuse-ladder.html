<figcaption><b>Arithmetic intensity is a direct readout of data reuse: how many FLOPs one loaded byte gets to feed before it leaves on-chip memory.</b> Element-wise add (A) and single-stream decode's GEMV (B) each use a loaded byte essentially once, so they sit on the memory roof; a GEMM tile (C) is read once and reused across many output columns, so it climbs onto the compute roof — the same regimes and ridge as the roofline figure above.</figcaption>
</figure>
