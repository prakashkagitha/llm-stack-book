<figure class="viz" id="fig-hybrid-rrf-fusion">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 500" role="img" aria-label="Hybrid search fuses a BM25 sparse keyword ranking and a dense semantic ranking via Reciprocal Rank Fusion with constant k=60. Documents d1 and d3 rank high in both lists and rise to the top of the fused ranking, while d7 (a BM25-only exact-keyword hit) and d5 (a dense-only paraphrase hit) still survive into the fused list, showing complementary strengths of keyword and meaning-based retrieval.">
<defs>
  <marker id="hf-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-muted-fill"/>
  </marker>
  <marker id="hf-arrow-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
  </marker>
  <marker id="hf-arrow-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>
<style>
  #fig-hybrid-rrf-fusion text { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-hybrid-rrf-fusion .col-hdr { font: 700 12px var(--sans,sans-serif); }
  #fig-hybrid-rrf-fusion .mono { font: 700 11px var(--mono,monospace); }
  #fig-hybrid-rrf-fusion .mono-sm { font: 500 9.5px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-hybrid-rrf-fusion .lbl-sm { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-hybrid-rrf-fusion .callout { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-hybrid-rrf-fusion .v-muted-fill { fill: var(--muted,#64748b); }
  #fig-hybrid-rrf-fusion .k-note { font: 700 11px var(--mono,monospace); fill: var(--ink-soft,#334155); }
  #fig-hybrid-rrf-fusion [data-anim] { animation: hf-in .5s ease-out both; }
  #fig-hybrid-rrf-fusion [data-anim="2"] { animation-delay: .15s; }
  #fig-hybrid-rrf-fusion [data-anim="3"] { animation-delay: .3s; }
  #fig-hybrid-rrf-fusion [data-anim="4"] { animation-delay: .45s; }
  @keyframes hf-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { #fig-hybrid-rrf-fusion [data-anim] { animation: none; } }
</style>

<text x="390" y="24" text-anchor="middle" class="lbl-sm">same query, two rankings, fused by Reciprocal Rank Fusion</text>


<g data-anim="1">
  <text x="120" y="50" text-anchor="middle" class="col-hdr" fill="var(--accent,#c15b39)">BM25 (sparse - exact keywords)</text>

  
  
  <rect x="50" y="62" width="140" height="30" rx="6" fill="var(--accent,#c15b39)" fill-opacity="0.16" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
  <text x="62" y="82" class="mono-sm">rank 1</text>
  <text x="120" y="82" text-anchor="middle" class="mono">d3</text>
  <rect x="150" y="70" width="30" height="14" fill="var(--accent,#c15b39)" fill-opacity="0.6"/>

  
  <rect x="50" y="98" width="140" height="30" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="62" y="118" class="mono-sm">rank 2</text>
  <text x="120" y="118" text-anchor="middle" class="mono">d1</text>
  <rect x="150" y="106" width="22" height="14" fill="var(--accent,#c15b39)" fill-opacity="0.45"/>

  
  <rect x="50" y="134" width="140" height="30" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="62" y="154" class="mono-sm">rank 3</text>
  <text x="120" y="154" text-anchor="middle" class="mono">d7</text>
  <rect x="150" y="142" width="16" height="14" fill="var(--accent,#c15b39)" fill-opacity="0.35"/>

  
  <rect x="50" y="170" width="140" height="30" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="62" y="190" class="mono-sm">rank 4</text>
  <text x="120" y="190" text-anchor="middle" class="mono">d2</text>
  <rect x="150" y="178" width="11" height="14" fill="var(--accent,#c15b39)" fill-opacity="0.25"/>

  <text x="120" y="216" text-anchor="middle" class="lbl-sm">bar = 1/(k+rank) contribution</text>
</g>


<g data-anim="1">
  <text x="660" y="50" text-anchor="middle" class="col-hdr" fill="var(--accent2,#3b82f6)">Dense (semantic - embeddings)</text>

  
  <rect x="590" y="62" width="140" height="30" rx="6" fill="var(--accent2,#3b82f6)" fill-opacity="0.16" stroke="var(--accent2,#3b82f6)" stroke-width="1.3"/>
  <text x="722" y="82" text-anchor="end" class="mono-sm">rank 1</text>
  <text x="660" y="82" text-anchor="middle" class="mono">d1</text>
  <rect x="600" y="70" width="30" height="14" fill="var(--accent2,#3b82f6)" fill-opacity="0.6"/>

  
  <rect x="590" y="98" width="140" height="30" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="722" y="118" text-anchor="end" class="mono-sm">rank 2</text>
  <text x="660" y="118" text-anchor="middle" class="mono">d5</text>
  <rect x="600" y="106" width="22" height="14" fill="var(--accent2,#3b82f6)" fill-opacity="0.45"/>

  
  <rect x="590" y="134" width="140" height="30" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="722" y="154" text-anchor="end" class="mono-sm">rank 3</text>
  <text x="660" y="154" text-anchor="middle" class="mono">d3</text>
  <rect x="600" y="142" width="16" height="14" fill="var(--accent2,#3b82f6)" fill-opacity="0.35"/>

  
  <rect x="590" y="170" width="140" height="30" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="722" y="190" text-anchor="end" class="mono-sm">rank 4</text>
  <text x="660" y="190" text-anchor="middle" class="mono">d8</text>
  <rect x="600" y="178" width="11" height="14" fill="var(--accent2,#3b82f6)" fill-opacity="0.25"/>

  <text x="660" y="216" text-anchor="middle" class="lbl-sm">bar = 1/(k+rank) contribution</text>
</g>


<g data-anim="2">
  
  <line x1="190" y1="77" x2="330" y2="118" stroke="var(--accent,#c15b39)" stroke-width="1.3" stroke-dasharray="3 3"/>
  <line x1="590" y1="77" x2="450" y2="118" stroke="var(--accent2,#3b82f6)" stroke-width="1.3" stroke-dasharray="3 3"/>
  <line x1="590" y1="113" x2="450" y2="140" stroke="var(--accent2,#3b82f6)" stroke-width="1.3" stroke-dasharray="3 3"/>
  <line x1="190" y1="149" x2="330" y2="140" stroke="var(--accent,#c15b39)" stroke-width="1.3" stroke-dasharray="3 3"/>

  <rect x="290" y="100" width="200" height="60" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--ink-soft,#334155)" stroke-width="1.4"/>
  <text x="390" y="122" text-anchor="middle" class="mono">RRF(d) =</text>
  <text x="390" y="138" text-anchor="middle" class="mono">sum of 1/(k + rank)</text>
  <text x="390" y="153" text-anchor="middle" class="k-note" fill="var(--accent,#c15b39)">k = 60</text>

  <line x1="390" y1="160" x2="390" y2="192" stroke="var(--ink-soft,#334155)" stroke-width="1.5" marker-end="url(#hf-arrow)"/>
</g>


<g data-anim="3">
  <text x="390" y="212" text-anchor="middle" class="col-hdr">Fused ranking</text>

  
  <rect x="320" y="224" width="140" height="30" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
  <text x="332" y="244" class="mono-sm">rank 1</text>
  <text x="390" y="244" text-anchor="middle" class="mono">d1</text>

  
  <rect x="320" y="260" width="140" height="30" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
  <text x="332" y="280" class="mono-sm">rank 2</text>
  <text x="390" y="280" text-anchor="middle" class="mono">d3</text>

  
  <rect x="320" y="296" width="140" height="30" rx="6" fill="var(--surface,#fff)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <text x="332" y="316" class="mono-sm">rank 3</text>
  <text x="390" y="316" text-anchor="middle" class="mono">d5</text>

  
  <rect x="320" y="332" width="140" height="30" rx="6" fill="var(--surface,#fff)" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
  <text x="332" y="352" class="mono-sm">rank 4</text>
  <text x="390" y="352" text-anchor="middle" class="mono">d7</text>

  <text x="390" y="376" text-anchor="middle" class="callout" fill="var(--good,#2f9e6e)">agreement across both signals -&gt; boosted</text>
</g>


<g data-anim="4">
  <path d="M 120 166 C 190 260, 250 340, 322 347" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.3" stroke-dasharray="2 3" marker-end="url(#hf-arrow-a)"/>
  <text x="130" y="392" text-anchor="middle" class="callout" fill="var(--accent,#c15b39)">d7: rare exact keyword</text>
  <text x="130" y="404" text-anchor="middle" class="callout" fill="var(--accent,#c15b39)">dense model missed -- still survives</text>

  <path d="M 660 130 C 590 220, 500 300, 462 311" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.3" stroke-dasharray="2 3" marker-end="url(#hf-arrow-b)"/>
  <text x="650" y="392" text-anchor="middle" class="callout" fill="var(--accent2,#3b82f6)">d5: paraphrase BM25 missed</text>
  <text x="650" y="404" text-anchor="middle" class="callout" fill="var(--accent2,#3b82f6)">still survives via dense signal</text>
</g>

<g data-anim="4">
  <rect x="150" y="430" width="480" height="46" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="390" y="450" text-anchor="middle" class="lbl-sm">complementary strengths: keywords + meaning --</text>
  <text x="390" y="465" text-anchor="middle" class="lbl-sm">docs ranked well by either signal survive; docs ranked well by BOTH get boosted</text>
</g>

</svg>
<figcaption><b>Hybrid search fuses a sparse BM25 ranking and a dense semantic ranking with Reciprocal Rank Fusion (k = 60).</b> Documents that rank highly on both signals (d1, d3) rise to the top of the fused list, while a keyword-only hit (d7) and a paraphrase-only hit (d5) still survive -- hybrid search captures complementary strengths that neither signal has alone.</figcaption>
</figure>
