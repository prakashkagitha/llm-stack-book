<figure class="viz" id="fig-ppo-mdp-trajectory">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 520" role="img" aria-label="Text generation as a Markov decision process: each state is the prompt plus tokens so far, each action is the next token sampled by the policy, transitions are deterministic appends, and the reward is zero at every step except the final EOS where the reward model emits a single scalar R(q,o).">
<defs>
  <marker id="mdp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#888)"/>
  </marker>
  <marker id="mdp-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6c8cff)"/>
  </marker>
  <filter id="mdp-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<style>
  #fig-ppo-mdp-trajectory text { fill: var(--ink-soft,#555); }
  #fig-ppo-mdp-trajectory .mono { font: 400 11px var(--mono,monospace); }
  #fig-ppo-mdp-trajectory .small { font: 400 9.5px var(--sans,sans-serif); }
  #fig-ppo-mdp-trajectory .lbl { font: 400 11px var(--sans,sans-serif); }
  #fig-ppo-mdp-trajectory .t-muted { fill: var(--muted,#999); }
  #fig-ppo-mdp-trajectory .t-acc { fill: var(--accent,#6c8cff); }
  #fig-ppo-mdp-trajectory .bold { font-weight: 700; }
</style>


<g data-anim="1">
  <rect x="28" y="12" width="700" height="36" rx="8"
    fill="var(--surface-3,#eef0f4)" stroke="var(--border-2,#c0c4cc)" stroke-width="1.5"/>
  <text x="378" y="35" text-anchor="middle" class="mono">prompt  q = "Explain RLHF in one sentence."</text>
</g>


<g data-anim="1">
  <line x1="150" y1="48" x2="150" y2="92"
    stroke="var(--ink-soft,#888)" stroke-width="1.2" marker-end="url(#mdp-arr)"/>
  <text x="156" y="74" class="small t-muted">sample tokens autoregressively</text>
</g>


<g data-anim="2">
  <text x="10" y="255" text-anchor="middle" class="small t-muted"
    transform="rotate(-90 10 255)">P(s_t+1|s_t,a_t)=1  (deterministic append)</text>
</g>


<g data-anim="2">
  
  <rect x="26" y="98" width="185" height="32" rx="6"
    fill="var(--surface,#f5f5f5)" stroke="var(--border-2,#c0c4cc)" stroke-width="1.4"/>
  <text x="118" y="119" text-anchor="middle" class="mono">s&#8320; = (q)</text>

  
  <text x="304" y="94" text-anchor="middle" class="small t-acc bold">&#960;&#952;(a_t|s_t)</text>

  
  <line x1="211" y1="114" x2="258" y2="114"
    stroke="var(--accent,#6c8cff)" stroke-width="1.4" marker-end="url(#mdp-arr-acc)"/>
  
  <rect x="262" y="100" width="100" height="28" rx="14"
    fill="var(--accent,#6c8cff)" fill-opacity="0.15"
    stroke="var(--accent,#6c8cff)" stroke-width="1.4"/>
  <text x="312" y="119" text-anchor="middle" class="mono t-acc">a&#8320; = "RL"</text>

  
  <line x1="362" y1="114" x2="445" y2="114"
    stroke="var(--ink-soft,#888)" stroke-width="1" marker-end="url(#mdp-arr)"/>
  
  <rect x="449" y="101" width="88" height="26" rx="5"
    fill="var(--surface-3,#eef0f4)" stroke="var(--border-2,#c0c4cc)" stroke-width="1"/>
  <text x="493" y="119" text-anchor="middle" class="mono t-muted">reward 0</text>
</g>

<g data-anim="2">
  <line x1="118" y1="130" x2="118" y2="156"
    stroke="var(--border-2,#bbb)" stroke-width="1"
    stroke-dasharray="3 2" marker-end="url(#mdp-arr)"/>
</g>


<g data-anim="3">
  <rect x="26" y="160" width="185" height="32" rx="6"
    fill="var(--surface,#f5f5f5)" stroke="var(--border-2,#c0c4cc)" stroke-width="1.4"/>
  <text x="118" y="181" text-anchor="middle" class="mono">s&#8321; = (q,"RL")</text>

  <line x1="211" y1="176" x2="258" y2="176"
    stroke="var(--accent,#6c8cff)" stroke-width="1.4" marker-end="url(#mdp-arr-acc)"/>
  <rect x="262" y="162" width="100" height="28" rx="14"
    fill="var(--accent,#6c8cff)" fill-opacity="0.15"
    stroke="var(--accent,#6c8cff)" stroke-width="1.4"/>
  <text x="312" y="181" text-anchor="middle" class="mono t-acc">a&#8321; = "HF"</text>

  <line x1="362" y1="176" x2="445" y2="176"
    stroke="var(--ink-soft,#888)" stroke-width="1" marker-end="url(#mdp-arr)"/>
  <rect x="449" y="163" width="88" height="26" rx="5"
    fill="var(--surface-3,#eef0f4)" stroke="var(--border-2,#c0c4cc)" stroke-width="1"/>
  <text x="493" y="181" text-anchor="middle" class="mono t-muted">reward 0</text>
</g>
<g data-anim="3">
  <line x1="118" y1="192" x2="118" y2="218"
    stroke="var(--border-2,#bbb)" stroke-width="1"
    stroke-dasharray="3 2" marker-end="url(#mdp-arr)"/>
</g>


<g data-anim="4">
  <rect x="26" y="222" width="185" height="32" rx="6"
    fill="var(--surface,#f5f5f5)" stroke="var(--border-2,#c0c4cc)" stroke-width="1.4"/>
  <text x="118" y="243" text-anchor="middle" class="mono">s&#8322; = (q,"RL","HF")</text>

  <line x1="211" y1="238" x2="258" y2="238"
    stroke="var(--accent,#6c8cff)" stroke-width="1.4" marker-end="url(#mdp-arr-acc)"/>
  <rect x="262" y="224" width="100" height="28" rx="14"
    fill="var(--accent,#6c8cff)" fill-opacity="0.15"
    stroke="var(--accent,#6c8cff)" stroke-width="1.4"/>
  <text x="312" y="243" text-anchor="middle" class="mono t-acc">a&#8322; = " is"</text>

  <line x1="362" y1="238" x2="445" y2="238"
    stroke="var(--ink-soft,#888)" stroke-width="1" marker-end="url(#mdp-arr)"/>
  <rect x="449" y="225" width="88" height="26" rx="5"
    fill="var(--surface-3,#eef0f4)" stroke="var(--border-2,#c0c4cc)" stroke-width="1"/>
  <text x="493" y="243" text-anchor="middle" class="mono t-muted">reward 0</text>
</g>


<g data-anim="4">
  <text x="118" y="288" text-anchor="middle" class="t-muted bold" style="font-size:20px; letter-spacing:2px">...</text>
  <text x="312" y="288" text-anchor="middle" class="t-muted bold" style="font-size:20px; letter-spacing:2px">...</text>
  <text x="493" y="288" text-anchor="middle" class="t-muted bold" style="font-size:20px; letter-spacing:2px">...</text>
</g>


<g data-anim="5">
  
  <rect x="26" y="306" width="185" height="34" rx="6"
    fill="var(--surface,#f5f5f5)" stroke="var(--border-2,#c0c4cc)" stroke-width="1.4"/>
  <text x="118" y="323" text-anchor="middle" class="mono" style="font-size:10px">s_{T-1} = (q, o_{&lt;T-1})</text>

  
  <line x1="211" y1="323" x2="258" y2="323"
    stroke="var(--accent,#6c8cff)" stroke-width="2" marker-end="url(#mdp-arr-acc)"/>
  
  <rect x="262" y="307" width="115" height="30" rx="15"
    fill="var(--accent,#6c8cff)" fill-opacity="0.22"
    stroke="var(--accent,#6c8cff)" stroke-width="1.8"/>
  <text x="319" y="326" text-anchor="middle" class="mono t-acc bold" style="font-size:10.5px">a_{T-1} = &lt;eos&gt;</text>

  
  <line x1="377" y1="323" x2="446" y2="323"
    stroke="var(--accent,#6c8cff)" stroke-width="2.2" marker-end="url(#mdp-arr-acc)"/>

  
  <rect x="448" y="307" width="96" height="32" rx="6"
    fill="var(--accent,#6c8cff)" stroke="var(--accent,#6c8cff)" stroke-width="2"
    filter="url(#mdp-glow)"/>
  <text x="496" y="328" text-anchor="middle" class="mono bold" fill="#fff" style="font-size:13px">R(q,o)</text>

  
  <text x="552" y="319" class="small t-acc bold" style="font-size:10px">&lt;&lt; ONLY here</text>
  <text x="552" y="333" class="small t-muted" style="font-size:9.5px">(RM scalar at EOS)</text>
</g>


<g data-anim="5">
  <line x1="20" y1="360" x2="740" y2="360"
    stroke="var(--border-2,#bbb)" stroke-width="1" stroke-dasharray="5 4"/>

  <rect x="20" y="368" width="720" height="140" rx="6"
    fill="var(--surface-3,#eef0f4)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="380" y="393" text-anchor="middle" class="mono"
    style="fill:var(--ink-soft,#555); font-size:11px">trajectory  &#964; = full response  o = (o&#8321;, ..., o_T)</text>
  <text x="380" y="415" text-anchor="middle" class="mono"
    style="fill:var(--ink-soft,#555); font-size:11px">&#960;&#952;(o | q) = &#928;_t  &#960;&#952;(o_t | q, o_{&lt;t})   — the LM's own probabilities</text>
  <line x1="60" y1="429" x2="680" y2="429"
    stroke="var(--border-2,#ccc)" stroke-width="0.8"/>
  <text x="380" y="448" text-anchor="middle" class="lbl t-muted"
    style="font-size:10.5px">reward is sparse: zero at every interior step; R(q,o) only at EOS</text>
  <text x="380" y="472" text-anchor="middle" class="lbl t-acc bold"
    style="font-size:12px">The LM IS the policy  &#960;&#952;</text>
  <text x="380" y="494" text-anchor="middle" class="lbl t-muted"
    style="font-size:10px">action space = vocabulary V  (~10^5 tokens);  episode = one generated response</text>
</g>
</svg>
<figcaption><b>Text generation is an MDP with a single terminal reward.</b> Each state <i>s_t</i> is the prompt plus tokens generated so far; each action is the next token drawn from the policy (the LM's own softmax); transitions are deterministic appends. The reward is zero at every interior step — only at the final EOS token does the reward model emit a scalar R(q,o), making the reward maximally sparse and credit assignment the central challenge PPO must solve.</figcaption>
</figure>
