<figure class="viz" id="fig-reward-signal-flow">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 660 476" role="img" aria-label="Reward signal flow diagram: a prompt feeds into the Policy LLM to produce a completion, which fans out to three parallel verifiers (rule-based, LLM judge, reward model), then merges into a weighted combination, flows through advantage estimation, and feeds a policy loss that loops back via gradient update.">
<defs>
  <marker id="rsf-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <marker id="rsf-arr-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>
<style>
  #fig-reward-signal-flow .lbl { font: 600 12px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-reward-signal-flow .sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-reward-signal-flow .cap { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-reward-signal-flow .header { font: 600 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); letter-spacing: 0.08em; text-transform: uppercase; }
  #fig-reward-signal-flow .math { font: 500 11px var(--mono,monospace); fill: var(--ink-soft,#45413a); }
  #fig-reward-signal-flow .grad-lbl { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

  @keyframes rsf-tok1 {
    0%   { transform: translateX(0);    opacity: 0; }
    4%   { opacity: 1; }
    28%  { transform: translateX(240px); opacity: 1; }
    32%  { transform: translateX(240px); opacity: 0; }
    100% { transform: translateX(240px); opacity: 0; }
  }
  @keyframes rsf-fanA {
    0%,32%  { transform: translate(0,0);      opacity: 0; }
    35%     { opacity: 1; }
    52%     { transform: translate(-145px,95px); opacity: 1; }
    57%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  @keyframes rsf-fanB {
    0%,37%  { transform: translate(0,0);    opacity: 0; }
    40%     { opacity: 1; }
    58%     { transform: translate(0,95px); opacity: 1; }
    64%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  @keyframes rsf-fanC {
    0%,43%  { transform: translate(0,0);       opacity: 0; }
    46%     { opacity: 1; }
    66%     { transform: translate(138px,95px); opacity: 1; }
    72%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  @keyframes rsf-merge {
    0%,68%  { transform: translateY(0);   opacity: 0; }
    71%     { opacity: 1; }
    82%     { transform: translateY(68px); opacity: 1; }
    86%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  @keyframes rsf-down {
    0%,82%  { transform: translateX(0);    opacity: 0; }
    85%     { opacity: 1; }
    94%     { transform: translateX(88px); opacity: 1; }
    97%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  @keyframes rsf-fb {
    0%,94%  { stroke-dashoffset: 400; opacity: 0; }
    96%     { opacity: 0.7; }
    100%    { stroke-dashoffset: 0; opacity: 0; }
  }
  #fig-reward-signal-flow .tok1   { animation: rsf-tok1  5s ease-in-out infinite; }
  #fig-reward-signal-flow .tokFA  { animation: rsf-fanA  5s ease-in-out infinite; }
  #fig-reward-signal-flow .tokFB  { animation: rsf-fanB  5s ease-in-out infinite; }
  #fig-reward-signal-flow .tokFC  { animation: rsf-fanC  5s ease-in-out infinite; }
  #fig-reward-signal-flow .tokMg  { animation: rsf-merge 5s ease-in-out infinite; }
  #fig-reward-signal-flow .tokDn  { animation: rsf-down  5s ease-in-out infinite; }
  #fig-reward-signal-flow .fb-anim{ animation: rsf-fb    5s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    #fig-reward-signal-flow .tok1,
    #fig-reward-signal-flow .tokFA,
    #fig-reward-signal-flow .tokFB,
    #fig-reward-signal-flow .tokFC,
    #fig-reward-signal-flow .tokMg,
    #fig-reward-signal-flow .tokDn,
    #fig-reward-signal-flow .fb-anim { animation: none; opacity: 0; }
  }
</style>

<figcaption><b>Reward signal flow in the RLVR training loop.</b> Each training step generates a completion from the policy, fans it out to three parallel verifiers running at different latencies and costs, merges their outputs into a weighted scalar, computes advantages, and updates the policy via a gradient — closing the loop.</figcaption>
</figure>
