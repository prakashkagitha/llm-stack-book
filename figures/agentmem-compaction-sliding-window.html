<figure class="viz" id="fig-agentmem-compaction-sliding-window">
<button class="viz-replay" type="button">replay</button>
<svg viewBox="0 0 780 460" role="img" aria-label="Three-stage filmstrip of memory compaction: a context window growing turn by turn toward an 80 percent threshold, then compacting so the old prefix is summarised while recent turns are kept verbatim, then the bounded window repeating the cycle. A side inset shows hierarchical compaction with micro-summaries every 20 turns feeding macro-summaries every 10 micro-summaries via reflect.">
<style>
  #fig-agentmem-compaction-sliding-window text{ font: 400 10.5px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-agentmem-compaction-sliding-window .title{ font: 700 13px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-agentmem-compaction-sliding-window .stage-label{ font: 700 12px var(--sans,sans-serif); }
  #fig-agentmem-compaction-sliding-window .mono{ font: 400 9.3px var(--mono,monospace); fill: var(--ink-soft); }
  #fig-agentmem-compaction-sliding-window .mono-dim{ font: 400 9.3px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-agentmem-compaction-sliding-window .note{ font: 400 9.6px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

<text x="16" y="22" class="title">Memory compaction: bounded context via rolling summarisation</text>

<text x="365" y="46" text-anchor="middle" class="stage-label" fill="var(--warn,#e0a106)">2. Compact at threshold</text>
<text x="645" y="46" text-anchor="middle" class="stage-label" fill="var(--good,#2f9e6e)">3. Bounded / recursive</text>


<line x1="215" y1="58" x2="215" y2="352" stroke="var(--v-grid,#d8d1c0)" stroke-width="1" stroke-dasharray="2,3"/>
<line x1="520" y1="58" x2="520" y2="352" stroke="var(--v-grid,#d8d1c0)" stroke-width="1" stroke-dasharray="2,3"/>

  <rect x="45" y="212" width="120" height="20" fill="var(--surface,#fff)" stroke="var(--v-grid,#d8d1c0)" stroke-width="1"/>
  <text x="105" y="226" text-anchor="middle" class="mono-dim" font-size="8">... turn t-k</text>

  <rect x="235" y="252" width="110" height="42" fill="var(--warn,#e0a106)" fill-opacity="0.1" stroke="var(--warn,#e0a106)" stroke-width="1.1" stroke-dasharray="3,2"/>

  <rect x="235" y="208" width="110" height="20" fill="var(--surface,#fff)" stroke="var(--v-grid,#d8d1c0)" stroke-width="1"/>

  <text x="290" y="335" text-anchor="middle" class="note" font-size="8.8">recent kept</text>

  
  <path d="M290,273 C 355,273 360,273 396,273" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.5" marker-end="url(#cs-arrow-warn)"/>
  <text x="380" y="263" text-anchor="middle" class="note" fill="var(--warn,#e0a106)" font-size="8.6">summarise</text>

  
  <text x="455" y="90" text-anchor="middle" class="note" font-size="9">after</text>
  <rect x="400" y="300" width="110" height="22" fill="var(--v-fill,#ece7da)" stroke="var(--ink-soft)" stroke-width="1.2"/>
  <text x="455" y="315" text-anchor="middle" class="mono" font-size="8.2">system prompt</text>

  <rect x="400" y="260" width="110" height="30" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <text x="455" y="273" text-anchor="middle" class="mono" font-size="8">summary</text>
  <text x="455" y="285" text-anchor="middle" class="mono" font-size="8">(C_1..t-k)</text>

  <rect x="400" y="238" width="110" height="20" fill="var(--accent2,#3b82f6)" fill-opacity="0.15" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <text x="455" y="252" text-anchor="middle" class="mono" font-size="8">turn t-1</text>
  <rect x="400" y="216" width="110" height="20" fill="var(--accent2,#3b82f6)" fill-opacity="0.15" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <text x="455" y="230" text-anchor="middle" class="mono" font-size="8">turn t</text>

  <text x="455" y="204" text-anchor="middle" class="note" fill="var(--accent2,#3b82f6)" font-size="8.6">kept verbatim</text>

  <text x="365" y="335" text-anchor="middle" class="note" fill="var(--warn,#e0a106)" font-size="8.8">loss guaranteed</text>
  <text x="365" y="348" text-anchor="middle" class="note" font-size="9">[system][summary][recent N]</text>

<g data-anim="3">
  <line x1="545" y1="70" x2="710" y2="70" stroke="var(--v-muted,#978f83)" stroke-width="1"/>
  <line x1="545" y1="122" x2="710" y2="122" stroke="var(--warn,#e0a106)" stroke-width="1.2" stroke-dasharray="4,3"/>

  <rect x="565" y="300" width="120" height="22" fill="var(--v-fill,#ece7da)" stroke="var(--ink-soft)" stroke-width="1.2"/>
  <text x="625" y="315" text-anchor="middle" class="mono" font-size="8.4">system prompt</text>

  <rect x="565" y="264" width="120" height="30" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>

  <rect x="565" y="242" width="120" height="20" fill="var(--accent2,#3b82f6)" fill-opacity="0.15" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <text x="625" y="256" text-anchor="middle" class="mono" font-size="8">turn t-1</text>
  <rect x="565" y="220" width="120" height="20" fill="var(--accent2,#3b82f6)" fill-opacity="0.15" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <text x="625" y="234" text-anchor="middle" class="mono" font-size="8">turn t</text>

  <text x="625" y="345" text-anchor="middle" class="note" fill="var(--good,#2f9e6e)">well below threshold again</text>

  
  <path d="M685,205 C 735,190 735,110 690,88" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.5" marker-end="url(#cs-arrow-good)"/>
  <text x="742" y="150" text-anchor="middle" class="note" fill="var(--good,#2f9e6e)" font-size="9" transform="rotate(-90,742,150)">repeat</text>
</g>

<defs>
  <marker id="cs-arrow-warn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="var(--warn,#e0a106)"/>

  <marker id="cs-arrow-good" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="cs-arrow-mid" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="var(--ink-soft)"/>
  </marker>
</defs>

<text x="625" y="368" text-anchor="middle" class="note">rolling: next compaction summarises</text>
<text x="625" y="381" text-anchor="middle" class="note">previous summary + new window -&gt; bounded size</text>


<g data-anim="4">
  <rect x="16" y="398" width="748" height="52" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--v-grid,#d8d1c0)" stroke-width="1"/>
  <text x="30" y="416" class="cap">Hierarchical:</text>
  <rect x="122" y="404" width="200" height="24" rx="4" fill="var(--surface,#fff)" stroke="var(--ink-soft)" stroke-width="1"/>
  <text x="222" y="420" text-anchor="middle" class="mono" font-size="8.6">micro-summary (every ~20 turns)</text>
  <path d="M322,416 L360,416" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#cs-arrow-mid)"/>
  <rect x="366" y="404" width="266" height="24" rx="4" fill="var(--surface,#fff)" stroke="var(--ink-soft)" stroke-width="1"/>
  <text x="499" y="420" text-anchor="middle" class="mono" font-size="8.6">macro-summary via reflect (every ~10 micro)</text>
  <text x="30" y="440" class="note" font-size="9">context = system + macro + recent micro + last N turns</text>
</g>

</svg>
<figcaption><b>Compaction keeps the context bounded by replacing the aging prefix with a summary while recent turns stay verbatim.</b> When usage crosses roughly 70-80% of capacity, everything older than the last <code>N</code> turns is compressed into <code>summary(C_1..t-k)</code>; the reconstructed context is <code>[system prompt, summary, recent turns]</code>, and the same recipe applies recursively so context size stays flat no matter how long the session runs. Hierarchical compaction (inset) adds a second level: micro-summaries every ~20 turns feed a macro-summary via <code>reflect()</code> every ~10 micro-summaries.</figcaption>
</figure>
