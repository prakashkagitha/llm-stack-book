<figure class="viz" id="fig-archvar-objective-signal-comparison">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 800 430" role="img" aria-label="Three-panel comparison of MLM, span corruption, and causal LM pre-training objectives on the sentence 'the cat sat on the mat', showing which token positions receive a loss signal: MLM lights only the one masked position, span corruption lights only the reconstructed span in the decoder, and causal LM lights every position.">
  <defs>
    <marker id="osc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#ea580c)"/>
    </marker>
    <pattern id="osc-hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="var(--surface-3,#e2e8f0)"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="var(--muted,#64748b)" stroke-width="1.4"/>
    </pattern>
  </defs>

  <style>
    #fig-archvar-objective-signal-comparison text { font: 400 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
    #fig-archvar-objective-signal-comparison .ttl { font: 700 15px var(--sans,sans-serif); fill: var(--ink-soft,#0f172a); }
    #fig-archvar-objective-signal-comparison .p-ttl { font: 700 13px var(--sans,sans-serif); fill: var(--ink-soft,#0f172a); }
    #fig-archvar-objective-signal-comparison .p-sub { font: 600 10.5px var(--sans,sans-serif); fill: var(--accent,#4f46e5); }
    #fig-archvar-objective-signal-comparison .tok { font: 500 9.5px var(--mono,monospace); fill: var(--ink-soft,#334155); }
    #fig-archvar-objective-signal-comparison .tok-lit { font: 700 9.5px var(--mono,monospace); fill: var(--surface,#fff); }
    #fig-archvar-objective-signal-comparison .tok-hatch { font: 700 8px var(--mono,monospace); fill: var(--ink-soft,#334155); }
    #fig-archvar-objective-signal-comparison .annot { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted,#64748b); font-style: italic; }
    #fig-archvar-objective-signal-comparison .cap { font: 500 10.5px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
    #fig-archvar-objective-signal-comparison .leg-lbl { font: 500 10.5px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
    #fig-archvar-objective-signal-comparison .sum-ttl { font: 700 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#0f172a); }
    #fig-archvar-objective-signal-comparison .frac { font: 700 12px var(--mono,monospace); fill: var(--ink-soft,#0f172a); }
    #fig-archvar-objective-signal-comparison .cell-dim { fill: var(--surface,#f1f5f9); stroke: var(--border-2,#334155); stroke-width: 1; }
    #fig-archvar-objective-signal-comparison .cell-lit { fill: var(--accent,#4f46e5); stroke: var(--border-2,#334155); stroke-width: 1; }
    #fig-archvar-objective-signal-comparison .cell-hatch { fill: url(#osc-hatch); stroke: var(--border-2,#334155); stroke-width: 1; }
    #fig-archvar-objective-signal-comparison .conn { stroke: var(--accent-2,#ea580c); stroke-width: 1.6; fill: none; }
    #fig-archvar-objective-signal-comparison .spark { stroke: var(--surface,#fff); stroke-width: 1.6; stroke-linecap: round; fill: none; }
  </style>

  <text x="400" y="22" text-anchor="middle" class="ttl">What Each Objective Learns From: Loss Signal per Position</text>

  
  <g data-anim="1" transform="translate(20,40)">
    <text x="120" y="14" text-anchor="middle" class="p-ttl">Masked LM (MLM)</text>
    <text x="120" y="29" text-anchor="middle" class="p-sub">Encoder-only</text>

    
    <g transform="translate(46,44)">
      <rect width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M6,8 L11,15 L28,4"/>
      <text x="17" y="20" text-anchor="middle" class="tok-lit">cat</text>
    </g>
    
    <line x1="63" y1="112" x2="63" y2="76" class="conn" marker-end="url(#osc-arrow)"/>

    
    <g transform="translate(0,114)">
      <rect x="8"  y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="25" y="19" text-anchor="middle" class="tok">the</text>

      <rect x="46" y="0" width="34" height="30" rx="3" class="cell-hatch"/>
      <text x="63" y="19" text-anchor="middle" class="tok-hatch">[MASK]</text>

      <rect x="84" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="101" y="19" text-anchor="middle" class="tok">sat</text>

      <rect x="122" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="139" y="19" text-anchor="middle" class="tok">on</text>

      <rect x="160" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="177" y="19" text-anchor="middle" class="tok">the</text>

      <rect x="198" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="215" y="19" text-anchor="middle" class="tok">mat</text>
    </g>

    <text x="63" y="168" text-anchor="middle" class="annot">~15% of tokens selected</text>

    <text x="120" y="192" text-anchor="middle" class="cap">loss on masked positions only</text>
    <text x="120" y="206" text-anchor="middle" class="cap">(~15% of tokens)</text>
  </g>

  
  <g data-anim="2" transform="translate(280,40)">
    <text x="120" y="14" text-anchor="middle" class="p-ttl">Span Corruption</text>
    <text x="120" y="29" text-anchor="middle" class="p-sub">Encoder-decoder</text>

    
    <g transform="translate(27,44)">
      <rect x="0"  y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="17" y="19" text-anchor="middle" class="tok">the</text>

      <rect x="38" y="0" width="34" height="30" rx="3" class="cell-hatch"/>
      <text x="55" y="19" text-anchor="middle" class="tok-hatch">&lt;x0&gt;</text>

      <rect x="76" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="93" y="19" text-anchor="middle" class="tok">on</text>

      <rect x="114" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="131" y="19" text-anchor="middle" class="tok">the</text>

      <rect x="152" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="169" y="19" text-anchor="middle" class="tok">mat</text>
    </g>
    <text x="82" y="90" text-anchor="middle" class="annot">span "cat sat" -&gt; sentinel</text>

    
    <line x1="82" y1="96" x2="82" y2="120" class="conn" marker-end="url(#osc-arrow)"/>

    
    <g transform="translate(65,122)">
      <rect x="0"  y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M6,8 L11,15 L28,4"/>
      <text x="17" y="19" text-anchor="middle" class="tok-lit">&lt;x0&gt;</text>

      <rect x="38" y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M44,8 L49,15 L66,4"/>
      <text x="55" y="19" text-anchor="middle" class="tok-lit">cat</text>

      <rect x="76" y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M82,8 L87,15 L104,4"/>
      <text x="93" y="19" text-anchor="middle" class="tok-lit">sat</text>
    </g>

    <text x="120" y="192" text-anchor="middle" class="cap">decoder reconstructs masked spans</text>
    <text x="120" y="206" text-anchor="middle" class="cap">(~15% of tokens)</text>
  </g>

  
  <g data-anim="3" transform="translate(540,40)">
    <text x="120" y="14" text-anchor="middle" class="p-ttl">Causal LM (CLM)</text>
    <text x="120" y="29" text-anchor="middle" class="p-sub">Decoder-only</text>

    
    <g transform="translate(0,44)">
      <rect x="8"  y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="25" y="19" text-anchor="middle" class="tok">the</text>
      <rect x="46" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="63" y="19" text-anchor="middle" class="tok">cat</text>
      <rect x="84" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="101" y="19" text-anchor="middle" class="tok">sat</text>
      <rect x="122" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="139" y="19" text-anchor="middle" class="tok">on</text>
      <rect x="160" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="177" y="19" text-anchor="middle" class="tok">the</text>
      <rect x="198" y="0" width="34" height="30" rx="3" class="cell-dim"/>
      <text x="215" y="19" text-anchor="middle" class="tok">mat</text>
    </g>

    
    <line x1="25"  y1="112" x2="25"  y2="76" class="conn" stroke-width="1.2" marker-end="url(#osc-arrow)"/>
    <line x1="63"  y1="112" x2="63"  y2="76" class="conn" stroke-width="1.2" marker-end="url(#osc-arrow)"/>
    <line x1="101" y1="112" x2="101" y2="76" class="conn" stroke-width="1.2" marker-end="url(#osc-arrow)"/>
    <line x1="139" y1="112" x2="139" y2="76" class="conn" stroke-width="1.2" marker-end="url(#osc-arrow)"/>
    <line x1="177" y1="112" x2="177" y2="76" class="conn" stroke-width="1.2" marker-end="url(#osc-arrow)"/>
    <line x1="215" y1="112" x2="215" y2="76" class="conn" stroke-width="1.2" marker-end="url(#osc-arrow)"/>

    
    <g transform="translate(0,114)">
      <rect x="8"  y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M14,8 L19,15 L36,4"/>
      <text x="25" y="19" text-anchor="middle" class="tok-lit">cat</text>

      <rect x="46" y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M52,8 L57,15 L74,4"/>
      <text x="63" y="19" text-anchor="middle" class="tok-lit">sat</text>

      <rect x="84" y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M90,8 L95,15 L112,4"/>
      <text x="101" y="19" text-anchor="middle" class="tok-lit">on</text>

      <rect x="122" y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M128,8 L133,15 L150,4"/>
      <text x="139" y="19" text-anchor="middle" class="tok-lit">the</text>

      <rect x="160" y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M166,8 L171,15 L188,4"/>
      <text x="177" y="19" text-anchor="middle" class="tok-lit">mat</text>

      <rect x="198" y="0" width="34" height="30" rx="3" class="cell-lit"/>
      <path class="spark" d="M204,8 L209,15 L226,4"/>
      <text x="215" y="19" text-anchor="middle" class="tok-lit">eos</text>
    </g>

    <text x="120" y="168" text-anchor="middle" class="annot">every position predicts the next token</text>

    <text x="120" y="192" text-anchor="middle" class="cap">loss on EVERY position</text>
    <text x="120" y="206" text-anchor="middle" class="cap">(T signals per sequence)</text>
  </g>

  
  <g data-anim="4" transform="translate(20,264)">
    <rect x="0" y="0" width="28" height="20" rx="3" class="cell-lit"/>
    <path class="spark" d="M5,10 L9,15 L23,6"/>
    <text x="34" y="14" class="leg-lbl">loss computed here (gradient signal)</text>

    <rect x="296" y="0" width="28" height="20" rx="3" class="cell-dim"/>
    <text x="330" y="14" class="leg-lbl">seen as context, no loss</text>

    <rect x="536" y="0" width="28" height="20" rx="3" class="cell-hatch"/>
    <text x="570" y="14" class="leg-lbl">corrupted input ([MASK] / sentinel)</text>
  </g>

  
  <g data-anim="5" transform="translate(20,306)">
    <text x="380" y="10" text-anchor="middle" class="sum-ttl">Loss signal density (fraction of T token positions with a gradient)</text>

    
    <g transform="translate(20,28)">
      <rect x="0" y="0" width="200" height="18" rx="3" class="cell-dim"/>
      <rect x="0" y="0" width="30" height="18" rx="3" class="cell-lit"/>
      <text x="0" y="36" class="frac">~0.15T</text>
      <text x="0" y="-6" class="p-sub" style="fill:var(--ink-soft,#0f172a); font-weight:600;">MLM</text>
    </g>

    
    <g transform="translate(280,28)">
      <rect x="0" y="0" width="200" height="18" rx="3" class="cell-dim"/>
      <rect x="0" y="0" width="30" height="18" rx="3" class="cell-lit"/>
      <text x="0" y="36" class="frac">~0.15T</text>
      <text x="0" y="-6" class="p-sub" style="fill:var(--ink-soft,#0f172a); font-weight:600;">Span corruption</text>
    </g>

    
    <g transform="translate(540,28)">
      <rect x="0" y="0" width="200" height="18" rx="3" class="cell-lit"/>
      <text x="0" y="36" class="frac">T</text>
      <text x="0" y="-6" class="p-sub" style="fill:var(--ink-soft,#0f172a); font-weight:600;">CLM</text>
    </g>
  </g>

</svg>
<figcaption><b>The three pre-training objectives read the same tokens but extract very different amounts of gradient signal.</b> MLM computes loss on only the ~15% of positions it masks, and span corruption's decoder likewise only reconstructs the corrupted span — both give roughly $0.15T$ signals per sequence of length $T$. Causal LM computes a next-token loss at every position, extracting a full $T$ signals per sequence, which is why decoder-only models get more learning signal per FLOP of pre-training compute.</figcaption>
</figure>
