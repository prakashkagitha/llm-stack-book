  <text x="330" y="270" class="tiny" fill="var(--good,#2f9e6e)">+delta</text>
  <line x1="326" y1="273" x2="308" y2="280" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>

  <line x1="200" y1="344" x2="200" y2="366" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#gwm-arr)"/>
  <text x="200" y="358" text-anchor="middle" class="tiny" fill="var(--muted,#777)"> </text>
  <text x="270" y="357" text-anchor="middle" class="sub">softmax + sample</text>

  <rect x="130" y="368" width="140" height="34" rx="7" fill="var(--good,#2f9e6e)"/>
  <text x="200" y="390" text-anchor="middle" class="g-txt">sampled: t2</text>

<g data-anim="3">
  <text x="580" y="232" text-anchor="middle" class="ttl">Detection (verifier re-derives same partition)</text>

  <text x="470" y="252" class="tiny">candidate sequence (T tokens, 6 shown)</text>
  
  <g>
    <rect x="470" y="260" width="44" height="30" rx="5" fill="var(--good,#2f9e6e)"/>

  <text x="540" y="303" text-anchor="middle" class="tiny">x</text>
  <text x="588" y="303" text-anchor="middle" class="tiny" fill="var(--good,#2f9e6e)">check</text>
  <text x="636" y="303" text-anchor="middle" class="tiny" fill="var(--good,#2f9e6e)">check</text>

  <rect x="460" y="358" width="240" height="42" rx="8" class="v-fill" stroke="var(--accent,#7c3aed)" stroke-width="1.6"/>
  <text x="580" y="384" text-anchor="middle" class="mono">z=(g-yT)/sqrt(Ty(1-y)), y=gamma</text>

  <text x="580" y="416" text-anchor="middle" class="sub">excess green =&gt; large z</text>
  <text x="580" y="432" text-anchor="middle" class="sub">=&gt; flagged AI-generated</text>
  <text x="580" y="450" text-anchor="middle" class="note">gamma = 1/2 here; delta &gt; 0</text>
</g>

</svg>
<figcaption><b>The KGW green-list watermark is a symmetric pair: one shared, key-seeded hash drives both sides.</b> At generation time the operator boosts logits for the green subset of the vocabulary before sampling; at detection time the verifier re-derives the identical green/red partition step-by-step and tallies how many observed tokens fall in the green list, converting the excess into a z-score. Because both sides recompute the same deterministic partition from the same secret key, no direct communication or shared state beyond the key is needed.</figcaption>
</figure>
