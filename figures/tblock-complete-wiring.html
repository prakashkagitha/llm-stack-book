  <polygon points="72,700 348,700 338,726 82,726"

  <text x="210" y="718" text-anchor="middle" class="lbl dt">x_out  [batch, T, d]</text>

</svg>
<figcaption><b>The complete pre-norm Llama-style transformer block.</b> Two residual sublayers are stacked: the first applies RMSNorm then Multi-Head Self-Attention; the second applies RMSNorm then the SwiGLU FFN (W_gate&amp;rarr;Swish gated elementwise by W_up&amp;rarr;identity, projected by W_down). Each sublayer is bypassed by an amber identity skip wire that adds back at <b>+</b>, preserving the residual stream shape <code>[batch, T, d]</code> so blocks can be freely stacked.</figcaption>
</figure>
