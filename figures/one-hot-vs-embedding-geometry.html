<figure class="viz" id="fig-one-hot-vs-embedding-geometry">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 660" role="img" aria-label="Side-by-side comparison: a one-hot vector of length V has no geometry (all tokens 90 degrees apart, equidistant), while projecting through the learned matrix W_E produces a compact d-dimensional embedding where semantically similar tokens sit close together and relationships become directions.">
<defs>

  <text x="70" y="102" text-anchor="middle" class="sm">0</text>

  <text x="174" y="560" text-anchor="middle" class="lbl">[B, T, V]  -&gt;  tens of GB</text>

  <line x1="474" y1="194" x2="526" y2="194" class="v-grid" stroke="currentColor" stroke-width="1"/>

  <text x="550" y="171" class="sm" opacity="0.85">(illustrative)</text>

  <rect x="474" y="238" width="270" height="300" rx="10" class="v-grid" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/>

</svg>
<figcaption><b>One-hot vectors carry no geometry; the learned embedding matrix W_E builds it.</b> Every one-hot vector is a unit-length spike in a V-dimensional space where all tokens sit 90 degrees apart with cosine similarity 0 — "king" is exactly as far from "queen" as it is from any other token. Projecting through W_E collapses this sparse V-dimensional code into a compact d-dimensional dense vector where distance and direction are meaningful: semantically related tokens cluster together, and relationships like king-man+woman ~= queen become learned directions in the space.</figcaption>
</figure>
