<figcaption><b>Every GPT-2 architectural choice has a modern replacement, and each replacement earns its place for a specific reason.</b> Reading bottom to top like the residual stream itself: RoPE replaces the learned position embedding, pre-RMSNorm replaces post-LayerNorm (note how the modern column's skip path stays unbroken and clean while GPT-2's must still pass through its norm), GQA replaces full multi-head attention, biases are dropped from every linear layer, SwiGLU replaces the plain GELU MLP, and the output embedding is untied from the input. None of these changes are free lunches on their own — GQA trades a little quality for much smaller KV cache, untying trades parameters for expressivity — but together they define the 2024-26 consensus recipe.</figcaption>
