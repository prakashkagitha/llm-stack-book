<figure class="viz" id="fig-memeff-memory-hierarchy-tiers">
<svg viewBox="0 0 800 480" role="img" aria-label="Memory hierarchy showing four tiers from GPU HBM (fastest, smallest) to NVMe SSD (slowest, largest), with bandwidth bars illustrating the ~50x gap between HBM and PCIe, and dual arrows showing capacity increases as bandwidth decreases.">
<style>
  #fig-memeff-memory-hierarchy-tiers text { fill: var(--ink-soft); }
  #fig-memeff-memory-hierarchy-tiers .tier-name { font: 700 14px var(--sans,sans-serif); }
  #fig-memeff-memory-hierarchy-tiers .tier-bw { font: 600 12px var(--mono,monospace); }
  #fig-memeff-memory-hierarchy-tiers .tier-cap { font: 600 12px var(--mono,monospace); }
  #fig-memeff-memory-hierarchy-tiers .role-note { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }

  #fig-memeff-memory-hierarchy-tiers .axis-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-memeff-memory-hierarchy-tiers .callout { font: 700 11px var(--sans,sans-serif); }
  #fig-memeff-memory-hierarchy-tiers .bw-bar-label { font: 500 10px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-memeff-memory-hierarchy-tiers .col-header { font: 600 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
</style>

  <marker id="mh-arrow-up" viewBox="0 0 10 10" refX="5" refY="2" markerWidth="6" markerHeight="6" orient="auto">

  <marker id="mh-arrow-down" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 2 L10 2 L5 10 Z" fill="var(--muted,#64748b)"/>
  </marker>
  <marker id="mh-arrow-right" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 Z" fill="var(--muted,#64748b)"/>
  </marker>
  <marker id="mh-offload-up" viewBox="0 0 10 10" refX="5" refY="2" markerWidth="7" markerHeight="7" orient="auto">

  </marker>
  <marker id="mh-offload-down" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 2 L10 2 L5 10 Z" fill="var(--accent,#4f46e5)"/>
  </marker>
</defs>


<text x="190" y="52" text-anchor="middle" class="col-header">Tier</text>
<text x="390" y="52" text-anchor="middle" class="col-header">Bandwidth</text>
<text x="530" y="52" text-anchor="middle" class="col-header">Capacity</text>
<text x="665" y="52" text-anchor="middle" class="col-header">Role</text>


<line x1="80" y1="58" x2="740" y2="58" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>



<line x1="36" y1="390" x2="36" y2="85" stroke="var(--muted,#64748b)" stroke-width="1.5" marker-end="url(#mh-arrow-up)"/>
<text x="14" y="410" text-anchor="start" class="axis-label">Bandwidth</text>
<text x="14" y="426" text-anchor="start" class="axis-sub">(faster up)</text>


<line x1="738" y1="85" x2="738" y2="390" stroke="var(--muted,#64748b)" stroke-width="1.5" marker-end="url(#mh-arrow-down)"/>
<text x="788" y="410" text-anchor="end" class="axis-label">Capacity</text>
<text x="788" y="426" text-anchor="end" class="axis-sub">(larger down)</text>


<g>
  
  <rect x="80" y="68" width="560" height="76" rx="8" class="v-fill" fill="var(--accent,#4f46e5)" fill-opacity="0.15" stroke="var(--accent,#4f46e5)" stroke-width="2"/>
  
  <text x="175" y="102" text-anchor="middle" class="tier-name v-accent" fill="var(--accent,#4f46e5)">GPU HBM</text>
  
  <text x="390" y="96" text-anchor="middle" class="tier-bw">~3.35 TB/s</text>
  
  <rect x="295" y="105" width="190" height="9" rx="4" fill="var(--accent,#4f46e5)" fill-opacity="0.75"/>
  
  <text x="530" y="102" text-anchor="middle" class="tier-cap">80 GB</text>
  
  <text x="658" y="102" text-anchor="middle" class="role-note">active tensors</text>
</g>


<g>
  
  <line x1="295" y1="148" x2="295" y2="178" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
  <line x1="295" y1="163" x2="340" y2="163" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
  
  <rect x="341" y="152" width="88" height="22" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.2" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  <text x="385" y="167" text-anchor="middle" class="callout" fill="var(--warn,#e0a106)">~50× slower</text>
  <line x1="429" y1="163" x2="480" y2="163" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
  <line x1="480" y1="148" x2="480" y2="178" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
</g>


<g>
  <rect x="80" y="182" width="560" height="42" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.13" stroke="var(--warn,#e0a106)" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="175" y="205" text-anchor="middle" class="tier-name" fill="var(--warn,#e0a106)">PCIe bus</text>
  <text x="390" y="200" text-anchor="middle" class="tier-bw">~64 GB/s</text>
  
  <rect x="295" y="208" width="13" height="8" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.75"/>
  <text x="530" y="205" text-anchor="middle" class="tier-cap" fill="var(--muted,#64748b)">(transfer link)</text>
  <text x="658" y="205" text-anchor="middle" class="role-note" fill="var(--warn,#e0a106)">transfer bottleneck</text>
</g>


<g>
  <rect x="80" y="236" width="560" height="76" rx="8" fill="var(--v-fill,#ece7da)" fill-opacity="0.85" stroke="var(--v-stroke,#45413a)" stroke-width="1.5"/>
  <text x="175" y="270" text-anchor="middle" class="tier-name">CPU DRAM</text>
  <text x="390" y="265" text-anchor="middle" class="tier-bw">~100–200 GB/s</text>
  
  <rect x="295" y="274" width="36" height="9" rx="4" fill="var(--accent2,#3b82f6)" fill-opacity="0.6"/>
  <text x="530" y="270" text-anchor="middle" class="tier-cap">~512 GB</text>
  <text x="658" y="270" text-anchor="middle" class="role-note">offloaded states</text>
</g>


<g>
  <rect x="80" y="322" width="560" height="76" rx="8" fill="var(--v-fill,#ece7da)" fill-opacity="0.6" stroke="var(--v-stroke,#45413a)" stroke-width="1.5"/>
  <text x="175" y="356" text-anchor="middle" class="tier-name">NVMe SSD</text>
  <text x="390" y="351" text-anchor="middle" class="tier-bw">~7 GB/s</text>
  
  <rect x="295" y="360" width="4" height="9" rx="2" fill="var(--muted,#64748b)" fill-opacity="0.6"/>
  <text x="530" y="356" text-anchor="middle" class="tier-cap">~4 TB</text>
  <text x="658" y="356" text-anchor="middle" class="role-note">last resort</text>
</g>


<g>
  
  <line x1="56" y1="148" x2="56" y2="315"
        stroke="var(--accent,#4f46e5)" stroke-width="2.5"
        marker-start="url(#mh-offload-up)"
        marker-end="url(#mh-offload-down)"/>
  
  <text x="56" y="235" text-anchor="middle" transform="rotate(-90 56 235)"
        style="font:600 10px var(--sans,sans-serif);" fill="var(--accent,#4f46e5)">offload (down) / prefetch (up)</text>
</g>


<rect x="295" y="412" width="10" height="9" rx="2" fill="var(--accent,#4f46e5)" fill-opacity="0.6"/>
<text x="311" y="420" class="bw-bar-label" text-anchor="start">bar length scales with log(bandwidth)</text>

</svg>
<figcaption><b>The four memory tiers form a bandwidth-capacity inversion: faster memory is always smaller.</b> GPU HBM delivers ~3.35 TB/s but only 80 GB; the PCIe link is ~50x slower at ~64 GB/s, making it the critical bottleneck for CPU offloading. The horizontal bandwidth bars inside each tier (log-scaled) make the gap immediate. Tensors offloaded to CPU DRAM or NVMe must tolerate this PCIe latency, so only parameters not needed every step (e.g., Adam optimizer states) can be offloaded without stalling training.</figcaption>
</figure>
