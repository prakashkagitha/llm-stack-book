<figure class="viz" id="fig-cpt-rewarm-schedule-and-spike">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 620" role="img" aria-label="Two panels sharing a CPT-steps axis. Top: the three-phase learning-rate schedule, linearly re-warming from a cold floor up to eta_cpt (a fraction of the original pretraining peak), holding flat, then cosine re-decaying to a new floor. Bottom: two loss curves aligned to the same steps, both spiking transiently under the re-warm band then recovering below their starting values by the end of re-decay.">
  <defs>
    <marker id="cpt2-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)"/>
    </marker>
    <marker id="cpt2-arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--v-accent,#c15b39)"/>
    </marker>
  </defs>
  <style>
    #fig-cpt-rewarm-schedule-and-spike text{ font: 400 12px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-cpt-rewarm-schedule-and-spike .panel-title{ font: 700 13px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-cpt-rewarm-schedule-and-spike .phase-label{ font: 600 11.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-cpt-rewarm-schedule-and-spike .small-note{ font: 400 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-cpt-rewarm-schedule-and-spike .guide-label{ font: 600 11px var(--sans,sans-serif); fill: var(--v-accent,#c15b39); }
    #fig-cpt-rewarm-schedule-and-spike .callout{ font: 400 10.8px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-cpt-rewarm-schedule-and-spike .legend-text{ font: 600 11px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-cpt-rewarm-schedule-and-spike .axis-label{ font: 600 12px var(--sans,sans-serif); fill: var(--ink-soft); }
  </style>

  
  <text x="16" y="24" class="panel-title">Learning-rate schedule (eta vs. CPT steps)</text>

  
  <g data-anim="1">
    <rect x="120" y="40" width="90" height="200" fill="var(--v-accent,#c15b39)" opacity="0.08"/>
    <text x="165" y="52" text-anchor="middle" class="phase-label">Re-warm (T_w)</text>

    <rect x="560" y="40" width="110" height="200" fill="var(--v-accent,#c15b39)" opacity="0.08"/>
    <text x="615" y="52" text-anchor="middle" class="phase-label">Re-decay (T_d)</text>

    <text x="385" y="52" text-anchor="middle" class="phase-label">Stable body</text>
  </g>

  
  <line x1="90" y1="240" x2="90" y2="60" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#cpt2-arrow)"/>
  <line x1="90" y1="240" x2="700" y2="240" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#cpt2-arrow)"/>
  <text x="60" y="70" text-anchor="middle" class="axis-label">eta</text>

  
  <g data-anim="2">
    <line x1="90" y1="72" x2="670" y2="72" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>
    <text x="480" y="67" class="small-note">original pretraining peak (forgets most)</text>
  </g>

  
  <g data-anim="2">
    <line x1="90" y1="120" x2="670" y2="120" stroke="var(--v-accent,#c15b39)" stroke-width="1" stroke-dasharray="5 4" opacity="0.65"/>
    <text x="480" y="114" class="guide-label">eta_cpt ~ 10-30% of base peak</text>
  </g>

  
  <g data-anim="3">
    <path d="M 90 224
             L 120 224
             L 210 120
             L 560 120
             C 605 120 605 205 620 216
             C 640 230 655 232 670 233"
          fill="none" stroke="var(--v-accent,#c15b39)" stroke-width="3" stroke-linecap="round"
          class="viz-draw" style="--len:900"/>
  </g>

  
  <text x="95" y="238" class="small-note">resume at eta_min -- too cold to learn</text>
  <line x1="90" y1="224" x2="120" y2="224" stroke="var(--ink-soft)" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
  <text x="640" y="252" text-anchor="end" class="small-note">new floor</text>

  <text x="700" y="252" text-anchor="end" class="axis-label">CPT steps</text>

  
  <text x="16" y="300" class="panel-title">Loss on the SAME steps axis (aligned to schedule above)</text>

  
  <g data-anim="4">
    <rect x="230" y="312" width="330" height="46" rx="8" fill="var(--surface-3)" stroke="var(--border-2)" stroke-width="1" opacity="0.95"/>
    <text x="243" y="329" class="callout">transient spike -- stale Adam v_t + higher LR;</text>
    <text x="243" y="344" class="callout">recovers below baseline. Do NOT abort here.</text>
  </g>

  
  <g data-anim="1">
    <rect x="120" y="366" width="90" height="200" fill="var(--v-accent,#c15b39)" opacity="0.08"/>
    <rect x="560" y="366" width="110" height="200" fill="var(--v-accent,#c15b39)" opacity="0.08"/>
  </g>

  
  <line x1="90" y1="566" x2="90" y2="366" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#cpt2-arrow)"/>
  <line x1="90" y1="566" x2="700" y2="566" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#cpt2-arrow)"/>
  <text x="60" y="376" text-anchor="middle" class="axis-label">loss</text>
  <text x="700" y="586" text-anchor="end" class="axis-label">CPT steps</text>

  
  <g data-anim="2">
    <line x1="90" y1="516" x2="670" y2="516" stroke="var(--v-accent,#c15b39)" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>
    <line x1="90" y1="470" x2="670" y2="470" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 4" opacity="0.45"/>
  </g>

  
  <g data-anim="4">
    <path d="M 90 470
             L 118 469
             C 150 450 175 410 205 408
             C 260 406 320 430 385 444
             C 460 454 520 458 560 458
             C 600 458 630 460 670 462"
          fill="none" stroke="var(--muted)" stroke-width="2.6" stroke-linecap="round"
          class="viz-draw" style="--len:900" opacity="0.9"/>
  </g>

  
  <g data-anim="5">
    <path d="M 90 516
             L 118 514
             C 148 480 178 420 205 416
             C 280 408 340 450 400 480
             C 460 502 520 520 560 530
             C 610 540 645 545 670 550"
          fill="none" stroke="var(--v-accent,#c15b39)" stroke-width="3" stroke-linecap="round"
          class="viz-draw" style="--len:900"/>
  </g>

  
  <g data-anim="4">
    <line x1="290" y1="358" x2="245" y2="410" stroke="var(--ink-soft)" stroke-width="0.9" opacity="0.6" marker-end="url(#cpt2-arrow)"/>
  </g>

  
  <g data-anim="5">
    <circle cx="670" cy="550" r="4" fill="var(--v-accent,#c15b39)"/>
    <text x="660" y="526" text-anchor="end" class="callout" fill="var(--v-accent,#c15b39)">settled loss =</text>
    <text x="660" y="540" text-anchor="end" class="callout" fill="var(--v-accent,#c15b39)">judge the run here</text>
    <line x1="662" y1="533" x2="672" y2="546" stroke="var(--v-accent,#c15b39)" stroke-width="0.9" opacity="0.7"/>
  </g>

  
  <g data-anim="2">
    <rect x="480" y="376" width="14" height="3.5" fill="var(--v-accent,#c15b39)"/>
    <text x="500" y="382" class="legend-text">D_new (new-domain loss)</text>
    <rect x="480" y="394" width="14" height="3.5" fill="var(--muted)"/>
    <text x="500" y="400" class="legend-text">D_base (base-domain loss)</text>
  </g>

</svg>
<figcaption><b>Re-warming produces a transient loss spike on both distributions, but the new-domain loss settles below where it started.</b> The learning-rate schedule (top) ramps from a cold floor up to <code>eta_cpt</code> -- typically only 10-30% of the original pretraining peak -- holds, then cosine re-decays to a new floor. Aligned below it, both loss curves spike exactly under the re-warm band (stale Adam second-moment estimates meeting a higher LR) before recovering; judge the run by where <code>D_new</code> lands after re-decay, not by the spike itself.</figcaption>
</figure>
