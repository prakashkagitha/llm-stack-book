<figure class="viz" id="fig-moe-capacity-buffer-drop-pad">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 585" role="img" aria-label="Three expert buffers of fixed capacity: an overloaded expert spills tokens above the line as dropped, an underfilled expert leaves empty slots padded with zeros, and a balanced expert fills exactly to the line with no waste.">
<defs>
  <marker id="mcbd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)"/>
  </marker>
  <pattern id="mcbd-hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="7" stroke="var(--muted)" stroke-width="1.6" opacity="0.55"/>
  </pattern>
</defs>
<style>
  #fig-moe-capacity-buffer-drop-pad text{ font:11px var(--sans, sans-serif); fill:var(--ink-soft); }
  #fig-moe-capacity-buffer-drop-pad .hdr{ font:700 14px var(--sans, sans-serif); }
  #fig-moe-capacity-buffer-drop-pad .colname{ font:700 12.5px var(--sans, sans-serif); }
  #fig-moe-capacity-buffer-drop-pad .sub{ font:10.5px var(--sans, sans-serif); fill:var(--muted); }
  #fig-moe-capacity-buffer-drop-pad .tiny{ font:9px var(--sans, sans-serif); fill:var(--muted); }
  #fig-moe-capacity-buffer-drop-pad .mono{ font:700 11.5px var(--mono, monospace); }
  #fig-moe-capacity-buffer-drop-pad .badge-t{ font:700 11.5px var(--sans, sans-serif); }
  #fig-moe-capacity-buffer-drop-pad .badge-s{ font:9.5px var(--sans, sans-serif); fill:var(--muted); }
  #fig-moe-capacity-buffer-drop-pad .chip{ font:10.3px var(--mono, monospace); fill:var(--ink-soft); }
</style>

<text x="400" y="22" text-anchor="middle" class="hdr">EXPERT CAPACITY: A FIXED-SIZE BUFFER PER EXPERT</text>

<g data-anim="1">
  <rect x="335" y="34" width="130" height="38" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="400" y="50" text-anchor="middle" class="colname">router</text>
  <text x="400" y="64" text-anchor="middle" class="tiny">(top-k dispatch, uneven)</text>

  <path d="M370,72 C300,95 210,105 150,122" fill="none" stroke="var(--ink-soft)" stroke-width="7" opacity="0.55" marker-end="url(#mcbd-arrow)"/>
  <path d="M400,72 L400,122" fill="none" stroke="var(--ink-soft)" stroke-width="2.5" opacity="0.55" marker-end="url(#mcbd-arrow)"/>
  <path d="M430,72 C500,95 590,105 650,122" fill="none" stroke="var(--ink-soft)" stroke-width="4.5" opacity="0.55" marker-end="url(#mcbd-arrow)"/>

  <text x="145" y="140" text-anchor="middle" class="colname" fill="var(--accent)">EXPERT A</text>
  <text x="145" y="153" text-anchor="middle" class="sub">(overloaded)</text>
  <text x="400" y="140" text-anchor="middle" class="colname" fill="var(--warn)">EXPERT B</text>
  <text x="400" y="153" text-anchor="middle" class="sub">(underfilled)</text>
  <text x="655" y="140" text-anchor="middle" class="colname" fill="var(--good)">EXPERT C</text>
  <text x="655" y="153" text-anchor="middle" class="sub">(just right)</text>
</g>

<g data-anim="2">
  <line x1="50" y1="200" x2="750" y2="200" stroke="var(--ink-soft)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.85"/>
  <text x="400" y="172" text-anchor="middle" class="mono" fill="var(--accent)">capacity = ceil( Cf &#215; Nk/E )</text>
  <text x="400" y="185" text-anchor="middle" class="tiny">fixed buffer height -- GPUs need rectangular tensors</text>

  <line x1="70" y1="281" x2="730" y2="281" stroke="var(--muted)" stroke-width="1" stroke-dasharray="2 4" opacity="0.55"/>
  <text x="735" y="285" text-anchor="start" class="tiny">Nk/E avg</text>

  <line x1="250" y1="200" x2="250" y2="281" stroke="var(--accent)" stroke-width="1.3" opacity="0.8"/>
  <line x1="242" y1="200" x2="258" y2="200" stroke="var(--accent)" stroke-width="1.3" opacity="0.8"/>
  <line x1="242" y1="281" x2="258" y2="281" stroke="var(--accent)" stroke-width="1.3" opacity="0.8"/>
  <text x="261" y="235" text-anchor="start" class="tiny" fill="var(--accent)">Cf slack</text>
  <text x="261" y="247" text-anchor="start" class="tiny" fill="var(--accent)">(imbalance</text>
  <text x="261" y="258" text-anchor="start" class="tiny" fill="var(--accent)">headroom)</text>
</g>


<g data-anim="3">
  <rect x="80" y="389" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="80" y="362" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="80" y="335" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="80" y="308" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="80" y="281" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="80" y="254" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="80" y="227" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="80" y="200" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="70" y="200" width="150" height="216" fill="none" class="v-stroke" stroke-width="1.6"/>

  <g fill="var(--accent)" fill-opacity="0.88" stroke="var(--accent)" stroke-width="1.1">
    <rect x="112" y="188" width="36" height="20" rx="4" transform="rotate(-5 130 198)"/>
    <rect x="86" y="160" width="34" height="19" rx="4" transform="rotate(7 103 170)"/>
  </g>

  <rect x="80" y="428" width="130" height="52" rx="8" fill="none" stroke="var(--accent)" stroke-width="1.2" opacity="0.9"/>
  <text x="145" y="446" text-anchor="middle" class="badge-t" fill="var(--accent)">DROPPED</text>
  <text x="145" y="459" text-anchor="middle" class="badge-s">skip FFN, pass through</text>
  <text x="145" y="470" text-anchor="middle" class="badge-s">on residual (quality cost)</text>
</g>



<g data-anim="4">
  <rect x="335" y="389" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="335" y="362" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="335" y="335" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="335" y="308" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="335" y="281" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="335" y="254" width="130" height="24" fill="url(#mcbd-hatch)" class="v-stroke" stroke-width="1" opacity="0.9"/>
  <rect x="335" y="227" width="130" height="24" fill="url(#mcbd-hatch)" class="v-stroke" stroke-width="1" opacity="0.9"/>
  <rect x="335" y="200" width="130" height="24" fill="url(#mcbd-hatch)" class="v-stroke" stroke-width="1" opacity="0.9"/>
  <rect x="325" y="200" width="150" height="216" fill="none" class="v-stroke" stroke-width="1.6"/>

  <rect x="325" y="428" width="150" height="52" rx="8" fill="none" stroke="var(--warn)" stroke-width="1.2" opacity="0.9"/>
  <text x="400" y="446" text-anchor="middle" class="badge-t" fill="var(--warn)">PADDED (zeros)</text>
  <text x="400" y="459" text-anchor="middle" class="badge-s">empty slots run anyway --</text>
  <text x="400" y="470" text-anchor="middle" class="badge-s">wasted FLOPs (compute cost)</text>

  <rect x="590" y="389" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="590" y="362" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="590" y="335" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="590" y="308" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="590" y="281" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="590" y="254" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="590" y="227" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="590" y="200" width="130" height="24" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="580" y="200" width="150" height="216" fill="none" class="v-stroke" stroke-width="1.6"/>

  <rect x="580" y="428" width="150" height="52" rx="8" fill="none" stroke="var(--good)" stroke-width="1.2" opacity="0.9"/>
  <text x="655" y="446" text-anchor="middle" class="badge-t" fill="var(--good)">IDEAL</text>
  <text x="655" y="459" text-anchor="middle" class="badge-s">full to the line --</text>
  <text x="655" y="470" text-anchor="middle" class="badge-s">no drop, no pad</text>
</g>

<g data-anim="5">
  <text x="400" y="503" text-anchor="middle" class="sub">Cf too LOW -&gt; many drops (hurts loss); Cf too HIGH -&gt; more padding (wastes compute)</text>
  <text x="400" y="518" text-anchor="middle" class="sub">typical training Cf in [1.0, 2.0]</text>

  <rect x="60" y="535" width="680" height="28" rx="14" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="400" y="553" text-anchor="middle" class="chip">dropless MoE (Megablocks grouped-GEMM): ragged sizes -&gt; no drop, no pad</text>
</g>

</svg>
<figcaption><b>Capacity turns a ragged routing decision into a fixed-size rectangular buffer, and that fixed size is what creates dropping and padding.</b> With capacity = ceil(C<sub>f</sub> &#215; Nk/E), an overloaded expert (A) spills its overflow onto the residual (dropped, hurting quality) while an underloaded expert (B) burns FLOPs on zero-padded slots -- the capacity factor C<sub>f</sub> is the single knob that trades one cost against the other, and dropless kernels (grouped-GEMM) sidestep the trade-off entirely by processing ragged batches directly.</figcaption>
</figure>
