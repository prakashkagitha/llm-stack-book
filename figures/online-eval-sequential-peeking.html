<figure class="viz" id="fig-online-eval-sequential-peeking">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 820 560" role="img" aria-label="Time series of the estimated treatment effect over 14 days for a simulation where the null hypothesis is true. Several pale trajectories wander and settle back near zero. A fixed 95% cutoff is only valid if checked once at the planned end, and one trajectory pokes above it mid-experiment, which would be a false ship if peeked at that day, even though it never breaches the wider always-valid confidence-sequence funnel that starts wide and narrows over time and returns to zero by day 14.">
  <style>
    #fig-online-eval-sequential-peeking text { font-family: var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
    #fig-online-eval-sequential-peeking .title { font: 700 13px var(--sans,sans-serif); fill: var(--ink,#1e293b); }
    #fig-online-eval-sequential-peeking .lbl { font: 600 10.5px var(--sans,sans-serif); }
    #fig-online-eval-sequential-peeking .lbl-sm { font: 600 9.5px var(--sans,sans-serif); }
    #fig-online-eval-sequential-peeking .note { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-online-eval-sequential-peeking .note-i { font: italic 400 10.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-online-eval-sequential-peeking .axis { stroke: var(--border-2,#d8d1c0); stroke-width: 1.3; }
    #fig-online-eval-sequential-peeking .tick { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#64748b); }
    #fig-online-eval-sequential-peeking .zero-line { stroke: var(--ink-soft,#475569); stroke-width: 1.6; }
    #fig-online-eval-sequential-peeking .fixed-line { stroke: var(--ink-soft,#475569); stroke-width: 1.4; stroke-dasharray: 6,4; opacity: .85; }
    #fig-online-eval-sequential-peeking .funnel-band { fill: var(--accent,#c15b39); opacity: .10; }
    #fig-online-eval-sequential-peeking .funnel-edge { stroke: var(--accent,#c15b39); stroke-width: 1.6; fill: none; opacity: .75; }
    #fig-online-eval-sequential-peeking .walk { stroke: var(--ink-soft,#475569); stroke-width: 1.3; fill: none; opacity: .5; }
    #fig-online-eval-sequential-peeking .walk-alert { stroke: var(--warn,#e0a106); stroke-width: 2.1; fill: none; }
    #fig-online-eval-sequential-peeking .star { fill: var(--warn,#e0a106); }
    #fig-online-eval-sequential-peeking .callout-box { fill: var(--surface-3,#eef2ff); stroke: var(--accent,#c15b39); stroke-width: 1.3; }
    #fig-online-eval-sequential-peeking .callout { font: 700 11px var(--sans,sans-serif); }
    #fig-online-eval-sequential-peeking .leg-sw { stroke-width: 2; }
  </style>


  <g data-anim="1">
    <line x1="20" y1="42" x2="50" y2="42" class="walk"/>
    <text x="56" y="45.5" class="note">pale = null-true trajectory</text>

    <line x1="300" y1="42" x2="330" y2="42" class="fixed-line"/>
    <text x="336" y="45.5" class="note">dashed = fixed cutoff (one look)</text>

    <line x1="565" y1="42" x2="595" y2="42" class="funnel-edge"/>
    <text x="601" y="45.5" class="note">funnel = always-valid (any time)</text>
  </g>

  <text x="420" y="62" text-anchor="middle" class="note-i">true effect = 0 for this simulated experiment (H0 is TRUE)</text>


  <g data-anim="1">
    <line x1="70" y1="70" x2="70" y2="380" class="axis"/>
    <line x1="70" y1="380" x2="780" y2="380" class="axis"/>

    <line x1="70" y1="225" x2="780" y2="225" class="zero-line"/>
    <text x="62" y="229" text-anchor="end" class="lbl-sm">0</text>

    <line x1="70" y1="153.5" x2="780" y2="153.5" class="fixed-line"/>
    <line x1="70" y1="296.5" x2="780" y2="296.5" class="fixed-line"/>
    <text x="74" y="140" class="lbl-sm">fixed-horizon 95% cutoff</text>
    <text x="74" y="151.5" class="note-i" style="font-size:9px">(valid only if you look ONCE, at the planned end)</text>

    <text x="103" y="396" text-anchor="middle" class="tick">1</text>
    <text x="248" y="396" text-anchor="middle" class="tick">4</text>
    <text x="398" y="396" text-anchor="middle" class="tick">7</text>
    <text x="562" y="396" text-anchor="middle" class="tick">10</text>
    <text x="780" y="396" text-anchor="middle" class="tick">14</text>
    <text x="425" y="416" text-anchor="middle" class="title">days of experiment</text>
    <text x="34" y="225" text-anchor="middle" class="title" transform="rotate(-90 34 225)">estimated treatment effect</text>
  </g>


  <g data-anim="2">
    <path class="funnel-band" d="M70,88.5 C 180,105 350,124 780,136.1 L780,313.9 C 350,326 180,345 70,361.5 Z"/>
    <path class="funnel-edge viz-draw" style="--len:780"
          d="M70,88.5 C 180,105 350,124 780,136.1"/>
    <path class="funnel-edge viz-draw" style="--len:780"
          d="M70,361.5 C 180,345 350,326 780,313.9"/>
    <text x="620" y="82" text-anchor="middle" class="lbl-sm" fill="var(--accent,#c15b39)">always-valid boundary</text>
    <text x="620" y="94" text-anchor="middle" class="note-i" style="font-size:9px">(wide early, narrows as data accrues; valid anytime)</text>
  </g>


  <g data-anim="3">
    <path class="walk viz-draw" style="--len:780" d="M70,205.5 L124.6,183.4 L179.2,201.6 L233.8,192.5 L288.5,212 L343.1,231.5 L397.7,209.4 L452.3,222.4 L506.9,235.4 L561.5,218.5 L616.2,227.6 L670.8,219.8 L725.4,228.9 L780,223.7"/>
    <path class="walk viz-draw" style="--len:780" d="M70,251 L124.6,270.5 L179.2,244.5 L233.8,264 L288.5,238 L343.1,253.6 L397.7,231.5 L452.3,244.5 L506.9,225 L561.5,235.4 L616.2,221.1 L670.8,230.2 L725.4,222.4 L780,226.3"/>
    <path class="walk viz-draw" style="--len:780" d="M70,218.5 L124.6,238 L179.2,199 L233.8,218.5 L288.5,244.5 L343.1,214.6 L397.7,251 L452.3,231.5 L506.9,212 L561.5,228.9 L616.2,217.2 L670.8,227.6 L725.4,223.7 L780,225"/>
  </g>


  <g data-anim="4">
    <path class="walk-alert viz-draw" style="--len:780" d="M70,212 L124.6,192.5 L179.2,173 L233.8,160 L288.5,149.6 L343.1,144.4 L397.7,160 L452.3,179.5 L506.9,199 L561.5,212 L616.2,218.5 L670.8,222.4 L725.4,226.3 L780,225"/>

    <path class="star viz-pulse" d="M343.1,135.4 L345.6,141.9 L352.1,144.4 L345.6,146.9 L343.1,153.4 L340.6,146.9 L334.1,144.4 L340.6,141.9 Z"/>

    <line x1="352" y1="140" x2="398" y2="128" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <text x="403" y="132" class="callout" fill="var(--warn,#e0a106)">peeking here -&gt; false ship!</text>

    <text x="343.1" y="452" text-anchor="middle" class="note" style="font-size:9.5px">highlighted trajectory: pokes above the fixed cutoff on day 6,</text>
    <text x="343.1" y="464" text-anchor="middle" class="note" style="font-size:9.5px">but stays inside the always-valid funnel, and settles back to 0 by day 14</text>
  </g>


  <g data-anim="5">
    <rect class="callout-box" x="60" y="478" width="700" height="58" rx="8"/>
    <text x="410" y="500" text-anchor="middle" class="callout">peek daily against the fixed line -&gt; ~1 in 4 null experiments falsely crosses it</text>
    <text x="410" y="520" text-anchor="middle" class="callout">stop anytime inside the always-valid funnel -&gt; error stays &lt;= alpha</text>
  </g>
</svg>
<figcaption><b>Peeking daily against a fixed cutoff turns a 5% test into a 20-25% false-positive coin flip.</b> Because a fixed-horizon boundary is only valid at one planned look, a null-true trajectory that happens to wander above it mid-experiment looks like a real win; an always-valid confidence sequence starts wide and narrows as data accrues, so it stays honest no matter when you stop looking.</figcaption>
</figure>
