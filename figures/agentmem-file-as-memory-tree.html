<figcaption><b>The file-as-memory pattern turns a structured directory into a persistent agent notebook.</b> The <code>episodes/</code> subtree holds append-only timestamped logs (episodic memory); <code>facts/</code> and <code>reflections/</code> hold stable, updatable knowledge (semantic memory); <code>scratchpad.md</code> is the live working buffer. No external database is required — a plain filesystem is auditable, version-controllable, and retrievable with a vector index over file contents.</figcaption>
