  <line x1="223" y1="150" x2="238" y2="142" stroke="var(--accent)" stroke-width="1.1"/>
  <text x="242" y="139" class="cap-lbl">SFT &#x2014; format +</text>
  <text x="242" y="151" class="cap-lbl">how to access it</text>


  <text x="198" y="302" text-anchor="middle" class="body-lbl">Pretraining weights</text>
  <text x="198" y="317" text-anchor="middle" class="body-sub">facts, reasoning, syntax, style</text>
  <text x="198" y="331" text-anchor="middle" class="body-sub">(hundreds of billions of tokens)</text>


  <text x="198" y="456" text-anchor="middle" class="cap-line">SFT adds almost no knowledge; it teaches the model to</text>
  <text x="198" y="470" text-anchor="middle" class="cap-line">surface what it already knows, in the right format.</text>
</g>


<g data-anim="2">
  <text x="600" y="34" text-anchor="middle" class="title">Quality &gt; quantity</text>
</g>

  <rect class="stack-neat" x="428" y="116" width="44" height="9" rx="2"/>
  <rect class="stack-neat" x="428" y="128" width="44" height="9" rx="2"/>

  <path d="M470.5,103 L473,105.5 L478,99.5" stroke="var(--surface)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  </g>

  <text x="450" y="385" text-anchor="middle" class="row-lbl2">examples</text>

  <text x="537" y="324" text-anchor="middle" class="box-lbl">Base model</text>

  <rect class="tagbox-faded" x="716" y="304" width="64" height="32" rx="7"/>

</svg>
<figcaption><b>Knowledge lives in the pretraining weights; SFT is a thin layer that teaches access, not facts.</b> The vast submerged mass of a language model's capability &#x2014; facts, reasoning, syntax, style &#x2014; is set during pretraining; SFT only adds the format and habits needed to surface it (left). That is why 1,000 meticulously curated examples (LIMA) beat 100,000 noisy ones in human preference &#x2014; the noisy set spends its extra size on duplicates and errors, not new knowledge (right).</figcaption>
</figure>
