<figure class="viz" id="fig-attn-output-convex-hull">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 700 400" role="img" aria-label="Two pentagons of five value vectors v1 through v5 with their convex hull shaded. In the soft-weights panel the attention output sits near the weighted centroid with several comparably weighted spokes. In the sharp-weights panel the output is pulled almost onto vertex v1 by one dominant spoke, illustrating hard retrieval as a limiting case of the same convex combination.">
<style>
  #fig-attn-output-convex-hull text { fill: currentColor; }
  #fig-attn-output-convex-hull .hdr  { font: 700 13px var(--sans,sans-serif); }
  #fig-attn-output-convex-hull .sub  { font: 600 10.5px var(--mono,monospace); fill: var(--muted,#94a3b8); }
  #fig-attn-output-convex-hull .vlbl { font: 600 10.5px var(--mono,monospace); }
  #fig-attn-output-convex-hull .note { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-attn-output-convex-hull .outlbl { font: 700 10.5px var(--sans,sans-serif); }
  #fig-attn-output-convex-hull .banner { font: 600 11px var(--mono,monospace); }
  #fig-attn-output-convex-hull .hull { fill: var(--v-fill,#2f2b27); fill-opacity: 0.55; }
</style>

<line x1="330" y1="14" x2="330" y2="330" stroke="var(--border-2,#94a3b8)" stroke-width="1" stroke-dasharray="4 4"/>

<g data-anim="1">
<text x="190" y="26" text-anchor="middle" class="hdr" fill="var(--accent,#f59e0b)">SOFT WEIGHTS</text>
<text x="190" y="44" text-anchor="middle" class="sub">a ~ [0.30, 0.25, 0.20, 0.15, 0.10]</text>

<polygon points="190,85 280.3,150.6 245.9,256.9 134.1,256.9 99.7,150.6" class="hull v-stroke" stroke="var(--v-stroke,#45413a)" stroke-width="1.2"/>

<circle cx="190" cy="85" r="4.5" class="v-fill" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>
<circle cx="280.3" cy="150.6" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>
<circle cx="245.9" cy="256.9" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>
<circle cx="134.1" cy="256.9" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>
<circle cx="99.7" cy="150.6" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>

<text x="190" y="65" text-anchor="middle" class="vlbl">v1 0.30</text>
<text x="299.3" y="144.4" text-anchor="middle" class="vlbl">v2 0.25</text>
<text x="257.7" y="273.1" text-anchor="middle" class="vlbl">v3 0.20</text>
<text x="122.3" y="273.1" text-anchor="middle" class="vlbl">v4 0.15</text>
<text x="80.7" y="144.4" text-anchor="middle" class="vlbl">v5 0.10</text>
</g>

<g data-anim="2">
<line x1="206.3" y1="168.1" x2="190" y2="85" stroke="var(--v-muted,#978f83)" stroke-width="2.8" stroke-opacity="0.85"/>
<line x1="206.3" y1="168.1" x2="280.3" y2="150.6" stroke="var(--v-muted,#978f83)" stroke-width="2.5" stroke-opacity="0.75"/>
<line x1="206.3" y1="168.1" x2="245.9" y2="256.9" stroke="var(--v-muted,#978f83)" stroke-width="2.2" stroke-opacity="0.65"/>
<line x1="206.3" y1="168.1" x2="134.1" y2="256.9" stroke="var(--v-muted,#978f83)" stroke-width="1.9" stroke-opacity="0.55"/>
<line x1="206.3" y1="168.1" x2="99.7" y2="150.6" stroke="var(--v-muted,#978f83)" stroke-width="1.6" stroke-opacity="0.45"/>
<circle cx="206.3" cy="168.1" r="6.5" class="v-accent" fill="var(--accent,#f59e0b)" stroke="var(--surface,#201d1a)" stroke-width="1.5"/>
<text x="206.3" y="192" text-anchor="middle" class="outlbl" fill="var(--accent,#f59e0b)">output</text>

<text x="190" y="296" text-anchor="middle" class="note">output ~ weighted centroid</text>
<text x="190" y="310" text-anchor="middle" class="note">spokes: comparable weight</text>
</g>

<g data-anim="3">
<text x="530" y="26" text-anchor="middle" class="hdr" fill="var(--accent,#f59e0b)">SHARP WEIGHTS (large scores)</text>
<text x="530" y="44" text-anchor="middle" class="sub">a ~ [0.86, 0.06, 0.04, 0.03, 0.01]</text>

<polygon points="530,85 620.3,150.6 585.9,256.9 474.1,256.9 439.7,150.6" class="hull v-stroke" stroke="var(--v-stroke,#45413a)" stroke-width="1.2"/>

<circle cx="530" cy="85" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>
<circle cx="620.3" cy="150.6" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>
<circle cx="585.9" cy="256.9" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>
<circle cx="474.1" cy="256.9" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>
<circle cx="439.7" cy="150.6" r="4.5" stroke="var(--v-stroke,#45413a)" stroke-width="1.2" fill="var(--surface,#201d1a)"/>

<text x="530" y="65" text-anchor="middle" class="vlbl">v1 0.86</text>
<text x="639.3" y="144.4" text-anchor="middle" class="vlbl">v2 0.06</text>
<text x="597.7" y="273.1" text-anchor="middle" class="vlbl">v3 0.04</text>
<text x="462.3" y="273.1" text-anchor="middle" class="vlbl">v4 0.03</text>
<text x="420.7" y="144.4" text-anchor="middle" class="vlbl">v5 0.01</text>
</g>

<g data-anim="4">
<line x1="535.1" y1="101.6" x2="620.3" y2="150.6" stroke="var(--v-grid,#413c35)" stroke-width="1.1" stroke-opacity="0.4"/>
<line x1="535.1" y1="101.6" x2="585.9" y2="256.9" stroke="var(--v-grid,#413c35)" stroke-width="1.1" stroke-opacity="0.35"/>
<line x1="535.1" y1="101.6" x2="474.1" y2="256.9" stroke="var(--v-grid,#413c35)" stroke-width="1.1" stroke-opacity="0.3"/>
<line x1="535.1" y1="101.6" x2="439.7" y2="150.6" stroke="var(--v-grid,#413c35)" stroke-width="1.1" stroke-opacity="0.3"/>
<line x1="535.1" y1="101.6" x2="530" y2="85" class="v-accent-s" stroke="var(--accent,#f59e0b)" stroke-width="6.2"/>
<circle cx="535.1" cy="101.6" r="6.5" class="v-accent" fill="var(--accent,#f59e0b)" stroke="var(--surface,#201d1a)" stroke-width="1.5"/>
<text x="565" y="98" text-anchor="start" class="outlbl" fill="var(--accent,#f59e0b)">output</text>

<text x="530" y="296" text-anchor="middle" class="note">sharpen -> hard retrieval</text>
<text x="530" y="310" text-anchor="middle" class="note">(a single value)</text>
</g>

<g data-anim="5">
<line x1="20" y1="330" x2="680" y2="330" stroke="var(--border-2,#94a3b8)" stroke-width="1" stroke-dasharray="4 4"/>
<text x="350" y="354" text-anchor="middle" class="banner">output = sum_j a_j v_j&#160;&#160;&#160; a_j >= 0&#160;&#160;&#160; sum_j a_j = 1</text>
<text x="350" y="374" text-anchor="middle" class="banner" fill="var(--accent,#f59e0b)">=> always inside the hull: interpolate, never extrapolate</text>
</g>

</svg>
<figcaption><b>The attention output is a convex combination of the value vectors, not a free point in space.</b> With soft weights the output sits near the weighted centroid of v1&#8211;v5, pulled a little toward whichever values score highest; as the weights sharpen toward one dominant value (large scores, low-temperature softmax), the output slides across the hull toward that vertex, recovering hard retrieval as a limit. Because a_j &gt;= 0 and they sum to 1, the output can only ever interpolate among the values &#8212; it can never extrapolate outside their convex hull.</figcaption>
</figure>
