<figure class="viz" id="fig-mia-tpr-low-fpr-roc">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 760 560" role="img" aria-label="Log-log ROC plot from 0.001 to 1 on both axes. A dangerous attack curve hugs the chance diagonal through the mid and high false-positive-rate region but spikes far above it at the far left, near a false positive rate of 0.001, reaching roughly 50 to 100 times the chance true positive rate there. A truly private attack sits on the chance diagonal everywhere. The takeaway: average accuracy looks like chance while the low-FPR tail shows a real breach.">
  <defs>
    <marker id="mroc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-mia-tpr-low-fpr-roc .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-mia-tpr-low-fpr-roc .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-mia-tpr-low-fpr-roc .tick{ font:500 11px var(--mono,monospace); }
    #fig-mia-tpr-low-fpr-roc .callout{ font:500 11.5px var(--sans,sans-serif); }
    #fig-mia-tpr-low-fpr-roc .callout-b{ font:700 11.5px var(--sans,sans-serif); }
    #fig-mia-tpr-low-fpr-roc .legend{ font:600 12px var(--sans,sans-serif); }
    #fig-mia-tpr-low-fpr-roc .band-lbl{ font:700 11.5px var(--sans,sans-serif); letter-spacing:.02em; }
    #fig-mia-tpr-low-fpr-roc text{ fill: var(--ink-soft); }
    #fig-mia-tpr-low-fpr-roc .dim{ fill: var(--muted); }
  </style>

  <text x="380" y="24" text-anchor="middle" class="ttl">Average MIA accuracy hides the tail: read the ROC in log-log, at low FPR</text>

  
  <g data-anim="1">
    <rect x="100" y="70" width="130" height="370" fill="var(--accent)" fill-opacity="0.07"/>
    <text x="140" y="98" text-anchor="start" class="band-lbl" fill="var(--accent)">the tail</text>
    <text x="140" y="112" text-anchor="start" class="band-lbl" fill="var(--accent)">that matters</text>
    <text x="140" y="126" text-anchor="start" class="band-lbl" fill="var(--accent)">(low FPR)</text>
  </g>

  
  <g data-anim="1">
    <line x1="100" y1="440" x2="100" y2="70" class="v-stroke" stroke-width="1.6" marker-start="url(#mroc-arrow)"/>
    <line x1="100" y1="440" x2="700" y2="440" class="v-stroke" stroke-width="1.6" marker-end="url(#mroc-arrow)"/>

    
    <g class="v-grid" stroke-width="1" opacity="0.5">
      <line x1="293.3" y1="440" x2="293.3" y2="70" stroke-dasharray="2 4"/>
      <line x1="486.7" y1="440" x2="486.7" y2="70" stroke-dasharray="2 4"/>
      <line x1="680" y1="440" x2="680" y2="70" stroke-dasharray="2 4"/>
      <line x1="100" y1="316.7" x2="700" y2="316.7" stroke-dasharray="2 4"/>
      <line x1="100" y1="193.3" x2="700" y2="193.3" stroke-dasharray="2 4"/>
      <line x1="100" y1="70" x2="700" y2="70" stroke-dasharray="2 4"/>
    </g>

    
    <text x="100" y="456" text-anchor="middle" class="tick">0.001</text>
    <text x="293.3" y="456" text-anchor="middle" class="tick">0.01</text>
    <text x="486.7" y="456" text-anchor="middle" class="tick">0.1</text>
    <text x="680" y="456" text-anchor="middle" class="tick">1</text>
    
    <text x="90" y="444" text-anchor="end" class="tick">0.001</text>
    <text x="90" y="320.7" text-anchor="end" class="tick">0.01</text>
    <text x="90" y="197.3" text-anchor="end" class="tick">0.1</text>
    <text x="90" y="74" text-anchor="end" class="tick">1</text>

    <text x="400" y="480" text-anchor="middle" class="ax">False Positive Rate (log scale)</text>
    <text x="34" y="255" text-anchor="middle" class="ax" transform="rotate(-90 34 255)">True Positive Rate (log scale)</text>
  </g>

  
  <g data-anim="2">
    <line x1="100" y1="440" x2="680" y2="70" stroke="var(--muted)" stroke-width="1.8" stroke-dasharray="6 5"/>
    <text x="235" y="372" text-anchor="middle" class="callout dim">chance</text>
  </g>

  
  <g data-anim="3">
    <g fill="var(--good,#2f9e6e)">
      <circle cx="158" cy="403" r="3.6"/>
      <circle cx="245" cy="347.5" r="3.6"/>
      <circle cx="332" cy="292" r="3.6"/>
      <circle cx="419" cy="236.5" r="3.6"/>
      <circle cx="506" cy="181" r="3.6"/>
      <circle cx="593" cy="125.5" r="3.6"/>
    </g>
    <line x1="506" y1="181" x2="452" y2="150" class="v-stroke" stroke-width="1" opacity="0.5"/>
    <text x="446" y="140" text-anchor="end" class="callout-b" fill="var(--good,#2f9e6e)">truly private:</text>
    <text x="446" y="154" text-anchor="end" class="callout-b" fill="var(--good,#2f9e6e)">no tail</text>
  </g>

  
  <g data-anim="4">
    <path d="M100,206 C150,235 220,285 293.3,315
             C400,246 540,150 680,72"
          fill="none" stroke="var(--accent)" stroke-width="3.2" stroke-linecap="round" class="viz-draw" style="--len:900"/>
    <circle cx="100" cy="206" r="4.5" fill="var(--accent)"/>

    
    <path d="M112,198 C170,155 210,125 245,110" fill="none" class="v-stroke" stroke-width="1" opacity="0.55" stroke-dasharray="2 3"/>
    <rect x="245" y="82" width="300" height="46" rx="8" class="v-fill" stroke="var(--accent)" stroke-width="1.3"/>
    <text x="395" y="101" text-anchor="middle" class="callout-b" fill="var(--accent)">~50-100x chance TPR here</text>
    <text x="395" y="118" text-anchor="middle" class="callout" fill="var(--accent)">= a real breach for the most vulnerable records</text>

    
    <line x1="455" y1="218" x2="505" y2="331" class="v-stroke" stroke-width="1" opacity="0.55" stroke-dasharray="2 3"/>
    <rect x="440" y="332" width="228" height="46" rx="8" class="v-fill" stroke="var(--accent)" stroke-width="1.3"/>
    <text x="554" y="351" text-anchor="middle" class="callout-b" fill="var(--accent)">average accuracy ~ chance</text>
    <text x="554" y="368" text-anchor="middle" class="callout" fill="var(--accent)">-&gt; looks private</text>
  </g>

  
  <g data-anim="5">
    <line x1="112" y1="500" x2="140" y2="500" stroke="var(--muted)" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="148" y="504" class="legend">chance (TPR = FPR)</text>

    <line x1="330" y1="500" x2="358" y2="500" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>
    <text x="366" y="504" class="legend">dangerous attack (near-chance on avg)</text>

    <circle cx="112" cy="528" r="4.2" fill="var(--good,#2f9e6e)"/>
    <text x="125" y="532" class="legend">truly private (no tail, sits on the diagonal)</text>
  </g>
</svg>
<figcaption><b>Average accuracy is the wrong metric for membership inference: it hides exactly the leakage that matters.</b> Plotted on a log-log ROC, the dangerous attack tracks the chance diagonal through most of the false-positive range (so its overall AUC looks near-chance) yet spikes far above it at very low FPR -- a real, confident breach for the most vulnerable records. A genuinely private model's attack curve sits on the chance diagonal everywhere, including the tail; the only way to tell the two apart is to read TPR at low FPR, not average accuracy.</figcaption>
</figure>
