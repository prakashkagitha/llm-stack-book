<figure class="viz" id="fig-accel-capacity-decision-70b">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 500" role="img" aria-label="A comparison showing a 152 gigabyte decode footprint (70 GB weights plus 82 GB KV cache) split across two 80 GB devices with a per-layer all-reduce, versus the same footprint fitting on one 192 GB device with no cross-device collective at all.">
  <style>
    #fig-accel-capacity-decision-70b .ttl{ font:700 14.5px var(--sans,sans-serif); }
    #fig-accel-capacity-decision-70b .panel-ttl{ font:700 13px var(--sans,sans-serif); }
    #fig-accel-capacity-decision-70b .lbl{ font:600 11.5px var(--sans,sans-serif); }
    #fig-accel-capacity-decision-70b .sub{ font:500 10px var(--sans,sans-serif); }
    #fig-accel-capacity-decision-70b .tick{ font:500 10.5px var(--mono,monospace); }
    #fig-accel-capacity-decision-70b .badge{ font:700 11px var(--sans,sans-serif); }
    #fig-accel-capacity-decision-70b .take{ font:600 11.5px var(--sans,sans-serif); }
    #fig-accel-capacity-decision-70b text{ fill: var(--ink-soft); }
    #fig-accel-capacity-decision-70b .dim{ fill: var(--muted); }
  </style>

  <text x="390" y="22" text-anchor="middle" class="ttl">Serving a 70B model: capacity decides whether decode pays a cross-device tax</text>

  <g data-anim="1">
    <text x="60" y="48" class="lbl">Live decode footprint</text>
    <rect x="60" y="56" width="300" height="26" rx="4" fill="var(--accent2,#3b82f6)" fill-opacity="0.28" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
    <text x="118" y="73" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">weights 70 GB</text>
    <rect x="360" y="56" width="200" height="26" fill="var(--accent,#c15b39)" fill-opacity="0.22" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="460" y="73" text-anchor="middle" class="sub" fill="var(--accent,#c15b39)">KV cache 82 GB</text>
    <rect x="60" y="56" width="500" height="26" rx="4" fill="none" stroke="var(--v-stroke)" stroke-width="1.4"/>
    <text x="576" y="73" class="lbl">= 152 GB total</text>
  </g>

  <g data-anim="2">
    <line x1="30" y1="100" x2="750" y2="100" class="v-grid" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>


    <text x="215" y="126" text-anchor="middle" class="panel-ttl">Two 80 GB devices (H100-class)</text>
    <rect x="35" y="136" width="360" height="304" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1.2"/>


    <text x="130" y="158" text-anchor="middle" class="sub dim">device A</text>
    <rect x="65" y="164" width="130" height="150" rx="5" fill="none" stroke="var(--v-stroke)" stroke-width="1.6"/>
    <rect x="65" y="164" width="130" height="150" rx="5" fill="var(--accent2,#3b82f6)" fill-opacity="0.16"/>
    <rect x="65" y="238" width="130" height="76" fill="var(--accent2,#3b82f6)" fill-opacity="0.34"/>
    <text x="130" y="196" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">weights shard</text>
    <text x="130" y="210" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">~35 GB</text>
    <text x="130" y="270" text-anchor="middle" class="sub" fill="var(--accent,#c15b39)">KV shard</text>
    <text x="130" y="284" text-anchor="middle" class="sub" fill="var(--accent,#c15b39)">~41 GB</text>
    <text x="130" y="330" text-anchor="middle" class="tick">80 GB capacity</text>

    <text x="298" y="158" text-anchor="middle" class="sub dim">device B</text>
    <rect x="233" y="164" width="130" height="150" rx="5" fill="none" stroke="var(--v-stroke)" stroke-width="1.6"/>
    <rect x="233" y="164" width="130" height="150" rx="5" fill="var(--accent2,#3b82f6)" fill-opacity="0.16"/>
    <rect x="233" y="238" width="130" height="76" fill="var(--accent2,#3b82f6)" fill-opacity="0.34"/>
    <text x="298" y="196" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">weights shard</text>
    <text x="298" y="210" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">~35 GB</text>
    <text x="298" y="270" text-anchor="middle" class="sub" fill="var(--accent,#c15b39)">KV shard</text>
    <text x="298" y="284" text-anchor="middle" class="sub" fill="var(--accent,#c15b39)">~41 GB</text>
    <text x="298" y="330" text-anchor="middle" class="tick">80 GB capacity</text>


    <path d="M195 200 C 213 178, 217 178, 233 200" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#cd-arrow)"/>
    <path d="M233 226 C 217 248, 213 248, 195 226" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#cd-arrow)"/>
    <text x="214" y="352" text-anchor="middle" class="badge" fill="var(--warn,#e0a106)">per-layer ALL-REDUCE</text>
    <text x="214" y="366" text-anchor="middle" class="sub" fill="var(--warn,#e0a106)">over the interconnect</text>
    <text x="214" y="384" text-anchor="middle" class="sub dim">decode pays a cross-device</text>
    <text x="214" y="397" text-anchor="middle" class="sub dim">collective every layer</text>

    <rect x="230" y="405" width="205" height="22" rx="11" fill="var(--v-fill)" stroke="var(--border-2)" stroke-width="1"/>
    <text x="332" y="420" text-anchor="middle" class="sub">ceil(152 / 80) = 2 devices</text>
  </g>

  <g data-anim="3">
    <text x="580" y="126" text-anchor="middle" class="panel-ttl">One 192 GB device (MI300X-class)</text>
    <rect x="405" y="136" width="345" height="304" rx="8" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>

    <text x="577" y="158" text-anchor="middle" class="sub dim">single device</text>
    <rect x="480" y="164" width="195" height="150" rx="5" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <rect x="480" y="164" width="195" height="150" rx="5" fill="var(--good,#2f9e6e)" fill-opacity="0.10"/>

    <rect x="480" y="164" width="195" height="70" fill="var(--accent2,#3b82f6)" fill-opacity="0.34"/>
    <text x="577" y="192" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">weights 70 GB</text>

    <rect x="480" y="234" width="195" height="82" fill="var(--accent,#c15b39)" fill-opacity="0.26"/>
    <text x="577" y="262" text-anchor="middle" class="sub" fill="var(--accent,#c15b39)">KV cache 82 GB</text>

    <line x1="480" y1="316" x2="675" y2="316" class="v-grid" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="577" y="330" text-anchor="middle" class="sub dim">headroom (unused)</text>
    <text x="577" y="350" text-anchor="middle" class="tick">192 GB capacity</text>

    <rect x="465" y="365" width="225" height="26" rx="13" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
    <text x="577" y="382" text-anchor="middle" class="badge" fill="var(--good,#2f9e6e)">NO tensor-parallel collective</text>

    <text x="577" y="400" text-anchor="middle" class="sub dim">weights stream from one HBM stack;</text>
    <text x="577" y="413" text-anchor="middle" class="sub dim">zero inter-device communication</text>

    <rect x="470" y="405" width="215" height="22" rx="11" fill="var(--v-fill)" stroke="var(--border-2)" stroke-width="1"/>
    <text x="577" y="420" text-anchor="middle" class="sub">ceil(152 / 192) = 1 device</text>
  </g>

  <g data-anim="4">
    <rect x="30" y="456" width="720" height="34" rx="6" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.2"/>
    <text x="390" y="478" text-anchor="middle" class="take">Decode is bandwidth-bound -&gt; capacity that removes the all-reduce can beat higher aggregate FLOPS.</text>
  </g>

  <defs>
    <marker id="cd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
    </marker>
  </defs>
</svg>
<figcaption><b>Capacity changes the decode picture, not just the fit.</b> The same 152 GB live footprint (70 GB weights + 82 GB KV cache) needs two 80 GB devices tensor-parallel sharded together, paying a per-layer all-reduce in the decode path — but fits whole on one 192 GB device with headroom to spare and zero inter-device communication. Because decode is bandwidth-bound, removing the collective can matter more than either device's raw peak FLOPS.</figcaption>
</figure>
