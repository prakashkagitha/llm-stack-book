<figure class="viz" id="fig-nf4-quantile-bins-vs-uniform">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 760 560" role="img" aria-label="A standard-normal bell curve of block-normalized weight values from -1 to +1, with two rows of 16 quantization levels below it. The INT4 uniform row spaces its 16 levels evenly, so many levels fall in the near-empty tails while only about four cover the tall dense center. The NF4 quantile row places its 16 levels at the quantiles of the normal distribution, shading 15 roughly equal-area slices under a mini copy of the curve, with levels crowding tightly near zero (marked as an exact zero level) and spreading out in the tails.">

    #fig-nf4-quantile-bins-vs-uniform .lead  { font:600 10.5px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }

    #fig-nf4-quantile-bins-vs-uniform .zero  { font:700 10px var(--sans,sans-serif); fill:var(--accent,#6c8cff); }

    <text x="390" y="336" text-anchor="middle" class="note">many levels sit in the near-empty tails (wasted precision),</text>
    <text x="390" y="349" text-anchor="middle" class="note">while only about 4 cover the tall, dense center (too coarse)</text>
  </g>

    <text x="380" y="384" class="rowsub">16 levels at the quantiles of N(0,1)</text>

    <text x="390" y="525" text-anchor="middle" class="note">each of the 15 shaded slices holds roughly equal probability mass --</text>
    <text x="390" y="538" text-anchor="middle" class="note">levels crowd tightly near zero, then spread out in the tails</text>

<figcaption><b>NF4 places its 16 levels at the quantiles of a standard normal, so every slice under the curve carries about the same probability mass.</b> INT4's evenly-spaced levels waste resolution in the near-empty tails while being too coarse across the dense center; since normalized weights really are approximately Gaussian, NF4's quantile placement — with an exact level at zero — reproduces them with less error at the same 4-bit budget.</figcaption>
</figure>
