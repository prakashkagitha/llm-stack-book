<figure class="viz" id="fig-all-to-all-moe-dispatch">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 470" role="img" aria-label="MoE token dispatch as an all-to-all: before, each of 4 GPUs holds tokens bound for many different experts; the all-to-all shuffle is a grid transpose where GPU i's chunk for GPU j lands on GPU j; after, each GPU holds only the tokens for its own resident expert.">
<defs>
  <marker id="atm-arrow-e1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

  <marker id="atm-arrow-e2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

  </marker>
</defs>
<style>
  #fig-all-to-all-moe-dispatch text{ fill:var(--ink-soft); }

  #fig-all-to-all-moe-dispatch .callout{ font:600 9.5px var(--sans,sans-serif); }
</style>


<g data-anim="1">

  <text x="710" y="48" text-anchor="middle" class="sub">sorted by destination</text>

  <rect x="20" y="162" width="160" height="56" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>

  <rect x="66" y="264" width="30" height="22" rx="4" fill="var(--warn,#e0a106)"/>
  <rect x="102" y="264" width="30" height="22" rx="4" fill="var(--good,#2f9e6e)"/>

</g>


<g data-anim="2" opacity="0.85">

  <line x1="180" y1="110" x2="630" y2="190" stroke="var(--good,#2f9e6e)"   stroke-width="1.1" opacity="0.22"/>
  <line x1="180" y1="110" x2="630" y2="270" stroke="var(--warn,#e0a106)"   stroke-width="1.1" opacity="0.22"/>
  <line x1="180" y1="110" x2="630" y2="350" stroke="var(--accent,#c15b39)" stroke-width="1.1" opacity="0.22"/>


  <line x1="180" y1="190" x2="630" y2="110" stroke="var(--accent2,#3b82f6)" stroke-width="1.1" opacity="0.22"/>
  <line x1="180" y1="190" x2="630" y2="350" stroke="var(--accent,#c15b39)"  stroke-width="1.1" opacity="0.22"/>


  <line x1="180" y1="270" x2="630" y2="110" stroke="var(--accent2,#3b82f6)" stroke-width="1.1" opacity="0.22"/>
  <line x1="180" y1="270" x2="630" y2="350" stroke="var(--accent,#c15b39)"  stroke-width="1.1" opacity="0.22"/>


  <line x1="180" y1="350" x2="630" y2="110" stroke="var(--accent2,#3b82f6)" stroke-width="1.1" opacity="0.22"/>
  <line x1="180" y1="350" x2="630" y2="190" stroke="var(--good,#2f9e6e)"    stroke-width="1.1" opacity="0.22"/>
  <line x1="180" y1="350" x2="630" y2="270" stroke="var(--warn,#e0a106)"    stroke-width="1.1" opacity="0.22"/>
</g>


<g data-anim="3">
  <line x1="180" y1="190" x2="618" y2="266" stroke="var(--warn,#e0a106)" stroke-width="2.4" marker-end="url(#atm-arrow-e2)"/>
  <rect x="252" y="192" width="112" height="15" rx="4" class="v-fill" opacity="0.92"/>
  <text x="308" y="203" text-anchor="middle" class="callout" fill="var(--warn,#e0a106)">GPU1's chunk-for-2</text>

  <line x1="180" y1="270" x2="618" y2="194" stroke="var(--good,#2f9e6e)" stroke-width="2.4" marker-end="url(#atm-arrow-e1)"/>
  <rect x="252" y="253" width="112" height="15" rx="4" class="v-fill" opacity="0.92"/>
  <text x="308" y="264" text-anchor="middle" class="callout" fill="var(--good,#2f9e6e)">GPU2's chunk-for-1</text>
</g>


<g data-anim="4">

  <rect x="630" y="82" width="160" height="56" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.16" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="640" y="96" class="gpu" fill="var(--accent2,#3b82f6)">GPU0 - Expert0</text>
  <rect x="640" y="104" width="30" height="22" rx="4" fill="var(--accent2,#3b82f6)"/>
  <rect x="676" y="104" width="30" height="22" rx="4" fill="var(--accent2,#3b82f6)"/>
  <rect x="712" y="104" width="30" height="22" rx="4" fill="var(--accent2,#3b82f6)"/>
  <rect x="748" y="104" width="30" height="22" rx="4" fill="var(--accent2,#3b82f6)"/>


  <rect x="630" y="162" width="160" height="56" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="640" y="176" class="gpu" fill="var(--good,#2f9e6e)">GPU1 - Expert1</text>
  <rect x="640" y="184" width="30" height="22" rx="4" fill="var(--good,#2f9e6e)"/>
  <rect x="676" y="184" width="30" height="22" rx="4" fill="var(--good,#2f9e6e)"/>
  <rect x="712" y="184" width="30" height="22" rx="4" fill="var(--good,#2f9e6e)"/>
  <rect x="748" y="184" width="30" height="22" rx="4" fill="var(--good,#2f9e6e)"/>

  <text x="640" y="256" class="gpu" fill="var(--warn,#e0a106)">GPU2 - Expert2</text>

  <rect x="676" y="264" width="30" height="22" rx="4" fill="var(--warn,#e0a106)"/>
  <rect x="712" y="264" width="30" height="22" rx="4" fill="var(--warn,#e0a106)"/>
  <rect x="748" y="264" width="30" height="22" rx="4" fill="var(--warn,#e0a106)"/>

  <text x="640" y="336" class="gpu" fill="var(--accent,#c15b39)">GPU3 - Expert3</text>
  <rect x="640" y="344" width="30" height="22" rx="4" fill="var(--accent,#c15b39)"/>
  <rect x="676" y="344" width="30" height="22" rx="4" fill="var(--accent,#c15b39)"/>
  <rect x="712" y="344" width="30" height="22" rx="4" fill="var(--accent,#c15b39)"/>
  <rect x="748" y="344" width="30" height="22" rx="4" fill="var(--accent,#c15b39)"/>
</g>


<g data-anim="4">
  <text x="100" y="398" text-anchor="middle" class="foot">each GPU holds tokens</text>
  <text x="100" y="411" text-anchor="middle" class="foot">bound for many experts</text>

  <text x="710" y="398" text-anchor="middle" class="foot">each GPU now holds only</text>
  <text x="710" y="411" text-anchor="middle" class="foot">its own expert's tokens</text>

  <text x="410" y="405" text-anchor="middle" class="mid-cap">all-to-all = transpose: rank i's chunk-for-j lands on rank j</text>
</g>


<g data-anim="5">
  <rect x="20" y="428" width="770" height="30" rx="7" fill="var(--warn,#e0a106)" fill-opacity="0.07" stroke="var(--warn,#e0a106)" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="410" y="447" text-anchor="middle" class="bottom">cost ~ O(total token volume), limited by network bisection bandwidth - unlike all-reduce it gets no ring speedup</text>
</g>

</svg>
<figcaption><b>All-to-all is a grid transpose: what looked scattered on every GPU becomes sorted by expert on every GPU.</b> Before dispatch, each GPU's tokens are colored by destination expert and mixed together (left); the all-to-all sends GPU i's chunk of color j to GPU j, so afterward every GPU holds a single-color block ready for its resident expert's local compute (right). Because this shuffle moves the full token volume through the network with no ring-style amortization, its cost is bounded by bisection bandwidth rather than by GPU count.</figcaption>
</figure>
