<figure class="viz" id="fig-gptq-error-compensation">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 490" role="img" aria-label="A single weight row shown as ten columns swept left to right. Columns left of the sweep are quantized and locked onto grid levels. The current column snaps to its nearest grid level, opening a rounding error d, which is compensated by nudging the not-yet-quantized columns to the right proportional to the inverse Hessian, so the layer output stays close to the original even though every weight moved.">

<g data-anim="4">
  <rect x="361" y="160" width="10" height="40" fill="var(--accent,#c15b39)" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <line x1="384" y1="160" x2="390" y2="160" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
  <line x1="384" y1="178" x2="390" y2="178" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>

    <path d="M366 124 Q470 112 496 138"/>

    <line x1="638" y1="168" x2="638" y2="174" stroke-width="1.1" marker-end="url(#gec-arrow)"/>

<figcaption><b>GPTQ quantizes one weight column at a time and compensates the not-yet-quantized columns for the error it just made.</b> When column <i>i</i> snaps to its nearest grid level, the rounding error d = w_i - q_i is fanned out to every remaining column, scaled by H^-1, so their bars shift slightly before their turn comes; round-to-nearest (RTN) instead rounds every weight independently and the output error simply accumulates, while GPTQ's running compensation keeps the layer output y = sum_i w_i x_i close to the original throughout the sweep.</figcaption>
</figure>
