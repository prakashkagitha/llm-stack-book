<figure class="viz" id="fig-warc-vs-wet-extraction">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 590" role="img" aria-label="A rendered web page is decomposed into nav bar, cookie banner, sidebar, article body, related-stories rail, and footer, with the article body tinted as signal and the rest hatched as boilerplate. Two branches show what each extractor keeps: CC WET's built-in extractor keeps nav, cookie, article, related, and footer lines (high boilerplate); trafilatura on the raw WARC HTML keeps only the article lines (low boilerplate), in an output block of the same size.">
<defs>
  <pattern id="fig-warc-vs-wet-extraction-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="var(--surface-3,#ece7da)"/>
    <line x1="0" y1="0" x2="0" y2="6" stroke="var(--muted,#6d675d)" stroke-width="1.4"/>
  </pattern>
</defs>
<style>
  #fig-warc-vs-wet-extraction text          { fill: var(--ink-soft,#45413a); }
  #fig-warc-vs-wet-extraction .ttl          { font: 700 15px var(--sans,sans-serif); }
  #fig-warc-vs-wet-extraction .sub          { font: 500 11.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-warc-vs-wet-extraction .lbl          { font: 700 12px var(--sans,sans-serif); }
  #fig-warc-vs-wet-extraction .region       { font: 600 9.5px var(--sans,sans-serif); }
  #fig-warc-vs-wet-extraction .region-lt    { font: 600 9.5px var(--sans,sans-serif); fill: var(--surface,#fff); }
  #fig-warc-vs-wet-extraction .legend-txt   { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-warc-vs-wet-extraction .badge-txt    { font: 700 10.5px var(--sans,sans-serif); }
  #fig-warc-vs-wet-extraction .caption-txt  { font: 600 12px var(--sans,sans-serif); }
  #fig-warc-vs-wet-extraction .arrow        { stroke: var(--muted,#6d675d); stroke-width: 1.4; fill: none; }
  #fig-warc-vs-wet-extraction .arrowhead    { fill: var(--muted,#6d675d); }
</style>

<text x="390" y="24" text-anchor="middle" class="ttl">Why re-extract from WARC instead of using WET</text>
<text x="390" y="42" text-anchor="middle" class="sub">One rendered page, two extractors, two very different outputs</text>

<g data-anim="1">

  <rect x="240" y="62" width="300" height="208" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>

  <rect x="240" y="62" width="300" height="18" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <circle cx="252" cy="71" r="2.6" fill="var(--muted,#6d675d)" opacity="0.6"/>
  <circle cx="262" cy="71" r="2.6" fill="var(--muted,#6d675d)" opacity="0.6"/>
  <circle cx="272" cy="71" r="2.6" fill="var(--muted,#6d675d)" opacity="0.6"/>
  <text x="540" y="74" text-anchor="end" class="region" fill="var(--muted,#6d675d)">rendered page</text>


  <rect x="241" y="80" width="298" height="16" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <text x="390" y="91" text-anchor="middle" class="region">nav bar</text>


  <rect x="241" y="96" width="298" height="14" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <text x="390" y="106" text-anchor="middle" class="region">cookie consent banner</text>


  <rect x="241" y="110" width="50" height="140" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <text x="266" y="182" text-anchor="middle" class="region" transform="rotate(-90 266 182)">sidebar</text>


  <rect x="291" y="110" width="169" height="140" fill="var(--accent,#c15b39)" fill-opacity="0.85"/>
  <text x="375" y="176" text-anchor="middle" class="region-lt">article</text>
  <text x="375" y="190" text-anchor="middle" class="region-lt">body</text>


  <rect x="460" y="110" width="79" height="140" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <text x="499" y="176" text-anchor="middle" class="region">related</text>
  <text x="499" y="188" text-anchor="middle" class="region">stories</text>


  <rect x="241" y="250" width="298" height="18" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <text x="390" y="263" text-anchor="middle" class="region">footer</text>


  <rect x="20" y="278" width="14" height="10" fill="var(--accent,#c15b39)" fill-opacity="0.85"/>
  <text x="38" y="287" class="legend-txt">signal = main content</text>
  <rect x="190" y="278" width="14" height="10" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <text x="208" y="287" class="legend-txt">hatched = boilerplate</text>
</g>

<g data-anim="2">

  <path class="arrow" d="M 300,270 C 260,300 200,310 172,338"/>
  <polygon class="arrowhead" points="172,338 182,332 180,343"/>
  <path class="arrow" d="M 480,270 C 520,300 580,310 608,338"/>
  <polygon class="arrowhead" points="608,338 596,332 601,343"/>


  <text x="170" y="358" text-anchor="middle" class="lbl">CC WET (built-in extractor)</text>
  <text x="610" y="358" text-anchor="middle" class="lbl">trafilatura on raw WARC HTML</text>


  <rect x="70" y="372" width="200" height="130" rx="5" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <rect x="82" y="382" width="176" height="11" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <rect x="82" y="398" width="176" height="11" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <rect x="82" y="414" width="176" height="11" fill="var(--accent,#c15b39)" fill-opacity="0.85"/>
  <rect x="82" y="430" width="176" height="11" fill="var(--accent,#c15b39)" fill-opacity="0.85"/>
  <rect x="82" y="446" width="176" height="11" fill="var(--accent,#c15b39)" fill-opacity="0.85"/>
  <rect x="82" y="462" width="176" height="11" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>
  <rect x="82" y="478" width="176" height="11" fill="url(#fig-warc-vs-wet-extraction-hatch)"/>


  <rect x="510" y="372" width="200" height="130" rx="5" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <rect x="522" y="414" width="176" height="11" fill="var(--accent,#c15b39)" fill-opacity="0.85"/>
  <rect x="522" y="430" width="176" height="11" fill="var(--accent,#c15b39)" fill-opacity="0.85"/>
  <rect x="522" y="446" width="176" height="11" fill="var(--accent,#c15b39)" fill-opacity="0.85"/>


  <rect x="105" y="512" width="130" height="24" rx="12" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  <text x="170" y="528" text-anchor="middle" class="badge-txt" fill="var(--warn,#e0a106)">High boilerplate</text>

  <rect x="507" y="512" width="206" height="24" rx="12" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <text x="610" y="528" text-anchor="middle" class="badge-txt" fill="var(--good,#2f9e6e)">Low boilerplate - what you train on</text>
</g>

<g data-anim="3">
  <rect x="20" y="556" width="740" height="26" rx="6" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="390" y="573" text-anchor="middle" class="caption-txt">RefinedWeb, FineWeb and Dolma re-extract from WARC and never train on WET.</text>
</g>

</svg>
<figcaption><b>WET's built-in extractor keeps everything on the page; trafilatura on the raw WARC HTML keeps only the article.</b> Both output blocks above are drawn at the same frame size — the difference is purely which lines get filled with signal (article body) versus boilerplate (nav, cookie banner, sidebar, related rail, footer). This is why the highest-quality pipelines re-extract from WARC instead of trusting the convenient WET text.</figcaption>
</figure>
