<text x="400" y="488" text-anchor="middle" class="idx-lbl">All nodes (leaves c1..c8 AND summaries s1..s5) indexed in one vector DB</text>

<figcaption><b>RAPTOR builds a recursive summarization tree so retrieval can operate at any granularity.</b> Leaf chunks (c1–c8) are clustered and summarized into level-1 nodes (s1–s3), which are in turn summarized into level-2 nodes (s4, s5). Crucially, every node — leaf and summary alike — is indexed in the same vector database, so a specific-detail query matches leaf chunks while a high-level synthesis query matches the upper summary nodes.</figcaption>
</figure>
