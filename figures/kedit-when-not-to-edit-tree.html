<figure class="viz" id="fig-kedit-when-not-to-edit-tree">
<svg viewBox="0 0 900 640" role="img" aria-label="Decision tree: five ordered conditions branch from a root question to the right knowledge-modification tool.">
<defs>
  <marker id="wne-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6366f1)"/>
  </marker>
  <marker id="wne-mut" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#cbd5e1)"/>
  </marker>
</defs>
<style>
  #fig-kedit-when-not-to-edit-tree .title  { font: 700 12.5px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree .root   { font: 700 11px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree .cnd    { font: 500 10px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree .cndb   { font: 700 10px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree .out    { font: 500 10px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree .outtl  { font: 700 10.5px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree .tag    { font: 400 9px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree .ylbl   { font: 600 9px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree .nlbl   { font: 400 9px var(--sans,sans-serif); }
  #fig-kedit-when-not-to-edit-tree text    { fill: var(--ink-soft,#334155); }
  #fig-kedit-when-not-to-edit-tree .mu     { fill: var(--muted,#64748b); }
  #fig-kedit-when-not-to-edit-tree .ac     { fill: var(--accent,#6366f1); }
</style>


<text x="450" y="20" text-anchor="middle" class="title">When (not) to edit: choose the right knowledge-modification tool</text>




<rect x="56" y="32" width="332" height="44" rx="7"
      fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<text x="222" y="49" text-anchor="middle" class="root">Need to change what the model</text>
<text x="222" y="65" text-anchor="middle" class="root">"knows"?</text>


<line x1="120" y1="76" x2="120" y2="600" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3" stroke-dasharray="4 3"/>




<line x1="120" y1="112" x2="130" y2="112" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="130" y="90" width="255" height="44" rx="6"
      fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<text x="257" y="107" text-anchor="middle" class="cnd">Fact changes often / must be</text>
<text x="257" y="122" text-anchor="middle" class="cndb">auditable / per-user?</text>

<text x="128" y="152" class="nlbl mu">no</text>

<line x1="385" y1="112" x2="436" y2="112" stroke="var(--accent,#6366f1)" stroke-width="1.4" marker-end="url(#wne-acc)"/>
<text x="410" y="107" text-anchor="middle" class="ylbl ac">yes</text>

<rect x="440" y="90" width="448" height="44" rx="6"
      fill="var(--accent,#6366f1)" fill-opacity="0.07" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<rect x="440" y="90" width="4" height="44" rx="2" fill="var(--accent,#6366f1)"/>
<text x="452" y="107" class="out">Use <tspan class="outtl ac">RETRIEVAL (RAG)</tspan>: edit a</text>
<text x="452" y="122" class="out">database, not weights.</text>
<text x="884" y="107" text-anchor="end" class="tag mu">(ch 9.3)</text>




<line x1="120" y1="192" x2="130" y2="192" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="130" y="165" width="255" height="54" rx="6"
      fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<text x="257" y="183" text-anchor="middle" class="cndb">Must legally PROVE removal</text>
<text x="257" y="199" text-anchor="middle" class="cnd">(GDPR erasure, copyright)?</text>

<text x="128" y="237" class="nlbl mu">no</text>

<line x1="385" y1="192" x2="436" y2="192" stroke="var(--accent,#6366f1)" stroke-width="1.4" marker-end="url(#wne-acc)"/>
<text x="410" y="187" text-anchor="middle" class="ylbl ac">yes</text>

<rect x="440" y="165" width="448" height="64" rx="6"
      fill="var(--accent,#6366f1)" fill-opacity="0.07" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<rect x="440" y="165" width="4" height="64" rx="2" fill="var(--accent,#6366f1)"/>
<text x="452" y="183" class="out">Approx. unlearning is risky. Prefer</text>
<text x="452" y="197" class="out"><tspan class="outtl ac">SISA</tspan> sharding or <tspan class="outtl ac">DP training</tspan></text>
<text x="452" y="211" class="out">for provable semantics; audit with MIA+relearning.</text>
<text x="884" y="183" text-anchor="end" class="tag mu">(ch 13.3)</text>




<line x1="120" y1="272" x2="130" y2="272" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="130" y="250" width="255" height="44" rx="6"
      fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<text x="257" y="267" text-anchor="middle" class="cndb">A handful of static corrections</text>
<text x="257" y="282" text-anchor="middle" class="cnd">in a model you own?</text>

<text x="128" y="312" class="nlbl mu">no</text>

<line x1="385" y1="272" x2="436" y2="272" stroke="var(--accent,#6366f1)" stroke-width="1.4" marker-end="url(#wne-acc)"/>
<text x="410" y="267" text-anchor="middle" class="ylbl ac">yes</text>

<rect x="440" y="250" width="448" height="44" rx="6"
      fill="var(--accent,#6366f1)" fill-opacity="0.07" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<rect x="440" y="250" width="4" height="44" rx="2" fill="var(--accent,#6366f1)"/>
<text x="452" y="267" class="out"><tspan class="outtl ac">ROME</tspan> (1 fact) / <tspan class="outtl ac">MEMIT</tspan> (batch) /</text>
<text x="452" y="282" class="out"><tspan class="outtl ac">AlphaEdit</tspan> (sequential).</text>




<line x1="120" y1="352" x2="130" y2="352" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="130" y="330" width="255" height="44" rx="6"
      fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<text x="257" y="347" text-anchor="middle" class="cnd">Endless stream of edits; base</text>
<text x="257" y="362" text-anchor="middle" class="cndb">weights must stay frozen?</text>

<text x="128" y="392" class="nlbl mu">no</text>

<line x1="385" y1="352" x2="436" y2="352" stroke="var(--accent,#6366f1)" stroke-width="1.4" marker-end="url(#wne-acc)"/>
<text x="410" y="347" text-anchor="middle" class="ylbl ac">yes</text>

<rect x="440" y="330" width="448" height="44" rx="6"
      fill="var(--accent,#6366f1)" fill-opacity="0.07" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<rect x="440" y="330" width="4" height="44" rx="2" fill="var(--accent,#6366f1)"/>
<text x="452" y="347" class="out"><tspan class="outtl ac">GRACE</tspan> / <tspan class="outtl ac">WISE</tspan> memory adapters.</text>
<text x="452" y="362" class="out">(edits are data; base weights frozen)</text>




<line x1="120" y1="437" x2="130" y2="437" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="130" y="410" width="255" height="54" rx="6"
      fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<text x="257" y="428" text-anchor="middle" class="cnd">Remove a dangerous</text>
<text x="257" y="444" text-anchor="middle" class="cndb">CAPABILITY, not a single fact?</text>

<line x1="385" y1="437" x2="436" y2="437" stroke="var(--accent,#6366f1)" stroke-width="1.4" marker-end="url(#wne-acc)"/>
<text x="410" y="432" text-anchor="middle" class="ylbl ac">yes</text>

<rect x="440" y="410" width="448" height="54" rx="6"
      fill="var(--accent,#6366f1)" fill-opacity="0.07" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<rect x="440" y="410" width="4" height="54" rx="2" fill="var(--accent,#6366f1)"/>
<text x="452" y="428" class="out">Representation-level unlearning</text>
<text x="452" y="443" class="out">(<tspan class="outtl ac">RMU</tspan>); evaluate on <tspan class="outtl ac">WMDP</tspan>.</text>


<line x1="120" y1="464" x2="120" y2="595" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3" stroke-dasharray="4 3"/>
<circle cx="120" cy="598" r="4" fill="var(--border-2,#cbd5e1)"/>

</svg>
<figcaption><b>A decision tree for choosing between retrieval, weight editing, memory adapters, and unlearning.</b> Five ordered conditions route from the root question to the most appropriate tool. Parametric editing (ROME/MEMIT/AlphaEdit) is right only for a narrow case — a handful of static corrections in a model you own. Most other scenarios are better served by retrieval (changing data, not weights), SISA/DP training (provable removal), memory adapters (frozen-weight lifelong editing), or representation-level unlearning for dangerous capabilities.</figcaption>
</figure>
