<figcaption><b>Three granularities of knowledge distillation.</b> Token-level (Hinton KD) forces the student to match the teacher's full softmax distribution at every position — richest signal but expensive. Sequence-level (SeqKD) uses the teacher's greedy output as hard labels, requiring only a single teacher inference pass. Feature-level (FitNet) matches intermediate hidden states via a linear projector, needing extra parameters and yielding noisier gradients. Cost ordering: Sequence (low) &lt; Feature (medium) &lt; Token (high).</figcaption>
</figure>
