<figure class="viz" id="fig-gtloop-staleness-dial">
<svg viewBox="0 0 860 310" role="img" aria-label="The staleness dial: a horizontal gradient bar from on-policy (s=0) on the left to fully off-policy (s approaching infinity) on the right, with three annotated stops and a shaded band marking where real LLM-RL operates.">
  <defs>
    <linearGradient id="sd-bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="var(--accent,#4f46e5)"/>
      <stop offset="100%" stop-color="var(--warn,#d97706)"/>
    </linearGradient>
    <style>
      #fig-gtloop-staleness-dial .title  { font: 500 11px var(--sans,sans-serif); letter-spacing:.06em; text-transform:uppercase; }
      #fig-gtloop-staleness-dial .tick-lbl{ font: 700 13px var(--mono,monospace); }
      #fig-gtloop-staleness-dial .card-h { font: 700 12px var(--sans,sans-serif); }
      #fig-gtloop-staleness-dial .card-b { font: 400 10px var(--sans,sans-serif); }
      #fig-gtloop-staleness-dial .axis-lbl{ font: 400 10px var(--sans,sans-serif); }
      #fig-gtloop-staleness-dial .band-lbl{ font: 400 10.5px var(--sans,sans-serif); font-style:italic; }
      #fig-gtloop-staleness-dial text { fill: var(--ink-soft,#45413a); }
    </style>
  </defs>

  
  <text x="430" y="20" text-anchor="middle" class="title v-muted" fill="var(--muted,#6d675d)">STALENESS s = optimizer steps the sampler weights lag the trainer</text>

  
  <text x="70" y="50" text-anchor="start" class="axis-lbl v-muted" fill="var(--muted,#6d675d)">&lt;-- more on-policy (cleaner gradient)</text>
  <text x="790" y="50" text-anchor="end" class="axis-lbl v-muted" fill="var(--muted,#6d675d)">more off-policy (biased, clip works harder) --&gt;</text>

  
  <rect x="70" y="105" width="720" height="26" rx="13" fill="url(#sd-bar-grad)" opacity="0.9"/>

  
  <rect x="120" y="105" width="360" height="26" rx="8" fill="var(--accent,#4f46e5)" fill-opacity="0.12"/>

  
  
  <rect x="118" y="99" width="4" height="10" rx="1" fill="var(--surface,#fff)" fill-opacity="0.85"/>
  
  <circle cx="120" cy="118" r="9" class="v-fill v-stroke" fill="var(--surface,#faf8f3)" stroke="var(--ink-soft,#45413a)" stroke-width="1.8"/>
  
  <text x="120" y="92" text-anchor="middle" class="tick-lbl" fill="var(--ink-soft,#45413a)">s = 0</text>
  
  <rect x="22" y="148" width="196" height="76" rx="7" class="v-fill" fill="var(--surface,#faf8f3)" stroke="var(--ink-soft,#45413a)" stroke-width="1.2"/>
  <text x="120" y="167" text-anchor="middle" class="card-h" fill="var(--accent,#4f46e5)">strictly on-policy</text>
  <text x="120" y="183" text-anchor="middle" class="card-b v-muted" fill="var(--muted,#6d675d)">generate, take exactly</text>
  <text x="120" y="196" text-anchor="middle" class="card-b v-muted" fill="var(--muted,#6d675d)">ONE grad step, regenerate</text>
  <text x="120" y="214" text-anchor="middle" class="card-b" fill="var(--muted,#6d675d)" font-style="italic">throughput disaster</text>
  
  <line x1="120" y1="132" x2="120" y2="148" stroke="var(--ink-soft,#45413a)" stroke-width="1" stroke-dasharray="3 2"/>

  
  <rect x="428" y="99" width="4" height="10" rx="1" fill="var(--surface,#fff)" fill-opacity="0.85"/>
  <circle cx="430" cy="118" r="9" class="v-fill v-stroke" fill="var(--surface,#faf8f3)" stroke="var(--ink-soft,#45413a)" stroke-width="1.8"/>
  <text x="430" y="92" text-anchor="middle" class="tick-lbl" fill="var(--ink-soft,#45413a)">s = k</text>
  <rect x="320" y="148" width="220" height="76" rx="7" class="v-fill" fill="var(--surface,#faf8f3)" stroke="var(--ink-soft,#45413a)" stroke-width="1.2"/>
  <text x="430" y="167" text-anchor="middle" class="card-h" fill="var(--ink-soft,#45413a)">k-step stale</text>
  <text x="430" y="183" text-anchor="middle" class="card-b v-muted" fill="var(--muted,#6d675d)">sampler weights lag trainer</text>
  <text x="430" y="196" text-anchor="middle" class="card-b v-muted" fill="var(--muted,#6d675d)">by k updates</text>
  <text x="430" y="214" text-anchor="middle" class="card-b" fill="var(--good,#2f9e6e)" font-weight="600">practical operating zone</text>
  <line x1="430" y1="132" x2="430" y2="148" stroke="var(--ink-soft,#45413a)" stroke-width="1" stroke-dasharray="3 2"/>

  
  <rect x="738" y="99" width="4" height="10" rx="1" fill="var(--surface,#fff)" fill-opacity="0.85"/>
  <circle cx="740" cy="118" r="9" class="v-fill v-stroke" fill="var(--surface,#faf8f3)" stroke="var(--ink-soft,#45413a)" stroke-width="1.8"/>
  <text x="740" y="92" text-anchor="middle" class="tick-lbl" fill="var(--ink-soft,#45413a)">s -&gt; inf</text>
  <rect x="650" y="148" width="190" height="76" rx="7" class="v-fill" fill="var(--surface,#faf8f3)" stroke="var(--warn,#d97706)" stroke-width="1.5"/>
  <text x="745" y="167" text-anchor="middle" class="card-h" fill="var(--warn,#d97706)">fully off-policy</text>
  <text x="745" y="183" text-anchor="middle" class="card-b v-muted" fill="var(--muted,#6d675d)">train on a fixed dataset</text>
  <text x="745" y="196" text-anchor="middle" class="card-b v-muted" fill="var(--muted,#6d675d)">of old rollouts (~= offline)</text>
  <text x="745" y="214" text-anchor="middle" class="card-b" fill="var(--warn,#d97706)" font-style="italic">rarely used in LLM RL</text>
  <line x1="740" y1="132" x2="740" y2="148" stroke="var(--warn,#d97706)" stroke-width="1" stroke-dasharray="3 2"/>

  
  <text x="120" y="275" text-anchor="start" class="band-lbl v-muted" fill="var(--muted,#6d675d)">where real LLM-RL lives -- small, BOUNDED staleness, absorbed by the PPO/GRPO clip</text>
  
  <line x1="120" y1="260" x2="480" y2="260" stroke="var(--accent,#4f46e5)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="120" y1="255" x2="120" y2="265" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>
  <line x1="480" y1="255" x2="480" y2="265" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>
  <line x1="300" y1="260" x2="300" y2="270" stroke="var(--accent,#4f46e5)" stroke-width="1" opacity="0.5"/>
</svg>
<figcaption><b>On-policy vs off-policy is a continuous staleness dial, not a binary choice.</b> Staleness <em>s</em> counts how many optimizer steps old the sampler weights were when they produced the training data. Real LLM-RL systems stay in the shaded band — small, bounded staleness that the PPO/GRPO importance-ratio clip is specifically designed to absorb, giving throughput gains without sacrificing gradient validity.</figcaption>
</figure>
