<figcaption><b>The same tiny four-layer model, cut four different ways across two GPUs.</b> Tensor parallelism (TP) and expert parallelism (EP) each shard a piece <i>inside</i> every layer (a weight matrix, a set of experts) and pay for it with a synchronous collective (all-reduce, all-to-all); pipeline parallelism (PP) cuts the model into contiguous stages joined by one-way activation traffic; data parallelism (DP) makes no cut at all — it just duplicates the whole model and needs no cross-GPU communication in the forward pass. TP, PP, and EP each shrink per-GPU memory; only DP multiplies throughput by adding independent replicas.</figcaption>
</figure>
