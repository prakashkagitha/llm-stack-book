<figure class="viz" id="fig-anatomy-roofline-intensity-numberline">
<svg viewBox="0 0 900 290" role="img" aria-label="Arithmetic intensity number line on a log scale. Decode (N=1, I approx 1 FLOP/byte) sits far left in the memory-bound region. Prefill (N=512, I approx 1000 FLOP/byte) sits right of the ridge point (~150 FLOP/byte on an A100) in the compute-bound region.">

<style>
  #fig-anatomy-roofline-intensity-numberline text { fill: var(--ink-soft,#374151); font-family: var(--sans,sans-serif); }
  #fig-anatomy-roofline-intensity-numberline .title  { font: 600 12px var(--sans,sans-serif); }
  #fig-anatomy-roofline-intensity-numberline .axlbl  { font: 500 10px var(--sans,sans-serif); }
  #fig-anatomy-roofline-intensity-numberline .tickl  { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#9ca3af); }
  #fig-anatomy-roofline-intensity-numberline .chiph  { font: 700 10.5px var(--sans,sans-serif); }
  #fig-anatomy-roofline-intensity-numberline .chipsb { font: 400 9px var(--mono,monospace); fill: var(--muted,#9ca3af); }
  #fig-anatomy-roofline-intensity-numberline .reglbl { font: 700 10.5px var(--sans,sans-serif); }
  #fig-anatomy-roofline-intensity-numberline .cap    { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-anatomy-roofline-intensity-numberline .fnt    { font: 400 8.5px var(--mono,monospace); fill: var(--muted,#9ca3af); }
</style>

<defs>
  <marker id="rl-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#6b7280)"/>
  </marker>
  <marker id="rl-arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#0891b2)"/>
  </marker>
  <marker id="rl-arr-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
  </marker>
</defs>




<text x="18" y="20" class="title">Arithmetic intensity  (FLOP / byte) — log scale</text>


<rect x="70" y="116" width="537" height="44" fill="var(--accent-2,#0891b2)" fill-opacity="0.07"/>
<rect x="607" y="116" width="213" height="44" fill="var(--accent,#4f46e5)" fill-opacity="0.07"/>


<line x1="70" y1="145" x2="820" y2="145"
      stroke="var(--ink-soft,#6b7280)" stroke-width="2"
      marker-end="url(#rl-arr)"/>
<text x="834" y="149" class="axlbl" text-anchor="start">FLOP/B</text>


<line x1="100" y1="139" x2="100" y2="151" stroke="var(--ink-soft,#6b7280)" stroke-width="1.5"/>
<text x="100" y="163" text-anchor="middle" class="tickl">~1</text>


<line x1="333" y1="141" x2="333" y2="149" stroke="var(--border-2,#d1d5db)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="333" y="163" text-anchor="middle" class="tickl">10</text>


<line x1="566" y1="141" x2="566" y2="149" stroke="var(--border-2,#d1d5db)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="566" y="163" text-anchor="middle" class="tickl">100</text>


<line x1="607" y1="139" x2="607" y2="151" stroke="var(--warn,#e0a106)" stroke-width="2.5"/>
<text x="607" y="163" text-anchor="middle" class="tickl" fill="var(--warn,#e0a106)">150</text>


<line x1="799" y1="141" x2="799" y2="149" stroke="var(--border-2,#d1d5db)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="799" y="163" text-anchor="middle" class="tickl">1000</text>


<line x1="607" y1="48" x2="607" y2="218"
      stroke="var(--warn,#e0a106)" stroke-width="1.8" stroke-dasharray="6 4"/>
<text x="612" y="44" class="tickl" fill="var(--warn,#e0a106)" text-anchor="start">ridge point</text>
<text x="612" y="55" class="tickl" fill="var(--warn,#e0a106)" text-anchor="start">(~150 on A100)</text>


<circle cx="100" cy="145" r="6" fill="var(--accent-2,#0891b2)"/>
<line x1="100" y1="139" x2="100" y2="95" stroke="var(--accent-2,#0891b2)" stroke-width="1.4" stroke-dasharray="3 3"/>
<rect x="22" y="58" width="157" height="33" rx="6"
      fill="var(--surface,#f9fafb)" stroke="var(--accent-2,#0891b2)" stroke-width="1.8"/>
<text x="100" y="76" text-anchor="middle" class="chiph" fill="var(--accent-2,#0891b2)">decode  (N=1)</text>
<text x="100" y="88" text-anchor="middle" class="chipsb">I ~= 1 FLOP/byte</text>


<circle cx="799" cy="145" r="6" fill="var(--accent,#4f46e5)"/>
<line x1="799" y1="139" x2="799" y2="95" stroke="var(--accent,#4f46e5)" stroke-width="1.4" stroke-dasharray="3 3"/>
<rect x="718" y="58" width="163" height="33" rx="6"
      fill="var(--surface,#f9fafb)" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
<text x="800" y="76" text-anchor="middle" class="chiph" fill="var(--accent,#4f46e5)">prefill  (N=512)</text>
<text x="800" y="88" text-anchor="middle" class="chipsb">I ~= 1000 FLOP/byte</text>


<line x1="72" y1="186" x2="601" y2="186" stroke="var(--accent-2,#0891b2)" stroke-width="1.5" marker-start="url(#rl-arr-teal)"/>
<text x="336" y="199" text-anchor="middle" class="reglbl" fill="var(--accent-2,#0891b2)">MEMORY-BOUND</text>

<line x1="613" y1="186" x2="832" y2="186" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#rl-arr-indigo)"/>
<text x="722" y="199" text-anchor="middle" class="reglbl" fill="var(--accent,#4f46e5)">COMPUTE-BOUND</text>


<text x="336" y="212" text-anchor="middle" class="cap">weights stream from HBM;</text>
<text x="336" y="223" text-anchor="middle" class="cap">tensor cores idle</text>

<text x="722" y="212" text-anchor="middle" class="cap">tensor cores saturated;</text>
<text x="722" y="223" text-anchor="middle" class="cap">HBM amortized over many tokens</text>


<text x="450" y="248" text-anchor="middle" class="fnt">A100: ~312 TFLOP/s / ~2.0 TB/s  =>  ridge ~= 150 FLOP/byte</text>
<text x="450" y="262" text-anchor="middle"
      style="font:400 8.5px var(--sans,sans-serif);fill:var(--muted,#9ca3af)">same model weights — only N (tokens per pass) shifts intensity across the ridge</text>

</svg>
<figcaption><b>Arithmetic intensity number line (log scale): decode at N=1 sits far left in the memory-bound region while prefill at N=512 sits past the ridge point in the compute-bound region.</b> The same model and weights produce two radically different operating regimes purely because decode processes one token per forward pass while prefill processes the whole prompt at once. Memory bandwidth is the binding constraint for decode; tensor-core compute is the binding constraint for prefill.</figcaption>
</figure>
