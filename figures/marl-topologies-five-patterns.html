<figcaption><b>Five canonical multi-agent wiring patterns compared side by side.</b> The star (orchestrator-workers) centralises dispatch; the chain (pipeline) enforces a deterministic sequence; peer-to-peer debate converges two positions through a judge; the blackboard decouples agents via concurrent read/write shared state; and the tree (hierarchical) enables recursive delegation through sub-orchestrators. Real production systems typically compose two or more of these patterns.</figcaption>
