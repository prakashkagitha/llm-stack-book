<figure class="viz" id="fig-verification-the-dividing-line">
<svg viewBox="0 0 820 490" role="img" aria-label="Side-by-side contrast. Weak harness: edit_file leads straight to the assistant saying Done!, leading to an output box tagged plausible, maybe subtly wrong, with a question mark, and no loop. Strong harness: an identical edit_file leads to a VERIFIER that runs tests, build, and lint; on PASS it reaches a DONE box tagged ground-truth correct; on FAIL the failure is captured as an observation, Verification FAILED colon traceback, and an arrow loops back to edit_file. A caption states that plausibility is not correctness and the verifier is an oracle the model cannot talk its way around.">
<defs>
  <marker id="vdl-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <marker id="vdl-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-verification-the-dividing-line .ttl    { font: 700 13.5px var(--sans,sans-serif); }
  #fig-verification-the-dividing-line .colttl { font: 700 15px var(--sans,sans-serif); }
  #fig-verification-the-dividing-line .sub    { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-verification-the-dividing-line .mono   { font: 400 10.5px var(--mono,monospace); }
  #fig-verification-the-dividing-line .lbl-xs { font: 400 8.7px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-verification-the-dividing-line .branch { font: 700 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-verification-the-dividing-line .cap    { font: 600 12px var(--sans,sans-serif); }
  #fig-verification-the-dividing-line text    { fill: var(--ink-soft,#45413a); }
</style>


<text x="205" y="30" text-anchor="middle" class="colttl">Weak harness</text>
<text x="615" y="30" text-anchor="middle" class="colttl" fill="var(--good,#2f9e6e)">Strong harness</text>

<line x1="410" y1="46" x2="410" y2="404" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>


<rect x="95" y="56" width="220" height="48" rx="10" class="v-fill v-stroke" stroke-width="1.6"/>
<text x="205" y="85" text-anchor="middle" class="mono">edit_file(...)</text>

<line x1="205" y1="104" x2="205" y2="128" class="v-stroke" stroke-width="1.6" marker-end="url(#vdl-arr)"/>

<rect x="95" y="130" width="220" height="48" rx="10" class="v-fill v-stroke" stroke-width="1.6"/>
<text x="205" y="153" text-anchor="middle" class="ttl">&#8220;Done!&#8221;</text>
<text x="205" y="169" text-anchor="middle" class="sub">assistant just claims completion</text>

<line x1="205" y1="178" x2="205" y2="202" class="v-stroke" stroke-width="1.6" marker-end="url(#vdl-arr)"/>

<rect x="85" y="204" width="240" height="70" rx="10" class="v-fill" stroke="var(--ink-soft,#45413a)" stroke-width="1.6" stroke-dasharray="5 4" opacity="0.9"/>
<circle cx="308" cy="212" r="11" class="v-fill" stroke="var(--muted,#6d675d)" stroke-width="1.4"/>
<text x="308" y="216" text-anchor="middle" class="ttl" fill="var(--muted,#6d675d)">?</text>
<text x="205" y="234" text-anchor="middle" class="ttl">plausible...</text>
<text x="205" y="252" text-anchor="middle" class="sub" font-style="italic">maybe subtly wrong</text>
<text x="205" y="266" text-anchor="middle" class="lbl-xs">(nothing checked the work)</text>

<text x="205" y="296" text-anchor="middle" class="lbl-xs">no loop. no oracle. the chain just ends.</text>


<rect x="505" y="56" width="220" height="48" rx="10" class="v-fill v-stroke" stroke-width="1.6"/>
<text x="615" y="85" text-anchor="middle" class="mono">edit_file(...)</text>

<line x1="615" y1="104" x2="615" y2="128" class="v-stroke" stroke-width="1.6" marker-end="url(#vdl-arr)"/>

<rect x="505" y="130" width="220" height="48" rx="10" class="v-fill v-stroke" stroke-width="1.6"/>
<text x="615" y="153" text-anchor="middle" class="ttl">VERIFIER</text>
<text x="615" y="169" text-anchor="middle" class="sub">run tests / build / lint  (e.g. pytest -q)</text>

<line x1="615" y1="178" x2="615" y2="200" class="v-stroke" stroke-width="1.6" marker-end="url(#vdl-arr)"/>


<polygon points="615,200 715,236 615,272 515,236" class="v-fill v-stroke" stroke-width="1.6"/>
<text x="615" y="232" text-anchor="middle" class="ttl" font-size="11">verifier</text>
<text x="615" y="246" text-anchor="middle" class="ttl" font-size="11">exit code?</text>


<line x1="615" y1="272" x2="615" y2="294" stroke="var(--accent,#c15b39)" stroke-width="2.2" marker-end="url(#vdl-arr-acc)"/>
<text x="628" y="288" class="branch">PASS</text>

<rect x="505" y="296" width="220" height="58" rx="10" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="2.2"/>
<text x="615" y="320" text-anchor="middle" class="ttl" fill="var(--good,#2f9e6e)">DONE</text>
<text x="615" y="337" text-anchor="middle" class="sub">check: ground-truth correct</text>

<text x="615" y="374" text-anchor="middle" class="lbl-xs">narrow/fast verifier while iterating,</text>
<text x="615" y="386" text-anchor="middle" class="lbl-xs">broad verifier before final.</text>


<path d="M715,236 L778,236 L778,80 L725,80"
      fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.2" marker-end="url(#vdl-arr-acc)"/>
<text x="732" y="228" class="branch">FAIL</text>
<text x="796" y="158" text-anchor="middle" class="lbl-xs" fill="var(--accent,#c15b39)"
      transform="rotate(-90,796,158)" font-family="var(--mono,monospace)">Verification FAILED: &lt;traceback&gt; -&gt; retry</text>


<line x1="40" y1="418" x2="780" y2="418" class="v-grid" stroke-width="1"/>
<text x="410" y="444" text-anchor="middle" class="cap">plausibility is not correctness &#8212; the verifier is an oracle the model cannot talk its way around.</text>

</svg>
<figcaption><b>Verification is the one structural difference between a weak harness and a strong one.</b> Both chains start identically at <code>edit_file</code>; the weak harness ends the moment the assistant says "Done!," while the strong harness routes through a verifier and loops a failing exit code back as an observation until a ground-truth check actually passes.</figcaption>
</figure>
