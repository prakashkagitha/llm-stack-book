<svg viewBox="0 0 820 460" role="img" aria-label="Two panels compare optimal learning rate under standard parameterization versus muP, plotting final training loss against peak learning rate on a log scale for four model widths. Left panel, standard parameterization: the loss-minimizing learning rate drifts to smaller values as width grows, so each width needs its own sweep. Right panel, muP: the loss-minimizing learning rate is the same for every width, so a cheap sweep on a small proxy model transfers directly to the largest width.">

  <marker id="mup-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">

    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>

<text x="222" y="394" text-anchor="middle" class="sub-lbl">optimum moves with width -&gt;</text>
<text x="222" y="410" text-anchor="middle" class="sub-lbl">must re-tune at every scale</text>


<text x="597" y="50" text-anchor="middle" class="title-lbl">muP</text>

<path d="M628,228 Q615,238 605,247" fill="none" stroke="var(--ink-soft,#45413a)" stroke-width="1.3" marker-end="url(#mup-arrow)"/>
<text x="633" y="228" text-anchor="start" class="note-lbl">sweep here (cheap)</text>


<line x1="598" y1="243" x2="598" y2="120" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#mup-arrow-accent)"/>
<text x="606" y="136" class="transfer-lbl">transfer -&gt;</text>

<text x="597" y="394" text-anchor="middle" class="sub-lbl">optimum is width-invariant -&gt;</text>
<text x="597" y="410" text-anchor="middle" class="sub-lbl">tune once, transfer to any width</text>

</svg>
<figcaption><b>Under standard parameterization the loss-minimizing peak LR drifts with width; under muP it does not.</b> Left: as width grows from 256 to 2048, each curve's minimum shifts to a smaller LR, so standard parameterization forces a fresh sweep at every scale. Right: muP's reparameterization of init and per-layer LR keeps the minimum at the same LR regardless of width, so a cheap sweep on a small proxy transfers directly to the full-scale model.</figcaption>
</figure>
