<figure class="viz" id="fig-moe-router-dispatch-pipeline">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 720 780" role="img" aria-label="Router dispatch pipeline: a token vector passes through gate W_g to produce E logits, optional noise or bias perturbs them, top-k selects k expert indices, softmax over those k produces gate weights summing to 1, and only the k selected experts run and are summed to produce MoE output.">

</defs>
<style>

<text x="352" y="572" class="elbl">weighted sum</text>


<g data-anim="8">
  <rect x="196" y="582" width="288" height="52" rx="8"
        fill="var(--accent,#6366f1)" fill-opacity="0.18"
        stroke="var(--accent,#6366f1)" stroke-width="2"/>
  <text x="340" y="606" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">scale by g_e,  SUM  --&gt;  MoE(x)</text>
  <text x="340" y="623" text-anchor="middle" class="fml">MoE(x) = sum_e g_e * FFN_e(x)</text>
</g>



</svg>
<figcaption><b>End-to-end router dispatch pipeline for a single token.</b> The token passes through learned gate <b>W_g</b> to produce E logits; an optional noise or bias term (dashed box) aids exploration or load balancing without polluting gate weights; <b>top-k</b> selects the k expert indices (the non-differentiable step); a <b>softmax over only those k</b> produces gate weights that sum to 1 (Mixtral style, stable magnitude); finally only the k selected experts (E1 and E5, highlighted) execute and are scaled by their gate weights before being summed — the remaining experts receive no gradient this step.</figcaption>
</figure>
