<figure class="viz" id="fig-moe-router-dispatch-pipeline">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 760 700" role="img" aria-label="Router dispatch pipeline: a token vector passes through gate W_g to produce E logits, optional noise or bias perturbs them, top-k selects k expert indices which are detached and used only to dispatch, softmax over those k produces gate weights that carry the gradient and sum to 1, and only the k selected experts run and are scaled and summed to produce MoE output.">

    <path d="M0 1.5 L8.5 5 L0 8.5 z" fill="var(--accent)"/>
  </marker>
</defs>
<style>

  <text x="52" y="679" class="annot">neutral / dashed = stop-gradient path (indices only)</text>
  <rect x="420" y="668" width="14" height="14" rx="3" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="1.4"/>
  <text x="442" y="679" class="annot ac" fill="var(--accent)">accent / solid = differentiable path (gradient flows)</text>

</svg>
<figcaption><b>End-to-end router dispatch pipeline for a single token, split by what carries gradient.</b> The token passes through learned gate <b>W_g</b> to produce E logits; an optional noise or bias term aids exploration or load balancing without polluting gate weights; <b>top-k</b> emits <b>indices</b> that are detached and used only to dispatch (stop-gradient); a <b>softmax over just those k</b> emits <b>gate weights</b> that sum to 1 and carry the gradient back into the router. Only the k selected experts (E1 and E5, highlighted) execute, scaled by their gate weights and summed — the unselected experts receive no gradient this step.</figcaption>
</figure>
