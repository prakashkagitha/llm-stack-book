<figcaption><b>The harness surrounds and mediates the stochastic model.</b> Every deterministic responsibility — prompt construction, context assembly, loop control, permissions, verification — lives in the harness (solid outer box). The model (dashed inner box, tinted) contributes only the next-token prediction. All side-effecting I/O passes through the harness permission sandbox, and tool results feed back into the context assembly layer, closing the reason-act-observe loop.</figcaption>
</figure>
