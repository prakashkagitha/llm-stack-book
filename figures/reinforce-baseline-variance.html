<figure class="viz" id="fig-reinforce-baseline-variance">
<svg viewBox="0 0 800 460" role="img" aria-label="Two-panel comparison of REINFORCE without a baseline, where all three responses get pushed up by nearly the same large offset, versus with a baseline, where only the discriminative advantage survives and responses are pushed up or down accordingly.">
<defs>
  <style>
    #fig-reinforce-baseline-variance .hdr { font: 700 14px var(--sans,sans-serif); }
    #fig-reinforce-baseline-variance .colhdr { font: 700 13px var(--sans,sans-serif); }
    #fig-reinforce-baseline-variance .note { font: 400 10.5px var(--sans,sans-serif); }
    #fig-reinforce-baseline-variance .num { font: 700 12px var(--mono,monospace); }
    #fig-reinforce-baseline-variance .offlbl { font: 600 11px var(--sans,sans-serif); }
    #fig-reinforce-baseline-variance .callout { font: italic 11px var(--sans,sans-serif); }
    #fig-reinforce-baseline-variance .strip { font: 600 12px var(--sans,sans-serif); }
    #fig-reinforce-baseline-variance text { fill: var(--ink-soft,#444); }
    #fig-reinforce-baseline-variance .muted-text { fill: var(--muted,#888); }
    #fig-reinforce-baseline-variance .up-text { fill: var(--good,#2f9e6e); }
    #fig-reinforce-baseline-variance .down-text { fill: var(--warn,#e0a106); }
    #fig-reinforce-baseline-variance .accent-text { fill: var(--accent,#c0392b); }
  </style>
  <marker id="rbv-arrGood" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L8,4 L0,8 Z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="rbv-arrWarn" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L8,4 L0,8 Z" fill="var(--warn,#e0a106)"/>
  </marker>
</defs>


<text x="200" y="26" text-anchor="middle" class="hdr">REINFORCE, no baseline</text>
<text x="600" y="26" text-anchor="middle" class="hdr">With a baseline b = mean reward</text>


<line x1="400" y1="18" x2="400" y2="336" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>


<g data-anim="1">
  
  <text x="103" y="52" text-anchor="middle" class="colhdr">A</text>
  <text x="193" y="52" text-anchor="middle" class="colhdr">B</text>
  <text x="283" y="52" text-anchor="middle" class="colhdr">C</text>

  
  <text x="195" y="70" text-anchor="middle" class="note muted-text">differences in bar height = the real signal (~5%)</text>

  
  <line x1="60" y1="290" x2="316" y2="290" stroke="var(--v-grid,#ccc)" stroke-width="1.5"/>
  <text x="322" y="294" class="note muted-text">0</text>

  
  <rect x="80" y="90" width="46" height="200" rx="4" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="103" y="82" text-anchor="middle" class="num up-text">R=10.0</text>
  <path d="M 103 280 L 103 158" stroke="var(--good,#2f9e6e)" stroke-width="3" marker-end="url(#rbv-arrGood)"/>

  
  <rect x="170" y="100" width="46" height="190" rx="4" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="193" y="92" text-anchor="middle" class="num up-text">R=9.5</text>
  <path d="M 193 280 L 193 168" stroke="var(--good,#2f9e6e)" stroke-width="3" marker-end="url(#rbv-arrGood)"/>

  
  <rect x="260" y="110" width="46" height="180" rx="4" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="283" y="102" text-anchor="middle" class="num up-text">R=9.0</text>
  <path d="M 283 280 L 283 178" stroke="var(--good,#2f9e6e)" stroke-width="3" marker-end="url(#rbv-arrGood)"/>

  
  <path d="M 330 290 L 338 290 L 338 100 L 330 100" fill="none" stroke="var(--accent,#c0392b)" stroke-width="1.5"/>
  <text x="344" y="178" class="offlbl accent-text">common-mode</text>
  <text x="344" y="193" class="offlbl accent-text">offset = 9.5</text>
  <text x="344" y="208" class="offlbl accent-text">(meaningless)</text>

  
  <rect x="24" y="318" width="352" height="60" rx="8" fill="var(--surface-3,#f4f4f4)" fill-opacity="0.6" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="200" y="335" text-anchor="middle" class="callout">every response pushed UP -- incoherent, since sum</text>
  <text x="200" y="350" text-anchor="middle" class="callout">of pi_theta = 1; real signal drowns in the offset</text>
  <text x="200" y="365" text-anchor="middle" class="callout">-&gt; huge variance</text>
</g>


<g data-anim="2">
  
  <text x="503" y="52" text-anchor="middle" class="colhdr">A</text>
  <text x="593" y="52" text-anchor="middle" class="colhdr">B</text>
  <text x="683" y="52" text-anchor="middle" class="colhdr">C</text>

  
  <line x1="440" y1="180" x2="760" y2="180" stroke="var(--v-grid,#ccc)" stroke-width="2.25"/>
  <text x="755" y="172" text-anchor="end" class="note muted-text">baseline</text>

  
  <rect x="480" y="140" width="46" height="40" rx="4" fill="var(--good,#2f9e6e)" fill-opacity="0.6" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="503" y="132" text-anchor="middle" class="num up-text">+0.50</text>
  <path d="M 503 180 L 503 150" stroke="var(--good,#2f9e6e)" stroke-width="3" marker-end="url(#rbv-arrGood)"/>

  
  <circle cx="593" cy="180" r="3.5" fill="var(--muted,#888)"/>
  <text x="593" y="170" text-anchor="middle" class="num muted-text">0.00</text>
  <text x="593" y="200" text-anchor="middle" class="note muted-text">exactly average</text>

  
  <rect x="660" y="180" width="46" height="40" rx="4" fill="var(--warn,#e0a106)" fill-opacity="0.6" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
  <text x="683" y="238" text-anchor="middle" class="num down-text">-0.50</text>
  <path d="M 683 180 L 683 210" stroke="var(--warn,#e0a106)" stroke-width="3" marker-end="url(#rbv-arrWarn)"/>

  
  <rect x="404" y="318" width="372" height="60" rx="8" fill="var(--surface-3,#f4f4f4)" fill-opacity="0.6" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="590" y="335" text-anchor="middle" class="callout">offset collapses to zero; only the spread survives</text>
  <text x="590" y="350" text-anchor="middle" class="callout">-&gt; A up, C down, B exactly average (no push);</text>
  <text x="590" y="365" text-anchor="middle" class="callout">variance drops by roughly (mean/spread)^2</text>
</g>


<line x1="20" y1="398" x2="780" y2="398" stroke="var(--border-2,#ccc)" stroke-width="1" opacity="0.5"/>
<text x="400" y="418" text-anchor="middle" class="strip">A baseline that does not depend on the action changes variance, not the mean (unbiased).</text>
<text x="400" y="438" text-anchor="middle" class="strip">The variance-minimizing baseline is the value function V(s_t) -&gt; the advantage A = Q - V.</text>

</svg>
<figcaption><b>Subtracting a baseline is a free lunch: it kills variance without touching the mean.</b> Without a baseline (left), the toy bandit's three responses (rewards 10.0, 9.5, 9.0) all get pushed up by nearly the same amount &amp;mdash; the useful ~5% spread is buried under a 9.5 common-mode offset (the mean). Subtract that mean (right) and the offset vanishes, leaving only the discriminative advantage: A (above average) goes up, C (below average) goes down, and B &amp;mdash; exactly at the mean &amp;mdash; gets no push at all. The advantages now sum to zero, and the per-sample gradient variance drops by roughly (mean/spread)^2 &amp;mdash; a few hundredfold for these numbers.</figcaption>
</figure>
