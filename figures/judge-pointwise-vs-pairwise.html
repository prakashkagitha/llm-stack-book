<figure class="viz" id="fig-judge-pointwise-vs-pairwise">
<svg viewBox="0 0 800 400" role="img" aria-label="Side-by-side comparison of pointwise and pairwise LLM judging: pointwise scores one response on an absolute 1-to-5 rubric, pairwise picks a winner between two responses; a shared strip below compares their cost, calibration with humans, and susceptibility to position bias.">
<defs>
  <marker id="jpw-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" class="v-label"/>
  </marker>
  <marker id="jpw-arrow-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent)"/>
  </marker>
  <style>
    #fig-judge-pointwise-vs-pairwise text { font: 400 12px var(--sans,sans-serif); }
    #fig-judge-pointwise-vs-pairwise .panel-title { font: 700 15px var(--sans,sans-serif); }
    #fig-judge-pointwise-vs-pairwise .box-lbl { font: 700 13px var(--sans,sans-serif); }
    #fig-judge-pointwise-vs-pairwise .sm { font: 400 10px var(--sans,sans-serif); }
    #fig-judge-pointwise-vs-pairwise .tick-num { font: 600 10px var(--mono,monospace); }
    #fig-judge-pointwise-vs-pairwise .badge-txt { font: 700 12px var(--mono,monospace); fill: var(--accent); }
    #fig-judge-pointwise-vs-pairwise .caption-line { font: italic 12px var(--sans,sans-serif); }
    #fig-judge-pointwise-vs-pairwise .row-lbl { font: 700 11.5px var(--sans,sans-serif); }
    #fig-judge-pointwise-vs-pairwise .row-val { font: 600 12px var(--sans,sans-serif); }
  </style>
</defs>

<text x="205" y="28" text-anchor="middle" class="panel-title v-label">Pointwise (absolute)</text>
<text x="597" y="28" text-anchor="middle" class="panel-title v-label">Pairwise (comparative)</text>

<line x1="400" y1="44" x2="400" y2="378" class="v-grid" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

<g data-anim="1">

  <rect x="35" y="90" width="70" height="42" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
  <line x1="45" y1="100" x2="95" y2="100" class="v-muted-s" stroke="var(--muted)" stroke-width="1.4"/>
  <line x1="45" y1="106" x2="95" y2="106" stroke="var(--muted)" stroke-width="1.4"/>
  <line x1="45" y1="112" x2="80" y2="112" stroke="var(--muted)" stroke-width="1.4"/>
  <text x="70" y="126" text-anchor="middle" class="sm v-label">Response</text>

  <line x1="105" y1="111" x2="138" y2="111" class="v-stroke" stroke-width="1.5" marker-end="url(#jpw-arrow)"/>


  <rect x="140" y="76" width="76" height="70" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="178" y="116" text-anchor="middle" class="box-lbl v-label">Judge</text>

  <line x1="216" y1="111" x2="250" y2="111" class="v-stroke" stroke-width="1.5" marker-end="url(#jpw-arrow)"/>
</g>

<g data-anim="2">

  <line x1="268" y1="62" x2="268" y2="162" class="v-grid" stroke-width="1.4"/>
  <line x1="261" y1="66" x2="275" y2="66" class="v-grid" stroke-width="1.2"/>
  <text x="252" y="70" text-anchor="end" class="tick-num v-muted">5</text>
  <line x1="261" y1="89" x2="275" y2="89" class="v-grid" stroke-width="1.2"/>
  <text x="252" y="93" text-anchor="end" class="tick-num v-muted">4</text>
  <line x1="261" y1="112" x2="275" y2="112" class="v-grid" stroke-width="1.2"/>
  <text x="252" y="116" text-anchor="end" class="tick-num v-muted">3</text>
  <line x1="261" y1="135" x2="275" y2="135" class="v-grid" stroke-width="1.2"/>
  <text x="252" y="139" text-anchor="end" class="tick-num v-muted">2</text>
  <line x1="261" y1="158" x2="275" y2="158" class="v-grid" stroke-width="1.2"/>
  <text x="252" y="162" text-anchor="end" class="tick-num v-muted">1</text>


  <circle cx="268" cy="89" r="6.5" fill="var(--accent)" stroke="var(--surface)" stroke-width="1.5"/>

  <line x1="276" y1="89" x2="295" y2="89" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#jpw-arrow-a)"/>


  <rect x="296" y="77" width="76" height="24" rx="12" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="334" y="93" text-anchor="middle" class="badge-txt">score = 4</text>
</g>

<text x="205" y="182" text-anchor="middle" class="caption-line v-label">one response -&gt; a number</text>


<g data-anim="1">

  <rect x="430" y="70" width="82" height="38" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="471" y="93" text-anchor="middle" class="sm v-label">Response A</text>

  <rect x="430" y="132" width="82" height="38" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="471" y="155" text-anchor="middle" class="sm v-label">Response B</text>

  <line x1="512" y1="89" x2="575" y2="103" class="v-stroke" stroke-width="1.5" marker-end="url(#jpw-arrow)"/>
  <line x1="512" y1="151" x2="575" y2="137" class="v-stroke" stroke-width="1.5" marker-end="url(#jpw-arrow)"/>


  <rect x="577" y="91" width="80" height="80" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="617" y="135" text-anchor="middle" class="box-lbl v-label">Judge</text>

  <line x1="657" y1="131" x2="689" y2="131" class="v-stroke" stroke-width="1.5" marker-end="url(#jpw-arrow)"/>
</g>

<g data-anim="2">

  <rect x="691" y="108" width="92" height="46" rx="10" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="737" y="129" text-anchor="middle" class="badge-txt" style="font-size:13px;">A wins</text>
  <text x="737" y="145" text-anchor="middle" class="sm v-muted">(or tie)</text>
</g>

<text x="597" y="182" text-anchor="middle" class="caption-line v-label">two responses -&gt; a winner</text>


<line x1="20" y1="200" x2="780" y2="200" class="v-grid" stroke-width="1" opacity="0.3"/>


<g data-anim="3">


  <circle cx="188" cy="240" r="5" fill="var(--good,#2f9e6e)"/>
  <text x="198" y="244" class="row-val v-label">O(N)</text>
  <rect x="370" y="230" width="60" height="20" rx="4" class="v-fill"/>
  <text x="400" y="244" text-anchor="middle" class="row-lbl v-label">Cost</text>
  <circle cx="577" cy="240" r="5" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2"/>
  <text x="587" y="244" class="row-val v-label">O(N^2)</text>


  <circle cx="150" cy="292" r="5" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2"/>
  <text x="160" y="296" class="row-val v-label">moderate</text>
  <rect x="312" y="282" width="176" height="20" rx="4" class="v-fill"/>
  <text x="400" y="296" text-anchor="middle" class="row-lbl v-label">Calibration vs humans</text>
  <circle cx="577" cy="292" r="5" fill="var(--good,#2f9e6e)"/>
  <text x="587" y="296" class="row-val v-label">high</text>


  <circle cx="168" cy="344" r="5" fill="var(--good,#2f9e6e)"/>
  <text x="178" y="348" class="row-val v-label">low</text>
  <rect x="335" y="334" width="130" height="20" rx="4" class="v-fill"/>
  <text x="400" y="348" text-anchor="middle" class="row-lbl v-label">Position bias</text>
  <circle cx="575" cy="344" r="5" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2"/>
  <text x="585" y="348" class="row-val v-label">high</text>
</g>

</svg>
<figcaption><b>Pointwise scoring rates one response against an absolute rubric; pairwise scoring picks a winner between two.</b> Pointwise is cheap to scale (O(N) queries) but its absolute scale is harder to calibrate against human judgment; pairwise comparisons are easier for a judge to get right and correlate better with human preference, but cost O(N&amp;sup2;) queries and are far more exposed to position bias.</figcaption>
</figure>
