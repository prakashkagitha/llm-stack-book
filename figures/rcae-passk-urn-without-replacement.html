      <g transform="translate(102,34)"><circle r="10" class="chip-fail"/><text y="4" text-anchor="middle" font="700 11px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(136,34)"><circle r="10" class="chip-fail"/><text y="4" text-anchor="middle" font="700 11px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(170,34)"><circle r="10" class="chip-fail"/><text y="4" text-anchor="middle" font="700 11px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>

      <g transform="translate(0,68)"><circle r="10" class="chip-fail"/><text y="4" text-anchor="middle" font="700 11px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>

    </g>

    <text x="129" y="290" text-anchor="middle" class="tiny dim">at k = 1, Pass@k = c/n = 6/20 = 0.30</text>

    
    <path d="M20 310 Q129 296 238 310 L238 356 Q129 370 20 356 Z" fill="var(--accent)" fill-opacity="0.09" stroke="var(--accent)" stroke-width="1.6" stroke-dasharray="4 3"/>
    <text x="129" y="332" text-anchor="middle" class="lbl" fill="var(--accent)">draw k = 10 samples</text>
    <text x="129" y="348" text-anchor="middle" class="tiny dim">(scoop out of the pool)</text>

    <path d="M115 300 L165 260" class="v-stroke" stroke-width="1.4" marker-end="url(#pk-arrow)" opacity="0.75"/>
  </g>

  <defs>
    <marker id="pk-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>

  
  <g data-anim="2">
    <text x="510" y="55" text-anchor="middle" class="lbl">one draw of k = 10, two outcomes</text>

    
    <rect x="270" y="70" width="480" height="90" rx="9" class="v-fill" stroke="var(--muted)" stroke-width="1.3"/>
    <text x="286" y="90" class="tag" fill="var(--muted)">BAD DRAW</text>
    <g transform="translate(286,102)">
      <g transform="translate(0,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(24,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(48,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(72,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(96,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(120,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(144,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(168,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(192,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(216,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
    </g>
    <text x="518" y="132" class="sub" fill="var(--muted)">all 10 scooped chips come from the 14-failer subset</text>
    <text x="518" y="148" class="sub" fill="var(--muted)">zero passers drawn -&gt; this problem scored as FAIL</text>

    
    <rect x="270" y="176" width="480" height="90" rx="9" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
    <text x="286" y="196" class="tag" fill="var(--good,#2f9e6e)">TYPICAL DRAW</text>
    <g transform="translate(286,208)">
      <g transform="translate(0,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(24,0)"><circle r="8" class="chip-pass"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">v</text></g>
      <g transform="translate(48,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(72,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(96,0)"><circle r="8" class="chip-pass"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">v</text></g>
      <g transform="translate(120,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(144,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(168,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(192,0)"><circle r="8" class="chip-fail"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">x</text></g>
      <g transform="translate(216,0)"><circle r="8" class="chip-pass"/><text y="3.5" text-anchor="middle" font="700 9px var(--mono,monospace)" fill="var(--surface,#fff)">v</text></g>

  </g>

  
  <g data-anim="3">
    <rect x="270" y="286" width="480" height="112" rx="9" class="v-fill" stroke="var(--border-2)" stroke-width="1.3"/>
    <text x="510" y="310" text-anchor="middle" class="frm">Pass@k = 1 - C(n-c, k) / C(n, k)</text>

    <line x1="410" y1="322" x2="495" y2="322" class="v-stroke" stroke-width="1.2" opacity="0.6"/>
    <text x="452" y="340" text-anchor="middle" class="tiny dim">ways to draw all k from the</text>
    <text x="452" y="352" text-anchor="middle" class="tiny dim">FAILING pile (the bad draws)</text>

    <line x1="560" y1="322" x2="628" y2="322" class="v-stroke" stroke-width="1.2" opacity="0.6"/>
    <text x="594" y="340" text-anchor="middle" class="tiny dim">all possible</text>
    <text x="594" y="352" text-anchor="middle" class="tiny dim">draws of k</text>

    <text x="510" y="378" text-anchor="middle" class="tiny dim">n = 20, c = 6, k = 10 -&gt; Pass@10 = 1 - C(14,10)/C(20,10) is approx 0.995</text>
  </g>

  
  <g data-anim="4">
    <rect x="14" y="392" width="752" height="152" rx="10" class="v-fill" stroke="var(--border-2)" stroke-width="1.3"/>
    <text x="30" y="414" class="lbl">Two things this picture explains</text>

    <text x="30" y="438" class="sub" fill="var(--accent)">1.</text>
    <text x="46" y="438" class="sub">Naive 1 - (1 - c/n)^k pretends draws are WITH replacement, overcounting bad-draw</text>
    <text x="46" y="453" class="sub">escapes -&gt; it overestimates for small n (compare 0.972 naive vs 0.995 exact above).</text>

    <text x="30" y="480" class="sub" fill="var(--accent)">2.</text>
    <text x="46" y="480" class="sub">If c = 0 the failing pile IS the whole pool: C(n, k)/C(n, k) = 1 for every draw,</text>
    <text x="46" y="495" class="sub">so Pass@k = 0 no matter how large k gets -- more samples never rescue a 0/n problem.</text>

    <text x="30" y="524" class="tiny dim">Reading order: pool of n=20 (left) -&gt; a draw of k=10 (top right) -&gt; the estimator (mid right) -&gt; what it implies (bottom).</text>
  </g>

</svg>
<figcaption><b>Pass@k asks: does a random draw of k samples from the n generated avoid the failing pile entirely?</b> The pool holds n=20 samples for one problem (c=6 pass, n-c=14 fail); a "bad draw" of k=10 that lands wholly in the 14 failers scores the problem as FAIL, so Pass@k = 1 minus the chance of that bad draw, computed exactly via C(n-c,k)/C(n,k) rather than the biased with-replacement approximation.</figcaption>
</figure>
