<svg viewBox="0 0 900 520" role="img" aria-label="HYBRID_SHARD device mesh: 2 nodes by 4 GPUs. Horizontal intra-node axis is thick fast NVLink links carrying the SHARD dimension, with each node's FlatParameter split into 4 slices, one per GPU. Vertical inter-node axis is thin dashed slow InfiniBand links carrying the REPLICATE dimension, with Node 1 mirroring Node 0's sharding. Callouts explain that all-gathers stay on the fast intra-node axis while only gradient all-reduce crosses the slow inter-node link, contrasted with FULL_SHARD which would gather across both axes.">

  <text x="662" y="83" class="lbl" fill="var(--accent,#6366f1)">SHARD axis (NVLink)</text>
  <text x="662" y="100" class="sm">all-gather reconstructs a unit's</text>

  <g stroke="currentColor" class="v-muted" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.8">

  <rect x="15" y="326" width="70" height="26" rx="13" fill="var(--accent,#6366f1)" fill-opacity="0.16" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
  <text x="50" y="343" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">Node 1</text>

  <g stroke="var(--accent,#6366f1)" stroke-width="5" stroke-linecap="round" opacity="0.85">
    <line x1="200" y1="340" x2="245" y2="340"/>
    <line x1="345" y1="340" x2="390" y2="340"/>
    <line x1="490" y1="340" x2="535" y2="340"/>

  <g id="hs-node1-tiles">
    <g transform="translate(100,300)">

      <text x="50" y="18" text-anchor="middle" class="gpu">GPU0</text>

      <text x="50" y="46" text-anchor="middle" class="mono" font-size="9" fill="var(--accent,#6366f1)">slice 0</text>

  <text x="450" y="398" text-anchor="middle" class="sm" font-style="italic">Node 1 mirrors Node 0's 4-way sharding -- a full replica of the sharded unit.</text>

  <text x="450" y="436" text-anchor="middle" class="lbl" fill="var(--muted)">Contrast: FULL_SHARD (ZeRO-3 everywhere)</text>
  <text x="450" y="453" text-anchor="middle" class="sm">would all-gather across BOTH axes -&gt; the param gather crosses the slow</text>
  <text x="450" y="468" text-anchor="middle" class="sm">InfiniBand link -&gt; exposed, not hidden by compute</text>

  <text x="450" y="504" text-anchor="middle" class="sm">Requires the model to fit in one node's aggregate memory.</text>
</svg>
<figcaption><b>HYBRID_SHARD lays sharding on the fast axis and replication on the slow axis.</b> Within a node, a unit's FlatParameter is split into 4 shards connected by thick intra-node NVLink -- the expensive all-gather that reconstructs full parameters happens here, cheaply, and is hidden behind compute. Across nodes, the slower InfiniBand link only carries a once-per-step gradient all-reduce; the bandwidth-heavy parameter all-gather never crosses it. Contrast with FULL_SHARD, which would all-gather on both axes and expose the slow inter-node transfer -- HYBRID_SHARD only pays off when the model fits in one node's aggregate memory.</figcaption>
</figure>
