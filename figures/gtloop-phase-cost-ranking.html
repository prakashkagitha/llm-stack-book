<figure class="viz" id="fig-gtloop-phase-cost-ranking">
<svg viewBox="0 0 820 386" role="img" aria-label="Horizontal stacked bar chart showing generation takes approximately 70% of one RL outer step, followed by experience-prep at 15%, backward-update at 10%, reward at 3%, and weight-sync at 2%, with a ranked legend and footnote explaining why generation dominates despite fewer FLOPs.">
  <defs>

      #fig-gtloop-phase-cost-ranking .row-name    { font: 700 12px var(--sans,sans-serif); }

      #fig-gtloop-phase-cost-ranking .key-head    { font: 600 11px var(--sans,sans-serif); }

      #fig-gtloop-phase-cost-ranking text         { fill: var(--ink-soft,#45413a); }
    </style>
  </defs>

  
  <text x="410" y="20" text-anchor="middle" class="chart-title" fill="var(--ink-soft,#45413a)">Share of one RL outer step (typical single shared GPU pool)</text>

  <text x="732" y="24" text-anchor="middle" class="seg-pct" fill="var(--muted,#6d675d)" font-size="9">rew ~3%</text>
  <line x1="753" y1="42" x2="768" y2="27" stroke="var(--muted,#6d675d)" stroke-width="1"/>
  <text x="778" y="24" text-anchor="start" class="seg-pct" fill="var(--muted,#6d675d)" font-size="9">sync ~2%</text>

  
  

  
  <path d="M83,42 L566,42 L566,88 L83,88 Q60,88 60,65 Q60,42 83,42 Z" fill="var(--accent,#4f46e5)"/>
  
  <rect x="566" y="42" width="108" height="46" fill="var(--accent,#4f46e5)" fill-opacity="0.35"/>
  
  <rect x="674" y="42" width="72" height="46" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  
  <rect x="746" y="42" width="22" height="46" fill="var(--muted,#6d675d)" fill-opacity="0.25"/>
  
  <path d="M768,42 L779,42 Q783,42 783,46 L783,84 Q783,88 779,88 L768,88 Z" fill="var(--muted,#6d675d)" fill-opacity="0.15"/>

  
  <text x="313" y="60" text-anchor="middle" class="seg-lbl" fill="var(--surface,#fafafa)">generation</text>
  <text x="313" y="75" text-anchor="middle" class="seg-pct" fill="var(--surface,#fafafa)">~70%</text>

  <text x="620" y="62" text-anchor="middle" class="seg-lbl" fill="var(--ink-soft,#45413a)" font-size="10">exp-prep</text>
  <text x="620" y="76" text-anchor="middle" class="seg-pct" fill="var(--ink-soft,#45413a)" font-size="9">~15%</text>

  <text x="710" y="62" text-anchor="middle" class="seg-lbl" fill="var(--ink-soft,#45413a)" font-size="10">bwd</text>
  <text x="710" y="76" text-anchor="middle" class="seg-pct" fill="var(--ink-soft,#45413a)" font-size="9">~10%</text>

  
  <line x1="60" y1="90" x2="783" y2="90" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <line x1="60"  y1="90" x2="60"  y2="96" stroke="var(--muted,#6d675d)" stroke-width="1"/>
  <text x="60"  y="105" text-anchor="middle" class="seg-pct" fill="var(--muted,#6d675d)" font-size="8">0%</text>
  <line x1="204" y1="90" x2="204" y2="96" stroke="var(--muted,#6d675d)" stroke-width="1"/>
  <text x="204" y="105" text-anchor="middle" class="seg-pct" fill="var(--muted,#6d675d)" font-size="8">20%</text>
  <line x1="421" y1="90" x2="421" y2="96" stroke="var(--muted,#6d675d)" stroke-width="1"/>
  <text x="421" y="105" text-anchor="middle" class="seg-pct" fill="var(--muted,#6d675d)" font-size="8">50%</text>
  <line x1="783" y1="90" x2="783" y2="96" stroke="var(--muted,#6d675d)" stroke-width="1"/>
  <text x="783" y="105" text-anchor="middle" class="seg-pct" fill="var(--muted,#6d675d)" font-size="8">100%</text>

  
  

  
  <rect x="60" y="112" width="14" height="14" rx="2" fill="var(--accent,#4f46e5)"/>
  <text x="82" y="123" class="row-name" fill="var(--accent,#4f46e5)">generation</text>
  <text x="256" y="123" class="row-pct" fill="var(--accent,#4f46e5)">60-80%</text>
  <text x="324" y="123" class="row-why v-muted" fill="var(--muted,#6d675d)">autoregressive decode, memory-BW-bound, terrible MFU</text>

  
  <rect x="60" y="132" width="14" height="14" rx="2" fill="var(--accent,#4f46e5)" fill-opacity="0.35"/>
  <text x="82" y="143" class="row-name" fill="var(--ink-soft,#45413a)">experience-prep fwds</text>
  <text x="256" y="143" class="row-pct" fill="var(--ink-soft,#45413a)">10-20%</text>
  <text x="324" y="143" class="row-why v-muted" fill="var(--muted,#6d675d)">recompute old + ref logprobs over all B*Lg tokens</text>

  
  <rect x="60" y="152" width="14" height="14" rx="2" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="82" y="163" class="row-name" fill="var(--ink-soft,#45413a)">backward / update</text>
  <text x="256" y="163" class="row-pct" fill="var(--ink-soft,#45413a)">5-15%</text>
  <text x="324" y="163" class="row-why v-muted" fill="var(--muted,#6d675d)">fwd+bwd passes; ONLY grad-bearing phase</text>

  
  <rect x="60" y="172" width="14" height="14" rx="2" fill="var(--muted,#6d675d)" fill-opacity="0.25"/>
  <text x="82" y="183" class="row-name v-muted" fill="var(--muted,#6d675d)">reward</text>
  <text x="256" y="183" class="row-pct v-muted" fill="var(--muted,#6d675d)">few %</text>
  <text x="324" y="183" class="row-why v-muted" fill="var(--muted,#6d675d)">verifier / RM / sandbox, unless rate-limited</text>

  
  <rect x="60" y="192" width="14" height="14" rx="2" fill="var(--muted,#6d675d)" fill-opacity="0.15" stroke="var(--muted,#6d675d)" stroke-width="0.8"/>
  <text x="82" y="203" class="row-name v-muted" fill="var(--muted,#6d675d)">weight-sync</text>
  <text x="256" y="203" class="row-pct v-muted" fill="var(--muted,#6d675d)">few %</text>
  <text x="324" y="203" class="row-why v-muted" fill="var(--muted,#6d675d)">copy new theta to engine; bigger if cross-node</text>

  
  <line x1="60" y1="215" x2="760" y2="215" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>

  
  <rect x="60" y="222" width="698" height="120" rx="8" fill="var(--accent,#4f46e5)" fill-opacity="0.07" stroke="var(--accent,#4f46e5)" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="80" y="240" class="key-head" fill="var(--ink-soft,#45413a)">Why generation dominates despite FEWER FLOPs than the backward:</text>
  <text x="80" y="257" class="key-body v-muted" fill="var(--muted,#6d675d)">Training (Phase 4):  6N FLOPs/token, compute-bound, ~40-55% MFU on FSDP/Megatron</text>
  <text x="80" y="271" class="key-body v-muted" fill="var(--muted,#6d675d)">Decode (Phase 1):    2N FLOPs/token, memory-BW-bound, &lt;5% MFU</text>
  <text x="80" y="285" class="key-body v-muted" fill="var(--muted,#6d675d)">  (each decode step reads all N params from HBM -- bandwidth, not FLOPs, is the bottleneck)</text>
  <text x="80" y="301" class="key-body" fill="var(--accent,#4f46e5)" font-weight="600">-&gt; Doubling generation throughput ~halves step time.</text>
  <text x="80" y="315" class="key-body" fill="var(--accent,#4f46e5)" font-weight="600">   Doubling backward speed barely moves it.  Optimize the rollout, not the gradient.</text>

  
  <text x="60" y="360" class="footnote v-muted" fill="var(--muted,#6d675d)">Lg hits you twice: more decode steps + slowest sequence gates the step (long-tail problem).</text>
  <text x="60" y="374" class="footnote v-muted" fill="var(--muted,#6d675d)">Continuous batching, overlong filtering, and async (pipelined) RL all target this dominant cost.</text>

</svg>
<figcaption><b>Generation dominates RL step time (~60-80%), despite having fewer FLOPs than the backward pass.</b> The disconnect is MFU: autoregressive decode is memory-bandwidth-bound and runs at under 5% MFU, while the backward pass reaches 40-55% MFU on a well-tuned FSDP setup. Doubling generation throughput nearly halves total step time; halving the backward barely registers.</figcaption>
</figure>
