<figcaption><b>Encoder-only (BERT) processes the full sequence bidirectionally in every block.</b> Each encoder block uses fully bidirectional attention — every token attends to every other token simultaneously (shown by the double-headed motif). The special [CLS] token (orange) accumulates global sequence meaning; its final hidden state h_0 is fed to a task-specific classification head, while all other positions produce contextual token representations.</figcaption>
</figure>
