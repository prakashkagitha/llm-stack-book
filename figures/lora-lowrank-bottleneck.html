<figure class="viz" id="fig-lora-lowrank-bottleneck">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 340" role="img" aria-label="A frozen full-rank weight W0 and a trainable low-rank path B times A are summed to form the LoRA forward pass; the trainable path narrows input x down to a width-r bottleneck and back out to width d, using far fewer parameters than the frozen d by d matrix.">
<defs>
  <marker id="lb-arr-muted" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
  </marker>
  <marker id="lb-arr-accent" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
  </marker>
  <marker id="lb-arr-ink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)"/>
  </marker>
</defs>
<style>
  #fig-lora-lowrank-bottleneck text { fill: var(--ink-soft); }
  #fig-lora-lowrank-bottleneck .title   { font: 700 14px var(--sans,sans-serif); }
  #fig-lora-lowrank-bottleneck .formula { font: 600 13px var(--mono,monospace); fill: var(--ink-soft); }
  #fig-lora-lowrank-bottleneck .lbl     { font: 600 11px var(--sans,sans-serif); }
  #fig-lora-lowrank-bottleneck .lbl-sm  { font: 500 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-lora-lowrank-bottleneck .mono    { font: 600 10.5px var(--mono,monospace); }
  #fig-lora-lowrank-bottleneck .mono-sm { font: 500 9.5px var(--mono,monospace); fill: var(--muted); }
  #fig-lora-lowrank-bottleneck .tag     { font: 600 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-lora-lowrank-bottleneck .frozen-fill { fill: var(--surface-3); }
  #fig-lora-lowrank-bottleneck [data-anim] { opacity: 0; animation: lb-in 0.6s ease forwards; }
  #fig-lora-lowrank-bottleneck [data-anim="1"] { animation-delay: 0.05s; }
  #fig-lora-lowrank-bottleneck [data-anim="2"] { animation-delay: 0.35s; }
  #fig-lora-lowrank-bottleneck [data-anim="3"] { animation-delay: 0.65s; }
  #fig-lora-lowrank-bottleneck [data-anim="4"] { animation-delay: 0.95s; }
  #fig-lora-lowrank-bottleneck [data-anim="5"] { animation-delay: 1.25s; }
  @keyframes lb-in { to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    #fig-lora-lowrank-bottleneck [data-anim] { animation: none; opacity: 1; }
  }
</style>

<text x="230" y="22" text-anchor="middle" class="formula">y = W0 x + B (A x)</text>

<g data-anim="1">
  <line x1="26" y1="105" x2="26" y2="255" stroke="var(--ink-soft)" stroke-width="2"/>
  <line x1="22" y1="105" x2="30" y2="105" stroke="var(--ink-soft)" stroke-width="2"/>
  <line x1="22" y1="255" x2="30" y2="255" stroke="var(--ink-soft)" stroke-width="2"/>
  <text x="14" y="184" text-anchor="middle" class="lbl" transform="rotate(-90 14 184)">x</text>
</g>

<g data-anim="2">
  <line x1="38" y1="150" x2="93" y2="102" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#lb-arr-muted)"/>
  <rect x="96" y="52" width="122" height="92" rx="4" class="frozen-fill" stroke="var(--border-2)" stroke-width="1.3"/>
  <rect x="96" y="52" width="122" height="92" rx="4" fill="none" stroke="var(--border-2)" stroke-width="1.3" stroke-dasharray="4 3"/>

  <g transform="translate(106,61)">
    <rect x="0" y="4" width="12" height="9" rx="1.5" fill="none" stroke="var(--muted)" stroke-width="1.3"/>
    <path d="M2 4 V1.5 a4 4 0 0 1 8 0 V4" fill="none" stroke="var(--muted)" stroke-width="1.3"/>
  </g>

  <text x="157" y="93" text-anchor="middle" class="lbl">W0</text>
  <text x="157" y="109" text-anchor="middle" class="mono-sm">(d x d)</text>
  <text x="157" y="130" text-anchor="middle" class="tag">frozen - no gradient</text>

  <line x1="218" y1="98" x2="266" y2="98" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#lb-arr-muted)"/>
  <text x="242" y="88" text-anchor="middle" class="mono-sm">W0 x</text>
</g>

<g data-anim="3">
  <line x1="38" y1="212" x2="88" y2="248" stroke="var(--accent)" stroke-width="1.4" marker-end="url(#lb-arr-accent)"/>

  <polygon points="92,220 92,262 141,250 141,232" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="1.3"/>
  <text x="112" y="245" text-anchor="middle" class="lbl" fill="var(--accent)">A</text>
  <text x="112" y="277" text-anchor="middle" class="mono-sm">(r x d)</text>

  <rect x="148" y="233" width="12" height="16" fill="var(--accent)" fill-opacity="0.38" stroke="var(--accent)" stroke-width="1.3"/>

  <polygon points="167,232 167,250 216,262 216,220" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="1.3"/>
  <text x="192" y="245" text-anchor="middle" class="lbl" fill="var(--accent)">B</text>
  <text x="192" y="277" text-anchor="middle" class="mono-sm">(d x r)</text>

  <text x="154" y="200" text-anchor="middle" class="lbl" fill="var(--accent)">rank r bottleneck</text>
  <text x="154" y="213" text-anchor="middle" class="tag">(r &lt;&lt; d)</text>
  <line x1="154" y1="217" x2="154" y2="231" stroke="var(--accent)" stroke-width="1.2" stroke-dasharray="2 2"/>

  <line x1="216" y1="238" x2="266" y2="204" stroke="var(--accent)" stroke-width="1.4" marker-end="url(#lb-arr-accent)"/>
  <text x="248" y="223" text-anchor="middle" class="mono-sm" fill="var(--accent)">B (A x)</text>

  <text x="154" y="298" text-anchor="middle" class="tag">B = 0 at init  =&gt;  Delta-W = 0  (start from pretrained)</text>
</g>

<g data-anim="4">
  <circle cx="298" cy="176" r="17" fill="var(--surface)" stroke="var(--ink-soft)" stroke-width="1.6"/>
  <line x1="298" y1="169" x2="298" y2="183" stroke="var(--ink-soft)" stroke-width="1.6"/>
  <line x1="291" y1="176" x2="305" y2="176" stroke="var(--ink-soft)" stroke-width="1.6"/>
  <line x1="266" y1="98" x2="286" y2="163" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#lb-arr-muted)"/>
  <line x1="266" y1="204" x2="286" y2="188" stroke="var(--accent)" stroke-width="1.4" marker-end="url(#lb-arr-accent)"/>
  <line x1="315" y1="176" x2="350" y2="176" stroke="var(--ink-soft)" stroke-width="1.6" marker-end="url(#lb-arr-ink)"/>
  <text x="358" y="181" class="lbl">y</text>
</g>

<g data-anim="5">
  <line x1="440" y1="20" x2="440" y2="332" stroke="var(--border-2)" stroke-width="1" stroke-dasharray="3 4"/>

  <text x="628" y="46" text-anchor="middle" class="title">Trainable parameters</text>

  <line x1="480" y1="290" x2="792" y2="290" stroke="var(--border-2)" stroke-width="1"/>

  <rect x="518" y="90" width="60" height="200" class="frozen-fill" stroke="var(--border-2)" stroke-width="1.3"/>
  <text x="548" y="80" text-anchor="middle" class="mono">d^2</text>
  <text x="548" y="312" text-anchor="middle" class="lbl-sm">full fine-tune</text>

  <rect x="700" y="272" width="60" height="18" fill="var(--accent)" fill-opacity="0.55" stroke="var(--accent)" stroke-width="1.3"/>
  <text x="730" y="262" text-anchor="middle" class="mono" fill="var(--accent)">2 d r</text>
  <text x="730" y="312" text-anchor="middle" class="lbl-sm">LoRA</text>

  <text x="636" y="330" text-anchor="middle" class="tag">illustrative proportions only</text>
</g>

</svg>
<figcaption><b>LoRA freezes the full-rank <code>W0</code> and adds a trainable low-rank path that every adaptation signal must squeeze through a width-<code>r</code> bottleneck.</b> The frozen path costs <code>d^2</code> parameters and carries no gradient; the trainable path factors <code>Delta-W</code> as <code>B A</code> through a rank-<code>r</code> waist, costing only <code>2dr</code> parameters, and is initialized at <code>B = 0</code> so training starts exactly from the pretrained model.</figcaption>
</figure>
