<figure class="viz" id="fig-cot-reasoning-scratchpad">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 780 460" role="img" aria-label="Contrast of direct answering versus chain-of-thought. Direct: the question jumps in one strained leap to the answer, estimating P(y given x) directly. Chain-of-thought: the same question passes through a scratchpad of three short reasoning steps before reaching the answer, factorizing P(y given x) as a sum over P(z given x) times P(y given x, z).">
<style>
  #fig-cot-reasoning-scratchpad text { fill: var(--ink-soft); }
  #fig-cot-reasoning-scratchpad .panel-title { font: 700 13px var(--sans,sans-serif); letter-spacing: .04em; }
  #fig-cot-reasoning-scratchpad .box-lbl { font: 600 11px var(--mono,monospace); }
  #fig-cot-reasoning-scratchpad .chip-lbl { font: 700 11px var(--mono,monospace); }
  #fig-cot-reasoning-scratchpad .chip-tag { font: 600 8.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-cot-reasoning-scratchpad .ans-lbl { font: 700 14px var(--mono,monospace); }
  #fig-cot-reasoning-scratchpad .caption { font: 400 11px var(--sans,sans-serif); fill: var(--muted); }
  #fig-cot-reasoning-scratchpad .annot { font: italic 10.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-cot-reasoning-scratchpad .eq { font: 600 14px var(--mono,monospace); }
  #fig-cot-reasoning-scratchpad .eq-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted); }

  @keyframes cot-in { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
  @keyframes cot-drw { from{stroke-dashoffset:var(--len,200)} to{stroke-dashoffset:0} }
  @media (prefers-reduced-motion: no-preference) {
    #fig-cot-reasoning-scratchpad [data-anim="1"] { opacity:0; animation:cot-in .4s ease .1s both }
    #fig-cot-reasoning-scratchpad [data-anim="2"] { opacity:0; animation:cot-in .5s ease .6s both }
    #fig-cot-reasoning-scratchpad [data-anim="3"] { opacity:0; animation:cot-in .4s ease 1.3s both }
    #fig-cot-reasoning-scratchpad [data-anim="4"] { opacity:0; animation:cot-in .4s ease 1.7s both }
    #fig-cot-reasoning-scratchpad [data-anim="5"] { opacity:0; animation:cot-in .4s ease 2.1s both }
    #fig-cot-reasoning-scratchpad .viz-draw { stroke-dashoffset:var(--len,200); animation:cot-drw .6s ease .2s both }
  }
</style>
<defs>
  <marker id="cot-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" class="v-accent"/>
  </marker>
  <marker id="cot-arr-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <marker id="cot-arr-good" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
  </marker>
</defs>

<line x1="392" y1="30" x2="392" y2="378" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>

<text x="200" y="24" text-anchor="middle" class="panel-title" fill="var(--warn,#e0a106)">DIRECT</text>
<text x="582" y="24" text-anchor="middle" class="panel-title v-accent">CHAIN-OF-THOUGHT</text>

<g data-anim="1">
  <rect x="100" y="34" width="200" height="50" rx="8" class="v-fill" stroke="var(--border-2,#9994d4)" stroke-width="1.5"/>
  <text x="200" y="54" text-anchor="middle" class="box-lbl">x = "Roger: 5 balls +</text>
  <text x="200" y="69" text-anchor="middle" class="box-lbl">2 cans of 3"</text>
</g>
<g data-anim="1">
  <rect x="480" y="34" width="200" height="50" rx="8" class="v-fill" stroke="var(--border-2,#9994d4)" stroke-width="1.5"/>
  <text x="580" y="54" text-anchor="middle" class="box-lbl">x = "Roger: 5 balls +</text>
  <text x="580" y="69" text-anchor="middle" class="box-lbl">2 cans of 3"</text>
</g>

<g data-anim="2">
  <path d="M300 62 C 355 62, 245 300, 200 288" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#cot-arr-warn)"/>
  <g transform="translate(300,175) rotate(-18)">
    <path d="M-9 -6 L-1 -6 L-5 2 L4 2 L-3 14 L1 3 L-8 3 Z" fill="var(--warn,#e0a106)"/>
  </g>
  <text x="322" y="150" text-anchor="middle" class="annot" fill="var(--warn,#e0a106)">one giant</text>
  <text x="322" y="163" text-anchor="middle" class="annot" fill="var(--warn,#e0a106)">leap</text>
</g>

<g data-anim="3">
  <rect x="150" y="288" width="100" height="46" rx="8" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="2"/>
  <text x="200" y="317" text-anchor="middle" class="ans-lbl" fill="var(--warn,#e0a106)">y = ?</text>
</g>
<g data-anim="3">
  <text x="200" y="360" text-anchor="middle" class="caption">must estimate P(y|x) directly -</text>
  <text x="200" y="374" text-anchor="middle" class="caption">a hard distribution</text>
</g>

<g data-anim="2">
  <line x1="580" y1="84" x2="580" y2="110" class="v-accent-s" stroke-width="2" marker-end="url(#cot-arr)"/>
</g>

<g data-anim="2">
  <text x="580" y="120" text-anchor="middle" class="annot" fill="var(--accent,#4f46e5)">scratchpad: later tokens attend back to these</text>
  <path d="M425 132 L425 138 L735 138 L735 132" fill="none" class="v-accent-s" stroke-width="1.2"/>
</g>

<g data-anim="3">
  <rect x="425" y="140" width="90" height="40" rx="7" class="v-fill v-accent-s" stroke-width="1.6"/>
  <text x="466" y="160" text-anchor="middle" class="chip-lbl">5 balls</text>
  <text x="509" y="174" text-anchor="end" class="chip-tag">z1</text>
  <line x1="515" y1="160" x2="533" y2="160" class="v-accent-s" stroke-width="1.8" marker-end="url(#cot-arr)"/>
</g>
<g data-anim="4">
  <rect x="535" y="140" width="90" height="40" rx="7" class="v-fill v-accent-s" stroke-width="1.6"/>
  <text x="576" y="160" text-anchor="middle" class="chip-lbl">2x3 = 6</text>
  <text x="619" y="174" text-anchor="end" class="chip-tag">z2</text>
  <line x1="625" y1="160" x2="643" y2="160" class="v-accent-s" stroke-width="1.8" marker-end="url(#cot-arr)"/>
</g>
<g data-anim="5">
  <rect x="645" y="140" width="90" height="40" rx="7" class="v-fill v-accent-s" stroke-width="1.6"/>
  <text x="686" y="160" text-anchor="middle" class="chip-lbl">5+6 = 11</text>
  <text x="729" y="174" text-anchor="end" class="chip-tag">z3</text>
</g>

<g data-anim="5">
  <path d="M690 180 C 690 240, 580 240, 580 286" fill="none" class="v-stroke" stroke="var(--good,#2f9e6e)" stroke-width="2" marker-end="url(#cot-arr-good)"/>
  <rect x="530" y="288" width="100" height="46" rx="8" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
  <text x="580" y="317" text-anchor="middle" class="ans-lbl" fill="var(--good,#2f9e6e)">y = 11</text>
</g>
<g data-anim="5">
  <text x="580" y="360" text-anchor="middle" class="caption">each hop is short and easy</text>
</g>

<g data-anim="1">
  <line x1="90" y1="405" x2="690" y2="405" class="v-grid" stroke-width="1"/>
  <text x="200" y="428" text-anchor="middle" class="eq">P(y|x) = Sum_z P(z|x) . P(y|x,z)</text>
  <path d="M262 436 L262 442 L328 442 L328 436" fill="none" class="v-accent-s" stroke-width="1"/>
  <text x="295" y="454" text-anchor="middle" class="eq-sub">generate the reasoning</text>
  <path d="M338 436 L338 442 L470 442 L470 436" fill="none" class="v-stroke" stroke="var(--good,#2f9e6e)" stroke-width="1"/>
  <text x="404" y="454" text-anchor="middle" class="eq-sub">read off the answer</text>
</g>
</svg>
<figcaption><b>Chain-of-thought replaces one hard jump from question to answer with a chain of easy conditional steps.</b> Directly estimating P(y|x) forces the model to leap straight to the answer (left); generating an explicit scratchpad z lets it marginalize over reasoning steps, P(y|x) = &amp;Sigma;<sub>z</sub> P(z|x)&amp;middot;P(y|x,z), where each hop is short and each subsequent token can attend back to what was already written.</figcaption>
</figure>
