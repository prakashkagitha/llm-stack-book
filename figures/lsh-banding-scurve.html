<figcaption><b>Banding a MinHash signature converts a linear similarity score into a sharp step function.</b> Two documents become a candidate pair the moment any one band matches on all its rows -- splitting k hashes into b bands of r rows makes P(candidate | s) an S-curve whose knee t* ~ (1/b)^(1/r) is a tunable threshold: more/longer bands push the knee right and sharpen the step, trading recall against verification cost.</figcaption>
</figure>
