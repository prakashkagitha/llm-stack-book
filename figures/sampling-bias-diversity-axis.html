<figure class="viz" id="fig-sampling-bias-diversity-axis">
<svg viewBox="0 0 820 320" role="img" aria-label="A horizontal spectrum showing decoding strategies from left (Greedy, high bias, deterministic) to right (uniform, low bias, stochastic), with top-k, top-p, and typical sampling in between, sitting above a temperature gradient track showing that temperature continuously sweeps this same axis.">
<defs>
  <linearGradient id="sbda-grad" x1="0" y1="0" x2="1" y2="0">

    <stop offset="100%" stop-color="var(--accent,#6366f1)" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="sbda-temp-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="var(--accent2,#3b82f6)" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="var(--warn,#e0a106)" stop-opacity="0.85"/>

  <marker id="sbda-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">

  </marker>
</defs>
<style>

  #fig-sampling-bias-diversity-axis .bias-tag   { font: 600 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-bias-diversity-axis .temp-lbl   { font: italic 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
</style>

      fill="var(--accent,#6366f1)" fill-opacity="0.18"
      stroke="var(--accent,#6366f1)" stroke-width="1.8"/>
<text x="130" y="130" text-anchor="middle" class="pill-lbl">Greedy</text>


<line x1="270" y1="133" x2="270" y2="148" stroke="var(--border-2,#94a3b8)" stroke-width="1.3"/>

<text x="680" y="211" text-anchor="start" class="ann">Low bias</text>
<text x="690" y="226" text-anchor="middle" class="ann-sm">but incoherent output</text>
<text x="690" y="240" text-anchor="middle" class="ann-sm">(ignores what the</text>
<text x="690" y="254" text-anchor="middle" class="ann-sm">model learned)</text>

</svg>
<figcaption><b>The bias-diversity tradeoff spectrum for decoding strategies.</b> Greedy decoding (left) has maximum bias and zero variance — it always reproduces the mode. Uniform sampling (right) has minimum bias but ignores the model's learned distribution entirely. Top-k, top-p, and typical sampling occupy intermediate positions; the temperature track below the axis shows that these named methods are just points along one continuous knob — temperature — that sweeps from cold (sharpen, toward greedy) to hot (flatten, toward uniform).</figcaption>
</figure>
