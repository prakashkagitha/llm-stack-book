<figure class="viz" id="fig-specdec-eagle-feature-loop">
<button class="viz-replay" type="button">&#x21bb; replay</button>
<style>
  #fig-specdec-eagle-feature-loop text { fill: var(--ink-soft); }
  #fig-specdec-eagle-feature-loop .lbl  { font: 600 12px var(--sans,sans-serif); }
  #fig-specdec-eagle-feature-loop .sub  { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-specdec-eagle-feature-loop .cap  { font: 500 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-specdec-eagle-feature-loop .edge { font: italic 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-specdec-eagle-feature-loop .pill { font: 600 11px var(--mono,monospace); }
  #fig-specdec-eagle-feature-loop .step-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--muted); }
</style>

<svg viewBox="0 0 840 420" role="img" aria-label="EAGLE autoregressive draft loop: EAGLE layer takes previous feature plus token embedding, predicts next feature, frozen LM head samples a token, token embedding feeds back into the next EAGLE step.">
  <defs>
    <marker id="ea-arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#888)"/>
    </marker>
    <marker id="ea-arrow-acc" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
    </marker>
  </defs>

  
  <text x="12" y="22" class="step-lbl">STEP 1</text>
  <line x1="12" y1="28" x2="828" y2="28" stroke="var(--border-2,#ddd)" stroke-width="0.8" stroke-dasharray="4 3"/>

  
  
  <text x="309" y="55" text-anchor="middle" class="edge">(predict feature)</text>
  
  <text x="494" y="55" text-anchor="middle" class="edge">(token dist)</text>

  
  <g data-anim="1">
    <rect x="12" y="44" width="88" height="32" rx="7"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.18"
          stroke="var(--accent-2,#0891b2)" stroke-width="1.7"/>
    <text x="56" y="65" text-anchor="middle" class="lbl" fill="var(--accent-2,#0891b2)">f_t</text>
  </g>

  
  <g data-anim="1">
    <rect x="12" y="88" width="88" height="38" rx="7"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <text x="56" y="106" text-anchor="middle" class="sub">emb(prev</text>
    <text x="56" y="120" text-anchor="middle" class="sub">token)</text>
  </g>

  
  <line x1="100" y1="60"  x2="136" y2="91" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#ea-arrow)"/>
  <line x1="100" y1="112" x2="136" y2="95" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#ea-arrow)"/>

  
  <g data-anim="2">
    <rect x="140" y="70" width="148" height="54" rx="9"
          fill="var(--accent,#4f46e5)" fill-opacity="0.15"
          stroke="var(--accent,#4f46e5)" stroke-width="2"/>
    <text x="214" y="94" text-anchor="middle" class="lbl" fill="var(--accent,#4f46e5)">[EAGLE layer]</text>
    <text x="214" y="112" text-anchor="middle" class="sub">one cheap decoder layer</text>
  </g>

  
  <line x1="288" y1="97" x2="328" y2="97" stroke="var(--muted,#888)" stroke-width="1.5" marker-end="url(#ea-arrow)"/>

  
  <g data-anim="2">
    <rect x="330" y="70" width="140" height="54" rx="8"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.22"
          stroke="var(--accent-2,#0891b2)" stroke-width="1.8"/>
    <text x="400" y="94" text-anchor="middle" class="lbl" fill="var(--accent-2,#0891b2)">f-hat_{t+1}</text>
    <text x="400" y="112" text-anchor="middle" class="sub">(predicted feature)</text>
  </g>

  
  <line x1="470" y1="97" x2="516" y2="97" stroke="var(--muted,#888)" stroke-width="1.5" marker-end="url(#ea-arrow)"/>

  
  <g data-anim="3">
    <rect x="518" y="70" width="148" height="54" rx="8"
          fill="var(--surface,#f5f5f5)" stroke="var(--muted,#888)" stroke-width="1.8" stroke-dasharray="6 3"/>
    <text x="592" y="94" text-anchor="middle" class="lbl">[frozen LM head]</text>
    <text x="592" y="112" text-anchor="middle" class="sub">(frozen)</text>
  </g>

  
  <line x1="666" y1="97" x2="710" y2="97" stroke="var(--muted,#888)" stroke-width="1.5" marker-end="url(#ea-arrow)"/>

  
  <g data-anim="3">
    <rect x="712" y="79" width="114" height="36" rx="17"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.6"/>
    <text x="769" y="102" text-anchor="middle" class="pill">token d_1</text>
  </g>

  
  
  <g data-anim="4">
    <path d="M769 115 C769 158 769 170 769 178 C769 188 600 192 400 192 C240 192 140 192 56 192"
          fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.8"
          stroke-dasharray="6 3" marker-end="url(#ea-arrow-acc)"/>
    <text x="440" y="187" text-anchor="middle" class="edge" fill="var(--accent,#4f46e5)">embed sampled token, feed back</text>
  </g>

  
  <g data-anim="4">
    <path d="M400 124 C400 152 300 166 210 172"
          fill="none" stroke="var(--muted,#888)" stroke-width="1.2"
          stroke-dasharray="4 3" marker-end="url(#ea-arrow)"/>
    <text x="320" y="165" text-anchor="middle" class="edge">feature fwd</text>
  </g>

  
  <text x="12" y="224" class="step-lbl">STEP 2</text>
  <line x1="12" y1="230" x2="828" y2="230" stroke="var(--border-2,#ddd)" stroke-width="0.8" stroke-dasharray="4 3"/>

  
  <g data-anim="5">
    <rect x="12" y="248" width="106" height="32" rx="7"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.18"
          stroke="var(--accent-2,#0891b2)" stroke-width="1.7"/>
    <text x="65" y="269" text-anchor="middle" class="lbl" fill="var(--accent-2,#0891b2)">f-hat_{t+1}</text>
  </g>

  
  <g data-anim="5">
    <rect x="12" y="296" width="106" height="32" rx="7"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <text x="65" y="317" text-anchor="middle" class="lbl">emb(d_1)</text>
  </g>

  
  <line x1="118" y1="264" x2="152" y2="294" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#ea-arrow)"/>
  <line x1="118" y1="312" x2="152" y2="300" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#ea-arrow)"/>

  
  <g data-anim="5">
    <rect x="156" y="274" width="148" height="54" rx="9"
          fill="var(--accent,#4f46e5)" fill-opacity="0.15"
          stroke="var(--accent,#4f46e5)" stroke-width="2"/>
    <text x="230" y="298" text-anchor="middle" class="lbl" fill="var(--accent,#4f46e5)">[EAGLE layer]</text>
    <text x="230" y="316" text-anchor="middle" class="sub">one cheap decoder layer</text>
  </g>

  
  <line x1="304" y1="301" x2="344" y2="301" stroke="var(--muted,#888)" stroke-width="1.5" marker-end="url(#ea-arrow)"/>

  
  <g data-anim="5">
    <rect x="346" y="274" width="140" height="54" rx="8"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.22"
          stroke="var(--accent-2,#0891b2)" stroke-width="1.8"/>
    <text x="416" y="298" text-anchor="middle" class="lbl" fill="var(--accent-2,#0891b2)">f-hat_{t+2}</text>
    <text x="416" y="316" text-anchor="middle" class="sub">(predicted feature)</text>
  </g>

  
  <line x1="486" y1="301" x2="530" y2="301" stroke="var(--muted,#888)" stroke-width="1.5" marker-end="url(#ea-arrow)"/>

  
  <g data-anim="5">
    <rect x="534" y="274" width="148" height="54" rx="8"
          fill="var(--surface,#f5f5f5)" stroke="var(--muted,#888)" stroke-width="1.8" stroke-dasharray="6 3"/>
    <text x="608" y="298" text-anchor="middle" class="lbl">[frozen LM head]</text>
    <text x="608" y="316" text-anchor="middle" class="sub">(frozen)</text>
  </g>

  
  <line x1="682" y1="301" x2="726" y2="301" stroke="var(--muted,#888)" stroke-width="1.5" marker-end="url(#ea-arrow)"/>

  
  <g data-anim="5">
    <rect x="728" y="283" width="102" height="36" rx="17"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.6"/>
    <text x="779" y="306" text-anchor="middle" class="pill">token d_2 ...</text>
  </g>

  
  <g data-anim="5">
    <text x="420" y="366" text-anchor="middle" class="cap" style="font-size:9.5px">Autoregression in continuous, low-entropy FEATURE space -&gt; easier to model -&gt; higher acceptance than token-space drafting.</text>
    <text x="420" y="382" text-anchor="middle" class="cap" style="font-size:9.5px">Still lossless: verification uses the exact accept/reject rule. Dashed blue arc = recurrence (embed sampled token, feed back).</text>
  </g>
</svg>
<figcaption><b>EAGLE: autoregressive drafting in feature space.</b> Rather than drafting in token space, EAGLE runs a tiny one-layer autoregressive loop over the target model's penultimate-layer features. Each step merges the previous feature with the token embedding, predicts the next feature via the cheap EAGLE layer, then samples a token through the frozen LM head. The dashed blue arc shows the recurrence: the sampled token is embedded and fed back as input to the next draft step, making EAGLE a true autoregressive drafter over low-entropy continuous features.</figcaption>
</figure>
