<figure class="viz" id="fig-pretrain-four-scale-ladder">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 820 400" role="img" aria-label="The same train.py, same uint16 shard format, and same GPT/loss/cosine schedule run at four hardware scales -- laptop CPU, single GPU, 8-GPU node, and multi-node cluster -- with only the launch flags and the memory-sharding strategy changing: replicated model state on the first two scales, sharded 1/8 slivers per rank on the 8-GPU node with activations still unsharded, and shard-within-node plus slow inter-node gradient sync on the multi-node cluster.">

  <marker id="pfsl-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>

  <line x1="563" y1="185" x2="654" y2="185" stroke="var(--accent,#c15b39)" stroke-width="2" marker-end="url(#pfsl-arrow-accent)"/>

  <rect x="670" y="181" width="6" height="7" rx="1.5" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>

  <text x="758" y="169" text-anchor="middle" style="font:600 5.8px var(--sans,sans-serif);fill:var(--muted,#9ca3af)">node B</text>
  <rect x="734" y="172" width="48" height="7" rx="1.5" class="hollow"/>
  <rect x="734" y="172" width="6" height="7" rx="1.5" fill="var(--accent2,#3b82f6)" fill-opacity="0.85"/>

  <rect x="734" y="181" width="6" height="7" rx="1.5" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
  <rect x="734" y="190" width="48" height="7" rx="1.5" class="hollow"/>

<style>
@media (prefers-reduced-motion: reduce) {

</svg>
<figcaption><b>One <code>train.py</code>, four hardware tiers: only the launch flags and the sharding strategy change, never the code.</b> Model state (params/grads/optimizer-state) stays fully replicated as long as it fits one GPU; past that, DDP gives way to FSDP <code>FULL_SHARD</code> (1/N slivers per rank, while activations stay unsharded and are the usual OOM culprit); past one node, <code>HYBRID_SHARD</code> keeps the expensive parameter all-gathers on fast intra-node NVLink and only syncs the cheaper gradients across the slow inter-node link — climb only as far as memory or network actually force you.</figcaption>
</figure>
