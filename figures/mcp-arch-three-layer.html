<figure class="viz" id="fig-mcp-arch-three-layer">
<svg viewBox="0 0 760 480" role="img" aria-label="MCP three-layer architecture: a Host Process box contains the LLM Engine and two MCP Clients; each client connects via a Transport line to an independent MCP Server outside the host.">
  <defs>
    <marker id="mcp-arr-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1 L5 9 L9 1" fill="none" stroke="var(--accent,#2563eb)" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="mcp-arr-up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 9 L5 1 L9 9" fill="none" stroke="var(--accent,#2563eb)" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="mcp-arr-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="var(--ink-soft,#334155)" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="mcp-arr-left" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M9 1 L1 5 L9 9" fill="none" stroke="var(--ink-soft,#334155)" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    #fig-mcp-arch-three-layer text { fill: var(--ink-soft, #334155); }
    #fig-mcp-arch-three-layer .lbl { font: 600 13px var(--sans, sans-serif); }
    #fig-mcp-arch-three-layer .sub  { font: 400 10px var(--mono, monospace); fill: var(--muted, #64748b); }
    #fig-mcp-arch-three-layer .hdr  { font: 700 14px var(--sans, sans-serif); letter-spacing: 0.08em; }
    #fig-mcp-arch-three-layer .ann  { font: 400 10px var(--sans, sans-serif); fill: var(--muted, #64748b); }
    #fig-mcp-arch-three-layer .tiny { font: 400 9px var(--sans, sans-serif); fill: var(--muted, #64748b); }
    #fig-mcp-arch-three-layer .tport { font: 600 11px var(--sans, sans-serif); fill: var(--accent, #2563eb); }
  </style>

  
  
  <rect x="18" y="18" width="724" height="210" rx="10"
        fill="var(--surface,#f5f7fa)"
        stroke="var(--ink-soft,#334155)"
        stroke-width="2"/>

  
  <text x="380" y="42" text-anchor="middle" class="hdr">HOST PROCESS</text>
  <text x="380" y="57" text-anchor="middle" class="ann">Claude Desktop · IDE extension · Python script — owns the conversation loop</text>

  
  <rect x="44" y="70" width="170" height="118" rx="8"
        fill="var(--surface-3,#dbeafe)"
        stroke="var(--accent,#2563eb)"
        stroke-width="2"/>
  <text x="129" y="123" text-anchor="middle" class="lbl">LLM Engine</text>
  <text x="129" y="141" text-anchor="middle" class="sub">Claude / GPT-4 / local</text>

  
  <rect x="272" y="70" width="170" height="118" rx="8"
        fill="var(--surface-3,#e2e8f0)"
        stroke="var(--ink-soft,#334155)"
        stroke-width="1.8"/>
  <text x="357" y="123" text-anchor="middle" class="lbl">MCP Client</text>
  <text x="357" y="141" text-anchor="middle" class="sub">one per server</text>


  <rect x="500" y="70" width="170" height="118" rx="8"
        fill="var(--surface-3,#e2e8f0)"
        stroke="var(--ink-soft,#334155)"
        stroke-width="1.8"/>
  <text x="585" y="123" text-anchor="middle" class="lbl">MCP Client</text>
  <text x="585" y="141" text-anchor="middle" class="sub">one per server</text>

  
  <line x1="216" y1="129" x2="270" y2="129"
        stroke="var(--ink-soft,#334155)" stroke-width="1.5"
        marker-end="url(#mcp-arr-right)"
        marker-start="url(#mcp-arr-left)"/>
  <text x="243" y="121" text-anchor="middle" class="tiny">internal calls</text>

  
  
  <line x1="18" y1="232" x2="742" y2="232"
        stroke="var(--muted,#64748b)" stroke-width="1" stroke-dasharray="5 4" opacity="0.55"/>
  
  <text x="26" y="254" class="tiny" text-anchor="start">process / trust boundary</text>

  
  
  <line x1="357" y1="190" x2="357" y2="298"
        stroke="var(--accent,#2563eb)" stroke-width="2"
        marker-end="url(#mcp-arr-down)"
        marker-start="url(#mcp-arr-up)"/>

  
  <text x="370" y="258" text-anchor="start" class="tport">Transport</text>
  <text x="370" y="272" text-anchor="start" class="tiny">stdio or HTTP</text>

  
  <line x1="585" y1="190" x2="585" y2="298"
        stroke="var(--accent,#2563eb)" stroke-width="2"
        marker-end="url(#mcp-arr-down)"
        marker-start="url(#mcp-arr-up)"/>

  
  <text x="598" y="258" text-anchor="start" class="tport">Transport</text>
  <text x="598" y="272" text-anchor="start" class="tiny">stdio or HTTP</text>

  
  
  <rect x="244" y="302" width="226" height="84" rx="8"
        fill="var(--surface-3,#f5f7fa)"
        stroke="var(--ink-soft,#334155)"
        stroke-width="2"/>
  <text x="357" y="344" text-anchor="middle" class="lbl">MCP Server A</text>
  <text x="357" y="362" text-anchor="middle" class="sub">(filesystem)</text>

  
  <rect x="472" y="302" width="226" height="84" rx="8"
        fill="var(--surface-3,#f5f7fa)"
        stroke="var(--ink-soft,#334155)"
        stroke-width="2"/>
  <text x="585" y="344" text-anchor="middle" class="lbl">MCP Server B</text>
  <text x="585" y="362" text-anchor="middle" class="sub">(postgres / web)</text>

  
  <text x="380" y="418" text-anchor="middle" class="ann">Each client speaks the MCP wire format to exactly one server.</text>
  <text x="380" y="434" text-anchor="middle" class="ann">Servers are independent, single-responsibility processes; the LLM never calls a server directly.</text>
  <text x="380" y="450" text-anchor="middle" class="ann">All host-to-server traffic flows through the client.</text>
</svg>
<figcaption><b>MCP's three-layer architecture separates the AI application (host), protocol connectors (clients), and capability providers (servers).</b> The host process runs the LLM Engine and any number of MCP Clients — one per server. Each client crosses the process boundary over a Transport (stdio or HTTP/SSE carrying JSON-RPC 2.0) to reach an independent MCP Server. Servers are single-responsibility; the LLM never addresses a server directly.</figcaption>
</figure>
