<figure class="viz" id="fig-mlfund-confusion-matrix">
<style>
  #fig-mlfund-confusion-matrix .hdr  { font: 600 14px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-mlfund-confusion-matrix .super { font: 600 15px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-mlfund-confusion-matrix .acro  { font: 700 28px var(--sans,sans-serif); }
  #fig-mlfund-confusion-matrix .sub   { font: italic 13px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-mlfund-confusion-matrix .cap   { font: 400 12px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
</style>
<svg viewBox="0 0 560 420" role="img" aria-label="Binary confusion matrix: rows are Actual Positive and Actual Negative; columns are Predicted Positive and Predicted Negative. The main diagonal (TP and TN) represents correct predictions shown in green; the off-diagonal (FN and FP) represents errors shown in red.">

  
  
  <text x="350" y="26" text-anchor="middle" class="super">Predicted</text>

  
  <text x="22" y="210" text-anchor="middle" class="super" transform="rotate(-90,22,210)">Actual</text>

  
  
  <rect x="185" y="38" width="160" height="42" rx="5" class="v-fill v-stroke" fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="265" y="64" text-anchor="middle" class="hdr">Positive</text>

  
  <rect x="355" y="38" width="160" height="42" rx="5" class="v-fill v-stroke" fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="435" y="64" text-anchor="middle" class="hdr">Negative</text>

  
  
  <rect x="90" y="90" width="85" height="120" rx="5" class="v-fill v-stroke" fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="132" y="155" text-anchor="middle" class="hdr">Positive</text>

  
  <rect x="90" y="220" width="85" height="120" rx="5" class="v-fill v-stroke" fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="132" y="285" text-anchor="middle" class="hdr">Negative</text>

  

  
  <rect x="185" y="90" width="160" height="120" rx="5"
        fill="var(--ok,#16a34a)" fill-opacity="0.13"
        stroke="var(--ok,#16a34a)" stroke-width="2"/>
  
  <rect x="185" y="90" width="6" height="120" rx="3"
        fill="var(--ok,#16a34a)" fill-opacity="0.7"/>
  <text x="265" y="143" text-anchor="middle" class="acro" fill="var(--ok,#16a34a)">TP</text>
  <text x="265" y="165" text-anchor="middle" class="sub">(hit)</text>

  
  <rect x="355" y="90" width="160" height="120" rx="5"
        fill="var(--bad,#dc2626)" fill-opacity="0.11"
        stroke="var(--bad,#dc2626)" stroke-width="2"/>
  <rect x="355" y="90" width="6" height="120" rx="3"
        fill="var(--bad,#dc2626)" fill-opacity="0.7"/>
  <text x="435" y="143" text-anchor="middle" class="acro" fill="var(--bad,#dc2626)">FN</text>
  <text x="435" y="165" text-anchor="middle" class="sub">(miss)</text>

  
  <rect x="185" y="220" width="160" height="120" rx="5"
        fill="var(--bad,#dc2626)" fill-opacity="0.11"
        stroke="var(--bad,#dc2626)" stroke-width="2"/>
  <rect x="185" y="220" width="6" height="120" rx="3"
        fill="var(--bad,#dc2626)" fill-opacity="0.7"/>
  <text x="265" y="273" text-anchor="middle" class="acro" fill="var(--bad,#dc2626)">FP</text>
  <text x="265" y="295" text-anchor="middle" class="sub">(false alarm)</text>

  
  <rect x="355" y="220" width="160" height="120" rx="5"
        fill="var(--ok,#16a34a)" fill-opacity="0.13"
        stroke="var(--ok,#16a34a)" stroke-width="2"/>
  <rect x="355" y="220" width="6" height="120" rx="3"
        fill="var(--ok,#16a34a)" fill-opacity="0.7"/>
  <text x="435" y="273" text-anchor="middle" class="acro" fill="var(--ok,#16a34a)">TN</text>
  <text x="435" y="295" text-anchor="middle" class="sub">(correct reject)</text>

  
  <text x="310" y="368" text-anchor="middle" class="cap">Diagonal = correct predictions  ·  Off-diagonal = errors</text>

</svg>
<figcaption><b>The four outcomes of binary classification.</b> Each prediction lands in one of four cells defined by the cross of actual label (rows) and predicted label (columns). The main diagonal — True Positive (TP) and True Negative (TN) — represents correct predictions, highlighted in green; the off-diagonal — False Negative (FN) and False Positive (FP) — represents the two distinct error types, highlighted in red.</figcaption>
</figure>
