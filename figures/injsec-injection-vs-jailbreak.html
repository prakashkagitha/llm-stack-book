<figure class="viz" id="fig-injsec-injection-vs-jailbreak">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 650" role="img"
     aria-label="Prompt injection attacks the outer context and instruction-following layer of an LLM agent, while jailbreaks pierce through to the inner core of trained values, so the two attack surfaces need complementary, non-interchangeable defenses.">
<defs>
  <marker id="ivj-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c62828)"/>
  </marker>
  <marker id="ivj-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
  </marker>
</defs>
<style>
  #fig-injsec-injection-vs-jailbreak text { font-family: var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-injsec-injection-vs-jailbreak .hd   { font: 700 12.5px var(--sans,sans-serif); }
  #fig-injsec-injection-vs-jailbreak .bs   { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-injsec-injection-vs-jailbreak .bss  { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-injsec-injection-vs-jailbreak .lab  { font: 700 13px var(--sans,sans-serif); }
  #fig-injsec-injection-vs-jailbreak .tagt { font: 700 9.5px var(--sans,sans-serif); }
  #fig-injsec-injection-vs-jailbreak .tagb { font: 400 8.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-injsec-injection-vs-jailbreak .chip { font: 600 9.5px var(--sans,sans-serif); }
  #fig-injsec-injection-vs-jailbreak .dhd  { font: 700 11px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
  #fig-injsec-injection-vs-jailbreak .dbs  { font: 400 9.5px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-injsec-injection-vs-jailbreak .take { font: italic 600 11px var(--sans,sans-serif); fill: var(--muted,#666); }
</style>


<g data-anim="1">
  <ellipse cx="390" cy="250" rx="175" ry="125" fill="var(--surface-3,#e5e5e5)" fill-opacity="0.55" stroke="var(--border-2,#999)" stroke-width="2"/>
  <ellipse cx="390" cy="250" rx="78" ry="58" fill="var(--ink-soft,#666)" fill-opacity="0.16" stroke="var(--border-2,#999)" stroke-width="2"/>

  <text x="390" y="141" text-anchor="middle" class="hd">OUTER SHELL</text>
  <text x="390" y="158" text-anchor="middle" class="bs">context window / instruction-following</text>
  <text x="390" y="173" text-anchor="middle" class="bss">(data and instructions share one token stream)</text>

  <text x="390" y="212" text-anchor="middle" class="hd">CORE</text>
  <text x="390" y="228" text-anchor="middle" class="bs" font-weight="600">trained values</text>
  <text x="390" y="243" text-anchor="middle" class="bss">(RLHF refusal prior /</text>
  <text x="390" y="256" text-anchor="middle" class="bss">learned alignment)</text>

  <text x="390" y="27" text-anchor="middle" class="hd" font-size="14px">One LLM Agent — Two Attack Surfaces</text>
</g>


<g data-anim="2">
  <line x1="42" y1="276" x2="255" y2="276" stroke="var(--accent,#c62828)" stroke-width="3.5"
        class="viz-draw" style="--len:213" marker-end="url(#ivj-r)"/>
  <text x="148" y="222" text-anchor="middle" class="lab" fill="var(--accent,#c62828)">PROMPT INJECTION</text>
  <text x="148" y="300" text-anchor="middle" class="bs">attacks WHAT the model reads &#8212;</text>
  <text x="148" y="314" text-anchor="middle" class="bs">plants text the model treats as instructions.</text>
</g>


<g data-anim="3">
  <line x1="738" y1="276" x2="428" y2="276" stroke="var(--accent,#c62828)" stroke-width="3.5"
        stroke-dasharray="14 5" class="viz-draw" style="--len:310" marker-end="url(#ivj-r)"/>
  <text x="580" y="222" text-anchor="middle" class="lab" fill="var(--accent,#c62828)">JAILBREAK</text>
  <text x="580" y="300" text-anchor="middle" class="bs">attacks the model's LEARNED refusals &#8212;</text>
  <text x="580" y="314" text-anchor="middle" class="bs">overrides trained values.</text>
</g>


<g data-anim="4">
  <rect x="22" y="335" width="256" height="66" rx="6" fill="var(--accent,#c62828)" fill-opacity="0.1" stroke="var(--accent,#c62828)" stroke-width="1.3"/>
  <text x="34" y="353" class="tagt" fill="var(--accent,#c62828)">Direct &#8212; the user is the attacker</text>
  <text x="34" y="368" class="tagb">"Ignore previous instructions..." sent</text>
  <text x="34" y="381" class="tagb">straight in the user's own message.</text>

  <rect x="22" y="411" width="256" height="66" rx="6" fill="var(--accent,#c62828)" fill-opacity="0.1" stroke="var(--accent,#c62828)" stroke-width="1.3"/>
  <text x="34" y="429" class="tagt" fill="var(--accent,#c62828)">Indirect &#8212; planted in the environment</text>
  <text x="34" y="444" class="tagb">Fires on an innocent user's agent</text>
  <text x="34" y="457" class="tagb">later (stored-XSS analogy).</text>
</g>


<g data-anim="4">
  <rect x="522" y="335" width="236" height="24" rx="12" fill="var(--accent,#c62828)" fill-opacity="0.1" stroke="var(--accent,#c62828)" stroke-width="1.1"/>
  <text x="640" y="351" text-anchor="middle" class="chip" fill="var(--accent,#c62828)">role-play (DAN)</text>

  <rect x="522" y="365" width="236" height="24" rx="12" fill="var(--accent,#c62828)" fill-opacity="0.1" stroke="var(--accent,#c62828)" stroke-width="1.1"/>
  <text x="640" y="381" text-anchor="middle" class="chip" fill="var(--accent,#c62828)">fictional framing</text>

  <rect x="522" y="395" width="236" height="24" rx="12" fill="var(--accent,#c62828)" fill-opacity="0.1" stroke="var(--accent,#c62828)" stroke-width="1.1"/>
  <text x="640" y="411" text-anchor="middle" class="chip" fill="var(--accent,#c62828)">adversarial suffix (GCG)</text>

  <rect x="522" y="425" width="236" height="24" rx="12" fill="var(--accent,#c62828)" fill-opacity="0.1" stroke="var(--accent,#c62828)" stroke-width="1.1"/>
  <text x="640" y="441" text-anchor="middle" class="chip" fill="var(--accent,#c62828)">base64 / encoding</text>

  <rect x="522" y="455" width="236" height="24" rx="12" fill="var(--accent,#c62828)" fill-opacity="0.1" stroke="var(--accent,#c62828)" stroke-width="1.1"/>
  <text x="640" y="471" text-anchor="middle" class="chip" fill="var(--accent,#c62828)">many-shot priming</text>
</g>


<g data-anim="5">
  <line x1="148" y1="485" x2="148" y2="497" stroke="var(--good,#2f9e6e)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ivj-g)"/>
  <line x1="640" y1="479" x2="640" y2="497" stroke="var(--good,#2f9e6e)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ivj-g)"/>

  <rect x="22" y="500" width="360" height="80" rx="7" fill="var(--good,#2f9e6e)" fill-opacity="0.1" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="34" y="519" class="dhd">Injection defenses</text>
  <text x="34" y="537" class="dbs">architectural isolation, least privilege,</text>
  <text x="34" y="552" class="dbs">break the lethal trifecta, dual-LLM</text>
  <text x="34" y="567" class="dbs">pattern.</text>

  <rect x="398" y="500" width="360" height="80" rx="7" fill="var(--good,#2f9e6e)" fill-opacity="0.1" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="410" y="519" class="dhd">Jailbreak defenses</text>
  <text x="410" y="537" class="dbs">alignment / adversarial training,</text>
  <text x="410" y="552" class="dbs">output classifiers.</text>

  <text x="390" y="614" text-anchor="middle" class="take">Different layers -&gt; complementary, not interchangeable, defenses.</text>
</g>

</svg>
<figcaption><b>Prompt injection and jailbreaking exploit two distinct layers of the same agent.</b> Injection attacks the outer context/instruction-following layer &#8212; it plants text the model treats as instructions, regardless of the model's trained values. Jailbreaking pierces through to the inner core, overriding the RLHF-trained refusal prior itself. Because the surfaces differ, the defenses are complementary rather than interchangeable: architectural isolation stops injection even against a perfectly aligned model, and alignment training stops jailbreaks even with no architectural isolation at all.</figcaption>
</figure>
