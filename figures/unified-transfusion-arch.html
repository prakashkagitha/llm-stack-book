<figure class="viz" id="fig-unified-transfusion-arch">
<button class="viz-replay" type="button">&#8635; replay</button>
<style>
  #fig-unified-transfusion-arch text { fill: var(--ink-soft, #45413a); }
  #fig-unified-transfusion-arch .lbl    { font: 600 13px var(--sans, sans-serif); }
  #fig-unified-transfusion-arch .sub    { font: 400 10px var(--sans, sans-serif); fill: var(--muted, #6d675d); }
  #fig-unified-transfusion-arch .mono   { font: 500 10px var(--mono, monospace); fill: var(--muted, #6d675d); }
  #fig-unified-transfusion-arch .ann    { font: 400 9.5px var(--sans, sans-serif); }
  #fig-unified-transfusion-arch .loss   { font: 700 12px var(--mono, monospace); }
  #fig-unified-transfusion-arch .trunk-title { font: 700 14px var(--sans, sans-serif); }
  #fig-unified-transfusion-arch .trunk-sub   { font: 400 10px var(--sans, sans-serif); fill: var(--muted, #6d675d); }

  /* animation particles */
  #fig-unified-transfusion-arch .p-text {
    fill: var(--accent2, #3b82f6);
    opacity: 0;
    animation: tf-rise-text 3.6s ease-in-out 0.4s infinite;
  }
  #fig-unified-transfusion-arch .p-img {
    fill: var(--warn, #e0a106);
    opacity: 0;
    animation: tf-rise-img 3.6s ease-in-out 0.9s infinite;
  }
  #fig-unified-transfusion-arch .p-hs-l {
    fill: var(--accent2, #3b82f6);
    opacity: 0;
    animation: tf-fall-left 3.6s ease-in-out 2.2s infinite;
  }
  #fig-unified-transfusion-arch .p-hs-r {
    fill: var(--warn, #e0a106);
    opacity: 0;
    animation: tf-fall-right 3.6s ease-in-out 2.2s infinite;
  }

  @keyframes tf-rise-text {
    0%   { opacity: 0; transform: translateY(0px); }
    15%  { opacity: 0.9; }
    45%  { opacity: 0.9; transform: translateY(-48px); }
    60%  { opacity: 0; transform: translateY(-60px); }
    100% { opacity: 0; transform: translateY(-60px); }
  }
  @keyframes tf-rise-img {
    0%   { opacity: 0; transform: translateY(0px); }
    15%  { opacity: 0.9; }
    45%  { opacity: 0.9; transform: translateY(-48px); }
    60%  { opacity: 0; transform: translateY(-60px); }
    100% { opacity: 0; transform: translateY(-60px); }
  }
  @keyframes tf-fall-left {
    0%   { opacity: 0; transform: translate(0px, 0px); }
    10%  { opacity: 0.9; }
    50%  { opacity: 0.9; transform: translate(-90px, 80px); }
    70%  { opacity: 0; transform: translate(-110px, 100px); }
    100% { opacity: 0; }
  }
  @keyframes tf-fall-right {
    0%   { opacity: 0; transform: translate(0px, 0px); }
    10%  { opacity: 0.9; }
    50%  { opacity: 0.9; transform: translate(90px, 80px); }
    70%  { opacity: 0; transform: translate(110px, 100px); }
    100% { opacity: 0; }
  }
</style>
<svg viewBox="0 0 880 565" role="img" aria-label="Transfusion architecture: interleaved text and image tokens enter a shared transformer trunk; hidden states are routed to a text LM head or a diffusion flow-matching head depending on token modality; both heads feed into a combined loss.">
  <defs>
    <marker id="tf-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft, #45413a)"/>
    </marker>
    <marker id="tf-arr-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted, #6d675d)"/>
    </marker>
    <marker id="tf-arr-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent2, #3b82f6)"/>
    </marker>
    <marker id="tf-arr-w" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--warn, #e0a106)"/>
    </marker>
    <marker id="tf-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent, #7c3aed)"/>
    </marker>
  </defs>

  
  
  
  <g data-anim="1">
    
    <rect x="60"  y="60" width="76" height="44" rx="7"
          fill="var(--accent2,#dbeafe)" fill-opacity="0.35"
          stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
    <text x="98"  y="86" text-anchor="middle" class="lbl" fill="var(--accent2,#3b82f6)">Text tok</text>

    
    <rect x="168" y="60" width="90" height="44" rx="7"
          fill="var(--warn,#fde68a)" fill-opacity="0.4"
          stroke="var(--warn,#d97706)" stroke-width="1.8"/>
    <text x="213" y="86" text-anchor="middle" class="lbl" fill="var(--warn,#d97706)">Img patch</text>

    
    <rect x="292" y="60" width="76" height="44" rx="7"
          fill="var(--accent2,#dbeafe)" fill-opacity="0.35"
          stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
    <text x="330" y="86" text-anchor="middle" class="lbl" fill="var(--accent2,#3b82f6)">Text tok</text>

    
    <text x="400" y="86" text-anchor="middle" class="lbl" fill="var(--muted,#6d675d)">...</text>

    
    <rect x="430" y="60" width="90" height="44" rx="7"
          fill="var(--warn,#fde68a)" fill-opacity="0.4"
          stroke="var(--warn,#d97706)" stroke-width="1.8"/>
    <text x="475" y="86" text-anchor="middle" class="lbl" fill="var(--warn,#d97706)">Img patch</text>

    
    <text x="98"  y="118" text-anchor="middle" class="ann v-muted">embed</text>
    <text x="213" y="118" text-anchor="middle" class="ann v-muted">linear patch proj</text>
    <text x="213" y="129" text-anchor="middle" class="ann v-muted">(no quantisation)</text>
    <text x="330" y="118" text-anchor="middle" class="ann v-muted">embed</text>
    <text x="475" y="118" text-anchor="middle" class="ann v-muted">linear patch proj</text>
  </g>

  
  
  
  <g data-anim="2">
    <line x1="98"  y1="104" x2="98"  y2="188" stroke="var(--muted,#6d675d)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#tf-arr-m)"/>
    <line x1="213" y1="104" x2="213" y2="188" stroke="var(--muted,#6d675d)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#tf-arr-m)"/>
    <line x1="330" y1="104" x2="330" y2="188" stroke="var(--muted,#6d675d)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#tf-arr-m)"/>
    <line x1="475" y1="104" x2="475" y2="188" stroke="var(--muted,#6d675d)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#tf-arr-m)"/>
  </g>

  
  
  
  <g data-anim="2">
    <rect x="28" y="190" width="820" height="120" rx="12"
          fill="var(--v-fill,#f1f5f9)" stroke="var(--v-stroke,#64748b)" stroke-width="2"/>
    <text x="438" y="240" text-anchor="middle" class="trunk-title">Shared Transformer Trunk</text>
    <text x="438" y="258" text-anchor="middle" class="trunk-sub">block-causal mask: text tokens causal  |  image patches bidirectional within their block</text>
    
    <line x1="230" y1="205" x2="230" y2="305" stroke="var(--border-2,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 4"/>
    <line x1="430" y1="205" x2="430" y2="305" stroke="var(--border-2,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 4"/>
    <line x1="630" y1="205" x2="630" y2="305" stroke="var(--border-2,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 4"/>
  </g>

  
  
  
  <g data-anim="3">
    <line x1="438" y1="312" x2="438" y2="355" stroke="var(--ink-soft,#45413a)" stroke-width="2" marker-end="url(#tf-arr)"/>
    
    <circle cx="438" cy="362" r="7" fill="var(--ink-soft,#45413a)"/>
    <text x="480" y="350" class="ann v-muted">hidden state</text>
  </g>

  
  
  
  <g data-anim="4">
    
    <path d="M 438 362 Q 280 390 220 415" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2" marker-end="url(#tf-arr-b)"/>
    <text x="295" y="388" text-anchor="middle" class="ann" fill="var(--accent2,#3b82f6)">text positions</text>

    
    <path d="M 438 362 Q 600 390 668 415" fill="none" stroke="var(--warn,#d97706)" stroke-width="2" marker-end="url(#tf-arr-w)"/>
    <text x="590" y="388" text-anchor="middle" class="ann" fill="var(--warn,#d97706)">image positions</text>
  </g>

  
  
  
  <g data-anim="4">
    
    <rect x="104" y="416" width="230" height="76" rx="9"
          fill="var(--accent2,#dbeafe)" fill-opacity="0.3"
          stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
    <text x="219" y="450" text-anchor="middle" class="lbl" fill="var(--accent2,#3b82f6)">Text Head</text>
    <text x="219" y="465" text-anchor="middle" class="sub">LM loss - autoregressive</text>
    <text x="219" y="478" text-anchor="middle" class="sub">cross-entropy</text>
  </g>

  <g data-anim="4">
    
    <rect x="544" y="416" width="234" height="76" rx="9"
          fill="var(--warn,#fde68a)" fill-opacity="0.3"
          stroke="var(--warn,#d97706)" stroke-width="2"/>
    <text x="661" y="450" text-anchor="middle" class="lbl" fill="var(--warn,#d97706)">Diffusion Head</text>
    <text x="661" y="465" text-anchor="middle" class="sub">flow matching -</text>
    <text x="661" y="478" text-anchor="middle" class="sub">continuous velocity v_th(x_t, t)</text>
  </g>

  
  
  
  <g data-anim="5">
    <line x1="219" y1="493" x2="340" y2="528" stroke="var(--accent2,#3b82f6)" stroke-width="1.8" marker-end="url(#tf-arr-b)"/>
    <line x1="661" y1="493" x2="540" y2="528" stroke="var(--warn,#d97706)" stroke-width="1.8" marker-end="url(#tf-arr-w)"/>
  </g>

  
  
  
  <g data-anim="5">
    <rect x="248" y="528" width="384" height="30" rx="15"
          fill="var(--v-fill,#f1f5f9)" stroke="var(--accent,#7c3aed)" stroke-width="2"/>
    <text x="440" y="548" text-anchor="middle" class="loss" fill="var(--accent,#7c3aed)">L = L_LM  +  lambda * L_flow</text>
  </g>

  
  
  
  
  <circle cx="98" cy="104" r="6" class="p-text"/>
  
  <circle cx="213" cy="104" r="6" class="p-img"/>
  
  <circle cx="438" cy="355" r="6" class="p-hs-l"/>
  
  <circle cx="438" cy="355" r="6" class="p-hs-r"/>

</svg>
<figcaption><b>Transfusion routes a single mixed sequence through one shared transformer trunk, then splits outputs by modality.</b> Text token positions receive discrete embeddings and are trained with autoregressive cross-entropy; image patch positions receive continuous linear projections and are trained with a flow-matching (diffusion) objective. The two losses are combined as L = L_LM + lambda * L_flow, with no architectural change to the transformer itself.</figcaption>
</figure>
