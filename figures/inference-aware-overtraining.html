<figure class="viz" id="fig-inference-aware-overtraining">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 460" role="img" aria-label="Figure showing the compute-optimal point shifting as serving load grows. Top: three stacked bars for light, medium, and heavy inference demand, each split into a train term six N D-train and a serve term two N D-inf, all subject to hitting the same target loss. As demand grows the serve term grows and the optimal N shrinks. Bottom: a horizontal axis of tokens per parameter from Chinchilla-optimal about 20 on the left to heavily over-trained on the right, marking Chinchilla-optimal at 20 tokens per parameter which minimizes training compute, Llama-2-7B at about 280 tokens per parameter, and Llama-3-8B at about 1900 tokens per parameter, with an arrow labeled more serving leads to smaller model and more training tokens.">
<style>
  #fig-inference-aware-overtraining text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-inference-aware-overtraining .v-fill { fill: var(--surface-3,#ece7da); }
  #fig-inference-aware-overtraining .hdr { font: 700 13px var(--sans,sans-serif); }
  #fig-inference-aware-overtraining .sub { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-inference-aware-overtraining .mono { font: 400 11px var(--mono,monospace); }
  #fig-inference-aware-overtraining .axis-lbl { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-inference-aware-overtraining .scen-lbl { font: 700 11.5px var(--sans,sans-serif); }
  #fig-inference-aware-overtraining .bar-lbl { font: 600 10px var(--sans,sans-serif); }
  #fig-inference-aware-overtraining .pt-lbl { font: 700 11px var(--sans,sans-serif); }
  #fig-inference-aware-overtraining .pt-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-inference-aware-overtraining .shift-lbl { font: 700 12px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
</style>

<g data-anim="1">
  <text x="390" y="22" text-anchor="middle" class="hdr">Lifetime compute = train once + serve forever, at a fixed target loss L*</text>
  <text x="390" y="38" text-anchor="middle" class="mono">minimize  6 N D_train + 2 N D_inf   s.t. loss = L*</text>
</g>


<g data-anim="2">
  
  <line x1="60" y1="230" x2="720" y2="230" stroke="var(--v-stroke,#45413a)" stroke-width="1.2"/>

  
  <g>
    <text x="145" y="60" text-anchor="middle" class="scen-lbl">Light inference demand</text>
    <text x="145" y="76" text-anchor="middle" class="bar-lbl">N: large, D_train: ~20 tok/param</text>
    <rect x="95" y="150" width="100" height="80" fill="var(--accent,#c15b39)" opacity="0.75"/>
    <rect x="95" y="140" width="100" height="10" fill="var(--accent2,#3b82f6)" opacity="0.85"/>
    <text x="145" y="248" text-anchor="middle" class="sub">train-dominated</text>
  </g>

  
  <g>
    <text x="390" y="60" text-anchor="middle" class="scen-lbl">Medium inference demand</text>
    <text x="390" y="76" text-anchor="middle" class="bar-lbl">N: medium, D_train: ~280 tok/param</text>
    <rect x="340" y="140" width="100" height="90" fill="var(--accent,#c15b39)" opacity="0.75"/>
    <rect x="340" y="105" width="100" height="35" fill="var(--accent2,#3b82f6)" opacity="0.85"/>
    <text x="390" y="248" text-anchor="middle" class="sub">train + serve balanced</text>
  </g>

  
  <g>
    <text x="635" y="60" text-anchor="middle" class="scen-lbl">Heavy inference demand</text>
    <text x="635" y="76" text-anchor="middle" class="bar-lbl">N: small, D_train: ~1900 tok/param</text>
    <rect x="585" y="185" width="100" height="45" fill="var(--accent,#c15b39)" opacity="0.75"/>
    <rect x="585" y="95" width="100" height="90" fill="var(--accent2,#3b82f6)" opacity="0.85"/>
    <text x="635" y="248" text-anchor="middle" class="sub">serve-dominated</text>
  </g>

  
  <rect x="270" y="255" width="13" height="11" fill="var(--accent,#c15b39)" opacity="0.75"/>
  <text x="288" y="264" class="sub">train term: 6 N D_train</text>
  <rect x="440" y="255" width="13" height="11" fill="var(--accent2,#3b82f6)" opacity="0.85"/>
  <text x="458" y="264" class="sub">serve term: 2 N D_inf</text>
</g>

<line x1="20" y1="286" x2="760" y2="286" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 4"/>


<g data-anim="3">
  <text x="390" y="312" text-anchor="middle" class="hdr">Where the optimum sits: tokens per parameter (D_train / N, log scale)</text>

  <line x1="60" y1="410" x2="720" y2="410" stroke="var(--v-stroke,#45413a)" stroke-width="1.6" marker-end="url(#arrowhead-iao)"/>
  <defs>
    <marker id="arrowhead-iao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--v-stroke,#45413a)"/>
    </marker>
  </defs>

  <text x="60" y="426" text-anchor="start" class="axis-lbl">Chinchilla-optimal (~20x)</text>
  <text x="720" y="426" text-anchor="end" class="axis-lbl">over-trained (100x-2000x)</text>
</g>

<g data-anim="4">
  
  <circle cx="120" cy="410" r="6" fill="var(--accent,#c15b39)"/>
  <line x1="120" y1="404" x2="120" y2="360" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="120" y="350" text-anchor="middle" class="pt-lbl">~20 tok/param</text>
  <text x="120" y="364" text-anchor="middle" class="pt-sub"></text>
  <text x="120" y="440" text-anchor="middle" class="pt-sub">minimizes TRAINING compute</text>

  
  <circle cx="360" cy="410" r="6" fill="var(--accent2,#3b82f6)"/>
  <line x1="360" y1="404" x2="360" y2="360" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="360" y="350" text-anchor="middle" class="pt-lbl">Llama-2-7B</text>
  <text x="360" y="364" text-anchor="middle" class="pt-sub"></text>
  <text x="360" y="440" text-anchor="middle" class="pt-sub">~280 tok/param</text>

  
  <circle cx="640" cy="410" r="6" fill="var(--accent2,#3b82f6)"/>
  <line x1="640" y1="404" x2="640" y2="360" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="640" y="350" text-anchor="middle" class="pt-lbl">Llama-3-8B</text>
  <text x="640" y="364" text-anchor="middle" class="pt-sub"></text>
  <text x="640" y="440" text-anchor="middle" class="pt-sub">~1900 tok/param</text>
</g>

<g data-anim="5">
  <text x="390" y="342" text-anchor="middle" class="shift-lbl">more serving -&gt; smaller model, more training tokens</text>
</g>

</svg>
<figcaption><b>Serving load, not just training FLOPs, sets the compute-optimal model size.</b> Minimizing lifetime compute (6 N D_train + 2 N D_inf) at a fixed target loss shifts the optimum away from Chinchilla's ~20 tokens/param as expected inference volume grows, which is why Llama-2-7B (~280 tok/param) and Llama-3-8B (~1900 tok/param) are deliberately smaller and far more over-trained than Chinchilla-optimal.</figcaption>
</figure>
