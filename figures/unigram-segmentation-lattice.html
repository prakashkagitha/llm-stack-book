<figure class="viz" id="fig-unigram-segmentation-lattice">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 720 412" role="img" aria-label="Segmentation lattice for the word hello, with character-boundary positions 0 through 5 along a horizontal axis. Arcs represent candidate subword pieces such as h, e, l, l, o, he, ll, llo, lo, and hello. The Viterbi best path, the single high-probability piece hello, is highlighted; a close runner-up path of he plus llo is shown faintly dashed as a sampled alternative. A caption contrasts BPE and WordPiece's one fixed deterministic segmentation with Unigram's scoring of every segmentation and optional sampling for subword regularization.">
  <defs>
    <marker id="ulat-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
    </marker>
    <marker id="ulat-arrow-best" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
  </defs>
  <style>
    #fig-unigram-segmentation-lattice text{ fill:var(--ink-soft); }
    #fig-unigram-segmentation-lattice .heading{ font:700 13px var(--sans,sans-serif); }
    #fig-unigram-segmentation-lattice .char{ font:700 18px var(--mono,monospace); text-anchor:middle; fill:var(--muted); }
    #fig-unigram-segmentation-lattice .node{ fill:var(--surface); stroke:var(--v-stroke,var(--ink-soft)); stroke-width:1.4; }
    #fig-unigram-segmentation-lattice .posidx{ font:600 9.5px var(--mono,monospace); text-anchor:middle; fill:var(--muted); }
    #fig-unigram-segmentation-lattice .piece{ font:600 10.5px var(--mono,monospace); text-anchor:middle; }
    #fig-unigram-segmentation-lattice .piece-best{ fill:var(--accent); font-weight:700; }
    #fig-unigram-segmentation-lattice .piece-alt{ fill:var(--good); }
    #fig-unigram-segmentation-lattice .piece-other{ fill:var(--muted); }
    #fig-unigram-segmentation-lattice .lp{ font:500 8.5px var(--mono,monospace); text-anchor:middle; fill:var(--muted); }
    #fig-unigram-segmentation-lattice .edge-other{ fill:none; stroke:var(--v-grid,var(--border-2)); stroke-width:1.3; }
    #fig-unigram-segmentation-lattice .edge-best{ fill:none; stroke:var(--accent); stroke-width:2.6; }
    #fig-unigram-segmentation-lattice .edge-alt{ fill:none; stroke:var(--good); stroke-width:1.6; stroke-dasharray:4,3; }
    #fig-unigram-segmentation-lattice .note{ font:500 10.5px var(--sans,sans-serif); }
    #fig-unigram-segmentation-lattice .panel-title{ font:700 11.5px var(--sans,sans-serif); }
  </style>


  <text x="16" y="24" class="heading">Segmentation lattice for "hello": every arc is a candidate subword</text>


  <g data-anim="1">
    <g class="char">
      <text x="105" y="76">h</text><text x="215" y="76">e</text><text x="325" y="76">l</text><text x="435" y="76">l</text><text x="545" y="76">o</text>
    </g>

    <g class="node">
      <circle cx="50" cy="90" r="6"/>
      <circle cx="160" cy="90" r="6"/>
      <circle cx="270" cy="90" r="6"/>
      <circle cx="380" cy="90" r="6"/>
      <circle cx="490" cy="90" r="6"/>
      <circle cx="600" cy="90" r="6"/>
    </g>
    <g class="posidx">
      <text x="50" y="112">0</text><text x="160" y="112">1</text><text x="270" y="112">2</text>
      <text x="380" y="112">3</text><text x="490" y="112">4</text><text x="600" y="112">5</text>
    </g>
  </g>


  <g data-anim="2">

    <path class="edge-other" d="M 50 90 Q 105 60 160 90" marker-end="url(#ulat-arrow)"/>
    <text x="105" y="52" class="piece piece-other">h</text>
    <text x="105" y="42" class="lp">-2.1</text>

    <path class="edge-other" d="M 160 90 Q 215 60 270 90" marker-end="url(#ulat-arrow)"/>
    <text x="215" y="52" class="piece piece-other">e</text>
    <text x="215" y="42" class="lp">-2.0</text>

    <path class="edge-other" d="M 270 90 Q 325 60 380 90" marker-end="url(#ulat-arrow)"/>
    <text x="325" y="52" class="piece piece-other">l</text>
    <text x="325" y="42" class="lp">-1.7</text>

    <path class="edge-other" d="M 380 90 Q 435 60 490 90" marker-end="url(#ulat-arrow)"/>
    <text x="435" y="52" class="piece piece-other">l</text>
    <text x="435" y="42" class="lp">-1.7</text>

    <path class="edge-other" d="M 490 90 Q 545 60 600 90" marker-end="url(#ulat-arrow)"/>
    <text x="545" y="52" class="piece piece-other">o</text>
    <text x="545" y="42" class="lp">-2.3</text>
  </g>


  <g data-anim="3">

    <path class="edge-alt" d="M 50 90 Q 160 150 270 90" marker-end="url(#ulat-arrow)" stroke="var(--good)"/>
    <text x="160" y="168" class="piece piece-alt">he</text>
    <text x="160" y="180" class="lp">-3.0</text>


    <path class="edge-other" d="M 270 90 Q 380 150 490 90" marker-end="url(#ulat-arrow)"/>
    <text x="380" y="168" class="piece piece-other">ll</text>
    <text x="380" y="180" class="lp">-3.9</text>


    <path class="edge-other" d="M 380 90 Q 490 175 600 90" marker-end="url(#ulat-arrow)"/>
    <text x="490" y="193" class="piece piece-other">lo</text>
    <text x="490" y="205" class="lp">-4.4</text>


    <path class="edge-alt" d="M 270 90 Q 435 218 600 90" marker-end="url(#ulat-arrow)" stroke="var(--good)"/>
    <text x="435" y="236" class="piece piece-alt">llo</text>
    <text x="435" y="248" class="lp">-3.0</text>
  </g>


  <g data-anim="4">
    <path class="edge-best" d="M 50 90 C 50 220 90 260 150 260 L 500 260 C 560 260 600 220 600 90" marker-end="url(#ulat-arrow-best)"/>
    <text x="325" y="284" class="piece piece-best">hello</text>
    <text x="325" y="297" class="lp" fill="var(--accent)">-1.6</text>
  </g>


  <g data-anim="5">
    <rect x="16" y="316" width="336" height="86" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
    <text x="30" y="338" class="panel-title" fill="var(--muted)">BPE / WordPiece</text>
    <text x="30" y="358" class="note" fill="var(--ink-soft)">Build up by a fixed merge order --</text>
    <text x="30" y="376" class="note" fill="var(--ink-soft)">one deterministic segmentation.</text>

    <rect x="368" y="316" width="336" height="86" rx="8" class="v-fill" stroke="var(--accent)" stroke-width="1.3"/>
    <text x="382" y="338" class="panel-title" fill="var(--accent)">Unigram</text>
    <text x="382" y="356" class="note" fill="var(--ink-soft)">Score every path under p(x1)...p(xk),</text>
    <text x="382" y="372" class="note" fill="var(--ink-soft)">take the Viterbi best -- or SAMPLE an</text>
    <text x="382" y="388" class="note" fill="var(--ink-soft)">alternate path for subword regularization.</text>
  </g>

</svg>
<figcaption><b>Unigram scores every possible segmentation of a string and keeps the highest-probability path.</b> Each arc in the lattice is a candidate subword piece with a log-probability; the accent path shows Viterbi selecting the single high-probability token <code>hello</code> over the close runner-up <code>he</code> + <code>llo</code> (dashed). Unlike BPE/WordPiece's one fixed merge order, Unigram can also sample a non-best path at training time for subword regularization.</figcaption>
</figure>
