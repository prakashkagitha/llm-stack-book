<figcaption><b>PagedAttention reclaims 60-80% of wasted KV memory by replacing contiguous per-request slabs with a shared pool of fixed-size blocks.</b> The left column shows how contiguous allocation loses memory three ways: internal fragmentation (reserved-but-empty tails on each sequence), an external fragmentation hole (free space too scattered for any contiguous request), and the inability to share data. The right column shows PagedAttention packing many interleaved sequences into uniform blocks -- any free block is immediately reusable by any sequence -- raising useful KV from 20-40% to over 90% and enabling proportionally larger batches and higher throughput.</figcaption>
