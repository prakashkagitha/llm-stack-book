<figure class="viz" id="fig-tgi-router-modelserver-architecture">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 660 700" role="img" aria-label="TGI architecture: HTTP client sends requests to a Rust Router that queues and validates them, then passes them over a ZeroMQ socket (process boundary) to a Python model server containing Tokenizer, Model, custom FlashAttention kernel, and continuous batching loop.">
<defs>
  <marker id="tgi-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">

  </marker>
  <style>
    #fig-tgi-router-modelserver-architecture text { fill: var(--ink-soft,#45413a); }
    #fig-tgi-router-modelserver-architecture .title  { font: 700 13px var(--sans,sans-serif); }
    #fig-tgi-router-modelserver-architecture .sub    { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-tgi-router-modelserver-architecture .note   { font: italic 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-tgi-router-modelserver-architecture .zmq-lbl{ font: 600 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
    #fig-tgi-router-modelserver-architecture .bnd-lbl{ font: italic 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-tgi-router-modelserver-architecture .rust-title { font: 700 13px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
    #fig-tgi-router-modelserver-architecture .py-title   { font: 700 13px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
    #fig-tgi-router-modelserver-architecture .edge-lbl   { font: italic 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

    @keyframes tgi-travel {
      0%   { transform: translateY(0px); opacity: 0; }
      5%   { opacity: 1; }
      88%  { opacity: 1; }
      95%  { transform: translateY(540px); opacity: 0; }
      100% { transform: translateY(540px); opacity: 0; }
    }
    #fig-tgi-router-modelserver-architecture .tgi-dot {
      animation: tgi-travel 3.4s ease-in-out infinite;
      transform-origin: 330px 100px;
    }
    #fig-tgi-router-modelserver-architecture.paused .tgi-dot {
      animation-play-state: paused;
    }
  </style>
</defs>

<text x="330" y="509" text-anchor="middle" class="sub">schedules running batch each decode step</text>

<circle cx="330" cy="100" r="5" fill="var(--accent,#c15b39)" opacity="0.85" class="tgi-dot"/>

</svg>
<figcaption><b>TGI architecture: Rust router and Python model server.</b> The Rust front-end handles all HTTP/gRPC routing, request queuing, SSE streaming, and input validation at low latency, then hands requests to the Python model server over a ZeroMQ inter-process socket. The Python side runs the PyTorch model with a custom FlashAttention kernel and a continuous batching loop that schedules the active batch at each decode step.</figcaption>
</figure>
