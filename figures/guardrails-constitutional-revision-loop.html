<figure class="viz" id="fig-guardrails-constitutional-revision-loop">
<svg viewBox="0 0 760 520" role="img" aria-label="The serving-time constitutional loop: a draft pass generates a response, a critique pass evaluates the draft against a written constitution, and a revision pass produces the final response, conditioned on the original request, the draft, and the critique.">
<defs>
  <marker id="gcrl-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <style>
    #fig-guardrails-constitutional-revision-loop text { fill: var(--ink-soft,#45413a); }
    #fig-guardrails-constitutional-revision-loop .ttl { font: 700 14.5px var(--sans,sans-serif); }
    #fig-guardrails-constitutional-revision-loop .sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-constitutional-revision-loop .stage-t { font: 700 13px var(--sans,sans-serif); }
    #fig-guardrails-constitutional-revision-loop .stage-s { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-constitutional-revision-loop .badge-n { font: 700 13px var(--sans,sans-serif); fill: #fff; }
    #fig-guardrails-constitutional-revision-loop .box-t { font: 700 12.5px var(--sans,sans-serif); }
    #fig-guardrails-constitutional-revision-loop .box-s { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-constitutional-revision-loop .flow-lbl { font: 700 11px var(--sans,sans-serif); }
    #fig-guardrails-constitutional-revision-loop .flow-lbl-s { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-constitutional-revision-loop .const-t { font: 700 11.5px var(--sans,sans-serif); }
    #fig-guardrails-constitutional-revision-loop .const-s { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-constitutional-revision-loop .const-p { font: 600 10px var(--mono,monospace); }
    #fig-guardrails-constitutional-revision-loop .cost-t { font: 700 11.5px var(--sans,sans-serif); }
    #fig-guardrails-constitutional-revision-loop .cost-s { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  </style>
</defs>

<text x="20" y="24" class="ttl">The serving-time constitutional loop</text>
<text x="20" y="40" class="sub">draft, critique against the constitution, then revise -- a self-correcting three-pass pipeline</text>

<g data-anim="1">
  <rect x="280" y="58" width="200" height="38" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="380" y="82" text-anchor="middle" class="box-t">User request</text>
  <line x1="380" y1="96" x2="380" y2="120" stroke="var(--ink-soft,#45413a)" stroke-width="1.8" marker-end="url(#gcrl-arrow)"/>
</g>

<g data-anim="2">
  <rect x="220" y="122" width="320" height="62" rx="10" class="v-fill" fill="var(--accent,#c15b39)" fill-opacity="0.09" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <circle cx="250" cy="153" r="15" fill="var(--accent,#c15b39)"/>
  <text x="250" y="158" text-anchor="middle" class="badge-n">1</text>
  <text x="277" y="148" class="stage-t">DRAFT</text>
  <text x="277" y="165" class="stage-s">model generates a first-pass response</text>

  <line x1="380" y1="184" x2="380" y2="208" stroke="var(--ink-soft,#45413a)" stroke-width="1.8" marker-end="url(#gcrl-arrow)"/>
  <text x="398" y="200" class="flow-lbl">draft response</text>
</g>

<g data-anim="3">
  <rect x="220" y="208" width="320" height="90" rx="10" class="v-fill" fill="var(--accent,#c15b39)" fill-opacity="0.09" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <circle cx="250" cy="239" r="15" fill="var(--accent,#c15b39)"/>
  <text x="250" y="244" text-anchor="middle" class="badge-n">2</text>
  <text x="277" y="234" class="stage-t">CRITIQUE</text>
  <text x="277" y="251" class="stage-s">evaluates the draft against the constitution</text>
  <text x="277" y="266" class="stage-s">-&gt; flags which principle (if any) is violated</text>

  <line x1="562" y1="253" x2="542" y2="253" stroke="var(--muted,#6d675d)" stroke-width="1.6" marker-end="url(#gcrl-arrow)"/>

  <line x1="380" y1="298" x2="380" y2="326" stroke="var(--ink-soft,#45413a)" stroke-width="1.8" marker-end="url(#gcrl-arrow)"/>
  <text x="398" y="312" class="flow-lbl">critique</text>
  <text x="398" y="326" class="flow-lbl-s">(e.g. "violates P2", or none)</text>
</g>

<g data-anim="3">
  <rect x="562" y="194" width="150" height="122" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <path d="M 697,194 L 712,194 L 712,209 Z" fill="var(--border-2,#d8d1c0)"/>
  <text x="637" y="214" text-anchor="middle" class="const-t">CONSTITUTION</text>
  <text x="637" y="228" text-anchor="middle" class="const-s">(written principles)</text>
  <text x="580" y="248" class="const-p">P1 ...</text>
  <text x="580" y="264" class="const-p">P2 ...</text>
  <text x="580" y="280" class="const-p">P3 ...</text>
  <text x="580" y="296" class="const-p">...</text>
</g>

<g data-anim="4">
  <rect x="220" y="332" width="320" height="96" rx="10" class="v-fill" fill="var(--accent,#c15b39)" fill-opacity="0.09" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <circle cx="250" cy="363" r="15" fill="var(--accent,#c15b39)"/>
  <text x="250" y="368" text-anchor="middle" class="badge-n">3</text>
  <text x="277" y="358" class="stage-t">REVISE</text>
  <text x="277" y="375" class="stage-s">conditions on request + draft + critique</text>
  <text x="277" y="390" class="stage-s">-&gt; revises, or politely declines if the</text>
  <text x="277" y="403" class="stage-s">request itself violates a principle</text>

  <line x1="380" y1="428" x2="380" y2="452" stroke="var(--ink-soft,#45413a)" stroke-width="1.8" marker-end="url(#gcrl-arrow)"/>
  <text x="398" y="444" class="flow-lbl">final response</text>
</g>

<g data-anim="5">
  <rect x="260" y="454" width="240" height="44" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.10" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="380" y="473" text-anchor="middle" class="box-t">Response to user</text>
  <text x="380" y="489" text-anchor="middle" class="box-s">(helpful -- or a polite decline)</text>
</g>

<g data-anim="2">
  <line x1="195" y1="122" x2="195" y2="428" stroke="var(--muted,#6d675d)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="188" y1="122" x2="202" y2="122" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <line x1="188" y1="428" x2="202" y2="428" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <line x1="160" y1="275" x2="195" y2="275" stroke="var(--muted,#6d675d)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="20" y="248" width="140" height="54" rx="8" fill="none" stroke="var(--muted,#6d675d)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="90" y="270" text-anchor="middle" class="cost-t">~3x inference</text>
  <text x="90" y="286" text-anchor="middle" class="cost-s">low-volume,</text>
  <text x="90" y="298" text-anchor="middle" class="cost-s">high-stakes only</text>
</g>

</svg>
<figcaption><b>Serving-time constitutional AI turns a written policy into a self-correcting three-pass pipeline.</b> The draft and revision passes are ordinary model calls, but the critique pass is tapped against a constitution document to explicitly name which principle (if any) the draft violates before revising -- roughly 3x the inference cost of a single call, so it is reserved for low-volume, high-stakes applications rather than high-throughput consumer traffic.</figcaption>
</figure>
