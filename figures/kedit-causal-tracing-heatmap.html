<figcaption><b>Causal tracing reveals where facts are stored: middle-layer MLP at the last subject token.</b> Each cell shows how much the model's probability of the correct answer is restored when a clean hidden state is patched in at that (layer, token) position during a corrupted run. The deep purple cells at "Needle" in layers 5 and 8 show that the fact is causally mediated in middle-layer MLPs at the last subject token — the site ROME targets. A secondary effect in a later attention layer moves the retrieved fact toward the output position.</figcaption>
