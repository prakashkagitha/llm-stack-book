<button class="viz-replay" type="button">&#8635; replay</button>

<figcaption><b>Confidence-based remasking recovers coherence one commit at a time.</b> Each step predicts every still-masked position in parallel, but commits only the most confident few (locked, solid); the rest return to [MASK] and get re-predicted with more context next round. Filling all 8 positions in a single shot leaves each token individually plausible but jointly incoherent, because the single-step factorization treats masked positions as independent -- iterating trades compute for the coherence that independence throws away.</figcaption>
