<figcaption><b>Confidence-based remasking recovers coherence one commit at a time.</b> Each step predicts every still-masked position in parallel with a confidence score, but commits only the most confident two (locked, checked); the rest return to [MASK] and get re-predicted with more context next round -- notice the confidence scores on the remaining masked positions climb from step to step as more of the sentence locks in. Filling all 8 positions in a single shot leaves each token individually plausible but jointly incoherent, because the single-step factorization treats masked positions as independent -- iterating trades compute for the coherence that independence throws away.</figcaption>
