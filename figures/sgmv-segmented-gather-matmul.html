<figcaption><b>SGMV turns a heterogeneous, per-token-tagged batch into an efficient segmented matmul by sorting rows into contiguous per-adapter segments before computing.</b> Each segment gathers its adapter's low-rank pair once and pushes its rows through a shrink (d_in&#8594;r) then expand (r&#8594;d_out) matmul around the rank-r "waist," while a single dense base GEMM runs over the whole batch independent of adapter identity; the two sum into Y. The same layout underlies both kernels: BGMV (decode, one row per request, bandwidth-bound matrix-vector) and SGMV (prefill, many rows per request, compute-bound small GEMMs).</figcaption>
</figure>
