<figure class="viz" id="fig-statrig-bootstrap-resample">
<button class="viz-replay" type="button">replay</button>
<svg viewBox="0 0 820 410" role="img" aria-label="The bootstrap in three stages. Stage one: an original sample of 12 scored items, some pass some fail. Stage two: a resample drawn with replacement from the same 12 items, where some items are duplicated and others are missing entirely, feeding a die icon labeled draw n indices with replacement. Stage three: each resample's recomputed statistic drops a dot that accumulates into a histogram; after many replicates the histogram approximates a bell shape, and the 2.5th and 97.5th percentile bins are marked lo and hi, bracketed as the percentile bootstrap 95 percent confidence interval.">
  <defs>
    <marker id="sbr-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>

    #fig-statrig-bootstrap-resample .legend{ font:500 8.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-bootstrap-resample .stat{ font:700 11px var(--mono,monospace); }
    #fig-statrig-bootstrap-resample .idx{ font:700 7px var(--mono,monospace); }

    #fig-statrig-bootstrap-resample .pctlbl{ font:500 7.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-bootstrap-resample .arrowlbl{ font:600 9px var(--sans,sans-serif); fill:var(--accent); }
    #fig-statrig-bootstrap-resample .cap{ font:600 10.5px var(--sans,sans-serif); }
    #fig-statrig-bootstrap-resample .tile-pass{ fill:var(--ink-soft); }
    #fig-statrig-bootstrap-resample .tile-fail{ fill:none; stroke:var(--ink-soft); stroke-width:1.5; }

        <text x="354" y="61" style="fill:var(--bg,#faf8f3)">9</text>

        <text x="294" y="91" style="fill:var(--bg,#faf8f3)">3</text>

        <text x="354" y="91" style="fill:var(--bg,#faf8f3)">9</text>
        <text x="384" y="91" style="fill:var(--bg,#faf8f3)">6</text>
        <text x="414" y="91" style="fill:var(--bg,#faf8f3)">2</text>

      <g stroke="var(--ink-soft)" stroke-width="1.3">
        <line x1="304" y1="64" x2="312" y2="72"/><line x1="312" y1="64" x2="304" y2="72"/>
        <line x1="334" y1="64" x2="342" y2="72"/><line x1="342" y1="64" x2="334" y2="72"/>
        <line x1="424" y1="64" x2="432" y2="72"/><line x1="432" y1="64" x2="424" y2="72"/>
      </g>

        <circle cx="282" cy="52" r="3"/>
        <circle cx="312" cy="52" r="3"/>
        <circle cx="342" cy="52" r="3"/>
        <circle cx="402" cy="82" r="3"/>
        <circle cx="272" cy="82" r="3"/>
        <circle cx="362" cy="82" r="3"/>
        <circle cx="432" cy="82" r="3"/>
      </g>
    </g>

    <text x="260" y="128" class="stat" style="fill:var(--accent)">resample stat = 9/12 = 0.75</text>
  </g>


  <g data-anim="3">
    <path d="M450,120 C 520,150 560,150 620,168" fill="none" stroke="var(--accent)"
          stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#sbr-arrow)"/>
    <text x="465" y="142" class="arrowlbl">recompute stat -&gt;</text>
    <text x="465" y="153" class="arrowlbl">drop a dot</text>
    <circle cx="630" cy="171" r="4.5" fill="var(--accent)" class="viz-pulse"/>

    <text x="518" y="24" class="title">3. bootstrap distribution</text>
    <text x="518" y="38" class="legend">each dot = one resample stat</text>
    <text x="518" y="49" class="legend">replicate b = 1 ... B = 10,000</text>
  </g>


  <g data-anim="4">
    <line x1="518" y1="290" x2="808" y2="290" stroke="var(--v-grid)" stroke-width="1.2"/>
    <g stroke="var(--v-grid)" stroke-width="1.1">

        <rect x="541" y="276" width="18" height="14" fill="var(--accent)" opacity="0.32" stroke="none"/>

        <rect x="788" y="283" width="18" height="7"/>
      </g>
      <g fill="none">
        <rect x="522" y="284" width="18" height="6"/>
        <rect x="541" y="276" width="18" height="14"/>
        <rect x="560" y="264" width="18" height="26"/>
        <rect x="579" y="248" width="18" height="42"/>

    <path d="M541 132 h-6 M541 132 V138 M541 138 H788 M788 138 V132 M788 132 h6" fill="none"

    <line x1="645" y1="152" x2="645" y2="300" stroke="var(--ink-soft)" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>

    <text x="541" y="304" text-anchor="middle" class="axlbl">lo</text>

    <rect x="14" y="346" width="792" height="32" rx="8" class="v-fill v-grid" stroke-width="1"/>
    <text x="410" y="367" text-anchor="middle" class="cap">no distributional assumptions -- works for accuracy, Elo, F1, p90 latency</text>

</svg>
<figcaption><b>The bootstrap: resample with replacement, recompute, repeat thousands of times.</b> Each replicate redraws the original items with replacement (so some items are duplicated and others dropped), recomputes the statistic, and drops one more dot into the histogram; the 2.5th and 97.5th percentiles of the accumulated cloud are the 95% confidence interval, with no assumption about the underlying distribution.</figcaption>
</figure>
