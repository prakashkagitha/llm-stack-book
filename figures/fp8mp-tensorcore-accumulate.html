<figure class="viz" id="fig-fp8mp-tensorcore-accumulate">
<button class="viz-replay" type="button">&#8635; replay</button>

<svg viewBox="0 0 940 310" role="img"
     aria-label="Tensor core pipeline: bf16 A and B inputs feed a bf16 multiply stage; the partial products stream into a tall fp32 accumulator box; one round node casts back to bf16 C.">
<defs>
  <marker id="tca" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1L9 5L0 9z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <style>
    #fig-fp8mp-tensorcore-accumulate text { fill:var(--ink-soft,#334155); }
    #fig-fp8mp-tensorcore-accumulate .H  { font:700 13px var(--sans,sans-serif); }
    #fig-fp8mp-tensorcore-accumulate .S  { font:400 9px var(--mono,monospace); fill:var(--muted,#94a3b8); }
    #fig-fp8mp-tensorcore-accumulate .C  { font:500 8.5px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-fp8mp-tensorcore-accumulate .EL { font:400 8px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-fp8mp-tensorcore-accumulate .RL { font:700 8px var(--sans,sans-serif); letter-spacing:.05em; }
    @keyframes tca-in  { from{opacity:0}to{opacity:1} }
    @keyframes tca-acc { 0%{fill-opacity:.08}100%{fill-opacity:1} }
    @keyframes tca-tok {
      0%  {transform:translateX(0);   opacity:0}
      10% {opacity:.9}
      80% {opacity:.9}
      100%{transform:translateX(200px);opacity:0}
    }
    @media(prefers-reduced-motion:reduce){
      #fig-fp8mp-tensorcore-accumulate [data-anim]{opacity:1!important;animation:none!important}
      #fig-fp8mp-tensorcore-accumulate .tok{display:none}
    }
    #fig-fp8mp-tensorcore-accumulate [data-anim="1"]{opacity:0;animation:tca-in .4s .1s  both}
    #fig-fp8mp-tensorcore-accumulate [data-anim="2"]{opacity:0;animation:tca-in .4s .65s both}
    #fig-fp8mp-tensorcore-accumulate [data-anim="3"]{opacity:0;animation:tca-in .4s 1.2s both}
    #fig-fp8mp-tensorcore-accumulate [data-anim="4"]{opacity:0;animation:tca-in .4s 2.6s both}
    #fig-fp8mp-tensorcore-accumulate [data-anim="5"]{opacity:0;animation:tca-in .4s 3.1s both}
    #fig-fp8mp-tensorcore-accumulate .acc-bg{
      fill:var(--accent,#6366f1);fill-opacity:.08;
      animation:tca-acc 1.1s 1.25s both}
    #fig-fp8mp-tensorcore-accumulate .tok{fill:var(--accent,#6366f1);opacity:0}
    #fig-fp8mp-tensorcore-accumulate .t1{animation:tca-tok .55s 1.25s both}
    #fig-fp8mp-tensorcore-accumulate .t2{animation:tca-tok .55s 1.52s both}
    #fig-fp8mp-tensorcore-accumulate .t3{animation:tca-tok .55s 1.79s both}
    #fig-fp8mp-tensorcore-accumulate .t4{animation:tca-tok .55s 2.06s both}
    #fig-fp8mp-tensorcore-accumulate .t5{animation:tca-tok .55s 2.33s both}
  </style>
</defs>


<rect x="14"  y="272" width="132" height="12" rx="3" fill="var(--surface-3,#f1f5f9)" opacity=".9"/>
<text x="80"  y="281" text-anchor="middle" class="RL" fill="var(--muted,#94a3b8)">16-bit</text>

<rect x="194" y="272" width="172" height="12" rx="3" fill="var(--surface-3,#f1f5f9)" opacity=".9"/>
<text x="280" y="281" text-anchor="middle" class="RL" fill="var(--muted,#94a3b8)">16-bit</text>

<rect x="410" y="272" width="240" height="12" rx="3" fill="var(--accent,#6366f1)" fill-opacity=".12"/>
<text x="530" y="281" text-anchor="middle" class="RL" fill="var(--accent,#6366f1)">32-bit wide accumulator</text>

<rect x="814" y="272" width="98" height="12" rx="3" fill="var(--surface-3,#f1f5f9)" opacity=".9"/>
<text x="863" y="281" text-anchor="middle" class="RL" fill="var(--muted,#94a3b8)">16-bit</text>


<g data-anim="1">
  
  <rect x="14" y="40" width="132" height="64" rx="7"
        fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="80" y="65" text-anchor="middle" class="H" fill="var(--accent,#6366f1)">bf16 A</text>
  <text x="80" y="81" text-anchor="middle" class="S">[4096 x 4096]</text>
  <text x="80" y="96" text-anchor="middle" class="C">narrow (16-bit)</text>
  
  <rect x="14" y="178" width="132" height="64" rx="7"
        fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="80" y="203" text-anchor="middle" class="H" fill="var(--accent,#6366f1)">bf16 B</text>
  <text x="80" y="219" text-anchor="middle" class="S">[4096 x 4096]</text>
  <text x="80" y="234" text-anchor="middle" class="C">narrow (16-bit)</text>
</g>


<g data-anim="2">
  <line x1="146" y1="72"  x2="192" y2="148" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#tca)"/>
  <line x1="146" y1="210" x2="192" y2="162" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#tca)"/>
</g>


<g data-anim="2">
  <rect x="194" y="124" width="172" height="62" rx="8"
        fill="var(--accent2,#3b82f6)" fill-opacity=".10"
        stroke="var(--accent2,#3b82f6)" stroke-width="1.5"/>
  <text x="280" y="149" text-anchor="middle" class="H" font-size="12">multiply in bf16</text>
  <text x="280" y="165" text-anchor="middle" class="S">a_ik x b_kj  (per pair)</text>
  <text x="280" y="179" text-anchor="middle" class="C">many products</text>
</g>


<g data-anim="3">
  <line x1="368" y1="155" x2="408" y2="155"
        stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#tca)"/>
</g>

<circle class="tok t1" cx="375" cy="155" r="3.5"/>
<circle class="tok t2" cx="375" cy="155" r="3.5"/>
<circle class="tok t3" cx="375" cy="155" r="3.5"/>
<circle class="tok t4" cx="375" cy="155" r="3.5"/>
<circle class="tok t5" cx="375" cy="155" r="3.5"/>


<g data-anim="3">
  <rect x="410" y="72" width="240" height="164" rx="10"
        class="acc-bg" stroke="var(--accent,#6366f1)" stroke-width="2.5"/>
  <text x="530" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="white">accumulate in FP32</text>
  <text x="530" y="131" text-anchor="middle" class="S" fill="white" fill-opacity=".85" font-size="9">sum of 4096 partial products</text>
  <line x1="530" y1="192" x2="530" y2="208"
        stroke="white" stroke-opacity=".55" stroke-width="1.1" marker-end="url(#tca)"/>
  <text x="530" y="222" text-anchor="middle" class="EL" fill="white" fill-opacity=".65" font-size="8">4096 products summed here</text>
</g>


<g data-anim="4">
  <line x1="652" y1="154" x2="694" y2="154"
        stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#tca)"/>
  <text x="673" y="142" text-anchor="middle" class="EL">fp32</text>
</g>


<g data-anim="4">
  <rect x="696" y="128" width="72" height="52" rx="26"
        fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="732" y="150" text-anchor="middle" class="H" font-size="11">round</text>
  <text x="732" y="167" text-anchor="middle" class="S" font-size="8">fp32-&gt;bf16</text>
</g>


<g data-anim="5">
  <line x1="770" y1="154" x2="812" y2="154"
        stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#tca)"/>
  <text x="791" y="143" text-anchor="middle" class="EL">cast</text>
</g>


<g data-anim="5">
  <rect x="814" y="112" width="98" height="84" rx="7"
        fill="var(--surface,#fff)" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="863" y="142" text-anchor="middle" class="H" font-size="14" fill="var(--good,#2f9e6e)">bf16 C</text>
  <text x="863" y="157" text-anchor="middle" class="S">result tile</text>
  <text x="863" y="172" text-anchor="middle" class="C">narrow (16-bit)</text>
  <text x="863" y="188" text-anchor="middle" class="C" fill="var(--good,#2f9e6e)" font-size="7.5" font-style="italic">rounded once</text>
</g>
</svg>
<figcaption><b>Tensor cores: narrow inputs, wide fp32 accumulator.</b> Both bf16 input matrices multiply pair-by-pair in bf16, but all 4096 partial products accumulate in fp32 inside the hardware. Only one rounding step happens at the very end when the fp32 sum is cast back to bf16 — this single late rounding is why low-precision matmul remains numerically tolerable.</figcaption>
</figure>
