<svg viewBox="0 0 920 300" role="img" aria-label="Terminal-only reward: a prompt feeds left-to-right autoregressive token generation a0 through aT; every intermediate reward r_t equals zero; only at EOS does a verifier emit the single scalar r, which becomes the advantage signal for all tokens.">

    #fig-advkl-terminal-reward-rollout .muted { fill: var(--muted,#888); }
    #fig-advkl-terminal-reward-rollout .accent { fill: var(--accent,#c0392b); }

    #fig-advkl-terminal-reward-rollout .eos-arrow { stroke-dasharray: 120; stroke-dashoffset: 120; transition: stroke-dashoffset 0.45s ease; }
    #fig-advkl-terminal-reward-rollout .eos-arrow.drawn { stroke-dashoffset: 0; }

  <text x="824" y="128" text-anchor="middle" class="lbl accent" fill="var(--accent,#c0392b)" style="font:700 22px var(--sans,sans-serif)">r</text>

<text x="460" y="235" text-anchor="middle" class="cap" style="font:italic 11px var(--sans,sans-serif)">One scalar per rollout becomes the per-token advantage signal for all of a0...aT</text>
</svg>

<figcaption><b>Sparse, terminal reward: the defining constraint for RL-on-LLMs.</b> A prompt produces tokens a0&amp;thinsp;&amp;hellip;&amp;thinsp;aT autoregressively; every intermediate reward r_t is exactly 0, and only the final EOS step delivers a single scalar r from the verifier or reward model. All three advantage estimators (MC/RLOO, GAE, GRPO) must propagate this one number back to per-token advantages &amp;mdash; there is no dense per-step signal to bootstrap from.</figcaption>
</figure>
