<figcaption><b>Superposition packs many more features than dimensions by making them almost, not exactly, orthogonal.</b> Panel A shows the idealized case: <code>d</code> perpendicular axes hold exactly <code>d</code> readable features. Panel B shows what a real network does: many more unit directions are crammed into the same space at small angles (bounded interference <code>&lt;v_i,v_j&gt; &lt;= eps</code>), and sparsity — only a few features active per token — keeps the resulting interference small. Panel C shows the payoff for interpretability: because the packing is non-orthogonal, a single neuron's coordinate axis has non-zero overlap with several unrelated features, so it fires for all of them — the neuron is polysemantic because the underlying feature <em>directions</em>, not neurons, are the real unit of computation.</figcaption>
</figure>
