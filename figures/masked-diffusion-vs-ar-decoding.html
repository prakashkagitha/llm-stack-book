<figure class="viz" id="fig-masked-diffusion-vs-ar-decoding">
<button class="viz-replay" type="button">/replay</button>

<defs>
  <marker id="mdArrow" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">

<figcaption><b>Two ways to factor the same generation problem: strict order vs. confidence order.</b> Autoregressive decoding fills one slot per step in fixed left-to-right order (L steps for L tokens). Masked diffusion starts fully masked and unmasks a scattered, most-confident subset in parallel each pass, finishing in K &lt;&lt; L passes -- and because any span can be re-masked and regenerated, it gets natural infilling/editing that autoregression cannot do without resampling everything downstream.</figcaption>
</figure>
