<figure class="viz" id="fig-flywheel-six-stage-loop">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 520" role="img" aria-label="The Data Flywheel: six stages arranged in a clockwise ring — SERVE (Model vN), LOG, LABEL/SCORE, RETRAIN, EVAL-GATED GATE, DEPLOY (Model vN+1) — with a pulse animation traveling the loop to convey continuous self-reinforcement.">
<defs>

  </marker>

  <path id="fl6-p2" d="M 555,143 Q 592,218 555,285"/>
  <path id="fl6-p3" d="M 528,335 Q 520,387 483,401"/>
  <path id="fl6-p4" d="M 453,432 Q 380,462 293,432"/>
  <path id="fl6-p5" d="M 191,394 Q 167,344 175,294"/>
  <path id="fl6-p6" d="M 182,242 Q 197,154 233,127"/>
  <style>
    @media (prefers-reduced-motion: reduce) {
      .fl6-pulse { animation: none !important; opacity: 0 !important; }
    }
    #fig-flywheel-six-stage-loop .nt {
      font: 700 13px var(--sans,sans-serif);
    }
    #fig-flywheel-six-stage-loop .ns {
      font: 400 10.5px var(--sans,sans-serif);
    }
    #fig-flywheel-six-stage-loop .nc {
      font: 400 9px var(--sans,sans-serif);
    }
    #fig-flywheel-six-stage-loop .ct {
      font: 800 17px var(--sans,sans-serif);
    }
    #fig-flywheel-six-stage-loop .cs {
      font: 400 11px var(--sans,sans-serif);
    }
  </style>
</defs>

</circle>
<circle class="fl6-pulse" r="7" fill="var(--accent,#4f46e5)" opacity="0">
  <animateMotion dur="7.2s" repeatCount="indefinite" begin="0s"><mpath href="#fl6-p3"/></animateMotion>
  <animate attributeName="opacity" dur="7.2s" repeatCount="indefinite" begin="0s"
    keyTimes="0;0.33;0.331;0.495;0.505;1" values="0;0;1;1;0;0"/>
</circle>
<circle class="fl6-pulse" r="7" fill="var(--accent,#4f46e5)" opacity="0">
  <animateMotion dur="7.2s" repeatCount="indefinite" begin="0s"><mpath href="#fl6-p4"/></animateMotion>

</circle>
<circle class="fl6-pulse" r="7" fill="var(--accent,#4f46e5)" opacity="0">
  <animateMotion dur="7.2s" repeatCount="indefinite" begin="0s"><mpath href="#fl6-p5"/></animateMotion>
  <animate attributeName="opacity" dur="7.2s" repeatCount="indefinite" begin="0s"
    keyTimes="0;0.67;0.671;0.83;0.84;1" values="0;0;1;1;0;0"/>
</circle>
<circle class="fl6-pulse" r="7" fill="var(--accent,#4f46e5)" opacity="0">
  <animateMotion dur="7.2s" repeatCount="indefinite" begin="0s"><mpath href="#fl6-p6"/></animateMotion>
  <animate attributeName="opacity" dur="7.2s" repeatCount="indefinite" begin="0s"

</circle>


<text x="380" y="244" text-anchor="middle" class="ct"
  fill="var(--accent,#4f46e5)">THE DATA FLYWHEEL</text>
<text x="380" y="264" text-anchor="middle" class="cs"
  fill="var(--muted,#888)">each loop = denser signal</text>


<g data-anim="1">
  <rect x="148" y="80" width="150" height="74" rx="8"
    fill="var(--surface-3,#ece7da)" stroke="var(--accent,#4f46e5)" stroke-width="2.5"/>
  <rect x="148" y="80" width="150" height="5" rx="3"
    fill="var(--accent,#4f46e5)"/>
  <text x="223" y="114" text-anchor="middle" class="nt"
    fill="var(--ink-soft,#45413a)">SERVE</text>
  <text x="223" y="130" text-anchor="middle" class="ns"
    fill="var(--ink-soft,#45413a)">Model vN</text>
  <text x="223" y="145" text-anchor="middle" class="nc"
    fill="var(--muted,#6d675d)">(current production)</text>
</g>


<g data-anim="2">
  <rect x="462" y="80" width="150" height="74" rx="8"
    fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  <rect x="462" y="80" width="150" height="5" rx="3"
    fill="var(--accent,#4f46e5)"/>
  <text x="537" y="114" text-anchor="middle" class="nt"
    fill="var(--ink-soft,#45413a)">LOG</text>
  <text x="537" y="130" text-anchor="middle" class="ns"
    fill="var(--ink-soft,#45413a)">requests, outputs,</text>
  <text x="537" y="146" text-anchor="middle" class="ns"
    fill="var(--ink-soft,#45413a)">signals</text>
</g>


<g data-anim="3">
  <rect x="565" y="272" width="162" height="74" rx="8"
    fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  <rect x="565" y="272" width="162" height="5" rx="3"
    fill="var(--accent,#4f46e5)"/>
  <text x="646" y="305" text-anchor="middle" class="nt"
    fill="var(--ink-soft,#45413a)">LABEL / SCORE</text>
  <text x="646" y="321" text-anchor="middle" class="ns"
    fill="var(--ink-soft,#45413a)">human + auto</text>
  <text x="646" y="336" text-anchor="middle" class="nc"
    fill="var(--muted,#6d675d)">(reward modeling)</text>
</g>


<g data-anim="4">
  <rect x="450" y="392" width="150" height="74" rx="8"
    fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  <rect x="450" y="392" width="150" height="5" rx="3"
    fill="var(--accent,#4f46e5)"/>
  <text x="525" y="424" text-anchor="middle" class="nt"
    fill="var(--ink-soft,#45413a)">RETRAIN</text>
  <text x="525" y="440" text-anchor="middle" class="ns"
    fill="var(--ink-soft,#45413a)">SFT + RLHF</text>
  <text x="525" y="456" text-anchor="middle" class="nc"
    fill="var(--muted,#6d675d)">(new candidate)</text>
</g>


<g data-anim="5">
  <rect x="148" y="392" width="150" height="74" rx="8"
    fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  <rect x="148" y="392" width="150" height="5" rx="3"
    fill="var(--accent,#4f46e5)"/>
  <text x="223" y="421" text-anchor="middle" class="nt"
    fill="var(--ink-soft,#45413a)">EVAL-GATED</text>
  <text x="223" y="437" text-anchor="middle" class="nt"
    fill="var(--ink-soft,#45413a)">GATE</text>
  <text x="223" y="455" text-anchor="middle" class="nc"
    fill="var(--muted,#6d675d)">(must pass before deploy)</text>
</g>


<g data-anim="6">
  <rect x="18" y="217" width="158" height="74" rx="8"
    fill="var(--surface-3,#ece7da)" stroke="var(--accent,#4f46e5)" stroke-width="2.5"/>
  <rect x="18" y="217" width="158" height="5" rx="3"
    fill="var(--accent,#4f46e5)"/>
  <text x="97" y="250" text-anchor="middle" class="nt"
    fill="var(--ink-soft,#45413a)">DEPLOY</text>
  <text x="97" y="266" text-anchor="middle" class="ns"
    fill="var(--ink-soft,#45413a)">Model vN+1</text>
  <text x="97" y="282" text-anchor="middle" class="nc"
    fill="var(--muted,#6d675d)">(new production)</text>
</g>

</svg>
<figcaption><b>The data flywheel is a closed, self-reinforcing loop — not a pipeline.</b> Six stages cycle clockwise: the live model (v<i>N</i>) serves requests and logs them; logs are labeled or scored by human reviewers and automated proxies; scored data retrains a new candidate via SFT and RLHF; the candidate must pass an eval gate before it is deployed as v<i>N</i>+1; and the newly deployed model begins generating the next round of richer training signal. The animated pulse conveys the continuous, compounding circulation of data through the system.</figcaption>
</figure>
