<figcaption><b>User turns are masked (label = -100); only assistant turns contribute to the loss.</b> All six segments share a single packed token sequence — the loss mask zeros the gradient for every user turn while leaving assistant spans fully supervised. The left spine illustrates that causal self-attention still reaches across masked turns: masking removes gradient, not context.</figcaption>
