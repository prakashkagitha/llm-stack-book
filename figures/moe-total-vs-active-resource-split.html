<figure class="viz" id="fig-moe-total-vs-active-resource-split">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 428" role="img" aria-label="A shared trunk plus a bank of eight expert FFNs: total parameters counts the trunk plus all eight experts, active parameters counts the trunk plus only the two selected experts, giving a total-to-active ratio of four times; three resource meters show quality and memory tracking total parameters while latency tracks only active parameters.">
<defs>
  <marker id="trs-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-stroke" fill="currentColor"/>
  </marker>
  <marker id="trs-arrow-ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
  </marker>
</defs>
<style>
  #fig-moe-total-vs-active-resource-split text { font: 12px var(--sans, sans-serif); fill: var(--ink-soft); }
  #fig-moe-total-vs-active-resource-split .note   { font: italic 10.5px var(--sans, sans-serif); fill: var(--muted); }
  #fig-moe-total-vs-active-resource-split .hdr    { font: 700 13px var(--sans, sans-serif); }
  #fig-moe-total-vs-active-resource-split .sm     { font: 10px var(--sans, sans-serif); fill: var(--muted); }
  #fig-moe-total-vs-active-resource-split .sm-c   { font: 700 10px var(--sans, sans-serif); }
  #fig-moe-total-vs-active-resource-split .boxlbl { font: 700 11px var(--mono, monospace); }
  #fig-moe-total-vs-active-resource-split .mlbl   { font: 700 12px var(--sans, sans-serif); }
  #fig-moe-total-vs-active-resource-split .mnote  { font: 10.5px var(--sans, sans-serif); fill: var(--muted); }
  #fig-moe-total-vs-active-resource-split .pun    { font: 700 12.5px var(--sans, sans-serif); }
</style>

<text x="400" y="16" text-anchor="middle" class="note">illustrative numbers only: E = 8 experts, k = 2 active per token (not a real model's parameter count)</text>

<line x1="410" y1="24" x2="410" y2="410" class="v-grid" stroke="currentColor" stroke-width="1" opacity="0.5"/>


<text x="205" y="36" text-anchor="middle" class="hdr">THE MODEL: total capacity vs. active compute</text>

<g data-anim="1">
  <rect x="40" y="46" width="330" height="38" rx="8" class="v-fill" stroke="var(--accent)" stroke-width="2"/>
  <text x="205" y="60" text-anchor="middle" class="sm-c" fill="var(--accent)" style="font-size:9.5px">shared: attn + embeddings + norms + head</text>
  <text x="205" y="75" text-anchor="middle" class="sm">(counted once -- every token uses it, always active)</text>
</g>


<g data-anim="2">
  <line x1="205" y1="84" x2="58"  y2="140" class="v-grid" stroke="currentColor" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.7"/>
  <line x1="205" y1="84" x2="100" y2="140" class="v-grid" stroke="currentColor" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.7"/>
  <line x1="205" y1="84" x2="142" y2="140" class="v-grid" stroke="currentColor" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.7"/>
  <line x1="205" y1="84" x2="268" y2="140" class="v-grid" stroke="currentColor" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.7"/>
  <line x1="205" y1="84" x2="310" y2="140" class="v-grid" stroke="currentColor" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.7"/>
  <line x1="205" y1="84" x2="352" y2="140" class="v-grid" stroke="currentColor" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.7"/>
  <line x1="205" y1="84" x2="184" y2="138" stroke="var(--accent)" stroke-width="2" marker-end="url(#trs-arrow-ac)"/>
  <line x1="205" y1="84" x2="226" y2="138" stroke="var(--accent)" stroke-width="2" marker-end="url(#trs-arrow-ac)"/>
</g>


<g data-anim="3">
  <rect x="40"  y="140" width="36" height="50" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="58"  y="169" text-anchor="middle" class="boxlbl">F1</text>
  <rect x="82"  y="140" width="36" height="50" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="100" y="169" text-anchor="middle" class="boxlbl">F2</text>
  <rect x="124" y="140" width="36" height="50" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="142" y="169" text-anchor="middle" class="boxlbl">F3</text>

  <rect x="166" y="140" width="36" height="50" rx="6" fill="var(--accent)" fill-opacity="0.88" stroke="var(--accent)" stroke-width="1.8"/>
  <rect x="166" y="140" width="36" height="50" rx="6" class="viz-pulse" fill="var(--accent)" fill-opacity="0.18"/>
  <text x="184" y="169" text-anchor="middle" class="boxlbl" fill="var(--surface)">F4</text>

  <rect x="208" y="140" width="36" height="50" rx="6" fill="var(--accent)" fill-opacity="0.88" stroke="var(--accent)" stroke-width="1.8"/>
  <rect x="208" y="140" width="36" height="50" rx="6" class="viz-pulse" fill="var(--accent)" fill-opacity="0.18"/>
  <text x="226" y="169" text-anchor="middle" class="boxlbl" fill="var(--surface)">F5</text>

  <rect x="250" y="140" width="36" height="50" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="268" y="169" text-anchor="middle" class="boxlbl">F6</text>
  <rect x="292" y="140" width="36" height="50" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="310" y="169" text-anchor="middle" class="boxlbl">F7</text>
  <rect x="334" y="140" width="36" height="50" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="352" y="169" text-anchor="middle" class="boxlbl">F8</text>

  <text x="205" y="185" text-anchor="middle" class="sm" fill="var(--surface)" opacity="0">.</text>
</g>


<g data-anim="4">
  <path d="M40,194 L40,201 L370,201 L370,194" fill="none" class="v-stroke" stroke="currentColor" stroke-width="1.4"/>
  <text x="205" y="216" text-anchor="middle" class="sm-c">TOTAL params = shared + all E=8 experts</text>
  <text x="205" y="229" text-anchor="middle" class="sm">(capacity / knowledge)</text>
</g>


<g data-anim="5">
  <path d="M166,240 L166,247 L244,247 L244,240" fill="none" stroke="var(--accent)" stroke-width="1.6"/>
  <text x="205" y="262" text-anchor="middle" class="sm-c" fill="var(--accent)">ACTIVE = shared + these k=2 experts</text>
  <text x="205" y="275" text-anchor="middle" class="sm">(what ONE token uses -&gt; FLOPs / latency)</text>
</g>


<g data-anim="5">
  <text x="205" y="298" text-anchor="middle" class="mlbl" fill="var(--accent)">total-to-active RATIO = E / k = 4x here</text>
  <rect x="115" y="306" width="180" height="13" rx="6.5" class="v-fill v-stroke" stroke-width="1.2"/>
  <rect x="115" y="306" width="76.8" height="13" rx="6.5" fill="var(--accent)" fill-opacity="0.85"/>
  <circle cx="191.8" cy="312.5" r="5.5" fill="var(--accent)" stroke="var(--surface)" stroke-width="1.3"/>
  <text x="118" y="330" class="sm">1x</text>
  <text x="292" y="330" text-anchor="end" class="sm">8x</text>
  <text x="205" y="345" text-anchor="middle" class="note" style="font-size:9.5px">the sparsity dial -- bigger E/k, more capacity per FLOP</text>
</g>


<text x="605" y="36" text-anchor="middle" class="hdr">THREE RESOURCE METERS</text>

<line x1="515" y1="52" x2="515" y2="288" class="v-grid" stroke="currentColor" stroke-width="1.1" stroke-dasharray="4 3" opacity="0.8"/>
<text x="517" y="51" class="sm" fill="var(--accent)">k/E = 2/8 = 25% boundary</text>


<g data-anim="6">
  <text x="440" y="66" class="mlbl">QUALITY / capacity  -&gt;  tracks TOTAL</text>
  <rect x="440" y="74" width="300" height="20" rx="10" class="v-fill v-stroke" stroke-width="1.2"/>
  <rect x="440" y="74" width="300" height="20" rx="10" fill="var(--accent)" fill-opacity="0.82"/>
  <text x="736" y="89" text-anchor="end" class="sm" fill="var(--surface)">= E</text>
  <text x="440" y="112" class="mnote">fill reaches the full expert bank:</text>
  <text x="440" y="126" class="mnote">quality tracks TOTAL parameters.</text>
</g>


<g data-anim="7">
  <text x="440" y="158" class="mlbl">LATENCY / FLOPs per token  -&gt;  tracks ACTIVE</text>
  <rect x="440" y="166" width="300" height="20" rx="10" class="v-fill v-stroke" stroke-width="1.2"/>
  <rect x="440" y="166" width="75" height="20" rx="10" fill="var(--accent)" fill-opacity="0.82"/>
  <text x="524" y="181" class="sm" fill="var(--accent)">= k, stops here</text>
  <text x="440" y="204" class="mnote">fill stops at k/E of the track:</text>
  <text x="440" y="218" class="mnote">decodes like a small dense model.</text>
</g>


<g data-anim="8">
  <text x="440" y="250" class="mlbl">MEMORY / HBM  -&gt;  tracks TOTAL</text>
  <rect x="440" y="258" width="300" height="20" rx="10" class="v-fill v-stroke" stroke-width="1.2"/>
  <rect x="440" y="258" width="300" height="20" rx="10" fill="var(--accent)" fill-opacity="0.82"/>
  <text x="736" y="273" text-anchor="end" class="sm" fill="var(--surface)">= E</text>
  <text x="440" y="296" class="mnote">all experts must stay resident:</text>
  <text x="440" y="310" class="mnote">any token can route anywhere.</text>
</g>


<g data-anim="9">
  <rect x="30" y="358" width="740" height="58" rx="10" fill="var(--accent)" fill-opacity="0.10" stroke="var(--accent)" stroke-width="1.6"/>
  <text x="400" y="382" text-anchor="middle" class="pun">You get TOTAL capacity at ACTIVE compute -- but you pay TOTAL memory.</text>
  <text x="400" y="401" text-anchor="middle" class="pun">So compare MoE to dense models by ACTIVE params or by FLOPs, never by total.</text>
</g>

</svg>
<figcaption><b>The sparsity dial, made visual: total capacity vs. active compute.</b> A shared trunk (attention, embeddings, norms, head) is counted once and is always active; the bank of E=8 expert FFNs is where <b>total parameters</b> (capacity) diverges from <b>active parameters</b> (the k=2 experts one token actually runs, driving FLOPs and latency). The three meters on the right show why this matters for serving: quality and memory both track TOTAL, but latency tracks only ACTIVE -- so a sparse model can decode as fast as a much smaller dense one while still needing enough HBM to hold every expert.</figcaption>
</figure>
