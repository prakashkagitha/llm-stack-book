<figure class="viz" id="fig-cpt-replay-two-curve-diagnostic">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 820 500" role="img" aria-label="A line chart showing new-domain loss falling steadily as CPT tokens increase, plotted against a family of three base-domain loss curves for replay ratios r=0, r=0.05, and r=0.30. r=0 climbs monotonically and keeps rising, an unhealthy sign of forgetting; r=0.05 rises briefly then plateaus, a healthy pattern; r=0.30 stays nearly flat, a heavy anchor with diminishing extra benefit. A dashed horizontal line marks the step-zero base loss for reference, and a caption box states the diagnostic rule: raise replay ratio r or lower the re-warm peak if base loss climbs monotonically.">
<defs>
  <marker id="cptr-arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
  </marker>
</defs>
<style>
  #fig-cpt-replay-two-curve-diagnostic text        { fill: var(--ink-soft); }
  #fig-cpt-replay-two-curve-diagnostic .title       { font: 700 15px var(--sans,sans-serif); fill: var(--ink); }
  #fig-cpt-replay-two-curve-diagnostic .axis-lbl    { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-cpt-replay-two-curve-diagnostic .ref-lbl     { font: 400 9px var(--sans,sans-serif); fill: var(--muted); font-style: italic; }
  #fig-cpt-replay-two-curve-diagnostic .panel-hdr   { font: 700 10.5px var(--sans,sans-serif); fill: var(--ink); }
  #fig-cpt-replay-two-curve-diagnostic .row-lbl     { font: 600 10px var(--sans,sans-serif); }
  #fig-cpt-replay-two-curve-diagnostic .cap-txt     { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-cpt-replay-two-curve-diagnostic .cap-lead    { font: 700 11px var(--sans,sans-serif); fill: var(--ink); }

  #fig-cpt-replay-two-curve-diagnostic .grid        { stroke: var(--v-grid,var(--border-2)); stroke-width: 1; }
  #fig-cpt-replay-two-curve-diagnostic .axis        { stroke: var(--muted); stroke-width: 1.3; }
  #fig-cpt-replay-two-curve-diagnostic .divider     { stroke: var(--border-2); stroke-width: 1; }
  #fig-cpt-replay-two-curve-diagnostic .ref-line    { stroke: var(--muted); stroke-width: 1.2; stroke-dasharray: 3 3; opacity: .7; }

  #fig-cpt-replay-two-curve-diagnostic .curve       { fill: none; stroke-linecap: round; }
  #fig-cpt-replay-two-curve-diagnostic .curve-new   { stroke: var(--accent); stroke-width: 3; }
  #fig-cpt-replay-two-curve-diagnostic .curve-r0    { stroke: var(--v-muted,var(--muted)); stroke-width: 2.4; }
  #fig-cpt-replay-two-curve-diagnostic .curve-r05   { stroke: var(--v-muted,var(--muted)); stroke-width: 2; stroke-dasharray: 7 4; }
  #fig-cpt-replay-two-curve-diagnostic .curve-r30   { stroke: var(--v-muted,var(--muted)); stroke-width: 1.6; stroke-dasharray: 2 3; }

  #fig-cpt-replay-two-curve-diagnostic .leader      { stroke: var(--muted); stroke-width: 1; stroke-dasharray: 2 2; opacity: .6; }
  #fig-cpt-replay-two-curve-diagnostic .dot         { }

  #fig-cpt-replay-two-curve-diagnostic .cap-box     { fill: var(--surface-3); stroke: var(--border-2); stroke-width: 1; }
  #fig-cpt-replay-two-curve-diagnostic .cap-bar     { fill: var(--accent2); opacity: .8; }
</style>

<text x="410" y="26" text-anchor="middle" class="title">Two-curve CPT diagnostic: new-domain loss vs. base-domain forgetting</text>

<line class="divider" x1="572" y1="52" x2="572" y2="380"/>

<g data-anim="1">
  
  <line class="grid" x1="90" y1="140" x2="560" y2="140"/>
  <line class="grid" x1="90" y1="220" x2="560" y2="220"/>
  <line class="grid" x1="90" y1="300" x2="560" y2="300"/>

  
  <line class="axis" x1="90" y1="60" x2="90" y2="380"/>
  <line class="axis" x1="90" y1="380" x2="560" y2="380" marker-end="url(#cptr-arr)"/>

  <text x="52" y="70" class="axis-lbl">loss</text>
  <path d="M52,76 L52,108" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#cptr-arr)"/>
  <text x="57" y="118" class="axis-lbl" font-style="italic">lower</text>

  <text x="325" y="398" text-anchor="middle" class="axis-lbl">CPT tokens -&gt;</text>
</g>

<g data-anim="2">
  
  <line class="ref-line" x1="90" y1="280" x2="560" y2="280"/>
  <text x="95" y="296" class="ref-lbl">step-0 base loss (reference) -- all base curves start here</text>
</g>

<g data-anim="3">
  
  <path class="curve curve-r0" d="M90,280 C230,260 380,205 560,170"/>
  <path class="curve curve-r05" d="M90,280 C130,248 175,255 230,255 C320,255 450,253 560,252"/>
  <path class="curve curve-r30" d="M90,280 C150,272 220,270 300,270 C380,270 480,269 560,268"/>

  <circle cx="560" cy="170" r="3" fill="var(--v-muted,var(--muted))"/>
  <circle cx="560" cy="252" r="3" fill="var(--v-muted,var(--muted))"/>
  <circle cx="560" cy="268" r="3" fill="var(--v-muted,var(--muted))"/>
</g>

<g data-anim="4">
  
  <path class="curve curve-new" d="M90,110 C250,130 380,260 560,335"/>
  <circle cx="560" cy="335" r="3.2" fill="var(--accent)"/>
</g>

<g data-anim="5">
  <text x="585" y="70" class="panel-hdr">Base-domain (replay ratio r)</text>

  
  <line class="leader" x1="560" y1="170" x2="578" y2="106"/>
  <line x1="585" y1="106" x2="609" y2="106" stroke="var(--v-muted,var(--muted))" stroke-width="2.4" stroke-linecap="round"/>
  <text x="615" y="110" class="row-lbl" fill="var(--warn)">r=0: monotonic climb =</text>
  <text x="615" y="122" class="row-lbl" fill="var(--warn)">forgetting, unhealthy</text>

  
  <line class="leader" x1="560" y1="252" x2="578" y2="172"/>
  <line x1="585" y1="172" x2="609" y2="172" stroke="var(--v-muted,var(--muted))" stroke-width="2" stroke-dasharray="7 4" stroke-linecap="round"/>
  <text x="615" y="176" class="row-lbl" fill="var(--good)">r~5%: small rise then</text>
  <text x="615" y="188" class="row-lbl" fill="var(--good)">plateau = healthy</text>

  
  <line class="leader" x1="560" y1="268" x2="578" y2="238"/>
  <line x1="585" y1="238" x2="609" y2="238" stroke="var(--v-muted,var(--muted))" stroke-width="1.6" stroke-dasharray="2 3" stroke-linecap="round"/>
  <text x="615" y="242" class="row-lbl" fill="var(--ink-soft)">r~30%: heavy anchor,</text>
  <text x="615" y="254" class="row-lbl" fill="var(--ink-soft)">diminishing extra benefit</text>

  <text x="585" y="298" class="panel-hdr">New-domain loss</text>

  
  <line class="leader" x1="560" y1="335" x2="578" y2="322"/>
  <line x1="585" y1="322" x2="609" y2="322" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>
  <text x="615" y="326" class="row-lbl" fill="var(--accent)">new-domain loss: wants</text>
  <text x="615" y="338" class="row-lbl" fill="var(--accent)">to fall (plasticity)</text>
</g>

<g data-anim="5">
  <rect class="cap-bar" x="70" y="415" width="4" height="62" rx="2"/>
  <rect class="cap-box" x="78" y="415" width="727" height="62" rx="8"/>
  <text x="98" y="437" class="cap-lead">Healthy run: new-domain loss falls; base-domain loss rises slightly then plateaus.</text>
  <text x="98" y="456" class="cap-txt">If base loss climbs monotonically -&gt; raise the replay ratio r, or lower the re-warm peak.</text>
</g>

</svg>
<figcaption><b>New-domain loss should fall steadily while base-domain loss rises only slightly and then plateaus -- this is the single best diagnostic for a healthy continual-pretraining run.</b> The muted family shows the same base-domain metric under three replay ratios: with no replay (r=0) it climbs monotonically and never levels off, a sign of unopposed forgetting; a small replay fraction (r~5%) produces a brief rise that plateaus close to the step-0 reference; heavier replay (r~30%) barely moves it at all, illustrating the diminishing marginal benefit of replay past the first ~5-25%.</figcaption>
</figure>
