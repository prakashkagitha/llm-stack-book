<figure class="viz" id="fig-specdec-medusa-heads">
<style>
  #fig-specdec-medusa-heads text { fill: var(--ink-soft); }
  #fig-specdec-medusa-heads .lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-specdec-medusa-heads .sub  { font: 400 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-specdec-medusa-heads .cap  { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-specdec-medusa-heads .pill-lbl { font: 600 11px var(--mono,monospace); }
  #fig-specdec-medusa-heads .head-lbl { font: 700 12px var(--sans,sans-serif); }
  #fig-specdec-medusa-heads .head-sub { font: 400 9px var(--sans,sans-serif); fill: var(--muted); }
</style>
<svg viewBox="0 0 780 370" role="img" aria-label="Medusa fan-out architecture: from one hidden state h_t, the base LM head and four Medusa heads predict five successive token positions in parallel from a single forward pass.">
  <defs>
    <marker id="mh-arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#888)"/>
    </marker>
  </defs>

  
  <g data-anim="1">
    <rect x="240" y="18" width="300" height="54" rx="10"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.8"/>
    <text x="390" y="43" text-anchor="middle" class="lbl">final hidden state h_t</text>
    <text x="390" y="60" text-anchor="middle" class="sub">(from the frozen target)</text>
  </g>

  
  <line x1="390" y1="72" x2="390" y2="104"
        stroke="var(--muted,#888)" stroke-width="1.5" marker-end="url(#mh-arrow)"/>

  
  <line x1="74" y1="108" x2="706" y2="108"
        stroke="var(--muted,#888)" stroke-width="1.5"/>

  
  <text x="390" y="122" text-anchor="middle" class="cap">each = residual MLP -&gt; shared (frozen) unembedding</text>

  
  
  <line x1="74"  y1="108" x2="74"  y2="136" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>
  <line x1="218" y1="108" x2="218" y2="136" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>
  <line x1="390" y1="108" x2="390" y2="136" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>
  <line x1="562" y1="108" x2="562" y2="136" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>
  <line x1="706" y1="108" x2="706" y2="136" stroke="var(--muted,#888)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>

  
  
  <g data-anim="2">
    <rect x="14" y="136" width="120" height="64" rx="8"
          fill="var(--accent,#4f46e5)" fill-opacity="0.15"
          stroke="var(--accent,#4f46e5)" stroke-width="2"/>
    <text x="74" y="162" text-anchor="middle" class="head-lbl" fill="var(--accent,#4f46e5)">base LM head</text>
    <text x="74" y="177" text-anchor="middle" class="head-sub">(original head)</text>
  </g>

  
  <g data-anim="2">
    <rect x="158" y="136" width="120" height="64" rx="8"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.12"
          stroke="var(--accent-2,#0891b2)" stroke-width="1.8"/>
    <text x="218" y="162" text-anchor="middle" class="head-lbl" fill="var(--accent-2,#0891b2)">Medusa-1</text>
    <text x="218" y="177" text-anchor="middle" class="head-sub">1-2 layer MLP</text>
  </g>

  
  <g data-anim="2">
    <rect x="330" y="136" width="120" height="64" rx="8"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.12"
          stroke="var(--accent-2,#0891b2)" stroke-width="1.8"/>
    <text x="390" y="162" text-anchor="middle" class="head-lbl" fill="var(--accent-2,#0891b2)">Medusa-2</text>
    <text x="390" y="177" text-anchor="middle" class="head-sub">1-2 layer MLP</text>
  </g>

  
  <g data-anim="2">
    <rect x="502" y="136" width="120" height="64" rx="8"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.12"
          stroke="var(--accent-2,#0891b2)" stroke-width="1.8"/>
    <text x="562" y="162" text-anchor="middle" class="head-lbl" fill="var(--accent-2,#0891b2)">Medusa-3</text>
    <text x="562" y="177" text-anchor="middle" class="head-sub">1-2 layer MLP</text>
  </g>

  
  <g data-anim="2">
    <rect x="646" y="136" width="120" height="64" rx="8"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.12"
          stroke="var(--accent-2,#0891b2)" stroke-width="1.8"/>
    <text x="706" y="162" text-anchor="middle" class="head-lbl" fill="var(--accent-2,#0891b2)">Medusa-4</text>
    <text x="706" y="177" text-anchor="middle" class="head-sub">1-2 layer MLP</text>
  </g>

  
  <line x1="74"  y1="200" x2="74"  y2="226" stroke="var(--muted,#888)" stroke-width="1.3" marker-end="url(#mh-arrow)"/>
  <line x1="218" y1="200" x2="218" y2="226" stroke="var(--muted,#888)" stroke-width="1.3" marker-end="url(#mh-arrow)"/>
  <line x1="390" y1="200" x2="390" y2="226" stroke="var(--muted,#888)" stroke-width="1.3" marker-end="url(#mh-arrow)"/>
  <line x1="562" y1="200" x2="562" y2="226" stroke="var(--muted,#888)" stroke-width="1.3" marker-end="url(#mh-arrow)"/>
  <line x1="706" y1="200" x2="706" y2="226" stroke="var(--muted,#888)" stroke-width="1.3" marker-end="url(#mh-arrow)"/>

  
  <g data-anim="3">
    
    <rect x="24" y="226" width="100" height="30" rx="14"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <text x="74" y="246" text-anchor="middle" class="pill-lbl">token t+1</text>

    
    <rect x="168" y="226" width="100" height="30" rx="14"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <text x="218" y="246" text-anchor="middle" class="pill-lbl">token t+2</text>

    
    <rect x="340" y="226" width="100" height="30" rx="14"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <text x="390" y="246" text-anchor="middle" class="pill-lbl">token t+3</text>

    
    <rect x="512" y="226" width="100" height="30" rx="14"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <text x="562" y="246" text-anchor="middle" class="pill-lbl">token t+4</text>

    
    <rect x="656" y="226" width="100" height="30" rx="14"
          fill="var(--surface,#f5f5f5)" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <text x="706" y="246" text-anchor="middle" class="pill-lbl">token t+5</text>
  </g>

  
  <g data-anim="1">
    <rect x="200" y="274" width="14" height="14" rx="3"
          fill="var(--accent,#4f46e5)" fill-opacity="0.3" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>
    <text x="220" y="285" class="cap">base head (original, frozen)</text>
    <rect x="420" y="274" width="14" height="14" rx="3"
          fill="var(--accent-2,#0891b2)" fill-opacity="0.25" stroke="var(--accent-2,#0891b2)" stroke-width="1.5"/>
    <text x="440" y="285" class="cap">Medusa heads 1-4 (trained, lightweight)</text>
  </g>

  
  <g data-anim="3">
    <text x="390" y="318" text-anchor="middle" class="cap">One forward pass -&gt; candidate distributions for the next 5 tokens at once.</text>
    <text x="390" y="334" text-anchor="middle" class="cap">Heads 2-5 do NOT see intermediate tokens (harder prediction), so Medusa proposes many candidates</text>
    <text x="390" y="350" text-anchor="middle" class="cap">and verifies them with tree attention.</text>
  </g>
</svg>
<figcaption><b>Medusa: parallel prediction heads from one hidden state.</b> A single forward pass of the frozen target produces hidden state h_t, which fans out to the base LM head plus four lightweight Medusa heads. Each head independently predicts a different future token position (t+1 through t+5), enabling candidate generation for five positions at once — but because heads do not condition on intermediate tokens, Medusa compensates by proposing top-k candidates per head and verifying via tree attention.</figcaption>
</figure>
