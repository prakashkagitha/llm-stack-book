<figure class="viz" id="fig-gated-linear-recurrence-convergence">
<svg viewBox="0 0 720 340" role="img" aria-label="One gated linear recurrence fans out to four architectures depending on the choice of gate: linear attention with no decay, RetNet with a constant gate, RWKV with an input-dependent scalar gate, and Mamba with a fully input-dependent gate.">
<defs>
  <marker id="glc-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
  </marker>
  <marker id="glc-arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--muted,#888)"/>
  </marker>
</defs>
<style>
  #fig-gated-linear-recurrence-convergence text { fill: var(--ink-soft,#333); font: 400 11px var(--sans,sans-serif); }
  #fig-gated-linear-recurrence-convergence .src-title { font: 700 13px var(--sans,sans-serif); text-anchor: middle; }
  #fig-gated-linear-recurrence-convergence .src-sub { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#888); text-anchor: middle; }
  #fig-gated-linear-recurrence-convergence .src-eq { font: 600 12.5px var(--mono,monospace); text-anchor: middle; fill: var(--ink-soft,#333); }
  #fig-gated-linear-recurrence-convergence .gate-txt { font: 500 9.5px var(--mono,monospace); text-anchor: middle; fill: var(--ink-soft,#333); }
  #fig-gated-linear-recurrence-convergence .arch-name { font: 700 12px var(--sans,sans-serif); text-anchor: middle; }
  #fig-gated-linear-recurrence-convergence .axis-txt { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#888); }
</style>

<text x="360" y="20" text-anchor="middle" style="font:700 14px var(--sans,sans-serif); fill:var(--ink-soft,#333);">One recurrence, four architectures</text>


<g data-anim="1">
<rect x="220" y="34" width="280" height="82" rx="10" fill="var(--surface,#fff)" stroke="var(--accent,#c15b39)" stroke-width="2"/>
<text x="360" y="52" class="src-title">Gated linear recurrence</text>
<text x="360" y="72" class="src-eq">S_t = G_t (o) S_{t-1} + k_t v_t^T</text>
<text x="360" y="90" class="src-eq">o_t = q_t S_t</text>
<text x="360" y="107" class="src-sub">one update, one readout -- only G_t changes</text>
</g>


<g data-anim="2" stroke="var(--accent,#c15b39)" stroke-width="1.6" fill="none">
  <path d="M 260 116 C 220 150, 120 165, 88 190" marker-end="url(#glc-arrow)"/>
  <path d="M 330 116 C 320 150, 275 165, 258 190" marker-end="url(#glc-arrow)"/>
  <path d="M 390 116 C 400 150, 445 165, 462 190" marker-end="url(#glc-arrow)"/>
  <path d="M 460 116 C 500 150, 580 165, 632 190" marker-end="url(#glc-arrow)"/>
</g>


<g data-anim="3">
<rect x="18" y="192" width="140" height="66" rx="14" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>
<text x="88" y="212" class="gate-txt">G_t = I</text>
<text x="88" y="226" class="gate-txt">(no decay)</text>
<text x="88" y="248" class="arch-name" fill="var(--ink-soft,#333)">Linear Attention</text>
</g>


<g data-anim="3">
<rect x="188" y="192" width="140" height="66" rx="14" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>
<text x="258" y="212" class="gate-txt">G_t = diag(gamma)</text>
<text x="258" y="226" class="gate-txt">(constant)</text>
<text x="258" y="248" class="arch-name" fill="var(--ink-soft,#333)">RetNet</text>
</g>


<g data-anim="3">
<rect x="392" y="192" width="140" height="66" rx="14" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>
<text x="462" y="209" class="gate-txt">G_t = diag(exp(-exp(w)))</text>
<text x="462" y="223" class="gate-txt">(input scalar / channel)</text>
<text x="462" y="248" class="arch-name" fill="var(--ink-soft,#333)">RWKV-style</text>
</g>


<g data-anim="3">
<rect x="562" y="192" width="140" height="66" rx="14" fill="var(--accent,#c15b39)" fill-opacity="0.12" stroke="var(--accent,#c15b39)" stroke-width="1.4"/>
<text x="632" y="209" class="gate-txt">G_t = diag(exp(Dt A))</text>
<text x="632" y="223" class="gate-txt">(fully input-dependent)</text>
<text x="632" y="248" class="arch-name" fill="var(--accent,#c15b39)">Mamba / selective SSM</text>
</g>


<g data-anim="4">
<line x1="30" y1="290" x2="690" y2="290" stroke="var(--muted,#888)" stroke-width="1.3" marker-end="url(#glc-arrow-muted)"/>
<text x="30" y="308" class="axis-txt">no gating</text>
<text x="690" y="308" text-anchor="end" class="axis-txt">fully input-dependent gating</text>
<text x="360" y="326" text-anchor="middle" class="axis-txt" style="font-style:italic;">gate expressiveness / cost --&gt;</text>
</g>

</svg>
<figcaption><b>Linear attention, RetNet, RWKV, and Mamba are the same recurrence with different gates.</b> Every architecture updates a matrix-valued state <code>S_t</code> with a gated decay <code>G_t</code> and reads it out with a query, differing only in how expressive (and how input-dependent) <code>G_t</code> is allowed to be, from a fixed identity to a fully data-dependent per-step decay.</figcaption>
</figure>
