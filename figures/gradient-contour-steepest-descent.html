<figure class="viz" id="fig-gradient-contour-steepest-descent">
<svg viewBox="0 0 760 650" role="img" aria-label="A loss contour map in the theta_1, theta_2 plane. Nested elliptical contours surround the minimum theta*. At a point P on a mid contour, the gradient arrow points radially outward (steepest ascent, perpendicular to the contour's tangent), the negative gradient points inward toward theta* (the gradient descent step), and an arbitrary direction u at an angle phi from the gradient has a shorter directional derivative equal to the cosine projection onto the gradient.">
<defs>
  <marker id="gcsd-arrow-accent" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent,#c15b39)"/>
  </marker>
  <marker id="gcsd-arrow-good" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="gcsd-arrow-muted" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>


<ellipse cx="330" cy="300" rx="70"  ry="54"  fill="none" stroke="var(--v-grid,#d8d1c0)" stroke-width="1.4"/>
<ellipse cx="330" cy="300" rx="120" ry="92"  fill="none" stroke="var(--v-grid,#d8d1c0)" stroke-width="1.4"/>
<ellipse cx="330" cy="300" rx="170" ry="131" fill="none" stroke="var(--v-grid,#d8d1c0)" stroke-width="1.4"/>
<ellipse cx="330" cy="300" rx="220" ry="169" fill="none" stroke="var(--v-grid,#d8d1c0)" stroke-width="1.6"/>


<circle cx="330" cy="300" r="4.5" fill="var(--accent,#c15b39)"/>
<text x="308" y="282" text-anchor="end" style="font:600 13px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">theta*</text>


<line x1="123.3" y1="357.8" x2="55" y2="410" stroke="var(--v-grid,#d8d1c0)" stroke-width="1"/>
<text x="20" y="424" style="font:500 12px var(--sans,sans-serif); fill:var(--muted,#6d675d)">higher loss</text>
<line x1="306" y1="350.7" x2="278" y2="384" stroke="var(--v-grid,#d8d1c0)" stroke-width="1"/>
<text x="248" y="398" style="font:500 12px var(--sans,sans-serif); fill:var(--muted,#6d675d)">lower loss</text>


<line x1="424.79" y1="180.7" x2="503.13" y2="257.9" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>


<circle cx="463.96" cy="219.3" r="3.5" fill="var(--ink-soft,#45413a)"/>
<text x="489" y="238" style="font:600 13px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">P</text>


<line x1="463.96" y1="219.3" x2="555.23" y2="126.73" stroke="var(--accent,#c15b39)" stroke-width="3" marker-end="url(#gcsd-arrow-accent)"/>
<text x="562" y="110" style="font:600 13px var(--sans,sans-serif); fill:var(--accent,#c15b39)">grad f</text>
<text x="562" y="126" style="font:600 13px var(--sans,sans-serif); fill:var(--accent,#c15b39)">(steepest ASCENT)</text>


<line x1="463.96" y1="219.3" x2="372.69" y2="311.87" stroke="var(--good,#2f9e6e)" stroke-width="3" marker-end="url(#gcsd-arrow-good)"/>
<text x="360" y="340" text-anchor="end" style="font:600 13px var(--sans,sans-serif); fill:var(--good,#2f9e6e)">-grad f</text>
<text x="360" y="356" text-anchor="end" style="font:600 13px var(--sans,sans-serif); fill:var(--good,#2f9e6e)">(gradient-descent step)</text>


<line x1="463.96" y1="219.3" x2="453.61" y2="109.8" stroke="var(--muted,#6d675d)" stroke-width="2" marker-end="url(#gcsd-arrow-muted)"/>
<line x1="453.61" y1="109.8" x2="420" y2="82" stroke="var(--muted,#6d675d)" stroke-width="1" opacity="0.6"/>
<text x="380" y="70" style="font:600 12px var(--sans,sans-serif); fill:var(--muted,#6d675d)">arbitrary direction u</text>


<line x1="453.61" y1="109.8" x2="513.62" y2="168.94" stroke="var(--ink-soft,#45413a)" stroke-width="1.3" stroke-dasharray="4,3"/>
<circle cx="513.62" cy="168.94" r="2.5" fill="var(--ink-soft,#45413a)"/>
<text x="340" y="146" style="font:600 12px var(--mono,monospace); fill:var(--ink-soft,#45413a)">D_u f =</text>
<text x="340" y="162" style="font:600 12px var(--mono,monospace); fill:var(--ink-soft,#45413a)">||grad f|| cos(phi)</text>


<text x="478" y="196" style="font:500 12px var(--sans,sans-serif); fill:var(--muted,#6d675d)">phi</text>


<rect x="480" y="380" width="235" height="46" rx="6" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
<text x="597" y="400" text-anchor="middle" style="font:500 12px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">gradient is perpendicular to</text>
<text x="597" y="417" text-anchor="middle" style="font:500 12px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">the contour lines</text>
<line x1="500" y1="380" x2="465" y2="250" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="2,2"/>


<line x1="50" y1="560" x2="50" y2="505" stroke="var(--v-stroke,#45413a)" stroke-width="1.4" marker-end="url(#gcsd-arrow-muted)"/>
<line x1="50" y1="560" x2="125" y2="560" stroke="var(--v-stroke,#45413a)" stroke-width="1.4" marker-end="url(#gcsd-arrow-muted)"/>
<text x="133" y="564" style="font:600 12px var(--sans,sans-serif); fill:var(--muted,#6d675d)">theta_1</text>
<text x="20" y="498" style="font:600 12px var(--sans,sans-serif); fill:var(--muted,#6d675d)">theta_2</text>


<text x="380" y="628" text-anchor="middle" style="font:500 12.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">descent is fastest when you move straight down the gradient (phi = 180 degrees)</text>

</svg>
<figcaption><b>The gradient always points perpendicular to the loss contours, uphill.</b> At any point P, grad f points radially outward toward higher loss (steepest ascent), so -grad f points straight toward the minimum theta* and is the direction gradient descent actually takes. Any other direction u makes an angle phi with the gradient and yields a strictly smaller rate of increase, D_u f = ||grad f|| cos(phi) — which is why moving exactly along -grad f (phi = 180 degrees) decreases the loss fastest.</figcaption>
</figure>
