<figcaption><b>Production multi-agent reference architecture as three stacked layers.</b> The Harness Layer enforces SLAs, cost limits, and reliability concerns before requests reach the Orchestration Layer, where an LLM-backed Planner/Orchestrator reads and writes a shared State/Blackboard and dispatches work to a nested Worker Pool of specialised agents (Coder, Searcher, Critic). Workers call down into the Tool/Resource Layer where code execution, search, databases, and MCP servers live.</figcaption>
</figure>
