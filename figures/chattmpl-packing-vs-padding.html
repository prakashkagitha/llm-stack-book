<figure class="viz" id="fig-chattmpl-packing-vs-padding">
<svg viewBox="0 0 800 430" role="img" aria-label="Side-by-side comparison of naive one-example-per-row padding versus first-fit sequence packing, batching the same five documents A through E into fixed-length rows. Naive padding uses five rows that are each mostly empty PAD space, roughly one third full. Packing concatenates the same five documents into just two rows, roughly four fifths full, with only a small trailing PAD sliver in the first bin.">
<defs>
  <pattern id="cpvp-pad-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
    <rect width="7" height="7" fill="var(--surface-3,#eee)"/>
    <line x1="0" y1="0" x2="0" y2="7" stroke="var(--border-2,#ccc)" stroke-width="2"/>
  </pattern>
</defs>
<style>
  #fig-chattmpl-packing-vs-padding text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-chattmpl-packing-vs-padding .title    { font: 700 14.5px var(--sans,sans-serif); }
  #fig-chattmpl-packing-vs-padding .sub      { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-chattmpl-packing-vs-padding .doc-lbl  { font: 700 12px var(--mono,monospace); fill: var(--accent2,#3b82f6); }
  #fig-chattmpl-packing-vs-padding .row-lbl  { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-chattmpl-packing-vs-padding .leg-lbl  { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-chattmpl-packing-vs-padding .brk-lbl  { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-chattmpl-packing-vs-padding .meter-cap{ font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-chattmpl-packing-vs-padding .take     { font: 700 13px var(--sans,sans-serif); }
</style>


<g data-anim="1">
  <rect x="272" y="12" width="14" height="14" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="291" y="23" class="leg-lbl">content (document tokens)</text>
  <rect x="470" y="12" width="14" height="14" rx="2" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="489" y="23" class="leg-lbl">PAD (empty slot)</text>
</g>


<g data-anim="2">
  <text x="20" y="54" class="title">Naive padding - one example per row</text>

  
  <line x1="60" y1="66" x2="60" y2="74" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <line x1="60" y1="70" x2="360" y2="70" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <line x1="360" y1="66" x2="360" y2="74" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <text x="210" y="86" text-anchor="middle" class="brk-lbl">max_length (fixed row width)</text>

  
  <rect x="60" y="94" width="88" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="104" y="111" text-anchor="middle" class="doc-lbl">A</text>
  <rect x="148" y="94" width="212" height="26" rx="3" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  
  <rect x="60" y="136" width="115" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="117" y="153" text-anchor="middle" class="doc-lbl">B</text>
  <rect x="175" y="136" width="185" height="26" rx="3" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  
  <rect x="60" y="178" width="79" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="99" y="195" text-anchor="middle" class="doc-lbl">C</text>
  <rect x="139" y="178" width="221" height="26" rx="3" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  
  <rect x="60" y="220" width="137" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="128" y="237" text-anchor="middle" class="doc-lbl">D</text>
  <rect x="197" y="220" width="163" height="26" rx="3" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  
  <rect x="60" y="262" width="66" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="93" y="279" text-anchor="middle" class="doc-lbl">E</text>
  <rect x="126" y="262" width="234" height="26" rx="3" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  
  <rect x="182" y="294" width="8" height="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.5"/>
  <rect x="194" y="294" width="8" height="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.5"/>
  <rect x="206" y="294" width="8" height="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.5"/>
  <rect x="218" y="294" width="8" height="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.5"/>
  <rect x="230" y="294" width="8" height="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.5"/>
  <text x="210" y="316" text-anchor="middle" class="row-lbl">5 rows for 5 documents</text>

  
  <text x="60" y="336" class="meter-cap" font-weight="700">Utilisation</text>
  <rect x="60" y="342" width="300" height="16" rx="3" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <rect x="60" y="342" width="97" height="16" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.45"/>
  <text x="60" y="376" class="meter-cap">content / total ~ 1/3 here -- naive padding on short</text>
  <text x="60" y="390" class="meter-cap">SFT examples is often this wasteful.</text>
</g>


<g data-anim="3">
  <text x="420" y="54" class="title">Packing - concatenate into fixed-length bins</text>

  
  <line x1="460" y1="66" x2="460" y2="74" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <line x1="460" y1="70" x2="760" y2="70" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <line x1="760" y1="66" x2="760" y2="74" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <text x="610" y="86" text-anchor="middle" class="brk-lbl">max_length (same fixed row width)</text>

  
  <text x="452" y="111" text-anchor="end" class="row-lbl">Bin 1</text>
  <rect x="460" y="94" width="88" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="504" y="111" text-anchor="middle" class="doc-lbl">A</text>
  <rect x="550" y="94" width="115" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="607" y="111" text-anchor="middle" class="doc-lbl">B</text>
  <rect x="667" y="94" width="79" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="706" y="111" text-anchor="middle" class="doc-lbl">C</text>
  <rect x="746" y="94" width="14" height="26" rx="2" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  
  <text x="452" y="153" text-anchor="end" class="row-lbl">Bin 2</text>
  <rect x="460" y="136" width="137" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="528" y="153" text-anchor="middle" class="doc-lbl">D</text>
  <rect x="599" y="136" width="66" height="26" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="632" y="153" text-anchor="middle" class="doc-lbl">E</text>
  <rect x="665" y="136" width="95" height="26" rx="3" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="712" y="153" text-anchor="middle" class="row-lbl" fill="var(--muted,#666)">PAD</text>

  
  <rect x="602" y="294" width="8" height="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.5"/>
  <rect x="614" y="294" width="8" height="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.5"/>
  <text x="610" y="316" text-anchor="middle" class="row-lbl">2 rows for the same 5 documents</text>

  
  <text x="460" y="336" class="meter-cap" font-weight="700">Utilisation</text>
  <rect x="460" y="342" width="300" height="16" rx="3" fill="url(#cpvp-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <rect x="460" y="342" width="242" height="16" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.45"/>
  <text x="460" y="376" class="meter-cap">content / total ~ 4/5 here -- real packed batches</text>
  <text x="460" y="390" class="meter-cap">typically reach ~90%+ utilisation.</text>
</g>


<g data-anim="4">
  <line x1="20" y1="404" x2="780" y2="404" stroke="var(--border-2,#ddd)" stroke-width="0.7" opacity="0.5"/>
  <text x="400" y="422" text-anchor="middle" class="take">Same tokens, far fewer rows - the model stops paying FLOPs for PAD.</text>
</g>

</svg>
<figcaption><b>Packing five unequal-length documents (A-E) into fixed-length rows dramatically raises utilisation compared with one-example-per-row padding.</b> Naive padding needs five rows that are each mostly empty PAD space; first-fit packing concatenates the same documents into two rows that are nearly full, with only a trailing PAD sliver in the last bin. Fewer, fuller rows mean the model spends far less compute attending to and predicting meaningless PAD tokens.</figcaption>
</figure>
