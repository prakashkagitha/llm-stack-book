<figure class="viz" id="fig-advkl-loss-aggregation-length">
<svg viewBox="0 0 760 560" role="img" aria-label="Comparison of token-mean versus sequence-mean loss aggregation for a short and a long correct completion of the same prompt. Token-mean gives the long completion about 75 percent of the gradient contribution, driving length inflation. Sequence-mean splits the gradient contribution 50-50 between the two completions regardless of length, which down-weights per-token gradient in the long completion.">
<defs>
  <style>
    #fig-advkl-loss-aggregation-length text { fill: var(--ink-soft,#444); }
    #fig-advkl-loss-aggregation-length .hdr { font: 700 13.5px var(--sans,sans-serif); }
    #fig-advkl-loss-aggregation-length .sub { font: 600 12px var(--sans,sans-serif); }
    #fig-advkl-loss-aggregation-length .lbl { font: 400 11px var(--sans,sans-serif); }
    #fig-advkl-loss-aggregation-length .tag { font: 600 11px var(--sans,sans-serif); }
    #fig-advkl-loss-aggregation-length .pct { font: 700 12px var(--mono,monospace); }
    #fig-advkl-loss-aggregation-length .take { font: 600 11.5px var(--sans,sans-serif); }
    #fig-advkl-loss-aggregation-length .cap { font: italic 11px var(--sans,sans-serif); fill: var(--ink-soft,#555); }
    #fig-advkl-loss-aggregation-length .muted-text { fill: var(--muted,#888); }
  </style>
</defs>

  <rect x="198" y="42" width="20" height="20" rx="3" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)"/>

  <rect x="246" y="76" width="20" height="20" rx="3" class="v-fill" fill="var(--accent,#c15b39)" fill-opacity="0.55" stroke="var(--accent,#c15b39)"/>

  <rect x="342" y="76" width="20" height="20" rx="3" class="v-fill" fill="var(--accent,#c15b39)" fill-opacity="0.55" stroke="var(--accent,#c15b39)"/>
</g>
<text x="372" y="90" class="lbl muted-text">9 boxes shown, illustrative</text>

<text x="635" y="50" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">each box: per-token loss</text>
<text x="635" y="65" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">identical in both -- pushes</text>
<text x="635" y="80" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">that token's prob UP</text>

<text x="190" y="162" text-anchor="middle" class="lbl muted-text">(sum over tokens / total tokens)</text>


<rect x="40" y="185" width="300" height="42" rx="6" fill="var(--surface-3,#eee)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<rect x="40" y="185" width="75" height="42" rx="0" fill="var(--accent2,#3b82f6)" fill-opacity="0.55"/>

<text x="227" y="209" text-anchor="middle" class="pct" fill="var(--ink-soft,#333)">75%</text>
<text x="77" y="245" text-anchor="middle" class="tag" fill="var(--accent2,#3b82f6)">short</text>
<text x="227" y="245" text-anchor="middle" class="tag" fill="var(--accent,#c15b39)">long (dominates)</text>

<rect x="30" y="270" width="320" height="70" rx="8" class="v-fill" fill="var(--accent,#c15b39)" fill-opacity="0.08" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
<text x="190" y="292" text-anchor="middle" class="take" fill="var(--accent,#c15b39)">long correct answers accrue more</text>
<text x="190" y="308" text-anchor="middle" class="take" fill="var(--accent,#c15b39)">total gradient -&gt; model learns</text>
<text x="190" y="324" text-anchor="middle" class="take" fill="var(--accent,#c15b39)">"longer = better" -&gt; length creeps UP</text>

<text x="190" y="368" text-anchor="middle" class="lbl">every token weighted equally in the batch;</text>
<text x="190" y="384" text-anchor="middle" class="lbl">the 200-token sequence supplies ~20x the tokens</text>
<text x="190" y="400" text-anchor="middle" class="lbl">of the 10-token one</text>


<text x="570" y="145" text-anchor="middle" class="hdr">Sequence-mean</text>
<text x="570" y="162" text-anchor="middle" class="lbl muted-text">(mean per sequence, then mean over sequences)</text>

<rect x="420" y="185" width="300" height="42" rx="6" fill="var(--surface-3,#eee)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<rect x="420" y="185" width="150" height="42" rx="0" fill="var(--accent2,#3b82f6)" fill-opacity="0.55"/>
<rect x="420" y="185" width="150" height="42" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.5"/>
<rect x="570" y="185" width="150" height="42" rx="0" fill="var(--accent,#c15b39)" fill-opacity="0.55"/>

<text x="645" y="209" text-anchor="middle" class="pct" fill="var(--ink-soft,#333)">50%</text>
<text x="495" y="245" text-anchor="middle" class="tag" fill="var(--accent2,#3b82f6)">short</text>
<text x="645" y="245" text-anchor="middle" class="tag" fill="var(--accent,#c15b39)">long</text>

<rect x="410" y="270" width="320" height="70" rx="8" class="v-fill" fill="var(--good,#2f9e6e)" fill-opacity="0.08" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
<text x="570" y="292" text-anchor="middle" class="take" fill="var(--good,#2f9e6e)">every response counts once --</text>
<text x="570" y="308" text-anchor="middle" class="take" fill="var(--good,#2f9e6e)">per-token gradient in the long chain</text>
<text x="570" y="324" text-anchor="middle" class="take" fill="var(--good,#2f9e6e)">is DOWN-weighted (can under-train)</text>

<text x="570" y="368" text-anchor="middle" class="lbl">each sequence's mean loss counts once,</text>
<text x="570" y="384" text-anchor="middle" class="lbl">regardless of length; the long sequence's</text>
<text x="570" y="400" text-anchor="middle" class="lbl">200 tokens each get ~20x less weight</text>


<line x1="20" y1="425" x2="740" y2="425" stroke="var(--border-2,#ccc)" stroke-width="1" opacity="0.5"/>
<text x="380" y="450" text-anchor="middle" class="lbl" style="font-style:italic">Same data, same per-token losses -- different gradient, different length dynamics.</text>
<text x="380" y="470" text-anchor="middle" class="lbl" style="font-style:italic">Find the loss-reduction line first when reading a codebase.</text>

</svg>
<figcaption><b>Token-mean vs sequence-mean loss aggregation for the same batch of two correct completions.</b> With identical per-token loss, token-mean lets the long completion supply roughly 3/4 of the gradient (proportional to its token count), which rewards length. Sequence-mean gives each response an equal 50/50 vote, which is length-neutral overall but shrinks the per-token gradient inside long, correct reasoning chains.</figcaption>
</figure>
