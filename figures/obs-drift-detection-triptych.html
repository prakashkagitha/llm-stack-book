<figure class="viz" id="fig-obs-drift-detection-triptych">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 800 400" role="img" aria-label="Three panels showing the three kinds of production drift and their detectors: input drift detected by PSI on overlaid reference-vs-current histograms, output-quality drift detected by a CUSUM curve that ramps up and crosses an alert threshold after a sustained score drop, and provider/model-version drift detected by an hourly canary probe whose score steps down when the vendor silently swaps the model behind the same API label.">
<defs>
  <marker id="dt-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--v-muted,#888)"/>
  </marker>
</defs>
<style>
  #fig-obs-drift-detection-triptych text { font-family: var(--sans, sans-serif); fill: var(--ink-soft,#333); }
  #fig-obs-drift-detection-triptych .p-title { font: 700 12px var(--sans,sans-serif); }
  #fig-obs-drift-detection-triptych .p-sub { font: 700 10.5px var(--mono,monospace); fill: var(--accent,#c15b39); }
  #fig-obs-drift-detection-triptych .tiny { font: 400 8px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-obs-drift-detection-triptych .tiny-b { font: 700 8px var(--sans,sans-serif); }
  #fig-obs-drift-detection-triptych .axis-lbl { font: 400 8.5px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-obs-drift-detection-triptych .takeaway { font: 400 10px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-obs-drift-detection-triptych .alert-txt { font: 700 8.5px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-obs-drift-detection-triptych .legend-txt { font: 400 8px var(--sans,sans-serif); }
</style>


<g data-anim="1" transform="translate(10,0)">
  <rect x="0" y="10" width="246" height="340" rx="10" fill="var(--surface,#faf8f3)" class="v-stroke" stroke-width="1.4"/>
  <text x="123" y="30" text-anchor="middle" class="p-title">Input drift (covariate shift)</text>
  <text x="123" y="46" text-anchor="middle" class="p-sub">-&gt; PSI</text>

  
  <rect x="26" y="58" width="10" height="8" class="v-muted" fill="var(--v-muted,#888)"/>
  <text x="40" y="66" class="legend-txt v-muted" fill="var(--v-muted,#888)">reference</text>
  <rect x="108" y="58" width="10" height="8" class="v-accent" fill="var(--accent,#c15b39)"/>
  <text x="122" y="66" class="legend-txt" fill="var(--accent,#c15b39)">current</text>

  
  
  <g fill="var(--v-muted,#888)" opacity="0.85">
    <rect x="28"  y="197" width="11" height="8"/>
    <rect x="56"  y="173" width="11" height="32"/>
    <rect x="83"  y="131" width="11" height="74"/>
    <rect x="111" y="95"  width="11" height="110"/>
    <rect x="139" y="131" width="11" height="74"/>
    <rect x="166" y="173" width="11" height="32"/>
    <rect x="194" y="193" width="11" height="12"/>
  </g>
  
  <g fill="var(--accent,#c15b39)">
    <rect x="41"  y="200" width="11" height="5"/>
    <rect x="69"  y="192" width="11" height="13"/>
    <rect x="96"  y="175" width="11" height="30"/>
    <rect x="124" y="141" width="11" height="64"/>
    <rect x="152" y="105" width="11" height="100"/>
    <rect x="179" y="113" width="11" height="92"/>
    <rect x="207" y="155" width="11" height="50"/>
  </g>
  <line x1="26" y1="205" x2="220" y2="205" class="v-stroke" stroke-width="1.2"/>
  <text x="123" y="218" text-anchor="middle" class="axis-lbl">prompt embedding PC1 (binned)</text>

  
  <rect x="26" y="234" width="46" height="12" fill="var(--good,#2f9e6e)" opacity="0.75"/>
  <rect x="72" y="234" width="58" height="12" fill="var(--warn,#e0a106)" opacity="0.75"/>
  <rect x="130" y="234" width="90" height="12" fill="var(--accent,#c15b39)" opacity="0.85"/>
  
  <path d="M 175 234 L 169 224 L 181 224 Z" fill="var(--accent,#c15b39)"/>

  <text x="49"  y="256" text-anchor="middle" class="tiny">&lt;0.1</text>
  <text x="101" y="256" text-anchor="middle" class="tiny">0.1&#8211;0.25</text>
  <text x="175" y="256" text-anchor="middle" class="tiny">&gt;0.25</text>
  <text x="49"  y="266" text-anchor="middle" class="tiny">stable</text>
  <text x="101" y="266" text-anchor="middle" class="tiny">moderate</text>
  <text x="175" y="266" text-anchor="middle" class="tiny-b" fill="var(--accent,#c15b39)">significant</text>

  <text x="123" y="306" text-anchor="middle" class="takeaway">prompts changed &#8212; earlier eval</text>
  <text x="123" y="322" text-anchor="middle" class="takeaway">scores no longer representative</text>
</g>


<g data-anim="2" transform="translate(276,0)">
  <rect x="0" y="10" width="246" height="340" rx="10" fill="var(--surface,#faf8f3)" class="v-stroke" stroke-width="1.4"/>
  <text x="123" y="30" text-anchor="middle" class="p-title">Output-quality drift</text>
  <text x="123" y="46" text-anchor="middle" class="p-sub">-&gt; CUSUM</text>

  <text x="26" y="60" class="tiny">rolling composite eval score</text>
  
  <line x1="26" y1="100" x2="220" y2="100" stroke="var(--v-muted,#888)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="26" y="94" class="tiny">mean (in-control)</text>
  <text x="163" y="70" text-anchor="middle" class="tiny">sustained shift</text>

  
  <polyline points="26,98 40.9,104 55.9,96 70.8,102 85.7,99 100.6,105 115.5,97 130.5,101 145.4,100 160.3,128 175.2,132 190.2,127 205.1,131 220,129"
    fill="none" stroke="var(--ink-soft,#333)" stroke-width="1.6"/>
  <text x="123" y="146" text-anchor="middle" class="axis-lbl">time</text>

  
  <text x="26" y="168" class="tiny">CUSUM statistic S_n</text>
  <line x1="26" y1="270" x2="220" y2="270" class="v-stroke" stroke-width="1"/>
  <text x="26" y="264" class="tiny">S_n = 0</text>
  <line x1="26" y1="200" x2="220" y2="200" stroke="var(--warn,#e0a106)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="222" y="203" class="tiny" fill="var(--warn,#e0a106)">h</text>

  <polyline points="26,269 40.9,267 55.9,270 70.8,268 85.7,269 100.6,266 115.5,270 130.5,268 145.4,269 160.3,258 175.2,232 190.2,206 205.1,196 220,182"
    fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>

  
  <line x1="205" y1="196" x2="205" y2="176" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <path d="M 205 176 L 218 181 L 205 186 Z" fill="var(--warn,#e0a106)"/>
  <text x="188" y="182" text-anchor="end" class="alert-txt">ALERT</text>

  <text x="123" y="288" text-anchor="middle" class="axis-lbl">time</text>

  <text x="123" y="306" text-anchor="middle" class="takeaway">accumulates small persistent drops a</text>
  <text x="123" y="322" text-anchor="middle" class="takeaway">single-point threshold would miss</text>
</g>


<g data-anim="3" transform="translate(542,0)">
  <rect x="0" y="10" width="246" height="340" rx="10" fill="var(--surface,#faf8f3)" class="v-stroke" stroke-width="1.4"/>
  <text x="123" y="30" text-anchor="middle" class="p-title">Provider / model-version drift</text>
  <text x="123" y="46" text-anchor="middle" class="p-sub">-&gt; hourly canary</text>

  
  <circle cx="35" cy="63" r="9" fill="none" class="v-stroke" stroke-width="1.3"/>
  <line x1="35" y1="63" x2="35" y2="57" class="v-stroke" stroke-width="1.2"/>
  <line x1="35" y1="63" x2="40" y2="65" class="v-stroke" stroke-width="1.2"/>
  <text x="50" y="66" class="tiny">hourly fixed probe set</text>

  
  <rect x="56" y="78" width="160" height="46" rx="6" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="136" y="93"  text-anchor="middle" class="tiny-b">same API label,</text>
  <text x="136" y="105" text-anchor="middle" class="tiny-b">model snapshot</text>
  <text x="136" y="117" text-anchor="middle" class="tiny-b">silently changed</text>
  <line x1="136" y1="124" x2="169.5" y2="147" stroke="var(--v-muted,#888)" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#dt-arrow)"/>

  
  <line x1="30" y1="150" x2="216" y2="150" stroke="var(--v-muted,#888)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="30" y="200" class="tiny">expected (reference)</text>

  
  <polyline points="30,150 53.25,150 76.5,150 99.75,150 123,150 146.25,150"
    fill="none" stroke="var(--ink-soft,#333)" stroke-width="1.6"/>
  <polyline points="146.25,150 169.5,190 192.75,190 216,190"
    fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <g fill="var(--ink-soft,#333)">
    <circle cx="30" cy="150" r="2.6"/><circle cx="53.25" cy="150" r="2.6"/>
    <circle cx="76.5" cy="150" r="2.6"/><circle cx="99.75" cy="150" r="2.6"/>
    <circle cx="123" cy="150" r="2.6"/><circle cx="146.25" cy="150" r="2.6"/>
  </g>
  <g fill="var(--accent,#c15b39)">
    <circle cx="169.5" cy="190" r="3.2"/><circle cx="192.75" cy="190" r="2.6"/><circle cx="216" cy="190" r="2.6"/>
  </g>

  
  <line x1="169.5" y1="188" x2="169.5" y2="168" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <path d="M 169.5 168 L 182.5 173 L 169.5 178 Z" fill="var(--warn,#e0a106)"/>
  <text x="169.5" y="162" text-anchor="middle" class="alert-txt">ALERT</text>

  <text x="123" y="216" text-anchor="middle" class="axis-lbl">time (hourly ticks)</text>

  <text x="123" y="306" text-anchor="middle" class="takeaway">pin versions; a canary catches</text>
  <text x="123" y="322" text-anchor="middle" class="takeaway">silent swaps</text>
</g>

</svg>
<figcaption><b>Three kinds of drift need three different detectors.</b> Input drift shifts the prompt distribution and is caught by PSI on binned embeddings; output-quality drift is a sustained score drop that a CUSUM statistic accumulates and flags when a single noisy reading would not; provider drift is a silent model swap behind the same API label, caught only by an hourly canary probe against a fixed test set.</figcaption>
</figure>
