<figcaption><b>The two-phase PPO training rhythm.</b> Each outer iteration runs the rollout phase (steps 1–6, no gradient) exactly once — collecting a frozen experience buffer — then enters the optimization phase (steps 7–10) for <em>PPO_EPOCHS</em> passes over shuffled minibatches (dashed repeat arc inside the bottom lane). Once all epochs complete, <code>theta_old &lt;- theta</code> so the updated policy becomes the behavior policy for the next rollout (left-margin arc).</figcaption>
</figure>
