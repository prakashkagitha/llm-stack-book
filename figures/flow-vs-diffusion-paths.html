<figcaption><b>Straight paths are the whole trick: flow matching does not need a better solver, it needs less curve to solve.</b> Diffusion's probability-flow ODE traces curved marginals, so each Euler step accumulates discretization error and many small steps are needed. Flow matching's straight-line interpolant x_t = (1-t)x0 + t*x1 has a constant velocity v = x1 - x0 everywhere along the path, so a handful of large steps already integrate it almost exactly.</figcaption>
</figure>
