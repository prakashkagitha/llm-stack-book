<figure class="viz" id="fig-roofline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 470" role="img" aria-label="A roofline plot in log-log axes: a sloped memory-bandwidth roof rises to a flat compute-peak ceiling, meeting at the ridge point; a memory-bound decode/attention point sits on the slope and a compute-bound big-GEMM point sits on the ceiling.">
  <defs>
    <marker id="rf-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-roofline .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-roofline .tick{ font:500 10.5px var(--mono,monospace); }
    #fig-roofline .roof{ font:700 12.5px var(--sans,sans-serif); }
    #fig-roofline .pt{ font:700 12px var(--sans,sans-serif); }
    #fig-roofline .sub{ font:500 10.5px var(--sans,sans-serif); }
    #fig-roofline text{ fill: var(--ink-soft); }
    #fig-roofline .dim{ fill: var(--muted); }
  </style>

  
  <g data-anim="1">
    
    <g class="v-grid" stroke-width="0.8" opacity="0.55">
      <line x1="80" y1="60" x2="640" y2="60"/>
      <line x1="80" y1="115" x2="640" y2="115"/>
      <line x1="80" y1="170" x2="640" y2="170"/>
      <line x1="80" y1="280" x2="640" y2="280"/>
      <line x1="80" y1="335" x2="640" y2="335"/>
      <line x1="220" y1="60" x2="220" y2="390"/>
      <line x1="360" y1="60" x2="360" y2="390"/>
      <line x1="500" y1="60" x2="500" y2="390"/>
      <line x1="570" y1="60" x2="570" y2="390"/>
    </g>
    
    <line x1="80" y1="60" x2="80" y2="390" class="v-stroke" stroke-width="1.6" marker-start="url(#rf-arrow)"/>
    <line x1="80" y1="390" x2="640" y2="390" class="v-stroke" stroke-width="1.6" marker-end="url(#rf-arrow)"/>
    
    <text x="26" y="225" class="ax" text-anchor="middle" transform="rotate(-90 26 225)">attainable FLOP/s &#8202;(log)</text>
    
    <text x="360" y="425" class="ax" text-anchor="middle">arithmetic intensity&#8201; I = FLOP / byte &#8202;(log)</text>
    <text x="360" y="442" class="sub dim" text-anchor="middle">how many ops you do per byte read from HBM</text>
  </g>

  
  <g data-anim="2">
    
    
    <line x1="80" y1="390" x2="360" y2="115" class="viz-draw v-accent-s" style="--len:480" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>
    
    <line x1="360" y1="115" x2="640" y2="115" class="viz-draw v-accent-s" style="--len:280" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>

    
    <path d="M80 390 L360 115 L640 115 L640 60 L80 60 Z" fill="var(--accent)" fill-opacity="0.06"/>

    
    <line x1="80" y1="115" x2="360" y2="115" class="v-grid" stroke-width="1" stroke-dasharray="4 4" opacity="0.8"/>
    <text x="500" y="104" class="roof v-accent" fill="var(--accent)" text-anchor="middle">compute roof&#8201;:&#8201; &#960;</text>
    <text x="500" y="135" class="sub" text-anchor="middle">flat ceiling — peak FLOP/s</text>

    
    <text x="250" y="318" class="roof v-accent" fill="var(--accent)" text-anchor="start" transform="rotate(-44 250 318)">memory roof = &#946;&#183;I</text>
    <text x="252" y="334" class="sub" text-anchor="start" transform="rotate(-44 252 334)">slope = bandwidth &#946;</text>
  </g>

  
  <g data-anim="3">
    <line x1="360" y1="115" x2="360" y2="390" class="v-stroke" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
    <circle cx="360" cy="115" r="4.5" class="v-stroke" fill="var(--surface,#fff)" stroke-width="2"/>
    <text x="360" y="406" class="tick" text-anchor="middle">I* = &#960;/&#946;</text>
    <text x="318" y="92" class="sub dim" text-anchor="middle">ridge point</text>
    <line x1="340" y1="98" x2="358" y2="114" class="v-grid" stroke-width="1" opacity="0.8"/>
  </g>

  
  <g data-anim="4">
    
    
    <circle cx="190" cy="282" r="7" fill="var(--accent2,#3b82f6)"/>
    <circle cx="190" cy="282" r="11" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.4" class="viz-pulse" opacity="0.6"/>
    
    <line x1="190" y1="282" x2="190" y2="390" class="v-grid" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
    <text x="190" y="406" class="tick dim" text-anchor="middle">I ~ 1  (I &lt; I*)</text>
    
    <g>
      <rect x="96" y="170" width="156" height="58" rx="7" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
      <text x="174" y="190" class="pt" fill="var(--accent2,#3b82f6)" text-anchor="middle">memory-bound</text>
      <text x="174" y="206" class="sub" text-anchor="middle">decode (GEMV),</text>
      <text x="174" y="220" class="sub" text-anchor="middle">attention scores</text>
    </g>
    <line x1="174" y1="228" x2="190" y2="276" class="v-stroke" stroke-width="1" opacity="0.7"/>
    
    <line x1="200" y1="276" x2="252" y2="225" class="v-stroke" stroke="var(--accent2,#3b82f6)" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#rf-arrow)" opacity="0.9"/>
    <text x="346" y="180" class="sub" fill="var(--accent2,#3b82f6)" text-anchor="middle">batch / fuse / quantize:</text>
    <text x="346" y="194" class="sub" fill="var(--accent2,#3b82f6)" text-anchor="middle">raise I, climb the roof</text>
  </g>

  
  <g data-anim="5">
    
    <circle cx="540" cy="115" r="7" fill="var(--good,#2f9e6e)"/>
    <circle cx="540" cy="115" r="11" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.4" class="viz-pulse" opacity="0.6"/>
    <line x1="540" y1="115" x2="540" y2="390" class="v-grid" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
    <text x="540" y="406" class="tick dim" text-anchor="middle">I &gt; I*</text>
    
    <g>
      <rect x="468" y="148" width="160" height="58" rx="7" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
      <text x="548" y="168" class="pt" fill="var(--good,#2f9e6e)" text-anchor="middle">compute-bound</text>
      <text x="548" y="184" class="sub" text-anchor="middle">big GEMM &#8212; FFN,</text>
      <text x="548" y="198" class="sub" text-anchor="middle">prefill, batched decode</text>
    </g>
    <line x1="548" y1="148" x2="541" y2="123" class="v-stroke" stroke-width="1" opacity="0.7"/>
  </g>
</svg>
<figcaption><b>The roofline: one picture that tells you whether to chase FLOPs or bytes.</b> Attainable performance is <b>P(I) = min(&#960;, &#946;&#183;I)</b> — a sloped <b>memory roof</b> (bandwidth &#946; times arithmetic intensity I) that rises to a flat <b>compute ceiling</b> &#960;, meeting at the ridge <b>I* = &#960;/&#946;</b>. Kernels left of the ridge (decode, attention scores) are memory-bound and only go faster by raising intensity; kernels right of it (big GEMMs, prefill) sit on the compute ceiling.</figcaption>
</figure>
