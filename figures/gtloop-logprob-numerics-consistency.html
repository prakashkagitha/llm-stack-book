</svg>
<figcaption><b>The importance-ratio drift bug: numerator and denominator must share one numeric pipeline.</b> If the ratio's denominator (old log-probs) comes from the inference engine's kernels while the numerator (new log-probs) comes from the trainer's, the ratio wanders away from 1.0 purely from floating-point and kernel differences &amp;mdash; even at step 0, before the policy has moved at all &amp;mdash; and the clip starts firing on phantom off-policyness. The fix is to recompute the old log-probs with a <code>no_grad</code> forward through the same trainer pipeline that computes the new log-probs, demoting the sampler's own log-probs to a diagnostic signal.</figcaption>
</figure>
