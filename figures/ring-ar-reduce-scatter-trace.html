<figcaption><b>Ring all-reduce reduce-scatter: n-1=3 clockwise steps accumulate one fully-reduced chunk per rank.</b> Each step every rank sends M/n bytes to its clockwise neighbor; the partial sum grows by one addend per hop (blue packets). After step 2 (green packets), each rank owns one fully-reduced slot. The all-gather phase (3 more steps, not shown) then propagates these chunks so every rank holds the complete result, making ring all-reduce bandwidth-optimal at 2(n-1)/n . M bytes per rank total.</figcaption>
</figure>
