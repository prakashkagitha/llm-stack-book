<figure class="viz" id="fig-grpo-r1-pipeline">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 760 660" role="img" aria-label="DeepSeek-R1 four-stage training pipeline: Stage 1 Cold-Start SFT, Stage 2 Reasoning RL with GRPO, Stage 3 Rejection Sampling plus SFT, Stage 4 RL for all scenarios with GRPO. Stages alternate between SFT (grey) and RL (blue) phases.">
<defs>
  <marker id="rp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="90">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--border-2,#9ca3af)"/>
  </marker>
</defs>
<style>
  #fig-grpo-r1-pipeline text { fill: var(--ink-soft,#1f2937); font: 400 12px var(--sans,sans-serif); }
  #fig-grpo-r1-pipeline .t-title { font: 700 13px var(--sans,sans-serif); }
  #fig-grpo-r1-pipeline .t-body { font: 400 11.5px var(--sans,sans-serif); }
  #fig-grpo-r1-pipeline .t-sub { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-grpo-r1-pipeline .t-badge { font: 700 11px var(--sans,sans-serif); fill: #ffffff; }
  #fig-grpo-r1-pipeline .t-num { font: 700 20px var(--sans,sans-serif); fill: #ffffff; }
  #fig-grpo-r1-pipeline .t-chip { font: 600 9px var(--sans,sans-serif); }
  #fig-grpo-r1-pipeline .t-conn { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#9ca3af); font-style: italic; }

  #fig-grpo-r1-pipeline [data-anim] { opacity: 0; animation: rp-fi 0.4s ease forwards; }
  #fig-grpo-r1-pipeline [data-anim="1"] { animation-delay: 0.1s; }
  #fig-grpo-r1-pipeline [data-anim="2"] { animation-delay: 0.65s; }
  #fig-grpo-r1-pipeline [data-anim="3"] { animation-delay: 1.2s; }
  #fig-grpo-r1-pipeline [data-anim="4"] { animation-delay: 1.75s; }
  #fig-grpo-r1-pipeline [data-anim="5"] { animation-delay: 2.2s; }
  @keyframes rp-fi {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #fig-grpo-r1-pipeline .rp-dot {
    opacity: 0;
    animation: rp-tv 4s ease-in-out 2.6s infinite;
  }
  @keyframes rp-tv {
    0%   { transform: translateY(0px);    opacity: 0; }
    5%   { opacity: 1; }
    27%  { transform: translateY(148px);  opacity: 1; }
    33%  { transform: translateY(148px);  opacity: 0; }
    38%  { transform: translateY(148px);  opacity: 1; }
    60%  { transform: translateY(296px);  opacity: 1; }
    66%  { transform: translateY(296px);  opacity: 0; }
    71%  { transform: translateY(296px);  opacity: 1; }
    93%  { transform: translateY(444px);  opacity: 1; }
    98%  { transform: translateY(444px);  opacity: 0; }
    100% { transform: translateY(444px);  opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    #fig-grpo-r1-pipeline [data-anim] { opacity: 1 !important; animation: none !important; transform: none !important; }
    #fig-grpo-r1-pipeline .rp-dot { display: none; }
  }
</style>




<g data-anim="1">
  <rect x="60" y="20" width="640" height="118" rx="10" class="v-fill" fill="var(--surface,#f9fafb)" stroke="var(--border-2,#d1d5db)" stroke-width="1.5"/>
  
  <rect x="76" y="36" width="74" height="86" rx="8" fill="var(--muted,#6b7280)"/>
  <text x="113" y="73" text-anchor="middle" class="t-num">1</text>
  <text x="113" y="90" text-anchor="middle" class="t-badge" style="font-size:9px">COLD</text>
  <text x="113" y="104" text-anchor="middle" class="t-badge" style="font-size:9px">START</text>
  
  <rect x="624" y="36" width="58" height="20" rx="4" class="v-fill" fill="var(--surface,#f9fafb)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="653" y="50" text-anchor="middle" class="t-chip" style="fill:var(--muted,#6b7280)">SFT</text>
  
  <text x="170" y="57" class="t-title">Cold-Start SFT</text>
  <text x="170" y="76" class="t-body">Small SFT on a few thousand high-quality long-CoT examples</text>
  <text x="170" y="93" class="t-body">(some distilled from R1-Zero, cleaned by humans).</text>
  <text x="170" y="112" class="t-sub">Fixes readability; gives RL a sane starting point.</text>
</g>


<g data-anim="2">
  <line x1="380" y1="138" x2="380" y2="178" stroke="var(--border-2,#9ca3af)" stroke-width="1.5" marker-end="url(#rp-arr)"/>
  <text x="390" y="162" class="t-conn">readable base for RL</text>
</g>


<g data-anim="2">
  <rect x="60" y="180" width="640" height="118" rx="10" class="v-fill" fill="var(--surface,#f9fafb)" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
  
  <rect x="76" y="196" width="74" height="86" rx="8" fill="var(--accent2,#3b82f6)"/>
  <text x="113" y="233" text-anchor="middle" class="t-num">2</text>
  <text x="113" y="250" text-anchor="middle" class="t-badge" style="font-size:9px">REASONING</text>
  <text x="113" y="264" text-anchor="middle" class="t-badge" style="font-size:9px">RL</text>
  
  <rect x="616" y="196" width="58" height="20" rx="4" fill="var(--surface-3,#eef2ff)" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
  <text x="645" y="210" text-anchor="middle" class="t-chip" style="fill:var(--accent2,#3b82f6)">GRPO</text>
  
  <text x="170" y="217" class="t-title">Reasoning RL  (GRPO)</text>
  <text x="170" y="236" class="t-body">GRPO with rule rewards on math / code / logic.</text>
  <text x="170" y="253" class="t-body">+ Language-consistency reward to stop language mixing.</text>
  <text x="170" y="272" class="t-sub">Model learns to reason longer; "aha" self-correction emerges.</text>
</g>


<g data-anim="3">
  <line x1="380" y1="298" x2="380" y2="338" stroke="var(--border-2,#9ca3af)" stroke-width="1.5" marker-end="url(#rp-arr)"/>
  <text x="390" y="322" class="t-conn">reasoning policy</text>
</g>


<g data-anim="3">
  <rect x="60" y="340" width="640" height="118" rx="10" class="v-fill" fill="var(--surface,#f9fafb)" stroke="var(--border-2,#d1d5db)" stroke-width="1.5"/>
  
  <rect x="76" y="356" width="74" height="86" rx="8" fill="var(--muted,#6b7280)"/>
  <text x="113" y="393" text-anchor="middle" class="t-num">3</text>
  <text x="113" y="410" text-anchor="middle" class="t-badge" style="font-size:9px">REJECTION</text>
  <text x="113" y="424" text-anchor="middle" class="t-badge" style="font-size:9px">SAMP+SFT</text>
  
  <rect x="610" y="412" width="58" height="20" rx="4" class="v-fill" fill="var(--surface,#f9fafb)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="639" y="426" text-anchor="middle" class="t-chip" style="fill:var(--muted,#6b7280)">sample</text>
  <rect x="610" y="436" width="58" height="20" rx="4" class="v-fill" fill="var(--surface,#f9fafb)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="639" y="450" text-anchor="middle" class="t-chip" style="fill:var(--muted,#6b7280)">filter+SFT</text>
  
  <text x="170" y="377" class="t-title">Rejection Sampling + SFT</text>
  <text x="170" y="396" class="t-body">Sample from Stage-2 model; keep the best outputs.</text>
  <text x="170" y="413" class="t-body">Add chat / safety data; SFT on combined set.</text>
  <text x="170" y="432" class="t-sub">Broadens coverage beyond verifiable tasks.</text>
</g>


<g data-anim="4">
  <line x1="380" y1="458" x2="380" y2="498" stroke="var(--border-2,#9ca3af)" stroke-width="1.5" marker-end="url(#rp-arr)"/>
  <text x="390" y="482" class="t-conn">broadened SFT model</text>
</g>


<g data-anim="4">
  <rect x="60" y="500" width="640" height="118" rx="10" class="v-fill" fill="var(--surface,#f9fafb)" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
  
  <rect x="76" y="516" width="74" height="86" rx="8" fill="var(--accent2,#3b82f6)"/>
  <text x="113" y="553" text-anchor="middle" class="t-num">4</text>
  <text x="113" y="570" text-anchor="middle" class="t-badge" style="font-size:9px">RL  ALL</text>
  <text x="113" y="584" text-anchor="middle" class="t-badge" style="font-size:9px">SCENARIOS</text>
  
  <rect x="610" y="572" width="58" height="20" rx="4" fill="var(--surface-3,#eef2ff)" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
  <text x="639" y="586" text-anchor="middle" class="t-chip" style="fill:var(--accent2,#3b82f6)">GRPO</text>
  <rect x="594" y="596" width="76" height="20" rx="4" fill="var(--surface-3,#eef2ff)" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
  <text x="632" y="610" text-anchor="middle" class="t-chip" style="fill:var(--accent2,#3b82f6)">reward model</text>
  
  <text x="170" y="537" class="t-title">RL for All Scenarios  (GRPO)</text>
  <text x="170" y="556" class="t-body">Final GRPO pass: rule rewards (reasoning)</text>
  <text x="170" y="573" class="t-body">+ reward model for helpfulness / harmlessness.</text>
  <text x="170" y="592" class="t-sub">Mixes verifiable + non-verifiable tasks in one RL phase.</text>
</g>


<g data-anim="5">
  <rect x="60" y="634" width="14" height="12" rx="2" fill="var(--muted,#6b7280)"/>
  <text x="80" y="645" class="t-conn" style="fill:var(--ink-soft,#4b5563)">SFT stage (grey)</text>
  <rect x="190" y="634" width="14" height="12" rx="2" fill="var(--accent2,#3b82f6)"/>
  <text x="210" y="645" class="t-conn" style="fill:var(--ink-soft,#4b5563)">RL / GRPO stage (blue)</text>
  <text x="510" y="645" text-anchor="middle" class="t-conn">pattern: SFT -> RL -> SFT -> RL</text>
</g>


<circle class="rp-dot" cx="380" cy="138" r="6" fill="var(--accent2,#3b82f6)"/>

</svg>
<figcaption><b>DeepSeek-R1 trains in four alternating stages: Cold-Start SFT, Reasoning RL (GRPO), Rejection-Sampling SFT, and final RL for all scenarios.</b> Grey-badged stages (1 and 3) are SFT phases that provide stable checkpoints and broaden coverage; blue-badged stages (2 and 4) are GRPO RL phases that grow long chain-of-thought reasoning and then extend it to helpfulness and safety. Each stage feeds its improved model artifact into the next.</figcaption>
</figure>
