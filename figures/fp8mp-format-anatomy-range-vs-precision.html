</svg>
<figcaption><b>Exponent width buys range; mantissa width buys precision — and bf16 is just fp32 with the mantissa tail cut off.</b> Stacking the five formats to a common bit scale shows the trade geometrically: bf16's exponent field lines up exactly with fp32's, so it shares fp32's huge range, while its 7-bit mantissa is literally the first 7 bits of fp32's 23-bit mantissa (the dashed cut). FP16 spends its 16 bits the opposite way — more mantissa, a narrow 5-bit exponent — which is precise but overflows at 65504; the two FP8 formats compress both fields further, trading almost all precision for a workable, if tiny, dynamic range.</figcaption>
</figure>
