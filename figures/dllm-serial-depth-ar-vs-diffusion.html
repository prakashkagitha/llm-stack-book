<figcaption><b>Serial depth, not total compute, is what separates the two lanes.</b> Filling the same 8-token output takes an autoregressive model 8 dependent forward passes (one token each) but a masked-diffusion model only 3 (each pass resolves several positions at once, at a heavier per-step compute cost). Latency tracks the number of <i>dependent</i> steps, so cutting serial depth from L to N &lt;&lt; L is what makes diffusion decoding faster, even though it does more total FLOPs.</figcaption>
