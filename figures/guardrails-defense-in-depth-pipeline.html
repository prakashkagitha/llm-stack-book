<figure class="viz" id="fig-guardrails-defense-in-depth-pipeline">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 900 360" role="img" aria-label="Defense-in-depth pipeline: a user request passes through an Input Guardrail (PII detect, Topic check, Jailbreak detector), then the LLM Core (Aligned Model), then an Output Guardrail (Harm classifier, PII redact), before returning to the user; both guardrails can independently block a request with a refusal.">
  <defs>
    <marker id="ddp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#555)"/>
    </marker>
    <marker id="ddp-arrow-danger" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--danger,#dc2626)"/>
    </marker>
    <marker id="ddp-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
    </marker>
    
    <circle id="ddp-pulse-dot" r="7" fill="var(--accent,#4f46e5)" opacity="0.9"/>
  </defs>
  <style>
    #fig-guardrails-defense-in-depth-pipeline .lbl { font: 600 13px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
    #fig-guardrails-defense-in-depth-pipeline .sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#888); }
    #fig-guardrails-defense-in-depth-pipeline .title { font: 700 12px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
    #fig-guardrails-defense-in-depth-pipeline .sub-box-lbl { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
    #fig-guardrails-defense-in-depth-pipeline .danger-lbl { font: 600 11px var(--sans,sans-serif); fill: var(--danger,#dc2626); }
    #fig-guardrails-defense-in-depth-pipeline .pass-lbl { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#888); }
    #fig-guardrails-defense-in-depth-pipeline .accent-lbl { font: 700 14px var(--sans,sans-serif); fill: #fff; }
    #fig-guardrails-defense-in-depth-pipeline .pulse {
      animation: ddp-travel 3.2s ease-in-out infinite;
    }
    @keyframes ddp-travel {
      0%   { offset-distance: 0%;   opacity: 1; }
      85%  { opacity: 1; }
      90%  { offset-distance: 100%; opacity: 0; }
      100% { offset-distance: 100%; opacity: 0; }
    }
  </style>

  
  <g data-anim="1">
    <rect x="10" y="145" width="88" height="50" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="54" y="168" text-anchor="middle" class="lbl">User</text>
    <text x="54" y="184" text-anchor="middle" class="sub">(request)</text>
  </g>

  
  <line x1="98" y1="170" x2="146" y2="170" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#ddp-arrow)" data-anim="1"/>

  
  <g data-anim="2">
    <rect x="150" y="55" width="205" height="240" rx="10" class="v-fill v-stroke" stroke-width="2"/>
    <text x="252" y="78" text-anchor="middle" class="title">Input Guardrail</text>
    
    <rect x="172" y="88" width="161" height="36" rx="5" class="v-fill v-stroke" stroke-width="1.2" fill-opacity="0.6"/>
    <text x="252" y="111" text-anchor="middle" class="sub-box-lbl">PII detect</text>
    <rect x="172" y="132" width="161" height="36" rx="5" class="v-fill v-stroke" stroke-width="1.2" fill-opacity="0.6"/>
    <text x="252" y="155" text-anchor="middle" class="sub-box-lbl">Topic check</text>
    <rect x="172" y="176" width="161" height="36" rx="5" class="v-fill v-stroke" stroke-width="1.2" fill-opacity="0.6"/>
    <text x="252" y="199" text-anchor="middle" class="sub-box-lbl">Jailbreak detector</text>
    
    <text x="252" y="232" text-anchor="middle" class="pass-lbl">block / pass</text>

    
    <line x1="252" y1="237" x2="252" y2="273" stroke="var(--danger,#dc2626)" stroke-width="1.5" marker-end="url(#ddp-arrow-danger)"/>
    <rect x="198" y="275" width="108" height="28" rx="6" fill="var(--danger,#dc2626)" fill-opacity="0.15" stroke="var(--danger,#dc2626)" stroke-width="1.5"/>
    <text x="252" y="293" text-anchor="middle" class="danger-lbl">refusal</text>
    
    <text x="236" y="260" text-anchor="end" class="danger-lbl" font-size="10">block</text>
  </g>

  
  <g data-anim="3">
    <line x1="355" y1="170" x2="386" y2="170" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#ddp-arrow)"/>
    <text x="370" y="162" text-anchor="middle" class="pass-lbl">pass</text>
  </g>

  
  <g data-anim="3">
    <rect x="390" y="85" width="185" height="180" rx="10" class="v-fill v-stroke" stroke-width="2"/>
    <text x="482" y="108" text-anchor="middle" class="title">LLM Core</text>
    
    <rect x="418" y="118" width="130" height="80" rx="8" fill="var(--accent,#4f46e5)" stroke="none"/>
    <text x="483" y="163" text-anchor="middle" class="accent-lbl">Aligned Model</text>
  </g>

  
  <g data-anim="4">
    <line x1="575" y1="170" x2="606" y2="170" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#ddp-arrow)"/>
  </g>

  
  <g data-anim="4">
    <rect x="610" y="55" width="205" height="240" rx="10" class="v-fill v-stroke" stroke-width="2"/>
    <text x="712" y="78" text-anchor="middle" class="title">Output Guardrail</text>
    
    <rect x="630" y="88" width="165" height="36" rx="5" class="v-fill v-stroke" stroke-width="1.2" fill-opacity="0.6"/>
    <text x="712" y="111" text-anchor="middle" class="sub-box-lbl">Harm classifier</text>
    <rect x="630" y="132" width="165" height="36" rx="5" class="v-fill v-stroke" stroke-width="1.2" fill-opacity="0.6"/>
    <text x="712" y="155" text-anchor="middle" class="sub-box-lbl">PII redact</text>
    
    <text x="712" y="196" text-anchor="middle" class="pass-lbl">block / pass</text>

    
    <line x1="712" y1="201" x2="712" y2="237" stroke="var(--danger,#dc2626)" stroke-width="1.5" marker-end="url(#ddp-arrow-danger)"/>
    <rect x="648" y="239" width="128" height="28" rx="6" fill="var(--danger,#dc2626)" fill-opacity="0.15" stroke="var(--danger,#dc2626)" stroke-width="1.5"/>
    <text x="712" y="258" text-anchor="middle" class="danger-lbl">canned refusal</text>
    
    <text x="696" y="225" text-anchor="end" class="danger-lbl" font-size="10">block</text>
  </g>

  
  <g data-anim="5">
    <line x1="815" y1="170" x2="802" y2="170" stroke="var(--ink-soft,#555)" stroke-width="1.8"/>
    <line x1="815" y1="170" x2="858" y2="170" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#ddp-arrow)"/>
  </g>

  
  <g data-anim="5">
    <rect x="860" y="145" width="30" height="50" rx="0" fill="none" stroke="none"/>
  </g>
  <g data-anim="5">
    <rect x="820" y="145" width="72" height="50" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="856" y="168" text-anchor="middle" class="lbl">User</text>
    <text x="856" y="184" text-anchor="middle" class="sub">(response)</text>
  </g>

  
  <circle r="7" fill="var(--accent,#4f46e5)" opacity="0.85">
    <animateMotion dur="3.2s" repeatCount="indefinite" keyTimes="0;0.18;0.45;0.72;0.9;1" calcMode="linear"
      path="M54,170 L355,170 L482,170 L575,170 L820,170"/>
    <animate attributeName="opacity" dur="3.2s" repeatCount="indefinite"
      keyTimes="0;0.85;0.92;1" values="0.85;0.85;0;0"/>
  </circle>
</svg>
<figcaption><b>Defense-in-depth wraps every request before and after the model.</b> The Input Guardrail (PII detect, topic check, jailbreak detector) intercepts each request first — the cheapest place to block — so harmful inputs never reach the LLM Core. Responses that pass generation then flow through the Output Guardrail (harm classifier, PII redact) before returning to the user; either guardrail can independently short-circuit the pipeline with a refusal.</figcaption>
</figure>
