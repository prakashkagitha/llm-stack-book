<figcaption><b>Queue-based async off-policy RL decouples generation from training via a rollout queue and versioned weight store.</b> Inference workers continuously push completed rollouts (tagged with policy version θv) into the queue; the trainer drains batches and steps the optimizer; and only occasionally (every N steps) broadcasts new weights. The staleness s = k−v between generation version v and trainer step k is the central quantity that importance-sampling corrections must bound.</figcaption>
</figure>
