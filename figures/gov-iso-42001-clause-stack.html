  <text x="360" y="20" text-anchor="middle" class="ttl" dy="0.4em">ISO/IEC 42001 AI Management System</text>
  <text x="360" y="40" text-anchor="middle" class="sub">Annex SL Clause Structure (4–10) with PDCA mapping</text>

  

  
  <rect x="4" y="58" width="34" height="204" rx="4" fill="var(--surface-3,#e0e7ff)" opacity="0.55"/>
  <text x="21" y="160" text-anchor="middle" class="pdca-lbl" transform="rotate(-90,21,160)">PLAN</text>

  
  <rect x="4" y="268" width="34" height="64" rx="4" fill="var(--surface-3,#e0e7ff)" opacity="0.32"/>
  <text x="21" y="300" text-anchor="middle" class="pdca-lbl" transform="rotate(-90,21,300)" style="font-size:7.5px;">SUPPORT</text>

  
  <rect x="4" y="338" width="34" height="64" rx="4" fill="var(--surface-3,#ede9fe)" opacity="0.75"/>
  <text x="21" y="370" text-anchor="middle" class="pdca-lbl" transform="rotate(-90,21,370)">DO</text>

  
  <rect x="4" y="408" width="34" height="64" rx="4" fill="var(--surface-3,#ede9fe)" opacity="0.75"/>
  <text x="21" y="440" text-anchor="middle" class="pdca-lbl" transform="rotate(-90,21,440)">CHECK</text>

  
  <rect x="4" y="478" width="34" height="64" rx="4" fill="var(--surface-3,#e0e7ff)" opacity="0.55"/>
  <text x="21" y="510" text-anchor="middle" class="pdca-lbl" transform="rotate(-90,21,510)">ACT</text>

  

  
  <rect x="44" y="58" width="668" height="64" rx="5" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3"/>
  <text x="60" y="80" class="cl-num">Clause 4</text>
  <text x="60" y="97" class="cl-name">Context of the organisation</text>
  <text x="60" y="113" class="cl-desc">stakeholder analysis, AI policy scope</text>

  
  <rect x="44" y="128" width="668" height="64" rx="5" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3"/>
  <text x="60" y="150" class="cl-num">Clause 5</text>
  <text x="60" y="167" class="cl-name">Leadership</text>
  <text x="60" y="183" class="cl-desc">top management commitment; AI Officer role</text>

  
  <rect x="44" y="198" width="668" height="64" rx="5" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3"/>

  <text x="60" y="237" class="cl-name">Planning</text>
  <text x="60" y="253" class="cl-desc">risk assessment; AI objectives</text>

  
  <rect x="44" y="268" width="668" height="64" rx="5" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.1" stroke-dasharray="6 3"/>

  <text x="60" y="307" class="cl-name">Support</text>
  <text x="60" y="323" class="cl-desc">resources; competence; awareness; documented information</text>

  
  <rect x="44" y="338" width="668" height="64" rx="5" fill="var(--surface-3,#ede9fe)" stroke="var(--accent,#4f46e5)" stroke-width="2.2"/>
  <text x="60" y="360" class="cl-num">Clause 8</text>
  <text x="60" y="377" class="cl-name">Operation</text>
  <text x="60" y="393" class="cl-desc">AI system development lifecycle controls; procurement</text>
  
  <rect x="556" y="347" width="146" height="17" rx="3" fill="var(--accent,#4f46e5)" opacity="0.13"/>
  <text x="629" y="360" text-anchor="middle" class="crit-chip">critical for LLM dev</text>

  
  <rect x="44" y="408" width="668" height="64" rx="5" fill="var(--surface-3,#ede9fe)" stroke="var(--accent,#4f46e5)" stroke-width="2.2"/>
  <text x="60" y="430" class="cl-num">Clause 9</text>
  <text x="60" y="447" class="cl-name">Performance evaluation</text>
  <text x="60" y="463" class="cl-desc">monitoring; internal audit; management review</text>
  
  <rect x="556" y="417" width="146" height="17" rx="3" fill="var(--accent,#4f46e5)" opacity="0.13"/>
  <text x="629" y="430" text-anchor="middle" class="crit-chip">critical for LLM dev</text>

  
  <rect x="44" y="478" width="668" height="64" rx="5" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3"/>
  <text x="60" y="500" class="cl-num">Clause 10</text>
  <text x="60" y="517" class="cl-name">Improvement</text>
  <text x="60" y="533" class="cl-desc">nonconformity; corrective action; continual improvement</text>

</svg>
<figcaption><b>ISO/IEC 42001 follows the standard Annex SL high-level structure of seven numbered clauses (4–10) mapping to the Plan-Do-Check-Act cycle.</b> For an LLM developer, <b>Clause 8 (Operation)</b> and <b>Clause 9 (Performance evaluation)</b> are the critical operational clauses — they require documented AI lifecycle controls and periodic internal audits of those controls.</figcaption>
</figure>
