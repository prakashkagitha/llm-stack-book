<figure class="viz" id="fig-rlanat-two-profiles-bridge">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 510" role="img" aria-label="Causal chain diagram: decode is memory-bandwidth-bound and training is compute-bound, a small roofline thumbnail shows decode sitting low on the bandwidth slope while training sits on the flat compute ceiling, the two opposite profiles want incompatible weight layouts, so an RL system must run both stacks and bridge them, and that bridge is weight sync.">
  <defs>
    <marker id="rlanat-bridge-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
    </marker>
    <marker id="rlanat-bridge-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
  </defs>
  <style>
    #fig-rlanat-two-profiles-bridge text{ fill:var(--ink-soft); }
    #fig-rlanat-two-profiles-bridge .card-title{ font:700 12px var(--sans,sans-serif); }
    #fig-rlanat-two-profiles-bridge .bullet{ font:500 10.5px var(--mono,monospace); }
    #fig-rlanat-two-profiles-bridge .node-title{ font:700 12.5px var(--sans,sans-serif); }
    #fig-rlanat-two-profiles-bridge .node-sub{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-rlanat-two-profiles-bridge .punch{ font:700 13px var(--sans,sans-serif); }
    #fig-rlanat-two-profiles-bridge .punch-sub{ font:600 10.5px var(--sans,sans-serif); font-style:italic; }
    #fig-rlanat-two-profiles-bridge .rf-title{ font:700 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-rlanat-two-profiles-bridge .rf-lbl{ font:700 10px var(--sans,sans-serif); }
    #fig-rlanat-two-profiles-bridge .rf-ax{ font:600 9px var(--sans,sans-serif); fill:var(--muted); }
    #fig-rlanat-two-profiles-bridge .rf-cap{ font:500 9.5px var(--sans,sans-serif); font-style:italic; fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <rect x="20" y="20" width="280" height="130" rx="10" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
    <text x="160" y="42" text-anchor="middle" class="card-title" fill="var(--accent2,#3b82f6)">DECODE (generation)</text>
    <text x="34" y="64" class="bullet">- memory-bandwidth-bound</text>
    <text x="34" y="82" class="bullet">- tiny matmuls, huge KV cache</text>
    <text x="34" y="100" class="bullet">- best: vLLM / SGLang</text>
    <text x="34" y="118" class="bullet">- weights: paged tensor-parallel layout</text>
  </g>

  
  <g data-anim="1">
    <rect x="20" y="170" width="280" height="130" rx="10" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="160" y="192" text-anchor="middle" class="card-title" fill="var(--good,#2f9e6e)">TRAIN (fwd+bwd)</text>
    <text x="34" y="214" class="bullet">- compute-bound (tensor cores)</text>
    <text x="34" y="232" class="bullet">- big fused matmuls + optimizer state</text>
    <text x="34" y="250" class="bullet">- best: FSDP / Megatron</text>
    <text x="34" y="268" class="bullet">- weights: sharded-optimizer layout</text>
  </g>

  
  <g data-anim="2">
    <rect x="20" y="320" width="280" height="160" rx="10" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>
    <text x="160" y="338" text-anchor="middle" class="rf-title">ROOFLINE (illustrative, relative positions only)</text>

    <g transform="translate(20,320)">
      <line x1="45" y1="25" x2="45" y2="135" class="v-stroke" stroke-width="1.4"/>
      <line x1="45" y1="135" x2="245" y2="135" class="v-stroke" stroke-width="1.4"/>
      <path d="M45 135 L130 60 L230 60" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>

      <text x="145" y="149" text-anchor="middle" class="rf-ax">arithmetic intensity -&gt;</text>
      <text x="12" y="80" text-anchor="middle" class="rf-ax" transform="rotate(-90 12 80)">throughput -&gt;</text>

      
      <circle cx="66" cy="119" r="5.5" fill="var(--accent2,#3b82f6)"/>
      <text x="76" y="112" text-anchor="start" class="rf-lbl" fill="var(--accent2,#3b82f6)">decode</text>

      
      <circle cx="190" cy="60" r="5.5" fill="var(--good,#2f9e6e)"/>
      <text x="190" y="50" text-anchor="middle" class="rf-lbl" fill="var(--good,#2f9e6e)">train</text>
    </g>
    <text x="160" y="498" text-anchor="middle" class="rf-cap">same chip, opposite operating points</text>
  </g>

  
  <g data-anim="3">
    <path d="M300 85 L 328 148" fill="none" stroke="var(--muted)" stroke-width="1.8" marker-end="url(#rlanat-bridge-arrow)"/>
    <path d="M300 235 L 328 172" fill="none" stroke="var(--muted)" stroke-width="1.8" marker-end="url(#rlanat-bridge-arrow)"/>

    <rect x="332" y="90" width="228" height="140" rx="10" fill="var(--warn,#e0a106)" fill-opacity="0.10" stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
    <text x="446" y="118" text-anchor="middle" class="node-title" fill="var(--warn,#e0a106)">INCOMPATIBLE</text>
    <text x="446" y="136" text-anchor="middle" class="node-title" fill="var(--warn,#e0a106)">weight layouts</text>
    <text x="446" y="160" text-anchor="middle" class="node-sub">you cannot hand vLLM</text>
    <text x="446" y="174" text-anchor="middle" class="node-sub">an FSDP shard and serve</text>
    <text x="446" y="198" text-anchor="middle" class="node-sub">(different sharding, different</text>
    <text x="446" y="212" text-anchor="middle" class="node-sub">tensor layout, different precision)</text>
  </g>

  
  <g data-anim="4">
    <path d="M560 160 L588 160" fill="none" stroke="var(--accent)" stroke-width="2.4" marker-end="url(#rlanat-bridge-arrow-accent)"/>

    <rect x="590" y="80" width="190" height="160" rx="12" fill="var(--accent)" fill-opacity="0.10" stroke="var(--accent)" stroke-width="2.4"/>
    <text x="685" y="118" text-anchor="middle" class="punch" fill="var(--accent)">=&gt; run BOTH</text>
    <text x="685" y="136" text-anchor="middle" class="punch" fill="var(--accent)">stacks and</text>
    <text x="685" y="154" text-anchor="middle" class="punch" fill="var(--accent)">BRIDGE them</text>
    <line x1="620" y1="172" x2="750" y2="172" class="v-grid" stroke-width="1"/>
    <text x="685" y="196" text-anchor="middle" class="punch-sub">the bridge =</text>
    <text x="685" y="212" text-anchor="middle" class="punch-sub">weight sync</text>
    <text x="685" y="228" text-anchor="middle" class="node-sub">(Tension 3)</text>
  </g>
</svg>
<figcaption><b>Opposite hardware appetites force an RL system to run two incompatible stacks and bridge them.</b> Decode is memory-bandwidth-bound and sits low on the roofline's rising slope; training is compute-bound and sits on the flat ceiling — the same chip, used at opposite operating points. Because the best software for each (vLLM/SGLang vs. FSDP/Megatron) lays weights out differently, you cannot serve one stack's shard with the other's engine, so the system runs both and stitches them together with weight sync.</figcaption>
</figure>
