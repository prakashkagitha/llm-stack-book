<figcaption><b>Oversubscription turns a mean-over-max tail bubble into a single final-tail sliver.</b> With one shard per engine (top), five engines finish in a fraction of the time and then idle until the outlier reaches <code>L_max</code>, so eta_gen = L_bar/L_max collapses whenever one trace runs long. Pouring the whole rollout batch into the same six engines (bottom) lets continuous batching refill every freed slot from a deep queue, so all but the very last unmatched moment is useful work.</figcaption>
</figure>
