<figure class="viz" id="fig-promptdecomp-plan-execute-synthesize">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 780 340" role="img" aria-label="Decomposition prompting pipeline: a complex task flows into a Plan stage, which fans out to three Execute sub-tasks, whose outputs converge into a Synthesize stage producing a final answer.">
<style>
  #fig-promptdecomp-plan-execute-synthesize text { fill: var(--ink-soft); }
  #fig-promptdecomp-plan-execute-synthesize .st { font: 700 11px var(--sans,sans-serif); fill: #fff; }

  #fig-promptdecomp-plan-execute-synthesize .el { font: italic 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-promptdecomp-plan-execute-synthesize .cp { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted); }

  @keyframes pde-in  { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
  @keyframes pde-drw { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
  @media (prefers-reduced-motion: no-preference) {
    #fig-promptdecomp-plan-execute-synthesize [data-a="1"]  { opacity:0; animation:pde-in .4s ease .1s both }
    #fig-promptdecomp-plan-execute-synthesize [data-a="2"]  { opacity:0; animation:pde-in .4s ease .6s both }
    #fig-promptdecomp-plan-execute-synthesize [data-a="3a"] { opacity:0; animation:pde-in .35s ease 1.2s both }
    #fig-promptdecomp-plan-execute-synthesize [data-a="3b"] { opacity:0; animation:pde-in .35s ease 1.6s both }
    #fig-promptdecomp-plan-execute-synthesize [data-a="3c"] { opacity:0; animation:pde-in .35s ease 2.0s both }
    #fig-promptdecomp-plan-execute-synthesize [data-a="4"]  { opacity:0; animation:pde-in .4s ease 2.5s both }
    #fig-promptdecomp-plan-execute-synthesize [data-a="5"]  { opacity:0; animation:pde-in .4s ease 3.0s both }
    #fig-promptdecomp-plan-execute-synthesize .drw { stroke-dasharray:120; stroke-dashoffset:120; animation:pde-drw .4s ease .4s both }
  }
</style>

<text x="390" y="322" text-anchor="middle" class="cp">Each stage = a fresh autoregressive pass with full prior context.</text>
</svg>
<figcaption><b>Decomposition prompting separates planning, execution, and synthesis into three distinct model calls.</b> Stage 1 produces a subtask list; Stage 2 executes each subtask independently (fan-out); Stage 3 gathers all outputs and writes the final answer (fan-in). The highlighted middle execute box mirrors the example in the text.</figcaption>
</figure>
