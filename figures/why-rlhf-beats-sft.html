<figure class="viz" id="fig-why-rlhf-beats-sft">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 760 560" role="img" aria-label="Why RLHF can exceed SFT: SFT imitates one fixed human demonstration and is capped at its quality, while RLHF decouples the source of supervision (cheap human comparisons) from the form of supervision (a dense reward function defined on every possible response), letting the policy generate and be rewarded for its own outputs that surpass any demonstration.">
<defs>
  <marker id="wrb-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="wrb-arr-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-why-rlhf-beats-sft text { fill: var(--ink-soft,#334155); }
  #fig-why-rlhf-beats-sft .ttl    { font: 700 15px var(--sans,sans-serif); }
  #fig-why-rlhf-beats-sft .sub    { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-why-rlhf-beats-sft .hdr    { font: 700 12.5px var(--sans,sans-serif); }
  #fig-why-rlhf-beats-sft .lbl    { font: 600 10.5px var(--sans,sans-serif); }
  #fig-why-rlhf-beats-sft .lbl-sm { font: 500 9.5px var(--sans,sans-serif); }
  #fig-why-rlhf-beats-sft .lbl-xs { font: 500 8.5px var(--sans,sans-serif); }
  #fig-why-rlhf-beats-sft .mono-sm{ font: 600 9.5px var(--mono,monospace); }
  #fig-why-rlhf-beats-sft .accent { fill: var(--accent,#c15b39); }
  #fig-why-rlhf-beats-sft .accent2{ fill: var(--accent2,#3b82f6); }
  #fig-why-rlhf-beats-sft .muted  { fill: var(--muted,#94a3b8); }
</style>

<text x="380" y="24" text-anchor="middle" class="ttl">Why RLHF can exceed SFT</text>
<text x="380" y="42" text-anchor="middle" class="sub">decoupling the SOURCE of supervision from its FORM</text>


<g data-anim="1">
  <line x1="420" y1="80" x2="420" y2="490" class="muted" stroke="currentColor" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.6"/>
  <rect x="330" y="62" width="180" height="16" rx="4" class="v-fill v-stroke" stroke-width="1"/>
  <text x="420" y="74" text-anchor="middle" class="lbl-xs muted">best human demo (SFT's ceiling)</text>
</g>


<g data-anim="2">
  <text x="75" y="98" class="hdr accent2">SFT - imitation only</text>
  <line x1="70" y1="205" x2="710" y2="205" class="muted" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>

  <path d="M 395 205 L 420 128 L 445 205 Z" fill="var(--accent2,#3b82f6)" fill-opacity="0.25" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>

  <line x1="402" y1="121" x2="438" y2="121" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
  <text x="460" y="118" class="lbl-sm accent2">SFT target: exactly</text>
  <text x="460" y="130" class="lbl-sm accent2">this ONE demo</text>

  <text x="75" y="190" class="lbl-xs muted">every token weighted equally;</text>
  <text x="75" y="202" class="lbl-xs muted">no notion of "better than the demo"</text>

  <text x="75" y="222" class="lbl-xs accent2" font-weight="700">CEILING: cannot generate output better than this</text>
</g>


<g data-anim="3">
  <text x="75" y="266" class="hdr accent">RLHF - source decoupled from form</text>

  <rect x="75" y="284" width="34" height="24" rx="4" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="92" y="300" text-anchor="middle" class="mono-sm">A</text>
  <rect x="119" y="284" width="34" height="24" rx="4" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="136" y="300" text-anchor="middle" class="mono-sm">B</text>
  <text x="163" y="300" class="lbl-sm">human: "A is better" - cheap, no writing required</text>
  <text x="75" y="316" class="lbl-xs accent" font-weight="700">SOURCE = comparisons only</text>

  <path d="M 92 308 C 92 322, 100 328, 130 332" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.4" marker-end="url(#wrb-arr-a)"/>
  <text x="145" y="336" class="lbl-xs muted">trains r_phi</text>
</g>


<g data-anim="4">
  <path d="M 70 350 C 220 349, 300 342, 400 328 C 500 314, 610 306, 710 300"
        fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.4" stroke-linecap="round"/>
  <text x="560" y="278" text-anchor="middle" class="lbl-sm accent" font-weight="700">learned reward r_phi(y):</text>
  <text x="560" y="290" text-anchor="middle" class="lbl-sm accent">dense &amp; defined on EVERY</text>
  <text x="560" y="302" text-anchor="middle" class="lbl-sm accent">possible response (FORM)</text>

  <rect x="420" y="330" width="290" height="130" fill="var(--accent,#c15b39)" opacity="0.06"/>
  <text x="565" y="472" text-anchor="middle" class="lbl-xs accent" font-style="italic">never demonstrated by a human - RM can still score it</text>
</g>


<g data-anim="5">
  <line x1="70" y1="460" x2="710" y2="460" class="muted" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>

  <path d="M 320 460 Q 360 402 400 460 Z" fill="var(--muted,#94a3b8)" fill-opacity="0.3" stroke="var(--muted,#94a3b8)" stroke-width="1.6"/>
  <text x="360" y="392" text-anchor="middle" class="lbl-xs muted">policy before RL</text>
  <text x="360" y="403" text-anchor="middle" class="lbl-xs muted">(~SFT init)</text>

  <path d="M 505 460 Q 560 372 615 460 Z" fill="var(--accent,#c15b39)" fill-opacity="0.28" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <text x="560" y="362" text-anchor="middle" class="lbl-sm accent" font-weight="700">policy after RL</text>
  <text x="560" y="374" text-anchor="middle" class="lbl-xs accent">(past the demo ceiling)</text>

  <path d="M 375 430 C 440 400, 470 400, 500 400" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#wrb-arr-a)"/>
  <text x="400" y="425" class="lbl-xs accent">climbs the reward surface</text>
</g>


<g data-anim="5">
  <line x1="70" y1="490" x2="710" y2="490" stroke="var(--ink-soft,#64748b)" stroke-width="1.6" marker-end="url(#wrb-arr)"/>
  <text x="390" y="507" text-anchor="middle" class="lbl-xs muted">response quality / utility -&gt;</text>
</g>


<g data-anim="5">
  <rect x="40" y="518" width="680" height="34" rx="8" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="380" y="533" text-anchor="middle" class="lbl-sm">SOURCE (cheap comparisons) is decoupled from FORM (a dense scalar reward)</text>
  <text x="380" y="546" text-anchor="middle" class="lbl-sm" font-weight="700">-&gt; the policy is rewarded for self-generated outputs BETTER than any demo</text>
</g>

</svg>
<figcaption><b>RLHF decouples the source of supervision from its form, which is why it can exceed SFT.</b> SFT can only imitate a single fixed human demonstration, so its output quality is capped at that demo's quality (top). RLHF instead trains a reward model from cheap human <i>comparisons</i> (the source), which yields a dense scalar defined on <i>every</i> possible response (the form) — including ones no human ever wrote. The policy then generates its own candidate responses and is pushed by that dense signal past the demonstration ceiling, into a region no demonstration ever reached.</figcaption>
</figure>
