<figure class="viz" id="fig-syndata-verification-ladder">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 870 380" role="img" aria-label="The synthetic-data verification ladder: five sequential quality gates ordered cheapest to most expensive, each dropping records so later stages process fewer items.">
  <defs>
    <marker id="svl-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#2563eb)"/>
    </marker>
    <marker id="svl-darr" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 0 L9 0 L5 9 z" fill="var(--muted,#9ca3af)"/>
    </marker>
    <marker id="svl-farr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
    </marker>
    <clipPath id="svl-dotclip"><rect x="0" y="95" width="790" height="130"/></clipPath>
  </defs>
  <style>
    #fig-syndata-verification-ladder text   { fill: var(--ink-soft,#374151); }
    #fig-syndata-verification-ladder .ttl   { font: 700 9.5px var(--sans,sans-serif); }
    #fig-syndata-verification-ladder .badge { font: 700 11px var(--sans,sans-serif); }
    #fig-syndata-verification-ladder .sub   { font: 400 8px var(--mono,monospace); fill: var(--muted,#6b7280); }
    #fig-syndata-verification-ladder .drop  { font: 400 8px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
    #fig-syndata-verification-ladder .axl   { font: 500 9px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-syndata-verification-ladder .foot  { font: 400 8px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-syndata-verification-ladder .final { font: 700 9.5px var(--sans,sans-serif); }
    #fig-syndata-verification-ladder .dot {
      animation: svl-flow 5s linear infinite;
      fill: var(--accent,#2563eb); opacity: 0.85;
    }
    #fig-syndata-verification-ladder .dot2 { animation-delay: 1.67s; }
    #fig-syndata-verification-ladder .dot3 { animation-delay: 3.33s; }
    @keyframes svl-flow {
      0%   { transform: translateX(0px);   opacity:0.9; }
      88%  { transform: translateX(730px); opacity:0.9; }
      89%  { opacity:0; }
      100% { transform: translateX(730px); opacity:0; }
    }
  </style>

  
  <line x1="12" y1="35" x2="812" y2="35" stroke="var(--accent,#2563eb)" stroke-width="1.1" marker-end="url(#svl-arr)" opacity="0.45"/>
  <text x="14"  y="26" class="axl" text-anchor="start">cheapest</text>
  <text x="810" y="26" class="axl" text-anchor="end">most expensive</text>

  
  
  <rect x="12"  y="50" width="148" height="180" rx="7" class="v-fill" stroke="var(--accent,#2563eb)" stroke-width="1.6"/>
  <circle cx="86" cy="69" r="10" fill="var(--accent,#2563eb)" opacity="0.12"/>
  <text x="86"  y="73"  text-anchor="middle" class="badge" fill="var(--accent,#2563eb)">1</text>
  <text x="86"  y="90"  text-anchor="middle" class="ttl"   fill="var(--accent,#2563eb)">Format / length</text>
  <text x="86"  y="102" text-anchor="middle" class="ttl"   fill="var(--accent,#2563eb)">&amp; language ID</text>
  <line x1="22"  y1="108" x2="150" y2="108" stroke="var(--accent,#2563eb)" stroke-width="0.5" opacity="0.2"/>
  <text x="86"  y="122" text-anchor="middle" class="sub">drop malformed</text>
  <text x="86"  y="133" text-anchor="middle" class="sub">drop wrong-lang</text>

  
  <rect x="173" y="50" width="148" height="180" rx="7" class="v-fill" stroke="var(--accent,#2563eb)" stroke-width="1.6"/>
  <circle cx="247" cy="69" r="10" fill="var(--accent,#2563eb)" opacity="0.12"/>
  <text x="247" y="73"  text-anchor="middle" class="badge" fill="var(--accent,#2563eb)">2</text>
  <text x="247" y="90"  text-anchor="middle" class="ttl"   fill="var(--accent,#2563eb)">n-gram dedup</text>
  <text x="247" y="102" text-anchor="middle" class="sub">(MinHash / LSH)</text>
  <line x1="183" y1="108" x2="311" y2="108" stroke="var(--accent,#2563eb)" stroke-width="0.5" opacity="0.2"/>
  <text x="247" y="122" text-anchor="middle" class="sub">drop near-dups</text>

  
  <rect x="334" y="50" width="148" height="180" rx="7" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <circle cx="408" cy="69" r="10" fill="var(--accent2,#3b82f6)" opacity="0.12"/>
  <text x="408" y="73"  text-anchor="middle" class="badge" fill="var(--accent2,#3b82f6)">3</text>
  <text x="408" y="90"  text-anchor="middle" class="ttl"   fill="var(--accent2,#3b82f6)">Quality</text>
  <text x="408" y="102" text-anchor="middle" class="ttl"   fill="var(--accent2,#3b82f6)">classifier</text>
  <line x1="344" y1="108" x2="472" y2="108" stroke="var(--accent2,#3b82f6)" stroke-width="0.5" opacity="0.2"/>
  <text x="408" y="122" text-anchor="middle" class="sub">FineWeb-Edu head</text>
  <text x="408" y="133" text-anchor="middle" class="sub">drop low-edu pages</text>
  <text x="408" y="144" text-anchor="middle" class="sub">score &lt; ~3/5</text>

  
  <rect x="495" y="50" width="148" height="180" rx="7" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <circle cx="569" cy="69" r="10" fill="var(--warn,#e0a106)" opacity="0.12"/>
  <text x="569" y="73"  text-anchor="middle" class="badge" fill="var(--warn,#b45309)">4</text>
  <text x="569" y="90"  text-anchor="middle" class="ttl"   fill="var(--warn,#b45309)">Correctness</text>
  <text x="569" y="102" text-anchor="middle" class="ttl"   fill="var(--warn,#b45309)">(exec / verify)</text>
  <line x1="505" y1="108" x2="633" y2="108" stroke="var(--warn,#e0a106)" stroke-width="0.5" opacity="0.2"/>
  <text x="569" y="122" text-anchor="middle" class="sub">sandbox execution</text>
  <text x="569" y="133" text-anchor="middle" class="sub">answer match</text>
  <text x="569" y="144" text-anchor="middle" class="sub">keep verified traces</text>

  
  <rect x="656" y="50" width="148" height="180" rx="7" class="v-fill" stroke="var(--warn,#c2410c)" stroke-width="1.8"/>

  <circle cx="730" cy="69" r="10" fill="var(--warn,#c2410c)" opacity="0.12"/>
  <text x="730" y="73"  text-anchor="middle" class="badge" fill="var(--warn,#c2410c)">5</text>
  <text x="730" y="90"  text-anchor="middle" class="ttl"   fill="var(--warn,#c2410c)">LLM-judge</text>
  <text x="730" y="102" text-anchor="middle" class="ttl"   fill="var(--warn,#c2410c)">(semantic)</text>
  <line x1="666" y1="108" x2="794" y2="108" stroke="var(--warn,#c2410c)" stroke-width="0.5" opacity="0.2"/>
  <text x="730" y="122" text-anchor="middle" class="sub">factuality /</text>
  <text x="730" y="133" text-anchor="middle" class="sub">coherence verdict</text>
  <text x="730" y="144" text-anchor="middle" class="sub">drop subtle errors</text>

  
  <line x1="160" y1="140" x2="173" y2="140" stroke="var(--accent,#2563eb)" stroke-width="5.5" marker-end="url(#svl-arr)" opacity="0.5"/>
  <line x1="321" y1="140" x2="334" y2="140" stroke="var(--accent,#2563eb)" stroke-width="4"   marker-end="url(#svl-arr)" opacity="0.5"/>
  <line x1="482" y1="140" x2="495" y2="140" stroke="var(--accent2,#3b82f6)" stroke-width="2.8" marker-end="url(#svl-arr)" opacity="0.5"/>
  <line x1="643" y1="140" x2="656" y2="140" stroke="var(--warn,#e0a106)"   stroke-width="1.8" marker-end="url(#svl-arr)" opacity="0.55"/>

  
  <rect x="809" y="112" width="54" height="56" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="836" y="131" text-anchor="middle" class="final" fill="var(--good,#2f9e6e)">Clean</text>
  <text x="836" y="143" text-anchor="middle" class="final" fill="var(--good,#2f9e6e)">shard</text>
  <text x="836" y="156" text-anchor="middle" class="sub"   fill="var(--good,#2f9e6e)">kept</text>
  <line x1="804" y1="140" x2="809" y2="140" stroke="var(--good,#2f9e6e)" stroke-width="1.2" marker-end="url(#svl-farr)"/>

  
  <line x1="86"  y1="230" x2="86"  y2="262" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="28"  y="264" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="86"  y="278" text-anchor="middle" class="drop">malformed /</text>
  <text x="86"  y="290" text-anchor="middle" class="drop">wrong-lang</text>

  <line x1="247" y1="230" x2="247" y2="262" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="189" y="264" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="247" y="278" text-anchor="middle" class="drop">near-</text>
  <text x="247" y="290" text-anchor="middle" class="drop">duplicates</text>

  <line x1="408" y1="230" x2="408" y2="262" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="350" y="264" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="408" y="278" text-anchor="middle" class="drop">low-quality</text>
  <text x="408" y="290" text-anchor="middle" class="drop">pages</text>

  <line x1="569" y1="230" x2="569" y2="262" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="511" y="264" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="569" y="278" text-anchor="middle" class="drop">incorrect</text>
  <text x="569" y="290" text-anchor="middle" class="drop">traces</text>

  <line x1="730" y1="230" x2="730" y2="262" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="672" y="264" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="730" y="278" text-anchor="middle" class="drop">subtly-wrong</text>
  <text x="730" y="290" text-anchor="middle" class="drop">outputs</text>

  
  <g clip-path="url(#svl-dotclip)">
    <circle class="dot"  cx="20" cy="140" r="4.5"/>
    <circle class="dot dot2" cx="20" cy="140" r="4.5"/>
    <circle class="dot dot3" cx="20" cy="140" r="4.5"/>
  </g>

  
  <text x="430" y="368" text-anchor="middle" class="foot">Order filters cheapest-first: discard junk before paying for expensive checks.</text>
</svg>
<figcaption><b>The synthetic-data verification ladder.</b> Five quality gates run cheapest-first: format/length checks, n-gram deduplication (MinHash/LSH), an educational quality classifier (FineWeb-Edu), sandbox execution for correctness on math and code, and a final LLM judge for semantic quality. Each stage drops records so the costly later stages process only what survives earlier filters.</figcaption>
</figure>
