<figure class="viz" id="fig-syndata-verification-ladder">
<svg viewBox="0 0 870 420" role="img" aria-label="The synthetic-data verification ladder: five sequential quality gates ordered cheapest to most expensive, each dropping records so later stages process fewer items.">

    </marker>
    <marker id="svl-farr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
    </marker>
  </defs>
  <style>

    #fig-syndata-verification-ladder .ttl   { font: 700 10px var(--sans,sans-serif); }
    #fig-syndata-verification-ladder .badge { font: 700 11px var(--sans,sans-serif); }
    #fig-syndata-verification-ladder .sub   { font: 400 8px var(--mono,monospace); fill: var(--muted,#6b7280); }
    #fig-syndata-verification-ladder .drop  { font: 400 8px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
    #fig-syndata-verification-ladder .axl   { font: 500 9px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-syndata-verification-ladder .foot  { font: 400 8px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-syndata-verification-ladder .final { font: 700 9.5px var(--sans,sans-serif); }
    #fig-syndata-verification-ladder .voll  { font: 400 7.5px var(--mono,monospace); fill: var(--muted,#6b7280); }
  </style>

  
  <line x1="12" y1="35" x2="812" y2="35" stroke="var(--accent,#2563eb)" stroke-width="1.1" marker-end="url(#svl-arr)" opacity="0.45"/>
  <text x="14"  y="26" class="axl" text-anchor="start">cheapest</text>
  <text x="810" y="26" class="axl" text-anchor="end">most expensive</text>

  
  <rect x="12"  y="50" width="148" height="200" rx="7" class="v-fill" stroke="var(--accent,#2563eb)" stroke-width="1.6"/>

  <text x="86"  y="73"  text-anchor="middle" class="badge" fill="var(--accent,#2563eb)">1</text>
  <text x="86"  y="92"  text-anchor="middle" class="ttl"   fill="var(--accent,#2563eb)">Format /</text>
  <text x="86"  y="105" text-anchor="middle" class="ttl"   fill="var(--accent,#2563eb)">length &amp; lang ID</text>
  <line x1="22"  y1="115" x2="150" y2="115" stroke="var(--accent,#2563eb)" stroke-width="0.5" opacity="0.2"/>
  <text x="86"  y="131" text-anchor="middle" class="sub">rule-based checks</text>
  <text x="86"  y="147" text-anchor="middle" class="sub">drop malformed/lang</text>

  
  <rect x="173" y="50" width="148" height="200" rx="7" class="v-fill" stroke="var(--accent,#2563eb)" stroke-width="1.6"/>
  <circle cx="247" cy="69" r="10" fill="var(--accent,#2563eb)" opacity="0.12"/>
  <text x="247" y="73"  text-anchor="middle" class="badge" fill="var(--accent,#2563eb)">2</text>
  <text x="247" y="92"  text-anchor="middle" class="ttl"   fill="var(--accent,#2563eb)">n-gram dedup</text>
  <text x="247" y="105" text-anchor="middle" class="sub">(MinHash / LSH)</text>
  <line x1="183" y1="115" x2="311" y2="115" stroke="var(--accent,#2563eb)" stroke-width="0.5" opacity="0.2"/>
  <text x="247" y="131" text-anchor="middle" class="sub">fuzzy match</text>
  <text x="247" y="147" text-anchor="middle" class="sub">drop near-dups</text>

  
  <rect x="334" y="50" width="148" height="200" rx="7" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <circle cx="408" cy="69" r="10" fill="var(--accent2,#3b82f6)" opacity="0.12"/>
  <text x="408" y="73"  text-anchor="middle" class="badge" fill="var(--accent2,#3b82f6)">3</text>
  <text x="408" y="92"  text-anchor="middle" class="ttl"   fill="var(--accent2,#3b82f6)">Quality</text>
  <text x="408" y="105" text-anchor="middle" class="ttl"   fill="var(--accent2,#3b82f6)">classifier</text>
  <line x1="344" y1="115" x2="472" y2="115" stroke="var(--accent2,#3b82f6)" stroke-width="0.5" opacity="0.2"/>
  <text x="408" y="131" text-anchor="middle" class="sub">FineWeb-Edu head</text>
  <text x="408" y="147" text-anchor="middle" class="sub">score &lt; ~3/5 dropped</text>

  <circle cx="569" cy="69" r="10" fill="var(--warn,#e0a106)" opacity="0.12"/>

  <text x="569" y="92"  text-anchor="middle" class="ttl"   fill="var(--warn,#b45309)">Correctness</text>
  <text x="569" y="105" text-anchor="middle" class="sub">(exec / verify)</text>
  <line x1="505" y1="115" x2="633" y2="115" stroke="var(--warn,#e0a106)" stroke-width="0.5" opacity="0.2"/>
  <text x="569" y="131" text-anchor="middle" class="sub">sandbox execution</text>
  <text x="569" y="147" text-anchor="middle" class="sub">keep verified traces</text>

  
  <rect x="656" y="50" width="148" height="200" rx="7" class="v-fill" stroke="var(--warn,#c2410c)" stroke-width="1.8"/>
  <circle cx="730" cy="69" r="10" fill="var(--warn,#c2410c)" opacity="0.12"/>
  <text x="730" y="73"  text-anchor="middle" class="badge" fill="var(--warn,#c2410c)">5</text>

  <text x="730" y="105" text-anchor="middle" class="sub">(semantic)</text>
  <line x1="666" y1="115" x2="794" y2="115" stroke="var(--warn,#c2410c)" stroke-width="0.5" opacity="0.2"/>
  <text x="730" y="131" text-anchor="middle" class="sub">factuality verdict</text>
  <text x="730" y="147" text-anchor="middle" class="sub">drop subtle errors</text>

  
  <text x="86"  y="170" text-anchor="middle" class="voll">records left</text>
  <rect x="34"  y="176" width="104" height="7" rx="2" fill="var(--muted,#9ca3af)" opacity="0.18"/>
  <rect x="34"  y="176" width="104" height="7" rx="2" fill="var(--accent,#2563eb)" opacity="0.55"/>

  <text x="247" y="170" text-anchor="middle" class="voll">records left</text>
  <rect x="195" y="176" width="104" height="7" rx="2" fill="var(--muted,#9ca3af)" opacity="0.18"/>
  <rect x="195" y="176" width="80" height="7" rx="2" fill="var(--accent,#2563eb)" opacity="0.55"/>

  <text x="408" y="170" text-anchor="middle" class="voll">records left</text>
  <rect x="356" y="176" width="104" height="7" rx="2" fill="var(--muted,#9ca3af)" opacity="0.18"/>
  <rect x="356" y="176" width="55" height="7" rx="2" fill="var(--accent2,#3b82f6)" opacity="0.6"/>

  <text x="569" y="170" text-anchor="middle" class="voll">records left</text>
  <rect x="517" y="176" width="104" height="7" rx="2" fill="var(--muted,#9ca3af)" opacity="0.18"/>
  <rect x="517" y="176" width="32" height="7" rx="2" fill="var(--warn,#e0a106)" opacity="0.65"/>

  <text x="730" y="170" text-anchor="middle" class="voll">records left</text>
  <rect x="678" y="176" width="104" height="7" rx="2" fill="var(--muted,#9ca3af)" opacity="0.18"/>
  <rect x="678" y="176" width="17" height="7" rx="2" fill="var(--warn,#c2410c)" opacity="0.7"/>

  
  <line x1="160" y1="140" x2="173" y2="140" stroke="var(--accent,#2563eb)" stroke-width="5.5" marker-end="url(#svl-arr)" opacity="0.5"/>
  <line x1="321" y1="140" x2="334" y2="140" stroke="var(--accent,#2563eb)" stroke-width="4"   marker-end="url(#svl-arr)" opacity="0.5"/>
  <line x1="482" y1="140" x2="495" y2="140" stroke="var(--accent2,#3b82f6)" stroke-width="2.8" marker-end="url(#svl-arr)" opacity="0.5"/>
  <line x1="643" y1="140" x2="656" y2="140" stroke="var(--warn,#e0a106)"   stroke-width="1.8" marker-end="url(#svl-arr)" opacity="0.55"/>

  
  <rect x="809" y="112" width="54" height="56" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="836" y="131" text-anchor="middle" class="final" fill="var(--good,#2f9e6e)">Clean</text>
  <text x="836" y="143" text-anchor="middle" class="final" fill="var(--good,#2f9e6e)">shard</text>
  <text x="836" y="156" text-anchor="middle" class="sub"   fill="var(--good,#2f9e6e)">kept</text>
  <line x1="804" y1="140" x2="809" y2="140" stroke="var(--good,#2f9e6e)" stroke-width="1.2" marker-end="url(#svl-farr)"/>

  
  <line x1="86"  y1="250" x2="86"  y2="282" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="28"  y="284" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="86"  y="298" text-anchor="middle" class="drop">malformed /</text>
  <text x="86"  y="310" text-anchor="middle" class="drop">wrong-lang</text>

  <line x1="247" y1="250" x2="247" y2="282" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="189" y="284" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="247" y="298" text-anchor="middle" class="drop">near-</text>
  <text x="247" y="310" text-anchor="middle" class="drop">duplicates</text>

  <line x1="408" y1="250" x2="408" y2="282" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="350" y="284" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="408" y="298" text-anchor="middle" class="drop">low-quality</text>
  <text x="408" y="310" text-anchor="middle" class="drop">pages</text>

  <line x1="569" y1="250" x2="569" y2="282" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="511" y="284" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="569" y="298" text-anchor="middle" class="drop">incorrect</text>
  <text x="569" y="310" text-anchor="middle" class="drop">traces</text>

  <line x1="730" y1="250" x2="730" y2="282" stroke="var(--muted,#9ca3af)" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.55" marker-end="url(#svl-darr)"/>
  <rect x="672" y="284" width="116" height="34" rx="4" fill="var(--surface-3,#f1f5f9)" stroke="var(--muted,#9ca3af)" stroke-width="0.8" opacity="0.75"/>
  <text x="730" y="298" text-anchor="middle" class="drop">subtly-wrong</text>
  <text x="730" y="310" text-anchor="middle" class="drop">outputs</text>

  <text x="430" y="405" text-anchor="middle" class="foot">Order filters cheapest-first: discard junk before paying for expensive checks. Volume bars are illustrative, not measured counts.</text>
</svg>
<figcaption><b>The synthetic-data verification ladder.</b> Five quality gates run cheapest-first: format/length checks, n-gram deduplication (MinHash/LSH), an educational quality classifier (FineWeb-Edu), sandbox execution for correctness on math and code, and a final LLM judge for semantic quality. Each stage drops records so the costly later stages process only what survives earlier filters — the shrinking illustrative volume bars make that funnel concrete.</figcaption>
</figure>
