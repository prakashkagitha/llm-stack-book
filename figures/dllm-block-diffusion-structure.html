<figure class="viz" id="fig-dllm-block-diffusion-structure">
<svg viewBox="0 0 800 480" role="img" aria-label="Block diffusion: three blocks of four tokens each. Block 1 and block 2 are finalized with their key-value cache fixed and reused. Block 3 is the current block, denoised in parallel with two tokens already committed and two still masked, with full bidirectional attention inside the block. Across blocks attention is causal: a block attends to all earlier blocks but not future ones. A twelve by twelve block-causal attention mask inset shows dense diagonal blocks, filled lower-triangular blocks, and empty upper-triangular blocks. A dial shows block size interpolating between pure autoregressive and pure diffusion.">

  <marker id="bd-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

</defs>

<figcaption><b>Block diffusion interpolates between autoregressive and diffusion by choosing a block size B.</b> Finalized blocks (1, 2) have a fixed KV cache computed once and reused; the current block (3) is denoised in parallel with full bidirectional attention inside it, while attention across blocks stays causal -- a block sees all earlier blocks but never a future one. B = 1 recovers pure autoregressive decoding; B = L recovers pure diffusion; production systems sit in between to get cache reuse, flexible-length generation, and within-block parallelism at once.</figcaption>
