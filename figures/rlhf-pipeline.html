<figure class="viz" id="fig-rlhf-pipeline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 800 384" role="img" aria-label="The three-stage RLHF pipeline: SFT on demonstrations produces the SFT model, which seeds a reward model trained on human preference comparisons, and a PPO policy optimized against that reward model under a KL penalty to the frozen SFT reference.">
  <defs>
    <marker id="rp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-rlhf-pipeline text{ fill:var(--ink-soft); }
    #fig-rlhf-pipeline .stage{ font:700 13px var(--sans,sans-serif); }
    #fig-rlhf-pipeline .tag{ font:700 10px var(--mono,monospace); fill:var(--muted); }
    #fig-rlhf-pipeline .step{ font:500 11px var(--sans,sans-serif); }
    #fig-rlhf-pipeline .sub{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-rlhf-pipeline .mono{ font:600 11px var(--mono,monospace); }
    #fig-rlhf-pipeline .cap{ font:600 10px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <rect x="14" y="40" width="222" height="246" rx="9" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="26" y="32" class="tag">STAGE 1</text>
    <text x="125" y="62" text-anchor="middle" class="stage" fill="var(--accent)">SFT</text>

    
    <rect x="40" y="78" width="170" height="40" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="125" y="95" text-anchor="middle" class="step">prompts + human</text>
    <text x="125" y="109" text-anchor="middle" class="step">demonstrations</text>

    <line x1="125" y1="118" x2="125" y2="146" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#rp-arrow)"/>

    
    <rect x="40" y="148" width="170" height="34" rx="6" class="v-fill v-grid" stroke-width="1.2"/>
    <text x="125" y="169" text-anchor="middle" class="step">fine-tune base model</text>

    <line x1="125" y1="182" x2="125" y2="210" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#rp-arrow)"/>

    
    <rect x="56" y="212" width="138" height="50" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="125" y="234" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">π_SFT</text>
    <text x="125" y="251" text-anchor="middle" class="sub">the SFT model</text>
  </g>

  
  <g data-anim="2">
    <line x1="236" y1="160" x2="284" y2="160" stroke="currentColor" class="v-muted" stroke-width="1.6" marker-end="url(#rp-arrow)"/>
  </g>

  
  <g data-anim="2">
    <rect x="288" y="40" width="222" height="246" rx="9" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="300" y="32" class="tag">STAGE 2</text>
    <text x="399" y="62" text-anchor="middle" class="stage" fill="var(--accent)">Reward Model</text>

    
    <rect x="314" y="78" width="170" height="40" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="399" y="95" text-anchor="middle" class="step">sample K responses</text>
    <text x="399" y="109" text-anchor="middle" class="step">from <tspan class="mono" dx="2">π_SFT</tspan></text>

    <line x1="399" y1="118" x2="399" y2="146" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#rp-arrow)"/>

    
    <rect x="314" y="148" width="170" height="34" rx="6" class="v-fill v-grid" stroke-width="1.2"/>
    <text x="399" y="163" text-anchor="middle" class="step">humans compare them</text>
    <text x="399" y="176" text-anchor="middle" class="sub">prefer y_w  &gt;  y_l</text>

    <line x1="399" y1="182" x2="399" y2="210" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#rp-arrow)"/>

    
    <rect x="330" y="212" width="138" height="50" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="399" y="234" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">r_φ(x, y)</text>
    <text x="399" y="251" text-anchor="middle" class="sub">Bradley–Terry loss</text>
  </g>

  
  <g data-anim="3">
    <line x1="510" y1="160" x2="558" y2="160" stroke="currentColor" class="v-muted" stroke-width="1.6" marker-end="url(#rp-arrow)"/>
  </g>

  
  <g data-anim="3">
    <rect x="562" y="40" width="224" height="246" rx="9" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="574" y="32" class="tag">STAGE 3</text>
    <text x="674" y="62" text-anchor="middle" class="stage" fill="var(--accent)">RL (PPO)</text>

    
    <rect x="588" y="78" width="172" height="40" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="674" y="95" text-anchor="middle" class="step">policy samples</text>
    <text x="674" y="109" text-anchor="middle" class="step">a response y</text>

    <line x1="674" y1="118" x2="674" y2="146" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#rp-arrow)"/>

    
    <rect x="588" y="148" width="172" height="34" rx="6" class="v-fill v-grid" stroke-width="1.2"/>
    <text x="674" y="163" text-anchor="middle" class="step">reward model scores it</text>
    <text x="674" y="176" text-anchor="middle" class="sub">frozen r_φ, one scalar</text>

    <line x1="674" y1="182" x2="674" y2="210" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#rp-arrow)"/>

    
    <rect x="604" y="212" width="140" height="50" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="674" y="234" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">π_RL</text>
    <text x="674" y="251" text-anchor="middle" class="sub">the aligned model</text>
  </g>

  
  <g data-anim="4">
    
    <path d="M125 262 V300 H674 V120" fill="none" stroke="var(--accent)" class="v-accent-s viz-draw" style="--len:1145" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#rp-arrow)"/>
    <text x="332" y="316" text-anchor="middle" class="cap" fill="var(--accent)">π_SFT initializes RM &amp; policy, and is the frozen reference</text>
  </g>

  
  <g data-anim="5">
    <path d="M744 237 q32 -4 32 -40 V136 q0 -36 -16 -42" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#rp-arrow)"/>
    <text x="786" y="186" class="cap" fill="var(--warn,#e0a106)" transform="rotate(-90 786 186)" text-anchor="middle">KL leash to π_ref</text>
  </g>

  
  <g data-anim="5">
    <text x="400" y="358" text-anchor="middle" class="sub">Each stage produces an artifact the next consumes — comparisons become a dense, queryable reward.</text>
  </g>
</svg>
<figcaption><b>RLHF turns cheap human comparisons into a learned objective in three stages.</b> <b>Stage 1</b> fine-tunes the base model on demonstrations to get <span class="mono">π_SFT</span>; <b>Stage 2</b> samples K responses, has humans compare them, and fits a reward model <span class="mono">r_φ</span> with the Bradley–Terry loss; <b>Stage 3</b> uses PPO to push the policy toward high <span class="mono">r_φ</span> while a KL penalty leashes it to the frozen <span class="mono">π_SFT</span> reference.</figcaption>
</figure>
