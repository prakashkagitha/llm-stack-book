<figcaption><b>CLIP normalizes each pair against the whole batch; SigLIP treats every pair independently.</b> CLIP's softmax denominator sums over an entire row and column of the N x N similarity matrix, so every positive pair must out-rank all other images and all other texts in the batch, coupling the loss to batch size and requiring a global gather across devices. SigLIP replaces this with a per-cell sigmoid decision (matching pair vs. not), so each cell's loss is self-contained, shards trivially across GPUs, and works well even at small batch sizes.</figcaption>
</figure>
