<figure class="viz" id="fig-latency-timeline-ttft-tpot">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 290" role="img" aria-label="A single request timeline: arrival, a short queue delay, then a wide prefill block whose end pops the first token (TTFT), followed by a steady cadence of decode token ticks separated by TPOT/ITL gaps, with E2E spanning arrival to the last token.">

<defs>
  <marker id="lt-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#6b7280)"/>
  </marker>
</defs>

<style>
  #fig-latency-timeline-ttft-tpot text { fill: var(--ink-soft,#374151); font-family: var(--sans,sans-serif); }
  #fig-latency-timeline-ttft-tpot .brk    { font: 700 10.5px var(--sans,sans-serif); }
  #fig-latency-timeline-ttft-tpot .lbl    { font: 500 9px var(--sans,sans-serif); }
  #fig-latency-timeline-ttft-tpot .small  { font: 400 8px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-latency-timeline-ttft-tpot .blkh   { font: 700 12px var(--sans,sans-serif); }
  #fig-latency-timeline-ttft-tpot .blks   { font: 400 8px var(--sans,sans-serif); }
  #fig-latency-timeline-ttft-tpot .tag    { font: 600 8px var(--mono,monospace); fill: var(--muted,#9ca3af); }
  @media (prefers-reduced-motion: reduce) {
    #fig-latency-timeline-ttft-tpot [data-anim] { opacity: 1 !important; animation: none !important; }
  }
</style>


<g data-anim="1">
  <text x="310" y="15" text-anchor="middle" class="brk" fill="var(--ink-soft,#374151)">E2E = TTFT + (T-1) x TPOT</text>
  <line x1="60" y1="26" x2="560" y2="26" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2"/>
  <line x1="60" y1="20" x2="60" y2="26" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2"/>
  <line x1="560" y1="20" x2="560" y2="26" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2"/>
</g>


<g data-anim="2">
  <text x="177" y="47" text-anchor="middle" class="brk" fill="var(--accent,#4f46e5)">TTFT (Time To First Token)</text>
  <line x1="60" y1="56" x2="295" y2="56" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
  <line x1="60" y1="50" x2="60" y2="56" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
  <line x1="295" y1="50" x2="295" y2="56" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
</g>


<g data-anim="2">
  <text x="60" y="72" text-anchor="middle" class="lbl">arrival</text>
  <line x1="60" y1="78" x2="60" y2="200" stroke="var(--border-2,#d1d5db)" stroke-width="1" stroke-dasharray="3 3"/>
</g>


<g data-anim="2">
  <rect x="62" y="176" width="31" height="24" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="78" y="214" text-anchor="middle" class="small">queue</text>
</g>


<g data-anim="3">
  <rect x="95" y="140" width="200" height="60" rx="6" fill="var(--surface,#f9fafb)" stroke="var(--accent,#4f46e5)" stroke-width="2"/>
  <text x="195" y="165" text-anchor="middle" class="blkh" fill="var(--accent,#4f46e5)">PREFILL</text>
  <text x="195" y="181" text-anchor="middle" class="blks" fill="var(--accent,#4f46e5)">(encode S tokens,</text>
  <text x="195" y="191" text-anchor="middle" class="blks" fill="var(--accent,#4f46e5)">compute-bound)</text>
  <text x="195" y="214" text-anchor="middle" class="small">longer prompt -&gt; longer TTFT</text>
</g>


<g data-anim="4">
  <text x="295" y="118" text-anchor="middle" class="lbl" fill="var(--accent-2,#0891b2)">first token</text>
  <line x1="295" y1="122" x2="295" y2="138" stroke="var(--accent-2,#0891b2)" stroke-width="1.2"/>
  <circle cx="295" cy="200" r="4.5" fill="var(--accent-2,#0891b2)"/>
</g>


<g data-anim="1">
  <line x1="40" y1="200" x2="650" y2="200" stroke="var(--ink-soft,#6b7280)" stroke-width="1.6" marker-end="url(#lt-arrow)"/>
  <text x="662" y="204" text-anchor="start" class="lbl">time</text>
</g>


<g data-anim="4">
  <circle cx="335" cy="200" r="3.5" fill="var(--accent-2,#0891b2)"/>
  <circle cx="375" cy="200" r="3.5" fill="var(--accent-2,#0891b2)"/>
  <circle cx="415" cy="200" r="3.5" fill="var(--accent-2,#0891b2)"/>
  <circle cx="455" cy="200" r="3.5" fill="var(--accent-2,#0891b2)"/>
  <text x="490" y="205" text-anchor="middle" class="tag" fill="var(--accent-2,#0891b2)">...</text>
  <circle cx="560" cy="200" r="4.5" fill="var(--accent-2,#0891b2)"/>
  <text x="560" y="224" text-anchor="middle" class="small">last token (T)</text>
</g>


<g data-anim="5">
  <line x1="295" y1="207" x2="295" y2="215" stroke="var(--accent-2,#0891b2)" stroke-width="1.2"/>
  <line x1="335" y1="207" x2="335" y2="215" stroke="var(--accent-2,#0891b2)" stroke-width="1.2"/>
  <line x1="295" y1="215" x2="335" y2="215" stroke="var(--accent-2,#0891b2)" stroke-width="1.2"/>
  <text x="315" y="228" text-anchor="middle" class="lbl" fill="var(--accent-2,#0891b2)">TPOT / ITL</text>
  <text x="315" y="238" text-anchor="middle" class="small">(per-token gap)</text>
</g>


<g data-anim="4">
  <text x="427" y="250" text-anchor="middle" class="brk" fill="var(--accent-2,#0891b2)">DECODE (memory-bound)</text>
  <text x="427" y="262" text-anchor="middle" class="small">steady typing cadence</text>
</g>

</svg>
<figcaption><b>A single request splits into a wide, compute-bound prefill (its end pops the first token, setting TTFT) followed by a steady cadence of decode tokens spaced by TPOT/ITL gaps.</b> E2E latency is just TTFT plus (T-1) copies of that per-token gap &#8212; which is why a longer prompt inflates TTFT while a slower decode step inflates every subsequent token equally.</figcaption>
</figure>
