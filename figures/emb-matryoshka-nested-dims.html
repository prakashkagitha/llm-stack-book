<figure class="viz" id="fig-emb-matryoshka-nested-dims">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 800 400" role="img" aria-label="Matryoshka Representation Learning: one embedding vector whose growing prefixes of 32, 64, 128, 256 and full d dimensions are each independently usable, trained by summing InfoNCE losses over all prefixes, and truncatable at inference time.">
  <defs>
    <marker id="mrl-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-emb-matryoshka-nested-dims text{ fill: var(--ink-soft); font: 12px var(--sans,sans-serif); }
    #fig-emb-matryoshka-nested-dims .lbl{ font: 600 13px var(--sans,sans-serif); }
    #fig-emb-matryoshka-nested-dims .cap{ font: 400 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-emb-matryoshka-nested-dims .capB{ font: 600 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-emb-matryoshka-nested-dims .tiny{ font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-emb-matryoshka-nested-dims .mono{ font: 600 10px var(--mono,monospace); }
  </style>

  <text x="14" y="22" class="lbl">One embedding vector, five nested usable prefixes</text>


  <g data-anim="1">
    
    <rect x="40"  y="52" width="710" height="20" rx="10" fill="var(--accent)" opacity="0.14" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="40"  y="52" width="430" height="20" rx="10" fill="var(--accent)" opacity="0.20" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="40"  y="52" width="250" height="20" rx="10" fill="var(--accent)" opacity="0.28" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.6"/>
    <rect x="40"  y="52" width="140" height="20" rx="10" fill="var(--accent)" opacity="0.38" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.75"/>
    <rect x="40"  y="52" width="70"  height="20" rx="10" fill="var(--accent)" opacity="0.55" stroke="var(--accent)" stroke-width="1.2"/>

    <text x="75"  y="46" text-anchor="middle" class="tiny">[0:32]</text>
    <text x="145" y="46" text-anchor="middle" class="tiny">[0:64]</text>
    <text x="255" y="46" text-anchor="middle" class="tiny">[0:128]</text>
    <text x="435" y="46" text-anchor="middle" class="tiny">[0:256]</text>
    <text x="670" y="46" text-anchor="middle" class="tiny">[0:d]</text>
  </g>


  <g data-anim="2">
    
    <rect x="40" y="86" width="710" height="34" rx="4" class="v-fill" stroke="var(--v-grid)" stroke-width="1.2"/>
    <line x1="110" y1="86" x2="110" y2="120" stroke="var(--accent)" stroke-width="1.6"/>
    <line x1="180" y1="86" x2="180" y2="120" stroke="var(--accent)" stroke-width="1.6"/>
    <line x1="290" y1="86" x2="290" y2="120" stroke="var(--accent)" stroke-width="1.6"/>
    <line x1="470" y1="86" x2="470" y2="120" stroke="var(--accent)" stroke-width="1.6"/>

    
    <g class="v-grid" stroke="currentColor" stroke-width="0.6" opacity="0.5">
      <line x1="55" y1="86" x2="55" y2="120"/><line x1="70" y1="86" x2="70" y2="120"/><line x1="85" y1="86" x2="85" y2="120"/><line x1="100" y1="86" x2="100" y2="120"/>
      <line x1="125" y1="86" x2="125" y2="120"/><line x1="145" y1="86" x2="145" y2="120"/><line x1="165" y1="86" x2="165" y2="120"/>
      <line x1="205" y1="86" x2="205" y2="120"/><line x1="230" y1="86" x2="230" y2="120"/><line x1="255" y1="86" x2="255" y2="120"/><line x1="275" y1="86" x2="275" y2="120"/>
      <line x1="325" y1="86" x2="325" y2="120"/><line x1="365" y1="86" x2="365" y2="120"/><line x1="405" y1="86" x2="405" y2="120"/><line x1="445" y1="86" x2="445" y2="120"/>
      <line x1="510" y1="86" x2="510" y2="120"/><line x1="560" y1="86" x2="560" y2="120"/><line x1="610" y1="86" x2="610" y2="120"/><line x1="660" y1="86" x2="660" y2="120"/><line x1="710" y1="86" x2="710" y2="120"/>
    </g>

    <text x="75"  y="140" text-anchor="middle" class="mono">32</text>
    <text x="145" y="140" text-anchor="middle" class="mono">64</text>
    <text x="235" y="140" text-anchor="middle" class="mono">128</text>
    <text x="380" y="140" text-anchor="middle" class="mono">256</text>
    <text x="605" y="140" text-anchor="middle" class="mono">...</text>
    <text x="710" y="140" text-anchor="middle" class="mono">d</text>

    <text x="75"  y="158" text-anchor="middle" class="tiny">most discriminative</text>
    <text x="75"  y="169" text-anchor="middle" class="tiny">signal packed early</text>
    <text x="705" y="158" text-anchor="end" class="tiny">later dims refine detail</text>
  </g>


  <line x1="785" y1="103" x2="785" y2="103" opacity="0"/>


  <g data-anim="3">
    <text x="180" y="198" text-anchor="middle" class="capB">training: InfoNCE at every prefix, summed</text>

    <rect x="40" y="216" width="80" height="24" rx="4" fill="var(--v-fill)" stroke="var(--v-grid)" stroke-width="1"/>
    <text x="80" y="232" text-anchor="middle" class="tiny">L_32</text>
    <rect x="130" y="216" width="80" height="24" rx="4" fill="var(--v-fill)" stroke="var(--v-grid)" stroke-width="1"/>
    <text x="170" y="232" text-anchor="middle" class="tiny">L_64</text>
    <rect x="220" y="216" width="80" height="24" rx="4" fill="var(--v-fill)" stroke="var(--v-grid)" stroke-width="1"/>
    <text x="260" y="232" text-anchor="middle" class="tiny">L_128</text>
    <text x="308" y="232" text-anchor="middle" class="tiny">...</text>
    <rect x="322" y="216" width="80" height="24" rx="4" fill="var(--v-fill)" stroke="var(--v-grid)" stroke-width="1"/>
    <text x="362" y="232" text-anchor="middle" class="tiny">L_d</text>

    <text x="412" y="216" text-anchor="middle" class="tiny">sum</text>
    <line x1="402" y1="228" x2="425" y2="228" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#mrl-arrow)"/>

    <rect x="432" y="212" width="90" height="32" rx="5" class="v-fill" stroke="var(--accent)" stroke-width="1.6"/>
    <text x="477" y="232" text-anchor="middle" class="capB" fill="var(--accent)">L_MRL</text>

    
    <path d="M80 216 C 80 190, 78 148, 75 124" fill="none" class="v-muted" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3" opacity="0.7" marker-end="url(#mrl-arrow)"/>
    <path d="M170 216 C 165 190, 150 150, 145 124" fill="none" class="v-muted" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3" opacity="0.7" marker-end="url(#mrl-arrow)"/>
    <path d="M260 216 C 250 190, 240 150, 235 124" fill="none" class="v-muted" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3" opacity="0.7" marker-end="url(#mrl-arrow)"/>
    <path d="M362 216 C 450 190, 650 150, 700 124" fill="none" class="v-muted" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3" opacity="0.7" marker-end="url(#mrl-arrow)"/>

    <text x="180" y="262" text-anchor="middle" class="tiny">one model, many dimensions, trained jointly</text>
  </g>


  <g data-anim="4">
    <text x="620" y="198" text-anchor="middle" class="capB">inference: truncate, then re-normalize</text>

    
    <g stroke="var(--accent)" stroke-width="1.4" fill="none" stroke-linecap="round">
      <line x1="620" y1="208" x2="611" y2="220"/>
      <line x1="620" y1="208" x2="629" y2="220"/>
      <circle cx="609" cy="223" r="3.4"/>
      <circle cx="631" cy="223" r="3.4"/>
    </g>

    <rect x="560" y="232" width="120" height="34" rx="4" class="v-fill" stroke="var(--v-grid)" stroke-width="1.2"/>
    <line x1="620" y1="232" x2="620" y2="266" stroke="var(--accent)" stroke-width="1.6" stroke-dasharray="3 3"/>
    <text x="590" y="253" text-anchor="middle" class="mono" opacity="0.9">e[0:128]</text>
    <text x="650" y="253" text-anchor="middle" class="mono" opacity="0.4">e[128:d]</text>

    <line x1="620" y1="272" x2="620" y2="288" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#mrl-arrow)"/>
    <rect x="565" y="292" width="110" height="24" rx="4" fill="var(--v-fill)" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="620" y="308" text-anchor="middle" class="tiny">L2 re-normalize</text>

    <text x="620" y="330" text-anchor="middle" class="tiny">shorter vector, ready to</text>
    <text x="620" y="341" text-anchor="middle" class="tiny">index or compare</text>
  </g>

  <text x="14" y="360" class="cap">Truncate at query time to trade embedding quality for lower cost, latency, and storage.</text>
  <text x="14" y="376" class="cap">Each nested prefix is trained to be a valid, standalone embedding -- not just a compressed approximation.</text>
</svg>
<figcaption><b>Matryoshka Representation Learning trains one vector whose growing prefixes are each independently usable.</b> Every granularity in {32, 64, 128, 256, ..., d} gets its own InfoNCE loss, and the losses sum so gradients shape all prefixes jointly. At inference time you can cut the vector short and re-normalize to trade quality for cost.</figcaption>
</figure>
