<figure class="viz" id="fig-specdec-accept-reject-decomposition">
<button class="viz-replay" type="button">&#x21bb; replay</button>
<style>
  #fig-specdec-accept-reject-decomposition text { fill: var(--ink-soft); }
  #fig-specdec-accept-reject-decomposition .title { font: 700 13.5px var(--sans,sans-serif); }
  #fig-specdec-accept-reject-decomposition .cap { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-specdec-accept-reject-decomposition .legend-lbl { font: 600 10px var(--mono,monospace); }
  #fig-specdec-accept-reject-decomposition .tok-lbl { font: 700 11px var(--mono,monospace); }
  #fig-specdec-accept-reject-decomposition .qp-tag { font: 700 9px var(--mono,monospace); fill: var(--muted); }
  #fig-specdec-accept-reject-decomposition .tick-lbl { font: 500 9px var(--mono,monospace); fill: var(--muted); }
  #fig-specdec-accept-reject-decomposition .callout-hd { font: 700 10.5px var(--sans,sans-serif); }
  #fig-specdec-accept-reject-decomposition .callout-tx { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-specdec-accept-reject-decomposition .eq { font: 600 12px var(--mono,monospace); }
  #fig-specdec-accept-reject-decomposition .mini-lbl { font: 600 10.5px var(--sans,sans-serif); }
  #fig-specdec-accept-reject-decomposition .op { font: 700 16px var(--sans,sans-serif); fill: var(--muted); }
</style>
<svg viewBox="0 0 780 640" role="img" aria-label="Decomposition of the accept/reject rule: for each vocabulary token, the target mass p splits into the accepted overlap min(p,q) plus a residual top-up (p-q)_+ where p exceeds q, or a trimmed excess (q-p)_+ where q exceeds p. Stacking accept plus top-up exactly reconstructs p regardless of the drafter q. The overlap sums to alpha, one minus the total variation distance between p and q.">
  <defs>
    <pattern id="sar-hatch-topup" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="var(--accent2,#3b82f6)" fill-opacity="0.20"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
    </pattern>
    <pattern id="sar-hatch-trim" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(-45)">
      <rect width="7" height="7" fill="var(--warn,#e0a106)" fill-opacity="0.20"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="var(--warn,#e0a106)" stroke-width="2"/>
    </pattern>
  </defs>


  <g data-anim="1">
    <text x="390" y="22" text-anchor="middle" class="title">target p vs. drafter q over a small vocabulary v1..v6</text>


    <rect x="66" y="34" width="13" height="13" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
    <text x="83" y="44" class="legend-lbl">accept: min(p,q)</text>

    <rect x="222" y="34" width="13" height="13" rx="2" fill="url(#sar-hatch-topup)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
    <text x="239" y="44" class="legend-lbl">topup: (p-q)+</text>

    <rect x="356" y="34" width="13" height="13" rx="2" fill="url(#sar-hatch-trim)" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <text x="373" y="44" class="legend-lbl">trim: (q-p)+</text>

    <rect x="480" y="34" width="20" height="13" rx="2" fill="none" stroke="var(--muted)" stroke-width="1.4" stroke-dasharray="3,2"/>
    <text x="504" y="44" class="legend-lbl">q bar (dashed)</text>

    <rect x="616" y="34" width="20" height="13" rx="2" fill="none" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <text x="640" y="44" class="legend-lbl">p bar (solid)</text>

    <text x="390" y="64" text-anchor="middle" class="cap">sum of overlap = alpha = 1 - TV(p,q) = 0.60 -&gt; tokens the drafter gets right on average</text>
  </g>


  <g data-anim="2">
    <rect x="264" y="76" width="196" height="56" rx="8" fill="var(--surface,#f5f5f5)" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
    <text x="362" y="92" text-anchor="middle" class="callout-hd" fill="var(--accent2,#3b82f6)">(A) v4: p &gt; q</text>
    <text x="362" y="106" text-anchor="middle" class="callout-tx">(p-q)+ = 0.15 -&gt; topup</text>
    <text x="362" y="119" text-anchor="middle" class="callout-tx">resampled on reject</text>
    <line x1="400" y1="132" x2="473" y2="206" stroke="var(--accent2,#3b82f6)" stroke-width="1.3" stroke-dasharray="2,2"/>
    <circle cx="473" cy="206" r="3.2" fill="var(--accent2,#3b82f6)"/>

    <rect x="548" y="76" width="196" height="56" rx="8" fill="var(--surface,#f5f5f5)" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
    <text x="646" y="92" text-anchor="middle" class="callout-hd" fill="var(--warn,#e0a106)">(B) v5: q &gt; p</text>
    <text x="646" y="106" text-anchor="middle" class="callout-tx">(q-p)+ = 0.20 -&gt; trim</text>
    <text x="646" y="119" text-anchor="middle" class="callout-tx">cut via accept-prob p/q</text>
    <line x1="608" y1="132" x2="557" y2="260" stroke="var(--warn,#e0a106)" stroke-width="1.3" stroke-dasharray="2,2"/>
    <circle cx="557" cy="260" r="3.2" fill="var(--warn,#e0a106)"/>
  </g>


  <g data-anim="3">

    <line x1="45" y1="360" x2="45" y2="155" stroke="var(--v-grid,var(--border-2))" stroke-width="1.2"/>
    <line x1="45" y1="360" x2="746" y2="360" stroke="var(--v-grid,var(--border-2))" stroke-width="1.2"/>
    <line x1="42" y1="304" x2="746" y2="304" stroke="var(--v-grid,var(--border-2))" stroke-width="0.7" stroke-dasharray="2,3"/>
    <line x1="42" y1="248" x2="746" y2="248" stroke="var(--v-grid,var(--border-2))" stroke-width="0.7" stroke-dasharray="2,3"/>
    <line x1="42" y1="192" x2="746" y2="192" stroke="var(--v-grid,var(--border-2))" stroke-width="0.7" stroke-dasharray="2,3"/>
    <text x="38" y="363" text-anchor="end" class="tick-lbl">0</text>
    <text x="38" y="307" text-anchor="end" class="tick-lbl">.1</text>
    <text x="38" y="251" text-anchor="end" class="tick-lbl">.2</text>
    <text x="38" y="195" text-anchor="end" class="tick-lbl">.3</text>



    <rect x="72" y="332" width="26" height="28" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="85" y="326" text-anchor="middle" class="qp-tag">q</text>

    <rect x="106" y="332" width="26" height="28" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <rect x="106" y="276" width="26" height="56" fill="url(#sar-hatch-topup)" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <text x="119" y="270" text-anchor="middle" class="qp-tag">p</text>
    <text x="102" y="378" text-anchor="middle" class="tok-lbl">v1</text>


    <rect x="190" y="304" width="26" height="56" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <rect x="190" y="192" width="26" height="112" fill="url(#sar-hatch-trim)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="203" y="186" text-anchor="middle" class="qp-tag">q</text>
    <rect x="224" y="304" width="26" height="56" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <text x="237" y="298" text-anchor="middle" class="qp-tag">p</text>
    <text x="220" y="378" text-anchor="middle" class="tok-lbl">v2</text>


    <rect x="308" y="304" width="26" height="56" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="321" y="298" text-anchor="middle" class="qp-tag">q</text>
    <rect x="342" y="304" width="26" height="56" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <text x="355" y="298" text-anchor="middle" class="qp-tag">p</text>
    <text x="338" y="378" text-anchor="middle" class="tok-lbl">v3</text>


    <rect x="426" y="248" width="26" height="112" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="439" y="242" text-anchor="middle" class="qp-tag">q</text>
    <rect x="460" y="248" width="26" height="112" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <rect x="460" y="164" width="26" height="84" fill="url(#sar-hatch-topup)" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <text x="473" y="158" text-anchor="middle" class="qp-tag">p</text>
    <text x="456" y="378" text-anchor="middle" class="tok-lbl">v4 (A)</text>


    <rect x="544" y="332" width="26" height="28" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <rect x="544" y="220" width="26" height="112" fill="url(#sar-hatch-trim)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="557" y="214" text-anchor="middle" class="qp-tag">q</text>
    <rect x="578" y="332" width="26" height="28" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <text x="591" y="326" text-anchor="middle" class="qp-tag">p</text>
    <text x="574" y="378" text-anchor="middle" class="tok-lbl">v5 (B)</text>


    <rect x="662" y="304" width="26" height="56" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="675" y="298" text-anchor="middle" class="qp-tag">q</text>
    <rect x="696" y="304" width="26" height="56" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <rect x="696" y="220" width="26" height="84" fill="url(#sar-hatch-topup)" stroke="var(--ink-soft)" stroke-width="1.5"/>
    <text x="709" y="214" text-anchor="middle" class="qp-tag">p</text>
    <text x="692" y="378" text-anchor="middle" class="tok-lbl">v6</text>
  </g>


  <g data-anim="4">
    <line x1="45" y1="400" x2="746" y2="400" stroke="var(--v-grid,var(--border-2))" stroke-width="1"/>
    <text x="390" y="424" text-anchor="middle" class="eq">emitted = min(p,q) [accept] + (p-q)+ [residual] = p  -- exact, for ANY drafter q</text>


    <rect x="180" y="520" width="60" height="60" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
    <text x="210" y="596" text-anchor="middle" class="mini-lbl">accept</text>

    <text x="262" y="558" text-anchor="middle" class="op">+</text>

    <rect x="290" y="540" width="60" height="40" fill="url(#sar-hatch-topup)" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
    <text x="320" y="596" text-anchor="middle" class="mini-lbl">topup</text>

    <text x="372" y="558" text-anchor="middle" class="op">=</text>

    <rect x="400" y="520" width="60" height="60" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <rect x="400" y="480" width="60" height="40" fill="url(#sar-hatch-topup)" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <text x="430" y="596" text-anchor="middle" class="mini-lbl">p (target)</text>

    <text x="390" y="620" text-anchor="middle" class="cap">-&gt; accept + topup always equals p exactly, whatever q's shape -- trimmed excess drops out.</text>
  </g>
</svg>
<figcaption><b>The accept/reject rule decomposes p into an overlap plus a residual, independent of q.</b> For each token, the accepted mass min(p,q) (green) is shared by both bars; where the target exceeds the drafter (p &gt; q, e.g. v4), the gap (p-q)+ is the "topup" mass supplied by resampling from the residual on reject; where the drafter over-covers (q &gt; p, e.g. v5), the excess (q-p)+ is "trim" mass cut by the accept probability p/q &lt; 1. Stacking accept + topup always reconstructs p exactly — the emitted distribution never depends on q's shape, only the speed of getting there does.</figcaption>
</figure>
