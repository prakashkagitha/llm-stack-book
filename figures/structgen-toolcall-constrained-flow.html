<figure class="viz" id="fig-structgen-toolcall-constrained-flow">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 520" role="img" aria-label="Tool-call constrained decoding: free unconstrained generation until a tool_call token is emitted, at which point the engine switches to constrained mode enforcing the tool-call JSON schema via an FSM/PDA. Alternatively, emitting eot ends generation with no tool call.">
  <defs>
    <marker id="tc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#374151)"/>
    </marker>
    <marker id="tc-arrow-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
    </marker>
    <marker id="tc-arrow-ok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#16a34a)"/>
    </marker>
    <marker id="tc-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6b7280)"/>
    </marker>
  </defs>
  <style>
    #fig-structgen-toolcall-constrained-flow text { fill: var(--ink-soft,#374151); }
    #fig-structgen-toolcall-constrained-flow .ttl  { font: 700 13.5px var(--sans,sans-serif); }
    #fig-structgen-toolcall-constrained-flow .sub  { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-structgen-toolcall-constrained-flow .lbl  { font: 400 11.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-structgen-toolcall-constrained-flow .badge { font: 700 9px var(--sans,sans-serif); }
    #fig-structgen-toolcall-constrained-flow .mono  { font: 500 12px var(--mono,monospace); fill: var(--ink-soft,#374151); }
    #fig-structgen-toolcall-constrained-flow .cap   { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-structgen-toolcall-constrained-flow .panel-lbl { font: 700 12px var(--sans,sans-serif); fill: var(--accent,#4f46e5); }

    /* Animation keyframes */
    @keyframes tc-pulse-flow {
      0%,100% { opacity: 0.25; r: 4; }
      50%      { opacity: 1;    r: 6; }
    }
    @keyframes tc-flash-border {
      0%,100% { stroke-opacity: 0.5; }
      40%,60% { stroke-opacity: 1; stroke-width: 3; }
    }
    @keyframes tc-pill-glow {
      0%,100% { fill-opacity: 0.15; }
      50%      { fill-opacity: 0.55; }
    }
    @keyframes tc-appear {
      0%   { opacity: 0; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: no-preference) {
      #fig-structgen-toolcall-constrained-flow .anim-dot-free {
        animation: tc-pulse-flow 1.8s ease-in-out infinite;
      }
      #fig-structgen-toolcall-constrained-flow .anim-switch-box {
        animation: tc-flash-border 2.0s ease-in-out 0.6s infinite;
      }
      #fig-structgen-toolcall-constrained-flow .anim-pill-name {
        animation: tc-pill-glow 2.2s ease-in-out 1.0s infinite;
      }
      #fig-structgen-toolcall-constrained-flow .anim-pill-args {
        animation: tc-pill-glow 2.2s ease-in-out 1.6s infinite;
      }
    }
  </style>

  

  
  <rect x="14" y="56" width="148" height="56" rx="7" class="v-fill" stroke="var(--border-2,#d1d5db)" stroke-width="1.5"/>
  <text x="88" y="81" text-anchor="middle" class="ttl">User message</text>
  <text x="88" y="98" text-anchor="middle" class="sub">prompt + tools list</text>

  
  <line x1="163" y1="84" x2="212" y2="84" stroke="var(--ink-soft,#374151)" stroke-width="1.5" marker-end="url(#tc-arrow)"/>

  
  <circle class="anim-dot-free" cx="189" cy="84" r="4" fill="var(--good,#16a34a)"/>

  
  <rect x="214" y="48" width="226" height="72" rx="7" fill="var(--good,#16a34a)" fill-opacity="0.10" stroke="var(--good,#16a34a)" stroke-width="1.8"/>
  
  <rect x="344" y="54" width="90" height="16" rx="3" fill="var(--good,#16a34a)" fill-opacity="0.22"/>
  <text x="389" y="65" text-anchor="middle" class="badge" fill="var(--good,#16a34a)">UNCONSTRAINED</text>
  <text x="327" y="83" text-anchor="middle" class="ttl">Model generates</text>
  <text x="327" y="100" text-anchor="middle" class="ttl">conversational response</text>

  
  <circle cx="468" cy="84" r="5" fill="var(--ink-soft,#374151)"/>
  <line x1="440" y1="84" x2="463" y2="84" stroke="var(--ink-soft,#374151)" stroke-width="1.5"/>

  
  
  <polyline points="468,84 468,53 546,53" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#tc-arrow-acc)"/>
  <text x="500" y="44" text-anchor="middle" class="lbl" fill="var(--accent,#4f46e5)">emits &lt;tool_call&gt; token</text>

  
  <rect class="anim-switch-box" x="548" y="14" width="218" height="78" rx="7" fill="var(--accent,#4f46e5)" fill-opacity="0.08" stroke="var(--accent,#4f46e5)" stroke-width="2"/>
  <text x="657" y="40" text-anchor="middle" class="ttl" fill="var(--accent,#4f46e5)">SWITCH TO</text>
  <text x="657" y="57" text-anchor="middle" class="ttl" fill="var(--accent,#4f46e5)">CONSTRAINED MODE</text>
  <text x="657" y="72" text-anchor="middle" class="sub">Grammar: JSON schema</text>
  <text x="657" y="84" text-anchor="middle" class="sub">enforced by FSM/PDA</text>

  
  
  <polyline points="468,84 468,130 546,130" fill="none" stroke="var(--muted,#6b7280)" stroke-width="1.5" marker-end="url(#tc-arrow-muted)"/>
  <text x="504" y="122" text-anchor="middle" class="lbl">emits &lt;eot&gt;</text>

  
  <rect x="548" y="108" width="218" height="52" rx="7" fill="var(--surface-3,#f3f4f6)" fill-opacity="0.6" stroke="var(--muted,#6b7280)" stroke-width="1.4"/>
  <text x="657" y="131" text-anchor="middle" class="ttl" style="fill:var(--muted,#6b7280)">Response done</text>
  <text x="657" y="148" text-anchor="middle" class="sub">no tool called</text>

  
  <line x1="657" y1="92" x2="657" y2="230" stroke="var(--accent,#4f46e5)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polyline points="657,230 480,230" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#tc-arrow-acc)"/>
  <text x="590" y="222" text-anchor="middle" class="lbl" fill="var(--accent,#4f46e5)">enter constrained decoding</text>

  

  
  <rect x="34" y="240" width="700" height="228" rx="10" fill="var(--accent,#4f46e5)" fill-opacity="0.05" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <text x="58" y="266" class="panel-lbl">CONSTRAINED MODE</text>

  
  <text x="68" y="302" class="mono">{"name":</text>

  
  <rect class="anim-pill-name" x="172" y="288" width="216" height="22" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <text x="280" y="303" text-anchor="middle" class="mono" style="font-size:10.5px;fill:var(--warn,#e0a106)">MASK: only valid tool names</text>

  <text x="390" y="302" class="mono">,</text>

  
  <text x="68" y="336" class="mono">  "arguments":</text>

  
  <rect class="anim-pill-args" x="198" y="322" width="244" height="22" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <text x="320" y="337" text-anchor="middle" class="mono" style="font-size:10.5px;fill:var(--warn,#e0a106)">MASK: matches tool parameter schema</text>

  <text x="444" y="336" class="mono">}</text>

  
  <text x="68" y="370" class="cap">name = finite choice over registered tools (tiny FSM)</text>
  <text x="68" y="386" class="cap">arguments = full JSON-Schema PDA</text>

  
  <line x1="68" y1="400" x2="702" y2="400" stroke="var(--border-2,#d1d5db)" stroke-width="0.8"/>

  
  <rect x="68" y="412" width="14" height="14" rx="2" fill="var(--good,#16a34a)" fill-opacity="0.25" stroke="var(--good,#16a34a)" stroke-width="1.2"/>
  <text x="88" y="423" class="cap">Unconstrained (free)</text>

  <rect x="248" y="412" width="14" height="14" rx="2" fill="var(--accent,#4f46e5)" fill-opacity="0.15" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>
  <text x="268" y="423" class="cap">Constrained (grammar-enforced)</text>

  <rect x="510" y="412" width="14" height="14" rx="2" fill="var(--warn,#e0a106)" fill-opacity="0.25" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  <text x="530" y="423" class="cap">Enforced MASK slots</text>

  
  <text x="390" y="488" text-anchor="middle" class="cap">The &lt;eot&gt; branch (grey) shows the no-tool alternate path; constrained mode does not apply there.</text>

</svg>
<figcaption><b>Tool-call constrained decoding switches modes mid-response.</b> The model generates free conversational text (green, unconstrained) until it emits a <code>&lt;tool_call&gt;</code> trigger token; at that point the serving engine activates a grammar-enforced FSM/PDA for the tool-call JSON. The <code>name</code> field is constrained to registered tool names (a tiny finite-choice FSM) and <code>arguments</code> to the tool's full parameter schema (a PDA). Emitting <code>&lt;eot&gt;</code> instead ends generation with no tool called.</figcaption>
</figure>
