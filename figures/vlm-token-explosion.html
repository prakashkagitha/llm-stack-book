  <text x="410" y="24" text-anchor="middle" class="ttl">The visual token explosion: pixels -&gt; patches -&gt; tokens -&gt; memory</text>

    <rect x="16"  y="330" width="26" height="26" rx="3" class="v-fill v-stroke" stroke-width="1.1"/>

  <g data-anim="5">
    <rect x="642" y="56" width="162" height="364" rx="10" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="723" y="76" text-anchor="middle" class="chdr">DOWNSTREAM COST</text>

    <text x="710" y="150" class="ctxt">more tokens =</text>
    <text x="710" y="162" class="ctxt">steeper cost</text>

  <text x="410" y="472" text-anchor="middle" class="foot">more tokens = more fidelity, more context consumed, more memory</text>

</svg>
<figcaption><b>Visual tokens scale as (H/p)^2 per tile, and AnyRes tiling multiplies that by the tile count.</b> A single 336x336 tile gives 576 tokens, doubling resolution to 672x672 quadruples that to 2304, and tiling a wide 1344x336 image into 4 tiles plus a thumbnail reaches 2880 tokens — each on the same shared token-count axis so the growth is directly comparable. More tokens buy fidelity but cost quadratic prefill attention and linearly growing KV-cache memory (about 1.5 GB for a single 2880-token visual prefix at 7B/bf16).</figcaption>
</figure>
