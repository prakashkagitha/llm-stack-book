<figure class="viz" id="fig-harness-subagent-context-isolation">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 840 500" role="img" aria-label="Animated sequence: main agent context box stays clean at top-left. A spawn arrow routes down-right into a sub-agent context box (dashed, disposable) that expands with 40 file reads and a token fill bar. A return arrow routes back up carrying only 3 distilled lines into the main box. The sub-agent then fades to show it is discarded.">
<defs>
  <marker id="sa-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
  </marker>
  <style>
    @media (prefers-reduced-motion: no-preference) {
      #fig-harness-subagent-context-isolation [data-anim] { opacity: 0; }
      #fig-harness-subagent-context-isolation [data-anim="1"] {
        animation: sa-fadein 0.5s 0.3s forwards;
      }
      #fig-harness-subagent-context-isolation [data-anim="2"] {
        animation: sa-fadein 0.4s 1.2s forwards;
      }
      #fig-harness-subagent-context-isolation [data-anim="2b"] {
        animation: sa-grow 1s 1.5s forwards;
        transform-box: fill-box;
        transform-origin: left center;
        transform: scaleX(0);
      }
      #fig-harness-subagent-context-isolation [data-anim="3"] {
        animation: sa-fadein 0.5s 3.0s forwards;
      }
      #fig-harness-subagent-context-isolation [data-anim="4"] {
        animation: sa-fadeout 0.8s 4.2s forwards;
        opacity: 1;
      }
      @keyframes sa-fadein  { from { opacity:0; } to { opacity:1; } }
      @keyframes sa-grow    { from { transform:scaleX(0); } to { transform:scaleX(1); } }
      @keyframes sa-fadeout { from { opacity:1; } to { opacity:0.22; } }
    }
    #fig-harness-subagent-context-isolation .lbl    { font: 600 12px var(--sans,sans-serif); }
    #fig-harness-subagent-context-isolation .lbl-sm { font: 400 10.5px var(--sans,sans-serif); }
    #fig-harness-subagent-context-isolation .lbl-xs { font: 400 9.5px var(--sans,sans-serif); }
    #fig-harness-subagent-context-isolation .ttl    { font: 700 13px var(--sans,sans-serif); }
    #fig-harness-subagent-context-isolation .sub    { font: 400 9.5px var(--sans,sans-serif); }
    #fig-harness-subagent-context-isolation text    { fill: var(--ink-soft,#45413a); }
  </style>
</defs>


<rect x="38" y="28" width="410" height="170" rx="12" class="v-fill v-stroke" stroke-width="2"/>
<rect x="38" y="28" width="410" height="6"   rx="4"  fill="var(--accent,#c15b39)" opacity="0.55"/>
<text x="243" y="53"  text-anchor="middle" class="ttl" fill="var(--accent,#c15b39)">main agent context</text>
<text x="243" y="67"  text-anchor="middle" class="sub">(kept clean)</text>
<rect x="342" y="36" width="92" height="18" rx="5"
      fill="var(--accent,#c15b39)" fill-opacity="0.12"
      stroke="var(--accent,#c15b39)" stroke-width="1"/>
<text x="388" y="49" text-anchor="middle" class="lbl-xs" fill="var(--accent,#c15b39)">kept clean</text>


<text x="56" y="95"  class="lbl-sm">task: fix all usages of User(...)</text>
<text x="56" y="113" class="lbl-sm">plan: 1. find usages  2. patch each</text>
<text x="56" y="131" class="lbl-sm">key files: auth.py, api/users.py ...</text>


<g data-anim="3">
  <text x="56" y="155" class="lbl-sm" fill="var(--accent,#c15b39)">found: auth.py:42, api/users.py:88,</text>
  <text x="56" y="172" class="lbl-sm" fill="var(--accent,#c15b39)">       tests/factories.py:15</text>
</g>


<g data-anim="1">
  <polyline points="448,120 510,120 510,295 480,295"
            fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.8"
            marker-end="url(#sa-arr-acc)"/>
  <text x="518" y="112" class="lbl-xs" fill="var(--accent,#c15b39)">spawn:</text>
  <text x="518" y="124" class="lbl-xs" fill="var(--accent,#c15b39)">narrow instruction,</text>
  <text x="518" y="136" class="lbl-xs" fill="var(--accent,#c15b39)">fresh context +</text>
  <text x="518" y="148" class="lbl-xs" fill="var(--accent,#c15b39)">same tools</text>
</g>


<g data-anim="2">
  <rect x="310" y="295" width="480" height="165" rx="12"
        fill="var(--accent-2,#ec9069)" fill-opacity="0.07"
        stroke="var(--accent-2,#ec9069)" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="550" y="318" text-anchor="middle" class="ttl" fill="var(--accent-2,#ec9069)">sub-agent context</text>
  <text x="550" y="333" text-anchor="middle" class="sub" fill="var(--accent-2,#ec9069)">(disposable — isolated, fresh)</text>
  <text x="328" y="357" class="lbl-sm">read file 1, read file 2, grep ..., read file 5, grep ...</text>
  <text x="328" y="373" class="lbl-sm">read file 9, read file 14, reason ..., read file 21 ...</text>
  <text x="328" y="389" class="lbl-sm">read file 28, grep ..., read file 35, read file 40 ...</text>
  <text x="328" y="410" class="lbl-xs" fill="var(--muted,#6d675d)">~30k tokens consumed:</text>
  
  <rect x="328" y="416" width="444" height="14" rx="4"
        fill="var(--accent-2,#ec9069)" fill-opacity="0.15"
        stroke="var(--accent-2,#ec9069)" stroke-width="1"/>
</g>

<g data-anim="2b">
  <rect x="328" y="416" width="444" height="14" rx="4"
        fill="var(--accent-2,#ec9069)" fill-opacity="0.6"/>
</g>

<g data-anim="4">
  
  <rect x="310" y="295" width="480" height="165" rx="12"
        fill="var(--surface,#fff)" fill-opacity="0.0"
        stroke="var(--accent-2,#ec9069)" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="550" y="445" text-anchor="middle" class="lbl-xs" fill="var(--accent-2,#ec9069)">... discarded</text>
</g>


<g data-anim="3">
  <polyline points="310,360 260,360 260,198 190,198"
            fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.5"
            marker-end="url(#sa-arr-acc)"/>
  <text x="248" y="290" text-anchor="middle" class="lbl-xs" fill="var(--accent,#c15b39)"
        transform="rotate(-90,248,290)">returns 3 lines only</text>
</g>


<rect x="530" y="175" width="296" height="118" rx="8" class="v-fill v-stroke" stroke-width="1"/>
<text x="544" y="195" class="lbl" fill="var(--accent,#c15b39)">Key: context firewall pattern</text>
<text x="544" y="211" class="lbl-xs">Main context: small, precious, clean</text>
<text x="544" y="225" class="lbl-xs">Sub-agent: isolated, disposable,</text>
<text x="544" y="238" class="lbl-xs">  heavy work (~40 reads, ~30k tok)</text>
<text x="544" y="254" class="lbl-xs" fill="var(--accent,#c15b39)">Only the 3-line answer crosses back</text>
<text x="544" y="268" class="lbl-xs" fill="var(--accent,#c15b39)">  -- not the 40 file dumps.</text>

</svg>
<figcaption><b>Sub-agent context isolation firewalls expensive exploration from the main thread.</b> The main agent spawns a fresh sub-agent with a narrow instruction and the same tools. The sub-agent burns through ~40 file reads and ~30k tokens of reasoning, then returns only a single distilled answer before being discarded. The main context absorbs three lines, not forty file dumps, staying compact for the subsequent repair steps.</figcaption>
</figure>
