<figcaption><b>One ResourcePool, three colocated WorkerGroups time-sliced on the same 8 GPUs.</b> A single placement group of 8 GPUs is bound to all three WorkerGroups simultaneously — ActorRolloutWorkerGroup (training via FSDP + generation via vLLM), CriticWorkerGroup (value model), and RefWorkerGroup (frozen reference log-probs, offloadable to CPU). Because only one group runs at a time, GPU utilization stays high: veRL sequences rollout → actor update → critic → reference across the same physical hardware, with the KV-cache peak and the training-activation peak falling at different moments.</figcaption>
