<figcaption><b>Warmup-Stable-Decay: data quality shifts exactly as the learning rate decays.</b> The LR curve sits flat across the long stable phase (broad web-heavy mixture), then decays sharply toward zero at the anneal boundary. The mixture flips at exactly that knee — math and code dominate the anneal bar versus the tiny slices they occupied in stable training — because low-LR late steps leave the deepest, most lasting imprint on the final weights.</figcaption>
