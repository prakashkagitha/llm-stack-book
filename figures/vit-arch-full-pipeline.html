<figure class="viz" id="fig-vit-arch-full-pipeline">
<svg viewBox="0 0 660 1000" role="img" aria-label="The full ViT-B/16 forward pass: an input image of shape (B, 3, 224, 224) is split into 196 patches by PatchEmbed, a CLS token is prepended and positional embeddings are added to give (B, 197, 768), then 12 Transformer blocks each apply Pre-LN, Multi-Head Self-Attention, a residual add, Pre-LN, MLP, and a residual add, after which the CLS token is extracted as (B, 768), passed through LayerNorm and a Linear head, and finally outputs class logits of shape (B, num_classes).">
<defs>
  <marker id="vit-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="vit-arr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent,#6366f1)"/>
  </marker>
</defs>
<style>

  #fig-vit-arch-full-pipeline .node-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-vit-arch-full-pipeline .shape-lbl { font: 400 11px var(--mono,monospace); fill: var(--muted,#94a3b8); }
  #fig-vit-arch-full-pipeline .pill-lbl { font: 500 11px var(--sans,sans-serif); }
  #fig-vit-arch-full-pipeline .pill-shape { font: 400 10px var(--mono,monospace); fill: var(--muted,#94a3b8); }
  #fig-vit-arch-full-pipeline .inner-lbl { font: 500 11.5px var(--sans,sans-serif); }
  #fig-vit-arch-full-pipeline .resid-lbl { font: 700 13px var(--sans,sans-serif); fill: var(--accent,#6366f1); }
  #fig-vit-arch-full-pipeline .block-ttl { font: 700 13px var(--sans,sans-serif); fill: var(--accent,#6366f1); }
  #fig-vit-arch-full-pipeline .block-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
</style>


<text x="330" y="22" text-anchor="middle" class="ttl">ViT-B/16 Forward Pass</text>


<rect x="165" y="35" width="330" height="52" rx="10"

<text x="330" y="58" text-anchor="middle" class="node-lbl">Input image</text>
<text x="330" y="76" text-anchor="middle" class="shape-lbl">(B, 3, 224, 224)</text>


<line x1="330" y1="89" x2="330" y2="109" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#vit-arr)"/>


<rect x="165" y="112" width="330" height="52" rx="8"
      fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#475569)" stroke-width="1.5"/>
<text x="330" y="135" text-anchor="middle" class="node-lbl">PatchEmbed</text>
<text x="330" y="151" text-anchor="middle" class="node-sub">16x16 patch linear projection</text>

<text x="502" y="142" text-anchor="start" class="shape-lbl">(B, 196, 768)</text>


<line x1="330" y1="166" x2="330" y2="184" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#vit-arr)"/>

<text x="260" y="207" text-anchor="middle" class="pill-lbl">prepend CLS token</text>
<text x="430" y="207" text-anchor="middle" class="pill-shape">(B, 197, 768)</text>


<line x1="330" y1="221" x2="330" y2="239" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#vit-arr)"/>


<rect x="140" y="242" width="380" height="32" rx="16"
      fill="var(--accent,#6366f1)" fill-opacity="0.10"
      stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<text x="260" y="262" text-anchor="middle" class="pill-lbl">add positional embeddings</text>
<text x="430" y="262" text-anchor="middle" class="pill-shape">(B, 197, 768)</text>


<line x1="330" y1="276" x2="330" y2="296" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#vit-arr)"/>

<rect x="100" y="302" width="420" height="300" rx="12"

<text x="310" y="325" text-anchor="middle" class="block-ttl">TransformerBlock x L</text>

      stroke="var(--border-2,#475569)" stroke-width="0.8"/>

<rect x="140" y="394" width="220" height="26" rx="5"
      fill="var(--accent,#6366f1)" fill-opacity="0.04"
      stroke="var(--border-2,#475569)" stroke-width="0.8"/>
<text x="250" y="411" text-anchor="middle" class="inner-lbl">Multi-Head Self-Attention</text>


<rect x="140" y="426" width="220" height="26" rx="5"
      fill="var(--accent,#6366f1)" fill-opacity="0.08"
      stroke="var(--accent,#6366f1)" stroke-width="0.8"/>
<text x="250" y="443" text-anchor="middle" class="inner-lbl">Residual connection</text>


<rect x="140" y="466" width="220" height="26" rx="5"
      fill="var(--accent,#6366f1)" fill-opacity="0.04"
      stroke="var(--border-2,#475569)" stroke-width="0.8"/>

      stroke="var(--border-2,#475569)" stroke-width="0.8"/>
<text x="250" y="515" text-anchor="middle" class="inner-lbl">MLP (FFN, 4x hidden dim)</text>


<rect x="140" y="530" width="220" height="26" rx="5"
      fill="var(--accent,#6366f1)" fill-opacity="0.08"
      stroke="var(--accent,#6366f1)" stroke-width="0.8"/>
<text x="250" y="547" text-anchor="middle" class="inner-lbl">Residual connection</text>



<path d="M 385,365 L 400,365 L 400,452 L 387,452"
      fill="none" stroke="var(--accent,#6366f1)" stroke-width="1.8" stroke-dasharray="4,2"/>
<text x="405" y="414" text-anchor="start" class="resid-lbl">+</text>


<path d="M 385,469 L 400,469 L 400,556 L 387,556"
      fill="none" stroke="var(--accent,#6366f1)" stroke-width="1.8" stroke-dasharray="4,2"/>
<text x="405" y="516" text-anchor="start" class="resid-lbl">+</text>


<line x1="330" y1="604" x2="330" y2="622" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#vit-arr)"/>


<rect x="155" y="625" width="350" height="32" rx="16"
      fill="var(--accent,#6366f1)" fill-opacity="0.10"
      stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<text x="280" y="645" text-anchor="middle" class="pill-lbl">CLS token output (row 0)</text>
<text x="420" y="645" text-anchor="middle" class="pill-shape">(B, 768)</text>


<line x1="330" y1="659" x2="330" y2="677" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#vit-arr)"/>


<rect x="165" y="680" width="330" height="52" rx="8"
      fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#475569)" stroke-width="1.5"/>
<text x="330" y="703" text-anchor="middle" class="node-lbl">LayerNorm + Linear head</text>
<text x="330" y="721" text-anchor="middle" class="node-sub">final norm then linear projection to num_classes</text>


<line x1="330" y1="734" x2="330" y2="752" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#vit-arr)"/>


<rect x="165" y="755" width="330" height="52" rx="10"
      fill="var(--accent,#6366f1)" fill-opacity="0.15"
      stroke="var(--accent,#6366f1)" stroke-width="2"/>
<text x="330" y="778" text-anchor="middle" class="node-lbl">Class logits</text>
<text x="330" y="796" text-anchor="middle" class="shape-lbl">(B, num_classes)   e.g. 1000 for ImageNet</text>


</svg>
<figcaption><b>The complete ViT-B/16 forward pass, from raw image to class logits.</b> A 224x224 image is divided into 196 non-overlapping 16x16 patches and linearly projected to 768-dimensional embeddings; a learnable CLS token is prepended and 1D positional embeddings are added. The resulting sequence of 197 tokens passes through L=12 identical Transformer blocks, each using Pre-LayerNorm ordering with two residual connections (one around the attention sub-layer, one around the MLP). Only the CLS token's final representation is fed to the classification head, yielding logits over all classes.</figcaption>
</figure>
