<style>
  #fig-accel-systolic-array-dataflow text { fill: currentColor; }
  #fig-accel-systolic-array-dataflow .ttl { font: 700 15px var(--sans,sans-serif); }
  #fig-accel-systolic-array-dataflow .sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-accel-systolic-array-dataflow .cell-w { font: 700 16px var(--sans,sans-serif); fill: var(--accent2,#6366f1); }

  #fig-accel-systolic-array-dataflow .token { font: 700 9px var(--mono,monospace); fill: var(--accent,#f59e0b); }
  #fig-accel-systolic-array-dataflow .lane-lbl { font: 600 10px var(--sans,sans-serif); fill: var(--accent,#f59e0b); }
  #fig-accel-systolic-array-dataflow .out-lbl { font: 700 12px var(--sans,sans-serif); fill: var(--accent,#f59e0b); }

  #fig-accel-systolic-array-dataflow .callout-txt { font: 500 11px var(--sans,sans-serif); }
  #fig-accel-systolic-array-dataflow .mac-eq { font: 600 9.5px var(--mono,monospace); fill: var(--muted,#94a3b8); }
  #fig-accel-systolic-array-dataflow .weight-lbl { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }

  /* Animation keyframes */
  @keyframes sa-weight-load {
    0%,100% { opacity:0.2; }
    40%,60% { opacity:1; }
  }
  @keyframes sa-token-step {
    0% { transform: translateX(0px); opacity:1; }
    85% { transform: translateX(88px); opacity:1; }
    100% { transform: translateX(88px); opacity:0.3; }
  }
  @keyframes sa-cell-flash {
    0%,100% { opacity:0; }
    50% { opacity:0.7; }
  }
  @keyframes sa-ps-flow {
    0% { opacity:0; transform:translateY(0); }
    20% { opacity:1; transform:translateY(0); }
    80% { opacity:1; transform:translateY(20px); }
    100% { opacity:0; transform:translateY(22px); }
  }
  @keyframes sa-out-light {
    0%,70% { opacity:0; }
    80%,95% { opacity:1; }
    100% { opacity:0.6; }
  }
  @keyframes sa-tok-pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  @media (prefers-reduced-motion: reduce) {
    #fig-accel-systolic-array-dataflow .anim-weight-load,
    #fig-accel-systolic-array-dataflow .anim-token,
    #fig-accel-systolic-array-dataflow .anim-cell-flash,
    #fig-accel-systolic-array-dataflow .anim-ps-flow,
    #fig-accel-systolic-array-dataflow .anim-out-light {
      animation: none !important;
      opacity: 1 !important;
    }
  }
</style>

<figcaption><b>Weight-stationary 4x4 systolic array (TPU/Trainium/Gaudi MXU model).</b> Weights are pre-loaded once and held fixed in each cell; activation tokens stream in from the left, staggered so a diagonal wavefront sweeps the array; partial sums march downward cell-to-cell without ever touching SRAM. After the pipeline fills, the array retires an entire tile of MACs every clock cycle, yielding near-peak utilization with almost no memory-system overhead.</figcaption>
