<figure class="viz" id="fig-continuous-batching">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 470" role="img" aria-label="Two timelines on a grid of four batch slots by twelve decode iterations: static batching leaves finished slots idle until the longest request ends, wasting 42 percent of slot-steps; continuous batching evicts finished requests and backfills new ones immediately, keeping every slot busy.">
  <defs>
    <pattern id="cb-hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="var(--warn,#e0a106)" fill-opacity="0.10"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="var(--warn,#e0a106)" stroke-width="1.4" stroke-opacity="0.5"/>
    </pattern>
    <marker id="cb-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-continuous-batching text{ fill:var(--ink-soft); }
    #fig-continuous-batching .ttl{ font:600 13.5px var(--sans,sans-serif); }
    #fig-continuous-batching .axis{ font:600 11px var(--mono,monospace); fill:var(--muted); }
    #fig-continuous-batching .cell{ font:600 10px var(--mono,monospace); }
    #fig-continuous-batching .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-continuous-batching .util{ font:600 12px var(--mono,monospace); }
  </style>

  

  
  <g data-anim="1">
    <text x="22" y="26" class="ttl">Static batching <tspan class="sm">— membership frozen until the whole batch finishes</tspan></text>

    
    <text x="56" y="58"  text-anchor="end" class="axis">A</text>
    <text x="56" y="84"  text-anchor="end" class="axis">B</text>
    <text x="56" y="110" text-anchor="end" class="axis">C</text>
    <text x="56" y="136" text-anchor="end" class="axis">D</text>

    
    <rect x="64" y="42"  width="624" height="22" rx="2" class="v-fill v-grid" stroke-width="1"/>
    <rect x="64" y="68"  width="624" height="22" rx="2" class="v-fill v-grid" stroke-width="1"/>
    <rect x="64" y="94"  width="624" height="22" rx="2" class="v-fill v-grid" stroke-width="1"/>
    <rect x="64" y="120" width="624" height="22" rx="2" class="v-fill v-grid" stroke-width="1"/>
    
    <g class="v-grid" stroke-width="0.7" opacity="0.6">
      <line x1="116" y1="42" x2="116" y2="142"/><line x1="168" y1="42" x2="168" y2="142"/>
      <line x1="220" y1="42" x2="220" y2="142"/><line x1="272" y1="42" x2="272" y2="142"/>
      <line x1="324" y1="42" x2="324" y2="142"/><line x1="376" y1="42" x2="376" y2="142"/>
      <line x1="428" y1="42" x2="428" y2="142"/><line x1="480" y1="42" x2="480" y2="142"/>
      <line x1="532" y1="42" x2="532" y2="142"/><line x1="584" y1="42" x2="584" y2="142"/>
      <line x1="636" y1="42" x2="636" y2="142"/>
    </g>
  </g>

  
  <g data-anim="2">
    
    <rect x="220" y="44"  width="468" height="18" fill="url(#cb-hatch)"/>
    
    <rect x="324" y="96"  width="364" height="18" fill="url(#cb-hatch)"/>
    
    <rect x="480" y="122" width="208" height="18" fill="url(#cb-hatch)"/>
  </g>

  
  <g data-anim="2" class="v-accent" fill="var(--accent)">
    
    <rect x="66"  y="44" width="48" height="18" rx="2" fill-opacity="0.85"/>
    <rect x="118" y="44" width="48" height="18" rx="2" fill-opacity="0.85"/>
    <rect x="170" y="44" width="48" height="18" rx="2" fill-opacity="0.85"/>
    
    <rect x="66"  y="70" width="620" height="18" rx="2" fill-opacity="0.85"/>
    
    <rect x="66"  y="96" width="256" height="18" rx="2" fill-opacity="0.85"/>
    
    <rect x="66"  y="122" width="412" height="18" rx="2" fill-opacity="0.85"/>
  </g>
  
  <g data-anim="2" class="cell">
    <text x="194" y="57"  text-anchor="middle" fill="#fff">E</text>
    <text x="296" y="109" text-anchor="middle" fill="#fff">E</text>
    <text x="452" y="135" text-anchor="middle" fill="#fff">E</text>
    <text x="662" y="83"  text-anchor="middle" fill="#fff">E</text>
  </g>
  
  <g data-anim="2">
    <rect x="64" y="150" width="624" height="0" />
    <text x="64" y="162" class="util" fill="var(--warn,#e0a106)">utilization = 28 useful / 48 slot-steps &#8776; 58%</text>
    <text x="688" y="162" text-anchor="end" class="sm">hatched = idle slot, locked until B ends</text>
  </g>

  
  <g data-anim="3">
    <text x="22" y="226" class="ttl">Continuous batching <tspan class="sm">— retire finished, backfill waiting requests every iteration</tspan></text>

    <text x="56" y="258" text-anchor="end" class="axis">0</text>
    <text x="56" y="284" text-anchor="end" class="axis">1</text>
    <text x="56" y="310" text-anchor="end" class="axis">2</text>
    <text x="56" y="336" text-anchor="end" class="axis">3</text>

    <rect x="64" y="242" width="624" height="22" rx="2" class="v-fill v-grid" stroke-width="1"/>
    <rect x="64" y="268" width="624" height="22" rx="2" class="v-fill v-grid" stroke-width="1"/>
    <rect x="64" y="294" width="624" height="22" rx="2" class="v-fill v-grid" stroke-width="1"/>
    <rect x="64" y="320" width="624" height="22" rx="2" class="v-fill v-grid" stroke-width="1"/>
    <g class="v-grid" stroke-width="0.7" opacity="0.6">
      <line x1="116" y1="242" x2="116" y2="342"/><line x1="168" y1="242" x2="168" y2="342"/>
      <line x1="220" y1="242" x2="220" y2="342"/><line x1="272" y1="242" x2="272" y2="342"/>
      <line x1="324" y1="242" x2="324" y2="342"/><line x1="376" y1="242" x2="376" y2="342"/>
      <line x1="428" y1="242" x2="428" y2="342"/><line x1="480" y1="242" x2="480" y2="342"/>
      <line x1="532" y1="242" x2="532" y2="342"/><line x1="584" y1="242" x2="584" y2="342"/>
      <line x1="636" y1="242" x2="636" y2="342"/>
    </g>
  </g>

  
  <g data-anim="4" class="v-accent" fill="var(--accent)">
    
    <rect x="66"  y="244" width="152" height="18" rx="2" fill-opacity="0.85"/>
    
    <rect x="66"  y="270" width="620" height="18" rx="2" fill-opacity="0.85"/>
    
    <rect x="66"  y="296" width="256" height="18" rx="2" fill-opacity="0.85"/>
    
    <rect x="66"  y="322" width="412" height="18" rx="2" fill-opacity="0.85"/>
  </g>
  
  <g data-anim="5" fill="var(--good,#2f9e6e)">
    
    <rect x="220" y="244" width="468" height="18" rx="2" fill-opacity="0.82"/>
    
    <rect x="324" y="296" width="364" height="18" rx="2" fill-opacity="0.82"/>
    
    <rect x="480" y="322" width="208" height="18" rx="2" fill-opacity="0.82"/>
  </g>
  
  <g data-anim="4" class="cell">
    <text x="142" y="257" text-anchor="middle" fill="#fff">A</text>
    <text x="376" y="283" text-anchor="middle" fill="#fff">B</text>
    <text x="194" y="309" text-anchor="middle" fill="#fff">C</text>
    <text x="272" y="335" text-anchor="middle" fill="#fff">D</text>
  </g>
  <g data-anim="5" class="cell">
    <text x="454" y="257" text-anchor="middle" fill="#fff">E (new)</text>
    <text x="506" y="309" text-anchor="middle" fill="#fff">F (new)</text>
    <text x="584" y="335" text-anchor="middle" fill="#fff">G (new)</text>
  </g>
  
  <g data-anim="5">
    <line x1="219" y1="253" x2="221" y2="253" />
    <path d="M210 235 q9 9 9 18" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.3" marker-end="url(#cb-arrow)" opacity="0.9"/>
    <path d="M314 287 q9 9 9 18" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.3" marker-end="url(#cb-arrow)" opacity="0.9"/>
    <path d="M470 313 q9 9 9 18" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.3" marker-end="url(#cb-arrow)" opacity="0.9"/>
  </g>
  
  <g data-anim="5">
    <text x="64" y="358" class="util" fill="var(--good,#2f9e6e)">utilization = 48 useful / 48 slot-steps = 100%</text>
    <text x="64" y="376" class="sm">freed slot reused on the very next iteration</text>
  </g>


  <g data-anim="5">
    <line x1="64" y1="394" x2="700" y2="394" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#cb-arrow)"/>
    <text x="380" y="411" text-anchor="middle" class="sm">decode iteration</text>

    <g>
      <rect x="100" y="434" width="16" height="13" rx="2" fill="var(--accent)" fill-opacity="0.85"/>
      <text x="122" y="445" class="sm">original requests A&#8211;D</text>
      <rect x="300" y="434" width="16" height="13" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.82"/>
      <text x="322" y="445" class="sm">backfilled requests E&#8211;G</text>
      <rect x="500" y="434" width="16" height="13" rx="2" fill="url(#cb-hatch)" stroke="var(--warn,#e0a106)" stroke-width="0.8"/>
      <text x="522" y="445" class="sm">wasted idle slot-step</text>
    </g>
  </g>
</svg>
<figcaption><b>Continuous batching keeps every slot busy by backfilling the moment one frees.</b> Both timelines run the same four requests (lengths 3, 12, 5, 8) across four batch slots. Under <b>static batching</b> a slot sits idle (hatched) from the instant its request emits EOS until the longest request <b>B</b> finishes at step 12 — only 58% of slot-steps do useful work. Under <b>continuous batching</b> the scheduler retires the finished request and admits a waiting one on the very next iteration, pinning the batch near its maximum and pushing utilization to 100%.</figcaption>
</figure>
