<figure class="viz" id="fig-online-eval-shadow-deployment">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 532" role="img" aria-label="Shadow deployment architecture: a production router fans each user request to both the production model (response served to the user) and a shadow model (response discarded), with the shadow branch logging outputs through an offline judge to a quality dashboard.">
  <defs>
    <marker id="sd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#475569)"/>
    </marker>
    <marker id="sd-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#94a3b8)"/>
    </marker>
  </defs>
  <style>
    #fig-online-eval-shadow-deployment text { fill: var(--ink-soft,#334155); font-family: var(--sans,sans-serif); }
    #fig-online-eval-shadow-deployment .title { font: 600 13px var(--sans,sans-serif); }
    #fig-online-eval-shadow-deployment .sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-online-eval-shadow-deployment .lbl { font: 600 11px var(--sans,sans-serif); fill: var(--accent,#6366f1); }
    #fig-online-eval-shadow-deployment .lbl-muted { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
    #fig-online-eval-shadow-deployment .discard { font: italic 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }

    /* animated dot */
    @media (prefers-reduced-motion: no-preference) {
      #fig-online-eval-shadow-deployment .dot-live {
        animation: sd-live 3.6s ease-in-out infinite;
        offset-path: path("M 85 86 L 85 150 L 85 182 L 268 182 L 360 146 L 530 146 L 665 146");
        offset-distance: 0%;
      }
      #fig-online-eval-shadow-deployment .dot-shadow {
        animation: sd-shadow 3.6s ease-in-out infinite;
        offset-path: path("M 85 86 L 85 150 L 85 182 L 268 182 L 360 276 L 530 276");
        offset-distance: 0%;
      }
      #fig-online-eval-shadow-deployment .dot-log {
        animation: sd-log 3.6s ease-in-out infinite;
        offset-path: path("M 455 302 L 455 366 L 455 426 L 455 486");
        offset-distance: 0%;
      }
      @keyframes sd-live {
        0%   { offset-distance: 0%;   opacity: 0; }
        5%   { opacity: 1; }
        50%  { offset-distance: 100%; opacity: 1; }
        60%  { offset-distance: 100%; opacity: 0; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes sd-shadow {
        0%   { offset-distance: 0%;   opacity: 0; }
        5%   { opacity: 1; }
        50%  { offset-distance: 100%; opacity: 1; }
        55%  { offset-distance: 100%; opacity: 0; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes sd-log {
        30%  { offset-distance: 0%;   opacity: 0; }
        38%  { opacity: 1; }
        75%  { offset-distance: 100%; opacity: 1; }
        85%  { offset-distance: 100%; opacity: 0; }
        100% { offset-distance: 100%; opacity: 0; }
      }
    }
  </style>

  
  <rect x="10" y="40" width="150" height="46" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--ink-soft,#475569)" stroke-width="1.5"/>
  <text x="85" y="68" text-anchor="middle" class="title">User request</text>

  
  <line x1="85" y1="86" x2="85" y2="148" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#sd-arrow)"/>

  
  <rect x="10" y="150" width="190" height="64" rx="8" fill="var(--accent,#e0e7ff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
  <text x="105" y="176" text-anchor="middle" class="title" fill="var(--accent,#6366f1)">Production router</text>
  <text x="105" y="192" text-anchor="middle" class="sub">request fanout</text>

  
  <line x1="200" y1="175" x2="342" y2="146" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#sd-arrow)"/>
  <text x="272" y="150" text-anchor="middle" class="lbl">(1)</text>

  
  <line x1="200" y1="196" x2="342" y2="262" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#sd-arrow)"/>
  <text x="272" y="246" text-anchor="middle" class="lbl">(2)</text>

  
  <rect x="342" y="120" width="190" height="52" rx="8" fill="var(--surface,#f1f5f9)" stroke="var(--ink-soft,#475569)" stroke-width="1.5"/>
  <text x="437" y="142" text-anchor="middle" class="title">Production model (v1)</text>
  <text x="437" y="158" text-anchor="middle" class="sub">live path</text>

  
  <line x1="532" y1="146" x2="598" y2="146" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#sd-arrow)"/>
  <text x="565" y="138" text-anchor="middle" class="lbl-muted">served</text>

  
  <rect x="598" y="120" width="130" height="52" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--ink-soft,#475569)" stroke-width="1.5"/>
  <text x="663" y="150" text-anchor="middle" class="title">User response</text>

  
  <rect x="342" y="250" width="190" height="52" rx="8" fill="var(--accent,#e0e7ff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
  <text x="437" y="272" text-anchor="middle" class="title" fill="var(--accent,#6366f1)">Shadow model (v2)</text>
  <text x="437" y="288" text-anchor="middle" class="sub">candidate — not served</text>

  
  <line x1="532" y1="276" x2="598" y2="276" stroke="var(--muted,#94a3b8)" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#sd-arrow-muted)"/>

  
  <rect x="598" y="250" width="130" height="52" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--muted,#94a3b8)" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.65"/>
  <text x="663" y="272" text-anchor="middle" class="discard">/dev/null</text>
  <text x="663" y="288" text-anchor="middle" class="discard">(discarded)</text>

  
  <line x1="437" y1="302" x2="437" y2="356" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#sd-arrow)"/>

  
  <rect x="342" y="358" width="190" height="44" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--ink-soft,#475569)" stroke-width="1.5"/>
  <text x="437" y="385" text-anchor="middle" class="title">Shadow logger</text>

  
  <line x1="437" y1="402" x2="437" y2="424" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#sd-arrow)"/>

  
  <rect x="342" y="426" width="190" height="48" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--ink-soft,#475569)" stroke-width="1.5"/>
  <text x="437" y="447" text-anchor="middle" class="title">Offline judge</text>
  <text x="437" y="462" text-anchor="middle" class="sub">sampled 1%</text>

  
  <line x1="437" y1="474" x2="437" y2="492" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#sd-arrow)"/>


  <rect x="342" y="494" width="190" height="32" rx="8" fill="var(--accent,#e0e7ff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
  <text x="437" y="514" text-anchor="middle" class="title" fill="var(--accent,#6366f1)">Quality dashboard</text>

  
  <circle class="dot-live" r="5" fill="var(--ink-soft,#475569)" opacity="0"/>
  
  <circle class="dot-shadow" r="5" fill="var(--accent,#6366f1)" opacity="0"/>
  
  <circle class="dot-log" r="4" fill="var(--accent,#6366f1)" opacity="0"/>

  
  <text x="437" y="232" text-anchor="middle" class="lbl-muted">shadow path</text>
  <text x="663" y="112" text-anchor="middle" class="lbl-muted" fill="var(--ink-soft,#475569)">live path</text>
</svg>
<figcaption><b>Shadow deployment: evaluate the candidate without user exposure.</b> The production router fans every incoming request to both the live production model and the shadow candidate; only the production response reaches the user. The shadow response is silently logged, sampled at 1%, and scored by an offline judge, so quality and latency can be compared before any user sees the new model.</figcaption>
</figure>
