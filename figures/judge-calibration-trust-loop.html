<figure class="viz" id="fig-judge-calibration-trust-loop">
<svg viewBox="0 0 780 460" role="img" aria-label="Clockwise cycle diagram of judge calibration: a gold human-labeled set is scored by the judge, metrics are measured, a gate checks Spearman correlation above 0.75 and agreement above 70 percent, passing deploys the judge and failing loops back to iterate the judge prompt, and any judge model upgrade forces a dashed re-calibration loop back to re-running the judge.">
<defs>
  <marker id="jcl-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" class="v-label"/>
  </marker>
  <marker id="jcl-arrow-good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="jcl-arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <marker id="jcl-arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" class="v-muted"/>
  </marker>
  <style>
    #fig-judge-calibration-trust-loop text { font: 400 11px var(--sans,sans-serif); }
    #fig-judge-calibration-trust-loop .title { font: 700 14px var(--sans,sans-serif); }
    #fig-judge-calibration-trust-loop .node-title { font: 700 12.5px var(--sans,sans-serif); }
    #fig-judge-calibration-trust-loop .sm { font: 400 10px var(--sans,sans-serif); }
    #fig-judge-calibration-trust-loop .tag { font: 700 9.5px var(--mono,monospace); }
    #fig-judge-calibration-trust-loop .metric { font: 400 10px var(--mono,monospace); }
    #fig-judge-calibration-trust-loop .step-num { font: 700 11px var(--mono,monospace); fill: var(--surface); }
    #fig-judge-calibration-trust-loop .good-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
    #fig-judge-calibration-trust-loop .warn-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
    #fig-judge-calibration-trust-loop .muted-lbl { font: 700 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-judge-calibration-trust-loop .caption-line { font: italic 11.5px var(--sans,sans-serif); }
  </style>
</defs>

<text x="390" y="24" text-anchor="middle" class="title v-label">The judge calibration and trust loop</text>


<g data-anim="1">
  <rect x="30" y="50" width="180" height="118" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
  <circle cx="48" cy="68" r="11" fill="var(--accent)"/>
  <text x="48" y="72" text-anchor="middle" class="step-num">1</text>
  <text x="120" y="72" text-anchor="middle" class="node-title v-label">Gold set</text>
  <text x="120" y="92" text-anchor="middle" class="sm v-label">300-500 (prompt, response)</text>
  <text x="120" y="106" text-anchor="middle" class="sm v-label">examples, majority-vote</text>
  <text x="120" y="120" text-anchor="middle" class="sm v-label">human labels (3+ raters)</text>
  <rect x="42" y="132" width="156" height="22" rx="11" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#e0a106)" stroke-width="1.1"/>
  <text x="120" y="147" text-anchor="middle" class="tag" fill="var(--warn,#e0a106)" style="font-size:8.5px;">adversarial: long-but-wrong</text>
</g>


<g data-anim="1">
  <line x1="210" y1="109" x2="270" y2="109" class="v-stroke" stroke-width="1.6" marker-end="url(#jcl-arrow)"/>
</g>


<g data-anim="2">
  <rect x="272" y="50" width="180" height="118" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
  <circle cx="290" cy="68" r="11" fill="var(--accent)"/>
  <text x="290" y="72" text-anchor="middle" class="step-num">2</text>
  <text x="362" y="72" text-anchor="middle" class="node-title v-label">Run judge</text>
  <text x="362" y="94" text-anchor="middle" class="sm v-label">the judge scores every</text>
  <text x="362" y="108" text-anchor="middle" class="sm v-label">example in the gold set</text>
  <rect x="304" y="122" width="42" height="30" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="325" y="141" text-anchor="middle" class="sm" fill="var(--accent)" style="font-weight:700;">judge</text>
  <line x1="346" y1="137" x2="378" y2="137" class="v-stroke" stroke-width="1.4" marker-end="url(#jcl-arrow)"/>
  <text x="416" y="141" text-anchor="middle" class="sm v-label">scores</text>
</g>


<g data-anim="2">
  <path d="M 362 168 L 362 195 L 452 195" fill="none" class="v-stroke" stroke-width="1.6" marker-end="url(#jcl-arrow)"/>
</g>


<g data-anim="3">
  <rect x="454" y="197" width="200" height="128" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
  <circle cx="472" cy="215" r="11" fill="var(--accent)"/>
  <text x="472" y="219" text-anchor="middle" class="step-num">3</text>
  <text x="554" y="219" text-anchor="middle" class="node-title v-label">Measure</text>
  <line x1="466" y1="230" x2="642" y2="230" class="v-grid" stroke-width="1"/>
  <text x="466" y="246" class="metric v-label">agreement rate</text>
  <text x="466" y="262" class="metric v-label">Spearman rho</text>
  <text x="466" y="278" class="metric v-label">MAE</text>
  <text x="466" y="294" class="metric v-label">bias profile (per-ordering)</text>
  <text x="554" y="313" text-anchor="middle" class="sm v-muted">compact metrics tile</text>
</g>


<g data-anim="3">
  <line x1="454" y1="261" x2="404" y2="261" class="v-stroke" stroke-width="1.6" marker-end="url(#jcl-arrow)"/>
</g>


<g data-anim="4">
  <polygon points="322,205 404,261 322,317 240,261" class="v-fill" stroke="var(--accent)" stroke-width="2"/>
  <text x="322" y="245" text-anchor="middle" class="node-title" fill="var(--accent)">GATE</text>
  <text x="322" y="262" text-anchor="middle" class="sm v-label" style="font-size:9.5px;">rho &gt; 0.75 AND</text>
  <text x="322" y="275" text-anchor="middle" class="sm v-label" style="font-size:9.5px;">agreement &gt; 70%?</text>
</g>


<g data-anim="5">
  <line x1="322" y1="317" x2="322" y2="358" class="v-stroke" stroke="var(--good,#2f9e6e)" stroke-width="1.8" marker-end="url(#jcl-arrow-good)"/>
  <text x="332" y="342" class="good-lbl">PASS</text>

  <rect x="232" y="360" width="180" height="66" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.14" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="322" y="384" text-anchor="middle" class="node-title" fill="var(--good,#2f9e6e)">Deploy</text>
  <text x="322" y="401" text-anchor="middle" class="sm v-label">judge cleared for</text>
  <text x="322" y="415" text-anchor="middle" class="sm v-label">production use</text>
</g>


<g data-anim="5">
  <line x1="240" y1="261" x2="90" y2="261" class="v-stroke" stroke="var(--warn,#e0a106)" stroke-width="1.8" marker-end="url(#jcl-arrow-warn)"/>
  <text x="165" y="251" text-anchor="middle" class="warn-lbl">FAIL</text>

  <rect x="10" y="197" width="150" height="128" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.12" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <text x="85" y="221" text-anchor="middle" class="node-title" fill="var(--warn,#e0a106)">Iterate judge</text>
  <text x="85" y="236" text-anchor="middle" class="node-title" fill="var(--warn,#e0a106)">prompt</text>
  <text x="85" y="258" text-anchor="middle" class="sm v-label">strengthen rubric,</text>
  <text x="85" y="272" text-anchor="middle" class="sm v-label">anti-bias instructions,</text>
  <text x="85" y="286" text-anchor="middle" class="sm v-label">criteria weights</text>
</g>


<g data-anim="5">
  <path d="M 85 197 L 85 109 L 270 109" fill="none" class="v-stroke" stroke="var(--warn,#e0a106)" stroke-width="1.8" marker-end="url(#jcl-arrow-warn)"/>
</g>


<g data-anim="6">
  <path d="M 412 393 L 700 393 L 700 109 L 452 109" fill="none" stroke="var(--muted,#6d675d)" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#jcl-arrow-muted)"/>
  <rect x="560" y="368" width="200" height="34" rx="6" class="v-fill v-stroke" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="660" y="382" text-anchor="middle" class="muted-lbl">judge model upgraded</text>
  <text x="660" y="396" text-anchor="middle" class="muted-lbl">-&gt; RE-CALIBRATE</text>
</g>

<text x="390" y="450" text-anchor="middle" class="caption-line v-muted">clockwise: gold set -&gt; run judge -&gt; measure -&gt; gate; a fresh judge model always re-opens the cycle</text>

</svg>
<figcaption><b>Trust in a judge is earned through a repeatable audit cycle, not assumed once.</b> A gold human-labeled set gates deployment behind fixed thresholds (Spearman rho above 0.75, agreement above 70%); failing sends you back to iterate the judge prompt, and — critically — upgrading the judge model itself does not carry forward a prior calibration, it forces the whole cycle to run again.</figcaption>
</figure>
