<text x="30" y="308" class="hdr mu">THE AUDITOR'S GAUNTLET (three adversarial probes)</text>

<rect x="265" y="318" width="230" height="52" rx="7" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>

<text x="380" y="354" text-anchor="middle" class="tiny mu">a few gradient steps on a tiny sample</text>
<text x="380" y="365" text-anchor="middle" class="tiny mu">-&gt; recall snaps back in seconds</text>

<rect x="510" y="318" width="230" height="52" rx="7" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>

<text x="625" y="354" text-anchor="middle" class="tiny mu">ask another way, another language</text>
<text x="625" y="365" text-anchor="middle" class="tiny mu">-&gt; knowledge leaks via another path</text>

<rect x="20" y="538" width="720" height="98" rx="8" class="panel"/>
<text x="380" y="560" text-anchor="middle" class="lbl">Only the retrained-from-scratch gold standard is defined to pass by construction.</text>
<text x="380" y="580" text-anchor="middle" class="note mu">Approximate unlearning is judged by how closely it matches that reference under adversarial pressure —</text>
<text x="380" y="596" text-anchor="middle" class="note mu">a model that merely stopped answering has changed its output, not (provably) its knowledge.</text>
<text x="380" y="618" text-anchor="middle" class="note mu">TOFU and MUSE formalize exactly this reference-vs-adversarial-probe comparison at benchmark scale.</text>

</svg>
<figcaption><b>Suppression hides an answer; removal erases its influence — and only the second one survives an audit.</b> A suppressed model still contains the target knowledge in its weights with the direct query path blocked, while a truly-removed model has excised it and can be compared against the gold-standard reference of retraining from scratch without that data. Run both through three adversarial probes — membership inference, a relearning attack, and paraphrase/cross-lingual/jailbreak elicitation — and the suppressed model fails every gate while the removed model passes, which is exactly the gap TOFU and MUSE are built to expose.</figcaption>
</figure>
