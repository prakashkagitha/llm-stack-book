<style>
  #fig-primerl-sync-vs-async-timeline text { fill: var(--ink-soft,#374151); }
  #fig-primerl-sync-vs-async-timeline .panel-title { font: 700 13px var(--sans,sans-serif); }
  #fig-primerl-sync-vs-async-timeline .lane-lbl { font: 600 11px var(--mono,monospace); fill: var(--ink-soft,#374151); }

  #fig-primerl-sync-vs-async-timeline .note-lbl { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#6b7280); }

  /* playhead animation */
  @keyframes psa-sweep {
    0%   { x: 120; width: 0; }
    85%  { x: 120; width: 740; }
    100% { x: 120; width: 740; }
  }
  #fig-primerl-sync-vs-async-timeline #psa-sync-clip-rect,
  #fig-primerl-sync-vs-async-timeline #psa-async-clip-rect {
    animation: psa-sweep 5s ease-in-out 0.3s infinite;
  }

  /* highlight overlay inside playhead - just a moving vertical sliver on both panels */
  @keyframes psa-playhead-move {
    0%   { transform: translateX(120px); opacity:0; }
    5%   { opacity:1; }
    85%  { transform: translateX(856px); opacity:1; }
    95%  { opacity:0; }
    100% { transform: translateX(856px); opacity:0; }
  }
  #fig-primerl-sync-vs-async-timeline .psa-playhead {
    animation: psa-playhead-move 5s ease-in-out 0.3s infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    #fig-primerl-sync-vs-async-timeline * {
      animation: none !important;
    }
    #fig-primerl-sync-vs-async-timeline #psa-sync-clip-rect,
    #fig-primerl-sync-vs-async-timeline #psa-async-clip-rect {
      x: 120 !important; width: 740 !important;
    }
    #fig-primerl-sync-vs-async-timeline .psa-playhead { opacity:0 !important; }
  }
</style>

<figcaption><b>Synchronous lock-step RL leaves half the fleet idle at all times; asynchronous decoupled RL keeps both lanes continuously busy.</b> In the top panel, gen and train alternate: when one is working the other is idle, and a straggler response stretches the gen block, delaying the trainer further. In the bottom panel, a rollout queue decouples the two — both lanes run without gaps, delivering 2–4× throughput improvement over matched-quality training.</figcaption>
