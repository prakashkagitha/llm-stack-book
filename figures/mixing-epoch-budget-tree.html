<figure class="viz" id="fig-mixing-epoch-budget-tree">
<svg viewBox="0 0 800 460" role="img" aria-label="Five domain rows, each drawing the unique-token pool as a bar whose width scales with pool size, with a colored slice overlay showing how much of that pool the allocated tokens touch. Web has a very wide pool with a thin downsample slice at e_i=0.15; code and multilingual are medium pools with slices under one epoch; math has a very narrow pool fully saturated and repeated 2.4 times; books is a small pool repeated 1.2 times. A shared epoch axis below marks each domain's e_i and shades the 4-6 epoch danger band.">
<style>
  #fig-mixing-epoch-budget-tree text { fill: var(--ink-soft, #45413a); }
  #fig-mixing-epoch-budget-tree .lbl  { font: 700 13px var(--sans,sans-serif); }
  #fig-mixing-epoch-budget-tree .sub  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-mixing-epoch-budget-tree .reg  { font: 600 11.5px var(--mono,monospace); }
  #fig-mixing-epoch-budget-tree .axlbl { font: 400 10px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-mixing-epoch-budget-tree .leg  { font: 400 11px var(--sans,sans-serif); }
  #fig-mixing-epoch-budget-tree .note { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-mixing-epoch-budget-tree .guide { stroke: var(--border-2,#94a3b8); stroke-width: 1; stroke-dasharray: 2 3; opacity: 0.7; }
</style>
<defs>
  <pattern id="meb-repeat" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="0" y2="6" stroke="var(--surface,#f5f4f2)" stroke-width="1.6" opacity="0.55"/>
  </pattern>
</defs>

<text x="16" y="18" class="note">pool bar width is proportional to unique tokens n_i; the colored slice is the allocated tokens w_i * D touching that pool</text>


<rect x="150" y="34" width="14" height="12" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.75" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="169" y="44" class="leg">downsample (e_i &lt; 1)</text>
<rect x="330" y="34" width="14" height="12" rx="2" fill="var(--warn,#e0a106)" fill-opacity="0.85" stroke="var(--warn,#d97706)" stroke-width="1.2"/>
<text x="349" y="44" class="leg">upsample (e_i &gt;= 1, striped)</text>


<g data-anim="1">
  <text x="16" y="78" class="lbl">web</text>
  <text x="16" y="92" class="sub">n = 3000 B (huge pool)</text>
  <rect x="150" y="64" width="420" height="24" rx="3" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.3"/>
  <rect x="150" y="64" width="64" height="24" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.75"/>
  <text x="580" y="80" class="reg" fill="var(--accent2,#3b82f6)">e_i = 0.15</text>
</g>


<g data-anim="2">
  <text x="16" y="140" class="lbl">code</text>
  <text x="16" y="154" class="sub">n = 250 B (medium pool)</text>
  <rect x="150" y="126" width="121" height="24" rx="3" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.3"/>
  <rect x="150" y="126" width="110" height="24" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.75"/>
  <text x="281" y="142" class="reg" fill="var(--accent2,#3b82f6)">e_i = 0.91</text>
</g>


<g data-anim="3">
  <text x="16" y="202" class="lbl">math</text>
  <text x="16" y="216" class="sub">n = 30 B (tiny pool)</text>
  <rect x="150" y="188" width="42" height="24" rx="3" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.3"/>
  <rect x="150" y="188" width="42" height="24" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.85"/>
  <rect x="150" y="188" width="42" height="24" rx="3" fill="url(#meb-repeat)"/>
  <text x="202" y="204" class="reg" fill="var(--warn,#d97706)">e_i = 2.4 (repeat x2.4)</text>
</g>


<g data-anim="4">
  <text x="16" y="264" class="lbl">books</text>
  <text x="16" y="278" class="sub">n = 80 B (small pool)</text>
  <rect x="150" y="250" width="69" height="24" rx="3" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.3"/>
  <rect x="150" y="250" width="69" height="24" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.85"/>
  <rect x="150" y="250" width="69" height="24" rx="3" fill="url(#meb-repeat)"/>
  <text x="229" y="266" class="reg" fill="var(--warn,#d97706)">e_i = 1.2 (repeat x1.2)</text>
</g>


<g data-anim="5">
  <text x="16" y="326" class="lbl">multi</text>
  <text x="16" y="340" class="sub">n = 400 B (long tail)</text>
  <rect x="150" y="312" width="153" height="24" rx="3" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.3"/>
  <rect x="150" y="312" width="56" height="24" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.75"/>
  <text x="313" y="328" class="reg" fill="var(--accent2,#3b82f6)">e_i = 0.37</text>
</g>


<g data-anim="6">
  <text x="150" y="370" class="note">shared epoch axis  (e_i = w_i D / n_i)</text>

  
  <rect x="483" y="384" width="167" height="18" fill="var(--warn,#e0a106)" fill-opacity="0.16"/>
  <text x="566" y="416" text-anchor="middle" class="axlbl" fill="var(--warn,#d97706)">danger band ~4-6 epochs</text>

  <line x1="150" y1="393" x2="650" y2="393" stroke="var(--muted,#6d675d)" stroke-width="1.3"/>
  
  <g class="axlbl">
    <line x1="150" y1="388" x2="150" y2="398" stroke="var(--muted,#6d675d)" stroke-width="1"/>
    <text x="150" y="435" text-anchor="middle">0</text>
    <line x1="233" y1="388" x2="233" y2="398" stroke="var(--muted,#6d675d)" stroke-width="1"/>
    <text x="233" y="435" text-anchor="middle">1</text>
    <line x1="317" y1="388" x2="317" y2="398" stroke="var(--muted,#6d675d)" stroke-width="1"/>
    <text x="317" y="435" text-anchor="middle">2</text>
    <line x1="400" y1="388" x2="400" y2="398" stroke="var(--muted,#6d675d)" stroke-width="1"/>
    <text x="400" y="435" text-anchor="middle">3</text>
    <line x1="483" y1="388" x2="483" y2="398" stroke="var(--muted,#6d675d)" stroke-width="1"/>
    <text x="483" y="435" text-anchor="middle">4</text>
    <line x1="567" y1="388" x2="567" y2="398" stroke="var(--muted,#6d675d)" stroke-width="1"/>
    <text x="567" y="435" text-anchor="middle">5</text>
    <line x1="650" y1="388" x2="650" y2="398" stroke="var(--muted,#6d675d)" stroke-width="1"/>
    <text x="650" y="435" text-anchor="middle">6</text>
  </g>

  
  <line x1="580" y1="88"  x2="162.5" y2="393" class="guide"/>
  <circle cx="162.5" cy="393" r="4.5" fill="var(--accent2,#3b82f6)" stroke="var(--surface,#f5f4f2)" stroke-width="1"/>

  <line x1="281" y1="142" x2="225.8" y2="393" class="guide"/>
  <circle cx="225.8" cy="393" r="4.5" fill="var(--accent2,#3b82f6)" stroke="var(--surface,#f5f4f2)" stroke-width="1"/>

  <line x1="202" y1="204" x2="350" y2="393" class="guide"/>
  <circle cx="350" cy="393" r="4.5" fill="var(--warn,#d97706)" stroke="var(--surface,#f5f4f2)" stroke-width="1"/>

  <line x1="229" y1="266" x2="250" y2="393" class="guide"/>
  <circle cx="250" cy="393" r="4.5" fill="var(--warn,#d97706)" stroke="var(--surface,#f5f4f2)" stroke-width="1"/>

  <line x1="313" y1="328" x2="180.4" y2="393" class="guide"/>
  <circle cx="180.4" cy="393" r="4.5" fill="var(--accent2,#3b82f6)" stroke="var(--surface,#f5f4f2)" stroke-width="1"/>
</g>

</svg>
<figcaption><b>Pool width shows why a small domain forces repetition.</b> Each bar's width scales with the domain's unique-token pool n_i; the filled slice is the tokens actually allocated (w_i D), so a wide web pool gets only a thin sliver (e_i = 0.15, well under one pass) while the tiny, striped math pool is fully saturated and read 2.4 times over. The shared epoch axis below plots every domain's e_i and shades the roughly 4-6 epoch band where repeated data starts to hurt.</figcaption>
</figure>
