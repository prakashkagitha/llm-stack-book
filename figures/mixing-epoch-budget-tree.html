<figure class="viz" id="fig-mixing-epoch-budget-tree">
<svg viewBox="0 0 880 360" role="img" aria-label="A single token budget D fans out into five domain allocations. Web (huge pool) is downsampled to fewer than 1 epoch; code and books see roughly 1-2 epochs; math (small pool) requires 2-6 epochs of upsampling; multilingual varies by language.">
<style>
  #fig-mixing-epoch-budget-tree text { fill: var(--ink-soft, #45413a); }
  #fig-mixing-epoch-budget-tree .lbl  { font: 700 13px var(--sans,sans-serif); }
  #fig-mixing-epoch-budget-tree .sub  { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-mixing-epoch-budget-tree .reg  { font: 500 11.5px var(--mono,monospace); }
  #fig-mixing-epoch-budget-tree .root-lbl     { font: 700 13px var(--sans,sans-serif); fill: #ffffff; }
  #fig-mixing-epoch-budget-tree .root-formula { font: 600 12px var(--mono,monospace); fill: #ffffff; }
  #fig-mixing-epoch-budget-tree .leg  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
</style>
<defs>
  <marker id="meb-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L8 5 L0 9 z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>


<rect x="12" y="140" width="186" height="72" rx="10"
      fill="var(--accent,#6366f1)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="105" y="167" text-anchor="middle" class="root-lbl">Token budget</text>
<text x="105" y="188" text-anchor="middle" class="root-formula">D = sum w_i * D</text>


<line x1="198" y1="176" x2="252" y2="176" stroke="var(--muted,#6d675d)" stroke-width="1.8"/>
<line x1="252" y1="50"  x2="252" y2="312" stroke="var(--muted,#6d675d)" stroke-width="1.8"/>


<line x1="252" y1="56" x2="276" y2="56" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#meb-arr)"/>
<rect x="276" y="32" width="592" height="48" rx="7"
      fill="var(--accent2,#3b82f6)" fill-opacity="0.15" stroke="var(--accent2,#3b82f6)" stroke-width="1.5"/>
<text x="292" y="52" class="lbl">web</text>
<text x="292" y="68" class="sub">huge pool</text>
<text x="428" y="50" class="reg" fill="var(--accent2,#3b82f6)">e_i &lt; 1</text>
<text x="488" y="50" class="reg">  (downsample — see each token &lt;1x)</text>


<line x1="252" y1="120" x2="276" y2="120" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#meb-arr)"/>
<rect x="276" y="96" width="592" height="48" rx="7"
      fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
<text x="292" y="116" class="lbl">code</text>
<text x="292" y="132" class="sub">medium pool</text>
<text x="428" y="114" class="reg" fill="var(--muted,#6d675d)">e_i ~ 1-2</text>
<text x="497" y="114" class="reg">  (roughly one pass)</text>


<line x1="252" y1="184" x2="276" y2="184" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#meb-arr)"/>
<rect x="276" y="160" width="592" height="48" rx="7"
      fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#d97706)" stroke-width="2"/>
<text x="292" y="180" class="lbl">math</text>
<text x="292" y="196" class="sub">small pool</text>
<text x="428" y="178" class="reg" fill="var(--warn,#d97706)">e_i ~ 2-6</text>
<text x="496" y="178" class="reg">  (upsample — repeat several times)</text>


<line x1="252" y1="248" x2="276" y2="248" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#meb-arr)"/>
<rect x="276" y="224" width="592" height="48" rx="7"
      fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
<text x="292" y="244" class="lbl">books</text>
<text x="292" y="260" class="sub">small pool</text>
<text x="428" y="242" class="reg" fill="var(--muted,#6d675d)">e_i ~ 1-4</text>


<line x1="252" y1="312" x2="276" y2="312" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#meb-arr)"/>
<rect x="276" y="288" width="592" height="48" rx="7"
      fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
<text x="292" y="308" class="lbl">multi</text>
<text x="292" y="324" class="sub">long tail</text>
<text x="428" y="306" class="reg" fill="var(--muted,#6d675d)">e_i varies by language</text>


<rect x="600" y="7" width="11" height="11" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.15" stroke="var(--accent2,#3b82f6)" stroke-width="1.5"/>
<text x="615" y="17" class="leg">downsample</text>
<rect x="706" y="7" width="11" height="11" rx="2" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#d97706)" stroke-width="1.5"/>
<text x="721" y="17" class="leg">upsample</text>
</svg>
<figcaption><b>One token budget fans out into per-domain epoch regimes.</b> The single training budget D is split by mixture weights w_i; each domain's pool size determines whether it is downsampled (web, fewer than 1 pass), consumed roughly once (code, books), or repeated multiple times (math, 2–6 epochs). Math is flagged in amber because repetition past roughly 4 epochs risks memorisation and reduced generalisation.</figcaption>
</figure>
