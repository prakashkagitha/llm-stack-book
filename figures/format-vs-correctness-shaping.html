<figure class="viz" id="fig-format-vs-correctness-shaping">
<style>
  #fig-format-vs-correctness-shaping .lbl      { font: 600 12px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-format-vs-correctness-shaping .lbl-sm   { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-format-vs-correctness-shaping .lbl-xs   { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-format-vs-correctness-shaping .lbl-panel{ font: 700 13px var(--sans,sans-serif); }
  #fig-format-vs-correctness-shaping .mono     { font: 600 10.5px var(--mono,monospace); fill: var(--ink-soft,#334155); }
  #fig-format-vs-correctness-shaping .mono-eq  { font: 700 13px var(--mono,monospace); fill: var(--ink-soft,#334155); }
</style>
<svg viewBox="0 0 800 512" role="img" aria-label="Two-panel comparison of reward shaping: with a small lambda-f, format reward rises first and correctness follows, tracking together; with lambda-f too large, format reward pegs near 100 percent while correctness plateaus low, the two curves decoupling, and the model produces perfectly formatted but wrong answers such as boxed zero.">


<rect x="16" y="12" width="768" height="38" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
<text x="400" y="36" text-anchor="middle" class="mono-eq">r_total = r_correctness + lambda_f * r_format</text>


<line x1="400" y1="62" x2="400" y2="486" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2" stroke-dasharray="2,4"/>


<text x="204" y="80" text-anchor="middle" class="lbl-panel" fill="var(--good,#2f9e6e)">Healthy shaping (small lambda_f ~= 0.1)</text>

<g data-anim="1">

<line x1="48" y1="192" x2="48" y2="96" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
<line x1="48" y1="192" x2="360" y2="192" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
<text x="204" y="208" text-anchor="middle" class="lbl-xs">training steps</text>
<text x="26" y="144" text-anchor="middle" class="lbl-xs" transform="rotate(-90 26 144)">reward</text>


<path d="M48 186 C 68 116, 96 98, 132 96 S 260 94, 360 94"
      fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.4" stroke-linecap="round"/>

<path d="M48 190 C 104 188, 144 172, 184 148 S 296 106, 360 100"
      fill="none" stroke="var(--good,#2f9e6e)" stroke-width="2.4" stroke-linecap="round"/>


<circle cx="62" cy="222" r="3.4" fill="var(--accent2,#3b82f6)"/>
<text x="72" y="226" class="lbl-xs">format reward (cold-start solved)</text>
</g>
<circle cx="62" cy="236" r="3.4" fill="var(--good,#2f9e6e)"/>
<text x="72" y="240" class="lbl-xs">correctness (lifts off after format, tracks it)</text>


<g data-anim="2">
<rect x="48" y="256" width="312" height="60" rx="10" fill="var(--good,#2f9e6e)" fill-opacity="0.10" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
<text x="62" y="278" class="mono">&lt;think&gt; ...valid reasoning... &lt;/think&gt;</text>
<text x="62" y="296" class="mono">\boxed{correct}</text>
<circle cx="336" cy="286" r="12" fill="var(--good,#2f9e6e)"/>
<path d="M330 286 l4 5 l9 -10" stroke="var(--surface,#fff)" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<text x="204" y="334" text-anchor="middle" class="lbl-xs" fill="var(--good,#2f9e6e)">format and correctness rise together</text>


<text x="596" y="80" text-anchor="middle" class="lbl-panel" fill="var(--warn,#e0a106)">Gaming (lambda_f too large)</text>

<g data-anim="3">
<line x1="440" y1="192" x2="440" y2="96" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
<line x1="440" y1="192" x2="752" y2="192" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
<text x="596" y="208" text-anchor="middle" class="lbl-xs">training steps</text>


<path d="M440 186 C 460 116, 486 96, 516 94 L 752 94"
      fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.4" stroke-linecap="round"/>

<path d="M440 190 C 476 172, 502 152, 518 144 C 546 134, 640 132, 752 130"
      fill="none" stroke="var(--good,#2f9e6e)" stroke-width="2.4" stroke-linecap="round"/>


<path d="M570 96 L748 96 L748 128 L570 146 Z" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="none"/>
<text x="659" y="116" text-anchor="middle" class="lbl-xs" fill="var(--warn,#e0a106)">gap: decoupled</text>

<circle cx="454" cy="222" r="3.4" fill="var(--accent2,#3b82f6)"/>
<text x="464" y="226" class="lbl-xs">format reward (pegs ~= 100%)</text>
</g>
<circle cx="454" cy="236" r="3.4" fill="var(--good,#2f9e6e)"/>
<text x="464" y="240" class="lbl-xs">correctness (stuck ~low)</text>


<g data-anim="4">
<rect x="440" y="256" width="312" height="60" rx="10" fill="var(--warn,#e0a106)" fill-opacity="0.10" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
<text x="454" y="278" class="mono">&lt;think&gt; ...anything... &lt;/think&gt;</text>
<text x="454" y="296" class="mono">\boxed{0}</text>

<circle cx="728" cy="286" r="12" fill="var(--warn,#e0a106)"/>
<line x1="723" y1="281" x2="733" y2="291" stroke="var(--surface,#fff)" stroke-width="2.4" stroke-linecap="round"/>
<line x1="733" y1="281" x2="723" y2="291" stroke="var(--surface,#fff)" stroke-width="2.4" stroke-linecap="round"/>
</g>
<text x="596" y="334" text-anchor="middle" class="lbl-xs" fill="var(--warn,#e0a106)">perfect format, wrong answer, still rewarded</text>


<g data-anim="5">
<line x1="16" y1="356" x2="784" y2="356" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2" stroke-dasharray="2,4"/>
<rect x="16" y="372" width="768" height="122" rx="10" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>


<g transform="translate(56,433)">
  <circle cx="0" cy="0" r="26" fill="none" stroke="var(--v-stroke,#45413a)" stroke-width="2.2"/>
  <path d="M -16 9 A 20 20 0 0 1 16 9" fill="none" stroke="var(--v-stroke,#45413a)" stroke-width="2"/>
  <line x1="0" y1="0" x2="10" y2="-15" stroke="var(--warn,#e0a106)" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="0" cy="0" r="2.6" fill="var(--v-stroke,#45413a)"/>
</g>

<text x="104" y="404" class="lbl-sm">Rule of thumb</text>
<text x="104" y="424" class="lbl-sm">Track corr(format_reward, correctness_reward) throughout training.</text>
<text x="104" y="444" class="lbl-sm">If the two curves decouple (right panel), reduce lambda_f.</text>
<text x="104" y="464" class="lbl-sm">Typical healthy range: lambda_f ~= 0.1 - 0.2.</text>
</g>

</svg>
<figcaption><b>A small format weight solves the cold-start problem; too large a one lets the model game format instead of answering correctly.</b> With <code>lambda_f</code> around 0.1, format reward saturates first and correctness reward follows and keeps climbing with it; with <code>lambda_f</code> too large, format reward pegs near its ceiling while correctness stalls, and the model converges on a degenerate template like <code>\boxed{0}</code> that always collects the format bonus — the fix is to monitor the correlation between the two reward streams and shrink <code>lambda_f</code> if they decouple.</figcaption>
</figure>
