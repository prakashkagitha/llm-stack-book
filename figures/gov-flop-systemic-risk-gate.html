<figure class="viz" id="fig-gov-flop-systemic-risk-gate">
<style>
  #fig-gov-flop-systemic-risk-gate text { fill: var(--ink-soft); }
  #fig-gov-flop-systemic-risk-gate .gate-lbl   { font: 700 11px var(--sans,sans-serif); fill: var(--accent); }
  #fig-gov-flop-systemic-risk-gate .mk-lbl     { font: 600 10.5px var(--sans,sans-serif); }
  #fig-gov-flop-systemic-risk-gate .mk-sub     { font: 400 9px var(--sans,sans-serif); fill: var(--muted); }
  #fig-gov-flop-systemic-risk-gate .tick-lbl   { font: 400 9.5px var(--mono,monospace); fill: var(--muted); }
  #fig-gov-flop-systemic-risk-gate .axis-cap   { font: 400 10px var(--sans,sans-serif); fill: var(--muted); font-style: italic; }
  #fig-gov-flop-systemic-risk-gate .col-h      { font: 700 12px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-gov-flop-systemic-risk-gate .col-h2     { font: 700 12px var(--sans,sans-serif); fill: var(--accent); }
  #fig-gov-flop-systemic-risk-gate .col-sub    { font: 400 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-gov-flop-systemic-risk-gate .item       { font: 400 11.5px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-gov-flop-systemic-risk-gate .plus       { font: 700 12px var(--sans,sans-serif); fill: var(--surface); text-anchor: middle; }
  #fig-gov-flop-systemic-risk-gate .footer-cap { font: 400 11px var(--sans,sans-serif); fill: var(--muted); }
</style>
<svg viewBox="0 0 800 610" role="img" aria-label="A training-compute gate diagram: crossing 10^25 FLOPs on a logarithmic compute axis adds four Article 55 systemic-risk obligations on top of the four Article 53 obligations every GPAI provider already owes.">
  <defs>
    <marker id="fg-arrow" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 z" fill="var(--muted)"/>
    </marker>
    <marker id="fg-arrow-accent" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 z" fill="var(--accent)"/>
    </marker>
  </defs>


  <text x="575" y="42" text-anchor="middle" class="gate-lbl">systemic-risk threshold (Art. 51)</text>
  <line x1="575" y1="48" x2="575" y2="160" stroke="var(--accent)" stroke-width="3"/>


  <text x="387" y="72" text-anchor="middle" class="mk-lbl">70B x 2T tokens</text>
  <text x="387" y="86" text-anchor="middle" class="mk-sub">(~8.4e23 FLOPs)</text>
  <line x1="387" y1="92" x2="387" y2="146" stroke="var(--border-2)" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="387" cy="150" r="4.5" fill="var(--muted)"/>

  <text x="672" y="72" text-anchor="middle" class="mk-lbl">400B x 15T tokens</text>
  <text x="672" y="86" text-anchor="middle" class="mk-sub">(~3.6e25 FLOPs)</text>
  <line x1="672" y1="92" x2="672" y2="146" stroke="var(--border-2)" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="672" cy="150" r="4.5" fill="var(--accent)"/>


  <line x1="50" y1="150" x2="758" y2="150" stroke="var(--muted)" stroke-width="1.6" marker-end="url(#fg-arrow)"/>
  <line x1="50" y1="146" x2="50" y2="158" stroke="var(--muted)" stroke-width="1.2"/>
  <line x1="225" y1="146" x2="225" y2="158" stroke="var(--muted)" stroke-width="1.2"/>
  <line x1="400" y1="146" x2="400" y2="158" stroke="var(--muted)" stroke-width="1.2"/>
  <line x1="575" y1="146" x2="575" y2="158" stroke="var(--accent)" stroke-width="1.6"/>
  <line x1="750" y1="146" x2="750" y2="158" stroke="var(--muted)" stroke-width="1.2"/>

  <text x="50"  y="172" text-anchor="middle" class="tick-lbl">10^22</text>
  <text x="225" y="172" text-anchor="middle" class="tick-lbl">10^23</text>
  <text x="400" y="172" text-anchor="middle" class="tick-lbl">10^24</text>
  <text x="575" y="172" text-anchor="middle" class="tick-lbl" fill="var(--accent)">10^25</text>
  <text x="750" y="172" text-anchor="middle" class="tick-lbl">10^26</text>

  <text x="400" y="190" text-anchor="middle" class="axis-cap">training compute C (FLOPs), C ~= 6 * N * D</text>


  <rect x="40" y="216" width="340" height="326" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>
  <text x="60" y="242" class="col-h">Every GPAI provider (Art. 53)</text>
  <line x1="60" y1="252" x2="360" y2="252" stroke="var(--border-2)" stroke-width="1"/>

  <circle cx="68" cy="281" r="3.5" fill="var(--ink-soft)"/>
  <text x="80" y="285" class="item">Technical documentation</text>

  <circle cx="68" cy="336" r="3.5" fill="var(--ink-soft)"/>
  <text x="80" y="340" class="item">Training-data summary</text>

  <circle cx="68" cy="391" r="3.5" fill="var(--ink-soft)"/>
  <text x="80" y="395" class="item">Copyright policy</text>

  <circle cx="68" cy="446" r="3.5" fill="var(--ink-soft)"/>
  <text x="80" y="450" class="item">Downstream-deployer info</text>


  <rect x="420" y="216" width="340" height="326" rx="8" fill="var(--accent)" fill-opacity="0.08" stroke="var(--accent)" stroke-width="1.6"/>
  <text x="440" y="238" class="col-h2">+ Systemic-risk (Art. 55)</text>
  <text x="440" y="253" class="col-sub">these ADD to Art. 53 -- they do not replace it</text>
  <line x1="440" y1="263" x2="740" y2="263" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.4"/>

  <circle cx="448" cy="292" r="8" fill="var(--accent)"/>
  <text x="448" y="296" class="plus">+</text>
  <text x="464" y="296" class="item">Adversarial testing / red-team</text>

  <circle cx="448" cy="337" r="8" fill="var(--accent)"/>
  <text x="448" y="341" class="plus">+</text>
  <text x="464" y="333" class="item">Serious-incident report to EU AI</text>
  <text x="464" y="349" class="item">Office within 2 days</text>

  <circle cx="448" cy="392" r="8" fill="var(--accent)"/>
  <text x="448" y="396" class="plus">+</text>
  <text x="464" y="396" class="item">Cybersecurity measures</text>

  <circle cx="448" cy="447" r="8" fill="var(--accent)"/>
  <text x="448" y="451" class="plus">+</text>
  <text x="464" y="451" class="item">Energy consumption reporting (MWh)</text>


  <line x1="382" y1="379" x2="418" y2="379" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#fg-arrow-accent)"/>


  <rect x="40" y="566" width="720" height="34" rx="6" fill="var(--accent)" fill-opacity="0.06" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="400" y="587" text-anchor="middle" class="footer-cap">Crossing the gate never removes the left-hand duties -- systemic-risk obligations stack on top of them.</text>

</svg>
<figcaption><b>Once training compute crosses 10^25 FLOPs, four Article 55 systemic-risk duties stack on top of the four Article 53 duties every GPAI provider already owes.</b> A 70B-parameter model trained on 2T tokens (~8.4e23 FLOPs) sits safely below the gate; a 400B-parameter model trained on 15T tokens (~3.6e25 FLOPs) crosses it and picks up red-teaming, two-day incident reporting, cybersecurity, and energy-reporting obligations in addition to -- not instead of -- the base documentation duties.</figcaption>
</figure>
