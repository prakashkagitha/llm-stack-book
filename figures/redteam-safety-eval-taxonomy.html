<figcaption><b>Safety evaluation spans eight distinct harm types, each demanding its own methodology.</b> Toxicity and bias evaluations rely on curated benchmark datasets and counterfactual probes, while jailbreak resistance is measured by attack success rate against adversarial prompts. Dangerous-capability and CBRN hazard evaluations require expert-designed test cases, and over-refusal must be tracked alongside harm rate to avoid optimizing a one-sided policy.</figcaption>
