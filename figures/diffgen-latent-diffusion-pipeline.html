<figure class="viz" id="fig-diffgen-latent-diffusion-pipeline">
<style>
  #fig-diffgen-latent-diffusion-pipeline .lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-diffgen-latent-diffusion-pipeline .lbl-sm { font: 500 11.5px var(--sans,sans-serif); }
  #fig-diffgen-latent-diffusion-pipeline .lbl-xs { font: 400 10px var(--sans,sans-serif); }
  #fig-diffgen-latent-diffusion-pipeline .mono { font: 500 10.5px var(--mono,monospace); }
  #fig-diffgen-latent-diffusion-pipeline text { fill: var(--ink-soft, #222); }
  #fig-diffgen-latent-diffusion-pipeline .muted { fill: var(--muted, #666); }
</style>
<svg viewBox="0 0 860 660" role="img" aria-label="Latent Diffusion pipeline: text prompt through CLIP/T5 encoder conditions a U-Net denoiser via cross-attention; raw 512x512 image through VAE encoder yields 64x64x4 latent that feeds the denoiser; after 1000 denoising steps the latent is decoded by the VAE back to a 512x512 generated image.">
  <defs>
    <marker id="ldp-arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#444)"/>
    </marker>
    <marker id="ldp-arrow-cond" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#c25)"/>
    </marker>
  </defs>

  
  <rect x="195" y="245" width="470" height="278" rx="12"
        fill="var(--accent,#2a7)" fill-opacity="0.06"
        stroke="var(--accent,#2a7)" stroke-width="1.5" stroke-dasharray="6 4"/>
  
  <text x="205" y="512" text-anchor="start" class="lbl-xs muted">latent space (64x64x4)</text>

  

  
  <rect x="22" y="48" width="165" height="56" rx="7"
        fill="var(--surface,#f5f5f5)" stroke="var(--border-2,#888)" stroke-width="1.5"/>
  <text x="104" y="71" text-anchor="middle" class="lbl">Raw image</text>
  <text x="104" y="89" text-anchor="middle" class="mono">512x512x3</text>

  
  <line x1="104" y1="104" x2="104" y2="140"
        stroke="var(--ink-soft,#444)" stroke-width="1.5" marker-end="url(#ldp-arrow)"/>

  
  <rect x="22" y="141" width="165" height="56" rx="7"
        fill="var(--surface-3,#eef3f8)" stroke="var(--border-2,#888)" stroke-width="1.5"/>
  <text x="104" y="164" text-anchor="middle" class="lbl">VAE Encoder</text>
  <text x="104" y="182" text-anchor="middle" class="lbl-xs muted">(downsample 8x)</text>

  
  <line x1="104" y1="197" x2="104" y2="248"
        stroke="var(--ink-soft,#444)" stroke-width="1.5" marker-end="url(#ldp-arrow)"/>

  
  <rect x="22" y="249" width="165" height="56" rx="7"
        fill="var(--surface,#e8f0e8)" stroke="var(--accent,#2a7)" stroke-width="1.5"/>
  <text x="104" y="272" text-anchor="middle" class="lbl">Latent z</text>
  <text x="104" y="290" text-anchor="middle" class="mono">R^(64x64x4)</text>

  
  <text x="22" y="318" text-anchor="start" class="lbl-xs muted">48x fewer values</text>
  <text x="22" y="331" text-anchor="start" class="lbl-xs muted">(786,432 -> 16,384)</text>

  
  <polyline points="187,290 250,290 305,335"
        fill="none" stroke="var(--ink-soft,#444)" stroke-width="1.5" marker-end="url(#ldp-arrow)"/>
  <text x="196" y="283" text-anchor="start" class="lbl-xs muted">noisy latent x_t</text>

  

  
  <rect x="575" y="28" width="180" height="48" rx="7"
        fill="var(--surface,#f5f5f5)" stroke="var(--border-2,#888)" stroke-width="1.5"/>
  <text x="665" y="51" text-anchor="middle" class="lbl">Text prompt</text>
  <text x="665" y="67" text-anchor="middle" class="lbl-xs muted">"a photo of a cat..."</text>

  
  <line x1="665" y1="76" x2="665" y2="110"
        stroke="var(--accent-2,#c25)" stroke-width="1.5" marker-end="url(#ldp-arrow-cond)"/>

  
  <rect x="575" y="111" width="180" height="56" rx="7"
        fill="var(--surface,#fff0ee)" stroke="var(--accent-2,#c25)" stroke-width="1.8"/>
  <text x="665" y="134" text-anchor="middle" class="lbl" style="fill:var(--accent-2,#c25)">CLIP / T5</text>
  <text x="665" y="153" text-anchor="middle" class="lbl-sm" style="fill:var(--accent-2,#c25)">Text Encoder</text>

  
  <path d="M 620 167 C 600 225, 580 260, 610 290"
        fill="none" stroke="var(--accent-2,#c25)" stroke-width="1.8"
        stroke-dasharray="5 3" marker-end="url(#ldp-arrow-cond)"/>

  
  <text x="575" y="195" text-anchor="start" class="lbl-xs" style="fill:var(--accent-2,#c25)">cross-attention:</text>
  <text x="575" y="208" text-anchor="start" class="lbl-xs" style="fill:var(--accent-2,#c25)">keys/values from</text>
  <text x="575" y="221" text-anchor="start" class="lbl-xs" style="fill:var(--accent-2,#c25)">text embeddings</text>

  

  
  <path d="M 400 275 C 435 250, 465 250, 455 275"
        fill="none" stroke="var(--accent,#2a7)" stroke-width="1.4"
        stroke-dasharray="4 3" marker-end="url(#ldp-arrow)"/>
  <text x="428" y="245" text-anchor="middle" class="lbl-xs muted">iterative loop</text>

  
  <rect x="305" y="275" width="300" height="130" rx="10"
        fill="var(--surface,#f0f7f2)" stroke="var(--accent,#2a7)" stroke-width="2.5"/>
  <text x="455" y="302" text-anchor="middle" class="lbl" style="fill:var(--accent,#2a7)">U-Net / Transformer</text>
  <text x="455" y="318" text-anchor="middle" class="lbl" style="fill:var(--accent,#2a7)">Denoiser</text>
  <text x="455" y="338" text-anchor="middle" class="lbl-sm">(~1000 steps of diffusion</text>
  <text x="455" y="353" text-anchor="middle" class="lbl-sm">in latent space)</text>
  <text x="455" y="365" text-anchor="middle" class="lbl-xs muted">queries from spatial features</text>
  <text x="455" y="378" text-anchor="middle" class="lbl-xs muted">keys/values from text embeddings</text>

  

  
  <line x1="455" y1="405" x2="455" y2="427"
        stroke="var(--ink-soft,#444)" stroke-width="1.5" marker-end="url(#ldp-arrow)"/>

  
  <rect x="345" y="428" width="220" height="56" rx="7"
        fill="var(--surface,#e8f0e8)" stroke="var(--accent,#2a7)" stroke-width="1.5"/>
  <text x="455" y="451" text-anchor="middle" class="lbl">Denoised latent z-hat_0</text>
  <text x="455" y="469" text-anchor="middle" class="mono">(64x64x4)</text>

  
  <line x1="455" y1="484" x2="455" y2="516"
        stroke="var(--ink-soft,#444)" stroke-width="1.5" marker-end="url(#ldp-arrow)"/>

  
  <rect x="345" y="517" width="220" height="56" rx="7"
        fill="var(--surface-3,#eef3f8)" stroke="var(--border-2,#888)" stroke-width="1.5"/>
  <text x="455" y="540" text-anchor="middle" class="lbl">VAE Decoder</text>
  <text x="455" y="558" text-anchor="middle" class="lbl-xs muted">(upsample 8x)</text>

  
  <line x1="455" y1="573" x2="455" y2="606"
        stroke="var(--ink-soft,#444)" stroke-width="1.5" marker-end="url(#ldp-arrow)"/>

  
  <rect x="345" y="607" width="220" height="44" rx="7"
        fill="var(--surface,#f5f5f5)" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
  <text x="455" y="626" text-anchor="middle" class="lbl" style="fill:var(--good,#2f9e6e)">Generated image</text>
  <text x="455" y="644" text-anchor="middle" class="mono" style="fill:var(--good,#2f9e6e)">512x512x3</text>

</svg>
<figcaption><b>Latent Diffusion (Stable Diffusion) runs the full diffusion process in a compressed VAE latent space, not pixel space.</b> A VAE encoder compresses the input 48x (512x512x3 to 64x64x4), a U-Net/Transformer denoiser iteratively denoises the latent over ~1000 steps while cross-attending to CLIP/T5 text embeddings, and a VAE decoder upsamples the clean latent back to a 512x512 image — cutting per-step compute by roughly 64x compared to pixel-space diffusion.</figcaption>
</figure>
