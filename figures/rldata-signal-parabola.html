<figcaption><b>Gradient signal per prompt peaks at pass rate 0.5.</b> The Bernoulli variance Var(r) = p(1-p) — the per-prompt contribution to the policy-gradient estimator — is a downward parabola maximized at p=0.5 (Var=0.25) and zero at both ends. A prompt at p=0.9 yields only Var=0.09, roughly 2.8x less signal per rollout than one at p=0.5, making pass rate the master variable controlling sample efficiency.</figcaption>
