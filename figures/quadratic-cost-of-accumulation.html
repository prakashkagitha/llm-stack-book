<figure class="viz" id="fig-quadratic-cost-of-accumulation">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 800 520" role="img" aria-label="Two bar-chart panels of prompt length per turn over 14 turns: the naive panel's bars grow every turn, tracing a right triangle whose shaded area is the total tokens billed, about 224 illustrative units; the capped panel's bars grow for four turns then plateau at a ceiling C, shading a small ramp-plus-rectangle totaling about 114 units, roughly half as much.">
  <defs>
    <marker id="qc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-quadratic-cost-of-accumulation .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-quadratic-cost-of-accumulation .panel-h{ font:700 13px var(--sans,sans-serif); }
    #fig-quadratic-cost-of-accumulation .sub{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-quadratic-cost-of-accumulation .ax{ font:600 11px var(--sans,sans-serif); }
    #fig-quadratic-cost-of-accumulation .tick{ font:500 10px var(--mono,monospace); fill:var(--muted); }
    #fig-quadratic-cost-of-accumulation .area-lbl{ font:700 13px var(--sans,sans-serif); }
    #fig-quadratic-cost-of-accumulation .note{ font:600 12px var(--sans,sans-serif); }
    #fig-quadratic-cost-of-accumulation .total-lbl{ font:700 12px var(--mono,monospace); }
    #fig-quadratic-cost-of-accumulation .name-lbl{ font:700 11.5px var(--sans,sans-serif); }
    #fig-quadratic-cost-of-accumulation text{ fill: var(--ink-soft); }
    #fig-quadratic-cost-of-accumulation .bar-naive{ fill: var(--accent); }
    #fig-quadratic-cost-of-accumulation .bar-capped{ fill: var(--muted); }
    #fig-quadratic-cost-of-accumulation .callout-bg{ fill: var(--surface); stroke: var(--border-2); stroke-width: 1; }
  </style>

  <text x="400" y="22" text-anchor="middle" class="ttl">The bill is the AREA under the growth curve</text>

  <g data-anim="1">

    <text x="230" y="45" text-anchor="middle" class="panel-h" fill="var(--accent)">NAIVE: unbounded context</text>
    <text x="230" y="60" text-anchor="middle" class="sub">L_t = L0 + a*t, grows every turn</text>
    <line x1="75" y1="100" x2="75" y2="400" class="v-stroke" stroke-width="1.4" marker-start="url(#qc-arrow)"/>
    <line x1="75" y1="400" x2="335" y2="400" class="v-stroke" stroke-width="1.4" marker-end="url(#qc-arrow)"/>
    <text x="55" y="250" text-anchor="middle" class="ax" transform="rotate(-90 55 250)">prompt length (units)</text>
    <text x="205" y="416" text-anchor="middle" class="ax">turn number t</text>
    <text x="96" y="414" text-anchor="middle" class="tick">t=1</text>
    <text x="291" y="414" text-anchor="middle" class="tick">t=14</text>


    <text x="610" y="45" text-anchor="middle" class="panel-h" fill="var(--muted)">CAPPED: ceiling C</text>
    <text x="610" y="60" text-anchor="middle" class="sub">L_t grows, then holds at C</text>
    <line x1="455" y1="100" x2="455" y2="400" class="v-stroke" stroke-width="1.4" marker-start="url(#qc-arrow)"/>
    <line x1="455" y1="400" x2="715" y2="400" class="v-stroke" stroke-width="1.4" marker-end="url(#qc-arrow)"/>
    <text x="435" y="250" text-anchor="middle" class="ax" transform="rotate(-90 435 250)">prompt length (units)</text>
    <text x="585" y="416" text-anchor="middle" class="ax">turn number t</text>
    <text x="476" y="414" text-anchor="middle" class="tick">t=1</text>
    <text x="671" y="414" text-anchor="middle" class="tick">t=14</text>
  </g>

  <g data-anim="2">

    <rect x="90" y="376" width="13" height="24" rx="1.5" class="bar-naive"/>
    <rect x="105" y="360" width="13" height="40" rx="1.5" class="bar-naive"/>
    <rect x="120" y="344" width="13" height="56" rx="1.5" class="bar-naive"/>
    <rect x="135" y="328" width="13" height="72" rx="1.5" class="bar-naive"/>
    <rect x="150" y="312" width="13" height="88" rx="1.5" class="bar-naive"/>
    <rect x="165" y="296" width="13" height="104" rx="1.5" class="bar-naive"/>
    <rect x="180" y="280" width="13" height="120" rx="1.5" class="bar-naive"/>
    <rect x="195" y="264" width="13" height="136" rx="1.5" class="bar-naive"/>
    <rect x="210" y="248" width="13" height="152" rx="1.5" class="bar-naive"/>
    <rect x="225" y="232" width="13" height="168" rx="1.5" class="bar-naive"/>
    <rect x="240" y="216" width="13" height="184" rx="1.5" class="bar-naive"/>
    <rect x="255" y="200" width="13" height="200" rx="1.5" class="bar-naive"/>
    <rect x="270" y="184" width="13" height="216" rx="1.5" class="bar-naive"/>
    <rect x="285" y="168" width="13" height="232" rx="1.5" class="bar-naive"/>

    <polyline points="96.5,376 111.5,360 126.5,344 141.5,328 156.5,312 171.5,296 186.5,280 201.5,264 216.5,248 231.5,232 246.5,216 261.5,200 276.5,184 291.5,168"
              fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"
              class="viz-draw" style="--len:290"/>

    <rect x="200" y="118" width="122" height="24" rx="5" class="callout-bg"/>
    <text x="261" y="134" text-anchor="middle" class="area-lbl" fill="var(--accent)">~ 1/2 a N^2</text>
    <line x1="261" y1="142" x2="270" y2="166" stroke="var(--accent)" stroke-width="1.4" marker-end="url(#qc-arrow)"/>
  </g>

  <g data-anim="3">

    <rect x="470" y="376" width="13" height="24" rx="1.5" class="bar-capped"/>
    <rect x="485" y="360" width="13" height="40" rx="1.5" class="bar-capped"/>
    <rect x="500" y="344" width="13" height="56" rx="1.5" class="bar-capped"/>
    <rect x="515" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="530" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="545" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="560" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="575" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="590" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="605" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="620" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="635" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="650" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>
    <rect x="665" y="328" width="13" height="72" rx="1.5" class="bar-capped"/>


    <line x1="515" y1="328" x2="700" y2="328" stroke="var(--muted)" stroke-width="1.6" stroke-dasharray="4 3"/>
    <text x="704" y="332" class="tick" fill="var(--muted)">cap C=9</text>


    <rect x="560" y="230" width="90" height="24" rx="5" class="callout-bg"/>
    <text x="605" y="246" text-anchor="middle" class="area-lbl" fill="var(--muted)">O(N*C)</text>
    <line x1="605" y1="254" x2="600" y2="300" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#qc-arrow)"/>
  </g>

  <g data-anim="4">
    <rect x="60" y="430" width="680" height="26" rx="6" class="callout-bg"/>
    <text x="400" y="447" text-anchor="middle" class="note">the bill is the AREA under the line -- capping trades a triangle for a rectangle</text>
  </g>

  <g data-anim="5">
    <text x="400" y="475" text-anchor="middle" class="ax">total tokens billed over N=14 turns (illustrative units)</text>

    <text x="140" y="497" text-anchor="end" class="name-lbl" fill="var(--accent)">naive</text>
    <rect x="150" y="486" width="460" height="14" rx="3" class="bar-naive" opacity="0.85"/>
    <text x="618" y="497" class="total-lbl" fill="var(--accent)">224</text>

    <text x="140" y="516" text-anchor="end" class="name-lbl" fill="var(--muted)">capped</text>
    <rect x="150" y="505" width="234" height="14" rx="3" class="bar-capped" opacity="0.85"/>
    <text x="392" y="516" class="total-lbl" fill="var(--muted)">114</text>
  </g>
</svg>
<figcaption><b>Naive context accumulation re-sends the entire prefix every turn, so the total input tokens billed across a run is the shaded AREA under the growth curve, not the final turn's length.</b> With no cap the bars trace a right triangle and the bill grows like &#189;aN&#178; (quadratic in turns); holding the prompt at a fixed ceiling C turns the triangle into a small ramp-plus-rectangle, O(N&#183;C) &#8212; roughly half the tokens here, and the saving grows with N.</figcaption>
</figure>
