<figure class="viz" id="fig-bpe-merges">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 372" role="img" aria-label="Bottom-up byte-pair encoding of the word lowest: starting from the characters l o w e s t plus end-of-word marker, successive merges glue the most frequent adjacent pair into est, then est plus end marker, then ow, then low, until the word is two subword tokens low and est.">
  <defs>
    <marker id="bpe-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-bpe-merges text{ fill:var(--ink-soft); }
    #fig-bpe-merges .sym{ font:600 14px var(--mono,monospace); }
    #fig-bpe-merges .stage{ font:600 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-bpe-merges .rule{ font:600 11.5px var(--mono,monospace); fill:var(--accent); }
    #fig-bpe-merges .note{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <text x="20" y="42" class="stage">start: characters + end-of-word marker</text>
    
    <g class="v-fill v-stroke" stroke-width="1.3">
      <rect x="226" y="52" width="34" height="32" rx="6"/>
      <rect x="264" y="52" width="34" height="32" rx="6"/>
      <rect x="302" y="52" width="34" height="32" rx="6"/>
      <rect x="340" y="52" width="34" height="32" rx="6"/>
      <rect x="378" y="52" width="34" height="32" rx="6"/>
      <rect x="416" y="52" width="34" height="32" rx="6"/>
      <rect x="454" y="52" width="60" height="32" rx="6"/>
    </g>
    <g class="sym" text-anchor="middle">
      <text x="243" y="73">l</text><text x="281" y="73">o</text><text x="319" y="73">w</text>
      <text x="357" y="73">e</text><text x="395" y="73">s</text><text x="433" y="73">t</text>
      <text x="484" y="73" class="v-muted" fill="var(--muted)">&#60;/w&#62;</text>
    </g>
  </g>

  
  <g data-anim="2">
    
    <path d="M357 90 v8 h38 v-8" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.4"/>
    <line x1="376" y1="106" x2="376" y2="120" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#bpe-arrow)"/>
    <text x="544" y="112" class="rule">merge &#40;e, s&#41; &#45;&gt; es</text>
    <text x="20" y="112" class="stage">merge 1</text>

    
    <g class="v-fill v-stroke" stroke-width="1.3">
      <rect x="245" y="124" width="34" height="32" rx="6"/>
      <rect x="283" y="124" width="34" height="32" rx="6"/>
      <rect x="321" y="124" width="34" height="32" rx="6"/>
    </g>
    
    <rect x="359" y="124" width="42" height="32" rx="6" class="v-fill v-accent-s" stroke-width="1.6"/>
    <rect x="405" y="124" width="34" height="32" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <rect x="443" y="124" width="60" height="32" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <g class="sym" text-anchor="middle">
      <text x="262" y="145">l</text><text x="300" y="145">o</text><text x="338" y="145">w</text>
      <text x="380" y="145" class="v-accent" fill="var(--accent)">es</text>
      <text x="422" y="145">t</text>
      <text x="473" y="145" class="v-muted" fill="var(--muted)">&#60;/w&#62;</text>
    </g>
  </g>

  
  <g data-anim="3">
    <path d="M380 162 v8 h42 v-8" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.4"/>
    <line x1="401" y1="178" x2="401" y2="192" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#bpe-arrow)"/>
    <text x="544" y="184" class="rule">merge &#40;es, t&#41; &#45;&gt; est</text>
    <text x="20" y="184" class="stage">merge 2</text>

    <g class="v-fill v-stroke" stroke-width="1.3">
      <rect x="252" y="196" width="34" height="32" rx="6"/>
      <rect x="290" y="196" width="34" height="32" rx="6"/>
      <rect x="328" y="196" width="34" height="32" rx="6"/>
    </g>
    <rect x="366" y="196" width="50" height="32" rx="6" class="v-fill v-accent-s" stroke-width="1.6"/>
    <rect x="420" y="196" width="60" height="32" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <g class="sym" text-anchor="middle">
      <text x="269" y="217">l</text><text x="307" y="217">o</text><text x="345" y="217">w</text>
      <text x="391" y="217" class="v-accent" fill="var(--accent)">est</text>
      <text x="450" y="217" class="v-muted" fill="var(--muted)">&#60;/w&#62;</text>
    </g>
  </g>

  
  <g data-anim="4">
    <path d="M307 234 v8 h38 v-8" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.4"/>
    <line x1="326" y1="250" x2="326" y2="264" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#bpe-arrow)"/>
    <text x="544" y="256" class="rule">merge &#40;o, w&#41; &#45;&gt; ow</text>
    <text x="20" y="256" class="stage">merge 3</text>

    <rect x="271" y="268" width="34" height="32" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <rect x="309" y="268" width="42" height="32" rx="6" class="v-fill v-accent-s" stroke-width="1.6"/>
    <rect x="355" y="268" width="50" height="32" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <rect x="409" y="268" width="60" height="32" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <g class="sym" text-anchor="middle">
      <text x="288" y="289">l</text>
      <text x="330" y="289" class="v-accent" fill="var(--accent)">ow</text>
      <text x="380" y="289">est</text>
      <text x="439" y="289" class="v-muted" fill="var(--muted)">&#60;/w&#62;</text>
    </g>
  </g>

  
  <g data-anim="5">
    <path d="M288 306 v8 h42 v-8" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.4"/>
    <line x1="309" y1="322" x2="309" y2="336" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#bpe-arrow)"/>
    <text x="544" y="328" class="rule">merge &#40;l, ow&#41; &#45;&gt; low</text>
    <text x="20" y="328" class="stage">merge 4</text>

    
    <rect x="288" y="340" width="58" height="32" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.7"/>
    <rect x="350" y="340" width="92" height="32" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.7"/>
    <g class="sym" text-anchor="middle">
      <text x="317" y="361" fill="var(--good,#2f9e6e)">low</text>
      <text x="396" y="361" fill="var(--good,#2f9e6e)">est&#60;/w&#62;</text>
    </g>
    <text x="544" y="363" class="note">2 subword tokens</text>
  </g>
</svg>
<figcaption><b>BPE builds subwords bottom-up by gluing the most frequent adjacent pair.</b> Reading down, the word <span class="v-mono">lowest</span> starts as bare characters plus the end-of-word marker <span class="v-mono">&#60;/w&#62;</span>; each learned merge rule fuses one pair into a larger symbol until the word is just two reusable tokens, <span class="v-mono">low</span> and <span class="v-mono">est&#60;/w&#62;</span> — pieces that also tokenize words like <span class="v-mono">lower</span> and <span class="v-mono">newest</span>.</figcaption>
</figure>
