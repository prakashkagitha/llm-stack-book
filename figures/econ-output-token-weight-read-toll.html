<figure class="viz" id="fig-econ-output-token-weight-read-toll">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 880 400" role="img" aria-label="Side-by-side comparison: prefill reads the model weights from HBM once and amortizes that read across every prompt token in parallel, while decode re-reads the entire weight matrix from HBM once per single emitted output token.">
  <style>
    #fig-econ-output-token-weight-read-toll .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-econ-output-token-weight-read-toll .panel-ttl{ font:700 13px var(--sans,sans-serif); letter-spacing:.02em; }
    #fig-econ-output-token-weight-read-toll .lbl{ font:600 11px var(--sans,sans-serif); }
    #fig-econ-output-token-weight-read-toll .sub{ font:500 10.5px var(--sans,sans-serif); }
    #fig-econ-output-token-weight-read-toll .cap{ font:500 10.5px var(--sans,sans-serif); }
    #fig-econ-output-token-weight-read-toll .tok{ font:700 10.5px var(--mono,monospace); }
    #fig-econ-output-token-weight-read-toll .strip{ font:700 12.5px var(--sans,sans-serif); }
    #fig-econ-output-token-weight-read-toll text{ fill: var(--ink-soft); }
    #fig-econ-output-token-weight-read-toll .dim{ fill: var(--muted); }
  </style>

  <text x="440" y="22" text-anchor="middle" class="ttl">Same weights, same per-token FLOPs &#8212; who pays for the HBM read?</text>

  
  <g data-anim="1">
    <rect x="14" y="38" width="404" height="286" rx="10" fill="none" class="v-grid" stroke-width="1.4"/>
    <text x="216" y="58" text-anchor="middle" class="panel-ttl" fill="var(--good,#2f9e6e)">PREFILL (input tokens)</text>

    
    <rect x="30" y="76" width="90" height="150" rx="7" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>
    <text x="75" y="146" text-anchor="middle" class="lbl">model</text>
    <text x="75" y="160" text-anchor="middle" class="lbl">weights</text>
    <text x="75" y="176" text-anchor="middle" class="sub dim">(P params)</text>

    
    <defs>
      <marker id="econ-arrow-good" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
      </marker>
    </defs>
    <path d="M124 150 L172 150" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="4" stroke-linecap="round" marker-end="url(#econ-arrow-good)" class="viz-draw" style="--len:60"/>
    <text x="148" y="132" text-anchor="middle" class="sub" fill="var(--good,#2f9e6e)">ONE read</text>

    
    <g data-anim="2">
      <rect x="182" y="122" width="212" height="56" rx="6" fill="none" class="v-grid" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
      <g class="tok">
        <rect x="190" y="132" width="28" height="36" rx="4" fill="var(--good,#2f9e6e)" opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
        <rect x="224" y="132" width="28" height="36" rx="4" fill="var(--good,#2f9e6e)" opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
        <rect x="258" y="132" width="28" height="36" rx="4" fill="var(--good,#2f9e6e)" opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
        <rect x="292" y="132" width="28" height="36" rx="4" fill="var(--good,#2f9e6e)" opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
        <rect x="326" y="132" width="28" height="36" rx="4" fill="var(--good,#2f9e6e)" opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
        <rect x="360" y="132" width="28" height="36" rx="4" fill="var(--good,#2f9e6e)" opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
      </g>
      <text x="288" y="196" text-anchor="middle" class="sub dim">6 prompt tokens processed together, in ONE pass</text>
    </g>

    <line x1="30" y1="238" x2="410" y2="238" class="v-grid" stroke-width="1" opacity="0.5"/>
    <text x="216" y="258" text-anchor="middle" class="cap">one weight read amortized across the whole prompt</text>
    <text x="216" y="273" text-anchor="middle" class="cap">-&gt; near-peak FLOP utilization</text>
    <text x="216" y="292" text-anchor="middle" class="cap" fill="var(--good,#2f9e6e)" font-weight="700">-&gt; cheap per token</text>
  </g>

  
  <g data-anim="3">
    <rect x="462" y="38" width="404" height="286" rx="10" fill="none" class="v-grid" stroke-width="1.4"/>
    <text x="664" y="58" text-anchor="middle" class="panel-ttl" fill="var(--accent)">DECODE (output tokens)</text>

    
    <rect x="478" y="76" width="66" height="150" rx="7" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>
    <text x="511" y="144" text-anchor="middle" class="lbl">model</text>
    <text x="511" y="158" text-anchor="middle" class="lbl">weights</text>
    <text x="511" y="174" text-anchor="middle" class="sub dim">(P params)</text>

    <defs>
      <marker id="econ-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
      </marker>
    </defs>

    
    <g data-anim="3">
      <path d="M550 96 L612 96" fill="none" stroke="var(--accent)" stroke-width="3.4" stroke-linecap="round" marker-end="url(#econ-arrow-accent)" class="viz-draw" style="--len:65"/>
      <text x="581" y="86" text-anchor="middle" class="sub" fill="var(--accent)">full read</text>
      <rect x="618" y="80" width="30" height="34" rx="4" class="tok" fill="var(--accent)" opacity="0.16" stroke="var(--accent)" stroke-width="1.3"/>
      <text x="633" y="102" text-anchor="middle" class="tok" fill="var(--ink-soft)">t1</text>
    </g>

    
    <g data-anim="4">
      <path d="M550 150 L612 150" fill="none" stroke="var(--accent)" stroke-width="3.4" stroke-linecap="round" marker-end="url(#econ-arrow-accent)" class="viz-draw" style="--len:65"/>
      <text x="581" y="140" text-anchor="middle" class="sub" fill="var(--accent)">full read</text>
      <rect x="618" y="134" width="30" height="34" rx="4" class="tok" fill="var(--accent)" opacity="0.16" stroke="var(--accent)" stroke-width="1.3"/>
      <text x="633" y="156" text-anchor="middle" class="tok" fill="var(--ink-soft)">t2</text>
    </g>

    
    <g data-anim="5">
      <path d="M550 204 L612 204" fill="none" stroke="var(--accent)" stroke-width="3.4" stroke-linecap="round" marker-end="url(#econ-arrow-accent)" class="viz-draw" style="--len:65"/>
      <text x="581" y="194" text-anchor="middle" class="sub" fill="var(--accent)">full read</text>
      <rect x="618" y="188" width="30" height="34" rx="4" class="tok" fill="var(--accent)" opacity="0.16" stroke="var(--accent)" stroke-width="1.3"/>
      <text x="633" y="210" text-anchor="middle" class="tok" fill="var(--ink-soft)">t3</text>
    </g>

    
    <text x="660" y="238" class="lbl dim">...</text>

    
    <text x="720" y="99" text-anchor="start" class="sub dim">1 token out</text>
    <text x="720" y="153" text-anchor="start" class="sub dim">1 token out</text>
    <text x="720" y="207" text-anchor="start" class="sub dim">1 token out</text>

    <line x1="478" y1="238" x2="858" y2="238" class="v-grid" stroke-width="1" opacity="0.5"/>
    <text x="664" y="258" text-anchor="middle" class="cap">one full weight read per emitted token</text>
    <text x="664" y="273" text-anchor="middle" class="cap">-&gt; memory-bound, low utilization</text>
    <text x="664" y="292" text-anchor="middle" class="cap" fill="var(--accent)" font-weight="700">-&gt; expensive per token</text>
  </g>

  
  <g data-anim="5">
    <rect x="14" y="336" width="852" height="52" rx="9" class="v-fill" stroke="var(--border-2)" stroke-width="1.2"/>
    <text x="440" y="357" text-anchor="middle" class="strip">same FLOPs per token (~2P) on both sides &#8212; the gap is bandwidth</text>
    <text x="440" y="375" text-anchor="middle" class="strip" fill="var(--accent)">each output token pays its own weight-read toll</text>
  </g>
</svg>
<figcaption><b>Prefill amortizes a single HBM weight sweep across every prompt token at near-peak utilization, whereas decode re-streams the entire weight matrix to emit each single token.</b> The per-token FLOPs are identical (~2P) on both sides; only the bandwidth cost differs &#8212; which is why providers price output tokens several times higher than input tokens.</figcaption>
</figure>
