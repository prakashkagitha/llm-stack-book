<figcaption><b>MHA, GQA, and MQA differ only in how many KV heads the query heads share.</b> The query row stays identical across all three schemes (8 heads, unchanged expressivity), while the KV row collapses from 8 heads (MHA, 1:1 mapping) to 2 groups (GQA, fan-in of 4) to a single shared head (MQA, maximal fan-in). KV cache cost tracks the KV-head count, so this progression cuts memory 4x (GQA g=2) or 8x (MQA) relative to MHA.</figcaption>
