<figure class="viz" id="fig-radix-tree">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 430" role="img" aria-label="A radix tree of cached KV: three requests share a system-prompt prefix on one edge, branch into two task templates, and diverge into distinct user inputs, so the shared prefix's KV is computed once and reused.">
  <defs>
    <marker id="rt-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-radix-tree text{ fill:var(--ink-soft); }
    #fig-radix-tree .node{ font:600 12px var(--mono,monospace); }
    #fig-radix-tree .edge{ font:600 11.5px var(--mono,monospace); }
    #fig-radix-tree .kv{ font:600 9.5px var(--mono,monospace); fill:var(--muted); }
    #fig-radix-tree .role{ font:700 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-radix-tree .req{ font:700 11px var(--sans,sans-serif); }
    #fig-radix-tree .note{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-radix-tree .root{ font:700 10px var(--mono,monospace); fill:var(--muted); }
  </style>

  
  
  <g data-anim="1" fill="none" stroke-width="2.2" marker-end="url(#rt-arrow)">
    <path class="viz-draw" style="--len:44" d="M380 62 L380 96" stroke="var(--accent)"/>
  </g>
  
  <g data-anim="2" fill="none" stroke-width="2" marker-end="url(#rt-arrow)">
    <path class="viz-draw" style="--len:150" d="M380 166 C 380 196, 214 192, 214 222" stroke="var(--accent2,#3b82f6)"/>
    <path class="viz-draw" style="--len:150" d="M380 166 C 380 196, 546 192, 546 222" stroke="var(--warn,#e0a106)"/>
  </g>
  
  <g data-anim="3" fill="none" stroke-width="1.8" marker-end="url(#rt-arrow)">
    <path class="viz-draw" style="--len:96" d="M214 292 C 214 318, 120 322, 120 348" stroke="var(--accent2,#3b82f6)"/>
    <path class="viz-draw" style="--len:96" d="M214 292 C 214 318, 308 322, 308 348" stroke="var(--accent2,#3b82f6)"/>
    <path class="viz-draw" style="--len:60" d="M546 292 L546 348" stroke="var(--warn,#e0a106)"/>
  </g>

  
  <g data-anim="1">
    <circle cx="380" cy="44" r="18" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="380" y="48" text-anchor="middle" class="root">root</text>
  </g>

  
  <g data-anim="1">
    <rect x="246" y="96" width="268" height="70" rx="9" class="v-fill v-accent-s" stroke-width="2"/>
    <text x="380" y="118" text-anchor="middle" class="role">system prompt · shared prefix</text>
    <text x="380" y="138" text-anchor="middle" class="edge v-accent" fill="var(--accent)">"You are a helpful assistant."</text>
    <text x="380" y="156" text-anchor="middle" class="kv">KV slots [0…26] · prefilled ONCE</text>
  </g>

  
  
  <g data-anim="2">
    <rect x="92" y="222" width="244" height="70" rx="9" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
    <text x="214" y="244" text-anchor="middle" class="role">task template</text>
    <text x="214" y="264" text-anchor="middle" class="edge" fill="var(--accent2,#3b82f6)">"Translate to French:"</text>
    <text x="214" y="282" text-anchor="middle" class="kv">KV slots [27…32]</text>
  </g>
  
  <g data-anim="2">
    <rect x="424" y="222" width="244" height="70" rx="9" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
    <text x="546" y="244" text-anchor="middle" class="role">task template</text>
    <text x="546" y="264" text-anchor="middle" class="edge" fill="var(--warn,#e0a106)">"Summarize:"</text>
    <text x="546" y="282" text-anchor="middle" class="kv">KV slots [33…36]</text>
  </g>

  
  
  <g data-anim="3">
    <rect x="18" y="348" width="204" height="62" rx="9" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="120" y="368" text-anchor="middle" class="req v-accent" fill="var(--accent)">req 1</text>
    <text x="120" y="386" text-anchor="middle" class="edge">"Hello world"</text>
    <text x="120" y="403" text-anchor="middle" class="kv">unique suffix · new KV</text>
  </g>
  
  <g data-anim="3">
    <rect x="234" y="348" width="204" height="62" rx="9" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="336" y="368" text-anchor="middle" class="req v-accent" fill="var(--accent)">req 2</text>
    <text x="336" y="386" text-anchor="middle" class="edge">"Good morning"</text>
    <text x="336" y="403" text-anchor="middle" class="kv">unique suffix · new KV</text>
  </g>
  
  <g data-anim="3">
    <rect x="444" y="348" width="204" height="62" rx="9" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="546" y="368" text-anchor="middle" class="req v-accent" fill="var(--accent)">req 3</text>
    <text x="546" y="386" text-anchor="middle" class="edge">"The quick brown…"</text>
    <text x="546" y="403" text-anchor="middle" class="kv">unique suffix · new KV</text>
  </g>

  
  <g data-anim="4">
    <line x1="536" y1="131" x2="614" y2="131" class="v-accent-s" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
    <text x="748" y="118" text-anchor="end" class="note">one edge holds the</text>
    <text x="748" y="132" text-anchor="end" class="note">whole shared prompt;</text>
    <text x="748" y="146" text-anchor="end" class="note">its KV is reused by</text>
    <text x="748" y="160" text-anchor="end" class="note">all 3 requests</text>
  </g>
</svg>
<figcaption><b>A radix tree shares KV along common prefixes and branches only where requests diverge.</b> All three requests reuse the single system-prompt edge (its KV is prefilled <b>once</b>), then split into two task templates, and finally attach their distinct user inputs as fresh leaves. Matching a new prompt walks down from the root to the longest cached prefix, so only the divergent suffix is recomputed.</figcaption>
</figure>
