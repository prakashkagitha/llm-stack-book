<figure class="viz" id="fig-weight-tying-shared-matrix">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 800 640" role="img" aria-label="A single embedding matrix W_E is used at both ends of the model: the input token id looks up one row to produce the embedding e_i, and after L Transformer blocks the final hidden state h is dotted against every row of the same matrix to produce logits, with the highlighted row's logit coming out tallest.">
<defs>
  <marker id="wt-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" class="v-muted" fill="currentColor"/>
  </marker>
  <marker id="wt-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" class="v-accent" fill="currentColor"/>
  </marker>
</defs>
<style>
  #fig-weight-tying-shared-matrix text{ fill:var(--ink-soft); }
  #fig-weight-tying-shared-matrix .ttl{ font:700 12.5px var(--sans,sans-serif); }
  #fig-weight-tying-shared-matrix .lbl{ font:600 11px var(--mono,monospace); }
  #fig-weight-tying-shared-matrix .sm{ font:500 9.5px var(--mono,monospace); fill:var(--muted); }
  #fig-weight-tying-shared-matrix .note{ font:400 10px var(--sans,sans-serif); fill:var(--muted); }
</style>

<g data-anim="1">
  <rect x="20" y="14" width="760" height="52" rx="10" class="v-fill v-stroke" stroke-width="1.2" opacity="0.55"/>
  <text x="400" y="35" text-anchor="middle" style="font:700 12.5px var(--sans,sans-serif)">Same matrix, both ends -- a token's embedding vector =</text>
  <text x="400" y="52" text-anchor="middle" style="font:700 12.5px var(--sans,sans-serif)">the direction the logit head votes for that token.</text>
</g>

<g data-anim="2">
  <text x="400" y="82" text-anchor="middle" class="lbl">W_E   shape [V, d]</text>
  <rect x="350" y="90" width="100" height="432" rx="4" fill="none" class="v-stroke" stroke-width="1.3"/>
  <g class="v-grid" stroke="currentColor" stroke-width="1" opacity="0.7">
    <line x1="350" y1="117" x2="450" y2="117"/>
    <line x1="350" y1="144" x2="450" y2="144"/>
    <line x1="350" y1="171" x2="450" y2="171"/>
    <line x1="350" y1="198" x2="450" y2="198"/>
    <line x1="350" y1="225" x2="450" y2="225"/>
    <line x1="350" y1="252" x2="450" y2="252"/>
    <line x1="350" y1="306" x2="450" y2="306"/>
    <line x1="350" y1="333" x2="450" y2="333"/>
    <line x1="350" y1="360" x2="450" y2="360"/>
    <line x1="350" y1="387" x2="450" y2="387"/>
    <line x1="350" y1="414" x2="450" y2="414"/>
    <line x1="350" y1="441" x2="450" y2="441"/>
    <line x1="350" y1="468" x2="450" y2="468"/>
    <line x1="350" y1="495" x2="450" y2="495"/>
  </g>
  <rect x="350" y="279" width="100" height="27" class="v-accent" fill="currentColor" opacity="0.88"/>
  <text x="400" y="296.5" text-anchor="middle" style="font:700 10.5px var(--mono,monospace)" fill="var(--surface,#fff)">row i = cat</text>
</g>

<g data-anim="3">
  <rect x="40" y="264" width="112" height="36" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="96" y="287" text-anchor="middle" class="lbl">id = i</text>

  <line x1="152" y1="278" x2="345" y2="286" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#wt-arr-acc)"/>
  <text x="248" y="264" text-anchor="middle" class="sm">index-select</text>
  <text x="248" y="276" text-anchor="middle" class="sm">(row copy), O(d)</text>

  <line x1="345" y1="303" x2="152" y2="331" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#wt-arr-acc)"/>

  <rect x="40" y="335" width="112" height="36" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="96" y="358" text-anchor="middle" class="lbl v-accent" fill="var(--accent)">e_i</text>

  <text x="96" y="386" text-anchor="middle" class="note">input embedding --</text>
  <text x="96" y="399" text-anchor="middle" class="note">enters residual stream</text>

  <text x="96" y="440" text-anchor="middle" class="note">e_i flows through the</text>
  <text x="96" y="453" text-anchor="middle" class="note">L Transformer blocks,</text>
  <text x="96" y="466" text-anchor="middle" class="note">accumulating into h</text>
  <text x="96" y="479" text-anchor="middle" class="note">(see residual-stream</text>
  <text x="96" y="492" text-anchor="middle" class="note">figure elsewhere).</text>
</g>

<g data-anim="4">
  <rect x="604" y="90" width="150" height="54" rx="8" class="v-fill v-stroke" stroke-width="1" opacity="0.4"/>
  <rect x="608" y="94" width="150" height="54" rx="8" class="v-fill v-stroke" stroke-width="1" opacity="0.65"/>
  <rect x="612" y="98" width="150" height="54" rx="8" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="687" y="119" text-anchor="middle" class="lbl">L Transformer</text>
  <text x="687" y="134" text-anchor="middle" class="lbl">blocks</text>

  <line x1="687" y1="152" x2="687" y2="180" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#wt-arr)"/>

  <rect x="617" y="182" width="140" height="34" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="687" y="204" text-anchor="middle" class="lbl">h  (final hidden state)</text>

  <line x1="617" y1="199" x2="452" y2="286" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#wt-arr-acc)"/>
  <text x="536" y="228" text-anchor="middle" class="sm">dot against every row,</text>
  <text x="536" y="240" text-anchor="middle" class="sm">O(V*d) dense matmul</text>

  <path d="M452 303 L560 303 L677 380" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#wt-arr-acc)"/>

  <line x1="452" y1="296" x2="602" y2="358" fill="none" class="v-muted" stroke="currentColor" stroke-width="1.1" stroke-dasharray="3 3"/>
  <circle cx="452" cy="296" r="2.6" class="v-muted" fill="currentColor"/>
  <text x="683" y="350" text-anchor="middle" class="sm">logit_i = h . row_i</text>
  <text x="683" y="363" text-anchor="middle" class="sm">(the SAME row i)</text>

  <line x1="560" y1="520" x2="775" y2="520" class="v-grid" stroke="currentColor" stroke-width="1"/>
  <g class="v-fill v-stroke" stroke-width="1">
    <rect x="565" y="490" width="12" height="30"/>
    <rect x="581" y="475" width="12" height="45"/>
    <rect x="597" y="495" width="12" height="25"/>
    <rect x="613" y="460" width="12" height="60"/>
    <rect x="629" y="485" width="12" height="35"/>
    <rect x="645" y="470" width="12" height="50"/>
    <rect x="661" y="500" width="12" height="20"/>
  </g>
  <rect x="677" y="380" width="12" height="140" class="v-accent" fill="currentColor" opacity="0.9"/>
  <g class="v-fill v-stroke" stroke-width="1">
    <rect x="693" y="465" width="12" height="55"/>
    <rect x="709" y="480" width="12" height="40"/>
    <rect x="725" y="455" width="12" height="65"/>
    <rect x="741" y="490" width="12" height="30"/>
    <rect x="757" y="475" width="12" height="45"/>
  </g>
  <text x="667" y="536" text-anchor="middle" class="sm">logits  [V]</text>
</g>

<g data-anim="5">
  <text x="400" y="608" text-anchor="middle" class="note">halves vocab params (saves V x d); couples input and output token geometry;</text>
  <text x="400" y="622" text-anchor="middle" class="note">typically improves perplexity.</text>
</g>

</svg>
<figcaption><b>Weight tying: one matrix W_E answers both "what does this token mean coming in?" and "what token am I predicting going out?"</b> The input lookup does a cheap O(d) row-copy of row i; the output projection does a dense O(V*d) matmul of the final hidden state h against every row, and the logit for token i is exactly h dotted with that same row. Because the row is shared, a token's embedding direction literally is the direction the model votes for that token.</figcaption>
</figure>
