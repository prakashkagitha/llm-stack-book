<figcaption><b>In ring attention, each of N=4 GPUs holds a fixed query chunk Q_i and a running online-softmax accumulator (O_i, m_i, l_i) that never moves; only the key/value chunks travel, hopping one GPU per round while the next hop's transfer overlaps the current round's compute.</b> Because the merge of a new KV block into the accumulator is associative, the final result after N rounds is bit-for-bit the same as ordinary full attention. Causal masking lets each GPU skip KV chunks that lie entirely in the future of its queries, which is exact and free -- but it also concentrates work on the GPUs holding the latest chunks (rank 0 computes 1 block, rank 3 computes all 4), the load imbalance that zigzag/striped ring variants address by interleaving chunk assignment.</figcaption>
</figure>
