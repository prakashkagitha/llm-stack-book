<figure class="viz" id="fig-moe-serving-alltoall-overlap-timeline">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 460" role="img" aria-label="Two Gantt timelines for one MoE decode layer on a shared time axis. Top: serialized naive all-to-all, where the single compute lane goes idle (hatched) during dispatch and combine, giving a long total wall-clock. Bottom: DeepEP low-latency hook overlap, where a second NIC/RDMA lane carries dispatch and combine while the compute lane stays busy running the shared-expert FFN and next micro-batch attention, finishing at the same point the naive version's compute lane just starts its idle combine wait -- a much shorter total wall-clock.">

    #fig-moe-serving-alltoall-overlap-timeline.in-view [data-anim="1"] { animation: msdt-in 0.4s ease-out 0.1s forwards; }
    #fig-moe-serving-alltoall-overlap-timeline.in-view [data-anim="2"] { animation: msdt-in 0.4s ease-out 0.6s forwards; }
    #fig-moe-serving-alltoall-overlap-timeline.in-view [data-anim="3"] { animation: msdt-in 0.4s ease-out 1.2s forwards; }

    #fig-moe-serving-alltoall-overlap-timeline.in-view .msdt-playhead {
      animation: msdt-play 6s linear 0.4s infinite;
    }
    #fig-moe-serving-alltoall-overlap-timeline .msdt-pkt-a { transform-box: fill-box; opacity:0; }
    #fig-moe-serving-alltoall-overlap-timeline.in-view .msdt-pkt-a { animation: msdt-pkt-a 6s linear 0.4s infinite; }
    #fig-moe-serving-alltoall-overlap-timeline .msdt-pkt-b { transform-box: fill-box; opacity:0; }
    #fig-moe-serving-alltoall-overlap-timeline.in-view .msdt-pkt-b { animation: msdt-pkt-b 6s linear 0.4s infinite; }
    #fig-moe-serving-alltoall-overlap-timeline .msdt-hook { transform-box: fill-box; transform-origin: center; }
    #fig-moe-serving-alltoall-overlap-timeline.in-view .msdt-hook { animation: msdt-hook 6s linear 0.4s infinite; }

    @keyframes msdt-play {
      0%   { transform: translateX(0px);    opacity: 1; }
      92%  { transform: translateX(490px);  opacity: 1; }
      95%  { transform: translateX(490px);  opacity: 0; }
      100% { transform: translateX(0px);    opacity: 0; }
    }
    @keyframes msdt-pkt-a {
      0%, 10%  { opacity: 0; transform: translateX(0px); }
      12%      { opacity: 1; transform: translateX(0px); }
      34%      { opacity: 1; transform: translateX(120px); }
      36%,100% { opacity: 0; transform: translateX(120px); }
    }
    @keyframes msdt-pkt-b {
      0%, 66%  { opacity: 0; transform: translateX(0px); }

    @keyframes msdt-hook {

      34%       { transform: scale(1.6); opacity: 1; }
      38%,100%  { transform: scale(1);   opacity: 0.55; }

    @media (prefers-reduced-motion: reduce) {
      #fig-moe-serving-alltoall-overlap-timeline .msdt-playhead { display: none; }
      #fig-moe-serving-alltoall-overlap-timeline .msdt-pkt-a,
      #fig-moe-serving-alltoall-overlap-timeline .msdt-pkt-b { opacity: 0.9 !important; animation: none !important; }
      #fig-moe-serving-alltoall-overlap-timeline .msdt-hook { animation: none !important; opacity: 0.85 !important; }
    }
  </style>

<figcaption><b>Serializing the all-to-all exposes it as GPU idle time; DeepEP's hook-based overlap hides it behind useful compute.</b> Top: with a naive <code>all_to_all</code>, the single compute lane sits idle (hatched) through both dispatch and combine, so the exposed all-to-all is fully on the critical path. Bottom: DeepEP's low-latency kernel kicks off dispatch on the NIC while the SM lane runs the shared-expert FFN and the next micro-batch's attention, only calling <code>hook()</code> once the tokens have actually arrived; combine then overlaps the same way behind the expert GEMM. Same total work, but the dashed guideline shows the overlapped version already finished at the exact instant the naive version is only just starting its exposed combine all-to-all.</figcaption>
</figure>
