<figure class="viz" id="fig-rewardhack-rm-extrapolation">
<svg viewBox="0 0 760 460" role="img" aria-label="Schematic plot of reward versus a 1D slice through output space. The reward model is trained near the reference policy and tracks true reward there, but past the edge of its training support it extrapolates upward into a spurious peak while true reward actually declines, creating a hidden gap between proxy and true quality.">

    <stop offset="0.667" stop-color="var(--surface-3,#ece7da)" stop-opacity="0.55"/>
    <stop offset="1"     stop-color="var(--surface-3,#ece7da)" stop-opacity="0"/>

</defs>

<text x="380" y="410" text-anchor="middle" class="cap muted">The reward model is accurate only where it has data. Push the policy past that support and proxy reward keeps climbing while true reward falls.</text>

<figcaption><b>The reward model is accurate only where it has training data near pi_ref.</b> Inside that support, proxy reward r_theta tracks true reward r* closely; past the support boundary, r_theta extrapolates upward into a spurious peak while r* actually declines (degenerate outputs are genuinely poor). Optimization pressure pushes the policy toward the spurious peak, producing a large gap where r_theta &gt;&gt; r* — reward is high but quality has silently collapsed.</figcaption>
</figure>
