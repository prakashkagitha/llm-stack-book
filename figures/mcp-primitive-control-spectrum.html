<figure class="viz" id="fig-mcp-primitive-control-spectrum">
<button class="viz-replay" type="button">/replay</button>
<style>
  #fig-mcp-primitive-control-spectrum text{ fill:var(--ink-soft); }
  #fig-mcp-primitive-control-spectrum .axis-lbl{ font:700 11px var(--sans,sans-serif); fill:var(--muted); }
  #fig-mcp-primitive-control-spectrum .who{ font:500 9.5px var(--sans,sans-serif); }
  #fig-mcp-primitive-control-spectrum .name{ font:700 15px var(--sans,sans-serif); }
  #fig-mcp-primitive-control-spectrum .what{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
  #fig-mcp-primitive-control-spectrum .ex{ font:500 9px var(--mono,monospace); fill:var(--ink-soft); }
  #fig-mcp-primitive-control-spectrum .risk-lbl{ font:700 10px var(--sans,sans-serif); }
  #fig-mcp-primitive-control-spectrum .risk-note{ font:500 9px var(--sans,sans-serif); }
</style>
<svg viewBox="0 0 760 430" role="img" aria-label="A spectrum from Tools to Resources to Prompts: tools are model-controlled and execute code with the highest risk, resources are application-controlled read-only content, and prompts are user-controlled templates with no code execution, so moving from tools to prompts shifts control from the model to the user and drops risk to zero.">

<g data-anim="1">
  <text x="380" y="26" text-anchor="middle" class="axis-lbl">who controls invocation</text>

  <line x1="40" y1="40" x2="720" y2="40" class="v-grid" stroke="currentColor" stroke-width="1.2"/>
  <circle cx="130" cy="40" r="4" class="v-accent" fill="var(--accent)"/>
  <circle cx="380" cy="40" r="4" class="v-muted" fill="currentColor"/>
  <circle cx="630" cy="40" r="4" class="v-muted" fill="currentColor"/>

  <text x="130" y="58" text-anchor="middle" class="who">Model-controlled</text>
  <text x="130" y="70" text-anchor="middle" class="who">(LLM decides when and</text>
  <text x="130" y="82" text-anchor="middle" class="who">with what args)</text>

  <text x="380" y="58" text-anchor="middle" class="who">Application-controlled</text>
  <text x="380" y="70" text-anchor="middle" class="who">(host decides what</text>
  <text x="380" y="82" text-anchor="middle" class="who">to surface)</text>

  <text x="630" y="58" text-anchor="middle" class="who">User-controlled</text>
  <text x="630" y="70" text-anchor="middle" class="who">(user picks it, often</text>
  <text x="630" y="82" text-anchor="middle" class="who">via a / command)</text>
</g>


<g data-anim="2">

  <rect x="40" y="100" width="180" height="150" rx="12" fill="var(--warn)" fill-opacity="0.1" stroke="var(--warn)" stroke-width="1.8"/>
  <text x="130" y="126" text-anchor="middle" class="name" fill="var(--warn)">TOOLS</text>
  <text x="130" y="146" text-anchor="middle" class="what">callable action,</text>
  <text x="130" y="158" text-anchor="middle" class="what">returns a result</text>
  <line x1="60" y1="172" x2="200" y2="172" class="v-grid" stroke="currentColor" stroke-width="1"/>
  <text x="130" y="192" text-anchor="middle" class="ex">run_shell_command</text>
  <text x="130" y="208" text-anchor="middle" class="ex">query_database</text>


  <rect x="290" y="100" width="180" height="150" rx="12" class="v-fill v-stroke" stroke-width="1.5" fill-opacity="0.5"/>
  <text x="380" y="126" text-anchor="middle" class="name">RESOURCES</text>
  <text x="380" y="146" text-anchor="middle" class="what">addressable readable</text>
  <text x="380" y="158" text-anchor="middle" class="what">content (URI)</text>
  <line x1="310" y1="172" x2="450" y2="172" class="v-grid" stroke="currentColor" stroke-width="1"/>
  <text x="380" y="192" text-anchor="middle" class="ex">file:///.../main.py</text>
  <text x="380" y="208" text-anchor="middle" class="ex">postgres://db/orders</text>


  <rect x="540" y="100" width="180" height="150" rx="12" class="v-fill v-stroke" stroke-width="1.5" fill-opacity="0.5"/>
  <text x="630" y="126" text-anchor="middle" class="name">PROMPTS</text>
  <text x="630" y="146" text-anchor="middle" class="what">parameterised interaction</text>
  <text x="630" y="158" text-anchor="middle" class="what">template the user injects</text>
  <line x1="560" y1="172" x2="700" y2="172" class="v-grid" stroke="currentColor" stroke-width="1"/>
  <text x="630" y="192" text-anchor="middle" class="ex">/summarise_pr</text>
  <text x="630" y="208" text-anchor="middle" class="ex">/explain_query</text>
</g>


<g data-anim="3">
  <text x="40" y="284" class="axis-lbl">executes code? / risk</text>

  <defs>
    <linearGradient id="mpcs-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="var(--warn)" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="var(--warn)" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="var(--muted)" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <rect x="40" y="298" width="680" height="22" rx="11" fill="url(#mpcs-grad)" class="v-stroke" stroke-width="1"/>

  <text x="130" y="345" text-anchor="middle" class="risk-lbl" fill="var(--warn)">YES</text>
  <text x="130" y="360" text-anchor="middle" class="risk-note">runs actions --</text>
  <text x="130" y="372" text-anchor="middle" class="risk-note">highest-risk primitive</text>

  <text x="380" y="345" text-anchor="middle" class="risk-lbl">NO</text>
  <text x="380" y="360" text-anchor="middle" class="risk-note">read-only content,</text>
  <text x="380" y="372" text-anchor="middle" class="risk-note">no execution</text>

  <text x="630" y="345" text-anchor="middle" class="risk-lbl">NO</text>
  <text x="630" y="360" text-anchor="middle" class="risk-note">template only,</text>
  <text x="630" y="372" text-anchor="middle" class="risk-note">no execution</text>
</g>

<g data-anim="4">
  <line x1="130" y1="390" x2="630" y2="390" class="v-muted" stroke="currentColor" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="380" y="410" text-anchor="middle" class="risk-note">moving Tools -&gt; Prompts shifts control from model to user, and risk falls to zero</text>
</g>

</svg>
<figcaption><b>The three primitives trade autonomy for safety as you move along the spectrum.</b> Tools are model-controlled and the only primitive that executes code, so they carry the highest risk; resources and prompts are read-only, controlled by the application and the user respectively, with no code-execution risk at all.</figcaption>
</figure>
