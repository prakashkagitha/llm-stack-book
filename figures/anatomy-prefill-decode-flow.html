<figure class="viz" id="fig-anatomy-prefill-decode-flow">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 920 300" role="img" aria-label="Prefill vs. Decode: one big parallel forward pass over S tokens emits the first token tS+1, which then feeds a strictly sequential decode loop that emits tS+2, tS+3, tS+4 one token at a time.">
<defs>
  <marker id="pd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#6b7280)"/>
  </marker>
  <marker id="pd-arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#0891b2)"/>
  </marker>
</defs>

<style>
  #fig-anatomy-prefill-decode-flow text { fill: var(--ink-soft,#374151); font-family: var(--sans,sans-serif); }
  #fig-anatomy-prefill-decode-flow .hdr  { font: 700 13px var(--sans,sans-serif); }
  #fig-anatomy-prefill-decode-flow .sub  { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-anatomy-prefill-decode-flow .cap  { font: 400 9px var(--sans,sans-serif); }
  #fig-anatomy-prefill-decode-flow .chip { font: 600 9px var(--mono,monospace); fill: var(--ink-soft,#374151); }
  #fig-anatomy-prefill-decode-flow .elbl { font: 400 8px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-anatomy-prefill-decode-flow .sinr { font: 400 8.5px var(--mono,monospace); fill: var(--ink-soft,#374151); }
</style>


<line x1="400" y1="8" x2="400" y2="270"
      stroke="var(--border-2,#d1d5db)" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.6"/>
<text x="404" y="18" style="font:400 8px var(--sans,sans-serif);fill:var(--muted,#9ca3af)">phase boundary</text>


<g data-anim="1">
  <text x="200" y="16" text-anchor="middle" class="hdr" fill="var(--accent,#4f46e5)">PREFILL</text>
  <text x="200" y="32" text-anchor="middle" class="sub">(prompt / context encoding)</text>
</g>
<g data-anim="1">
  <text x="658" y="16" text-anchor="middle" class="hdr" fill="var(--accent-2,#0891b2)">DECODE  (repeated T times)</text>
  <text x="658" y="32" text-anchor="middle" class="sub">(generation / extension)</text>
</g>


<text x="475" y="48" text-anchor="middle"
      style="font:400 8px var(--sans,sans-serif);fill:var(--muted,#9ca3af)" data-anim="4">step 1</text>
<text x="610" y="48" text-anchor="middle"
      style="font:400 8px var(--sans,sans-serif);fill:var(--muted,#9ca3af)" data-anim="5">step 2</text>
<text x="745" y="48" text-anchor="middle"
      style="font:400 8px var(--sans,sans-serif);fill:var(--muted,#9ca3af)" data-anim="6">step 3</text>


<g data-anim="2">
  <rect x="40" y="54" width="320" height="86" rx="8"
        fill="var(--surface,#f9fafb)" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <rect x="55"  y="70" width="34" height="22" rx="4" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="72"  y="86" text-anchor="middle" class="chip">t1</text>
  <rect x="97"  y="70" width="34" height="22" rx="4" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="114" y="86" text-anchor="middle" class="chip">t2</text>
  <rect x="139" y="70" width="34" height="22" rx="4" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="156" y="86" text-anchor="middle" class="chip">t3</text>
  <text x="197" y="86" text-anchor="middle" class="chip" fill="var(--muted,#9ca3af)">...</text>
  <rect x="215" y="70" width="34" height="22" rx="4" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="232" y="86" text-anchor="middle" class="chip">tS</text>
  <text x="200" y="120" text-anchor="middle"
        style="font:500 8.5px var(--sans,sans-serif);fill:var(--muted,#9ca3af)">S tokens seen AT ONCE</text>
</g>


<g data-anim="2">
  <text x="200" y="158" text-anchor="middle" class="cap" fill="var(--accent,#4f46e5)">one big parallel masked matmul over S tokens</text>
  <text x="200" y="169" text-anchor="middle" class="cap" fill="var(--accent,#4f46e5)">(compute-bound)</text>
</g>





<g data-anim="5">
  <line x1="533" y1="84" x2="551" y2="84"
        stroke="var(--accent-2,#0891b2)" stroke-width="1.4"
        marker-end="url(#pd-arrow-teal)"/>
</g>

<g data-anim="6">
  <line x1="668" y1="84" x2="686" y2="84"
        stroke="var(--accent-2,#0891b2)" stroke-width="1.4"
        marker-end="url(#pd-arrow-teal)"/>
</g>


<g data-anim="4">
  <rect x="416" y="50" width="116" height="68" rx="7"
        fill="var(--surface,#f9fafb)" stroke="var(--accent-2,#0891b2)" stroke-width="1.5"/>
  <rect x="434" y="60" width="42" height="18" rx="3" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="455" y="73" text-anchor="middle" class="sinr">tS+1</text>
  <line x1="455" y1="79" x2="455" y2="94" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2" marker-end="url(#pd-arrow)"/>
  <rect x="434" y="95" width="42" height="18" rx="3" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="455" y="108" text-anchor="middle" class="sinr">tS+2</text>
</g>


<g data-anim="5">
  <rect x="551" y="50" width="116" height="68" rx="7"
        fill="var(--surface,#f9fafb)" stroke="var(--accent-2,#0891b2)" stroke-width="1.5"/>
  <rect x="569" y="60" width="42" height="18" rx="3" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="590" y="73" text-anchor="middle" class="sinr">tS+2</text>
  <line x1="590" y1="79" x2="590" y2="94" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2" marker-end="url(#pd-arrow)"/>
  <rect x="569" y="95" width="42" height="18" rx="3" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="590" y="108" text-anchor="middle" class="sinr">tS+3</text>
</g>


<g data-anim="6">
  <rect x="686" y="50" width="116" height="68" rx="7"
        fill="var(--surface,#f9fafb)" stroke="var(--accent-2,#0891b2)" stroke-width="1.5"/>
  <rect x="704" y="60" width="42" height="18" rx="3" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="725" y="73" text-anchor="middle" class="sinr">tS+3</text>
  <line x1="725" y1="79" x2="725" y2="94" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2" marker-end="url(#pd-arrow)"/>
  <rect x="704" y="95" width="42" height="18" rx="3" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="725" y="108" text-anchor="middle" class="sinr">tS+4</text>
</g>


<g data-anim="6">
  <text x="814" y="88" text-anchor="middle"
        style="font:700 14px var(--sans,sans-serif);fill:var(--muted,#9ca3af)">...</text>
</g>


<g data-anim="5">
  <text x="544" y="130" text-anchor="middle" class="elbl" fill="var(--accent-2,#0891b2)">append + feed next</text>
</g>


<g data-anim="4">
  <text x="608" y="146" text-anchor="middle" class="cap" fill="var(--accent-2,#0891b2)">each step: 1 token in, streams full weights from HBM</text>
  <text x="608" y="157" text-anchor="middle" class="cap" fill="var(--accent-2,#0891b2)">(memory-bound)</text>
</g>


<g data-anim="3">
  <line x1="110" y1="190" x2="110" y2="208"
        stroke="var(--ink-soft,#6b7280)" stroke-width="1.4"
        marker-end="url(#pd-arrow)"/>
  <text x="138" y="200" class="elbl" text-anchor="start">first output token</text>
  <rect x="86" y="209" width="48" height="22" rx="5"
        fill="var(--surface-3,#f3f4f6)" stroke="var(--accent,#4f46e5)" stroke-width="2"/>
  <text x="110" y="225" text-anchor="middle" class="chip">tS+1</text>
</g>


<g data-anim="3">
  <line x1="134" y1="220" x2="414" y2="220"
        stroke="var(--accent-2,#0891b2)" stroke-width="1.4"
        marker-end="url(#pd-arrow-teal)"/>
  <text x="274" y="215" text-anchor="middle" class="elbl">feeds into decode</text>
</g>


<g data-anim="4">
  <rect x="416" y="209" width="452" height="26" rx="5"
        fill="none" stroke="var(--border-2,#d1d5db)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="642" y="220" text-anchor="middle"
        style="font:400 8.5px var(--sans,sans-serif);fill:var(--muted,#9ca3af)">each step depends on previous output — cannot be parallelized</text>
  <text x="642" y="230" text-anchor="middle"
        style="font:400 8.5px var(--sans,sans-serif);fill:var(--muted,#9ca3af)">(sequential dependency chain)</text>
</g>


<g data-anim="1">
  <rect x="40" y="256" width="320" height="22" rx="5"
        fill="var(--surface,#f9fafb)" stroke="var(--accent,#4f46e5)" stroke-width="1"/>
  <text x="200" y="272" text-anchor="middle"
        style="font:500 9px var(--sans,sans-serif);fill:var(--accent,#4f46e5)">wide single box = parallelism over S tokens</text>
</g>
<g data-anim="4">
  <rect x="416" y="256" width="452" height="22" rx="5"
        fill="var(--surface,#f9fafb)" stroke="var(--accent-2,#0891b2)" stroke-width="1"/>
  <text x="642" y="272" text-anchor="middle"
        style="font:500 9px var(--sans,sans-serif);fill:var(--accent-2,#0891b2)">chain of narrow boxes = sequential, one token each</text>
</g>

<style>
@media (prefers-reduced-motion: reduce) {
  #fig-anatomy-prefill-decode-flow [data-anim] { opacity: 1 !important; animation: none !important; }
}
</style>
</svg>
<figcaption><b>Prefill processes all S prompt tokens simultaneously (compute-bound); decode emits one token per step in a strictly sequential chain (memory-bound).</b> The bridge token tS+1 is simultaneously the output of prefill and the first input to decode. Because each decode step depends on the previous output, the loop cannot be parallelized — the full weights must be streamed from HBM once per token, making memory bandwidth the binding constraint.</figcaption>
</figure>
