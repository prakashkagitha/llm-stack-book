<figure class="viz" id="fig-emergent-mirage-metric">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 430" role="img" aria-label="Two panel figure sharing one underlying quantity: per-token correctness p improving smoothly with model scale. Left panel: per-token accuracy p versus model scale on a log axis, a smooth gently rising curve with no kinks. Right panel: exact-match accuracy p to the k versus the same scale axis, showing a k equals 1 curve that tracks the smooth curve, and a k equals 30 curve that hugs zero then rises steeply near the high end, a cliff annotated as looking like a sudden emergent ability. A connective annotation reads same model, same smooth p, only the ruler changed, with the formula exact-match approximately (1 minus p_err) to the k where k is the number of tokens that must all be correct.">
<style>
  #fig-emergent-mirage-metric text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-emergent-mirage-metric .v-fill { fill: var(--surface-3,#ece7da); }
  #fig-emergent-mirage-metric .hdr { font: 700 13px var(--sans,sans-serif); }
  #fig-emergent-mirage-metric .sub { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-emergent-mirage-metric .mono { font: 400 11px var(--mono,monospace); }
  #fig-emergent-mirage-metric .axis-lbl { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-emergent-mirage-metric .panel-title { font: 700 12.5px var(--sans,sans-serif); }
  #fig-emergent-mirage-metric .cliff-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
  #fig-emergent-mirage-metric .connect { font: 600 12px var(--sans,sans-serif); }
  #fig-emergent-mirage-metric .k-lbl { font: 700 10.5px var(--sans,sans-serif); }
</style>

<line x1="390" y1="86" x2="390" y2="404" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 4"/>

<g data-anim="1">
  <text x="390" y="24" text-anchor="middle" class="hdr">One underlying quantity: per-token correctness p improves SMOOTHLY with scale (a gentle power law)</text>
</g>

<g data-anim="2">
  <text x="20" y="58" class="panel-title">Smooth metric: per-token accuracy</text>

  <line x1="60" y1="330" x2="60" y2="90" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <line x1="60" y1="330" x2="360" y2="330" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <text x="34" y="210" text-anchor="middle" class="axis-lbl" transform="rotate(-90 34 210)">per-token accuracy p (0..1)</text>
  <text x="210" y="352" text-anchor="middle" class="axis-lbl">model scale N (log)</text>

  <line x1="60" y1="210" x2="360" y2="210" stroke="var(--v-grid,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="54" y="214" text-anchor="end" class="axis-lbl">0.5</text>
  <line x1="60" y1="90" x2="360" y2="90" stroke="var(--v-grid,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="54" y="94" text-anchor="end" class="axis-lbl">1.0</text>
  <text x="54" y="334" text-anchor="end" class="axis-lbl">0</text>

  <path d="M65 300 C 130 280, 200 200, 280 130 C 310 112, 335 100, 355 93"
        fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.6"
        class="viz-draw" style="--len:420"/>
  <text x="200" y="150" text-anchor="middle" class="cliff-lbl" fill="var(--accent,#c15b39)">smooth, gentle rise -- no kinks</text>
</g>

<g data-anim="3">
  <text x="410" y="58" class="panel-title">All-or-nothing metric: exact match = p^k</text>

  <line x1="450" y1="330" x2="450" y2="90" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <line x1="450" y1="330" x2="750" y2="330" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <text x="424" y="210" text-anchor="middle" class="axis-lbl" transform="rotate(-90 424 210)">exact-match accuracy (all k right)</text>
  <text x="600" y="352" text-anchor="middle" class="axis-lbl">model scale N (log)</text>

  <line x1="450" y1="210" x2="750" y2="210" stroke="var(--v-grid,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="444" y="214" text-anchor="end" class="axis-lbl">0.5</text>
  <line x1="450" y1="90" x2="750" y2="90" stroke="var(--v-grid,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="444" y="94" text-anchor="end" class="axis-lbl">1.0</text>
  <text x="444" y="334" text-anchor="end" class="axis-lbl">0</text>

  
  <path d="M455 300 C 520 280, 590 200, 670 130 C 700 112, 725 100, 745 93"
        fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6" opacity="0.55"
        stroke-dasharray="5 4" class="viz-draw" style="--len:420"/>
  <text x="470" y="278" class="k-lbl" fill="var(--accent,#c15b39)" opacity="0.85">k=1 (tracks left curve)</text>

  
  <path d="M455 328 C 560 327, 640 325, 680 300 C 705 280, 715 200, 730 140 C 736 118, 740 100, 745 92"
        fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.8"
        class="viz-draw" style="--len:520"/>
  <text x="668" y="314" text-anchor="end" class="k-lbl" fill="var(--accent2,#3b82f6)">k=30 (the cliff)</text>
</g>

<g data-anim="4">
  <rect x="620" y="150" width="128" height="34" rx="6" fill="var(--accent2,#3b82f6)" opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <text x="684" y="164" text-anchor="middle" class="cliff-lbl">looks like a sudden</text>
  <text x="684" y="178" text-anchor="middle" class="cliff-lbl">emergent ability</text>
  <line x1="700" y1="150" x2="712" y2="128" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
</g>

<g data-anim="5">
  <text x="390" y="378" text-anchor="middle" class="connect">same model, same smooth p -- only the ruler changed</text>

  <rect x="150" y="390" width="480" height="34" rx="7" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="390" y="404" text-anchor="middle" class="mono">exact-match ~ (1 - p_err)^k</text>
  <text x="390" y="418" text-anchor="middle" class="sub">k = number of tokens that must ALL be correct</text>
</g>

</svg>
<figcaption><b>The same smoothly-improving model looks "emergent" or not depending only on the metric.</b> Per-token accuracy p rises gently and continuously with scale (left); but exact-match on a k-token task is p^k, which stays near zero across most of the range and then rises steeply once p crosses a threshold (right, k=30) -- the cliff is a property of the all-or-nothing ruler, not a discontinuity in the underlying model.</figcaption>
</figure>
