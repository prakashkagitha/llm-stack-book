    <text x="400" y="563" text-anchor="middle" class="strip-l2">-&gt; The two phases want opposite hardware, and interfere when mixed on the same GPU.</text>

<figcaption><b>The same weight bytes get streamed from HBM in both phases &#8212; what differs is how many token-rows are pushed through them.</b> Prefill spreads one weight read across T_p prompt tokens (a fat matrix-by-matrix GEMM), so it is compute-bound; decode spreads that identical weight read across a single token (a thin vector-by-matrix GEMV), so it is memory-bandwidth-bound. Because the two phases want opposite hardware, mixing them on one GPU pool makes each one worse at the other's job &#8212; the motivation for disaggregation.</figcaption>
</figure>
