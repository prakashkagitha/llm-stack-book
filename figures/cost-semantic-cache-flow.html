<figure class="viz" id="fig-cost-semantic-cache-flow">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 980 360" role="img" aria-label="Semantic cache lookup flow: a user query is embedded, an ANN search finds the nearest cached entry, a similarity threshold decides cache hit or miss; on hit the cached response is returned immediately; on miss the LLM is called and the new embedding-response pair is stored back into the index.">
<defs>
  <marker id="scf-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 z" class="v-muted" fill="currentColor"/>
  </marker>
  <marker id="scf-arr-hit" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="scf-arr-miss" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <marker id="scf-arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 z" class="v-stroke" fill="currentColor" opacity="0.6"/>
  </marker>
</defs>

<style>
  #fig-cost-semantic-cache-flow text { font: 500 12px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-cost-semantic-cache-flow .lbl { font: 600 12px var(--sans,sans-serif); }
  #fig-cost-semantic-cache-flow .sub { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-cost-semantic-cache-flow .ann { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-cost-semantic-cache-flow .edge-lbl { font: 600 10px var(--sans,sans-serif); }
  #fig-cost-semantic-cache-flow .hit-lbl { fill: var(--good,#2f9e6e); }
  #fig-cost-semantic-cache-flow .miss-lbl { fill: var(--warn,#e0a106); }
  @media (prefers-reduced-motion: reduce) {
    #scf-anim-token, #scf-anim-token2 { display: none; }
  }
</style>


<g data-anim="1">
  <rect x="14" y="30" width="120" height="60" rx="10" class="v-fill v-accent-s" stroke-width="1.5"/>
  <text x="74" y="57" text-anchor="middle" class="lbl">User query</text>
</g>


<line x1="134" y1="60" x2="172" y2="60" class="v-stroke" stroke="currentColor" stroke-width="1.5" marker-end="url(#scf-arr)"/>


<g data-anim="2">
  <rect x="174" y="26" width="130" height="68" rx="4" class="v-fill v-accent-s" stroke-width="1.5"/>
  <text x="239" y="52" text-anchor="middle" class="lbl">embed()</text>
  <text x="239" y="66" text-anchor="middle" class="sub">~1-5 ms</text>
  <text x="239" y="78" text-anchor="middle" class="sub">(local 22M ST model)</text>
</g>


<line x1="304" y1="60" x2="342" y2="60" class="v-stroke" stroke="currentColor" stroke-width="1.5" marker-end="url(#scf-arr)"/>


<g data-anim="3">
  <rect x="344" y="26" width="130" height="68" rx="4" class="v-fill v-accent-s" stroke-width="1.5"/>
  <text x="409" y="52" text-anchor="middle" class="lbl">ANN search</text>
  <text x="409" y="66" text-anchor="middle" class="sub">FAISS / Qdrant</text>
  <text x="409" y="78" text-anchor="middle" class="sub">~1-10 ms</text>
</g>


<line x1="474" y1="60" x2="508" y2="72" class="v-stroke" stroke="currentColor" stroke-width="1.5" marker-end="url(#scf-arr)"/>


<g data-anim="4">
  <polygon points="580,30 650,80 580,130 510,80" class="v-fill" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <text x="580" y="74" text-anchor="middle" class="lbl" font-size="11">cos sim</text>
  <text x="580" y="90" text-anchor="middle" class="lbl" font-size="11">s &gt;= tau?</text>
  <text x="580" y="148" text-anchor="middle" class="ann">tau approx 0.92-0.95; s = q-hat . c-hat</text>
</g>


<line x1="650" y1="80" x2="788" y2="52" stroke="var(--good,#2f9e6e)" stroke-width="1.8" marker-end="url(#scf-arr-hit)" fill="none"/>
<text x="718" y="48" text-anchor="middle" class="edge-lbl hit-lbl">yes (hit)</text>


<g data-anim="5">
  <rect x="790" y="22" width="178" height="60" rx="10" stroke="var(--good,#2f9e6e)" stroke-width="2" class="v-fill"/>
  <text x="879" y="47" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">Return cached</text>
  <text x="879" y="63" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">response</text>
  <text x="879" y="97" text-anchor="middle" class="ann">fast path: ~2-15 ms total</text>
</g>


<line x1="580" y1="130" x2="580" y2="198" stroke="var(--warn,#e0a106)" stroke-width="1.8" marker-end="url(#scf-arr-miss)" fill="none"/>
<text x="600" y="170" class="edge-lbl miss-lbl">no (miss)</text>


<g data-anim="5">
  <rect x="512" y="200" width="136" height="60" rx="4" class="v-fill v-accent-s" stroke-width="1.5"/>
  <text x="580" y="226" text-anchor="middle" class="lbl">Call LLM</text>
  <text x="580" y="243" text-anchor="middle" class="sub">500 ms - 5 s (~100x slower)</text>
</g>


<line x1="648" y1="230" x2="688" y2="230" class="v-stroke" stroke="currentColor" stroke-width="1.5" marker-end="url(#scf-arr)"/>


<g data-anim="5">
  <rect x="690" y="200" width="210" height="60" rx="10" class="v-fill v-accent-s" stroke-width="1.5"/>
  <text x="795" y="225" text-anchor="middle" class="lbl">Store (embedding,</text>
  <text x="795" y="242" text-anchor="middle" class="lbl">response)</text>
</g>


<path d="M 795 260 Q 795 300 580 300 Q 365 300 365 92"
      stroke="currentColor" stroke-width="1.4"
      stroke-dasharray="6 4" fill="none" opacity="0.55"
      class="v-stroke"
      marker-end="url(#scf-arr-dash)"/>
<text x="580" y="318" text-anchor="middle" class="ann">populate index</text>


<polygon points="580,30 650,80 580,130 510,80" fill="none" stroke="var(--accent,#c15b39)" stroke-width="3" opacity="0">
  <animate attributeName="opacity" dur="5s" repeatCount="indefinite"
    keyTimes="0;0.48;0.50;0.56;0.58;1"
    values="0;0;0.85;0.85;0;0"/>
</polygon>
<polygon points="580,30 650,80 580,130 510,80" fill="none" stroke="var(--accent,#c15b39)" stroke-width="3" opacity="0">
  <animate attributeName="opacity" dur="5s" repeatCount="indefinite" begin="2.5s"
    keyTimes="0;0.48;0.50;0.56;0.58;1"
    values="0;0;0.85;0.85;0;0"/>
</polygon>


<g id="scf-anim-token">
  <circle r="7" fill="var(--accent,#c15b39)" opacity="0">
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite"
      keyTimes="0;0.02;0.60;0.70;1"
      values="0;0.85;0.85;0;0"/>
    <animateMotion dur="5s" repeatCount="indefinite"
      keyTimes="0;0.12;0.24;0.38;0.52;0.62;1" calcMode="spline"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"
      path="M 74,60 L 154,60 L 239,60 L 319,60 L 409,60 L 475,60 L 580,80 L 650,80 L 879,52"/>
  </circle>
</g>


<g id="scf-anim-token2">
  <circle r="7" fill="var(--warn,#e0a106)" opacity="0">
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" begin="2.5s"
      keyTimes="0;0.02;0.78;0.88;1"
      values="0;0.85;0.85;0;0"/>
    <animateMotion dur="5s" repeatCount="indefinite" begin="2.5s"
      keyTimes="0;0.12;0.24;0.38;0.50;0.60;0.72;0.82;1" calcMode="spline"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"
      path="M 74,60 L 239,60 L 409,60 L 475,60 L 580,80 L 580,130 L 580,200 L 648,230 L 795,230"/>
  </circle>
</g>

</svg>
<figcaption><b>Semantic cache lookup flow.</b> The query is embedded (~1-5 ms), compared against stored entries via ANN search (~1-10 ms), and a cosine threshold test (s = q-hat dot c-hat &gt;= tau) decides hit or miss. A cache hit returns the stored response in ~2-15 ms total -- roughly 100x faster than calling the LLM (~500 ms-5 s); on a miss the LLM is called and the new (embedding, response) pair is stored back into the index for future queries.</figcaption>
</figure>
