<figure class="viz" id="fig-colodis-memory-timeline">
<svg viewBox="0 0 820 430" role="img" aria-label="Colocated GPU memory timeline: during rollout phase an 80 GB GPU holds policy weights (14 GB), KV cache (50 GB), and inference activations (4 GB) while optimizer state is offloaded to CPU; during train phase the KV cache is freed and the GPU holds weights plus grads (28 GB), activations (20 GB), and reloads 84 GB Adam state from CPU.">
  <defs>
    <marker id="mt-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#555)"/>
    </marker>
    <marker id="mt-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#0ea5e9)"/>
    </marker>
    <marker id="mt-arrow-accent2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#c2410c)"/>
    </marker>
    <marker id="mt-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#999)"/>
    </marker>
    
    <pattern id="mt-hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="var(--accent-2,#c2410c)" stroke-width="2.5" stroke-opacity="0.4"/>
    </pattern>
    <style>
      #fig-colodis-memory-timeline .lbl  { font: 700 13px var(--sans,sans-serif); }
      #fig-colodis-memory-timeline .seg  { font: 600 11px var(--sans,sans-serif); }
      #fig-colodis-memory-timeline .tiny { font: 400 10px var(--sans,sans-serif); }
      #fig-colodis-memory-timeline .axis { font: 600 12px var(--sans,sans-serif); }
      #fig-colodis-memory-timeline .ann  { font: 500 10px var(--sans,sans-serif); }
      #fig-colodis-memory-timeline text  { fill: var(--ink-soft,#333); }
      #fig-colodis-memory-timeline .v-muted-txt { fill: var(--muted,#888); }
    </style>
  </defs>

  
  <line x1="55" y1="38" x2="780" y2="38" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#mt-arrow)"/>
  
  <line x1="110" y1="33" x2="110" y2="43" stroke="var(--ink-soft,#555)" stroke-width="1.5"/>
  <text x="110" y="28" text-anchor="middle" class="axis">t0</text>
  
  <line x1="430" y1="33" x2="430" y2="43" stroke="var(--ink-soft,#555)" stroke-width="1.5"/>
  <text x="430" y="28" text-anchor="middle" class="axis">t1</text>
  
  <line x1="740" y1="33" x2="740" y2="43" stroke="var(--ink-soft,#555)" stroke-width="1.5"/>
  <text x="740" y="28" text-anchor="middle" class="axis">t2</text>
  
  <text x="270" y="54" text-anchor="middle" class="lbl" fill="var(--accent,#0ea5e9)">ROLLOUT PHASE</text>
  <text x="660" y="54" text-anchor="middle" class="lbl" fill="var(--accent-2,#c2410c)">TRAIN PHASE</text>

  
  <text x="48" y="80" text-anchor="end" class="tiny v-muted-txt">80 GB</text>
  <text x="48" y="388" text-anchor="end" class="tiny v-muted-txt">0 GB</text>
  <text x="26" y="235" text-anchor="middle" class="tiny v-muted-txt" transform="rotate(-90,26,235)">HBM used</text>

  
  
  
  <rect x="110" y="335" width="240" height="53" fill="var(--accent,#0ea5e9)" fill-opacity="0.75" stroke="var(--accent,#0ea5e9)" stroke-width="1"/>
  <text x="230" y="355" text-anchor="middle" class="seg" fill="var(--accent,#0ea5e9)">policy weights (bf16)</text>
  <text x="230" y="371" text-anchor="middle" class="seg" fill="var(--accent,#0ea5e9)">14 GB</text>

  
  <rect x="110" y="148" width="240" height="187" fill="var(--accent,#0ea5e9)" fill-opacity="0.28" stroke="var(--accent,#0ea5e9)" stroke-width="1"/>
  <text x="230" y="235" text-anchor="middle" class="seg" fill="var(--accent,#0ea5e9)">KV cache (paged)</text>
  <text x="230" y="252" text-anchor="middle" class="seg" fill="var(--accent,#0ea5e9)">~50 GB</text>

  
  <rect x="110" y="126" width="240" height="22" fill="var(--muted,#aaa)" fill-opacity="0.45" stroke="var(--muted,#aaa)" stroke-width="1"/>
  <text x="230" y="141" text-anchor="middle" class="tiny">inference activations ~4 GB</text>

  
  <rect x="110" y="80" width="240" height="46" fill="none" stroke="var(--border-2,#bbb)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="230" y="107" text-anchor="middle" class="tiny v-muted-txt">(free ~12 GB)</text>

  
  <rect x="110" y="80" width="240" height="308" fill="none" stroke="var(--ink-soft,#666)" stroke-width="1.5"/>

  
  
  <rect x="470" y="283" width="240" height="105" fill="var(--accent-2,#c2410c)" fill-opacity="0.75" stroke="var(--accent-2,#c2410c)" stroke-width="1"/>
  <text x="590" y="328" text-anchor="middle" class="seg" fill="var(--accent-2,#c2410c)">weights + grads</text>
  <text x="590" y="345" text-anchor="middle" class="seg" fill="var(--accent-2,#c2410c)">28 GB</text>

  
  <rect x="470" y="208" width="240" height="75" fill="var(--muted,#aaa)" fill-opacity="0.45" stroke="var(--muted,#aaa)" stroke-width="1"/>
  <text x="590" y="250" text-anchor="middle" class="seg">activations</text>
  <text x="590" y="266" text-anchor="middle" class="seg">~20 GB</text>

  
  <rect x="470" y="80" width="240" height="128" fill="url(#mt-hatch)" stroke="var(--accent-2,#c2410c)" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="590" y="128" text-anchor="middle" class="seg" fill="var(--accent-2,#c2410c)">Adam state (fp32)</text>
  <text x="590" y="145" text-anchor="middle" class="seg" fill="var(--accent-2,#c2410c)">~84 GB</text>
  <text x="590" y="162" text-anchor="middle" class="tiny" fill="var(--accent-2,#c2410c)">(reloaded from CPU H2D;</text>
  <text x="590" y="176" text-anchor="middle" class="tiny" fill="var(--accent-2,#c2410c)">exceeds bar -- dominant cost)</text>

  
  <rect x="470" y="80" width="240" height="308" fill="none" stroke="var(--ink-soft,#666)" stroke-width="1.5"/>

  
  <line x1="475" y1="76" x2="475" y2="60" stroke="var(--accent,#0ea5e9)" stroke-width="1.5" marker-end="url(#mt-arrow-accent)" stroke-dasharray="4 3"/>
  <text x="475" y="54" text-anchor="middle" class="ann" fill="var(--accent,#0ea5e9)">KV cache freed (~50 GB released)</text>

  
  <rect x="130" y="400" width="200" height="22" rx="4" fill="var(--surface,#f0f0f0)" stroke="var(--border-2,#aaa)" stroke-width="1.2"/>
  <text x="230" y="415" text-anchor="middle" class="ann">CPU host RAM (pinned)</text>

  
  <line x1="190" y1="388" x2="190" y2="398" stroke="var(--muted,#999)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#mt-arrow-muted)"/>
  <text x="60" y="397" text-anchor="middle" class="tiny v-muted-txt">opt. state</text>
  <text x="60" y="409" text-anchor="middle" class="tiny v-muted-txt">offloaded</text>

  
  
  <rect x="460" y="400" width="240" height="22" rx="4" fill="var(--surface,#f0f0f0)" stroke="var(--accent-2,#c2410c)" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="580" y="415" text-anchor="middle" class="ann" fill="var(--accent-2,#c2410c)">CPU RAM -&gt; H2D reload (Adam)</text>
  <line x1="530" y1="400" x2="530" y2="392" stroke="var(--accent-2,#c2410c)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#mt-arrow-accent2)"/>

  
  
  <line x1="430" y1="60" x2="430" y2="395" stroke="var(--border-2,#bbb)" stroke-width="1.5" stroke-dasharray="6 4"/>

  
  <text x="430" y="74" text-anchor="middle" class="tiny v-muted-txt">phase</text>
  <text x="430" y="86" text-anchor="middle" class="tiny v-muted-txt">boundary</text>

</svg>
<figcaption><b>A single colocated 80 GB GPU holds very different content in the two time-sliced phases.</b> During rollout the bulk of HBM is consumed by the paged KV cache (~50 GB) while the optimizer's Adam state (~84 GB) is offloaded to CPU pinned memory. At the phase boundary (t1) the KV cache is freed, the inference engine sleeps, and the training phase reloads the Adam state from CPU over PCIe — the dominant latency cost of colocated time-slicing.</figcaption>
</figure>
