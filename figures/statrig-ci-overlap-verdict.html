<figure class="viz" id="fig-statrig-ci-overlap-verdict">
<svg viewBox="0 0 820 500" role="img" aria-label="Leaderboard of four models plotted as point estimate with 95 percent confidence interval on a relative accuracy axis. Model A and Model B have heavily overlapping intervals even though A's point sits slightly to the right, verdict: no demonstrated gap, rank between them is noise. Model C's interval is clearly separated to the left with no overlap, verdict: a real difference. Model D, a new entrant, has a much wider interval, verdict: too few evaluations for rank to be meaningful.">
  <defs>
    <marker id="srcov-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
  </defs>
  <style>
    #fig-statrig-ci-overlap-verdict text{ fill:var(--ink-soft); }
    #fig-statrig-ci-overlap-verdict .hdr{ font:700 13.5px var(--sans,sans-serif); }
    #fig-statrig-ci-overlap-verdict .rowlbl{ font:600 12px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-statrig-ci-overlap-verdict .rowsub{ font:500 9.5px var(--mono,monospace); fill:var(--muted); }
    #fig-statrig-ci-overlap-verdict .verdict{ font:600 11px var(--sans,sans-serif); fill:var(--accent); }
    #fig-statrig-ci-overlap-verdict .axislbl{ font:500 10px var(--mono,monospace); fill:var(--muted); }
    #fig-statrig-ci-overlap-verdict .legend{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-ci-overlap-verdict .cap{ font:600 11.5px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-statrig-ci-overlap-verdict .gaplbl{ font:600 9.5px var(--sans,sans-serif); fill:var(--accent); }
  </style>

  <text x="14" y="24" class="hdr">Point estimate +/- 95% CI, by model</text>
  <text x="14" y="40" class="rowsub">relative positions -- illustrative, no benchmark numbers</text>


  <g class="legend">
    <circle cx="638" cy="26" r="3.5" fill="var(--ink-soft)"/>
    <text x="648" y="29">point estimate</text>
    <line x1="638" y1="43" x2="656" y2="43" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <line x1="638" y1="39" x2="638" y2="47" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <line x1="656" y1="39" x2="656" y2="47" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <text x="662" y="46">95% CI</text>
  </g>


  <g stroke="var(--ink-soft)" stroke-width="1">
    <line x1="170" y1="410" x2="620" y2="410" opacity="0.6"/>
    <line x1="170" y1="410" x2="170" y2="418" opacity="0.6"/>
    <line x1="260" y1="410" x2="260" y2="418" opacity="0.6"/>
    <line x1="350" y1="410" x2="350" y2="418" opacity="0.6"/>
    <line x1="440" y1="410" x2="440" y2="418" opacity="0.6"/>
    <line x1="530" y1="410" x2="530" y2="418" opacity="0.6"/>
    <line x1="620" y1="410" x2="620" y2="418" opacity="0.6"/>
  </g>
  <text x="395" y="434" text-anchor="middle" class="axislbl">lower  &lt;=  relative accuracy  =&gt;  higher</text>


  <text x="40" y="91" class="rowlbl">Model A</text>
  <g>
    <line x1="422" y1="95" x2="566" y2="95" stroke="var(--ink-soft)" stroke-width="2"/>
    <line x1="422" y1="86" x2="422" y2="104" stroke="var(--ink-soft)" stroke-width="2"/>
    <line x1="566" y1="86" x2="566" y2="104" stroke="var(--ink-soft)" stroke-width="2"/>
    <circle cx="494" cy="95" r="5.5" fill="var(--ink-soft)"/>
  </g>


  <text x="40" y="171" class="rowlbl">Model B</text>
  <g>
    <line x1="391" y1="175" x2="525" y2="175" stroke="var(--ink-soft)" stroke-width="2"/>
    <line x1="391" y1="166" x2="391" y2="184" stroke="var(--ink-soft)" stroke-width="2"/>
    <line x1="525" y1="166" x2="525" y2="184" stroke="var(--ink-soft)" stroke-width="2"/>
    <circle cx="458" cy="175" r="5.5" fill="var(--ink-soft)"/>
  </g>


  <g stroke="var(--accent)" fill="none">
    <path d="M634 95 h-8 M634 95 V175 M634 175 h-8 M634 135 h10" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <text x="648" y="121" class="verdict">CIs overlap -&gt;</text>
  <text x="648" y="137" class="verdict">NO demonstrated gap;</text>
  <text x="648" y="153" class="verdict">rank A vs B is noise</text>


  <text x="40" y="251" class="rowlbl">Model C</text>
  <g>
    <line x1="255" y1="255" x2="355" y2="255" stroke="var(--ink-soft)" stroke-width="2"/>
    <line x1="255" y1="246" x2="255" y2="264" stroke="var(--ink-soft)" stroke-width="2"/>
    <line x1="355" y1="246" x2="355" y2="264" stroke="var(--ink-soft)" stroke-width="2"/>
    <circle cx="305" cy="255" r="5.5" fill="var(--ink-soft)"/>
  </g>
  <g stroke="var(--accent)" fill="none">
    <path d="M630 255 h14" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <text x="648" y="251" class="verdict">separated -&gt;</text>
  <text x="648" y="267" class="verdict">real difference</text>


  <g stroke="var(--accent)" opacity="0.9">
    <line x1="357" y1="216" x2="389" y2="216" stroke-width="1.4" marker-end="url(#srcov-arrow)" marker-start="url(#srcov-arrow)"/>
  </g>
  <text x="373" y="207" text-anchor="middle" class="gaplbl">gap</text>


  <text x="40" y="351" class="rowlbl">Model D (new)</text>
  <text x="40" y="365" class="rowsub">few battles logged</text>
  <g>
    <line x1="273" y1="355" x2="561" y2="355" stroke="var(--ink-soft)" stroke-width="2"/>
    <line x1="273" y1="346" x2="273" y2="364" stroke="var(--ink-soft)" stroke-width="2"/>
    <line x1="561" y1="346" x2="561" y2="364" stroke="var(--ink-soft)" stroke-width="2"/>
    <circle cx="417" cy="355" r="5.5" fill="var(--ink-soft)"/>
  </g>
  <g stroke="var(--accent)" fill="none">
    <path d="M630 355 h14" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <text x="648" y="343" class="verdict">few evaluations -&gt;</text>
  <text x="648" y="359" class="verdict">rank not yet</text>
  <text x="648" y="375" class="verdict">meaningful</text>


  <rect x="14" y="452" width="792" height="32" rx="8" class="v-fill v-grid" stroke-width="1"/>
  <text x="410" y="473" text-anchor="middle" class="cap">width ~ 1 / sqrt(n)  --  to halve a CI, you must 4x the number of items</text>
</svg>
<figcaption><b>Overlapping intervals mean "no demonstrated gap"; separated intervals mean a real difference.</b> Model A's point estimate sits to the right of Model B's, but their 95% CIs overlap heavily, so the ranking between them is not statistically supported by this data. Model C's interval is fully separated from A and B, so that gap is real; Model D, a new entrant with few evaluations, has such a wide interval that its rank is not yet meaningful at all.</figcaption>
</figure>
