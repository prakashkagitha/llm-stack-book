<figcaption><b>Naive decode recomputes K and V for every past position at every step, an O(T^2) triangle of wasted work; the KV cache computes each position's K and V exactly once, appends it, and reuses every earlier entry unchanged.</b> Because past keys and values never depend on the current query, caching them turns a growing recomputation into a single new column per step &#8212; the classic trade of memory for compute.</figcaption>
