<figure class="viz" id="fig-vlm-dominant-recipe">
<svg viewBox="0 0 900 560" role="img" aria-label="The dominant VLM recipe of 2024-2025 in six building blocks: a runtime pipeline of Vision Encoder, Any-Resolution Tiling, MLP Projector, and LLM Backbone, plus two meta blocks describing the training stages and the data mix.">
  <defs>
    <marker id="dr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
    </marker>
  </defs>
  <style>
    #fig-vlm-dominant-recipe .ttl  { font:700 16px var(--sans,sans-serif); fill:#fff; }
    #fig-vlm-dominant-recipe .ctl  { font:700 12px var(--sans,sans-serif); }
    #fig-vlm-dominant-recipe .spec { font:400 9.5px var(--mono,monospace); fill:var(--muted,#6d675d); }
    #fig-vlm-dominant-recipe .bdg  { font:700 13px var(--sans,sans-serif); fill:#fff; }
    #fig-vlm-dominant-recipe .div  { font:600 9.5px var(--sans,sans-serif); fill:var(--muted,#6d675d); }
    #fig-vlm-dominant-recipe text  { fill:var(--ink-soft,#45413a); }
  </style>

  
  <rect x="12" y="12" width="876" height="536" rx="12" class="v-fill v-stroke" stroke-width="2"/>
  
  <rect x="12" y="12" width="876" height="40" rx="12" fill="var(--accent,#c15b39)"/>
  <rect x="12" y="32" width="876" height="20" fill="var(--accent,#c15b39)"/>
  <text x="450" y="39" text-anchor="middle" class="ttl">THE DOMINANT VLM RECIPE  ·  2024–2025</text>

  
  <text x="36" y="76" class="div">RUNTIME DATA PATH  (image to answer)</text>

  

  
  <rect x="36" y="84" width="196" height="130" rx="9" class="v-fill v-stroke" stroke-width="1.4"/>
  <circle cx="62" cy="110" r="13" fill="var(--accent,#c15b39)"/>
  <text x="62" y="115" text-anchor="middle" class="bdg">1</text>
  <text x="84" y="115" class="ctl">VISION ENCODER</text>
  <text x="50" y="140" class="spec">ViT-L/14 (CLIP) or</text>
  <text x="50" y="154" class="spec">InternViT-6B</text>
  <text x="50" y="172" class="spec">Input: 336×336 tile</text>
  <text x="50" y="190" class="spec">Out: 576 patch embeds</text>
  <text x="50" y="204" class="spec">@ D_v = 1024</text>

  
  <line x1="234" y1="149" x2="248" y2="149" stroke="var(--accent,#c15b39)" stroke-width="2" marker-end="url(#dr-arr)"/>

  
  <rect x="250" y="84" width="196" height="130" rx="9" class="v-fill v-stroke" stroke-width="1.4"/>
  <circle cx="276" cy="110" r="13" fill="var(--accent,#c15b39)"/>
  <text x="276" y="115" text-anchor="middle" class="bdg">2</text>
  <text x="298" y="115" class="ctl">ANY-RES TILING</text>
  <text x="264" y="140" class="spec">Divide input into N</text>
  <text x="264" y="154" class="spec">tiles (+ thumbnail)</text>
  <text x="264" y="178" class="spec">N in {1, 2, 4, 6} by</text>
  <text x="264" y="192" class="spec">aspect ratio / size</text>

  
  <line x1="448" y1="149" x2="462" y2="149" stroke="var(--accent,#c15b39)" stroke-width="2" marker-end="url(#dr-arr)"/>

  
  <rect x="464" y="84" width="196" height="130" rx="9" fill="var(--accent,#c15b39)" fill-opacity="0.16" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <circle cx="490" cy="110" r="13" fill="var(--accent,#c15b39)"/>
  <text x="490" y="115" text-anchor="middle" class="bdg">3</text>
  <text x="512" y="115" class="ctl">MLP PROJECTOR</text>
  <text x="478" y="140" class="spec">Linear(D_v, D_llm)</text>
  <text x="478" y="154" class="spec">  then GELU then</text>
  <text x="478" y="168" class="spec">Linear(D_llm, D_llm)</text>
  <text x="478" y="192" class="spec">~40M params</text>
  <text x="478" y="206" class="spec">@ D_llm = 4096</text>
  
  <text x="650" y="100" text-anchor="end" class="spec" fill="var(--accent,#c15b39)" font-weight="700">learned bridge</text>

  
  <line x1="662" y1="149" x2="676" y2="149" stroke="var(--accent,#c15b39)" stroke-width="2" marker-end="url(#dr-arr)"/>

  
  <rect x="678" y="84" width="186" height="130" rx="9" class="v-fill v-stroke" stroke-width="1.4"/>
  <circle cx="704" cy="110" r="13" fill="var(--accent,#c15b39)"/>
  <text x="704" y="115" text-anchor="middle" class="bdg">4</text>
  <text x="726" y="115" class="ctl">LLM BACKBONE</text>
  <text x="692" y="140" class="spec">LLaMA-3 / Qwen-2.5 /</text>
  <text x="692" y="154" class="spec">InternLM / Mistral</text>
  <text x="692" y="168" class="spec">(7B – 72B)</text>
  <text x="692" y="192" class="spec">Receives:</text>
  <text x="692" y="206" class="spec">[visual || text tokens]</text>

  
  <line x1="36" y1="248" x2="380" y2="248" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="450" y="252" text-anchor="middle" class="div">HOW IT IS BUILT  (training &amp; data — not the runtime path)</text>
  <line x1="520" y1="248" x2="864" y2="248" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>

  

  
  <rect x="36" y="268" width="408" height="248" rx="9" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <circle cx="64" cy="296" r="13" fill="var(--accent,#c15b39)"/>
  <text x="64" y="301" text-anchor="middle" class="bdg">5</text>
  <text x="86" y="301" class="ctl">TRAINING STAGES</text>
  <text x="54" y="334" class="spec">S1  align projector</text>
  <text x="78" y="348" class="spec">frozen encoder + LLM, ~1 day</text>
  <text x="54" y="376" class="spec">S2  SFT all components</text>
  <text x="78" y="390" class="spec">3–7 days on 64 H100s</text>
  <text x="54" y="418" class="spec">S3  (optional) HR fine-tune</text>
  <text x="78" y="432" class="spec">on document / OCR data</text>
  <text x="54" y="466" class="spec">Differential LRs: encoder low,</text>
  <text x="54" y="480" class="spec">LLM mid, projector high.</text>

  
  <rect x="456" y="268" width="408" height="248" rx="9" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <circle cx="484" cy="296" r="13" fill="var(--accent,#c15b39)"/>
  <text x="484" y="301" text-anchor="middle" class="bdg">6</text>
  <text x="506" y="301" class="ctl">DATA MIX</text>
  <text x="474" y="334" class="spec">Captions  +  VQA  +  OCR</text>
  <text x="474" y="352" class="spec">+  Charts  +  Grounding</text>
  <text x="474" y="370" class="spec">+  Instruction-following</text>
  <text x="474" y="404" class="spec">Weighted (task-type) sampling</text>
  <text x="474" y="418" class="spec">to balance capability areas.</text>
  <text x="474" y="456" class="spec" fill="var(--accent,#c15b39)" font-weight="700">Quality &gt; quantity.</text>
  <text x="474" y="482" class="spec">Curated, deduplicated corpora</text>
  <text x="474" y="496" class="spec">beat raw web-scale volume.</text>

</svg>
<figcaption><b>The dominant VLM recipe of 2024–2025, in six building blocks.</b> Blocks 1–4 form the runtime data path (image → tiles → projected visual tokens → LLM); the MLP projector (block 3, highlighted) is the small learned bridge between the frozen vision and language towers. Blocks 5–6 describe how the system is trained and fed. This is the default starting point for building a new VLM.</figcaption>
</figure>
