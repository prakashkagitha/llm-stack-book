<style>

  #fig-collectives-six-dataflow .lbl-sm { font: 400 10px var(--sans,sans-serif); }
  #fig-collectives-six-dataflow .lbl-xs { font: 400 9px var(--sans,sans-serif); }
  #fig-collectives-six-dataflow .panel-title { font: 700 13px var(--sans,sans-serif); }
  #fig-collectives-six-dataflow .op-lbl { font: 600 11px var(--sans,sans-serif); }
  #fig-collectives-six-dataflow .cap-it { font: italic 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-collectives-six-dataflow .muted { fill: var(--muted); }
  #fig-collectives-six-dataflow .v-divider { stroke: var(--border-2,#ccc); stroke-dasharray: 4 3; }

  /* Cell animations */
  @keyframes csd-flow-ar {
    0%   { opacity: 1; transform: translateX(0); }
    40%  { opacity: 0.3; transform: translateX(60px); }
    60%  { opacity: 0; transform: translateX(80px); }
    65%  { opacity: 0; }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes csd-appear-ar {
    0%   { opacity: 0; transform: scaleX(0.3); }
    50%  { opacity: 0; }
    70%  { opacity: 1; transform: scaleX(1); }
    100% { opacity: 1; transform: scaleX(1); }
  }
  @keyframes csd-flow-rs {
    0%   { opacity: 1; transform: translateY(0); }
    35%  { opacity: 0.4; transform: translateY(12px); }
    55%  { opacity: 0; transform: translateY(20px); }
    60%  { opacity: 0; }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes csd-appear-rs {
    0%   { opacity: 0; transform: scaleY(0.4); }
    55%  { opacity: 0; }
    78%  { opacity: 1; transform: scaleY(1); }
    100% { opacity: 1; transform: scaleY(1); }
  }
  @keyframes csd-flow-ag {
    0%   { opacity: 1; transform: translateX(0); }
    30%  { opacity: 0.5; transform: translateX(40px); }
    50%  { opacity: 0; transform: translateX(60px); }
    55%  { opacity: 0; }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes csd-appear-ag {
    0%   { opacity: 0; }
    50%  { opacity: 0; }
    75%  { opacity: 1; }
    100% { opacity: 1; }
  }

  #fig-collectives-six-dataflow .anim-before-ar {
    animation: csd-flow-ar 3.2s ease-in-out infinite;
  }
  #fig-collectives-six-dataflow .anim-after-ar {
    animation: csd-appear-ar 3.2s ease-in-out infinite;
  }
  #fig-collectives-six-dataflow .anim-before-rs {
    animation: csd-flow-rs 3.6s ease-in-out infinite;
  }
  #fig-collectives-six-dataflow .anim-after-rs {
    animation: csd-appear-rs 3.6s ease-in-out infinite;
  }
  #fig-collectives-six-dataflow .anim-before-ag {
    animation: csd-flow-ag 3.4s ease-in-out infinite;
  }
  #fig-collectives-six-dataflow .anim-after-ag {
    animation: csd-appear-ag 3.4s ease-in-out infinite;
  }
</style>

<text x="460" y="746" text-anchor="middle" class="cap-it" style="font-size:10.5px">All-Reduce = Reduce-Scatter (Panel B) followed by All-Gather (Panel C) — the decomposition used in ZeRO/FSDP.</text>

<figcaption><b>The three core collectives: All-Reduce, Reduce-Scatter, and All-Gather for n=4 ranks.</b> Panel A shows All-Reduce: each rank starts with a different value and ends with the global sum. Panel B shows Reduce-Scatter: each rank starts with 4 chunks and ends holding only its own summed chunk (output M/n per rank). Panel C shows All-Gather: each rank starts with one chunk and ends holding the full concatenation (output nM per rank). The key identity — All-Reduce equals Reduce-Scatter followed by All-Gather — is exploited by ZeRO and FSDP to avoid materializing the full gradient sum on every rank simultaneously.</figcaption>
</figure>
