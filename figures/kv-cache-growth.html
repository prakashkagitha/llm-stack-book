<figure class="viz" id="fig-kv-cache">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 200" role="img" aria-label="The KV cache is written all at once during prefill for the S prompt tokens, then grows by exactly one key/value pair per decode step.">
  <style>
    #fig-kv-cache text{ fill:var(--ink-soft); font-family: var(--sans,sans-serif); }
    #fig-kv-cache .lbl{ font:600 13px var(--sans,sans-serif); }
    #fig-kv-cache .sm{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-kv-cache .mono{ font:500 11px var(--mono,monospace); }
    #fig-kv-cache .cell-lbl{ font:600 10.5px var(--mono,monospace); }
  </style>

  
  <g data-anim="1">
    <text x="10" y="26" class="lbl" fill="var(--accent2,#3b82f6)">PREFILL</text>
    <text x="82" y="26" class="sm">all S prompt tokens' K,V written at once</text>
  </g>
  <g data-anim="2">
    <text x="470" y="26" class="lbl" fill="var(--accent)">DECODE</text>
    <text x="533" y="26" class="sm">+1 KV pair appended per step</text>
  </g>

  
  <g data-anim="1">
    <g class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.28" stroke="var(--accent2,#3b82f6)" stroke-width="1.3">
      <rect x="10" y="46" width="40" height="46" rx="5"/>
      <rect x="54" y="46" width="40" height="46" rx="5"/>
      <rect x="98" y="46" width="40" height="46" rx="5"/>
      <rect x="142" y="46" width="40" height="46" rx="5"/>
      <rect x="186" y="46" width="40" height="46" rx="5"/>
    </g>
    <text x="30"  y="73" text-anchor="middle" class="cell-lbl" fill="var(--accent2,#3b82f6)">K1</text>
    <text x="74"  y="73" text-anchor="middle" class="cell-lbl" fill="var(--accent2,#3b82f6)">K2</text>
    <text x="118" y="73" text-anchor="middle" class="cell-lbl" fill="var(--accent2,#3b82f6)">K3</text>
    <text x="162" y="73" text-anchor="middle" class="cell-lbl" fill="var(--accent2,#3b82f6)">...</text>
    <text x="206" y="73" text-anchor="middle" class="cell-lbl" fill="var(--accent2,#3b82f6)">KS</text>
    <text x="118" y="108" text-anchor="middle" class="sm">length S, written in ONE parallel pass</text>
  </g>

  
  <g class="v-fill" fill="var(--accent)" fill-opacity="0.32" stroke="var(--accent)" stroke-width="1.3">
    <rect data-anim="2" x="230" y="46" width="40" height="46" rx="5"/>
    <rect data-anim="3" x="274" y="46" width="40" height="46" rx="5"/>
    <rect data-anim="4" x="318" y="46" width="40" height="46" rx="5"/>
  </g>
  <text data-anim="2" x="250" y="73" text-anchor="middle" class="cell-lbl" fill="var(--accent)">K,V</text>
  <text data-anim="3" x="294" y="73" text-anchor="middle" class="cell-lbl" fill="var(--accent)">K,V</text>
  <text data-anim="4" x="338" y="73" text-anchor="middle" class="cell-lbl" fill="var(--accent)">K,V</text>

  
  <g data-anim="2">
    <text x="250" y="108" text-anchor="middle" class="sm">step 1</text>
    <text x="250" y="122" text-anchor="middle" class="mono" fill="var(--accent)">len S+1</text>
  </g>
  <g data-anim="3">
    <text x="294" y="108" text-anchor="middle" class="sm">step 2</text>
    <text x="294" y="122" text-anchor="middle" class="mono" fill="var(--accent)">len S+2</text>
  </g>
  <g data-anim="4">
    <text x="338" y="108" text-anchor="middle" class="sm">step 3</text>
    <text x="338" y="122" text-anchor="middle" class="mono" fill="var(--accent)">len S+3</text>
  </g>

  
  <g data-anim="4">
    <line x1="368" y1="69" x2="404" y2="69" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#kvg-arrow)"/>
    <text x="386" y="60" text-anchor="middle" class="sm" fill="var(--accent)">...</text>
  </g>

  <defs>
    <marker id="kvg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
  </defs>

  
  <g data-anim="4">
    <line x1="10" y1="150" x2="710" y2="150" stroke="var(--border-2)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="10" y="176" class="sm" fill="var(--ink-soft)">every decode step must stream the WHOLE (growing) cache from HBM.</text>
  </g>
</svg>
<figcaption><b>The KV cache is written once in bulk, then grows by one entry per token.</b> Prefill fills S cache slots in a single parallel pass; every decode step after that appends exactly one new key/value pair, extending the cache from S to S+1, S+2, S+3, ... Because attention must read the entire cache at each step, the amount of data streamed from HBM keeps climbing as generation proceeds.</figcaption>
</figure>
