<figure class="viz" id="fig-cpt-function-preserving-growth">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 560" role="img" aria-label="Three panels showing function-preserving growth: depth growth inserts a new identity-at-init transformer block via zeroed output projections; width growth clones a hidden neuron and halves its outgoing weights so the summed output is unchanged; dense-to-MoE upcycling replaces a dense MLP with several identical expert copies plus a freshly initialized near-uniform router. In every case the grown model computes the same function as the original at step 0, and a shared loss sketch shows CPT starting flat at the base loss before a gentle decline as the new capacity wakes up.">

    </marker>
    <marker id="fpg-arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
    </marker>
  </defs>
  <style>

    #fig-cpt-function-preserving-growth .mono{ font: 600 9.5px var(--mono,monospace); fill: var(--ink-soft); }
    #fig-cpt-function-preserving-growth .mono-accent{ font: 700 9.5px var(--mono,monospace); fill: var(--v-accent,#c15b39); }
    #fig-cpt-function-preserving-growth .strip-note{ font: 600 10.5px var(--sans,sans-serif); fill: var(--ink-soft); }

  <g data-anim="1">
    <rect x="10" y="10" width="780" height="34" rx="9" fill="var(--surface-3)" opacity="0.6"/>

  <g data-anim="2">

  <g data-anim="2">

    <text x="140" y="335" text-anchor="middle" class="note">grown model = same output</text>
  </g>

    <rect x="376" y="143" width="30" height="70" rx="14" fill="var(--v-accent,#c15b39)" fill-opacity="0.10" stroke="var(--v-accent,#c15b39)" stroke-width="1" stroke-dasharray="3 2"/>

    <line x1="391" y1="156" x2="481" y2="178" stroke="var(--v-accent,#c15b39)" stroke-width="1.2" opacity="0.85"/>
    <line x1="391" y1="200" x2="481" y2="178" stroke="var(--v-accent,#c15b39)" stroke-width="1.2" opacity="0.85"/>
    <line x1="391" y1="244" x2="481" y2="178" stroke="var(--muted)" stroke-width="1" opacity="0.6"/>

    
    <circle cx="305" cy="178" r="7" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.2"/>
    <text x="305" y="165" text-anchor="middle" class="mono">x</text>

    <circle cx="391" cy="112" r="9" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.2"/>
    <circle cx="391" cy="156" r="9" fill="var(--v-accent,#c15b39)" fill-opacity="0.22" stroke="var(--v-accent,#c15b39)" stroke-width="1.4"/>
    <circle cx="391" cy="200" r="9" fill="var(--v-accent,#c15b39)" fill-opacity="0.22" stroke="var(--v-accent,#c15b39)" stroke-width="1.4"/>
    <circle cx="391" cy="244" r="9" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.2"/>

    <circle cx="481" cy="178" r="8" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.2"/>
    <text x="481" y="165" text-anchor="middle" class="mono">out</text>

    <text x="438" y="153" text-anchor="middle" class="mono-accent" font-size="9">w/2</text>
    <text x="438" y="200" text-anchor="middle" class="mono-accent" font-size="9">w/2</text>

    <text x="400" y="270" text-anchor="middle" class="note">clone row (+ tiny noise</text>
    <text x="400" y="283" text-anchor="middle" class="note">to break symmetry)</text>
    <text x="400" y="303" text-anchor="middle" class="note">divide outgoing weights by</text>
    <text x="400" y="316" text-anchor="middle" class="note">#copies -&gt; summed output unchanged</text>
  </g>

  
  <g data-anim="5">
    <text x="660" y="78" text-anchor="middle" class="panel-title">Dense -&gt; MoE upcycling</text>

    <rect x="590" y="94" width="140" height="28" rx="5" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.2"/>
    <text x="660" y="112" text-anchor="middle" class="lbl">Dense MLP</text>

    <line x1="660" y1="122" x2="660" y2="140" stroke="var(--ink-soft)" stroke-width="1.3" marker-end="url(#fpg-arrow)"/>
    <text x="672" y="134" class="note">upcycle</text>

    <rect x="558" y="144" width="204" height="112" rx="8" fill="none" stroke="var(--border-2)" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="660" y="158" text-anchor="middle" class="lbl">MoE layer</text>

    
    <g>
      <rect x="570" y="168" width="40" height="38" rx="5" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.1"/>
      <text x="590" y="191" text-anchor="middle" class="mono" font-size="9">E1</text>
      <rect x="614" y="168" width="40" height="38" rx="5" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.1"/>
      <text x="634" y="191" text-anchor="middle" class="mono" font-size="9">E2</text>
      <rect x="658" y="168" width="40" height="38" rx="5" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.1"/>
      <text x="678" y="191" text-anchor="middle" class="mono" font-size="9">E3</text>
      <rect x="702" y="168" width="40" height="38" rx="5" fill="var(--surface-3)" stroke="var(--ink-soft)" stroke-width="1.1"/>
      <text x="722" y="191" text-anchor="middle" class="mono" font-size="9">E4</text>
    </g>

    
    <rect x="596" y="222" width="128" height="26" rx="5" fill="var(--v-accent,#c15b39)" fill-opacity="0.10" stroke="var(--v-accent,#c15b39)" stroke-width="1.4"/>
    <text x="660" y="233" text-anchor="middle" class="lbl-accent" font-size="9">Router</text>
    <text x="660" y="244" text-anchor="middle" class="note" font-size="8">(random init ~ uniform)</text>

    <line x1="660" y1="222" x2="660" y2="207" stroke="var(--v-accent,#c15b39)" stroke-width="1.1" opacity="0.75" marker-end="url(#fpg-arrow-accent)"/>

    <text x="660" y="290" text-anchor="middle" class="note">all experts identical + near-uniform</text>
    <text x="660" y="303" text-anchor="middle" class="note">router ~= original dense output;</text>
    <text x="660" y="316" text-anchor="middle" class="note">CPT differentiates experts</text>
  </g>

  
  <g data-anim="6">
    <text x="400" y="405" text-anchor="middle" class="strip-note">All three: CPT continues from a function-preserving init, not from scratch</text>

    <line x1="300" y1="510" x2="300" y2="425" stroke="var(--ink-soft)" stroke-width="1.2" marker-end="url(#fpg-arrow)"/>
    <line x1="300" y1="510" x2="700" y2="510" stroke="var(--ink-soft)" stroke-width="1.2" marker-end="url(#fpg-arrow)"/>

          fill="none" stroke="var(--v-accent,#c15b39)" stroke-width="2.6" stroke-linecap="round"
          class="viz-draw" style="--len:500"/>

    <line x1="360" y1="443" x2="360" y2="463" stroke="var(--ink-soft)" stroke-width="0.9" opacity="0.6" marker-end="url(#fpg-arrow-muted)"/>
    <text x="360" y="432" text-anchor="middle" class="note">starts at base loss</text>

    <line x1="600" y1="540" x2="612" y2="500" stroke="var(--ink-soft)" stroke-width="0.9" opacity="0.6" marker-end="url(#fpg-arrow-muted)"/>
    <text x="600" y="552" text-anchor="middle" class="note">CPT wakes up new capacity</text>
  </g>

</svg>
<figcaption><b>Three ways to grow a model, one unifying trick.</b> Depth growth inserts identity-at-init blocks (zeroed output projections), width growth clones a neuron and halves its outgoing weights, and dense-to-MoE upcycling clones the dense MLP into identical experts behind a near-uniform router -- in every case the bigger architecture starts by computing the same function as the smaller one, so CPT begins from a preserved loss rather than a random-init spike.</figcaption>
</figure>
