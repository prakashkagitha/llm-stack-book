<text x="430" y="694" text-anchor="middle" class="cap">non-associative, so bit-exact hashes never match, even across honest runs</text>
<text x="430" y="718" text-anchor="middle" class="cap-b">Hash a quantity STABLE under benign perturbation instead: the top-k dominant components.</text>

<figcaption><b>TOPLOC lets an untrusted GPU prove it ran the claimed model by committing to a tiny, locality-sensitive fingerprint of its top-k activations, cheaply re-checked with a batched prefill.</b> Benign hardware noise (Case A) perturbs low bits but preserves which components dominate, so the fingerprints still overlap and the rollout passes; a real model swap (Case B) shifts the activation geometry enough that the dominant components diverge, so the rollout is rejected.</figcaption>
</figure>
