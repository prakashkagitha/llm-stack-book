<figure class="viz" id="fig-dense-layer-gradient-transpose-symmetry">
<button class="viz-replay" type="button">&#8635; replay</button>

<svg viewBox="0 0 680 690" role="img" aria-label="Three panels of labelled matrix blocks. Panel one, the forward pass: X times W equals Z. Panel two, the weight gradient: X transpose times Z-bar equals W-bar. Panel three, the input gradient: Z-bar times W transpose equals X-bar. X reappears transposed in the weight gradient, and W reappears transposed in the input gradient -- each operand of the forward matmul shows up transposed in the other operand's gradient.">
<style>
  #fig-dense-layer-gradient-transpose-symmetry .panel-t{ font:700 12px var(--sans,sans-serif); letter-spacing:.3px; }
  #fig-dense-layer-gradient-transpose-symmetry .blk-name{ font:700 13px var(--mono,monospace); }
  #fig-dense-layer-gradient-transpose-symmetry .blk-name-acc{ font:700 13px var(--mono,monospace); }
  #fig-dense-layer-gradient-transpose-symmetry .blk-shape{ font:400 7.8px var(--mono,monospace); }
  #fig-dense-layer-gradient-transpose-symmetry .op-sym{ font:700 17px var(--mono,monospace); }
  #fig-dense-layer-gradient-transpose-symmetry .eq-cap{ font:700 12.5px var(--mono,monospace); }
  #fig-dense-layer-gradient-transpose-symmetry .fn-txt{ font:400 10.5px var(--mono,monospace); }
  #fig-dense-layer-gradient-transpose-symmetry .fn-note{ font:400 9px var(--sans,sans-serif); }
  #fig-dense-layer-gradient-transpose-symmetry .payoff{ font:600 11.5px var(--sans,sans-serif); }
  #fig-dense-layer-gradient-transpose-symmetry .blk{ stroke-width:1.4; }
  #fig-dense-layer-gradient-transpose-symmetry .blk-acc{ stroke-width:2.2; }
</style>


<g data-anim="1">
  <text x="60" y="30" class="panel-t v-muted">PANEL 1: FORWARD</text>

  <rect x="60" y="44" width="50" height="110" rx="6" class="blk v-fill v-stroke"/>
  <text x="85" y="94" text-anchor="middle" class="blk-name v-label">X</text>
  <text x="85" y="110" text-anchor="middle" class="blk-shape v-muted">N, d_in</text>

  <text x="137" y="105" text-anchor="middle" class="op-sym v-label">*</text>

  <rect x="164" y="74" width="72" height="50" rx="6" class="blk v-fill v-stroke"/>
  <text x="200" y="95" text-anchor="middle" class="blk-name v-label">W</text>
  <text x="200" y="111" text-anchor="middle" class="blk-shape v-muted">d_in, d_out</text>

  <text x="263" y="105" text-anchor="middle" class="op-sym v-label">=</text>

  <rect x="290" y="44" width="72" height="110" rx="6" class="blk v-fill v-stroke"/>
  <text x="326" y="94" text-anchor="middle" class="blk-name v-label">Z</text>
  <text x="326" y="110" text-anchor="middle" class="blk-shape v-muted">N, d_out</text>

  <text x="60" y="174" class="eq-cap v-label">Z = X W</text>
</g>


<g data-anim="2">
  <text x="60" y="214" class="panel-t v-muted">PANEL 2: WEIGHT GRADIENT</text>

  <rect x="60" y="258" width="110" height="50" rx="6" class="blk-acc v-fill v-accent-s"/>
  <text x="115" y="279" text-anchor="middle" class="blk-name-acc v-accent">X^T</text>
  <text x="115" y="295" text-anchor="middle" class="blk-shape v-muted">d_in, N</text>

  <text x="197" y="289" text-anchor="middle" class="op-sym v-label">*</text>

  <rect x="224" y="228" width="72" height="110" rx="6" class="blk v-fill v-stroke"/>
  <text x="260" y="278" text-anchor="middle" class="blk-name v-label">Z-bar</text>
  <text x="260" y="294" text-anchor="middle" class="blk-shape v-muted">N, d_out</text>

  <text x="323" y="289" text-anchor="middle" class="op-sym v-label">=</text>

  <rect x="350" y="258" width="72" height="50" rx="6" class="blk v-fill v-stroke"/>
  <text x="386" y="279" text-anchor="middle" class="blk-name v-label">W-bar</text>
  <text x="386" y="295" text-anchor="middle" class="blk-shape v-muted">d_in, d_out</text>

  <text x="60" y="358" class="eq-cap v-label">W-bar = X^T Z-bar</text>
</g>


<g data-anim="3">
  <text x="60" y="398" class="panel-t v-muted">PANEL 3: INPUT GRADIENT</text>

  <rect x="60" y="412" width="72" height="110" rx="6" class="blk v-fill v-stroke"/>
  <text x="96" y="462" text-anchor="middle" class="blk-name v-label">Z-bar</text>
  <text x="96" y="478" text-anchor="middle" class="blk-shape v-muted">N, d_out</text>

  <text x="159" y="473" text-anchor="middle" class="op-sym v-label">*</text>

  <rect x="186" y="431" width="58" height="72" rx="6" class="blk-acc v-fill v-accent-s"/>
  <text x="215" y="463" text-anchor="middle" class="blk-name-acc v-accent">W^T</text>
  <text x="215" y="479" text-anchor="middle" class="blk-shape v-muted">d_out, d_in</text>

  <text x="271" y="473" text-anchor="middle" class="op-sym v-label">=</text>

  <rect x="298" y="412" width="50" height="110" rx="6" class="blk v-fill v-stroke"/>
  <text x="323" y="462" text-anchor="middle" class="blk-name v-label">X-bar</text>
  <text x="323" y="478" text-anchor="middle" class="blk-shape v-muted">N, d_in</text>

  <text x="60" y="542" class="eq-cap v-label">X-bar = Z-bar W^T</text>
</g>


<g data-anim="4">
  <path d="M 85 154 C 40 178, 40 236, 115 258" fill="none" class="v-accent-s" stroke-width="1.4" stroke-dasharray="4 4" opacity="0.75"/>
  <path d="M 200 154 C 470 195, 470 390, 215 431" fill="none" class="v-accent-s" stroke-width="1.4" stroke-dasharray="4 4" opacity="0.75"/>
</g>


<g data-anim="5">
  <rect x="60" y="564" width="400" height="46" rx="8" class="blk v-fill v-stroke"/>
  <text x="80" y="584" class="fn-txt v-label">b-bar = 1^T Z-bar</text>
  <text x="80" y="600" class="fn-note v-muted">(sum the upstream gradient over the N batch rows)</text>
</g>


<g data-anim="6">
  <rect x="8" y="626" width="664" height="32" rx="6" class="v-fill" stroke="none"/>
  <text x="340" y="647" text-anchor="middle" class="payoff v-accent">each operand reappears transposed in the other operand's gradient</text>
</g>

</svg>
<figcaption><b>The two golden identities, drawn as shapes.</b> The forward matmul <code>Z = X W</code> hides two gradients in plain sight: <code>W-bar = X^T Z-bar</code> reuses <code>X</code> transposed, and <code>X-bar = Z-bar W^T</code> reuses <code>W</code> transposed — the dashed accent arcs trace each operand from its forward appearance into its transposed reappearance in a gradient.</figcaption>
</figure>
