<figure class="viz" id="fig-guardrails-cascade-confidence-routing">
<svg viewBox="0 0 780 590" role="img" aria-label="Confidence-band cascade: a tiny classifier scores every request; clear-safe and clear-unsafe bands resolve instantly on a fast path, while only the gray-zone minority escalates to a heavier Llama Guard 8B shield model.">
<defs>
  <marker id="gccr-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <marker id="gccr-arrow-danger" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--danger,#dc2626)"/>
  </marker>
  <style>
    #fig-guardrails-cascade-confidence-routing text { fill: var(--ink-soft,#45413a); }
    #fig-guardrails-cascade-confidence-routing .ttl { font: 700 14.5px var(--sans,sans-serif); }
    #fig-guardrails-cascade-confidence-routing .sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-cascade-confidence-routing .box-t { font: 700 13px var(--sans,sans-serif); }
    #fig-guardrails-cascade-confidence-routing .box-s { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-cascade-confidence-routing .box-s-w { font: 400 10px var(--sans,sans-serif); fill: #fff; opacity: 0.85; }
    #fig-guardrails-cascade-confidence-routing .tick-lbl { font: 700 10.5px var(--mono,monospace); }
    #fig-guardrails-cascade-confidence-routing .band-t { font: 700 12px var(--sans,sans-serif); }
    #fig-guardrails-cascade-confidence-routing .band-s { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-cascade-confidence-routing .flow-lbl { font: 700 10.5px var(--sans,sans-serif); }
    #fig-guardrails-cascade-confidence-routing .pct-lbl { font: italic 400 10.5px var(--sans,sans-serif); }
    #fig-guardrails-cascade-confidence-routing .legend-t { font: 700 10px var(--sans,sans-serif); }
    #fig-guardrails-cascade-confidence-routing .legend-s { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-cascade-confidence-routing .cap-band { font: italic 500 12px var(--sans,sans-serif); }
    #fig-guardrails-cascade-confidence-routing .term-t { font: 700 13px var(--sans,sans-serif); fill: #fff; }
    #fig-guardrails-cascade-confidence-routing .term-t-d { font: 700 13px var(--sans,sans-serif); fill: var(--danger,#dc2626); }
  </style>
</defs>

<text x="20" y="22" class="ttl">Confidence-band cascade: escalate only the uncertain minority</text>
<text x="20" y="38" class="sub">a cheap classifier scores every request; only the gray zone pays for the heavy shield model</text>

<g data-anim="1">
  <rect x="592" y="16" width="168" height="62" rx="8" class="v-fill" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="676" y="31" text-anchor="middle" class="legend-t">latency legend</text>
  <text x="604" y="48" class="legend-s">fast path: a few ms</text>
  <text x="604" y="63" class="legend-s">escalation: tens of ms</text>
</g>

<g data-anim="1">
  <text x="390" y="66" text-anchor="middle" class="pct-lbl">every request enters</text>
  <line x1="390" y1="70" x2="390" y2="90" stroke="var(--ink-soft,#45413a)" stroke-width="2" marker-end="url(#gccr-arrow)"/>
  <rect x="240" y="90" width="300" height="54" rx="10" class="v-fill v-stroke" stroke-width="1.6"/>
  <text x="390" y="112" text-anchor="middle" class="box-t">Tiny classifier</text>
  <text x="390" y="129" text-anchor="middle" class="box-s">(110M encoder, &lt;5 ms, high recall)</text>
  <line x1="390" y1="144" x2="390" y2="178" stroke="var(--ink-soft,#45413a)" stroke-width="2" marker-end="url(#gccr-arrow)"/>
  <text x="405" y="164" class="pct-lbl">score</text>
</g>

<g data-anim="2">
  <rect x="60" y="180" width="280" height="26" fill="var(--good,#2f9e6e)" opacity="0.16"/>
  <rect x="340" y="180" width="100" height="26" fill="var(--warn,#e0a106)" opacity="0.24"/>
  <rect x="440" y="180" width="280" height="26" fill="var(--danger,#dc2626)" opacity="0.13"/>
  <rect x="60" y="180" width="660" height="26" fill="none" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
  <line x1="340" y1="180" x2="340" y2="206" stroke="var(--ink-soft,#45413a)" stroke-width="1.8"/>
  <line x1="440" y1="180" x2="440" y2="206" stroke="var(--ink-soft,#45413a)" stroke-width="1.8"/>

  <text x="60" y="222" text-anchor="middle" class="tick-lbl">0</text>
  <text x="340" y="222" text-anchor="middle" class="tick-lbl">tau_low</text>
  <text x="440" y="222" text-anchor="middle" class="tick-lbl">tau_high</text>
  <text x="720" y="222" text-anchor="middle" class="tick-lbl">1</text>

  <text x="200" y="243" text-anchor="middle" class="band-t">clear safe</text>
  <text x="390" y="243" text-anchor="middle" class="band-t" fill="var(--warn,#e0a106)">GRAY ZONE</text>
  <text x="390" y="257" text-anchor="middle" class="band-s">uncertain</text>
  <text x="580" y="243" text-anchor="middle" class="band-t" fill="var(--danger,#dc2626)">clear unsafe</text>
</g>

<g data-anim="3">
  <line x1="200" y1="266" x2="200" y2="440" stroke="var(--ink-soft,#45413a)" stroke-width="2" marker-end="url(#gccr-arrow)"/>
  <text x="200" y="428" text-anchor="middle" class="flow-lbl">PASS</text>

  <line x1="580" y1="266" x2="580" y2="440" stroke="var(--danger,#dc2626)" stroke-width="2" marker-end="url(#gccr-arrow-danger)"/>
  <text x="580" y="428" text-anchor="middle" class="flow-lbl" fill="var(--danger,#dc2626)">BLOCK</text>
</g>

<g data-anim="4">
  <line x1="390" y1="266" x2="390" y2="300" stroke="var(--warn,#e0a106)" stroke-width="2" marker-end="url(#gccr-arrow)"/>
  <text x="404" y="288" text-anchor="start" class="pct-lbl" fill="var(--warn,#e0a106)">~5% escalated</text>

  <rect x="255" y="300" width="270" height="78" rx="10" fill="var(--warn,#e0a106)" fill-opacity="0.08" stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
  <text x="390" y="325" text-anchor="middle" class="box-t">Llama Guard 8B shield</text>
  <text x="390" y="342" text-anchor="middle" class="box-s">(dedicated replica, ~tens of ms)</text>
  <text x="390" y="365" text-anchor="middle" class="box-s" font-style="italic">resolves the gray zone itself</text>

  <line x1="330" y1="378" x2="215" y2="437" stroke="var(--ink-soft,#45413a)" stroke-width="1.8" marker-end="url(#gccr-arrow)"/>
  <text x="245" y="405" text-anchor="middle" class="pct-lbl">pass</text>

  <line x1="450" y1="378" x2="565" y2="437" stroke="var(--danger,#dc2626)" stroke-width="1.8" marker-end="url(#gccr-arrow-danger)"/>
  <text x="535" y="405" text-anchor="middle" class="pct-lbl" fill="var(--danger,#dc2626)">block</text>
</g>

<g data-anim="5">
  <rect x="90" y="440" width="230" height="56" rx="10" fill="var(--accent,#c15b39)" stroke="none"/>
  <text x="205" y="464" text-anchor="middle" class="term-t">Main LLM</text>
  <text x="205" y="481" text-anchor="middle" class="box-s-w">handles the request</text>

  <rect x="460" y="440" width="230" height="56" rx="10" fill="var(--danger,#dc2626)" fill-opacity="0.12" stroke="var(--danger,#dc2626)" stroke-width="1.8"/>
  <text x="575" y="464" text-anchor="middle" class="term-t-d">refuse + log</text>
  <text x="575" y="481" text-anchor="middle" class="box-s" fill="var(--danger,#dc2626)">alert if needed</text>

  <line x1="90" y1="512" x2="320" y2="512" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <line x1="460" y1="512" x2="690" y2="512" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <line x1="90" y1="508" x2="90" y2="512" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <line x1="690" y1="508" x2="690" y2="512" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <text x="390" y="531" text-anchor="middle" class="pct-lbl">~95% resolved on the fast path (illustrative)</text>
</g>

<g data-anim="5">
  <rect x="20" y="546" width="740" height="34" rx="8" class="v-fill" fill="var(--surface-3,#ece7da)" opacity="0.6"/>
  <text x="390" y="567" text-anchor="middle" class="cap-band">spend the expensive model only on the uncertain minority.</text>
</g>

</svg>
<figcaption><b>A tiny classifier resolves nearly all traffic instantly; only the gray zone pays for a heavier shield model.</b> Every request scores against a 110M-parameter encoder in under 5 ms; scores below <code>tau_low</code> or above <code>tau_high</code> are decided immediately, and only the uncertain minority in between escalates to a dedicated Llama Guard 8B replica. The 95%/5% split is illustrative, not a benchmark result -- tune it on your own traffic.</figcaption>
</figure>
