<figcaption><b>The full production data flywheel is a continuously running closed loop — not a sequential pipeline.</b> The Serving Tier (vLLM/TGI) emits logs that enter the Offline Processing panel at Stage 1 (Async Signal Join via Kafka+Flink); data flows through Weak Supervision scoring, Active Learning sampling, Human Annotation, and Replay Buffer assembly (Stages 2–5) before feeding the Retrain DAG (Argo/Kubeflow). The retrained candidate passes through an Eval Gate (CI/CD) and, on success, is deployed back to the Serving Tier, closing the loop. The animated accent pulse traces this macro feedback path; the inner stage arrows show continuous asynchronous data flow through each offline step.</figcaption>
</figure>
