<figure class="viz" id="fig-flash-tiling" style="--sweep:132px;">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 300" role="img" aria-label="FlashAttention streams tiles of K and V through fast SRAM, updating an online-softmax accumulator, so the full L-by-L attention matrix is never written to HBM.">
  <style>
    #fig-flash-tiling text{ fill:var(--ink-soft); }
    #fig-flash-tiling .lbl{ font:600 12px var(--sans,sans-serif); }
    #fig-flash-tiling .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-flash-tiling .mono{ font:500 11px var(--mono,monospace); }
    #fig-flash-tiling .big{ font:600 13px var(--serif,serif); }
  </style>

  
  <text x="112" y="34" text-anchor="middle" class="lbl">The L×L score matrix (tiled)</text>

  
  <g data-anim="1">
    <rect x="24" y="46" width="176" height="176" rx="6" class="v-fill v-grid" stroke-width="1.4"/>
    <g class="v-grid" stroke-width="0.9" opacity="0.8">
      <line x1="68" y1="46" x2="68" y2="222"/><line x1="112" y1="46" x2="112" y2="222"/><line x1="156" y1="46" x2="156" y2="222"/>
      <line x1="24" y1="90" x2="200" y2="90"/><line x1="24" y1="134" x2="200" y2="134"/><line x1="24" y1="178" x2="200" y2="178"/>
    </g>
    
    <rect x="24" y="90" width="176" height="44" fill="var(--accent)" fill-opacity="0.10"/>
    <text x="14" y="116" text-anchor="end" class="mono v-accent" fill="var(--accent)">Qᵢ</text>
    
    <rect class="viz-sweep" x="24" y="90" width="44" height="44" fill="var(--accent)" fill-opacity="0.55" stroke="var(--accent)" stroke-width="1.5"/>
    <text x="46" y="240" text-anchor="middle" class="mono" fill="var(--accent)">Kⱼ,Vⱼ -&gt;</text>
  </g>

  
  <g data-anim="3">
    <text x="112" y="266" text-anchor="middle" class="sm">never written to HBM:</text>
    <text x="112" y="282" text-anchor="middle" class="mono" fill="var(--warn,#e0a106)">materialize S = O(L²)  x</text>
  </g>

  
  <g data-anim="2">
    <line x1="210" y1="112" x2="262" y2="112" stroke="currentColor" class="v-muted" stroke-width="1.4"/>
    <path d="M262 112 l-8 -4 v8 z" fill="currentColor" class="v-muted"/>
    <text x="236" y="103" text-anchor="middle" class="sm">load tile</text>
  </g>

  
  <g data-anim="2">
    <rect x="272" y="54" width="210" height="160" rx="10" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="377" y="46" text-anchor="middle" class="big" fill="var(--good,#2f9e6e)">on-chip SRAM (fast, tiny)</text>
    <rect x="290" y="70" width="44" height="44" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="312" y="97" text-anchor="middle" class="mono" fill="var(--accent)">Qᵢ</text>
    <rect x="344" y="70" width="44" height="44" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="366" y="97" text-anchor="middle" class="mono" fill="var(--accent)">Kⱼ</text>
    <rect x="398" y="70" width="44" height="44" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="420" y="97" text-anchor="middle" class="mono" fill="var(--accent)">Vⱼ</text>
  </g>

  
  <g data-anim="4">
    <rect x="290" y="128" width="174" height="70" rx="6" class="v-fill v-grid" stroke-width="1.2"/>
    <text x="377" y="146" text-anchor="middle" class="sm">online softmax — running state</text>
    <text x="300" y="167" class="mono">mᵢ &lt;- max(mᵢ, rowmax)</text>
    <text x="300" y="183" class="mono">ℓᵢ &lt;- alpha*ℓᵢ + sum(e)</text>
    <text x="300" y="199" class="mono v-accent" fill="var(--accent)">Oᵢ &lt;- alpha*Oᵢ + P*Vⱼ</text>
  </g>

  
  <g data-anim="5">
    <line x1="484" y1="163" x2="540" y2="163" stroke="currentColor" class="v-muted" stroke-width="1.4"/>
    <path d="M540 163 l-8 -4 v8 z" fill="currentColor" class="v-muted"/>
    <rect x="548" y="120" width="150" height="86" rx="8" class="v-fill v-grid" stroke-width="1.3"/>
    <text x="623" y="112" text-anchor="middle" class="sm">HBM (large, slower)</text>
    <text x="623" y="150" text-anchor="middle" class="big" fill="var(--good,#2f9e6e)">write Oᵢ once</text>
    <text x="623" y="172" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">O(L·d)  OK</text>
    <text x="623" y="190" text-anchor="middle" class="sm">Q,K,V also live here</text>
  </g>
</svg>
<figcaption><b>FlashAttention keeps the big matrix off HBM.</b> For each query block <span class="mono">Qᵢ</span>, blocks of keys/values stream through fast on-chip SRAM while an <b>online softmax</b> incrementally updates the running max <span class="mono">m</span>, normalizer <span class="mono">ℓ</span>, and output <span class="mono">O</span>. Only the final <span class="mono">Oᵢ</span> (size <span class="mono">L·d</span>) is written back — the <span class="mono">L²</span> score matrix is never materialized, eliminating the &#920;(L²) HBM traffic that dominates the naive kernel (the kernel remains memory-bound; it just moves far fewer bytes).</figcaption>
</figure>
