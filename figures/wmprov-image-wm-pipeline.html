<figure class="viz" id="fig-wmprov-image-wm-pipeline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 620" role="img" aria-label="Image watermark embedding and detection pipeline: a prompt feeds a diffusion model producing a raw image, which a watermark encoder NN embeds a steganographic signal into, producing a watermarked image. The watermarked image then takes two paths: a lossy channel (JPEG/resize/crop) producing a degraded image fed to a decoder NN, and an ideal channel fed directly to a decoder NN. Both decoders output a bit string plus p-value.">
<defs>
  <marker id="wip-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="wip-arr-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <marker id="wip-arr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#7c3aed)"/>
  </marker>
  <marker id="wip-arr-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
</defs>
<style>
  #fig-wmprov-image-wm-pipeline text { fill: var(--ink-soft,#333); }
  #fig-wmprov-image-wm-pipeline .lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-wmprov-image-wm-pipeline .sub { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-wmprov-image-wm-pipeline .sub-acc { font: 400 9px var(--sans,sans-serif); fill: rgba(255,255,255,0.8); }
  #fig-wmprov-image-wm-pipeline .edge-lbl { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-wmprov-image-wm-pipeline .acc-lbl { font: 600 13px var(--sans,sans-serif); fill: #fff; }
  #fig-wmprov-image-wm-pipeline .ok-lbl { font: 600 12px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }

  /* animated flow dot */
  @media (prefers-reduced-motion: no-preference) {
    #fig-wmprov-image-wm-pipeline .flow-dot { animation: wip-travel 4s ease-in-out infinite; }
    #fig-wmprov-image-wm-pipeline .flow-dot-l { animation: wip-travel-l 4s ease-in-out infinite; animation-delay: 2s; }
    #fig-wmprov-image-wm-pipeline .flow-dot-r { animation: wip-travel-r 4s ease-in-out infinite; animation-delay: 2s; }
    #fig-wmprov-image-wm-pipeline .dot-flicker { animation: wip-flicker 0.4s ease-in-out 3; animation-delay: 2.6s; }
    @keyframes wip-travel {
      0%   { transform: translate(0,0); opacity:0; }
      5%   { opacity:1; }
      20%  { transform: translate(170px,0); opacity:1; }
      35%  { transform: translate(340px,0); opacity:1; }
      50%  { transform: translate(340px,100px); opacity:1; }
      65%  { transform: translate(340px,190px); opacity:1; }
      75%  { opacity:1; }
      80%  { transform: translate(340px,240px); opacity:0; }
      100% { transform: translate(340px,240px); opacity:0; }
    }
    @keyframes wip-travel-l {
      0%   { transform: translate(0,0); opacity:0; }
      5%   { opacity:1; }
      25%  { transform: translate(-250px,80px); opacity:1; }
      50%  { transform: translate(-250px,160px); opacity:1; }
      75%  { transform: translate(-250px,240px); opacity:1; }
      90%  { transform: translate(-250px,320px); opacity:1; }
      95%  { opacity:1; }
      100% { transform: translate(-250px,320px); opacity:0; }
    }
    @keyframes wip-travel-r {
      0%   { transform: translate(0,0); opacity:0; }
      5%   { opacity:1; }
      30%  { transform: translate(150px,80px); opacity:1; }
      60%  { transform: translate(150px,160px); opacity:1; }
      90%  { transform: translate(150px,240px); opacity:1; }
      95%  { opacity:1; }
      100% { transform: translate(150px,240px); opacity:0; }
    }
    @keyframes wip-flicker {
      0%,100% { opacity:1; r:5; }
      50%      { opacity:0.3; r:8; }
    }
  }
</style>


<g data-anim="1">
  
  <rect x="30" y="30" width="100" height="40" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <text x="80" y="55" text-anchor="middle" class="lbl">Prompt</text>
  
  <line x1="130" y1="50" x2="190" y2="50" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wip-arr)"/>
  
  <rect x="192" y="30" width="120" height="40" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <text x="252" y="55" text-anchor="middle" class="lbl">Diffusion</text>
  
  <line x1="312" y1="50" x2="372" y2="50" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wip-arr)"/>
  
  <rect x="374" y="25" width="165" height="50" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <text x="456" y="50" text-anchor="middle" class="lbl">Raw image</text>
  <text x="456" y="65" text-anchor="middle" class="sub">H × W × 3</text>
</g>


<g data-anim="2">
  <line x1="456" y1="75" x2="456" y2="125" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wip-arr-acc)"/>

  
  <rect x="356" y="127" width="200" height="56" rx="10" fill="var(--accent,#7c3aed)" stroke="var(--accent,#7c3aed)" stroke-width="1.5"/>
  <text x="456" y="152" text-anchor="middle" class="acc-lbl">WM encoder NN</text>
  <text x="456" y="167" text-anchor="middle" class="sub-acc">adds steganographic signal</text>
</g>


<g data-anim="2">
  <line x1="456" y1="183" x2="456" y2="228" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wip-arr)"/>

  
  <rect x="336" y="230" width="240" height="46" rx="8" fill="var(--surface-3,#ede9fe)" stroke="var(--accent,#7c3aed)" stroke-width="1.8"/>
  <text x="456" y="258" text-anchor="middle" class="lbl" fill="var(--accent,#7c3aed)">Watermarked image</text>
</g>


<g data-anim="3">
  <line x1="456" y1="276" x2="456" y2="300" stroke="var(--ink-soft,#555)" stroke-width="1.5"/>
  
  <line x1="220" y1="300" x2="620" y2="300" stroke="var(--ink-soft,#555)" stroke-width="1.5"/>
  
  <line x1="220" y1="300" x2="220" y2="328" stroke="var(--warn,#e0a106)" stroke-width="1.5" marker-end="url(#wip-arr-warn)"/>
  
  <line x1="620" y1="300" x2="620" y2="378" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wip-arr)"/>

  
  <text x="150" y="318" text-anchor="middle" class="edge-lbl" fill="var(--warn,#e0a106)">lossy channel</text>
  <text x="685" y="318" text-anchor="middle" class="edge-lbl">(ideal channel)</text>
</g>


<g data-anim="4">
  
  <rect x="120" y="330" width="200" height="46" rx="8" fill="var(--warn,rgba(224,161,6,0.12))" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <text x="220" y="353" text-anchor="middle" class="lbl" fill="var(--warn,#e0a106)">JPEG / resize / crop</text>
  <text x="220" y="368" text-anchor="middle" class="sub">adversarial degradations</text>

  
  <line x1="220" y1="376" x2="220" y2="405" stroke="var(--warn,#e0a106)" stroke-width="1.5" marker-end="url(#wip-arr-warn)"/>

  
  <rect x="120" y="407" width="200" height="40" rx="8" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <text x="220" y="432" text-anchor="middle" class="lbl">Degraded image</text>

  
  <line x1="220" y1="447" x2="220" y2="476" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wip-arr-acc)"/>

  
  <rect x="120" y="478" width="200" height="50" rx="10" fill="var(--accent,#7c3aed)" stroke="var(--accent,#7c3aed)" stroke-width="1.5"/>
  <text x="220" y="501" text-anchor="middle" class="acc-lbl">WM decoder NN</text>
  <text x="220" y="516" text-anchor="middle" class="sub-acc">projects onto detection vector</text>

  
  <line x1="220" y1="528" x2="220" y2="557" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wip-arr-ok)"/>

  
  <rect x="105" y="559" width="230" height="40" rx="8" fill="var(--surface-3,#f0faf5)" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="220" y="584" text-anchor="middle" class="ok-lbl">Bit string + p-value</text>
</g>


<g data-anim="4">
  
  <rect x="520" y="380" width="200" height="50" rx="10" fill="var(--accent,#7c3aed)" stroke="var(--accent,#7c3aed)" stroke-width="1.5"/>
  <text x="620" y="403" text-anchor="middle" class="acc-lbl">WM decoder NN</text>
  <text x="620" y="418" text-anchor="middle" class="sub-acc">projects onto detection vector</text>

  
  <line x1="620" y1="430" x2="620" y2="459" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wip-arr-ok)"/>

  
  <rect x="505" y="461" width="230" height="40" rx="8" fill="var(--surface-3,#f0faf5)" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="620" y="486" text-anchor="middle" class="ok-lbl">Bit string + p-value</text>
</g>


<g data-anim="5" class="flow-dot">
  <circle cx="80" cy="50" r="5" fill="var(--accent,#7c3aed)" opacity="0.9"/>
</g>


<g data-anim="5">
  
  <circle class="flow-dot-l" cx="456" cy="276" r="5" fill="var(--warn,#e0a106)" opacity="0"/>
  
  <circle class="flow-dot-r" cx="456" cy="276" r="5" fill="var(--good,#2f9e6e)" opacity="0"/>
</g>
</svg>
<figcaption><b>Image watermark embedding and detection under two channel conditions.</b> A diffusion model's output passes through a watermark encoder neural network that embeds a near-invisible steganographic signal. At detection time the watermarked image may traverse a lossy channel (JPEG compression, resizing, cropping) that degrades it before the decoder network, or it may reach the decoder unmodified via an ideal channel. Both paths produce a bit string and a p-value for statistical verification; the robustness gap between the two paths is the core engineering challenge in watermark design.</figcaption>
</figure>
