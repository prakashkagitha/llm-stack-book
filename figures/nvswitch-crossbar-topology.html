<text x="620" y="186" text-anchor="middle" class="bw-num">~900 GB/s</text>
<text x="620" y="200" text-anchor="middle" class="bw-sub">per GPU (bidirectional)</text>

<line x1="530" y1="212" x2="710" y2="212" stroke="var(--border-2,#ccc)" stroke-width="0.8"/>

<text x="620" y="228" text-anchor="middle" class="bw-num">~3.6 TB/s</text>
<text x="620" y="242" text-anchor="middle" class="bw-sub">aggregate all-to-all</text>

<line x1="530" y1="254" x2="710" y2="254" stroke="var(--border-2,#ccc)" stroke-width="0.8"/>

<text x="620" y="270" text-anchor="middle" class="bw-sub">vs. PCIe Gen 5:</text>
<text x="620" y="283" text-anchor="middle" class="bw-sub">~128 GB/s (7x slower)</text>


<line x1="482" y1="268" x2="508" y2="268" stroke="var(--good,#2f9e6e)" stroke-width="1.5" marker-end="url(#nct-arrow)"/>


<rect x="510" y="320" width="230" height="80" rx="6" fill="var(--surface,#f5f5f5)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<text x="625" y="340" text-anchor="middle" style="font:600 10.5px var(--sans,sans-serif)">NCCL on NVSwitch:</text>
<text x="625" y="355" text-anchor="middle" class="lbl-xs muted">One-shot reduce across fabric —</text>
<text x="625" y="368" text-anchor="middle" class="lbl-xs muted">no sequential ring needed</text>
<text x="625" y="381" text-anchor="middle" class="lbl-xs muted">(every GPU is a direct neighbor)</text>


<text x="375" y="497" text-anchor="middle" class="cap-it">Every GPU can talk to every other GPU simultaneously at full NVLink speed.</text>
<text x="375" y="511" text-anchor="middle" class="cap-it">NCCL exploits this with a one-shot reduce across the switch fabric, bypassing the sequential ring.</text>
</svg>
<figcaption><b>DGX H100 intra-node topology: 8 GPUs through a 4x NVSwitch 3.0 crossbar.</b> Each GPU has its own independent full-bandwidth NVLink connection to the switch fabric (8 distinct lines, not a shared bus), giving every GPU direct access to every other GPU simultaneously at ~900 GB/s. This non-blocking all-to-all topology lets NCCL use a single-step reduce pattern across the fabric rather than the sequential ring algorithm used over slower inter-node InfiniBand.</figcaption>
</figure>
