    <text x="46" y="917" class="mono-s" fill="var(--accent2,#3b82f6)">Token-vs-character subtlety: the 2-character token '27' is allowed HERE at q0 (its span lands on q2,</text>
    <text x="46" y="932" class="mono-s" fill="var(--accent2,#3b82f6)">still alive) and stays allowed through q2 -- but at q3 the SAME token is masked to -inf: only one digit</text>
