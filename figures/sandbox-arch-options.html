<figure class="viz" id="fig-sandbox-arch-options">
<svg viewBox="0 0 660 470" role="img" aria-label="Three sandbox architectures compared: Option A uses Docker per-sample (simple but 200-500ms overhead), Option B uses a reusable Firecracker microVM pool via gRPC (preferred, 10-30ms), Option C uses seccomp plus cgroups in-process (fastest but riskier isolation).">
<defs>
  <marker id="sao-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
</defs>
<style>
  #fig-sandbox-arch-options .lbl     { font: 600 12px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-sandbox-arch-options .title   { font: 700 13px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-sandbox-arch-options .sub     { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sandbox-arch-options .sub-tag { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

  #fig-sandbox-arch-options .lat-fast { font: 600 11px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
  #fig-sandbox-arch-options .lat-warn { font: 600 11px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-sandbox-arch-options .mono    { font: 500 10.5px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-sandbox-arch-options .badge   { font: 700 9px var(--sans,sans-serif); fill: var(--accent2,#3b6fd4); }
  #fig-sandbox-arch-options .legend  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
</style>


<rect x="10" y="10" width="640" height="126" rx="10"
      fill="var(--surface,#f7f7fb)" stroke="var(--border-2,#d0d0da)" stroke-width="1.2"/>
<text x="22" y="30" class="title">Option A</text>
<text x="96" y="30" class="sub-tag"> — Docker per-sample  (simple, slow)</text>


<rect x="22" y="42" width="138" height="52" rx="7"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cfcfdb)" stroke-width="1.3"/>
<text x="91" y="64" text-anchor="middle" class="lbl">Reward Server</text>
<text x="91" y="80" text-anchor="middle" class="sub">(Python)</text>

<line x1="160" y1="68" x2="200" y2="68"
      stroke="var(--ink-soft,#45413a)" stroke-width="1.5" marker-end="url(#sao-arr)"/>


<rect x="202" y="42" width="208" height="52" rx="7"
      fill="var(--surface,#fff)" stroke="var(--muted,#8a8a99)" stroke-width="1.3" stroke-dasharray="5 3"/>
<text x="306" y="62" text-anchor="middle" class="lbl">docker run --rm ...</text>
<text x="306" y="78" text-anchor="middle" class="sub">generated code + tests</text>


<text x="426" y="60" class="lat-slow">~200-500 ms</text>
<text x="426" y="76" class="lat-slow">per sample</text>


<text x="22" y="110" class="legend">Isolation: strong (full container)  |  Security: good</text>
<text x="22" y="124" class="legend">Simplest to set up; per-run container startup cost dominates at scale.</text>


<rect x="10" y="144" width="640" height="134" rx="10"
      fill="var(--surface-3,#e8eefc)" stroke="var(--accent2,#3b6fd4)" stroke-width="1.8"/>


<rect x="566" y="150" width="74" height="18" rx="5"
      fill="var(--accent2,#3b6fd4)" opacity="0.15" stroke="var(--accent2,#3b6fd4)" stroke-width="1"/>
<text x="603" y="163" text-anchor="middle" class="badge">PREFERRED</text>

<text x="22" y="164" class="title">Option B</text>
<text x="96" y="164" class="sub-tag"> — Reusable microVM  (fast, preferred for scale)</text>


<rect x="22" y="176" width="138" height="48" rx="7"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cfcfdb)" stroke-width="1.3"/>
<text x="91" y="204" text-anchor="middle" class="lbl">Reward Server</text>

<line x1="160" y1="200" x2="200" y2="200"
      stroke="var(--ink-soft,#45413a)" stroke-width="1.5" marker-end="url(#sao-arr)"/>
<text x="180" y="193" text-anchor="middle" class="sub">gRPC</text>


<rect x="210" y="182" width="186" height="40" rx="6"
      fill="var(--surface-3,#eef0f6)" stroke="var(--border-2,#cfcfdb)" stroke-width="1"/>
<rect x="205" y="178" width="186" height="40" rx="6"
      fill="var(--surface-3,#eef0f6)" stroke="var(--border-2,#cfcfdb)" stroke-width="1"/>
<rect x="200" y="174" width="186" height="40" rx="6"
      fill="var(--surface,#fff)" stroke="var(--accent2,#3b6fd4)" stroke-width="1.6"/>
<text x="293" y="190" text-anchor="middle" class="lbl" fill="var(--accent2,#3b6fd4)">Firecracker MicroVM</text>
<text x="293" y="206" text-anchor="middle" class="sub">Pool — snapshotted state</text>

<text x="404" y="194" class="lat-fast">~10-30 ms</text>
<text x="404" y="210" class="lat-fast">per sample</text>


<text x="22" y="242" class="legend">Isolation: strong (hardware VM)  |  Security: very good  |  Speed: fast</text>
<text x="22" y="256" class="legend">Snapshot restore reuses clean state; warm pool eliminates per-run startup cost.</text>
<text x="22" y="270" class="legend">Size pool = throughput / per-worker capacity, with 2-3x headroom.</text>


<rect x="10" y="302" width="640" height="144" rx="10"
      fill="var(--surface,#f7f7fb)" stroke="var(--border-2,#d0d0da)" stroke-width="1.2"/>
<text x="22" y="322" class="title">Option C</text>
<text x="96" y="322"><tspan class="sub-tag"> — seccomp + cgroups in-process &#160; (fast, </tspan><tspan class="lat-warn">riskier</tspan><tspan class="sub-tag">)</tspan></text>


<rect x="22" y="332" width="480" height="80" rx="7"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cfcfdb)" stroke-width="1.3"/>
<text x="262" y="352" text-anchor="middle" class="lbl">Reward Worker Process</text>

<rect x="32" y="360" width="460" height="20" rx="4"
      fill="var(--surface-3,#eef0f6)" stroke="none"/>
<text x="42" y="374" class="mono">fork() -&gt; install seccomp-BPF -&gt; exec code</text>

<rect x="32" y="383" width="460" height="20" rx="4"
      fill="var(--surface-3,#eef0f6)" stroke="none"/>
<text x="42" y="397" class="mono">cgroup v2: 512 MB RAM, 1 CPU, 5s wall-clock</text>


<text x="516" y="360" class="lat-fast">fastest</text>
<text x="516" y="376" class="sub">(in-process)</text>


<text x="22" y="424" class="legend">Isolation: partial (same OS kernel)  |  Security: moderate (kernel exploits possible)</text>
<text x="22" y="438" class="legend">Trusted infra only; seccomp-BPF filters syscalls; cgroup v2 caps CPU/RAM/wall-time.</text>


<text x="330" y="462" text-anchor="middle" class="legend">
  isolation strength: A (strongest) -- B -- C (weakest)    speed: A (slowest) -- B -- C (fastest)
</text>

</svg>
<figcaption><b>Three sandbox architectures for code-execution rewards, ordered by isolation vs. speed tradeoff.</b> Option A (Docker per-sample) is the simplest but incurs 200-500 ms per-run overhead. Option B (Firecracker microVM warm pool, gRPC) is the recommended production choice at 10-30 ms per sample. Option C (seccomp+cgroups in-process) is fastest but provides only partial kernel-level isolation.</figcaption>
</figure>
