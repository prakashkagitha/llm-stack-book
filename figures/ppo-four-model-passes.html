<figure class="viz" id="fig-ppo-four-model-passes">
<svg viewBox="0 0 820 470" role="img" aria-label="The four model passes of a PPO step: the policy (actor) samples a response; reward model, value critic, and frozen reference model each consume the tokens and produce outputs that combine into the advantage estimate.">

  <marker id="fmp-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6c8cff)"/>
  </marker>
</defs>
<style>

  stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="158" y="192" text-anchor="middle" class="lbl bold" style="font-size:13px">REWARD MODEL  R</text>

<text x="400" y="232" text-anchor="middle" class="small t-acc" style="font-size:10px">[trained — 2nd trained model]</text>

<text x="400" y="335" text-anchor="middle" class="mono bold t-acc" style="font-size:12px">advantage  A_t = (return) - V(s_t)</text>
<text x="400" y="351" text-anchor="middle" class="small t-muted" style="font-size:9.5px">KL penalty folds into per-token reward, GAE propagates to return, V(s_t) is the baseline</text>


<rect x="14" y="376" width="792" height="80" rx="6"
  fill="var(--surface-3,#eef0f4)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<text x="410" y="400" text-anchor="middle" class="mono bold" style="font-size:12px; fill:var(--ink-soft,#555)">FOUR model passes per step:</text>
<text x="410" y="418" text-anchor="middle" class="mono" style="font-size:11px"><tspan fill="var(--accent,#6c8cff)" font-weight="700">policy (actor)</tspan><tspan fill="var(--ink-soft,#888)" dx="6">|</tspan><tspan fill="var(--accent,#6c8cff)" font-weight="700" dx="6">critic (value net)</tspan><tspan fill="var(--ink-soft,#888)" dx="6">|</tspan><tspan fill="var(--muted,#999)" dx="6">reward model [frozen]</tspan><tspan fill="var(--ink-soft,#888)" dx="6">|</tspan><tspan fill="var(--muted,#999)" dx="6">reference model [frozen]</tspan></text>
<text x="410" y="440" text-anchor="middle" class="small t-muted" style="font-size:10px">trained models = solid accent border;   frozen models = dashed neutral border + [frozen] tag</text>
</svg>
<figcaption><b>Four model passes per PPO step, two trained and two frozen.</b> The policy (actor) samples a response; the reward model scores it with a single scalar at EOS; the value net (critic) predicts per-token value estimates as a baseline; the frozen reference model provides log-probabilities for the KL penalty. All four outputs combine into the advantage A_t = return − V(s_t), the gradient signal the policy is trained on — making PPO roughly 4× the memory footprint of simple SFT.</figcaption>
</figure>
