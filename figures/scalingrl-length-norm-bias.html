  <text x="400" y="527" text-anchor="middle" class="foot">The normalizer is not cosmetic &#8212; it encodes a length policy.</text>

<figcaption><b>Dividing a wrong trajectory's loss by its length shrinks the per-token penalty as the trajectory gets longer, so the gradient rewards rambling when wrong.</b> Vanilla GRPO's per-sequence length normalization gives the short trajectory a per-token penalty three times larger than the long one for the same underlying advantage; Dr. GRPO's constant normalizer (or DAPO's token-level mean) gives every token the same penalty regardless of sequence length, removing that incentive.</figcaption>
</figure>
