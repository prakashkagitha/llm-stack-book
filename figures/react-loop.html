<figure class="viz" id="fig-react-loop">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 470" role="img" aria-label="The ReAct agent loop as a cycle: the LLM emits a Thought then an Action (tool call), the environment returns an Observation that is appended to the context, and the loop repeats until the model calls finish() to emit a Final Answer.">
  <defs>
    <marker id="rl-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-react-loop text{ fill:var(--ink-soft); }
    #fig-react-loop .node{ font:700 14px var(--sans,sans-serif); }
    #fig-react-loop .role{ font:700 9.5px var(--mono,monospace); fill:var(--muted); }
    #fig-react-loop .sub{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-react-loop .edge{ font:600 11px var(--sans,sans-serif); }
    #fig-react-loop .mono{ font:600 11px var(--mono,monospace); }
    #fig-react-loop .small{ font:500 9.5px var(--mono,monospace); fill:var(--muted); }
    #fig-react-loop .cap{ font:600 10px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <circle cx="360" cy="220" r="76" class="v-fill v-accent-s" stroke-width="2"/>
    <text x="360" y="206" text-anchor="middle" class="node" fill="var(--accent)">LLM</text>
    <text x="360" y="226" text-anchor="middle" class="sub">frozen policy</text>
    <text x="360" y="244" text-anchor="middle" class="mono" fill="var(--accent)">π(·|c_t)</text>
  </g>

  
  <g data-anim="2">
    <rect x="270" y="22" width="180" height="58" rx="10" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="284" y="14" class="role">REASONING</text>
    <text x="360" y="46" text-anchor="middle" class="node">Thought</text>
    <text x="360" y="64" text-anchor="middle" class="sub">chain-of-thought, not sent to a tool</text>
  </g>

  
  <g data-anim="3">
    <rect x="512" y="180" width="186" height="64" rx="10" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="526" y="172" class="role">TOOL CALL</text>
    <text x="605" y="206" text-anchor="middle" class="node">Action</text>
    <text x="605" y="226" text-anchor="middle" class="mono" fill="var(--accent)">search("Tokyo pop")</text>
  </g>

  
  <g data-anim="3">
    <rect x="556" y="296" width="150" height="76" rx="10" fill="var(--accent2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
    <text x="568" y="288" class="role" fill="var(--accent2,#3b82f6)">ENVIRONMENT</text>
    <text x="631" y="324" text-anchor="middle" class="node" fill="var(--accent2,#3b82f6)">tools</text>
    <text x="631" y="343" text-anchor="middle" class="small">search · calc</text>
    <text x="631" y="357" text-anchor="middle" class="small">code · APIs</text>
  </g>

  
  <g data-anim="4">
    <rect x="222" y="360" width="246" height="64" rx="10" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="236" y="352" class="role">GROUND TRUTH</text>
    <text x="345" y="386" text-anchor="middle" class="node">Observation</text>
    <text x="345" y="406" text-anchor="middle" class="sub">real result, injected by the harness</text>
  </g>

  

  
  <g data-anim="3">
    <path d="M430 184 Q486 168 540 180" fill="none" stroke="currentColor" class="v-muted" stroke-width="1.7" marker-end="url(#rl-arrow)"/>
    <text x="486" y="158" text-anchor="middle" class="edge">emit Action</text>
  </g>

  
  <g data-anim="3">
    <path d="M610 246 Q620 272 627 290" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.7" marker-end="url(#rl-arrow)"/>
    <text x="668" y="272" text-anchor="middle" class="edge" fill="var(--accent2,#3b82f6)">execute</text>
  </g>

  
  <g data-anim="4">
    <path d="M555 360 Q486 392 472 392" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.7" marker-end="url(#rl-arrow)"/>
    <text x="486" y="352" text-anchor="middle" class="edge" fill="var(--accent2,#3b82f6)">returns o_t</text>
  </g>

  
  <g data-anim="4">
    <path d="M250 360 Q196 300 290 256" fill="none" stroke="currentColor" class="v-muted" stroke-width="1.7" marker-end="url(#rl-arrow)"/>
    <text x="150" y="300" text-anchor="middle" class="edge">append</text>
    <text x="150" y="316" text-anchor="middle" class="mono">(a_t, o_t)</text>
    <text x="150" y="332" text-anchor="middle" class="sub">to context c_t</text>
  </g>

  
  <g data-anim="2">
    <path d="M360 82 V138" fill="none" stroke="currentColor" class="v-muted" stroke-width="1.7" marker-end="url(#rl-arrow)"/>
    <text x="372" y="116" class="edge">think</text>
  </g>

  
  <g data-anim="4">
    <text x="150" y="356" text-anchor="middle" class="cap">repeat until finish()</text>
  </g>

  
  <g data-anim="5">
    <path d="M286 56 Q150 70 96 132" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#rl-arrow)"/>
    <text x="150" y="86" text-anchor="middle" class="edge" fill="var(--good,#2f9e6e)">finish(answer)</text>

    <rect x="16" y="138" width="156" height="62" rx="10" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
    <text x="94" y="164" text-anchor="middle" class="node" fill="var(--good,#2f9e6e)">Final Answer</text>
    <text x="94" y="184" text-anchor="middle" class="sub">loop terminates</text>
  </g>

  
  <g data-anim="5">
    <text x="94" y="226" text-anchor="middle" class="cap">or t &gt; T_max (safety cap)</text>
  </g>

</svg>
<figcaption><b>ReAct closes the loop: think, act, observe, repeat.</b> The <b>LLM</b> emits a <b>Thought</b> (internal reasoning, never sent to a tool) and one <b>Action</b>; the <b>environment</b> executes it and returns a real <b>Observation</b>, which is appended to the context <span class="mono">c_t</span> before the next step. The cycle repeats until the model calls <span class="mono">finish()</span> — or a hard step limit <span class="mono">T_max</span> fires — yielding the Final Answer.</figcaption>
</figure>
