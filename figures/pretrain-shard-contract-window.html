<figcaption><b>The uint16 shard is a two-sided contract, from the write side to the read side.</b> <code>prepare.py</code> tokenizes text and writes each ID as exactly 2 bytes (<code>dtype=uint16</code>, safe because vocab 50304 &lt; 65536); <code>ShardedTokenLoader</code> must memmap that same file with the identical <code>uint16</code> dtype or every ID silently wraps. From that byte stream it slices one <code>(ctx+1)</code>-token window <code>w</code> and derives <code>x = w[:-1]</code> and <code>y = w[1:]</code> — the diagonal connectors show the one-position shift that turns "next token" into a training target; skip it and the loss sticks at <code>ln(vocab)</code>.</figcaption>
</figure>
