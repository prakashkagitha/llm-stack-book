<figure class="viz" id="fig-syndata-grounding-spectrum">
<svg viewBox="0 0 860 310" role="img" aria-label="The synthetic-data grounding spectrum: four stages from source-grounded rephrasing on the left (low risk) to free-generation on the right (high risk).">
  <defs>
    <linearGradient id="sgs-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="var(--good,#2b8a6f)"/>
      <stop offset="100%" stop-color="var(--warn,#c2410c)"/>
    </linearGradient>
  </defs>
  <style>
    #fig-syndata-grounding-spectrum text  { fill: var(--ink-soft,#374151); }
    #fig-syndata-grounding-spectrum .ttl  { font: 700 10.5px var(--sans,sans-serif); }
    #fig-syndata-grounding-spectrum .sub  { font: 400 8.5px var(--mono,monospace);  fill: var(--muted,#6b7280); }
    #fig-syndata-grounding-spectrum .body { font: 400 8.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-syndata-grounding-spectrum .axl  { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-syndata-grounding-spectrum .foot { font: 400 8px var(--sans,sans-serif);   fill: var(--muted,#6b7280); }
  </style>

  
  <rect x="12" y="34" width="800" height="10" rx="5" fill="url(#sgs-grad)" opacity="0.85"/>
  <polygon points="810,27 830,39 810,51" fill="var(--warn,#c2410c)" opacity="0.85"/>
  <text x="14"  y="24" class="axl" text-anchor="start">Source-grounded (low risk)</text>
  <text x="808" y="24" class="axl" text-anchor="end">Free-generation (high risk)</text>

  
  
  <rect x="12"  y="58" width="190" height="148" rx="7" class="v-fill" stroke="var(--good,#2b8a6f)"  stroke-width="1.8"/>
  <text x="107" y="77"  text-anchor="middle" class="ttl" fill="var(--good,#2b8a6f)">Rephrase / restyle</text>
  <text x="107" y="89"  text-anchor="middle" class="sub">(WRAP)</text>
  <line x1="22"  y1="95"  x2="192" y2="95"  stroke="var(--good,#2b8a6f)" stroke-width="0.5" opacity="0.25"/>
  <text x="107" y="109" text-anchor="middle" class="body">Rewrite a real doc;</text>
  <text x="107" y="121" text-anchor="middle" class="body">clean style. All facts</text>
  <text x="107" y="133" text-anchor="middle" class="body">traceable to source.</text>

  
  <rect x="212" y="58" width="190" height="148" rx="7" class="v-fill" stroke="var(--accent,#059669)" stroke-width="1.8"/>
  <text x="307" y="75"  text-anchor="middle" class="ttl" fill="var(--accent,#059669)">Knowledge-</text>
  <text x="307" y="87"  text-anchor="middle" class="ttl" fill="var(--accent,#059669)">augmented</text>
  <text x="307" y="99"  text-anchor="middle" class="sub">(add facts, Q&amp;A,</text>
  <text x="307" y="109" text-anchor="middle" class="sub">worked examples)</text>
  <line x1="222" y1="115" x2="392" y2="115" stroke="var(--accent,#059669)" stroke-width="0.5" opacity="0.25"/>
  <text x="307" y="129" text-anchor="middle" class="body">Seed: real passage +</text>
  <text x="307" y="141" text-anchor="middle" class="body">model-added structure.</text>
  <text x="307" y="153" text-anchor="middle" class="body">Extras not grounded.</text>

  
  <rect x="412" y="58" width="190" height="148" rx="7" class="v-fill" stroke="var(--warn,#e0a106)"  stroke-width="1.8"/>
  <text x="507" y="75"  text-anchor="middle" class="ttl" fill="var(--warn,#b45309)">Instruction / QA</text>
  <text x="507" y="87"  text-anchor="middle" class="ttl" fill="var(--warn,#b45309)">from a passage</text>
  <text x="507" y="99"  text-anchor="middle" class="sub">(grounded reading-</text>
  <text x="507" y="109" text-anchor="middle" class="sub">comprehension)</text>
  <line x1="422" y1="115" x2="592" y2="115" stroke="var(--warn,#e0a106)" stroke-width="0.5" opacity="0.25"/>
  <text x="507" y="129" text-anchor="middle" class="body">Questions answered by</text>
  <text x="507" y="141" text-anchor="middle" class="body">extracting from passage.</text>
  <text x="507" y="153" text-anchor="middle" class="body">Doc-seeded; reformatted.</text>

  
  <rect x="612" y="58" width="238" height="148" rx="7" class="v-fill" stroke="var(--warn,#c2410c)"  stroke-width="2"/>
  <text x="731" y="75"  text-anchor="middle" class="ttl" fill="var(--warn,#c2410c)">Pure textbook /</text>
  <text x="731" y="87"  text-anchor="middle" class="ttl" fill="var(--warn,#c2410c)">curated-prompt gen</text>
  <text x="731" y="99"  text-anchor="middle" class="sub">(Phi, Cosmopedia)</text>
  <line x1="622" y1="105" x2="840" y2="105" stroke="var(--warn,#c2410c)" stroke-width="0.5" opacity="0.25"/>
  <text x="731" y="119" text-anchor="middle" class="body">Topic-prompt only;</text>
  <text x="731" y="131" text-anchor="middle" class="body">writes from parametric</text>
  <text x="731" y="143" text-anchor="middle" class="body">memory. Highest pedagogy,</text>
  <text x="731" y="155" text-anchor="middle" class="body">highest hallucination risk.</text>

  
  
  <line x1="207" y1="206" x2="207" y2="230" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.35"/>
  <polygon points="203,206 211,206 207,212" fill="currentColor" opacity="0.28"/>
  <text x="207" y="242" text-anchor="middle" class="foot">grounded — every fact</text>
  <text x="207" y="253" text-anchor="middle" class="foot">traceable to a real doc</text>

  
  <line x1="507" y1="206" x2="507" y2="230" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.35"/>
  <polygon points="503,206 511,206 507,212" fill="currentColor" opacity="0.28"/>
  <text x="507" y="242" text-anchor="middle" class="foot">seeded by a doc</text>
  <text x="507" y="253" text-anchor="middle" class="foot">but reformatted</text>

  
  <line x1="731" y1="206" x2="731" y2="230" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.35"/>
  <polygon points="727,206 735,206 731,212" fill="currentColor" opacity="0.28"/>
  <text x="731" y="242" text-anchor="middle" class="foot">seeded only</text>
  <text x="731" y="253" text-anchor="middle" class="foot">by a topic prompt</text>

  
  <text x="430" y="290" text-anchor="middle" class="foot">Increasing departure from human-written source means more value AND more risk</text>
</svg>
<figcaption><b>The synthetic-data grounding spectrum.</b> Four recipe families span a single risk axis: at the safe left end, rephrase/restyle (WRAP) inherits all facts from the source; at the risky right end, pure textbook generation (Phi, Cosmopedia) writes entirely from parametric memory. The further a recipe departs from a human-written source, the more pedagogical density it can achieve — and the more hallucination risk it accumulates.</figcaption>
</figure>
