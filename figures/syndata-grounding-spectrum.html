<figure class="viz" id="fig-syndata-grounding-spectrum">
<svg viewBox="0 0 860 340" role="img" aria-label="The synthetic-data grounding spectrum: four stages from source-grounded rephrasing on the left (low risk) to free-generation on the right (high risk).">
  <defs>
    <linearGradient id="sgs-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="var(--good,#2b8a6f)"/>
      <stop offset="100%" stop-color="var(--warn,#c2410c)"/>
    </linearGradient>
  </defs>
  <style>
    #fig-syndata-grounding-spectrum text  { fill: var(--ink-soft,#374151); }
    #fig-syndata-grounding-spectrum .ttl  { font: 700 11px var(--sans,sans-serif); }
    #fig-syndata-grounding-spectrum .sub  { font: 400 8.5px var(--mono,monospace);  fill: var(--muted,#6b7280); }
    #fig-syndata-grounding-spectrum .body { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-syndata-grounding-spectrum .axl  { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-syndata-grounding-spectrum .foot { font: 400 8.5px var(--sans,sans-serif);   fill: var(--muted,#6b7280); }
  </style>

  
  <rect x="12" y="34" width="800" height="10" rx="5" fill="url(#sgs-grad)" opacity="0.85"/>
  <polygon points="810,27 830,39 810,51" fill="var(--warn,#c2410c)" opacity="0.85"/>
  <text x="14"  y="24" class="axl" text-anchor="start">Source-grounded (low risk)</text>
  <text x="808" y="24" class="axl" text-anchor="end">Free-generation (high risk)</text>

  
  <rect x="12"  y="58" width="190" height="168" rx="7" class="v-fill" stroke="var(--good,#2b8a6f)"  stroke-width="1.8"/>
  <text x="107" y="80"  text-anchor="middle" class="ttl" fill="var(--good,#2b8a6f)">Rephrase /</text>
  <text x="107" y="94"  text-anchor="middle" class="ttl" fill="var(--good,#2b8a6f)">restyle</text>
  <text x="107" y="110" text-anchor="middle" class="sub">method: WRAP</text>
  <line x1="22"  y1="120" x2="192" y2="120" stroke="var(--good,#2b8a6f)" stroke-width="0.5" opacity="0.25"/>
  <text x="107" y="138" text-anchor="middle" class="body">Rewrite a real doc</text>
  <text x="107" y="151" text-anchor="middle" class="body">in a cleaner style.</text>
  <text x="107" y="164" text-anchor="middle" class="body">All facts traceable</text>
  <text x="107" y="177" text-anchor="middle" class="body">to the source.</text>

  
  <rect x="212" y="58" width="190" height="168" rx="7" class="v-fill" stroke="var(--accent,#059669)" stroke-width="1.8"/>
  <text x="307" y="80"  text-anchor="middle" class="ttl" fill="var(--accent,#059669)">Knowledge-</text>
  <text x="307" y="94"  text-anchor="middle" class="ttl" fill="var(--accent,#059669)">augmented</text>
  <text x="307" y="110" text-anchor="middle" class="sub">method: add Q&amp;A</text>
  <line x1="222" y1="120" x2="392" y2="120" stroke="var(--accent,#059669)" stroke-width="0.5" opacity="0.25"/>
  <text x="307" y="138" text-anchor="middle" class="body">Seed: real passage</text>
  <text x="307" y="151" text-anchor="middle" class="body">plus model-added</text>
  <text x="307" y="164" text-anchor="middle" class="body">structure. Extras</text>
  <text x="307" y="177" text-anchor="middle" class="body">not grounded.</text>

  
  <rect x="412" y="58" width="190" height="168" rx="7" class="v-fill" stroke="var(--warn,#e0a106)"  stroke-width="1.8"/>
  <text x="507" y="80"  text-anchor="middle" class="ttl" fill="var(--warn,#b45309)">Passage-prompted</text>
  <text x="507" y="94"  text-anchor="middle" class="ttl" fill="var(--warn,#b45309)">generation</text>
  <text x="507" y="110" text-anchor="middle" class="sub">method: seed + free-gen</text>
  <line x1="422" y1="120" x2="592" y2="120" stroke="var(--warn,#e0a106)" stroke-width="0.5" opacity="0.25"/>
  <text x="507" y="138" text-anchor="middle" class="body">Passage is only a</text>
  <text x="507" y="151" text-anchor="middle" class="body">prompt; model writes</text>
  <text x="507" y="164" text-anchor="middle" class="body">fresh text, not kept</text>
  <text x="507" y="177" text-anchor="middle" class="body">verbatim. Mostly new.</text>

  
  <rect x="612" y="58" width="238" height="168" rx="7" class="v-fill" stroke="var(--warn,#c2410c)"  stroke-width="2"/>
  <text x="731" y="80"  text-anchor="middle" class="ttl" fill="var(--warn,#c2410c)">Pure textbook /</text>
  <text x="731" y="94"  text-anchor="middle" class="ttl" fill="var(--warn,#c2410c)">curated-prompt gen</text>
  <text x="731" y="110" text-anchor="middle" class="sub">e.g. Phi, Cosmopedia</text>
  <line x1="622" y1="120" x2="840" y2="120" stroke="var(--warn,#c2410c)" stroke-width="0.5" opacity="0.25"/>
  <text x="731" y="138" text-anchor="middle" class="body">Topic-prompt only;</text>
  <text x="731" y="151" text-anchor="middle" class="body">writes from parametric</text>
  <text x="731" y="164" text-anchor="middle" class="body">memory. Highest value,</text>
  <text x="731" y="177" text-anchor="middle" class="body">highest hallucination risk.</text>

  
  <line x1="107" y1="226" x2="107" y2="248" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.35"/>
  <polygon points="103,226 111,226 107,232" fill="currentColor" opacity="0.28"/>
  <text x="107" y="262" text-anchor="middle" class="foot">every fact grounded</text>

  <line x1="307" y1="226" x2="307" y2="248" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.35"/>
  <polygon points="303,226 311,226 307,232" fill="currentColor" opacity="0.28"/>
  <text x="307" y="262" text-anchor="middle" class="foot">grounded core + extras</text>

  <line x1="507" y1="226" x2="507" y2="248" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.35"/>
  <polygon points="503,226 511,226 507,232" fill="currentColor" opacity="0.28"/>
  <text x="507" y="262" text-anchor="middle" class="foot">seed only, generated</text>

  <line x1="731" y1="226" x2="731" y2="248" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.35"/>
  <polygon points="727,226 735,226 731,232" fill="currentColor" opacity="0.28"/>
  <text x="731" y="262" text-anchor="middle" class="foot">topic prompt only</text>

  <text x="430" y="300" text-anchor="middle" class="foot">Increasing departure from human-written source means more value AND more risk</text>
</svg>
<figcaption><b>The synthetic-data grounding spectrum.</b> Four recipe families span a single risk axis: at the safe left end, rephrase/restyle (WRAP) inherits all facts from the source; at the risky right end, pure textbook generation (Phi, Cosmopedia) writes entirely from parametric memory. The further a recipe departs from a human-written source, the more pedagogical density it can achieve — and the more hallucination risk it accumulates.</figcaption>
</figure>
