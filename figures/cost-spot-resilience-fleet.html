<figure class="viz" id="fig-cost-spot-resilience-fleet">
<svg viewBox="0 0 760 420" role="img" aria-label="Spot/On-Demand GPU fleet architecture: a load balancer distributes traffic via health-aware routing to two dashed-border spot pools (each with 2x A10G at 70% discount) and one solid-border on-demand pool (1x A10G, always available), illustrating the preemption-resilient mixed fleet pattern.">
<defs>
  <marker id="srf-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--ink-soft,#94a3b8)"/>
  </marker>
</defs>
<style>
  #fig-cost-spot-resilience-fleet text { fill: currentColor; }
  #fig-cost-spot-resilience-fleet .ttl { font: 700 14px var(--sans,sans-serif); }
  #fig-cost-spot-resilience-fleet .sub { font: 400 11px var(--mono,monospace); fill: var(--muted,#94a3b8); }
  #fig-cost-spot-resilience-fleet .badge { font: 700 10px var(--sans,sans-serif); }
  #fig-cost-spot-resilience-fleet .routing-lbl { font: 400 10px var(--sans,sans-serif); font-style: italic; fill: var(--muted,#94a3b8); }
  #fig-cost-spot-resilience-fleet .miss-lbl { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
</style>


<g data-anim="1">
  <rect x="220" y="28" width="320" height="58" rx="8" class="v-fill" stroke="var(--accent,#6366f1)" stroke-width="2"/>
  <text x="380" y="54" text-anchor="middle" class="ttl">Load Balancer / API Gateway</text>
  <text x="380" y="72" text-anchor="middle" class="sub">health-aware routing</text>
</g>


<line x1="380" y1="86" x2="380" y2="148" stroke="var(--ink-soft,#94a3b8)" stroke-width="1.5" marker-end="url(#srf-arrow)"/>

<line x1="130" y1="148" x2="630" y2="148" stroke="var(--ink-soft,#94a3b8)" stroke-width="1.5"/>


<line x1="155" y1="148" x2="155" y2="180" stroke="var(--ink-soft,#94a3b8)" stroke-width="1.5" marker-end="url(#srf-arrow)"/>
<line x1="380" y1="148" x2="380" y2="180" stroke="var(--ink-soft,#94a3b8)" stroke-width="1.5" marker-end="url(#srf-arrow)"/>
<line x1="605" y1="148" x2="605" y2="180" stroke="var(--ink-soft,#94a3b8)" stroke-width="1.5" marker-end="url(#srf-arrow)"/>


<g data-anim="2">
  <rect x="40" y="182" width="230" height="160" rx="8" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="155" y="212" text-anchor="middle" class="ttl">Spot pool A</text>
  <text x="155" y="234" text-anchor="middle" class="sub">2x A10G</text>
  <text x="155" y="252" text-anchor="middle" class="sub">70% discount</text>
  
  <rect x="88" y="286" width="134" height="24" rx="12" fill="var(--good,#2f9e6e)" fill-opacity="0.18" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <text x="155" y="303" text-anchor="middle" class="badge" fill="var(--good,#2f9e6e)">-70% spot discount</text>
</g>


<g data-anim="2">
  <rect x="265" y="182" width="230" height="160" rx="8" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="380" y="212" text-anchor="middle" class="ttl">Spot pool B</text>
  <text x="380" y="234" text-anchor="middle" class="sub">2x A10G</text>
  <text x="380" y="252" text-anchor="middle" class="sub">70% discount</text>
  
  <rect x="313" y="286" width="134" height="24" rx="12" fill="var(--good,#2f9e6e)" fill-opacity="0.18" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <text x="380" y="303" text-anchor="middle" class="badge" fill="var(--good,#2f9e6e)">-70% spot discount</text>
</g>


<g data-anim="3">
  <rect x="490" y="182" width="230" height="160" rx="8" class="v-fill" stroke="var(--ink-soft,#64748b)" stroke-width="2.5"/>
  <text x="605" y="212" text-anchor="middle" class="ttl">On-demand pool</text>
  <text x="605" y="234" text-anchor="middle" class="sub">1x A10G</text>
  <text x="605" y="252" text-anchor="middle" class="sub">full price</text>
  <text x="605" y="270" text-anchor="middle" class="sub">always available</text>
  
  <rect x="538" y="286" width="134" height="24" rx="12" fill="var(--accent,#6366f1)" fill-opacity="0.15" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
  <text x="605" y="303" text-anchor="middle" class="badge" fill="var(--accent,#6366f1)">always-on floor</text>
</g>


<g data-anim="3">
  <text x="380" y="384" text-anchor="middle" class="miss-lbl">dashed = reclaimable spot  |  solid = guaranteed floor</text>
</g>

</svg>
<figcaption><b>Spot/on-demand GPU fleet for preemption resilience.</b> Traffic fans out from the load balancer to two cheap-but-volatile spot pools (dashed borders, 70% discount) and one always-available on-demand floor (solid border). Stateless workers and SIGTERM-aware draining let the system absorb spot preemptions invisibly within typical SLA windows.</figcaption>
</figure>
