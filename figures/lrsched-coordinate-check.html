<figure class="viz" id="fig-lrsched-coordinate-check">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 380" role="img" aria-label="Coordinate check plot: under correct muP the per-layer activation scale stays flat across model widths, while under standard parameterization it drifts sharply downward as width increases.">
  <style>
    #fig-lrsched-coordinate-check text{ fill:var(--ink-soft); }
    #fig-lrsched-coordinate-check .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-lrsched-coordinate-check .sm{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-lrsched-coordinate-check .tag{ font:600 12.5px var(--sans,sans-serif); }
    #fig-lrsched-coordinate-check .mono{ font:500 11px var(--mono,monospace); fill:var(--muted); }
    #fig-lrsched-coordinate-check .cap{ font:500 12px var(--sans,sans-serif); fill:var(--ink-soft); }
  </style>

  

  <g data-anim="1">
    <line x1="100" y1="40" x2="100" y2="270" class="v-stroke" stroke="currentColor" stroke-width="1.4"/>
    <line x1="100" y1="270" x2="660" y2="270" class="v-stroke" stroke="currentColor" stroke-width="1.4"/>
    <text x="30" y="52" class="ax">per-layer</text>
    <text x="30" y="68" class="ax">activation</text>
    <text x="30" y="84" class="ax">scale</text>
    <text x="30" y="100" class="mono">mean|h|</text>
    <text x="30" y="118" class="sm">(log scale)</text>
    <text x="380" y="312" text-anchor="middle" class="ax">model width (log scale)</text>
  </g>

  
  <g data-anim="1">
    <line x1="160" y1="40" x2="160" y2="270" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="310" y1="40" x2="310" y2="270" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="460" y1="40" x2="460" y2="270" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="610" y1="40" x2="610" y2="270" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>
    <text x="160" y="288" text-anchor="middle" class="mono">256</text>
    <text x="310" y="288" text-anchor="middle" class="mono">512</text>
    <text x="460" y="288" text-anchor="middle" class="mono">1024</text>
    <text x="610" y="288" text-anchor="middle" class="mono">2048</text>
  </g>

  
  <g data-anim="2">
    <path d="M160 118 L310 116 L460 119 L610 117"
          fill="none" stroke="var(--good)" stroke-width="2.8" class="viz-draw" style="--len:452"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="160" cy="118" r="4.4" fill="var(--good)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
    <circle cx="310" cy="116" r="4.4" fill="var(--good)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
    <circle cx="460" cy="119" r="4.4" fill="var(--good)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
    <circle cx="610" cy="117" r="4.4" fill="var(--good)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
  </g>

  
  <g data-anim="3">
    <path d="M160 70 L310 128 L460 178 L610 224"
          fill="none" stroke="var(--muted)" stroke-width="2.8" stroke-dasharray="7 5"
          class="viz-draw" style="--len:340" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="160" cy="70" r="4.4" fill="var(--muted)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
    <circle cx="310" cy="128" r="4.4" fill="var(--muted)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
    <circle cx="460" cy="178" r="4.4" fill="var(--muted)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
    <circle cx="610" cy="224" r="4.4" fill="var(--muted)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
  </g>

  
  <g data-anim="4">
    <text x="620" y="100" text-anchor="end" class="tag" fill="var(--good)">muP: flat = feature updates</text>
    <text x="620" y="115" text-anchor="end" class="tag" fill="var(--good)">stay O(1) at every width  [check]</text>

    <text x="185" y="56" text-anchor="start" class="tag" fill="var(--muted)">SP: drifts -&gt; optimal HPs</text>
    <text x="185" y="71" text-anchor="start" class="tag" fill="var(--muted)">will NOT transfer  [x]</text>
  </g>

  
  <g data-anim="5">
    <line x1="30" y1="330" x2="690" y2="330" class="v-grid" stroke-width="1"/>
    <text x="30" y="350" class="cap">Flat curves = correct muP. Any drift means a bug in init std, per-layer LR</text>
    <text x="30" y="366" class="cap">multiplier, or attention/readout scaling.</text>
  </g>
</svg>
<figcaption><b>The coordinate check catches muP bugs at a glance.</b> Plotting per-layer activation scale against width on log-log axes, a correctly implemented muP model gives a flat line across an 8x width sweep — feature updates stay <b>O(1)</b> regardless of width, which is the whole point of the parameterization. Standard parameterization (SP) drifts monotonically downward instead, which is exactly why hyperparameters tuned at small width do not transfer to a larger model under SP.</figcaption>
</figure>
