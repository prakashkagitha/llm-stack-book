<figure class="viz" id="fig-wmprov-asymmetry-inversion">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 470" role="img" aria-label="Why watermarking exists: post-hoc detection is an open-ended classification problem with overlapping human and AI text distributions and a growing list of attacks to anticipate, whereas watermarking converts detection into a bounded, key-based verification test with a sharp match or no-match outcome.">
<defs>
  <marker id="wai-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#555)"/>
  </marker>
</defs>
<style>
  #fig-wmprov-asymmetry-inversion text { fill: var(--ink-soft,#333); }
  #fig-wmprov-asymmetry-inversion .ttl { font: 700 15px var(--sans,sans-serif); }
  #fig-wmprov-asymmetry-inversion .h2 { font: 700 13px var(--sans,sans-serif); }
  #fig-wmprov-asymmetry-inversion .lbl { font: 600 11.5px var(--sans,sans-serif); }
  #fig-wmprov-asymmetry-inversion .sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-wmprov-asymmetry-inversion .tag { font: 500 9px var(--sans,sans-serif); }
  #fig-wmprov-asymmetry-inversion .cap { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-wmprov-asymmetry-inversion .bigarrow-lbl { font: 700 12.5px var(--sans,sans-serif); fill: #fff; }
</style>

<text x="390" y="24" text-anchor="middle" class="ttl">The same question, two problem types</text>


<line x1="390" y1="40" x2="390" y2="345" class="v-grid" stroke-dasharray="4 4" stroke-width="1.2"/>


<g data-anim="1">
  <text x="200" y="58" text-anchor="middle" class="h2">Post-hoc detection = CLASSIFICATION</text>

  
  <rect x="60" y="72" width="280" height="150" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>

  
  <g>
    <circle cx="118" cy="150" r="4" class="v-muted" fill="var(--muted,#777)"/>
    <circle cx="100" cy="130" r="4" fill="var(--muted,#777)"/>
    <circle cx="140" cy="118" r="4" fill="var(--muted,#777)"/>
    <circle cx="95" cy="170" r="4" fill="var(--muted,#777)"/>
    <circle cx="135" cy="185" r="4" fill="var(--muted,#777)"/>
    <circle cx="160" cy="150" r="4" fill="var(--muted,#777)"/>
    <circle cx="115" cy="195" r="4" fill="var(--muted,#777)"/>
  </g>
  <text x="105" y="96" class="tag" fill="var(--muted,#777)">human text</text>

  
  <g>
    <circle cx="255" cy="140" r="4" fill="var(--accent,#7c3aed)"/>
    <circle cx="280" cy="120" r="4" fill="var(--accent,#7c3aed)"/>
    <circle cx="290" cy="160" r="4" fill="var(--accent,#7c3aed)"/>
    <circle cx="260" cy="190" r="4" fill="var(--accent,#7c3aed)"/>
    <circle cx="300" cy="185" r="4" fill="var(--accent,#7c3aed)"/>
    <circle cx="270" cy="165" r="4" fill="var(--accent,#7c3aed)"/>
    <circle cx="230" cy="155" r="4" fill="var(--accent,#7c3aed)"/>
  </g>
  <text x="255" y="96" text-anchor="end" class="tag" fill="var(--accent,#7c3aed)">AI text</text>

  
  <circle cx="185" cy="150" r="4" fill="var(--muted,#777)"/>
  <circle cx="200" cy="165" r="4" fill="var(--accent,#7c3aed)"/>
  <circle cx="190" cy="180" r="4" fill="var(--muted,#777)"/>
  <circle cx="205" cy="135" r="4" fill="var(--accent,#7c3aed)"/>

  <path d="M 175 78 C 195 110, 165 140, 195 170 C 220 195, 190 210, 205 218"
        fill="none" stroke="var(--ink-soft,#555)" stroke-width="1.6" stroke-dasharray="5 3"/>

  <text x="195" y="86" text-anchor="middle" class="tag" fill="var(--ink-soft,#555)">decision boundary</text>
  <text x="195" y="212" text-anchor="middle" class="tag" fill="var(--ink-soft,#555)">(uncertain)</text>
  <rect x="163" y="140" width="64" height="34" rx="6" fill="var(--warn,#e0a106)" opacity="0.14" stroke="var(--warn,#e0a106)" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="195" y="235" text-anchor="middle" class="sub" fill="var(--warn,#e0a106)">overlap zone: false positives + missed detections</text>

  
  <text x="60" y="262" class="sub">moving targets the defender must anticipate:</text>
  <rect x="60" y="270" width="70" height="20" rx="10" class="v-fill" stroke="var(--accent,#7c3aed)" stroke-width="1"/>
  <text x="95" y="284" text-anchor="middle" class="tag" fill="var(--accent,#7c3aed)">new model</text>
  <rect x="136" y="270" width="72" height="20" rx="10" class="v-fill" stroke="var(--accent,#7c3aed)" stroke-width="1"/>
  <text x="172" y="284" text-anchor="middle" class="tag" fill="var(--accent,#7c3aed)">paraphrase</text>
  <rect x="214" y="270" width="130" height="20" rx="10" class="v-fill" stroke="var(--accent,#7c3aed)" stroke-width="1"/>
  <text x="279" y="284" text-anchor="middle" class="tag" fill="var(--accent,#7c3aed)">translation roundtrip</text>
  <rect x="60" y="296" width="130" height="20" rx="10" class="v-fill" stroke="var(--accent,#7c3aed)" stroke-width="1"/>
  <text x="125" y="310" text-anchor="middle" class="tag" fill="var(--accent,#7c3aed)">unusual prompt</text>

  <text x="200" y="335" text-anchor="middle" class="cap">defender must model every model and every attack --</text>
  <text x="200" y="350" text-anchor="middle" class="cap">arms race, high and unstable FPR</text>
</g>


<g data-anim="2">
  <text x="580" y="58" text-anchor="middle" class="h2">Watermarking = VERIFICATION</text>

  
  <rect x="460" y="76" width="120" height="42" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="520" y="101" text-anchor="middle" class="lbl">Generation</text>

  <line x1="580" y1="97" x2="618" y2="97" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wai-arr)"/>

  
  <g transform="translate(624,80)">
    <rect x="0" y="14" width="34" height="26" rx="5" fill="var(--good,#2f9e6e)"/>
    <path d="M 6 14 L 6 8 A 11 11 0 0 1 28 8 L 28 14" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="4"/>
    <circle cx="17" cy="27" r="3.4" fill="#fff"/>
  </g>
  <text x="641" y="120" text-anchor="middle" class="sub">key k</text>

  <text x="580" y="140" text-anchor="middle" class="sub">signal embedded under secret key k</text>

  <line x1="580" y1="150" x2="580" y2="175" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wai-arr)"/>

  <rect x="500" y="177" width="160" height="40" rx="8" fill="var(--good,#2f9e6e)"/>
  <text x="580" y="201" text-anchor="middle" class="lbl" fill="#fff">stamped content</text>

  <line x1="580" y1="217" x2="580" y2="242" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wai-arr)"/>

  <rect x="460" y="244" width="240" height="46" rx="8" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="580" y="264" text-anchor="middle" class="lbl">detector: key-check</text>
  <text x="580" y="280" text-anchor="middle" class="sub">re-derive signal, compare</text>

  <line x1="580" y1="290" x2="580" y2="308" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#wai-arr)"/>

  <rect x="500" y="310" width="160" height="38" rx="8" fill="var(--good,#2f9e6e)"/>
  <text x="580" y="335" text-anchor="middle" class="lbl" fill="#fff">match / no-match + p-value</text>

  <text x="580" y="368" text-anchor="middle" class="cap">hardness scales with the secret key, not attacker skill --</text>
  <text x="580" y="383" text-anchor="middle" class="cap">a bounded, calibrated test</text>
</g>


<g data-anim="3">
  <rect x="70" y="400" width="640" height="52" rx="12" fill="var(--accent,#7c3aed)"/>
  <text x="390" y="422" text-anchor="middle" class="bigarrow-lbl">watermarking inverts the asymmetry:</text>
  <text x="390" y="440" text-anchor="middle" class="bigarrow-lbl">open-ended classification -&gt; bounded cryptographic verification</text>
</g>

</svg>
<figcaption><b>Watermarking exists because it converts an unwinnable classification problem into a bounded verification problem.</b> Post-hoc detection must separate overlapping clouds of human and AI text while anticipating an open-ended list of new models and attacks, producing an unstable false-positive rate; watermark detection instead re-derives a signal under a secret key and returns a sharp, calibrated match/no-match result whose hardness depends on key strength, not attacker sophistication.</figcaption>
</figure>
