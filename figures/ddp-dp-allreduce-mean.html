<figcaption><b>Data-parallel step: replicate the model, shard the batch, all-reduce the mean gradient.</b> Each of the 4 GPUs holds a complete model copy and processes its own 64-example shard to produce a local gradient g&#x1D62;. A single <b>ALL-REDUCE(mean)</b> produces the averaged gradient g&#772; = (&#x2211;g&#x1D62;)/N — exactly the true full-batch gradient — and every GPU applies the same optimizer step, keeping all replicas bit-identical.</figcaption>
</figure>
