<figcaption><b>A one-column pad turns a 32-way bank conflict into zero conflicts.</b> Without padding, every row of a <code>[32][32]</code> tile starts on the same bank, so a fixed column <code>j</code> lands on bank <code>j</code> for every row <code>i</code> — all 32 lanes collide on one bank and get serialized. Adding a single padding column shifts each row's start by one bank, so the same column now steps through a different bank on every row (<code>(i+j) mod 32</code>) — the 32 lanes spread across all 32 banks for zero conflicts, at the cost of 128 wasted bytes per tile.</figcaption>
</figure>
