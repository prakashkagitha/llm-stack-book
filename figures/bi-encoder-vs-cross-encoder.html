<figcaption><b>Retrieve-then-rerank chains a cheap, coarse bi-encoder with an expensive, precise cross-encoder.</b> The bi-encoder embeds query and document independently, so document vectors can be precomputed offline and searched over millions of items in one ANN pass; the cross-encoder feeds query and document through a single tower with joint attention, so it is only affordable once the candidate set has been narrowed to a few dozen.</figcaption>
</figure>
