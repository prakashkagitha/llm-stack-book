<figcaption><b>Multi-vector storage is 1000x a single vector's, so real systems compress before they shortlist, and shortlist before they score exactly.</b> ColPali's 1024 patch vectors per page push a 100,000-page index from ~25.6 MB (SigLIP) to ~25.6 GiB — the price of late interaction. A three-stage funnel makes this affordable: compress the index (pooling + low-bit residuals), find a few hundred candidates approximately, then decompress and run exact MaxSim on only that shortlist, keeping compressed data in RAM and full-precision vectors on cheaper, memory-mapped storage.</figcaption>
</figure>
