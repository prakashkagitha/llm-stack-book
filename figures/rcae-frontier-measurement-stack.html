<figcaption><b>The six-stage measurement stack that frontier labs use to produce a reported reasoning score.</b> A raw benchmark item descends through prompt template selection, sampling configuration, execution/verification, and aggregation before reaching the final comparison and reporting stage. Every decision in this pipeline — shot count, temperature, verifier type, aggregation method — changes the reported number, so published scores are only comparable when the full stack is matched.</figcaption>
</figure>
