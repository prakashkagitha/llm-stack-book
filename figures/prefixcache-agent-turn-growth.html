<figure class="viz" id="fig-prefixcache-agent-turn-growth">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 580" role="img" aria-label="Comparison of prefill cost across four agent turns: without prefix caching each turn re-prefills the whole growing history so total work grows as O(k squared L); with a warm prefix cache each turn only prefills the new suffix L so total work grows as O(kL). A companion plot shows cumulative prefill tokens as a quadratic curve versus a straight line, with the gap between them widening as turns increase.">
<defs>
  <pattern id="patg-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
    <rect width="7" height="7" class="hatch-bg"/>
    <line x1="0" y1="0" x2="0" y2="7" class="hatch-line" stroke-width="2"/>
  </pattern>
</defs>
<style>
  #fig-prefixcache-agent-turn-growth text { fill: var(--ink-soft,#45413a); font: 400 12px var(--sans,sans-serif); }
  #fig-prefixcache-agent-turn-growth .panel-title { font: 700 14px var(--sans,sans-serif); fill: var(--ink,#211f1b); }
  #fig-prefixcache-agent-turn-growth .row-lbl { font: 600 12px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-agent-turn-growth .bar-lbl { font: 600 11.5px var(--mono,monospace); fill: var(--ink-soft,#45413a); }
  #fig-prefixcache-agent-turn-growth .annot { font: 700 13px var(--mono,monospace); fill: var(--ink,#211f1b); }
  #fig-prefixcache-agent-turn-growth .leg-lbl { font: 500 12px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-prefixcache-agent-turn-growth .plot-title { font: 700 13.5px var(--sans,sans-serif); fill: var(--ink,#211f1b); }
  #fig-prefixcache-agent-turn-growth .axis-lbl { font: 600 12px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-agent-turn-growth .tick-lbl { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-agent-turn-growth .curve-lbl { font: 600 12px var(--mono,monospace); }
  #fig-prefixcache-agent-turn-growth .bar-computed { fill: var(--accent,#c15b39); fill-opacity: 0.45; stroke: var(--accent,#c15b39); stroke-width: 1.2; }
  #fig-prefixcache-agent-turn-growth .bar-skip { fill: url(#patg-hatch); stroke: var(--border-2,#d8d1c0); stroke-width: 1; }
  #fig-prefixcache-agent-turn-growth .hatch-bg { fill: var(--surface,#faf8f3); }
  #fig-prefixcache-agent-turn-growth .hatch-line { stroke: var(--border-2,#d8d1c0); }
  #fig-prefixcache-agent-turn-growth .axis-line { stroke: var(--muted,#6d675d); stroke-width: 1.4; }
  #fig-prefixcache-agent-turn-growth .tick { stroke: var(--muted,#6d675d); stroke-width: 1; }
  #fig-prefixcache-agent-turn-growth .grid-soft { stroke: var(--border-2,#d8d1c0); stroke-width: 1; opacity: 0.6; }
  #fig-prefixcache-agent-turn-growth .curve-quad { fill: none; stroke: var(--accent,#c15b39); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  #fig-prefixcache-agent-turn-growth .curve-lin { fill: none; stroke: var(--good,#2f9e6e); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  #fig-prefixcache-agent-turn-growth .curve-lbl-quad { fill: var(--accent,#c15b39); }
  #fig-prefixcache-agent-turn-growth .curve-lbl-lin { fill: var(--good,#2f9e6e); }
  #fig-prefixcache-agent-turn-growth .gap-fill { fill: var(--accent,#c15b39); opacity: 0.10; }
  #fig-prefixcache-agent-turn-growth .dot-quad { fill: var(--accent,#c15b39); }
  #fig-prefixcache-agent-turn-growth .dot-lin { fill: var(--good,#2f9e6e); }
  #fig-prefixcache-agent-turn-growth .swatch { stroke: var(--border-2,#d8d1c0); stroke-width: 1; }

  #fig-prefixcache-agent-turn-growth [data-anim] { opacity: 0; animation: patg-in 0.5s ease-out forwards; }
  #fig-prefixcache-agent-turn-growth [data-anim="1"] { animation-delay: 0s; }
  #fig-prefixcache-agent-turn-growth [data-anim="2"] { animation-delay: 0.35s; }
  #fig-prefixcache-agent-turn-growth [data-anim="3"] { animation-delay: 0.7s; }
  #fig-prefixcache-agent-turn-growth [data-anim="4"] { animation-delay: 1.05s; }
  @keyframes patg-in { from { opacity: 0; } to { opacity: 1; } }
</style>


<text x="200" y="30" text-anchor="middle" class="panel-title">Without prefix caching</text>
<text x="590" y="30" text-anchor="middle" class="panel-title">With a warm prefix cache</text>


<line x1="370" y1="46" x2="370" y2="288" class="grid-soft"/>


<g data-anim="1">
  <text x="15" y="82" class="row-lbl">Turn 1</text>
  <rect x="110" y="64" width="45" height="26" class="bar-computed"/>
  <text x="163" y="82" class="bar-lbl">1L</text>

  <text x="15" y="122" class="row-lbl">Turn 2</text>
  <rect x="110" y="104" width="90" height="26" class="bar-computed"/>
  <text x="208" y="122" class="bar-lbl">2L</text>

  <text x="15" y="162" class="row-lbl">Turn 3</text>
  <rect x="110" y="144" width="135" height="26" class="bar-computed"/>
  <text x="253" y="162" class="bar-lbl">3L</text>

  <text x="15" y="202" class="row-lbl">Turn 4</text>
  <rect x="110" y="184" width="180" height="26" class="bar-computed"/>
  <text x="298" y="202" class="bar-lbl">4L</text>

  <text x="200" y="234" text-anchor="middle" class="annot">total prefill work grows as O(k^2 L)</text>
</g>


<g data-anim="2">
  <text x="405" y="82" class="row-lbl">Turn 1</text>
  <rect x="490" y="64" width="45" height="26" class="bar-computed"/>
  <text x="543" y="82" class="bar-lbl">L</text>

  <text x="405" y="122" class="row-lbl">Turn 2</text>
  <rect x="490" y="104" width="45" height="26" class="bar-skip"/>
  <rect x="535" y="104" width="45" height="26" class="bar-computed"/>
  <text x="588" y="122" class="bar-lbl">L</text>

  <text x="405" y="162" class="row-lbl">Turn 3</text>
  <rect x="490" y="144" width="90" height="26" class="bar-skip"/>
  <rect x="580" y="144" width="45" height="26" class="bar-computed"/>
  <text x="633" y="162" class="bar-lbl">L</text>

  <text x="405" y="202" class="row-lbl">Turn 4</text>
  <rect x="490" y="184" width="135" height="26" class="bar-skip"/>
  <rect x="625" y="184" width="45" height="26" class="bar-computed"/>
  <text x="678" y="202" class="bar-lbl">L</text>

  <text x="590" y="234" text-anchor="middle" class="annot">total prefill work grows as O(kL)</text>
</g>


<g data-anim="3">
  <rect x="140" y="256" width="14" height="14" rx="2" class="swatch bar-computed"/>
  <text x="160" y="267" class="leg-lbl">computed this turn</text>
  <rect x="430" y="256" width="14" height="14" rx="2" class="swatch bar-skip"/>
  <text x="450" y="267" class="leg-lbl">reused from cache (no compute)</text>
</g>

<line x1="30" y1="290" x2="750" y2="290" class="grid-soft"/>


<g data-anim="4">
  <text x="390" y="312" text-anchor="middle" class="plot-title">Cumulative prefill work vs. number of turns</text>

  <line x1="140" y1="335" x2="140" y2="520" class="axis-line"/>
  <line x1="140" y1="520" x2="700" y2="520" class="axis-line"/>

  <line x1="275" y1="520" x2="275" y2="526" class="tick"/>
  <line x1="410" y1="520" x2="410" y2="526" class="tick"/>
  <line x1="545" y1="520" x2="545" y2="526" class="tick"/>
  <line x1="680" y1="520" x2="680" y2="526" class="tick"/>
  <text x="275" y="538" text-anchor="middle" class="tick-lbl">1</text>
  <text x="410" y="538" text-anchor="middle" class="tick-lbl">2</text>
  <text x="545" y="538" text-anchor="middle" class="tick-lbl">3</text>
  <text x="680" y="538" text-anchor="middle" class="tick-lbl">4</text>
  <text x="128" y="524" text-anchor="end" class="tick-lbl">0</text>

  <text x="420" y="556" text-anchor="middle" class="axis-lbl">turn k</text>
  <text x="66" y="430" text-anchor="middle" class="axis-lbl" transform="rotate(-90 66 430)">cumulative prefill tokens</text>

  
  <path class="gap-fill" d="M275,504.55 L342.5,491.03 L410,473.65 L477.5,452.4 L545,427.3 L612.5,398.3 L680,365.5
                            L680,458.2 L612.5,465.9 L545,473.65 L477.5,481.4 L410,489.1 L342.5,496.8 L275,504.55 Z"/>

  
  <path class="curve-quad" d="M140,520 L207.5,514.2 L275,504.55 L342.5,491.03 L410,473.65 L477.5,452.4 L545,427.3 L612.5,398.3 L680,365.5"/>
  <circle cx="275" cy="504.55" r="3" class="dot-quad"/>
  <circle cx="410" cy="473.65" r="3" class="dot-quad"/>
  <circle cx="545" cy="427.3" r="3" class="dot-quad"/>
  <circle cx="680" cy="365.5" r="3" class="dot-quad"/>
  <text x="676" y="358" text-anchor="end" class="curve-lbl curve-lbl-quad">no cache: O(k^2 L)</text>

  
  <path class="curve-lin" d="M140,520 L207.5,512.3 L275,504.55 L342.5,496.8 L410,489.1 L477.5,481.4 L545,473.65 L612.5,465.9 L680,458.2"/>
  <circle cx="275" cy="504.55" r="3" class="dot-lin"/>
  <circle cx="410" cy="489.1" r="3" class="dot-lin"/>
  <circle cx="545" cy="473.65" r="3" class="dot-lin"/>
  <circle cx="680" cy="458.2" r="3" class="dot-lin"/>
  <text x="676" y="500" text-anchor="end" class="curve-lbl curve-lbl-lin">warm cache: O(kL)</text>
</g>
</svg>
<figcaption><b>Without a warm cache, every agent turn re-prefills the entire growing conversation history, so cumulative prefill work grows quadratically in the number of turns; with a warm prefix cache, each turn only prefills its own new content and the total grows linearly.</b> At turn <i>t</i>, an uncached request recomputes all <i>t</i>&amp;middot;L tokens seen so far (left, staircase of filled bars), while a cached request reuses the prior <i>(t&amp;minus;1)</i>&amp;middot;L tokens for free and computes only the new L (right, short filled segment). The gap between O(k<sup>2</sup>L) and O(kL) widens with every additional turn, which is exactly why long-horizon agent loops benefit most from prefix caching.</figcaption>
</figure>
