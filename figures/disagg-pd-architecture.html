<figure class="viz" id="fig-disagg-pd-architecture">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 760 620" role="img" aria-label="Disaggregated prefill/decode serving architecture: requests flow from Load Balancer to Prefill Pool (compute-bound, GPU cluster A), then KV cache transfers via RDMA/NVLink to Decode Pool (bandwidth-bound, GPU cluster B), which streams output tokens back to the Client.">
  <defs>
    <marker id="dpd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor" class="v-muted"/>
    </marker>
    <marker id="dpd-arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
    </marker>
    <marker id="dpd-arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor" class="v-muted"/>
    </marker>
  </defs>
  <style>
    #fig-disagg-pd-architecture text { fill: var(--ink-soft); }
    #fig-disagg-pd-architecture .ttl { font: 700 14px var(--sans,sans-serif); }
    #fig-disagg-pd-architecture .sub  { font: 400 11px var(--sans,sans-serif); fill: var(--muted); }
    #fig-disagg-pd-architecture .badge { font: 700 7.5px var(--sans,sans-serif); letter-spacing: 0; }
    #fig-disagg-pd-architecture .arrow-lbl { font: 500 11px var(--sans,sans-serif); fill: var(--muted); }
    #fig-disagg-pd-architecture .kv-mono { font: 600 9.5px var(--mono,monospace); fill: var(--warn,#e0a106); }
    @media (prefers-reduced-motion: reduce) {
      #fig-disagg-pd-architecture .dpd-pill,
      #fig-disagg-pd-architecture .dpd-kv,
      #fig-disagg-pd-architecture .dpd-tok { display: none; }
      #fig-disagg-pd-architecture .dpd-pulse-p,
      #fig-disagg-pd-architecture .dpd-pulse-d { opacity: 0; }
    }
  </style>

  
  <g data-anim="1">
    <rect x="90" y="20" width="560" height="56" rx="10"
          fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#c9d2dc)" stroke-width="1.5"/>
    <text x="370" y="51" text-anchor="middle" class="ttl">Load Balancer / Router</text>
  </g>

  
  <g data-anim="2">
    <line x1="370" y1="76" x2="370" y2="108"
          stroke="currentColor" class="v-muted" stroke-width="1.6" marker-end="url(#dpd-arrow)"/>
    <text x="418" y="96" class="arrow-lbl">new request</text>
  </g>

  
  <g data-anim="2">
    <rect x="90" y="110" width="560" height="92" rx="10"
          fill="var(--accent,#3b6fd4)" fill-opacity="0.09"
          stroke="var(--accent,#3b6fd4)" stroke-width="1.8"/>
    
    <rect class="dpd-pulse-p" x="90" y="110" width="560" height="92" rx="10"
          fill="var(--accent,#3b6fd4)" fill-opacity="0" stroke="none">
      <animate attributeName="fill-opacity"
        dur="5s" repeatCount="indefinite"
        keyTimes="0;0.17;0.22;0.30;1.0"
        values="0;0;0.18;0;0"/>
    </rect>
    <text x="370" y="140" text-anchor="middle" class="ttl" fill="var(--accent,#3b6fd4)">Prefill Pool (GPU cluster A)</text>
    <text x="370" y="160" text-anchor="middle" class="sub">High compute, large batches, optimized for TFLOP/s</text>
    <text x="370" y="178" text-anchor="middle" class="sub">e.g. H100 SXM &#8212; 1&#8211;4 GPUs per replica</text>
    
    <rect x="530" y="118" width="94" height="17" rx="4"
          fill="var(--accent,#3b6fd4)" fill-opacity="0.18" stroke="var(--accent,#3b6fd4)" stroke-width="1"/>
    <text x="577" y="129.5" text-anchor="middle" class="badge" fill="var(--accent,#3b6fd4)">COMPUTE-BOUND</text>
  </g>

  
  <g data-anim="3">
    <line x1="370" y1="202" x2="370" y2="242"
          stroke="var(--warn,#e0a106)" stroke-width="2.8" marker-end="url(#dpd-arrow-amber)"/>
    <text x="418" y="218" class="arrow-lbl" fill="var(--warn,#e0a106)">KV cache transfer (RDMA / NVLink)</text>
    <text x="418" y="234" class="kv-mono">KV: [L, 2, T_p, n_kv, d_head]</text>
  </g>

  
  <g data-anim="3">
    <rect x="90" y="244" width="560" height="92" rx="10"
          fill="var(--good,#2f9e6e)" fill-opacity="0.09"
          stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
    <rect class="dpd-pulse-d" x="90" y="244" width="560" height="92" rx="10"
          fill="var(--good,#2f9e6e)" fill-opacity="0" stroke="none">
      <animate attributeName="fill-opacity"
        dur="5s" repeatCount="indefinite"
        keyTimes="0;0.48;0.53;0.62;1.0"
        values="0;0;0.18;0;0"/>
    </rect>
    <text x="370" y="274" text-anchor="middle" class="ttl" fill="var(--good,#2f9e6e)">Decode Pool (GPU cluster B)</text>
    <text x="370" y="294" text-anchor="middle" class="sub">High bandwidth, big batch, optimized for HBM BW</text>
    <text x="370" y="312" text-anchor="middle" class="sub">e.g. A100 / H100 &#8212; many GPUs, paged KV cache</text>
    
    <rect x="520" y="252" width="104" height="17" rx="4"
          fill="var(--good,#2f9e6e)" fill-opacity="0.18" stroke="var(--good,#2f9e6e)" stroke-width="1"/>
    <text x="572" y="263.5" text-anchor="middle" class="badge" fill="var(--good,#2f9e6e)">BANDWIDTH-BOUND</text>
  </g>

  
  <g data-anim="4">
    <line x1="370" y1="336" x2="370" y2="376"
          stroke="currentColor" class="v-muted" stroke-width="1.6"
          stroke-dasharray="5 3" marker-end="url(#dpd-arrow-dashed)"/>
    <text x="418" y="360" class="arrow-lbl">output tokens stream</text>
  </g>

  
  <g data-anim="4">
    <rect x="90" y="378" width="560" height="56" rx="10"
          fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#c9d2dc)" stroke-width="1.5"/>
    <text x="370" y="409" text-anchor="middle" class="ttl">Client</text>
  </g>

  
  
  <g class="dpd-pill" opacity="0">
    <animate attributeName="opacity"
      dur="5s" repeatCount="indefinite"
      keyTimes="0;0.01;0.36;0.38;1.0"
      values="0;1;1;0;0"/>
    <rect x="-30" y="-10" width="60" height="20" rx="8"
          fill="var(--accent,#3b6fd4)" fill-opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle"
          style="font:600 9px var(--sans,sans-serif);fill:var(--surface,#fff)">request</text>
    <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.01;0.20;0.35;1.0"
      keyPoints="0;0;0.30;0.45;0.45">
      <mpath href="#dpd-path-full"/>
    </animateMotion>
  </g>

  
  <g class="dpd-kv" opacity="0">
    <rect x="-28" y="-12" width="56" height="24" rx="6"
          fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle"
          style="font:600 8.5px var(--mono,monospace);fill:var(--surface,#fff)">KV ~1 GB</text>
    <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.36;0.40;0.50;0.60;0.70;0.80;1.0"
      keyPoints="0;0;0;0.50;1;1;1;1">
      <mpath href="#dpd-path-kv"/>
    </animateMotion>
    <animate attributeName="opacity"
      dur="5s" repeatCount="indefinite"
      keyTimes="0;0.35;0.38;0.50;0.55;1.0"
      values="0;0;1;1;0;0"/>
  </g>

  
  <g class="dpd-tok" opacity="0">
    <circle cx="0" cy="0" r="6" fill="var(--good,#2f9e6e)" fill-opacity="0.85"/>
    <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.55;0.60;0.80;1.0"
      keyPoints="0;0;0;1;1">
      <mpath href="#dpd-path-tok"/>
    </animateMotion>
    <animate attributeName="opacity"
      dur="5s" repeatCount="indefinite"
      keyTimes="0;0.54;0.56;0.80;0.82;1.0"
      values="0;0;1;1;0;0"/>
  </g>
  <g class="dpd-tok" opacity="0">
    <circle cx="0" cy="0" r="6" fill="var(--good,#2f9e6e)" fill-opacity="0.85"/>
    <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
      begin="0.35s"
      keyTimes="0;0.55;0.60;0.80;1.0"
      keyPoints="0;0;0;1;1">
      <mpath href="#dpd-path-tok"/>
    </animateMotion>
    <animate attributeName="opacity"
      dur="5s" repeatCount="indefinite"
      begin="0.35s"
      keyTimes="0;0.54;0.56;0.80;0.82;1.0"
      values="0;0;1;1;0;0"/>
  </g>
  <g class="dpd-tok" opacity="0">
    <circle cx="0" cy="0" r="6" fill="var(--good,#2f9e6e)" fill-opacity="0.85"/>
    <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
      begin="0.70s"
      keyTimes="0;0.55;0.60;0.80;1.0"
      keyPoints="0;0;0;1;1">
      <mpath href="#dpd-path-tok"/>
    </animateMotion>
    <animate attributeName="opacity"
      dur="5s" repeatCount="indefinite"
      begin="0.70s"
      keyTimes="0;0.54;0.56;0.80;0.82;1.0"
      values="0;0;1;1;0;0"/>
  </g>

  
  <path id="dpd-path-full" d="M370,30 L370,450" fill="none" stroke="none"/>
  <path id="dpd-path-kv"   d="M370,202 L370,244" fill="none" stroke="none"/>
  <path id="dpd-path-tok"  d="M370,336 L370,406" fill="none" stroke="none"/>

  
  <g data-anim="5">
    <text x="90" y="510" class="sub" style="font:500 10.5px var(--sans,sans-serif);fill:var(--muted);">
      Lifecycle: (1) Request arrives at router &#8211;&gt; (2) Prefill worker runs full forward pass, produces first token + KV cache
    </text>
    <text x="90" y="528" class="sub" style="font:500 10.5px var(--sans,sans-serif);fill:var(--muted);">
      &#8211;&gt; (3) KV cache transferred over RDMA/NVLink (~1 ms on NVSwitch) &#8211;&gt; (4) Decode worker generates tokens one-by-one
    </text>
    <text x="90" y="546" class="sub" style="font:500 10.5px var(--sans,sans-serif);fill:var(--muted);">
      &#8211;&gt; (5) Tokens stream to client &#8212; decode workers never stall on prefill work.
    </text>
  </g>
</svg>
<figcaption><b>Disaggregated prefill/decode: requests are processed by dedicated compute-bound prefill workers, then KV caches are transferred to bandwidth-bound decode workers for token generation.</b> Separating the two phases eliminates prefill-decode interference: decode workers run pure decode steps at predictable latency, while prefill workers saturate GPU TFLOP/s without memory-bandwidth competition. The amber KV-cache transfer arrow is the key engineering challenge; NVLink/NVSwitch keeps it under ~1 ms for typical prompts.</figcaption>
</figure>
