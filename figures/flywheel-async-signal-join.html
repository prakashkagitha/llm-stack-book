  </marker>
  <marker id="asj-arr-mut" viewBox="0 0 10 10" refX="9" refY="5"
    markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--muted,#6d675d)"/>
  </marker>
  <style>
    #fig-flywheel-async-signal-join .box-title {
      font: 700 12px var(--sans,sans-serif);
    }
    #fig-flywheel-async-signal-join .box-sub {

    }

    }

  </style>

<text x="72" y="220" text-anchor="middle" class="box-sub"

  fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
<text x="243" y="215" text-anchor="middle" class="box-title"
  fill="var(--ink-soft,#45413a)">signal_events</text>


<rect x="360" y="96" width="168" height="98" rx="8"

<rect x="360" y="96" width="168" height="5" rx="3"
  fill="var(--accent,#4f46e5)"/>
<text x="444" y="126" text-anchor="middle" class="join-title"
  fill="var(--accent,#4f46e5)">join job</text>
<text x="444" y="142" text-anchor="middle" class="join-sub"

<text x="444" y="168" text-anchor="middle" class="join-sub"

<rect x="598" y="50" width="170" height="78" rx="7"

<rect x="598" y="50" width="5" height="78" rx="2"

  fill="var(--accent,#4f46e5)">enriched_requests</text>
<text x="685" y="95" text-anchor="middle" class="box-sub"

<text x="153" y="44" text-anchor="middle" class="lbl"

<line x1="132" y1="210" x2="175" y2="210"

<text x="153" y="173" text-anchor="middle" class="lbl"

<text x="562" y="80" text-anchor="middle" class="lbl"

<path d="M 528,168 Q 562,184 595,200" fill="none"

<text x="560" y="222" text-anchor="middle" class="lbl"
  fill="var(--muted,#6d675d)">no signal</text>

</svg>
<figcaption><b>Two async event streams — request logs and client signals — are joined by <code>request_id</code> in a session-windowed streaming job.</b> Matched records land in a curated <em>enriched_requests</em> table (BigQuery or Delta) that feeds downstream labeling and reward modeling. Records that receive no client signal within the window are not discarded — they flow to an <em>unenriched</em> table whose implicit signals (session continuation, regeneration rate, edit distance) serve as weak-supervision labels for the remaining 95% of unlabeled traffic.</figcaption>
</figure>
