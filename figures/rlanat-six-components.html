<figure class="viz" id="fig-rlanat-six-components">
<svg viewBox="0 0 920 560" role="img" aria-label="Architecture diagram of the six invariant components of an RL-for-LLM system: Controller at top drives prompts into the Rollout/Generation Engine (inference), which feeds responses to the Reward/Verifier, which feeds rewards into the Experience Buffer, which feeds batches to the Learner/Trainer, which syncs updated weights back to the Rollout engine. Actor/Policy and Reference Model are annotated below as shared or frozen weights.">

    <marker id="sc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#555)"/>
    </marker>
    <marker id="sc-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#d6336c)"/>
    </marker>
    <marker id="sc-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#999)" opacity="0.6"/>
    </marker>
  </defs>
  <style>
    #fig-rlanat-six-components text { font: 13px var(--sans,sans-serif); fill: var(--ink-soft,#333); }

    #fig-rlanat-six-components .badge { font: 700 14px var(--sans,sans-serif); }
    #fig-rlanat-six-components .mono { font: 12px var(--mono,monospace); fill: var(--muted,#666); }
    #fig-rlanat-six-components .ann { font: 11px var(--sans,sans-serif); fill: var(--muted,#666); }
    #fig-rlanat-six-components .ann-bold { font: 700 11px var(--sans,sans-serif); fill: var(--muted,#666); }
    #fig-rlanat-six-components .edge-label { font: 11px var(--sans,sans-serif); fill: var(--ink-soft,#444); }
    #fig-rlanat-six-components .sync-label { font: 700 11px var(--sans,sans-serif); fill: var(--accent,#d6336c); }
  </style>

  
  <rect x="295" y="20" width="330" height="70" rx="8"
        fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#888)" stroke-width="2"/>
  <text x="460" y="50" text-anchor="middle" class="title">CONTROLLER</text>
  <text x="460" y="68" text-anchor="middle" class="subtitle">(drives the loop, owns the dataflow)</text>

  
  <line x1="340" y1="90" x2="340" y2="145"
        stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#sc-arrow)"/>

  <rect x="40" y="155" width="285" height="90" rx="8"
        fill="var(--accent2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1.5"/>
  <text x="55" y="185" class="badge" fill="var(--accent2,#3b82f6)">1.</text>
  <text x="75" y="185" class="title">ROLLOUT / GENERATION ENGINE</text>
  <text x="55" y="203" class="subtitle">(inference)</text>
  <text x="55" y="222" class="mono">vLLM / SGLang / HF</text>

  
  <rect x="595" y="155" width="300" height="90" rx="8"
        fill="var(--accent,#d6336c)" fill-opacity="0.10" stroke="var(--accent,#d6336c)" stroke-width="1.5"/>
  <text x="610" y="185" class="badge" fill="var(--accent,#d6336c)">4.</text>
  <text x="630" y="185" class="title">LEARNER / TRAINER</text>
  <text x="610" y="203" class="subtitle">forward + backward + opt</text>
  <text x="610" y="222" class="mono">FSDP / Megatron</text>

  
  <line x1="593" y1="200" x2="327" y2="200"
        stroke="var(--accent,#d6336c)" stroke-width="2.5" stroke-dasharray="7 4"
        marker-end="url(#sc-arrow-accent)"/>
  <text x="460" y="192" text-anchor="middle" class="sync-label">weights</text>
  <text x="460" y="208" text-anchor="middle" class="sync-label">— sync —</text>

  
  <line x1="182" y1="245" x2="182" y2="328"
        stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#sc-arrow)"/>
  <text x="190" y="275" class="edge-label">responses</text>
  <text x="190" y="290" class="edge-label">(tokens, logprobs)</text>

  
  <rect x="40" y="338" width="285" height="82" rx="8"

  <text x="55" y="366" class="badge" fill="var(--good,#2f9e6e)">3.</text>
  <text x="75" y="366" class="title">REWARD / VERIFIER</text>
  <text x="55" y="388" class="subtitle">RM / rules / sandbox</text>

  
  
  <rect x="555" y="348" width="310" height="70" rx="4"
        fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#888)" stroke-width="1.5"/>

  <text x="632" y="372" class="title">EXPERIENCE / REPLAY</text>
  <text x="632" y="391" class="title">BUFFER</text>
  <text x="610" y="408" class="subtitle">(the dataset)</text>

  
  <line x1="327" y1="379" x2="552" y2="379"
        stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#sc-arrow)"/>
  <text x="435" y="369" text-anchor="middle" class="edge-label">rewards</text>

  
  <line x1="730" y1="334" x2="730" y2="247"
        stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#sc-arrow)"/>
  <text x="738" y="300" class="edge-label">batches</text>
  <text x="738" y="314" class="edge-label">(adv, logprobs)</text>

  
  <line x1="40" y1="450" x2="880" y2="450"
        stroke="var(--border-2,#ccc)" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="40" y="472" class="ann">
    <tspan class="ann-bold">2.</tspan>
    <tspan> ACTOR / POLICY  =  the weights θ themselves (shared by components 1 and 4)</tspan>
  </text>
  
  <line x1="182" y1="245" x2="182" y2="455"
        stroke="var(--muted,#aaa)" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="730" y1="245" x2="730" y2="455"
        stroke="var(--muted,#aaa)" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>

  
  <text x="40" y="500" class="ann">
    <tspan class="ann-bold">6.</tspan>
    <tspan> REFERENCE MODEL  =  frozen θ_ref, queried by the learner for the KL term</tspan>
  </text>
  
  <line x1="730" y1="245" x2="730" y2="484"
        stroke="var(--muted,#aaa)" stroke-width="1" stroke-dasharray="3 4" opacity="0.3"/>

  
  <line x1="328" y1="536" x2="300" y2="536"
        stroke="var(--accent,#d6336c)" stroke-width="2.5" stroke-dasharray="7 4"
        marker-end="url(#sc-arrow-accent)"/>
  <text x="336" y="540" text-anchor="start" class="ann" fill="var(--accent,#d6336c)">dashed magenta arrow = weight sync (the uniquely-RL step)</text>
</svg>
<figcaption><b>The six invariant components of an RL-for-LLM system and the data that flows between them.</b> Every framework from a toy TRL script to a production cluster implements this same wiring; what varies is <em>where</em> each component runs and <em>who</em> coordinates it. The dashed magenta arrow — updated weights pushing from Learner back into the Rollout engine — has no analogue in SFT or serving and is the root cause of the weight-sync engineering problem in Part VI.</figcaption>
</figure>
