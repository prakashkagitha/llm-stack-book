<figure class="viz" id="fig-emb-contrastive-space-geometry">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 820 400" role="img" aria-label="Contrastive fine-tuning reshapes the embedding space from an anisotropic cone, where all embeddings are crammed together, to an isotropic sphere where positives are pulled close and negatives are pushed apart, with hard negatives producing the largest gradients.">
  <defs>
    <marker id="csg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
    <marker id="csg-arrow-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="csg-arrow-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
    </marker>
  </defs>
  <style>
    #fig-emb-contrastive-space-geometry text{ fill: var(--ink-soft); font: 12px var(--sans,sans-serif); }
    #fig-emb-contrastive-space-geometry .lbl{ font: 600 13px var(--sans,sans-serif); }
    #fig-emb-contrastive-space-geometry .cap{ font: 400 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-emb-contrastive-space-geometry .capB{ font: 600 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-emb-contrastive-space-geometry .tiny{ font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
  </style>

  <text x="410" y="22" text-anchor="middle" class="lbl">What contrastive training does to the embedding space</text>


  <g data-anim="1">
    <text x="160" y="46" text-anchor="middle" class="capB">Before fine-tuning (anisotropic)</text>
    <circle cx="160" cy="215" r="100" fill="none" class="v-grid" stroke="currentColor" stroke-width="1.4"/>

    
    <path d="M160 215 L 213 128 A100 100 0 0 1 224 148 Z" fill="var(--v-muted)" opacity="0.18"/>

    
    <circle cx="198" cy="158" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="209" cy="169" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="191" cy="176" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="215" cy="148" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="202" cy="140" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="221" cy="163" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>

    <text x="160" y="345" text-anchor="middle" class="cap">everything looks similar;</text>
    <text x="160" y="358" text-anchor="middle" class="cap">cosine similarity uninformative</text>
  </g>


  <g data-anim="2">
    <line x1="264" y1="215" x2="316" y2="215" class="v-muted" stroke="currentColor" stroke-width="1.6" marker-end="url(#csg-arrow)"/>
    <text x="290" y="201" text-anchor="middle" class="cap">contrastive</text>
    <text x="290" y="230" text-anchor="middle" class="cap">training</text>
  </g>


  <g data-anim="3">
    <text x="560" y="46" text-anchor="middle" class="capB">After fine-tuning (isotropic)</text>
    <circle cx="560" cy="215" r="100" fill="none" class="v-grid" stroke="currentColor" stroke-width="1.4"/>

    
    <circle cx="600" cy="118" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="480" cy="270" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="560" cy="313" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="470" cy="200" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>
    <circle cx="602" cy="256" r="5" class="v-fill" stroke="var(--v-muted)" stroke-width="1.4"/>

    
    <circle cx="500" cy="150" r="6.5" class="v-accent" fill="var(--accent)"/>
    <text x="484" y="146" text-anchor="end" class="cap" fill="var(--accent)">q</text>

    <circle cx="516" cy="161" r="6.5" fill="var(--accent)" opacity="0.55" stroke="var(--accent)" stroke-width="1.4"/>
    <line x1="505" y1="153" x2="510" y2="157" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#csg-arrow-acc)"/>
    <text x="522" y="176" text-anchor="start" class="cap" fill="var(--accent)">d+</text>
    <text x="524" y="189" text-anchor="start" class="tiny">pull positive</text>
    <text x="524" y="200" text-anchor="start" class="tiny">together</text>

    <circle cx="519" cy="130" r="6.5" fill="var(--warn,#e0a106)" opacity="0.8" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
    <text x="502" y="122" text-anchor="end" class="cap" fill="var(--warn,#e0a106)">d-</text>
    <line x1="524" y1="124" x2="548" y2="94" stroke="var(--warn,#e0a106)" stroke-width="1.8" marker-end="url(#csg-arrow-warn)"/>
    <text x="556" y="86" text-anchor="start" class="tiny" fill="var(--warn,#e0a106)">push hard negative</text>
    <text x="556" y="98" text-anchor="start" class="tiny" fill="var(--warn,#e0a106)">away -- large gradient</text>

    
    <circle cx="646" cy="268" r="6.5" fill="var(--v-muted)" opacity="0.7" stroke="var(--v-muted)" stroke-width="1.4"/>
    <text x="656" y="264" text-anchor="start" class="cap">d-</text>
    <line x1="646" y1="268" x2="654" y2="261" stroke="var(--v-muted)" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.7" marker-end="url(#csg-arrow)"/>
    <text x="640" y="287" text-anchor="middle" class="tiny">random negative -- already</text>
    <text x="640" y="298" text-anchor="middle" class="tiny">far, little signal</text>

    <text x="560" y="345" text-anchor="middle" class="cap">embeddings spread uniformly;</text>
    <text x="560" y="358" text-anchor="middle" class="cap">cosine similarity now discriminative</text>
  </g>


  <g data-anim="4">
    <circle cx="210" cy="380" r="5" class="v-accent" fill="var(--accent)"/>
    <text x="221" y="384" class="tiny">query</text>
    <circle cx="285" cy="380" r="5" fill="var(--accent)" opacity="0.55" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="296" y="384" class="tiny">positive</text>
    <circle cx="365" cy="380" r="5" fill="var(--warn,#e0a106)" opacity="0.8" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
    <text x="376" y="384" class="tiny">hard negative</text>
    <circle cx="495" cy="380" r="5" fill="var(--v-muted)" opacity="0.7" stroke="var(--v-muted)" stroke-width="1.4"/>
    <text x="506" y="384" class="tiny">random negative</text>
  </g>
</svg>
<figcaption><b>Contrastive training reshapes anisotropic embeddings into an isotropic sphere.</b> Before fine-tuning, embeddings collapse into a narrow cone where all pairs look similar; after fine-tuning, they spread uniformly so cosine similarity becomes meaningful. Hard negatives sit deceptively close to the query and generate large gradients, while random negatives are already far away and contribute little training signal.</figcaption>
</figure>
