<figure class="viz" id="fig-online-eval-cuped-variance-reduction">
<svg viewBox="0 0 820 480" role="img" aria-label="Three-stage diagram: a scatter plot of each user's pre-experiment metric X against their in-experiment metric Y shows a positive correlation with a regression line of slope theta star; subtracting that regression's projection collapses the same points onto a tight horizontal band of residuals; the residual's variance, shown as a much narrower bell curve next to the original wide bell curve, is Var(Y) times (1 minus rho squared), roughly half the original variance when rho is 0.7.">
  <defs>
    <marker id="cv-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#475569)"/>
    </marker>
  </defs>
  <style>
    #fig-online-eval-cuped-variance-reduction text { font-family: var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
    #fig-online-eval-cuped-variance-reduction .title { font: 700 12.5px var(--sans,sans-serif); fill: var(--ink,#1e293b); }
    #fig-online-eval-cuped-variance-reduction .sub { font: 600 9.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-online-eval-cuped-variance-reduction .axis-t { font: 600 9.5px var(--sans,sans-serif); }
    #fig-online-eval-cuped-variance-reduction .note { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-online-eval-cuped-variance-reduction .note-i { font: italic 400 9.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-online-eval-cuped-variance-reduction .lbl-sm { font: 600 9px var(--sans,sans-serif); }
    #fig-online-eval-cuped-variance-reduction .callout { font: 700 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
    #fig-online-eval-cuped-variance-reduction .axis { stroke: var(--border-2,#d8d1c0); stroke-width: 1.2; }
    #fig-online-eval-cuped-variance-reduction .dot { fill: var(--ink-soft,#475569); opacity: .78; }
    #fig-online-eval-cuped-variance-reduction .regline { stroke: var(--accent,#c15b39); stroke-width: 1.8; fill: none; }
    #fig-online-eval-cuped-variance-reduction .xbar-line { stroke: var(--muted,#94a3b8); stroke-width: 1.2; stroke-dasharray: 4,3; }
    #fig-online-eval-cuped-variance-reduction .zero-line { stroke: var(--muted,#94a3b8); stroke-width: 1.2; stroke-dasharray: 4,3; }
    #fig-online-eval-cuped-variance-reduction .band { fill: var(--accent,#c15b39); opacity: .08; }
    #fig-online-eval-cuped-variance-reduction .flow-arrow { stroke: var(--ink-soft,#475569); stroke-width: 1.4; }
    #fig-online-eval-cuped-variance-reduction .bell-wide { fill: var(--muted,#94a3b8); opacity: .30; stroke: var(--ink-soft,#475569); stroke-width: 1.3; }
    #fig-online-eval-cuped-variance-reduction .bell-narrow { fill: var(--accent,#c15b39); opacity: .38; stroke: var(--accent,#c15b39); stroke-width: 1.6; }
    #fig-online-eval-cuped-variance-reduction .panel-div { stroke: var(--border-2,#d8d1c0); stroke-width: 1; opacity: .6; }
  </style>


  <text x="140" y="20" text-anchor="middle" class="title">Stage 1 -- raw (X, Y) pairs</text>
  <text x="140" y="34" text-anchor="middle" class="sub">theta* = Cov(Y,X) / Var(X),  rho ~ 0.7</text>

  <line x1="55" y1="70" x2="55" y2="340" class="axis"/>
  <line x1="55" y1="340" x2="245" y2="340" class="axis"/>

  <line x1="150" y1="70" x2="150" y2="340" class="xbar-line"/>
  <text x="150" y="354" text-anchor="middle" class="lbl-sm">X-bar</text>

  <path class="regline" d="M55,280.6 L245,118.6"/>
  <text x="195" y="95" text-anchor="middle" class="lbl-sm" fill="var(--accent,#c15b39)">theta*</text>

  <g class="dot">
    <circle cx="70.2" cy="264.4" r="3.2"/>
    <circle cx="83.5" cy="226.6" r="3.2"/>

    <circle cx="150" cy="199.6" r="3.2"/>

    <circle cx="169" cy="183.4" r="3.2"/>
    <circle cx="178.5" cy="151" r="3.2"/>

    <circle cx="197.5" cy="129.4" r="3.2"/>
    <circle cx="207" cy="145.6" r="3.2"/>
    <circle cx="216.5" cy="110.5" r="3.2"/>
    <circle cx="226" cy="124" r="3.2"/>
    <circle cx="229.8" cy="97" r="3.2"/>
  </g>

  <text x="140" y="368" text-anchor="middle" class="axis-t">X = pre-experiment metric (per user)</text>
  <text x="24" y="205" text-anchor="middle" class="axis-t" transform="rotate(-90 24 205)">Y = in-experiment metric</text>


  <line x1="262" y1="205" x2="303" y2="205" class="flow-arrow" marker-end="url(#cv-arrow)"/>
  <text x="282" y="193" text-anchor="middle" class="lbl-sm">subtract</text>
  <text x="282" y="222" text-anchor="middle" class="lbl-sm">the projection</text>


  <text x="415" y="20" text-anchor="middle" class="title">Stage 2 -- residual Y-tilde</text>
  <text x="415" y="34" text-anchor="middle" class="sub">Y-tilde = Y - theta*(X - X-bar)</text>

  <line x1="325" y1="70" x2="325" y2="340" class="axis"/>
  <line x1="325" y1="340" x2="500" y2="340" class="axis"/>

  <rect class="band" x="330" y="148" width="160" height="80"/>
  <line x1="325" y1="205" x2="500" y2="205" class="zero-line"/>
  <text x="497" y="200" text-anchor="end" class="lbl-sm">residual ~ 0</text>

  <g class="dot">
    <circle cx="347.8" cy="200.2" r="3.2"/>
    <circle cx="359" cy="161" r="3.2"/>
    <circle cx="367" cy="221" r="3.2"/>
    <circle cx="375" cy="161" r="3.2"/>
    <circle cx="383" cy="205" r="3.2"/>
    <circle cx="391" cy="157" r="3.2"/>

    <circle cx="463" cy="197" r="3.2"/>

    <circle cx="482.2" cy="153.8" r="3.2"/>
  </g>

  <text x="415" y="368" text-anchor="middle" class="axis-t">X (same users, same order)</text>
  <text x="415" y="392" text-anchor="middle" class="note-i">residual = what the pre-period could NOT predict</text>


  <line x1="512" y1="205" x2="548" y2="205" class="flow-arrow" marker-end="url(#cv-arrow)"/>


  <text x="680" y="20" text-anchor="middle" class="title">Stage 3 -- variance comparison</text>
  <text x="680" y="34" text-anchor="middle" class="sub">same users, much less noise</text>

  <line x1="560" y1="215" x2="800" y2="215" class="panel-div"/>

  <path class="bell-wide" d="M615,85
    C 632,105 650,150 650,215
    C 650,280 632,325 615,345
    C 598,325 580,280 580,215
    C 580,150 598,105 615,85 Z"/>

  <path class="bell-narrow" d="M745,170
    C 758,182 765,198 765,215
    C 765,232 758,248 745,260
    C 732,248 725,232 725,215
    C 725,198 732,182 745,170 Z"/>

  <line x1="652" y1="215" x2="708" y2="215" class="flow-arrow" marker-end="url(#cv-arrow)"/>
  <text x="680" y="205" text-anchor="middle" class="lbl-sm">x(1 - rho^2)</text>

  <text x="615" y="360" text-anchor="middle" class="title" style="font-size:11.5px">Var(Y)</text>
  <text x="615" y="373" text-anchor="middle" class="note">raw metric</text>

  <text x="745" y="360" text-anchor="middle" class="title" style="font-size:11.5px" fill="var(--accent,#c15b39)">Var(Y-tilde)</text>
  <text x="745" y="373" text-anchor="middle" class="note">= Var(Y)(1 - rho^2)</text>

  <rect x="570" y="410" width="220" height="46" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
  <text x="680" y="429" text-anchor="middle" class="callout" style="font-size:10px">rho = 0.7 -&gt; variance falls to ~51%</text>
  <text x="680" y="444" text-anchor="middle" class="callout" style="font-size:10px">-&gt; about half the users, same power</text>
</svg>
<figcaption><b>CUPED subtracts the part of each user's outcome that pre-experiment behavior already explains, leaving a cleaner signal.</b> Regressing the in-experiment metric on a pre-experiment covariate and subtracting the fitted projection collapses a wide, correlated scatter into a tight residual band; at a typical correlation of rho = 0.7, the residual's variance is roughly half the raw metric's, so about half as many users are needed to reach the same statistical power.</figcaption>
</figure>
