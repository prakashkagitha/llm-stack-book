<figcaption><b>Jailbreak attacks fall into three families: manual framing tricks, automated optimization, and multi-turn context manipulation.</b> Manual techniques exploit role-play and hypothetical framing; optimization-based methods (GCG, AutoDAN, PAIR) use gradients or an attacker LLM to search for effective suffixes; multi-turn techniques like Crescendo and many-shot jailbreaking exploit long context to gradually shift the model's behavior. A robust red-team evaluation must cover all three branches.</figcaption>
