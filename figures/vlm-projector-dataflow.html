<figure class="viz" id="fig-vlm-projector-dataflow">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 1020 290" role="img" aria-label="LLaVA-style projector data flow: image enters Vision Encoder producing patch embeddings, Projector MLP maps them to D_llm, and projected visual tokens are prepended before the LLM text tokens.">
  <defs>
    <marker id="pd-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
    </marker>
    <marker id="pd-arr-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6d675d)"/>
    </marker>
  </defs>
  <style>
    #fig-vlm-projector-dataflow .lbl { font:600 12px var(--sans,sans-serif); }
    #fig-vlm-projector-dataflow .sub { font:400 10px var(--mono,monospace); fill:var(--muted,#6d675d); }
    #fig-vlm-projector-dataflow .tok { font:600 9px var(--mono,monospace); }
    #fig-vlm-projector-dataflow .cap { font:500 10px var(--sans,sans-serif); fill:var(--muted,#6d675d); }
    #fig-vlm-projector-dataflow .ann { font:400 9px var(--mono,monospace); fill:var(--muted,#6d675d); }
    #fig-vlm-projector-dataflow text { fill:var(--ink-soft,#45413a); }
  </style>

  

  
  <g data-anim="1">
    <rect x="14" y="14" width="180" height="52" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="104" y="35" text-anchor="middle" class="lbl">Image</text>
    <text x="104" y="52" text-anchor="middle" class="sub">336 x 336 pixels</text>
  </g>

  
  <line x1="104" y1="68" x2="104" y2="100" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#pd-arr)"/>

  
  <g data-anim="2">
    <rect x="14" y="103" width="180" height="52" rx="8" fill="var(--surface-3,#ece7da)" class="v-accent-s" stroke-width="1.5"/>
    <text x="104" y="125" text-anchor="middle" class="lbl">Vision Encoder</text>
    <text x="104" y="142" text-anchor="middle" class="sub">(ViT-L/14)</text>
  </g>

  
  <line x1="104" y1="157" x2="104" y2="188" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#pd-arr)"/>
  
  <text x="14" y="170" class="ann">patch embeds [N=576, D_v]</text>

  
  <g data-anim="3">
    <rect x="14" y="191" width="180" height="62" rx="8" fill="var(--accent,#c15b39)" stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
    <text x="104" y="213" text-anchor="middle" class="lbl" fill="#fff">Projector</text>
    <text x="104" y="228" text-anchor="middle" fill="#fff" style="font:400 10px var(--mono,monospace);">(MLP or linear)</text>
    <text x="104" y="243" text-anchor="middle" fill="rgba(255,255,255,0.8)" style="font:400 9px var(--mono,monospace);">out: [N=576, D_llm]</text>
  </g>

  
  <g data-anim="4">
    <path d="M 196 222 L 268 222 L 268 148 L 328 148"
          fill="none" stroke="var(--accent,#c15b39)" stroke-width="2"
          marker-end="url(#pd-arr)"/>
  </g>

  
  <g data-anim="2">
    <rect x="330" y="52" width="676" height="212" rx="10" class="v-fill v-stroke" stroke-width="2"/>
    
    <rect x="330" y="52" width="676" height="30" rx="10" fill="var(--surface-3,#ece7da)" stroke="none"/>
    <rect x="330" y="68"  width="676" height="14"         fill="var(--surface-3,#ece7da)" stroke="none"/>
    <line x1="330" y1="82" x2="1006" y2="82" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
    <text x="668" y="72" text-anchor="middle" class="lbl">LLM (frozen or fine-tuned)</text>
  </g>

  
  <g data-anim="4">
    <text x="346" y="96" class="ann" fill="var(--accent,#c15b39)">projected visual tokens</text>
  </g>

  
  <g data-anim="5">
    <line x1="346" y1="108" x2="614" y2="108" stroke="var(--muted,#6d675d)" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.5"/>
  </g>

  
  <g data-anim="5">
    <rect x="346" y="114" width="52" height="28" rx="5" fill="var(--accent,#c15b39)" fill-opacity="0.22" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="372" y="133" text-anchor="middle" class="tok">&lt;img_1&gt;</text>

    <rect x="404" y="114" width="52" height="28" rx="5" fill="var(--accent,#c15b39)" fill-opacity="0.22" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="430" y="133" text-anchor="middle" class="tok">&lt;img_2&gt;</text>

    <rect x="462" y="114" width="52" height="28" rx="5" fill="var(--accent,#c15b39)" fill-opacity="0.22" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="488" y="133" text-anchor="middle" class="tok">&lt;img_3&gt;</text>

    <rect x="520" y="114" width="26" height="28" rx="5" fill="var(--accent,#c15b39)" fill-opacity="0.10" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="533" y="133" text-anchor="middle" class="tok">...</text>

    <rect x="552" y="114" width="56" height="28" rx="5" fill="var(--accent,#c15b39)" fill-opacity="0.22" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="580" y="133" text-anchor="middle" class="tok">&lt;img_N&gt;</text>
  </g>

  
  <g data-anim="5">
    <line x1="618" y1="106" x2="618" y2="148" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5" stroke-dasharray="3 2"/>
  </g>

  
  <g data-anim="5">
    <rect x="626" y="114" width="64" height="28" rx="5" class="v-fill v-stroke" stroke-width="1"/>
    <text x="658" y="133" text-anchor="middle" class="tok">"Describe"</text>

    <rect x="696" y="114" width="26" height="28" rx="5" class="v-fill v-stroke" stroke-width="1"/>
    <text x="709" y="133" text-anchor="middle" class="tok">...</text>

    <rect x="728" y="114" width="70" height="28" rx="5" class="v-fill v-stroke" stroke-width="1"/>
    <text x="763" y="133" text-anchor="middle" class="tok">"this image"</text>

    <rect x="804" y="114" width="26" height="28" rx="5" class="v-fill v-stroke" stroke-width="1"/>
    <text x="817" y="133" text-anchor="middle" class="tok">...</text>

    <rect x="836" y="114" width="152" height="28" rx="5" class="v-fill v-stroke" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="912" y="133" text-anchor="middle" class="tok">more text tokens</text>
  </g>

  
  <g data-anim="4">
    <polygon points="372,150 366,158 378,158" fill="var(--accent,#c15b39)"/>
    <line x1="372" y1="160" x2="372" y2="172" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 3" opacity="0.4"/>
  </g>

  
  <g data-anim="5">
    <text x="466" y="188" text-anchor="middle" class="cap">visual tokens (from projector)</text>
    <text x="780" y="188" text-anchor="middle" class="cap">text tokens</text>
    <text x="570" y="238" text-anchor="middle" class="cap">autoregressive output</text>
    <line x1="642" y1="234" x2="668" y2="234" stroke="var(--muted,#6d675d)" stroke-width="1.1" marker-end="url(#pd-arr-m)"/>
    <text x="718" y="238" text-anchor="middle" class="cap">answer text</text>
  </g>

</svg>
<figcaption><b>The LLaVA-style projector converts patch embeddings into LLM-compatible tokens.</b> The Vision Encoder (ViT-L/14) produces N patch embeddings; the Projector MLP maps each from D_vision to D_llm; those projected tokens are prepended before the text tokens in the LLM input. Only the projector is trained in stage 1 — the encoder and LLM remain frozen.</figcaption>
</figure>
