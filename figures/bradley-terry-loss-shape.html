<figure class="viz" id="fig-bradley-terry-loss-shape">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 740 700" role="img" aria-label="How the Bradley-Terry pairwise loss maps the reward model's score gap Delta to a preference probability sigma(Delta) and a self-limiting loss -log sigma(Delta); only differences between scores matter, since shifting both by a constant leaves Delta unchanged.">
<defs>
  <marker id="btl-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="btl-arr-push" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>
<style>
  #fig-bradley-terry-loss-shape text { fill: var(--ink-soft,#334155); }
  #fig-bradley-terry-loss-shape .lbl    { font: 600 13px var(--sans,sans-serif); }
  #fig-bradley-terry-loss-shape .lbl-sm { font: 500 11px var(--sans,sans-serif); }
  #fig-bradley-terry-loss-shape .lbl-xs { font: 500 10px var(--sans,sans-serif); }
  #fig-bradley-terry-loss-shape .lbl-2xs{ font: 500 9.5px var(--sans,sans-serif); }
  #fig-bradley-terry-loss-shape .mono   { font: 600 11px var(--mono,monospace); }
  #fig-bradley-terry-loss-shape .mono-sm{ font: 600 10px var(--mono,monospace); }
  #fig-bradley-terry-loss-shape .accent { fill: var(--accent,#c15b39); }
  #fig-bradley-terry-loss-shape .accent2{ fill: var(--accent2,#3b82f6); }
  #fig-bradley-terry-loss-shape .muted  { fill: var(--muted,#94a3b8); }
  #fig-bradley-terry-loss-shape .bold   { font: 700 13px var(--sans,sans-serif); }
</style>

<text x="370" y="20" text-anchor="middle" class="bold">margin  Delta = r_phi(x, y_w) - r_phi(x, y_l)  - the score gap the RM assigns</text>

<g data-anim="1">

  <line x1="240" y1="65" x2="240" y2="365" class="muted" stroke="currentColor" stroke-width="1" stroke-dasharray="3 4" opacity="0.45"/>
  <line x1="380" y1="65" x2="380" y2="365" class="muted" stroke="currentColor" stroke-width="1" stroke-dasharray="3 4" opacity="0.45"/>
  <line x1="520" y1="65" x2="520" y2="365" class="muted" stroke="currentColor" stroke-width="1" stroke-dasharray="3 4" opacity="0.45"/>


  <line x1="90" y1="205" x2="680" y2="205" stroke="var(--ink-soft,#64748b)" stroke-width="1.6" marker-end="url(#btl-arr)"/>
  <line x1="240" y1="201" x2="240" y2="209" stroke="var(--ink-soft,#64748b)" stroke-width="1.4"/>
  <line x1="380" y1="201" x2="380" y2="209" stroke="var(--ink-soft,#64748b)" stroke-width="1.4"/>
  <line x1="520" y1="201" x2="520" y2="209" stroke="var(--ink-soft,#64748b)" stroke-width="1.4"/>
  <text x="240" y="219" text-anchor="middle" class="lbl-xs muted">-2</text>
  <text x="380" y="219" text-anchor="middle" class="lbl-xs muted">0</text>
  <text x="520" y="219" text-anchor="middle" class="lbl-xs muted">+2</text>
  <text x="655" y="200" text-anchor="end" class="lbl-xs muted">Delta</text>
</g>

<g data-anim="2">
  <text x="100" y="52" class="lbl-sm accent">sigma(Delta)  - preference probability the RM implies</text>
  <text x="70" y="70" text-anchor="middle" class="lbl-2xs muted">1</text>
  <text x="70" y="133" text-anchor="middle" class="lbl-2xs muted">.5</text>
  <text x="70" y="198" text-anchor="middle" class="lbl-2xs muted">0</text>
  <line x1="90" y1="130" x2="670" y2="130" stroke="currentColor" class="muted" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>

  <path fill="none" stroke="var(--accent,#c15b39)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        d="M100,192.7 135,191.2 170,188.8 205,185.1 240,179.5 275,171.3 310,160.0
           345,145.9 380,130.0 415,114.1 450,100.0 485,88.7 520,80.5 555,74.9
           590,71.2 625,68.8 660,67.3"/>


  <circle cx="380" cy="130" r="4.5" fill="var(--accent,#c15b39)"/>
  <line x1="255" y1="80" x2="366" y2="121" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
  <text x="115" y="65" class="mono-sm accent">sigma(0) = 0.5</text>
  <text x="115" y="79" class="lbl-2xs muted">coin flip: equal scores</text>

  <circle cx="520" cy="80.5" r="4.5" fill="var(--accent,#c15b39)"/>
  <line x1="530" y1="148" x2="524" y2="90" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
  <text x="470" y="163" class="mono-sm accent">sigma(+2) ~ 0.88</text>
  <text x="470" y="177" class="lbl-2xs muted">chosen preferred ~88% of the time</text>

  <text x="380" y="196" text-anchor="middle" class="lbl-2xs muted" font-style="italic">the score IS a log-odds of preference</text>
</g>

<g data-anim="3">
  <text x="100" y="234" class="lbl-sm accent2">L(Delta) = -log sigma(Delta) = softplus(-Delta)</text>

  <path fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        d="M100,235 135,250.3 170,265.9 205,281.2 240,295.9 275,309.7 310,322.3
           345,333.3 380,342.5 415,349.6 450,354.8 485,358.5 520,360.9 555,362.4
           590,363.4 625,364.0 660,364.4"/>


  <text x="105" y="336" class="lbl-2xs accent2">confidently WRONG:</text>
  <text x="105" y="349" class="lbl-2xs accent2">loss grows ~linearly,</text>
  <text x="105" y="362" class="lbl-2xs accent2">gradient saturates at 1</text>
  <line x1="130" y1="322" x2="103" y2="242" stroke="var(--accent2,#3b82f6)" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>


  <circle cx="380" cy="342.5" r="4" fill="var(--accent2,#3b82f6)"/>
  <text x="392" y="360" class="mono-sm accent2">L = log 2 ~ 0.69</text>


  <text x="460" y="250" class="lbl-2xs accent2">confidently correct:</text>
  <text x="460" y="263" class="lbl-2xs accent2">loss -> 0, gradient -> 0</text>
  <text x="460" y="276" class="lbl-2xs accent2">(almost no push)</text>
</g>

<g data-anim="4">

  <line x1="150" y1="390" x2="233" y2="390" stroke="var(--accent2,#3b82f6)" stroke-width="3" marker-end="url(#btl-arr-push)"/>
  <text x="150" y="380" class="lbl-2xs accent2">big push (Delta~-2.5)</text>


  <line x1="485" y1="390" x2="501" y2="390" stroke="var(--accent2,#3b82f6)" stroke-width="3" marker-end="url(#btl-arr-push)"/>
  <text x="452" y="380" class="lbl-2xs accent2">small push (Delta~+1.5)</text>

  <text x="370" y="412" text-anchor="middle" class="lbl-xs muted">push prop.to (1 - sigma(Delta)): self-limiting - big when wrong, ~0 when already right</text>
</g>

<g data-anim="5">
  <rect x="50" y="440" width="640" height="165" rx="10" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="370" y="462" text-anchor="middle" class="bold accent">Only differences matter</text>


  <line x1="140" y1="500" x2="420" y2="500" stroke="currentColor" class="muted" stroke-width="1.3"/>
  <line x1="200" y1="486" x2="200" y2="494" class="muted" stroke="currentColor" stroke-width="1.2"/>
  <line x1="330" y1="486" x2="330" y2="494" class="muted" stroke="currentColor" stroke-width="1.2"/>
  <path d="M200,483 Q265,470 330,483" fill="none" stroke="var(--ink-soft,#64748b)" stroke-width="1.2"/>
  <text x="265" y="474" text-anchor="middle" class="mono-sm">Delta</text>
  <circle cx="200" cy="500" r="5" fill="var(--accent2,#3b82f6)"/>
  <circle cx="330" cy="500" r="5" fill="var(--accent,#c15b39)"/>
  <text x="200" y="517" text-anchor="middle" class="mono-sm accent2">r_l</text>
  <text x="330" y="517" text-anchor="middle" class="mono-sm accent">r_w</text>


  <line x1="140" y1="565" x2="420" y2="565" stroke="currentColor" class="muted" stroke-width="1.3"/>
  <line x1="280" y1="551" x2="280" y2="559" class="muted" stroke="currentColor" stroke-width="1.2"/>
  <line x1="410" y1="551" x2="410" y2="559" class="muted" stroke="currentColor" stroke-width="1.2"/>
  <path d="M280,548 Q345,535 410,548" fill="none" stroke="var(--ink-soft,#64748b)" stroke-width="1.2"/>
  <text x="345" y="539" text-anchor="middle" class="mono-sm">Delta  (same!)</text>
  <circle cx="280" cy="565" r="5" fill="var(--accent2,#3b82f6)"/>
  <circle cx="410" cy="565" r="5" fill="var(--accent,#c15b39)"/>
  <text x="280" y="582" text-anchor="middle" class="mono-sm accent2">r_l + c</text>
  <text x="410" y="582" text-anchor="middle" class="mono-sm accent">r_w + c</text>

  <line x1="200" y1="500" x2="280" y2="565" stroke="currentColor" class="muted" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="330" y1="500" x2="410" y2="565" stroke="currentColor" class="muted" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
  <text x="440" y="533" class="lbl-2xs muted">shift both scores</text>
  <text x="440" y="546" class="lbl-2xs muted">by any constant c</text>

  <text x="440" y="500" class="lbl-xs" font-weight="600">-> Delta, sigma(Delta), loss, and</text>
  <text x="440" y="514" class="lbl-xs" font-weight="600">gradient all unchanged.</text>
</g>

</svg>
<figcaption><b>The Bradley-Terry loss is a self-limiting logistic loss on the RM's score gap.</b> The margin Δ = r_w − r_l first passes through σ(Δ) to give a calibrated preference probability (σ(0)=0.5, σ(+2)≈0.88), then through the loss L(Δ)=−log σ(Δ), whose gradient magnitude (1−σ(Δ)) is large when the model is confidently wrong and vanishes when it is already confidently right. Because only the gap Δ enters every stage, shifting both scores by any constant c leaves the probability, loss, and gradient identical — reward is identified only up to an additive constant.</figcaption>
</figure>
