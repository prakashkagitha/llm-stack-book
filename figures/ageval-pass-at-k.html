<figure class="viz" id="fig-ageval-pass-at-k">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 400" role="img" aria-label="Two panel figure. Left: a pool of 8 sampled agent trajectories, 2 correct and 6 failed, with the pass at k formula and a bracket showing k samples drawn without replacement. Right: a rising curve of pass at k versus k plotting worked values pass at 1 equals 0.25, pass at 2 equals 0.46, pass at 4 equals 0.79, with callouts noting pass at 1 is what a single run gets while the high k ceiling needs a perfect verifier to pick the winner.">
<style>
  #fig-ageval-pass-at-k text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-ageval-pass-at-k .v-fill { fill: var(--surface-3,#ece7da); }
  #fig-ageval-pass-at-k .hdr { font: 700 13px var(--sans,sans-serif); }
  #fig-ageval-pass-at-k .sub { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-ageval-pass-at-k .mono { font: 400 11px var(--mono,monospace); }
  #fig-ageval-pass-at-k .tile-lbl { font: 700 11px var(--mono,monospace); }
  #fig-ageval-pass-at-k .axis-lbl { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-ageval-pass-at-k .dot-lbl { font: 700 11px var(--sans,sans-serif); }
  #fig-ageval-pass-at-k .callout { font: 400 10.5px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-ageval-pass-at-k .callout-hdr { font: 700 10.5px var(--sans,sans-serif); }
  #fig-ageval-pass-at-k .footer-txt { font: 600 11.5px var(--sans,sans-serif); }
</style>


<line x1="392" y1="10" x2="392" y2="330" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 4"/>


<g data-anim="1">
  <text x="16" y="24" class="hdr">The sample pool (n = 8, c = 2 correct)</text>
  <text x="16" y="44" class="mono">pass@k = 1 - C(n-c, k) / C(n, k)</text>
  <text x="16" y="60" class="sub">= P(at least one of k drawn is correct)</text>
</g>


<g data-anim="2">
  
  <rect x="16"  y="78" width="80" height="52" rx="7" fill="var(--good,#2f9e6e)" opacity="0.18" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="56" y="100" text-anchor="middle" class="tile-lbl">S1</text>
  <text x="56" y="118" text-anchor="middle" class="tile-lbl" fill="var(--good,#2f9e6e)">check pass</text>

  <rect x="104" y="78" width="80" height="52" rx="7" fill="var(--good,#2f9e6e)" opacity="0.18" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="144" y="100" text-anchor="middle" class="tile-lbl">S2</text>
  <text x="144" y="118" text-anchor="middle" class="tile-lbl" fill="var(--good,#2f9e6e)">check pass</text>

  <rect x="192" y="78" width="80" height="52" rx="7" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="232" y="100" text-anchor="middle" class="tile-lbl">S3</text>
  <text x="232" y="118" text-anchor="middle" class="tile-lbl" fill="var(--muted,#6d675d)">x fail</text>

  <rect x="280" y="78" width="80" height="52" rx="7" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="320" y="100" text-anchor="middle" class="tile-lbl">S4</text>
  <text x="320" y="118" text-anchor="middle" class="tile-lbl" fill="var(--muted,#6d675d)">x fail</text>

  
  <rect x="16"  y="140" width="80" height="52" rx="7" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="56" y="162" text-anchor="middle" class="tile-lbl">S5</text>
  <text x="56" y="180" text-anchor="middle" class="tile-lbl" fill="var(--muted,#6d675d)">x fail</text>

  <rect x="104" y="140" width="80" height="52" rx="7" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="144" y="162" text-anchor="middle" class="tile-lbl">S6</text>
  <text x="144" y="180" text-anchor="middle" class="tile-lbl" fill="var(--muted,#6d675d)">x fail</text>

  <rect x="192" y="140" width="80" height="52" rx="7" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="232" y="162" text-anchor="middle" class="tile-lbl">S7</text>
  <text x="232" y="180" text-anchor="middle" class="tile-lbl" fill="var(--muted,#6d675d)">x fail</text>

  <rect x="280" y="140" width="80" height="52" rx="7" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="320" y="162" text-anchor="middle" class="tile-lbl">S8</text>
  <text x="320" y="180" text-anchor="middle" class="tile-lbl" fill="var(--muted,#6d675d)">x fail</text>
</g>


<g data-anim="3">
  <path d="M10 210 L10 202 L366 202 L366 210" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.4"/>
  <text x="188" y="222" text-anchor="middle" class="sub">draw k (sampling without replacement, e.g. k = 4 shown)</text>
</g>


<g data-anim="1">
  <text x="410" y="24" class="hdr">pass@k climbs with k</text>
</g>


<g data-anim="2">
  <line x1="450" y1="290" x2="450" y2="60" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <line x1="450" y1="290" x2="760" y2="290" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <text x="424" y="176" text-anchor="middle" class="axis-lbl" transform="rotate(-90 424 176)">probability</text>

  
  <line x1="450" y1="290" x2="760" y2="290" stroke="var(--v-grid,#d8d1c0)" stroke-width="1"/>
  <line x1="450" y1="175" x2="760" y2="175" stroke="var(--v-grid,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="450" y1="60" x2="760" y2="60" stroke="var(--v-grid,#d8d1c0)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="444" y="294" text-anchor="end" class="axis-lbl">0</text>
  <text x="444" y="179" text-anchor="end" class="axis-lbl">0.5</text>
  <text x="444" y="64" text-anchor="end" class="axis-lbl">1.0</text>

  
  <text x="500" y="304" text-anchor="middle" class="axis-lbl">1</text>
  <text x="565" y="304" text-anchor="middle" class="axis-lbl">2</text>
  <text x="660" y="304" text-anchor="middle" class="axis-lbl">4</text>
  <text x="745" y="304" text-anchor="middle" class="axis-lbl">8</text>
  <text x="768" y="304" text-anchor="start" class="axis-lbl">k</text>
</g>


<g data-anim="4">
  <path d="M500 232 L565 185 L660 108 L745 65" fill="none" stroke="var(--accent,#c15b39)" stroke-width="2" class="viz-draw" style="--len:400"/>

  <circle cx="500" cy="232" r="5" class="v-accent-dot" fill="var(--accent,#c15b39)"/>
  <text x="500" y="220" text-anchor="middle" class="dot-lbl">0.25</text>

  <circle cx="565" cy="185" r="5" fill="var(--accent,#c15b39)"/>
  <text x="565" y="173" text-anchor="middle" class="dot-lbl">0.46</text>

  <circle cx="660" cy="108" r="5" fill="var(--accent,#c15b39)"/>
  <text x="660" y="96" text-anchor="middle" class="dot-lbl">0.79</text>

  <circle cx="745" cy="65" r="4" fill="var(--muted,#6d675d)" opacity="0.7"/>
</g>


<g data-anim="5">
  <rect x="452" y="330" width="145" height="52" rx="6" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="524" y="346" text-anchor="middle" class="callout-hdr">pass@1</text>
  <text x="524" y="361" text-anchor="middle" class="callout">what a single run /</text>
  <text x="524" y="374" text-anchor="middle" class="callout">a real user gets</text>

  <rect x="612" y="330" width="150" height="52" rx="6" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="687" y="346" text-anchor="middle" class="callout-hdr">high-k ceiling</text>
  <text x="687" y="361" text-anchor="middle" class="callout">reachable ONLY with a</text>
  <text x="687" y="374" text-anchor="middle" class="callout">perfect verifier to pick winner</text>

  <line x1="524" y1="330" x2="524" y2="245" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="687" y1="330" x2="687" y2="122" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3 3"/>

  <line x1="597" y1="356" x2="612" y2="356" stroke="var(--muted,#6d675d)" stroke-width="1"/>
  <text x="605" y="321" text-anchor="middle" class="sub">sampling-diversity payoff</text>
</g>

</svg>
<figcaption><b>pass@k is the probability that at least one of k independently drawn samples is correct, and it rises steeply with k.</b> In the chapter's worked example (n=8, c=2), pass@1 = 0.25 is what a single run gives a real user, while pass@4 = 0.79 is only reachable with a verifier that can pick the winning sample out of k tries — without one, pass@1 is the honest number to report.</figcaption>
</figure>
