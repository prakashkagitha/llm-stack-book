<figcaption><b>The three KL estimators plotted against the per-token log-ratio r.</b> k1 is unbiased but dips negative whenever the policy under-weights the sampled token relative to the reference (r &gt; 0) &amp;mdash; a KL "penalty" that can reward drifting away. k2 fixes the sign but overstates KL away from r = 0. k3 = k1 + (e^r - 1) adds a zero-mean control variate to k1: same expectation, but it cancels the variance and floors the estimate at zero, which is why it is unbiased <em>and</em> non-negative everywhere.</figcaption>
</figure>
