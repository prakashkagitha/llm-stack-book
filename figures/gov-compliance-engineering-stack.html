<figure class="viz" id="fig-gov-compliance-engineering-stack">
<button class="viz-replay" type="button">&#8635; replay</button>
<style>
  #fig-gov-compliance-engineering-stack text { fill: var(--ink-soft); }
  #fig-gov-compliance-engineering-stack .title  { font: 700 14px var(--sans,sans-serif); }
  #fig-gov-compliance-engineering-stack .col-h  { font: 700 10.5px var(--sans,sans-serif); }
  #fig-gov-compliance-engineering-stack .box-m  { font: 600 11px var(--sans,sans-serif); }
  #fig-gov-compliance-engineering-stack .box-s  { font: 400 9px var(--sans,sans-serif); fill: var(--muted); }

  #fig-gov-compliance-engineering-stack .callout{ font: 600 10.5px var(--sans,sans-serif); fill: #fff; }

  @keyframes draw-arr {
    from { stroke-dashoffset: var(--len,200); }
    to   { stroke-dashoffset: 0; }
  }
  #fig-gov-compliance-engineering-stack .darr {
    stroke-dasharray: var(--len,200);
    stroke-dashoffset: var(--len,200);
    animation: draw-arr 0.45s ease-out forwards;
  }
  #fig-gov-compliance-engineering-stack .darr.r1 { animation-delay: 0.2s; }
  #fig-gov-compliance-engineering-stack .darr.r2 { animation-delay: 0.8s; }
  #fig-gov-compliance-engineering-stack .darr.r3 { animation-delay: 1.4s; }

  #fig-gov-compliance-engineering-stack .darr.r5 { animation-delay: 2.6s; }
  #fig-gov-compliance-engineering-stack .darr.r6 { animation-delay: 3.2s; }

  @media (prefers-reduced-motion: reduce) {
    #fig-gov-compliance-engineering-stack .darr {
      stroke-dashoffset: 0 !important;
      animation: none !important;
    }
  }
</style>

<figcaption><b>Each engineering system is the canonical source for a compliance artefact.</b> Arrows animate left-to-right, row by row, showing artefacts produced as natural outputs of running systems — from training-pipeline data-loader metadata to model-registry card YAML. The key engineering insight is to instrument pipelines from day one, not reconstruct records after the fact.</figcaption>
