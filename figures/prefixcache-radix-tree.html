<figure class="viz" id="fig-prefixcache-radix-tree">
<svg viewBox="0 0 820 580" role="img" aria-label="RadixAttention prefix trie: a shared system-prompt node leads to a shared first-turn node, which then splits into two session-specific branches -- one showing incremental multi-turn growth A to A+B to A+B+C, the other diverging immediately with its own second turn.">

  <marker id="rt-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">

  </marker>
  <marker id="rt-arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>

  #fig-prefixcache-radix-tree .node-lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-prefixcache-radix-tree .node-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-radix-tree .node-mono { font: 600 12px var(--mono,monospace); }
  #fig-prefixcache-radix-tree .edge-lbl { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-radix-tree .callout { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-radix-tree .callout-b { font: 600 10.5px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-prefixcache-radix-tree .badge { font: 700 9px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-prefixcache-radix-tree .lookup-lbl { font: 700 11.5px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
</style>


<text x="410" y="24" text-anchor="middle" class="lookup-lbl">Single trie lookup: O(P) longest-prefix match. Shared path = KV reused by every session.</text>

<rect x="160" y="114" width="500" height="70" rx="10" fill="var(--accent,#c15b39)" fill-opacity="0.13" stroke="var(--accent,#c15b39)" stroke-width="2.2"/>

<text x="410" y="139" text-anchor="middle" class="node-mono" style="fill:var(--accent,#c15b39)">"You are a helpful AI assistant.\n"</text>

<text x="410" y="155" text-anchor="middle" class="node-sub" style="fill:var(--accent,#c15b39)">(system prompt, shared by all sessions)</text>

<text x="301" y="175" text-anchor="middle" class="badge">KV cached</text>
<rect x="360" y="165" width="100" height="14" rx="3" fill="var(--accent,#c15b39)" fill-opacity="0.25" stroke="var(--accent,#c15b39)" stroke-width="0.8"/>
<text x="410" y="175" text-anchor="middle" class="badge">ref-counted</text>

<text x="418" y="207" class="edge-lbl">first turn (A), still shared by both sessions</text>

<text x="410" y="247" text-anchor="middle" class="node-mono" style="fill:var(--accent,#c15b39)">"User: I need help with the checkout API..."</text>

<text x="410" y="263" text-anchor="middle" class="node-sub" style="fill:var(--accent,#c15b39)">(turn 1 = token seq A, shared by session 1 &amp; 2)</text>

<rect x="260" y="273" width="82" height="14" rx="3" fill="var(--accent,#c15b39)" fill-opacity="0.22" stroke="var(--accent,#c15b39)" stroke-width="0.8"/>
<text x="301" y="283" text-anchor="middle" class="badge">KV cached</text>
<rect x="360" y="273" width="100" height="14" rx="3" fill="var(--accent,#c15b39)" fill-opacity="0.22" stroke="var(--accent,#c15b39)" stroke-width="0.8"/>
<text x="410" y="283" text-anchor="middle" class="badge">ref-counted</text>



<line x1="290" y1="292" x2="210" y2="330" stroke="var(--border-2,#d8d1c0)" stroke-width="1.8" marker-end="url(#rt-arrow)"/>
<line x1="530" y1="292" x2="620" y2="330" stroke="var(--border-2,#d8d1c0)" stroke-width="1.8" marker-end="url(#rt-arrow)"/>

<text x="210" y="316" text-anchor="middle" class="edge-lbl">turn 2 (session 1): A -&gt; A+B</text>

<text x="415" y="500" text-anchor="middle" class="callout-b">Partial-overlap split: sessions share the system prompt and Turn A, not just one flat prefix.</text>
<text x="415" y="516" text-anchor="middle" class="callout">The trie diverges only when turn 2 differs: session 1 grows A -&gt; A+B -&gt; A+B+C,</text>
<text x="415" y="532" text-anchor="middle" class="callout">while session 2 branches off right after A with its own turn 2.</text>


<text x="415" y="556" text-anchor="middle" class="callout">Leaf (response) nodes hold per-session tokens in exclusive fresh blocks outside the shared cache.</text>
</svg>
<figcaption><b>RadixAttention models the prefix cache as a radix trie where shared prefixes form common root-to-node paths, and partial overlaps split the tree.</b> Both sessions reuse the accent-highlighted system prompt <i>and</i> the first turn (token sequence A) with a single O(P) trie lookup; the trie only splits into separate branches once their second turns diverge, so session 1's incremental growth (A &#8594; A+B &#8594; A+B+C) is cached independently of session 2's own second turn. Each session's divergent suffix is written into fresh, unshared child nodes outside the shared cache.</figcaption>
</figure>
