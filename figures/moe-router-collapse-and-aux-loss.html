<text x="380" y="298" text-anchor="middle" class="cap">You paid for E experts and trained one -- and in expert-parallel training, the hot expert's GPU</text>

<text x="380" y="376" text-anchor="middle" class="mono" fill="var(--accent)">L_aux = alpha &#183; E &#183; sum_e ( f_e &#215; P_e )</text>

<text x="380" y="576" text-anchor="middle" class="moral">The loss READS imbalance from the hard counts, and WRITES the correction through the soft probabilities.</text>

  <rect x="150" y="592" width="460" height="26" rx="13" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="380" y="609" text-anchor="middle" class="note">expert-choice routing avoids this by construction: each expert picks its own top-C tokens.</text>

</svg>
<figcaption><b>Router collapse is a runaway positive-feedback loop -- and the fix multiplies a hard count by a soft probability.</b> Left unchecked, a slightly-favored expert gets more tokens, more gradient, and improves faster, which sends it even more tokens -- flattening a roughly uniform load into one saturated expert and several starved, gradient-starved ones. The auxiliary loss <b>L_aux = &#945;&#183;E&#183;&#931; f_e P_e</b> reads which experts are overloaded from the non-differentiable dispatch counts <b>f_e</b> (direction) and pushes back through the differentiable mean router probabilities <b>P_e</b> (gradient), nudging the load back toward the uniform 1/E line.</figcaption>
</figure>
