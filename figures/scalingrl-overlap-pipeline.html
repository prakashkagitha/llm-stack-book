<figure class="viz" id="fig-scalingrl-overlap-pipeline">
<button class="viz-replay" type="button">&#x21bb; replay</button>
<svg viewBox="0 0 960 420" role="img" aria-label="Two Gantt-style timelines: top panel shows synchronous serial scheduling where gen and train alternate with 50% idle time; bottom panel shows pipelined 1-step-off-policy scheduling where inference and training GPUs run in parallel with a one-step offset, each always busy.">
  <defs>
    <marker id="op-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#2563eb)"/>
    </marker>
    <marker id="op-dep-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#2563eb)"/>
    </marker>
  </defs>
  <style>
    #fig-scalingrl-overlap-pipeline text { font-family: var(--sans,sans-serif); fill: var(--ink-soft,currentColor); }
    #fig-scalingrl-overlap-pipeline .panel-title { font: 700 13px var(--sans,sans-serif); }
    #fig-scalingrl-overlap-pipeline .blk-lbl { font: 600 11px var(--sans,sans-serif); }
    #fig-scalingrl-overlap-pipeline .lane-lbl { font: 600 11px var(--sans,sans-serif); }
    #fig-scalingrl-overlap-pipeline .note { font: 400 10px var(--sans,sans-serif); fill: var(--muted,currentColor); }
    #fig-scalingrl-overlap-pipeline .dep-lbl { font: 500 9.5px var(--sans,sans-serif); fill: var(--accent,#2563eb); }
    #fig-scalingrl-overlap-pipeline .always-lbl { font: 600 10px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }

    /* Animation keyframes */
    @keyframes op-cursor-sync {
      0%   { transform: translateX(0px);   opacity: 1; }
      45%  { transform: translateX(400px); opacity: 1; }
      50%  { opacity: 0; }
      100% { transform: translateX(400px); opacity: 0; }
    }
    @keyframes op-cursor-pipe {
      0%   { transform: translateX(0px);   opacity: 1; }
      45%  { transform: translateX(440px); opacity: 1; }
      50%  { opacity: 0; }
      100% { transform: translateX(440px); opacity: 0; }
    }
    @keyframes op-dep-arrow-appear {
      0%, 34%  { opacity: 0; }
      40%, 90% { opacity: 1; }
      100%     { opacity: 0; }
    }
    @keyframes op-block-pulse {
      0%, 25%  { opacity: 0.35; }
      30%, 75% { opacity: 1; }
      80%, 100%{ opacity: 0.35; }
    }
    #fig-scalingrl-overlap-pipeline .cursor-sync {
      animation: op-cursor-sync 5s ease-in-out infinite;
    }
    #fig-scalingrl-overlap-pipeline .cursor-pipe {
      animation: op-cursor-pipe 5s ease-in-out infinite;
    }
    #fig-scalingrl-overlap-pipeline .dep-anim {
      animation: op-dep-arrow-appear 5s ease-in-out infinite;
    }
    #fig-scalingrl-overlap-pipeline .pulse-g0 {
      animation: op-block-pulse 5s 0s ease-in-out infinite;
    }
    #fig-scalingrl-overlap-pipeline .pulse-t0 {
      animation: op-block-pulse 5s 1.1s ease-in-out infinite;
    }
  </style>

  
  
  
  <text x="120" y="28" class="panel-title">Synchronous (serial)</text>
  <text x="690" y="28" text-anchor="end" class="note">both halves idle ~50% of the time</text>

  
  <text x="110" y="80" text-anchor="end" class="lane-lbl">schedule</text>

  
  <rect x="120" y="58" width="110" height="36" rx="4"
        fill="var(--surface-3,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.5"
        class="pulse-g0"/>
  <text x="175" y="81" text-anchor="middle" class="blk-lbl" fill="var(--accent,#2563eb)">gen(0)</text>

  
  <rect x="230" y="58" width="100" height="36" rx="4"
        fill="var(--surface-3,#f5f3ff)" stroke="var(--accent-2,#7c3aed)" stroke-width="1.5"
        class="pulse-t0"/>
  <text x="280" y="81" text-anchor="middle" class="blk-lbl" fill="var(--accent-2,#7c3aed)">train(0)</text>

  
  <rect x="330" y="58" width="110" height="36" rx="4"
        fill="var(--surface-3,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
  <text x="385" y="81" text-anchor="middle" class="blk-lbl" fill="var(--accent,#2563eb)">gen(1)</text>

  
  <rect x="440" y="58" width="100" height="36" rx="4"
        fill="var(--surface-3,#f5f3ff)" stroke="var(--accent-2,#7c3aed)" stroke-width="1.5"/>
  <text x="490" y="81" text-anchor="middle" class="blk-lbl" fill="var(--accent-2,#7c3aed)">train(1)</text>

  
  <text x="558" y="81" class="note">...</text>

  
  <line x1="120" y1="55" x2="120" y2="97"
        stroke="var(--warn,#e0a106)" stroke-width="2" opacity="0.8"
        class="cursor-sync"/>

  
  <text x="175" y="108" text-anchor="middle" class="note" fill="var(--warn,#c2410c)">train idle</text>
  <text x="280" y="108" text-anchor="middle" class="note" fill="var(--warn,#c2410c)">infer idle</text>
  <text x="385" y="108" text-anchor="middle" class="note" fill="var(--warn,#c2410c)">train idle</text>
  <text x="490" y="108" text-anchor="middle" class="note" fill="var(--warn,#c2410c)">infer idle</text>

  
  <line x1="40" y1="128" x2="920" y2="128" stroke="var(--border-2,#e2e8f0)" stroke-width="1"/>

  
  
  
  <text x="120" y="158" class="panel-title">Pipelined (1-step off-policy)</text>

  
  <text x="110" y="222" text-anchor="end" class="lane-lbl">infer GPUs</text>

  
  <rect x="120" y="200" width="110" height="36" rx="4"
        fill="var(--surface-3,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.8"
        class="pulse-g0"/>
  <text x="175" y="223" text-anchor="middle" class="blk-lbl" fill="var(--accent,#2563eb)">gen(0)</text>

  
  <rect x="230" y="200" width="110" height="36" rx="4"
        fill="var(--surface-3,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
  <text x="285" y="223" text-anchor="middle" class="blk-lbl" fill="var(--accent,#2563eb)">gen(1)</text>

  
  <rect x="340" y="200" width="110" height="36" rx="4"
        fill="var(--surface-3,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
  <text x="395" y="223" text-anchor="middle" class="blk-lbl" fill="var(--accent,#2563eb)">gen(2)</text>

  
  <rect x="450" y="200" width="110" height="36" rx="4"
        fill="var(--surface-3,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
  <text x="505" y="223" text-anchor="middle" class="blk-lbl" fill="var(--accent,#2563eb)">gen(3)</text>

  <text x="576" y="223" class="note">...</text>
  <text x="620" y="223" class="always-lbl">always busy</text>

  
  <text x="110" y="292" text-anchor="end" class="lane-lbl">train GPUs</text>

  
  <rect x="230" y="270" width="100" height="36" rx="4"
        fill="var(--surface-3,#f5f3ff)" stroke="var(--accent-2,#7c3aed)" stroke-width="1.8"
        class="pulse-t0"/>
  <text x="280" y="293" text-anchor="middle" class="blk-lbl" fill="var(--accent-2,#7c3aed)">train(0)</text>

  
  <rect x="330" y="270" width="100" height="36" rx="4"
        fill="var(--surface-3,#f5f3ff)" stroke="var(--accent-2,#7c3aed)" stroke-width="1.5"/>
  <text x="380" y="293" text-anchor="middle" class="blk-lbl" fill="var(--accent-2,#7c3aed)">train(1)</text>

  
  <rect x="430" y="270" width="100" height="36" rx="4"
        fill="var(--surface-3,#f5f3ff)" stroke="var(--accent-2,#7c3aed)" stroke-width="1.5"/>
  <text x="480" y="293" text-anchor="middle" class="blk-lbl" fill="var(--accent-2,#7c3aed)">train(2)</text>

  <text x="542" y="293" class="note">...</text>
  <text x="620" y="293" class="always-lbl">always busy</text>

  
  <rect x="120" y="270" width="110" height="36" rx="4"
        fill="none" stroke="var(--border-2,#e2e8f0)" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="175" y="293" text-anchor="middle" class="note" fill="var(--muted,currentColor)" opacity="0.7">startup</text>

  
  
  <path d="M 230 236 C 230 252 230 258 230 270"
        fill="none" stroke="var(--accent,#2563eb)" stroke-width="2"
        marker-end="url(#op-dep-arrow)"
        class="dep-anim"/>

  
  <g class="dep-anim">
    <text x="237" y="253" class="dep-lbl">consumes gen(0)</text>
    <text x="237" y="265" class="dep-lbl">while gen(1) runs</text>
  </g>

  
  <line x1="120" y1="197" x2="120" y2="309"
        stroke="var(--warn,#e0a106)" stroke-width="2" opacity="0.8"
        class="cursor-pipe"/>

  
  <text x="120" y="335" class="note">
    Trainer consumes batch produced by weights one update old (staleness-1); IS ratio corrects for it.
  </text>

  
  <rect x="700" y="185" width="16" height="12" rx="2"
        fill="var(--surface-3,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
  <text x="722" y="196" class="note">generation</text>
  <rect x="700" y="203" width="16" height="12" rx="2"
        fill="var(--surface-3,#f5f3ff)" stroke="var(--accent-2,#7c3aed)" stroke-width="1.5"/>
  <text x="722" y="214" class="note">training</text>
</svg>
<figcaption><b>Synchronous scheduling wastes half the fleet; pipelining keeps both halves always busy.</b> In the serial schedule (top) each GPU fleet idles while the other runs, giving at most 50% utilization. The pipelined schedule (bottom) offsets the training lane by one slot so the trainer consumes batch <i>t</i> while the inference fleet generates batch <i>t+1</i> — at the cost of one step of staleness, which the importance-sampling ratio in PPO/GRPO corrects.</figcaption>
</figure>
