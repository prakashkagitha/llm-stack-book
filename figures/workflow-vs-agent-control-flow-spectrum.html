<figure class="viz" id="fig-workflow-vs-agent-control-flow-spectrum">
<svg viewBox="0 0 780 450" role="img" aria-label="A horizontal spectrum from workflow, where control flow is written in code, to agent, where control flow emerges from model output, with LangGraph, CrewAI, AutoGen, and Swarm placed along the axis.">
  <defs>
    <marker id="wa-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
    </marker>
    <marker id="wa-arr-mut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#555)"/>
    </marker>
  </defs>
  <style>
    #fig-workflow-vs-agent-control-flow-spectrum text {
      font: 400 11px var(--sans,sans-serif);
      fill: var(--ink-soft,#333);
    }
    #fig-workflow-vs-agent-control-flow-spectrum .pole {
      font: 700 13px var(--sans,sans-serif);
    }
    #fig-workflow-vs-agent-control-flow-spectrum .sub {
      font: 400 10px var(--sans,sans-serif);
      fill: var(--muted,#666);
    }
    #fig-workflow-vs-agent-control-flow-spectrum .mk-name {
      font: 700 12px var(--sans,sans-serif);
      fill: var(--ink-soft,#333);
    }
    #fig-workflow-vs-agent-control-flow-spectrum .mk-note {
      font: 400 9.5px var(--mono,monospace);
      fill: var(--muted,#666);
    }
    #fig-workflow-vs-agent-control-flow-spectrum .code {
      font: 400 9.5px var(--mono,monospace);
      fill: var(--ink-soft,#333);
    }
    #fig-workflow-vs-agent-control-flow-spectrum .strip-l,
    #fig-workflow-vs-agent-control-flow-spectrum .strip-r {
      font: 600 10.5px var(--sans,sans-serif);
      fill: var(--ink-soft,#333);
    }
  </style>

  
  
  <g data-anim="1">
    <rect x="14" y="10" width="230" height="118" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-opacity="0.6" stroke-width="1.2"/>
    <text x="24" y="27" class="pole">WORKFLOW</text>
    <text x="24" y="40" class="sub">control flow written in code</text>

    <rect x="30" y="52" width="66" height="34" rx="5" class="v-fill" stroke="var(--border-2,#bbb)" stroke-width="1.1"/>
    <text x="63" y="66" text-anchor="middle" class="code">if intent</text>
    <text x="63" y="78" text-anchor="middle" class="code">== "math"</text>

    <line x1="96" y1="60" x2="140" y2="60" stroke="var(--ink-soft,#555)" stroke-width="1.4" marker-end="url(#wa-arr-mut)"/>
    <line x1="96" y1="78" x2="140" y2="100" stroke="var(--ink-soft,#555)" stroke-width="1.4" marker-end="url(#wa-arr-mut)"/>

    <rect x="140" y="44" width="82" height="32" rx="5" fill="var(--accent2,#3b82f6)" fill-opacity="0.16" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
    <text x="181" y="65" text-anchor="middle" class="code">node A</text>

    <rect x="140" y="86" width="82" height="32" rx="5" fill="var(--accent2,#3b82f6)" fill-opacity="0.16" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
    <text x="181" y="107" text-anchor="middle" class="code">node B</text>

    <text x="24" y="122" class="sub">developer decides the edge</text>
  </g>

  
  <g data-anim="2">
    <rect x="536" y="10" width="230" height="118" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-opacity="0.6" stroke-width="1.2"/>
    <text x="756" y="27" text-anchor="end" class="pole">AGENT</text>
    <text x="756" y="40" text-anchor="end" class="sub">control flow emerges from model output</text>

    <rect x="596" y="48" width="110" height="32" rx="6" fill="var(--accent,#c15b39)"/>
    <text x="651" y="69" text-anchor="middle" class="mk-note" fill="#fff" font-weight="700">model</text>

    <rect x="586" y="90" width="130" height="24" rx="5" class="v-fill" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="651" y="106" text-anchor="middle" class="code">{action, input}</text>

    <line x1="651" y1="80" x2="651" y2="90" stroke="var(--accent,#c15b39)" stroke-width="1.4" marker-end="url(#wa-arr)"/>
    <path d="M 716 102 C 745 102 745 58 706 55" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.4" marker-end="url(#wa-arr)"/>

    <text x="756" y="122" text-anchor="end" class="sub">model decides the next action</text>
  </g>

  
  <line x1="44" y1="205" x2="736" y2="205" stroke="var(--ink-soft,#555)" stroke-width="2.4" data-anim="2"/>
  <path d="M 736 205 L 726 200 L 726 210 Z" fill="var(--ink-soft,#555)" data-anim="2"/>

  <text x="44" y="182" class="pole">WORKFLOW</text>
  <text x="44" y="196" class="sub">deterministic - developer writes edges</text>

  <text x="736" y="182" text-anchor="end" class="pole">AGENT</text>
  <text x="736" y="196" text-anchor="end" class="sub">dynamic - model chooses next step</text>

  
  <g data-anim="3">
    
    <line x1="127" y1="205" x2="127" y2="224" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <circle cx="127" cy="205" r="5" fill="var(--accent2,#3b82f6)"/>
    <text x="127" y="240" text-anchor="middle" class="mk-name">LangGraph</text>
    <text x="127" y="254" text-anchor="middle" class="mk-note">developer writes</text>
    <text x="127" y="266" text-anchor="middle" class="mk-note">the graph edges</text>

    
    <line x1="321" y1="205" x2="321" y2="272" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <circle cx="321" cy="205" r="5" fill="var(--accent2,#3b82f6)"/>
    <text x="321" y="288" text-anchor="middle" class="mk-name">CrewAI</text>
    <text x="321" y="302" text-anchor="middle" class="mk-note">framework + manager LLM</text>
    <text x="321" y="314" text-anchor="middle" class="mk-note">decide task order</text>

    
    <line x1="515" y1="205" x2="515" y2="224" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <circle cx="515" cy="205" r="5" fill="var(--accent,#c15b39)"/>
    <text x="515" y="240" text-anchor="middle" class="mk-name">AutoGen</text>
    <text x="515" y="254" text-anchor="middle" class="mk-note">conversation / message</text>
    <text x="515" y="266" text-anchor="middle" class="mk-note">replies drive control</text>

    
    <line x1="667" y1="205" x2="667" y2="272" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>
    <circle cx="667" cy="205" r="5" fill="var(--accent,#c15b39)"/>
    <text x="667" y="288" text-anchor="middle" class="mk-name">Swarm</text>
    <text x="667" y="302" text-anchor="middle" class="mk-note">model function-call</text>
    <text x="667" y="314" text-anchor="middle" class="mk-note">handoffs route control</text>
  </g>

  
  <g data-anim="4">
    <rect x="14" y="336" width="361" height="44" rx="7" fill="var(--accent2,#3b82f6)" fill-opacity="0.10" stroke="var(--accent2,#3b82f6)" stroke-opacity="0.4" stroke-width="1"/>
    <text x="194" y="355" text-anchor="middle" class="strip-l">cheaper, testable, observable,</text>
    <text x="194" y="369" text-anchor="middle" class="strip-l">less likely to spiral</text>

    <rect x="405" y="336" width="361" height="44" rx="7" fill="var(--accent,#c15b39)" fill-opacity="0.10" stroke="var(--accent,#c15b39)" stroke-opacity="0.4" stroke-width="1"/>
    <text x="585" y="355" text-anchor="middle" class="strip-r">more flexible, handles</text>
    <text x="585" y="369" text-anchor="middle" class="strip-r">unenumerable steps</text>
  </g>

  
  <text x="390" y="404" text-anchor="middle" class="sub" data-anim="5">Frameworks differ mainly in who owns the routing decision at each step -</text>
  <text x="390" y="418" text-anchor="middle" class="sub" data-anim="5">code (left) or the model's own output (right).</text>
</svg>
<figcaption><b>Frameworks sit at different points on a single spectrum: how much control flow lives in developer code versus in the model's own output.</b> LangGraph keeps routing closest to code (explicit graph edges); CrewAI splits the decision between framework and a manager LLM; AutoGen and Swarm push routing into the model itself, via conversational replies or function-call handoffs respectively. Moving right buys flexibility for unenumerable tasks at the cost of the cheapness, testability, and predictability that live on the left.</figcaption>
</figure>
