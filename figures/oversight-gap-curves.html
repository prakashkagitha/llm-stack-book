<figure class="viz" id="fig-oversight-gap-curves">
<svg viewBox="0 0 760 520" role="img" aria-label="Line chart showing model task accuracy p_M rising steeply above unaided human accuracy p_H as task difficulty increases, with the shaded oversight gap between them and a dashed goal curve p_H-eff showing AI-assisted human accuracy tracking the model.">
<defs>
  <marker id="ogc-arrow-x" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#475569)"/>
  </marker>
  <marker id="ogc-arrow-y" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#475569)"/>
  </marker>
  <marker id="ogc-arrow-lift" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#10b981)"/>
  </marker>
  
  <clipPath id="ogc-clip">
    <rect x="90" y="65" width="615" height="360"/>
  </clipPath>
</defs>
<style>
  #fig-oversight-gap-curves text { fill: var(--ink-soft, #1e293b); }
  #fig-oversight-gap-curves .lbl  { font: 600 12.5px var(--sans, sans-serif); }
  #fig-oversight-gap-curves .sm   { font: 400 11px var(--sans, sans-serif); }
  #fig-oversight-gap-curves .axis { font: 500 12px var(--sans, sans-serif); }
  #fig-oversight-gap-curves .cap  { font: 400 11.5px var(--sans, sans-serif); fill: var(--muted, #475569); }
  #fig-oversight-gap-curves .bold { font: 700 12px var(--sans, sans-serif); }
</style>



<line x1="90" y1="65" x2="90" y2="425"
      stroke="var(--ink-soft,#475569)" stroke-width="1.8"
      marker-end="url(#ogc-arrow-y)"/>

<line x1="90" y1="425" x2="705" y2="425"
      stroke="var(--ink-soft,#475569)" stroke-width="1.8"
      marker-end="url(#ogc-arrow-x)"/>


<text x="20" y="248" text-anchor="middle" transform="rotate(-90,20,248)"
      class="axis" style="fill:var(--ink-soft,#475569)">capability / accuracy</text>
<text x="397" y="470" text-anchor="middle"
      class="axis" style="fill:var(--ink-soft,#475569)">task difficulty</text>


<text x="130" y="445" text-anchor="middle" class="sm">easy</text>
<text x="665" y="445" text-anchor="middle" class="sm">hard</text>


<path clip-path="url(#ogc-clip)"
      d="M 200,296 C 310,265 430,248 560,238 L 680,235
         L 680,108 C 560,115 430,150 310,200 C 250,225 220,265 200,296 Z"
      fill="var(--warn,#f59e0b)" fill-opacity="0.18"
      stroke="none"/>


<path clip-path="url(#ogc-clip)"
      d="M 110,315 C 200,296 310,265 430,248 C 560,238 620,237 680,235"
      fill="none"
      stroke="var(--muted,#64748b)" stroke-width="2.5"
      stroke-linecap="round"/>


<path clip-path="url(#ogc-clip)"
      d="M 110,320 C 180,290 280,230 400,170 C 510,118 610,108 680,104"
      fill="none"
      stroke="var(--accent,#6366f1)" stroke-width="2.8"
      stroke-linecap="round"/>


<path clip-path="url(#ogc-clip)"
      d="M 110,315 C 200,285 310,235 430,195 C 555,158 625,148 680,145"
      fill="none"
      stroke="var(--good,#10b981)" stroke-width="2.0"
      stroke-dasharray="6 3"
      stroke-linecap="round"/>



<text x="540" y="96" class="lbl" style="fill:var(--accent,#6366f1)">p</text>
<text x="548" y="101" class="sm" style="fill:var(--accent,#6366f1)" dy="0">M</text>
<text x="558" y="96" class="sm" style="fill:var(--accent,#6366f1)"> — model task accuracy</text>


<text x="382" y="268" class="lbl" style="fill:var(--muted,#64748b)">p</text>
<text x="390" y="273" class="sm" style="fill:var(--muted,#64748b)">H</text>
<text x="400" y="268" class="sm" style="fill:var(--muted,#64748b)"> — unaided human accuracy</text>


<text x="150" y="150" class="lbl" style="fill:var(--good,#10b981)">p</text>
<text x="158" y="155" class="sm" style="fill:var(--good,#10b981)">H</text>
<text x="165" y="146" class="sm" style="fill:var(--good,#10b981)">eff</text>
<text x="184" y="150" class="sm" style="fill:var(--good,#10b981)"> (AI-assisted human)</text>

<line x1="250" y1="154" x2="300" y2="232"
      stroke="var(--good,#10b981)" stroke-width="1.0"
      stroke-dasharray="3 2"/>


<line x1="570" y1="233" x2="570" y2="162"
      stroke="var(--good,#10b981)" stroke-width="1.5"
      stroke-dasharray="3 2"
      marker-end="url(#ogc-arrow-lift)"/>


<rect x="308" y="174" width="252" height="44" rx="5"
      fill="var(--surface,#fff)" fill-opacity="0.82"
      stroke="var(--warn,#f59e0b)" stroke-width="1.2"/>
<text x="434" y="193" text-anchor="middle" class="bold"
      style="fill:var(--ink-soft,#1e293b)">OVERSIGHT GAP</text>
<text x="434" y="211" text-anchor="middle" class="sm"
      style="fill:var(--muted,#475569)">model right, human can't tell</text>

<line x1="434" y1="218" x2="440" y2="238"
      stroke="var(--warn,#f59e0b)" stroke-width="1.0"
      stroke-dasharray="3 2"/>


<rect x="90" y="478" width="620" height="34" rx="5"
      fill="var(--surface,#f8fafc)" fill-opacity="0.0"
      stroke="none"/>
<text x="400" y="490" text-anchor="middle" class="cap">
  Goal of scalable oversight: lift the human curve with AI assistance
</text>
<text x="400" y="506" text-anchor="middle" class="cap">
  so that p_H^eff tracks or exceeds p_M across all task difficulties.
</text>
</svg>
<figcaption><b>The oversight gap: model capability outpaces human verification as tasks get harder.</b> Both curves rise with task difficulty, but model accuracy (p<sub>M</sub>, purple) accelerates while unaided human accuracy (p<sub>H</sub>, gray) flattens — the shaded region between them is where naive RLHF breaks down because the human rater cannot distinguish correct from plausible-sounding wrong. The dashed green curve (p<sub>H</sub><sup>eff</sup>) shows the goal of scalable oversight: using AI assistance to lift human verification accuracy so it tracks the model.</figcaption>
</figure>
