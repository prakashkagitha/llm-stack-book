<figure class="viz" id="fig-rcae-accuracy-vs-compute-crossing-curves">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 600" role="img" aria-label="Line chart of accuracy versus test-time compute budget for two models whose curves cross once, showing that which model looks better depends on the compute budget at which you measure.">
  <defs>
    <marker id="acc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-rcae-accuracy-vs-compute-crossing-curves .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-rcae-accuracy-vs-compute-crossing-curves .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-rcae-accuracy-vs-compute-crossing-curves .tick{ font:500 10.5px var(--mono,monospace); }
    #fig-rcae-accuracy-vs-compute-crossing-curves .lbl{ font:700 12.5px var(--sans,sans-serif); }
    #fig-rcae-accuracy-vs-compute-crossing-curves .sub{ font:500 10.5px var(--sans,sans-serif); }
    #fig-rcae-accuracy-vs-compute-crossing-curves .tiny{ font:500 9.8px var(--sans,sans-serif); }
    #fig-rcae-accuracy-vs-compute-crossing-curves .banner{ font:700 12.5px var(--sans,sans-serif); }
    #fig-rcae-accuracy-vs-compute-crossing-curves text{ fill: var(--ink-soft); }
    #fig-rcae-accuracy-vs-compute-crossing-curves .dim{ fill: var(--muted); }
  </style>

  <text x="390" y="22" text-anchor="middle" class="ttl">One accuracy number is a point on a curve, not the whole story</text>

  
  <g data-anim="1">
    <line x1="90" y1="46" x2="90" y2="368" class="v-stroke" stroke-width="1.6" marker-start="url(#acc-arrow)"/>
    <line x1="90" y1="368" x2="700" y2="368" class="v-stroke" stroke-width="1.6" marker-end="url(#acc-arrow)"/>
    <text x="30" y="207" class="ax" text-anchor="middle" transform="rotate(-90 30 207)">accuracy</text>
    <text x="395" y="406" class="ax" text-anchor="middle">test-time compute per problem (tokens, log scale)</text>

    
    <line x1="90" y1="308" x2="700" y2="308" class="v-grid" stroke-width="1" opacity="0.5"/>
    <line x1="90" y1="248" x2="700" y2="248" class="v-grid" stroke-width="1" opacity="0.5"/>
    <line x1="90" y1="188" x2="700" y2="188" class="v-grid" stroke-width="1" opacity="0.5"/>
    <line x1="90" y1="128" x2="700" y2="128" class="v-grid" stroke-width="1" opacity="0.5"/>
    <line x1="90" y1="68" x2="700" y2="68" class="v-grid" stroke-width="1" opacity="0.5"/>

    
    <line x1="150" y1="368" x2="150" y2="374" class="v-stroke" stroke-width="1.4"/>
    <text x="150" y="389" text-anchor="middle" class="tick">1x</text>
    <line x1="320" y1="368" x2="320" y2="374" class="v-stroke" stroke-width="1.4"/>
    <text x="320" y="389" text-anchor="middle" class="tick">4x</text>
    <line x1="490" y1="368" x2="490" y2="374" class="v-stroke" stroke-width="1.4"/>
    <text x="490" y="389" text-anchor="middle" class="tick">16x</text>
    <line x1="660" y1="368" x2="660" y2="374" class="v-stroke" stroke-width="1.4"/>
    <text x="660" y="389" text-anchor="middle" class="tick">64x</text>
  </g>

  
  <g data-anim="2">
    <path d="M150 348 C 250 342, 400 335, 660 325" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="3 4" opacity="0.75"/>
    <text x="660" y="318" text-anchor="end" class="tiny dim">dominated model (always below both)</text>
  </g>

  
  <g data-anim="3">
    <path d="M150 292 C 220 182, 300 124, 400 112 C 500 104, 580 100, 655 98"
          fill="none" class="viz-draw" style="--len:640" stroke="var(--accent2,#3b82f6)" stroke-width="3.2" stroke-linecap="round"/>
  </g>

  
  <g data-anim="4">
    <path d="M150 338 C 240 296, 330 204, 420 132 C 500 82, 580 54, 655 42"
          fill="none" class="viz-draw" style="--len:700" stroke="var(--accent,#c15b39)" stroke-width="3.2" stroke-linecap="round"/>
  </g>

  
  <g data-anim="5">
    <line x1="392" y1="56" x2="392" y2="368" class="v-stroke" stroke-width="1.3" stroke-dasharray="4 4" opacity="0.75"/>
    <circle cx="392" cy="118" r="5.5" class="v-stroke" fill="var(--surface,#fff)" stroke-width="2"/>
    <text x="398" y="66" class="tiny dim">crossover budget</text>

    
    <line x1="320" y1="368" x2="320" y2="132" class="v-grid" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>
    <circle cx="320" cy="132" r="4" fill="var(--accent2,#3b82f6)"/>
    <circle cx="320" cy="217" r="4" fill="var(--accent,#c15b39)"/>
    <text x="320" y="115" text-anchor="middle" class="tiny" fill="var(--accent2,#3b82f6)">reported as best?</text>

    
    <line x1="655" y1="368" x2="655" y2="42" class="v-grid" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>
    <circle cx="655" cy="42" r="4" fill="var(--accent,#c15b39)"/>
    <circle cx="655" cy="98" r="4" fill="var(--accent2,#3b82f6)"/>
    <text x="588" y="34" text-anchor="start" class="tiny" fill="var(--accent,#c15b39)">reported as best?</text>

    
    <text x="500" y="188" text-anchor="middle" class="lbl" fill="var(--accent2,#3b82f6)">Model A -- cheap, caps early</text>
    <text x="470" y="256" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">Model B -- scales with thinking</text>
  </g>

  
  <g data-anim="6">
    <text x="230" y="358" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">small budget: Model A wins</text>
    <text x="555" y="358" text-anchor="middle" class="sub" fill="var(--accent,#c15b39)">large budget: Model B wins</text>
  </g>

  
  <g data-anim="7">
    <rect x="70" y="424" width="640" height="34" rx="7" class="v-fill" stroke="var(--border-2)" stroke-width="1.3"/>
    <text x="390" y="446" text-anchor="middle" class="banner">A single accuracy number just names a point on this curve -- report the whole curve.</text>
  </g>

  
  <g data-anim="8">
    <rect x="70" y="470" width="640" height="46" rx="7" class="v-fill" stroke="var(--border-2)" stroke-width="1.3"/>
    <text x="390" y="490" text-anchor="middle" class="sub">majority vote (k samples)  |  best-of-N + verifier  |  tree-of-thought / MCTS+PRM</text>
    <text x="390" y="506" text-anchor="middle" class="tiny dim">ways to spend the x-axis</text>
  </g>

  
  <g data-anim="9">
    <rect x="70" y="530" width="640" height="56" rx="7" class="v-fill" stroke="var(--border-2)" stroke-width="1.3"/>
    <line x1="90" y1="550" x2="118" y2="550" stroke="var(--muted)" stroke-width="2.4" stroke-dasharray="3 4"/>
    <text x="126" y="554" class="tiny">dominates everywhere = unambiguously better (never crossed by the winner)</text>
    <line x1="90" y1="572" x2="118" y2="565" stroke="var(--accent2,#3b82f6)" stroke-width="2.4"/>
    <line x1="90" y1="565" x2="118" y2="572" stroke="var(--accent,#c15b39)" stroke-width="2.4"/>
    <text x="126" y="576" class="tiny">curves cross = comparison is budget-dependent, as with A and B here</text>
  </g>
</svg>
<figcaption><b>When accuracy-vs-compute curves cross, "which model is better" depends on the budget you compare at.</b> Model A (cheap, caps early) wins at small budgets like 4x; Model B (keeps scaling with more thinking tokens) overtakes past the crossover and wins at large budgets like 64x -- a vendor can pick either point and honestly report "we win." A curve that dominates everywhere (dashed, always below both here) is unambiguously worse; a curve that crosses is not comparable with one number.</figcaption>
</figure>
