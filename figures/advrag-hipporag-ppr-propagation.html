<figure class="viz" id="fig-advrag-hipporag-ppr-propagation">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 640" role="img" aria-label="Personalized PageRank seeds relevance at two query-matched entities and propagates it through an entity graph; a node three hops from any seed gets boosted because two moderately-scored intermediates both feed into it, while a distractor branch stays faint.">
<defs>

  </marker>
  <marker id="hpr-arrow-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <marker id="hpr-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#64748b)"/>
  </marker>
</defs>
<style>
  #fig-advrag-hipporag-ppr-propagation .lbl { font: 600 12px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }

  #fig-advrag-hipporag-ppr-propagation .lbl-tag { font: 700 8.5px var(--sans,sans-serif); fill: var(--accent,#3b82f6); letter-spacing: 0.4px; }
  #fig-advrag-hipporag-ppr-propagation .ann { font: 500 10.5px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-advrag-hipporag-ppr-propagation .legend-txt { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-advrag-hipporag-ppr-propagation .callout-txt { font: 700 12.5px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
  #fig-advrag-hipporag-ppr-propagation .tp-txt { font: italic 10.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-advrag-hipporag-ppr-propagation .distr-txt { font: italic 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-advrag-hipporag-ppr-propagation .node-stroke { stroke: var(--border-2,#94a3b8); stroke-width: 1.4; }
  #fig-advrag-hipporag-ppr-propagation .ppr-fill { fill: var(--ink-soft,#334155); }
</style>

  <line x1="261" y1="509" x2="418" y2="542" stroke="var(--muted,#64748b)" stroke-opacity="0.4" stroke-width="1.1"

</g>

  <circle cx="95" cy="170" r="31" fill="none" stroke="var(--accent,#3b82f6)" stroke-opacity="0.45" stroke-width="1.6" class="viz-pulse"/>
  <circle cx="95" cy="170" r="39" fill="none" stroke="var(--accent,#3b82f6)" stroke-opacity="0.25" stroke-width="1.3" class="viz-pulse"/>
  <circle cx="95" cy="340" r="31" fill="none" stroke="var(--accent,#3b82f6)" stroke-opacity="0.45" stroke-width="1.6" class="viz-pulse"/>
  <circle cx="95" cy="340" r="39" fill="none" stroke="var(--accent,#3b82f6)" stroke-opacity="0.25" stroke-width="1.3" class="viz-pulse"/>
</g>


<g data-anim="3">
  <rect x="46" y="122" width="98" height="17" rx="8" fill="var(--accent,#3b82f6)" fill-opacity="0.15" stroke="var(--accent,#3b82f6)" stroke-width="1.1"/>
  <text x="95" y="134" text-anchor="middle" class="lbl-tag">QUERY MATCH</text>
  <circle cx="95" cy="170" r="25" fill="var(--accent,#3b82f6)" fill-opacity="0.85" stroke="var(--accent,#3b82f6)" stroke-width="2.4"/>
  <text x="95" y="207" text-anchor="middle" class="lbl-seed">ACME Corp</text>

  <rect x="38" y="292" width="114" height="17" rx="8" fill="var(--accent,#3b82f6)" fill-opacity="0.15" stroke="var(--accent,#3b82f6)" stroke-width="1.1"/>
  <text x="95" y="304" text-anchor="middle" class="lbl-tag">QUERY MATCH</text>
  <circle cx="95" cy="340" r="25" fill="var(--accent,#3b82f6)" fill-opacity="0.85" stroke="var(--accent,#3b82f6)" stroke-width="2.4"/>
  <text x="95" y="377" text-anchor="middle" class="lbl-seed">Series B round</text>
  <text x="95" y="391" text-anchor="middle" class="lbl-sm">(seed)</text>
</g>


<g data-anim="4">
  <circle cx="260" cy="95" r="19" class="ppr-fill node-stroke" fill-opacity="0.58"/>
  <text x="260" y="129" text-anchor="middle" class="lbl">Alice Lee (CEO)</text>
  <text x="260" y="142" text-anchor="middle" class="lbl-sm">1 hop from seed</text>

  <circle cx="270" cy="390" r="19" class="ppr-fill node-stroke" fill-opacity="0.58"/>
  <text x="270" y="424" text-anchor="middle" class="lbl">VC Firm X</text>
  <text x="270" y="437" text-anchor="middle" class="lbl-sm">1 hop from seed</text>
</g>


<g data-anim="4">
  <circle cx="460" cy="150" r="16" class="ppr-fill node-stroke" fill-opacity="0.4"/>
  <text x="460" y="181" text-anchor="middle" class="lbl">Board Member Chen</text>
  <text x="460" y="194" text-anchor="middle" class="lbl-sm">2 hops, moderate score</text>

  <circle cx="460" cy="340" r="16" class="ppr-fill node-stroke" fill-opacity="0.4"/>
  <text x="460" y="371" text-anchor="middle" class="lbl">Portfolio Co Y</text>
  <text x="460" y="384" text-anchor="middle" class="lbl-sm">2 hops, moderate score</text>
</g>


<g data-anim="5">
  <circle cx="630" cy="245" r="27" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2" stroke-dasharray="4 3"/>

  <text x="630" y="292" text-anchor="middle" class="lbl-sm">3 hops from any seed</text>

  <line x1="625" y1="272" x2="580" y2="388" stroke="var(--warn,#e0a106)" stroke-width="1.2" stroke-dasharray="3 3"/>

  <text x="486" y="410" class="ann">boosted transitively: connected to</text>
  <text x="486" y="426" class="ann">several relevant entities, never</text>

</g>

  <circle cx="250" cy="500" r="13" class="ppr-fill node-stroke" fill-opacity="0.2"/>

  <text x="430" y="568" text-anchor="middle" class="lbl-sm">Unrelated Merger</text>

  <text x="168" y="457" class="distr-txt">distractor side-branch: relevance never reaches here</text>
</g>


<g data-anim="5">
  <path d="M 330 590 C 130 560, 40 415, 85 260" fill="none" stroke="var(--muted,#64748b)"
        stroke-width="1.3" stroke-dasharray="2 4" marker-end="url(#hpr-arrow-muted)"/>
  <text x="300" y="550" text-anchor="middle" class="tp-txt">teleport back to seeds (alpha)</text>
</g>


<g data-anim="5">
  <rect x="20" y="602" width="740" height="28" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.1" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
  <text x="390" y="621" text-anchor="middle" class="callout-txt">No explicit sub-queries -- multi-hop reasoning emerges from graph structure</text>
</g>

</svg>
<figcaption><b>Personalized PageRank seeds relevance at the two query-matched entities and lets it flow outward through the entity graph.</b> "IPO Event" never matched the query and sits three hops from any seed, yet it ends up nearly as bright as the one-hop nodes because two moderately-scored intermediates (Board Member Chen and Portfolio Co Y) both feed into it -- while the distractor branch, only weakly and singly connected, stays faint. This transitive boosting is what lets HippoRAG answer multi-hop questions without the LLM ever generating an explicit sub-query.</figcaption>
</figure>
