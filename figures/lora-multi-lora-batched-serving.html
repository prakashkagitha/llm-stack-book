<figcaption><b>Multi-LoRA batched inference (S-LoRA / Punica style).</b> A mixed batch of four requests — each needing a different adapter (A, B, or C) — is served with a <em>single shared base GEMM</em> (W&#x2080;X, run once for all rows) followed by a lightweight segmented GEMM that applies each request's own low-rank adapter in parallel, fetching adapter weights on-demand from a paged GPU memory pool. Cold adapters spill to CPU and page back when needed, keeping thousands of adapter variants available at near-base throughput.</figcaption>
</figure>
