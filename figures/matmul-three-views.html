<figure class="viz" id="fig-matmul-three-views">
<svg viewBox="0 0 820 360" role="img" aria-label="Three equivalent ways to read the matrix product C equals A B, using one running example where A is 3 by 2, B is 2 by 4, and C is 3 by 4: as dot products of rows and columns, as columns of C built from blends of A's columns, and as a sum of rank-1 outer products.">
<defs>
  <marker id="mtv-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="currentColor"/>
  </marker>
  <marker id="mtv-arrow-up" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1 9 L5 0 L9 9 z" fill="currentColor"/>
  </marker>
</defs>
<style>
  #fig-matmul-three-views text { fill: var(--ink-soft); }
  #fig-matmul-three-views .top-note { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-matmul-three-views .ptitle  { font: 700 13px var(--sans,sans-serif); }
  #fig-matmul-three-views .lbl     { font: 700 12.5px var(--sans,sans-serif); fill: var(--accent); }
  #fig-matmul-three-views .dim     { font: 500 10px var(--mono,monospace); fill: var(--muted); }
  #fig-matmul-three-views .cap     { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-matmul-three-views .op      { font: 600 12px var(--mono,monospace); }
  #fig-matmul-three-views .bridge  { font: 600 10px var(--sans,sans-serif); fill: var(--accent); }
  #fig-matmul-three-views .rk1     { font: 600 9px var(--sans,sans-serif); }
</style>

<text x="410" y="20" text-anchor="middle" class="top-note">Same running example throughout: A is 3x2, B is 2x4, so C = AB is 3x4</text>

<line x1="270" y1="30" x2="270" y2="346" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>
<line x1="540" y1="30" x2="540" y2="346" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>


<g>
  <text x="135" y="52" text-anchor="middle" class="ptitle">View 1 -- Dot products</text>

  
  <rect x="30" y="200" width="32" height="48" rx="2" class="v-fill v-stroke" stroke-width="1.1"/>
  <line x1="46" y1="200" x2="46" y2="248" class="v-grid" stroke-width="0.75"/>
  <line x1="30" y1="216" x2="62" y2="216" class="v-grid" stroke-width="0.75"/>
  <line x1="30" y1="232" x2="62" y2="232" class="v-grid" stroke-width="0.75"/>
  
  <rect x="30" y="216" width="32" height="16" fill="none" class="v-accent-s" stroke-width="2"/>
  <text x="20" y="193"><tspan class="lbl">A</tspan><tspan class="dim" dx="3">(3x2)</tspan></text>

  
  <rect x="100" y="140" width="64" height="32" rx="2" class="v-fill v-stroke" stroke-width="1.1"/>
  <line x1="116" y1="140" x2="116" y2="172" class="v-grid" stroke-width="0.75"/>
  <line x1="132" y1="140" x2="132" y2="172" class="v-grid" stroke-width="0.75"/>
  <line x1="148" y1="140" x2="148" y2="172" class="v-grid" stroke-width="0.75"/>
  <line x1="100" y1="156" x2="164" y2="156" class="v-grid" stroke-width="0.75"/>
  
  <rect x="132" y="140" width="16" height="32" fill="none" class="v-accent-s" stroke-width="2"/>
  <text x="106" y="133"><tspan class="lbl">B</tspan><tspan class="dim" dx="3">(2x4)</tspan></text>

  
  <rect x="100" y="200" width="64" height="48" rx="2" class="v-fill v-stroke" stroke-width="1.1"/>
  <line x1="116" y1="200" x2="116" y2="248" class="v-grid" stroke-width="0.75"/>
  <line x1="132" y1="200" x2="132" y2="248" class="v-grid" stroke-width="0.75"/>
  <line x1="148" y1="200" x2="148" y2="248" class="v-grid" stroke-width="0.75"/>
  <line x1="100" y1="216" x2="164" y2="216" class="v-grid" stroke-width="0.75"/>
  <line x1="100" y1="232" x2="164" y2="232" class="v-grid" stroke-width="0.75"/>
  
  <rect x="132" y="216" width="16" height="16" fill="var(--accent)" fill-opacity="0.3" class="v-accent-s" stroke-width="2"/>
  <text x="172" y="227"><tspan class="lbl">C</tspan><tspan class="dim" dx="3">(3x4)</tspan></text>

  
  <line x1="62" y1="224" x2="132" y2="224" class="v-muted" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="140" y1="172" x2="140" y2="216" class="v-muted" stroke-width="1" stroke-dasharray="2 3"/>

  <text x="135" y="288" text-anchor="middle" class="cap">C_ij = row_i(A) . col_j(B)</text>
</g>


<g>
  <text x="410" y="52" text-anchor="middle" class="ptitle">View 2 -- Column combinations</text>

  
  <rect x="300" y="140" width="64" height="32" rx="2" class="v-fill v-stroke" stroke-width="1.1"/>
  <line x1="316" y1="140" x2="316" y2="172" class="v-grid" stroke-width="0.75"/>
  <line x1="332" y1="140" x2="332" y2="172" class="v-grid" stroke-width="0.75"/>
  <line x1="348" y1="140" x2="348" y2="172" class="v-grid" stroke-width="0.75"/>
  <line x1="300" y1="156" x2="364" y2="156" class="v-grid" stroke-width="0.75"/>
  <rect x="316" y="140" width="16" height="32" fill="none" class="v-accent-s" stroke-width="2"/>
  <text x="306" y="133"><tspan class="lbl">B</tspan><tspan class="dim" dx="3">(2x4)</tspan></text>

  
  <line x1="366" y1="156" x2="458" y2="156" stroke="currentColor" stroke-width="1.4" marker-end="url(#mtv-arrow)"/>
  <text x="412" y="148" text-anchor="middle" class="cap">A . (.)</text>

  
  <rect x="460" y="140" width="64" height="48" rx="2" class="v-fill v-stroke" stroke-width="1.1"/>
  <line x1="476" y1="140" x2="476" y2="188" class="v-grid" stroke-width="0.75"/>
  <line x1="492" y1="140" x2="492" y2="188" class="v-grid" stroke-width="0.75"/>
  <line x1="508" y1="140" x2="508" y2="188" class="v-grid" stroke-width="0.75"/>
  <line x1="460" y1="156" x2="524" y2="156" class="v-grid" stroke-width="0.75"/>
  <line x1="460" y1="172" x2="524" y2="172" class="v-grid" stroke-width="0.75"/>
  <rect x="476" y="140" width="16" height="48" fill="var(--accent)" fill-opacity="0.3" class="v-accent-s" stroke-width="2"/>
  <text x="476" y="133"><tspan class="lbl">C</tspan><tspan class="dim" dx="3">(3x4)</tspan></text>

  
  <text x="484" y="202" text-anchor="middle" class="cap">A's columns</text>
  <line x1="484" y1="208" x2="484" y2="190" stroke="currentColor" stroke-width="1.3" marker-end="url(#mtv-arrow-up)"/>
  <rect x="466" y="208" width="14" height="40" rx="2" fill="var(--accent)" fill-opacity="0.3" class="v-stroke" stroke-width="1"/>
  <text x="473" y="231" text-anchor="middle" class="op" fill="var(--ink-soft)">+</text>
  <rect x="498" y="208" width="14" height="40" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.3" class="v-stroke" stroke-width="1"/>

  <text x="410" y="288" text-anchor="middle" class="cap">each output column = a blend of A's columns</text>
</g>


<g>
  <text x="680" y="52" text-anchor="middle" class="ptitle">View 3 -- Outer-product sum</text>

  
  <rect x="565" y="140" width="13" height="39" rx="1.5" fill="var(--accent)" fill-opacity="0.35" class="v-stroke" stroke-width="1"/>
  <text x="584" y="163" text-anchor="middle" class="op">x</text>
  <rect x="596" y="153" width="52" height="13" rx="1.5" fill="var(--accent)" fill-opacity="0.35" class="v-stroke" stroke-width="1"/>
  <text x="654" y="163" text-anchor="middle" class="op">=</text>
  <rect x="666" y="140" width="52" height="39" rx="2" fill="var(--accent)" fill-opacity="0.22" class="v-stroke" stroke-width="1.1"/>
  <text x="692" y="163" text-anchor="middle" class="rk1" fill="var(--accent)">rank-1</text>

  <text x="692" y="192" text-anchor="middle" class="op" fill="var(--ink-soft)">+</text>

  
  <rect x="565" y="195" width="13" height="39" rx="1.5" fill="var(--accent2,#3b82f6)" fill-opacity="0.35" class="v-stroke" stroke-width="1"/>
  <text x="584" y="218" text-anchor="middle" class="op">x</text>
  <rect x="596" y="208" width="52" height="13" rx="1.5" fill="var(--accent2,#3b82f6)" fill-opacity="0.35" class="v-stroke" stroke-width="1"/>
  <text x="654" y="218" text-anchor="middle" class="op">=</text>
  <rect x="666" y="195" width="52" height="39" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.22" class="v-stroke" stroke-width="1.1"/>
  <text x="692" y="218" text-anchor="middle" class="rk1" fill="var(--accent2,#3b82f6)">rank-1</text>

  
  <text x="646" y="292" text-anchor="middle" class="op">=</text>
  <rect x="654" y="268" width="52" height="39" rx="2" class="v-fill v-stroke" stroke-width="1.1"/>
  <line x1="667" y1="268" x2="667" y2="307" class="v-grid" stroke-width="0.6"/>
  <line x1="680" y1="268" x2="680" y2="307" class="v-grid" stroke-width="0.6"/>
  <line x1="693" y1="268" x2="693" y2="307" class="v-grid" stroke-width="0.6"/>
  <line x1="654" y1="281" x2="706" y2="281" class="v-grid" stroke-width="0.6"/>
  <line x1="654" y1="294" x2="706" y2="294" class="v-grid" stroke-width="0.6"/>
  <text x="654" y="261"><tspan class="lbl">C</tspan><tspan class="dim" dx="3">(3x4)</tspan></text>

  <text x="680" y="326" text-anchor="middle" class="bridge">truncate this sum -&gt;</text>
  <text x="680" y="339" text-anchor="middle" class="bridge">low-rank approximation (see SVD)</text>
</g>

</svg>
<figcaption><b>The same matrix product C = AB, read three equivalent ways.</b> As dot products, each entry <code>C_ij</code> pairs a row of A with a column of B; as column combinations, each output column of C is a linear blend of A's columns; as a sum of outer products, C is built from rank-1 terms <code>col_p(A) &#183; row_p(B)</code> &#8212; truncating that sum early is exactly what a low-rank approximation does.</figcaption>
</figure>
