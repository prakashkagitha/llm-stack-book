<figure class="viz" id="fig-prefixcache-block-hash-chain">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 430" role="img" aria-label="Content-based block hashing: a 64-token prompt is split into four 16-token blocks; each block hash chains from the previous; blocks 0 and 1 are cache HITs, blocks 2 and 3 are MISSes requiring prefill.">
<defs>
  <marker id="bh-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">

    <path d="M1 0 L5 9 L9 0 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <marker id="bh-arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>
<style>
  #fig-prefixcache-block-hash-chain text { fill: var(--ink-soft,#45413a); font: 400 12px var(--sans,sans-serif); }
  #fig-prefixcache-block-hash-chain .title { font: 600 13px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-block-hash-chain .blk-hdr { font: 700 13px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-prefixcache-block-hash-chain .blk-sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-block-hash-chain .hash-txt { font: 400 10px var(--mono,monospace); fill: var(--accent,#c15b39); }
  #fig-prefixcache-block-hash-chain .chain-lbl { font: 600 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-prefixcache-block-hash-chain .pill-txt { font: 600 12px var(--sans,sans-serif); }
  #fig-prefixcache-block-hash-chain .band-txt { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-prefixcache-block-hash-chain .band-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-block-hash-chain .lookup-lbl { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

    #fig-prefixcache-block-hash-chain .viz-pulse { animation: none !important; }
  }
</style>


<text x="410" y="22" text-anchor="middle" class="title">Incoming prompt: 64 tokens, block size B = 16</text>



<g data-anim="1">
  <rect x="18" y="34" width="190" height="148" rx="7" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="113" y="57" text-anchor="middle" class="blk-hdr">Block 0</text>
  <text x="113" y="74" text-anchor="middle" class="blk-sub">tokens 0 - 15</text>
  
  <line x1="28" y1="82" x2="198" y2="82" class="v-grid" stroke-width="0.8"/>
  <text x="113" y="99" text-anchor="middle" class="hash-txt">h0 = HASH(</text>
  <text x="113" y="114" text-anchor="middle" class="hash-txt">ids[0:16])</text>
  
  <rect x="58" y="124" width="110" height="22" rx="4" fill="var(--accent,#c15b39)" fill-opacity="0.12" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="113" y="139" text-anchor="middle" class="hash-txt" style="fill:var(--accent,#c15b39);font-weight:700">h0</text>
  <text x="113" y="163" text-anchor="middle" class="blk-sub">output hash</text>
  <text x="113" y="177" text-anchor="middle" class="blk-sub">feeds Block 1</text>
</g>


<g data-anim="2">
  <rect x="228" y="34" width="190" height="148" rx="7" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="323" y="57" text-anchor="middle" class="blk-hdr">Block 1</text>
  <text x="323" y="74" text-anchor="middle" class="blk-sub">tokens 16 - 31</text>
  <line x1="238" y1="82" x2="408" y2="82" class="v-grid" stroke-width="0.8"/>
  <text x="323" y="99" text-anchor="middle" class="hash-txt">h1 = HASH(</text>
  <text x="323" y="114" text-anchor="middle" class="hash-txt">h0 &#x2016; ids[16:32])</text>
  <rect x="268" y="124" width="110" height="22" rx="4" fill="var(--accent,#c15b39)" fill-opacity="0.12" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="323" y="139" text-anchor="middle" class="hash-txt" style="fill:var(--accent,#c15b39);font-weight:700">h1</text>
  <text x="323" y="163" text-anchor="middle" class="blk-sub">output hash</text>
  <text x="323" y="177" text-anchor="middle" class="blk-sub">feeds Block 2</text>
</g>


<g data-anim="3">
  <rect x="438" y="34" width="190" height="148" rx="7" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="533" y="57" text-anchor="middle" class="blk-hdr">Block 2</text>
  <text x="533" y="74" text-anchor="middle" class="blk-sub">tokens 32 - 47</text>
  <line x1="448" y1="82" x2="618" y2="82" class="v-grid" stroke-width="0.8"/>
  <text x="533" y="99" text-anchor="middle" class="hash-txt">h2 = HASH(</text>
  <text x="533" y="114" text-anchor="middle" class="hash-txt">h1 &#x2016; ids[32:48])</text>
  <rect x="478" y="124" width="110" height="22" rx="4" fill="var(--accent,#c15b39)" fill-opacity="0.12" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="533" y="139" text-anchor="middle" class="hash-txt" style="fill:var(--accent,#c15b39);font-weight:700">h2</text>
  <text x="533" y="163" text-anchor="middle" class="blk-sub">output hash</text>
  <text x="533" y="177" text-anchor="middle" class="blk-sub">feeds Block 3</text>
</g>


<g data-anim="4">
  <rect x="648" y="34" width="160" height="148" rx="7" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="728" y="57" text-anchor="middle" class="blk-hdr">Block 3</text>
  <text x="728" y="74" text-anchor="middle" class="blk-sub">tokens 48 - 63</text>
  <line x1="658" y1="82" x2="798" y2="82" class="v-grid" stroke-width="0.8"/>
  <text x="728" y="99" text-anchor="middle" class="hash-txt">h3 = HASH(</text>
  <text x="728" y="114" text-anchor="middle" class="hash-txt">h2 &#x2016; ids[48:64])</text>
  <rect x="673" y="124" width="110" height="22" rx="4" fill="var(--accent,#c15b39)" fill-opacity="0.12" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="728" y="139" text-anchor="middle" class="hash-txt" style="fill:var(--accent,#c15b39);font-weight:700">h3</text>
  <text x="728" y="163" text-anchor="middle" class="blk-sub">final block</text>
  <text x="728" y="177" text-anchor="middle" class="blk-sub">(terminal)</text>
</g>



<g data-anim="2">
  <line x1="208" y1="135" x2="228" y2="135" stroke="var(--accent,#c15b39)" stroke-width="2" marker-end="url(#bh-arrow)"/>
  <text x="218" y="128" text-anchor="middle" class="chain-lbl">h0</text>
</g>

<g data-anim="3">
  <line x1="418" y1="135" x2="438" y2="135" stroke="var(--accent,#c15b39)" stroke-width="2" marker-end="url(#bh-arrow)"/>
  <text x="428" y="128" text-anchor="middle" class="chain-lbl">h1</text>
</g>

<g data-anim="4">
  <line x1="628" y1="135" x2="648" y2="135" stroke="var(--accent,#c15b39)" stroke-width="2" marker-end="url(#bh-arrow)"/>
  <text x="638" y="128" text-anchor="middle" class="chain-lbl">h2</text>
</g>


<text x="10" y="218" class="lookup-lbl" transform="rotate(-90,10,218)" text-anchor="middle">lookup in prefix hash table</text>

<g data-anim="5">
  <line x1="113" y1="182" x2="113" y2="222" stroke="var(--ink-soft,#45413a)" stroke-width="1.4" marker-end="url(#bh-arrow-down)"/>
  <line x1="323" y1="182" x2="323" y2="222" stroke="var(--ink-soft,#45413a)" stroke-width="1.4" marker-end="url(#bh-arrow-down)"/>
  <line x1="533" y1="182" x2="533" y2="222" stroke="var(--ink-soft,#45413a)" stroke-width="1.4" marker-end="url(#bh-arrow-down)"/>
  <line x1="728" y1="182" x2="728" y2="222" stroke="var(--ink-soft,#45413a)" stroke-width="1.4" marker-end="url(#bh-arrow-down)"/>
</g>



<g data-anim="6">
  <rect x="28" y="228" width="170" height="40" rx="10" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="113" y="253" text-anchor="middle" class="pill-txt" fill="var(--good,#2f9e6e)">HIT &#8212; skip prefill</text>
</g>
<g data-anim="6">
  <rect x="238" y="228" width="170" height="40" rx="10" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="323" y="253" text-anchor="middle" class="pill-txt" fill="var(--good,#2f9e6e)">HIT &#8212; skip prefill</text>
</g>

<g data-anim="7">
  <rect x="448" y="228" width="170" height="40" rx="10" fill="var(--warn,#e0a106)" fill-opacity="0.15" stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
  <text x="533" y="253" text-anchor="middle" class="pill-txt" fill="var(--warn,#e0a106)">MISS &#8212; run prefill</text>
</g>
<g data-anim="7">
  <rect x="648" y="228" width="160" height="40" rx="10" fill="var(--warn,#e0a106)" fill-opacity="0.15" stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
  <text x="728" y="253" text-anchor="middle" class="pill-txt" fill="var(--warn,#e0a106)">MISS &#8212; run prefill</text>
</g>


<g data-anim="8">
  
  <rect x="18" y="282" width="790" height="130" rx="8" class="v-fill v-stroke" stroke-width="1.2"/>
  
  <rect x="22" y="286" width="400" height="122" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.10" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  
  <rect x="428" y="286" width="376" height="122" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.10" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  
  <line x1="424" y1="286" x2="424" y2="408" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5" stroke-dasharray="4 3"/>
  
  <path d="M30,296 L30,290 L410,290 L410,296" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <path d="M434,296 L434,290 L796,290 L796,296" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
  
  <text x="220" y="315" text-anchor="middle" class="band-txt" fill="var(--good,#2f9e6e)" style="font-weight:600">Cached prefix (blocks 0 - 1, 32 tokens)</text>
  <text x="220" y="332" text-anchor="middle" class="band-sub">KV reused as prior context</text>
  <text x="220" y="350" text-anchor="middle" class="band-sub">No GPU computation needed</text>
  
  <text x="616" y="315" text-anchor="middle" class="band-txt" fill="var(--warn,#e0a106)" style="font-weight:600">Uncached suffix (blocks 2 - 3, 32 tokens)</text>
  <text x="616" y="332" text-anchor="middle" class="band-sub">Prefill runs here; results inserted into cache</text>
  <text x="616" y="350" text-anchor="middle" class="band-sub">Engine attends to cached prefix as context</text>
</g>
</svg>
<figcaption><b>Content-based chained hashing drives the longest-prefix match.</b> Each block's hash incorporates the previous block's hash (&#x2016; = concatenation), making hashes position-sensitive. A prefix hash-table lookup on the four block hashes yields two contiguous HITs (blocks 0 and 1, 32 tokens reused from cache) followed by two MISSes (blocks 2 and 3), so the engine runs prefill only for the 32-token suffix while the cached KV blocks serve as prior context.</figcaption>
</figure>
