<figure class="viz" id="fig-agentloop-context-growth">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 460" role="img" aria-label="Five stacked bars for steps t=1 through t=5 showing the agent's context window growing taller each step as a new action-observation block is added on top of all previous blocks, until the final bar hits a dashed token-budget ceiling and the harness stops.">
<style>
  #fig-agentloop-context-growth text { fill: var(--ink-soft,#333); font: 400 11.5px var(--sans,sans-serif); }
  #fig-agentloop-context-growth .ttl { font: 700 14px var(--sans,sans-serif); fill: var(--ink-soft,#222); }
  #fig-agentloop-context-growth .step-lbl { font: 700 12px var(--mono,monospace); fill: var(--ink-soft,#333); }
  #fig-agentloop-context-growth .blk-lbl { font: 600 10px var(--mono,monospace); fill: var(--ink-soft,#333); }
  #fig-agentloop-context-growth .blk-lbl-muted { font: 500 9.5px var(--mono,monospace); }
  #fig-agentloop-context-growth .ceil-lbl { font: 600 11px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-agentloop-context-growth .note { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-agentloop-context-growth .flag-lbl { font: 700 10.5px var(--sans,sans-serif); fill: #fff; }
</style>

<g data-anim="1">
  <text x="12" y="20" class="ttl">Context grows by one (action, observation) block every step</text>
</g>


<line x1="60" y1="368" x2="740" y2="368" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>


<g data-anim="2">
  <line x1="60" y1="60" x2="740" y2="60" stroke="var(--warn,#e0a106)" stroke-width="1.6" stroke-dasharray="6 4"/>
  <rect x="140" y="41" width="192" height="18" rx="4" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1"/>
  <text x="236" y="54" text-anchor="middle" class="ceil-lbl">token budget (~85% of window)</text>
</g>





<g data-anim="3">

  <line x1="118" y1="386" x2="118" y2="368" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  <text x="118" y="303" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">system+task</text>
  <rect x="79" y="230" width="78" height="54" fill="var(--accent,#4f46e5)" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="118" y="252" text-anchor="middle" class="blk-lbl" fill="#fff">(a_1, o_1)</text>
</g>

  <rect x="203" y="338" width="78" height="30" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="242" y="357" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">system+task</text>
  <rect x="203" y="284" width="78" height="54" class="v-fill" opacity="0.55" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="242" y="306" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">(a_1, o_1)</text>

  <line x1="366" y1="386" x2="366" y2="368" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="366" y="404" text-anchor="middle" class="step-lbl">t=3</text>
  <rect x="327" y="338" width="78" height="30" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="366" y="357" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">system+task</text>
  <rect x="327" y="284" width="78" height="54" class="v-fill" opacity="0.4" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  <rect x="327" y="230" width="78" height="54" class="v-fill" opacity="0.55" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  <rect x="327" y="176" width="78" height="54" fill="var(--accent,#4f46e5)" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="366" y="198" text-anchor="middle" class="blk-lbl" fill="#fff">(a_3, o_3)</text>
</g>


<g data-anim="6">
  <line x1="490" y1="386" x2="490" y2="368" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="490" y="404" text-anchor="middle" class="step-lbl">t=4</text>
  <rect x="451" y="338" width="78" height="30" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="490" y="357" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">system+task</text>
  <rect x="451" y="284" width="78" height="54" class="v-fill" opacity="0.3" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="490" y="306" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">(a_1, o_1)</text>
  <rect x="451" y="230" width="78" height="54" class="v-fill" opacity="0.4" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="490" y="252" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">(a_2, o_2)</text>
  <rect x="451" y="176" width="78" height="54" class="v-fill" opacity="0.55" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="490" y="198" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">(a_3, o_3)</text>
  <rect x="451" y="122" width="78" height="54" fill="var(--accent,#4f46e5)" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>

</g>


<g data-anim="7">
  <line x1="614" y1="386" x2="614" y2="368" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="614" y="404" text-anchor="middle" class="step-lbl">t=5</text>
  <rect x="575" y="338" width="78" height="30" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="614" y="357" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">system+task</text>
  <rect x="575" y="284" width="78" height="54" class="v-fill" opacity="0.25" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="614" y="306" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">(a_1, o_1)</text>
  <rect x="575" y="230" width="78" height="54" class="v-fill" opacity="0.32" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="614" y="252" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">(a_2, o_2)</text>
  <rect x="575" y="176" width="78" height="54" class="v-fill" opacity="0.4" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="614" y="198" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">(a_3, o_3)</text>
  <rect x="575" y="122" width="78" height="54" class="v-fill" opacity="0.55" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="614" y="144" text-anchor="middle" class="blk-lbl-muted" fill="var(--muted,#888)">(a_4, o_4)</text>
  <rect x="575" y="68" width="78" height="54" fill="var(--accent,#4f46e5)" stroke="var(--warn,#e0a106)" stroke-width="1.8" class="viz-pulse"/>
  <text x="614" y="90" text-anchor="middle" class="blk-lbl" fill="#fff">(a_5, o_5)</text>
</g>


<g data-anim="8">
  <rect x="588" y="8" width="118" height="22" rx="5" fill="var(--warn,#e0a106)"/>
  <text x="647" y="23" text-anchor="middle" class="flag-lbl">stop: context full</text>
  <line x1="647" y1="30" x2="647" y2="66" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
</g>


<g data-anim="9">
  <text x="12" y="424" class="note">Every step re-sends the full history to the model -- cost and latency grow with t.</text>
  <text x="12" y="442" class="note">Older turns dilute the goal in the context window, which can lead to derailment.</text>
</g>

</svg>
<figcaption><b>The agentic loop's context is cumulative: at each step the harness re-sends the entire prior history plus one new (action, observation) block.</b> The bars form a rising staircase where older blocks (muted) are carried forward unchanged and the newest block (solid) is appended on top, so cost, latency, and the risk of derailment all grow with step count t until the token budget forces a stop.</figcaption>
</figure>
