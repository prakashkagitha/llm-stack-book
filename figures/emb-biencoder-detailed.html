<figcaption><b>The SBERT-style bi-encoder processes query and document through identical pipelines with shared BERT weights.</b> Each pipeline tokenizes its input (up to 512 tokens), passes it through a 12-layer, 768-hidden BERT encoder producing a <code>(B, L, 768)</code> tensor, mean-pools to <code>(B, 768)</code>, L2-normalizes, and outputs a unit-norm embedding. The final similarity score is the dot product of the two resulting vectors.</figcaption>
