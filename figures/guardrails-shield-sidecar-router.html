<figure class="viz" id="fig-guardrails-shield-sidecar-router">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 700 560" role="img" aria-label="Shield model placement: an API Gateway sends requests into a Safety Router service containing an Input Shield sidecar, Main LLM, and Output Shield sidecar stacked vertically; each shield can block the request before it proceeds, and only passing requests continue to the next stage.">
  <defs>
    <marker id="ssr-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#555)"/>
    </marker>
    <marker id="ssr-arrow-danger" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--danger,#dc2626)"/>
    </marker>
  </defs>
  <style>
    #fig-guardrails-shield-sidecar-router .lbl       { font: 600 13px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
    #fig-guardrails-shield-sidecar-router .sub       { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#888); }
    #fig-guardrails-shield-sidecar-router .title     { font: 700 12px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
    #fig-guardrails-shield-sidecar-router .pass-lbl  { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#888); }
    #fig-guardrails-shield-sidecar-router .danger-lbl{ font: 600 10px var(--sans,sans-serif); fill: var(--danger,#dc2626); }
    #fig-guardrails-shield-sidecar-router .accent-lbl{ font: 700 13px var(--sans,sans-serif); fill: #fff; }
    #fig-guardrails-shield-sidecar-router .accent-sub{ font: 400 10px var(--sans,sans-serif); fill: rgba(255,255,255,0.8); }
    #fig-guardrails-shield-sidecar-router .note      { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#888); font-style: italic; }
  </style>

  
  <g data-anim="1">
    <rect x="220" y="12" width="200" height="44" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="320" y="38" text-anchor="middle" class="lbl">API Gateway</text>
  </g>

  
  <line x1="320" y1="56" x2="320" y2="86" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#ssr-arrow)" data-anim="1"/>

  
  <g data-anim="2">
    <rect x="40" y="90" width="570" height="390" rx="12" class="v-fill v-stroke" stroke-width="2" fill-opacity="0.4"/>
    <text x="325" y="114" text-anchor="middle" class="title">Safety Router (FastAPI / Triton)</text>
  </g>

  
  <g data-anim="2">
    <rect x="188" y="125" width="260" height="56" rx="8" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
    <path d="M177,148 l8,-10 l8,10 l0,8 l-8,5 l-8,-5 z" fill="var(--accent,#4f46e5)" opacity="0.7"/>
    <text x="318" y="150" text-anchor="middle" class="lbl">Input Shield</text>
    <text x="318" y="166" text-anchor="middle" class="sub">(Llama Guard / ShieldLM / Aegis)</text>
  </g>

  
  <g data-anim="2">
    <line x1="448" y1="153" x2="506" y2="153" stroke="var(--danger,#dc2626)" stroke-width="1.5" marker-end="url(#ssr-arrow-danger)"/>
    <text x="477" y="146" text-anchor="middle" class="danger-lbl">block</text>
    <rect x="508" y="138" width="62" height="28" rx="5" fill="var(--danger,#dc2626)" fill-opacity="0.15" stroke="var(--danger,#dc2626)" stroke-width="1.3"/>
    <text x="539" y="157" text-anchor="middle" class="danger-lbl">refusal</text>
  </g>

  
  <g data-anim="3">
    <line x1="318" y1="181" x2="318" y2="213" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#ssr-arrow)"/>
    <text x="334" y="200" class="pass-lbl">pass</text>
  </g>

  
  <g data-anim="3">
    <rect x="188" y="217" width="260" height="80" rx="8" fill="var(--accent,#4f46e5)" stroke="none"/>
    <text x="318" y="252" text-anchor="middle" class="accent-lbl">Main LLM</text>
    <text x="318" y="270" text-anchor="middle" class="accent-sub">(vLLM / TGI etc.)</text>
  </g>

  
  <g data-anim="4">
    <line x1="318" y1="297" x2="318" y2="329" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#ssr-arrow)"/>
    <text x="348" y="317" class="pass-lbl">generated text</text>
  </g>

  
  <g data-anim="4">
    <rect x="188" y="333" width="260" height="56" rx="8" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
    <path d="M177,356 l8,-10 l8,10 l0,8 l-8,5 l-8,-5 z" fill="var(--accent,#4f46e5)" opacity="0.7"/>
    <text x="318" y="358" text-anchor="middle" class="lbl">Output Shield</text>
    <text x="318" y="374" text-anchor="middle" class="sub">(same shield model class)</text>
  </g>

  
  <g data-anim="4">
    <line x1="448" y1="361" x2="506" y2="361" stroke="var(--danger,#dc2626)" stroke-width="1.5" marker-end="url(#ssr-arrow-danger)"/>
    <text x="477" y="354" text-anchor="middle" class="danger-lbl">block</text>
    <rect x="508" y="346" width="70" height="28" rx="5" fill="var(--danger,#dc2626)" fill-opacity="0.15" stroke="var(--danger,#dc2626)" stroke-width="1.3"/>
    <text x="543" y="361" text-anchor="middle" class="danger-lbl">blocked</text>
  </g>

  
  <g data-anim="5">
    <line x1="318" y1="389" x2="318" y2="450" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#ssr-arrow)"/>
    <text x="338" y="424" class="pass-lbl">pass / response</text>
  </g>

  
  <g data-anim="5">
    <rect x="238" y="452" width="160" height="40" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="318" y="477" text-anchor="middle" class="lbl">Client</text>
  </g>

  
  <g data-anim="2">
    <text x="66" y="265" class="note">sidecar shield</text>
    <text x="66" y="278" class="note">instances (e.g.</text>
    <text x="66" y="291" class="note">Llama Guard</text>
    <text x="66" y="304" class="note">7B / 2B / 1B)</text>
    <path d="M140,155 Q150,155 150,260 Q150,365 140,365" fill="none" stroke="var(--muted,#aaa)" stroke-width="1" stroke-dasharray="3 3"/>
  </g>

  
  <circle r="6" fill="var(--accent,#4f46e5)" opacity="0.85">
    <animateMotion dur="3s" repeatCount="indefinite" keyTimes="0;0.1;0.35;0.55;0.75;0.9;1" calcMode="linear"
      path="M318,34 L318,153 L318,257 L318,361 L318,472"/>
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite"
      keyTimes="0;0.82;0.9;1" values="0.85;0.85;0;0"/>
  </circle>
</svg>
<figcaption><b>Shield models deployed as sidecar microservices inside a Safety Router.</b> Both the Input Shield and Output Shield are instances of the same decoder-based classifier class (Llama Guard, ShieldLM, Aegis, or Granite Guardian), co-located with the Main LLM inside a single routing service. The input shield blocks adversarial prompts before inference runs; the output shield catches harmful generations before they reach the client — either gate can independently terminate the request.</figcaption>
</figure>
