<g data-anim="4">
  <text x="380" y="402" text-anchor="middle" class="eqn">P(match) = |A intersect B| / |A union B| = J(A,B)</text>
  <text x="380" y="422" text-anchor="middle" class="gloss">the min is equally likely to be any union element -- it matches exactly when</text>
  <text x="380" y="436" text-anchor="middle" class="gloss">that element falls in the shared part</text>
</g>

  <rect x="228" y="486" width="18" height="18" rx="3" fill="var(--muted,#94a3b8)" fill-opacity="0.30" stroke="var(--muted,#94a3b8)" stroke-width="1.2"/>
  <rect x="252" y="486" width="18" height="18" rx="3" fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <rect x="276" y="486" width="18" height="18" rx="3" fill="var(--muted,#94a3b8)" fill-opacity="0.30" stroke="var(--muted,#94a3b8)" stroke-width="1.2"/>
  <text x="310" y="500" class="sub">4 of 10 hash comparisons match (illustrative)</text>

  <text x="60" y="522" class="sub">fraction of matching signature entries estimates J(A,B); standard error ~ 1/sqrt(k)</text>

</svg>
<figcaption><b>The minimum hash value of the union lands in the intersection with probability exactly J(A,B).</b> When a random hash's global minimum falls on a shingle shared by both documents, the per-document minimums coincide and the MinHash signatures match on that hash; when it falls on a shingle unique to one document, they differ -- so the fraction of matching entries across k independent hashes is an unbiased estimator of Jaccard similarity with error shrinking as 1/sqrt(k).</figcaption>
</figure>
