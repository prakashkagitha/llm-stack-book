<figure class="viz" id="fig-serving-throughput-tpot-frontier">
<svg viewBox="0 0 820 570" role="img" aria-label="Scatter plot showing the throughput versus per-token latency (TPOT) tradeoff curve with a vertical SLO constraint line. A small-batch operating point sits at low throughput and low TPOT; a large-batch point sits at high throughput and high TPOT. The SLO line marks the maximum allowable TPOT budget; the optimal operating point is where the curve meets the SLO line.">
<defs>
  <marker id="tpf-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#475569)"/>
  </marker>
  <linearGradient id="tpf-forbidden-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="var(--warn,#ef4444)" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="var(--warn,#ef4444)" stop-opacity="0.20"/>
  </linearGradient>
  <linearGradient id="tpf-feasible-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="var(--good,#2f9e6e)" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="var(--good,#2f9e6e)" stop-opacity="0.04"/>
  </linearGradient>
</defs>
<style>
  #fig-serving-throughput-tpot-frontier text { font: 13px var(--sans,sans-serif); fill: var(--ink-soft,#475569); }
  #fig-serving-throughput-tpot-frontier .axis-lbl { font: 600 13px var(--sans,sans-serif); fill: var(--ink-soft,#475569); }
  #fig-serving-throughput-tpot-frontier .callout { font: 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#475569); }
  #fig-serving-throughput-tpot-frontier .slo-lbl { font: 700 12px var(--sans,sans-serif); fill: var(--warn,#ef4444); }
  #fig-serving-throughput-tpot-frontier .cap { font: 11px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-serving-throughput-tpot-frontier .optimal-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
</style>

<text x="490" y="47" text-anchor="middle" class="slo-lbl">SLO: stay LEFT of this line</text>

<text x="622" y="327" text-anchor="middle" class="slo-lbl" font-size="11" opacity="0.7">(TPOT over budget)</text>

<line x1="490" y1="111" x2="490" y2="92" stroke="var(--good,#2f9e6e)" stroke-width="1" stroke-dasharray="3 2"/>


<text x="440" y="548" text-anchor="middle" class="cap">the SLO is a vertical line you must stay left of, at max throughput</text>

</svg>
<figcaption><b>The throughput-vs-TPOT frontier shows the fundamental tradeoff mediated by batch size.</b> Each point on the curve is an operating regime: small batches deliver fast per-token latency but low throughput (expensive), while large batches invert this. The SLO budget is a vertical constraint — the system must operate to its left, and the goal is to reach the highest throughput still satisfying the SLO (the marked optimal point).</figcaption>
</figure>
