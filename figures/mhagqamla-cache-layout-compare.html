<figcaption><b>MLA caches a tiny shared latent instead of explicit key and value tensors.</b> MHA stores a full-width K and V bar per token (2·h·d_h values); GQA shrinks to 2·g·d_h; MLA stores only a single d_c-dimensional vector c^KV — then up-projects it with fixed matrices W^UK and W^UV to reconstruct K and V for all heads at attention time. In practice these up-projections are absorbed into neighboring weight matrices so no extra materialization is needed, giving MLA a tiny cache footprint with full multi-head expressivity.</figcaption>
</figure>
