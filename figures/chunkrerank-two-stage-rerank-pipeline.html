<figure class="viz" id="fig-chunkrerank-two-stage-rerank-pipeline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 560" role="img" aria-label="Two-stage retrieve-then-rerank pipeline: a fast hybrid retriever (BM25 plus dense) returns 100 candidates in about 10 ms, then an expensive cross-encoder reranker rescores those 100 and keeps the top 5 in about 200 ms, feeding the LLM context window.">
<defs>
  <marker id="trp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="trp-arr-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  
  <clipPath id="trp-clip">
    <rect x="0" y="0" width="720" height="560"/>
  </clipPath>
</defs>

<style>
  #fig-chunkrerank-two-stage-rerank-pipeline text { fill: var(--ink-soft,#333); }
  #fig-chunkrerank-two-stage-rerank-pipeline .lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-chunkrerank-two-stage-rerank-pipeline .lbl-sm { font: 400 11.5px var(--sans,sans-serif); }

  #fig-chunkrerank-two-stage-rerank-pipeline .hero-lbl { font: 700 14px var(--sans,sans-serif); fill: #fff; }
  #fig-chunkrerank-two-stage-rerank-pipeline .hero-sub { font: 400 11px var(--sans,sans-serif); fill: rgba(255,255,255,0.88); }
  #fig-chunkrerank-two-stage-rerank-pipeline .badge-lbl { font: 700 11px var(--sans,sans-serif); fill: #fff; }
  #fig-chunkrerank-two-stage-rerank-pipeline .pill-lbl { font: 700 11px var(--sans,sans-serif); }
  #fig-chunkrerank-two-stage-rerank-pipeline .count-lbl { font: 700 12px var(--sans,sans-serif); }
  #fig-chunkrerank-two-stage-rerank-pipeline .dot { transition: opacity 0.3s; }
</style>

  <text x="310" y="153" text-anchor="middle" class="lbl-xs">returns top-100 candidates</text>

  
  <g opacity="0.55">
    
    <circle cx="565" cy="113" r="3.5" fill="var(--accent,#4f46e5)"/>

    <circle cx="577" cy="125" r="3.5" fill="var(--accent,#4f46e5)"/>

    <circle cx="565" cy="137" r="3.5" fill="var(--accent,#4f46e5)"/>
    <circle cx="577" cy="137" r="3.5" fill="var(--accent,#4f46e5)"/>
    <circle cx="589" cy="137" r="3.5" fill="var(--accent,#4f46e5)"/>
    <circle cx="577" cy="149" r="3.5" fill="var(--accent,#4f46e5)"/>

  <rect x="595" y="120" width="30" height="22" rx="4" fill="var(--accent,#4f46e5)" fill-opacity="0.15" stroke="var(--accent,#4f46e5)" stroke-width="1"/>

<g data-anim="2">
  <rect x="632" y="108" width="64" height="28" rx="14" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="664" y="121" text-anchor="middle" class="pill-lbl" style="fill:var(--good,#2f9e6e); font-size:10px">fast</text>
  <text x="664" y="133" text-anchor="middle" class="pill-lbl" style="fill:var(--good,#2f9e6e); font-size:10px">~10 ms</text>
</g>


<g data-anim="3">
  <line x1="360" y1="173" x2="360" y2="198" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#trp-arr)"/>
  
  <text x="406" y="189" class="lbl-xs" style="font-size:10px">100 candidates</text>
</g>


<g data-anim="3">
  
  <rect x="138" y="203" width="444" height="88" rx="8" fill="var(--accent,#4f46e5)" stroke="var(--accent,#4f46e5)" stroke-width="2"/>
  
  <rect x="138" y="203" width="444" height="88" rx="8" fill="var(--accent,#4f46e5)" fill-opacity="0.15" class="viz-pulse"/>
  <text x="360" y="228" text-anchor="middle" class="hero-lbl" style="font-size:14px">Cross-Encoder Reranker</text>
  <text x="360" y="248" text-anchor="middle" class="hero-sub">scores all 100 [query; passage] pairs</text>
  <text x="360" y="266" text-anchor="middle" class="hero-sub">returns top-5</text>
  <text x="360" y="282" text-anchor="middle" class="hero-sub" style="font-style:italic; font-size:10px">every query token attends to every document token</text>

  
  <g opacity="0.9">
    <circle cx="556" cy="228" r="4" fill="#fff"/>
    <circle cx="569" cy="228" r="4" fill="#fff"/>
    <circle cx="556" cy="242" r="4" fill="#fff"/>
    <circle cx="569" cy="242" r="4" fill="#fff"/>

  </g>
  
  <rect x="574" y="237" width="20" height="18" rx="3" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
  <text x="584" y="250" text-anchor="middle" class="badge-lbl" style="font-size:10px">5</text>
</g>


<g data-anim="3">
  <rect x="590" y="228" width="70" height="30" rx="14" fill="var(--warn,#e0a106)" fill-opacity="0.15" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
  <text x="625" y="241" text-anchor="middle" class="pill-lbl" style="fill:var(--warn,#e0a106); font-size:10px">slower</text>
  <text x="625" y="254" text-anchor="middle" class="pill-lbl" style="fill:var(--warn,#e0a106); font-size:10px">~200 ms</text>
</g>


<g data-anim="4">
  <line x1="360" y1="291" x2="360" y2="316" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#trp-arr)"/>
  <text x="406" y="307" class="lbl-xs" style="font-size:10px">top-5 only</text>
</g>


<g data-anim="4">
  <rect x="188" y="321" width="344" height="64" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="360" y="346" text-anchor="middle" class="lbl" style="font-size:14px">LLM Context Window</text>
  <text x="360" y="365" text-anchor="middle" class="lbl-sm">top-5 chunks</text>
  
  <g fill="var(--good,#2f9e6e)" opacity="0.8">
    <circle cx="508" cy="342" r="4.5"/>
    <circle cx="520" cy="342" r="4.5"/>
    <circle cx="508" cy="356" r="4.5"/>
    <circle cx="520" cy="356" r="4.5"/>
    <circle cx="514" cy="368" r="4.5"/>
  </g>
  
  <rect x="526" y="346" width="20" height="18" rx="3" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1"/>
  <text x="536" y="359" text-anchor="middle" class="count-lbl" style="fill:var(--good,#2f9e6e); font-size:10px">5</text>
</g>


<g data-anim="4">
  
  <line x1="88" y1="402" x2="632" y2="402" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="3 3"/>

  
  <rect x="88" y="415" width="14" height="14" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.2" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <text x="108" y="426" class="lbl-xs" style="font-size:11px; fill:var(--ink-soft,#333)">Stage 1: fast, broad recall (100 candidates)</text>

  <rect x="88" y="435" width="14" height="14" rx="2" fill="var(--accent,#4f46e5)" fill-opacity="0.2" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>
  <text x="108" y="446" class="lbl-xs" style="font-size:11px; fill:var(--ink-soft,#333)">Stage 2: slow, precise scoring (top-5)</text>

  <text x="360" y="475" text-anchor="middle" class="lbl-xs" style="font-size:11px">
    Cost/precision trade-off: cheap bi-encoder recall then expensive cross-encoder precision
  </text>
  <text x="360" y="493" text-anchor="middle" class="lbl-xs" style="font-size:11px">
    eliminates the need for cross-encoding against the entire corpus
  </text>
</g>


</svg>
<figcaption><b>Two-stage retrieve-then-rerank narrows 100 candidates to 5 with a cost-conscious funnel.</b> The fast first stage (bi-encoder hybrid BM25 + dense, ~10 ms) casts a wide net for recall; the expensive second stage (cross-encoder, ~200 ms) runs only on the shortlist to achieve high precision. Only the 5 winning chunks reach the LLM context window, keeping prompt costs low while the cross-encoder's joint query–passage attention ensures relevance quality.</figcaption>
</figure>
