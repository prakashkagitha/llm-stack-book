<figure class="viz" id="fig-flat-vs-sharp-minima-generalization">
<svg viewBox="0 0 760 520" role="img" aria-label="A loss versus theta plot with two basins of equal training loss: a wide, gently-walled flat minimum on the left and a narrow, steep spike sharp minimum on the right. A dashed curve shows the same landscape shifted slightly by a small weight perturbation, representing a distribution shift between train and test. Above the flat minimum the dashed curve stays nearly as low as the solid curve, so a small perturbation causes only a small loss increase and the model generalizes well. Above the sharp minimum the dashed curve shoots up steeply, so the same small perturbation causes a large loss increase and the model generalizes poorly. A small cloud of jittering dots near the flat minimum represents SGD gradient noise, which cannot settle inside a narrow spike and is biased toward wide flat basins.">
<defs>
  <marker id="fvsm-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--v-stroke,#45413a)"/>
  </marker>
</defs>

<g data-anim="1">
  <line x1="70" y1="395" x2="70" y2="40" stroke="var(--v-stroke,#45413a)" stroke-width="1.4" marker-end="url(#fvsm-arrow)"/>
  <line x1="70" y1="395" x2="700" y2="395" stroke="var(--v-stroke,#45413a)" stroke-width="1.4" marker-end="url(#fvsm-arrow)"/>
  <text x="24" y="52" style="font:600 11.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">Loss</text>
  <text x="385" y="415" text-anchor="middle" style="font:600 11.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">theta (parameter)</text>

  <line x1="95" y1="296" x2="650" y2="296" stroke="var(--v-grid,#d8d1c0)" stroke-width="1" stroke-dasharray="3,4" opacity="0.7"/>
  <text x="645" y="276" text-anchor="end" style="font:500 10.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">equal train loss level</text>

  <line x1="95" y1="52" x2="125" y2="52" stroke="var(--v-stroke,#45413a)" stroke-width="2.2"/>
  <text x="133" y="56" style="font:600 11px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">train loss</text>
  <line x1="95" y1="72" x2="125" y2="72" stroke="var(--accent,#c15b39)" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="133" y="76" style="font:600 11px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">test loss (small weight perturbation Delta theta)</text>
</g>

<path data-anim="2" class="viz-draw" style="--len:1700" d="M95,150 C125,250 145,290 165,296 L275,296 C300,290 325,258 350,205 C368,165 388,128 405,100 C420,120 450,140 475,148 C488,150 495,150 500,150 L520,300 L540,150 C545,150 552,150 565,148 C590,140 618,120 635,100 C650,120 668,144 682,160 C690,172 696,190 700,215" fill="none" stroke="var(--v-stroke,#45413a)" stroke-width="2.4"/>

<path data-anim="3" transform="translate(18,0)" d="M95,150 C125,250 145,290 165,296 L275,296 C300,290 325,258 350,205 C368,165 388,128 405,100 C420,120 450,140 475,148 C488,150 495,150 500,150 L520,300 L540,150 C545,150 552,150 565,148 C590,140 618,120 635,100 C650,120 668,144 682,160 C690,172 696,190 700,215" fill="none" stroke="var(--accent,#c15b39)" stroke-width="2" stroke-dasharray="5,4" opacity="0.9"/>

<g data-anim="4">
  <line x1="520" y1="291" x2="520" y2="168" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <line x1="513" y1="291" x2="527" y2="291" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <line x1="513" y1="168" x2="527" y2="168" stroke="var(--muted,#6d675d)" stroke-width="1.2"/>
  <text x="533" y="233" style="font:600 10.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">Delta loss</text>

  <circle cx="220" cy="296" r="5.5" class="viz-pulse" fill="var(--accent,#c15b39)" stroke="var(--surface,#faf8f3)" stroke-width="1.5"/>
  <circle cx="520" cy="300" r="5.5" class="viz-pulse" fill="var(--accent,#c15b39)" stroke="var(--surface,#faf8f3)" stroke-width="1.5"/>

  <g opacity="0.6">
    <circle cx="196" cy="291" r="2.1" fill="var(--muted,#6d675d)"/>
    <circle cx="207" cy="285" r="2.1" fill="var(--muted,#6d675d)"/>
    <circle cx="233" cy="288" r="2.1" fill="var(--muted,#6d675d)"/>
    <circle cx="246" cy="292" r="2.1" fill="var(--muted,#6d675d)"/>
    <circle cx="218" cy="280" r="2.1" fill="var(--muted,#6d675d)"/>
  </g>
</g>

<g data-anim="5">
  <line x1="220" y1="306" x2="220" y2="424" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="220" y="440" text-anchor="middle" style="font:600 12px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">flat: small Delta theta -&gt;</text>
  <text x="220" y="457" text-anchor="middle" style="font:600 12px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">small Delta loss -&gt; generalizes</text>

  <text x="220" y="480" text-anchor="middle" style="font:500 11px var(--sans,sans-serif); fill:var(--muted,#6d675d)">SGD gradient noise: can't sit in a narrow</text>
  <text x="220" y="495" text-anchor="middle" style="font:500 11px var(--sans,sans-serif); fill:var(--muted,#6d675d)">spike -&gt; biased toward flat basins</text>

  <line x1="520" y1="306" x2="520" y2="424" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="520" y="440" text-anchor="middle" style="font:600 12px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">sharp: same Delta theta -&gt;</text>
  <text x="520" y="457" text-anchor="middle" style="font:600 12px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">large Delta loss -&gt; generalizes worse</text>
</g>

</svg>
<figcaption><b>Flat minima generalize better than sharp minima because they are robust to small weight perturbations.</b> Both basins reach the same low training loss, but under a small shift (dashed test-loss curve, standing in for a distribution shift or perturbation Delta theta), the wide flat basin barely rises while the narrow sharp spike jumps to a much higher loss; SGD's gradient noise also cannot settle inside a narrow spike, biasing it toward the flatter basin.</figcaption>
</figure>
