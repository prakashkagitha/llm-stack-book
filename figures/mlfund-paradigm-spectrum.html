<figure class="viz" id="fig-mlfund-paradigm-spectrum">
<svg viewBox="0 0 860 320" role="img" aria-label="Learning paradigms arranged left-to-right on a supervision signal spectrum from full human labels (Supervised) through Semi-supervised, Self-supervised, Unsupervised, to reward-only Reinforcement learning. Self-supervised is highlighted as the foundation of LLM pretraining.">
<defs>
  <linearGradient id="ps-spectrum-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="var(--accent,#6366f1)" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="var(--surface-3,#e2e8f0)" stop-opacity="0.7"/>
  </linearGradient>
  <marker id="ps-tick-arrow" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="4" markerHeight="4" orient="auto">
    <circle cx="3" cy="3" r="2" fill="var(--border-2,#94a3b8)"/>
  </marker>
</defs>
<style>
  #fig-mlfund-paradigm-spectrum text { fill: currentColor; }
  #fig-mlfund-paradigm-spectrum .spec-end  { font: 600 11px var(--sans,sans-serif); }
  #fig-mlfund-paradigm-spectrum .spec-cap  { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-mlfund-paradigm-spectrum .card-name { font: 700 13px var(--sans,sans-serif); }
  #fig-mlfund-paradigm-spectrum .card-sig  { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-mlfund-paradigm-spectrum .card-note { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#64748b); font-style: italic; }
  #fig-mlfund-paradigm-spectrum .intersect { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#64748b); font-style: italic; }
</style>

<text x="105" y="168" text-anchor="middle" class="card-name">Supervised</text>

<text x="105" y="210" text-anchor="middle" class="card-sig">labels (y_i)</text>

<text x="755" y="224" text-anchor="middle" class="card-sig">interaction</text>

</svg>
<figcaption><b>Five learning paradigms ordered by how much human-provided label signal is available.</b> Supervised learning sits at the high-label end with explicit (x, y) pairs; reinforcement learning and unsupervised learning operate with no fixed labels at all. Self-supervised learning — the highlighted centerpiece — occupies the middle ground by deriving its own labels automatically from raw inputs, making it the paradigm that powers LLM pretraining.</figcaption>
</figure>
