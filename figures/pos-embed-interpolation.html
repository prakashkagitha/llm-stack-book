<figure class="viz" id="fig-pos-embed-interpolation">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 800 350" role="img" aria-label="Pipeline showing bicubic interpolation of ViT positional embeddings: the CLS position is set aside, the 196 patch positions are reshaped into a 14 by 14 grid, bicubically interpolated to a denser 24 by 24 grid for higher resolution, then flattened and re-prepended with CLS to form a new 576-position table.">
<style>
  #fig-pos-embed-interpolation text { fill: var(--ink-soft,#374151); }
  #fig-pos-embed-interpolation .lbl { font: 600 11px var(--sans,sans-serif); }
  #fig-pos-embed-interpolation .sub { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-pos-embed-interpolation .arr-lbl { font: 600 10px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-pos-embed-interpolation .cap { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-pos-embed-interpolation .cap-b { font: 700 11px var(--sans,sans-serif); fill: var(--ink-soft,#374151); }

  #fig-pos-embed-interpolation .pe-bar { fill: var(--accent,#c15b39); fill-opacity: 0.55; stroke: var(--accent,#c15b39); stroke-width: 0.8; }
  #fig-pos-embed-interpolation .pe-dot { fill: var(--muted,#6b7280); }
  #fig-pos-embed-interpolation .pe-cell { fill: var(--accent,#c15b39); fill-opacity: 0.4; stroke: var(--surface,#fff); stroke-width: 0.6; }
  #fig-pos-embed-interpolation .cls-box { fill: var(--accent2,#3b82f6); fill-opacity: 0.7; stroke: var(--accent2,#3b82f6); stroke-width: 1.3; }
  #fig-pos-embed-interpolation .cls-label { font: 700 9px var(--mono,monospace); fill: var(--surface,#fff); }
  #fig-pos-embed-interpolation .divider { stroke: var(--border-2,#d8d1c0); stroke-width: 1; stroke-dasharray: 3 3; }
  #fig-pos-embed-interpolation .flow-line { fill: none; stroke: var(--ink-soft,#374151); stroke-width: 1.4; }
  #fig-pos-embed-interpolation .flow-line-bold { fill: none; stroke: var(--accent,#c15b39); stroke-width: 2.4; }
  #fig-pos-embed-interpolation .sample-line { fill: none; stroke: var(--muted,#6b7280); stroke-width: 0.8; stroke-dasharray: 2 2; opacity: 0.7; }
  #fig-pos-embed-interpolation .frame { fill: none; stroke: var(--border-2,#d8d1c0); stroke-width: 1; }

  @keyframes pei-fade { from{opacity:0} to{opacity:1} }
  #fig-pos-embed-interpolation [data-anim] { opacity: 0; animation: pei-fade .5s ease forwards; }
  #fig-pos-embed-interpolation [data-anim="1"] { animation-delay: .05s; }
  #fig-pos-embed-interpolation [data-anim="2"] { animation-delay: .4s; }
  #fig-pos-embed-interpolation [data-anim="3"] { animation-delay: .8s; }
  #fig-pos-embed-interpolation [data-anim="4"] { animation-delay: 1.3s; }
  #fig-pos-embed-interpolation [data-anim="5"] { animation-delay: 1.7s; }

  @media (prefers-reduced-motion: reduce) {
    #fig-pos-embed-interpolation [data-anim] { opacity: 1 !important; animation: none !important; }
  }
</style>

<figcaption><b>Resizing a ViT to a new resolution only touches the positional table, not the patch embedding.</b> The CLS position is set aside, the learned 1D table of patch positions is reshaped into its native 14x14 grid, bicubically interpolated to the denser grid the new resolution requires (e.g. 24x24 for 384px input), then flattened and re-prepended with CLS. The convolutional patch-embedding weights need no change at all, since they process fixed-size 16x16 pixel patches regardless of how many of them tile the image.</figcaption>
</figure>
