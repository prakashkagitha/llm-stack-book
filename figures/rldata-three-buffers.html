</svg>
<figcaption><b>Three distinct objects with three distinct correctness constraints -- do not conflate them.</b> The prompt buffer is free and on-policy because only task IDs are replayed and completions are always fresh; the staleness buffer stores actual old completions and must be importance-corrected and evicted young, because a stale trajectory's gradient contribution decays to zero under PPO clipping; the success buffer trades gradient-unbiasedness for retention, banking rare wins so the policy does not forget them.</figcaption>
</figure>
