<figure class="viz" id="fig-lora-serving-tiered-storage-hierarchy">
<svg viewBox="-26 0 850 360" role="img" aria-label="Four-tier adapter storage hierarchy from GPU HBM (fastest) to object store (slowest), with async prefetch arrow indicating cold-miss data movement upward through the tiers.">
  <style>
    #fig-lora-serving-tiered-storage-hierarchy text { font-family: var(--sans,sans-serif); fill: var(--ink-soft,#333); }
    #fig-lora-serving-tiered-storage-hierarchy .tier-lbl  { font: 700 13px var(--sans,sans-serif); }
    #fig-lora-serving-tiered-storage-hierarchy .tier-lat  { font: 500 10px var(--mono,monospace); }
    #fig-lora-serving-tiered-storage-hierarchy .tier-role { font: 400 10px var(--sans,sans-serif); fill: var(--ink-soft,#444); }
    #fig-lora-serving-tiered-storage-hierarchy .axis-lbl  { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#888); }
    #fig-lora-serving-tiered-storage-hierarchy .pfetch-lbl { font: 600 9px var(--sans,sans-serif); fill: var(--accent-2,#c6724f); }
    #fig-lora-serving-tiered-storage-hierarchy .cap-txt { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#888); }
  </style>

  <defs>
    <marker id="th-arr-up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 10 L5 0 L10 10 z" fill="var(--accent-2,#c6724f)"/>
    </marker>
    <marker id="th-arr-dn" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L5 10 L10 0 z" fill="var(--muted,#aaa)"/>
    </marker>
    <marker id="th-arr-up2" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 10 L5 0 L10 10 z" fill="var(--muted,#aaa)"/>
    </marker>
  </defs>

  

  
  <line x1="30" y1="272" x2="30" y2="38" stroke="var(--muted,#bbb)" stroke-width="1.4" marker-end="url(#th-arr-up2)"/>
  <line x1="30" y1="42"  x2="30" y2="274" stroke="var(--muted,#bbb)" stroke-width="1.4" marker-end="url(#th-arr-dn)"/>
  <text x="16" y="30"  text-anchor="middle" class="axis-lbl">faster</text>
  <text x="16" y="41"  text-anchor="middle" class="axis-lbl">smaller</text>
  <text x="16" y="286" text-anchor="middle" class="axis-lbl">larger</text>
  <text x="16" y="297" text-anchor="middle" class="axis-lbl">slower</text>

  

  
  <rect x="170" y="18" width="160" height="50" rx="6"
        fill="var(--accent,#4f86c6)" fill-opacity="0.90"
        stroke="var(--accent,#4f86c6)" stroke-width="1.5"/>
  <text x="250" y="41" text-anchor="middle" class="tier-lbl" fill="var(--surface,#fff)">GPU HBM</text>
  <text x="250" y="56" text-anchor="middle" class="tier-lat" fill="var(--surface,#fff)" opacity="0.9">~ns–µs</text>

  
  <rect x="119" y="78" width="262" height="50" rx="6"
        fill="var(--accent,#4f86c6)" fill-opacity="0.62"
        stroke="var(--accent,#4f86c6)" stroke-width="1.3"/>
  <text x="250" y="101" text-anchor="middle" class="tier-lbl" fill="var(--surface,#fff)">CPU DRAM</text>
  <text x="250" y="116" text-anchor="middle" class="tier-lat" fill="var(--surface,#fff)" opacity="0.9">~µs</text>

  
  <rect x="69" y="138" width="362" height="50" rx="6"
        fill="var(--accent,#4f86c6)" fill-opacity="0.28"
        stroke="var(--border-2,#8fa8c0)" stroke-width="1.3"/>
  <text x="250" y="161" text-anchor="middle" class="tier-lbl">Local SSD</text>
  <text x="250" y="176" text-anchor="middle" class="tier-lat">~ms</text>

  
  <rect x="50" y="198" width="400" height="56" rx="6"
        fill="var(--surface-3,#cdd8e4)" fill-opacity="0.85"
        stroke="var(--border-2,#b0bfcc)" stroke-width="1.3"/>
  <text x="250" y="224" text-anchor="middle" class="tier-lbl">Object store (S3 / GCS)</text>
  <text x="250" y="240" text-anchor="middle" class="tier-lat">~10–100 ms  (cold start)</text>

  
  
  
  
  
  
  <line x1="460" y1="246" x2="460" y2="30"
        stroke="var(--accent-2,#c6724f)" stroke-width="2.5"
        stroke-dasharray="6 3"
        marker-end="url(#th-arr-up)"/>

  
  <text x="460" y="262" text-anchor="middle" class="pfetch-lbl">async prefetch (cold miss)</text>
  <text x="460" y="275" text-anchor="middle" class="pfetch-lbl">HBM &lt;- CPU &lt;- SSD &lt;- S3</text>

  
  
  
  
  <line x1="330" y1="43"  x2="540" y2="43"  stroke="var(--muted,#ccc)" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="381" y1="103" x2="540" y2="103" stroke="var(--muted,#ccc)" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="431" y1="163" x2="540" y2="163" stroke="var(--muted,#ccc)" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="450" y1="226" x2="540" y2="226" stroke="var(--muted,#ccc)" stroke-width="0.7" stroke-dasharray="3 3"/>

  <text x="544" y="37"  class="tier-role">active adapters with</text>
  <text x="544" y="50"  class="tier-role">in-flight requests</text>

  <text x="544" y="97"  class="tier-role">warm pool; prefetch</text>
  <text x="544" y="110" class="tier-role">source for GPU misses</text>

  <text x="544" y="157" class="tier-role">larger cache of</text>
  <text x="544" y="170" class="tier-role">the tenant fleet</text>

  <text x="544" y="220" class="tier-role">source of truth:</text>
  <text x="544" y="233" class="tier-role">every adapter ever trained</text>

  
  <text x="300" y="308" text-anchor="middle" class="cap-txt">bar width = capacity; narrowest = fastest; only active adapters must be GPU-resident</text>
</svg>
<figcaption><b>Adapter storage is organized in four tiers from fastest-but-smallest GPU HBM (top) to largest-but-coldest object store (bottom).</b> Only adapters with active in-flight requests must sit in GPU HBM; a CPU DRAM warm pool catches most GPU misses below the millisecond threshold. The orange dashed arrow shows the asynchronous prefetch path triggered on a cold miss — weights migrate upward through the hierarchy (S3 to SSD to CPU to GPU) while the request waits, keeping the cold-start penalty off the critical compute path.</figcaption>
</figure>
