<figcaption><b>Dense FFN (one all-reduce) vs. MoE FFN (two all-to-all collectives).</b> In tensor-parallel dense serving a single fixed-size all-reduce sums partial results — one barrier, predictable cost, easily overlapped. In expert-parallel MoE the token is routed to its chosen experts via DISPATCH (all-to-all #1), experts compute locally via grouped GEMM, and results return home via COMBINE (all-to-all #2). The orange collective boxes make the asymmetry concrete: MoE pays two barriers with irregular, data-dependent message sizes whose cost is set by the slowest, most-loaded GPU in the group.</figcaption>
