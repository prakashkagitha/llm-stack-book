<line x1="550" y1="230" x2="550" y2="398" stroke="var(--muted,#888)" stroke-width="1.2"/>
<line x1="550" y1="398" x2="544" y2="398" stroke="var(--muted,#888)" stroke-width="1.2"/>

</svg>
<figcaption><b>Plan-Execute (planner-executor) architecture separates task decomposition from execution.</b> The Planner LLM converts a high-level task into an ordered list of subtasks; the Executor runs each subtask through its own inner ReAct loop, collecting an observation per step; finally, all observations are aggregated into a final answer. Separating planning from execution lets the planner see the full task before committing to any action.</figcaption>
</figure>
