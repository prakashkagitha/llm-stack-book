<figure class="viz" id="fig-svd-geometry-and-lowrank">
<svg viewBox="0 0 820 360" role="img" aria-label="Left: SVD as rotate then scale then rotate, shown as a unit circle whose axes are rotated by V transpose, stretched into an ellipse by Sigma, then rotated again by U. Right: an illustrative singular value spectrum with a handful of large values followed by a sharp cliff to a noise floor, and the Eckart-Young truncated sum that keeps only the top-r terms.">
<defs>
  <marker id="svdg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="currentColor"/>
  </marker>
  <marker id="svdg-arrow-sm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="currentColor"/>
  </marker>
</defs>
<style>
  #fig-svd-geometry-and-lowrank text { fill: var(--ink-soft); }
  #fig-svd-geometry-and-lowrank .ptitle  { font: 700 13px var(--sans,sans-serif); }
  #fig-svd-geometry-and-lowrank .cap     { font: 500 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-svd-geometry-and-lowrank .steplbl { font: 600 10px var(--sans,sans-serif); fill: var(--accent); }
  #fig-svd-geometry-and-lowrank .sig     { font: 600 10px var(--mono,monospace); fill: var(--ink-soft); }
  #fig-svd-geometry-and-lowrank .mono    { font: 500 10px var(--mono,monospace); fill: var(--muted); }
  #fig-svd-geometry-and-lowrank .bridge  { font: 700 11px var(--sans,sans-serif); fill: var(--accent); }
  #fig-svd-geometry-and-lowrank .axislbl { font: 500 9.5px var(--mono,monospace); fill: var(--muted); }
</style>

<line x1="400" y1="30" x2="400" y2="346" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>


<g>
  <text x="200" y="48" text-anchor="middle" class="ptitle">SVD is rotate -&gt; scale -&gt; rotate</text>

  
  <circle cx="60" cy="195" r="26" fill="none" class="v-stroke" stroke-width="1.3"/>
  <line x1="60" y1="195" x2="86" y2="195" stroke="currentColor" class="v-muted" stroke-width="1.3" marker-end="url(#svdg-arrow-sm)"/>
  <line x1="60" y1="195" x2="60" y2="169" stroke="currentColor" class="v-muted" stroke-width="1.3" marker-end="url(#svdg-arrow-sm)"/>
  <text x="60" y="235" text-anchor="middle" class="cap">unit circle</text>

  <line x1="90" y1="195" x2="126" y2="195" stroke="currentColor" class="v-muted" stroke-width="1.3" marker-end="url(#svdg-arrow)"/>
  <text x="108" y="160" text-anchor="middle" class="steplbl">V^T rotate</text>

  
  <circle cx="158" cy="195" r="26" fill="none" class="v-stroke" stroke-width="1.3"/>
  <line x1="158" y1="195" x2="180.5" y2="182" stroke="currentColor" class="v-accent-s" stroke-width="1.3" marker-end="url(#svdg-arrow-sm)"/>
  <line x1="158" y1="195" x2="171" y2="217.5" stroke="currentColor" class="v-accent-s" stroke-width="1.3" marker-end="url(#svdg-arrow-sm)"/>

  <line x1="190" y1="195" x2="226" y2="195" stroke="currentColor" class="v-muted" stroke-width="1.3" marker-end="url(#svdg-arrow)"/>
  <text x="208" y="160" text-anchor="middle" class="steplbl">Sigma scale</text>

  
  <ellipse cx="258" cy="195" rx="34" ry="15" fill="none" class="v-accent-s" stroke-width="1.6"/>
  <line x1="224" y1="195" x2="292" y2="195" class="v-muted" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="258" y1="180" x2="258" y2="210" class="v-muted" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="222" y="222" text-anchor="middle" class="sig">sigma_1</text>
  <text x="296" y="222" text-anchor="middle" class="sig">sigma_2</text>

  <line x1="298" y1="195" x2="326" y2="195" stroke="currentColor" class="v-muted" stroke-width="1.3" marker-end="url(#svdg-arrow)"/>
  <text x="312" y="160" text-anchor="middle" class="steplbl">U rotate</text>

  
  <ellipse cx="355" cy="195" rx="34" ry="15" fill="none" class="v-accent-s" stroke-width="1.6" transform="rotate(35 355 195)"/>
  <text x="355" y="238" text-anchor="middle" class="cap">final shape</text>

  <text x="200" y="270" text-anchor="middle" class="cap">U, V only rotate -- all stretching is in Sigma.</text>
</g>


<g>
  <text x="610" y="48" text-anchor="middle" class="ptitle">Best rank-r approximation (Eckart-Young)</text>

  
  <rect x="420" y="90" width="176" height="105" fill="var(--good,#2f9e6e)" fill-opacity="0.08"/>
  <rect x="596" y="90" width="184" height="105" fill="var(--warn,#e0a106)" fill-opacity="0.08"/>
  <line x1="420" y1="195" x2="780" y2="195" class="v-grid" stroke-width="1"/>

  <rect x="430" y="100" width="18" height="95" class="v-fill v-accent-s" stroke-width="1"/>
  <rect x="465" y="115" width="18" height="80" class="v-fill v-accent-s" stroke-width="1"/>
  <rect x="500" y="127" width="18" height="68" class="v-fill v-accent-s" stroke-width="1"/>
  <rect x="535" y="137" width="18" height="58" class="v-fill v-accent-s" stroke-width="1"/>
  <rect x="570" y="145" width="18" height="50" class="v-fill v-accent-s" stroke-width="1"/>
  <rect x="605" y="181" width="18" height="14" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="640" y="183" width="18" height="12" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="675" y="184" width="18" height="11" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="710" y="185" width="18" height="10" class="v-fill v-stroke" stroke-width="1"/>
  <rect x="745" y="186" width="18" height="9" class="v-fill v-stroke" stroke-width="1"/>

  <line x1="596" y1="84" x2="596" y2="200" class="v-muted" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="596" y="78" text-anchor="middle" class="cap">keep top-r</text>

  <text x="509" y="207" text-anchor="middle" class="cap" fill="var(--good,#2f9e6e)">signal</text>
  <text x="684" y="207" text-anchor="middle" class="cap" fill="var(--warn,#e0a106)">noise</text>
  <text x="778" y="100" text-anchor="end" class="axislbl">sigma_i</text>

  <text x="610" y="228" text-anchor="middle" class="mono">A_r = sigma_1 u_1 v_1^T + sigma_2 u_2 v_2^T + ...</text>

  
  <text x="490" y="266" class="mono">A_r =</text>
  <rect x="538" y="249" width="26" height="26" rx="2" fill="var(--accent)" fill-opacity="0.32" class="v-stroke" stroke-width="1"/>
  <text x="570" y="266" class="mono">+</text>
  <rect x="582" y="252" width="20" height="20" rx="2" fill="var(--accent)" fill-opacity="0.28" class="v-stroke" stroke-width="1"/>
  <text x="606" y="266" class="mono">+</text>
  <rect x="618" y="255" width="16" height="16" rx="2" fill="var(--accent)" fill-opacity="0.24" class="v-stroke" stroke-width="1"/>
  <text x="640" y="266" class="mono">+ ...</text>

  <line x1="668" y1="244" x2="668" y2="280" class="v-muted" stroke-width="1" stroke-dasharray="2 3"/>

  <rect x="678" y="258" width="14" height="14" rx="2" fill="none" stroke="var(--muted)" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <text x="700" y="266" class="mono" opacity="0.5">+</text>
  <rect x="708" y="260" width="12" height="12" rx="2" fill="none" stroke="var(--muted)" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
  <text x="730" y="266" class="mono" opacity="0.5">...</text>

  <text x="610" y="301" text-anchor="middle" class="mono">error = sqrt( sum_{i&gt;r} sigma_i^2 )</text>
  <text x="610" y="320" text-anchor="middle" class="bridge">fast-decaying spectrum -&gt; LoRA works</text>
</g>

</svg>
<figcaption><b>SVD is rotate, then scale, then rotate &#8212; and truncating the scale factors gives the best possible low-rank approximation.</b> Geometrically, <code>V^T</code> and <code>U</code> only rotate (they preserve lengths and angles), while <code>Sigma</code> does all the stretching along orthogonal directions <code>sigma_1 &#8805; sigma_2 &#8805; ...</code>. When the singular-value spectrum decays fast &#8212; a few large values followed by a cliff to a noise floor &#8212; keeping only the top-<code>r</code> rank-1 terms captures nearly all of the matrix, which is exactly the assumption LoRA exploits.</figcaption>
</figure>
