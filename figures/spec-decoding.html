<figure class="viz" id="fig-spec-decoding">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 372" role="img" aria-label="Speculative decoding: a small draft model proposes four tokens autoregressively; the large target model verifies all four in one parallel forward pass; the first three are accepted, the fourth is rejected and corrected, and everything after the rejection is discarded.">
  <defs>
    <marker id="sd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-spec-decoding text{ fill:var(--ink-soft); }
    #fig-spec-decoding .head{ font:700 13px var(--sans,sans-serif); }
    #fig-spec-decoding .sub{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-spec-decoding .tok{ font:700 14px var(--mono,monospace); }
    #fig-spec-decoding .cost{ font:600 11px var(--mono,monospace); fill:var(--muted); }
    #fig-spec-decoding .mark{ font:700 14px var(--sans,sans-serif); }
    #fig-spec-decoding .note{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-spec-decoding .big{ font:700 12px var(--sans,sans-serif); }
  </style>

  
  

  
  <g data-anim="1">
    <text x="20" y="32" class="head">1 · Draft</text>
    <text x="120" y="32" class="sub">small model q, γ=4 cheap autoregressive steps</text>

    
    <rect x="20" y="44" width="142" height="40" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="91" y="70" text-anchor="middle" class="tok">prefix x≤t</text>

    
    <g class="v-fill v-accent-s" stroke-width="1.5">
      <rect x="180" y="44" width="96" height="40" rx="6"/>
      <rect x="296" y="44" width="96" height="40" rx="6"/>
      <rect x="412" y="44" width="96" height="40" rx="6"/>
      <rect x="528" y="44" width="96" height="40" rx="6"/>
    </g>
    <text x="228" y="70" text-anchor="middle" class="tok v-accent" fill="var(--accent)">d₁</text>
    <text x="344" y="70" text-anchor="middle" class="tok v-accent" fill="var(--accent)">d₂</text>
    <text x="460" y="70" text-anchor="middle" class="tok v-accent" fill="var(--accent)">d₃</text>
    <text x="576" y="70" text-anchor="middle" class="tok v-accent" fill="var(--accent)">d₄</text>

    
    <g class="v-accent" fill="currentColor" stroke="var(--accent)" stroke-width="1.4" marker-end="url(#sd-arrow)" opacity="0.85">
      <line x1="162" y1="64" x2="178" y2="64"/>
      <line x1="278" y1="64" x2="294" y2="64"/>
      <line x1="394" y1="64" x2="410" y2="64"/>
      <line x1="510" y1="64" x2="526" y2="64"/>
    </g>
    <text x="654" y="58" class="cost">cost ≈ γ · c</text>
    <text x="654" y="73" class="cost">(tiny)</text>
  </g>

  
  <g data-anim="2">
    <text x="20" y="138" class="head">2 · Verify</text>
    <text x="120" y="138" class="sub">target model p scores all γ+1 positions in ONE parallel pass</text>

    
    <rect x="180" y="150" width="560" height="46" rx="8" class="v-fill viz-sweep" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
    <text x="460" y="178" text-anchor="middle" class="big" fill="var(--accent2,#3b82f6)">target forward pass  →  p(·|x≤t), … , p(·|x≤t,d₁..d₄)</text>

    
    <g class="v-grid" stroke-width="1" opacity="0.8">
      <line x1="228" y1="196" x2="228" y2="208"/>
      <line x1="344" y1="196" x2="344" y2="208"/>
      <line x1="460" y1="196" x2="460" y2="208"/>
      <line x1="576" y1="196" x2="576" y2="208"/>
      <line x1="692" y1="196" x2="692" y2="208"/>
    </g>
    <text x="692" y="142" text-anchor="middle" class="sub">bonus slot</text>
    <text x="654" y="232" class="cost">cost = 1 pass</text>

    
    <g class="v-accent-s" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3" opacity="0.5">
      <line x1="228" y1="84" x2="228" y2="150"/>
      <line x1="344" y1="84" x2="344" y2="150"/>
      <line x1="460" y1="84" x2="460" y2="150"/>
      <line x1="576" y1="84" x2="576" y2="150"/>
    </g>
  </g>

  
  <g data-anim="3">
    <text x="20" y="266" class="head">3 · Accept / reject</text>
    <text x="190" y="266" class="sub">walk left→right; stop at first rejection</text>

    
    <rect x="180" y="278" width="96" height="40" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
    <text x="222" y="304" text-anchor="middle" class="tok" fill="var(--good,#2f9e6e)">d₁</text>
    <text x="261" y="296" text-anchor="middle" class="mark" fill="var(--good,#2f9e6e)">✓</text>
    
    <rect x="296" y="278" width="96" height="40" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
    <text x="338" y="304" text-anchor="middle" class="tok" fill="var(--good,#2f9e6e)">d₂</text>
    <text x="377" y="296" text-anchor="middle" class="mark" fill="var(--good,#2f9e6e)">✓</text>
    
    <rect x="412" y="278" width="96" height="40" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
    <text x="454" y="304" text-anchor="middle" class="tok" fill="var(--good,#2f9e6e)">d₃</text>
    <text x="493" y="296" text-anchor="middle" class="mark" fill="var(--good,#2f9e6e)">✓</text>
  </g>

  <g data-anim="4">
    
    <rect x="528" y="278" width="96" height="40" rx="6" class="v-fill viz-pulse" stroke="var(--warn,#e0a106)" stroke-width="1.8" stroke-dasharray="5 3"/>
    <text x="576" y="304" text-anchor="middle" class="tok" fill="var(--warn,#e0a106)">d₄</text>
    <text x="615" y="296" text-anchor="middle" class="mark" fill="var(--warn,#e0a106)">✗</text>
    
    <line x1="576" y1="322" x2="576" y2="338" class="v-stroke" stroke="currentColor" stroke-width="1.2" marker-end="url(#sd-arrow)" opacity="0.7"/>
  </g>

  
  <g data-anim="5">
    <text x="20" y="356" class="head">Emit</text>
    
    <rect x="180" y="342" width="328" height="26" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="344" y="360" text-anchor="middle" class="big" fill="var(--good,#2f9e6e)">d₁ d₂ d₃  (accepted prefix)</text>
    
    <rect x="528" y="342" width="96" height="26" rx="6" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
    <text x="576" y="360" text-anchor="middle" class="big" fill="var(--accent2,#3b82f6)">x̂ (corrected)</text>
    
    <text x="654" y="360" class="note">d₄.. discarded</text>
    <text x="544" y="332" text-anchor="middle" class="note">resample (p−q)₊</text>
  </g>
</svg>
<figcaption><b>Propose cheaply, verify in one pass, keep the accepted prefix.</b> The small drafter proposes γ=4 tokens autoregressively, then the target verifies all of them — plus a free bonus slot — in a single parallel forward pass. Walking left to right, the accept/reject rule keeps the longest accepted prefix (d₁ d₂ d₃), corrects the first rejection by resampling from the residual (p−q)₊, and discards every draft token after it. Four positions advanced for the price of one target pass — and the emitted tokens are distributed exactly as the target's own sampler.</figcaption>
</figure>
