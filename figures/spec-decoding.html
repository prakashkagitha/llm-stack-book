<figure class="viz" id="fig-spec-decoding">
<button class="viz-replay" type="button">&#x21bb; replay</button>
<svg viewBox="0 0 780 400" role="img" aria-label="Why speculative decoding can win: decode is memory-bandwidth bound, so a plain decode step and a speculative verify step take about the same wall-clock time, because both must load all the model's weights once. But the plain step yields only 1 token while the verify step can yield up to gamma+1 tokens for the same cost.">
  <defs>
    <marker id="sd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
    <marker id="sd-arrow-fat" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="26" markerHeight="26" markerUnits="userSpaceOnUse" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-spec-decoding text{ fill:var(--ink-soft); }
    #fig-spec-decoding .box-lbl{ font:700 12.5px var(--sans,sans-serif); }
    #fig-spec-decoding .box-sub{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-spec-decoding .arrow-lbl{ font:600 11px var(--sans,sans-serif); }
    #fig-spec-decoding .insight{ font:600 12.5px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-spec-decoding .row-head{ font:700 13px var(--sans,sans-serif); }
    #fig-spec-decoding .row-sub{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-spec-decoding .seg-lbl{ font:600 11px var(--mono,monospace); }
    #fig-spec-decoding .seg-lbl-sm{ font:600 8.5px var(--mono,monospace); }
    #fig-spec-decoding .chip-lbl{ font:700 9.5px var(--mono,monospace); }
    #fig-spec-decoding .yield-big{ font:700 14px var(--sans,sans-serif); }
    #fig-spec-decoding .yield-sub{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-spec-decoding .cap{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-spec-decoding .punch{ font:700 13.5px var(--sans,sans-serif); fill:var(--ink-soft); }
  </style>

  
  <g data-anim="1">
    <rect x="24" y="28" width="140" height="88" rx="10" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="94" y="54" text-anchor="middle" class="box-lbl">HBM</text>
    <text x="94" y="74" text-anchor="middle" class="box-sub">weights</text>
    <text x="94" y="92" text-anchor="middle" class="box-sub">(70B params)</text>

    <rect x="616" y="28" width="140" height="88" rx="10" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="686" y="54" text-anchor="middle" class="box-lbl">compute</text>
    <text x="686" y="74" text-anchor="middle" class="box-sub">units</text>
    <text x="686" y="92" text-anchor="middle" class="box-sub">(ALUs)</text>

    
    <line x1="180" y1="52" x2="596" y2="52" class="v-accent-s" stroke="var(--accent)" stroke-width="22" marker-end="url(#sd-arrow-fat)" opacity="0.85"/>
    <text x="395" y="31" text-anchor="middle" class="arrow-lbl" fill="var(--accent)">move ALL weights (huge)</text>

    
    <line x1="180" y1="96" x2="608" y2="96" class="v-stroke" stroke="currentColor" stroke-width="3" marker-end="url(#sd-arrow)" opacity="0.9"/>
    <text x="395" y="120" text-anchor="middle" class="cap">tiny arithmetic (few FLOPs)</text>
  </g>

  
  <g data-anim="2">
    <text x="390" y="150" text-anchor="middle" class="insight">Decode is memory-bandwidth bound: we pay for weight movement, not per-token math.</text>
  </g>

  
  <g data-anim="3">
    <text x="24" y="182" class="row-head">Plain decode step</text>
    <text x="182" y="182" class="row-sub">(one target forward pass, no drafting)</text>

    <rect x="24" y="192" width="430" height="40" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
    <text x="239" y="217" text-anchor="middle" class="seg-lbl">load ALL weights</text>

    <rect x="454" y="192" width="70" height="40" rx="6" class="v-fill v-accent-s" stroke-width="2"/>
    <text x="489" y="217" text-anchor="middle" class="seg-lbl-sm" fill="var(--accent)">math</text>

    <line x1="528" y1="212" x2="550" y2="212" class="v-stroke" stroke="currentColor" stroke-width="1.6" marker-end="url(#sd-arrow)"/>
    <text x="560" y="217" class="yield-big">1 token</text>
    <text x="560" y="232" class="yield-sub">(baseline)</text>
  </g>

  
  <g data-anim="4">
    <text x="24" y="262" class="row-head">Speculative verify step</text>
    <text x="215" y="262" class="row-sub">(gamma=4 draft tokens, all scored in the SAME one pass)</text>

    <rect x="24" y="272" width="410" height="40" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
    <text x="229" y="297" text-anchor="middle" class="seg-lbl">load ALL weights</text>

    <rect x="434" y="272" width="90" height="40" rx="6" class="v-fill v-accent-s" stroke-width="2"/>
    <text x="479" y="288" text-anchor="middle" class="seg-lbl-sm" fill="var(--accent)">math x</text>
    <text x="479" y="300" text-anchor="middle" class="seg-lbl-sm" fill="var(--accent)">(gamma+1)</text>

    <line x1="528" y1="292" x2="550" y2="292" class="v-stroke" stroke="currentColor" stroke-width="1.6" marker-end="url(#sd-arrow)"/>

    
    <g stroke="var(--good,#2f9e6e)" stroke-width="1.6">
      <rect x="558" y="276" width="24" height="32" rx="5" class="v-fill"/>
      <rect x="587" y="276" width="24" height="32" rx="5" class="v-fill"/>
      <rect x="616" y="276" width="24" height="32" rx="5" class="v-fill"/>
      <rect x="645" y="276" width="24" height="32" rx="5" class="v-fill"/>
      <rect x="674" y="276" width="26" height="32" rx="5" class="v-fill" stroke-dasharray="3 2"/>
    </g>
    <text x="570" y="296" text-anchor="middle" class="chip-lbl" fill="var(--good,#2f9e6e)">d1</text>
    <text x="599" y="296" text-anchor="middle" class="chip-lbl" fill="var(--good,#2f9e6e)">d2</text>
    <text x="628" y="296" text-anchor="middle" class="chip-lbl" fill="var(--good,#2f9e6e)">d3</text>
    <text x="657" y="296" text-anchor="middle" class="chip-lbl" fill="var(--good,#2f9e6e)">d4</text>
    <text x="687" y="296" text-anchor="middle" class="chip-lbl" fill="var(--good,#2f9e6e)">+1</text>

    <text x="629" y="324" text-anchor="middle" class="yield-big" fill="var(--good,#2f9e6e)">up to 5 tokens</text>
    <text x="629" y="339" text-anchor="middle" class="yield-sub">(= gamma+1, same cost)</text>
  </g>

  
  <g data-anim="5">
    <line x1="24" y1="192" x2="24" y2="312" class="v-grid" stroke="currentColor" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.6"/>
    <line x1="524" y1="192" x2="524" y2="312" class="v-grid" stroke="currentColor" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.6"/>
    <text x="524" y="250" text-anchor="end" class="cap">same elapsed time</text>

    <rect x="130" y="356" width="520" height="34" rx="8" class="v-fill v-accent-s" stroke-width="1.4"/>
    <text x="390" y="378" text-anchor="middle" class="punch">Same bar length, wildly different token yield</text>
  </g>
</svg>
<figcaption><b>Speculative decoding wins because decode is memory-bandwidth bound, not compute bound.</b> Every decode step must shuttle all the model's weights from HBM to the compute units (the fat arrow) while doing only a sliver of arithmetic (the thin arrow) — so a plain decode step and a speculative verify step, which scores gamma+1 candidate positions in the same single pass, cost about the same wall-clock time. The plain step yields exactly one token; the verify step can yield up to gamma+1 tokens for that same price, which is the entire source of the speedup.</figcaption>
</figure>
