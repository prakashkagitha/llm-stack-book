<figure class="viz" id="fig-effective-vs-advertised-window">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 800 480" role="img" aria-label="Two qualitative curves: a U-shaped position-accuracy curve that is high at the start and end of the context but sags in the middle, and a downward-sloping length-accuracy curve where the usable effective window is a shrinking fraction of the advertised maximum length.">
  <defs>
    <marker id="ew-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-effective-vs-advertised-window .panel-h{ font:700 14px var(--sans,sans-serif); }
    #fig-effective-vs-advertised-window .ax{ font:600 11px var(--sans,sans-serif); }
    #fig-effective-vs-advertised-window .tick{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-effective-vs-advertised-window .lbl{ font:600 11px var(--sans,sans-serif); }
    #fig-effective-vs-advertised-window .banner{ font:700 12px var(--sans,sans-serif); }
    #fig-effective-vs-advertised-window .cell-cap{ font:600 9px var(--sans,sans-serif); fill:var(--muted); }
    #fig-effective-vs-advertised-window text{ fill: var(--ink-soft); }
    #fig-effective-vs-advertised-window .banner-bg{ fill: var(--surface); stroke: var(--border-2); stroke-width: 1; }
  </style>

  <text x="230" y="22" text-anchor="middle" class="panel-h">A. Position effect (lost in the middle)</text>
  <text x="610" y="22" text-anchor="middle" class="panel-h">B. Length effect (context rot)</text>

  <g data-anim="1">

    <line x1="70" y1="50" x2="70" y2="250" class="v-stroke" stroke-width="1.4" marker-start="url(#ew-arrow)"/>
    <line x1="70" y1="250" x2="410" y2="250" class="v-stroke" stroke-width="1.4" marker-end="url(#ew-arrow)"/>
    <text x="34" y="150" text-anchor="middle" class="ax" transform="rotate(-90 34 150)">retrieval accuracy</text>
    <text x="62" y="58" text-anchor="end" class="tick">high</text>
    <text x="62" y="244" text-anchor="end" class="tick">low</text>

    <text x="80" y="266" text-anchor="middle" class="tick">start</text>
    <text x="240" y="266" text-anchor="middle" class="tick">middle</text>
    <text x="400" y="266" text-anchor="middle" class="tick">end</text>
    <text x="240" y="288" text-anchor="middle" class="ax">position of relevant token in context</text>
  </g>

  <g data-anim="2">

    <path d="M 80 70 C 160 70, 175 215, 240 215 C 305 215, 320 70, 400 70"
          fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"
          class="viz-draw" style="--len:350"/>

    <circle cx="80" cy="70" r="4" fill="var(--accent)"/>
    <circle cx="400" cy="70" r="4" fill="var(--accent)"/>
    <circle cx="240" cy="215" r="4" fill="var(--accent)"/>

    <text x="80" y="44" text-anchor="start" class="lbl" fill="var(--accent)">primacy /</text>
    <text x="80" y="57" text-anchor="start" class="lbl" fill="var(--accent)">attention sink</text>

    <text x="400" y="50" text-anchor="end" class="lbl" fill="var(--accent)">recency</text>

    <text x="240" y="232" text-anchor="middle" class="lbl" fill="var(--muted)">buried -- signal dies here</text>
  </g>

  <g data-anim="3">
    <rect x="40" y="306" width="400" height="44" rx="7" class="banner-bg"/>
    <text x="240" y="323" text-anchor="middle" class="banner">put critical content at the edges,</text>
    <text x="240" y="339" text-anchor="middle" class="banner">never the middle</text>
  </g>

  <g data-anim="4">

    <line x1="450" y1="50" x2="450" y2="250" class="v-stroke" stroke-width="1.4" marker-start="url(#ew-arrow)"/>
    <line x1="450" y1="250" x2="770" y2="250" class="v-stroke" stroke-width="1.4" marker-end="url(#ew-arrow)"/>
    <text x="414" y="150" text-anchor="middle" class="ax" transform="rotate(-90 414 150)">accuracy</text>
    <text x="442" y="58" text-anchor="end" class="tick">high</text>
    <text x="442" y="244" text-anchor="end" class="tick">low</text>

    <text x="465" y="266" text-anchor="middle" class="tick">short</text>
    <text x="762" y="266" text-anchor="end" class="tick">advertised max</text>
    <text x="610" y="288" text-anchor="middle" class="ax">context length</text>


    <rect x="450" y="50" width="150" height="200" fill="var(--good)" opacity="0.09"/>
    <rect x="600" y="50" width="170" height="200" fill="var(--muted)" opacity="0.10"/>
    <line x1="600" y1="50" x2="600" y2="250" stroke="var(--border-2)" stroke-width="1.2" stroke-dasharray="3 3"/>
    <line x1="762" y1="250" x2="762" y2="258" stroke="var(--muted)" stroke-width="1.4"/>
  </g>

  <g data-anim="5">
    <path d="M 460 74 C 520 74, 560 78, 600 84 C 650 100, 700 150, 762 205"
          fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"
          class="viz-draw" style="--len:350"/>

    <text x="520" y="150" text-anchor="middle" class="lbl" fill="var(--good)">effective window</text>
    <text x="520" y="163" text-anchor="middle" class="lbl" fill="var(--good)">(usable)</text>

    <text x="660" y="80" text-anchor="middle" class="lbl" fill="var(--muted)">advertised but</text>
    <text x="660" y="93" text-anchor="middle" class="lbl" fill="var(--muted)">degraded</text>

    <line x1="610" y1="225" x2="762" y2="225" stroke="var(--muted)" stroke-width="1.2" marker-start="url(#ew-arrow)" marker-end="url(#ew-arrow)"/>
    <text x="686" y="218" text-anchor="middle" class="tick" fill="var(--muted)" font-weight="700">you rarely want to be here</text>
  </g>

  <g data-anim="5">
    <rect x="450" y="306" width="320" height="128" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
    <text x="610" y="326" text-anchor="middle" class="lbl" font-weight="700">needle-in-haystack sweep</text>

    <g transform="translate(521,344)">

      <rect x="0"   y="0"  width="34" height="16" class="v-accent" opacity="0.85"/>
      <rect x="36"  y="0"  width="34" height="16" class="v-accent" opacity="0.55"/>
      <rect x="72"  y="0"  width="34" height="16" class="v-accent" opacity="0.25"/>
      <rect x="108" y="0"  width="34" height="16" class="v-accent" opacity="0.55"/>
      <rect x="144" y="0"  width="34" height="16" class="v-accent" opacity="0.85"/>

      <rect x="0"   y="18" width="34" height="16" class="v-accent" opacity="0.65"/>
      <rect x="36"  y="18" width="34" height="16" class="v-accent" opacity="0.30"/>
      <rect x="72"  y="18" width="34" height="16" class="v-muted" opacity="0.30"/>
      <rect x="108" y="18" width="34" height="16" class="v-accent" opacity="0.30"/>
      <rect x="144" y="18" width="34" height="16" class="v-accent" opacity="0.65"/>

      <rect x="0"   y="36" width="34" height="16" class="v-accent" opacity="0.85"/>
      <rect x="36"  y="36" width="34" height="16" class="v-accent" opacity="0.55"/>
      <rect x="72"  y="36" width="34" height="16" class="v-accent" opacity="0.25"/>
      <rect x="108" y="36" width="34" height="16" class="v-accent" opacity="0.55"/>
      <rect x="144" y="36" width="34" height="16" class="v-accent" opacity="0.85"/>

      <text x="-4" y="12" text-anchor="end" class="cell-cap">short</text>
      <text x="-4" y="48" text-anchor="end" class="cell-cap">long</text>
    </g>
    <text x="610" y="412" text-anchor="middle" class="cell-cap">depth: start -&gt; middle -&gt; end</text>
  </g>

  <g data-anim="5">
    <text x="610" y="452" text-anchor="middle" class="tick">measure YOUR effective window (schematic, no numbers implied)</text>
  </g>
</svg>
<figcaption><b>The effective window you can rely on is a fraction of the advertised window, for two reinforcing reasons.</b> Position matters (panel A): accuracy is U-shaped, strong at the edges and weak in the middle, so critical content belongs at the boundaries. Length matters too (panel B): accuracy decays as context grows even when the needle is present, so only a prefix of the advertised maximum is reliably usable -- sweep your own stack (inset) rather than trusting the headline number.</figcaption>
</figure>
