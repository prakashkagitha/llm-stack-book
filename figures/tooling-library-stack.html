<figcaption><b>The modern LLM software stack is a strict vertical dependency chain.</b> Every layer above depends on the layer below: high-level libraries (transformers, datasets, TRL, accelerate) wrap PyTorch, which is the central pivot; performance libraries (flash-attn, bitsandbytes, DeepSpeed, vLLM) plug into PyTorch from below; CUDA Runtime, cuDNN, and NCCL are peer system libraries that interoperate horizontally; and the GPU driver plus hardware form the bedrock. Identifying which layer owns a failure — a kernel crash vs. an NCCL timeout vs. an OOM in the optimizer state — is the first step of any debugging session.</figcaption>
</figure>
