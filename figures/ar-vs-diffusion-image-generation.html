<figcaption><b>Autoregressive decoding fills image tokens strictly one at a time; diffusion refines the whole image together over a handful of steps.</b> On the same clock, the autoregressive track needs one dependent forward pass per token -- 1024 of them for a 1024-token image, each extending a growing KV cache -- while diffusion or flow-matching needs only a few global denoising passes, each touching every patch in parallel. Latency scales with token count for the autoregressive path but with step count for diffusion, which is why diffusion typically finishes in under a second while autoregressive decoding can take tens of seconds; the community has not converged on which tradeoff wins, and masked/hybrid models occupy the middle ground.</figcaption>
</figure>
