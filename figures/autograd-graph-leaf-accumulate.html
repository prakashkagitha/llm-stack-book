<figure class="viz" id="fig-autograd-graph-leaf-accumulate">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 620 720" role="img" aria-label="The grad_fn DAG for e = (a*b + a)**2: backward() starts at e with seed gradient 1.0, walks down through PowBackward0, AddBackward0, and MulBackward0, and because leaf tensor a is used twice, two separate paths converge on its single AccumulateGrad node, where the contributions are summed into a.grad; leaf b receives one contribution. Intermediate tensors c and d are non-leaf: their gradients are computed but discarded.">
<defs>
  <marker id="agl-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
    <path d="M0 0 L9 5 L0 10 z" fill="var(--accent-2,#b04e2d)"/>
  </marker>
  <marker id="agl-arr-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
    <path d="M0 0 L9 5 L0 10 z" fill="var(--muted,#888)"/>
  </marker>
</defs>
<style>
  #fig-autograd-graph-leaf-accumulate text { fill: var(--ink-soft,#333); font: 400 11px var(--sans,sans-serif); }
  #fig-autograd-graph-leaf-accumulate .ttl { font: 700 12.5px var(--sans,sans-serif); }
  #fig-autograd-graph-leaf-accumulate .ttl-lg { font: 700 14px var(--sans,sans-serif); }
  #fig-autograd-graph-leaf-accumulate .sub { font: 400 10px var(--mono,monospace); fill: var(--ink-soft,#333); }
  #fig-autograd-graph-leaf-accumulate .sub-mut { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-autograd-graph-leaf-accumulate .edge-lbl { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#888); }
  #fig-autograd-graph-leaf-accumulate .callout { font: 400 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-autograd-graph-leaf-accumulate .legend-lbl { font: 400 10.5px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-autograd-graph-leaf-accumulate .fn-box { stroke: var(--accent-2,#b04e2d); stroke-width: 1.6; }
  #fig-autograd-graph-leaf-accumulate .ag-box { stroke: var(--muted,#888); stroke-width: 1.3; stroke-dasharray: 4 3; }
  #fig-autograd-graph-leaf-accumulate .leaf-card { fill: var(--accent,#c15b39); }
  #fig-autograd-graph-leaf-accumulate .leaf-txt { fill: #fff; }
  #fig-autograd-graph-leaf-accumulate .e-box { stroke: var(--ink-soft,#333); stroke-width: 1.4; }
  #fig-autograd-graph-leaf-accumulate .edge { fill: none; stroke: var(--accent-2,#b04e2d); stroke-width: 1.6; }
  #fig-autograd-graph-leaf-accumulate .edge-muted { fill: none; stroke: var(--muted,#888); stroke-width: 1.3; }
</style>


<g data-anim="1">
  <rect class="e-box v-fill" x="335" y="20" width="210" height="36" rx="8"/>
  <text x="440" y="35" text-anchor="middle" class="ttl-lg">e</text>
  <text x="440" y="49" text-anchor="middle" class="sub-mut">(seed: e.grad = 1.0, backward() starts here)</text>
</g>


<g data-anim="2">
  <path class="edge" d="M440 56 L440 108" marker-end="url(#agl-arr)"/>
  <text x="450" y="85" class="edge-lbl">.grad_fn</text>

  <rect class="fn-box v-fill" x="350" y="111" width="180" height="44" rx="8"/>
  <text x="440" y="129" text-anchor="middle" class="ttl">PowBackward0</text>
  <text x="440" y="145" text-anchor="middle" class="sub">e = d ** 2</text>
</g>


<g data-anim="3">
  <path class="edge" d="M440 155 L440 202" marker-end="url(#agl-arr)"/>
  <text x="450" y="182" class="edge-lbl">next_functions[0]</text>

  <rect class="fn-box v-fill" x="345" y="205" width="190" height="58" rx="8"/>
  <text x="440" y="223" text-anchor="middle" class="ttl">AddBackward0</text>
  <text x="440" y="239" text-anchor="middle" class="sub">d = c + a</text>
  <text x="440" y="253" text-anchor="middle" class="sub-mut">non-leaf: .grad discarded (grad_fn only)</text>
</g>


<g data-anim="4">
  <path class="edge" d="M395 263 C 370 285, 320 300, 280 316" marker-end="url(#agl-arr)"/>
  <text x="325" y="290" class="edge-lbl">next_functions[0]</text>
  <text x="325" y="301" class="edge-lbl">(c)</text>

  <path class="edge" d="M475 263 C 460 320, 400 380, 358 424" marker-end="url(#agl-arr)"/>
  <text x="460" y="335" class="edge-lbl">next_functions[1]</text>
  <text x="460" y="346" class="edge-lbl">(a)</text>

  <rect class="fn-box v-fill" x="155" y="318" width="190" height="58" rx="8"/>
  <text x="250" y="336" text-anchor="middle" class="ttl">MulBackward0</text>
  <text x="250" y="352" text-anchor="middle" class="sub">c = a * b</text>
  <text x="250" y="366" text-anchor="middle" class="sub-mut">non-leaf: .grad discarded (grad_fn only)</text>
</g>


<g data-anim="5">
  <path class="edge" d="M270 376 C 290 395, 320 408, 336 424" marker-end="url(#agl-arr)"/>
  <text x="240" y="392" class="edge-lbl">next_functions[0]</text>
  <text x="240" y="403" class="edge-lbl">(a)</text>

  <path class="edge" d="M215 376 C 195 392, 165 408, 150 424" marker-end="url(#agl-arr)"/>
  <text x="103" y="392" class="edge-lbl">next_functions[1]</text>
  <text x="103" y="403" class="edge-lbl">(b)</text>

  
  <circle cx="347" cy="401" r="9" class="v-fill" stroke="var(--accent-2,#b04e2d)" stroke-width="1.4"/>
  <text x="347" y="405" text-anchor="middle" class="ttl" font-size="12">+</text>
  <text x="440" y="405" class="sub-mut" text-anchor="start">contributions summed -&gt; a.grad</text>

  <rect class="ag-box v-fill" x="260" y="426" width="170" height="44" rx="8"/>
  <text x="345" y="444" text-anchor="middle" class="ttl">AccumulateGrad</text>
  <text x="345" y="460" text-anchor="middle" class="sub">-&gt; a.grad</text>

  <rect class="ag-box v-fill" x="65" y="426" width="170" height="44" rx="8"/>
  <text x="150" y="444" text-anchor="middle" class="ttl">AccumulateGrad</text>
  <text x="150" y="460" text-anchor="middle" class="sub">-&gt; b.grad</text>
</g>


<g data-anim="6">
  <path class="edge-muted" d="M345 470 L345 492" marker-end="url(#agl-arr-muted)"/>
  <path class="edge-muted" d="M150 470 L150 492" marker-end="url(#agl-arr-muted)"/>

  <rect class="leaf-card" x="270" y="494" width="150" height="56" rx="8"/>
  <text x="345" y="516" text-anchor="middle" class="ttl-lg leaf-txt">a</text>
  <text x="345" y="533" text-anchor="middle" class="sub-mut leaf-txt" fill="#fff" opacity="0.9">leaf: requires_grad -&gt; .grad</text>

  <rect class="leaf-card" x="75" y="494" width="150" height="56" rx="8"/>
  <text x="150" y="516" text-anchor="middle" class="ttl-lg leaf-txt">b</text>
  <text x="150" y="533" text-anchor="middle" class="sub-mut leaf-txt" fill="#fff" opacity="0.9">leaf: requires_grad -&gt; .grad</text>
</g>


<g data-anim="7">
  <line x1="20" y1="576" x2="600" y2="576" stroke="var(--border-2,#ccc)" stroke-width="1"/>

  <rect x="20" y="590" width="20" height="14" rx="3" class="fn-box v-fill"/>
  <text x="48" y="601" class="legend-lbl">grad_fn (backward op)</text>

  <rect x="230" y="590" width="20" height="14" rx="3" class="leaf-card"/>
  <text x="258" y="601" class="legend-lbl">leaf tensor</text>

  <rect x="380" y="590" width="20" height="14" rx="3" class="ag-box v-fill"/>
  <text x="408" y="601" class="legend-lbl">AccumulateGrad sink</text>

  <text x="20" y="640" class="callout"><tspan font-weight="700">backward()</tspan> seeds e.grad=1, walks nodes in reverse</text>
  <text x="20" y="656" class="callout">topological order, and adds each node's VJP into its inputs --</text>
  <text x="20" y="672" class="callout">fork (a used twice) =&gt; sum at the leaf's AccumulateGrad.</text>
</g>

</svg>
<figcaption><b>The grad_fn DAG that <code>e.backward()</code> actually walks.</b> Because leaf <code>a</code> feeds both <code>c = a*b</code> and <code>d = c+a</code>, two separate backward paths reach it; PyTorch sums both contributions at <code>a</code>'s single <code>AccumulateGrad</code> node. Intermediate tensors <code>c</code> and <code>d</code> are non-leaf — their gradients are computed in passing but discarded.</figcaption>
</figure>
