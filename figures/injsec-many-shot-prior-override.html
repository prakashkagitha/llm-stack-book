<figure class="viz" id="fig-injsec-many-shot-prior-override">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 760 700" role="img" aria-label="Diagram of many-shot jailbreaking: as fabricated compliant Q and A examples fill the context window, a behavior gauge slides from refuse toward comply, and a schematic curve of compliance probability rises with the number of shots and saturates, illustrating that a bigger context window is a bigger attack surface.">
<defs>
  <marker id="ms-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6d675d)"/>
  </marker>
  <linearGradient id="ms-gauge-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="var(--good)"/>
    <stop offset="100%" stop-color="var(--accent)"/>
  </linearGradient>
  <style>
    #fig-injsec-many-shot-prior-override text { font-family: var(--sans,sans-serif); fill: var(--ink-soft,#333); }
    #fig-injsec-many-shot-prior-override .tit  { font: 700 13px var(--sans,sans-serif); }
    #fig-injsec-many-shot-prior-override .h2   { font: 700 11.5px var(--sans,sans-serif); }
    #fig-injsec-many-shot-prior-override .sub  { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#666); }
    #fig-injsec-many-shot-prior-override .lbl  { font: 600 10px var(--sans,sans-serif); }
    #fig-injsec-many-shot-prior-override .mono-sm { font: 500 9px var(--mono,monospace); }
    #fig-injsec-many-shot-prior-override .tag  { font: 700 8px var(--sans,sans-serif); }
    #fig-injsec-many-shot-prior-override .note { font: italic 10px var(--sans,sans-serif); fill: var(--muted,#666); }
    #fig-injsec-many-shot-prior-override .axis { font: 600 9.5px var(--sans,sans-serif); fill: var(--muted,#666); }
    #fig-injsec-many-shot-prior-override .callout { font: 700 12px var(--sans,sans-serif); }

    #fig-injsec-many-shot-prior-override [data-anim] { opacity: 0; }
    #fig-injsec-many-shot-prior-override.playing [data-anim="1"] { animation: ms-in .4s .05s ease forwards; }
    #fig-injsec-many-shot-prior-override.playing [data-anim="2"] { animation: ms-in .4s .45s ease forwards; }
    #fig-injsec-many-shot-prior-override.playing [data-anim="3"] { animation: ms-in .4s .85s ease forwards; }
    #fig-injsec-many-shot-prior-override.playing [data-anim="4"] { animation: ms-in .4s 1.25s ease forwards; }
    #fig-injsec-many-shot-prior-override.playing [data-anim="5"] { animation: ms-in .4s 1.65s ease forwards; }
    #fig-injsec-many-shot-prior-override.playing [data-anim="6"] { animation: ms-in .4s 2.1s ease forwards; }
    #fig-injsec-many-shot-prior-override:not(.playing) [data-anim] { opacity: 1; }
    @keyframes ms-in { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

  </style>
</defs>

<text x="12" y="22" class="tit">Many-shot jailbreaking: filling the window overrides the refusal prior</text>


<text x="20" y="46" class="h2">Context window</text>

<rect x="12" y="52" width="346" height="312" rx="8" fill="none" class="v-grid" stroke="var(--v-grid)" stroke-width="1.4" stroke-dasharray="3 3"/>

<g data-anim="1">
  <rect x="20" y="58" width="330" height="56" rx="6" fill="var(--accent)" fill-opacity="0.08" stroke="var(--accent)" stroke-width="1.2"/>
  <rect x="284" y="62" width="58" height="14" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
  <text x="313" y="72" text-anchor="middle" class="tag" fill="var(--surface,#fff)">FABRICATED</text>
  <text x="30" y="78" class="mono-sm">Q: "&lt;attacker-crafted harmful request&gt;"</text>

  <text x="30" y="106" class="sub">attacker writes BOTH sides of the exchange</text>
</g>

<g data-anim="2">
  <rect x="20" y="122" width="330" height="56" rx="6" fill="var(--accent)" fill-opacity="0.08" stroke="var(--accent)" stroke-width="1.2"/>
  <rect x="284" y="126" width="58" height="14" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
  <text x="313" y="136" text-anchor="middle" class="tag" fill="var(--surface,#fff)">FABRICATED</text>
  <text x="30" y="142" class="mono-sm">Q: "&lt;another harmful-style request&gt;"</text>
  <text x="30" y="157" class="mono-sm">A: "Sure, here's how..." (shot 2)</text>
</g>

<g data-anim="3">
  <rect x="20" y="186" width="330" height="56" rx="6" fill="var(--accent)" fill-opacity="0.08" stroke="var(--accent)" stroke-width="1.2"/>
  <rect x="284" y="190" width="58" height="14" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
  <text x="313" y="200" text-anchor="middle" class="tag" fill="var(--surface,#fff)">FABRICATED</text>
  <text x="30" y="206" class="mono-sm">Q: "&lt;another harmful-style request&gt;"</text>
  <text x="30" y="221" class="mono-sm">A: "Sure, here's how..." (shot 3)</text>
</g>

<g data-anim="4">
  <text x="185" y="260" text-anchor="middle" class="sub">... n - 4 more fabricated shots ...</text>
</g>

<g data-anim="5">
  <rect x="20" y="268" width="330" height="56" rx="6" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="1.6"/>
  <rect x="284" y="272" width="58" height="14" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
  <text x="313" y="282" text-anchor="middle" class="tag" fill="var(--surface,#fff)">FABRICATED</text>
  <text x="30" y="288" class="mono-sm">Q: "&lt;harmful-style request&gt;"</text>
  <text x="30" y="303" class="mono-sm">A: "Sure, here's how..." (shot n)</text>
</g>

<text x="20" y="342" class="note">no gradient access needed --</text>
<text x="20" y="356" class="note">pure in-context priming</text>


<text x="440" y="46" text-anchor="middle" class="h2">Behavior gauge</text>

<rect x="428" y="58" width="30" height="270" rx="8" fill="url(#ms-gauge-grad)" fill-opacity="0.32" stroke="var(--v-stroke)" stroke-width="1.4"/>
<text x="500" y="66" class="lbl" fill="var(--good)">REFUSE</text>
<text x="500" y="79" class="sub">RLHF prior wins, few shots</text>

<text x="500" y="312" class="lbl" fill="var(--accent)">COMPLY</text>
<text x="500" y="325" class="sub">in-context pattern wins, many shots</text>

<g data-anim="5">
  <path d="M 419 284 L 434 276 L 434 292 Z" fill="var(--accent)"/>
  <line x1="419" y1="284" x2="380" y2="284" stroke="var(--accent)" stroke-width="1.3" stroke-dasharray="2 2"/>
</g>
<text x="500" y="222" class="sub">pointer position</text>
<text x="500" y="235" class="sub">tracks column fill</text>
<line x1="497" y1="238" x2="440" y2="278" class="v-muted" stroke="var(--muted,#6d675d)" stroke-width="1" marker-end="url(#ms-arrow)"/>


<g data-anim="6">
<text x="20" y="400" class="h2">Schematic effect on compliance probability</text>

<line x1="70" y1="580" x2="70" y2="420" class="v-grid" stroke="var(--v-grid)" stroke-width="1.4"/>
<line x1="70" y1="580" x2="720" y2="580" class="v-grid" stroke="var(--v-grid)" stroke-width="1.4"/>

<path d="M 70 578
         C 160 576, 230 566, 290 540
         C 350 510, 400 440, 470 410
         C 540 385, 610 372, 720 368"
      fill="none" class="v-accent" stroke="var(--accent)" stroke-width="2.4"/>

<circle cx="90" cy="577" r="4" class="v-accent" fill="var(--accent)"/>
<circle cx="700" cy="369" r="4" class="v-accent" fill="var(--accent)"/>

<text x="440" y="600" text-anchor="middle" class="axis">number of shots n (log-spaced) -&gt;</text>
<text x="30" y="500" text-anchor="middle" class="axis" transform="rotate(-90,30,500)">P(harmful compliance) -&gt;</text>

<rect x="80" y="536" width="118" height="34" rx="6" fill="var(--good)" fill-opacity="0.12" stroke="var(--good)" stroke-width="1.2"/>
<text x="139" y="557" text-anchor="middle" class="lbl" fill="var(--good)">n small -&gt; refuse</text>

<rect x="562" y="378" width="140" height="34" rx="6" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1.2"/>
<text x="632" y="399" text-anchor="middle" class="lbl" fill="var(--accent)">n large -&gt; comply</text>

<text x="440" y="422" text-anchor="middle" class="note">power-law in n (schematic -- illustrative only)</text>
</g>


<g data-anim="6">
<rect x="12" y="628" width="736" height="56" rx="8" fill="var(--warn)" fill-opacity="0.12" stroke="var(--warn)" stroke-width="1.6"/>
<text x="380" y="652" text-anchor="middle" class="callout" fill="var(--warn)">Counterintuitive: a bigger context window is a bigger attack surface</text>
<text x="380" y="670" text-anchor="middle" class="sub">no fine-tuning or gradient access required -- just enough shots in-context</text>
</g>

</svg>
<figcaption><b>Many-shot jailbreaking overrides RLHF's refusal prior with sheer in-context repetition.</b> As the attacker packs more fabricated "compliant" Q&amp;A pairs into the context window, the model's implicit meta-learning increasingly favors continuing the pattern over its trained refusal behavior -- no gradients needed, only tokens. Because the effect scales with the number of shots that fit in context, longer context windows widen this attack surface rather than shrinking it.</figcaption>
</figure>
