<svg viewBox="0 0 820 550" role="img" aria-label="Reciprocal rank fusion diagram. A BM25 lexical ranking of five documents with raw scores in the 0 to 20 range, and a dense semantic ranking of the same five documents with cosine scores in the 0.5 to 1.0 range, both discard their raw scores and collapse onto a shared rank 1 through 5 ladder using weight 1 over open paren 60 plus rank close paren. The fused list resorts by summed reciprocal rank, and document D1, ranked 2nd by BM25 and 1st by dense, rises to fused rank 1. A banner explains that RRF only sums rank positions so the score-scale mismatch between BM25 and cosine similarity cannot corrupt the fusion.">

<figcaption><b>RRF fuses BM25 and dense rankings by rank ordinal, not by raw score, so the two scales never have to be compared.</b> BM25 wins on exact-token matches (rare IDs, SKUs); dense retrieval wins on paraphrase. Both lists discard their raw scores and collapse onto the same 1-5 rank ladder, weighted <code>1/(60+rank)</code>; D1, second by BM25 but first by dense, sums to the highest fused score and rises to rank 1.</figcaption>
</figure>
