<text x="138" y="692" style="font:400 11px var(--sans,sans-serif); fill:var(--muted,#64748b)">Output (clean reassembled docs)</text>


<rect x="108" y="700" width="22" height="14" rx="3"
      fill="var(--accent,#6366f1)" fill-opacity="0.9"/>
<text x="138" y="712" style="font:400 11px var(--sans,sans-serif); fill:var(--muted,#64748b)">Animated data token flowing through stages</text>

</svg>
<figcaption><b>Paragraph-level near-duplicate detection runs MinHash at paragraph granularity, catching repeated boilerplate that document-level dedup misses.</b> Each document is first split into paragraphs (≥ 3 sentences or ≥ 100 chars), MinHash signatures are computed per paragraph, LSH buckets near-identical paragraphs as duplicates, those duplicates are stripped (keeping the first occurrence), and the surviving paragraphs are reassembled into documents — discarding any document that shrinks below 50 tokens.</figcaption>
</figure>
