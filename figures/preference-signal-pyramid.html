<figure class="viz" id="fig-preference-signal-pyramid">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 820 400" role="img" aria-label="A pyramid of feedback: a scarce explicit thumbs-up tip sits over an abundant noisy base of implicit behavioral signals and raw unlabeled traffic; a proxy reward model scores the unlabeled majority, lifting it up to labeled status so nearly all traffic becomes usable training signal.">
  <defs>
    <marker id="psp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="psp-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-preference-signal-pyramid text{ fill: var(--ink-soft); font: 12px var(--sans,sans-serif); }
    #fig-preference-signal-pyramid .ttl{ font: 700 14.5px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-preference-signal-pyramid .lbl{ font: 700 12.5px var(--sans,sans-serif); }
    #fig-preference-signal-pyramid .sub{ font: 400 10px var(--sans,sans-serif); fill: var(--muted); }
    #fig-preference-signal-pyramid .tag{ font: 600 9px var(--mono,monospace); fill: var(--muted); }
    #fig-preference-signal-pyramid .cap{ font: 400 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-preference-signal-pyramid .axis{ font: 600 9.5px var(--sans,sans-serif); fill: var(--muted); }
  </style>

  <text x="410" y="22" text-anchor="middle" class="ttl">Preference signal: scarce explicit labels over an abundant implicit base</text>


  <g data-anim="1">
    <line x1="30" y1="330" x2="30" y2="65" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#psp-arrow-muted)"/>
    <text x="14" y="200" text-anchor="middle" class="axis" transform="rotate(-90 14 200)">QUALITY / label value -&gt;</text>

    <line x1="60" y1="70" x2="60" y2="330" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#psp-arrow-muted)"/>
    <text x="44" y="200" text-anchor="middle" class="axis" transform="rotate(-90 44 200)">VOLUME of traffic -&gt;</text>
  </g>


  <g data-anim="2">

    <polygon points="440,70 405,140 475,140" class="v-accent" fill="var(--accent)"/>
    <text x="440" y="98" text-anchor="middle" font="700 11px var(--sans,sans-serif)" fill="var(--surface,#fff)">Explicit</text>
    <text x="440" y="112" text-anchor="middle" font="700 11px var(--sans,sans-serif)" fill="var(--surface,#fff)">preference</text>


    <polygon points="405,140 475,140 555,235 325,235" class="v-fill" stroke="var(--v-muted)" stroke-width="1.2"/>
    <text x="440" y="182" text-anchor="middle" class="lbl">Implicit signals</text>
    <text x="440" y="198" text-anchor="middle" class="sub">copy - edit - regenerate -</text>
    <text x="440" y="210" text-anchor="middle" class="sub">continue - abandon</text>


    <polygon points="325,235 555,235 645,330 235,330" fill="var(--v-grid)" stroke="var(--v-muted)" stroke-width="1.2" opacity="0.55"/>
    <text x="440" y="288" text-anchor="middle" class="lbl">Raw unlabeled traffic</text>
    <text x="440" y="304" text-anchor="middle" class="sub">every request, no explicit feedback</text>
  </g>


  <g data-anim="3">
    <line x1="475" y1="105" x2="500" y2="105" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <rect x="500" y="93" width="112" height="24" rx="5" fill="none" class="v-grid" stroke="currentColor" stroke-width="1"/>
    <text x="556" y="109" text-anchor="middle" class="tag">~a few % of requests</text>
  </g>


  <g data-anim="4">
    <rect x="590" y="150" width="200" height="58" rx="8" fill="var(--surface,#fff)" class="v-accent-s" stroke="var(--accent)" stroke-width="1.8"/>
    <text x="690" y="174" text-anchor="middle" font="700 12.5px var(--sans,sans-serif)" fill="var(--accent)">Proxy reward model</text>
    <text x="690" y="190" text-anchor="middle" class="sub">trained to predict explicit</text>
    <text x="690" y="201" text-anchor="middle" class="sub">thumbs from implicit signals</text>
  </g>


  <g data-anim="5">

    <path d="M 595,208 C 650,255 620,310 600,340 C 480,365 320,365 220,340
             C 165,300 160,200 165,160 C 168,130 190,105 235,95"
      fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="2.2"
      stroke-dasharray="6 4" marker-end="url(#psp-arrow)"/>
    <text x="390" y="378" text-anchor="middle" class="cap">noisy individually, strongly correlated in aggregate</text>


    <rect x="640" y="245" width="150" height="40" rx="7" class="v-fill" stroke="var(--v-muted)" stroke-width="1.2"/>
    <text x="715" y="262" text-anchor="middle" font="700 11px var(--sans,sans-serif)">labeled signal</text>
    <text x="715" y="276" text-anchor="middle" font="700 11px var(--sans,sans-serif)">~= nearly all traffic</text>
    <path d="M 610,208 C 660,225 700,230 715,245" fill="none" class="v-accent-s"
      stroke="var(--accent)" stroke-width="2.2" marker-end="url(#psp-arrow)"/>
    <text x="715" y="302" text-anchor="middle" class="cap">scores the remaining ~95%</text>
    <text x="715" y="314" text-anchor="middle" class="cap">with no explicit label</text>
  </g>
</svg>
<figcaption><b>Explicit preference labels are the scarce tip of a much larger pyramid of behavioral signal.</b> A proxy reward model trained on the small set of explicit thumbs learns to score the abundant implicit signals and raw unlabeled traffic below it, effectively lifting nearly all production traffic up to usable training signal. The underlying signals are noisy one at a time but correlate strongly once aggregated.</figcaption>
</figure>
