<figure class="viz" id="fig-distill-compression-pipeline">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 720 760" role="img" aria-label="Typical LLM compression pipeline: Full Pretrained Model 70B, then Knowledge Distillation to Distilled Student 7B, then Structured Pruning to Pruned Student 5B effective, then Quantization to Quantized Model 1.5GB on disk, then Speculative Decoding to Deployed System with target 7B plus draft quantized 1B.">
<defs>
  <marker id="cp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6366f1)"/>
  </marker>
  <radialGradient id="cp-pulse" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="var(--accent,#6366f1)" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="var(--accent,#6366f1)" stop-opacity="0"/>
  </radialGradient>
  
  <linearGradient id="cp-meter-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="var(--accent,#6366f1)"/>
    <stop offset="100%" stop-color="var(--good,#16a34a)"/>
  </linearGradient>
</defs>

<style>
  #fig-distill-compression-pipeline text { font: 13px var(--sans,sans-serif); fill: var(--ink-soft,#374151); }
  #fig-distill-compression-pipeline .title  { font: 700 15px var(--sans,sans-serif); }
  #fig-distill-compression-pipeline .node-n { font: 700 13px var(--sans,sans-serif); }
  #fig-distill-compression-pipeline .node-s { font: 700 18px var(--sans,sans-serif); fill: var(--accent,#6366f1); }
  #fig-distill-compression-pipeline .node-s5 { font: 700 18px var(--sans,sans-serif); fill: var(--good,#16a34a); }
  #fig-distill-compression-pipeline .op-n   { font: 700 11px var(--sans,sans-serif); }
  #fig-distill-compression-pipeline .op-s   { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-distill-compression-pipeline .muted  { fill: var(--muted,#9ca3af); }
  #fig-distill-compression-pipeline .meter-lbl { font: 500 9px var(--mono,monospace); fill: var(--muted,#9ca3af); }
  #fig-distill-compression-pipeline .chip-n { font: 600 9px var(--sans,sans-serif); fill: var(--ink-soft,#374151); }

  /* Pulse travels top→bottom: total ~660px over 4.5s */
  @keyframes cp-travel {
    0%   { transform: translateY(0);    opacity: 1; }
    85%  { transform: translateY(660px); opacity: 1; }
    93%  { transform: translateY(660px); opacity: 0; }
    100% { transform: translateY(660px); opacity: 0; }
  }
  /* Node glow on arrival: flash opacity */
  @keyframes cp-glow2 { 0%,34%{opacity:0} 38%{opacity:1} 48%{opacity:0.3} 52%{opacity:1} 60%{opacity:0.3} 100%{opacity:0} }
  @keyframes cp-glow3 { 0%,52%{opacity:0} 56%{opacity:1} 64%{opacity:0.3} 68%{opacity:1} 76%{opacity:0.3} 100%{opacity:0} }
  @keyframes cp-glow4 { 0%,68%{opacity:0} 72%{opacity:1} 80%{opacity:0.3} 84%{opacity:1} 90%{opacity:0.3} 100%{opacity:0} }
  @keyframes cp-glow5 { 0%,82%{opacity:0} 86%{opacity:1} 92%{opacity:0.3} 96%{opacity:1} 100%{opacity:0.3} }

  #fig-distill-compression-pipeline .cp-p  { animation: cp-travel 4.5s ease-in-out infinite; }
  #fig-distill-compression-pipeline .gn2   { animation: cp-glow2  4.5s ease-in-out infinite; }
  #fig-distill-compression-pipeline .gn3   { animation: cp-glow3  4.5s ease-in-out infinite; }
  #fig-distill-compression-pipeline .gn4   { animation: cp-glow4  4.5s ease-in-out infinite; }
  #fig-distill-compression-pipeline .gn5   { animation: cp-glow5  4.5s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    #fig-distill-compression-pipeline .cp-p { animation:none; transform:translateY(660px); opacity:0.5; }
    #fig-distill-compression-pipeline .gn2,.gn3,.gn4,.gn5 { animation:none; opacity:0.4; }
  }
</style>

<circle cx="340" cy="94" r="10" fill="url(#cp-pulse)" class="cp-p"/>

</svg>
<figcaption><b>A typical LLM compression pipeline shrinks a 70B model to an on-device deployment in four stages.</b> Knowledge distillation produces a 7B student; structured pruning removes redundant heads and layers to reach 5B effective capacity; INT4/INT8 quantization compresses weights to ~1.5 GB on disk; finally the quantized model serves as a speculative draft alongside a full-precision 7B verifier. Each stage compounds the previous one's size reduction.</figcaption>
</figure>
