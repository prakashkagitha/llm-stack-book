<figcaption><b>CUDA's three-level logical hierarchy maps directly onto physical GPU hardware.</b> Each block is assigned to one SM; threads within a block share on-chip shared memory and can synchronize with <code>__syncthreads()</code>. Thirty-two consecutive threads form a <em>warp</em> that executes in lockstep (SIMT). Threads in different blocks cannot synchronize directly — inter-block communication must go through global memory (HBM/DRAM), which is roughly 800 cycles away.</figcaption>
</figure>
