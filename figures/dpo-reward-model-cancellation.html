</g>

<text x="46" y="518" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">3</text>
<text x="68" y="519" class="L">STAGE 3 -- Bradley-Terry needs only the DIFFERENCE</text>

<text x="310" y="550" text-anchor="middle" class="EQ">P(y_w &gt; y_l | x) = sigma( r(x,y_w) - r(x,y_l) )</text>
<text x="45" y="575" class="CAP">expand each reward, then subtract:</text>
</g>

<rect x="140" y="587" width="175" height="32" rx="6" fill="var(--accent,#3a6ea5)" fill-opacity="0.14" stroke="var(--accent,#3a6ea5)" stroke-width="1.4"/>
<text x="227" y="609" text-anchor="middle" class="MONO ACC">beta * log-ratio(w)</text>
<text x="328" y="608" text-anchor="middle" class="EQ">+</text>
<rect x="345" y="587" width="150" height="32" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.3"/>
<text x="420" y="609" text-anchor="middle" class="MONO MUT">beta * logZ(x)</text>

<text x="30" y="658" class="EQ">-  r(x,y_l) =</text>
<rect x="140" y="637" width="175" height="32" rx="6" fill="var(--accent,#3a6ea5)" fill-opacity="0.14" stroke="var(--accent,#3a6ea5)" stroke-width="1.4"/>
<text x="227" y="659" text-anchor="middle" class="MONO ACC">beta * log-ratio(l)</text>
<text x="328" y="658" text-anchor="middle" class="EQ">+</text>
<rect x="345" y="637" width="150" height="32" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.3"/>
<text x="420" y="659" text-anchor="middle" class="MONO MUT">beta * logZ(x)</text>

<rect x="338" y="581" width="164" height="94" rx="10" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.6" stroke-dasharray="5 4"/>
<line x1="352" y1="592" x2="488" y2="614" stroke="var(--muted,#888)" stroke-width="2.4"/>
<line x1="352" y1="642" x2="488" y2="664" stroke="var(--muted,#888)" stroke-width="2.4"/>
</g>

<line x1="420" y1="677" x2="420" y2="697" stroke="var(--accent,#3a6ea5)" stroke-width="1.8" marker-end="url(#dd-acc)"/>
<rect x="60" y="700" width="500" height="56" rx="10" fill="var(--accent,#3a6ea5)" fill-opacity="0.16" stroke="var(--accent,#3a6ea5)" stroke-width="2.2"/>
<text x="310" y="723" text-anchor="middle" class="BIG">SAME beta*logZ(x) FOR WINNER AND LOSER</text>
<text x="310" y="742" text-anchor="middle" class="BIG">-&gt; depends only on x -&gt; CANCELS in the difference</text>

<line x1="310" y1="756" x2="310" y2="776" stroke="var(--accent,#3a6ea5)" stroke-width="1.8" marker-end="url(#dd-acc)"/>
<rect x="90" y="780" width="440" height="42" rx="8" fill="var(--surface-3,#eef2f7)" stroke="var(--accent,#3a6ea5)" stroke-width="1.6"/>
<text x="310" y="805" text-anchor="middle" class="EQS ACC">r(x,y_w) - r(x,y_l) = beta*[log-ratio(w) - log-ratio(l)]</text>
<text x="310" y="838" text-anchor="middle" class="CAP">the surviving reward difference -- expressed purely in policy log-ratios</text>

<g data-anim="6">
<rect x="20" y="898" width="580" height="196" rx="10" fill="var(--surface,#fdfdfd)" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
<circle cx="46" cy="922" r="13" fill="var(--accent,#3a6ea5)"/>
<text x="46" y="926" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">4</text>
<text x="68" y="927" class="L">STAGE 4 -- DPO loss</text>

<text x="310" y="966" text-anchor="middle" class="EQ ACC">L_DPO = -log sigma(Delta)</text>
<text x="310" y="986" text-anchor="middle" class="EQS ACC">Delta = beta*[log-ratio(w) - log-ratio(l)]</text>

<rect x="70" y="1016" width="150" height="30" rx="15" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.2" stroke-dasharray="3 3"/>
<text x="145" y="1035" text-anchor="middle" class="N MUT">reward model r_phi</text>

<rect x="232" y="1016" width="115" height="30" rx="15" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.2" stroke-dasharray="3 3"/>

<rect x="359" y="1016" width="90" height="30" rx="15" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.2" stroke-dasharray="3 3"/>
<text x="404" y="1035" text-anchor="middle" class="N MUT">Z(x)</text>
<line x1="369" y1="1030" x2="439" y2="1030" stroke="var(--muted,#999)" stroke-width="1.6"/>

<text x="692" y="114" text-anchor="middle" class="RAIL-T">JOURNEY</text>

<text x="692" y="176" text-anchor="middle" class="NS" font-weight="700">reward model r_phi</text>

</svg>
<figcaption><b>The DPO derivation is a four-stage pipeline in which the reward model never disappears -- it gets reparameterized into the policy.</b> The closed-form KL-RLHF optimum (Stage 1) is inverted to write the reward in terms of the policy's log-ratio to the reference plus an intractable <code>beta*logZ(x)</code> (Stage 2); because Bradley-Terry only ever needs the reward <i>difference</i> between winner and loser, and <code>logZ(x)</code> depends only on the prompt, it cancels identically for both (Stage 3, the key move); what remains is the DPO loss (Stage 4) -- no reward network, no rollouts, no partition function, just log-probabilities and a sigmoid. The side rail tracks the reward model's own journey from a hypothetical parametric net to a term fully folded into <code>pi_theta</code>.</figcaption>
</figure>
