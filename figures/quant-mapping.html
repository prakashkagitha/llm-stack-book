<figure class="viz" id="fig-quant-mapping">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 380" role="img" aria-label="Affine quantization maps a continuous floating-point weight range onto 256 evenly spaced INT8 codes via a scale s equal to the range over 255 and a zero-point z; one weight is rounded to its nearest code and dequantized back, leaving a small rounding gap.">
  <defs>
    <marker id="qm-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-quant-mapping text{ fill:var(--ink-soft); }
    #fig-quant-mapping .lbl{ font:600 12.5px var(--sans,sans-serif); }
    #fig-quant-mapping .mono{ font:600 12px var(--mono,monospace); }
    #fig-quant-mapping .small{ font:500 11px var(--mono,monospace); fill:var(--muted); }
    #fig-quant-mapping .cap{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-quant-mapping .hdr{ font:700 12px var(--sans,sans-serif); }
    #fig-quant-mapping .form{ font:600 13px var(--mono,monospace); }
  </style>

  

  
  <g data-anim="1">
    <text x="80" y="46" class="hdr" fill="var(--accent)">continuous FP weights</text>
    
    <rect x="80" y="58" width="600" height="16" rx="3" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="1.1"/>
    
    <line x1="80"  y1="52" x2="80"  y2="80" class="v-stroke" stroke="currentColor" stroke-width="1.3"/>
    <line x1="680" y1="52" x2="680" y2="80" class="v-stroke" stroke="currentColor" stroke-width="1.3"/>
    <text x="80"  y="96" text-anchor="middle" class="mono">x_min = -0.20</text>
    <text x="680" y="96" text-anchor="middle" class="mono">x_max = +1.80</text>
    <text x="380" y="50" text-anchor="middle" class="cap">range = x_max - x_min = 2.00</text>
  </g>

  
  <g data-anim="2">
    
    <g class="v-grid" stroke="currentColor" stroke-width="0.9" opacity="0.55">
      <line x1="80"  y1="150" x2="80"  y2="170"/>
      <line x1="128" y1="150" x2="128" y2="170"/>
      <line x1="176" y1="150" x2="176" y2="170"/>
      <line x1="224" y1="150" x2="224" y2="170"/>
      <line x1="272" y1="150" x2="272" y2="170"/>
      <line x1="320" y1="150" x2="320" y2="170"/>
      <line x1="368" y1="150" x2="368" y2="170"/>
      <line x1="416" y1="150" x2="416" y2="170"/>
      <line x1="464" y1="150" x2="464" y2="170"/>
      <line x1="512" y1="150" x2="512" y2="170"/>
      <line x1="560" y1="150" x2="560" y2="170"/>
      <line x1="608" y1="150" x2="608" y2="170"/>
      <line x1="656" y1="150" x2="656" y2="170"/>
      <line x1="680" y1="150" x2="680" y2="170"/>
    </g>
    <line x1="80" y1="160" x2="680" y2="160" class="v-stroke" stroke="currentColor" stroke-width="1.3"/>
    
    <text x="80"  y="186" text-anchor="middle" class="mono v-accent" fill="var(--accent)">q = 0</text>
    <text x="680" y="186" text-anchor="middle" class="mono v-accent" fill="var(--accent)">q = 255</text>
    <text x="80"  y="140" text-anchor="start"  class="hdr" fill="var(--accent)">256 evenly spaced INT8 codes</text>
    <text x="680" y="140" text-anchor="end" class="cap">step = s</text>
    
    <line x1="464" y1="173" x2="512" y2="173" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
    <line x1="464" y1="170" x2="464" y2="176" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
    <line x1="512" y1="170" x2="512" y2="176" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
    <text x="488" y="190" text-anchor="middle" class="small" fill="var(--good,#2f9e6e)">one step</text>
  </g>

  
  <g data-anim="3">
    
    <circle cx="356" cy="66" r="5.5" fill="var(--warn,#e0a106)" stroke="var(--warn,#e0a106)" stroke-width="1"/>
    <text x="356" y="120" text-anchor="middle" class="mono" fill="var(--warn,#e0a106)">x = 0.99</text>
    
    <path d="M356 72 L356 132 L368 152" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#qm-arr)" color="var(--warn,#e0a106)"/>
    
    <circle cx="368" cy="160" r="5" fill="var(--warn,#e0a106)" stroke="var(--warn,#e0a106)" stroke-width="1"/>
    <text x="392" y="129" text-anchor="start" class="small" fill="var(--warn,#e0a106)">quantize: round(x/s)+z</text>
  </g>

  
  <g data-anim="4">
    <text x="80" y="232" class="hdr" fill="var(--good,#2f9e6e)">dequantize back to FP</text>
    
    <rect x="80" y="244" width="600" height="16" rx="3" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.1"/>
    
    <path d="M368 168 L368 240" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#qm-arr)" color="var(--good,#2f9e6e)"/>
    <circle cx="368" cy="252" r="5.5" fill="var(--good,#2f9e6e)" stroke="var(--good,#2f9e6e)" stroke-width="1"/>
    <text x="368" y="284" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">x_hat = s(q - z) = 0.992</text>
    
    <line x1="356" y1="300" x2="368" y2="300" class="viz-pulse" stroke="var(--warn,#e0a106)" stroke-width="2.4"/>
    <line x1="356" y1="296" x2="356" y2="304" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <line x1="368" y1="296" x2="368" y2="304" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <text x="362" y="318" text-anchor="middle" class="small" fill="var(--warn,#e0a106)">rounding gap &lt;= s/2</text>
  </g>

  
  <g data-anim="5">
    <rect x="80" y="332" width="600" height="36" rx="6" class="v-fill v-stroke" stroke-width="1"/>
    <text x="96" y="355" class="form" fill="var(--accent)">s = range / 255</text>
    <text x="244" y="355" class="form">z = round(-x_min / s)</text>
    <text x="664" y="355" text-anchor="end" class="cap">smaller range gives finer steps</text>
  </g>
</svg>
<figcaption><b>Quantization is snapping floats to an evenly spaced integer grid.</b> The affine map sends the continuous FP range onto <b>256 INT8 codes</b> whose spacing is the scale <b>s = range / 255</b>, with the zero-point <b>z</b> fixing which code means real 0. Each weight rounds to its nearest code and dequantizes to <b>x̂ = s·(q − z)</b>; the leftover <b>rounding gap</b> is at most <b>s/2</b>, so a wider range (an outlier) means a coarser grid and larger error everywhere.</figcaption>
</figure>
