<figcaption><b>Chunked prefill interleaves a fixed-size prompt chunk with all in-flight decode tokens each iteration, bounding inter-token latency inflation to the chunk compute time.</b> Every iteration contains exactly one prefill chunk (blue, fixed width = C tokens) plus one decode token per in-flight sequence (green). The three decode sequences (A, B, C) persist across all iterations, never fully preempted. The faded third column shows the pattern repeats until the full prompt is consumed, as indicated by the progress bar at top.</figcaption>
</figure>
