<figcaption><b>The DPO margin &#916; controls both loss magnitude and gradient strength.</b> Zone A shows how &#916; decomposes into the difference of chosen and rejected log-ratios (scaled by &#946;). Zone B reveals that the loss <em>-log &#963;(&#916;)</em> and the gradient weight <em>&#963;(-&#916;)</em> both peak when &#916; &lt;&lt; 0 -- exactly when the model mis-ranks a pair -- and decay toward zero once the pair is solved, creating an automatic curriculum in which hard pairs dominate and solved ones fade.</figcaption>
