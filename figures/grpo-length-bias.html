<figure class="viz" id="fig-grpo-length-bias">
<button class="viz-replay" type="button">/replay</button>

<figcaption><b>Original GRPO's per-response 1/|o_i| normalization scales the per-token gradient by 1/length, so long responses get a diluted push regardless of correctness.</b> A long correct response is barely reinforced and a long wrong response is barely penalized, so rambling is systematically cheaper -- a major driver of GRPO's runaway length growth. The token-level fix (Dr. GRPO / DAPO) sums the loss over all tokens in the batch and divides by the total token count, giving every token an equal-size gradient no matter which response it came from.</figcaption>
</figure>
