<figcaption><b>A Bloom filter has no false negatives but a tunable false-positive rate -- exactly the asymmetry deduplication wants.</b> Inserting a document sets k bits; a true duplicate always finds every one of those bits already set and is correctly skipped, while a genuinely new document is kept unless it rarely collides on all k bits at once, in which case it is wrongly dropped at a rate you can bound by sizing the filter.</figcaption>
</figure>
