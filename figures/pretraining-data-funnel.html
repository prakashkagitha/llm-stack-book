<figure class="viz" id="fig-pretraining-data-funnel">
<svg viewBox="0 0 820 800" role="img" aria-label="A top-to-bottom funnel showing raw Common Crawl WARC narrowing stage by stage through URL filtering, WARC text extraction, language ID, quality filtering, deduplication, and tokenize-and-pack into training shards, with band width encoding remaining data volume.">
<defs>
  <marker id="pdf-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-pretraining-data-funnel text { fill: currentColor; }
  #fig-pretraining-data-funnel .stage-name { font: 700 13.5px var(--sans,sans-serif); }
  #fig-pretraining-data-funnel .stage-desc { font: 400 11.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-pretraining-data-funnel .top-lbl { font: 700 14px var(--sans,sans-serif); }
  #fig-pretraining-data-funnel .top-sub { font: 500 11.5px var(--sans,sans-serif); }
  #fig-pretraining-data-funnel .file-lbl { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-pretraining-data-funnel .out-lbl { font: 700 13.5px var(--sans,sans-serif); }
  #fig-pretraining-data-funnel .out-sub { font: 400 11px var(--mono,monospace); fill: var(--muted,#94a3b8); }
  #fig-pretraining-data-funnel .annot { font: 500 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-pretraining-data-funnel .cut-tag { font: 700 10px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
</style>


<g data-anim="1">
  <rect x="14" y="18" width="30" height="38" rx="3" class="v-fill" stroke="var(--border-2,#413c35)" stroke-width="1.1"/>
  <rect x="21" y="12" width="30" height="38" rx="3" class="v-fill" stroke="var(--border-2,#413c35)" stroke-width="1.1"/>
  <rect x="28" y="6" width="30" height="38" rx="3" fill="var(--surface,#201d1a)" stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
  <text x="43" y="28" text-anchor="middle" style="font:700 8.5px var(--mono,monospace); fill:var(--accent,#c15b39)">.warc</text>
  <text x="70" y="26" class="file-lbl">one WARC file =</text>
  <text x="70" y="40" class="file-lbl">one independent task</text>
  <path d="M 100,52 L 130,80" stroke="var(--accent,#c15b39)" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#pdf-arrow)" fill="none"/>
</g>


<g data-anim="1">

  <text x="210" y="102" text-anchor="middle" class="top-lbl" fill="var(--surface,#fff)">Common Crawl raw WARC</text>
  <text x="210" y="119" text-anchor="middle" class="top-sub" fill="var(--surface,#fff)">~90 TB / snapshot, ~2.4B pages</text>
</g>





<g data-anim="2">
  <rect x="40" y="140" width="340" height="70" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <text x="415" y="188" class="stage-desc">drop adult/spam/low-quality</text>
  <text x="415" y="202" class="stage-desc">domains before any parsing</text>
</g>


<g data-anim="2">
  <rect x="60" y="226" width="300" height="70" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 60,226 L 360,226 L 345,296 L 75,296 Z" class="v-fill" stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
  <path d="M 60,226 L 75,226 L 75,296 L 60,296 Z" fill="var(--muted,#94a3b8)" fill-opacity="0.35"/>

  <text x="415" y="274" class="stage-desc">trafilatura main-content; drop</text>
  <text x="415" y="288" class="stage-desc">nav/sidebar/footer (skip WET)</text>
</g>


<g data-anim="3">
  <rect x="75" y="312" width="270" height="70" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 75,312 L 345,312 L 327.5,382 L 92.5,382 Z" class="v-fill" stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
  <path d="M 75,312 L 92.5,312 L 92.5,382 L 75,382 Z" fill="var(--muted,#94a3b8)" fill-opacity="0.35"/>

  <text x="415" y="343" class="stage-name">3. Language ID</text>
  <text x="415" y="360" class="stage-desc">fastText / CLD3;</text>
  <text x="415" y="374" class="stage-desc">keep target languages</text>
</g>


<g data-anim="3">
  <rect x="92.5" y="398" width="235" height="70" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 92.5,398 L 327.5,398 L 307.5,468 L 112.5,468 Z" class="v-fill" stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
  <path d="M 92.5,398 L 112.5,398 L 112.5,468 L 92.5,468 Z" fill="var(--muted,#94a3b8)" fill-opacity="0.35"/>
  <path d="M 307.5,398 L 327.5,398 L 327.5,468 L 307.5,468 Z" fill="var(--muted,#94a3b8)" fill-opacity="0.35"/>

  <text x="415" y="429" class="stage-name">4. Quality filtering</text>
  <text x="415" y="446" class="stage-desc">Gopher/C4 heuristics: length,</text>
  <text x="415" y="460" class="stage-desc">symbol ratio, repetition</text>
</g>


<g data-anim="4">
  <rect x="112.5" y="484" width="195" height="70" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 112.5,484 L 307.5,484 L 245,554 L 175,554 Z" fill="var(--accent,#c15b39)" fill-opacity="0.5" stroke="var(--accent,#c15b39)" stroke-width="2"/>
  <path d="M 112.5,484 L 175,484 L 175,554 L 112.5,554 Z" fill="var(--muted,#94a3b8)" fill-opacity="0.45"/>
  <path d="M 307.5,484 L 245,484 L 245,554 L 307.5,554 Z" fill="var(--muted,#94a3b8)" fill-opacity="0.45"/>
  <line x1="307.5" y1="519" x2="410" y2="519" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
  <text x="415" y="509" class="stage-name" fill="var(--accent,#c15b39)">5. Deduplication</text>
  <text x="415" y="526" class="stage-desc">MinHash LSH + exact;</text>
  <text x="415" y="540" class="stage-desc">the single largest cut</text>
  <rect x="415" y="548" width="128" height="20" rx="4" fill="var(--accent,#c15b39)" fill-opacity="0.15" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="479" y="562" text-anchor="middle" class="cut-tag">SHARPEST CUT</text>
</g>


<g data-anim="5">
  <path d="M 175,570 L 245,570 L 242.5,640 L 177.5,640 Z" class="v-fill" stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
  <line x1="245" y1="605" x2="410" y2="605" stroke="var(--border-2,#413c35)" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="415" y="601" class="stage-name">6. Tokenize + pack</text>
  <text x="415" y="618" class="stage-desc">BPE, EOS separators,</text>
  <text x="415" y="632" class="stage-desc">ctx_len+1 rows</text>
</g>


<g data-anim="5">
  <path d="M 177.5,640 L 242.5,640 L 268,672 L 152,672 Z" class="v-fill" stroke="var(--accent,#c15b39)" stroke-width="1.2" opacity="0.85"/>
</g>


<g data-anim="5">
  <rect x="130" y="680" width="180" height="24" rx="4" fill="var(--surface-3,#2f2b27)" stroke="var(--border-2,#413c35)" stroke-width="1"/>
  <rect x="140" y="691" width="180" height="24" rx="4" fill="var(--surface-3,#2f2b27)" stroke="var(--border-2,#413c35)" stroke-width="1"/>
  <rect x="150" y="702" width="180" height="28" rx="4" fill="var(--accent,#c15b39)" fill-opacity="0.85" stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
  <text x="240" y="720" text-anchor="middle" class="out-lbl" fill="var(--surface,#fff)">training shards</text>
  <text x="240" y="746" text-anchor="middle" class="out-sub">.bin, memory-mappable int32</text>
</g>


<g data-anim="1">
  <line x1="770" y1="105" x2="770" y2="715" stroke="var(--border-2,#413c35)" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="765" y1="105" x2="775" y2="105" stroke="var(--border-2,#413c35)" stroke-width="1"/>
  <line x1="765" y1="715" x2="775" y2="715" stroke="var(--border-2,#413c35)" stroke-width="1"/>
  <rect x="655" y="380" width="150" height="60" rx="6" fill="var(--accent,#c15b39)" fill-opacity="0.08" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="730" y="401" text-anchor="middle" class="annot">raw crawl -&gt;</text>
  <text x="730" y="417" text-anchor="middle" class="annot">~30-50% retained</text>
  <text x="730" y="433" text-anchor="middle" class="annot">by doc count</text>
</g>

</svg>
<figcaption><b>Raw Common Crawl narrows stage by stage into training-ready shards, with band width tracking remaining data volume.</b> Each WARC file is processed as an independent, embarrassingly-parallel task through URL filtering, WARC re-extraction, language ID, and quality filtering — but deduplication is the single sharpest cut in the pipeline, and everything downstream is tokenized and packed into fixed-length shards.</figcaption>
</figure>
