<style>
@media (prefers-reduced-motion: reduce) {

</svg>
<figcaption><b>One run, nine stages, and only two artifact formats that actually matter: the <code>uint16</code> shard on disk and the <code>step_*.pt</code> checkpoint.</b> Every other handoff is just a Python object passed in-process; these two are the file-format contracts that let independently-built pieces — tokenizer, model, optimizer, monitor, evaluator, sampler — cooperate across process boundaries and resumed runs.</figcaption>
</figure>
