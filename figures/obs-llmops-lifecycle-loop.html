<figure class="viz" id="fig-obs-llmops-lifecycle-loop">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 820 520" role="img" aria-label="Cyclic diagram of the five-phase LLMOps lifecycle: Ship (deploy canary), Observe (traces, metrics, logs), Evaluate (sample and judge), Improve (prompt edits, model updates, data fixes), and Retrain/fine-tune, arranged in a clockwise loop with a wider closing arrow from Retrain back to Ship and a traveling pulse indicating the continuous, never-ending improvement cycle.">
<defs>
  <marker id="llc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#7c3aed)"/>
  </marker>
  <marker id="llc-arrow-close" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#7c3aed)"/>
  </marker>
  <filter id="llc-glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<style>
  #fig-obs-llmops-lifecycle-loop text { font-family: var(--sans,sans-serif); }
  #fig-obs-llmops-lifecycle-loop .node-title { font: 700 13px var(--sans,sans-serif); fill: var(--ink,#1a1a1a); }
  #fig-obs-llmops-lifecycle-loop .node-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-obs-llmops-lifecycle-loop .badge-num { font: 700 11px var(--sans,sans-serif); fill: #fff; }
  #fig-obs-llmops-lifecycle-loop .center-title { font: 700 15px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-obs-llmops-lifecycle-loop .center-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-obs-llmops-lifecycle-loop .close-label { font: 600 9.5px var(--sans,sans-serif); fill: var(--accent-2,#7c3aed); letter-spacing: .2px; }

  /* traveling pulse dot */
  #fig-obs-llmops-lifecycle-loop .pulse-dot {
    r: 7;
    fill: var(--accent,#7c3aed);
    filter: url(#llc-glow);
    opacity: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    #fig-obs-llmops-lifecycle-loop .pulse-dot { display: none; }
  }
</style>


<circle cx="410" cy="270" r="160" fill="none" stroke="var(--border-2,rgba(0,0,0,0.06))" stroke-width="1.5" stroke-dasharray="6 6"/>


<g data-anim="1">
  <text x="410" y="258" text-anchor="middle" class="center-title">LLMOps</text>
  <text x="410" y="273" text-anchor="middle" class="center-title">Lifecycle</text>
  <text x="410" y="292" text-anchor="middle" class="center-sub">continuous improvement</text>
  <text x="410" y="305" text-anchor="middle" class="center-sub">flywheel</text>
</g>



<g data-anim="3">
  <path d="M 278,102 Q 370,68 480,100" fill="none" stroke="var(--accent,#7c3aed)" stroke-width="1.8" marker-end="url(#llc-arrow)"/>
</g>


<g data-anim="3">
  <path d="M 598,152 Q 668,220 648,278" fill="none" stroke="var(--accent,#7c3aed)" stroke-width="1.8" marker-end="url(#llc-arrow)"/>
</g>


<g data-anim="3">
  <path d="M 608,340 Q 562,400 508,393" fill="none" stroke="var(--accent,#7c3aed)" stroke-width="1.8" marker-end="url(#llc-arrow)"/>
</g>


<g data-anim="3">
  <path d="M 308,418 Q 264,410 222,348" fill="none" stroke="var(--accent,#7c3aed)" stroke-width="1.8" marker-end="url(#llc-arrow)"/>
</g>


<g data-anim="3">
  
  <path d="M 150,266 Q 78,195 140,140" fill="none" stroke="var(--accent-2,#7c3aed)" stroke-width="2.6" marker-end="url(#llc-arrow-close)"/>
  <text x="45" y="196" text-anchor="middle" class="close-label">closes</text>
  <text x="45" y="208" text-anchor="middle" class="close-label">the loop</text>
</g>



<g data-anim="2">
  <rect x="108" y="82" width="164" height="58" rx="8" fill="var(--surface,#fff)" stroke="none"/>
  <rect x="108" y="82" width="164" height="58" rx="8" fill="var(--accent-soft,rgba(124,58,237,0.12))" fill-opacity="0.6" stroke="var(--accent,#7c3aed)" stroke-width="1.6"/>
  <circle cx="122" cy="90" r="10" fill="var(--accent,#7c3aed)"/>
  <text x="122" y="94" text-anchor="middle" class="badge-num">1</text>
  <text x="196" y="107" text-anchor="middle" class="node-title">Ship</text>
  <text x="196" y="123" text-anchor="middle" class="node-sub">deploy canary</text>
</g>


<g data-anim="2">
  <rect x="488" y="82" width="170" height="66" rx="8" fill="var(--surface,#fff)" stroke="none"/>
  <rect x="488" y="82" width="170" height="66" rx="8" fill="var(--accent-soft,rgba(124,58,237,0.12))" fill-opacity="0.6" stroke="var(--accent,#7c3aed)" stroke-width="1.6"/>
  <circle cx="502" cy="90" r="10" fill="var(--accent,#7c3aed)"/>
  <text x="502" y="94" text-anchor="middle" class="badge-num">2</text>
  <text x="573" y="106" text-anchor="middle" class="node-title">Observe</text>
  <text x="573" y="120" text-anchor="middle" class="node-sub">traces, metrics,</text>
  <text x="573" y="133" text-anchor="middle" class="node-sub">logs</text>
</g>


<g data-anim="2">
  <rect x="574" y="286" width="164" height="60" rx="8" fill="var(--surface,#fff)" stroke="none"/>
  <rect x="574" y="286" width="164" height="60" rx="8" fill="var(--accent-soft,rgba(124,58,237,0.12))" fill-opacity="0.6" stroke="var(--accent,#7c3aed)" stroke-width="1.6"/>
  <circle cx="588" cy="294" r="10" fill="var(--accent,#7c3aed)"/>
  <text x="588" y="298" text-anchor="middle" class="badge-num">3</text>
  <text x="656" y="311" text-anchor="middle" class="node-title">Evaluate</text>
  <text x="656" y="327" text-anchor="middle" class="node-sub">sample + judge</text>
</g>


<g data-anim="2">
  <rect x="270" y="400" width="274" height="70" rx="8" fill="var(--surface,#fff)" stroke="none"/>
  <rect x="270" y="400" width="274" height="70" rx="8" fill="var(--accent-soft,rgba(124,58,237,0.12))" fill-opacity="0.6" stroke="var(--accent,#7c3aed)" stroke-width="1.6"/>
  <circle cx="284" cy="408" r="10" fill="var(--accent,#7c3aed)"/>
  <text x="284" y="412" text-anchor="middle" class="badge-num">4</text>
  <text x="407" y="424" text-anchor="middle" class="node-title">Improve</text>
  <text x="407" y="439" text-anchor="middle" class="node-sub">prompt edits, model updates,</text>
  <text x="407" y="453" text-anchor="middle" class="node-sub">data fixes</text>
</g>


<g data-anim="2">
  <rect x="68" y="272" width="170" height="68" rx="8" fill="var(--surface,#fff)" stroke="none"/>
  <rect x="68" y="272" width="170" height="68" rx="8" fill="var(--accent-soft,rgba(124,58,237,0.12))" fill-opacity="0.6" stroke="var(--accent,#7c3aed)" stroke-width="1.6"/>
  <circle cx="82" cy="280" r="10" fill="var(--accent,#7c3aed)"/>
  <text x="82" y="284" text-anchor="middle" class="badge-num">5</text>
  <text x="153" y="298" text-anchor="middle" class="node-title">Retrain /</text>
  <text x="153" y="312" text-anchor="middle" class="node-title">fine-tune</text>
  <text x="153" y="328" text-anchor="middle" class="node-sub">new model weights</text>
</g>



<circle class="pulse-dot" cx="0" cy="0">
  <animateMotion
    dur="6s"
    repeatCount="indefinite"
    calcMode="spline"
    keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    path="M 210,111 Q 370,68 550,105 Q 668,220 648,310 Q 590,395 440,430 Q 260,430 222,348 Q 150,300 150,266 Q 78,195 140,140 Q 165,120 210,111"
    begin="0s"
  />
  <animate attributeName="opacity" values="0;1;1;1;1;1;1;0;0" keyTimes="0;0.04;0.25;0.45;0.62;0.78;0.94;0.97;1" dur="6s" repeatCount="indefinite"/>
</circle>

</svg>
<figcaption><b>The LLMOps lifecycle is a never-ending improvement loop.</b> Each phase feeds the next: shipping a canary generates observations, observations feed evaluations, evaluations surface improvements, improvements drive retraining, and the newly trained model ships again — the heavier arrow from Retrain back to Ship marks that closing hand-off, turning the sequence into a continuous flywheel that accumulates quality gains over time.</figcaption>
</figure>
