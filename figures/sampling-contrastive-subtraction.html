<figure class="viz" id="fig-sampling-contrastive-subtraction">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 700 470" role="img" aria-label="Three bar-chart panels over the same five candidate tokens A through E. Panel 1 shows expert log-probabilities where the shared-favorite token A and the distinctive token B are both high. Panel 2 shows amateur or premature-layer log-probabilities where A is still high but B is now low. Panel 3 shows the contrastive score, expert minus amateur, where A collapses to zero because both models agreed on it, while B rises to the highest score and wins because the expert prefers it much more than the amateur does.">
<defs>

<style>

  #fig-sampling-contrastive-subtraction .ann-b     { fill: var(--good,#2f9e6e); }

<text x="350" y="18" text-anchor="middle" class="note">Same 5 candidate next-tokens in every panel.</text>
<text x="350" y="31" text-anchor="middle" class="note">Taller bar = higher probability (less negative log P).</text>

  <text x="342" y="79" text-anchor="middle" class="p-sub">(premature layer / small model)</text>

  <line x1="248" y1="280" x2="438" y2="280" class="base"/>

  <rect x="258" y="112" width="24" height="168" rx="2" class="bar-a"/>
  <rect x="294" y="252" width="24" height="28"  rx="2" class="bar-b"/>
  <rect x="330" y="168" width="24" height="112" rx="2" class="bar-o"/>

  <line x1="52"  y1="112" x2="270" y2="112"/>

<g data-anim="3">
  <text x="560" y="65" text-anchor="middle" class="p-title">3. Contrastive score</text>
  <text x="560" y="79" text-anchor="middle" class="p-sub">= expert - amateur</text>

  <line x1="466" y1="280" x2="656" y2="280" class="base"/>
  <text x="470" y="292" text-anchor="start" class="zlbl">0</text>

  
  <rect x="476" y="276" width="24" height="4" rx="1" class="bar-a"/>

  <line x1="270" y1="112" x2="488" y2="278"/>

<g data-anim="4">
  <text x="524" y="150" text-anchor="middle" class="ann ann-b">expert prefers over amateur</text>
  <text x="524" y="163" text-anchor="middle" class="ann ann-b">-&gt; amplified</text>
  <line x1="524" y1="169" x2="524" y2="196" class="guide" stroke="var(--good,#2f9e6e)" opacity=".55" marker-end="url(#scs-chev)"/>
</g>


<g data-anim="4">
  <text x="488" y="332" text-anchor="middle" class="ann ann-a">fluent but not distinctive</text>
  <text x="488" y="345" text-anchor="middle" class="ann ann-a">-&gt; cancels</text>
  <line x1="488" y1="286" x2="488" y2="320" class="guide" stroke="var(--warn,#e0a106)" opacity=".55" marker-end="url(#scs-chev)"/>

<g data-anim="5">
  <rect x="112" y="368" width="476" height="60" rx="10"
        fill="var(--surface,#f8fafc)" stroke="var(--border-2,#94a3b8)" stroke-width="1" opacity="0.9"/>
  <circle cx="134" cy="388" r="4" class="bar-o" opacity="1"/>
  <text x="146" y="392" class="foot">amateur = smaller / weaker model</text>
  <text x="392" y="392" class="foot-tag">(Contrastive Decoding)</text>
  <circle cx="134" cy="408" r="4" class="bar-o" opacity="1"/>
  <text x="146" y="412" class="foot">amateur = premature layer of the SAME model</text>
  <text x="480" y="412" class="foot-tag">(DoLa)</text>
</g>

</svg>
<figcaption><b>Subtracting a weaker distribution cancels what both models agree on and amplifies what only the expert knows.</b> Token A is a fluent-but-generic completion that both the expert and the amateur (or premature layer) rate highly, so <code>expert - amateur</code> collapses it toward zero. Token B is the distinctive, knowledge-bearing choice: the expert prefers it much more than the amateur does, so the contrastive score amplifies it into the winner — the same mechanism whether the amateur is a separate, weaker model (Contrastive Decoding) or an early layer of the same model (DoLa).</figcaption>
</figure>
