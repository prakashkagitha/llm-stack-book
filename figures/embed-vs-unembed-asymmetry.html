<text x="40" y="604" style="font:400 10px var(--sans,sans-serif)" fill="var(--muted,#888)">This asymmetry is a subtlety the optimizer's per-row moment estimates must absorb (see Gradient Scaling above).</text>

</svg>
<figcaption><b>Embed and unembed are mirror-image operations on vocabulary-sized data: one is cheap and sparse, the other is expensive and dense.</b> The token embedding lookup is an O(T&#183;d) index-select whose backward pass touches only the rows for tokens actually in the batch; the unembed logit projection is an O(T&#183;V&#183;d) dense matmul whose backward pass updates every row of the vocabulary matrix. When the two matrices are tied, frequent tokens are shaped mainly by the dense unembed gradient while rare tokens rely on the sparse embed gradient to be heard at all.</figcaption>
</figure>
