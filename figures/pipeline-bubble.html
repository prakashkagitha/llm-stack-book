<figcaption><b>Microbatching fills the pipe and shrinks the bubble.</b> Each stage <span class="frac">S0..S3</span> runs microbatches as a diagonal of forward (then backward) cells; the hatched <b>fill + drain</b> triangles are idle "bubble" time. Those wasted triangles are a fixed size set by the pipeline depth <span class="frac">p</span>, so adding more microbatches <span class="frac">m</span> dilutes them &#8212; the bubble fraction <span class="frac">(p-1)/(m+p-1)</span> falls from 60% at <span class="frac">m=2</span> to 33% at <span class="frac">m=6</span>, and keeps shrinking as <span class="frac">m &#8811; p</span>.</figcaption>
