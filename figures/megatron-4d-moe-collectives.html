<text x="18" y="478" class="sm">Rule: TP within node; PP/EP span nodes; DP is outermost — match each collective to its network tier</text>
<text x="18" y="494" class="sm">Config: DP=4, TP=4, PP=4, EP=2  on 128 GPUs = 16 nodes x 8 GPUs/node</text>

<figcaption><b>4-D parallelism on a 128-GPU MoE cluster assigns each of its four communication collectives to a different network tier.</b> TP all-reduce is the only collective on the forward-pass critical path and must stay on intra-node NVLink; PP pipeline sends, EP all-to-all token dispatch, and DP gradient sync all cross InfiniBand but are latency-tolerant or overlappable with compute. The EP all-to-all volume scales with sequence length (S × H), not model size.</figcaption>
