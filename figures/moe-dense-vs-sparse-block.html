<figcaption><b>Dense FFN vs. Sparse MoE block.</b> A dense Transformer block passes every token through a single FFN using all parameters. A sparse MoE block routes each token through a learned router that selects only k of E experts; the selected experts run and their outputs are combined with learned gate weights g_e. Ghosted boxes are present in memory but never run for this token, decoupling total parameter count from per-token FLOPs.</figcaption>
</figure>
