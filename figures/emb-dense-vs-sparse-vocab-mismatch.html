<figure class="viz" id="fig-emb-dense-vs-sparse-vocab-mismatch">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 520" role="img" aria-label="Comparison of sparse and dense retrieval. Left: in a sparse BM25 vector space, query automobile and document car occupy different orthogonal dimensions, so their dot product is zero -- vocabulary mismatch -- while query car and document car share the same dimension and score above zero. Right: in a learned dense space, car, automobile, and vehicle cluster tightly together with high cosine similarity, while an unrelated word like banana sits far away.">
<style>
  #fig-emb-dense-vs-sparse-vocab-mismatch text{ fill:var(--ink-soft); }
  #fig-emb-dense-vs-sparse-vocab-mismatch .ttl{ font:700 13.5px var(--sans,sans-serif); }
  #fig-emb-dense-vs-sparse-vocab-mismatch .sub{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
  #fig-emb-dense-vs-sparse-vocab-mismatch .blk{ font:600 11px var(--sans,sans-serif); }
  #fig-emb-dense-vs-sparse-vocab-mismatch .row{ font:600 10px var(--mono,monospace); }
  #fig-emb-dense-vs-sparse-vocab-mismatch .col{ font:500 8.7px var(--mono,monospace); fill:var(--muted); }
  #fig-emb-dense-vs-sparse-vocab-mismatch .note{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
  #fig-emb-dense-vs-sparse-vocab-mismatch .pt{ font:600 10.5px var(--mono,monospace); }
  #fig-emb-dense-vs-sparse-vocab-mismatch .strip{ font:600 10.5px var(--sans,sans-serif); }
</style>

<rect x="6" y="6" width="768" height="508" rx="14" fill="none" class="v-grid" stroke="currentColor" stroke-width="1" opacity="0.35"/>


<g data-anim="1">
  <rect x="16" y="18" width="356" height="422" rx="12" class="v-fill v-stroke" stroke-width="1.3" opacity="0.55"/>
  <text x="194" y="42" text-anchor="middle" class="ttl">Sparse (BM25 / TF-IDF)</text>
  <text x="194" y="58" text-anchor="middle" class="sub">one axis per vocabulary term -- near-orthogonal</text>
  <text x="194" y="71" text-anchor="middle" class="sub">(5 of V dims shown; V often 30k+)</text>

  
  <text x="30" y="94" class="blk">Mismatch: query "automobile" vs doc "car"</text>

  
  <text x="43" y="112" text-anchor="end" class="row">q:</text>
  <rect x="47" y="99" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="107" y="99" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="167" y="99" width="54" height="26" rx="4" class="v-accent" fill="currentColor" opacity="0.85"/>
  <rect x="227" y="99" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="287" y="99" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <text x="194" y="115" text-anchor="middle" style="font:700 10.5px var(--mono,monospace)" fill="var(--surface,#fff)">1</text>

  
  <text x="43" y="146" text-anchor="end" class="row">d:</text>
  <rect x="47" y="133" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="107" y="133" width="54" height="26" rx="4" class="v-accent" fill="currentColor" opacity="0.85"/>
  <rect x="167" y="133" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="227" y="133" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="287" y="133" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <text x="134" y="149" text-anchor="middle" style="font:700 10.5px var(--mono,monospace)" fill="var(--surface,#fff)">1</text>

  <text x="74" y="176" text-anchor="middle" class="col">vehicle</text>
  <text x="134" y="176" text-anchor="middle" class="col">car</text>
  <text x="194" y="176" text-anchor="middle" class="col">automobile</text>
  <text x="254" y="176" text-anchor="middle" class="col">engine</text>
  <text x="314" y="176" text-anchor="middle" class="col">tire</text>

  <text x="194" y="196" text-anchor="middle" class="note">no shared filled dim -&gt; dot product = 0</text>
  <text x="194" y="211" text-anchor="middle" class="note">(vocabulary mismatch)</text>

  <line x1="30" y1="226" x2="358" y2="226" class="v-grid" stroke="currentColor" stroke-width="1" opacity="0.5"/>

  
  <text x="30" y="250" class="blk">Match: query "car" vs doc "car"</text>

  
  <text x="43" y="268" text-anchor="end" class="row">q:</text>
  <rect x="47" y="255" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="107" y="255" width="54" height="26" rx="4" class="v-accent" fill="currentColor" opacity="0.85"/>
  <rect x="167" y="255" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="227" y="255" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="287" y="255" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <text x="134" y="271" text-anchor="middle" style="font:700 10.5px var(--mono,monospace)" fill="var(--surface,#fff)">1</text>

  
  <text x="43" y="302" text-anchor="end" class="row">d:</text>
  <rect x="47" y="289" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="107" y="289" width="54" height="26" rx="4" class="v-accent" fill="currentColor" opacity="0.85"/>
  <rect x="167" y="289" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="227" y="289" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="287" y="289" width="54" height="26" rx="4" class="v-grid" fill="none" stroke="currentColor" stroke-width="1"/>
  <text x="134" y="305" text-anchor="middle" style="font:700 10.5px var(--mono,monospace)" fill="var(--surface,#fff)">1</text>

  
  <path d="M 134 281 v 8" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6"/>

  <text x="74" y="322" text-anchor="middle" class="col">vehicle</text>
  <text x="134" y="322" text-anchor="middle" class="col">car</text>
  <text x="194" y="322" text-anchor="middle" class="col">automobile</text>
  <text x="254" y="322" text-anchor="middle" class="col">engine</text>
  <text x="314" y="322" text-anchor="middle" class="col">tire</text>

  <text x="194" y="342" text-anchor="middle" class="note">shared filled dim -&gt; dot product &gt; 0</text>
  <text x="194" y="357" text-anchor="middle" class="note">(exact token overlap)</text>

  <text x="194" y="404" text-anchor="middle" class="sub">sparse only fires on exact token overlap --</text>
  <text x="194" y="420" text-anchor="middle" class="sub">synonyms and paraphrases score zero</text>
</g>


<g data-anim="2">
  <rect x="406" y="18" width="356" height="422" rx="12" class="v-fill v-stroke" stroke-width="1.3" opacity="0.55"/>
  <text x="584" y="42" text-anchor="middle" class="ttl">Dense (learned)</text>
  <text x="584" y="58" text-anchor="middle" class="sub">2D projection of a continuous semantic space</text>
  <text x="584" y="71" text-anchor="middle" class="sub">(illustrative geometry, not to scale)</text>

  <rect x="428" y="88" width="312" height="272" rx="10" class="v-grid" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/>

  
  <ellipse cx="622" cy="243" rx="66" ry="54" fill="none" class="v-muted" stroke="currentColor" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>

  
  <line x1="585" y1="258" x2="620" y2="228" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6"/>
  <line x1="537" y1="217" x2="578" y2="240" fill="none" class="v-muted" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>
  <text x="500" y="207" text-anchor="middle" class="note" fill="var(--accent)">high cosine</text>
  <text x="500" y="221" text-anchor="middle" class="note" fill="var(--accent)">similarity</text>

  
  <circle cx="620" cy="228" r="4.5" class="v-accent" fill="currentColor"/>
  <text x="636" y="220" text-anchor="start" class="pt">car (doc)</text>

  
  <circle cx="585" cy="258" r="4.5" fill="var(--surface)" class="v-accent-s" stroke="var(--accent)" stroke-width="2"/>
  <text x="568" y="298" text-anchor="middle" class="pt">automobile</text>
  <text x="568" y="312" text-anchor="middle" class="pt">(query)</text>

  
  <circle cx="660" cy="272" r="3.6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="676" y="278" text-anchor="start" class="pt">vehicle</text>

  
  <circle cx="465" cy="120" r="3.6" class="v-muted" fill="currentColor" opacity="0.7"/>
  <text x="465" y="140" text-anchor="middle" class="pt v-muted" fill="var(--muted)">banana</text>
  <text x="465" y="153" text-anchor="middle" class="note">(unrelated)</text>

  <text x="584" y="384" text-anchor="middle" class="note">car, automobile, vehicle cluster tightly;</text>
  <text x="584" y="400" text-anchor="middle" class="note">banana sits far away -- meaning, not</text>
  <text x="584" y="416" text-anchor="middle" class="note">spelling, sets distance in this space</text>
</g>


<g data-anim="3">
  <rect x="16" y="450" width="356" height="56" rx="8" class="v-fill v-stroke" stroke-width="1" opacity="0.6"/>
  <text x="194" y="472" text-anchor="middle" class="strip">sparse: exact-match, inverted index,</text>
  <text x="194" y="490" text-anchor="middle" class="strip">cheap</text>

  <rect x="406" y="450" width="356" height="56" rx="8" class="v-fill v-stroke" stroke-width="1" opacity="0.6"/>
  <text x="584" y="472" text-anchor="middle" class="strip">dense: semantic, needs ANN scan /</text>
  <text x="584" y="490" text-anchor="middle" class="strip">index (next chapter)</text>
</g>

</svg>
<figcaption><b>Sparse retrieval scores exact token overlap; dense retrieval scores learned meaning.</b> In a BM25-style vector space, "automobile" and "car" live on different orthogonal dimensions, so their dot product is exactly zero — the vocabulary mismatch problem — while "car" matched against "car" shares a dimension and scores above zero. In a trained dense space there is no such cliff: "car," "automobile," and "vehicle" land close together regardless of surface form, while an unrelated word like "banana" sits far away, at the cost of needing an ANN index rather than an inverted index.</figcaption>
</figure>
