<figure class="viz" id="fig-gqa-projection-and-repeat">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 590" role="img" aria-label="GQA mechanism: W_q is a wide projection producing 8 query heads, while W_k and W_v are narrow projections producing only 2 KV heads each that get cached; repeat_kv then broadcasts each of the 2 KV heads 4 times to align with the 8 query heads before scaled dot-product attention.">

    #fig-gqa-projection-and-repeat .hd { font: 700 9.5px var(--mono,monospace); text-anchor: middle; }
    #fig-gqa-projection-and-repeat .tag { font: 500 8.5px var(--sans,sans-serif); fill: var(--muted); font-style: italic; }
    #fig-gqa-projection-and-repeat .note { font: 400 8.3px var(--mono,monospace); fill: var(--muted); }

    #fig-gqa-projection-and-repeat .qbox { fill: var(--v-fill); stroke: var(--accent); stroke-width: 1.3; }

  <text x="575" y="26" text-anchor="middle" class="stage-hdr" style="font-size:10px">STAGE 2 &#8212; repeat_kv broadcast (no-copy expand)</text>

    <rect x="15" y="192" width="95" height="40" rx="7" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>
    <text x="62" y="209" text-anchor="middle" class="lbl" style="font-size:10.5px">h_t</text>
    <text x="62" y="223" text-anchor="middle" class="sub">(B, L, d_model)</text>

    <path d="M110 205 L135 108" class="arr"/>
    <path d="M110 212 L135 176" class="arr"/>
    <path d="M110 222 L135 316" class="arr"/>

      <rect x="441" y="88" width="38" height="40" rx="5" class="qbox"/>

      <g class="hd" fill="var(--accent)">
        <text x="414" y="112">q0</text><text x="460" y="112">q1</text>

        <text x="598" y="112">q4</text><text x="644" y="112">q5</text>
        <text x="690" y="112">q6</text><text x="736" y="112">q7</text>

    </g>
    <text x="470" y="145" class="grouplbl">(B, h, L, d_h),  h = 8</text>
  </g>


  <g data-anim="3">
    <rect x="135" y="160" width="42" height="32" rx="6" class="proj-box"/>
    <text x="156" y="180" text-anchor="middle" class="lbl" style="font-size:9px">W_k</text>
    <path d="M177 176 L197 176" class="arr"/>

    <text x="258" y="152" text-anchor="middle" class="tag">cached, g = 2</text>
    <rect x="200" y="160" width="55" height="32" rx="5" class="kbox"/>
    <rect x="262" y="160" width="55" height="32" rx="5" class="kbox"/>
    <g class="hd" fill="var(--accent2,#3b82f6)">
      <text x="227" y="180">k0</text><text x="289" y="180">k1</text>

    <path d="M227 192 L414 250" class="fan"/>
    <path d="M227 192 L460 250" class="fan"/>
    <path d="M227 192 L506 250" class="fan"/>
    <path d="M227 192 L552 250" class="fan"/>
    <path d="M289 192 L598 250" class="fan"/>
    <path d="M289 192 L644 250" class="fan"/>
    <path d="M289 192 L690 250" class="fan"/>
    <path d="M289 192 L736 250" class="fan"/>
    <text x="575" y="201" text-anchor="middle" class="note">query head j uses KV group j // n_rep</text>


    <rect x="395" y="250" width="38" height="36" rx="5" class="kbox"/>
    <rect x="441" y="250" width="38" height="36" rx="5" class="kbox"/>
    <rect x="487" y="250" width="38" height="36" rx="5" class="kbox"/>
    <rect x="533" y="250" width="38" height="36" rx="5" class="kbox"/>
    <rect x="579" y="250" width="38" height="36" rx="5" class="kbox"/>
    <rect x="625" y="250" width="38" height="36" rx="5" class="kbox"/>
    <rect x="671" y="250" width="38" height="36" rx="5" class="kbox"/>
    <rect x="717" y="250" width="38" height="36" rx="5" class="kbox"/>
    <g class="hd" fill="var(--accent2,#3b82f6)">
      <text x="414" y="272">k0</text><text x="460" y="272">k0</text>
      <text x="506" y="272">k0</text><text x="552" y="272">k0</text>
      <text x="598" y="272">k1</text><text x="644" y="272">k1</text>
      <text x="690" y="272">k1</text><text x="736" y="272">k1</text>
    </g>
    <text x="470" y="300" class="grouplbl">(B, h, L, d_h) via broadcast</text>
  </g>


  <g>
    <text x="118" y="248" class="note">W_k / W_v output g*d_h, not d_model:</text>
    <text x="118" y="261" class="note">smaller matrix = the parameter AND</text>
    <text x="118" y="274" class="note">cache saving; only k0,k1 / v0,v1 cached.</text>
  </g>


  <g data-anim="4">
    <rect x="135" y="330" width="42" height="32" rx="6" class="proj-box"/>
    <text x="156" y="350" text-anchor="middle" class="lbl" style="font-size:9px">W_v</text>
    <path d="M177 346 L197 346" class="arr"/>

    <text x="258" y="322" text-anchor="middle" class="tag">cached, g = 2</text>
    <rect x="200" y="330" width="55" height="32" rx="5" class="vbox"/>
    <rect x="262" y="330" width="55" height="32" rx="5" class="vbox"/>
    <g class="hd" fill="var(--good,#2f9e6e)">
      <text x="227" y="350">v0</text><text x="289" y="350">v1</text>
    </g>


    <path d="M227 362 L414 420" class="fan"/>
    <path d="M227 362 L460 420" class="fan"/>
    <path d="M227 362 L506 420" class="fan"/>
    <path d="M227 362 L552 420" class="fan"/>
    <path d="M289 362 L598 420" class="fan"/>
    <path d="M289 362 L644 420" class="fan"/>
    <path d="M289 362 L690 420" class="fan"/>
    <path d="M289 362 L736 420" class="fan"/>


    <rect x="395" y="420" width="38" height="36" rx="5" class="vbox"/>
    <rect x="441" y="420" width="38" height="36" rx="5" class="vbox"/>
    <rect x="487" y="420" width="38" height="36" rx="5" class="vbox"/>
    <rect x="533" y="420" width="38" height="36" rx="5" class="vbox"/>
    <rect x="579" y="420" width="38" height="36" rx="5" class="vbox"/>
    <rect x="625" y="420" width="38" height="36" rx="5" class="vbox"/>
    <rect x="671" y="420" width="38" height="36" rx="5" class="vbox"/>

      <text x="414" y="442">v0</text><text x="460" y="442">v0</text>
      <text x="506" y="442">v0</text><text x="552" y="442">v0</text>
      <text x="598" y="442">v1</text><text x="644" y="442">v1</text>
      <text x="690" y="442">v1</text><text x="736" y="442">v1</text>
    </g>

    <line x1="575" y1="128" x2="575" y2="480" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#gpr-arrow)"/>
    <circle cx="575" cy="268" r="3.2" fill="var(--accent2,#3b82f6)"/>
    <circle cx="575" cy="438" r="3.2" fill="var(--good,#2f9e6e)"/>

    <rect x="465" y="480" width="220" height="54" rx="8" class="v-fill" stroke="var(--accent)" stroke-width="1.6"/>
    <text x="575" y="502" text-anchor="middle" style="font:700 10.5px var(--mono,monospace)">scaled_dot_product_attention</text>
    <text x="575" y="518" text-anchor="middle" class="sub" style="font-size:9.5px">-&gt; (B, h, L, d_h)</text>
  </g>


  <text x="400" y="560" text-anchor="middle" class="legend" style="font-size:10px">stored / cached = g heads (small)&#160;&#160;&#160;-&#160;&#160;&#160;fed to kernel = h heads (via broadcast)</text>
</svg>
<figcaption><b>The two load-bearing facts of GQA: narrow K/V projections, and a cheap broadcast.</b> W_q projects to the full h*d_h width (8 query heads), but W_k and W_v project only to g*d_h (2 KV heads) &#8212; a visibly smaller matrix, which is exactly what shrinks both the parameter count and the cache. Only k0, k1, v0, v1 are ever cached; <code>repeat_kv</code> then broadcasts each cached KV head n_rep=4 times (a no-copy expand) so shapes align with the 8 query heads before <code>scaled_dot_product_attention</code> runs.</figcaption>
</figure>
