<figure class="viz" id="fig-cfg-extrapolation-vectors">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 720 470" role="img" aria-label="Diagram in noise-prediction space showing classifier-free guidance as vector extrapolation: from x_t, an arrow to the unconditional prediction eps_null, an arrow to the conditional prediction eps_cond, and a single line continuing from eps_null through eps_cond and overshooting to eps_guided for guidance scale w greater than 1.">
<style>
  #fig-cfg-extrapolation-vectors text        { fill: var(--ink-soft,#45413a); }
  #fig-cfg-extrapolation-vectors .ttl        { font: 700 15px var(--sans,sans-serif); fill: var(--ink,#211f1b); }
  #fig-cfg-extrapolation-vectors .sub        { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-cfg-extrapolation-vectors .tag        { font: 700 12.5px var(--sans,sans-serif); }
  #fig-cfg-extrapolation-vectors .tick       { font: 700 10px var(--mono,monospace); }
  #fig-cfg-extrapolation-vectors .legend     { font: 500 11.5px var(--sans,sans-serif); }
  #fig-cfg-extrapolation-vectors .small      { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-cfg-extrapolation-vectors .mono       { font: 700 11px var(--mono,monospace); }
  #fig-cfg-extrapolation-vectors .dot        { fill: var(--ink-soft,#45413a); }
  #fig-cfg-extrapolation-vectors .grid       { stroke: var(--v-grid,#d8d1c0); stroke-width: 1; opacity: 0.5; }
  @keyframes cfgDraw { from { stroke-dashoffset: var(--len); } to { stroke-dashoffset: 0; } }
  #fig-cfg-extrapolation-vectors .viz-draw   { stroke-dasharray: var(--len); animation: cfgDraw 0.9s ease-out forwards; }
  #fig-cfg-extrapolation-vectors [data-anim] { opacity: 0; animation: cfgFade 0.5s ease-out forwards; }
  #fig-cfg-extrapolation-vectors [data-anim="1"] { animation-delay: 0s; }
  #fig-cfg-extrapolation-vectors [data-anim="2"] { animation-delay: 0.35s; }
  #fig-cfg-extrapolation-vectors [data-anim="3"] { animation-delay: 1.0s; }
  #fig-cfg-extrapolation-vectors [data-anim="4"] { animation-delay: 1.4s; }
  @keyframes cfgFade { to { opacity: 1; } }
</style>

<text x="20" y="24" class="ttl">Classifier-free guidance: extrapolating past the conditional prediction</text>
<text x="20" y="41" class="sub">Prediction space (noise-prediction / epsilon space) -- not pixel or latent space</text>

<line class="grid" x1="40" y1="55" x2="40" y2="258"/>
<line class="grid" x1="40" y1="258" x2="690" y2="258"/>

<defs>
  <marker id="cfgArrowMuted" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--muted,#6d675d)"/>
  </marker>
  <marker id="cfgArrowAccent" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent,#c15b39)"/>
  </marker>
  <marker id="cfgArrowAccent2" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
    <path d="M0,1 L8,4.5 L0,8 Z" fill="var(--accent2,#3b82f6)"/>
  </marker>
  <marker id="cfgArrowGuided" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
    <path d="M0,1 L11,6 L0,11 Z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>

<g data-anim="1">
  <circle cx="90" cy="230" r="4.5" class="dot"/>
  <text x="90" y="253" text-anchor="middle" class="tag">x_t</text>
</g>

<g data-anim="2">
  <line x1="90" y1="230" x2="243" y2="153" stroke="var(--muted,#6d675d)" stroke-width="2.5" marker-end="url(#cfgArrowMuted)"/>
  <circle cx="250" cy="150" r="4" fill="var(--muted,#6d675d)"/>
  <text x="230" y="136" text-anchor="end" class="tag" fill="var(--muted,#6d675d)">eps_null</text>
  <text x="250" y="170" text-anchor="middle" class="tick">w=0</text>
</g>

<g data-anim="2">
  <line x1="90" y1="230" x2="393" y2="131" stroke="var(--accent,#c15b39)" stroke-width="2.5" marker-end="url(#cfgArrowAccent)"/>
  <circle cx="400" cy="128" r="4" fill="var(--accent,#c15b39)"/>
  <text x="400" y="112" text-anchor="middle" class="tag" fill="var(--accent,#c15b39)">eps_cond</text>
  <text x="400" y="148" text-anchor="middle" class="tick">w=1</text>
</g>

<g data-anim="3">
  <line x1="255" y1="149" x2="393" y2="129" stroke="var(--accent2,#3b82f6)" stroke-width="3.5" marker-end="url(#cfgArrowAccent2)"/>
</g>

<g data-anim="4">
  <line x1="401" y1="127" x2="540" y2="107" stroke="var(--accent,#c15b39)" stroke-width="4.5" marker-end="url(#cfgArrowGuided)" class="viz-draw" style="--len:145"/>
  <circle cx="550" cy="106" r="5" fill="var(--accent,#c15b39)"/>
  <text x="563" y="103" text-anchor="start" class="tag" fill="var(--accent,#c15b39)">eps_guided</text>
  <text x="550" y="125" text-anchor="middle" class="tick" fill="var(--accent,#c15b39)">w&gt;1</text>
</g>

<g data-anim="4">
  <rect x="20" y="276" width="670" height="120" rx="6" fill="var(--surface-3,#ece7da)" fill-opacity="0.3" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>

  <line x1="36" y1="296" x2="60" y2="296" stroke="var(--muted,#6d675d)" stroke-width="2.5"/>
  <text x="68" y="300" class="legend"><tspan font-weight="700" fill="var(--muted,#6d675d)">eps_null:</tspan> unconditional prediction (null token), reached directly from x_t</text>

  <line x1="36" y1="319" x2="60" y2="319" stroke="var(--accent,#c15b39)" stroke-width="2.5"/>
  <text x="68" y="323" class="legend"><tspan font-weight="700" fill="var(--accent,#c15b39)">eps_cond:</tspan> conditional prediction (prompt c), reached directly from x_t</text>

  <line x1="36" y1="342" x2="60" y2="342" stroke="var(--accent2,#3b82f6)" stroke-width="3.5"/>
  <text x="68" y="346" class="legend"><tspan font-weight="700" fill="var(--accent2,#3b82f6)">conditioning direction:</tspan> eps_cond - eps_null (the short vector CFG amplifies)</text>

  <line x1="36" y1="365" x2="60" y2="365" stroke="var(--accent,#c15b39)" stroke-width="4.5"/>
  <text x="68" y="369" class="legend"><tspan font-weight="700" fill="var(--accent,#c15b39)">eps_guided:</tspan> eps_null + w(eps_cond - eps_null) -- same line, continued past eps_cond for w &gt; 1</text>

  <text x="350" y="388" text-anchor="middle" class="small">Reading order: x_t (origin) -&gt; eps_null / eps_cond (w=0, w=1) -&gt; eps_guided (w&gt;1, overshoot)</text>
</g>

<g data-anim="4">
  <rect x="20" y="405" width="670" height="50" rx="6" fill="var(--surface-3,#ece7da)" fill-opacity="0.4" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="35" y="425" class="mono">small w</text>
  <text x="35" y="441" class="small">diverse, softer, closer to unconditional samples</text>
  <text x="460" y="425" class="mono" fill="var(--accent,#c15b39)">large w</text>
  <text x="460" y="441" class="small">prompt-faithful but over-saturated / "AI-ish" look</text>
</g>

</svg>
<figcaption><b>CFG is vector extrapolation in noise-prediction space, not a new prediction.</b> The guided prediction eps_guided = eps_null + w(eps_cond - eps_null) sits on the same line as eps_null (w=0) and eps_cond (w=1) -- w&gt;1 simply walks further along that line, past eps_cond, in the same conditioning direction. That is why cranking w too high sharpens prompt adherence at the cost of diversity and pushes samples toward over-saturated, "AI-ish" artifacts.</figcaption>
</figure>
