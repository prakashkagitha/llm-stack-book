<figure class="viz" id="fig-variance-propagation-three-regimes">
<button class="viz-replay" type="button">&#8635; replay</button>

<svg viewBox="0 0 760 530" role="img" aria-label="Line chart of signal standard deviation versus layer depth on a log scale, for a 50-layer network. With Var(W) too small, std collapses from 1 to about 10 to the minus 69 by layer 50. With Kaiming init, std stays flat at 1 across all 50 layers. With Var(W) too large, std explodes upward symmetrically, heading toward NaN. Anything not exactly a per-layer factor of 1, raised to the depth, runs away.">
<defs>
  <marker id="vpr-dot" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="6" markerHeight="6">
    <circle cx="4" cy="4" r="3.4" class="v-fill v-stroke" stroke-width="1.2"/>
  </marker>
</defs>
<style>
  #fig-variance-propagation-three-regimes .ax-title{ font:700 11px var(--sans,sans-serif); }
  #fig-variance-propagation-three-regimes .tick-lbl{ font:400 9.5px var(--mono,monospace); }
  #fig-variance-propagation-three-regimes .line-lbl{ font:700 11px var(--sans,sans-serif); }
  #fig-variance-propagation-three-regimes .sub-lbl{ font:400 9.5px var(--sans,sans-serif); }
  #fig-variance-propagation-three-regimes .end-note{ font:700 9.5px var(--mono,monospace); }
  #fig-variance-propagation-three-regimes .side-note{ font:400 9.5px var(--sans,sans-serif); }
  #fig-variance-propagation-three-regimes .side-note-h{ font:700 10px var(--sans,sans-serif); }
  #fig-variance-propagation-three-regimes .ref-lbl{ font:700 9.5px var(--mono,monospace); }
</style>


<g>
  
  <line x1="70" y1="383" x2="700" y2="383" class="v-grid" stroke-width="1"/>
  <text x="60" y="386" text-anchor="end" class="tick-lbl v-muted">10^-60</text>

  <line x1="70" y1="309" x2="700" y2="309" class="v-grid" stroke-width="1"/>
  <text x="60" y="312" text-anchor="end" class="tick-lbl v-muted">10^-30</text>

  <line x1="70" y1="161" x2="700" y2="161" class="v-grid" stroke-width="1"/>
  <text x="60" y="164" text-anchor="end" class="tick-lbl v-muted">10^30</text>

  <line x1="70" y1="87" x2="700" y2="87" class="v-grid" stroke-width="1"/>
  <text x="60" y="90" text-anchor="end" class="tick-lbl v-muted">10^60</text>

  
  <line x1="70" y1="235" x2="700" y2="235" class="v-stroke" stroke-width="1.6" stroke-dasharray="7 4"/>
  <text x="60" y="238" text-anchor="end" class="ref-lbl v-label">std=1</text>

  
  <line x1="70" y1="50" x2="70" y2="420" class="v-stroke" stroke-width="1.4"/>
  <line x1="70" y1="420" x2="700" y2="420" class="v-stroke" stroke-width="1.4"/>

  
  <line x1="70" y1="420" x2="70" y2="425" class="v-stroke" stroke-width="1.2"/>
  <text x="70" y="438" text-anchor="middle" class="tick-lbl v-muted">0</text>
  <line x1="196" y1="420" x2="196" y2="425" class="v-stroke" stroke-width="1.2"/>
  <text x="196" y="438" text-anchor="middle" class="tick-lbl v-muted">10</text>
  <line x1="322" y1="420" x2="322" y2="425" class="v-stroke" stroke-width="1.2"/>
  <text x="322" y="438" text-anchor="middle" class="tick-lbl v-muted">20</text>
  <line x1="448" y1="420" x2="448" y2="425" class="v-stroke" stroke-width="1.2"/>
  <text x="448" y="438" text-anchor="middle" class="tick-lbl v-muted">30</text>
  <line x1="574" y1="420" x2="574" y2="425" class="v-stroke" stroke-width="1.2"/>
  <text x="574" y="438" text-anchor="middle" class="tick-lbl v-muted">40</text>
  <line x1="700" y1="420" x2="700" y2="425" class="v-stroke" stroke-width="1.2"/>
  <text x="700" y="438" text-anchor="middle" class="tick-lbl v-muted">50</text>

  <text x="385" y="458" text-anchor="middle" class="ax-title v-label">layer index / depth</text>
  <text x="22" y="235" text-anchor="middle" class="ax-title v-label" transform="rotate(-90 22 235)">signal std (log scale)</text>
</g>


<g data-anim="1">
  <path d="M 70 235 L 700 65" fill="none" stroke="var(--muted,#8a8478)" stroke-width="2" stroke-dasharray="2 3" marker-end="url(#vpr-dot)"/>
  <text x="520" y="139" class="line-lbl v-muted">EXPLODE</text>
  <text x="520" y="152" class="sub-lbl v-muted">Var(W) too large -&gt; factor &gt; 1</text>
  <text x="694" y="55" text-anchor="end" class="end-note v-muted">gradients blow up -&gt; NaN</text>
</g>


<g data-anim="2">
  <path d="M 70 235 L 700 405" fill="none" class="v-stroke" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#vpr-dot)"/>
  <text x="430" y="292" class="line-lbl v-label">VANISH</text>
  <text x="430" y="305" class="sub-lbl v-muted">Var(W) too small -&gt; factor &lt; 1</text>
  <text x="694" y="416" text-anchor="end" class="end-note v-label">~10^-69: total collapse</text>
</g>


<g data-anim="3">
  <path d="M 70 235 L 700 235" fill="none" class="v-accent-s" stroke-width="2.6" marker-end="url(#vpr-dot)"/>
  <text x="330" y="222" text-anchor="middle" class="line-lbl v-accent">STABLE (Kaiming): Var(W) = 2 / d_in -&gt; factor = 1</text>
</g>


<g data-anim="4">
  <rect x="90" y="62" width="230" height="52" rx="8" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="102" y="80" class="side-note-h v-label">each layer multiplies std by</text>
  <text x="102" y="94" class="side-note v-muted">sqrt( d * Var(W) * 1/2 )</text>
  <text x="102" y="107" class="side-note v-muted">not exactly 1, raised to the depth, runs away</text>
</g>

</svg>
<figcaption><b>Three regimes, one multiplier.</b> Every layer scales the signal's standard deviation by roughly <code>sqrt(d * Var(W) * 1/2)</code>; Kaiming init tunes that factor to exactly 1, so 50 layers leave the signal near <code>std=1</code>, while a factor even slightly off 1 compounds geometrically into collapse or NaNs.</figcaption>
</figure>
