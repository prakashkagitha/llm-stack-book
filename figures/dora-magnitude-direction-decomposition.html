<figure class="viz" id="fig-dora-magnitude-direction-decomposition">
<svg viewBox="0 0 760 500" role="img" aria-label="Left panel: plain LoRA moves a weight vector W0 to a new vector W0 plus alpha over r times B A, changing direction and length together in one coupled low-rank step. Right panel: DoRA decomposes the same update into a unit-length direction on a dashed unit circle, whose angle is steered by the low-rank B A update, and a magnitude m, trained directly as a scalar, that scales the direction back out to the final weight W prime. At initialization B A is zero, so direction equals W0 and m equals the norm of W0, making W prime equal W0, a no-op.">
  <defs>
    <marker id="dmd-arr-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#94a3b8)"/>
    </marker>
    <marker id="dmd-arr-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6c8cff)"/>
    </marker>
  </defs>
  <style>
    #fig-dora-magnitude-direction-decomposition text { fill: var(--ink-soft,#e2e8f0); }
    #fig-dora-magnitude-direction-decomposition .ttl  { font:700 14px var(--sans,sans-serif); }
    #fig-dora-magnitude-direction-decomposition .lbl  { font:600 10.5px var(--sans,sans-serif); }
    #fig-dora-magnitude-direction-decomposition .lblm { font:600 10.5px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-dora-magnitude-direction-decomposition .lbla { font:700 10.5px var(--sans,sans-serif); fill:var(--accent,#6c8cff); }
    #fig-dora-magnitude-direction-decomposition .small{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-dora-magnitude-direction-decomposition .note { font:500 10.5px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-dora-magnitude-direction-decomposition .foot { font:600 10.5px var(--mono,monospace); }
  </style>

  <text x="190" y="30" text-anchor="middle" class="ttl">Plain LoRA</text>
  <text x="570" y="30" text-anchor="middle" class="ttl">DoRA</text>
  <line x1="380" y1="46" x2="380" y2="428" stroke="var(--border-2,#334155)" stroke-width="1.2" stroke-dasharray="4 4"/>

  
  <g data-anim="1">
    <circle cx="90" cy="380" r="2.6" fill="var(--muted,#94a3b8)"/>
    <text x="76" y="394" class="small">O</text>

    
    <path d="M 118.9,345.5 A 45,45 0 0,1 105.4,337.7" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1.1"/>

    
    <line x1="90" y1="380" x2="196" y2="252" stroke="var(--muted,#94a3b8)" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#dmd-arr-m)"/>
    <text x="203" y="248" class="lblm">W0</text>

    
    <line x1="90" y1="380" x2="164" y2="172" stroke="var(--accent,#6c8cff)" stroke-width="2.4" marker-end="url(#dmd-arr-a)"/>
    <text x="60" y="152" class="lbla">W0 + (alpha/r)BA</text>

    <text x="190" y="404" text-anchor="middle" class="note">direction and magnitude move together --</text>
    <text x="190" y="417" text-anchor="middle" class="note">one coupled low-rank step (often undershoots magnitude)</text>
  </g>

  
  <g data-anim="2">
    <path d="M 547.4,252.0 A 130,130 0 0,1 698.0,402.6" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="500" y="228" text-anchor="middle" class="small">unit sphere (radius = 1)</text>
    <circle cx="570" cy="380" r="2.6" fill="var(--muted,#94a3b8)"/>
    <text x="556" y="394" class="small">O</text>

    
    <line x1="570" y1="380" x2="654" y2="280" stroke="var(--muted,#94a3b8)" stroke-width="1.6" stroke-dasharray="4 3"/>
    <path d="M 654,280 A 130,130 0 0,1 614,258" fill="none" stroke="var(--accent,#6c8cff)" stroke-width="1.3"/>
    <text x="672" y="308" text-anchor="middle" class="small">BA nudges the</text>
    <text x="672" y="320" text-anchor="middle" class="small">angle (direction)</text>

    
    <line x1="570" y1="380" x2="614" y2="258" stroke="var(--accent,#6c8cff)" stroke-width="2.6"/>
    <circle cx="614" cy="258" r="3" fill="var(--surface,#0f172a)" stroke="var(--accent,#6c8cff)" stroke-width="1.6"/>
    <line x1="614" y1="258" x2="647" y2="169" stroke="var(--accent,#6c8cff)" stroke-width="2.6" marker-end="url(#dmd-arr-a)"/>
    <text x="660" y="168" class="lbla">W'</text>

    <text x="530" y="330" text-anchor="end" class="lbl">direction</text>
    <text x="530" y="342" text-anchor="end" class="small">(V / ||V||_c, unit length)</text>
    <line x1="533" y1="337" x2="592" y2="320" stroke="var(--muted,#94a3b8)" stroke-width="1"/>

    <text x="628" y="118" text-anchor="end" class="lbl">m (trained directly,</text>
    <text x="628" y="130" text-anchor="end" class="small">one scalar per column)</text>
    <line x1="625" y1="123" x2="633" y2="205" stroke="var(--muted,#94a3b8)" stroke-width="1"/>

    <text x="570" y="404" text-anchor="middle" class="note">"how big" (m) and "which way" (direction) are separated --</text>
    <text x="570" y="417" text-anchor="middle" class="note">m moves freely; direction gets the low-rank BA update</text>
  </g>

  
  <g data-anim="3">
    <rect x="40" y="438" width="680" height="46" rx="8" fill="var(--surface,#1e293b)" fill-opacity="0.4" stroke="var(--border-2,#334155)" stroke-width="1"/>
    <text x="380" y="458" text-anchor="middle" class="foot">at init: BA = 0  -&gt;  direction = W0,  m = ||W0||_c</text>
    <text x="380" y="474" text-anchor="middle" class="foot">-&gt;  W' = W0   (a no-op, same as plain LoRA's B = 0 init)</text>
  </g>
</svg>
<figcaption><b>DoRA decomposes a weight into a trained magnitude and a low-rank-adapted direction, instead of moving both at once.</b> Plain LoRA's <code>BA</code> update couples direction and length into a single low-rank step and tends to under-change magnitude; DoRA puts magnitude <code>m</code> under direct, unconstrained training while the low-rank update only has to steer direction on the unit sphere, more closely matching how full fine-tuning actually moves weights.</figcaption>
</figure>
