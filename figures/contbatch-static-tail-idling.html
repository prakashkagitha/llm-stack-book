<figcaption><b>Static batching wastes slots on tail idling.</b> Each row is a request; each cell is one decode step. Blue cells are useful work; hatched cells are wasted slot-steps where a finished request's slot sits idle until the straggler (req B) finishes at step 12. The animated cursor sweeps left to right and the live-request counter drops from 4 to 1 — showing how the effective batch drains to a single straggler. With 28 useful tokens out of 48 slot-steps, utilization is only 58%.</figcaption>
