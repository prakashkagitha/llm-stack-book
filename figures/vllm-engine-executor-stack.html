  </marker>
</defs>
<style>

</style>

<text x="409" y="322" text-anchor="middle" class="band-title">Executor  (single-GPU / Ray / multiproc / TP+PP)</text>
<text x="409" y="342" text-anchor="middle" class="note">abstracts where/how the model runs — broadcasts to all workers, gathers results</text>

<text x="150" y="450" text-anchor="middle" class="note">GPU 0 · shard + KV blocks</text>

      class="v-fill" stroke="var(--border-2,#bbb)" stroke-width="1.5" fill="var(--surface,#f5f6fa)"/>
<text x="659" y="432" text-anchor="middle" class="inner-title">Worker N-1</text>
<text x="659" y="450" text-anchor="middle" class="note">GPU N-1 · shard + KV blocks</text>



<rect x="30" y="474" width="749" height="70" rx="7"
      fill="var(--surface-3,#eef0f8)" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>


<text x="409" y="499" text-anchor="middle" class="inner-title" fill="var(--ink-soft,#444)">ModelRunner: build input tensors, run fwd, sample</text>

<rect x="30" y="530" width="749" height="14" rx="0"
      fill="var(--accent,#4f7cff)" fill-opacity="0.12" stroke="none"/>
<text x="409" y="542" text-anchor="middle" style="font:600 11px var(--sans,sans-serif); fill:var(--accent,#4f7cff)">Attention backend (FlashAttn / PagedAttn) + KV blocks</text>


<line x1="150" y1="466" x2="150" y2="474" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<line x1="404" y1="466" x2="404" y2="474" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<line x1="659" y1="466" x2="659" y2="474" stroke="var(--border-2,#ccc)" stroke-width="1"/>


<text x="409" y="566" text-anchor="middle" class="note">each worker runs its own copy of the model shard and attention backend</text>

</svg>
<figcaption><b>vLLM's layered engine and executor stack, from API entry to per-GPU workers.</b> Requests enter through the API layer, are scheduled by the LLMEngine (which owns both the Scheduler and the KVCacheManager), packaged as <code>ExecuteModelRequest</code> objects, and broadcast by the Executor to all Workers. Each Worker holds a ModelRunner that assembles concrete GPU tensors from the block tables, runs the forward pass through the attention backend, and samples next tokens.</figcaption>
</figure>
