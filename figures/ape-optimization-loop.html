<figure class="viz" id="fig-ape-optimization-loop">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 860 370" role="img" aria-label="APE optimization loop: input/output pairs feed a Propose node where the LLM generates candidate instructions; candidates flow to Score where each is evaluated on held-out examples; the best scoring candidate is returned, and a feedback arc resamples around the best back into Propose.">
<style>
  #fig-ape-optimization-loop text { fill: var(--ink-soft); }
  #fig-ape-optimization-loop .nt { font: 700 11px var(--sans,sans-serif); fill: #fff; }
  #fig-ape-optimization-loop .bd { font: 400 9.5px var(--sans,sans-serif); }
  #fig-ape-optimization-loop .ch { font: 600 9.5px var(--sans,sans-serif); }
  #fig-ape-optimization-loop .bg { font: 700 9.5px var(--sans,sans-serif); }
  #fig-ape-optimization-loop .el { font: italic 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-ape-optimization-loop .cp { font: 400 10px var(--sans,sans-serif); fill: var(--muted); }

  @keyframes ape-in  { from{opacity:0} to{opacity:1} }
  @keyframes ape-drw { from{stroke-dashoffset:360} to{stroke-dashoffset:0} }
  @keyframes ape-glo { 0%,100%{filter:none} 50%{filter:drop-shadow(0 0 5px var(--accent,#4f46e5))} }
  @media (prefers-reduced-motion: no-preference) {
    #fig-ape-optimization-loop [data-a="1"] { opacity:0; animation:ape-in .4s ease .2s both }
    #fig-ape-optimization-loop [data-a="2"] { opacity:0; animation:ape-in .5s ease .8s both }
    #fig-ape-optimization-loop [data-a="3"] { opacity:0; animation:ape-in .5s ease 1.5s both }
    #fig-ape-optimization-loop [data-a="4"] { opacity:0; animation:ape-in .5s ease 2.2s both }
    #fig-ape-optimization-loop [data-a="5"] { opacity:0; animation:ape-in .5s ease 2.8s both }
    #fig-ape-optimization-loop .d1  { stroke-dasharray:100; stroke-dashoffset:100; animation:ape-drw .35s ease .6s both }
    #fig-ape-optimization-loop .d2  { stroke-dasharray:100; stroke-dashoffset:100; animation:ape-drw .4s ease 1.3s both }
    #fig-ape-optimization-loop .d3  { stroke-dasharray:100; stroke-dashoffset:100; animation:ape-drw .4s ease 2.0s both }
    #fig-ape-optimization-loop .dfb { stroke-dasharray:380; stroke-dashoffset:380; animation:ape-drw .9s ease 2.4s both }
    #fig-ape-optimization-loop .win { animation:ape-glo 1s ease 3.0s 2 }
  }
</style>
<defs>
  <marker id="ap-a"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="var(--accent,#4f46e5)"/></marker>
  <marker id="ap-ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="var(--good,#2f9e6e)"/></marker>
</defs>




<g data-a="1">
  <rect x="8" y="136" width="122" height="96" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
  <rect x="8" y="136" width="122" height="21" rx="6" fill="var(--accent,#4f46e5)" opacity=".35"/>
  <rect x="8" y="148" width="122" height="9"         fill="var(--accent,#4f46e5)" opacity=".35"/>
  <text x="69" y="150" text-anchor="middle" class="nt" dominant-baseline="middle" opacity=".9">INPUT</text>
  <text x="15" y="170" class="bd">Input/Output</text>
  <text x="15" y="183" class="bd">pairs</text>
  <text x="15" y="196" class="bd">(demonstrations)</text>
</g>


<line x1="130" y1="196" x2="179" y2="196" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#ap-a)" class="d1"/>

<text x="155" y="284" text-anchor="middle" class="el">examples</text>


<g data-a="2">
  <rect x="180" y="136" width="190" height="112" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#9994d4)" stroke-width="2"/>
  <rect x="180" y="136" width="190" height="21" rx="6" fill="var(--accent,#4f46e5)"/>
  <rect x="180" y="148" width="190" height="9"         fill="var(--accent,#4f46e5)"/>
  <text x="275" y="150" text-anchor="middle" class="nt" dominant-baseline="middle">PROPOSE (LLM)</text>
  <text x="188" y="168" class="bd">"Propose 10 instructions</text>
  <text x="188" y="181" class="bd">that produce these."</text>
  <rect x="188" y="196" width="26" height="13" rx="3" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1"/><text x="201" y="206" text-anchor="middle" class="ch">c1</text>
  <rect x="219" y="196" width="26" height="13" rx="3" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1"/><text x="232" y="206" text-anchor="middle" class="ch">c2</text>
  <rect x="250" y="196" width="26" height="13" rx="3" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1"/><text x="263" y="206" text-anchor="middle" class="ch">c3</text>
  <rect x="281" y="196" width="26" height="13" rx="3" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1"/><text x="294" y="206" text-anchor="middle" class="ch">c4</text>
</g>


<line x1="370" y1="196" x2="419" y2="196" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#ap-a)" class="d2"/>
<text x="395" y="284" text-anchor="middle" class="el">candidates</text>


<g data-a="3">
  <rect x="420" y="136" width="190" height="134" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
  <rect x="420" y="136" width="190" height="21" rx="6" fill="var(--accent,#4f46e5)" opacity=".55"/>
  <rect x="420" y="148" width="190" height="9"         fill="var(--accent,#4f46e5)" opacity=".55"/>
  <text x="515" y="150" text-anchor="middle" class="nt" dominant-baseline="middle" opacity=".95">SCORE</text>
  <text x="428" y="168" class="bd">Run each candidate on</text>
  <text x="428" y="181" class="bd">N held-out examples</text>
  <text x="428" y="194" class="bd">-&gt; accuracy / reward</text>
  <rect x="428" y="210" width="42" height="28" rx="3" fill="var(--surface,#f8f8fb)" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
  <text x="449" y="221" text-anchor="middle" class="ch">c1</text>
  <text x="449" y="233" text-anchor="middle" class="bg" fill="var(--good,#2f9e6e)">0.81</text>
  <rect x="476" y="210" width="42" height="28" rx="3" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1"/>
  <text x="497" y="221" text-anchor="middle" class="ch">c2</text>
  <text x="497" y="233" text-anchor="middle" class="bg">0.74</text>
  <rect x="524" y="210" width="42" height="28" rx="3" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1"/>
  <text x="545" y="221" text-anchor="middle" class="ch">c3</text>
  <text x="545" y="233" text-anchor="middle" class="bg">0.66</text>
</g>


<g data-a="4">
  <path d="M515 136 Q515 66 275 66 Q180 66 180 134" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.8" stroke-dasharray="7 4" class="dfb" marker-end="url(#ap-a)"/>
  <text x="347" y="44" text-anchor="middle" class="el">"What variant of {best} might perform better?"</text>
  <text x="347" y="58" text-anchor="middle" class="el">resample around best (optional)</text>
</g>


<line x1="610" y1="196" x2="659" y2="196" stroke="var(--good,#2f9e6e)" stroke-width="1.5" marker-end="url(#ap-ag)" class="d3"/>
<text x="635" y="284" text-anchor="middle" class="el">best</text>


<g data-a="5" class="win">
  <rect x="660" y="148" width="188" height="82" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
  <rect x="660" y="148" width="188" height="21" rx="6" fill="var(--accent,#4f46e5)"/>
  <rect x="660" y="160" width="188" height="9"         fill="var(--accent,#4f46e5)"/>
  <text x="754" y="162" text-anchor="middle" class="nt" dominant-baseline="middle">RETURN</text>
  <rect x="669" y="180" width="44" height="28" rx="4" fill="var(--accent,#4f46e5)"/>
  <text x="691" y="191" text-anchor="middle" class="ch" fill="#fff">c1</text>
  <text x="691" y="204" text-anchor="middle" class="bg" fill="#fff">0.81</text>
  <text x="723" y="191" class="bd">argmax</text>
  <text x="723" y="204" class="bd">instr. score</text>
</g>

<text x="430" y="352" text-anchor="middle" class="cp">Risk: optimizes for the proxy metric — may overfit if metric diverges from true goal.</text>
</svg>
<figcaption><b>APE (Automatic Prompt Engineer) treats instruction generation as a search problem.</b> An LLM proposes candidate instructions, each is scored on held-out examples, the best-scoring candidate is selected (argmax), and an optional feedback arc resamples around that winner to generate refined variants.</figcaption>
</figure>
