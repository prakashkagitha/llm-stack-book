<figure class="viz" id="fig-online-eval-ab-traffic-split">
<svg viewBox="0 0 640 560" role="img" aria-label="A/B experiment traffic split: all live traffic passes through a randomization layer that splits 50/50 into Control (v1) and Treatment (v2) arms, each with a logger, both feeding into a shared metrics pipeline.">

  </defs>
  <style>
    #fig-online-eval-ab-traffic-split text { fill: var(--ink-soft,#334155); font-family: var(--sans,sans-serif); }

    #fig-online-eval-ab-traffic-split .sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-online-eval-ab-traffic-split .pct { font: 600 11px var(--sans,sans-serif); fill: var(--accent,#6366f1); }
    #fig-online-eval-ab-traffic-split .italic { font: italic 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  </style>

  
  <rect x="160" y="16" width="320" height="46" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--ink-soft,#475569)" stroke-width="1.5"/>
  <text x="320" y="44" text-anchor="middle" class="title">All live traffic (100%)</text>

  
  <line x1="320" y1="62" x2="320" y2="104" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#ab-arrow)"/>

  <text x="320" y="126" text-anchor="middle" class="title" fill="var(--accent,#6366f1)">Randomization layer</text>
  <text x="320" y="142" text-anchor="middle" class="sub">deterministic user-session hash</text>

  
  <line x1="280" y1="156" x2="220" y2="230" stroke="var(--ink-soft,#475569)" stroke-width="1.5" marker-end="url(#ab-arrow)"/>

  <text x="450" y="256" text-anchor="middle" class="title" fill="var(--accent,#6366f1)">Treatment (v2)</text>
  <text x="450" y="272" text-anchor="middle" class="italic">candidate model / feature</text>

<figcaption><b>A/B experiment traffic split and shared metrics pipeline.</b> All live traffic enters a deterministic hash-based randomization layer that assigns each user session to either the control (current production model) or treatment (candidate) arm at a 50/50 split. Both arms log independently, and their outputs are merged into a shared metrics pipeline that computes primary, guardrail, and sensitivity signals.</figcaption>
</figure>
