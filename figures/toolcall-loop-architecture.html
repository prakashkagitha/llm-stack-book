<figure class="viz" id="fig-toolcall-loop-architecture">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 436" role="img" aria-label="The tool-call loop: a Messages list sends a prompt to the LLM, which either emits tool calls dispatched to external Tools whose results are appended back to Messages repeating the cycle, or emits a plain-text final response that exits the loop.">
<defs>
  <marker id="tc-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="tc-arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#6366f1)"/>
  </marker>
  <marker id="tc-arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
</defs>
<style>
  #fig-toolcall-loop-architecture text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-toolcall-loop-architecture .title    { font: 700 14px var(--sans,sans-serif); }
  #fig-toolcall-loop-architecture .node-lbl { font: 700 13px var(--sans,sans-serif); }
  #fig-toolcall-loop-architecture .node-sub { font: 400 10px var(--mono,monospace); fill: var(--muted,#888); }
  #fig-toolcall-loop-architecture .edge-lbl { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-toolcall-loop-architecture .foot     { font: 400 10px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-toolcall-loop-architecture .iter     { font: 500 9px var(--mono,monospace); fill: var(--ink-soft,#333); }

  /* ── animation keyframes ── */
  @keyframes tc-pulse-ab {
    0%,100% { opacity:0 }
    0%      { opacity:0; offset-distance:0% }
    5%      { opacity:1 }
    28%     { opacity:1; offset-distance:100% }
    30%     { opacity:0 }
  }
  @keyframes tc-pulse-bc {
    0%,100% { opacity:0 }
    30%     { opacity:0; offset-distance:0% }
    35%     { opacity:1 }
    55%     { opacity:1; offset-distance:100% }
    57%     { opacity:0 }
  }
  @keyframes tc-pulse-ca {
    0%,100% { opacity:0 }
    57%     { opacity:0; offset-distance:0% }
    62%     { opacity:1 }
    82%     { opacity:1; offset-distance:100% }
    84%     { opacity:0 }
  }
  @keyframes tc-pulse-exit {
    0%,84% { opacity:0 }
    85%    { opacity:0; offset-distance:0% }
    90%    { opacity:1 }
    100%   { opacity:1; offset-distance:100% }
  }
  @keyframes tc-glow-exit {
    0%,88%  { fill-opacity:0.12 }
    90%     { fill-opacity:0.45 }
    100%    { fill-opacity:0.45 }
  }
  @keyframes tc-node-pulse-a {
    0%,2%,26%,100% { opacity:0 }
    5%,24% { opacity:0.35 }
  }
  @keyframes tc-node-pulse-b {
    0%,28%,100% { opacity:0 }
    32%,54% { opacity:0.35 }
    55% { opacity:0 }
  }
  @keyframes tc-node-pulse-c {
    0%,55%,100% { opacity:0 }
    59%,80% { opacity:0.35 }
    82% { opacity:0 }
  }

  /* A→B path */
  #fig-toolcall-loop-architecture .tc-dot-ab {
    offset-path: path("M220,205 C260,205 290,175 320,155");
    animation: tc-pulse-ab 5s ease-in-out infinite;
  }
  /* B→C path */
  #fig-toolcall-loop-architecture .tc-dot-bc {
    offset-path: path("M470,165 C510,165 540,230 535,265");
    animation: tc-pulse-bc 5s ease-in-out infinite;
  }
  /* C→A path */
  #fig-toolcall-loop-architecture .tc-dot-ca {
    offset-path: path("M535,345 C480,390 300,390 220,265");
    animation: tc-pulse-ca 5s ease-in-out infinite;
  }
  /* B→exit path */
  #fig-toolcall-loop-architecture .tc-dot-exit {
    offset-path: path("M395,110 C400,80 460,56 530,52");
    animation: tc-pulse-exit 5s ease-in-out infinite;
  }
  #fig-toolcall-loop-architecture .tc-hl-a   { animation: tc-node-pulse-a 5s ease-in-out infinite; }
  #fig-toolcall-loop-architecture .tc-hl-b   { animation: tc-node-pulse-b 5s ease-in-out infinite; }
  #fig-toolcall-loop-architecture .tc-hl-c   { animation: tc-node-pulse-c 5s ease-in-out infinite; }
  #fig-toolcall-loop-architecture .tc-glow-exit { animation: tc-glow-exit 5s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    #fig-toolcall-loop-architecture .tc-dot-ab,
    #fig-toolcall-loop-architecture .tc-dot-bc,
    #fig-toolcall-loop-architecture .tc-dot-ca,
    #fig-toolcall-loop-architecture .tc-dot-exit { opacity: 0 !important; animation: none; }
    #fig-toolcall-loop-architecture .tc-hl-a,
    #fig-toolcall-loop-architecture .tc-hl-b,
    #fig-toolcall-loop-architecture .tc-hl-c { opacity: 0.18; animation: none; }
    #fig-toolcall-loop-architecture .tc-glow-exit { fill-opacity: 0.3; animation: none; }
  }
</style>


<rect x="12" y="10" width="736" height="418" rx="12"
      fill="var(--surface,#fafafa)" fill-opacity="0.5"
      stroke="var(--border-2,#ccc)" stroke-width="1.5"/>

<rect x="12" y="10" width="736" height="36" rx="12"
      fill="var(--surface-3,#e8e8f0)" fill-opacity="0.7" stroke="none"/>
<rect x="12" y="34" width="736" height="12"
      fill="var(--surface-3,#e8e8f0)" fill-opacity="0.7" stroke="none"/>
<text x="380" y="33" text-anchor="middle" class="title">Tool-Call Loop</text>


<g data-anim="2">
  <rect x="534" y="20" width="200" height="44" rx="22"
        fill="var(--good,#2f9e6e)" fill-opacity="0.12"
        stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <rect class="tc-glow-exit" x="534" y="20" width="200" height="44" rx="22"
        fill="var(--good,#2f9e6e)" fill-opacity="0.12"/>
  <text x="634" y="39" text-anchor="middle" style="font:700 11px var(--sans,sans-serif); fill:var(--ink-soft,#333);">final text response</text>
  <text x="634" y="55" text-anchor="middle" style="font:700 11px var(--mono,monospace); fill:var(--ink-soft,#333);">&#x2192; return</text>
</g>


<g data-anim="1">
  <rect x="50" y="158" width="170" height="96" rx="10"
        fill="var(--surface,#fafafa)" stroke="var(--border-2,#ccc)" stroke-width="1.6"/>
  <rect class="tc-hl-a" x="50" y="158" width="170" height="96" rx="10"
        fill="var(--accent,#6366f1)" fill-opacity="0"/>
  <text x="135" y="196" text-anchor="middle" class="node-lbl">Messages (list)</text>
  <text x="135" y="212" text-anchor="middle" class="node-sub">system / user /</text>
  <text x="135" y="226" text-anchor="middle" class="node-sub">assistant / tool</text>
</g>


<g data-anim="1">
  <rect x="310" y="108" width="160" height="82" rx="10"
        fill="var(--accent,#6366f1)" fill-opacity="0.12"
        stroke="var(--accent,#6366f1)" stroke-width="2"/>
  <rect class="tc-hl-b" x="310" y="108" width="160" height="82" rx="10"
        fill="var(--accent,#6366f1)" fill-opacity="0"/>
  <text x="390" y="145" text-anchor="middle" class="node-lbl" fill="var(--accent,#6366f1)">LLM</text>
  <text x="390" y="160" text-anchor="middle" class="node-sub">chat.completions</text>
  <text x="390" y="173" text-anchor="middle" class="node-sub">.create(tools=...)</text>
</g>


<rect x="310" y="198" width="160" height="17" rx="8"
      fill="var(--accent,#6366f1)" fill-opacity="0.08"
      stroke="var(--accent,#6366f1)" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="390" y="210" text-anchor="middle" class="iter">iteration &lt; max_iterations</text>


<g data-anim="1">
  <rect x="524" y="265" width="186" height="96" rx="10"
        fill="var(--surface-3,#e8e8f0)" fill-opacity="0.7"
        stroke="var(--border-2,#ccc)" stroke-width="1.6" stroke-dasharray="6 3"/>
  <rect class="tc-hl-c" x="524" y="265" width="186" height="96" rx="10"
        fill="var(--accent,#6366f1)" fill-opacity="0"/>
  <text x="617" y="306" text-anchor="middle" class="node-lbl">Tool(s) — external</text>
  <text x="617" y="323" text-anchor="middle" class="node-sub">weather API ·</text>
  <text x="617" y="337" text-anchor="middle" class="node-sub">calculator · ...</text>
</g>



<g data-anim="3">
  <path d="M220,205 C260,205 290,175 310,155"
        fill="none" stroke="var(--ink-soft,#555)" stroke-width="1.6"
        marker-end="url(#tc-arr)"/>
  <text x="257" y="175" text-anchor="middle" class="edge-lbl" transform="rotate(-28,257,175)">prompt</text>
</g>


<g data-anim="3">
  <path d="M470,165 C510,165 540,230 535,265"
        fill="none" stroke="var(--ink-soft,#555)" stroke-width="1.6"
        marker-end="url(#tc-arr)"/>
  <text x="550" y="212" text-anchor="start" class="edge-lbl">tool call(s)</text>
</g>


<g data-anim="4">
  <path d="M535,345 C480,390 300,390 220,265"
        fill="none" stroke="var(--accent,#6366f1)" stroke-width="1.8"
        stroke-dasharray="5 3"

  <text x="390" y="406" text-anchor="middle" class="edge-lbl" fill="var(--accent,#6366f1)">tool result(s)  (append)</text>
</g>


<g data-anim="5">
  <path d="M395,108 C400,80 460,56 534,42"

        marker-end="url(#tc-arr-g)"/>
  <text x="455" y="76" text-anchor="middle" class="edge-lbl" fill="var(--ink-soft,#333)">no tool calls</text>
</g>


<circle class="tc-dot-ab" r="6" fill="var(--accent,#6366f1)" opacity="0"/>
<circle class="tc-dot-bc" r="6" fill="var(--accent,#6366f1)" opacity="0"/>
<circle class="tc-dot-ca" r="6" fill="var(--accent,#6366f1)" opacity="0"/>
<circle class="tc-dot-exit" r="6" fill="var(--good,#2f9e6e)" opacity="0"/>


<text x="380" y="422" text-anchor="middle" class="foot">Loop exits when the model emits a plain-text response (no tool calls) or max_iterations is reached.</text>
</svg>
<figcaption><b>The tool-call loop feeds the Messages history to the LLM, dispatches any tool calls, appends results, and repeats until the model returns a plain-text answer.</b> On each iteration the full conversation history (Messages list) is sent to the model; if the response contains <code>tool_calls</code> the executor runs each tool and appends a <code>tool</code>-role message with the result, then calls the model again. The loop exits — returning the text — only when the model replies with no tool calls, or when the iteration cap is hit.</figcaption>
</figure>
