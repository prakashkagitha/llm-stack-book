<figure class="viz" id="fig-mcp-http-transport">
<svg viewBox="0 0 820 360" role="img" aria-label="MCP HTTP transport: the MCP client sends requests via HTTP POST and receives server-to-client events via a Server-Sent Events stream; a single network-hosted server can be shared by multiple hosts.">
  <defs>
    <marker id="http-arrow-post" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#2563eb)"/>
    </marker>
    <marker id="http-arrow-sse" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#0891b2)"/>
    </marker>
    <marker id="http-arrow-ghost" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#94a3b8)" opacity="0.5"/>
    </marker>
  </defs>
  <style>
    #fig-mcp-http-transport .lbl { font: 700 13px var(--sans,sans-serif); fill: var(--ink-soft,#0f172a); }
    #fig-mcp-http-transport .sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#475569); }
    #fig-mcp-http-transport .mono { font: 400 11px var(--mono,monospace); fill: var(--muted,#475569); }
    #fig-mcp-http-transport .title { font: 700 12px var(--sans,sans-serif); fill: var(--ink-soft,#0f172a); }
    #fig-mcp-http-transport .region-lbl { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#475569); }
    #fig-mcp-http-transport .ghost-lbl { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#475569); opacity: 0.65; }
    #fig-mcp-http-transport .auth-lbl { font: 600 10px var(--sans,sans-serif); fill: var(--ink-soft,#0f172a); }
  </style>

  
  <text x="145" y="22" text-anchor="middle" class="region-lbl">Host side</text>
  <text x="620" y="22" text-anchor="middle" class="region-lbl">Network</text>

  
  <line x1="430" y1="30" x2="430" y2="320" stroke="var(--border-2,#94a3b8)" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  
  <rect x="18" y="38" width="272" height="160" rx="10"
        fill="var(--surface,#f5f7fa)" stroke="var(--border-2,#334155)" stroke-width="1.5"/>
  <text x="32" y="58" class="title">HOST PROCESS</text>

  
  <rect x="38" y="70" width="234" height="94" rx="8"
        fill="var(--accent2,#dbeafe)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
  <text x="155" y="100" text-anchor="middle" class="lbl" style="fill:var(--accent,#2563eb)">MCP Client</text>
  <text x="155" y="118" text-anchor="middle" class="sub">speaks JSON-RPC over HTTP</text>
  <text x="155" y="134" text-anchor="middle" class="sub">one connection per server</text>
  <text x="155" y="150" text-anchor="middle" class="sub">handles SSE reconnect</text>

  
  <rect x="548" y="55" width="244" height="110" rx="8"
        fill="var(--surface-3,#e7edf5)" stroke="var(--border-2,#334155)" stroke-width="1.5"/>
  <text x="670" y="86" text-anchor="middle" class="lbl">MCP Server (HTTP)</text>
  <text x="670" y="105" text-anchor="middle" class="sub">multi-tenant / cloud-hosted</text>
  <text x="670" y="122" text-anchor="middle" class="sub">any language, any platform</text>
  <text x="670" y="139" text-anchor="middle" class="sub">independent scaling</text>

  
  <line x1="274" y1="108" x2="544" y2="108"
        stroke="var(--accent,#2563eb)" stroke-width="2"
        marker-end="url(#http-arrow-post)"/>
  <text x="409" y="98" text-anchor="middle" class="mono" style="fill:var(--accent,#2563eb)">POST /message  (request)</text>

  
  <line x1="544" y1="148" x2="274" y2="148"
        stroke="var(--accent-2,#0891b2)" stroke-width="2"
        marker-end="url(#http-arrow-sse)"/>
  <text x="409" y="170" text-anchor="middle" class="mono" style="fill:var(--accent-2,#0891b2)">SSE events  (same or different endpoint)</text>

  
  <rect x="348" y="118" width="122" height="22" rx="11"
        fill="var(--warn,#fef3c7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>
  <text x="409" y="133" text-anchor="middle" class="auth-lbl">OAuth 2.1 + TLS</text>

  
  <rect x="570" y="218" width="92" height="48" rx="6"
        fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.55"/>
  <text x="616" y="239" text-anchor="middle" class="ghost-lbl">Host 2</text>
  <text x="616" y="255" text-anchor="middle" class="ghost-lbl">MCP Client</text>
  
  <line x1="616" y1="218" x2="638" y2="167"
        stroke="var(--border-2,#94a3b8)" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"
        marker-end="url(#http-arrow-ghost)"/>

  
  <rect x="690" y="218" width="92" height="48" rx="6"
        fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.55"/>
  <text x="736" y="239" text-anchor="middle" class="ghost-lbl">Host N</text>
  <text x="736" y="255" text-anchor="middle" class="ghost-lbl">MCP Client</text>
  
  <line x1="736" y1="218" x2="712" y2="167"
        stroke="var(--border-2,#94a3b8)" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"
        marker-end="url(#http-arrow-ghost)"/>

  
  <text x="670" y="290" text-anchor="middle" class="ghost-lbl">server shared across N hosts</text>
</svg>
<figcaption><b>The HTTP transport separates client-to-server requests (HTTP POST) from server-to-client events (SSE stream).</b> Both lanes may share a single endpoint under the newer Streamable HTTP spec. Because the server is network-hosted, it can serve multiple independent hosts simultaneously, secured via OAuth 2.1 over TLS.</figcaption>
</figure>
