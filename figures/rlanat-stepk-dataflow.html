<figcaption><b>One synchronous on-policy RL step (GRPO-style) as a relay of seven serial stages.</b> Stage (b) — rollout — accounts for 60–80% of wall-clock because each response requires hundreds to thousands of memory-bandwidth-bound autoregressive decode steps. Stage (g) — weight sync — has no analogue in SFT and is the engineering challenge that motivates colocated and disaggregated RL architectures in later chapters.</figcaption>
</figure>
