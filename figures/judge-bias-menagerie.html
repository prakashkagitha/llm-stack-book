<figure class="viz" id="fig-judge-bias-menagerie">
<svg viewBox="0 0 820 256" role="img" aria-label="Five systematic biases in LLM judges as a gallery of cards: position bias, verbosity bias, self-preference, sycophancy, and instruction bias, each with a schematic metaphor, a symptom, and a mitigation.">
<defs>
  <style>
    #fig-judge-bias-menagerie text { font: 400 10px var(--sans,sans-serif); }
    #fig-judge-bias-menagerie .card-title { font: 700 12px var(--sans,sans-serif); }
    #fig-judge-bias-menagerie .lbl { font: 400 9.5px var(--sans,sans-serif); }
    #fig-judge-bias-menagerie .lbl-b { font: 700 10px var(--sans,sans-serif); }
    #fig-judge-bias-menagerie .fix-lbl { font: 700 9.5px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
    #fig-judge-bias-menagerie .fix-txt { font: 400 10px var(--sans,sans-serif); }
    #fig-judge-bias-menagerie .sym-lbl { font: 700 9.5px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
    #fig-judge-bias-menagerie .sym-txt { font: 400 10px var(--sans,sans-serif); }
  </style>
</defs>

<text x="410" y="24" text-anchor="middle" class="v-label" style="font:700 14px var(--sans,sans-serif);">Five biases that make LLM judges deviate from human judgment</text>


<g data-anim="1">
<rect x="15" y="44" width="150" height="196" rx="8" class="v-fill v-stroke" stroke-width="1.3"/>
<text x="90" y="63" text-anchor="middle" class="card-title v-label">POSITION BIAS</text>

<rect x="35" y="74" width="44" height="30" rx="4" class="v-fill v-stroke" stroke-width="1.2"/>
<text x="57" y="93" text-anchor="middle" class="lbl-b v-label">A</text>
<rect x="90" y="74" width="44" height="30" rx="4" class="v-fill v-stroke" stroke-width="1.2"/>
<text x="112" y="93" text-anchor="middle" class="lbl-b v-label">B</text>
<path d="M 57 111 L 47 127 L 67 127 Z" fill="var(--warn,#e0a106)"/>
<line x1="57" y1="105" x2="57" y2="111" class="v-stroke" stroke-width="1.5"/>

<text x="90" y="149" text-anchor="middle" class="sym-lbl">SYMPTOM</text>
<text x="25" y="163" class="sym-txt v-label">favors whichever</text>
<text x="25" y="176" class="sym-txt v-label">response is shown</text>
<text x="25" y="189" class="sym-txt v-label">first</text>

<rect x="15" y="199" width="150" height="41" fill="var(--good,#2f9e6e)" fill-opacity="0.12"/>
<text x="90" y="213" text-anchor="middle" class="fix-lbl">FIX</text>
<text x="27" y="225" class="fix-txt v-label">run both orderings,</text>
<text x="27" y="237" class="fix-txt v-label">then aggregate</text>
</g>


<g data-anim="1">
<rect x="175" y="44" width="150" height="196" rx="8" class="v-fill v-stroke" stroke-width="1.3"/>
<text x="250" y="63" text-anchor="middle" class="card-title v-label">VERBOSITY BIAS</text>

<rect x="192" y="93" width="26" height="10" class="v-fill v-stroke" stroke-width="1.1"/>
<rect x="226" y="77" width="76" height="10" class="v-fill v-stroke" stroke-width="1.1"/>
<path d="M 264 65 l 5 6 l -5 6 l -5 -6 z" fill="var(--warn,#e0a106)"/>

<text x="250" y="149" text-anchor="middle" class="sym-lbl">SYMPTOM</text>
<text x="185" y="163" class="sym-txt v-label">prefers longer</text>
<text x="185" y="176" class="sym-txt v-label">answers over</text>
<text x="185" y="189" class="sym-txt v-label">quality</text>

<rect x="175" y="199" width="150" height="41" fill="var(--good,#2f9e6e)" fill-opacity="0.12"/>
<text x="250" y="213" text-anchor="middle" class="fix-lbl">FIX</text>
<text x="187" y="225" class="fix-txt v-label">add anti-length</text>
<text x="187" y="237" class="fix-txt v-label">+ conciseness item</text>
</g>


<g data-anim="1">
<rect x="335" y="44" width="150" height="196" rx="8" class="v-fill v-stroke" stroke-width="1.3"/>
<text x="410" y="63" text-anchor="middle" class="card-title v-label">SELF-PREFERENCE</text>

<circle cx="390" cy="87" r="12" class="v-fill v-stroke" stroke-width="1.2"/>
<text x="390" y="90" text-anchor="middle" class="lbl v-label" style="font-size:8.5px;">judge</text>
<line x1="405" y1="87" x2="417" y2="87" class="v-stroke" stroke-width="1.3" stroke-dasharray="2 2"/>
<rect x="419" y="75" width="24" height="24" rx="4" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
<circle cx="431" cy="81" r="4" class="v-stroke" fill="none" stroke-width="1.1"/>

<text x="410" y="149" text-anchor="middle" class="sym-lbl">SYMPTOM</text>
<text x="345" y="163" class="sym-txt v-label">overrates its own</text>
<text x="345" y="176" class="sym-txt v-label">model family</text>

<rect x="335" y="199" width="150" height="41" fill="var(--good,#2f9e6e)" fill-opacity="0.12"/>
<text x="410" y="213" text-anchor="middle" class="fix-lbl">FIX</text>
<text x="347" y="225" class="fix-txt v-label">different model</text>
<text x="347" y="237" class="fix-txt v-label">family as judge</text>
</g>


<g data-anim="1">
<rect x="495" y="44" width="150" height="196" rx="8" class="v-fill v-stroke" stroke-width="1.3"/>
<text x="570" y="63" text-anchor="middle" class="card-title v-label">SYCOPHANCY</text>

<rect x="519" y="75" width="102" height="26" rx="4" class="v-fill v-stroke" stroke-width="1.2"/>
<text x="570" y="92" text-anchor="middle" class="lbl v-label" style="font-size:9px;">"confident tone"</text>
<path d="M 535 107 q 6 6 12 0" fill="none" class="v-stroke" stroke-width="1.4"/>
<path d="M 592 107 q 6 6 12 0" fill="none" class="v-stroke" stroke-width="1.4"/>

<text x="570" y="149" text-anchor="middle" class="sym-lbl">SYMPTOM</text>
<text x="505" y="163" class="sym-txt v-label">defers to</text>
<text x="505" y="176" class="sym-txt v-label">confident tone or</text>
<text x="505" y="189" class="sym-txt v-label">leaked labels</text>

<rect x="495" y="199" width="150" height="41" fill="var(--good,#2f9e6e)" fill-opacity="0.12"/>
<text x="570" y="213" text-anchor="middle" class="fix-lbl">FIX</text>
<text x="507" y="225" class="fix-txt v-label">neutral framing,</text>
<text x="507" y="237" class="fix-txt v-label">never leak labels</text>
</g>


<g data-anim="1">
<rect x="655" y="44" width="150" height="196" rx="8" class="v-fill v-stroke" stroke-width="1.3"/>
<text x="730" y="63" text-anchor="middle" class="card-title v-label">INSTRUCTION BIAS</text>

<rect x="671" y="74" width="14" height="14" rx="3" class="v-fill v-stroke" stroke-width="1.1"/>
<path d="M 674 81 l 3 3 l 6 -6" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
<text x="691" y="85" class="lbl v-label" style="font-size:9px;">format</text>

<rect x="671" y="92" width="14" height="14" rx="3" class="v-fill v-stroke" stroke-width="1.1"/>
<path d="M 674 99 l 3 3 l 6 -6" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
<text x="691" y="103" class="lbl v-label" style="font-size:9px;">length</text>

<rect x="671" y="110" width="14" height="14" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
<path d="M 674 117 l 8 -8 M 674 109 l 8 8" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
<text x="691" y="121" class="lbl v-label" style="font-size:9px;">facts</text>

<text x="730" y="149" text-anchor="middle" class="sym-lbl">SYMPTOM</text>
<text x="665" y="163" class="sym-txt v-label">rewards format</text>
<text x="665" y="176" class="sym-txt v-label">compliance over</text>
<text x="665" y="189" class="sym-txt v-label">accuracy</text>

<rect x="655" y="199" width="150" height="41" fill="var(--good,#2f9e6e)" fill-opacity="0.12"/>
<text x="730" y="213" text-anchor="middle" class="fix-lbl">FIX</text>
<text x="667" y="225" class="fix-txt v-label">separate, weighted</text>
<text x="667" y="237" class="fix-txt v-label">rubric criteria</text>
</g>

</svg>
<figcaption><b>The five recurring failure modes of LLM judges, each with a targeted mitigation.</b> Position and verbosity bias distort pairwise comparisons through surface features (order, length); self-preference and sycophancy distort judgment through the source or tone of a response; instruction-following bias trades accuracy for format compliance. Every mitigation is a specific counter to the specific mechanism, not a general fix.</figcaption>
</figure>
