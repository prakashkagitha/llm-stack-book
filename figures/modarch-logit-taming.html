<figure class="viz" id="fig-modarch-logit-taming">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 460" role="img" aria-label="Three panels showing how unbounded attention logits collapse the softmax into a one-hot distribution, how QK-norm bounds q and k to unit length before the dot product so the resulting distribution stays spread across several tokens, and how logit soft-capping squashes any extreme value with a tanh curve that is linear near zero and asymptotes at plus or minus c.">

<text x="16" y="24" class="ttl">Keeping the softmax from saturating</text>
<text x="16" y="42" class="sub">Two independent guards against attention collapse: bound the inputs to the dot product, or squash the extreme outputs.</text>

<rect class="panel-box" x="264" y="58" width="248" height="380" rx="6"/>
<rect class="panel-box" x="520" y="58" width="252" height="380" rx="6"/>

  <line class="axis" x1="30" y1="270" x2="230" y2="270"/>
  <rect class="bar-mut" x="35" y="260" width="14" height="10"/>
  <rect class="bar-acc" x="60" y="112" width="14" height="158"/>
  <rect class="bar-mut" x="85" y="260" width="14" height="10"/>
  <rect class="bar-mut" x="110" y="260" width="14" height="10"/>
  <rect class="bar-mut" x="135" y="260" width="14" height="10"/>

<text x="130" y="420" text-anchor="middle" class="lbl" font-size="9.5">unbounded logits saturate softmax</text>

  <text x="276" y="94" class="lbl">RMSNorm(q), RMSNorm(k) before the dot product</text>

  <rect class="box" x="280" y="110" width="76" height="24" rx="4"/>

  <rect class="bar-acc" x="348" y="256" width="14" height="74"/>
  <rect class="bar-acc" x="374" y="264" width="14" height="66"/>

  <rect class="bar-mut" x="452" y="300" width="14" height="30"/>

  <text x="395" y="352" text-anchor="middle" class="lbl">attention spreads across several tokens</text>

<g data-anim="3">
  <text x="532" y="78" class="panel-ttl">3. soft-cap</text>
  <text x="532" y="94" class="lbl">z -&gt; c * tanh(z / c)</text>

  
  <line class="axis" x1="555" y1="230" x2="740" y2="230"/>
  <line class="axis" x1="647" y1="120" x2="647" y2="340"/>
  <text x="742" y="234" class="lbl">z</text>

  <line class="curve-id" x1="575" y1="330" x2="720" y2="130"/>
  <text x="700" y="140" class="note-mut">y = z (identity)</text>

  
  <path class="curve-cap" d="M 575,285.8 L 584,283.7 L 593,280.7 L 602,276.6 L 611,270.7 L 620,263.1 L 629,253.5 L 638,242.2 L 647,230 L 656,217.8 L 665,206.5 L 674,196.9 L 683,189.3 L 692,183.4 L 701,179.3 L 710,176.3 L 718,174.4"/>

  
  <line class="axis" x1="555" y1="170" x2="740" y2="170" stroke-dasharray="3 3" opacity="0.6"/>

  <text x="560" y="304" class="note-mut">-c</text>

  <text x="647" y="248" text-anchor="middle" class="lbl">linear near 0</text>
  <text x="700" y="160" text-anchor="middle" class="note-acc">asymptote at +c</text>
  <text x="600" y="308" text-anchor="middle" class="note-acc">asymptote at -c</text>

  <text x="647" y="378" text-anchor="middle" class="lbl">c: illustrative cap value (e.g. tick above)</text>
  <text x="647" y="420" text-anchor="middle" class="lbl" font-size="9.5">squashes the OUTPUT extreme</text>
</g>


<rect x="8" y="440" width="764" height="0" fill="none"/>
<text x="390" y="452" text-anchor="middle" class="note" font-size="11">QK-norm bounds the input; soft-cap squashes the extreme -- both prevent one-hot collapse.</text>

</svg>
<figcaption><b>Unbounded attention logits saturate the softmax into a near one-hot distribution, and two independent fixes guard against it.</b> QK-norm normalizes queries and keys to unit length before the dot product so the logit itself stays bounded to O(d_k), while logit soft-capping instead lets the raw logit grow but squashes it afterward with <code>c*tanh(z/c)</code>, a curve that tracks the identity near zero and flattens to a fixed asymptote for extreme values -- one constrains the input, the other constrains the output, and Gemma 2 uses both together.</figcaption>
</figure>
