<figure class="viz" id="fig-modarch-attention-sink-mass">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 760 620" role="img" aria-label="Three panels: when relevant context is present attention mass sits on the relevant tokens; when nothing is relevant that mass must still sum to one, so it visibly flows onto the BOS token, the attention sink; StreamingLLM keeps that sink token pinned in the KV cache while evicting the middle, sliding a window over only the recent tokens.">
<style>
  #fig-modarch-attention-sink-mass text        { fill: var(--ink-soft,#45413a); }
  #fig-modarch-attention-sink-mass .ttl        { font: 700 15px var(--sans,sans-serif); fill: currentColor; }
  #fig-modarch-attention-sink-mass .sub        { font: 500 11.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-modarch-attention-sink-mass .panel-ttl  { font: 700 12.5px var(--sans,sans-serif); fill: currentColor; }
  #fig-modarch-attention-sink-mass .lbl        { font: 600 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-modarch-attention-sink-mass .tok        { font: 700 10.5px var(--mono,monospace); fill: var(--ink-soft,#45413a); }
  #fig-modarch-attention-sink-mass .tok-bos    { font: 700 10.5px var(--mono,monospace); fill: var(--accent,#c15b39); }
  #fig-modarch-attention-sink-mass .note       { font: 600 10px var(--sans,sans-serif); }
  #fig-modarch-attention-sink-mass .note-acc   { font: 700 10.5px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-modarch-attention-sink-mass .cap        { font: 600 11px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-modarch-attention-sink-mass .strip      { stroke: var(--border-2,#d8d1c0); stroke-width: 1.2; fill: var(--surface-3,#ece7da); }
  #fig-modarch-attention-sink-mass .bar-mut    { fill: var(--muted,#6d675d); fill-opacity: 0.55; }
  #fig-modarch-attention-sink-mass .bar-acc    { fill: var(--accent,#c15b39); }
  #fig-modarch-attention-sink-mass .panel-box  { fill: none; stroke: var(--border-2,#d8d1c0); stroke-width: 1; stroke-dasharray: 3 3; }
  #fig-modarch-attention-sink-mass .bucket     { fill: none; stroke: var(--muted,#6d675d); stroke-width: 1.4; }
  #fig-modarch-attention-sink-mass .flow       { fill: none; stroke: var(--accent,#c15b39); stroke-width: 2; marker-end: url(#sink-arrow); }
  #fig-modarch-attention-sink-mass .qarrow     { stroke: var(--ink-soft,#45413a); stroke-width: 1.6; fill: none; }
  #fig-modarch-attention-sink-mass .pin        { fill: var(--accent,#c15b39); }
  #fig-modarch-attention-sink-mass .window     { fill: var(--accent,#c15b39); fill-opacity: 0.10; stroke: var(--accent,#c15b39); stroke-width: 1.3; stroke-dasharray: 4 3; }
</style>

<defs>
  <marker id="sink-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>

<text x="16" y="24" class="ttl">Why softmax must "dump" probability somewhere</text>
<text x="16" y="42" class="sub">Attention weights always sum to 1 -- when nothing is relevant, the leftover mass has to land on some token.</text>




<g data-anim="1">
  <rect class="panel-box" x="8" y="60" width="744" height="152" rx="6"/>
  <text x="20" y="78" class="panel-ttl">A. relevant context present</text>

  
  <path class="qarrow" d="M700,92 q-30,10 -60,10" marker-end="url(#sink-arrow)"/>
  <text x="640" y="88" class="lbl" text-anchor="middle">query</text>

  
  <rect class="strip" x="40" y="150" width="660" height="20" rx="3"/>
  <text x="60" y="164" text-anchor="middle" class="tok-bos">BOS</text>
  <text x="130" y="164" text-anchor="middle" class="tok">t1</text>
  <text x="200" y="164" text-anchor="middle" class="tok">t2</text>
  <text x="270" y="164" text-anchor="middle" class="tok">t3</text>
  <text x="340" y="164" text-anchor="middle" class="tok">t4</text>
  <text x="410" y="164" text-anchor="middle" class="tok">t5</text>
  <text x="480" y="164" text-anchor="middle" class="tok">t6</text>
  <text x="550" y="164" text-anchor="middle" class="tok">t7</text>
  <text x="620" y="164" text-anchor="middle" class="tok">t8</text>
  <text x="690" y="164" text-anchor="middle" class="tok">t9</text>

  
  <rect class="bar-mut" x="55" y="140" width="10" height="8"/>
  <rect class="bar-mut" x="125" y="138" width="10" height="10"/>
  <rect class="bar-mut" x="195" y="142" width="10" height="6"/>
  <rect class="bar-mut" x="265" y="136" width="10" height="12"/>
  <rect class="bar-acc" x="335" y="98" width="10" height="50"/>
  <rect class="bar-acc" x="405" y="106" width="10" height="42"/>
  <rect class="bar-mut" x="475" y="140" width="10" height="8"/>
  <rect class="bar-mut" x="545" y="138" width="10" height="10"/>
  <rect class="bar-mut" x="615" y="142" width="10" height="6"/>
  <rect class="bar-mut" x="685" y="140" width="10" height="8"/>
  <text x="340" y="92" text-anchor="middle" class="note-acc">relevant tokens</text>

  
  <rect class="bucket" x="20" y="176" width="34" height="30"/>
  <text x="37" y="198" text-anchor="middle" class="lbl" font-weight="700">sum=1</text>
  
  <rect x="21.5" y="179" width="31" height="24" class="bar-acc" opacity="0.85"/>
  <rect x="21.5" y="203" width="31" height="2.5" class="bar-mut"/>
</g>


<g data-anim="2">
  <rect class="panel-box" x="8" y="226" width="744" height="154" rx="6"/>
  <text x="20" y="246" class="panel-ttl">B. nothing relevant</text>

  <path class="qarrow" d="M700,264 q-30,10 -60,10" marker-end="url(#sink-arrow)"/>
  <text x="640" y="260" class="lbl" text-anchor="middle">query</text>

  <rect class="strip" x="40" y="340" width="660" height="20" rx="3"/>
  <text x="60" y="354" text-anchor="middle" class="tok-bos">BOS</text>
  <text x="130" y="354" text-anchor="middle" class="tok">t1</text>
  <text x="200" y="354" text-anchor="middle" class="tok">t2</text>
  <text x="270" y="354" text-anchor="middle" class="tok">t3</text>
  <text x="340" y="354" text-anchor="middle" class="tok">t4</text>
  <text x="410" y="354" text-anchor="middle" class="tok">t5</text>
  <text x="480" y="354" text-anchor="middle" class="tok">t6</text>
  <text x="550" y="354" text-anchor="middle" class="tok">t7</text>
  <text x="620" y="354" text-anchor="middle" class="tok">t8</text>
  <text x="690" y="354" text-anchor="middle" class="tok">t9</text>

  
  <rect class="bar-mut" x="125" y="332" width="10" height="2"/>
  <rect class="bar-mut" x="195" y="332" width="10" height="2"/>
  <rect class="bar-mut" x="265" y="332" width="10" height="2"/>
  <rect class="bar-mut" x="335" y="332" width="10" height="2"/>
  <rect class="bar-mut" x="405" y="332" width="10" height="2"/>
  <rect class="bar-mut" x="475" y="332" width="10" height="2"/>
  <rect class="bar-mut" x="545" y="332" width="10" height="2"/>
  <rect class="bar-mut" x="615" y="332" width="10" height="2"/>
  <rect class="bar-mut" x="685" y="332" width="10" height="2"/>
  <text x="410" y="322" text-anchor="middle" class="note">all shrink toward ~0</text>

  <rect class="bar-acc" x="55" y="282" width="10" height="52"/>
  <text x="100" y="292" text-anchor="start" class="note-acc" font-size="10">attention sink --</text>
  <text x="100" y="304" text-anchor="start" class="note-acc" font-size="10">probability dumped here</text>

  
  <path class="flow" d="M410,328 C 300,300 180,288 66,284"/>

  
  <rect class="bucket" x="655" y="290" width="34" height="34"/>
  <text x="672" y="312" text-anchor="middle" class="lbl" font-weight="700" font-size="9">sum=1</text>
  <rect x="656.5" y="292.5" width="31" height="26" class="bar-acc" opacity="0.85"/>
  <rect x="656.5" y="318.5" width="31" height="4" class="bar-mut"/>

  <text x="410" y="372" text-anchor="middle" class="note" font-size="9.5">mass conserved: BOS only grew because the others shrank -- the total is still 1</text>
</g>


<g data-anim="3">
  <rect class="panel-box" x="8" y="396" width="744" height="200" rx="6"/>
  <text x="20" y="414" class="panel-ttl">C. StreamingLLM: keep sinks, slide the window</text>

  <rect class="strip" x="40" y="480" width="660" height="20" rx="3"/>
  <text x="60" y="494" text-anchor="middle" class="tok-bos">BOS</text>
  <text x="130" y="494" text-anchor="middle" class="tok" opacity="0.4">t1</text>
  <text x="200" y="494" text-anchor="middle" class="tok" opacity="0.4">t2</text>
  <text x="270" y="494" text-anchor="middle" class="tok" opacity="0.4">t3</text>
  <text x="340" y="494" text-anchor="middle" class="tok" opacity="0.4">t4</text>
  <text x="410" y="494" text-anchor="middle" class="tok">t5</text>
  <text x="480" y="494" text-anchor="middle" class="tok">t6</text>
  <text x="550" y="494" text-anchor="middle" class="tok">t7</text>
  <text x="620" y="494" text-anchor="middle" class="tok">t8</text>
  <text x="690" y="494" text-anchor="middle" class="tok">t9</text>

  
  <rect x="95" y="478" width="280" height="24" fill="var(--muted,#6d675d)" fill-opacity="0.12"/>

  
  <rect class="window" x="378" y="470" width="345" height="40" rx="4"/>
  <text x="550" y="462" text-anchor="middle" class="note-acc" font-size="10">sliding attention window (recent tokens)</text>

  
  <text x="60" y="452" text-anchor="middle" class="note-acc" font-size="9.5">pinned</text>
  <path class="pin" d="M60,460 l6,10 h-4 l0,8 h-4 l0,-8 h-4 z"/>

  
  <text x="130" y="512" text-anchor="middle" class="lbl" font-size="9">evicted</text>
  <text x="200" y="512" text-anchor="middle" class="lbl" font-size="9">evicted</text>
  <text x="270" y="512" text-anchor="middle" class="lbl" font-size="9">evicted</text>
  <text x="340" y="512" text-anchor="middle" class="lbl" font-size="9">evicted</text>

  <text x="380" y="540" class="cap" text-anchor="start">Keep the sinks; evict the middle --</text>
  <text x="380" y="558" class="cap" text-anchor="start">dropping BOS collapses attention.</text>
</g>

</svg>
<figcaption><b>Softmax weights always sum to one, so when no token is relevant the leftover probability mass has nowhere to go but onto the first token(s) -- usually BOS.</b> Panel B makes the conservation literal: the relevant-token bars shrink toward zero and that same mass visibly reappears on BOS, which is why StreamingLLM (Panel C) can safely evict old KV cache entries from the middle of a long stream but must permanently pin the sink tokens, since dropping them collapses attention and causes catastrophic loss spikes.</figcaption>
</figure>
