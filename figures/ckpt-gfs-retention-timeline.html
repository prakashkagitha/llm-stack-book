<figcaption><b>Grandfather-father-son checkpoint retention over time.</b> Reading left (now) to right (older), checkpoints are dense in the recent band and thin out monotonically through daily and weekly windows, while three permanent milestones — initial, mid-run, and final — are preserved regardless of age. The gradient from dense to sparse makes the storage trade-off concrete: fine-grained rollback for recent failures, coarse coverage of distant history.</figcaption>
