<figure class="viz" id="fig-parse-validate-dispatch-pipeline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 820 580" role="img" aria-label="Diagram of the harness pipeline: raw model text is extracted, parsed as JSON, validated against the tool schema, and dispatched to the Python function. Each of the four stages has a characteristic failure mode, and every failure plus the successful result converge into one shared tool message that is appended to the conversation and returned to the model, which can self-correct on the next turn.">
<defs>
  <marker id="pvd-arr-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#333)"/>
  </marker>
  <marker id="pvd-arr-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <marker id="pvd-arr-good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="pvd-arr-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-parse-validate-dispatch-pipeline text { fill: var(--ink-soft,#333); font: 400 11px var(--sans,sans-serif); }
  #fig-parse-validate-dispatch-pipeline .title    { font: 700 15px var(--sans,sans-serif); fill: var(--ink,#1a1a1a); }
  #fig-parse-validate-dispatch-pipeline .subtitle { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-parse-validate-dispatch-pipeline .stage-t  { font: 700 12.5px var(--sans,sans-serif); text-anchor: middle; }
  #fig-parse-validate-dispatch-pipeline .stage-s  { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#6d675d); text-anchor: middle; }
  #fig-parse-validate-dispatch-pipeline .pill-t   { font: 700 11px var(--sans,sans-serif); text-anchor: middle; }
  #fig-parse-validate-dispatch-pipeline .fail-lbl { font: 400 9.5px var(--sans,sans-serif); text-anchor: middle; fill: var(--ink-soft,#333); }
  #fig-parse-validate-dispatch-pipeline .succ-lbl { font: 600 10.5px var(--sans,sans-serif); text-anchor: middle; fill: var(--good,#2f9e6e); }
  #fig-parse-validate-dispatch-pipeline .node-t   { font: 700 13px var(--sans,sans-serif); text-anchor: middle; }
  #fig-parse-validate-dispatch-pipeline .node-s   { font: 400 italic 9.5px var(--sans,sans-serif); text-anchor: middle; fill: var(--muted,#6d675d); }
  #fig-parse-validate-dispatch-pipeline .ret-lbl  { font: 600 10.5px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-parse-validate-dispatch-pipeline .llm-t    { font: 700 13px var(--sans,sans-serif); text-anchor: middle; }
  #fig-parse-validate-dispatch-pipeline .leg-lbl  { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-parse-validate-dispatch-pipeline .foot     { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

  @keyframes pvd-fade { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }
  #fig-parse-validate-dispatch-pipeline [data-anim] { animation: pvd-fade .5s ease-out both; }
  #fig-parse-validate-dispatch-pipeline [data-anim="1"] { animation-delay: 0s; }
  #fig-parse-validate-dispatch-pipeline [data-anim="2"] { animation-delay: .3s; }
  #fig-parse-validate-dispatch-pipeline [data-anim="3"] { animation-delay: .6s; }
  #fig-parse-validate-dispatch-pipeline [data-anim="4"] { animation-delay: .9s; }
  #fig-parse-validate-dispatch-pipeline [data-anim="5"] { animation-delay: 1.2s; }
  @media (prefers-reduced-motion: reduce) {
    #fig-parse-validate-dispatch-pipeline [data-anim] { animation: none !important; opacity:1 !important; transform:none !important; }
  }
</style>

<rect x="8" y="8" width="804" height="564" rx="12" fill="var(--surface,#fafafa)" fill-opacity="0.35" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>

<text x="22" y="30" class="title">Parse -&gt; validate -&gt; dispatch</text>
<text x="22" y="47" class="subtitle">success and every failure mode return through the SAME channel back to the model</text>

<g>
  <rect x="632" y="14" width="12" height="12" rx="2" fill="var(--warn,#e0a106)" fill-opacity="0.65"/>
  <text x="649" y="24" class="leg-lbl">failure path</text>
  <rect x="632" y="30" width="12" height="12" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.65"/>
  <text x="649" y="40" class="leg-lbl">success path</text>
  <rect x="632" y="46" width="12" height="12" rx="2" fill="var(--accent,#c15b39)" fill-opacity="0.65"/>
  <text x="649" y="56" class="leg-lbl">return to model</text>
</g>

<g data-anim="1">
  <rect x="14" y="64" width="96" height="60" rx="30" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#ccc)" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="62" y="90" class="pill-t">Raw model</text>
  <text x="62" y="104" class="pill-t">text</text>

  <line x1="110" y1="94" x2="130" y2="94" stroke="var(--ink-soft,#333)" stroke-width="1.6" marker-end="url(#pvd-arr-ink)"/>

  <rect x="132" y="64" width="132" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>
  <text x="198" y="90" class="stage-t">Extract</text>
  <text x="198" y="106" class="stage-s">regex &lt;tool_call&gt;</text>

  <line x1="264" y1="94" x2="284" y2="94" stroke="var(--ink-soft,#333)" stroke-width="1.6" marker-end="url(#pvd-arr-ink)"/>

  <rect x="286" y="64" width="132" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>
  <text x="352" y="90" class="stage-t">Parse JSON</text>
  <text x="352" y="106" class="stage-s">json.loads(...)</text>

  <line x1="418" y1="94" x2="438" y2="94" stroke="var(--ink-soft,#333)" stroke-width="1.6" marker-end="url(#pvd-arr-ink)"/>

  <rect x="440" y="64" width="132" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>
  <text x="506" y="90" class="stage-t">Validate</text>
  <text x="506" y="106" class="stage-s">exists? args OK?</text>

  <line x1="572" y1="94" x2="592" y2="94" stroke="var(--ink-soft,#333)" stroke-width="1.6" marker-end="url(#pvd-arr-ink)"/>

  <rect x="594" y="64" width="132" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>
  <text x="660" y="90" class="stage-t">Dispatch</text>
  <text x="660" y="106" class="stage-s">call python fn</text>

  <line x1="726" y1="94" x2="746" y2="94" stroke="var(--good,#2f9e6e)" stroke-width="1.6" marker-end="url(#pvd-arr-good)"/>

  <rect x="748" y="64" width="58" height="60" rx="29" fill="var(--good,#2f9e6e)" fill-opacity="0.14" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <text x="777" y="98" class="pill-t" fill="var(--good,#2f9e6e)">Result</text>
</g>

<g data-anim="2">
  <line x1="198" y1="124" x2="198" y2="150" stroke="var(--warn,#e0a106)" stroke-width="1.6" marker-end="url(#pvd-arr-warn)"/>
  <line x1="352" y1="124" x2="352" y2="150" stroke="var(--warn,#e0a106)" stroke-width="1.6" marker-end="url(#pvd-arr-warn)"/>
  <line x1="506" y1="124" x2="506" y2="150" stroke="var(--warn,#e0a106)" stroke-width="1.6" marker-end="url(#pvd-arr-warn)"/>
  <line x1="660" y1="124" x2="660" y2="150" stroke="var(--warn,#e0a106)" stroke-width="1.6" marker-end="url(#pvd-arr-warn)"/>

  <rect x="128" y="152" width="140" height="54" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.08" stroke="var(--warn,#e0a106)" stroke-opacity="0.5" stroke-width="1.1"/>
  <text x="198" y="183" class="fail-lbl">no tool call found</text>

  <rect x="282" y="152" width="140" height="54" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.08" stroke="var(--warn,#e0a106)" stroke-opacity="0.5" stroke-width="1.1"/>
  <text x="352" y="170" class="fail-lbl">JSON syntax error</text>
  <text x="352" y="183" class="fail-lbl">(trailing comma, single</text>
  <text x="352" y="196" class="fail-lbl">quotes, True/None)</text>

  <rect x="436" y="152" width="140" height="54" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.08" stroke="var(--warn,#e0a106)" stroke-opacity="0.5" stroke-width="1.1"/>
  <text x="506" y="176" class="fail-lbl">unknown tool / missing</text>
  <text x="506" y="189" class="fail-lbl">required arg / wrong type</text>

  <rect x="590" y="152" width="140" height="54" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.08" stroke="var(--warn,#e0a106)" stroke-opacity="0.5" stroke-width="1.1"/>
  <text x="660" y="176" class="fail-lbl">execution error / timeout</text>
  <text x="660" y="189" class="fail-lbl">/ API 500</text>
</g>

<g data-anim="3">
  <line x1="198" y1="206" x2="210" y2="370" stroke="var(--warn,#e0a106)" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#pvd-arr-warn)"/>
  <line x1="352" y1="206" x2="312" y2="370" stroke="var(--warn,#e0a106)" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#pvd-arr-warn)"/>
  <line x1="506" y1="206" x2="423" y2="370" stroke="var(--warn,#e0a106)" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#pvd-arr-warn)"/>
  <line x1="660" y1="206" x2="535" y2="370" stroke="var(--warn,#e0a106)" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#pvd-arr-warn)"/>

  <polyline points="777,124 777,340 610,370" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.7" marker-end="url(#pvd-arr-good)"/>
  <text x="705" y="245" class="succ-lbl">success</text>
  <text x="705" y="259" class="succ-lbl">result</text>
</g>

<g data-anim="4">
  <rect x="200" y="370" width="420" height="56" rx="10" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <text x="410" y="398" class="node-t">tool message appended to conversation</text>
  <text x="410" y="415" class="node-s">success or error - same message shape</text>
</g>

<g data-anim="5">
  <line x1="410" y1="426" x2="410" y2="460" stroke="var(--accent,#c15b39)" stroke-width="1.9" marker-end="url(#pvd-arr-accent)"/>
  <text x="440" y="447" class="ret-lbl">model sees it and can</text>
  <text x="440" y="460" class="ret-lbl">self-correct next turn</text>

  <rect x="368" y="462" width="84" height="46" rx="10" fill="var(--accent,#c15b39)" fill-opacity="0.14" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
  <text x="410" y="490" class="llm-t" fill="var(--accent,#c15b39)">LLM</text>

  <text x="410" y="536" text-anchor="middle" class="foot">errors are tool results</text>
</g>

</svg>
<figcaption><b>Every stage of the harness pipeline can fail, and every failure returns through the same channel as success.</b> Extraction, JSON parsing, schema validation, and dispatch each have a characteristic failure mode — but rather than raising an uncaught exception, each one is packaged into a tool message and appended to the conversation exactly like a successful result. The model reads that message on its next turn and can self-correct: retry the call, fix the JSON, or pick a different tool.</figcaption>
</figure>
