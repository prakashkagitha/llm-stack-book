<text x="410" y="538" text-anchor="middle" class="cap">Same pixel scale in all four bar groups: RMSNorm's output is the input's shape shrunk by 1/3.</text>
<text x="410" y="552" text-anchor="middle" class="cap">When mu is approx 0, LayerNorm and RMSNorm coincide.</text>

</svg>
<figcaption><b>RMSNorm only rescales magnitude; LayerNorm also recenters.</b> Starting from x = [1.0, 3.0, -1.0, 5.0], LayerNorm first subtracts the mean (2.0), producing bars centered on zero, then divides by the standard deviation (~2.236) to reach unit variance -- the whole profile shifts down until its mean sits on the zero baseline. RMSNorm instead divides directly by the RMS (3.0): the output bars have exactly the same up/down pattern as the input, just uniformly shrunk, and the dashed mean line (~0.667) stays off the zero baseline -- the offset is preserved, not removed.</figcaption>
</figure>
