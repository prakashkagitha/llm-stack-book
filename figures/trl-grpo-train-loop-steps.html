<figure class="viz" id="fig-trl-grpo-train-loop-steps">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 770 800" role="img" aria-label="The 7-step GRPO per-batch training loop: Rollout, Reward, Advantage, Log Probs, KL, Loss, Backward plus Optimizer Step, with a loop-back arrow from step 7 to step 1.">
<defs>
  <marker id="gts-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="gts-arr-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">

  </marker>
</defs>
<style>
  #fig-trl-grpo-train-loop-steps text { fill: currentColor; }
  #fig-trl-grpo-train-loop-steps .hdr  { font: 700 13px var(--sans,sans-serif); }
  #fig-trl-grpo-train-loop-steps .snum { font: 700 12px var(--sans,sans-serif); fill: var(--surface-3,#f1f5f9); }
  #fig-trl-grpo-train-loop-steps .stitle{ font: 700 13px var(--sans,sans-serif); }
  #fig-trl-grpo-train-loop-steps .stext{ font: 400 10.5px var(--mono,monospace); fill: var(--muted,#94a3b8); }
  #fig-trl-grpo-train-loop-steps .elbl { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); font-style: italic; }
  #fig-trl-grpo-train-loop-steps .btag { font: 500 9.5px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-trl-grpo-train-loop-steps .looplbl { font: 500 10.5px var(--sans,sans-serif); fill: var(--accent,#f59e0b); }

  /* Step highlight animation */
  @keyframes gts-step1 {
    0%,14%   { opacity:1; }
    15%,100% { opacity:0; }
  }
  @keyframes gts-step2 {
    0%,14%   { opacity:0; }
    15%,28%  { opacity:1; }
    29%,100% { opacity:0; }
  }
  @keyframes gts-step3 {
    0%,28%   { opacity:0; }
    29%,42%  { opacity:1; }
    43%,100% { opacity:0; }
  }
  @keyframes gts-step4 {
    0%,42%   { opacity:0; }
    43%,56%  { opacity:1; }
    57%,100% { opacity:0; }
  }
  @keyframes gts-step5 {
    0%,56%   { opacity:0; }
    57%,70%  { opacity:1; }
    71%,100% { opacity:0; }
  }
  @keyframes gts-step6 {
    0%,70%   { opacity:0; }
    71%,84%  { opacity:1; }
    85%,100% { opacity:0; }
  }
  @keyframes gts-step7 {
    0%,84%   { opacity:0; }
    85%,100% { opacity:1; }
  }
  @keyframes gts-loop-pulse {
    0%,84%     { stroke-opacity:0.2; }
    85%,94%    { stroke-opacity:1; }
    95%,100%   { stroke-opacity:0.2; }
  }

  #fig-trl-grpo-train-loop-steps .hl-1 { animation: gts-step1 7s ease-in-out infinite; }
  #fig-trl-grpo-train-loop-steps .hl-2 { animation: gts-step2 7s ease-in-out infinite; }
  #fig-trl-grpo-train-loop-steps .hl-3 { animation: gts-step3 7s ease-in-out infinite; }
  #fig-trl-grpo-train-loop-steps .hl-4 { animation: gts-step4 7s ease-in-out infinite; }
  #fig-trl-grpo-train-loop-steps .hl-5 { animation: gts-step5 7s ease-in-out infinite; }
  #fig-trl-grpo-train-loop-steps .hl-6 { animation: gts-step6 7s ease-in-out infinite; }
  #fig-trl-grpo-train-loop-steps .hl-7 { animation: gts-step7 7s ease-in-out infinite; }
  #fig-trl-grpo-train-loop-steps .loop-anim { animation: gts-loop-pulse 7s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    #fig-trl-grpo-train-loop-steps .hl-1,
    #fig-trl-grpo-train-loop-steps .hl-2,
    #fig-trl-grpo-train-loop-steps .hl-3,
    #fig-trl-grpo-train-loop-steps .hl-4,
    #fig-trl-grpo-train-loop-steps .hl-5,
    #fig-trl-grpo-train-loop-steps .hl-6,
    #fig-trl-grpo-train-loop-steps .hl-7 { animation: none; opacity: 0; }
    #fig-trl-grpo-train-loop-steps .loop-anim { animation: none; stroke-opacity:0.5; }
  }
</style>

  <circle cx="114" cy="112" r="13" fill="var(--warn,#e0a106)"/>
  <text x="114" y="117" text-anchor="middle" class="snum">1</text>
  
  <text x="134" y="96" class="stitle">ROLLOUT</text>
  <text x="134" y="112" class="stext">model.generate() x G  ->  G completions per prompt</text>
  <text x="134" y="126" class="stext">(total P x G sequences forward pass)</text>

<rect x="562" y="83" width="132" height="42" rx="5"

<text x="628" y="100" text-anchor="middle" class="btag">bottleneck:</text>
<text x="628" y="113" text-anchor="middle" class="btag">P x G generations</text>
<text x="628" y="124" text-anchor="middle" style="font:400 9px var(--sans,sans-serif);fill:var(--muted,#94a3b8)">(vLLM addresses this)</text>


<line x1="310" y1="148" x2="310" y2="167" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#gts-arr)"/>
<text x="316" y="161" class="elbl">P x G sequences</text>


<g>
  <rect x="90" y="167" width="460" height="62" rx="7"
        fill="var(--surface-3,#e2e8f0)" fill-opacity="0.5"
        stroke="var(--accent,#f59e0b)" stroke-width="1.8"/>
  <rect class="hl-2" x="90" y="167" width="460" height="62" rx="7"
        fill="var(--accent,#f59e0b)" fill-opacity="0.22" pointer-events="none"/>
  <circle cx="114" cy="198" r="13" fill="var(--accent,#f59e0b)"/>

  <text x="134" y="187" class="stitle">REWARD</text>

</g>
<line x1="310" y1="229" x2="310" y2="248" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#gts-arr)"/>
<text x="316" y="243" class="elbl">rewards: shape [P x G]</text>


<g>
  <rect x="90" y="248" width="460" height="74" rx="7"
        fill="var(--surface-3,#e2e8f0)" fill-opacity="0.5"
        stroke="var(--accent,#f59e0b)" stroke-width="1.8"/>
  <rect class="hl-3" x="90" y="248" width="460" height="74" rx="7"
        fill="var(--accent,#f59e0b)" fill-opacity="0.22" pointer-events="none"/>
  <circle cx="114" cy="285" r="13" fill="var(--accent,#f59e0b)"/>
  <text x="114" y="290" text-anchor="middle" class="snum">3</text>
  <text x="134" y="267" class="stitle">ADVANTAGE</text>
  <text x="134" y="283" class="stext">A_i = r_i - mean(r_1..r_G)  (per group; no critic needed)</text>
  <text x="134" y="298" class="stext">Optionally normalize: A_i = (A_i - mean) / (std + eps)</text>
</g>
<line x1="310" y1="322" x2="310" y2="341" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#gts-arr)"/>
<text x="316" y="336" class="elbl">advantages: shape [P x G]</text>


<g>
  <rect x="90" y="341" width="460" height="74" rx="7"
        fill="var(--surface-3,#e2e8f0)" fill-opacity="0.5"

  <text x="134" y="393" class="stext">reference forward on all P x G  ->  log pi_ref(y|x)</text>
</g>
<line x1="310" y1="415" x2="310" y2="434" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#gts-arr)"/>
<text x="316" y="429" class="elbl">log pi_theta, log pi_ref</text>


<g>
  <rect x="90" y="434" width="460" height="62" rx="7"
        fill="var(--surface-3,#e2e8f0)" fill-opacity="0.5"
        stroke="var(--accent,#f59e0b)" stroke-width="1.8"/>
  <rect class="hl-5" x="90" y="434" width="460" height="62" rx="7"

</g>
<line x1="310" y1="496" x2="310" y2="515" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#gts-arr)"/>
<text x="316" y="510" class="elbl">per-token KL</text>


<g>
  <rect x="90" y="515" width="460" height="62" rx="7"
        fill="var(--surface-3,#e2e8f0)" fill-opacity="0.5"
        stroke="var(--accent,#f59e0b)" stroke-width="1.8"/>
  <rect class="hl-6" x="90" y="515" width="460" height="62" rx="7"

  <circle cx="114" cy="546" r="13" fill="var(--accent,#f59e0b)"/>
  <text x="114" y="551" text-anchor="middle" class="snum">6</text>
  <text x="134" y="535" class="stitle">LOSS</text>

  <rect x="90" y="596" width="460" height="52" rx="7"

        fill="var(--accent,#f59e0b)" fill-opacity="0.22" pointer-events="none"/>
  <circle cx="114" cy="622" r="13" fill="var(--accent,#f59e0b)"/>
  <text x="114" y="627" text-anchor="middle" class="snum">7</text>
  <text x="134" y="627" class="stitle">BACKWARD + OPTIMIZER STEP</text>

<path d="M 550 648 C 740 648 740 56 560 56"
      fill="none" stroke="var(--accent,#f59e0b)" stroke-width="2"

<figcaption><b>TRL's GRPO training loop executes seven ordered steps per batch.</b> Step 1 (ROLLOUT) is the throughput bottleneck — generating P x G completions on training GPUs; the vLLM backend offloads this to dedicated inference GPUs. Steps 3–6 compute group-relative advantages, log-probabilities, per-token KL, and the clipped surrogate loss entirely on-device before the optimizer step closes the loop.</figcaption>
</figure>
