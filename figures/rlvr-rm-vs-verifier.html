<figure class="viz" id="fig-rlvr-rm-vs-verifier">
<svg viewBox="0 0 860 480" role="img" aria-label="Side-by-side comparison: RLHF uses a learned reward model r-phi that the policy hacks over time; RLVR uses a programmatic verifier V(q,o) in {0,1} that is ground truth and cannot be statistically over-optimized.">
<defs>
  <marker id="rmv-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--border-2,#cbd2dc)"/>
  </marker>
  <marker id="rmv-arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--danger,#c0392b)"/>
  </marker>
  <marker id="rmv-arr-grn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--good,#27a05f)"/>
  </marker>
  <marker id="rmv-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>
<style>
  #fig-rlvr-rm-vs-verifier text { fill: var(--ink-soft,#1c2330); font-family: var(--sans,sans-serif); }
  #fig-rlvr-rm-vs-verifier .hdr  { font: 700 13px var(--sans,sans-serif); }
  #fig-rlvr-rm-vs-verifier .lbl  { font: 600 12px var(--sans,sans-serif); }
  #fig-rlvr-rm-vs-verifier .sub  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-rm-vs-verifier .albl { font: 500 10px var(--sans,sans-serif); }
  #fig-rlvr-rm-vs-verifier .ftr  { font: italic 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-rm-vs-verifier .mono { font: 600 11px var(--mono,monospace); }
  #fig-rlvr-rm-vs-verifier .danger { fill: var(--danger,#c0392b); }
  #fig-rlvr-rm-vs-verifier .good   { fill: var(--good,#27a05f); }
  #fig-rlvr-rm-vs-verifier .accent { fill: var(--accent2,#3b82f6); }
</style>



<rect x="10" y="10" width="410" height="460" rx="12" fill="var(--surface,#ffffff)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.5"/>

<rect x="440" y="10" width="410" height="460" rx="12" fill="var(--surface,#ffffff)" stroke="var(--good,#27a05f)" stroke-width="1.8"/>


<line x1="430" y1="28" x2="430" y2="452" stroke="var(--border-2,#cbd2dc)" stroke-width="1" stroke-dasharray="5 4" opacity="0.4"/>


<rect x="10" y="10" width="410" height="38" rx="12" fill="var(--surface-3,#eef1f5)"/>
<rect x="10" y="34" width="410" height="14" fill="var(--surface-3,#eef1f5)"/>
<text x="215" y="35" text-anchor="middle" class="hdr">RLHF — learned reward</text>


<rect x="34" y="66" width="286" height="58" rx="8" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.2"/>
<text x="177" y="90" text-anchor="middle" class="lbl">Human preference labels</text>
<text x="177" y="108" text-anchor="middle" class="sub">noisy · expensive · slow</text>


<line x1="177" y1="124" x2="177" y2="144" stroke="var(--border-2,#cbd2dc)" stroke-width="1.5" marker-end="url(#rmv-arr)"/>
<text x="191" y="138" class="albl" fill="var(--muted,#6b7280)">train reward model</text>


<rect x="34" y="146" width="286" height="66" rx="8" fill="var(--accent-soft,#e8eefc)" stroke="var(--accent2,#3b82f6)" stroke-width="1.5"/>
<text x="177" y="169" text-anchor="middle" class="lbl accent">r_phi(q,o) in R  (a network)</text>
<text x="177" y="186" text-anchor="middle" class="sub">neural network, parameters phi</text>
<text x="177" y="202" text-anchor="middle" class="sub">approximate · learned</text>


<line x1="177" y1="212" x2="177" y2="238" stroke="var(--accent2,#3b82f6)" stroke-width="1.8" marker-end="url(#rmv-arr-acc)"/>
<text x="177" y="230" text-anchor="middle" class="albl accent" font-weight="700" font-size="11">POLICY OPTIMIZES r_phi</text>


<rect x="34" y="240" width="286" height="54" rx="8" fill="var(--surface,#ffffff)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.2"/>
<text x="177" y="265" text-anchor="middle" class="lbl">Policy samples o</text>
<text x="177" y="283" text-anchor="middle" class="sub">output completions</text>


<path d="M 318,267 C 348,267 348,179 318,179" fill="none" stroke="var(--danger,#c0392b)" stroke-width="2.2" marker-end="url(#rmv-arr-red)"/>
<text x="293" y="232" class="albl danger" text-anchor="middle" font-size="10">...and</text>
<text x="293" y="248" class="albl danger" text-anchor="middle" font-weight="700" font-size="10">HACKS r_phi</text>


<text x="215" y="350" text-anchor="middle" class="ftr">approximate · differentiable · hackable</text>


<rect x="440" y="10" width="410" height="38" rx="12" fill="var(--success-soft,#e3f5ec)"/>
<rect x="440" y="34" width="410" height="14" fill="var(--success-soft,#e3f5ec)"/>
<text x="645" y="35" text-anchor="middle" class="hdr good">RLVR — verifiable reward</text>


<rect x="464" y="66" width="310" height="58" rx="8" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.2"/>
<text x="619" y="90" text-anchor="middle" class="lbl">Prompt q  (with gold answer)</text>
<text x="619" y="108" text-anchor="middle" class="sub">no human reward labels needed</text>


<line x1="619" y1="124" x2="619" y2="144" stroke="var(--border-2,#cbd2dc)" stroke-width="1.5" marker-end="url(#rmv-arr)"/>
<text x="633" y="138" class="albl" fill="var(--muted,#6b7280)">policy samples o</text>


<rect x="464" y="146" width="310" height="66" rx="8" fill="var(--accent-soft,#e8eefc)" stroke="var(--good,#27a05f)" stroke-width="2"/>
<rect x="464" y="146" width="6" height="66" rx="3" fill="var(--good,#27a05f)"/>
<text x="623" y="169" text-anchor="middle" class="mono">V(q,o) = checker(o, gold)</text>
<text x="623" y="186" text-anchor="middle" class="sub">a deterministic program</text>
<text x="623" y="202" text-anchor="middle" class="sub">ground truth · exact</text>


<line x1="619" y1="212" x2="619" y2="238" stroke="var(--good,#27a05f)" stroke-width="1.8" marker-end="url(#rmv-arr-grn)"/>
<text x="633" y="229" class="albl good">exact  (no approximation)</text>


<rect x="464" y="240" width="310" height="54" rx="8" fill="var(--success-soft,#e3f5ec)" stroke="var(--good,#27a05f)" stroke-width="1.5"/>
<text x="619" y="265" text-anchor="middle" class="lbl good" font-size="14">reward in {0, 1}</text>
<text x="619" y="283" text-anchor="middle" class="sub">no network · no approximation</text>


<g transform="translate(755,254)">
  <circle r="11" fill="var(--good,#27a05f)" opacity="0.15"/>
  <polyline points="-5,0 -1,5 6,-5" fill="none" stroke="var(--good,#27a05f)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</g>


<text x="619" y="342" text-anchor="middle" class="ftr">ground truth · exact</text>
<text x="619" y="356" text-anchor="middle" class="ftr">"unhackable" in the usual sense</text>


<text x="430" y="432" text-anchor="middle" class="sub" font-size="10">Left: policy hacks the learned reward (red loop). Right: no hack loop — verifier IS ground truth.</text>

</svg>
<figcaption><b>Learned reward (RLHF) vs. verifiable reward (RLVR).</b> RLHF trains a neural network r_phi to approximate human preferences, which the policy optimizes and ultimately hacks (red feedback loop). RLVR replaces that with a deterministic checker V(q,o) in {0,1} that is exact ground truth — the absence of a red loop on the right is the whole point.</figcaption>
</figure>
