<figure class="viz" id="fig-optimizer-paths-conditioning">
<svg viewBox="0 0 820 460" role="img" aria-label="Three optimizer trajectories on the ill-conditioned bowl L = theta1 squared plus 10 theta2 squared, condition number kappa = 10, from a shared start point to the minimum theta star. Gradient descent zigzags back and forth across the steep theta2 axis while crawling slowly along the shallow theta1 axis, taking roughly kappa steps. Momentum oscillates too but the oscillation damps out quickly, taking roughly the square root of kappa steps. Adam rescales each axis by its second moment and takes a nearly straight diagonal path to the minimum.">

  </marker>
  <marker id="opc-arrow-accent2" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent2,#3b82f6)"/>
  </marker>
  <marker id="opc-arrow-accent" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>

<text x="690" y="374" text-anchor="middle" style="font:600 10px var(--sans,sans-serif); fill:var(--muted,#6d675d)">preconditioned:</text>
<text x="690" y="387" text-anchor="middle" style="font:600 10px var(--sans,sans-serif); fill:var(--muted,#6d675d)">kappa ~ 1</text>


<text x="410" y="440" text-anchor="middle" style="font:500 11.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">step counts are illustrative; kappa here = 10 = ratio of the two curvatures</text>

</svg>
<figcaption><b>Conditioning determines the shape of the descent path, not just its length.</b> On the ill-conditioned bowl L = theta1^2 + 10 theta2^2 (kappa = 10), plain GD zigzags across the steep axis and crawls along the shallow one; momentum's velocity partially cancels the zigzag and converges faster; Adam rescales each coordinate by its own gradient magnitude, making the effective landscape close to isotropic (kappa ~ 1) so its path is nearly a straight line to theta*.</figcaption>
</figure>
