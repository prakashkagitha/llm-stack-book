<figure class="viz" id="fig-self-consistency-majority-vote">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 780 470" role="img" aria-label="Self-consistency diagram: a single prompt fans out into five independent chain-of-thought samples at nonzero temperature. Four chains take different reasoning paths but all reach the answer 11; one chain takes a faulty step and reaches 9. A vote tally shows 11 with four votes winning as the majority answer over 9 with one vote.">
<style>
  #fig-self-consistency-majority-vote text { fill: var(--ink-soft); }
  #fig-self-consistency-majority-vote .box-lbl { font: 600 10px var(--mono,monospace); }
  #fig-self-consistency-majority-vote .chip-lbl { font: 600 9.5px var(--mono,monospace); }
  #fig-self-consistency-majority-vote .ans-lbl { font: 700 11px var(--mono,monospace); }
  #fig-self-consistency-majority-vote .row-tag { font: 600 9px var(--sans,sans-serif); fill: var(--muted); }
  #fig-self-consistency-majority-vote .section-title { font: 700 12px var(--sans,sans-serif); letter-spacing: .03em; }
  #fig-self-consistency-majority-vote .tally-lbl { font: 700 13px var(--mono,monospace); }
  #fig-self-consistency-majority-vote .tally-cap { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-self-consistency-majority-vote .caption { font: 400 11px var(--sans,sans-serif); fill: var(--muted); }
  #fig-self-consistency-majority-vote .eq { font: 600 12px var(--mono,monospace); }

  @keyframes scv-in { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
  @media (prefers-reduced-motion: no-preference) {
    #fig-self-consistency-majority-vote [data-anim="1"] { opacity:0; animation:scv-in .4s ease .1s both }
    #fig-self-consistency-majority-vote [data-anim="2"] { opacity:0; animation:scv-in .35s ease .5s both }
    #fig-self-consistency-majority-vote [data-anim="3"] { opacity:0; animation:scv-in .35s ease .9s both }
    #fig-self-consistency-majority-vote [data-anim="4"] { opacity:0; animation:scv-in .35s ease 1.3s both }
    #fig-self-consistency-majority-vote [data-anim="5"] { opacity:0; animation:scv-in .35s ease 1.7s both }
    #fig-self-consistency-majority-vote [data-anim="6"] { opacity:0; animation:scv-in .35s ease 2.1s both }
    #fig-self-consistency-majority-vote [data-anim="7"] { opacity:0; animation:scv-in .45s ease 2.5s both }
  }
</style>

<text x="80" y="18" text-anchor="middle" class="section-title">SAMPLE</text>

  <line x1="246" y1="117" x2="262" y2="117" class="v-accent-s" stroke-width="1.4" marker-end="url(#scv-arr)"/>

  <path d="M134 236 C 148 236, 150 182, 158 182" fill="none" class="v-muted" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#scv-arr-muted)"/>

  <rect x="160" y="172" width="86" height="30" rx="6" class="v-fill" stroke="var(--muted,#8a8578)" stroke-width="1.3" stroke-dasharray="3 2"/>
  <text x="203" y="191" text-anchor="middle" class="chip-lbl">5 balls</text>
  <line x1="246" y1="187" x2="262" y2="187" class="v-muted" stroke-width="1.2" marker-end="url(#scv-arr-muted)"/>
  <rect x="264" y="172" width="86" height="30" rx="6" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <text x="307" y="191" text-anchor="middle" class="chip-lbl" fill="var(--warn,#e0a106)">2x2 = 4?</text>
  <line x1="350" y1="187" x2="366" y2="187" class="v-muted" stroke-width="1.2" marker-end="url(#scv-arr-muted)"/>
  <rect x="368" y="172" width="56" height="30" rx="15" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
  <text x="396" y="191" text-anchor="middle" class="ans-lbl" fill="var(--warn,#e0a106)">9</text>
  <line x1="372" y1="187" x2="420" y2="187" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
</g>


<g data-anim="5">
  <path d="M134 250 C 148 250, 150 252, 158 252" fill="none" class="v-accent-s" stroke-width="1.4" marker-end="url(#scv-arr)"/>
  <text x="160" y="240" class="row-tag">sample 4</text>
  <rect x="160" y="242" width="86" height="30" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
  <text x="203" y="261" text-anchor="middle" class="chip-lbl">5 tennis balls</text>
  <line x1="246" y1="257" x2="262" y2="257" class="v-accent-s" stroke-width="1.4" marker-end="url(#scv-arr)"/>
  <rect x="264" y="242" width="86" height="30" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
  <text x="307" y="261" text-anchor="middle" class="chip-lbl">+6 total</text>
  <line x1="350" y1="257" x2="366" y2="257" class="v-accent-s" stroke-width="1.4" marker-end="url(#scv-arr)"/>
  <rect x="368" y="242" width="56" height="30" rx="15" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="396" y="261" text-anchor="middle" class="ans-lbl" fill="var(--good,#2f9e6e)">11</text>
</g>


<g data-anim="6">
  <path d="M134 264 C 148 264, 150 322, 158 322" fill="none" class="v-accent-s" stroke-width="1.4" marker-end="url(#scv-arr)"/>
  <text x="160" y="310" class="row-tag">sample 5</text>
  <rect x="160" y="312" width="86" height="30" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>

  <line x1="246" y1="327" x2="262" y2="327" class="v-accent-s" stroke-width="1.4" marker-end="url(#scv-arr)"/>
  <rect x="264" y="312" width="86" height="30" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
  <text x="307" y="331" text-anchor="middle" class="chip-lbl">2 cans*3=6</text>
  <line x1="350" y1="327" x2="366" y2="327" class="v-accent-s" stroke-width="1.4" marker-end="url(#scv-arr)"/>
  <rect x="368" y="312" width="56" height="30" rx="15" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="396" y="331" text-anchor="middle" class="ans-lbl" fill="var(--good,#2f9e6e)">11</text>
</g>


<g data-anim="7">
  <path d="M424 47  C 500 47,  520 118, 578 128" fill="none" class="v-stroke" stroke="var(--good,#2f9e6e)" stroke-width="1.1" opacity="0.55"/>
  <path d="M424 117 C 500 117, 520 122, 578 128" fill="none" class="v-stroke" stroke="var(--good,#2f9e6e)" stroke-width="1.1" opacity="0.55"/>
  <path d="M424 257 C 500 257, 520 135, 578 128" fill="none" class="v-stroke" stroke="var(--good,#2f9e6e)" stroke-width="1.1" opacity="0.55"/>
  <path d="M424 327 C 500 327, 520 140, 578 128" fill="none" class="v-stroke" stroke="var(--good,#2f9e6e)" stroke-width="1.1" opacity="0.55"/>
  <path d="M424 187 C 500 187, 520 250, 578 244" fill="none" class="v-stroke" stroke="var(--warn,#e0a106)" stroke-width="1.1" stroke-dasharray="4 3" opacity="0.6"/>
</g>


<g data-anim="7">
  <rect x="576" y="90" width="192" height="200" rx="8" class="v-fill" stroke="var(--border-2,#9994d4)" stroke-width="1.5"/>
  <text x="672" y="112" text-anchor="middle" class="section-title" fill="var(--muted)">votes</text>

  <text x="592" y="140" class="tally-lbl" fill="var(--good,#2f9e6e)">11</text>
  <rect x="620" y="122" width="110" height="26" rx="5" fill="var(--good,#2f9e6e)" fill-opacity="0.85"/>
  <text x="675" y="140" text-anchor="middle" class="tally-lbl" fill="var(--surface,#fff)">x 4</text>
  <path d="M738 121 l6 6 l9 -12" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="592" y="240" class="tally-lbl" fill="var(--warn,#e0a106)" opacity="0.75">9</text>
  <rect x="620" y="222" width="30" height="26" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.3"/>
  <text x="635" y="240" text-anchor="middle" class="tally-lbl" fill="var(--warn,#e0a106)" opacity="0.85">x1</text>

  <text x="672" y="268" text-anchor="middle" class="tally-cap">argmax = 11</text>
</g>

<g data-anim="1">
  <text x="390" y="400" text-anchor="middle" class="caption">Independent paths rarely share the same mistake -</text>
  <text x="390" y="414" text-anchor="middle" class="caption">the majority is usually right. Cost = k x inference.</text>
  <text x="390" y="440" text-anchor="middle" class="eq">y_hat = argmax_y  Sum_i  1[answer(z_i) = y]</text>
</g>
</svg>
<figcaption><b>Self-consistency samples k diverse chain-of-thought paths and takes the majority-vote answer.</b> Five chains explore different reasoning routes at temperature &gt; 0; four reach 11 by different phrasings while one takes a faulty middle step and lands on 9. Because independent errors rarely coincide, the vote tally's argmax (11) is usually correct, at the cost of k times the inference calls.</figcaption>
</figure>
