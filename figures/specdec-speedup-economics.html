<figcaption><b>Acceptance rate sets the ceiling, draft length trades cost against reward, and batch size decides whether the trick is even legal.</b> Speedup rises steeply with alpha and approaches 1/(1-alpha) as drafting cost c vanishes, but a larger gamma only pays off once alpha is high enough — at low acceptance, longer draft chains waste passes on tokens that get rejected anyway, so the optimal gamma* grows with alpha. All of this assumes decode is memory-bandwidth bound; at large batch sizes decode becomes compute-bound, the "free" verification FLOPs start costing real time, and speculation can slow generation down.</figcaption>
</figure>
