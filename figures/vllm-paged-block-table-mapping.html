<text x="695" y="406" text-anchor="middle" class="ann">Uniform block size: any free block fits any new request</text>
<text x="695" y="420" text-anchor="middle" class="ann">Last block partially filled: &lt;= block_size-1 wasted slots</text>

</svg>
<figcaption><b>PagedAttention maps logical KV streams to non-contiguous physical blocks via per-sequence block tables.</b> Sequence A's logical blocks map to physical blocks 1 and 4; sequence B's to blocks 3 and 5 — neither sequence needs contiguous physical memory. Blocks 0 and 2 remain free and can be instantly allocated to any new request because all blocks are the same size, eliminating external fragmentation.</figcaption>
</figure>
