<figcaption><b>Decentralized async RL (prime-rl / INTELLECT-2) adds a trust boundary and two-check gate between untrusted workers and the central trainer.</b> Every rollout from the permissionless GPU pool must pass both a TOPLOC activation-fingerprint check (proving the correct model was used) and an independent reward recomputation before it enters the training stream. Weight broadcasts flow outward infrequently and one-way; no latency-critical cross-WAN synchronization is ever needed.</figcaption>
</figure>
