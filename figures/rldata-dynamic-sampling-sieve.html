<figcaption><b>Selection (before generation) and dynamic sampling (after generation) attack zero-variance groups from opposite ends of the same loop.</b> The selector pulls prompts from a scattered pool toward the p*=0.5 band so more of the nine rolled-out groups come back mixed; the sieve then drops whatever still lands all-correct or all-wrong into a discard tray and triggers an oversample-to-refill wave, so every group that reaches the training batch -- survival fraction rho = kept/generated -- carries a non-zero gradient.</figcaption>
</figure>
