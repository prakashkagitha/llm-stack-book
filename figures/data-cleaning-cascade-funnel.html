<figure class="viz" id="fig-data-cleaning-cascade-funnel">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 880" role="img" aria-label="A narrowing funnel showing the raw-crawl-to-clean-corpus pipeline: raw WET crawl at 100 percent, then language ID down to about 60 percent, heuristic quality filters down to about 45 percent, exact dedup down to about 40 percent, fuzzy MinHash and LSH dedup down to about 30 percent, and benchmark decontamination down to about 29.9 percent, for a final yield of roughly 30 percent of raw tokens.">

</defs>

</style>

<g data-anim="2">
  <circle cx="452" cy="94" r="11" fill="var(--accent,#6366f1)"/>
  <text x="452" y="98" text-anchor="middle" class="badge-n">1</text>
  <text x="472" y="90" class="stage-title">Raw WET crawl</text>
  <text x="472" y="105" class="stage-sub">CommonCrawl text extracts, unfiltered</text>
  <text x="730" y="90" text-anchor="end" class="survivor">100%</text>
</g>


<g data-anim="3">
  <circle cx="452" cy="179" r="11" fill="var(--accent,#6366f1)"/>

  <text x="472" y="167" class="stage-title">Language ID</text>
  <text x="472" y="182" class="stage-sub">removes foreign-language +</text>
  <text x="472" y="195" class="stage-sub">low-confidence docs</text>
  <text x="730" y="167" text-anchor="end" class="survivor">~60%</text>
  <rect x="472" y="205" width="100" height="12" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.55" stroke="var(--warn,#e0a106)" stroke-width="1"/>
  <text x="580" y="214" class="removed-lbl">removed ~40%</text>
</g>


<g data-anim="4">
  <circle cx="452" cy="299" r="11" fill="var(--accent,#6366f1)"/>
  <text x="452" y="303" text-anchor="middle" class="badge-n">3</text>
  <text x="472" y="287" class="stage-title">Heuristic quality filters</text>
  <text x="472" y="302" class="stage-sub">boilerplate, spam,</text>
  <text x="472" y="315" class="stage-sub">encoding garbage</text>
  <text x="730" y="287" text-anchor="end" class="survivor">~45%</text>
  <rect x="472" y="325" width="37.5" height="12" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.55" stroke="var(--warn,#e0a106)" stroke-width="1"/>

</g>


<g data-anim="5">
  <circle cx="452" cy="419" r="11" fill="var(--accent,#6366f1)"/>
  <text x="452" y="423" text-anchor="middle" class="badge-n">4</text>
  <text x="472" y="407" class="stage-title">Exact dedup (SHA-256 / Bloom)</text>
  <text x="472" y="422" class="stage-sub">byte-identical mirror &amp;</text>
  <text x="472" y="435" class="stage-sub">syndicated copies</text>
  <text x="730" y="407" text-anchor="end" class="survivor">~40%</text>
  <rect x="472" y="445" width="12.5" height="12" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.55" stroke="var(--warn,#e0a106)" stroke-width="1"/>
  <text x="492" y="454" class="removed-lbl">removed ~5%</text>
</g>


<g data-anim="6">
  <circle cx="452" cy="539" r="11" fill="var(--accent,#6366f1)"/>
  <text x="452" y="543" text-anchor="middle" class="badge-n">5</text>
  <text x="472" y="527" class="stage-title">Fuzzy dedup (MinHash + LSH)</text>
  <text x="472" y="542" class="stage-sub">near-duplicates: re-rendered</text>
  <text x="472" y="555" class="stage-sub">HTML, shared boilerplate</text>
  <text x="730" y="527" text-anchor="end" class="survivor">~30%</text>
  <rect x="472" y="565" width="25" height="12" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.55" stroke="var(--warn,#e0a106)" stroke-width="1"/>
  <text x="505" y="574" class="removed-lbl">removed ~10%</text>
</g>


<g data-anim="7">
  <circle cx="452" cy="659" r="11" fill="var(--accent,#6366f1)"/>
  <text x="452" y="663" text-anchor="middle" class="badge-n">6</text>
  <text x="472" y="647" class="stage-title">Benchmark decontamination</text>
  <text x="472" y="662" class="stage-sub">leaked eval questions</text>
  <text x="730" y="647" text-anchor="end" class="survivor">~29.9%</text>
  <rect x="472" y="672" width="3" height="12" rx="1.5" fill="var(--warn,#e0a106)" fill-opacity="0.55" stroke="var(--warn,#e0a106)" stroke-width="1"/>
  <text x="480" y="681" class="removed-lbl">removed &lt;0.1%</text>
</g>


<g data-anim="8">
  <rect x="20" y="740" width="720" height="70" rx="10"
        fill="var(--good,#2f9e6e)" fill-opacity="0.14" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="380" y="765" text-anchor="middle" class="callout">Final yield: ~30% of raw tokens</text>
  <text x="380" y="784" text-anchor="middle" class="stage-sub">higher diversity, lower memorization, honest evals</text>
</g>

<text x="380" y="835" text-anchor="middle" class="footnote">Illustrative proportions from the chapter's worked example, not measured benchmarks.</text>

</svg>
<figcaption><b>The raw-to-clean pipeline is a cascade of narrowing filters, not one big cut.</b> Each stage removes a specific kind of junk -- foreign-language text, boilerplate, exact copies, near-duplicates, leaked eval questions -- and the funnel's shrinking width tracks the surviving token fraction at each step, ending near 30% of the raw crawl.</figcaption>
</figure>
