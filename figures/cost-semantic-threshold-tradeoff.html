<figure class="viz" id="fig-cost-semantic-threshold-tradeoff">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 780 430" role="img" aria-label="Schematic chart of the semantic-cache cosine-similarity threshold tau from 0.85 to 1.00: precision of cache hits rises as tau increases while recall (cache hit rate) falls; a precision-floor line marks the minimum acceptable precision, and the chosen-tau zone is where the precision curve first clears that floor. Below the chosen zone, low tau risks false hits such as matching aspirin dosage to ibuprofen dosage; above it, the hit rate collapses toward exact match.">

<style>
  #fig-cost-semantic-threshold-tradeoff text { font: 500 12px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-cost-semantic-threshold-tradeoff .title { font: 700 13px var(--sans,sans-serif); fill: var(--ink,#211f1b); }
  #fig-cost-semantic-threshold-tradeoff .axis-lbl { font: 600 11px var(--sans,sans-serif); }
  #fig-cost-semantic-threshold-tradeoff .tick { font: 400 10px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-cost-semantic-threshold-tradeoff .curve-lbl { font: 600 11px var(--sans,sans-serif); }
  #fig-cost-semantic-threshold-tradeoff .zone-lbl { font: 600 10.5px var(--sans,sans-serif); }
  #fig-cost-semantic-threshold-tradeoff .ann { font: 400 10px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-cost-semantic-threshold-tradeoff .ann-b { font: 600 10px var(--sans,sans-serif); }
  #fig-cost-semantic-threshold-tradeoff .cap { font: 400 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-cost-semantic-threshold-tradeoff .cap-b { font: 700 11.5px var(--sans,sans-serif); fill: var(--ink,#211f1b); }
  #fig-cost-semantic-threshold-tradeoff .floor-line { stroke: var(--ink-soft,#45413a); stroke-width: 1.4; stroke-dasharray: 5 4; }
  #fig-cost-semantic-threshold-tradeoff .danger-zone { fill: var(--warn,#e0a106); fill-opacity: 0.14; }
  #fig-cost-semantic-threshold-tradeoff .chosen-zone { fill: var(--good,#2f9e6e); fill-opacity: 0.16; }
  #fig-cost-semantic-threshold-tradeoff .collapse-zone { fill: var(--muted,#6d675d); fill-opacity: 0.12; }
  #fig-cost-semantic-threshold-tradeoff .precision-curve { fill: none; stroke: var(--accent,#c15b39); stroke-width: 2.4; }
  #fig-cost-semantic-threshold-tradeoff .recall-curve { fill: none; stroke: var(--accent2,#3b82f6); stroke-width: 2.4; stroke-dasharray: 6 4; }
</style>



<g data-anim="1">
  <text x="16" y="24" class="title">Choosing the semantic-cache threshold tau</text>
</g>


<g data-anim="2">
  <line x1="60" y1="40" x2="60" y2="270" class="v-grid" stroke="currentColor" stroke-width="1.4"/>
  <line x1="60" y1="270" x2="740" y2="270" class="v-grid" stroke="currentColor" stroke-width="1.4"/>

  <text x="30" y="48" class="axis-lbl" text-anchor="start">high</text>
  <text x="30" y="266" class="axis-lbl" text-anchor="start">low</text>
  <text x="14" y="157" class="axis-lbl" transform="rotate(-90 14 157)" text-anchor="middle">precision / recall</text>

  <text x="60" y="290" text-anchor="middle" class="tick">0.85</text>
  <text x="400" y="290" text-anchor="middle" class="tick">~0.93</text>
  <text x="740" y="290" text-anchor="middle" class="tick">1.00</text>
  <text x="400" y="306" text-anchor="middle" class="axis-lbl">cosine-similarity threshold (tau)</text>
</g>


<g data-anim="2">
  
  <rect x="60" y="40" width="150" height="230" class="danger-zone"/>
  
  <rect x="330" y="40" width="110" height="230" class="chosen-zone"/>
  
  <rect x="600" y="40" width="140" height="230" class="collapse-zone"/>
</g>


<g data-anim="3">
  <line x1="60" y1="95" x2="740" y2="95" class="floor-line"/>
  <text x="734" y="89" class="ann-b" text-anchor="end">precision floor (e.g. 0.97)</text>
</g>


<g data-anim="4">
  <path class="precision-curve" d="M 60,230 C 160,215 250,150 330,95 C 380,65 480,45 740,42"/>
  <text x="470" y="60" class="curve-lbl" fill="var(--accent,#c15b39)">precision (fraction of hits that are correct)</text>
</g>


<g data-anim="5">
  <path class="recall-curve" d="M 60,55 C 160,70 260,110 360,150 C 480,195 600,225 740,245"/>
  <text x="470" y="205" class="curve-lbl" fill="var(--accent2,#3b82f6)">recall / cache hit rate</text>
</g>


<g data-anim="6">
  <text x="335" y="326" class="ann-b" fill="var(--ink,#211f1b)" text-anchor="start">benign near-miss: "cancel subscription" ~ "delete my account"</text>
</g>


<g data-anim="6">
  <text x="66" y="256" class="zone-lbl" fill="var(--warn,#e0a106)">false hits</text>
  <text x="66" y="350" class="ann" fill="var(--warn,#e0a106)">"aspirin dosage" ~ "ibuprofen dosage"</text>
  <text x="66" y="364" class="ann" fill="var(--warn,#e0a106)">-&gt; wrong &amp; unsafe</text>

  <text x="335" y="350" class="zone-lbl" fill="var(--good,#2f9e6e)" text-anchor="start">chosen tau zone</text>
  <text x="335" y="364" class="ann">general chat ~0.92-0.95;</text>
  <text x="335" y="378" class="ann">medical / legal / financial ~0.97+</text>

  <text x="606" y="350" class="zone-lbl" text-anchor="start">high tau: hit rate collapses</text>
  <text x="606" y="364" class="ann" text-anchor="start">toward exact match --</text>
  <text x="606" y="378" class="ann" text-anchor="start">cache barely fires</text>
</g>

</svg>
<figcaption><b>The semantic-cache threshold tau trades precision against recall: raising tau reduces wrong cache hits but shrinks the hit rate toward exact matching.</b> Pick the lowest tau that still clears your domain's precision floor — around 0.92-0.95 for general chat, 0.97+ (or a human-review loop) for medical, legal, or financial applications where a false hit is dangerous, not just annoying.</figcaption>
</figure>
