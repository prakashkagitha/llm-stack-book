<figure class="viz" id="fig-agentloop-react-trace">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 570" role="img" aria-label="A ReAct trace showing alternating Thought and Action steps generated by the model (left lane) and Observation steps injected by the harness (right lane). Action boxes send tool calls right; Observations return context left. The final finish() action leads to an answer pill.">
<defs>
  <marker id="rr-arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  <marker id="rr-arr-l" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M10 1 L1 5 L10 9 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="rr-arr-d" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 0 L5 9 L9 0 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  <marker id="rr-arr-dn" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="90">
    <path d="M1 0 L5 9 L9 0 z" fill="var(--accent,#4f46e5)"/>
  </marker>
</defs>
<style>
  #fig-agentloop-react-trace text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-agentloop-react-trace .lane-hdr { font: 700 12px var(--sans,sans-serif); }
  #fig-agentloop-react-trace .tag-lbl { font: 700 11px var(--sans,sans-serif); fill: #fbfbfb; }
  #fig-agentloop-react-trace .body-txt { font: 400 11.5px var(--sans,sans-serif); }
  #fig-agentloop-react-trace .mono-txt { font: 400 11px var(--mono,monospace); }
  #fig-agentloop-react-trace .arrow-lbl { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-agentloop-react-trace .step-num { font: 700 11px var(--sans,sans-serif); fill: var(--accent,#4f46e5); }
  #fig-agentloop-react-trace .annot { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#888); }
</style>


<g data-anim="1">
  <rect x="110" y="8" width="220" height="26" rx="13" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="220" y="25" text-anchor="middle" class="lane-hdr">MODEL (LLM)</text>

  <rect x="490" y="8" width="200" height="26" rx="13" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="590" y="25" text-anchor="middle" class="lane-hdr">HARNESS / TOOL</text>

  
  <line x1="468" y1="42" x2="468" y2="500" stroke="var(--border-2,#ccc)" stroke-dasharray="5 4" stroke-width="1" opacity="0.6"/>

  
  <line x1="72" y1="48" x2="72" y2="502" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
</g>


<g data-anim="2">
  
  <circle cx="72" cy="85" r="5" fill="var(--accent,#4f46e5)" class="viz-pulse"/>
  <line x1="72" y1="90" x2="72" y2="150" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  
  <rect x="92" y="62" width="355" height="48" rx="6" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  
  <rect x="92" y="62" width="60" height="22" rx="4" fill="var(--accent,#4f46e5)"/>
  <text x="122" y="77" text-anchor="middle" class="tag-lbl">Thought</text>
  
  <text x="167" y="77" class="body-txt">I need to find the population of Tokyo.</text>
  <text x="102" y="100" class="body-txt">Let me search for it.</text>
</g>


<g data-anim="3">
  <circle cx="72" cy="155" r="5" fill="var(--accent,#4f46e5)"/>
  <line x1="72" y1="160" x2="72" y2="220" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <rect x="92" y="133" width="355" height="44" rx="6" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
  <rect x="92" y="133" width="55" height="22" rx="4" fill="var(--accent,#4f46e5)"/>
  <text x="119" y="148" text-anchor="middle" class="tag-lbl">Action</text>
  <text x="163" y="148" class="mono-txt">search("Tokyo population 2024")</text>
  <text x="102" y="168" class="body-txt">Invokes external tool</text>
  
  <line x1="447" y1="148" x2="498" y2="148" stroke="var(--accent,#4f46e5)" stroke-width="1.6" marker-end="url(#rr-arr-r)"/>
  <text x="472" y="142" text-anchor="middle" class="arrow-lbl">tool call</text>
</g>


<g data-anim="4">
  <rect x="500" y="133" width="248" height="44" rx="6" class="v-fill" stroke="var(--muted,#6b7280)" stroke-width="1.3"/>
  <rect x="500" y="133" width="82" height="22" rx="4" fill="var(--muted,#6b7280)"/>
  <text x="541" y="148" text-anchor="middle" class="tag-lbl">Observation</text>
  <text x="510" y="170" class="body-txt">Tokyo metro ~37M (2024).</text>
  
  <line x1="500" y1="170" x2="448" y2="170" stroke="var(--ink-soft,#555)" stroke-width="1.4" marker-end="url(#rr-arr-l)"/>
  <text x="474" y="184" text-anchor="middle" class="arrow-lbl">injected</text>
</g>


<g data-anim="5">
  <circle cx="72" cy="225" r="5" fill="var(--accent,#4f46e5)" class="viz-pulse"/>
  <line x1="72" y1="230" x2="72" y2="290" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <rect x="92" y="203" width="355" height="44" rx="6" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <rect x="92" y="203" width="60" height="22" rx="4" fill="var(--accent,#4f46e5)"/>
  <text x="122" y="218" text-anchor="middle" class="tag-lbl">Thought</text>
  <text x="167" y="218" class="body-txt">I have the number. Now compare to</text>
  <text x="102" y="238" class="body-txt">New York.</text>
</g>


<g data-anim="6">
  <circle cx="72" cy="295" r="5" fill="var(--accent,#4f46e5)"/>
  <line x1="72" y1="300" x2="72" y2="360" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <rect x="92" y="273" width="355" height="44" rx="6" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
  <rect x="92" y="273" width="55" height="22" rx="4" fill="var(--accent,#4f46e5)"/>
  <text x="119" y="288" text-anchor="middle" class="tag-lbl">Action</text>
  <text x="163" y="288" class="mono-txt">search("New York City population")</text>
  <text x="102" y="308" class="body-txt">Invokes external tool</text>
  <line x1="447" y1="288" x2="498" y2="288" stroke="var(--accent,#4f46e5)" stroke-width="1.6" marker-end="url(#rr-arr-r)"/>
  <text x="472" y="282" text-anchor="middle" class="arrow-lbl">tool call</text>
</g>


<g data-anim="7">
  <rect x="500" y="273" width="248" height="44" rx="6" class="v-fill" stroke="var(--muted,#6b7280)" stroke-width="1.3"/>
  <rect x="500" y="273" width="82" height="22" rx="4" fill="var(--muted,#6b7280)"/>
  <text x="541" y="288" text-anchor="middle" class="tag-lbl">Observation</text>
  <text x="510" y="310" class="body-txt">NYC ~8.3M city / ~20M metro.</text>
  <line x1="500" y1="310" x2="448" y2="310" stroke="var(--ink-soft,#555)" stroke-width="1.4" marker-end="url(#rr-arr-l)"/>
  <text x="474" y="324" text-anchor="middle" class="arrow-lbl">injected</text>
</g>


<g data-anim="8">
  <circle cx="72" cy="365" r="5" fill="var(--accent,#4f46e5)" class="viz-pulse"/>
  <line x1="72" y1="370" x2="72" y2="430" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <rect x="92" y="343" width="355" height="44" rx="6" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <rect x="92" y="343" width="60" height="22" rx="4" fill="var(--accent,#4f46e5)"/>
  <text x="122" y="358" text-anchor="middle" class="tag-lbl">Thought</text>
  <text x="167" y="358" class="body-txt">Tokyo metro (37M) &gt; NYC metro (20M)</text>
  <text x="102" y="378" class="body-txt">by ~17M. I can answer now.</text>
</g>


<g data-anim="9">
  <circle cx="72" cy="435" r="6" fill="var(--accent,#4f46e5)"/>
  
  <rect x="92" y="413" width="355" height="52" rx="6" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="2.5"/>
  <rect x="92" y="413" width="55" height="22" rx="4" fill="var(--accent,#4f46e5)"/>
  <text x="119" y="428" text-anchor="middle" class="tag-lbl">Action</text>
  
  <rect x="298" y="413" width="45" height="20" rx="4" fill="var(--good,#2f9e6e)"/>
  <text x="320" y="427" text-anchor="middle" style="font:700 10px var(--sans,sans-serif); fill:#fff;">FINISH</text>
  <text x="102" y="445" class="mono-txt">finish("Tokyo metro (~37M) ~1.85x</text>
  <text x="102" y="458" class="mono-txt">NYC metro (~20M)")</text>

  
  <line x1="270" y1="465" x2="270" y2="497" stroke="var(--accent,#4f46e5)" stroke-width="1.8" marker-end="url(#rr-arr-dn)"/>
</g>


<g data-anim="10">
  <rect x="152" y="500" width="235" height="32" rx="16" fill="var(--accent,#4f46e5)"/>
  <text x="269" y="520" text-anchor="middle" style="font:600 12px var(--sans,sans-serif); fill:#fff;">Answer returned to user</text>
</g>


<g data-anim="4">
  <line x1="624" y1="220" x2="560" y2="180" stroke="var(--muted,#888)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="624" y="232" class="annot" text-anchor="middle">stop="Observation:"</text>
  <text x="624" y="245" class="annot" text-anchor="middle">model halts here; the</text>
  <text x="624" y="258" class="annot" text-anchor="middle">harness fills the real result</text>
</g>

</svg>
<figcaption><b>A concrete ReAct trace for a Tokyo-vs-NYC population query.</b> The left lane (MODEL) contains Thought and Action steps the LLM generates; the right lane (HARNESS/TOOL) contains Observation steps the harness injects after executing the tool call. The stop sequence <code>"Observation:"</code> halts generation so the harness can insert the real result, preventing the model from hallucinating its own observations.</figcaption>
</figure>
