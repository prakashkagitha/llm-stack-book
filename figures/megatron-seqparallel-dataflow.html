<figure class="viz" id="fig-megatron-seqparallel-dataflow">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="-50 0 720 700" role="img" aria-label="Animated vertical pipeline: tensor flows through five shape-states connected by all-gather, column-parallel linear, row-parallel linear, and reduce-scatter, showing the round trip from sequence-parallel to tensor-parallel and back.">
<defs>
  <marker id="sp-arr" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L5 10 L10 0 z" fill="var(--accent,#2563eb)"/>
  </marker>
  <filter id="sp-glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<style>
  #fig-megatron-seqparallel-dataflow text      { fill: var(--ink-soft,#334155); }
  #fig-megatron-seqparallel-dataflow .mono     { font: 700 13px var(--mono,monospace); }
  #fig-megatron-seqparallel-dataflow .sub      { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-megatron-seqparallel-dataflow .badge-l  { font: 600 10.5px var(--sans,sans-serif); fill: var(--accent,#2563eb); }
  #fig-megatron-seqparallel-dataflow .ann      { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-megatron-seqparallel-dataflow .hdr      { font: 700 11px var(--sans,sans-serif); }

  @keyframes sp-dot-move {
    0%   { transform: translateY(0px);   opacity:1; }
    16%  { transform: translateY(148px); opacity:1; }
    22%  { transform: translateY(148px); opacity:1; }
    38%  { transform: translateY(308px); opacity:1; }
    44%  { transform: translateY(308px); opacity:1; }
    60%  { transform: translateY(468px); opacity:1; }
    66%  { transform: translateY(468px); opacity:1; }
    82%  { transform: translateY(606px); opacity:1; }
    90%  { transform: translateY(606px); opacity:1; }
    96%  { transform: translateY(606px); opacity:0; }
    99%  { transform: translateY(0px);   opacity:0; }
    100% { transform: translateY(0px);   opacity:1; }
  }
  @keyframes sp-b1p { 0%,13%,100%{stroke-width:1.5} 13%,22%{stroke-width:3.5} }
  @keyframes sp-b2p { 0%,28%,100%{stroke-width:2.5} 28%,44%{stroke-width:5}   }
  @keyframes sp-b3p { 0%,44%,100%{stroke-width:1.5} 44%,60%{stroke-width:3.5} }
  @keyframes sp-b4p { 0%,60%,100%{stroke-width:1.5} 60%,76%{stroke-width:3.5} }
  @keyframes sp-b5p { 0%,78%,100%{stroke-width:1.5} 78%,93%{stroke-width:3.5} }
  @keyframes sp-bg1 { 0%,4%,100%{opacity:.55} 5%,16%{opacity:1} }
  @keyframes sp-bg2 { 0%,20%,100%{opacity:.55} 21%,37%{opacity:1} }
  @keyframes sp-bg3 { 0%,37%,100%{opacity:.55} 38%,53%{opacity:1} }
  @keyframes sp-bg4 { 0%,58%,100%{opacity:.55} 59%,75%{opacity:1} }

  .sp-on #sp-b1 { animation: sp-b1p 5s ease-in-out infinite; }
  .sp-on #sp-b2 { animation: sp-b2p 5s ease-in-out infinite; }
  .sp-on #sp-b3 { animation: sp-b3p 5s ease-in-out infinite; }
  .sp-on #sp-b4 { animation: sp-b4p 5s ease-in-out infinite; }
  .sp-on #sp-b5 { animation: sp-b5p 5s ease-in-out infinite; }
  .sp-on #sp-bg1 { animation: sp-bg1 5s ease-in-out infinite; }
  .sp-on #sp-bg2 { animation: sp-bg2 5s ease-in-out infinite; }
  .sp-on #sp-bg3 { animation: sp-bg3 5s ease-in-out infinite; }
  .sp-on #sp-bg4 { animation: sp-bg4 5s ease-in-out infinite; }
  .sp-on #sp-dot { animation: sp-dot-move 5s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .sp-on #sp-b1,.sp-on #sp-b2,.sp-on #sp-b3,.sp-on #sp-b4,.sp-on #sp-b5,
    .sp-on #sp-bg1,.sp-on #sp-bg2,.sp-on #sp-bg3,.sp-on #sp-bg4,
    .sp-on #sp-dot { animation:none; }
  }
</style>

<g class="sp-on">


<rect id="sp-b1" x="80" y="20" width="440" height="72" rx="8"
  fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<text x="300" y="47" text-anchor="middle" class="mono">x: [B, S, H]</text>
<text x="300" y="64" text-anchor="middle" class="sub">each rank holds [B, S/TP, H]  — sequence-parallel</text>
<text x="300" y="80" text-anchor="middle" class="sub">activation mem = B·S·H / TP</text>


<line x1="300" y1="94" x2="300" y2="138" stroke="var(--accent,#2563eb)" stroke-width="2" marker-end="url(#sp-arr)"/>
<rect id="sp-bg1" x="206" y="105" width="188" height="20" rx="10"
  fill="var(--accent2,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.2" opacity="0.7"/>
<text x="300" y="119" text-anchor="middle" class="badge-l">all-gather (TP dim)</text>


<rect id="sp-b2" x="60" y="142" width="480" height="82" rx="8"
  fill="var(--accent2,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="2.5"/>
<rect x="60" y="142" width="480" height="15" rx="8"
  fill="var(--accent,#2563eb)" opacity="0.12"/>
<text x="300" y="154" text-anchor="middle" style="font:600 9px var(--sans,sans-serif);fill:var(--accent,#2563eb)">PEAK ACTIVATION MEMORY — TP copies replicated</text>
<text x="300" y="178" text-anchor="middle" class="mono">[B, S, H]  on every rank</text>
<text x="300" y="196" text-anchor="middle" class="sub">fully replicated — TP copies of full [B,S,H] in flight</text>
<text x="300" y="212" text-anchor="middle" class="sub">activation mem = B·S·H  (no TP saving here)</text>


<line x1="300" y1="228" x2="300" y2="270" stroke="var(--accent,#2563eb)" stroke-width="2" marker-end="url(#sp-arr)"/>
<rect id="sp-bg2" x="118" y="239" width="364" height="20" rx="10"
  fill="var(--accent2,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.2" opacity="0.7"/>
<text x="300" y="253" text-anchor="middle" class="badge-l">Column-parallel Linear  (weight sharded on output dim)</text>


<rect id="sp-b3" x="80" y="274" width="440" height="72" rx="8"
  fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<text x="300" y="301" text-anchor="middle" class="mono">[B, S, H/TP]  per rank</text>
<text x="300" y="318" text-anchor="middle" class="sub">column-parallel output — different columns per rank</text>
<text x="300" y="334" text-anchor="middle" class="sub">(tensor-parallel)</text>


<line x1="300" y1="350" x2="300" y2="392" stroke="var(--accent,#2563eb)" stroke-width="2" marker-end="url(#sp-arr)"/>
<rect id="sp-bg3" x="142" y="361" width="316" height="20" rx="10"
  fill="var(--accent2,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.2" opacity="0.7"/>
<text x="300" y="375" text-anchor="middle" class="badge-l">Row-parallel Linear  (weight sharded on input dim)</text>


<rect id="sp-b4" x="80" y="396" width="440" height="72" rx="8"
  fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<text x="300" y="423" text-anchor="middle" class="mono">partial [B, S, H]  per rank</text>
<text x="300" y="440" text-anchor="middle" class="sub">row-parallel output = partial sums awaiting reduction</text>
<text x="300" y="456" text-anchor="middle" class="sub">(each rank has a different partial contribution)</text>


<line x1="300" y1="472" x2="300" y2="514" stroke="var(--accent,#2563eb)" stroke-width="2" marker-end="url(#sp-arr)"/>
<rect id="sp-bg4" x="188" y="483" width="224" height="20" rx="10"
  fill="var(--accent2,#eff6ff)" stroke="var(--accent,#2563eb)" stroke-width="1.2" opacity="0.7"/>
<text x="300" y="497" text-anchor="middle" class="badge-l">reduce-scatter  (sum + scatter along S)</text>


<rect id="sp-b5" x="80" y="518" width="440" height="72" rx="8"
  fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<text x="300" y="545" text-anchor="middle" class="mono">[B, S/TP, H]  per rank</text>
<text x="300" y="562" text-anchor="middle" class="sub">back to sequence-parallel</text>
<text x="300" y="578" text-anchor="middle" class="sub">activation mem = B·S·H / TP  (restored)</text>


<circle id="sp-dot" cx="300" cy="56" r="5"
  fill="var(--accent,#2563eb)" filter="url(#sp-glow)" opacity="0.9"/>

</g>


<line x1="10" y1="606" x2="610" y2="606" stroke="var(--border-2,#e2e8f0)" stroke-width="0.8"/>
<text x="300" y="622" text-anchor="middle" class="ann">Net: steady-state activation mem = B·S·H / TP  (vs B·S·H without seq. parallelism)</text>
<text x="300" y="638" text-anchor="middle" class="ann">For TP=8: 8x activation memory reduction — significant at long sequences</text>
<text x="300" y="654" text-anchor="middle" class="ann">Box 2 (highlighted) is the only point holding full [B,S,H]; all others are 1/TP size</text>
<text x="300" y="670" text-anchor="middle" class="ann">all-gather + reduce-scatter replaces one all-reduce (same total comm volume)</text>

</svg>
<figcaption><b>Sequence parallelism keeps activations sharded along the sequence dimension everywhere except inside the TP-parallel GEMM pair.</b> An all-gather reconstructs the full [B,S,H] tensor before the column-parallel linear (the highlighted replicated state — peak activation memory); a reduce-scatter immediately after the row-parallel linear shards it back, restoring the B·S·H/TP memory footprint and cutting activation memory by a factor of TP compared to naive tensor parallelism.</figcaption>
</figure>
