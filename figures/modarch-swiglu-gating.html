<figure class="viz" id="fig-modarch-swiglu-gating">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 480" role="img" aria-label="Diagram contrasting a plain single-path MLP with SwiGLU: the input fans into two parallel projections, xW passed through SiLU to form a soft gate and xV as a raw content projection, which are combined by an element-wise multiply that dials each dimension of the content up or down before a final down-projection, versus the plain MLP which has one path and no such interaction.">
<style>
  #fig-modarch-swiglu-gating text        { fill: var(--ink-soft,#45413a); }
  #fig-modarch-swiglu-gating .ttl        { font: 700 15px var(--sans,sans-serif); fill: currentColor; }
  #fig-modarch-swiglu-gating .sub        { font: 500 11.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-modarch-swiglu-gating .panel-ttl  { font: 700 12px var(--sans,sans-serif); fill: currentColor; }
  #fig-modarch-swiglu-gating .lbl        { font: 600 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-modarch-swiglu-gating .mono       { font: 700 11px var(--mono,monospace); fill: var(--ink-soft,#45413a); }
  #fig-modarch-swiglu-gating .mono-acc   { font: 700 11px var(--mono,monospace); fill: var(--accent,#c15b39); }
  #fig-modarch-swiglu-gating .mono-mut   { font: 700 10px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-modarch-swiglu-gating .note       { font: 600 9.5px var(--sans,sans-serif); }
  #fig-modarch-swiglu-gating .note-acc   { font: 700 9.5px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-modarch-swiglu-gating .panel-box  { fill: none; stroke: var(--border-2,#d8d1c0); stroke-width: 1; stroke-dasharray: 3 3; }
  #fig-modarch-swiglu-gating .box        { fill: var(--surface-3,#ece7da); stroke: var(--muted,#6d675d); stroke-width: 1.2; }
  #fig-modarch-swiglu-gating .box-acc    { fill: var(--surface-3,#ece7da); stroke: var(--accent,#c15b39); stroke-width: 1.6; }
  #fig-modarch-swiglu-gating .flow       { stroke: var(--muted,#6d675d); stroke-width: 1.6; fill: none; }
  #fig-modarch-swiglu-gating .flow-acc   { stroke: var(--accent,#c15b39); stroke-width: 1.8; fill: none; }
  #fig-modarch-swiglu-gating .mulnode    { fill: var(--surface,#fff); stroke: var(--ink-soft,#45413a); stroke-width: 1.4; }
  #fig-modarch-swiglu-gating .cell-content { fill: var(--muted,#6d675d); fill-opacity: 0.5; stroke: var(--muted,#6d675d); stroke-width: 1; }
  #fig-modarch-swiglu-gating .cell-gate    { fill: var(--accent,#c15b39); stroke: var(--accent,#c15b39); stroke-width: 1; }
</style>

<defs>
  <marker id="sg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
  </marker>
</defs>

<text x="16" y="24" class="ttl">SwiGLU: a soft gate modulating a content projection</text>
<text x="16" y="42" class="sub">Two parallel projections meet at an element-wise multiply -- the gate dials each dimension of the content up or down.</text>


<g opacity="0.62">
  <rect class="panel-box" x="10" y="58" width="168" height="170" rx="6"/>
  <text x="20" y="76" class="panel-ttl">plain MLP</text>

  <text x="24" y="150" class="mono-mut">x</text>
  <line class="flow" x1="34" y1="146" x2="54" y2="146" marker-end="url(#sg-arrow)" style="color:var(--muted,#6d675d)"/>
  <rect class="box" x="56" y="134" width="34" height="24" rx="4"/>
  <text x="73" y="150" text-anchor="middle" class="mono-mut" font-size="9">W1</text>

  <line class="flow" x1="90" y1="146" x2="106" y2="146" marker-end="url(#sg-arrow)" style="color:var(--muted,#6d675d)"/>
  <rect class="box" x="108" y="106" width="42" height="24" rx="4"/>
  <text x="129" y="122" text-anchor="middle" class="mono-mut" font-size="8.5">GELU</text>

  <path class="flow" d="M90,146 v-24 h18" style="color:var(--muted,#6d675d)"/>
  <path class="flow" d="M150,118 h14 v70" marker-end="url(#sg-arrow)" style="color:var(--muted,#6d675d)"/>
  <rect class="box" x="56" y="196" width="108" height="24" rx="4"/>
  <text x="110" y="212" text-anchor="middle" class="mono-mut" font-size="9">W2</text>

  <text x="20" y="212" class="lbl" font-size="9">one path,</text>
  <text x="94" y="184" class="lbl" font-size="9" text-anchor="middle">no interaction</text>
</g>


<g data-anim="1">
  <text x="210" y="76" class="panel-ttl">SwiGLU</text>

  
  <text x="200" y="152" class="mono">x</text>
  <path class="flow" d="M212,148 h20 v-40 h20" marker-end="url(#sg-arrow)"/>
  <path class="flow" d="M212,148 h20 v46 h20" marker-end="url(#sg-arrow)"/>

  
  <rect class="box-acc" x="254" y="92" width="70" height="30" rx="5"/>
  <text x="289" y="112" text-anchor="middle" class="mono-acc" font-size="10.5">xW</text>
  <text x="289" y="82" text-anchor="middle" class="note-acc">gate = xW</text>

  <path class="flow-acc" d="M324,107 h20" marker-end="url(#sg-arrow)"/>
  <rect class="box-acc" x="346" y="86" width="78" height="42" rx="5"/>
  <text x="385" y="103" text-anchor="middle" class="mono-acc" font-size="10.5">SiLU</text>
  
  <path d="M 358,120 C 368,120 372,110 385,107 C 396,104 402,96 414,94" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>

  <path class="flow-acc" d="M424,107 h26" marker-end="url(#sg-arrow)"/>
  <text x="437" y="98" text-anchor="middle" class="note-acc" font-size="9">gate</text>

  
  <rect class="box" x="254" y="176" width="70" height="30" rx="5"/>
  <text x="289" y="196" text-anchor="middle" class="mono" font-size="10.5">xV</text>
  <text x="289" y="222" text-anchor="middle" class="note">up = xV</text>

  <path class="flow" d="M324,191 h126" marker-end="url(#sg-arrow)"/>
  <text x="410" y="182" text-anchor="middle" class="note" font-size="9">content</text>

  
  <circle class="mulnode" cx="465" cy="150" r="17"/>
  <line x1="458" y1="143" x2="472" y2="157" stroke="var(--ink-soft,#45413a)" stroke-width="2"/>
  <line x1="472" y1="143" x2="458" y2="157" stroke="var(--ink-soft,#45413a)" stroke-width="2"/>

  <path class="flow-acc" d="M450,107 C 462,107 465,120 465,133"/>
  <path class="flow" d="M450,191 C 462,191 465,178 465,167"/>

  
  <g>
    <text x="500" y="60" class="lbl" font-size="9">the gate dials each dimension:</text>
    
    <text x="500" y="83" class="note-acc" font-size="9">gate</text>
    <rect class="cell-gate" x="500" y="90" width="16" height="14" opacity="0.95"/>
    <rect class="cell-gate" x="500" y="106" width="16" height="14" opacity="0.15"/>
    <rect class="cell-gate" x="500" y="122" width="16" height="14" opacity="0.55"/>
    
    <text x="530" y="83" class="note" font-size="9">content</text>
    <rect class="cell-content" x="530" y="90" width="16" height="14"/>
    <rect class="cell-content" x="530" y="106" width="16" height="14"/>
    <rect class="cell-content" x="530" y="122" width="16" height="14"/>

    
    <path d="M550,106 h12" class="flow" marker-end="url(#sg-arrow)"/>

    
    <text x="587" y="83" class="lbl" font-size="9" text-anchor="middle">result</text>
    <rect class="cell-content" x="579" y="86" width="16" height="22" fill-opacity="0.9"/>
    <rect class="cell-content" x="579" y="112" width="16" height="4" fill-opacity="0.9"/>
    <rect class="cell-content" x="579" y="120" width="16" height="16" fill-opacity="0.5"/>

    <text x="605" y="99" text-anchor="start" class="lbl" font-size="8.5">gate~1 -&gt; amplify</text>
    <text x="605" y="118" text-anchor="start" class="lbl" font-size="8.5">gate~0 -&gt; suppress</text>
  </g>

  <text x="465" y="215" text-anchor="middle" class="note-acc" font-size="10">gate (x) up</text>

  
  <path class="flow" d="M465,167 v20 h60" marker-end="url(#sg-arrow)"/>
  <rect class="box" x="540" y="177" width="70" height="30" rx="5"/>
  <text x="575" y="197" text-anchor="middle" class="mono" font-size="10.5">W2</text>
  <text x="575" y="223" text-anchor="middle" class="note">down = W2</text>

  <path class="flow" d="M610,192 h30" marker-end="url(#sg-arrow)"/>
  <text x="670" y="196" class="note" font-size="9.5">output (d_model)</text>
</g>


<g data-anim="2">
  <rect class="panel-box" x="200" y="252" width="560" height="60" rx="6"/>
  <text x="480" y="276" text-anchor="middle" class="note" font-size="10.5">three matrices (W, V, W2) -&gt; intermediate width shrinks to 8d/3</text>
  <text x="480" y="296" text-anchor="middle" class="lbl" font-size="9.5">so param count stays iso with a plain 4x two-matrix MLP (3 x d x 8d/3 = 8d^2 = 2 x d x 4d)</text>
</g>


<g data-anim="3">
  <line x1="10" y1="336" x2="770" y2="336" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <rect x="10" y="352" width="12" height="12" class="cell-gate"/>
  <text x="28" y="362" class="lbl" font-size="10">gate path: xW -&gt; SiLU (this figure's accent)</text>
  <rect x="10" y="374" width="12" height="12" class="cell-content"/>
  <text x="28" y="384" class="lbl" font-size="10">content path: xV, and the down-projection W2</text>

  <text x="16" y="410" class="note" font-size="11">Two matrices (W1, W2) give one path with no interaction; SwiGLU's third matrix (V) lets the gate</text>
  <text x="16" y="428" class="note" font-size="11">multiplicatively suppress or amplify each dimension of the content before it is projected back down.</text>
</g>

</svg>
<figcaption><b>SwiGLU replaces a single linear path with two parallel projections that meet at an element-wise multiply.</b> One projection (<code>xW</code>) passes through SiLU to become a soft, per-dimension gate in roughly [0, 1]-ish range; the other (<code>xV</code>) is the raw content -- the gate then dials each dimension of the content up or down before the result is projected back to model width by <code>W2</code>, which is the multiplicative interaction a plain GELU MLP lacks. Because SwiGLU needs three weight matrices instead of two, the intermediate width is shrunk to 8d/3 so total parameters match a standard 4x MLP.</figcaption>
</figure>
