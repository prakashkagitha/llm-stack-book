<figcaption><b>Sparse per token, dense per batch.</b> A single token lights only <i>k</i> of <i>E</i> experts, but a modest batch of just five tokens already lights the union of nearly all of them (7 of 8 here) — and the schematic curve on the right shows why: distinct experts touched rises steeply with batch size and plateaus near <i>all E</i> well before batch sizes get large. This is why an MoE server cannot get away with keeping only a few experts resident — it must keep (almost) all of them loaded and ready for every decode step.</figcaption>
</figure>
