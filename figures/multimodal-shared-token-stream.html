<figcaption><b>Unified multimodal token stream: audio (AU) and text (TXT) tokens share one sequence and one vocabulary.</b> Positions 1–5 carry audio codec tokens from the user's speech input; positions 6–8 hold text BPE tokens; positions 9–10 continue with audio output tokens. Each token's identity determines its modality — audio IDs fall in the 50265–51288 slice while text IDs fall in 0–50264 — but all share the same transformer weights and positional encoding.</figcaption>
