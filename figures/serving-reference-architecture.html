<figcaption><b>The reference LLM serving stack: requests descend through five layers; tokens stream back up.</b> The <b>gateway</b> is cheap and stateless (TLS, auth, rate limits). The <b>router</b> is the brain — it picks model and replica using token-weighted load and prefix-cache affinity. <b>Model pools</b> group identical replicas each running a continuous-batching engine. <b>Shared infra</b> cross-cuts all pools with caching, metrics, and the autoscaler.</figcaption>
</figure>
