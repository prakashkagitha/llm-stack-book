<figcaption><b>The <code>@register(dispatch=DP_COMPUTE_PROTO)</code> decorator turns one driver call into an SPMD fan-out and fan-in.</b> The batch is split only across data-parallel groups (DP0 gets {a,b}, DP1 gets {c,d}) and replicated within each tensor-parallel pair, since TP ranks must cooperate on the same micro-batch; on collect, one representative per DP group is kept (TP duplicates are dropped) and concatenated back into a single <code>DataProto</code>. The driver writes one line and never sees the intra-stage collectives.</figcaption>
</figure>
