  <defs>

  </defs>
  <style>

    #fig-ckpt-failure-waste-and-daly .mono-lbl { font: 600 10.5px var(--mono,monospace); fill: var(--accent,#6366f1); }
    #fig-ckpt-failure-waste-and-daly .legend-txt { font: 400 10px var(--sans,sans-serif); }

  <rect x="20" y="8" width="760" height="30" rx="6" fill="var(--accent,#6366f1)" fill-opacity="0.08" stroke="var(--accent,#6366f1)" stroke-width="1"/>
  <text x="400" y="28" text-anchor="middle" class="hdr-txt">More nodes -&gt; MTBF = 1 / (N x lambda) shrinks -&gt; failures every hour or less.</text>

  
  <line x1="400" y1="46" x2="400" y2="500" stroke="var(--border-2,#d1d5db)" stroke-width="1" stroke-dasharray="4 3"/>

  
  <text x="205" y="60" text-anchor="middle" class="panel-title">What a failure costs</text>

  
  <line x1="50" y1="420" x2="382" y2="420" stroke="var(--border-2,#d1d5db)" stroke-width="1.4" marker-end="url(#cfw-arrow)"/>
  <line x1="50" y1="420" x2="50" y2="86" stroke="var(--border-2,#d1d5db)" stroke-width="1.4" marker-end="url(#cfw-arrow)"/>
  <text x="378" y="434" text-anchor="end" class="axis-lbl">time -&gt;</text>
  <text x="30" y="255" text-anchor="middle" class="axis-lbl" transform="rotate(-90,30,255)">training progress -&gt;</text>

  
  <line x1="50" y1="420" x2="378" y2="150" stroke="var(--muted,#9ca3af)" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="372" y="145" text-anchor="end" class="small-lbl-i">ideal, no failures</text>

  
  <polygon points="220,288 255,266 255,288" fill="var(--accent,#6366f1)" fill-opacity="0.22" stroke="var(--accent,#6366f1)" stroke-width="1" stroke-opacity="0.5"/>

  
  <path d="M50,420 L80,376 L92,376 L150,332 L162,332 L220,288 L232,288 L255,266"
        fill="none" stroke="var(--ink-soft,#374151)" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M255,288 L325,244 L337,244 L368,204"
        fill="none" stroke="var(--ink-soft,#374151)" stroke-width="2.2" stroke-linejoin="round"/>
  
  <line x1="255" y1="266" x2="255" y2="288" stroke="var(--accent,#6366f1)" stroke-width="2" stroke-dasharray="3 2"/>

  
  <circle cx="80" cy="376" r="4.2" fill="var(--ink-soft,#374151)"/>
  <circle cx="150" cy="332" r="4.2" fill="var(--ink-soft,#374151)"/>

  <path d="M251,254 L256,262 L251,264 L259,274 L253,266 L258,264 Z" fill="var(--accent,#6366f1)" stroke="var(--accent,#6366f1)" stroke-width="1"/>
  <text x="263" y="252" class="accent-b">FAILURE</text>

  
  <line x1="248" y1="296" x2="240" y2="282" stroke="var(--accent,#6366f1)" stroke-width="0.8" stroke-dasharray="2 2"/>

  <text x="595" y="60" text-anchor="middle" class="panel-title">Choosing the interval</text>

  
  <line x1="460" y1="420" x2="772" y2="420" stroke="var(--border-2,#d1d5db)" stroke-width="1.4" marker-end="url(#cfw-arrow)"/>
  <line x1="460" y1="420" x2="460" y2="86" stroke="var(--border-2,#d1d5db)" stroke-width="1.4" marker-end="url(#cfw-arrow)"/>

  <line x1="580" y1="350" x2="580" y2="420" stroke="var(--accent,#6366f1)" stroke-width="1.3" stroke-dasharray="3 2"/>
  <circle cx="580" cy="350" r="4.5" fill="var(--accent,#6366f1)"/>

  <text x="610" y="118" text-anchor="middle" class="small-lbl-i" style="fill:var(--accent,#6366f1)">sweet spot: frequent + fast wins</text>

  
  <text x="470" y="434" class="tick-lbl">short</text>
  <text x="750" y="434" text-anchor="end" class="tick-lbl">long</text>
  <text x="616" y="434" text-anchor="middle" class="axis-lbl">checkpoint interval T_ckpt</text>

  <text x="580" y="452" text-anchor="middle" class="mono-lbl">T* ~ sqrt(2 x T_save x T_MTBF)</text>

  
  <g>
    <line x1="462" y1="470" x2="484" y2="470" stroke="var(--muted,#9ca3af)" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="490" y="474" class="legend-txt">save overhead ~ T_save / T_ckpt (frequent saves cost more)</text>

    <line x1="462" y1="484" x2="484" y2="484" stroke="var(--muted,#9ca3af)" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="490" y="488" class="legend-txt">lost-work risk ~ T_ckpt / (2 x T_MTBF)</text>

    <line x1="462" y1="498" x2="484" y2="498" stroke="var(--ink-soft,#374151)" stroke-width="2.2"/>
    <text x="490" y="502" class="legend-txt">total waste = sum of both (solid U)</text>
  </g>
</svg>
<figcaption><b>Every failure rolls training back to its last checkpoint, and the checkpoint interval trades that loss against save overhead.</b> Left: a failure at any point costs on average half a checkpoint interval of re-done work (the shaded wedge), plus a fixed save cost <code>T_save</code> paid at every checkpoint regardless of whether a failure occurs. Right: shortening the interval cuts lost-work risk but raises save overhead, and vice versa — the sum is U-shaped, minimized at Daly's <code>T* ~ sqrt(2 x T_save x T_MTBF)</code>. As cluster size grows, <code>T_MTBF</code> shrinks, pulling the optimal interval shorter — which is why frontier runs checkpoint every few minutes, not every few hours.</figcaption>
</figure>
