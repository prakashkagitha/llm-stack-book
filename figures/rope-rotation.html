<figure class="viz" id="fig-rope-rotation">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 380" role="img" aria-label="RoPE rotates a feature pair as a 2-D vector by an angle that grows linearly with token position; the dot product between a query and key depends only on the difference of their angles, i.e. their relative position.">
  <defs>
    <marker id="rr-tip" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
    <marker id="rr-axis" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-rope-rotation text{ fill:var(--ink-soft); }
    #fig-rope-rotation .ttl{ font:600 13px var(--sans,sans-serif); }
    #fig-rope-rotation .ax{ font:500 11px var(--mono,monospace); fill:var(--muted); }
    #fig-rope-rotation .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-rope-rotation .vec{ font:600 11.5px var(--mono,monospace); }
    #fig-rope-rotation .ang{ font:600 11px var(--mono,monospace); }
    #fig-rope-rotation .big{ font:600 12.5px var(--sans,sans-serif); }
  </style>

  
  
  <g data-anim="1">
    <text x="58" y="30" class="ttl">Feature pair (x₁, x₂) rotated by <tspan class="vec" fill="var(--accent)">m·θ</tspan></text>

    
    <circle cx="190" cy="200" r="130" fill="none" class="v-grid" stroke-width="1.1" stroke-dasharray="3 4"/>

    
    <line x1="40" y1="200" x2="350" y2="200" class="v-muted" stroke="currentColor" stroke-width="1.2" marker-end="url(#rr-axis)"/>
    <line x1="190" y1="350" x2="190" y2="50" class="v-muted" stroke="currentColor" stroke-width="1.2" marker-end="url(#rr-axis)"/>
    <text x="356" y="204" class="ax">x₁</text>
    <text x="190" y="46" text-anchor="middle" class="ax">x₂</text>
  </g>

  
  <g data-anim="3">
    
    <path d="M 258 200 A 68 68 0 0 0 245.7 160.0" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.4"/>
    
    <path d="M 245.7 160.0 A 68 68 0 0 0 213.3 138.0" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="270" y="172" class="ang" fill="var(--accent)">θ</text>
    <text x="238" y="142" class="ang" fill="var(--accent)">θ</text>
  </g>

  
  <g data-anim="2">
    <line x1="190" y1="200" x2="307" y2="200" stroke="var(--good,#2f9e6e)" stroke-width="2.6" marker-end="url(#rr-tip)" color="var(--good,#2f9e6e)" class="viz-draw" style="--len:117"/>
    <circle cx="307" cy="200" r="3.4" fill="var(--good,#2f9e6e)"/>
    <text x="312" y="222" class="vec" fill="var(--good,#2f9e6e)">m=0</text>
  </g>

  
  <g data-anim="2">
    <line x1="190" y1="200" x2="285.8" y2="132.9" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#rr-tip)" color="var(--accent)" class="viz-draw" style="--len:117"/>
    <circle cx="285.8" cy="132.9" r="3.4" fill="var(--accent)"/>
    <text x="292" y="126" class="vec" fill="var(--accent)">m=1</text>
  </g>

  
  <g data-anim="2">
    <line x1="190" y1="200" x2="230.0" y2="90.0" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#rr-tip)" color="var(--accent)" class="viz-draw" style="--len:117"/>
    <circle cx="230.0" cy="90.0" r="3.4" fill="var(--accent)"/>
    <text x="225" y="80" text-anchor="middle" class="vec" fill="var(--accent)">m=2</text>
  </g>

  <text x="190" y="368" text-anchor="middle" class="sm">length preserved — only the angle grows with m</text>

  
  <g data-anim="4">
    <rect x="420" y="58" width="320" height="150" rx="10" class="v-fill v-grid" stroke-width="1.2"/>
    <text x="436" y="82" class="big">Query m vs. key n</text>

    
    <circle cx="492" cy="150" r="40" fill="none" class="v-grid" stroke-width="1" stroke-dasharray="2 3"/>
    <line x1="448" y1="150" x2="540" y2="150" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <line x1="492" y1="194" x2="492" y2="106" class="v-muted" stroke="currentColor" stroke-width="1"/>
    
    <line x1="492" y1="150" x2="528.3" y2="133.1" stroke="var(--accent2,#3b82f6)" stroke-width="2.3" marker-end="url(#rr-tip)" color="var(--accent2,#3b82f6)"/>
    <text x="534" y="132" class="ang" fill="var(--accent2,#3b82f6)">k·nθ</text>
    
    <line x1="492" y1="150" x2="508.9" y2="113.7" stroke="var(--accent)" stroke-width="2.3" marker-end="url(#rr-tip)" color="var(--accent)"/>
    <text x="486" y="104" text-anchor="end" class="ang" fill="var(--accent)">q·mθ</text>
    
    <path d="M 528.3 133.1 A 40 40 0 0 0 508.9 113.7" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.8" class="viz-pulse"/>

    <text x="560" y="148" class="vec" fill="var(--warn,#e0a106)">Δ = (m-n)·θ</text>
    <text x="560" y="170" class="sm">angle difference =</text>
    <text x="560" y="184" class="sm">relative position</text>
  </g>

  <g data-anim="5">
    <rect x="420" y="224" width="320" height="92" rx="10" class="v-fill" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="436" y="250" class="ttl" fill="var(--accent)">dot( q·rot(mθ) , k·rot(nθ) )</text>
    <text x="436" y="276" class="vec">= g(q, k, <tspan fill="var(--warn,#e0a106)">m - n</tspan>)</text>
    <text x="436" y="302" class="sm">absolute angles cancel; only offset matters.</text>
  </g>
</svg>
<figcaption><b>RoPE encodes position as rotation.</b> Each feature pair (x₁, x₂) is rotated by an angle <b>m·θ</b> that grows linearly with the token's position m — the vector keeps its length and only spins. Because two rotations compose into one, the query–key dot product collapses to a function of the <b>angle difference (m − n)θ</b>: the absolute positions cancel and only the <b>relative</b> offset survives.</figcaption>
</figure>
