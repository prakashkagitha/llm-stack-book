<svg viewBox="0 0 760 600" role="img" aria-label="One training sequence yields T next-token predictions at once. The target row is the input row shifted left by one position, so y at position t equals x at position t+1. A causal mask lets each position attend only to itself and earlier positions, never the future. The model emits a small next-token distribution at every position in one forward pass, and the loss is the mean cross-entropy over all of them; an untrained model's per-position distribution is roughly uniform, giving a loss near the log of the vocabulary size. Two failure modes are called out: forgetting to shift targets lets the model trivially copy the input, and a leaking mask lets it see the answer, both collapsing the loss toward zero without real learning.">

<figcaption><b>One forward pass over a (B, T) batch yields B&#215;T next-token predictions, not one.</b> The target row is the input row shifted left by one position (y[t] = x[t+1]); the causal mask keeps every position honest by hiding the future; and the model emits an independent next-token distribution at every position at once, so the loss is simply the mean cross-entropy across all of them. An untrained model's distributions start near-uniform, so the initial loss should sit close to ln(vocab size) -- a useful sanity check, since a much lower loss on step one usually means the shift or the mask is broken and the model is silently cheating.</figcaption>
