<figure class="viz" id="fig-paged-kv-copy-on-write">
<svg viewBox="0 0 820 630" role="img" aria-label="Copy-on-write prefix sharing: three parallel samples of one prompt share physical blocks P0, P1, P2 through their block tables via ref-counted pointers; when Sample 2 must append a token into the shared block P2, it allocates a fresh block P_new, copies P2's contents into it, redirects only its own table entry, decrements the old ref count from 3 to 2, and writes the new token there -- only one block is copied while Samples 1 and 3 keep sharing the rest.">

<defs>
  <marker id="cow-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="cow-arr-copy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#0ea5e9)"/>
  </marker>
  <marker id="cow-arr-redirect" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
  </marker>
</defs>

<text x="210" y="360" text-anchor="middle" class="cap-lbl">The prompt's KV is identical and read-only -&gt; store it once;</text>
<text x="210" y="378" text-anchor="middle" class="cap-lbl">three block tables point at the same physical blocks P0, P1, P2.</text>

  <circle cx="432" cy="152" r="11" fill="var(--accent,#4f7cff)"/>

<text x="610" y="342" text-anchor="middle" class="zone-hdr">physical blocks (final state)</text>

<text x="502" y="397" text-anchor="middle" class="cell-lbl">P2</text>

<rect x="656" y="352" width="112" height="16" rx="8" fill="var(--surface,#ffffff)" stroke="var(--accent-2,#0ea5e9)" stroke-width="1.2" stroke-dasharray="3 3"/>
<text x="712" y="364" text-anchor="middle" class="badge-lbl" fill="var(--accent-2,#0ea5e9)">ref=1 (private)</text>
<rect x="620" y="372" width="112" height="42" rx="5" fill="var(--accent-2,#0ea5e9)" fill-opacity="0.20" stroke="var(--accent-2,#0ea5e9)" stroke-width="1.8" stroke-dasharray="5 3"/>
<text x="676" y="397" text-anchor="middle" class="cell-lbl">P_new</text>
<text x="676" y="430" text-anchor="middle" class="box-sub">private to Sample 2</text>


<path d="M618,127 C700,150 792,175 792,260 C792,322 738,356 668,372" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#cow-arr-redirect)" opacity="0.85"/>
<text x="760" y="255" text-anchor="middle" class="sm-lbl" fill="var(--warn,#e0a106)">redirect</text>


<text x="610" y="464" text-anchor="middle" class="sm-lbl-b">Sample 1 &amp; Sample 3: block tables unchanged</text>
<text x="610" y="480" text-anchor="middle" class="sm-lbl">still lb0-&gt;P0, lb1-&gt;P1, lb2-&gt;P2 -- fully shared, untouched</text>

<text x="610" y="516" text-anchor="middle" class="cap-lbl">Only ONE block was copied (P2 -&gt; P_new);</text>
<text x="610" y="534" text-anchor="middle" class="cap-lbl">every other prefix block stays shared across all three samples.</text>


<text x="410" y="596" text-anchor="middle" class="bottom-cap">COW is per BLOCK, not per sequence: k diverging candidates copy only the one block where they first differ.</text>
<text x="410" y="616" text-anchor="middle" class="bottom-cap">Memory becomes O(s + k&#183;B), not O(k&#183;s).</text>

</svg>
<figcaption><b>Copy-on-write makes prefix sharing safe: k parallel samples of one prompt share physical KV blocks via ref-counted pointers, and only the single block a sample first diverges in gets copied.</b> Left: three samples' block tables all point at the same physical blocks P0, P1, P2 (ref=3) -- the prompt's KV is stored once. Right: when Sample 2 must append a token into the shared block P2, it allocates a fresh block P_new, copies P2's contents, redirects only its own table entry, and writes there -- Samples 1 and 3 keep pointing at the original blocks, untouched.</figcaption>
</figure>
