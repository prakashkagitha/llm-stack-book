<figcaption><b>A ROME edit is a single rank-one outer product spliced onto the memory matrix, not a rewrite of it.</b> Before the edit (top), the key for a new fact currently maps near the wrong old value; the update Delta = r&amp;nbsp;(C<sup>-1</sup>k*)<sup>T</sup> is literally the outer product of the output gap <i>r</i> and a key-space steering vector, forming one "ridge" that is cheap to store and trivial to invert. Because that steering direction is chosen to be one the other keys barely use (the key-space inset), every preserved key still lands on its original value after the edit — the outcome strip shows one new association installed and three old ones exactly unchanged.</figcaption>
</figure>
