<figure class="viz" id="fig-ageval-harness-swing">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 470" role="img" aria-label="A diagram showing one frozen model's SWE-bench resolve rate swinging across a wide band on a score axis depending on four harness dials: file localization, iteration budget, tool suite, and context policy. Richer harness configurations push the score right; leaner configurations push it left.">
<defs>
  <marker id="ahs-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" class="v-accent-fill"/>
  </marker>
</defs>
<style>
  #fig-ageval-harness-swing text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-ageval-harness-swing .v-fill { fill: var(--surface-3,#ece7da); }
  #fig-ageval-harness-swing .v-accent-fill { fill: var(--accent,#c15b39); }
  #fig-ageval-harness-swing .hdr { font: 700 13px var(--sans,sans-serif); }
  #fig-ageval-harness-swing .lbl { font: 600 11.5px var(--sans,sans-serif); }
  #fig-ageval-harness-swing .sub { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-ageval-harness-swing .tick-lbl { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-ageval-harness-swing .band-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--accent-2,#b04e2d); }
  #fig-ageval-harness-swing .banner-txt { font: 600 12px var(--sans,sans-serif); }
  #fig-ageval-harness-swing .stop-txt { font: 400 10px var(--sans,sans-serif); }
</style>

<g data-anim="1">
  <rect x="10" y="10" width="180" height="46" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="100" y="30" text-anchor="middle" class="lbl">same model</text>
  <text x="100" y="45" text-anchor="middle" class="sub">(frozen weights)</text>
  <line x1="190" y1="33" x2="245" y2="33" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#ahs-arr)"/>
</g>

<g data-anim="1">
  <line x1="250" y1="33" x2="762" y2="33" stroke="var(--v-stroke,#45413a)" stroke-width="1.6"/>
  <line x1="250" y1="27" x2="250" y2="39" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <line x1="762" y1="27" x2="762" y2="39" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <line x1="506" y1="30" x2="506" y2="36" stroke="var(--muted,#6d675d)" stroke-width="1"/>
  <text x="250" y="18" class="tick-lbl">lower resolve rate</text>
  <text x="762" y="18" text-anchor="end" class="tick-lbl">higher resolve rate</text>


  <rect x="250" y="42" width="512" height="26" rx="6" fill="var(--accent,#c15b39)" opacity="0.16"/>
  <rect x="250" y="42" width="512" height="26" rx="6" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="506" y="60" text-anchor="middle" class="band-lbl">the SAME model can land anywhere in this band</text>
</g>

<text x="506" y="82" text-anchor="middle" class="sub" data-anim="1">harness choices routinely move SWE-bench 10-20 points along this axis</text>

<g data-anim="2">
  <line x1="250" y1="88" x2="250" y2="108" stroke="var(--border-2,#ccc)" stroke-dasharray="3 3" stroke-width="1"/>
  <line x1="762" y1="88" x2="762" y2="108" stroke="var(--border-2,#ccc)" stroke-dasharray="3 3" stroke-width="1"/>
</g>


<g data-anim="2">
  <text x="10" y="126" class="hdr">Harness dials (each row: leaner -&gt; richer configuration)</text>
</g>


<g data-anim="2">
  <text x="10" y="150" class="lbl">1. File localization</text>
  <rect x="250" y="138" width="512" height="24" rx="5" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <line x1="420" y1="138" x2="420" y2="162" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <line x1="592" y1="138" x2="592" y2="162" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="335" y="154" text-anchor="middle" class="stop-txt">agent self-explore</text>
  <text x="506" y="154" text-anchor="middle" class="stop-txt">BM25 top-N</text>
  <text x="677" y="154" text-anchor="middle" class="stop-txt">oracle files</text>
  <line x1="260" y1="172" x2="752" y2="172" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#ahs-arr)"/>
  <text x="506" y="184" text-anchor="middle" class="sub">richer localization lifts score -&gt;</text>
</g>

<g data-anim="3">
  <text x="10" y="212" class="lbl">2. Iteration budget</text>
  <rect x="250" y="200" width="512" height="24" rx="5" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <line x1="420" y1="200" x2="420" y2="224" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <line x1="592" y1="200" x2="592" y2="224" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="335" y="216" text-anchor="middle" class="stop-txt">1 loop</text>
  <text x="506" y="216" text-anchor="middle" class="stop-txt">3 loops</text>
  <text x="677" y="216" text-anchor="middle" class="stop-txt">many (diminishing)</text>
  <line x1="260" y1="234" x2="752" y2="234" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#ahs-arr)"/>
  <text x="506" y="246" text-anchor="middle" class="sub">more retries lift score, then flatten -&gt;</text>
</g>

<g data-anim="4">
  <text x="10" y="274" class="lbl">3. Tool suite</text>
  <rect x="250" y="262" width="512" height="24" rx="5" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <line x1="506" y1="262" x2="506" y2="286" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="378" y="278" text-anchor="middle" class="stop-txt">read + edit only</text>
  <text x="629" y="278" text-anchor="middle" class="stop-txt">+ run bash / run tests</text>
  <line x1="260" y1="296" x2="752" y2="296" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#ahs-arr)"/>
  <text x="506" y="308" text-anchor="middle" class="sub">test execution enables iterative debugging -&gt;</text>
</g>

<g data-anim="5">
  <text x="10" y="336" class="lbl">4. Context policy</text>
  <rect x="250" y="324" width="512" height="24" rx="5" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <line x1="506" y1="324" x2="506" y2="348" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="378" y="340" text-anchor="middle" class="stop-txt">hard truncate</text>
  <text x="629" y="340" text-anchor="middle" class="stop-txt">retrieve / summarize</text>
  <line x1="260" y1="358" x2="752" y2="358" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#ahs-arr)"/>
  <text x="506" y="370" text-anchor="middle" class="sub">avoiding blind truncation lifts score -&gt;</text>
</g>


<g data-anim="2" opacity="0.55">
  <path d="M752 172 L752 68" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 3"/>
</g>
<g data-anim="3" opacity="0.55">
  <path d="M752 234 L752 68" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 3"/>
</g>
<g data-anim="4" opacity="0.55">
  <path d="M752 296 L752 68" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 3"/>
</g>
<g data-anim="5" opacity="0.55">
  <path d="M752 358 L752 68" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 3"/>
</g>

<g data-anim="5">
  <rect x="10" y="392" width="760" height="66" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="390" y="416" text-anchor="middle" class="banner-txt">Comparing two leaderboard entries = comparing model + harness, not models.</text>
  <text x="390" y="436" text-anchor="middle" class="banner-txt">Always disclose the scaffold.</text>
</g>

</svg>
<figcaption><b>The harness is not a neutral measuring instrument: it is a design choice that can swing a frozen model's score by 10-20 points.</b> The same weights land at very different places on the resolve-rate axis depending on file localization, iteration budget, tool suite, and context policy — so a leaderboard number describes a (model + harness) system, not the model alone.</figcaption>
</figure>
