<figure class="viz" id="fig-canary-exposure-rank-ladder">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 760 610" role="img" aria-label="Two panels, each a vertical rank ladder of all candidate fill-ins for an inserted canary, ordered from rank 1 (the model's most-likely guess) at top to rank |R| at bottom, with an exposure meter beside it calibrated from 1 bit to log2 |R| bits. In the left panel, not memorized, the true canary sits near the middle of the ladder and the exposure meter reads near 1 bit. In the right panel, memorized, the true canary has risen to rank 1 at the top and the exposure meter reads full, at log2 |R| bits, meaning the secret is brute-force extractable. A formula reads exposure equals log2 of R minus log2 of rank, and an arrow labeled more duplication or more training points from the safe left panel to the extractable right panel.">
  <defs>
    <marker id="cel-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
  </defs>
  <style>
    #fig-canary-exposure-rank-ladder .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-canary-exposure-rank-ladder .tmpl{ font:700 13px var(--mono,monospace); }
    #fig-canary-exposure-rank-ladder .tmpl-note{ font:500 10.3px var(--sans,sans-serif); }
    #fig-canary-exposure-rank-ladder .panel-ttl{ font:700 14px var(--sans,sans-serif); }
    #fig-canary-exposure-rank-ladder .rank-lbl{ font:500 10px var(--sans,sans-serif); }
    #fig-canary-exposure-rank-ladder .true-lbl{ font:700 10px var(--sans,sans-serif); }
    #fig-canary-exposure-rank-ladder .meter-lbl{ font:600 10.5px var(--mono,monospace); }
    #fig-canary-exposure-rank-ladder .cap{ font:500 11.5px var(--sans,sans-serif); }
    #fig-canary-exposure-rank-ladder .verdict{ font:700 12.5px var(--sans,sans-serif); letter-spacing:.02em; }
    #fig-canary-exposure-rank-ladder .formula{ font:700 13px var(--mono,monospace); }
    #fig-canary-exposure-rank-ladder .arrow-lbl{ font:600 12px var(--sans,sans-serif); }
    #fig-canary-exposure-rank-ladder text{ fill: var(--ink-soft); }
    #fig-canary-exposure-rank-ladder .dim{ fill: var(--muted); }
  </style>

  <text x="380" y="22" text-anchor="middle" class="ttl">Exposure: a smooth dial that watches the true canary's rank climb</text>

  
  <g data-anim="1">
    <rect x="170" y="34" width="420" height="62" rx="10" class="v-fill" stroke="var(--ink-soft)" stroke-width="1.2" opacity="0.9"/>
    <text x="380" y="53" text-anchor="middle" class="tmpl">canary: "the access code is _ _ _ _ _ _ _ _"</text>
    <text x="380" y="70" text-anchor="middle" class="tmpl-note dim">body = random 8-digit number, inserted once into training</text>
    <text x="380" y="86" text-anchor="middle" class="tmpl-note dim">|R| = 10^8 candidate fill-ins -- log2|R| ~ 26.6 bits</text>
  </g>

  
  <g data-anim="2">
    <text x="145" y="112" text-anchor="middle" class="panel-ttl">Not memorized</text>
    <text x="125" y="124" text-anchor="middle" class="rank-lbl dim">rank 1 (most likely)</text>

    <rect x="50" y="132" width="150" height="320" fill="var(--surface-3)" class="v-stroke" stroke-width="1.2"/>
    <g class="v-grid" stroke-width="1" opacity="0.6">
      <line x1="50" y1="152" x2="200" y2="152"/><line x1="50" y1="172" x2="200" y2="172"/>
      <line x1="50" y1="192" x2="200" y2="192"/><line x1="50" y1="212" x2="200" y2="212"/>
      <line x1="50" y1="232" x2="200" y2="232"/><line x1="50" y1="252" x2="200" y2="252"/>
      <line x1="50" y1="272" x2="200" y2="272"/><line x1="50" y1="292" x2="200" y2="292"/>
      <line x1="50" y1="312" x2="200" y2="312"/><line x1="50" y1="332" x2="200" y2="332"/>
      <line x1="50" y1="352" x2="200" y2="352"/><line x1="50" y1="372" x2="200" y2="372"/>
      <line x1="50" y1="392" x2="200" y2="392"/><line x1="50" y1="412" x2="200" y2="412"/>
      <line x1="50" y1="432" x2="200" y2="432"/>
    </g>
    
    <rect x="50" y="282" width="150" height="20" fill="var(--accent)" fill-opacity="0.2" stroke="var(--accent)" stroke-width="1.6"/>
    <text x="125" y="296" text-anchor="middle" class="true-lbl" fill="var(--accent)">TRUE CANARY</text>

    <text x="125" y="466" text-anchor="middle" class="rank-lbl dim">rank |R| (least likely)</text>

    
    <rect x="225" y="132" width="26" height="320" fill="none" class="v-stroke" stroke-width="1.2"/>
    <rect x="225" y="440" width="26" height="12" fill="var(--accent)"/>
    <text x="238" y="124" text-anchor="middle" class="meter-lbl dim">log2|R|</text>
    <text x="238" y="466" text-anchor="middle" class="meter-lbl dim">1 bit</text>

    <text x="145" y="486" text-anchor="middle" class="cap">rank ~ |R|/2 -&gt; exposure ~ 1 bit</text>
    <text x="145" y="505" text-anchor="middle" class="verdict" fill="var(--good,#2f9e6e)">SAFE</text>
  </g>

  
  <g data-anim="3">
    <text x="515" y="112" text-anchor="middle" class="panel-ttl">Memorized</text>
    <text x="495" y="124" text-anchor="middle" class="rank-lbl dim">rank 1 (most likely)</text>

    <rect x="420" y="132" width="150" height="320" fill="var(--surface-3)" class="v-stroke" stroke-width="1.2"/>
    <g class="v-grid" stroke-width="1" opacity="0.6">
      <line x1="420" y1="152" x2="570" y2="152"/><line x1="420" y1="172" x2="570" y2="172"/>
      <line x1="420" y1="192" x2="570" y2="192"/><line x1="420" y1="212" x2="570" y2="212"/>
      <line x1="420" y1="232" x2="570" y2="232"/><line x1="420" y1="252" x2="570" y2="252"/>
      <line x1="420" y1="272" x2="570" y2="272"/><line x1="420" y1="292" x2="570" y2="292"/>
      <line x1="420" y1="312" x2="570" y2="312"/><line x1="420" y1="332" x2="570" y2="332"/>
      <line x1="420" y1="352" x2="570" y2="352"/><line x1="420" y1="372" x2="570" y2="372"/>
      <line x1="420" y1="392" x2="570" y2="392"/><line x1="420" y1="412" x2="570" y2="412"/>
      <line x1="420" y1="432" x2="570" y2="432"/>
    </g>
    
    <rect x="420" y="132" width="150" height="20" fill="var(--accent)" fill-opacity="0.2" stroke="var(--accent)" stroke-width="1.6"/>
    <text x="495" y="146" text-anchor="middle" class="true-lbl" fill="var(--accent)">TRUE CANARY</text>

    <text x="495" y="466" text-anchor="middle" class="rank-lbl dim">rank |R| (least likely)</text>

    
    <rect x="595" y="132" width="26" height="320" fill="none" class="v-stroke" stroke-width="1.2"/>
    <rect x="595" y="132" width="26" height="320" fill="var(--accent)"/>
    <text x="608" y="124" text-anchor="middle" class="meter-lbl dim">log2|R|</text>
    <text x="608" y="466" text-anchor="middle" class="meter-lbl dim">1 bit</text>

    <text x="515" y="486" text-anchor="middle" class="cap">rank = 1 -&gt; exposure = log2|R|</text>
    <text x="515" y="505" text-anchor="middle" class="verdict" fill="var(--accent)">BRUTE-FORCE EXTRACTABLE</text>
  </g>

  
  <g data-anim="4">
    <rect x="230" y="522" width="300" height="28" rx="8" class="v-fill" stroke="var(--ink-soft)" stroke-width="1.2"/>
    <text x="380" y="541" text-anchor="middle" class="formula">exposure = log2|R| - log2(rank)</text>
  </g>

  
  <g data-anim="5">
    <text x="380" y="568" text-anchor="middle" class="arrow-lbl" fill="var(--accent)">more duplication / more training</text>
    <line x1="100" y1="584" x2="655" y2="584" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#cel-arrow)"/>
  </g>
</svg>
<figcaption><b>Exposure is a continuous dial: as memorization grows, the true canary's rank climbs toward 1 and exposure climbs toward log2|R|.</b> With no memorization the true fill-in sits near the middle of all |R| candidates (rank ~ |R|/2, exposure ~ 1 bit); as duplication or training pushes memorization further, its rank rises until it is the model's single most-likely completion (rank 1, exposure = log2|R|) -- at which point brute-force enumeration of the candidate space extracts it. Because exposure is continuous, you can watch it climb during training and catch the leak before the model ever emits the secret verbatim.</figcaption>
</figure>
