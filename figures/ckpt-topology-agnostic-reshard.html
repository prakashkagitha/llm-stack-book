<figcaption><b>DCP's normalized chunk store decouples checkpoint layout from device topology.</b> On save, N ranks each write a disjoint slice of a logical parameter tensor W as named chunks indexed by tensor offset, not by rank. On resume, any M ranks can pull the identical chunks back out, re-partitioned however the new topology requires — no all-gather, no manual reshard step, and N need not equal M.</figcaption>
</figure>
