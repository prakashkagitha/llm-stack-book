<figure class="viz" id="fig-stable-softmax-two-lanes">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 740 470" role="img" aria-label="Two pipelines computing softmax of logits [1000, 1001]. The naive pipeline exponentiates directly, overflows to inf, and inf divided by inf produces NaN. The stable pipeline first subtracts the max logit, exponentiates safely into (0,1], normalizes, and lands on the correct result [0.268, 0.732] -- the same identity, computed without overflow.">
  <defs>
    <marker id="ssl-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-stable-softmax-two-lanes text{ fill:var(--ink-soft); font-family:var(--sans,sans-serif); }
    #fig-stable-softmax-two-lanes .lane-title{ font:700 13px var(--sans,sans-serif); }
    #fig-stable-softmax-two-lanes .box-title{ font:700 11.5px var(--mono,monospace); }
    #fig-stable-softmax-two-lanes .box-line{ font:500 11px var(--mono,monospace); }
    #fig-stable-softmax-two-lanes .cap{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-stable-softmax-two-lanes .badge-warn{ font:700 10px var(--sans,sans-serif); fill:var(--warn,#e0a106); }
    #fig-stable-softmax-two-lanes .badge-good{ font:700 12px var(--mono,monospace); fill:var(--good,#2f9e6e); }
    #fig-stable-softmax-two-lanes .nan-badge{ font:700 14px var(--mono,monospace); fill:var(--warn,#e0a106); }
    #fig-stable-softmax-two-lanes .top{ font:600 12px var(--mono,monospace); }
    #fig-stable-softmax-two-lanes .conn{ font:500 9.5px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-stable-softmax-two-lanes .note{ font:500 10.5px var(--sans,sans-serif); fill:var(--warn,#e0a106); }
    #fig-stable-softmax-two-lanes .box{ fill:var(--surface); stroke:var(--border-2); stroke-width:1.2; }
  </style>

  
  <g data-anim="1">
    <rect x="270" y="14" width="200" height="34" rx="6" class="box"/>
    <text x="370" y="36" text-anchor="middle" class="top">logits z = [1000, 1001]</text>
    <path d="M 370 48 L 210 64" fill="none" stroke="var(--ink-soft)" stroke-width="1.3" marker-end="url(#ssl-arr)" color="var(--ink-soft)"/>
    <path d="M 370 48 L 530 64" fill="none" stroke="var(--ink-soft)" stroke-width="1.3" marker-end="url(#ssl-arr)" color="var(--ink-soft)"/>
  </g>

  
  <g data-anim="1">
    <text x="185" y="82" text-anchor="middle" class="lane-title" fill="var(--warn,#e0a106)">Naive</text>
    <text x="555" y="82" text-anchor="middle" class="lane-title" fill="var(--accent)">Stable (subtract max m = 1001)</text>
  </g>

  
  <g data-anim="2">
    <rect x="70" y="96" width="230" height="82" rx="8" class="box"/>
    <text x="185" y="114" text-anchor="middle" class="box-title">exp(z)</text>
    <text x="185" y="132" text-anchor="middle" class="box-line">e^1000 -&gt; inf</text>
    <text x="185" y="148" text-anchor="middle" class="box-line">e^1001 -&gt; inf</text>
    <rect x="135" y="156" width="100" height="20" rx="10" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <text x="185" y="170" text-anchor="middle" class="badge-warn">OVERFLOW</text>
  </g>

  <g data-anim="2">
    <rect x="440" y="96" width="230" height="82" rx="8" class="box"/>
    <text x="555" y="114" text-anchor="middle" class="box-title">z - m   (m = 1001)</text>
    <text x="555" y="132" text-anchor="middle" class="box-line">[1000, 1001] - 1001</text>
    <text x="555" y="148" text-anchor="middle" class="box-line">= [-1, 0]</text>
    <text x="555" y="168" text-anchor="middle" class="cap" fill="var(--accent)">all &lt;= 0</text>
  </g>

  
  <g data-anim="3">
    <line x1="185" y1="178" x2="185" y2="196" stroke="var(--ink-soft)" stroke-width="1.3" marker-end="url(#ssl-arr)" color="var(--ink-soft)"/>
    <line x1="555" y1="178" x2="555" y2="196" stroke="var(--ink-soft)" stroke-width="1.3" marker-end="url(#ssl-arr)" color="var(--ink-soft)"/>
  </g>

  
  <g data-anim="3">
    <rect x="70" y="196" width="230" height="88" rx="8" class="box" stroke="var(--warn,#e0a106)"/>
    <text x="185" y="216" text-anchor="middle" class="box-title">inf / inf</text>
    <rect x="135" y="228" width="100" height="28" rx="14" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
    <text x="185" y="248" text-anchor="middle" class="nan-badge">NaN</text>
    <text x="185" y="272" text-anchor="middle" class="cap">undefined -- corrupts fwd/bwd pass</text>
  </g>

  <g data-anim="3">
    <rect x="440" y="196" width="230" height="88" rx="8" class="box"/>
    <text x="555" y="216" text-anchor="middle" class="box-title">exp(shifted)</text>
    <text x="555" y="234" text-anchor="middle" class="box-line">e^-1 ~= 0.368</text>
    <text x="555" y="250" text-anchor="middle" class="box-line">e^0 = 1.0</text>
    <text x="555" y="272" text-anchor="middle" class="cap" fill="var(--accent)">all in (0,1] -- no overflow</text>
  </g>

  
  <g data-anim="4">
    <line x1="185" y1="284" x2="185" y2="296" stroke="var(--warn,#e0a106)" stroke-width="1.4" stroke-dasharray="3 3"/>
    <path d="M 175 296 L 195 306 L 178 314 L 195 322" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2"/>
    <text x="185" y="342" text-anchor="middle" class="note">NaN propagates --</text>
    <text x="185" y="356" text-anchor="middle" class="note">training diverges</text>
  </g>

  
  <g data-anim="4">
    <line x1="555" y1="284" x2="555" y2="300" stroke="var(--ink-soft)" stroke-width="1.3" marker-end="url(#ssl-arr)" color="var(--ink-soft)"/>
  </g>
  <g data-anim="4">
    <rect x="440" y="300" width="230" height="96" rx="8" class="box" stroke="var(--good,#2f9e6e)"/>
    <text x="555" y="320" text-anchor="middle" class="box-title">normalize: / sum = 1.368</text>
    <text x="555" y="338" text-anchor="middle" class="box-line">[0.368/1.368, 1.0/1.368]</text>
    <text x="555" y="356" text-anchor="middle" class="cap" fill="var(--good,#2f9e6e)">correct result</text>
    <rect x="475" y="362" width="160" height="26" rx="13" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
    <text x="555" y="380" text-anchor="middle" class="badge-good">[0.268, 0.732]</text>
  </g>

  
  <g data-anim="5">
    <path d="M 220 244 C 300 260 320 280 372 296" fill="none" stroke="var(--muted)" stroke-width="1.1" stroke-dasharray="3 3"/>
    <path d="M 372 296 C 420 312 460 335 494 366" fill="none" stroke="var(--muted)" stroke-width="1.1" stroke-dasharray="3 3" marker-end="url(#ssl-arr)" color="var(--muted)"/>
    <rect x="228" y="286" width="208" height="34" rx="6" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1"/>
    <text x="332" y="300" text-anchor="middle" class="conn">identical result -- e^-m cancels</text>
    <text x="332" y="314" text-anchor="middle" class="conn">(naive hits inf / inf first)</text>
  </g>

  
  <g data-anim="5">
    <rect x="110" y="416" width="520" height="34" rx="6" fill="var(--surface-3)" fill-opacity="0.6" stroke="var(--border-2)" stroke-width="1"/>
    <text x="370" y="437" text-anchor="middle" class="note">Even fp32 overflows at exp(~88); the max-shift is mandatory, not optional.</text>
  </g>
</svg>
<figcaption><b>Same softmax, two pipelines: the naive one overflows to inf and collapses to NaN, while max-subtraction keeps every intermediate value in (0,1] and lands on the same correct answer.</b> Subtracting the max logit before exponentiating is an exact algebraic rewrite — the <code>e^-m</code> factor cancels in numerator and denominator — not an approximation, so stable softmax is never less accurate than naive softmax, only more robust.</figcaption>
</figure>
