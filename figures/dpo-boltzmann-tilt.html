<figure class="viz" id="fig-dpo-boltzmann-tilt">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 800 640" role="img" aria-label="Three-panel bar chart showing the reference policy pi_ref over six candidate responses tilted by exp(reward over beta) and renormalized into the optimal policy pi_star, which concentrates mass on the high-reward responses while still resembling the reference; a beta temperature control below shows that small beta produces a sharp policy far from the reference while large beta stays close to it.">
<defs>
  <marker id="dbt-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="dbt-arrow-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-dpo-boltzmann-tilt text          { fill: var(--ink-soft,#333); }
  #fig-dpo-boltzmann-tilt .ttl          { font: 700 15px var(--sans,sans-serif); }
  #fig-dpo-boltzmann-tilt .panel-h      { font: 700 13px var(--sans,sans-serif); }
  #fig-dpo-boltzmann-tilt .panel-cap    { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-dpo-boltzmann-tilt .bar-lbl      { font: 600 10px var(--mono,monospace); fill: var(--muted,#777); }
  #fig-dpo-boltzmann-tilt .arrow-lbl    { font: 700 11px var(--mono,monospace); }
  #fig-dpo-boltzmann-tilt .note         { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-dpo-boltzmann-tilt .note-b       { font: 700 10px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-dpo-boltzmann-tilt .footer-h     { font: 700 12.5px var(--sans,sans-serif); }
  #fig-dpo-boltzmann-tilt .footer-lbl   { font: 700 11px var(--sans,sans-serif); }
  #fig-dpo-boltzmann-tilt .footer-cap   { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-dpo-boltzmann-tilt .panel-box    { fill: var(--surface,#fff); stroke: var(--border-2,#ccc); stroke-width: 1.2; }
  #fig-dpo-boltzmann-tilt .bar-neutral  { fill: var(--surface-3,#eee); stroke: var(--border-2,#999); stroke-width: 1; }
  #fig-dpo-boltzmann-tilt .bar-accent   { fill: var(--accent,#c15b39); stroke: var(--accent,#c15b39); stroke-width: 1; }
  #fig-dpo-boltzmann-tilt .baseline     { stroke: var(--v-grid,#ccc); stroke-width: 1.3; }
</style>

<text x="400" y="20" text-anchor="middle" class="ttl">Tilting the reference policy toward high reward, then renormalizing</text>

<g data-anim="1">
  <rect x="15" y="40" width="220" height="300" rx="10" class="panel-box"/>
  <text x="125" y="66" text-anchor="middle" class="panel-h">1. Reference pi_ref</text>

  <line class="baseline" x1="22" y1="256" x2="228" y2="256"/>
  <rect x="22"  y="198" width="26" height="58" class="bar-neutral"/>
  <rect x="58"  y="190" width="26" height="66" class="bar-neutral"/>
  <rect x="94"  y="184" width="26" height="72" class="bar-neutral"/>
  <rect x="130" y="192" width="26" height="64" class="bar-neutral"/>
  <rect x="166" y="200" width="26" height="56" class="bar-neutral"/>
  <rect x="202" y="188" width="26" height="68" class="bar-neutral"/>
  <text x="35"  y="272" text-anchor="middle" class="bar-lbl">y1</text>
  <text x="71"  y="272" text-anchor="middle" class="bar-lbl">y2</text>
  <text x="107" y="272" text-anchor="middle" class="bar-lbl">y3</text>
  <text x="143" y="272" text-anchor="middle" class="bar-lbl">y4</text>
  <text x="179" y="272" text-anchor="middle" class="bar-lbl">y5</text>
  <text x="215" y="272" text-anchor="middle" class="bar-lbl">y6</text>

  <text x="125" y="300" text-anchor="middle" class="panel-cap">fairly flat / broad --</text>
  <text x="125" y="314" text-anchor="middle" class="panel-cap">mass spread across many</text>
  <text x="125" y="328" text-anchor="middle" class="panel-cap">plausible responses</text>
</g>


<g data-anim="2">
  <line x1="238" y1="184" x2="272" y2="184" stroke="var(--ink-soft,#555)" stroke-width="1.8" marker-end="url(#dbt-arrow)"/>
  <text x="255" y="172" text-anchor="middle" class="arrow-lbl">tilt</text>

  <rect x="275" y="40" width="220" height="300" rx="10" class="panel-box"/>
  <text x="385" y="66" text-anchor="middle" class="panel-h">2. Tilt by exp(r/beta)</text>


  <line class="baseline" x1="282" y1="256" x2="488" y2="256"/>
  <rect x="282" y="221" width="26" height="35"  class="bar-neutral"/>
  <rect x="318" y="190" width="26" height="66"  class="bar-neutral"/>
  <rect x="354" y="134" width="26" height="122" class="bar-accent"/>
  <rect x="390" y="221" width="26" height="35"  class="bar-neutral"/>
  <rect x="426" y="195" width="26" height="61"  class="bar-neutral"/>
  <rect x="462" y="147" width="26" height="109" class="bar-accent"/>

  <path d="M 289,203 L 301,203 L 295,211 Z" fill="var(--muted,#888)"/>
  <line x1="325" y1="176" x2="337" y2="176" stroke="var(--muted,#888)" stroke-width="2.4"/>
  <path d="M 361,124 L 373,124 L 367,116 Z" fill="var(--accent,#c15b39)"/>
  <path d="M 397,203 L 409,203 L 403,211 Z" fill="var(--muted,#888)"/>
  <line x1="433" y1="181" x2="445" y2="181" stroke="var(--muted,#888)" stroke-width="2.4"/>
  <path d="M 469,137 L 481,137 L 475,129 Z" fill="var(--accent,#c15b39)"/>

  <text x="295" y="272" text-anchor="middle" class="bar-lbl">y1</text>
  <text x="331" y="272" text-anchor="middle" class="bar-lbl">y2</text>
  <text x="367" y="272" text-anchor="middle" class="bar-lbl">y3</text>
  <text x="403" y="272" text-anchor="middle" class="bar-lbl">y4</text>
  <text x="439" y="272" text-anchor="middle" class="bar-lbl">y5</text>
  <text x="475" y="272" text-anchor="middle" class="bar-lbl">y6</text>

  <text x="385" y="300" text-anchor="middle" class="panel-cap">multiply each response by</text>
  <text x="385" y="314" text-anchor="middle" class="panel-cap">its exponentiated reward --</text>
  <text x="385" y="328" text-anchor="middle" class="panel-cap">high-reward bars grow (accent)</text>
</g>


<g data-anim="3">
  <line x1="498" y1="184" x2="532" y2="184" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#dbt-arrow-acc)"/>
  <text x="515" y="172" text-anchor="middle" class="arrow-lbl" fill="var(--accent,#c15b39)">/ Z(x)</text>

  <line x1="515" y1="192" x2="515" y2="352" stroke="var(--muted,#999)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="422" y="352" width="186" height="40" rx="7" fill="var(--surface-3,#f4f4f4)" stroke="var(--muted,#999)" stroke-width="1"/>
  <text x="515" y="367" text-anchor="middle" class="note-b">Z(x) = sum over ALL responses</text>
  <text x="515" y="381" text-anchor="middle" class="note">(why we can't just compute this)</text>

  <rect x="535" y="40" width="220" height="300" rx="10" class="panel-box" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
  <text x="645" y="66" text-anchor="middle" class="panel-h">3. Renormalize -&gt; pi*</text>

  <line class="baseline" x1="542" y1="256" x2="748" y2="256"/>
  <rect x="542" y="225" width="26" height="31"  class="bar-neutral"/>
  <rect x="578" y="197" width="26" height="59"  class="bar-neutral"/>
  <rect x="614" y="147" width="26" height="109" class="bar-accent"/>
  <rect x="650" y="225" width="26" height="31"  class="bar-neutral"/>
  <rect x="686" y="201" width="26" height="55"  class="bar-neutral"/>
  <rect x="722" y="158" width="26" height="98"  class="bar-accent"/>
  <text x="555" y="272" text-anchor="middle" class="bar-lbl">y1</text>
  <text x="591" y="272" text-anchor="middle" class="bar-lbl">y2</text>
  <text x="627" y="272" text-anchor="middle" class="bar-lbl">y3</text>
  <text x="663" y="272" text-anchor="middle" class="bar-lbl">y4</text>
  <text x="699" y="272" text-anchor="middle" class="bar-lbl">y5</text>
  <text x="735" y="272" text-anchor="middle" class="bar-lbl">y6</text>

  <text x="645" y="300" text-anchor="middle" class="panel-cap">pi* is prop. to pi_ref * exp(r/beta),</text>
  <text x="645" y="314" text-anchor="middle" class="panel-cap">then divide by Z(x) --</text>
  <text x="645" y="328" text-anchor="middle" class="panel-cap">peaked, but still not one bar</text>
</g>


<g data-anim="4">
  <rect x="15" y="408" width="770" height="215" rx="10" fill="var(--surface-3,#f7f5f0)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="400" y="432" text-anchor="middle" class="footer-h">beta is a temperature: how far pi* drifts from pi_ref</text>

  <line x1="160" y1="472" x2="640" y2="472" stroke="var(--v-grid,#ccc)" stroke-width="1.6" marker-end="url(#dbt-arrow)"/>
  <line x1="160" y1="472" x2="640" y2="472" stroke="var(--v-grid,#ccc)" stroke-width="1.6" marker-start="url(#dbt-arrow)"/>
  <text x="160" y="458" text-anchor="middle" class="footer-lbl">small beta</text>
  <text x="640" y="458" text-anchor="middle" class="footer-lbl">large beta</text>

  <circle cx="255" cy="472" r="5" fill="var(--accent,#c15b39)"/>
  <text x="255" y="494" text-anchor="middle" class="footer-cap">typical: beta = 0.1-0.5</text>


  <line class="baseline" x1="116" y1="560" x2="184" y2="560"/>
  <rect x="116" y="552" width="8" height="8"  class="bar-neutral"/>
  <rect x="128" y="552" width="8" height="8"  class="bar-neutral"/>
  <rect x="140" y="548" width="8" height="12" class="bar-neutral"/>
  <rect x="152" y="552" width="8" height="8"  class="bar-neutral"/>
  <rect x="164" y="548" width="8" height="12" class="bar-neutral"/>
  <rect x="176" y="518" width="8" height="42" class="bar-accent"/>
  <text x="150" y="580" text-anchor="middle" class="footer-cap">sharp, drifts far from ref</text>


  <line class="baseline" x1="616" y1="560" x2="684" y2="560"/>
  <rect x="616" y="531" width="8" height="29" class="bar-neutral"/>
  <rect x="628" y="527" width="8" height="33" class="bar-neutral"/>
  <rect x="640" y="524" width="8" height="36" class="bar-neutral"/>
  <rect x="652" y="528" width="8" height="32" class="bar-neutral"/>
  <rect x="664" y="532" width="8" height="28" class="bar-neutral"/>
  <rect x="676" y="526" width="8" height="34" class="bar-neutral"/>
  <text x="650" y="580" text-anchor="middle" class="footer-cap">gentle, stays near ref</text>

  <text x="400" y="608" text-anchor="middle" class="footer-cap">beta is the KL leash: small beta lets pi* chase reward hard; large beta keeps it close to pi_ref.</text>
</g>

</svg>
<figcaption><b>The optimal aligned policy is the reference distribution tilted by the exponentiated reward and renormalized.</b> Panel 1 shows a broad reference pi_ref over six candidate responses; Panel 2 multiplies each response's mass by exp(r/beta), growing the high-reward ones (accent) and shrinking the rest; Panel 3 divides by the partition function Z(x) to get pi*, a peaked-but-not-collapsed distribution that still resembles the reference. Z(x) sums over every possible response -- intractable to compute directly, which is exactly why DPO avoids computing it at all. The footer shows beta as a temperature: small beta produces a sharp policy far from pi_ref, large beta keeps it close.</figcaption>
</figure>
