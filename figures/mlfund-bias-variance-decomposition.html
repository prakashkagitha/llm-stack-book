<figcaption><b>Model complexity trades bias for variance, and their sum is U-shaped.</b> The top row shows the same noisy training draw fit by a line (underfit, high bias, misses the wave), a moderate curve (balanced, tracks it well and barely changes across re-draws), and a high-degree curve (overfit, high variance, threads every noise point and swings wildly between re-draws). The bottom panel shows why: bias&#178; falls and variance rises with complexity, and their sum has a minimum — the sweet spot — sitting right under the good fit above, on top of an irreducible noise floor no model can beat.</figcaption>
</figure>
