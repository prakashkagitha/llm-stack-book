<style>

  #fig-hierarchical-allreduce-stages .nv-tag { font: 700 9px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
  #fig-hierarchical-allreduce-stages .ib-tag { font: 700 9px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-hierarchical-allreduce-stages .annot  { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted); }

  /* Stage highlight animations */
  @keyframes har-pulse-s1 {
    0%,100% { opacity: 1; }
    34%,66% { opacity: 0.3; }
  }
  @keyframes har-pulse-s2 {
    0%,33%  { opacity: 0.3; }
    34%,66% { opacity: 1; }
    67%,100%{ opacity: 0.3; }
  }
  @keyframes har-pulse-s3 {
    0%,66%  { opacity: 0.3; }
    67%,100%{ opacity: 1; }
  }

  /* NV arrow animation (inward collapse) */
  @keyframes har-nv-in {
    0%,10%  { stroke-dashoffset: 20; opacity: 0.2; }
    34%     { stroke-dashoffset: 0;  opacity: 1; }
    40%,100%{ stroke-dashoffset: 0;  opacity: 0.5; }
  }
  /* IB arrow animation */
  @keyframes har-ib-travel {
    0%,33%  { stroke-dashoffset: 30; opacity: 0.2; }
    66%     { stroke-dashoffset: 0;  opacity: 1; }
    72%,100%{ stroke-dashoffset: 0;  opacity: 0.5; }
  }
  /* NV out animation */
  @keyframes har-nv-out {
    0%,66%  { stroke-dashoffset: 20; opacity: 0.2; }
    100%    { stroke-dashoffset: 0;  opacity: 1; }
  }

  #fig-hierarchical-allreduce-stages .s1-group {
    animation: har-pulse-s1 5.4s ease-in-out infinite;
  }
  #fig-hierarchical-allreduce-stages .s2-group {
    animation: har-pulse-s2 5.4s ease-in-out infinite;
  }
  #fig-hierarchical-allreduce-stages .s3-group {
    animation: har-pulse-s3 5.4s ease-in-out infinite;
  }
  #fig-hierarchical-allreduce-stages .nv-in-line {
    stroke-dasharray: 20;
    animation: har-nv-in 5.4s ease-in-out infinite;
  }
  #fig-hierarchical-allreduce-stages .ib-line {
    stroke-dasharray: 30;
    animation: har-ib-travel 5.4s ease-in-out infinite;
  }
  #fig-hierarchical-allreduce-stages .nv-out-line {
    stroke-dasharray: 20;
    animation: har-nv-out 5.4s ease-in-out infinite;
  }
</style>

<text x="490" y="507" text-anchor="middle" class="cap-it">Intra-node BW (~900 GB/s NVLink) is ~10-50x faster than inter-node (~25-50 GB/s InfiniBand).</text>
<text x="490" y="521" text-anchor="middle" class="cap-it">NVLink steps (S1, S3) wrap the single expensive IB step (S2). NCCL detects topology and does this automatically.</text>
</svg>
<figcaption><b>Hierarchical all-reduce across 4 nodes x 8 GPUs: fast-slow-fast.</b> Stage 1 uses NVLink (~900 GB/s) to reduce-scatter within each node so each node holds one fully-reduced 1/8 segment. Stage 2 performs the expensive all-reduce across nodes over InfiniBand (~25-50 GB/s) — only the small segments cross the wire. Stage 3 uses NVLink again to all-gather within each node so every GPU ends with the complete result. NCCL detects the topology and applies this hierarchy automatically.</figcaption>
</figure>
