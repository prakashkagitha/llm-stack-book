<text x="445" y="258" text-anchor="middle" class="axis">granularity cost vs. quality tradeoff &#x2192;</text>
</svg>
<figcaption><b>Three granularity levels for weight-matrix quantization.</b> Per-tensor assigns a single scale to the whole matrix (fastest but most susceptible to outliers), per-channel assigns one scale per output row (standard practice), and per-group assigns one scale per contiguous block of G=128 columns within each row — the dominant scheme for LLM INT4, costing only 0.125 extra bits per weight.</figcaption>
</figure>
