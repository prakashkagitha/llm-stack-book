<figure class="viz" id="fig-agentic-trajectory-loss-mask">

</defs>
<style>

  #fig-agentic-trajectory-loss-mask .sub    { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-agentic-trajectory-loss-mask .seg-name { font: 700 11.5px var(--sans,sans-serif); }

  #fig-agentic-trajectory-loss-mask .mask-lbl  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-agentic-trajectory-loss-mask .callout   { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-agentic-trajectory-loss-mask .leg-lbl   { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-agentic-trajectory-loss-mask .reward-lbl{ font: 700 10px var(--sans,sans-serif); fill: #fff; }
</style>

      stroke="var(--muted,#888)" stroke-width="1.1" marker-end="url(#tlm-up)"/>

<text x="90" y="225" text-anchor="middle" class="callout">no loss</text>


<line x1="212" y1="197" x2="212" y2="185"

<line x1="770" y1="197" x2="770" y2="185"
      stroke="var(--muted,#888)" stroke-width="1.1" marker-end="url(#tlm-up)"/>
<text x="770" y="212" text-anchor="middle" class="callout">reward r</text>
<text x="770" y="225" text-anchor="middle" class="callout">assigned here</text>


<line x1="30" y1="240" x2="820" y2="240"
      stroke="var(--border-2,#e0e4ea)" stroke-width="0.7" opacity="0.5"/>


<text x="30" y="258" class="sub" font-size="9.5">Token stream flows left-to-right. Gradient flows through ACTION tokens only (mask m_i = 1); SYSTEM and OBSERVATION tokens are frozen context (m_i = 0).</text>

</svg>
<figcaption><b>The flattened trajectory token stream and its per-token loss mask.</b> Six contiguous segments — SYSTEM (prompt), two ACTION/OBSERVATION pairs, and a final ACTION (answer) — form a single sequence fed to the trainer. The loss mask (row beneath) is 1 only on ACTION tokens, so gradients flow exclusively through the policy's own generated text; environment-injected observations and the conditioning prompt contribute to context but never receive a gradient.</figcaption>
</figure>
