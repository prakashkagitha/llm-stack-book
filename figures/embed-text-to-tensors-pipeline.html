    @keyframes tp-travel {
      0%   { cy: 52px; opacity:1; }
      14%  { cy: 175px; }
      28%  { cy: 335px; }
      42%  { cy: 495px; }
      56%  { cy: 655px; }
      70%  { cy: 800px; opacity:1; }
      80%  { opacity:0; }
      99%  { cy: 52px; opacity:0; }
      100% { cy: 52px; opacity:1; }
    }
    @keyframes tp-flash {
      0%,12%  { stroke-opacity:1; }
      15%,30% { stroke-opacity:1; stroke-width:3; }
      35%,100%{ stroke-opacity:1; stroke-width:1.5; }
    }
    @keyframes tp-rflash {
      0%,38%  { opacity:0.35; }
      42%,58% { opacity:1; }
      63%,100%{ opacity:0.35; }
    }

<figcaption><b>From raw text to the first Transformer block input.</b> Five stages transform discrete symbols into a continuous tensor: tokenization maps characters to integer IDs, BOS prepending grows the sequence to T=8, the embedding table lookup replaces each ID with a learned 768-dim vector, positional encoding adds position information element-wise, and the resulting [1, 8, 768] tensor enters Transformer Block 0. The animated dot traces the forward-pass direction; each card's border brightens as it is reached.</figcaption>
