<figure class="viz" id="fig-softprompt-frozen-backbone-gradient-flow">
<svg viewBox="0 0 820 490" role="img" aria-label="Soft prompting architecture: three trainable soft-token embeddings are prepended to input token embeddings, the concatenated sequence enters a fully frozen transformer, output logits emerge on the right, and gradients flow only back to the soft-token embeddings.">
  <defs>
    <marker id="sp-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#e1845f)"/>
    </marker>
    <marker id="sp-arrow-neutral" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#978f83)"/>
    </marker>
    <marker id="sp-arrow-strong" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-label" fill="var(--ink-soft,#cbc4b8)"/>
    </marker>
    
    <marker id="sp-arrow-grad-left" viewBox="0 0 10 10" refX="2" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10 0 L0 5 L10 10 z" fill="var(--accent,#e1845f)"/>
    </marker>
  </defs>

  <style>
    #fig-softprompt-frozen-backbone-gradient-flow .lbl {
      font: 600 12px var(--sans,sans-serif);
    }
    #fig-softprompt-frozen-backbone-gradient-flow .lbl-sm {
      font: 400 10px var(--sans,sans-serif);
    }
    #fig-softprompt-frozen-backbone-gradient-flow .lbl-caps {
      font: 600 10px var(--sans,sans-serif);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #fig-softprompt-frozen-backbone-gradient-flow .lbl-inner {
      font: 400 11px var(--sans,sans-serif);
    }
    #fig-softprompt-frozen-backbone-gradient-flow .caption-txt {
      font: 500 11px var(--sans,sans-serif);
    }
    #fig-softprompt-frozen-backbone-gradient-flow text {
      fill: var(--ink-soft,#cbc4b8);
    }
  </style>

  
  
  
  <g id="soft-tokens">
    
    <rect x="14" y="44" width="150" height="38" rx="6"
          fill="var(--accent,#e1845f)" stroke="var(--accent,#e1845f)"
          stroke-width="2"/>
    <text x="89" y="68" text-anchor="middle" class="lbl" fill="#fff">soft token 1</text>

    
    <rect x="14" y="92" width="150" height="38" rx="6"
          fill="var(--accent,#e1845f)" stroke="var(--accent,#e1845f)"
          stroke-width="2"/>
    <text x="89" y="116" text-anchor="middle" class="lbl" fill="#fff">soft token 2</text>

    
    <circle cx="89" cy="133" r="2.5" fill="var(--accent,#e1845f)"/>
    <circle cx="89" cy="142" r="2.5" fill="var(--accent,#e1845f)"/>
    <circle cx="89" cy="151" r="2.5" fill="var(--accent,#e1845f)"/>

    
    <rect x="14" y="152" width="150" height="38" rx="6"
          fill="var(--accent,#e1845f)" stroke="var(--accent,#e1845f)"
          stroke-width="2"/>
    <text x="89" y="176" text-anchor="middle" class="lbl" fill="#fff">soft token k</text>

    
    <text x="89" y="34" text-anchor="middle" class="lbl-caps" fill="var(--accent,#e1845f)">trainable</text>
  </g>

  
  
  
  <g id="input-tokens">
    
    <rect x="14" y="228" width="150" height="38" rx="6"
          class="v-fill" fill="var(--surface,#2f2b27)"
          stroke="var(--ink-soft,#cbc4b8)" stroke-width="1.5"/>
    <text x="89" y="252" text-anchor="middle" class="lbl">input token 1</text>

    
    <rect x="14" y="276" width="150" height="38" rx="6"
          class="v-fill" fill="var(--surface,#2f2b27)"
          stroke="var(--ink-soft,#cbc4b8)" stroke-width="1.5"/>
    <text x="89" y="300" text-anchor="middle" class="lbl">input token 2</text>

    
    <text x="89" y="334" text-anchor="middle" class="lbl" fill="var(--muted,#978f83)">&#8230;</text>

    
    <text x="89" y="356" text-anchor="middle" class="lbl-caps" fill="var(--muted,#978f83)">input tokens</text>
  </g>

  
  
  
  <g id="frozen-transformer">
    
    <rect x="240" y="30" width="360" height="340" rx="10"
          fill="var(--surface-3,#2f2b27)" stroke="var(--ink-soft,#cbc4b8)"
          stroke-width="1.5"/>

    
    <text x="420" y="58" text-anchor="middle" class="lbl-caps">frozen transformer</text>

    
    <rect x="268" y="70" width="304" height="90" rx="6"
          fill="var(--surface,#201d1a)" stroke="var(--border-2,#413c35)"
          stroke-width="1" stroke-dasharray="4 3"/>
    <text x="420" y="104" text-anchor="middle" class="lbl-inner">multi-layer self-attention + FFN</text>
    <text x="420" y="122" text-anchor="middle" class="lbl-inner">(all weights frozen)</text>

    
    <g transform="translate(570,44)">
      
      <rect x="-10" y="2" width="20" height="14" rx="3"
            fill="var(--muted,#978f83)" stroke="none"/>
      
      <path d="M -5 2 L -5 -4 A 5 5 0 0 1 5 -4 L 5 2"
            fill="none" stroke="var(--muted,#978f83)" stroke-width="2.5"
            stroke-linecap="round"/>
      
      <circle cx="0" cy="9" r="2.5" fill="var(--surface-3,#2f2b27)"/>
    </g>
  </g>

  
  
  
  <g id="output-logits">
    <rect x="646" y="160" width="148" height="48" rx="6"
          class="v-fill" fill="var(--surface,#2f2b27)"
          stroke="var(--ink-soft,#cbc4b8)" stroke-width="1.5"/>
    <text x="720" y="190" text-anchor="middle" class="lbl">output logits</text>
  </g>

  
  
  
  
  <line x1="164" y1="63" x2="236" y2="110"
        stroke="var(--accent,#e1845f)" stroke-width="2"
        marker-end="url(#sp-arrow-accent)"/>

  
  <line x1="164" y1="111" x2="236" y2="125"
        stroke="var(--accent,#e1845f)" stroke-width="2"
        marker-end="url(#sp-arrow-accent)"/>

  
  <line x1="164" y1="171" x2="236" y2="140"
        stroke="var(--accent,#e1845f)" stroke-width="2"
        marker-end="url(#sp-arrow-accent)"/>

  
  
  
  
  <line x1="164" y1="247" x2="236" y2="200"
        stroke="var(--muted,#978f83)" stroke-width="1.8"
        marker-end="url(#sp-arrow-neutral)"/>

  
  <line x1="164" y1="295" x2="236" y2="220"
        stroke="var(--muted,#978f83)" stroke-width="1.8"
        marker-end="url(#sp-arrow-neutral)"/>

  
  
  
  <line x1="600" y1="184" x2="642" y2="184"
        stroke="var(--ink-soft,#cbc4b8)" stroke-width="2"
        marker-end="url(#sp-arrow-strong)"/>

  
  
  
  
  
  <line x1="94" y1="396" x2="650" y2="396"
        stroke="var(--accent,#e1845f)" stroke-width="2"
        stroke-dasharray="6 4"
        marker-start="url(#sp-arrow-grad-left)"/>

  
  <path d="M656 392 L668 392 L662 404 z"
        fill="none" stroke="var(--accent,#e1845f)" stroke-width="1.6"
        stroke-linejoin="round"/>

  
  <text x="375" y="418" text-anchor="middle" class="caption-txt"
        fill="var(--accent,#e1845f)">gradients flow ONLY to soft-token embeddings</text>

  
  
  
  <g id="legend" transform="translate(14,450)">
    
    <rect x="0" y="0" width="12" height="12" rx="2"
          fill="var(--accent,#e1845f)"/>
    <text x="17" y="10" class="lbl-sm">trainable (soft prompt)</text>

    
    <rect x="0" y="18" width="12" height="12" rx="2"
          class="v-fill" fill="var(--surface,#2f2b27)"
          stroke="var(--ink-soft,#cbc4b8)" stroke-width="1"/>
    <text x="17" y="28" class="lbl-sm">frozen (backbone + real tokens)</text>
  </g>

</svg>
<figcaption><b>Soft prompting prepends a small set of learnable continuous vectors to a fully frozen transformer.</b> Only the <em>k</em> soft-token embeddings receive gradients during fine-tuning; every backbone weight stays fixed. This means the entire representational power of a large pretrained model is available while the tunable parameter count is just <em>k &amp;times; d</em> — often less than 0.01% of the base model.</figcaption>
</figure>
