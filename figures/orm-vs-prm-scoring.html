<figure class="viz" id="fig-orm-vs-prm-scoring">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 400" role="img" aria-label="A single reasoning trace of four steps leading to a final answer is scored two ways. An Outcome Reward Model spans the whole trace with one bracket collapsing to a single scalar reward, blind to which step went wrong. A Process Reward Model scores each step individually; step 2 scores low and is flagged as the weakest link, and the aggregate score is the minimum over all step scores, which a lucky final answer cannot rescue.">
<defs>
  <marker id="ops-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-stroke-fill"/>
  </marker>
</defs>
<style>
  #fig-orm-vs-prm-scoring text { fill: var(--ink-soft,#374151); font: 400 12px var(--sans,sans-serif); }
  #fig-orm-vs-prm-scoring .band-title  { font: 700 13px var(--sans,sans-serif); }
  #fig-orm-vs-prm-scoring .step-lbl    { font: 600 11.5px var(--sans,sans-serif); }
  #fig-orm-vs-prm-scoring .ans-lbl     { font: 700 11.5px var(--sans,sans-serif); }
  #fig-orm-vs-prm-scoring .score-lbl   { font: 700 10.5px var(--mono,monospace); }
  #fig-orm-vs-prm-scoring .ann-text    { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-orm-vs-prm-scoring .cap-box     { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-orm-vs-prm-scoring .v-stroke-fill { fill: var(--border-2,#94a3b8); }
  #fig-orm-vs-prm-scoring .step-box    { fill: var(--surface,#f8fafc); stroke: var(--border-2,#94a3b8); stroke-width: 1.5; }
  #fig-orm-vs-prm-scoring .ans-box     { fill: var(--surface-3,#ece7da); stroke: var(--border-2,#94a3b8); stroke-width: 1.5; }
  #fig-orm-vs-prm-scoring .chain-edge  { stroke: var(--border-2,#94a3b8); stroke-width: 1.6; }
  #fig-orm-vs-prm-scoring .orm-bracket { fill: none; stroke: var(--accent2,#3b82f6); stroke-width: 1.8; }
  #fig-orm-vs-prm-scoring .orm-scalar  { fill: var(--accent2,#3b82f6); stroke: var(--accent2,#3b82f6); }
  #fig-orm-vs-prm-scoring .prm-pill-good { fill: var(--good,#2f9e6e); fill-opacity: 0.16; stroke: var(--good,#2f9e6e); stroke-width: 1.4; }
  #fig-orm-vs-prm-scoring .prm-pill-bad  { fill: var(--warn,#e0a106); fill-opacity: 0.22; stroke: var(--warn,#e0a106); stroke-width: 1.8; }
  #fig-orm-vs-prm-scoring .score-good   { fill: var(--good,#2f9e6e); }
  #fig-orm-vs-prm-scoring .score-bad    { fill: var(--warn,#e0a106); }
  #fig-orm-vs-prm-scoring .weak-tag     { fill: var(--warn,#e0a106); }
  #fig-orm-vs-prm-scoring .weak-tag-txt { font: 700 9.5px var(--sans,sans-serif); fill: #fff; }
  #fig-orm-vs-prm-scoring .divider     { stroke: var(--border-2,#94a3b8); stroke-width: 1; stroke-dasharray: 3 4; opacity: 0.55; }
  #fig-orm-vs-prm-scoring [data-anim] { opacity: 0; animation: ops-in .5s ease forwards; }
  #fig-orm-vs-prm-scoring [data-anim="1"] { animation-delay: .05s; }
  #fig-orm-vs-prm-scoring [data-anim="2"] { animation-delay: .4s; }
  #fig-orm-vs-prm-scoring [data-anim="3"] { animation-delay: .8s; }
  #fig-orm-vs-prm-scoring [data-anim="4"] { animation-delay: 1.2s; }
  @keyframes ops-in { to { opacity: 1; } }
</style>


<g data-anim="1">
  <text x="20" y="24" class="band-title">Reasoning trace</text>

  <rect x="20"  y="34" width="122" height="38" rx="7" class="step-box"/>
  <text x="81"  y="58" text-anchor="middle" class="step-lbl">Step 1</text>

  <rect x="172" y="34" width="122" height="38" rx="7" class="step-box"/>
  <text x="233" y="58" text-anchor="middle" class="step-lbl">Step 2</text>

  <rect x="324" y="34" width="122" height="38" rx="7" class="step-box"/>
  <text x="385" y="58" text-anchor="middle" class="step-lbl">Step 3</text>

  <rect x="476" y="34" width="122" height="38" rx="7" class="step-box"/>
  <text x="537" y="58" text-anchor="middle" class="step-lbl">Step 4</text>

  <rect x="628" y="34" width="132" height="38" rx="7" class="ans-box"/>
  <text x="694" y="58" text-anchor="middle" class="ans-lbl">Final Answer</text>

  <line x1="142" y1="53" x2="168" y2="53" class="chain-edge" marker-end="url(#ops-arrow)"/>
  <line x1="294" y1="53" x2="320" y2="53" class="chain-edge" marker-end="url(#ops-arrow)"/>
  <line x1="446" y1="53" x2="472" y2="53" class="chain-edge" marker-end="url(#ops-arrow)"/>
  <line x1="598" y1="53" x2="624" y2="53" class="chain-edge" marker-end="url(#ops-arrow)"/>
</g>

<line x1="10" y1="104" x2="770" y2="104" class="divider"/>


<g data-anim="2">
  <text x="20" y="126" class="band-title" fill="var(--accent2,#3b82f6)">Outcome Reward Model (ORM)</text>

  
  <path class="orm-bracket" d="M20,146 Q20,158 34,158 L584,158 Q598,158 598,146"/>
  <line x1="598" y1="152" x2="628" y2="152" class="orm-bracket" marker-end="url(#ops-arrow)"/>

  <rect x="628" y="132" width="132" height="40" rx="8" class="orm-scalar"/>
  <text x="694" y="157" text-anchor="middle" class="score-lbl" fill="#fff">r_ORM in R</text>

  <text x="20" y="178" class="ann-text">
    <tspan x="20" dy="0">one number for the entire solution - sees only the outcome, blind to</tspan>
    <tspan x="20" dy="14">WHERE the reasoning went wrong; a lucky-but-unsound answer can still score high</tspan>
  </text>
</g>

<line x1="10" y1="214" x2="770" y2="214" class="divider"/>


<g data-anim="3">
  <text x="20" y="236" class="band-title" fill="var(--warn,#e0a106)">Process Reward Model (PRM)</text>

  
  <rect x="36"  y="248" width="50" height="26" rx="13" class="prm-pill-good"/>
  <text x="61"  y="266" text-anchor="middle" class="score-lbl score-good">r1 0.9</text>

  <rect x="188" y="248" width="50" height="26" rx="13" class="prm-pill-bad"/>
  <text x="213" y="266" text-anchor="middle" class="score-lbl score-bad">r2 0.2</text>

  <rect x="340" y="248" width="50" height="26" rx="13" class="prm-pill-good"/>
  <text x="365" y="266" text-anchor="middle" class="score-lbl score-good">r3 0.8</text>

  <rect x="492" y="248" width="50" height="26" rx="13" class="prm-pill-good"/>
  <text x="517" y="266" text-anchor="middle" class="score-lbl score-good">r4 0.9</text>

  
  <line x1="81"  y1="72" x2="61"  y2="248" class="chain-edge" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="233" y1="72" x2="213" y2="248" class="chain-edge" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="385" y1="72" x2="365" y2="248" class="chain-edge" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="537" y1="72" x2="517" y2="248" class="chain-edge" stroke-dasharray="2 3" opacity="0.5"/>

  
  <rect x="188" y="284" width="98" height="20" rx="4" class="weak-tag"/>
  <text x="237" y="298" text-anchor="middle" class="weak-tag-txt">weakest link</text>
  <line x1="213" y1="274" x2="213" y2="284" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>

  
  <line x1="592" y1="261" x2="622" y2="261" class="chain-edge" marker-end="url(#ops-arrow)"/>
  <rect x="622" y="240" width="138" height="42" rx="8" fill="var(--surface,#f8fafc)" stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
  <text x="691" y="257" text-anchor="middle" class="score-lbl">s = min_t r(step t)</text>
  <text x="691" y="272" text-anchor="middle" class="ann-text" fill="var(--warn,#e0a106)">picks up low r2</text>
</g>

<g data-anim="4">
  <text x="20" y="330" class="ann-text">
    <tspan x="20" dy="0">a flawed early step dooms the solution even if the final answer happens to be right -</tspan>
    <tspan x="20" dy="14">PRM catches it, ORM cannot.</tspan>
  </text>
</g>

</svg>
<figcaption><b>An Outcome Reward Model scores only the final answer; a Process Reward Model scores every step and surfaces the weakest link.</b> Both wrap the same reasoning trace. The ORM collapses the whole chain into a single scalar reward, so it cannot see which step went wrong. The PRM scores each step, and taking the minimum step score means a single bad step (step 2 here) dooms the aggregate score even if a later step or the final answer looks fine.</figcaption>
</figure>
