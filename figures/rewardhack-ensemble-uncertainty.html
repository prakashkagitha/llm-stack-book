<text x="380" y="410" text-anchor="middle" class="cap muted">The variance penalty is near zero where the ensemble agrees and grows wherever the RMs fan out, dragging reward down exactly where the mean's spurious peak lives.</text>
</svg>
<figcaption><b>Reward-model ensembles turn disagreement into an uncertainty penalty.</b> The K member RMs are trained on different seeds or data splits, so they agree closely near pi_ref (where they share training data) and fan out widely off-distribution (where each extrapolates differently). Subtracting lambda times the ensemble std from the mean reward automatically deflates reward wherever the members disagree — flattening the spurious off-distribution peak that the mean alone still shows.</figcaption>
</figure>
