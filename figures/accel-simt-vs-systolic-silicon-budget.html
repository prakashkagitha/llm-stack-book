<figure class="viz" id="fig-accel-simt-vs-systolic-silicon-budget">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 780 560" role="img" aria-label="Side-by-side transistor-budget floorplans of equal area: a SIMT core spends most of its silicon on programmable ALUs, caches, and warp schedulers with only a modest tensor-core block, while a systolic array is almost entirely dense MAC cells with a thin vector unit and a tiny control sliver.">
<defs>
  <marker id="sb-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" class="v-accent-fill"/>
  </marker>
</defs>
<style>

  #fig-accel-simt-vs-systolic-silicon-budget .ttl { font: 700 15px var(--sans,sans-serif); }

  #fig-accel-simt-vs-systolic-silicon-budget .panel-ttl { font: 700 13px var(--sans,sans-serif); }

  #fig-accel-simt-vs-systolic-silicon-budget .cap { font: 500 11px var(--sans,sans-serif); fill: var(--muted); }

  #fig-accel-simt-vs-systolic-silicon-budget .mac-tag { font: 700 10.5px var(--sans,sans-serif); }
  #fig-accel-simt-vs-systolic-silicon-budget .v-accent-fill { fill: var(--accent); }
  #fig-accel-simt-vs-systolic-silicon-budget .mac-fill { fill: var(--accent2,#3b82f6); }

  #fig-accel-simt-vs-systolic-silicon-budget [data-anim] { animation: sb-fade-in 0.55s ease-out backwards; }

  #fig-accel-simt-vs-systolic-silicon-budget [data-anim="2"] { animation-delay: 0.25s; }
  #fig-accel-simt-vs-systolic-silicon-budget [data-anim="3"] { animation-delay: 0.5s; }

    #fig-accel-simt-vs-systolic-silicon-budget [data-anim] { animation: none !important; opacity:1 !important; }
  }
</style>

<text x="390" y="24" text-anchor="middle" class="ttl">Transistor budget: where does the silicon actually go?</text>
<text x="390" y="42" text-anchor="middle" class="sub">two equal-area floorplans (illustrative proportions, not real specs)</text>


<g data-anim="1">
  <text x="195" y="66" text-anchor="middle" class="panel-ttl">SIMT core (NVIDIA / AMD)</text>
  <rect x="30" y="76" width="330" height="330" rx="6" class="panel-box"/>

  
  <rect x="38" y="84" width="314" height="46" rx="3" class="ctrl-fill ctrl-stroke" fill-opacity="0.24" stroke-width="1.2"/>
  <text x="195" y="103" text-anchor="middle" class="region-lbl">warp schedulers / instruction fetch</text>
  <text x="195" y="117" text-anchor="middle" class="region-sub">/ control logic</text>

  
  <rect x="38" y="138" width="150" height="130" rx="3" class="ctrl-fill ctrl-stroke" fill-opacity="0.16" stroke-width="1.2"/>
  <text x="113" y="192" text-anchor="middle" class="region-lbl">programmable</text>
  <text x="113" y="206" text-anchor="middle" class="region-lbl">ALUs / registers</text>

  
  <rect x="196" y="138" width="156" height="60" rx="3" class="vec-fill vec-stroke" fill-opacity="0.2" stroke-width="1.2"/>
  <text x="274" y="164" text-anchor="middle" class="region-lbl">shared memory</text>
  <text x="274" y="178" text-anchor="middle" class="region-sub">/ L1</text>

  
  <rect x="196" y="206" width="156" height="62" rx="3" class="ctrl-fill ctrl-stroke" fill-opacity="0.16" stroke-width="1.2"/>
  <text x="274" y="234" text-anchor="middle" class="region-lbl">L2 cache</text>

  
  <rect x="38" y="276" width="314" height="120" rx="3" class="mac-fill mac-stroke" fill-opacity="0.3" stroke-width="1.6"/>
  <text x="195" y="330" text-anchor="middle" class="mac-tag mac-fill">Tensor / Matrix Cores</text>
  <text x="195" y="346" text-anchor="middle" class="region-sub">(MACs)</text>

  <text x="195" y="422" text-anchor="middle" class="cap">general-purpose &amp; programmable</text>
  <text x="195" y="438" text-anchor="middle" class="cap">you orchestrate the memory hierarchy by hand</text>
</g>


<g data-anim="2">
  <text x="585" y="66" text-anchor="middle" class="panel-ttl">Systolic array (TPU / Trainium / Gaudi MME)</text>
  <rect x="420" y="76" width="330" height="330" rx="6" class="panel-box"/>

  
  <rect x="428" y="84" width="314" height="278" rx="3" class="mac-fill mac-stroke" fill-opacity="0.3" stroke-width="1.6"/>
  <text x="585" y="210" text-anchor="middle" class="mac-tag mac-fill" font-size="13">MAC cells</text>
  <text x="585" y="228" text-anchor="middle" class="region-sub">(dense matmul)</text>
  
  <g stroke="var(--accent2,#3b82f6)" stroke-opacity="0.22" stroke-width="1">
    <line x1="468" y1="84" x2="468" y2="362"/>
    <line x1="508" y1="84" x2="508" y2="362"/>
    <line x1="548" y1="84" x2="548" y2="362"/>
    <line x1="588" y1="84" x2="588" y2="362"/>
    <line x1="628" y1="84" x2="628" y2="362"/>
    <line x1="668" y1="84" x2="668" y2="362"/>
    <line x1="708" y1="84" x2="708" y2="362"/>
    <line x1="428" y1="120" x2="742" y2="120"/>
    <line x1="428" y1="156" x2="742" y2="156"/>
    <line x1="428" y1="192" x2="742" y2="192"/>
    <line x1="428" y1="228" x2="742" y2="228"/>
    <line x1="428" y1="264" x2="742" y2="264"/>
    <line x1="428" y1="300" x2="742" y2="300"/>
    <line x1="428" y1="336" x2="742" y2="336"/>
  </g>

  
  <rect x="428" y="366" width="314" height="26" rx="3" class="vec-fill vec-stroke" fill-opacity="0.24" stroke-width="1.2"/>
  <text x="585" y="384" text-anchor="middle" class="region-lbl">vector unit (softmax / norm / elementwise)</text>

  
  <rect x="428" y="396" width="314" height="10" rx="2" class="ctrl-fill ctrl-stroke" fill-opacity="0.3" stroke-width="1"/>
  <text x="585" y="418" text-anchor="middle" class="region-sub">control / sequencer (tiny)</text>

  <text x="585" y="440" text-anchor="middle" class="cap">almost all silicon is MACs -- high FLOP/watt,</text>
  <text x="585" y="456" text-anchor="middle" class="cap">but dense-matmul only; a compiler must schedule everything</text>
</g>


<g data-anim="3">
  <line x1="60" y1="500" x2="720" y2="500" stroke="var(--accent)" stroke-width="2.4" marker-end="url(#sb-arrow)"/>
  <text x="60" y="524" text-anchor="start" class="verdict">more flexible (runs anything)</text>
  <text x="720" y="524" text-anchor="end" class="verdict">more efficient per watt/transistor (dense matmul only)</text>
</g>

<g data-anim="4">
  <text x="390" y="548" text-anchor="middle" class="sub">SIMT core: MACs are one block among several. Systolic array: MACs are almost the whole chip.</text>
</g>

</svg>
<figcaption><b>Nearly all systolic-array silicon is MAC cells; a SIMT core spends a large share of its area on control logic, caches, and scheduling to stay general-purpose.</b> That is the physical reason systolic accelerators win on FLOP/watt and FLOP/transistor for dense matmul -- but it also means a compiler, not a programmer, must schedule everything else onto the small companion vector unit.</figcaption>
</figure>
