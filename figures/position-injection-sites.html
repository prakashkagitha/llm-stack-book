<figure class="viz" id="fig-position-injection-sites">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 820 565" role="img" aria-label="Attention data path from token embedding through Q,K,V projection, score, softmax, and value combination, with two injection taps for position -- Approach A adding to the representation and Approach B adding to the score -- plus RoPE shown as a hybrid rotation on the Q and K lines.">
  <defs>
    <marker id="pis-tip-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
    <marker id="pis-tip-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="pis-tip-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent2,#3b82f6)"/>
    </marker>
    <marker id="pis-tip-rope" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
    </marker>
  </defs>
  <style>
    #fig-position-injection-sites text{ fill: var(--ink-soft); }
    #fig-position-injection-sites .ttl{ font:600 14px var(--sans,sans-serif); }
    #fig-position-injection-sites .hdr{ font:700 12.5px var(--sans,sans-serif); }
    #fig-position-injection-sites .lbl{ font:600 13px var(--sans,sans-serif); }
    #fig-position-injection-sites .sub{ font:500 10px var(--sans,sans-serif); fill: var(--muted); }
    #fig-position-injection-sites .tag{ font:500 10px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-position-injection-sites .mono{ font:700 11px var(--mono,monospace); }
    #fig-position-injection-sites .small-mono{ font:500 9.5px var(--mono,monospace); fill: var(--muted); }
    #fig-position-injection-sites .cap{ font:500 11px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-position-injection-sites .cap-ttl{ font:700 12.5px var(--sans,sans-serif); }
    #fig-position-injection-sites .legend{ font:500 11px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-position-injection-sites .box{ fill: var(--surface); stroke: var(--border-2); stroke-width: 1.4; }
    #fig-position-injection-sites .box-a{ fill: var(--surface); stroke: var(--accent); stroke-width: 1.6; }
    #fig-position-injection-sites .box-b{ fill: var(--surface); stroke: var(--accent2, #3b82f6); stroke-width: 1.6; }
    #fig-position-injection-sites .box-rope{ fill: var(--surface); stroke: var(--warn, #e0a106); stroke-width: 1.6; }
  </style>


  <g data-anim="1">
    <text x="16" y="24" class="ttl">Where position enters attention: two taps, plus RoPE's hybrid rotation</text>


    <g>
      <rect x="20" y="228" width="90" height="64" rx="8" class="box"/>
      <text x="65" y="253" text-anchor="middle" class="lbl">x_i</text>
      <text x="65" y="271" text-anchor="middle" class="sub">token embedding</text>
    </g>
    <line x1="110" y1="260" x2="146" y2="260" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#pis-tip-muted)"/>


    <g>
      <rect x="150" y="228" width="110" height="64" rx="8" class="box"/>
      <text x="205" y="250" text-anchor="middle" class="lbl" font-size="11.5">W_Q, W_K, W_V</text>
      <text x="205" y="270" text-anchor="middle" class="sub">projections</text>
    </g>


    <line x1="260" y1="244" x2="300" y2="190" class="v-muted" stroke="currentColor" stroke-width="1.4"/>
    <line x1="260" y1="276" x2="300" y2="330" class="v-muted" stroke="currentColor" stroke-width="1.4"/>


    <text x="362" y="181" text-anchor="middle" class="small-mono">q_i</text>
    <text x="362" y="347" text-anchor="middle" class="small-mono">k_j</text>


    <g>
      <rect x="380" y="165" width="170" height="200" rx="10" class="box"/>
      <text x="465" y="253" text-anchor="middle" class="lbl">S_ij</text>
      <text x="465" y="273" text-anchor="middle" class="mono" font-size="10.5">(q_i . k_j) / sqrt(d_k)</text>
      <text x="465" y="291" text-anchor="middle" class="sub">pre-softmax score</text>
    </g>
    <line x1="550" y1="260" x2="576" y2="260" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#pis-tip-muted)"/>


    <g>
      <rect x="580" y="228" width="100" height="64" rx="8" class="box"/>
      <text x="630" y="253" text-anchor="middle" class="lbl">softmax</text>
      <text x="630" y="271" text-anchor="middle" class="sub">(over j)</text>
    </g>
    <line x1="680" y1="260" x2="696" y2="260" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#pis-tip-muted)"/>


    <g>
      <rect x="700" y="228" width="90" height="64" rx="8" class="box"/>
      <text x="745" y="253" text-anchor="middle" class="lbl">o_i</text>
      <text x="745" y="271" text-anchor="middle" class="sub">output</text>
    </g>
    <line x1="790" y1="260" x2="806" y2="260" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#pis-tip-muted)"/>


    <path d="M 260 260 L 260 500 L 745 500 L 745 292" fill="none" class="v-muted" stroke="currentColor" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#pis-tip-muted)"/>
    <text x="500" y="516" text-anchor="middle" class="sub">v_j -- untouched: the payload is never rotated or biased</text>
  </g>


  <g data-anim="2">
    <text x="12" y="42" class="hdr" fill="var(--accent)">Approach A -- add to the representation</text>
    <rect x="10" y="52" width="110" height="40" rx="6" class="box-a"/>
    <text x="65" y="67" text-anchor="middle" class="tag">sinusoidal,</text>
    <text x="65" y="81" text-anchor="middle" class="tag">learned absolute</text>
    <line x1="65" y1="94" x2="65" y2="224" stroke="var(--accent)" color="var(--accent)" stroke-width="1.8" marker-end="url(#pis-tip-a)"/>
    <text x="72" y="168" class="mono" fill="var(--accent)">+ p_i</text>
  </g>


  <g data-anim="3">
    <text x="392" y="42" class="hdr" fill="var(--accent2,#3b82f6)">Approach B -- add to the score</text>
    <rect x="390" y="52" width="150" height="40" rx="6" class="box-b"/>
    <text x="465" y="67" text-anchor="middle" class="tag">T5 relative bias,</text>
    <text x="465" y="81" text-anchor="middle" class="tag">ALiBi</text>
    <line x1="465" y1="94" x2="465" y2="161" stroke="var(--accent2,#3b82f6)" color="var(--accent2,#3b82f6)" stroke-width="1.8" marker-end="url(#pis-tip-b)"/>
    <text x="471" y="132" class="mono" fill="var(--accent2,#3b82f6)">+ bias(i,j)</text>
  </g>


  <g data-anim="4">
    <rect x="300" y="178" width="50" height="24" rx="12" class="box-rope"/>
    <text x="325" y="194" text-anchor="middle" class="tag" fill="var(--warn,#e0a106)" font-weight="700">rotate q</text>
    <line x1="350" y1="190" x2="378" y2="190" stroke="var(--warn,#e0a106)" color="var(--warn,#e0a106)" stroke-width="2" marker-end="url(#pis-tip-rope)"/>


    <rect x="300" y="318" width="50" height="24" rx="12" class="box-rope"/>
    <text x="325" y="334" text-anchor="middle" class="tag" fill="var(--warn,#e0a106)" font-weight="700">rotate k</text>
    <line x1="350" y1="330" x2="378" y2="330" stroke="var(--warn,#e0a106)" color="var(--warn,#e0a106)" stroke-width="2" marker-end="url(#pis-tip-rope)"/>
  </g>


  <g data-anim="5">
    <rect x="275" y="385" width="345" height="98" rx="10" class="box-rope"/>
    <text x="292" y="408" class="cap-ttl" fill="var(--warn,#e0a106)">RoPE (hybrid)</text>
    <text x="292" y="428" class="cap">touches q,k like Approach A, but rotation makes</text>
    <text x="292" y="444" class="cap">q . k depend only on the offset i - j --</text>
    <text x="292" y="460" class="cap">achieving Approach B's relative goal.</text>


    <rect x="20" y="530" width="14" height="14" fill="var(--accent)"/>
    <text x="40" y="541" class="legend">Approach A: add to representation</text>
    <rect x="330" y="530" width="14" height="14" fill="var(--accent2,#3b82f6)"/>
    <text x="350" y="541" class="legend">Approach B: add to score</text>
    <rect x="560" y="530" width="14" height="14" fill="var(--warn,#e0a106)"/>
    <text x="580" y="541" class="legend">RoPE: hybrid rotation</text>
  </g>
</svg>
<figcaption><b>Position enters attention at one of two taps.</b> Approach A adds a position vector <b>p_i</b> to the token representation before the projections (sinusoidal, learned absolute); Approach B leaves the representation alone and adds a bias directly to the pre-softmax score (T5 relative bias, ALiBi). RoPE is the hybrid: it rotates <b>q</b> and <b>k</b> at Approach A's site, but the rotation is engineered so the resulting dot product depends only on the relative offset <b>i - j</b> -- Approach B's goal, achieved through Approach A's mechanism. The value <b>v_j</b> is never touched by either tap: position governs who attends to whom, not what is retrieved.</figcaption>
</figure>
