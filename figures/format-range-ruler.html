<figure class="viz" id="fig-format-range-ruler">
<svg viewBox="0 0 800 420" role="img" aria-label="A log-scale ruler of floating-point magnitude showing fp32 and bf16 sharing the same range from about 1.2 times 10 to the -38 to about 3.4 times 10 to the 38, while fp16 stops abruptly at 65504, where a climbing value turns into inf.">
  <style>
    #fig-format-range-ruler text { fill: var(--ink-soft); }
    #fig-format-range-ruler .lbl { font: 600 13px var(--sans, sans-serif); }
    #fig-format-range-ruler .lbl-sm { font: 600 11px var(--sans, sans-serif); fill: var(--muted); }
    #fig-format-range-ruler .lbl-mono { font: 600 11px var(--mono, monospace); fill: var(--muted); }
    #fig-format-range-ruler .lbl-warn { font: 700 11px var(--mono, monospace); fill: var(--warn); }
    #fig-format-range-ruler .lbl-warn-title { font: 700 12px var(--sans, sans-serif); fill: var(--warn); }
    #fig-format-range-ruler .strip-txt { font: 600 12.5px var(--sans, sans-serif); }
    #fig-format-range-ruler [data-anim] { opacity: 0; animation: figFadeIn .5s ease-out forwards; }
    #fig-format-range-ruler [data-anim="1"] { animation-delay: 0s; }
    #fig-format-range-ruler [data-anim="2"] { animation-delay: .25s; }
    #fig-format-range-ruler [data-anim="3"] { animation-delay: .5s; }
    #fig-format-range-ruler [data-anim="5"] { animation-delay: .8s; }
    @keyframes figFadeIn { to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      #fig-format-range-ruler [data-anim] { animation: none; opacity: 1; }
    }
  </style>

  <defs>
    <marker id="fig-format-range-ruler-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--warn)" />
    </marker>
  </defs>

  
  <g data-anim="1">
    <text x="100" y="22" class="lbl-sm" text-anchor="start">&lt;- underflow (very small)</text>
    <text x="740" y="22" class="lbl-sm" text-anchor="end">overflow (very large) -&gt;</text>
  </g>

  
  <g data-anim="1">
    <rect x="100" y="48" width="24" height="200" fill="var(--muted)" opacity="0.18" />
    <text x="132" y="182" class="lbl-sm" text-anchor="start">&lt;- subnormals / FTZ zone</text>
    <text x="132" y="196" class="lbl-sm" text-anchor="start">(often flushed to zero on GPUs)</text>
  </g>

  
  <g data-anim="2">
    <line x1="458.5" y1="45" x2="458.5" y2="205" stroke="var(--border-2)" stroke-width="1.2" stroke-dasharray="3 4" />
    <line x1="458.5" y1="205" x2="458.5" y2="242" stroke="var(--warn)" stroke-width="4" />
    <line x1="448.5" y1="205" x2="468.5" y2="205" stroke="var(--warn)" stroke-width="4" />
    <text x="464" y="40" class="lbl-warn-title" text-anchor="start">fp16 max ~65504</text>
  </g>

  
  <g data-anim="1">
    <text x="630" y="55" class="lbl-sm" text-anchor="middle">fp32 &amp; bf16 ceiling ~3.4x10^38</text>
    <line x1="630" y1="59" x2="700" y2="68" stroke="var(--border-2)" stroke-width="1" />
  </g>

  
  <g data-anim="2">
    <text x="90" y="79" class="lbl" text-anchor="end">fp32</text>
    <line x1="116.6" y1="75" x2="728.2" y2="75" stroke="var(--accent)" stroke-width="13" stroke-linecap="round" />
  </g>

  
  <g data-anim="2">
    <text x="90" y="124" class="lbl" text-anchor="end">bf16</text>
    <line x1="116.6" y1="120" x2="728.2" y2="120" stroke="var(--accent)" stroke-width="13" stroke-linecap="round" stroke-dasharray="9 7" opacity="0.85" />
    <text x="420" y="137" class="lbl-sm" text-anchor="middle">coarser steps, same reach</text>
  </g>

  
  <g data-anim="3">
    <polyline points="395,203 410,192 422,197 435,182 447,186 458.5,172" fill="none" stroke="var(--warn)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <polyline points="458.5,172 478,158 496,150" fill="none" stroke="var(--warn)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#fig-format-range-ruler-arrow)" />
    <rect x="483" y="136" width="46" height="24" rx="6" fill="var(--surface)" stroke="var(--warn)" stroke-width="2" />
    <text x="506" y="152" class="lbl-warn" text-anchor="middle">inf</text>
    <text x="460" y="182" class="lbl-warn" text-anchor="start">inf -&gt; NaN poisons the pass</text>
  </g>

  
  <g data-anim="2">
    <text x="90" y="229" class="lbl" text-anchor="end">fp16</text>
    <line x1="386.3" y1="225" x2="458.5" y2="225" stroke="var(--accent2)" stroke-width="13" stroke-linecap="round" />
    <text x="386.3" y="248" class="lbl-mono" text-anchor="middle">~6.1e-5</text>
    <text x="458.5" y="248" class="lbl-warn" text-anchor="middle">65504</text>
    <text x="464" y="230" class="lbl-sm" text-anchor="start">overflow -&gt; inf beyond here</text>
  </g>

  
  <g data-anim="1">
    <line x1="100" y1="290" x2="740" y2="290" stroke="var(--border-2)" stroke-width="1.5" />
    <line x1="116" y1="285" x2="116" y2="295" stroke="var(--border-2)" stroke-width="1" />
    <line x1="380" y1="285" x2="380" y2="295" stroke="var(--border-2)" stroke-width="1" />
    <line x1="420" y1="283" x2="420" y2="297" stroke="var(--border-2)" stroke-width="1" />
    <line x1="460" y1="285" x2="460" y2="295" stroke="var(--border-2)" stroke-width="1" />
    <line x1="724" y1="285" x2="724" y2="295" stroke="var(--border-2)" stroke-width="1" />
    <text x="116" y="309" class="lbl-mono" text-anchor="middle">10^-38</text>
    <text x="380" y="309" class="lbl-mono" text-anchor="middle">10^-5</text>
    <text x="420" y="309" class="lbl-mono" text-anchor="middle">1</text>
    <text x="460" y="309" class="lbl-mono" text-anchor="middle">10^5</text>
    <text x="724" y="309" class="lbl-mono" text-anchor="middle">10^38</text>
  </g>

  
  <g data-anim="5">
    <rect x="20" y="335" width="760" height="52" rx="8" fill="var(--surface-3)" />
    <text x="400" y="357" class="strip-txt" text-anchor="middle">bf16 keeps fp32's reach (no loss scaling needed);</text>
    <text x="400" y="376" class="strip-txt" text-anchor="middle">fp16 trades reach for mantissa bits and hits a wall.</text>
  </g>
</svg>
<figcaption><b>fp32 and bf16 share the same overflow ceiling because they share the same 8-bit exponent; fp16 does not.</b> On a log-magnitude ruler, fp32's and bf16's ranges reach the identical ~3.4x10^38 wall (bf16 just takes coarser steps to get there), while fp16's 5-bit exponent caps out at 65504 — a gradient spike that would sail past that point in fp32/bf16 instead overflows to <code>inf</code> in fp16 and poisons the pass.</figcaption>
</figure>
