<figure class="viz" id="fig-fa3-incoherent-processing">
<svg viewBox="0 0 780 435" role="img" aria-label="Three-stage diagram: before rotation one outlier coordinate forces the FP8 scale to stretch, crushing all typical values into a couple of quantization levels; a random-sign Hadamard rotation leaves QK-transpose exactly unchanged because the rotation matrix is orthogonal; after rotation the same total energy is spread evenly across all coordinates so the FP8 scale stays tight and quantization is uniform.">
<defs>
  <marker id="fa3ip-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#555)"/>
  </marker>
</defs>
<style>
  #fig-fa3-incoherent-processing text { fill: var(--ink-soft,#333); font-family: var(--sans,sans-serif); }
  #fig-fa3-incoherent-processing .title    { font: 700 14.5px var(--sans,sans-serif); }
  #fig-fa3-incoherent-processing .stagehd  { font: 700 12.5px var(--sans,sans-serif); }
  #fig-fa3-incoherent-processing .sub      { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#8a8479); }
  #fig-fa3-incoherent-processing .cap      { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#8a8479); }
  #fig-fa3-incoherent-processing .eq       { font: 600 11px var(--mono,monospace); }
  #fig-fa3-incoherent-processing .eqsub    { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#8a8479); }
  #fig-fa3-incoherent-processing .badge    { font: 700 10.5px var(--sans,sans-serif); }
  #fig-fa3-incoherent-processing .note     { font: 600 11px var(--sans,sans-serif); }
</style>

<text x="16" y="24" class="title">Incoherent processing: rotate away the outlier before FP8 quantization</text>


<g data-anim="1">
  <text x="140" y="50" text-anchor="middle" class="stagehd">STAGE 1 -- BEFORE (raw Q row)</text>

  
  <g stroke="var(--accent,#c15b39)" stroke-width="1.2" stroke-dasharray="3 3" stroke-opacity="0.55">
    <line x1="24" y1="230" x2="256" y2="230"/>
    <line x1="24" y1="212" x2="256" y2="212"/>
  </g>
  <g stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="3 3">
    <line x1="24" y1="176" x2="256" y2="176"/>
    <line x1="24" y1="140" x2="256" y2="140"/>
    <line x1="24" y1="104" x2="256" y2="104"/>
    <line x1="24" y1="68" x2="256" y2="68"/>
  </g>
  <text x="20" y="230" text-anchor="end" class="eqsub" dx="-2">L1</text>
  <text x="20" y="68" text-anchor="end" class="eqsub" dx="-2">L6</text>

  
  <g class="v-fill" stroke="var(--muted,#8a8479)" stroke-width="1">
    <rect x="26"  y="212" width="12" height="18"/>
    <rect x="42"  y="216" width="12" height="14"/>
    <rect x="58"  y="210" width="12" height="20"/>
    <rect x="74"  y="214" width="12" height="16"/>
    <rect x="90"  y="217" width="12" height="13"/>
    <rect x="122" y="211" width="12" height="19"/>
    <rect x="138" y="215" width="12" height="15"/>
    <rect x="154" y="213" width="12" height="17"/>
    <rect x="170" y="218" width="12" height="12"/>
    <rect x="186" y="212" width="12" height="18"/>
    <rect x="202" y="216" width="12" height="14"/>
  </g>
  <rect x="106" y="66" width="12" height="164" fill="var(--accent,#c15b39)" fill-opacity="0.75" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
  <line x1="118" y1="72" x2="150" y2="80" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
  <text x="153" y="83" text-anchor="start" class="badge" fill="var(--accent,#c15b39)">outlier</text>
  <text x="153" y="95" text-anchor="start" class="badge" fill="var(--accent,#c15b39)">feature</text>

  <line x1="24" y1="230" x2="256" y2="230" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>

  <rect x="20" y="248" width="240" height="60" rx="6" fill="var(--accent,#c15b39)" fill-opacity="0.10" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
  <text x="140" y="264" text-anchor="middle" style="font:700 10.5px var(--sans,sans-serif);" fill="var(--accent,#c15b39)">! scale stretches to the outlier</text>
  <text x="140" y="279" text-anchor="middle" class="cap">typical values crushed into a</text>
  <text x="140" y="292" text-anchor="middle" class="cap">few FP8 levels (L1-L2)</text>
  <text x="140" y="303" text-anchor="middle" class="cap" style="font-weight:600;" fill="var(--accent,#c15b39)">-&gt; big quantization error</text>
</g>


<g data-anim="2">
  <line x1="272" y1="150" x2="300" y2="150" stroke="var(--ink-soft,#555)" stroke-width="1.6" marker-end="url(#fa3ip-arrow)"/>

  <rect x="304" y="80" width="176" height="230" rx="10" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="392" y="102" text-anchor="middle" class="stagehd" fill="var(--accent2,#3b82f6)">STAGE 2</text>
  <text x="392" y="118" text-anchor="middle" style="font:700 11px var(--sans,sans-serif);" fill="var(--accent2,#3b82f6)">ROTATE by M</text>
  <text x="392" y="134" text-anchor="middle" class="eqsub">M = (1/sqrt d) H D</text>
  <text x="392" y="147" text-anchor="middle" class="sub">(Hadamard x random signs)</text>

  <line x1="322" y1="158" x2="462" y2="158" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>

  <text x="392" y="176" text-anchor="middle" class="eq" fill="var(--good,#2f9e6e)">M^T M = I</text>
  <text x="392" y="190" text-anchor="middle" class="sub">(orthogonal)</text>

  <text x="392" y="212" text-anchor="middle" class="eqsub">(QM)(KM)^T</text>
  <text x="392" y="225" text-anchor="middle" class="eqsub">= Q M M^T K^T</text>
  <text x="392" y="240" text-anchor="middle" style="font:700 11.5px var(--mono,monospace);" fill="var(--good,#2f9e6e)">= QK^T</text>
  <text x="392" y="255" text-anchor="middle" style="font:700 10px var(--sans,sans-serif);" fill="var(--good,#2f9e6e)">scores UNCHANGED</text>

  <line x1="322" y1="266" x2="462" y2="266" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>

  <line x1="340" y1="286" x2="444" y2="286" stroke="var(--accent2,#3b82f6)" stroke-width="1.4" marker-end="url(#fa3ip-arrow)"/>
  <text x="392" y="302" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">fast: O(d log d) via FHT</text>

  <line x1="484" y1="150" x2="512" y2="150" stroke="var(--ink-soft,#555)" stroke-width="1.6" marker-end="url(#fa3ip-arrow)"/>
</g>


<g data-anim="3">
  <text x="644" y="50" text-anchor="middle" class="stagehd">STAGE 3 -- AFTER (rotated Q row)</text>

  <g stroke="var(--good,#2f9e6e)" stroke-width="1.2" stroke-dasharray="3 3" stroke-opacity="0.55">
    <line x1="528" y1="230" x2="760" y2="230"/>
    <line x1="528" y1="194" x2="760" y2="194"/>
    <line x1="528" y1="158" x2="760" y2="158"/>
    <line x1="528" y1="122" x2="760" y2="122"/>
    <line x1="528" y1="86"  x2="760" y2="86"/>
  </g>
  <text x="524" y="230" text-anchor="end" class="eqsub" dx="-2">L1</text>
  <text x="524" y="86" text-anchor="end" class="eqsub" dx="-2">L6</text>

  
  <g fill="var(--good,#2f9e6e)" fill-opacity="0.55" stroke="var(--good,#2f9e6e)" stroke-width="1">
    <rect x="530" y="140" width="12" height="90"/>
    <rect x="546" y="120" width="12" height="110"/>
    <rect x="562" y="150" width="12" height="80"/>
    <rect x="578" y="128" width="12" height="102"/>
    <rect x="594" y="110" width="12" height="120"/>
    <rect x="610" y="145" width="12" height="85"/>
    <rect x="626" y="118" width="12" height="112"/>
    <rect x="642" y="132" width="12" height="98"/>
    <rect x="658" y="105" width="12" height="125"/>
    <rect x="674" y="138" width="12" height="92"/>
    <rect x="690" y="122" width="12" height="108"/>
    <rect x="706" y="115" width="12" height="115"/>
  </g>

  <line x1="528" y1="230" x2="760" y2="230" stroke="var(--ink-soft,#555)" stroke-width="1.4"/>

  <rect x="524" y="248" width="240" height="60" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.10" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
  <text x="644" y="264" text-anchor="middle" style="font:700 10.5px var(--sans,sans-serif);" fill="var(--good,#2f9e6e)">check: no coordinate dominates</text>
  <text x="644" y="279" text-anchor="middle" class="cap">values spread across all six</text>
  <text x="644" y="292" text-anchor="middle" class="cap">FP8 levels -&gt; tight scale</text>
  <text x="644" y="303" text-anchor="middle" class="cap" style="font-weight:600;" fill="var(--good,#2f9e6e)">-&gt; small quantization error</text>
</g>


<g data-anim="4">
  <rect x="16" y="326" width="748" height="46" rx="8" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="390" y="345" text-anchor="middle" class="note">The outlier is smeared over all coordinates; the matmul result is</text>
  <text x="390" y="361" text-anchor="middle" class="note">identical, but the quantization is far better.</text>
</g>


<g data-anim="5">
  <rect x="16" y="382" width="748" height="40" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.08" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <text x="390" y="406" text-anchor="middle" class="cap" style="font-weight:600;" fill="var(--accent2,#3b82f6)">Precision reminder: inputs are quantized to FP8 (e4m3, max magnitude 448), but accumulation and softmax stats (m, l) stay in FP32.</text>
</g>

</svg>
<figcaption><b>A random-sign Hadamard rotation spreads an outlier across all coordinates without changing the attention scores.</b> Because the rotation matrix M is orthogonal (M^T M = I), (QM)(KM)^T = QK^T exactly -- but the single outlier that used to force the FP8 scale to stretch (crushing typical values into a couple of levels) is now spread evenly across all d coordinates, so the scale stays tight and quantization error drops.</figcaption>
</figure>
