<figcaption><b>Masked diffusion trains a BERT-style predictor at every masking rate.</b> The forward process masks tokens independently with probability 1 - alpha_t, sweeping from clean data (t=0) to fully masked (t=1); a bidirectional transformer with no causal mask reads a partially masked row and predicts the clean token at each masked position. Only masked positions contribute to the loss, and the 1/(1-alpha_t) weight turns this into a valid likelihood bound rather than just a masked-LM heuristic.</figcaption>
</figure>
