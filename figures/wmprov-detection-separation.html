<figure class="viz" id="fig-wmprov-detection-separation">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 460" role="img" aria-label="Distribution of green-token counts for human text versus watermarked text, showing a threshold z-star beyond which text is flagged as AI-generated, and how paraphrase attacks slide the watermarked distribution back toward the human null, shrinking the detectable z-score.">
<defs>
  <marker id="wds-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <clipPath id="wds-flag-clip">
    <rect x="560" y="52" width="200" height="318"/>
  </clipPath>
</defs>
<style>
  #fig-wmprov-detection-separation text { fill: var(--ink-soft,#333); }
  #fig-wmprov-detection-separation .ttl { font: 700 13.5px var(--sans,sans-serif); }
  #fig-wmprov-detection-separation .lbl { font: 600 11.5px var(--sans,sans-serif); }
  #fig-wmprov-detection-separation .sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-wmprov-detection-separation .axis { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#777); }
  #fig-wmprov-detection-separation .note { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#777); font-style: italic; }
  #fig-wmprov-detection-separation .z-read { font: 700 13px var(--mono,monospace); }

  @media (prefers-reduced-motion: no-preference) {
    #fig-wmprov-detection-separation .wm-clean { animation: wds-fade-out 8s ease-in-out infinite; }
    #fig-wmprov-detection-separation .wm-moderate { animation: wds-fade-in-out 8s ease-in-out infinite; }
    #fig-wmprov-detection-separation .wm-heavy { animation: wds-fade-in 8s ease-in-out infinite; }
    #fig-wmprov-detection-separation .slider-knob { animation: wds-slide 8s ease-in-out infinite; }
    #fig-wmprov-detection-separation .z-clean-lbl { animation: wds-txt-out 8s ease-in-out infinite; }
    #fig-wmprov-detection-separation .z-mod-lbl { animation: wds-txt-mid 8s ease-in-out infinite; }
    #fig-wmprov-detection-separation .z-heavy-lbl { animation: wds-txt-in 8s ease-in-out infinite; }
    #fig-wmprov-detection-separation .cap-clean { animation: wds-cap-out 8s ease-in-out infinite; }
    #fig-wmprov-detection-separation .cap-evade { animation: wds-cap-in 8s ease-in-out infinite; }

    @keyframes wds-slide {
      0%, 15%  { transform: translateX(0px); }
      50%      { transform: translateX(115px); }
      85%,100% { transform: translateX(230px); }
    }
    @keyframes wds-fade-out {
      0%, 15%  { opacity: 1; transform: translateX(0px); }
      50%      { opacity: 0.35; transform: translateX(-95px); }
      85%,100% { opacity: 0.12; transform: translateX(-190px); }
    }
    @keyframes wds-fade-in-out {
      0%, 15%  { opacity: 0.15; }
      50%      { opacity: 1; }
      85%,100% { opacity: 0.3; }
    }
    @keyframes wds-fade-in {
      0%, 15%  { opacity: 0; }
      50%      { opacity: 0.25; }
      85%,100% { opacity: 1; }
    }
    @keyframes wds-txt-out { 0%,15% {opacity:1;} 40%,100% {opacity:0;} }
    @keyframes wds-txt-mid { 0%,35% {opacity:0;} 50%,65% {opacity:1;} 80%,100% {opacity:0;} }
    @keyframes wds-txt-in { 0%,70% {opacity:0;} 85%,100% {opacity:1;} }
    @keyframes wds-cap-out { 0%,15% {opacity:1;} 40%,100% {opacity:0;} }
    @keyframes wds-cap-in { 0%,70% {opacity:0;} 85%,100% {opacity:1;} }
  }
</style>

<text x="390" y="24" text-anchor="middle" class="ttl">Green-token count: human text vs. watermarked text</text>


<g data-anim="1">
  <line x1="60" y1="370" x2="760" y2="370" class="v-grid" stroke-width="1.4"/>
  <line x1="60" y1="40" x2="60" y2="370" class="v-grid" stroke-width="1.2"/>
  <text x="410" y="398" text-anchor="middle" class="axis">number of green tokens g in a T-token passage</text>
  <text x="30" y="205" text-anchor="middle" class="axis" transform="rotate(-90 30 205)">relative frequency</text>
</g>


<g data-anim="2">
  <line x1="560" y1="52" x2="560" y2="370" stroke="var(--ink-soft,#555)" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="552" y="48" text-anchor="end" class="lbl">z* (~4 sigma above mu)</text>
  
  <g clip-path="url(#wds-flag-clip)">
    <rect x="560" y="52" width="200" height="318" fill="var(--warn,#e0a106)" opacity="0.10"/>
  </g>
  <text x="660" y="66" text-anchor="middle" class="sub" fill="var(--warn,#e0a106)">flagged as AI</text>
</g>


<g data-anim="1">
  <path d="M 90 370
           C 150 370, 175 250, 220 250
           C 265 250, 290 370, 350 370 Z"
        class="v-fill" stroke="var(--muted,#777)" stroke-width="1.8" opacity="0.9"/>
  
  <path d="M 340 369 C 350 368, 358 366, 365 365 L 365 370 Z" fill="var(--warn,#e0a106)" opacity="0.6"/>
  <line x1="220" y1="250" x2="220" y2="230" stroke="var(--muted,#777)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="220" y="222" text-anchor="middle" class="lbl">human text: Binomial(T, gamma)</text>
  <text x="220" y="238" text-anchor="middle" class="sub">centered at gamma*T</text>
</g>
<g data-anim="3">
  <text x="405" y="345" text-anchor="middle" class="note" fill="var(--warn,#e0a106)">false positives ~1e-5</text>
  <text x="405" y="358" text-anchor="middle" class="note">(illustrative tail, not measured)</text>
</g>


<g data-anim="2" class="wm-clean">
  <path d="M 575 370
           C 613 370, 632 92, 670 92
           C 708 92, 727 370, 765 370 Z"
        fill="var(--good,#2f9e6e)" opacity="0.55" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
</g>


<g data-anim="2" class="wm-moderate">
  <path d="M 470 370
           C 505 370, 522 150, 558 150
           C 594 150, 611 370, 646 370 Z"
        fill="var(--good,#2f9e6e)" opacity="0.5" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
</g>


<g data-anim="2" class="wm-heavy">
  <path d="M 250 370
           C 290 370, 310 200, 350 200
           C 390 200, 410 370, 450 370 Z"
        fill="var(--good,#2f9e6e)" opacity="0" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
</g>


<g data-anim="3">
  <text x="670" y="82" text-anchor="middle" class="lbl cap-clean" fill="var(--good,#2f9e6e)" opacity="1">watermarked (clean)</text>
  <text x="558" y="142" text-anchor="middle" class="lbl">moderate attack</text>
  <text x="350" y="192" text-anchor="middle" class="lbl cap-evade" fill="var(--good,#2f9e6e)" opacity="0">evades detection --</text>
  <text x="350" y="206" text-anchor="middle" class="lbl cap-evade" fill="var(--good,#2f9e6e)" opacity="0">but heavily rewritten</text>
</g>


<g data-anim="1">
  <rect x="600" y="410" width="160" height="38" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="680" y="425" text-anchor="middle" class="sub">detector readout</text>
  <text x="680" y="441" text-anchor="middle" class="z-read z-clean-lbl" fill="var(--good,#2f9e6e)" opacity="1">z ~ 8 (clean)</text>
  <text x="680" y="441" text-anchor="middle" class="z-read z-mod-lbl" fill="var(--warn,#e0a106)" opacity="0">z ~ 4 (moderate)</text>
  <text x="680" y="441" text-anchor="middle" class="z-read z-heavy-lbl" fill="var(--muted,#777)" opacity="0">z ~ 1 (heavy edit)</text>
</g>


<g data-anim="1">
  <text x="70" y="425" class="sub">fraction of tokens paraphrased / edited:</text>
  <line x1="70" y1="443" x2="330" y2="443" class="v-grid" stroke-width="3" stroke-linecap="round"/>
  <circle class="slider-knob" cx="70" cy="443" r="7" fill="var(--accent,#7c3aed)"/>
  <text x="70" y="458" class="sub">0</text>
  <text x="320" y="458" class="sub">high</text>
</g>

</svg>
<figcaption><b>Detection is a separation problem: human and watermarked green-token counts form two distributions divided by a threshold.</b> Human text is centered at &amp;gamma;T with a negligible tail past the z* cutoff (illustrative false-positive order of magnitude, not a measured benchmark); clean watermarked text sits far to the right and is flagged with high confidence. As an adversary paraphrases or edits a larger fraction of tokens, the watermarked distribution slides back toward the human null and the detectable z-score shrinks -- at heavy enough editing the watermark evades detection, but only because the text has been substantially rewritten.</figcaption>
</figure>
