<figure class="viz" id="fig-rlaif-judge-debiasing">
<button class="viz-replay" type="button">&#8635; replay</button>

<svg viewBox="0 0 770 815" role="img"
  aria-label="RLAIF judge de-biasing: swapping the order of Response A and Response B and combining the two raw verdicts cancels position bias, while running the judge n=5 times and requiring at least 70 percent vote consistency filters out ambiguous pairs before they become reward-model training data.">
<defs>
  <marker id="jb-a"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--ink-soft,#555)"/></marker>
  <marker id="jb-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--accent,#3a6ea5)"/></marker>
  <marker id="jb-mut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--muted,#999)"/></marker>
</defs>
<style>

  #fig-rlaif-judge-debiasing .T        { font:700 16px var(--sans,sans-serif); fill:var(--ink-soft,#222); }
  #fig-rlaif-judge-debiasing .L        { font:700 12px var(--sans,sans-serif); fill:var(--accent,#3a6ea5); }
  #fig-rlaif-judge-debiasing .N        { font:600 11.5px var(--sans,sans-serif); fill:var(--ink-soft,#222); }
  #fig-rlaif-judge-debiasing .NS       { font:400 9.5px var(--sans,sans-serif); fill:var(--muted,#666); }
  #fig-rlaif-judge-debiasing .CAP      { font:italic 10.5px var(--sans,sans-serif); fill:var(--muted,#777); }
  #fig-rlaif-judge-debiasing .MONO     { font:600 10.5px var(--mono,monospace); fill:var(--ink-soft,#222); }
  #fig-rlaif-judge-debiasing .KEEP     { font:700 11px var(--sans,sans-serif); fill:var(--accent,#3a6ea5); }
  #fig-rlaif-judge-debiasing .DISC     { font:700 11px var(--sans,sans-serif); fill:var(--muted,#888); }

  #fig-rlaif-judge-debiasing [data-anim]             { opacity:0; }
  #fig-rlaif-judge-debiasing:not(.playing) [data-anim]{ opacity:1; }
  #fig-rlaif-judge-debiasing.playing [data-anim="1"] { animation:jbi .35s .05s ease forwards; }
  #fig-rlaif-judge-debiasing.playing [data-anim="2"] { animation:jbi .35s .5s  ease forwards; }
  #fig-rlaif-judge-debiasing.playing [data-anim="3"] { animation:jbi .35s .95s ease forwards; }
  #fig-rlaif-judge-debiasing.playing [data-anim="4"] { animation:jbi .35s 1.4s ease forwards; }
  #fig-rlaif-judge-debiasing.playing [data-anim="5"] { animation:jbi .35s 1.85s ease forwards; }
  #fig-rlaif-judge-debiasing.playing [data-anim="6"] { animation:jbi .35s 2.3s  ease forwards; }
  #fig-rlaif-judge-debiasing.playing [data-anim="7"] { animation:jbi .35s 2.75s ease forwards; }
  #fig-rlaif-judge-debiasing.playing [data-anim="8"] { animation:jbi .35s 3.2s  ease forwards; }
  @keyframes jbi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>

<rect x="10" y="10" width="750" height="795" rx="12"

<text x="385" y="38" text-anchor="middle" class="T">RLAIF Judge De-biasing</text>


<g data-anim="1">

    fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.2"/>
  <text x="65" y="98" text-anchor="middle" class="N">Prompt</text>

  <line x1="110" y1="94" x2="132" y2="94" stroke="var(--ink-soft,#777)" stroke-width="1.3" marker-end="url(#jb-a)"/>

  <text x="194" y="80" text-anchor="middle" class="N">Response A</text>

  <rect x="134" y="102" width="120" height="32" rx="6"
    fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.2"/>
  <text x="194" y="122" text-anchor="middle" class="N">Response B</text>

  <path d="M254,76 L266,94" fill="none" stroke="var(--ink-soft,#777)" stroke-width="1.2"/>
  <path d="M254,118 L266,94" fill="none" stroke="var(--ink-soft,#777)" stroke-width="1.2"/>
  <line x1="266" y1="94" x2="289" y2="94" stroke="var(--ink-soft,#777)" stroke-width="1.3" marker-end="url(#jb-a)"/>

  <rect x="290" y="74" width="130" height="46" rx="7"
    fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="1.6"/>
  <text x="355" y="94" text-anchor="middle" class="N">AI judge</text>
  <text x="355" y="110" text-anchor="middle" class="NS">reads prompt + pair</text>
</g>

<line x1="20" y1="148" x2="750" y2="148" stroke="var(--border-2,#ccc)" stroke-width="0.8" stroke-dasharray="6 4"/>


<rect x="15" y="158" width="740" height="215" rx="10"
  fill="var(--surface,#fdfdfd)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<text x="30" y="180" class="L">Panel 1 -- Position-bias swap</text>


<g data-anim="2">
  <rect x="30" y="203" width="130" height="40" rx="6"
    fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.2"/>
  <text x="95" y="227" text-anchor="middle" class="MONO">order: (A, B)</text>

  <line x1="160" y1="223" x2="196" y2="223" stroke="var(--ink-soft,#777)" stroke-width="1.3" marker-end="url(#jb-a)"/>

  <rect x="198" y="190" width="100" height="66" rx="8"
    fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="1.5"/>
  <g transform="rotate(-14 248 204)" stroke="var(--accent,#3a6ea5)" stroke-width="1.4" fill="none">
    <line x1="226" y1="204" x2="270" y2="204"/>
    <circle cx="226" cy="204" r="3.5" fill="var(--surface-3,#e7f0fb)"/>
    <circle cx="270" cy="204" r="3.5" fill="var(--surface-3,#e7f0fb)"/>
  </g>
  <path d="M242,214 L254,214 L248,206 Z" fill="var(--accent,#3a6ea5)"/>
  <text x="248" y="232" text-anchor="middle" class="N">Judge</text>
  <text x="248" y="246" text-anchor="middle" class="NS">(T &gt; 0)</text>

  <line x1="298" y1="223" x2="330" y2="223" stroke="var(--ink-soft,#777)" stroke-width="1.3" marker-end="url(#jb-a)"/>

  <rect x="332" y="203" width="150" height="40" rx="6"
    fill="var(--surface,#f4f4f4)" stroke="var(--border-2,#888)" stroke-width="1.2"/>
  <text x="407" y="220" text-anchor="middle" class="N">raw verdict: A</text>
  <text x="407" y="235" text-anchor="middle" class="NS">(A read first)</text>
</g>


<g data-anim="3">
  <rect x="30" y="279" width="130" height="40" rx="6"
    fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.2"/>
  <text x="95" y="303" text-anchor="middle" class="MONO">order: (B, A)</text>

  <line x1="160" y1="299" x2="196" y2="299" stroke="var(--ink-soft,#777)" stroke-width="1.3" marker-end="url(#jb-a)"/>

  <rect x="198" y="266" width="100" height="66" rx="8"
    fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="1.5"/>
  <g transform="rotate(-14 248 280)" stroke="var(--accent,#3a6ea5)" stroke-width="1.4" fill="none">
    <line x1="226" y1="280" x2="270" y2="280"/>
    <circle cx="226" cy="280" r="3.5" fill="var(--surface-3,#e7f0fb)"/>
    <circle cx="270" cy="280" r="3.5" fill="var(--surface-3,#e7f0fb)"/>
  </g>
  <path d="M242,290 L254,290 L248,282 Z" fill="var(--accent,#3a6ea5)"/>
  <text x="248" y="308" text-anchor="middle" class="N">Judge</text>
  <text x="248" y="322" text-anchor="middle" class="NS">(T &gt; 0)</text>

  <line x1="298" y1="299" x2="330" y2="299" stroke="var(--ink-soft,#777)" stroke-width="1.3" marker-end="url(#jb-a)"/>

  <rect x="332" y="279" width="150" height="40" rx="6"
    fill="var(--surface,#f4f4f4)" stroke="var(--border-2,#888)" stroke-width="1.2"/>
  <text x="407" y="296" text-anchor="middle" class="N">raw verdict: B</text>
  <text x="407" y="311" text-anchor="middle" class="NS">(B read first)</text>
</g>

<text x="255" y="352" text-anchor="middle" class="CAP">position bias: the judge leans toward whichever response it reads first</text>


<g data-anim="4">
  <path d="M482,223 L520,240" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.4" marker-end="url(#jb-acc)"/>
  <path d="M482,299 L520,282" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.4" marker-end="url(#jb-acc)"/>

  <rect x="520" y="226" width="190" height="70" rx="8"
    fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="1.8"/>
  <text x="615" y="248" text-anchor="middle" class="N">de-biased verdict</text>
  <text x="615" y="264" text-anchor="middle" class="NS">cross-check both orders,</text>
  <text x="615" y="278" text-anchor="middle" class="NS">position effect cancels out</text>

  <text x="615" y="315" text-anchor="middle" class="CAP">swap order, combine to cancel the lean</text>
</g>

<line x1="20" y1="390" x2="750" y2="390" stroke="var(--border-2,#ccc)" stroke-width="0.8" stroke-dasharray="6 4"/>


<rect x="15" y="400" width="740" height="390" rx="10"
  fill="var(--surface,#fdfdfd)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<text x="30" y="422" class="L">Panel 2 -- Self-consistency vote</text>
<text x="225" y="422" class="NS">n = 5 independent judge calls, temperature &gt; 0</text>

<g data-anim="5">
  <rect x="35" y="442" width="190" height="32" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.1"/>
  <text x="130" y="463" text-anchor="middle" class="MONO">vote 1: A</text>
  <rect x="35" y="482" width="190" height="32" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.1"/>
  <text x="130" y="503" text-anchor="middle" class="MONO">vote 2: A</text>
  <rect x="35" y="522" width="190" height="32" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.1"/>
  <text x="130" y="543" text-anchor="middle" class="MONO">vote 3: B</text>
  <rect x="35" y="562" width="190" height="32" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.1"/>
  <text x="130" y="583" text-anchor="middle" class="MONO">vote 4: A</text>
  <rect x="35" y="602" width="190" height="32" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.1"/>
  <text x="130" y="623" text-anchor="middle" class="MONO">vote 5: A</text>

  <line x1="225" y1="458" x2="235" y2="458" stroke="var(--ink-soft,#777)" stroke-width="1"/>
  <line x1="225" y1="498" x2="235" y2="498" stroke="var(--ink-soft,#777)" stroke-width="1"/>
  <line x1="225" y1="538" x2="235" y2="538" stroke="var(--ink-soft,#777)" stroke-width="1"/>
  <line x1="225" y1="578" x2="235" y2="578" stroke="var(--ink-soft,#777)" stroke-width="1"/>
  <line x1="225" y1="618" x2="235" y2="618" stroke="var(--ink-soft,#777)" stroke-width="1"/>
  <line x1="235" y1="458" x2="235" y2="618" stroke="var(--ink-soft,#777)" stroke-width="1"/>
  <line x1="235" y1="538" x2="300" y2="538" stroke="var(--ink-soft,#777)" stroke-width="1.3" marker-end="url(#jb-a)"/>
</g>

<g data-anim="6">
  <rect x="302" y="505" width="150" height="66" rx="8"
    fill="var(--surface,#f4f4f4)" stroke="var(--border-2,#888)" stroke-width="1.3"/>
  <text x="377" y="527" text-anchor="middle" class="N">tally</text>
  <text x="377" y="545" text-anchor="middle" class="N">4 / 5 = 0.8</text>
  <text x="377" y="560" text-anchor="middle" class="NS">majority = A</text>

  <line x1="452" y1="538" x2="474" y2="538" stroke="var(--ink-soft,#777)" stroke-width="1.3" marker-end="url(#jb-a)"/>

  <polygon points="474,538 504,503 634,503 664,538 634,573 504,573"
    fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="1.6"/>
  <text x="569" y="533" text-anchor="middle" class="N">threshold gate</text>
  <text x="569" y="550" text-anchor="middle" class="NS">keep only if consistency &gt;= 0.7</text>
</g>

<g data-anim="7">
  <path d="M540,568 L450,608" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.5" marker-end="url(#jb-acc)"/>
  <text x="472" y="592" text-anchor="middle" class="KEEP">KEEP</text>

  <rect x="375" y="610" width="150" height="58" rx="8"
    fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="1.6"/>
  <text x="450" y="632" text-anchor="middle" class="N">chosen = A</text>
  <text x="450" y="650" text-anchor="middle" class="N">rejected = B</text>

  <line x1="450" y1="668" x2="450" y2="700" stroke="var(--accent,#3a6ea5)" stroke-width="1.5" marker-end="url(#jb-acc)"/>

  <rect x="375" y="702" width="150" height="58" rx="8"
    fill="var(--accent,#3a6ea5)" stroke="var(--accent,#3a6ea5)" stroke-width="1.6"/>
  <text x="450" y="726" text-anchor="middle" font-weight="700" fill="#fff">reward model</text>
  <text x="450" y="742" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="9.5">training target</text>
</g>

<g data-anim="8" opacity="0.85">
  <path d="M598,568 L660,608" fill="none" stroke="var(--muted,#999)" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#jb-mut)"/>
  <text x="644" y="592" text-anchor="middle" class="DISC">DISCARD</text>

  <rect x="585" y="610" width="150" height="58" rx="8"
    fill="var(--surface-3,#eee)" stroke="var(--muted,#999)" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="660" y="632" text-anchor="middle" class="N" fill="var(--muted,#888)">too ambiguous,</text>
  <text x="660" y="648" text-anchor="middle" class="N" fill="var(--muted,#888)">dropped</text>
</g>

</svg>
<figcaption><b>RLAIF turns a biased AI judge into trustworthy preference labels through two mechanisms.</b> Panel 1: presenting the same pair in both orders and combining the two raw verdicts cancels the judge's tendency to favor whichever response it reads first. Panel 2: running the judge n times at temperature &gt; 0 and requiring at least 70% vote consistency filters out ambiguous pairs, so only confidently-labeled (chosen, rejected) pairs become reward-model training data.</figcaption>
</figure>
