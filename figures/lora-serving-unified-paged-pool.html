<figcaption><b>S-LoRA Unified Paging places KV-cache pages and LoRA adapter pages in the same fixed-size pool above the resident base model.</b> KV pages (blue) are tagged by request ID; LoRA pages (orange) by adapter ID — note adapter a7 occupies non-adjacent pages 3 and 5, reflecting fragmented residency. Free pages (dashed) can be claimed by either KV or adapter use, letting the system trade memory fluidly between concurrency (more KV pages) and adapter breadth (more resident adapters).</figcaption>
