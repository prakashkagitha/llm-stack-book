<text x="130" y="462" text-anchor="middle" class="sm" fill="var(--accent)">adversarial cross-exam</text>
<text x="400" y="462" text-anchor="middle" class="sm" fill="var(--accent2,#3b82f6)">amplified decomposition</text>
<text x="662" y="462" text-anchor="middle" class="sm" fill="var(--good,#2f9e6e)">elicit latent capability</text>
<text x="400" y="479" text-anchor="middle" class="sm" fill="var(--muted)">Debate and RRM scale the SUPERVISOR; weak-to-strong instead scales what the STUDENT already knows.</text>

<figcaption><b>Three structurally different ways to exploit the verification-generation gap.</b> Debate pits two adversaries against a weak judge who only has to follow the rebuttal chain; recursive reward modeling decomposes a hard judgment into a tree of sub-judgments a human can check directly; weak-to-strong generalization skips amplifying the supervisor altogether and instead fine-tunes a strong model on noisy weak labels, relying on its own pretrained representations to exceed what those labels alone would teach. All three recover a signal above unaided human accuracy, but each has a distinct failure mode: obfuscated arguments, compounding recursive error, and partial (not full) generalization.</figcaption>
</figure>
