<figure class="viz" id="fig-scaling-kaplan-vs-chinchilla">
<svg viewBox="0 0 840 420" role="img" aria-label="Side-by-side comparison of Kaplan 2020 versus Chinchilla 2022 compute-allocation worldviews. Kaplan shows a long params bar and short data bar (lopsided); Chinchilla shows two equal-length bars (balanced), with concrete model examples below each.">
  <style>
    #fig-scaling-kaplan-vs-chinchilla .panel-title {
      font: 700 14px var(--sans,sans-serif);
      fill: var(--ink-soft,currentColor);
    }
    #fig-scaling-kaplan-vs-chinchilla .heading {
      font: 500 11.5px var(--sans,sans-serif);
      fill: var(--muted,#64748b);
    }
    #fig-scaling-kaplan-vs-chinchilla .bar-lbl {
      font: 500 11.5px var(--sans,sans-serif);
      fill: var(--ink-soft,currentColor);
    }
    #fig-scaling-kaplan-vs-chinchilla .mult-lbl {
      font: 700 12px var(--sans,sans-serif);
    }
    #fig-scaling-kaplan-vs-chinchilla .pill-text {
      font: 600 11.5px var(--sans,sans-serif);
    }
    #fig-scaling-kaplan-vs-chinchilla .ex-label {
      font: 500 11px var(--sans,sans-serif);
      fill: var(--ink-soft,currentColor);
    }
    #fig-scaling-kaplan-vs-chinchilla .ex-bold {
      font: 700 12px var(--sans,sans-serif);
      fill: var(--ink-soft,currentColor);
    }
  </style>

  
  <rect x="28" y="18" width="372" height="384" rx="10"
        fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>

  
  <rect x="440" y="18" width="372" height="384" rx="10"
        fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>

  
  <line x1="420" y1="30" x2="420" y2="390"
        stroke="var(--border-2,#cbd5e1)" stroke-width="1"
        stroke-dasharray="6,4"/>

  
  <text x="214" y="50" text-anchor="middle" class="panel-title">Kaplan worldview (2020)</text>
  <line x1="60" y1="57" x2="368" y2="57" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>

  
  <text x="60" y="82" class="heading">10x compute splits as:</text>

  
  <text x="60" y="108" class="bar-lbl">N (params):</text>
  <rect x="160" y="95" width="196" height="20" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="362" y="110" dx="4" class="mult-lbl" fill="var(--accent,#6366f1)">~5.2x</text>

  
  <text x="60" y="140" class="bar-lbl">D (data):</text>
  <rect x="160" y="127" width="72" height="20" rx="4" fill="var(--accent-2,#14b8a6)" fill-opacity="0.8"/>
  <text x="237" y="142" dx="4" class="mult-lbl" fill="var(--accent-2,#14b8a6)">~1.9x</text>

  
  <text x="60" y="165" class="heading">Mostly grow the model; starve data.</text>

  
  <rect x="60" y="176" width="296" height="28" rx="14"
        fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
  <text x="208" y="195" text-anchor="middle" class="pill-text" fill="var(--warn,#e0a106)">=&gt; big, data-starved models</text>

  
  <rect x="60" y="218" width="296" height="64" rx="6"
        fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
  <text x="208" y="238" text-anchor="middle" class="ex-label">GPT-3: 175B params / 300B tokens</text>
  <text x="208" y="256" text-anchor="middle" class="ex-bold">~1.7 tokens/param</text>
  <text x="208" y="273" text-anchor="middle" class="ex-label">(undertrained for its size)</text>

  
  <text x="60" y="310" class="heading">Exponents:  N ~ C^0.73,  D ~ C^0.27</text>

  
  <rect x="60" y="322" width="296" height="52" rx="6"
        fill="none" stroke="var(--warn,#e0a106)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="208" y="342" text-anchor="middle" class="heading">LR schedule not matched to token count</text>
  <text x="208" y="358" text-anchor="middle" class="heading">-&gt; systematically undervalued data</text>
  <text x="208" y="374" text-anchor="middle" class="heading">(Chinchilla diagnosis)</text>

  
  <text x="626" y="50" text-anchor="middle" class="panel-title">Chinchilla worldview (2022)</text>
  <line x1="472" y1="57" x2="780" y2="57" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>

  
  <text x="472" y="82" class="heading">10x compute splits as:</text>

  
  <text x="472" y="108" class="bar-lbl">N (params):</text>
  <rect x="572" y="95" width="148" height="20" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="726" y="110" dx="4" class="mult-lbl" fill="var(--accent,#6366f1)">~3.16x</text>

  
  <text x="472" y="140" class="bar-lbl">D (data):</text>
  <rect x="572" y="127" width="148" height="20" rx="4" fill="var(--accent-2,#14b8a6)" fill-opacity="0.8"/>
  <text x="726" y="142" dx="4" class="mult-lbl" fill="var(--accent-2,#14b8a6)">~3.16x</text>

  
  <text x="472" y="165" class="heading">Both grow by sqrt(10) ~= 3.16 in lockstep.</text>

  
  <rect x="472" y="176" width="296" height="28" rx="14"
        fill="none" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
  <text x="620" y="195" text-anchor="middle" class="pill-text" fill="var(--accent,#6366f1)">=&gt; balanced N and D</text>

  
  <rect x="472" y="218" width="296" height="64" rx="6"
        fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
  <text x="620" y="238" text-anchor="middle" class="ex-label">Chinchilla: 70B params / 1.4T tokens</text>
  <text x="620" y="256" text-anchor="middle" class="ex-bold">~20 tokens/param</text>
  <text x="620" y="273" text-anchor="middle" class="ex-label">(beat 4x larger Gopher)</text>

  
  <text x="472" y="310" class="heading">Exponents:  N ~ C^0.5,   D ~ C^0.5</text>

  
  <rect x="472" y="322" width="296" height="52" rx="6"
        fill="none" stroke="var(--accent,#6366f1)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="620" y="342" text-anchor="middle" class="heading">Three methods (IsoFLOP, curves, fit)</text>
  <text x="620" y="358" text-anchor="middle" class="heading">all agreed: alpha ~= beta ~= 0.5</text>
  <text x="620" y="374" text-anchor="middle" class="heading">=&gt; ~20 tokens/param rule</text>

</svg>
<figcaption><b>Kaplan (2020) prescribed growing the model fast; Chinchilla (2022) corrected this to grow params and data in lockstep.</b> The left panel's lopsided bars (long N, short D) versus the right panel's equal bars capture the entire correction at a glance. Chinchilla's 70B-parameter model on 1.4T tokens — roughly 20 tokens per parameter — outperformed the 280B-parameter Gopher trained on the same compute, proving that pre-Chinchilla models were severely data-starved.</figcaption>
</figure>
