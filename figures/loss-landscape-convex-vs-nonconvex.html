<figure class="viz" id="fig-loss-landscape-convex-vs-nonconvex">
<svg viewBox="0 0 840 450" role="img" aria-label="Side by side comparison of a convex loss landscape and a non-convex neural network loss landscape, each plotted as loss versus a single parameter theta. The convex panel shows one smooth U-shaped bowl with a single global minimum theta star, where gradient descent with a small enough step size is guaranteed to converge. The non-convex panel shows a wavy terrain with a shallow local minimum, a deeper global minimum, a saddle point on the ridge between them where the gradient is zero but curvature goes up in one direction and down in another, and a broad flat plateau where the gradient is nearly zero far from any minimum, caused by dead ReLU units or saturating activations.">

  </marker>
</defs>

<line x1="60" y1="340" x2="385" y2="340" stroke="var(--v-stroke,#45413a)" stroke-width="1.4" marker-end="url(#llc-arrow)"/>

<path d="M85,100 Q220,500 355,100" fill="none" stroke="var(--ink-soft,#45413a)" stroke-width="2.2"/>
<circle cx="220" cy="300" r="4.5" fill="var(--accent,#c15b39)"/>
<text x="220" y="278" text-anchor="middle" style="font:600 12px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">global min theta*</text>

<text x="222" y="382" text-anchor="middle" style="font:500 11.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">every local min IS the global min;</text>
<text x="222" y="397" text-anchor="middle" style="font:500 11.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">GD with eta &lt;= 1/L is guaranteed to converge</text>


<text x="640" y="34" text-anchor="middle" style="font:700 15px var(--sans,sans-serif); fill:var(--ink-soft,#45413a)">Non-convex (neural networks)</text>

<text x="438" y="50" style="font:600 11px var(--sans,sans-serif); fill:var(--muted,#6d675d)">Loss</text>
<text x="642" y="362" text-anchor="middle" style="font:600 11px var(--sans,sans-serif); fill:var(--muted,#6d675d)">theta (parameter)</text>


<polygon points="695,283 705,272 725,258 742,255 762,251 785,248 785,340 695,340" fill="var(--v-fill,#ece7da)" opacity="0.55"/>

<text x="740" y="224" text-anchor="middle" style="font:500 10px var(--sans,sans-serif); fill:var(--muted,#6d675d)">(dead ReLU / saturation)</text>


<text x="460" y="428" text-anchor="middle" style="font:500 10.5px var(--sans,sans-serif); fill:var(--muted,#6d675d)">permutation symmetry (many equal valleys)  .  saddles dominate in high dimension  .  flat plateaus</text>

</svg>
<figcaption><b>Convex landscapes have one minimum; neural network landscapes have many, plus saddles and plateaus.</b> In the convex case every local minimum is the global minimum and gradient descent with a small enough step provably converges. In a non-convex neural loss landscape, shallow local minima, a deeper global minimum, saddle points (where the gradient is zero but curvature is positive in one direction and negative in another), and flat plateaus (from dead ReLUs or saturating activations) all coexist — yet in practice SGD still finds solutions that generalize well.</figcaption>
</figure>
