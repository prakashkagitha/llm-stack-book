<figcaption><b>Three interleaved layers of the 2024-2026 open-source scaling-RL recipe.</b> The Generation layer eliminates idle bubbles through continuous batching, oversubscription, shared queues, and overlap (Lever 3, highlighted, is the single biggest win). The Sample Selection layer ensures every generated sequence carries gradient signal. The Objective layer removes normalization biases and preserves exploration — with the layers interacting: dynamic sampling is only cheap when the generation layer is already async.</figcaption>
</figure>
