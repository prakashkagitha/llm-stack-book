<figure class="viz" id="fig-mlfund-l1-l2-geometry">
<button class="viz-replay" type="button">replay</button>
<svg viewBox="0 0 770 390" role="img" aria-label="Two panels in the same weight space with identical tilted elliptical loss contours centered off the origin at the unregularized optimum w-star. Left: an L2 ridge constraint is a round ball; the outermost reachable contour touches it off-axis, so both weights shrink but stay nonzero. Right: an L1 lasso constraint is a diamond; the same contour touches it exactly at a corner on the w2 axis, forcing w1 to zero -- sparsity.">
<defs>
  <ellipse id="l12-e1" rx="32.4" ry="20.2"/>
  <ellipse id="l12-e2" rx="54" ry="33.8"/>
  <ellipse id="l12-e3" rx="79.2" ry="49.5"/>
  <ellipse id="l12-e4" rx="106.1" ry="66.3"/>
</defs>
<style>
  #fig-mlfund-l1-l2-geometry text{ fill:currentColor; }
  #fig-mlfund-l1-l2-geometry .l12-t1{ font:700 13.5px var(--sans,sans-serif); }
  #fig-mlfund-l1-l2-geometry .l12-t2{ font:400 10px var(--sans,sans-serif); fill:var(--muted,#6d675d); }
  #fig-mlfund-l1-l2-geometry .l12-axis{ font:600 10.5px var(--sans,sans-serif); fill:var(--muted,#6d675d); }
  #fig-mlfund-l1-l2-geometry .l12-tag{ font:700 11px var(--sans,sans-serif); fill:currentColor; }
  #fig-mlfund-l1-l2-geometry .l12-callout{ font:500 10px var(--sans,sans-serif); fill:currentColor; }
  #fig-mlfund-l1-l2-geometry .l12-ellipse{ fill:none; stroke:var(--muted,#6d675d); stroke-width:1.2; opacity:0.6; }
  #fig-mlfund-l1-l2-geometry .l12-ellipse-out{ fill:none; stroke:var(--accent2,#3b82f6); stroke-width:2.2; }
  #fig-mlfund-l1-l2-geometry .l12-region{ fill:var(--accent,#c15b39); fill-opacity:0.15; stroke:var(--accent,#c15b39); stroke-width:1.6; }
  #fig-mlfund-l1-l2-geometry .l12-axline{ stroke:var(--border-2,#d8d1c0); stroke-width:1.1; }
  #fig-mlfund-l1-l2-geometry .l12-leader{ stroke:currentColor; stroke-width:1; opacity:0.6; }
</style>

<g data-anim="1">
  
  <rect x="10" y="10" width="360" height="370" rx="8" class="v-fill" fill-opacity="0.3" stroke="var(--border-2)" stroke-width="1"/>
  <text x="190" y="27" text-anchor="middle" class="l12-t1">L2 (ridge)</text>
  <text x="190" y="41" text-anchor="middle" class="l12-t2">round ball -&gt; shrinks, stays dense</text>

  
  <line x1="25" y1="260" x2="345" y2="260" class="l12-axline"/>
  <line x1="130" y1="70" x2="130" y2="355" class="l12-axline"/>
  <text x="351" y="264" text-anchor="start" class="l12-axis">w1</text>
  <text x="130" y="62" text-anchor="middle" class="l12-axis">w2</text>

  
  <circle cx="130" cy="260" r="49" class="l12-region"/>

  
  <use href="#l12-e1" x="209.2" y="173.6" transform="rotate(25 209.2 173.6)" class="l12-ellipse"/>
  <use href="#l12-e2" x="209.2" y="173.6" transform="rotate(25 209.2 173.6)" class="l12-ellipse"/>
  <use href="#l12-e3" x="209.2" y="173.6" transform="rotate(25 209.2 173.6)" class="l12-ellipse"/>
  <use href="#l12-e4" x="209.2" y="173.6" transform="rotate(25 209.2 173.6)" class="l12-ellipse-out"/>

  
  <circle cx="209.2" cy="173.6" r="3.2" fill="currentColor"/>
  <text x="218.2" y="168.6" class="l12-tag">w*</text>

  
  <circle cx="163.11" cy="223.88" r="3.4" fill="var(--accent2,#3b82f6)"/>
  <line x1="163.11" y1="223.88" x2="203.11" y2="223.88" class="l12-leader"/>
  <text x="208" y="226" class="l12-callout">both weights small,</text>
  <text x="208" y="238" class="l12-callout">neither exactly 0</text>
</g>

<g data-anim="2">
  
  <rect x="400" y="10" width="360" height="370" rx="8" class="v-fill" fill-opacity="0.3" stroke="var(--border-2)" stroke-width="1"/>
  <text x="580" y="27" text-anchor="middle" class="l12-t1">L1 (lasso)</text>
  <text x="580" y="41" text-anchor="middle" class="l12-t2">diamond corners -&gt; exact zeros (sparsity)</text>

  
  <line x1="415" y1="260" x2="735" y2="260" class="l12-axline"/>
  <line x1="520" y1="70" x2="520" y2="355" class="l12-axline"/>
  <text x="741" y="264" text-anchor="start" class="l12-axis">w1</text>
  <text x="520" y="62" text-anchor="middle" class="l12-axis">w2</text>

  
  <polygon points="520,196 584,260 520,324 456,260" class="l12-region"/>

  
  <use href="#l12-e1" x="599.2" y="173.6" transform="rotate(25 599.2 173.6)" class="l12-ellipse"/>
  <use href="#l12-e2" x="599.2" y="173.6" transform="rotate(25 599.2 173.6)" class="l12-ellipse"/>
  <use href="#l12-e3" x="599.2" y="173.6" transform="rotate(25 599.2 173.6)" class="l12-ellipse"/>
  <use href="#l12-e4" x="599.2" y="173.6" transform="rotate(25 599.2 173.6)" class="l12-ellipse-out"/>

  
  <circle cx="599.2" cy="173.6" r="3.2" fill="currentColor"/>
  <text x="608.2" y="168.6" class="l12-tag">w*</text>

  
  <circle cx="520" cy="196" r="3.4" fill="var(--accent2,#3b82f6)"/>
  <line x1="520" y1="196" x2="508" y2="158" class="l12-leader"/>
  <text x="516" y="148" text-anchor="end" class="l12-callout">w1 = 0 exactly</text>
  <text x="516" y="160" text-anchor="end" class="l12-callout">-&gt; feature dropped</text>
</g>

</svg>
<figcaption><b>Round constraint regions shrink weights toward zero; pointed ones snap them to exactly zero.</b> Both panels show the same tilted loss contours around the unregularized least-squares optimum w* — only the constraint region's shape differs. The L2 ball is round, so the outermost reachable contour typically touches it at a generic point off both axes: both weights shrink but stay nonzero. The L1 diamond has corners sitting on the axes, so the same contour tends to touch it exactly at a corner, driving one weight to exactly zero — automatic feature selection.</figcaption>
</figure>
