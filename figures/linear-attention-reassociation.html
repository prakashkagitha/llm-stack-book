<figcaption><b>Reassociating the matrix product moves the expensive object.</b> Computing <code>(phi(Q) phi(K)^T) V</code> first materializes an N x N score matrix (top, warn-colored, the object to avoid); computing <code>phi(Q) (phi(K)^T V)</code> instead builds only a tiny r x d_v state (bottom, tiny and good-colored) that is reused for every query -- same output, but O(N) cost instead of O(N^2).</figcaption>
</figure>
