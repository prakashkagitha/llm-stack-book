<figure class="viz" id="fig-eval-proxy-gap-ladder">
<svg viewBox="0 0 720 620" role="img" aria-label="A vertical funnel of four proxy panels from true goal down to training signal, narrowing at each step, with a labeled validity gap called out between each pair.">

<style>
  #fig-eval-proxy-gap-ladder text { fill: var(--ink-soft,#374151); font-family: var(--sans,sans-serif); }
  #fig-eval-proxy-gap-ladder .lead   { font: 600 12.5px var(--sans,sans-serif); }
  #fig-eval-proxy-gap-ladder .panel-t{ font: 700 13px var(--sans,sans-serif); }
  #fig-eval-proxy-gap-ladder .panel-s{ font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-eval-proxy-gap-ladder .gap-t  { font: 600 10px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-eval-proxy-gap-ladder .side   { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-eval-proxy-gap-ladder .tag    { font: 600 9.5px var(--mono,monospace); fill: var(--muted,#9ca3af); }
</style>

<defs>
  <marker id="epgl-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#6b7280)"/>
  </marker>
</defs>

<text x="18" y="22" class="lead">The chain of proxies: signal flows only downward</text>







<g data-anim="1">
  <polygon points="60,46 660,46 610,126 110,126"
           fill="var(--v-fill,#ece7da)" fill-opacity="0.5" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="360" y="72" text-anchor="middle" class="panel-t">TRUE GOAL</text>
  <text x="360" y="90" text-anchor="middle" class="panel-s">Is this model useful for my tasks?</text>
  <text x="360" y="106" text-anchor="middle" class="tag">real-world outcomes, unmeasured directly</text>
</g>


<g data-anim="2">
  <line x1="360" y1="130" x2="360" y2="172" stroke="var(--ink-soft,#6b7280)" stroke-width="2" marker-end="url(#epgl-arr)"/>
  <rect x="30" y="136" width="660" height="30" fill="var(--warn,#e0a106)" fill-opacity="0.09"/>
  <text x="360" y="148" text-anchor="middle" class="gap-t">GAP 1 -- benchmarks are a fixed sample</text>
  <text x="360" y="161" text-anchor="middle" class="gap-t">-&gt; coverage &amp; distribution shift</text>
</g>

<g data-anim="2">
  <polygon points="115,176 605,176 560,256 160,256"
           fill="var(--v-fill,#ece7da)" fill-opacity="0.5" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="360" y="202" text-anchor="middle" class="panel-t">OPERATIONALIZATION</text>
  <text x="360" y="220" text-anchor="middle" class="panel-s">Does it score well on a suite of benchmarks?</text>
  <text x="360" y="236" text-anchor="middle" class="tag">a chosen benchmark suite stands in for "useful"</text>
</g>


<g data-anim="3">
  <line x1="360" y1="260" x2="360" y2="302" stroke="var(--ink-soft,#6b7280)" stroke-width="2" marker-end="url(#epgl-arr)"/>
  <rect x="30" y="266" width="660" height="30" fill="var(--warn,#e0a106)" fill-opacity="0.09"/>
  <text x="360" y="278" text-anchor="middle" class="gap-t">GAP 2 -- a score is not the capability</text>
  <text x="360" y="291" text-anchor="middle" class="gap-t">-&gt; guessing, position &amp; format artifacts</text>
</g>

<g data-anim="3">
  <polygon points="165,306 555,306 515,386 205,386"
           fill="var(--v-fill,#ece7da)" fill-opacity="0.5" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="360" y="334" text-anchor="middle" class="panel-t">MEASUREMENT</text>
  <text x="360" y="352" text-anchor="middle" class="panel-s">MC accuracy / code pass-rate / human judgment</text>
  <text x="360" y="368" text-anchor="middle" class="tag">a single scalar reduces a rich behavior</text>
</g>


<g data-anim="4">
  <line x1="360" y1="390" x2="360" y2="432" stroke="var(--ink-soft,#6b7280)" stroke-width="2" marker-end="url(#epgl-arr)"/>
  <rect x="30" y="396" width="660" height="30" fill="var(--warn,#e0a106)" fill-opacity="0.09"/>
  <text x="360" y="408" text-anchor="middle" class="gap-t">GAP 3 -- the optimizer never sees the goal</text>
  <text x="360" y="421" text-anchor="middle" class="gap-t">-&gt; it only minimizes a proxy loss</text>
</g>

<g data-anim="4">
  <polygon points="220,436 500,436 470,506 250,506"
           fill="var(--v-fill,#ece7da)" fill-opacity="0.6" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <text x="360" y="462" text-anchor="middle" class="panel-t">TRAINING SIGNAL</text>
  <text x="360" y="480" text-anchor="middle" class="panel-s">cross-entropy loss on the next token</text>
  
  <g transform="translate(345,486)">
    <rect x="0" y="0" width="14" height="14" rx="2.5" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
    <circle cx="4.5" cy="4.5" r="1.1" fill="var(--accent,#c15b39)"/>
    <circle cx="9.5" cy="9.5" r="1.1" fill="var(--accent,#c15b39)"/>
    <circle cx="9.5" cy="4.5" r="1.1" fill="var(--accent,#c15b39)"/>
  </g>
</g>


<g data-anim="5">
  <text x="360" y="536" text-anchor="middle" class="side" font-style="italic">signal flows down only -- the goal never flows back up to the optimizer</text>
</g>

<line x1="30" y1="556" x2="690" y2="556" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
<text x="30" y="576" class="side">Each hop is where validity leaks.</text>
<text x="30" y="594" class="side">The rest of this chapter is a tour of these three gaps --</text>
<text x="30" y="610" class="side">contamination, saturation, and multiple-choice artifacts.</text>

</svg>
<figcaption><b>Evaluation is a chain of proxies, and each hop loses information.</b> Training only ever optimizes a scalar loss on the next token; whether that translates into "useful for my tasks" depends on three unverified hops upward through measurement, operationalization, and the real goal — and the signal never flows back down to correct the optimizer.</figcaption>
</figure>
