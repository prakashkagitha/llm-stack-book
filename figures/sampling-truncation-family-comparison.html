<figcaption><b>Top-k, top-p, and min-p carve the same distribution differently.</b> Reading down the first column, top-k always keeps exactly 4 tokens whether the model is confident (top row, one dominant token) or uncertain (bottom row, long gentle tail) — a fixed count blind to shape. Reading down the second and third columns, top-p's cumulative-mass nucleus and min-p's peak-relative threshold both stay small when the model is confident and both grow substantially when it is uncertain, adapting to the distribution instead of ignoring it.</figcaption>
</figure>
