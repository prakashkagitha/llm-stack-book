<figure class="viz" id="fig-unified-ar-image-seq-layout">
<style>
  #fig-unified-ar-image-seq-layout text { fill: var(--ink-soft, #45413a); }
  #fig-unified-ar-image-seq-layout .lbl { font: 600 12px var(--sans, sans-serif); }
  #fig-unified-ar-image-seq-layout .lbl-sm { font: 500 10px var(--sans, sans-serif); }
  #fig-unified-ar-image-seq-layout .lbl-xs { font: 400 9px var(--sans, sans-serif); }
  #fig-unified-ar-image-seq-layout .mono { font: 500 11px var(--mono, monospace); }
  #fig-unified-ar-image-seq-layout .cap { font: 400 9.5px var(--sans, sans-serif); fill: var(--muted, #6d675d); }
  #fig-unified-ar-image-seq-layout .zone-lbl { font: 500 10px var(--sans, sans-serif); fill: var(--muted, #6d675d); }
  #fig-unified-ar-image-seq-layout .brace-lbl-text { font: 600 11px var(--sans, sans-serif); fill: var(--accent2, #3b82f6); }
  #fig-unified-ar-image-seq-layout .brace-lbl-img { font: 600 11px var(--sans, sans-serif); fill: var(--warn, #e0a106); }
</style>
<svg viewBox="0 0 900 265" role="img" aria-label="Token sequence layout for text-conditional autoregressive image generation: a BOS token, text tokens, a SEP token, image tokens, and EOS — text prefix conditions the generation of 1024 image tokens left-to-right.">
  <defs>
    <marker id="ar-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--warn, #e0a106)"/>
    </marker>
    <marker id="ar-arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent2, #3b82f6)"/>
    </marker>
    <marker id="ar-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted, #6d675d)"/>
    </marker>
  </defs>

  
  
  <text x="195" y="22" text-anchor="middle" class="zone-lbl">PREFIX — fixed at inference</text>
  
  <line x1="14" y1="27" x2="376" y2="27" stroke="var(--muted, #6d675d)" stroke-width="1" stroke-dasharray="4 3"/>

  
  <text x="640" y="22" text-anchor="middle" class="zone-lbl">GENERATED autoregressively, left-to-right</text>
  <line x1="384" y1="27" x2="886" y2="27" stroke="var(--warn, #e0a106)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ar-arrow)"/>

  

  
  <rect x="14" y="55" width="56" height="44" rx="7" fill="var(--surface-3, #ede9fe)" stroke="var(--v-stroke, #64748b)" stroke-width="1.5"/>
  <text x="42" y="82" text-anchor="middle" class="mono">[BOS]</text>

  
  <rect x="78" y="55" width="36" height="44" rx="5" fill="var(--accent2, #dbeafe)" fill-opacity="0.35" stroke="var(--accent2, #3b82f6)" stroke-width="1.5"/>
  <text x="96" y="82" text-anchor="middle" class="lbl" fill="var(--accent2, #3b82f6)">T</text>

  <rect x="120" y="55" width="36" height="44" rx="5" fill="var(--accent2, #dbeafe)" fill-opacity="0.35" stroke="var(--accent2, #3b82f6)" stroke-width="1.5"/>
  <text x="138" y="82" text-anchor="middle" class="lbl" fill="var(--accent2, #3b82f6)">T</text>

  <rect x="162" y="55" width="36" height="44" rx="5" fill="var(--accent2, #dbeafe)" fill-opacity="0.35" stroke="var(--accent2, #3b82f6)" stroke-width="1.5"/>
  <text x="180" y="82" text-anchor="middle" class="lbl" fill="var(--accent2, #3b82f6)">T</text>

  
  <text x="214" y="82" text-anchor="middle" class="lbl" fill="var(--muted, #6d675d)">...</text>

  
  <rect x="228" y="55" width="50" height="44" rx="7" fill="var(--surface-3, #ede9fe)" stroke="var(--v-stroke, #64748b)" stroke-width="1.5"/>
  <text x="253" y="82" text-anchor="middle" class="mono">[SEP]</text>

  
  <rect x="286" y="55" width="50" height="44" rx="5" fill="var(--warn, #fde68a)" fill-opacity="0.45" stroke="var(--warn, #d97706)" stroke-width="1.5"/>
  <text x="311" y="78" text-anchor="middle" class="lbl-sm" fill="var(--warn, #d97706)">img 0</text>

  <rect x="342" y="55" width="50" height="44" rx="5" fill="var(--warn, #fde68a)" fill-opacity="0.45" stroke="var(--warn, #d97706)" stroke-width="1.5"/>
  <text x="367" y="78" text-anchor="middle" class="lbl-sm" fill="var(--warn, #d97706)">img 1</text>

  
  <text x="404" y="82" text-anchor="middle" class="lbl" fill="var(--muted, #6d675d)">...</text>

  
  <rect x="420" y="55" width="60" height="44" rx="5" fill="var(--warn, #fde68a)" fill-opacity="0.45" stroke="var(--warn, #d97706)" stroke-width="1.5"/>
  <text x="450" y="78" text-anchor="middle" class="lbl-xs" fill="var(--warn, #d97706)">img 1023</text>

  
  <rect x="488" y="55" width="54" height="44" rx="7" fill="var(--surface-3, #ede9fe)" stroke="var(--v-stroke, #64748b)" stroke-width="1.5"/>
  <text x="515" y="82" text-anchor="middle" class="mono">[EOS]</text>

  
  
  
  <path d="M 78 116 L 78 126 L 278 126 L 278 116" fill="none" stroke="var(--accent2, #3b82f6)" stroke-width="1.8"/>
  <line x1="178" y1="126" x2="178" y2="132" stroke="var(--accent2, #3b82f6)" stroke-width="1.8"/>
  <text x="178" y="146" text-anchor="middle" class="brace-lbl-text">text conditioning</text>

  
  <path d="M 286 116 L 286 126 L 548 126 L 548 116" fill="none" stroke="var(--warn, #d97706)" stroke-width="1.8"/>
  <line x1="417" y1="126" x2="417" y2="132" stroke="var(--warn, #d97706)" stroke-width="1.8"/>
  <text x="417" y="146" text-anchor="middle" class="brace-lbl-img">image tokens to predict (1024)</text>

  
  <text x="450" y="175" text-anchor="middle" class="cap">Trained with cross-entropy on all positions; at inference only the image span is sampled.</text>
  <text x="450" y="188" text-anchor="middle" class="cap">Text prefix conditions via the causal mask — no architectural change required.</text>

</svg>
<figcaption><b>Autoregressive image generation lays out text and image tokens in one flat sequence.</b> The text prefix (BOS, text tokens, SEP) is fixed at inference time and conditions generation through the causal attention mask. The model then samples image tokens left-to-right from position 0 to 1023, requiring no architectural change beyond the standard transformer.</figcaption>
</figure>
