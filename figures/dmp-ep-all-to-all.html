<figcaption><b>Expert parallelism dispatch and combine all-to-all (E=4 experts, e=4 devices, top-1 routing).</b> After the gate assigns each token to one expert, a first all-to-all ships tokens to the device owning their expert (dispatch). Each GPU runs its local expert FFN on the tokens it received, then a second all-to-all returns outputs to the original token owners, weighted by router probabilities and summed (combine). Load imbalance — too many tokens sent to one expert — is the dominant performance bottleneck.</figcaption>
