<figure class="viz" id="fig-chunkrerank-hyde-embedding-space">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 560" role="img" aria-label="Schematic embedding space diagram. A raw query marker sits far from a tight cluster of real answer documents, connected by a long dashed line labeled query to doc gap far. An LLM turns the query into a hypothetical document, whose marker lands inside the real document cluster, connected by a short solid line labeled hypothesis to doc close. A note explains that HyDE embeds the hypothesis, not the query, to retrieve the real documents in its neighborhood.">
<defs>
  <marker id="hyde-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)"/>
  </marker>
  <marker id="hyde-arr-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
  </marker>
</defs>

<style>
  #fig-chunkrerank-hyde-embedding-space text { fill: var(--ink-soft); }
  #fig-chunkrerank-hyde-embedding-space .hdr { font: 700 13px var(--sans,sans-serif); }
  #fig-chunkrerank-hyde-embedding-space .lbl { font: 600 10.5px var(--sans,sans-serif); }
  #fig-chunkrerank-hyde-embedding-space .lbl-xs { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-chunkrerank-hyde-embedding-space .lbl-it { font: 600 10px var(--sans,sans-serif); font-style: italic; }
  #fig-chunkrerank-hyde-embedding-space .mono { font: 700 11px var(--mono,monospace); }
  #fig-chunkrerank-hyde-embedding-space .panel-lbl { font: 600 10px var(--sans,sans-serif); font-style: italic; fill: var(--muted); }
  #fig-chunkrerank-hyde-embedding-space .note-txt { font: 500 10.5px var(--sans,sans-serif); }
  #fig-chunkrerank-hyde-embedding-space .foot { font: 400 9.5px var(--sans,sans-serif); font-style: italic; fill: var(--muted); }
</style>

<text x="380" y="26" text-anchor="middle" class="hdr">HyDE: query-&gt;document matching becomes document-&gt;document matching</text>

<g data-anim="1">
  <rect x="20" y="60" width="720" height="430" rx="18" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="44" y="86" class="panel-lbl">embedding space (schematic)</text>


  <circle cx="559" cy="364" r="95" fill="var(--ink-soft)" opacity="0.07"/>
  <circle cx="535" cy="335" r="7" fill="var(--muted)" fill-opacity="0.65" class="v-stroke" stroke-width="1"/>
  <circle cx="575" cy="325" r="7" fill="var(--muted)" fill-opacity="0.65" class="v-stroke" stroke-width="1"/>
  <circle cx="595" cy="360" r="7" fill="var(--muted)" fill-opacity="0.65" class="v-stroke" stroke-width="1"/>
  <circle cx="565" cy="390" r="7" fill="var(--muted)" fill-opacity="0.65" class="v-stroke" stroke-width="1"/>
  <circle cx="525" cy="370" r="7" fill="var(--muted)" fill-opacity="0.65" class="v-stroke" stroke-width="1"/>
  <text x="559" y="460" text-anchor="middle" class="lbl">real answer docs</text>
  <text x="559" y="474" text-anchor="middle" class="lbl-xs">(formal / technical vocabulary)</text>
</g>

<g data-anim="2">
  <path d="M100,110 L110,120 L100,130 L90,120 Z" fill="var(--accent-2)"/>
  <text x="110" y="150" text-anchor="middle" class="lbl">raw query</text>
  <text x="110" y="164" text-anchor="middle" class="lbl-xs">(short, colloquial)</text>

  <line x1="122" y1="128" x2="527" y2="333" stroke="var(--accent-2)" stroke-width="1.4" stroke-dasharray="6 4" opacity="0.75"/>
  <text x="322" y="207" text-anchor="middle" class="lbl-it">query &lt;-&gt; doc gap: far</text>
</g>

<g data-anim="3">
  <rect x="272" y="112" width="56" height="36" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="300" y="135" text-anchor="middle" class="mono">LLM</text>

  <path d="M120,122 C180,110 240,112 268,124" fill="none" stroke="var(--ink-soft)" stroke-width="1.5" marker-end="url(#hyde-arr)"/>
  <path d="M330,138 C400,180 440,240 468,320" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.6" marker-end="url(#hyde-arr-accent)"/>
</g>

<g data-anim="4">
  <path d="M480,319 L491,330 L480,341 L469,330 Z" fill="none" class="v-stroke" stroke="var(--accent,#4f46e5)" stroke-width="2.2"/>
  <line x1="491" y1="330" x2="528" y2="335" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <text x="497" y="303" text-anchor="middle" class="lbl-it" style="fill:var(--accent,#4f46e5)">hyp &lt;-&gt; doc: close</text>
</g>

<g data-anim="5">
  <rect x="40" y="400" width="340" height="56" rx="10" fill="var(--accent,#4f46e5)" fill-opacity="0.08" class="v-stroke" stroke-width="1.1" stroke-dasharray="3 3"/>
  <text x="52" y="424" class="note-txt">embed the hypothesis (not the query);</text>
  <text x="52" y="440" class="note-txt">retrieve the real docs in its neighborhood.</text>

  <text x="380" y="515" text-anchor="middle" class="foot">the hypothesis text is used only for its embedding -- never fed to the generator.</text>
</g>

</svg>
<figcaption><b>HyDE turns query-&gt;document matching into document-&gt;document matching.</b> The raw query sits far from the real answer documents in embedding space, but an LLM-generated hypothetical answer shares enough vocabulary and structure to land inside their neighborhood, so retrieval embeds and searches with the hypothesis instead of the query. The hypothesis itself is never shown to the generator -- only its embedding is used to find the real, grounded documents.</figcaption>
</figure>
