<figure class="viz" id="fig-rcae-sandbox-architecture">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 760 620" role="img" aria-label="Code execution sandbox architecture: test input and generated code flow into a Sandbox Manager, which spawns an isolated container with Python, CPU, RAM, network, and filesystem limits, which emits a pass, fail, TLE, or OOM verdict.">
<defs>
  <marker id="sa-arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#6366f1)" opacity="0.9"/>
  </marker>
  <marker id="sa-arrow-n" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#45413a)" opacity="0.8"/>
  </marker>
  
  <circle id="sa-dot" r="6" fill="var(--accent,#6366f1)" opacity="0.95"/>
</defs>
<style>
  #fig-rcae-sandbox-architecture .ttl  { font: 700 13px var(--sans,sans-serif); }
  #fig-rcae-sandbox-architecture .sub  { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-rcae-sandbox-architecture .mono { font: 400 11px var(--mono,monospace); }
  #fig-rcae-sandbox-architecture .albl { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-rcae-sandbox-architecture .hdr  { font: 700 14px var(--sans,sans-serif); }
  #fig-rcae-sandbox-architecture .pill { font: 600 10px var(--sans,sans-serif); }
  #fig-rcae-sandbox-architecture text  { fill: var(--ink-soft,#45413a); }
</style>


<rect x="18" y="18" width="724" height="584" rx="14"
      class="v-fill" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.8" fill-opacity="0.5"/>

<rect x="18" y="18" width="724" height="36" rx="14"
      fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.8"/>
<rect x="18" y="36" width="724" height="18" fill="var(--surface-3,#ece7da)"/>
<text x="380" y="41" text-anchor="middle" class="hdr">Eval Orchestrator</text>


<g data-anim="1">
  <rect x="50" y="80" width="200" height="100" rx="8"
        class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  <text x="150" y="107" text-anchor="middle" class="ttl">Test Input</text>
  <text x="150" y="124" text-anchor="middle" class="ttl">+ Generated Code</text>
  <line x1="70" y1="134" x2="230" y2="134" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="150" y="151" text-anchor="middle" class="sub">problem + solution</text>
  <text x="150" y="166" text-anchor="middle" class="sub">pair to evaluate</text>
</g>


<g data-anim="2">
  <rect x="440" y="80" width="256" height="100" rx="8"
        fill="var(--surface-3,#ece7da)" stroke="var(--accent,#6366f1)" stroke-width="1.8"/>
  <text x="568" y="107" text-anchor="middle" class="ttl">Sandbox Manager</text>
  <line x1="458" y1="115" x2="678" y2="115" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="568" y="131" text-anchor="middle" class="sub">gVisor / Docker /</text>
  <text x="568" y="148" text-anchor="middle" class="sub">Firecracker microVM</text>
  <text x="568" y="166" text-anchor="middle" class="sub">isolation broker</text>
</g>


<g data-anim="2">
  <line x1="252" y1="130" x2="436" y2="130"
        stroke="var(--accent,#6366f1)" stroke-width="2"
        marker-end="url(#sa-arrow)"/>
  <text x="344" y="120" text-anchor="middle" class="albl">submit code + tests</text>
</g>


<g data-anim="3" id="sa-container">
  
  <rect x="440" y="234" width="256" height="200" rx="8"
        fill="var(--surface,#fff)" fill-opacity="0.6"
        stroke="var(--accent,#6366f1)" stroke-width="2.2" stroke-dasharray="7 4"/>
  
  <rect x="440" y="234" width="256" height="32" rx="8"
        fill="var(--surface-3,#ece7da)" stroke="var(--accent,#6366f1)" stroke-width="2.2"/>
  <rect x="440" y="250" width="256" height="16" fill="var(--surface-3,#ece7da)"/>
  <text x="568" y="254" text-anchor="middle" class="ttl">Isolated Container</text>
  
  <path d="M686 238 l6 0 l0 8 q0 5 -6 8 q-6 -3 -6 -8 l0 -8 z"
        fill="var(--accent,#6366f1)" opacity="0.75"/>
  
  <text x="462" y="288" class="mono">- Python 3.x</text>
  <text x="462" y="306" class="mono">- CPU: 5s timeout</text>
  <text x="462" y="324" class="mono">- RAM: 256 MB cap</text>
  <text x="462" y="342" class="mono">- No network</text>
  <text x="462" y="360" class="mono">- /tmp only writes</text>
  
  <rect id="sa-pulse-rect" x="441" y="235" width="254" height="198" rx="8"
        fill="none" stroke="var(--accent,#6366f1)" stroke-width="3" opacity="0"/>
</g>


<g data-anim="3">
  <line x1="568" y1="182" x2="568" y2="230"
        stroke="var(--ink-soft,#45413a)" stroke-width="2"
        marker-end="url(#sa-arrow-n)"/>
  <text x="558" y="210" text-anchor="end" class="albl">spawn isolated process</text>
</g>


<g data-anim="5">
  <rect x="440" y="472" width="256" height="108" rx="8"
        fill="var(--accent,#6366f1)" fill-opacity="0.12"
        stroke="var(--accent,#6366f1)" stroke-width="2"/>
  <rect x="440" y="472" width="256" height="32" rx="8"
        fill="var(--accent,#6366f1)" fill-opacity="0.25"/>
  <rect x="440" y="488" width="256" height="16"
        fill="var(--accent,#6366f1)" fill-opacity="0.25"/>
  <text x="568" y="492" text-anchor="middle" class="ttl">stdout / exit code</text>
  
  <g id="sa-pills">
    
    <rect x="452" y="514" width="44" height="20" rx="10"
          fill="var(--good,#2f9e6e)" fill-opacity="0.9"/>
    <text x="474" y="528" text-anchor="middle" class="pill" fill="#fff">pass</text>
    
    <rect x="502" y="514" width="40" height="20" rx="10"
          fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
    <text x="522" y="528" text-anchor="middle" class="pill" fill="#fff">fail</text>
    
    <rect x="548" y="514" width="38" height="20" rx="10"
          fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
    <text x="567" y="528" text-anchor="middle" class="pill" fill="#fff">TLE</text>
    
    <rect x="592" y="514" width="44" height="20" rx="10"
          fill="var(--ink-soft,#45413a)" fill-opacity="0.75"/>
    <text x="614" y="528" text-anchor="middle" class="pill" fill="#fff">OOM</text>
    
    <text x="568" y="558" text-anchor="middle" class="sub">verdict</text>
  </g>
</g>


<g data-anim="4">
  <line x1="568" y1="436" x2="568" y2="468"
        stroke="var(--ink-soft,#45413a)" stroke-width="2"
        marker-end="url(#sa-arrow-n)"/>
  <text x="600" y="458" class="albl">stdout, exit code</text>
</g>


<g id="sa-anim-layer">
  
  <circle r="6" fill="var(--accent,#6366f1)" opacity="0">
    <animate attributeName="cx" values="252;436" dur="0.6s" begin="0.2s;sa-loop.end+0.2s" fill="freeze"/>
    <animate attributeName="cy" values="130;130" dur="0.6s" begin="0.2s;sa-loop.end+0.2s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.05;0.9;1"
             dur="0.6s" begin="0.2s;sa-loop.end+0.2s" fill="freeze"/>
  </circle>
  
  <circle r="6" fill="var(--accent,#6366f1)" opacity="0">
    <animate attributeName="cx" values="568;568" dur="0.5s" begin="1.0s;sa-loop.end+1.0s" fill="freeze"/>
    <animate attributeName="cy" values="182;230" dur="0.5s" begin="1.0s;sa-loop.end+1.0s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.05;0.9;1"
             dur="0.5s" begin="1.0s;sa-loop.end+1.0s" fill="freeze"/>
  </circle>
  
  <rect x="441" y="235" width="254" height="198" rx="8"
        fill="none" stroke="var(--accent,#6366f1)" stroke-width="4" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0;0.7;0" keyTimes="0;0.3;0.5;0.8;1"
             dur="1.0s" begin="1.7s;sa-loop.end+1.7s" fill="freeze"/>
  </rect>
  
  <circle r="6" fill="var(--accent,#6366f1)" opacity="0">
    <animate attributeName="cx" values="568;568" dur="0.5s" begin="2.9s;sa-loop.end+2.9s" fill="freeze"/>
    <animate attributeName="cy" values="436;468" dur="0.5s" begin="2.9s;sa-loop.end+2.9s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.05;0.9;1"
             dur="0.5s" begin="2.9s;sa-loop.end+2.9s" fill="freeze"/>
  </circle>
  
  <rect x="450" y="512" width="198" height="24" rx="12"
        fill="var(--accent,#6366f1)" fill-opacity="0" stroke="none">
    <animate attributeName="fill-opacity" values="0;0.18;0" dur="0.8s"
             begin="3.5s;sa-loop.end+3.5s" fill="freeze"/>
  </rect>
  
  <rect id="sa-loop" x="0" y="0" width="0" height="0" opacity="0">
    <animate attributeName="opacity" values="0" dur="5.5s" begin="0s" repeatCount="indefinite"/>
  </rect>
</g>
</svg>
<figcaption><b>How an eval orchestrator safely runs untrusted model-generated code.</b> Test input and the model's solution are submitted to a Sandbox Manager (gVisor, Docker, or Firecracker microVM), which spawns an isolated container enforcing a 5-second CPU timeout, 256 MB RAM cap, no network access, and /tmp-only writes. The container returns stdout and an exit code that the orchestrator translates into one of four verdicts: pass, fail, TLE (time limit exceeded), or OOM (out-of-memory).</figcaption>
</figure>
