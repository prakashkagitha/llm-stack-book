<figure class="viz" id="fig-diffusion">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 308" role="img" aria-label="Diffusion models: a fixed forward process gradually adds Gaussian noise to data over T steps until it becomes pure noise, and a learned reverse process denoises step by step back to a clean sample.">
  <defs>
    <marker id="dz-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
    <pattern id="dz-noise" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1.2" r="0.8" fill="currentColor"/>
      <circle cx="3.6" cy="2.7" r="0.8" fill="currentColor"/>
      <circle cx="2.1" cy="4.2" r="0.8" fill="currentColor"/>
    </pattern>
    <clipPath id="dz-c0"><rect x="40"  y="96" width="76" height="76" rx="8"/></clipPath>
    <clipPath id="dz-c1"><rect x="188" y="96" width="76" height="76" rx="8"/></clipPath>
    <clipPath id="dz-c2"><rect x="336" y="96" width="76" height="76" rx="8"/></clipPath>
    <clipPath id="dz-c3"><rect x="484" y="96" width="76" height="76" rx="8"/></clipPath>
    <clipPath id="dz-c4"><rect x="604" y="96" width="76" height="76" rx="8"/></clipPath>
  </defs>
  <style>
    #fig-diffusion text{ fill:var(--ink-soft); }
    #fig-diffusion .lbl{ font:600 13px var(--sans,sans-serif); }
    #fig-diffusion .sub{ font:500 11px var(--mono,monospace); fill:var(--muted); }
    #fig-diffusion .tiny{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-diffusion .noise{ color:var(--ink-soft); }
  </style>

  
  <g data-anim="1">
    <text x="360" y="26" text-anchor="middle" class="lbl" fill="var(--warn,#e0a106)">Forward process — fixed, adds Gaussian noise</text>
    <line x1="40" y1="44" x2="680" y2="44" stroke="var(--warn,#e0a106)" stroke-width="1.8" marker-end="url(#dz-arrow)"/>
    <text x="360" y="60" text-anchor="middle" class="sub">q(xₜ | xₜ₋₁) = N( √(1−βₜ)·xₜ₋₁ , βₜ I )</text>
  </g>

  
  <g data-anim="2">
    
    <g clip-path="url(#dz-c0)">
      <rect x="40" y="96" width="76" height="76" class="v-fill"/>
      <g opacity="1"><circle cx="96" cy="118" r="11" fill="var(--warn,#e0a106)"/>
        <polygon points="48,164 78,120 108,164" fill="var(--good,#2f9e6e)" opacity="0.8"/></g>
      <rect x="40" y="96" width="76" height="76" class="noise" fill="url(#dz-noise)" opacity="0"/>
    </g>
    <rect x="40" y="96" width="76" height="76" rx="8" fill="none" class="v-stroke" stroke-width="1.3"/>
    
    <g clip-path="url(#dz-c1)">
      <rect x="188" y="96" width="76" height="76" class="v-fill"/>
      <g opacity="0.66"><circle cx="244" cy="118" r="11" fill="var(--warn,#e0a106)"/>
        <polygon points="196,164 226,120 256,164" fill="var(--good,#2f9e6e)" opacity="0.8"/></g>
      <rect x="188" y="96" width="76" height="76" class="noise" fill="url(#dz-noise)" opacity="0.34"/>
    </g>
    <rect x="188" y="96" width="76" height="76" rx="8" fill="none" class="v-stroke" stroke-width="1.3"/>
    
    <g clip-path="url(#dz-c2)">
      <rect x="336" y="96" width="76" height="76" class="v-fill"/>
      <g opacity="0.38"><circle cx="392" cy="118" r="11" fill="var(--warn,#e0a106)"/>
        <polygon points="344,164 374,120 404,164" fill="var(--good,#2f9e6e)" opacity="0.8"/></g>
      <rect x="336" y="96" width="76" height="76" class="noise" fill="url(#dz-noise)" opacity="0.62"/>
    </g>
    <rect x="336" y="96" width="76" height="76" rx="8" fill="none" class="v-stroke" stroke-width="1.3"/>
    
    <g clip-path="url(#dz-c3)">
      <rect x="484" y="96" width="76" height="76" class="v-fill"/>
      <g opacity="0.15"><circle cx="540" cy="118" r="11" fill="var(--warn,#e0a106)"/>
        <polygon points="492,164 522,120 552,164" fill="var(--good,#2f9e6e)" opacity="0.8"/></g>
      <rect x="484" y="96" width="76" height="76" class="noise" fill="url(#dz-noise)" opacity="0.85"/>
    </g>
    <rect x="484" y="96" width="76" height="76" rx="8" fill="none" class="v-stroke" stroke-width="1.3"/>
    
    <g clip-path="url(#dz-c4)">
      <rect x="604" y="96" width="76" height="76" class="v-fill"/>
      <rect x="604" y="96" width="76" height="76" class="noise" fill="url(#dz-noise)" opacity="1"/>
    </g>
    <rect x="604" y="96" width="76" height="76" rx="8" fill="none" class="v-stroke" stroke-width="1.3"/>

    
    <text x="78"  y="187" text-anchor="middle" class="tiny">x₀ · data</text>
    <text x="226" y="187" text-anchor="middle" class="tiny">x₁</text>
    <text x="374" y="187" text-anchor="middle" class="tiny">xₜ</text>
    <text x="522" y="187" text-anchor="middle" class="tiny">x_{T−1}</text>
    <text x="642" y="187" text-anchor="middle" class="tiny">x_T · N(0, I)</text>
  </g>

  
  <g data-anim="3">
    <line x1="680" y1="212" x2="40" y2="212" stroke="var(--accent)" stroke-width="1.8" marker-end="url(#dz-arrow)"/>
    <text x="360" y="232" text-anchor="middle" class="lbl" fill="var(--accent)">Reverse process — learned denoiser pθ removes a little noise each step</text>
    <text x="360" y="250" text-anchor="middle" class="sub">pθ(xₜ₋₁ | xₜ) = N( μθ(xₜ, t) , Σθ )   —   train εθ to predict the added noise</text>
  </g>

  <g data-anim="4">
    <text x="360" y="286" text-anchor="middle" class="tiny">Sampling = run the reverse chain from pure noise (right) back to a clean sample.</text>
  </g>
</svg>
<figcaption><b>Diffusion: destroy structure on a schedule, then learn to rebuild it.</b> The <b>forward</b> process is a fixed Markov chain that adds a little Gaussian noise at each of T steps until the image is indistinguishable from <span class="v-mono">N(0, I)</span>. The <b>reverse</b> process is a neural network <span class="v-mono">εθ</span> trained to predict (and subtract) that noise, so sampling means starting from pure noise and denoising step by step into a fresh sample.</figcaption>
</figure>
