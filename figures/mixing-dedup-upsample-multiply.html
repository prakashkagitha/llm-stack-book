<figure class="viz" id="fig-mixing-dedup-upsample-multiply">
<svg viewBox="0 0 780 480" role="img" aria-label="Two lanes compare upsampling before versus after deduplication for one high-quality domain, against a shared danger gauge. In the trap lane, a document with four internally-duplicated tiles is upsampled 3x, multiplying to 12 effective views of the duplicated passage and landing inside the memorization danger band. In the correct lane, the same document is deduplicated to one unique tile first, then upsampled 3x to 3 effective views, landing in a safe, net-positive band.">
<style>
  #fig-mixing-dedup-upsample-multiply text { fill: var(--ink-soft,#45413a); }
  #fig-mixing-dedup-upsample-multiply .ttl   { font: 700 13px var(--sans,sans-serif); }
  #fig-mixing-dedup-upsample-multiply .sub   { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-mixing-dedup-upsample-multiply .lbl   { font: 600 10.5px var(--sans,sans-serif); }
  #fig-mixing-dedup-upsample-multiply .tile-lbl { font: 600 9px var(--sans,sans-serif); }
  #fig-mixing-dedup-upsample-multiply .opbox { font: 700 11.5px var(--mono,monospace); }
  #fig-mixing-dedup-upsample-multiply .math  { font: 700 13px var(--mono,monospace); }
  #fig-mixing-dedup-upsample-multiply .axlbl { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-mixing-dedup-upsample-multiply .strap { font: 500 12px var(--sans,sans-serif); }
  #fig-mixing-dedup-upsample-multiply .note  { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-mixing-dedup-upsample-multiply .dup-tile { fill: var(--v-accent,var(--accent,#c15b39)); fill-opacity: 0.28; stroke: var(--v-accent,var(--accent,#c15b39)); stroke-width: 1.4; }
  #fig-mixing-dedup-upsample-multiply .uniq-tile { fill: var(--surface-3,#eef2f7); stroke: var(--border-2,#94a3b8); stroke-width: 1.4; }
  #fig-mixing-dedup-upsample-multiply .op { fill: var(--surface,#fff); stroke: var(--muted,#6d675d); stroke-width: 1.3; }
  #fig-mixing-dedup-upsample-multiply .gauge-bg { fill: var(--surface-3,#eef2f7); stroke: var(--border-2,#94a3b8); stroke-width: 1.3; }
  #fig-mixing-dedup-upsample-multiply .gauge-danger { fill: var(--warn,#e0a106); fill-opacity: 0.28; }
  #fig-mixing-dedup-upsample-multiply .gauge-safe { fill: var(--good,#2f9e6e); fill-opacity: 0.22; }
  #fig-mixing-dedup-upsample-multiply .marker-trap { fill: var(--v-accent,var(--accent,#c15b39)); stroke: var(--v-accent,var(--accent,#c15b39)); }
  #fig-mixing-dedup-upsample-multiply .marker-ok { fill: var(--good,#2f9e6e); stroke: var(--good,#2f9e6e); }
</style>
<defs>
  <pattern id="dum-duphatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="0" y2="6" stroke="var(--v-accent,var(--accent,#c15b39))" stroke-width="1.4" opacity="0.55"/>
  </pattern>
  <marker id="dum-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>

<text x="16" y="20" class="sub">one high-quality domain, one starting document -- same operations, different order</text>


<g data-anim="1">
  <text x="690" y="38" text-anchor="middle" class="lbl">effective</text>
  <text x="690" y="51" text-anchor="middle" class="lbl">views</text>
  <rect x="674" y="64" width="32" height="345" rx="6" class="gauge-bg"/>
  
  <rect x="674" y="64" width="32" height="80" class="gauge-danger"/>
  
  <rect x="674" y="225" width="32" height="70" class="gauge-safe"/>
  <text x="712" y="90" class="axlbl" fill="var(--warn,#d97706)">danger</text>
  <text x="712" y="103" class="axlbl" fill="var(--warn,#d97706)">~4-6 ep</text>
  <text x="712" y="116" class="axlbl" fill="var(--warn,#d97706)">memorize</text>
  <text x="712" y="248" class="axlbl" fill="var(--good,#2f9e6e)">safe</text>
  <text x="712" y="261" class="axlbl" fill="var(--good,#2f9e6e)">2-4 ep</text>
  <text x="712" y="274" class="axlbl" fill="var(--good,#2f9e6e)">net-positive</text>
  <text x="690" y="422" text-anchor="middle" class="axlbl">0 (low)</text>
</g>


<g data-anim="2">
  <rect x="16" y="40" width="640" height="150" rx="8" fill="none" stroke="var(--v-accent,var(--accent,#c15b39))" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="32" y="62" class="ttl" fill="var(--v-accent,var(--accent,#c15b39))">upsample BEFORE dedup (trap)</text>

  
  <text x="32" y="82" class="sub">document (6 tiles: 4 near-duplicate + 2 unique)</text>
  <g transform="translate(32,90)">
    <rect x="0"  y="0" width="30" height="30" rx="3" class="dup-tile"/>
    <rect x="0"  y="0" width="30" height="30" rx="3" fill="url(#dum-duphatch)"/>
    <text x="15" y="19" text-anchor="middle" class="tile-lbl" fill="var(--v-accent,var(--accent,#c15b39))">dup</text>
    <rect x="36" y="0" width="30" height="30" rx="3" class="dup-tile"/>
    <rect x="36" y="0" width="30" height="30" rx="3" fill="url(#dum-duphatch)"/>
    <text x="51" y="19" text-anchor="middle" class="tile-lbl" fill="var(--v-accent,var(--accent,#c15b39))">dup</text>
    <rect x="72" y="0" width="30" height="30" rx="3" class="dup-tile"/>
    <rect x="72" y="0" width="30" height="30" rx="3" fill="url(#dum-duphatch)"/>
    <text x="87" y="19" text-anchor="middle" class="tile-lbl" fill="var(--v-accent,var(--accent,#c15b39))">dup</text>
    <rect x="108" y="0" width="30" height="30" rx="3" class="dup-tile"/>
    <rect x="108" y="0" width="30" height="30" rx="3" fill="url(#dum-duphatch)"/>
    <text x="123" y="19" text-anchor="middle" class="tile-lbl" fill="var(--v-accent,var(--accent,#c15b39))">dup</text>
    <rect x="150" y="0" width="30" height="30" rx="3" class="uniq-tile"/>
    <text x="165" y="19" text-anchor="middle" class="tile-lbl">uniq</text>
    <rect x="186" y="0" width="30" height="30" rx="3" class="uniq-tile"/>
    <text x="201" y="19" text-anchor="middle" class="tile-lbl">uniq</text>
  </g>
  <text x="32" y="140" class="note">4 tiles are near-duplicates of ONE passage (same hatch = "dup")</text>

  
  <rect x="290" y="82" width="90" height="34" rx="6" class="op"/>
  <text x="335" y="103" text-anchor="middle" class="opbox">x3 upsample</text>
  <line x1="270" y1="99" x2="288" y2="99" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#dum-arr)"/>
  <line x1="382" y1="99" x2="404" y2="99" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#dum-arr)"/>

  
  <text x="412" y="94" class="math" fill="var(--v-accent,var(--accent,#c15b39))">4 x 3 = 12</text>
  <text x="412" y="112" class="sub">effective views of the duplicated passage</text>
  <text x="412" y="128" class="note">(4 internal duplicates x 3x upsample)</text>
</g>


<g data-anim="3">
  <line x1="656" y1="90" x2="674" y2="90" stroke="var(--v-accent,var(--accent,#c15b39))" stroke-width="1.5" stroke-dasharray="3 2"/>
  <circle cx="690" cy="90" r="7" class="marker-trap"/>
  <text x="690" y="93" text-anchor="middle" class="tile-lbl" fill="var(--surface,#fff)">12</text>
</g>


<g data-anim="4">
  <rect x="16" y="206" width="640" height="150" rx="8" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
  <text x="32" y="228" class="ttl" fill="var(--good,#2f9e6e)">dedup THEN upsample (correct)</text>

  <text x="32" y="248" class="sub">same starting document</text>
  <g transform="translate(32,256)">
    <rect x="0"  y="0" width="30" height="30" rx="3" class="dup-tile"/>
    <rect x="0"  y="0" width="30" height="30" rx="3" fill="url(#dum-duphatch)"/>
    <text x="15" y="19" text-anchor="middle" class="tile-lbl" fill="var(--v-accent,var(--accent,#c15b39))">dup</text>
    <rect x="36" y="0" width="30" height="30" rx="3" class="dup-tile"/>
    <rect x="36" y="0" width="30" height="30" rx="3" fill="url(#dum-duphatch)"/>
    <text x="51" y="19" text-anchor="middle" class="tile-lbl" fill="var(--v-accent,var(--accent,#c15b39))">dup</text>
    <rect x="72" y="0" width="30" height="30" rx="3" class="dup-tile"/>
    <rect x="72" y="0" width="30" height="30" rx="3" fill="url(#dum-duphatch)"/>
    <text x="87" y="19" text-anchor="middle" class="tile-lbl" fill="var(--v-accent,var(--accent,#c15b39))">dup</text>
    <rect x="108" y="0" width="30" height="30" rx="3" class="dup-tile"/>
    <rect x="108" y="0" width="30" height="30" rx="3" fill="url(#dum-duphatch)"/>
    <text x="123" y="19" text-anchor="middle" class="tile-lbl" fill="var(--v-accent,var(--accent,#c15b39))">dup</text>
    <rect x="150" y="0" width="30" height="30" rx="3" class="uniq-tile"/>
    <text x="165" y="19" text-anchor="middle" class="tile-lbl">uniq</text>
    <rect x="186" y="0" width="30" height="30" rx="3" class="uniq-tile"/>
    <text x="201" y="19" text-anchor="middle" class="tile-lbl">uniq</text>
  </g>

  
  <rect x="264" y="248" width="66" height="34" rx="6" class="op"/>
  <text x="297" y="269" text-anchor="middle" class="opbox">dedup</text>
  <line x1="250" y1="265" x2="262" y2="265" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#dum-arr)"/>
  <line x1="332" y1="265" x2="350" y2="265" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#dum-arr)"/>

  
  <rect x="358" y="248" width="30" height="30" rx="3" class="uniq-tile"/>
  <text x="373" y="267" text-anchor="middle" class="tile-lbl">1x</text>
  <text x="358" y="296" class="note">now one epoch =</text>
  <text x="358" y="308" class="note">one genuine pass</text>

  
  <rect x="424" y="248" width="86" height="34" rx="6" class="op"/>
  <text x="467" y="269" text-anchor="middle" class="opbox">x3 upsample</text>
  <line x1="392" y1="265" x2="422" y2="265" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#dum-arr)"/>
  <line x1="514" y1="265" x2="530" y2="265" stroke="var(--muted,#6d675d)" stroke-width="1.5" marker-end="url(#dum-arr)"/>

  <text x="538" y="260" class="math" fill="var(--good,#2f9e6e)">1 x 3 = 3</text>
  <text x="538" y="278" class="sub">effective views</text>
</g>


<g data-anim="5">
  <line x1="656" y1="255" x2="674" y2="255" stroke="var(--good,#2f9e6e)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <circle cx="690" cy="255" r="7" class="marker-ok"/>
  <text x="690" y="258" text-anchor="middle" class="tile-lbl" fill="var(--surface,#fff)">3</text>
</g>


<g data-anim="6">
  <line x1="16" y1="376" x2="656" y2="376" stroke="var(--border-2,#94a3b8)" stroke-width="1"/>
  <text x="336" y="400" text-anchor="middle" class="strap">Dedup makes the epoch count honest; upsampling then spends that honest budget.</text>
</g>

</svg>
<figcaption><b>Upsampling and deduplication act on the same axis — they multiply, not add.</b> Upsample before deduplicating and a hidden internal-duplication factor multiplies with the intended upsample factor (4 duplicates &amp;times; 3x = 12 effective views, into the memorization danger zone); deduplicate first and the same 3x upsample lands safely at 3 effective views. Always deduplicate within a domain before deciding its upsample factor.</figcaption>
</figure>
