<figcaption><b>Self-speculative decoding reuses the same model's early layers as a fast drafter.</b> The <em>full forward pass</em> (top lane) runs all 32 layers plus a final head to produce the accurate verifier distribution. The <em>early-exit draft</em> (bottom lane) exits after layer 15 through a lightweight <code>early_head</code>, skipping the remaining 16 layers. The <code>early_head</code> is trained by KD (dashed arrow) to match the final-layer distribution: <em>L<sub>EE</sub>&amp;nbsp;=&amp;nbsp;KL(p<sub>final</sub>&amp;thinsp;&#8741;&amp;thinsp;p<sub>early</sub>)</em>.</figcaption>
