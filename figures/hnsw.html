<figure class="viz" id="fig-hnsw">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 470" role="img" aria-label="HNSW search: a query descends from a sparse top layer through denser layers, greedily hopping along graph edges toward the nearest neighbor at layer 0.">
  <defs>
    <marker id="hn-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="hn-drop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
    </marker>
  </defs>
  <style>
    #fig-hnsw .lname{ font:700 12.5px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-hnsw .lsub{ font:500 10px var(--sans,sans-serif); fill: var(--muted); }
    #fig-hnsw .nid{ font:600 9.5px var(--mono,monospace); fill: var(--ink-soft); }
    #fig-hnsw .tag{ font:600 11px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-hnsw .note{ font:500 10px var(--sans,sans-serif); fill: var(--muted); }
    #fig-hnsw .qmark{ font:700 11px var(--sans,sans-serif); }
  </style>

  
  <g data-anim="1">
    <rect x="14" y="20" width="692" height="118" rx="9" class="v-fill v-grid" fill-opacity="0.45" stroke-width="1"/>
    <text x="30" y="40" class="lname">Layer 2</text>
    <text x="30" y="55" class="lsub">sparse · long hops</text>

    
    <g class="v-stroke" stroke="currentColor" stroke-width="1.4" opacity="0.55" fill="none">
      <line x1="118" y1="92" x2="372" y2="64"/>
      <line x1="372" y1="64" x2="612" y2="100"/>
    </g>
    
    <g>
      <circle cx="118" cy="92" r="11" class="v-fill v-accent-s" stroke-width="2"/>
      <circle cx="372" cy="64" r="11" class="v-fill v-stroke" stroke-width="1.6"/>
      <circle cx="612" cy="100" r="11" class="v-fill v-stroke" stroke-width="1.6"/>
    </g>
    
    <text x="118" y="95" text-anchor="middle" class="nid">E</text>
    <text x="372" y="67" text-anchor="middle" class="nid">a</text>
    <text x="612" y="103" text-anchor="middle" class="nid">b</text>
    <text x="118" y="123" text-anchor="middle" class="tag" fill="var(--accent)">entry point</text>

    
    <line x1="129" y1="90" x2="361" y2="66" class="viz-draw" style="--len:234" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#hn-arrow)"/>
  </g>

  
  <g data-anim="2">
    <line x1="372" y1="76" x2="372" y2="172" stroke="var(--warn,#e0a106)" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#hn-drop)"/>
    <text x="384" y="128" class="note" fill="var(--warn,#e0a106)">descend</text>
  </g>

  
  <g data-anim="2">
    <rect x="14" y="160" width="692" height="124" rx="9" class="v-fill v-grid" fill-opacity="0.45" stroke-width="1"/>
    <text x="30" y="180" class="lname">Layer 1</text>
    <text x="30" y="195" class="lsub">medium density</text>

    
    <g class="v-stroke" stroke="currentColor" stroke-width="1.3" opacity="0.5" fill="none">
      <line x1="118" y1="232" x2="252" y2="210"/>
      <line x1="252" y1="210" x2="372" y2="210"/>
      <line x1="372" y1="210" x2="500" y2="244"/>
      <line x1="500" y1="244" x2="612" y2="222"/>
      <line x1="252" y1="210" x2="372" y2="210"/>
      <line x1="372" y1="210" x2="252" y2="210"/>
    </g>
    
    <g>
      <circle cx="118" cy="232" r="10" class="v-fill v-stroke" stroke-width="1.6"/>
      <circle cx="252" cy="210" r="10" class="v-fill v-stroke" stroke-width="1.6"/>
      <circle cx="372" cy="210" r="10" class="v-fill v-stroke" stroke-width="1.6"/>
      <circle cx="500" cy="244" r="10" class="v-fill v-stroke" stroke-width="1.6"/>
      <circle cx="612" cy="222" r="10" class="v-fill v-stroke" stroke-width="1.6"/>
    </g>
    <text x="118" y="235" text-anchor="middle" class="nid">E</text>
    <text x="252" y="213" text-anchor="middle" class="nid">c</text>
    <text x="372" y="213" text-anchor="middle" class="nid">a</text>
    <text x="500" y="247" text-anchor="middle" class="nid">d</text>
    <text x="612" y="225" text-anchor="middle" class="nid">b</text>

    
    <line x1="382" y1="213" x2="490" y2="241" class="viz-draw" style="--len:112" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#hn-arrow)"/>
  </g>

  
  <g data-anim="3">
    <line x1="500" y1="254" x2="500" y2="320" stroke="var(--warn,#e0a106)" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#hn-drop)"/>
    <text x="512" y="292" class="note" fill="var(--warn,#e0a106)">descend</text>
  </g>

  
  <g data-anim="3">
    <rect x="14" y="308" width="692" height="142" rx="9" class="v-fill v-grid" fill-opacity="0.55" stroke-width="1"/>
    <text x="30" y="328" class="lname">Layer 0</text>
    <text x="30" y="343" class="lsub">dense · every node lives here</text>

    
    <g class="v-stroke" stroke="currentColor" stroke-width="1.1" opacity="0.42" fill="none">
      <line x1="110" y1="408" x2="178" y2="378"/>
      <line x1="178" y1="378" x2="252" y2="408"/>
      <line x1="252" y1="408" x2="318" y2="372"/>
      <line x1="318" y1="372" x2="392" y2="404"/>
      <line x1="392" y1="404" x2="446" y2="372"/>
      <line x1="446" y1="372" x2="500" y2="396"/>
      <line x1="500" y1="396" x2="560" y2="420"/>
      <line x1="500" y1="396" x2="446" y2="372"/>
      <line x1="392" y1="404" x2="500" y2="396"/>
      <line x1="318" y1="372" x2="252" y2="408"/>
      <line x1="178" y1="378" x2="110" y2="408"/>
      <line x1="560" y1="420" x2="624" y2="388"/>
      <line x1="446" y1="372" x2="560" y2="420"/>
    </g>

    
    <g>
      <circle cx="110" cy="408" r="8.5" class="v-fill v-stroke" stroke-width="1.5"/>
      <circle cx="178" cy="378" r="8.5" class="v-fill v-stroke" stroke-width="1.5"/>
      <circle cx="252" cy="408" r="8.5" class="v-fill v-stroke" stroke-width="1.5"/>
      <circle cx="318" cy="372" r="8.5" class="v-fill v-stroke" stroke-width="1.5"/>
      <circle cx="392" cy="404" r="8.5" class="v-fill v-stroke" stroke-width="1.5"/>
      <circle cx="446" cy="372" r="8.5" class="v-fill v-stroke" stroke-width="1.5"/>
      <circle cx="624" cy="388" r="8.5" class="v-fill v-stroke" stroke-width="1.5"/>
      
      <circle cx="500" cy="396" r="9" class="v-fill v-stroke" stroke-width="1.6"/>
      
      <circle cx="560" cy="420" r="10.5" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="2.4"/>
      <circle cx="560" cy="420" r="16" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.4" opacity="0.5" class="viz-pulse"/>
    </g>
    <text x="500" y="399" text-anchor="middle" class="nid">d</text>
    <text x="560" y="423" text-anchor="middle" class="nid" fill="var(--good,#2f9e6e)">nn</text>

    
    <line x1="509" y1="399" x2="550" y2="416" class="viz-draw" style="--len:45" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#hn-arrow)"/>

    <text x="560" y="446" text-anchor="middle" class="tag" fill="var(--good,#2f9e6e)">nearest neighbor</text>
  </g>

  
  <g data-anim="4">
    <line x1="592" y1="392" x2="566" y2="412" stroke="var(--accent-2,#3b82f6)" stroke-width="1.3" stroke-dasharray="3 3" opacity="0.7"/>
    <g transform="translate(600,378)">
      <path d="M0 -9 L9 0 L0 9 L-9 0 Z" fill="var(--accent-2,#3b82f6)" fill-opacity="0.85"/>
      <text x="0" y="3.5" text-anchor="middle" class="qmark" fill="var(--surface,#fff)">q</text>
    </g>
    <text x="600" y="362" text-anchor="middle" class="tag" fill="var(--accent-2,#3b82f6)">query</text>
  </g>

  
  <g data-anim="5">
    <line x1="232" y1="333" x2="262" y2="333" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#hn-arrow)"/>
    <text x="270" y="337" class="note">greedy hop: move to the neighbor closest to q</text>
  </g>
</svg>
<figcaption><b>HNSW search zooms in coarse-to-fine through a layered small-world graph.</b> The query enters at the single top-layer <b>entry point</b> and at each layer greedily hops to whichever neighbor is closer to <b>q</b>, then drops down a layer; the sparse top makes big jumps while the dense layer 0 refines to the true <b>nearest neighbor</b>. Hop count grows only logarithmically with the number of vectors.</figcaption>
</figure>
