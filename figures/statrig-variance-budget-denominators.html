<figure class="viz" id="fig-statrig-variance-budget-denominators">
<button class="viz-replay" type="button">replay</button>
<svg viewBox="0 0 800 556" role="img" aria-label="Two stacked bar charts of the reported mean's variance budget, each split into item, seed, judge, prompt and residual blocks. In the left scenario there is a single prompt template so the prompt block is divided by n_t = 1 and stays large, dominating the total and invisible to an item-only confidence interval. In the right scenario n_t = 3 prompts shrinks that same block to about a third, while the item, seed, judge and residual blocks -- which depend on n_i, n_s and n_j, not n_t -- stay exactly the same size in both bars.">
  <style>
    #fig-statrig-variance-budget-denominators text{ fill:var(--ink-soft); }
    #fig-statrig-variance-budget-denominators .hdr{ font:700 14px var(--sans,sans-serif); }
    #fig-statrig-variance-budget-denominators .formula{ font:500 10.5px var(--mono,monospace); fill:var(--muted); }
    #fig-statrig-variance-budget-denominators .note{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-variance-budget-denominators .connlbl{ font:700 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-variance-budget-denominators .title{ font:700 12.5px var(--sans,sans-serif); }
    #fig-statrig-variance-budget-denominators .subn{ font:500 9.5px var(--mono,monospace); fill:var(--muted); }
    #fig-statrig-variance-budget-denominators .rowmain{ font:700 11px var(--sans,sans-serif); }
    #fig-statrig-variance-budget-denominators .rowsub{ font:500 9px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-variance-budget-denominators .callout{ font:600 10px var(--sans,sans-serif); fill:var(--accent); }
    #fig-statrig-variance-budget-denominators .calloutsub{ font:500 9px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-variance-budget-denominators .pblock{ font:700 11px var(--sans,sans-serif); fill:var(--accent); }
    #fig-statrig-variance-budget-denominators .pblocksm{ font:600 9px var(--sans,sans-serif); fill:var(--accent); }
    #fig-statrig-variance-budget-denominators .strip{ font:700 12px var(--sans,sans-serif); }
    #fig-statrig-variance-budget-denominators .leader{ stroke:var(--v-grid); stroke-width:1; fill:none; }
    #fig-statrig-variance-budget-denominators .leader-emph{ stroke:var(--ink-soft); stroke-width:1.6; fill:none; }
  </style>

  <defs>
    <marker id="svbd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ink-soft)"/>
    </marker>
    <marker id="svbd-arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--muted)"/>
    </marker>
  </defs>

  <g data-anim="1">
    <text x="14" y="26" class="hdr">Variance budget of the reported mean: five sources, five denominators</text>
    <text x="14" y="43" class="formula">Var(y-bar) ~ item/n_i + prompt/n_t + seed/(n_i x n_s) + judge/n_j + residual/(n_i x n_s x n_j)</text>
    <text x="14" y="59" class="note">bar height = relative contribution (schematic, not fitted values); n_i, n_t, n_s, n_j are illustrative sample counts</text>
  </g>

  <g data-anim="2">
    <text x="400" y="70" text-anchor="middle" class="connlbl">n_t: 1 -&gt; 3   (n_i = 500, n_s = 3, n_j = 3 held fixed)</text>
    <line x1="298" y1="78" x2="502" y2="78" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#svbd-arrow2)"/>

    <text x="207" y="102" text-anchor="middle" class="title">LEFT: single prompt (n_t = 1)</text>
    <text x="207" y="117" text-anchor="middle" class="subn">n_i=500, n_s=3, n_j=3</text>

    <text x="597" y="102" text-anchor="middle" class="title">RIGHT: n_t = 3 prompts</text>
    <text x="597" y="117" text-anchor="middle" class="subn">n_i=500, n_s=3, n_j=3</text>
  </g>

  
  <line x1="150" y1="470" x2="654" y2="470" stroke="var(--v-grid)" stroke-width="1.4"/>

  
  <g data-anim="3">
    
    <rect x="170" y="456" width="74" height="14" class="v-fill v-grid" stroke-width="1"/>
    <rect x="170" y="410" width="74" height="46" class="v-fill v-grid" stroke-width="1"/>
    <rect x="170" y="384" width="74" height="26" class="v-fill v-grid" stroke-width="1"/>
    <rect x="170" y="364" width="74" height="20" class="v-fill v-grid" stroke-width="1"/>
    <rect x="170" y="246" width="74" height="118" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="2"/>
    <text x="207" y="290" text-anchor="middle" class="pblock">PROMPT</text>
    <text x="207" y="306" text-anchor="middle" class="pblocksm">/ n_t</text>
    <text x="207" y="326" text-anchor="middle" class="pblocksm">n_t = 1</text>

    
    <text x="156" y="253" text-anchor="end" class="callout">invisible to</text>
    <text x="156" y="266" text-anchor="end" class="callout">an item-only CI</text>
    <text x="156" y="281" text-anchor="end" class="calloutsub">n_t = 1 -&gt; /1,</text>
    <text x="156" y="293" text-anchor="end" class="calloutsub">never shrinks</text>
    <path class="leader" d="M160,287 L170,305"/>
    <circle cx="170" cy="305" r="2.4" fill="var(--accent)"/>
  </g>

  
  <g data-anim="4">
    <rect x="560" y="456" width="74" height="14" class="v-fill v-grid" stroke-width="1"/>
    <rect x="560" y="410" width="74" height="46" class="v-fill v-grid" stroke-width="1"/>
    <rect x="560" y="384" width="74" height="26" class="v-fill v-grid" stroke-width="1"/>
    <rect x="560" y="364" width="74" height="20" class="v-fill v-grid" stroke-width="1"/>
    <rect x="560" y="324" width="74" height="40" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="2"/>
    <text x="597" y="348" text-anchor="middle" class="pblocksm">PROMPT / n_t</text>

    
    <path class="leader" d="M634,344 L650,344"/>
    <circle cx="634" cy="344" r="2.4" fill="var(--accent)"/>
    <text x="654" y="338" class="callout">prompt block / n_t</text>
    <text x="654" y="352" class="calloutsub">n_t = 3 -&gt; shrinks</text>
    <text x="654" y="365" class="calloutsub">to about a third</text>

    
    
    <line x1="320" y1="266" x2="244" y2="374" class="leader-emph" marker-end="url(#svbd-arrow)"/>
    <line x1="484" y1="266" x2="560" y2="374" class="leader-emph" marker-end="url(#svbd-arrow)"/>
    <text x="402" y="268" text-anchor="middle" class="rowmain">item / n_i</text>
    <text x="402" y="281" text-anchor="middle" class="rowsub">n_i = 500 (large) -&gt; shrinks only THIS block</text>

    
    <line x1="320" y1="318" x2="244" y2="397" class="leader"/>
    <line x1="484" y1="318" x2="560" y2="397" class="leader"/>
    <circle cx="244" cy="397" r="2" fill="var(--muted)"/>
    <circle cx="560" cy="397" r="2" fill="var(--muted)"/>
    <text x="402" y="322" text-anchor="middle" class="rowmain">seed / (n_i x n_s)</text>

    
    <line x1="320" y1="356" x2="244" y2="433" class="leader"/>
    <line x1="484" y1="356" x2="560" y2="433" class="leader"/>
    <circle cx="244" cy="433" r="2" fill="var(--muted)"/>
    <circle cx="560" cy="433" r="2" fill="var(--muted)"/>
    <text x="402" y="360" text-anchor="middle" class="rowmain">judge / n_j</text>

    
    <line x1="320" y1="394" x2="244" y2="463" class="leader"/>
    <line x1="484" y1="394" x2="560" y2="463" class="leader"/>
    <circle cx="244" cy="463" r="2" fill="var(--muted)"/>
    <circle cx="560" cy="463" r="2" fill="var(--muted)"/>
    <text x="402" y="398" text-anchor="middle" class="rowmain">residual / (n_i x n_s x n_j)</text>
  </g>

  <g data-anim="5">
    <rect x="14" y="508" width="772" height="34" rx="8" class="v-fill v-grid" stroke-width="1"/>
    <text x="400" y="530" text-anchor="middle" class="strip">You cannot fix prompt variance by buying more items -- vary the prompt.</text>
  </g>
</svg>
<figcaption><b>Each variance source shrinks with its own sample count, not with the others.</b> With a single prompt template (left), the prompt term is divided by n_t = 1 and stays large no matter how many items you add -- it is invisible to an item-bootstrap confidence interval. Move to three prompt templates (right) and that same term shrinks to about a third, while the item, seed, judge, and residual blocks -- which depend on n_i, n_s, and n_j -- are untouched.</figcaption>
</figure>
