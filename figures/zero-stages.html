<figure class="viz" id="fig-zero-stages">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 372" role="img" aria-label="DeepSpeed ZeRO across four GPUs: stage 1 shards optimizer states, stage 2 adds gradients, stage 3 adds parameters, each row shrinking the per-GPU memory footprint.">
  <style>
    #fig-zero-stages text{ fill:var(--ink-soft); }
    #fig-zero-stages .stage{ font:700 13px var(--sans,sans-serif); }
    #fig-zero-stages .sub{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-zero-stages .gpu{ font:600 10px var(--mono,monospace); fill:var(--muted); }
    #fig-zero-stages .seg{ font:700 11px var(--mono,monospace); }
    #fig-zero-stages .cap{ font:600 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-zero-stages .lgd{ font:500 10.5px var(--sans,sans-serif); }
  </style>

  
  <g data-anim="1">
    <rect x="14" y="12" width="14" height="14" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.85"/>
    <text x="34" y="23" class="lgd">Parameters  <tspan class="sub">2P</tspan></text>
    <rect x="190" y="12" width="14" height="14" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
    <text x="210" y="23" class="lgd">Gradients  <tspan class="sub">2P</tspan></text>
    <rect x="350" y="12" width="14" height="14" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
    <text x="370" y="23" class="lgd">Optimizer states  <tspan class="sub">12P  (fp32 master + Adam m,v)</tspan></text>
  </g>

  
  <text x="480" y="46" text-anchor="middle" class="cap">4 GPUs in one data-parallel group</text>
  <g class="gpu" text-anchor="middle">
    <text x="334" y="60">GPU 0</text><text x="430" y="60">GPU 1</text>
    <text x="526" y="60">GPU 2</text><text x="622" y="60">GPU 3</text>
  </g>

  
  <g data-anim="2">
    <text x="14" y="84" class="stage" fill="var(--accent)">ZeRO-1</text>
    <text x="14" y="100" class="sub">optimizer states sharded</text>
    <text x="14" y="120" class="sub">~4× saving (Adam)</text>

    
    <rect x="288" y="72" width="384" height="13" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.85"/>
    
    <rect x="288" y="86" width="384" height="13" rx="2" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
    
    <g class="seg" text-anchor="middle">
      <rect x="288" y="100" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="384" y="100" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="480" y="100" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="576" y="100" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <g fill="var(--surface,#fff)">
        <text x="334" y="117">O₀</text><text x="430" y="117">O₁</text>
        <text x="526" y="117">O₂</text><text x="622" y="117">O₃</text>
      </g>
    </g>
    
    <g class="v-grid" stroke-width="1" opacity="0.55">
      <line x1="384" y1="72" x2="384" y2="126"/><line x1="480" y1="72" x2="480" y2="126"/><line x1="576" y1="72" x2="576" y2="126"/>
    </g>
    <rect x="288" y="72" width="384" height="54" rx="3" fill="none" class="v-stroke" stroke-width="1.2"/>
  </g>

  
  <g data-anim="3">
    <text x="14" y="166" class="stage" fill="var(--accent)">ZeRO-2</text>
    <text x="14" y="182" class="sub">+ gradients sharded</text>
    <text x="14" y="202" class="sub">~8× saving</text>

    
    <rect x="288" y="154" width="384" height="13" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.85"/>
    
    <g class="seg" text-anchor="middle">
      <rect x="288" y="168" width="92" height="16" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
      <rect x="384" y="168" width="92" height="16" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
      <rect x="480" y="168" width="92" height="16" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
      <rect x="576" y="168" width="92" height="16" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
    </g>
    
    <g class="seg" text-anchor="middle">
      <rect x="288" y="185" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="384" y="185" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="480" y="185" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="576" y="185" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <g fill="var(--surface,#fff)">
        <text x="334" y="202">O₀</text><text x="430" y="202">O₁</text>
        <text x="526" y="202">O₂</text><text x="622" y="202">O₃</text>
      </g>
    </g>
    <g class="v-grid" stroke-width="1" opacity="0.55">
      <line x1="384" y1="154" x2="384" y2="211"/><line x1="480" y1="154" x2="480" y2="211"/><line x1="576" y1="154" x2="576" y2="211"/>
    </g>
    <rect x="288" y="154" width="384" height="57" rx="3" fill="none" class="v-stroke" stroke-width="1.2"/>
  </g>

  
  <g data-anim="4">
    <text x="14" y="252" class="stage" fill="var(--accent)">ZeRO-3</text>
    <text x="14" y="268" class="sub">+ parameters sharded</text>
    <text x="14" y="288" class="sub">~DP× saving (here 4×)</text>
    <text x="14" y="302" class="sub">+ all-gather per pass</text>

    
    <g class="seg" text-anchor="middle">
      <rect x="288" y="240" width="92" height="13" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.85"/>
      <rect x="384" y="240" width="92" height="13" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.85"/>
      <rect x="480" y="240" width="92" height="13" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.85"/>
      <rect x="576" y="240" width="92" height="13" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.85"/>
    </g>
    
    <g class="seg" text-anchor="middle">
      <rect x="288" y="254" width="92" height="13" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
      <rect x="384" y="254" width="92" height="13" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
      <rect x="480" y="254" width="92" height="13" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
      <rect x="576" y="254" width="92" height="13" rx="3" fill="var(--warn,#e0a106)" fill-opacity="0.9"/>
    </g>
    
    <g class="seg" text-anchor="middle">
      <rect x="288" y="268" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="384" y="268" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="480" y="268" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <rect x="576" y="268" width="92" height="26" rx="3" fill="var(--accent)" fill-opacity="0.85"/>
      <g fill="var(--surface,#fff)">
        <text x="334" y="285">O₀</text><text x="430" y="285">O₁</text>
        <text x="526" y="285">O₂</text><text x="622" y="285">O₃</text>
      </g>
    </g>
    <g class="v-grid" stroke-width="1" opacity="0.55">
      <line x1="384" y1="240" x2="384" y2="294"/><line x1="480" y1="240" x2="480" y2="294"/><line x1="576" y1="240" x2="576" y2="294"/>
    </g>
    <rect x="288" y="240" width="384" height="54" rx="3" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.4"/>
  </g>

  
  <g data-anim="5">
    <line x1="690" y1="78" x2="690" y2="290" class="v-accent-s viz-draw" style="--len:212" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="4 3"/>
    <path d="M686 282 l4 8 l4 -8" fill="none" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="704" y="150" class="cap" transform="rotate(90 704 150)" text-anchor="middle">per-GPU memory shrinks</text>
  </g>

  
  <g data-anim="2">
    <text x="14" y="330" class="sub" fill="var(--ink-soft)">Vanilla DDP: every GPU holds a full copy of all 16P bytes — the redundancy ZeRO removes.</text>
  </g>
</svg>
<figcaption><b>ZeRO shards model state across the data-parallel group instead of replicating it.</b> Stage 1 splits the heavy <b>optimizer states</b> (fp32 master weights + Adam moments) across the 4 GPUs; stage 2 also shards the <b>gradients</b>; stage 3 shards the <b>parameters</b> themselves, so each GPU owns just 1/DP of every band. The trade-off climbs with the stage: ZeRO-3's extra savings cost an all-gather of parameters on each forward and backward pass.</figcaption>
</figure>
