<figcaption><b>ZeRO shards model state across the data-parallel group instead of replicating it, and the sharding is progressive: each colored quantity is either a full copy on every GPU (a solid bar, unchanged row to row) or split so each GPU stores only its own 1/DP slice (one filled sliver plus three hollow slivers marking shards held elsewhere).</b> Stage 1 shards only the heavy optimizer states; stage 2 additionally shards gradients; stage 3 additionally shards parameters — so the colored area on any single GPU visibly shrinks top to bottom, while the trade-off (an all-gather of parameters on every forward and backward pass) only appears at stage 3.</figcaption>
