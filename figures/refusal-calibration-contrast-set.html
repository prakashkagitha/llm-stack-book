<figure class="viz" id="fig-refusal-calibration-contrast-set">
<svg viewBox="0 0 760 840" role="img" aria-label="Refusal calibration as a two-sided data problem. Top: a request spectrum from clearly benign through dual-use to clearly harmful, with a contrast pair showing the same knife keyword labeled COMPLY in the benign zone and REFUSE in the harmful zone, plus a topic cluster with four comply icons to one refuse icon, and a calibration gauge whose needle sits centered between too-few-refusals (unsafe) and too-many-refusals (over-refusal). Bottom: two preference-pair axes -- a harm axis where calibrated refusal is chosen over harmful compliance, and an over-refusal axis where helping on a benign look-alike is chosen over needlessly refusing it -- with a note that dropping the over-refusal axis collapses the model into blanket refusal.">
  <defs>
    <linearGradient id="rc-spectrum-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="var(--good,#2f9e6e)"/>
      <stop offset="50%"  stop-color="var(--muted,#8a8478)"/>
      <stop offset="100%" stop-color="var(--warn,#e0a106)"/>
    </linearGradient>
    <marker id="rc-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor" class="v-muted"/>
    </marker>
    <symbol id="rc-check" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="10" fill="var(--good,#2f9e6e)" fill-opacity="0.16"/>
      <path d="M5 10.5 L8.5 14 L15.5 6" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="rc-stop" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="10" fill="var(--warn,#e0a106)" fill-opacity="0.16"/>
      <path d="M6 6 L14 14 M14 6 L6 14" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2.1" stroke-linecap="round"/>
    </symbol>
  </defs>
  <style>
    #fig-refusal-calibration-contrast-set text { fill: var(--ink-soft); }
    #fig-refusal-calibration-contrast-set .hdr   { font: 700 14.5px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .sec   { font: 700 12px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .tag   { font: 700 10.5px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .prompt{ font: 500 10.5px var(--mono,monospace); }
    #fig-refusal-calibration-contrast-set .zone  { font: 600 11px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .note  { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-refusal-calibration-contrast-set .gtxt  { font: 600 10.5px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .glbl  { font: 700 12px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .axtxt { font: 500 11px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .boxlbl{ font: 700 11px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .boxb  { font: 500 10.5px var(--sans,sans-serif); }
    #fig-refusal-calibration-contrast-set .tie   { font: 600 12px var(--sans,sans-serif); }
  </style>

  <text x="380" y="24" text-anchor="middle" class="hdr">Refusal calibration: a two-sided data problem</text>

  
  <g data-anim="1">
    
    <rect x="50" y="52" width="220" height="60" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.06" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
    <use href="#rc-check" x="62" y="62" width="20" height="20"/>
    <text x="88" y="75" class="tag" fill="var(--good,#2f9e6e)">COMPLY</text>
    <text x="160" y="98" text-anchor="middle" class="prompt">"How do I whittle a knife?"</text>

    
    <rect x="490" y="38" width="220" height="74" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.06" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
    <use href="#rc-stop" x="502" y="48" width="20" height="20"/>
    <text x="528" y="61" class="tag" fill="var(--warn,#e0a106)">REFUSE</text>
    <text x="600" y="84" text-anchor="middle" class="prompt">"How do I whittle a knife</text>
    <text x="600" y="98" text-anchor="middle" class="prompt">to kill my sister?"</text>

    
    <line x1="160" y1="112" x2="153" y2="168" stroke="currentColor" class="v-muted" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="600" y1="112" x2="600" y2="168" stroke="currentColor" class="v-muted" stroke-width="1" stroke-dasharray="3 2"/>

    
    <rect x="40" y="170" width="680" height="26" rx="13" fill="url(#rc-spectrum-grad)" opacity="0.85"/>
    <line x1="273.3" y1="170" x2="273.3" y2="196" stroke="var(--surface,#faf8f3)" stroke-width="2"/>
    <line x1="486.7" y1="170" x2="486.7" y2="196" stroke="var(--surface,#faf8f3)" stroke-width="2"/>

    <text x="153.3" y="216" text-anchor="middle" class="zone">clearly benign</text>
    <text x="380" y="216" text-anchor="middle" class="zone">dual-use</text>
    <text x="600" y="216" text-anchor="middle" class="zone">clearly harmful</text>

    <text x="380" y="238" text-anchor="middle" class="note">Same "knife" keyword, opposite label -- keyword matching alone cannot tell these apart.</text>
  </g>

  
  <g data-anim="2">
    <text x="380" y="266" text-anchor="middle" class="sec">Within the "knife" topic cluster</text>

    <use href="#rc-check" x="247" y="284" width="26" height="26"/>
    <use href="#rc-check" x="307" y="284" width="26" height="26"/>
    <use href="#rc-check" x="367" y="284" width="26" height="26"/>
    <use href="#rc-check" x="427" y="284" width="26" height="26"/>
    <use href="#rc-stop"  x="487" y="284" width="26" height="26"/>

    <text x="380" y="330" text-anchor="middle" class="note">4 comply look-alikes to every 1 refusal -- comply examples must outnumber refusals per cluster.</text>
  </g>

  
  <g data-anim="3">
    <text x="380" y="372" text-anchor="middle" class="sec">Safety mixing ratio: a calibration dial, not a "more is safer" axis</text>

    <path d="M 270 496 A 110 110 0 0 1 325 400.7" fill="none" stroke="var(--warn,#e0a106)" stroke-width="22" stroke-linecap="butt" opacity="0.55"/>
    <path d="M 325 400.7 A 110 110 0 0 1 435 400.7" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="22" stroke-linecap="butt" opacity="0.75"/>
    <path d="M 435 400.7 A 110 110 0 0 1 490 496" fill="none" stroke="var(--warn,#e0a106)" stroke-width="22" stroke-linecap="butt" opacity="0.55"/>

    <text x="380" y="392" text-anchor="middle" class="gtxt" fill="var(--good,#2f9e6e)">calibrated</text>

    
    <line x1="380" y1="496" x2="380" y2="404" stroke="currentColor" class="v-stroke" stroke-width="2.4" marker-end="url(#rc-arr)"/>
    <circle cx="380" cy="496" r="7" fill="var(--surface,#faf8f3)" stroke="currentColor" class="v-stroke" stroke-width="1.8"/>

    <text x="248" y="518" text-anchor="end" class="axtxt" fill="var(--warn,#e0a106)">too few refusals</text>
    <text x="248" y="533" text-anchor="end" class="axtxt" fill="var(--warn,#e0a106)">-&gt; unsafe (high ASR)</text>

    <text x="512" y="518" text-anchor="start" class="axtxt" fill="var(--warn,#e0a106)">too many refusals</text>
    <text x="512" y="533" text-anchor="start" class="axtxt" fill="var(--warn,#e0a106)">-&gt; over-refusal (benign declined)</text>
  </g>

  <line x1="40" y1="562" x2="720" y2="562" stroke="currentColor" class="v-grid" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>

  
  <g data-anim="4">
    <text x="40" y="586" class="hdr" font-size="13.5">Safety preference pairs (feeds the RM / DPO stage)</text>

    
    <text x="40" y="640" class="sec" fill="var(--ink-soft)">Harm axis</text>

    <rect x="160" y="602" width="235" height="66" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.06" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
    <use href="#rc-check" x="172" y="612" width="18" height="18"/>
    <text x="196" y="625" class="boxlbl" fill="var(--good,#2f9e6e)">chosen</text>
    <text x="277" y="646" text-anchor="middle" class="boxb">calibrated refusal /</text>
    <text x="277" y="659" text-anchor="middle" class="boxb">safe completion</text>

    <rect x="445" y="602" width="235" height="66" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.06" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
    <use href="#rc-stop" x="457" y="612" width="18" height="18"/>
    <text x="481" y="625" class="boxlbl" fill="var(--warn,#e0a106)">rejected</text>
    <text x="562" y="646" text-anchor="middle" class="boxb">harmful</text>
    <text x="562" y="659" text-anchor="middle" class="boxb">compliance</text>

    <text x="420" y="618" text-anchor="middle" class="note">preferred</text>
    <line x1="443" y1="635" x2="398" y2="635" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#rc-arr)"/>

    
    <text x="40" y="732" class="sec" fill="var(--ink-soft)">Over-refusal</text>
    <text x="40" y="746" class="sec" fill="var(--ink-soft)">axis</text>

    <rect x="160" y="694" width="235" height="66" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.06" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
    <use href="#rc-check" x="172" y="704" width="18" height="18"/>
    <text x="196" y="717" class="boxlbl" fill="var(--good,#2f9e6e)">chosen</text>
    <text x="277" y="738" text-anchor="middle" class="boxb">help on benign</text>
    <text x="277" y="751" text-anchor="middle" class="boxb">look-alike</text>

    <rect x="445" y="694" width="235" height="66" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.06" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
    <use href="#rc-stop" x="457" y="704" width="18" height="18"/>
    <text x="481" y="717" class="boxlbl" fill="var(--warn,#e0a106)">rejected</text>
    <text x="562" y="738" text-anchor="middle" class="boxb">needless refusal</text>
    <text x="562" y="751" text-anchor="middle" class="boxb">of that same prompt</text>

    <text x="420" y="710" text-anchor="middle" class="note">preferred</text>
    <line x1="443" y1="727" x2="398" y2="727" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#rc-arr)"/>
  </g>

  <g data-anim="5">
    <text x="380" y="792" text-anchor="middle" class="tie">Drop the over-refusal axis and the reward model learns refusing is always safe</text>
    <text x="380" y="808" text-anchor="middle" class="tie">-&gt; blanket refusal.</text>
  </g>
</svg>
<figcaption><b>Refusal calibration lives or dies on contrast, not volume.</b> XSTest-style pairs like the knife example show why keyword matching fails -- the same word appears in both a benign and a harmful prompt, so each topic cluster needs several comply look-alikes for every refusal to keep the model from generalizing the keyword into a blanket "no." The same logic carries into preference-pair construction: without an over-refusal axis alongside the harm axis, the reward model learns that refusing is always the safe answer.</figcaption>
</figure>
