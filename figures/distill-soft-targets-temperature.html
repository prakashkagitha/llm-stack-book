<figure class="viz" id="fig-distill-soft-targets-temperature">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 400" role="img" aria-label="Filmstrip of four bar charts over the same five tokens showing how a hard one-hot label reveals no information, a teacher at temperature 1 hides dark knowledge in tiny near-zero bars, a teacher at temperature about 4 exposes usable inter-token structure, and a teacher at temperature 20 flattens the distribution into noise.">

<defs>
  <marker id="stt-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#9ca3af)"/>
  </marker>
</defs>

<style>

  #fig-distill-soft-targets-temperature .title { font: 700 15px var(--sans,sans-serif); }

  #fig-distill-soft-targets-temperature .bar-correct { fill: var(--accent,#6366f1); }
  #fig-distill-soft-targets-temperature .bar-other   { fill: var(--muted,#9ca3af); opacity: 0.65; }
  #fig-distill-soft-targets-temperature .baseline { stroke: var(--border-2,#d1d5db); stroke-width: 1.2; }

  #fig-distill-soft-targets-temperature [data-anim] { opacity: 0; animation: stt-in 0.55s ease forwards; }

  #fig-distill-soft-targets-temperature [data-anim="4"] { animation-delay: 1.25s; }

  @media (prefers-reduced-motion: reduce) {
    #fig-distill-soft-targets-temperature [data-anim] { animation: none; opacity: 1; }
  }
</style>

<text x="400" y="22" text-anchor="middle" class="title">Soft Targets vs. Hard Labels: How Temperature Reveals Dark Knowledge</text>

<rect x="228" y="29" width="10" height="10" rx="2" class="bar-correct"/>
<text x="243" y="38" class="legend-t">correct token (Paris)</text>
<rect x="428" y="29" width="10" height="10" rx="2" class="bar-other"/>
<text x="443" y="38" class="legend-t">other candidate tokens</text>

  <text x="105" y="68" text-anchor="middle" class="panel-t">Hard label (one-hot)</text>

  <rect x="69"  y="228" width="20" height="2"   rx="1" class="bar-other"/>
  <rect x="95"  y="228" width="20" height="2"   rx="1" class="bar-other"/>
  <rect x="121" y="228" width="20" height="2"   rx="1" class="bar-other"/>
  <rect x="147" y="228" width="20" height="2"   rx="1" class="bar-other"/>
  <text x="53"  y="244" text-anchor="middle" class="tok-l">Par</text>
  <text x="79"  y="244" text-anchor="middle" class="tok-l">Lon</text>
  <text x="105" y="244" text-anchor="middle" class="tok-l">Ber</text>

  <line x1="233" y1="230" x2="357" y2="230" class="baseline"/>
  <rect x="233" y="118" width="20" height="112" rx="2" class="bar-correct"/>
  <rect x="259" y="216" width="20" height="14"  rx="2" class="bar-other"/>
  <rect x="285" y="222" width="20" height="8"   rx="2" class="bar-other"/>
  <rect x="311" y="226" width="20" height="4"   rx="1" class="bar-other"/>
  <rect x="337" y="228" width="20" height="2"   rx="1" class="bar-other"/>
  <text x="243" y="244" text-anchor="middle" class="tok-l">Par</text>
  <text x="269" y="244" text-anchor="middle" class="tok-l">Lon</text>
  <text x="295" y="244" text-anchor="middle" class="tok-l">Ber</text>
  <text x="321" y="244" text-anchor="middle" class="tok-l">Rom</text>
  <text x="347" y="244" text-anchor="middle" class="tok-l">Cat</text>
  <text x="295" y="264" text-anchor="middle" class="cap">dark knowledge hidden</text>
</g>


<g data-anim="3">
  <rect x="400" y="48" width="170" height="252" rx="8" class="panel-bg"/>
  <text x="485" y="68" text-anchor="middle" class="panel-t">Teacher, tau ~ 4</text>
  <line x1="423" y1="230" x2="547" y2="230" class="baseline"/>
  <rect x="423" y="174" width="20" height="56" rx="2" class="bar-correct"/>
  <rect x="449" y="188" width="20" height="42" rx="2" class="bar-other"/>
  <rect x="475" y="202" width="20" height="28" rx="2" class="bar-other"/>
  <rect x="501" y="220" width="20" height="10" rx="2" class="bar-other"/>
  <rect x="527" y="226" width="20" height="4"  rx="1" class="bar-other"/>
  <text x="433" y="244" text-anchor="middle" class="tok-l">Par</text>
  <text x="459" y="244" text-anchor="middle" class="tok-l">Lon</text>
  <text x="485" y="244" text-anchor="middle" class="tok-l">Ber</text>
  <text x="511" y="244" text-anchor="middle" class="tok-l">Rom</text>
  <text x="537" y="244" text-anchor="middle" class="tok-l">Cat</text>
  <text x="485" y="264" text-anchor="middle" class="cap">inter-token structure exposed</text>
  <text x="485" y="280" text-anchor="middle" class="callout">Paris ~ London &gt; Rome</text>
</g>


<g data-anim="4">
  <rect x="590" y="48" width="170" height="252" rx="8" class="panel-bg"/>
  <text x="675" y="68" text-anchor="middle" class="panel-t">Teacher, tau = 20</text>
  <line x1="613" y1="230" x2="737" y2="230" class="baseline"/>
  <rect x="613" y="202" width="20" height="28" rx="2" class="bar-correct"/>
  <rect x="639" y="200" width="20" height="30" rx="2" class="bar-other"/>
  <rect x="665" y="203" width="20" height="27" rx="2" class="bar-other"/>
  <rect x="691" y="201" width="20" height="29" rx="2" class="bar-other"/>

  <text x="623" y="244" text-anchor="middle" class="tok-l">Par</text>
  <text x="649" y="244" text-anchor="middle" class="tok-l">Lon</text>
  <text x="675" y="244" text-anchor="middle" class="tok-l">Ber</text>
  <text x="701" y="244" text-anchor="middle" class="tok-l">Rom</text>
  <text x="727" y="244" text-anchor="middle" class="tok-l">Cat</text>
  <text x="675" y="264" text-anchor="middle" class="cap">ordering lost -&gt; noise</text>

<g data-anim="5">
  <text x="485" y="318" text-anchor="middle" class="axis-l">temperature (tau) increases -&gt;</text>
  <line x1="210" y1="328" x2="758" y2="328" stroke="var(--muted,#9ca3af)" stroke-width="1.4" marker-end="url(#stt-arr)"/>
  <line x1="210" y1="322" x2="210" y2="334" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <line x1="400" y1="322" x2="400" y2="334" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <line x1="590" y1="322" x2="590" y2="334" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>

  <line x1="210" y1="350" x2="570" y2="350" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <line x1="210" y1="345" x2="210" y2="356" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <line x1="570" y1="345" x2="570" y2="356" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="390" y="370" text-anchor="middle" class="bracket-good">usable range: tau 2-5</text>

  <line x1="590" y1="350" x2="758" y2="350" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <line x1="590" y1="345" x2="590" y2="356" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <line x1="758" y1="345" x2="758" y2="356" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <text x="674" y="370" text-anchor="middle" class="bracket-warn">too high</text>
</g>

</svg>
<figcaption><b>Soft targets carry information that hard labels throw away, and temperature controls how much of it the student can actually see.</b> A one-hot label says only "Paris"; a teacher's raw distribution at tau=1 technically contains alternatives like "London" and "Berlin" but they are squeezed to near-zero; raising tau to around 4 spreads the distribution enough that the student can learn "Paris and London are more alike than Paris and Rome" -- the "dark knowledge" the KD loss is built to transfer. Push tau too high (20) and the distribution washes out toward uniform, destroying the very ordering that made it useful.</figcaption>
</figure>
