<figcaption><b>A harness's job is to pin every scoring knob to one fixed setting.</b> Without a harness (top), the same dataset and model pass through loose, ambiguously-set knobs -- prompt template, num_fewshot, scoring mode, answer-extraction regex, chat template -- and two reasonable settings yield two different, incomparable scores. With a harness (bottom), those same knobs are locked to one documented setting, so two different models run through the identical configuration land on a shared, comparable scale.</figcaption>
</figure>
