<figure class="viz" id="fig-memeff-oom-decision-tree">
<svg viewBox="0 0 980 620" role="img" aria-label="OOM debugging decision tree: root asks where OOM occurs, left branch diagnoses forward-pass activation issues, center branch covers optimizer state issues, right branch addresses backward accumulation issues, each with ordered remedies.">
<style>
  #fig-memeff-oom-decision-tree text { fill: var(--ink-soft,#1e293b); }
  #fig-memeff-oom-decision-tree .node-label { font: 600 13px var(--sans,sans-serif); }
  #fig-memeff-oom-decision-tree .node-q { font: 700 12px var(--sans,sans-serif); }
  #fig-memeff-oom-decision-tree .panel-title { font: 700 12px var(--sans,sans-serif); fill: var(--accent,#4f46e5); }
  #fig-memeff-oom-decision-tree .remedy-text { font: 400 11px var(--sans,sans-serif); }
  #fig-memeff-oom-decision-tree .edge-label { font: 700 11px var(--sans,sans-serif); fill: #fff; }
  #fig-memeff-oom-decision-tree .badge-num { font: 700 10px var(--sans,sans-serif); fill: #fff; }
  #fig-memeff-oom-decision-tree .root-label { font: 700 13px var(--sans,sans-serif); fill: #fff; }
</style>
<defs>
  <marker id="dt-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 Z" fill="var(--muted,#64748b)"/>
  </marker>
</defs>



<g>
  <rect x="350" y="24" width="280" height="48" rx="10"
        fill="var(--accent,#ef4444)" fill-opacity="1"
        stroke="var(--accent,#ef4444)" stroke-width="2"/>
  
  <rect x="350" y="24" width="280" height="48" rx="10"
        fill="#dc2626" fill-opacity="0.9" stroke="#dc2626" stroke-width="2"/>
  <text x="490" y="44" text-anchor="middle" class="root-label">OOM during training?</text>
  <text x="490" y="60" text-anchor="middle" style="font:400 11px var(--sans,sans-serif); fill:#fecaca;">Diagnose where and when it occurs</text>
</g>


<line x1="380" y1="72" x2="210" y2="168" stroke="var(--muted,#64748b)" stroke-width="1.5" marker-end="url(#dt-arrow)"/>

<rect x="267" y="108" width="88" height="18" rx="7" fill="var(--accent,#4f46e5)"/>
<text x="311" y="121" text-anchor="middle" class="edge-label">in forward?</text>


<line x1="490" y1="72" x2="770" y2="168" stroke="var(--muted,#64748b)" stroke-width="1.5" marker-end="url(#dt-arrow)"/>

<rect x="666" y="108" width="96" height="18" rx="7" fill="var(--muted,#64748b)"/>
<text x="714" y="121" text-anchor="middle" class="edge-label">.backward()?</text>


<g>
  <rect x="100" y="168" width="220" height="46" rx="8"
        fill="var(--surface,#f1f5f9)" fill-opacity="0.9"
        stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <text x="210" y="188" text-anchor="middle" class="node-q" fill="var(--accent,#4f46e5)">Is it in the forward pass?</text>
  <text x="210" y="205" text-anchor="middle" style="font:400 10px var(--sans,sans-serif); fill:var(--muted,#64748b);">Check where OOM is raised</text>
</g>


<line x1="165" y1="214" x2="130" y2="278" stroke="var(--muted,#64748b)" stroke-width="1.5" marker-end="url(#dt-arrow)"/>
<rect x="124" y="237" width="34" height="17" rx="6" fill="var(--accent,#4f46e5)"/>
<text x="141" y="250" text-anchor="middle" class="edge-label" style="font:700 10px var(--sans,sans-serif);">YES</text>


<line x1="255" y1="214" x2="390" y2="278" stroke="var(--muted,#64748b)" stroke-width="1.5" marker-end="url(#dt-arrow)"/>
<rect x="296" y="237" width="30" height="17" rx="6" fill="var(--muted,#64748b)"/>
<text x="311" y="250" text-anchor="middle" class="edge-label" style="font:700 10px var(--sans,sans-serif);">NO</text>


<g>
  <rect x="15" y="278" width="280" height="218" rx="8"
        fill="var(--surface,#f8fafc)" fill-opacity="0.85"
        stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="155" y="298" text-anchor="middle" class="panel-title">Activation memory issue</text>
  <line x1="25" y1="304" x2="285" y2="304" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
  <text x="30" y="320" class="remedy-text" style="font:500 10px var(--sans,sans-serif); fill:var(--muted,#64748b);">Solutions — in order of cost:</text>

  
  <circle cx="34" cy="340" r="9" fill="var(--accent,#4f46e5)"/>
  <text x="34" y="344" text-anchor="middle" class="badge-num">1</text>
  <text x="50" y="337" class="remedy-text">Reduce batch size /</text>
  <text x="50" y="351" class="remedy-text">use gradient accumulation</text>

  
  <circle cx="34" cy="374" r="9" fill="var(--accent,#4f46e5)"/>
  <text x="34" y="378" text-anchor="middle" class="badge-num">2</text>
  <text x="50" y="371" class="remedy-text">Enable activation</text>
  <text x="50" y="385" class="remedy-text">checkpointing</text>

  
  <circle cx="34" cy="408" r="9" fill="var(--accent,#4f46e5)"/>
  <text x="34" y="412" text-anchor="middle" class="badge-num">3</text>
  <text x="50" y="405" class="remedy-text">Use FlashAttention</text>
  <text x="50" y="419" class="remedy-text">(eliminates O(T²) attn matrices)</text>

  
  <circle cx="34" cy="445" r="9" fill="var(--accent,#4f46e5)"/>
  <text x="34" y="449" text-anchor="middle" class="badge-num">4</text>
  <text x="50" y="449" class="remedy-text">Reduce sequence length</text>
</g>


<g>
  <rect x="310" y="278" width="290" height="218" rx="8"
        fill="var(--surface,#f8fafc)" fill-opacity="0.85"
        stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="455" y="298" text-anchor="middle" class="panel-title">Optimizer state issue</text>
  <line x1="320" y1="304" x2="590" y2="304" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
  <text x="325" y="320" class="remedy-text" style="font:500 10px var(--sans,sans-serif); fill:var(--muted,#64748b);">Solutions:</text>

  
  <circle cx="329" cy="340" r="9" fill="var(--accent,#4f46e5)"/>
  <text x="329" y="344" text-anchor="middle" class="badge-num">1</text>
  <text x="345" y="337" class="remedy-text">Use Adafactor</text>
  <text x="345" y="351" class="remedy-text">(no m_t; O(P) not O(2P) states)</text>

  
  <circle cx="329" cy="374" r="9" fill="var(--accent,#4f46e5)"/>
  <text x="329" y="378" text-anchor="middle" class="badge-num">2</text>
  <text x="345" y="371" class="remedy-text">Use ZeRO-2 or ZeRO-3</text>
  <text x="345" y="385" class="remedy-text">to shard optimizer states</text>

  
  <circle cx="329" cy="408" r="9" fill="var(--accent,#4f46e5)"/>
  <text x="329" y="412" text-anchor="middle" class="badge-num">3</text>
  <text x="345" y="405" class="remedy-text">Use LoRA</text>
  <text x="345" y="419" class="remedy-text">(skip states on frozen params)</text>

  
  <circle cx="329" cy="445" r="9" fill="var(--accent,#4f46e5)"/>
  <text x="329" y="449" text-anchor="middle" class="badge-num">4</text>
  <text x="345" y="449" class="remedy-text">CPU offload (ZeRO-Offload)</text>
</g>


<g>
  <rect x="630" y="168" width="334" height="200" rx="8"
        fill="var(--surface,#f8fafc)" fill-opacity="0.85"
        stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <text x="797" y="190" text-anchor="middle" class="panel-title">OOM during .backward()</text>
  <text x="797" y="205" text-anchor="middle" class="panel-title">accumulation?</text>
  <line x1="640" y1="211" x2="954" y2="211" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>

  <text x="645" y="229" class="remedy-text" style="font:500 10px var(--sans,sans-serif); fill:var(--muted,#64748b);">Gradient accumulation buffer is O(P).</text>
  <text x="645" y="246" class="remedy-text">Option A: use fp16 grads</text>
  <text x="645" y="262" class="remedy-text" style="fill:var(--muted,#64748b);">  (saves 2x vs fp32 gradients)</text>
  <text x="645" y="282" class="remedy-text">Option B: per-layer gradient clearing</text>
  <text x="645" y="298" class="remedy-text" style="fill:var(--muted,#64748b);">  with gradient checkpointing</text>
  <text x="645" y="318" class="remedy-text" style="fill:var(--muted,#64748b);">  (free activation buffers layer-by-layer)</text>
  <text x="645" y="348" style="font:600 10px var(--mono,monospace); fill:var(--accent,#4f46e5);">grad_accum_buffer ~ O(P) bytes</text>
</g>


<rect x="15" y="512" width="950" height="36" rx="6"
      fill="var(--accent,#4f46e5)" fill-opacity="0.07"
      stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="490" y="526" text-anchor="middle"
      style="font:600 11px var(--sans,sans-serif); fill:var(--muted,#64748b);">Remedy lists are ordered by cost/impact. Try lower-cost options first.</text>
<text x="490" y="542" text-anchor="middle"
      style="font:400 10px var(--sans,sans-serif); fill:var(--muted,#64748b);">OOM location determines the root cause: forward = activations, backward = optimizer states or gradient buffers.</text>

</svg>
<figcaption><b>OOM errors during training fall into three distinct root causes, each with its own ordered remedies.</b> If the crash happens in the forward pass, the culprit is activation memory — start with batch-size reduction, then checkpointing, then FlashAttention. If it crashes after the forward pass, optimizer states are too large — try Adafactor, ZeRO sharding, or LoRA. A crash during gradient accumulation points to the O(P) gradient buffer, cured by fp16 gradients or per-layer clearing.</figcaption>
</figure>
