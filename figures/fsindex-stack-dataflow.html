<style>
  #fig-fsindex-stack-dataflow text { font: 400 12px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-fsindex-stack-dataflow .lbl  { font: 600 13px var(--sans,sans-serif); }
  #fig-fsindex-stack-dataflow .sub  { font: 400 10px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-fsindex-stack-dataflow .sec  { font: 700 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-fsindex-stack-dataflow .elab { font: italic 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-fsindex-stack-dataflow .eltr { font: italic 400 10px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
  #fig-fsindex-stack-dataflow .lane { font: 600 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

  /* Flow animation on spine edges */
  @media (prefers-reduced-motion: no-preference) {
    #fig-fsindex-stack-dataflow .flow-fwd {
      stroke-dasharray: 8 5; stroke-dashoffset: 0;
      animation: fsd-flow 1.8s linear infinite;
    }
    #fig-fsindex-stack-dataflow .flow-tr {
      stroke-dasharray: 8 5; stroke-dashoffset: 0;
      animation: fsd-flow 1.8s linear infinite 3.8s;
    }
    @keyframes fsd-flow { from { stroke-dashoffset: 130; } to { stroke-dashoffset: 0; } }
    #fig-fsindex-stack-dataflow .dot-fwd {
      animation: fsd-dot-fwd 3.2s ease-in-out infinite 0.5s;
    }
    #fig-fsindex-stack-dataflow .dot-tr {
      animation: fsd-dot-tr 3s ease-in-out infinite 3.8s;
    }
    #fig-fsindex-stack-dataflow .dot-inf {
      animation: fsd-dot-inf 3.5s ease-in-out infinite 3.8s;
    }
    @keyframes fsd-dot-fwd {
      0%   { cy: 50px; opacity: 0; }
      5%   { opacity: 1; }
      90%  { cy: 410px; opacity: 1; }
      100% { cy: 410px; opacity: 0; }
    }
    @keyframes fsd-dot-tr {
      0%   { opacity: 0; transform: translate(250px,391px); }
      5%   { opacity: 1; }
      90%  { opacity: 1; transform: translate(640px,700px); }
      100% { opacity: 0; transform: translate(640px,700px); }
    }
    @keyframes fsd-dot-inf {
      0%   { cy: 419px; opacity: 0; }
      5%   { opacity: 1; }
      90%  { cy: 878px; opacity: 1; }
      100% { cy: 878px; opacity: 0; }
    }
  }
</style>

<figcaption><b>Data and gradient flow through the complete LLM stack.</b> A token travels the forward spine (Raw Text through BPE §2, Embeddings+RoPE §3-4, TransformerBlock §5, GPT Head §5) and then forks: the blue training branch carries cross-entropy loss backward through Autograd §1, LoRA adapters §6, and DPO/GRPO alignment §7, while the inference branch feeds logits through the Sampler §11, Speculative Decoding §9, and RAG Pipeline §10 to produce the final answer stream. FlashAttention (§8, dashed orange) is a drop-in kernel swap that replaces the attention computation without changing any other stage.</figcaption>
</figure>
