</svg>
<figcaption><b>LLM.int8() splits one linear layer's matmul into two precision lanes that sum to the same output.</b> A handful of outlier activation channels (~0.1-1% of columns, huge magnitude) and their matching weight rows are peeled off into an exact FP16 matmul, while the remaining columns are quantized per-column to INT8 and run on Tensor Cores; summing the two partial products recovers accuracy close to full FP16 at roughly half the memory footprint.</figcaption>
</figure>
