<svg viewBox="0 0 820 790" role="img" aria-label="Diagram of GEMM tiling in Triton: one program computes one BLOCK_M by BLOCK_N tile of C, reading a full-K strip of A and a full-K strip of B, walking K in BLOCK_K steps and accumulating tl.dot results into an fp32 register tile before writing C once. An inset compares row-major tile visitation order, which spreads concurrent programs across many B columns, against GROUP_M grouped order, which keeps concurrent programs on shared A rows and B columns for better L2 reuse.">

    <marker id="mtk-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">

    </marker>
  </defs>

  <text x="410" y="24" text-anchor="middle" class="fig-title">GEMM tiling: one program, one output tile, K walked in steps</text>

  
  <g data-anim="1">

    <text x="95" y="152" text-anchor="middle" class="mat-label">A&#160;&#160;(M x K)</text>

    <rect x="170" y="160" width="380" height="210" rx="4" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="360" y="388" text-anchor="middle" class="mat-label">C&#160;&#160;(M x N)</text>
  </g>

  
  <g data-anim="2">
    
    <line x1="310" y1="140" x2="310" y2="240" class="v-grid" stroke-dasharray="3 3" stroke-width="1"/>
    <line x1="400" y1="140" x2="400" y2="240" class="v-grid" stroke-dasharray="3 3" stroke-width="1"/>
    <line x1="150" y1="240" x2="310" y2="240" class="v-grid" stroke-dasharray="3 3" stroke-width="1"/>

  <g data-anim="3">

    <line x1="190" y1="442" x2="226" y2="442" stroke="var(--muted)" stroke-width="1.6" marker-end="url(#mtk-arrow)"/>

    <text x="325" y="493" text-anchor="middle" class="step-text-b">-&gt; tl.dot -&gt; acc += (fp32)</text>

    <line x1="420" y1="442" x2="456" y2="442" stroke="var(--muted)" stroke-width="1.6" marker-end="url(#mtk-arrow)"/>

    
    <rect x="460" y="430" width="150" height="72" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>

    <text x="540" y="465" text-anchor="middle" class="step-text">load A + B tile</text>

    <line x1="610" y1="442" x2="626" y2="442" stroke="var(--muted)" stroke-width="1.6" marker-end="url(#mtk-arrow)"/>

    <text x="705" y="448" text-anchor="middle" class="step-text-b" fill="var(--accent)">acc (fp32)</text>
    <text x="705" y="464" text-anchor="middle" class="step-sub">register tile</text>
    <text x="705" y="482" text-anchor="middle" class="step-sub">+= tl.dot(a,b)</text>
    <text x="705" y="497" text-anchor="middle" class="step-sub">each step</text>
    <text x="705" y="513" text-anchor="middle" class="step-sub">written to C ONCE</text>

    
    <path d="M 690 426 C 640 340, 480 280, 402 258" fill="none" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#mtk-arrow-acc)"/>
    <rect x="470" y="308" width="94" height="16" rx="3" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
    <text x="517" y="320" text-anchor="middle" class="write-lbl">write, once</text>

    <text x="410" y="564" text-anchor="middle" class="reuse-note">each B col-tile is reused across BLOCK_M rows -- that reuse is the whole point.</text>
  </g>

  
  <g data-anim="5">
    <rect x="20" y="588" width="780" height="180" rx="8" fill="var(--surface-3)" fill-opacity="0.5" stroke="var(--border-2)" stroke-dasharray="4 3" stroke-width="1"/>
    <text x="410" y="606" text-anchor="middle" class="inset-title">inset: GROUP_M swizzle changes which output tiles run concurrently</text>

    <text x="250" y="624" text-anchor="middle" class="grid-title">row-major (poor L2 reuse)</text>
    <text x="590" y="624" text-anchor="middle" class="grid-title">GROUP_M = 2 (grouped: better L2 reuse)</text>

    
    <g transform="translate(207,632)">
      <rect x="0"  y="0"  width="20" height="20" fill="var(--accent)" fill-opacity="0.30" stroke="var(--accent)" stroke-width="1.3"/>

      <rect x="66" y="0"  width="20" height="20" fill="var(--accent)" fill-opacity="0.30" stroke="var(--accent)" stroke-width="1.3"/>
      <rect x="0"  y="22" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>
      <rect x="22" y="22" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>
      <rect x="44" y="22" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>
      <rect x="66" y="22" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>
      <rect x="0"  y="44" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>
      <rect x="22" y="44" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>

      <rect x="22" y="66" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>

      <rect x="66" y="66" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>
      <g text-anchor="middle" class="cell-num">
        <text x="10" y="14">1</text><text x="32" y="14">2</text><text x="54" y="14">3</text><text x="76" y="14">4</text>
        <text x="10" y="36">5</text><text x="32" y="36">6</text><text x="54" y="36">7</text><text x="76" y="36">8</text>

    <text x="250" y="738" text-anchor="middle" class="grid-cap">first 4 concurrent programs -&gt;</text>

    <g transform="translate(547,632)">

      <rect x="22" y="0"  width="20" height="20" fill="var(--accent)" fill-opacity="0.30" stroke="var(--accent)" stroke-width="1.3"/>
      <rect x="44" y="0"  width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>
      <rect x="66" y="0"  width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>
      <rect x="0"  y="22" width="20" height="20" fill="var(--accent)" fill-opacity="0.30" stroke="var(--accent)" stroke-width="1.3"/>

      <rect x="0"  y="66" width="20" height="20" class="v-fill v-stroke" stroke-width="1"/>

      <g text-anchor="middle" class="cell-num">

</svg>
<figcaption><b>Each Triton program owns one <code>BLOCK_M x BLOCK_N</code> output tile and fills it by walking K in <code>BLOCK_K</code> steps.</b> Every step loads a small A tile and B tile, multiplies with <code>tl.dot</code>, and accumulates into an fp32 register tile — only after the loop is <code>C</code> written, once. The inset shows why the <code>GROUP_M</code> swizzle matters: grouping tile-rows keeps concurrently-running programs on shared A rows and B columns, so those loads stay hot in L2 instead of scattering across the whole matrix.</figcaption>
</figure>
