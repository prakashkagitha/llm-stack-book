<figure class="viz" id="fig-scaling-law">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 410" role="img" aria-label="A log-log plot of loss versus compute: data points fall on a straight power-law line that bends and flattens as it approaches a dashed irreducible-loss floor E.">
  <style>
    #fig-scaling-law text{ fill:var(--ink-soft); }
    #fig-scaling-law .ax{ font:600 13px var(--sans,sans-serif); }
    #fig-scaling-law .tk{ font:500 11px var(--mono,monospace); fill:var(--muted); }
    #fig-scaling-law .lbl{ font:600 12.5px var(--sans,sans-serif); }
    #fig-scaling-law .sm{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-scaling-law .floor{ font:600 13px var(--sans,sans-serif); }
  </style>

  
  
  <g data-anim="1">
    
    <g class="v-grid" stroke-width="1" opacity="0.55">
      <line x1="92"  y1="44" x2="92"  y2="330"/>
      <line x1="231" y1="44" x2="231" y2="330"/>
      <line x1="370" y1="44" x2="370" y2="330"/>
      <line x1="509" y1="44" x2="509" y2="330"/>
      <line x1="648" y1="44" x2="648" y2="330"/>
      <line x1="92" y1="92"  x2="648" y2="92"/>
      <line x1="92" y1="139" x2="648" y2="139"/>
      <line x1="92" y1="187" x2="648" y2="187"/>
      <line x1="92" y1="234" x2="648" y2="234"/>
    </g>
    
    <line x1="92" y1="44" x2="92" y2="330" class="v-stroke" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <line x1="92" y1="330" x2="648" y2="330" class="v-stroke" stroke="var(--ink-soft)" stroke-width="1.6"/>
    
    <text x="92"  y="348" text-anchor="middle" class="tk">10¹⁸</text>
    <text x="231" y="348" text-anchor="middle" class="tk">10²⁰</text>
    <text x="370" y="348" text-anchor="middle" class="tk">10²²</text>
    <text x="509" y="348" text-anchor="middle" class="tk">10²⁴</text>
    <text x="648" y="348" text-anchor="middle" class="tk">10²⁶</text>
    
    <text x="370" y="378" text-anchor="middle" class="ax">compute &#8201;C&#8201; (FLOPs, log)</text>
    <text x="34" y="187" text-anchor="middle" class="ax" transform="rotate(-90 34 187)">loss&#8201; L &#8201;(log)</text>
  </g>

  
  <g data-anim="2">
    <line x1="92" y1="288" x2="640" y2="288" stroke="var(--good,#2f9e6e)" stroke-width="1.8" stroke-dasharray="7 5" class="viz-pulse"/>
    <text x="632" y="280" text-anchor="end" class="floor" fill="var(--good,#2f9e6e)">irreducible floor E &#183; entropy of text</text>
  </g>

  
  <g data-anim="3">
    <path d="M104 70 L210 118 L300 156 L380 190 L452 219 L520 243 L584 261 L648 273"
          fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          class="viz-draw" style="--len:680"/>
  </g>

  
  <g data-anim="4" fill="var(--accent)" stroke="var(--surface,#ffffff)" stroke-width="1.4">
    <circle cx="104" cy="70"  r="5"/>
    <circle cx="210" cy="118" r="5"/>
    <circle cx="300" cy="156" r="5"/>
    <circle cx="380" cy="190" r="5"/>
    <circle cx="452" cy="219" r="5"/>
    <circle cx="520" cy="243" r="5"/>
    <circle cx="584" cy="261" r="5"/>
    <circle cx="648" cy="273" r="5"/>
  </g>

  
  <g data-anim="4">

    <path d="M250 104 L306 104 L306 118" fill="none" stroke="var(--ink-soft)" stroke-width="1.3" stroke-dasharray="3 3" opacity="0.8"/>
    <text x="278" y="94" text-anchor="middle" class="sm">slope = -&#945; (power law)</text>
  </g>

  
  <g data-anim="5">
    <line x1="566" y1="248" x2="566" y2="285" stroke="var(--accent)" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.7"/>
    <rect x="430" y="84" width="214" height="58" rx="9" class="v-fill v-grid" stroke-width="1.2"/>
    <text x="442" y="106" class="lbl" fill="var(--accent)">diminishing returns</text>
    <text x="442" y="124" class="sm">each decade of compute buys</text>
    <text x="442" y="138" class="sm">a smaller drop toward E</text>
  </g>

  
  <g data-anim="5">
    <text x="116" y="60" class="lbl" fill="var(--accent)">(L <tspan font-weight="800" font-size="15">-</tspan> E) &#8201;~&#8201; C<tspan dy="-7" font-size="9.5">-&#945;</tspan></text>
  </g>
</svg>
<figcaption><b>On log–log axes, loss falls as a straight power-law line — until it meets a floor.</b> Each point is a training run; over many orders of magnitude of compute the loss <em>above the floor</em> drops with a constant slope <b>−α</b>. But an irreducible term <b>E</b> (the entropy of text itself) means the curve bends and flattens toward that dashed asymptote: returns diminish, yet never quite stop.</figcaption>
</figure>
