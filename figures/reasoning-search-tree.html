<figure class="viz" id="fig-reasoning-search-tree">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 460" role="img" aria-label="A branching search tree rooted at Question. The root branches into three candidate first steps, 1a, 1b, 1c. Step 1a branches into two second steps, one a dead end. Step 1b branches into three second steps, two dead ends and one leading further. Step 1c branches into two second steps, both dead ends. The single path Question to Step 1b to Step 2b to CORRECT is highlighted with a bold accent stroke, while unfollowed branches are dimmed, illustrating that the answer is the end of a path through a tree, not the top of a distribution.">
<defs>
  <marker id="rst-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-stroke-fill"/>
  </marker>
  <marker id="rst-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-reasoning-search-tree text { fill: var(--ink-soft,#374151); }
  #fig-reasoning-search-tree .node-title { font: 700 12px var(--sans,sans-serif); }
  #fig-reasoning-search-tree .ann-text   { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-reasoning-search-tree .path-lbl   { font: 700 11.5px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-reasoning-search-tree .v-stroke-fill { fill: var(--border-2,#94a3b8); }
  #fig-reasoning-search-tree .edge       { stroke: var(--border-2,#94a3b8); stroke-width: 1.6; fill: none; opacity: 0.55; }
  #fig-reasoning-search-tree .edge-path  { stroke: var(--accent,#c15b39); stroke-width: 3; fill: none; }
  #fig-reasoning-search-tree .node       { fill: var(--surface,#f8fafc); stroke: var(--border-2,#94a3b8); stroke-width: 1.4; opacity: 0.6; }
  #fig-reasoning-search-tree .node-path  { fill: var(--surface,#f8fafc); stroke: var(--accent,#c15b39); stroke-width: 2.2; }
  #fig-reasoning-search-tree .node-root  { fill: var(--accent,#c15b39); stroke: var(--accent,#c15b39); stroke-width: 1.5; }
  #fig-reasoning-search-tree .node-dead  { fill: var(--surface,#f8fafc); stroke: var(--border-2,#94a3b8); stroke-width: 1.2; opacity: 0.45; }
  #fig-reasoning-search-tree .node-correct { fill: var(--good,#2f9e6e); stroke: var(--good,#2f9e6e); stroke-width: 1.6; }
  #fig-reasoning-search-tree .dim-text   { opacity: 0.55; }
  #fig-reasoning-search-tree .x-mark     { stroke: var(--muted,#6b7280); stroke-width: 1.6; opacity: 0.5; }
  #fig-reasoning-search-tree .cap-box    { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-reasoning-search-tree [data-anim] { opacity: 0; animation: rst-in .5s ease forwards; }
  #fig-reasoning-search-tree [data-anim="1"] { animation-delay: .05s; }
  #fig-reasoning-search-tree [data-anim="2"] { animation-delay: .35s; }
  #fig-reasoning-search-tree [data-anim="3"] { animation-delay: .7s; }
  #fig-reasoning-search-tree [data-anim="4"] { animation-delay: 1.05s; }
  #fig-reasoning-search-tree [data-anim="5"] { animation-delay: 1.4s; }
  @keyframes rst-in { to { opacity: 1; } }
</style>


<g data-anim="1">
  <rect x="315" y="14" width="150" height="42" rx="8" class="node-root"/>
  <text x="390" y="40" text-anchor="middle" class="node-title" fill="#fff">Question</text>
</g>


<g data-anim="1">
  <line x1="390" y1="56" x2="140" y2="110" class="edge"/>
  <line x1="390" y1="56" x2="390" y2="110" class="edge-path" marker-end="url(#rst-arrow-accent)"/>
  <line x1="390" y1="56" x2="630" y2="110" class="edge"/>
</g>


<g data-anim="2">
  <rect x="65"  y="110" width="150" height="38" rx="7" class="node"/>
  <text x="140" y="134" text-anchor="middle" class="node-title dim-text">Step 1a</text>

  <rect x="315" y="110" width="150" height="38" rx="7" class="node-path"/>
  <text x="390" y="134" text-anchor="middle" class="node-title">Step 1b</text>

  <rect x="555" y="110" width="150" height="38" rx="7" class="node"/>
  <text x="630" y="134" text-anchor="middle" class="node-title dim-text">Step 1c</text>
</g>


<g data-anim="2">
  
  <line x1="140" y1="148" x2="60"  y2="204" class="edge"/>
  <line x1="140" y1="148" x2="195" y2="204" class="edge"/>

  
  <line x1="390" y1="148" x2="320" y2="204" class="edge"/>
  <line x1="390" y1="148" x2="390" y2="204" class="edge-path" marker-end="url(#rst-arrow-accent)"/>
  <line x1="390" y1="148" x2="470" y2="204" class="edge"/>

  
  <line x1="630" y1="148" x2="580" y2="204" class="edge"/>
  <line x1="630" y1="148" x2="705" y2="204" class="edge"/>
</g>


<g data-anim="3">
  
  <rect x="18"  y="204" width="84" height="34" rx="6" class="node-dead"/>
  <text x="60"  y="226" text-anchor="middle" class="node-title dim-text">Step 2a-i</text>
  <line x1="45" y1="248" x2="75" y2="278" class="x-mark"/>
  <line x1="75" y1="248" x2="45" y2="278" class="x-mark"/>

  <rect x="153" y="204" width="84" height="34" rx="6" class="node-dead"/>
  <text x="195" y="226" text-anchor="middle" class="node-title dim-text">Step 2a-ii</text>
  <line x1="180" y1="248" x2="210" y2="278" class="x-mark"/>
  <line x1="210" y1="248" x2="180" y2="278" class="x-mark"/>

  
  <rect x="278" y="204" width="84" height="34" rx="6" class="node-dead"/>
  <text x="320" y="226" text-anchor="middle" class="node-title dim-text">Step 2b-i</text>
  <line x1="305" y1="248" x2="335" y2="278" class="x-mark"/>
  <line x1="335" y1="248" x2="305" y2="278" class="x-mark"/>

  <rect x="348" y="204" width="84" height="34" rx="6" class="node-path"/>
  <text x="390" y="226" text-anchor="middle" class="node-title">Step 2b</text>

  <rect x="428" y="204" width="84" height="34" rx="6" class="node-dead"/>
  <text x="470" y="226" text-anchor="middle" class="node-title dim-text">Step 2b-iii</text>
  <line x1="455" y1="248" x2="485" y2="278" class="x-mark"/>
  <line x1="485" y1="248" x2="455" y2="278" class="x-mark"/>

  
  <rect x="538" y="204" width="84" height="34" rx="6" class="node-dead"/>
  <text x="580" y="226" text-anchor="middle" class="node-title dim-text">Step 2c-i</text>
  <line x1="565" y1="248" x2="595" y2="278" class="x-mark"/>
  <line x1="595" y1="248" x2="565" y2="278" class="x-mark"/>

  <rect x="663" y="204" width="84" height="34" rx="6" class="node-dead"/>
  <text x="705" y="226" text-anchor="middle" class="node-title dim-text">Step 2c-ii</text>
  <line x1="690" y1="248" x2="720" y2="278" class="x-mark"/>
  <line x1="720" y1="248" x2="690" y2="278" class="x-mark"/>
</g>


<g data-anim="4">
  <line x1="390" y1="238" x2="390" y2="300" class="edge-path" marker-end="url(#rst-arrow-accent)"/>
  <rect x="315" y="300" width="150" height="42" rx="8" class="node-correct"/>
  <text x="390" y="326" text-anchor="middle" class="node-title" fill="#fff">CORRECT</text>
</g>


<g data-anim="5">
  <text x="390" y="368" text-anchor="middle" class="path-lbl">the solution is a path: Question -&gt; Step 1b -&gt; Step 2b -&gt; CORRECT</text>
</g>


<g data-anim="5">
  <text x="20" y="404" class="cap-box">
    <tspan x="20" dy="0">A single forward pass returns the top-of-distribution token at each step;</tspan>
    <tspan x="20" dy="14">reasoning must search the tree and find the path - dimmed branches were</tspan>
    <tspan x="20" dy="14">explored and pruned, not skipped.</tspan>
  </text>
</g>

</svg>
<figcaption><b>Reasoning is a search problem over a tree of steps: the answer is the end of a path, not the top of a distribution.</b> From the root question, candidate first steps branch out, each branching again into candidate next steps; most branches terminate as dead ends (x). The single highlighted path — Step 1b &#8594; Step 2b &#8594; CORRECT — is the solution the search must find; more test-time compute means exploring more of this tree before committing to a path.</figcaption>
</figure>
