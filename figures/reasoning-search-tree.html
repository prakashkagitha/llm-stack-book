<figure class="viz" id="fig-reasoning-search-tree">
<svg viewBox="0 0 640 420" role="img" aria-label="A top-down reasoning tree showing a Question at the root branching into three candidate steps A1, A2, A3; only A1 and A3 continue to a second level; A1 leads to WRONG and A3 leads to CORRECT, illustrating that the correct answer lies at the end of a path through the tree.">
  <defs>
    <marker id="rst-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#94a3b8)"/>
    </marker>
  </defs>
  <style>
    #fig-reasoning-search-tree text { fill: var(--ink-soft, #374151); }
    #fig-reasoning-search-tree .node-title { font: 700 13px var(--sans, sans-serif); }
    #fig-reasoning-search-tree .node-sub  { font: 400 11px var(--sans, sans-serif); }
    #fig-reasoning-search-tree .ann-text  { font: 400 11px var(--sans, sans-serif); fill: var(--muted, #6b7280); }
    #fig-reasoning-search-tree .edge      { stroke: var(--border-2, #94a3b8); stroke-width: 1.8; fill: none; }
    #fig-reasoning-search-tree .edge-dead { stroke: var(--border-2, #94a3b8); stroke-width: 1.4; stroke-dasharray: 4 3; fill: none; opacity: 0.4; }
  </style>

  
  <rect x="245" y="18" width="150" height="44" rx="8"
        fill="var(--accent, #6366f1)" stroke="var(--accent, #6366f1)" stroke-width="1.5"/>
  <text x="320" y="44" text-anchor="middle" class="node-title" fill="#fff">Question</text>

  
  <line x1="320" y1="62" x2="130" y2="132" class="edge" marker-end="url(#rst-arrow)"/>
  <line x1="320" y1="62" x2="320" y2="132" class="edge" marker-end="url(#rst-arrow)"/>
  <line x1="320" y1="62" x2="510" y2="132" class="edge" marker-end="url(#rst-arrow)"/>

  
  
  <rect x="55" y="132" width="150" height="44" rx="8"
        fill="var(--surface, #f8fafc)" stroke="var(--border-2, #94a3b8)" stroke-width="1.5"/>
  <text x="130" y="158" text-anchor="middle" class="node-title">Step A1</text>

  
  <rect x="245" y="132" width="150" height="44" rx="8"
        fill="var(--surface, #f8fafc)" stroke="var(--border-2, #94a3b8)" stroke-width="1.5"/>
  <text x="320" y="158" text-anchor="middle" class="node-title">Step A2</text>

  
  <rect x="435" y="132" width="150" height="44" rx="8"
        fill="var(--surface, #f8fafc)" stroke="var(--border-2, #94a3b8)" stroke-width="1.5"/>
  <text x="510" y="158" text-anchor="middle" class="node-title">Step A3</text>

  
  
  <path d="M55,192 Q55,204 82,204 L297,204 Q320,204 320,218 Q320,204 343,204 L558,204 Q585,204 585,192"
        fill="none" stroke="var(--muted, #9ca3af)" stroke-width="1.2"/>
  <text x="320" y="234" text-anchor="middle" class="ann-text">beam width / branching factor</text>

  
  <line x1="320" y1="176" x2="320" y2="218" class="edge-dead"/>

  
  <line x1="130" y1="176" x2="130" y2="246" class="edge" marker-end="url(#rst-arrow)"/>
  <line x1="510" y1="176" x2="510" y2="246" class="edge" marker-end="url(#rst-arrow)"/>

  
  
  <rect x="55" y="246" width="150" height="44" rx="8"
        fill="var(--surface, #f8fafc)" stroke="var(--border-2, #94a3b8)" stroke-width="1.5"/>
  <text x="130" y="272" text-anchor="middle" class="node-title">Step B1</text>

  
  <rect x="435" y="246" width="150" height="44" rx="8"
        fill="var(--surface, #f8fafc)" stroke="var(--border-2, #94a3b8)" stroke-width="1.5"/>
  <text x="510" y="272" text-anchor="middle" class="node-title">Step B2</text>

  
  <line x1="130" y1="290" x2="130" y2="356" class="edge" marker-end="url(#rst-arrow)"/>
  <line x1="510" y1="290" x2="510" y2="356" class="edge" marker-end="url(#rst-arrow)"/>

  
  <rect x="55" y="356" width="150" height="44" rx="8"
        fill="var(--danger, #dc2626)" stroke="var(--danger, #dc2626)" stroke-width="1.5"/>
  <text x="130" y="382" text-anchor="middle" class="node-title" fill="#fff">WRONG</text>

  
  <rect x="435" y="356" width="150" height="44" rx="8"
        fill="var(--good, #16a34a)" stroke="var(--good, #16a34a)" stroke-width="1.5"/>
  <text x="510" y="382" text-anchor="middle" class="node-title" fill="#fff">CORRECT</text>
</svg>
<figcaption><b>Reasoning is a search problem over a tree of steps.</b> From the root question, multiple candidate reasoning steps branch out (the branching factor); only some branches continue — A2 is abandoned as a dead end. The path A3 → B2 → CORRECT demonstrates that the right answer is found by searching the tree, not by reading off a single probability distribution. Allocating more test-time compute lets us explore more paths and find the correct one more reliably.</figcaption>
</figure>
