<line x1="16" y1="332" x2="804" y2="332" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
<text x="410" y="356" text-anchor="middle" class="strip">BN reduces down columns, LN across rows -- which axis you average over is the whole difference.</text>

</svg>
<figcaption><b>BatchNorm and LayerNorm normalize the same N (examples) by D (features) grid along opposite axes.</b> BatchNorm computes mean and variance down a column -- over the N examples of one feature -- which couples examples together and breaks down when there is no batch at inference. LayerNorm computes mean and variance across a row -- over the D features of one example -- so each token is normalized independently of every other token, identically whether you are training on a batch or decoding one token at a time.</figcaption>
</figure>
