<figure class="viz" id="fig-lrsched-wsd-shape">
<button class="viz-replay" type="button">&#8635; replay</button>
<style>
  #fig-lrsched-wsd-shape .lbl { font: 600 12px var(--sans,sans-serif); }
  #fig-lrsched-wsd-shape .tick-lbl { font: 500 11px var(--mono,monospace); }
  #fig-lrsched-wsd-shape .axis-lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-lrsched-wsd-shape .phase-lbl { font: 700 12px var(--sans,sans-serif); }
  #fig-lrsched-wsd-shape .guide-lbl { font: 500 11px var(--mono,monospace); }
  #fig-lrsched-wsd-shape text { fill: var(--ink-soft,#64748b); }
  #fig-lrsched-wsd-shape .accent-text { fill: var(--accent,#6366f1); }
  #fig-lrsched-wsd-shape .muted-text { fill: var(--muted,#94a3b8); }

  #fig-lrsched-wsd-shape #band-warmup { opacity: 0.08; }
  #fig-lrsched-wsd-shape #band-stable { opacity: 0.08; }
  #fig-lrsched-wsd-shape #band-decay  { opacity: 0.08; }

  #fig-lrsched-wsd-shape #wsd-curve {
    stroke-dasharray: 1650;
    stroke-dashoffset: 1650;
    animation: wsd-draw 5.5s ease-in-out infinite;
  }
  #fig-lrsched-wsd-shape #wsd-dot {
    animation: wsd-dot-move 5.5s linear infinite;
  }
  #fig-lrsched-wsd-shape #wsd-vline {
    animation: wsd-vline-move 5.5s linear infinite;
  }

  #fig-lrsched-wsd-shape #band-warmup { animation: band-w-pulse 5.5s linear infinite; }
  #fig-lrsched-wsd-shape #band-stable { animation: band-s-pulse 5.5s linear infinite; }
  #fig-lrsched-wsd-shape #band-decay  { animation: band-d-pulse 5.5s linear infinite; }
  #fig-lrsched-wsd-shape #lbl-warmup  { animation: lbl-w-pulse 5.5s linear infinite; }
  #fig-lrsched-wsd-shape #lbl-stable  { animation: lbl-s-pulse 5.5s linear infinite; }
  #fig-lrsched-wsd-shape #lbl-decay   { animation: lbl-d-pulse 5.5s linear infinite; }

  @keyframes wsd-draw {
    0%  { stroke-dashoffset: 1650; }
    85% { stroke-dashoffset: 0; }
    100%{ stroke-dashoffset: 0; }
  }

  /* Dot travels: warmup 0%->20% (70,300)->(230,70), stable 20%->55% (230,70)->(520,70),
     decay 55%->85% bezier approximated, tail 85%->90% (690,300)->(710,300), reset 95%->100% */
  @keyframes wsd-dot-move {
    0%  { cx: 70;  cy: 300; opacity: 1; }
    20% { cx: 230; cy: 70;  opacity: 1; }
    55% { cx: 520; cy: 70;  opacity: 1; }
    63% { cx: 565; cy: 108; opacity: 1; }
    70% { cx: 605; cy: 186; opacity: 1; }
    78% { cx: 648; cy: 264; opacity: 1; }
    85% { cx: 690; cy: 300; opacity: 1; }
    90% { cx: 710; cy: 300; opacity: 1; }
    92% { cx: 710; cy: 300; opacity: 0; }
    99% { cx: 70;  cy: 300; opacity: 0; }
    100%{ cx: 70;  cy: 300; opacity: 1; }
  }

  @keyframes wsd-vline-move {
    0%  { transform: translateX(70px);  opacity: 0.45; }
    20% { transform: translateX(230px); opacity: 0.45; }
    55% { transform: translateX(520px); opacity: 0.45; }
    63% { transform: translateX(565px); opacity: 0.45; }
    70% { transform: translateX(605px); opacity: 0.45; }
    78% { transform: translateX(648px); opacity: 0.45; }
    85% { transform: translateX(690px); opacity: 0.45; }
    90% { transform: translateX(710px); opacity: 0.45; }
    92% { transform: translateX(710px); opacity: 0; }
    99% { transform: translateX(70px);  opacity: 0; }
    100%{ transform: translateX(70px);  opacity: 0.45; }
  }

  @keyframes band-w-pulse {
    0%  { opacity: 0.17; }
    19% { opacity: 0.17; }
    21% { opacity: 0.06; }
    100%{ opacity: 0.06; }
  }
  @keyframes band-s-pulse {
    0%  { opacity: 0.06; }
    19% { opacity: 0.06; }
    21% { opacity: 0.17; }
    54% { opacity: 0.17; }
    56% { opacity: 0.06; }
    100%{ opacity: 0.06; }
  }
  @keyframes band-d-pulse {
    0%  { opacity: 0.06; }
    54% { opacity: 0.06; }
    56% { opacity: 0.17; }
    90% { opacity: 0.17; }
    92% { opacity: 0.06; }
    100%{ opacity: 0.06; }
  }
  @keyframes lbl-w-pulse {
    0%  { opacity: 1; }
    19% { opacity: 1; }
    21% { opacity: 0.45; }
    100%{ opacity: 0.45; }
  }
  @keyframes lbl-s-pulse {
    0%  { opacity: 0.45; }
    19% { opacity: 0.45; }
    21% { opacity: 1; }
    54% { opacity: 1; }
    56% { opacity: 0.45; }
    100%{ opacity: 0.45; }
  }
  @keyframes lbl-d-pulse {
    0%  { opacity: 0.45; }
    54% { opacity: 0.45; }
    56% { opacity: 1; }
    90% { opacity: 1; }
    92% { opacity: 0.45; }
    100%{ opacity: 0.45; }
  }

  @media (prefers-reduced-motion: reduce) {
    #fig-lrsched-wsd-shape #wsd-curve { stroke-dashoffset: 0; animation: none; }
    #fig-lrsched-wsd-shape #wsd-dot  { animation: none; cx: 690; cy: 300; opacity: 0.8; }
    #fig-lrsched-wsd-shape #wsd-vline { animation: none; transform: translateX(690px); opacity: 0.3; }
    #fig-lrsched-wsd-shape #band-warmup { animation: none; opacity: 0.08; }
    #fig-lrsched-wsd-shape #band-stable { animation: none; opacity: 0.08; }
    #fig-lrsched-wsd-shape #band-decay  { animation: none; opacity: 0.08; }
    #fig-lrsched-wsd-shape #lbl-warmup  { animation: none; opacity: 1; }
    #fig-lrsched-wsd-shape #lbl-stable  { animation: none; opacity: 1; }
    #fig-lrsched-wsd-shape #lbl-decay   { animation: none; opacity: 1; }
  }
</style>
<svg viewBox="0 0 760 390" role="img" aria-label="Warmup-Stable-Decay learning-rate schedule: LR linearly ramps up during warmup, holds constant during the stable phase, then cosine-decays to a minimum floor during decay.">
<defs>
  <marker id="wsd-arx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="wsd-ary" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="90">
    <path d="M0 9 L5 0 L10 9 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
</defs>


<rect id="band-warmup" x="70" y="55" width="160" height="265" rx="2" fill="var(--accent,#6366f1)" opacity="0.08"/>
<rect id="band-stable" x="230" y="55" width="290" height="265" rx="2" fill="var(--accent,#6366f1)" opacity="0.08"/>
<rect id="band-decay"  x="520" y="55" width="170" height="265" rx="2" fill="var(--accent,#6366f1)" opacity="0.08"/>


<line x1="65" y1="70" x2="718" y2="70" stroke="var(--ink-soft,#64748b)" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
<line x1="65" y1="300" x2="718" y2="300" stroke="var(--ink-soft,#64748b)" stroke-width="1" stroke-dasharray="4 4" opacity="0.22"/>


<text x="722" y="74" class="guide-lbl muted-text" text-anchor="end">&#951;_max</text>
<text x="722" y="304" class="guide-lbl muted-text" text-anchor="end">&#951;_min</text>


<line x1="230" y1="55" x2="230" y2="320" stroke="var(--ink-soft,#64748b)" stroke-width="1" stroke-dasharray="3 4" opacity="0.25"/>
<line x1="520" y1="55" x2="520" y2="320" stroke="var(--ink-soft,#64748b)" stroke-width="1" stroke-dasharray="3 4" opacity="0.25"/>
<line x1="690" y1="55" x2="690" y2="320" stroke="var(--ink-soft,#64748b)" stroke-width="1" stroke-dasharray="3 4" opacity="0.25"/>


<line x1="70" y1="320" x2="70" y2="46" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#wsd-ary)"/>


<line x1="70" y1="320" x2="726" y2="320" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#wsd-arx)"/>


<text x="26" y="188" class="axis-lbl" text-anchor="middle" transform="rotate(-90,26,188)">LR (&#951;)</text>


<text x="680" y="370" class="axis-lbl" text-anchor="middle">steps (t)</text>


<line x1="230" y1="318" x2="230" y2="326" stroke="var(--ink-soft,#64748b)" stroke-width="1.5"/>
<text x="230" y="340" class="tick-lbl" text-anchor="middle">T_w</text>

<line x1="520" y1="318" x2="520" y2="326" stroke="var(--ink-soft,#64748b)" stroke-width="1.5"/>
<text x="520" y="340" class="tick-lbl" text-anchor="middle">T_w + T_s</text>

<line x1="690" y1="318" x2="690" y2="326" stroke="var(--ink-soft,#64748b)" stroke-width="1.5"/>
<text x="690" y="338" class="tick-lbl" text-anchor="middle" font-size="9">T_w+T_s</text>
<text x="690" y="350" class="tick-lbl" text-anchor="middle" font-size="9">+T_d</text>


<text id="lbl-warmup" x="150" y="112" class="phase-lbl accent-text" text-anchor="middle">warmup</text>
<text id="lbl-stable" x="375" y="112" class="phase-lbl accent-text" text-anchor="middle">stable</text>
<text id="lbl-decay"  x="605" y="112" class="phase-lbl accent-text" text-anchor="middle">decay</text>


<path id="wsd-curve"
  d="M70,300 L230,70 L520,70 C530,70 545,75 565,108 C585,141 610,191 638,244 C655,272 673,291 690,300 L710,300"
  stroke="var(--accent,#6366f1)"
  stroke-width="3"
  fill="none"
  stroke-linecap="round"
  stroke-linejoin="round"
/>


<g id="wsd-vline">
  <line x1="0" y1="52" x2="0" y2="320" stroke="var(--accent,#6366f1)" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.45"/>
</g>


<circle id="wsd-dot" cx="70" cy="300" r="5.5" fill="var(--accent,#6366f1)" opacity="1"/>

</svg>
<figcaption><b>Warmup-Stable-Decay (WSD) learning-rate schedule.</b> The LR linearly ramps from near-zero to <i>&#951;_max</i> over <i>T_w</i> warmup steps, holds constant through the stable phase, then cosine-decays to <i>&#951;_min</i> over <i>T_d</i> decay steps. The key advantage: training can run in the stable phase indefinitely and decay is triggered on demand, without committing to a total step count upfront.</figcaption>
</figure>
