<figure class="viz" id="fig-advrag-multihop-vs-singleshot">
<svg viewBox="0 0 800 620" role="img" aria-label="Two-panel comparison for the question 'What language does the company founded by the author of PyTorch use?'. Left panel: single-shot top-k retrieval embeds the full question once, retrieves three generic PyTorch chunks, and misses because no chunk mentions the answer language Rust. Right panel: iterative multi-hop retrieval chains three hops, each hop's sub-query built from the previous hop's extracted fact, accumulating context until it reaches the answer Rust.">
<defs>
  <marker id="mh-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-muted-fill"/>
  </marker>
  <marker id="mh-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-advrag-multihop-vs-singleshot text { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-advrag-multihop-vs-singleshot .hdr    { font: 700 13px var(--sans,sans-serif); }
  #fig-advrag-multihop-vs-singleshot .q-txt  { font: 600 12.5px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-advrag-multihop-vs-singleshot .lbl    { font: 600 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-advrag-multihop-vs-singleshot .lbl-sm { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-advrag-multihop-vs-singleshot .mono   { font: 500 10px var(--mono,monospace); fill: var(--ink-soft,#334155); }
  #fig-advrag-multihop-vs-singleshot .fact   { font: 700 11px var(--mono,monospace); fill: var(--accent,#c15b39); }
  #fig-advrag-multihop-vs-singleshot .panel-lbl { font: 700 12px var(--sans,sans-serif); letter-spacing: 0.02em; }
  #fig-advrag-multihop-vs-singleshot .v-muted-fill { fill: var(--muted,#64748b); }
  #fig-advrag-multihop-vs-singleshot .miss-txt { font: 700 12px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-advrag-multihop-vs-singleshot .dim { opacity: 0.75; }
</style>


<rect x="10" y="10" width="780" height="46" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
<text x="400" y="29" text-anchor="middle" class="q-txt">Question: "What language does the company founded by the</text>
<text x="400" y="45" text-anchor="middle" class="q-txt">author of PyTorch use?"</text>


<line x1="400" y1="68" x2="400" y2="606" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 4"/>


<g class="dim" data-anim="1">
  <text x="200" y="86" text-anchor="middle" class="panel-lbl v-muted-fill">SINGLE-SHOT TOP-k</text>

  
  <rect x="60" y="102" width="280" height="34" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="200" y="123" text-anchor="middle" class="mono">embed(full question) -&gt; one vector</text>

  <line x1="200" y1="136" x2="200" y2="164" stroke="var(--border-2,#94a3b8)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>

  
  <ellipse cx="200" cy="180" rx="52" ry="13" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="200" y="184" text-anchor="middle" class="lbl-sm">vector index</text>

  <line x1="200" y1="193" x2="200" y2="215" stroke="var(--border-2,#94a3b8)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>

  
  <g>
    <rect x="66"  y="222" width="94" height="52" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
    <text x="113" y="243" text-anchor="middle" class="lbl-sm">"PyTorch is a</text>
    <text x="113" y="255" text-anchor="middle" class="lbl-sm">deep-learning</text>
    <text x="113" y="267" text-anchor="middle" class="lbl-sm">framework..."</text>

    <rect x="166" y="222" width="94" height="52" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
    <text x="213" y="243" text-anchor="middle" class="lbl-sm">"PyTorch uses</text>
    <text x="213" y="255" text-anchor="middle" class="lbl-sm">dynamic</text>
    <text x="213" y="267" text-anchor="middle" class="lbl-sm">graphs..."</text>

    <rect x="266" y="222" width="94" height="52" rx="6" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
    <text x="313" y="243" text-anchor="middle" class="lbl-sm">"released by</text>
    <text x="313" y="255" text-anchor="middle" class="lbl-sm">Meta AI in</text>
    <text x="313" y="267" text-anchor="middle" class="lbl-sm">2016..."</text>
  </g>

  <text x="200" y="292" text-anchor="middle" class="lbl-sm">top-3 chunks: all generically "about PyTorch"</text>

  
  <line x1="200" y1="300" x2="200" y2="320" stroke="var(--warn,#e0a106)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>
  <rect x="46" y="326" width="308" height="40" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.14" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <text x="200" y="343" text-anchor="middle" class="miss-txt">X no chunk mentions the language</text>
  <text x="200" y="358" text-anchor="middle" class="miss-txt">(&quot;Rust&quot; never retrieved)</text>

  
  <rect x="30" y="382" width="340" height="58" rx="6" fill="none" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="200" y="400" text-anchor="middle" class="lbl-sm">the query has no semantic overlap with</text>
  <text x="200" y="414" text-anchor="middle" class="lbl-sm">the final answer term ("Rust") --</text>
  <text x="200" y="428" text-anchor="middle" class="lbl-sm">it is three inference hops away</text>

  <text x="200" y="470" text-anchor="middle" class="lbl" fill="var(--warn,#e0a106)">Result: cannot answer</text>
</g>


<g data-anim="2">
  <text x="600" y="86" text-anchor="middle" class="panel-lbl" fill="var(--accent,#c15b39)">ITERATIVE MULTI-HOP</text>

  
  <text x="758" y="102" text-anchor="middle" class="lbl-sm">accumulated</text>
  <text x="758" y="114" text-anchor="middle" class="lbl-sm">context</text>
  <rect x="738" y="290" width="40" height="18" rx="3" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <rect x="738" y="260" width="40" height="46" rx="3" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <rect x="738" y="205" width="40" height="99" rx="3" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="758" y="120" text-anchor="middle" class="lbl-sm">grows</text>
  <line x1="758" y1="126" x2="758" y2="196" stroke="var(--border-2,#94a3b8)" stroke-width="1.2" marker-end="url(#mh-arrow)"/>

  
  <g data-anim="2">
    <rect x="430" y="98" width="290" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
    <text x="444" y="114" class="lbl">Hop 1</text>
    <text x="444" y="130" class="mono">query: "author of PyTorch"</text>
    <text x="444" y="146" class="mono">chunk: "...created by Soumith Chintala"</text>
    <text x="444" y="153" class="fact" text-anchor="start" dy="10">fact -&gt; Soumith Chintala</text>
  </g>

  <path d="M 500 164 C 480 178, 480 186, 500 198" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#mh-arrow-accent)"/>

  
  <g data-anim="3">
    <rect x="430" y="198" width="290" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
    <text x="444" y="214" class="lbl">Hop 2</text>
    <text x="444" y="230" class="mono">query: "company founded by Chintala"</text>
    <text x="444" y="246" class="mono">chunk: "...co-founded Extropic AI"</text>
    <text x="444" y="253" class="fact" text-anchor="start" dy="10">fact -&gt; Extropic AI</text>
  </g>

  <path d="M 500 264 C 480 278, 480 286, 500 298" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#mh-arrow-accent)"/>

  
  <g data-anim="4">
    <rect x="430" y="298" width="290" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
    <text x="444" y="314" class="lbl">Hop 3</text>
    <text x="444" y="330" class="mono">query: "language used at Extropic AI"</text>
    <text x="444" y="346" class="mono">chunk: "...software written in Rust"</text>
    <text x="444" y="353" class="fact" text-anchor="start" dy="10">fact -&gt; Rust</text>
  </g>

  <line x1="575" y1="358" x2="575" y2="384" stroke="var(--border-2,#94a3b8)" stroke-width="1.4" marker-end="url(#mh-arrow)"/>

  
  <g data-anim="5">
    <path d="M 575 390 L 645 418 L 575 446 L 505 418 Z" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
    <text x="575" y="414" text-anchor="middle" class="lbl-sm">enough to</text>
    <text x="575" y="426" text-anchor="middle" class="lbl-sm">answer?</text>

    <line x1="575" y1="446" x2="575" y2="470" stroke="var(--good,#2f9e6e)" stroke-width="1.6" marker-end="url(#mh-arrow)"/>
    <text x="600" y="462" class="lbl-sm" fill="var(--good,#2f9e6e)">yes</text>

    <rect x="475" y="476" width="200" height="34" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
    <text x="575" y="498" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">Answer: Rust</text>
  </g>
</g>


<rect x="420" y="524" width="358" height="70" rx="6" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="599" y="542" text-anchor="middle" class="lbl-sm">each hop's query is CONSTRUCTED from the</text>
<text x="599" y="556" text-anchor="middle" class="lbl-sm">previous hop's extracted fact -- so hop 3's query</text>
<text x="599" y="570" text-anchor="middle" class="lbl-sm">("language at Extropic AI") is unreachable</text>
<text x="599" y="584" text-anchor="middle" class="lbl-sm">directly from the original question</text>

</svg>
<figcaption><b>Single-shot top-k retrieval embeds the whole question once and misses when the answer is several inference hops away; iterative multi-hop retrieval chains sub-queries, each built from the previous hop's extracted fact.</b> On the left, the query "what language does the company founded by the author of PyTorch use?" retrieves only generic PyTorch chunks — none mentions a programming language, because the term "Rust" shares no vocabulary with the question. On the right, three hops each retrieve a narrow, answerable fact, and that fact becomes the next hop's search query, so the system reaches "Rust" without ever needing it to appear in the original question.</figcaption>
</figure>
