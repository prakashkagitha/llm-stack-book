<figure class="viz" id="fig-ragas-metric-decomposition">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 560" role="img" aria-label="RAGAS metrics arranged on a triangle over query, retrieved context, and answer. The query-to-context edge is context precision and recall, the retrieval-quality bucket. The context-to-answer edge is faithfulness, decomposed into atomic claims where 2 of 3 are supported by context. The query-to-answer edge is answer relevance, computed by regenerating hypothetical questions from the answer and comparing them back to the original query. Faithfulness and answer relevance form the generation-quality bucket. All three metrics are scored by an LLM judge without human labels.">
<defs>
  <marker id="rg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-muted-fill"/>
  </marker>
</defs>
<style>
  #fig-ragas-metric-decomposition text { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-ragas-metric-decomposition .node-lbl { font: 700 13px var(--sans,sans-serif); }
  #fig-ragas-metric-decomposition .edge-lbl { font: 700 12px var(--sans,sans-serif); }
  #fig-ragas-metric-decomposition .lbl-sm { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-ragas-metric-decomposition .mono { font: 600 10px var(--mono,monospace); fill: var(--ink-soft,#334155); }
  #fig-ragas-metric-decomposition .mono-sm { font: 500 9.5px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-ragas-metric-decomposition .bucket-hdr { font: 700 11px var(--sans,sans-serif); letter-spacing: 0.03em; }
  #fig-ragas-metric-decomposition .v-muted-fill { fill: var(--muted,#64748b); }
  #fig-ragas-metric-decomposition .footer { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); font-style: italic; }
  #fig-ragas-metric-decomposition [data-anim] { animation: rg-in .5s ease-out both; }
  #fig-ragas-metric-decomposition [data-anim="2"] { animation-delay: .15s; }
  #fig-ragas-metric-decomposition [data-anim="3"] { animation-delay: .30s; }
  #fig-ragas-metric-decomposition [data-anim="4"] { animation-delay: .45s; }
  @keyframes rg-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { #fig-ragas-metric-decomposition [data-anim] { animation: none; } }
</style>


<g data-anim="1">
  <rect x="20" y="20" width="360" height="220" rx="10" fill="var(--accent2,#3b82f6)" fill-opacity="0.06" stroke="var(--accent2,#3b82f6)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="200" y="38" text-anchor="middle" class="bucket-hdr" fill="var(--accent2,#3b82f6)">RETRIEVAL QUALITY</text>
  <text x="200" y="52" text-anchor="middle" class="lbl-sm">(context precision / recall)</text>

  <rect x="400" y="20" width="360" height="330" rx="10" fill="var(--accent,#c15b39)" fill-opacity="0.06" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="580" y="38" text-anchor="middle" class="bucket-hdr" fill="var(--accent,#c15b39)">GENERATION QUALITY</text>
  <text x="580" y="52" text-anchor="middle" class="lbl-sm">(faithfulness, answer relevance)</text>
</g>


<g data-anim="1">
  
  <line x1="390" y1="112" x2="200" y2="278" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <line x1="390" y1="112" x2="580" y2="278" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
  <line x1="234" y1="300" x2="546" y2="300" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
</g>


<g data-anim="1">
  <rect x="330" y="66" width="120" height="40" rx="8" fill="var(--surface,#fff)" stroke="var(--ink-soft,#334155)" stroke-width="1.4"/>
  <text x="390" y="91" text-anchor="middle" class="node-lbl">Query q</text>
</g>


<g data-anim="1">
  <rect x="90" y="288" width="100" height="26" rx="5" fill="var(--surface-3,#ece7da)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <rect x="98" y="280" width="100" height="26" rx="5" fill="var(--surface-3,#ece7da)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <rect x="106" y="272" width="100" height="26" rx="5" fill="var(--surface,#fff)" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="156" y="289" text-anchor="middle" class="mono-sm">chunk 1</text>
  <text x="156" y="330" text-anchor="middle" class="node-lbl">Retrieved Context D_q</text>
</g>


<g data-anim="1">
  <rect x="550" y="280" width="120" height="40" rx="8" fill="var(--surface,#fff)" stroke="var(--ink-soft,#334155)" stroke-width="1.4"/>
  <text x="610" y="305" text-anchor="middle" class="node-lbl">Answer y</text>
</g>


<g data-anim="2">
  <rect x="52" y="150" width="246" height="68" rx="7" fill="var(--surface,#fff)" stroke="var(--accent2,#3b82f6)" stroke-width="1.3"/>
  <text x="175" y="168" text-anchor="middle" class="edge-lbl" fill="var(--accent2,#3b82f6)">Context Precision / Recall</text>
  <text x="175" y="184" text-anchor="middle" class="lbl-sm">are the retrieved chunks the</text>
  <text x="175" y="196" text-anchor="middle" class="lbl-sm">right ones? precision = useful/k,</text>
  <text x="175" y="208" text-anchor="middle" class="lbl-sm">recall = found/relevant</text>
</g>


<g data-anim="2">
  <rect x="290" y="332" width="200" height="36" rx="7" fill="var(--surface,#fff)" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
  <text x="390" y="350" text-anchor="middle" class="edge-lbl" fill="var(--accent,#c15b39)">Faithfulness</text>
  <text x="390" y="363" text-anchor="middle" class="lbl-sm">is every claim in the answer supported?</text>
</g>


<g data-anim="3">
  <rect x="270" y="382" width="240" height="80" rx="7" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="390" y="398" text-anchor="middle" class="lbl-sm">answer decomposed into atomic claims</text>

  <rect x="284" y="406" width="66" height="24" rx="12" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <text x="317" y="422" text-anchor="middle" class="mono-sm">claim 1</text>
  <text x="358" y="422" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">v</text>

  <rect x="374" y="406" width="66" height="24" rx="12" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <text x="407" y="422" text-anchor="middle" class="mono-sm">claim 2</text>
  <text x="448" y="422" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">v</text>

  <rect x="284" y="436" width="66" height="24" rx="12" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  <text x="317" y="452" text-anchor="middle" class="mono-sm">claim 3</text>
  <text x="358" y="452" text-anchor="middle" class="mono" fill="var(--warn,#e0a106)">x</text>

  <text x="465" y="436" text-anchor="middle" class="node-lbl" fill="var(--accent,#c15b39)">score</text>
  <text x="465" y="452" text-anchor="middle" class="node-lbl" fill="var(--accent,#c15b39)">= 2/3</text>
</g>


<g data-anim="2">
  <rect x="480" y="150" width="230" height="52" rx="7" fill="var(--surface,#fff)" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
  <text x="595" y="168" text-anchor="middle" class="edge-lbl" fill="var(--accent,#c15b39)">Answer Relevance</text>
  <text x="595" y="184" text-anchor="middle" class="lbl-sm">does the answer actually address</text>
  <text x="595" y="196" text-anchor="middle" class="lbl-sm">the question?</text>
</g>


<g data-anim="3">
  <rect x="522" y="382" width="220" height="80" rx="7" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="632" y="399" text-anchor="middle" class="mono-sm">answer -&gt; regenerate hypothetical</text>
  <text x="632" y="412" text-anchor="middle" class="mono-sm">questions q1, q2, q3</text>
  <line x1="632" y1="418" x2="632" y2="430" stroke="var(--accent,#c15b39)" stroke-width="1.3" marker-end="url(#rg-arrow)"/>
  <text x="632" y="446" text-anchor="middle" class="mono-sm">cosine back to q</text>
</g>


<g data-anim="4">
  <rect x="20" y="490" width="740" height="28" rx="6" fill="none" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="390" y="508" text-anchor="middle" class="footer">all scored by an LLM judge - no human labels</text>
</g>

</svg>
<figcaption><b>RAGAS disaggregates a RAG system into a triangle of query, retrieved context, and answer, with one metric probing each edge.</b> Context precision/recall check the retrieval leg, while faithfulness (context supports the answer) and answer relevance (the answer addresses the query) check the generation leg -- all four scores come from an LLM judge, no human labels required.</figcaption>
</figure>
