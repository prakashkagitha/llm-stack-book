    10%  { opacity:0.45; }

  @keyframes sp-rise-n {
    0%   { opacity:0; transform:translateY(0); }
    42%  { opacity:0; transform:translateY(0); }
    47%  { opacity:1; transform:translateY(0); }
    60%  { opacity:1; transform:translateY(-96px); }
    65%  { opacity:0; transform:translateY(-96px); }

    0%   { opacity:0; }
    40%  { opacity:0; }
    44%  { opacity:0.45; }
    55%  { opacity:0.45; }
    59%  { opacity:0; }

    0%   { opacity:0; }
    55%  { opacity:0; }
    59%  { opacity:0.45; }
    66%  { opacity:0.45; }

    0%   { opacity:0; }
    67%  { opacity:0; }
    71%  { opacity:0.45; }
    78%  { opacity:0.45; }
    82%  { opacity:0; }
    100% { opacity:0; }

  @keyframes sp-drop-n {
    0%   { opacity:0; transform:translateY(0); }
    70%  { opacity:0; transform:translateY(0); }
    74%  { opacity:1; transform:translateY(0); }
    84%  { opacity:1; transform:translateY(80px); }
    89%  { opacity:0; transform:translateY(80px); }

  @keyframes sp-flash-step-n-ref {
    0%   { opacity:0; }
    82%  { opacity:0; }
    86%  { opacity:0.45; }
    95%  { opacity:0.45; }
    99%  { opacity:0; }
    100% { opacity:0; }
  }

<figcaption><b>Session persistence bridges restarts through external memory, not in-memory state.</b> When Session N-1 ends, a shutdown write persists a summary and any updated facts to the external memory rail; when Session N starts, a bootstrap read pulls that state back up into context so the agent continues seamlessly. The conditional <em>reflect</em> step (dashed border) periodically distils accumulated episodes into compact semantic facts, consolidating knowledge across many sessions.</figcaption>
</figure>
