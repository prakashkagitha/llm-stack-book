<text x="590" y="420" class="lbl-xs muted">Smaller RM is fine</text>

<text x="590" y="448" class="lbl-xs muted">a 175B policy)</text>
</svg>
<figcaption><b>Reward model: transformer backbone with a scalar value head.</b> The SFT model's LM head is replaced by a single <code>Linear(d_model→1)</code> layer. Only the last-token (or <code>&lt;eos&gt;</code>) hidden state <code>h_T</code> — which has attended over the entire prompt and response — is passed to this head, producing the scalar reward <code>r_φ(x, y)</code> used to supervise RL training.</figcaption>
</figure>
