<figure class="viz" id="fig-advkl-ppo-clip-quadrant">
<svg viewBox="0 0 760 460" role="img" aria-label="2-by-2 case analysis of the PPO clipped surrogate objective: when the importance ratio rho is large the clip is active for good actions but inactive for bad actions; when rho is small the clip is inactive for good actions but active for bad actions.">
<defs>
  <style>
    #fig-advkl-ppo-clip-quadrant .hdr {
      font: 700 13px var(--sans,sans-serif);
    }
    #fig-advkl-ppo-clip-quadrant .rowhdr {
      font: 600 12px var(--sans,sans-serif);
    }
    #fig-advkl-ppo-clip-quadrant .cell-title {
      font: 700 13px var(--sans,sans-serif);
    }
    #fig-advkl-ppo-clip-quadrant .cell-sub {
      font: 400 11.5px var(--sans,sans-serif);
    }
    #fig-advkl-ppo-clip-quadrant .footer {
      font: italic 11px var(--sans,sans-serif);
    }
    #fig-advkl-ppo-clip-quadrant text {
      fill: var(--ink-soft,#444);
    }
    #fig-advkl-ppo-clip-quadrant .muted-text {
      fill: var(--muted,#888);
    }
    #fig-advkl-ppo-clip-quadrant .accent-text {
      fill: var(--accent,#c0392b);
    }
  </style>
</defs>


<text x="282" y="38" text-anchor="middle" class="hdr">A_t &gt; 0  (good action)</text>
<text x="562" y="38" text-anchor="middle" class="hdr">A_t &lt; 0  (bad action)</text>


<line x1="422" y1="55" x2="422" y2="390" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>



<text x="24" y="148" text-anchor="middle" class="rowhdr" transform="rotate(-90,24,148)">rho large (&gt;1+eps)</text>

<text x="24" y="328" text-anchor="middle" class="rowhdr" transform="rotate(-90,24,328)">rho small (&lt;1-eps)</text>


<line x1="52" y1="250" x2="712" y2="250" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>



<rect x="54" y="60" width="256" height="178" rx="10"
      class="v-fill" fill="var(--surface-3,#f4f4f4)" fill-opacity="0.7"
      stroke="var(--muted,#888)" stroke-width="1.5" stroke-dasharray="6 3"/>

<rect x="54" y="60" width="256" height="178" rx="10"
      fill="var(--muted,#888)" fill-opacity="0.06"/>
<text x="182" y="100" text-anchor="middle" class="cell-title muted-text" fill="var(--muted,#888)">CLIP ACTIVE</text>
<text x="182" y="118" text-anchor="middle" class="cell-title muted-text" fill="var(--muted,#888)">gradient = 0</text>
<text x="182" y="148" text-anchor="middle" class="cell-sub" style="fill:var(--muted,#888)">Ratio already past 1+eps;</text>
<text x="182" y="165" text-anchor="middle" class="cell-sub" style="fill:var(--muted,#888)">do not over-reward an</text>
<text x="182" y="182" text-anchor="middle" class="cell-sub" style="fill:var(--muted,#888)">already-inflated good token.</text>



<rect x="422" y="60" width="285" height="178" rx="10"
      fill="var(--accent,#c0392b)" fill-opacity="0.10"
      stroke="var(--accent,#c0392b)" stroke-width="2"/>
<text x="564" y="100" text-anchor="middle" class="cell-title accent-text" fill="var(--accent,#c0392b)">NO CLIP</text>
<text x="564" y="118" text-anchor="middle" class="cell-title accent-text" fill="var(--accent,#c0392b)">full push-down</text>
<text x="564" y="148" text-anchor="middle" class="cell-sub">Suppress the bad action hard;</text>
<text x="564" y="165" text-anchor="middle" class="cell-sub">full gradient flows to</text>
<text x="564" y="182" text-anchor="middle" class="cell-sub">reduce this token's probability.</text>



<rect x="54" y="258" width="256" height="122" rx="10"
      fill="var(--accent,#c0392b)" fill-opacity="0.10"
      stroke="var(--accent,#c0392b)" stroke-width="2"/>
<text x="182" y="295" text-anchor="middle" class="cell-title accent-text" fill="var(--accent,#c0392b)">NO CLIP</text>
<text x="182" y="313" text-anchor="middle" class="cell-title accent-text" fill="var(--accent,#c0392b)">full push-up</text>
<text x="182" y="343" text-anchor="middle" class="cell-sub">Still encourage the good action;</text>
<text x="182" y="360" text-anchor="middle" class="cell-sub">full gradient flows to raise prob.</text>



<rect x="422" y="258" width="285" height="122" rx="10"
      class="v-fill" fill="var(--surface-3,#f4f4f4)" fill-opacity="0.7"
      stroke="var(--muted,#888)" stroke-width="1.5" stroke-dasharray="6 3"/>

<rect x="422" y="258" width="285" height="122" rx="10"
      fill="var(--muted,#888)" fill-opacity="0.06"/>
<text x="564" y="295" text-anchor="middle" class="cell-title muted-text" fill="var(--muted,#888)">CLIP ACTIVE</text>
<text x="564" y="313" text-anchor="middle" class="cell-title muted-text" fill="var(--muted,#888)">gradient = 0</text>
<text x="564" y="343" text-anchor="middle" class="cell-sub" style="fill:var(--muted,#888)">Do not over-suppress an already</text>
<text x="564" y="360" text-anchor="middle" class="cell-sub" style="fill:var(--muted,#888)">down-weighted bad token.</text>


<line x1="130" y1="238" x2="490" y2="258" stroke="var(--muted,#888)" stroke-width="1" stroke-dasharray="3 4" opacity="0.45"/>


<text x="380" y="418" text-anchor="middle" class="footer" fill="var(--ink-soft,#555)"
      style="font:italic 11px var(--sans,sans-serif)">
  The clip only removes incentive to move further where you have already moved a lot -- it never reverses the sign of the gradient.
</text>
<text x="380" y="440" text-anchor="middle" fill="var(--muted,#888)"
      style="font:600 10px var(--sans,sans-serif)">
  Shaded cells (top-left, bottom-right): gradient zeroed. Colored cells (top-right, bottom-left): full gradient flows.
</text>
</svg>

<figcaption><b>PPO clipped surrogate: the four cases of the min(&amp;hellip;) asymmetry.</b> The clip is active (gradient zeroed) only on the diagonal where the ratio has already moved in the direction the advantage recommends &amp;mdash; it never reverses sign. When &amp;rho; is large but the action is <em>bad</em> (A&lt;0), the clip does <em>not</em> fire: hard suppression of a bad action is always allowed. This asymmetry is what gives PPO its one-sided trust-region character.</figcaption>
</figure>
