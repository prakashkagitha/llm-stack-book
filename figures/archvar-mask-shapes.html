<figcaption><b>Three canonical T x T attention mask shapes define every architecture family.</b> Panel A (encoder/BERT): all cells filled — every token attends every other token. Panel B (decoder/GPT): lower-triangular — token i sees only positions 0..i, blocking the future. Panel C (prefix-LM): a hybrid where the top-left prefix block (orange border) is fully bidirectional while the generated positions below follow the causal constraint.</figcaption>
