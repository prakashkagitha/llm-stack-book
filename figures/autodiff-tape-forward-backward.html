</svg>
<figcaption><b>The tape in two phases: forward builds the graph, backward propagates VJPs.</b> During the forward pass (blue, left-to-right) each operation is appended to the tape and stashes the activations it will need — W for MatMul, z for ReLU, h for Linear, logits for CE Loss. During the backward pass (orange, right-to-left) the engine traverses the tape in reverse, applying the VJP rule <b>x&#772; = ȳᵀ J</b> at every node; MatMul yields two gradient branches: dL/dx back to the input and dL/dW to the weight matrix.</figcaption>
</figure>
