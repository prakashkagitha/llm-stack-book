<figure class="viz" id="fig-prefixcache-refcount-sharing">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 960 660" role="img" aria-label="Reference-count timeline: two requests share read-only cached sys-prompt blocks; ref count rises to 2 when both are active and drops back to 0 as each completes, making the blocks eligible for LRU eviction.">
<defs>
  <marker id="rc-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <marker id="rc-ptr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
  </marker>
  <marker id="rc-ptr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>
<style>
  #fig-prefixcache-refcount-sharing text { fill: var(--ink-soft,#45413a); font: 400 12px var(--sans,sans-serif); }
  #fig-prefixcache-refcount-sharing .sec-title { font: 600 12px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-refcount-sharing .lane-a-lbl { font: 600 12px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-prefixcache-refcount-sharing .lane-b-lbl { font: 600 12px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
  #fig-prefixcache-refcount-sharing .shared-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-prefixcache-refcount-sharing .tick-lbl { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-refcount-sharing .annot { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-refcount-sharing .annot-b { font: 600 10px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-prefixcache-refcount-sharing .cow { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-refcount-sharing .callout-box { fill: var(--surface,#ffffff); }

  @media (prefers-reduced-motion: reduce) {
    #fig-prefixcache-refcount-sharing [data-anim] { opacity: 1 !important; }
  }
</style>




<line x1="50" y1="36" x2="825" y2="36" stroke="var(--ink-soft,#45413a)" stroke-width="1.5" marker-end="url(#rc-arrow)"/>
<text x="50" y="28" class="sec-title">Time (left to right)</text>


<line x1="200" y1="36" x2="200" y2="520" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="370" y1="36" x2="370" y2="520" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="570" y1="36" x2="570" y2="520" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="740" y1="36" x2="740" y2="520" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>


<text x="200" y="50" text-anchor="middle" class="tick-lbl">t1: A arrives</text>
<text x="370" y="50" text-anchor="middle" class="tick-lbl">t2: B arrives</text>
<text x="570" y="50" text-anchor="middle" class="tick-lbl">t3: A completes</text>
<text x="740" y="50" text-anchor="middle" class="tick-lbl">t4: B completes</text>


<g data-anim="1">

  <rect x="55" y="64" width="152" height="72" rx="8" fill="var(--accent,#c15b39)" fill-opacity="0.15" stroke="var(--accent,#c15b39)" stroke-width="2"/>
  <text x="131" y="88" text-anchor="middle" class="shared-lbl">Block 0 (sys_prompt)</text>
  <text x="131" y="104" text-anchor="middle" class="annot" style="fill:var(--accent,#c15b39)">read-only / cached</text>
  <text x="131" y="118" text-anchor="middle" class="annot" style="fill:var(--accent,#c15b39)">KV tensors on GPU</text>

  <rect x="219" y="64" width="152" height="72" rx="8" fill="var(--accent,#c15b39)" fill-opacity="0.15" stroke="var(--accent,#c15b39)" stroke-width="2"/>
  <text x="295" y="88" text-anchor="middle" class="shared-lbl">Block 1 (sys_prompt)</text>
  <text x="295" y="104" text-anchor="middle" class="annot" style="fill:var(--accent,#c15b39)">read-only / cached</text>
  <text x="295" y="118" text-anchor="middle" class="annot" style="fill:var(--accent,#c15b39)">KV tensors on GPU</text>
</g>


<text x="58" y="155" class="annot" style="fill:var(--accent,#c15b39)">reads (shared)</text>

<g data-anim="2">
  <rect x="200" y="170" width="370" height="56" rx="8" fill="var(--accent,#c15b39)" fill-opacity="0.10" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <text x="360" y="192" text-anchor="middle" class="lane-a-lbl">Request A: system prompt + user query 1</text>
  <text x="360" y="208" text-anchor="middle" class="annot">consuming shared blocks 0 &amp; 1</text>

  <rect x="580" y="170" width="148" height="56" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="654" y="190" text-anchor="middle" class="annot-b">New blocks</text>
  <text x="654" y="204" text-anchor="middle" class="annot">(prefill + decode)</text>
  <text x="654" y="218" text-anchor="middle" class="annot">exclusive to A</text>

  <path d="M240,170 C240,147 131,147 131,136" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rc-ptr-a)"/>
  <path d="M330,170 C330,147 295,147 295,136" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rc-ptr-a)"/>
</g>


<text x="58" y="245" class="annot" style="fill:var(--accent2,#3b82f6)">(shared, no recompute)</text>

<g data-anim="3">
  <rect x="370" y="256" width="370" height="56" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.10" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
  <text x="510" y="278" text-anchor="middle" class="lane-b-lbl">Request B: same system prompt, different query</text>
  <text x="510" y="294" text-anchor="middle" class="annot">reusing shared blocks 0 &amp; 1 (no recompute)</text>

  <rect x="750" y="256" width="148" height="56" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="824" y="276" text-anchor="middle" class="annot-b">New blocks</text>
  <text x="824" y="290" text-anchor="middle" class="annot">(prefill + decode)</text>
  <text x="824" y="304" text-anchor="middle" class="annot">exclusive to B</text>

  <path d="M420,256 C420,230 131,218 131,136" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rc-ptr-b)"/>
  <path d="M490,256 C490,235 295,223 295,136" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rc-ptr-b)"/>
</g>


<g data-anim="4">
  <text x="50" y="328" class="sec-title">ref_count on shared blocks:</text>


  <line x1="50" y1="520" x2="910" y2="520" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <line x1="50" y1="400" x2="50" y2="524" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>


  <text x="42" y="524" text-anchor="end" class="tick-lbl">0</text>
  <text x="42" y="469" text-anchor="end" class="tick-lbl">1</text>
  <text x="42" y="414" text-anchor="end" class="tick-lbl">2</text>


  <line x1="50" y1="465" x2="910" y2="465" stroke="var(--border-2,#d8d1c0)" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="50" y1="410" x2="910" y2="410" stroke="var(--border-2,#d8d1c0)" stroke-width="0.7" stroke-dasharray="3 3"/>



  <polyline points="50,520 200,520 200,465 370,465 370,410 570,410 570,465 740,465 740,520 910,520"
    fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.8"/>


  <polyline points="740,465 740,520 910,520"
    fill="none" stroke="var(--warn,#e0a106)" stroke-width="3.4"/>


  <rect x="378" y="348" width="184" height="34" rx="4" class="callout-box" fill-opacity="0.92" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="470" y="362" text-anchor="middle" class="annot-b" style="fill:var(--accent,#c15b39)">ref=2: A &amp; B read same blocks</text>
  <text x="470" y="376" text-anchor="middle" class="annot">read-only, no locks needed</text>
  <line x1="470" y1="382" x2="470" y2="410" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 2"/>


  <rect x="750" y="534" width="150" height="34" rx="4" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  <text x="825" y="548" text-anchor="middle" class="annot-b" style="fill:var(--warn,#e0a106)">ref_count = 0</text>
  <text x="825" y="562" text-anchor="middle" class="annot" style="fill:var(--warn,#e0a106)">eligible for LRU eviction</text>
  <line x1="825" y1="534" x2="825" y2="520" stroke="var(--warn,#e0a106)" stroke-width="1" stroke-dasharray="2 2"/>
</g>


<g data-anim="5">
  <rect x="50" y="584" width="860" height="54" rx="6" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="480" y="599" text-anchor="middle" class="cow">Copy-on-write: the shared prefix is read-only; each request writes its divergent suffix to fresh, exclusive blocks.</text>
  <text x="480" y="613" text-anchor="middle" class="cow">Blocks with ref_count &gt; 0 are never evicted even if LRU candidates; eviction eligibility begins only when ref drops to 0.</text>
  <text x="480" y="628" text-anchor="middle" class="cow">Concurrent reads require no locks: cached KV blocks are immutable after insertion into the cache.</text>
</g>
</svg>
<figcaption><b>Reference counting governs safe cross-request sharing of cached KV blocks.</b> Request A (orange) and Request B (blue) both point into the same read-only system-prompt blocks; the reference count peaks at 2 while both are in flight, drops to 1 when A finishes, and drops to 0 when B finishes. Only at ref_count = 0 do the blocks become eligible for LRU eviction. New (suffix) blocks are always exclusive to each request, implementing copy-on-write semantics.</figcaption>
</figure>
