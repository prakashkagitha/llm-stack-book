<figure class="viz" id="fig-prefixcache-refcount-sharing">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 960 520" role="img" aria-label="Reference-count timeline: two requests share read-only cached sys-prompt blocks; ref count rises to 2 when both are active and drops back to 0 as each completes, making the blocks eligible for LRU eviction.">
<defs>
  <marker id="rc-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <marker id="rc-ptr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
  </marker>
  <marker id="rc-ptr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>
<style>
  #fig-prefixcache-refcount-sharing text { fill: var(--ink-soft,#45413a); font: 400 12px var(--sans,sans-serif); }
  #fig-prefixcache-refcount-sharing .sec-title { font: 600 12px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-refcount-sharing .lane-a-lbl { font: 600 12px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-prefixcache-refcount-sharing .lane-b-lbl { font: 600 12px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
  #fig-prefixcache-refcount-sharing .shared-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-prefixcache-refcount-sharing .tick-lbl { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-refcount-sharing .annot { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-prefixcache-refcount-sharing .annot-b { font: 600 10px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-prefixcache-refcount-sharing .cow { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

  @media (prefers-reduced-motion: reduce) {
    #fig-prefixcache-refcount-sharing [data-anim] { opacity: 1 !important; }
  }
</style>




<line x1="50" y1="36" x2="825" y2="36" stroke="var(--ink-soft,#45413a)" stroke-width="1.5" marker-end="url(#rc-arrow)"/>
<text x="50" y="28" class="sec-title">Time (left to right)</text>


<line x1="200" y1="36" x2="200" y2="460" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="370" y1="36" x2="370" y2="460" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="570" y1="36" x2="570" y2="460" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="740" y1="36" x2="740" y2="460" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="4 3"/>


<text x="200" y="50" text-anchor="middle" class="tick-lbl">t1: A arrives</text>
<text x="370" y="50" text-anchor="middle" class="tick-lbl">t2: B arrives</text>
<text x="570" y="50" text-anchor="middle" class="tick-lbl">t3: A completes</text>
<text x="740" y="50" text-anchor="middle" class="tick-lbl">t4: B completes</text>


<g data-anim="1">
  
  <rect x="55" y="66" width="152" height="64" rx="8" fill="var(--accent,#c15b39)" fill-opacity="0.15" stroke="var(--accent,#c15b39)" stroke-width="2"/>
  <text x="131" y="90" text-anchor="middle" class="shared-lbl">Block 0 (sys_prompt)</text>
  <text x="131" y="105" text-anchor="middle" class="annot" style="fill:var(--accent,#c15b39)">read-only / cached</text>
  <text x="131" y="119" text-anchor="middle" class="annot" style="fill:var(--accent,#c15b39)">KV tensors on GPU</text>
  
  <rect x="219" y="66" width="152" height="64" rx="8" fill="var(--accent,#c15b39)" fill-opacity="0.15" stroke="var(--accent,#c15b39)" stroke-width="2"/>
  <text x="295" y="90" text-anchor="middle" class="shared-lbl">Block 1 (sys_prompt)</text>
  <text x="295" y="105" text-anchor="middle" class="annot" style="fill:var(--accent,#c15b39)">read-only / cached</text>
  <text x="295" y="119" text-anchor="middle" class="annot" style="fill:var(--accent,#c15b39)">KV tensors on GPU</text>
</g>


<g data-anim="2">
  <rect x="200" y="156" width="370" height="56" rx="8" fill="var(--accent,#c15b39)" fill-opacity="0.10" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <text x="360" y="178" text-anchor="middle" class="lane-a-lbl">Request A: system prompt + user query 1</text>
  <text x="360" y="194" text-anchor="middle" class="annot">consuming shared blocks 0 &amp; 1</text>
  
  <rect x="580" y="156" width="148" height="56" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="654" y="176" text-anchor="middle" class="annot-b">New blocks</text>
  <text x="654" y="190" text-anchor="middle" class="annot">(prefill + decode)</text>
  <text x="654" y="204" text-anchor="middle" class="annot">exclusive to A</text>
  
  <path d="M240,156 C240,138 131,138 131,130" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rc-ptr-a)"/>
  <path d="M330,156 C330,138 295,138 295,130" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rc-ptr-a)"/>
  <text x="165" y="143" class="annot" style="fill:var(--accent,#c15b39)">reads (shared)</text>
</g>


<g data-anim="3">
  <rect x="370" y="232" width="370" height="56" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.10" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
  <text x="510" y="254" text-anchor="middle" class="lane-b-lbl">Request B: same system prompt, different query</text>
  <text x="510" y="270" text-anchor="middle" class="annot">reusing shared blocks 0 &amp; 1 (no recompute)</text>
  
  <rect x="750" y="232" width="148" height="56" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="824" y="252" text-anchor="middle" class="annot-b">New blocks</text>
  <text x="824" y="266" text-anchor="middle" class="annot">(prefill + decode)</text>
  <text x="824" y="280" text-anchor="middle" class="annot">exclusive to B</text>
  
  <path d="M420,232 C420,210 131,200 131,130" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rc-ptr-b)"/>
  <path d="M490,232 C490,214 295,204 295,130" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#rc-ptr-b)"/>
  <text x="338" y="222" class="annot" style="fill:var(--accent2,#3b82f6)">(shared, no recompute)</text>
</g>


<g data-anim="4">
  <text x="50" y="340" class="sec-title">ref_count on shared blocks:</text>

  
  <line x1="50" y1="430" x2="830" y2="430" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <line x1="50" y1="310" x2="50" y2="434" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>

  
  <text x="42" y="433" text-anchor="end" class="tick-lbl">0</text>
  <text x="42" y="398" text-anchor="end" class="tick-lbl">1</text>
  <text x="42" y="362" text-anchor="end" class="tick-lbl">2</text>

  
  <line x1="50" y1="398" x2="830" y2="398" stroke="var(--border-2,#d8d1c0)" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="50" y1="362" x2="830" y2="362" stroke="var(--border-2,#d8d1c0)" stroke-width="0.7" stroke-dasharray="3 3"/>

  
  
  <polyline points="50,430 200,430 200,398 370,398 370,362 570,362 570,398 740,398 740,430 830,430"
    fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.5"/>

  
  <polyline points="740,398 740,430 830,430"
    fill="none" stroke="var(--warn,#e0a106)" stroke-width="3"/>

  
  <rect x="378" y="348" width="184" height="20" rx="4" fill="var(--surface,#ffffff)" fill-opacity="0.85" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="470" y="361" text-anchor="middle" class="annot-b" style="fill:var(--accent,#c15b39)">ref=2: A &amp; B read same blocks</text>
  <line x1="470" y1="368" x2="470" y2="362" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="470" y="386" text-anchor="middle" class="annot">read-only — no locks needed</text>

  
  <rect x="748" y="404" width="164" height="32" rx="4" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  <text x="830" y="418" text-anchor="middle" class="annot-b" style="fill:var(--warn,#e0a106)">ref_count = 0</text>
  <text x="830" y="430" text-anchor="middle" class="annot" style="fill:var(--warn,#e0a106)">eligible for LRU eviction</text>
</g>


<g data-anim="5">
  <rect x="50" y="454" width="900" height="54" rx="6" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="500" y="469" text-anchor="middle" class="cow">Copy-on-write: the shared prefix is read-only; each request writes its divergent suffix to fresh, exclusive blocks.</text>
  <text x="500" y="483" text-anchor="middle" class="cow">Blocks with ref_count &gt; 0 are never evicted even if LRU candidates; eviction eligibility begins only when ref drops to 0.</text>
  <text x="500" y="498" text-anchor="middle" class="cow">Concurrent reads require no locks — cached KV blocks are immutable after insertion into the cache.</text>
</g>
</svg>
<figcaption><b>Reference counting governs safe cross-request sharing of cached KV blocks.</b> Request A (orange) and Request B (blue) both point into the same read-only system-prompt blocks; the reference count peaks at 2 while both are in flight, drops to 1 when A finishes, and drops to 0 when B finishes. Only at ref_count = 0 do the blocks become eligible for LRU eviction. New (suffix) blocks are always exclusive to each request, implementing copy-on-write semantics.</figcaption>
</figure>
