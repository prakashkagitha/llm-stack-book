</svg>
<figcaption><b>Unified audio-vision-language model architecture.</b> Each modality follows its own encoder-plus-adapter lane — audio through Whisper + linear projection, vision through ViT + Q-Former — while text tokens flow directly into the merge bus. All three converge as token sequences into a shared LLM backbone whose unrestricted self-attention allows cross-modal reasoning across audio, visual, and textual context simultaneously.</figcaption>
</figure>
