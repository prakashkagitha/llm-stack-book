<figure class="viz" id="fig-contamination-severity-gradient">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 530" role="img" aria-label="A four-rung staircase from most to least severe contamination: verbatim memorization, near-verbatim, topic exposure, and format priming, with a left axis showing reasoning required increasing downward, a right axis showing detectability by 13-gram and canary overlap decreasing downward, and a bracket showing that only the top two rungs are reached by that detection.">

<style>
  #fig-contamination-severity-gradient text{ fill:var(--ink-soft,#374151); font-family:var(--sans,sans-serif); }
  #fig-contamination-severity-gradient .lead{ font:600 13px var(--sans,sans-serif); fill:var(--ink,#1f2933); }
  #fig-contamination-severity-gradient .axis-t{ font:700 10.5px var(--sans,sans-serif); fill:var(--muted,#6b7280); }
  #fig-contamination-severity-gradient .axis-e{ font:600 10px var(--sans,sans-serif); fill:var(--muted,#6b7280); }
  #fig-contamination-severity-gradient .rung-t{ font:700 12.5px var(--sans,sans-serif); fill:var(--ink,#1f2933); }
  #fig-contamination-severity-gradient .rung-d{ font:400 9.8px var(--sans,sans-serif); fill:var(--muted,#6b7280); }
  #fig-contamination-severity-gradient .frame-l{ font:600 9.5px var(--sans,sans-serif); fill:var(--muted,#6b7280); letter-spacing:.04em; }
  #fig-contamination-severity-gradient .brk-t{ font:700 9.6px var(--sans,sans-serif); fill:var(--accent,#c15b39); }
  #fig-contamination-severity-gradient .cap-t{ font:italic 400 9.6px var(--sans,sans-serif); fill:var(--muted,#6b7280); }
</style>

<defs>
  <marker id="csg-arr" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6b7280)"/>
  </marker>
</defs>

<text x="16" y="24" class="lead">Contamination severity falls off in four steps &#8212; cheap detection only reaches the top two</text>


<g data-anim="1">
  <text x="57" y="46" text-anchor="middle" class="axis-t">reasoning</text>
  <text x="57" y="58" text-anchor="middle" class="axis-t">still required</text>
  <line x1="57" y1="70" x2="57" y2="410" stroke="var(--muted,#6b7280)" stroke-width="1.6" marker-end="url(#csg-arr)"/>
  <text x="57" y="80" text-anchor="middle" class="axis-e">none</text>
  <text x="57" y="428" text-anchor="middle" class="axis-e">some</text>
</g>


<g data-anim="1">
  <text x="745" y="46" text-anchor="middle" class="axis-t">detectability</text>
  <text x="745" y="58" text-anchor="middle" class="axis-t">(13-gram / canary)</text>
  <line x1="745" y1="70" x2="745" y2="410" stroke="var(--muted,#6b7280)" stroke-width="1.6" marker-end="url(#csg-arr)"/>
  <text x="745" y="80" text-anchor="middle" class="axis-e">easy to catch</text>
  <text x="745" y="424" text-anchor="middle" class="axis-e">effectively</text>
  <text x="745" y="437" text-anchor="middle" class="axis-e">invisible</text>
</g>


<g data-anim="1">
  <text x="347" y="63" text-anchor="middle" class="frame-l">MOST SEVERE</text>
  <text x="420" y="425" text-anchor="middle" class="frame-l">LEAST SEVERE</text>
</g>


<g data-anim="2">
  <rect x="135" y="70" width="420" height="85" fill="var(--accent,#c15b39)" fill-opacity="0.30" stroke="var(--accent,#c15b39)" stroke-opacity="1" stroke-width="1.8"/>
  <circle cx="163" cy="99" r="6" fill="var(--accent,#c15b39)" fill-opacity="0.95"/>
  <text x="180" y="103" class="rung-t">Verbatim memorization</text>
  <text x="163" y="123" class="rung-d">exact training match; model retrieves</text>
  <text x="163" y="136" class="rung-d">the answer, zero reasoning</text>
</g>


<g data-anim="3">
  <rect x="185" y="155" width="370" height="85" fill="var(--accent,#c15b39)" fill-opacity="0.20" stroke="var(--accent,#c15b39)" stroke-opacity="0.72" stroke-width="1.8"/>
  <circle cx="213" cy="184" r="6" fill="var(--accent,#c15b39)" fill-opacity="0.68"/>
  <text x="230" y="188" class="rung-t">Near-verbatim</text>
  <text x="213" y="208" class="rung-d">slightly altered copy; small</text>
  <text x="213" y="221" class="rung-d">generalization still needed</text>
</g>


<g data-anim="4">
  <rect x="235" y="240" width="320" height="85" fill="var(--accent,#c15b39)" fill-opacity="0.12" stroke="var(--accent,#c15b39)" stroke-opacity="0.46" stroke-width="1.8"/>
  <circle cx="263" cy="269" r="6" fill="var(--accent,#c15b39)" fill-opacity="0.42"/>
  <text x="280" y="273" class="rung-t">Topic exposure</text>
  <text x="263" y="293" class="rung-d">domain / reasoning pattern seen,</text>
  <text x="263" y="306" class="rung-d">not the item; largely unavoidable</text>
  <text x="263" y="319" class="rung-d">&amp; arguably acceptable</text>
</g>


<g data-anim="5">
  <rect x="285" y="325" width="270" height="85" fill="var(--accent,#c15b39)" fill-opacity="0.06" stroke="var(--accent,#c15b39)" stroke-opacity="0.26" stroke-width="1.8"/>
  <circle cx="313" cy="354" r="6" fill="var(--accent,#c15b39)" fill-opacity="0.22"/>
  <text x="330" y="358" class="rung-t">Format priming</text>
  <text x="313" y="378" class="rung-d">model saw the benchmark SHAPE</text>
  <text x="313" y="391" class="rung-d">(e.g. 4-choice Q&amp;A); advantage</text>
  <text x="313" y="404" class="rung-d">unrelated to capability measured</text>
</g>


<g data-anim="5">
  <path d="M575 70 L588 70 L588 240 L575 240" fill="none" stroke="var(--muted,#6b7280)" stroke-width="1.8"/>
  <text x="597" y="143" class="brk-t">what n-gram +</text>
  <text x="597" y="156" class="brk-t">canary detection</text>
  <text x="597" y="169" class="brk-t">actually reaches</text>

  <line x1="588" y1="240" x2="588" y2="262" stroke="var(--muted,#6b7280)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="575" y="278" class="cap-t">a 13-gram-clean</text>
  <text x="575" y="291" class="cap-t">score can still be</text>
  <text x="575" y="304" class="cap-t">topic-exposed or</text>
  <text x="575" y="317" class="cap-t">format-primed.</text>
</g>

</svg>
<figcaption><b>Contamination isn't binary &#8212; it's a severity gradient, and cheap detection only reaches the top of it.</b> Verbatim and near-verbatim memorization are the two rungs that n-gram / canary overlap can actually catch; topic exposure and format priming can confer just as much unfair advantage but leave no trace those methods find. A 13-gram-clean score is evidence against the worst contamination, not proof the benchmark result is clean.</figcaption>
</figure>
