<figure class="viz" id="fig-mcts-four-phase-loop">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 520" role="img" aria-label="Cyclic process diagram of the four MCTS phases arranged clockwise: SELECT at top, EXPAND at right, SIMULATE at bottom, BACKPROP at left, with a center hub labeled MCTS Loop, and arrows showing the iterative sequential execution order.">
  <defs>
    <marker id="mcts-arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#94a3b8)"/>
    </marker>
    <marker id="mcts-arr-acc" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6366f1)"/>
    </marker>
  </defs>
  <style>
    #fig-mcts-four-phase-loop text        { fill: var(--ink-soft,#374151); }
    #fig-mcts-four-phase-loop .pt         { font: 700 14px var(--sans,sans-serif); }
    #fig-mcts-four-phase-loop .ps         { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-mcts-four-phase-loop .pm         { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
    #fig-mcts-four-phase-loop .hub-t      { font: 600 12px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-mcts-four-phase-loop .hub-s      { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
    #fig-mcts-four-phase-loop .arr-lbl    { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-mcts-four-phase-loop .acc-bar    { fill: var(--accent,#6366f1); }
    #fig-mcts-four-phase-loop .hl-overlay { opacity: 0; fill: var(--accent,#6366f1); }

    /* Animation keyframes */
    @keyframes mcts-sel { 0%,9%{opacity:0} 11%,23%{opacity:.18} 25%,100%{opacity:0} }
    @keyframes mcts-exp { 0%,32%{opacity:0} 34%,46%{opacity:.18} 48%,100%{opacity:0} }
    @keyframes mcts-sim { 0%,55%{opacity:0} 57%,69%{opacity:.18} 71%,100%{opacity:0} }
    @keyframes mcts-bck { 0%,74%{opacity:0} 76%,88%{opacity:.18} 90%,100%{opacity:0} }

    #fig-mcts-four-phase-loop.is-playing #hl-sel { animation: mcts-sel 4.8s linear infinite; }
    #fig-mcts-four-phase-loop.is-playing #hl-exp { animation: mcts-exp 4.8s linear infinite; }
    #fig-mcts-four-phase-loop.is-playing #hl-sim { animation: mcts-sim 4.8s linear infinite; }
    #fig-mcts-four-phase-loop.is-playing #hl-bck { animation: mcts-bck 4.8s linear infinite; }

    /* Traveling dot */
    @keyframes mcts-dot {
      0%   { cx:380; cy:116; }
      24%  { cx:622; cy:248; }
      49%  { cx:380; cy:402; }
      74%  { cx:138; cy:248; }
      100% { cx:380; cy:116; }
    }
    #fig-mcts-four-phase-loop.is-playing #mdot { animation: mcts-dot 4.8s linear infinite; }
  </style>

  

  
  <path d="M 524,116 C 580,116 622,180 622,222"
        fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"
        marker-end="url(#mcts-arr)"/>

  
  <path d="M 622,352 C 622,390 570,406 528,406"
        fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"
        marker-end="url(#mcts-arr)"/>

  
  <path d="M 232,406 C 190,406 138,390 138,352"
        fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"
        marker-end="url(#mcts-arr)"/>

  
  <path d="M 138,222 C 138,160 230,116 236,116"
        fill="none" stroke="var(--accent,#6366f1)" stroke-width="2"
        stroke-dasharray="6 4"
        marker-end="url(#mcts-arr-acc)"/>
  <text x="134" y="144" text-anchor="middle" class="arr-lbl">next</text>
  <text x="134" y="157" text-anchor="middle" class="arr-lbl">iteration</text>

  
  <circle id="mdot" cx="380" cy="68" r="7"
          fill="var(--accent,#6366f1)" fill-opacity="0.85"/>

  
  <rect x="278" y="214" width="204" height="68" rx="10"
        fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.4"/>
  <text x="380" y="240" text-anchor="middle" class="hub-t">MCTS Loop</text>
  <text x="380" y="256" text-anchor="middle" class="hub-s">repeat for budget</text>
  <text x="380" y="270" text-anchor="middle" class="hub-s">iterations</text>

  
  <g>
    <rect x="236" y="20" width="6" height="96" rx="3" fill="var(--accent,#6366f1)" class="acc-bar"/>
    <rect x="242" y="20" width="282" height="96" rx="8"
          fill="var(--surface,#f8fafc)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
    <rect id="hl-sel" x="242" y="20" width="282" height="96" rx="8"
          class="hl-overlay" opacity="0"/>
    <text x="383" y="46" text-anchor="middle" class="pt">1. SELECT</text>
    <text x="383" y="68" text-anchor="middle" class="ps">traverse tree via UCB1/PUCT policy</text>
    <text x="383" y="82" text-anchor="middle" class="ps">until a leaf or unexpanded node</text>
    <text x="383" y="100" text-anchor="middle" class="pm">balances exploration vs. exploitation</text>
  </g>

  
  <g>
    <rect x="500" y="196" width="6" height="156" rx="3" fill="var(--accent,#6366f1)" class="acc-bar"/>
    <rect x="506" y="196" width="242" height="156" rx="8"
          fill="var(--surface,#f8fafc)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
    <rect id="hl-exp" x="506" y="196" width="242" height="156" rx="8"
          class="hl-overlay" opacity="0"/>
    <text x="627" y="230" text-anchor="middle" class="pt">2. EXPAND</text>
    <text x="627" y="252" text-anchor="middle" class="ps">generate K children from</text>
    <text x="627" y="266" text-anchor="middle" class="ps">the leaf using the LM</text>
    <text x="627" y="280" text-anchor="middle" class="ps">as the policy network</text>
    <text x="627" y="306" text-anchor="middle" class="pm">branching factor K</text>
    <text x="627" y="320" text-anchor="middle" class="pm">exploration vs. coverage</text>
    <text x="627" y="334" text-anchor="middle" class="pm">trade-off</text>
  </g>

  
  <g>
    <rect x="158" y="406" width="6" height="90" rx="3" fill="var(--accent,#6366f1)" class="acc-bar"/>
    <rect x="164" y="406" width="364" height="90" rx="8"
          fill="var(--surface,#f8fafc)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
    <rect id="hl-sim" x="164" y="406" width="364" height="90" rx="8"
          class="hl-overlay" opacity="0"/>
    <text x="346" y="436" text-anchor="middle" class="pt">3. SIMULATE (evaluate)</text>
    <text x="346" y="455" text-anchor="middle" class="ps">roll out to a terminal state,</text>
    <text x="346" y="469" text-anchor="middle" class="ps">OR use PRM as value function (skip rollout)</text>
    <text x="346" y="487" text-anchor="middle" class="pm">PRM = faster; rollout = unbiased</text>
  </g>

  
  <g>
    <rect x="12" y="196" width="6" height="156" rx="3" fill="var(--accent,#6366f1)" class="acc-bar"/>
    <rect x="18" y="196" width="222" height="156" rx="8"
          fill="var(--surface,#f8fafc)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
    <rect id="hl-bck" x="18" y="196" width="222" height="156" rx="8"
          class="hl-overlay" opacity="0"/>
    <text x="129" y="230" text-anchor="middle" class="pt">4. BACKPROP</text>
    <text x="129" y="252" text-anchor="middle" class="ps">update visit counts N(s,a)</text>
    <text x="129" y="266" text-anchor="middle" class="ps">and values Q(s,a)</text>
    <text x="129" y="280" text-anchor="middle" class="ps">up the traversed path</text>
    <text x="129" y="306" text-anchor="middle" class="pm">focuses future SELECT</text>
    <text x="129" y="320" text-anchor="middle" class="pm">toward high-value branches</text>
    <text x="129" y="334" text-anchor="middle" class="pm">via updated Q estimates</text>
  </g>

</svg>
<figcaption><b>MCTS iterates four phases in sequence, repeating until the compute budget is exhausted.</b> <b>SELECT</b> descends the tree using UCB1/PUCT to balance exploration and exploitation; <b>EXPAND</b> calls the LM to generate K candidate next steps; <b>SIMULATE</b> scores the leaf via rollout or a PRM value function; <b>BACKPROP</b> updates visit counts and Q-values up the path. The dashed return arrow emphasizes the loop — more iterations focus search on the highest-value subtrees, making MCTS more sample-efficient than flat best-of-N sampling.</figcaption>
</figure>
