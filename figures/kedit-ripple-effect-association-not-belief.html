    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6366f1)"/>
  </marker>
  <marker id="rip-arr-mu" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

  </marker>
</defs>
<style>

  #fig-kedit-ripple-effect-association-not-belief .note { font: 500 9.5px var(--sans,sans-serif); }
  #fig-kedit-ripple-effect-association-not-belief .quote{ font: italic 500 11px var(--sans,sans-serif); }
  #fig-kedit-ripple-effect-association-not-belief .tag  { font: 800 11px var(--sans,sans-serif); }

  #fig-kedit-ripple-effect-association-not-belief .mu   { fill: var(--muted,#64748b); }
  #fig-kedit-ripple-effect-association-not-belief .ac   { fill: var(--accent,#6366f1); }

</style>

<text x="380" y="22" text-anchor="middle" class="ttl">One edge turned; the neighborhood stayed asleep</text>


<circle cx="330" cy="150" r="34" fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#334155)" stroke-width="1.6"/>
<text x="330" y="155" text-anchor="middle" class="hub">Messi</text>


<line x1="362" y1="140" x2="520" y2="90" stroke="var(--accent,#6366f1)" stroke-width="2.4" marker-end="url(#rip-arr-ac)"/>
<text x="430" y="103" text-anchor="middle" class="elbl ac">plays for</text>
<rect x="520" y="62" width="150" height="46" rx="8" fill="var(--accent,#6366f1)" fill-opacity="0.15" stroke="var(--accent,#6366f1)" stroke-width="1.6"/>
<text x="595" y="84" text-anchor="middle" class="node ac">Inter Miami</text>
<text x="595" y="98" text-anchor="middle" class="tag ac">EDITED</text>
<text x="595" y="46" text-anchor="middle" class="note mu strike">Barcelona</text>
<text x="686" y="80" class="note ac">1 direct</text>
<text x="686" y="92" class="note ac">association</text>


<line x1="595" y1="108" x2="595" y2="150" stroke="var(--border-2,#cbd5e1)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#rip-arr-mu)"/>
<text x="612" y="133" class="elbl mu">reverse lookup</text>
<rect x="500" y="150" width="210" height="46" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3"/>
<text x="510" y="172" class="node mu">Inter Miami #10 -&gt; ???</text>
<text x="510" y="187" class="flag wn">! still doesn't return Messi</text>


<line x1="358" y1="172" x2="600" y2="278" stroke="var(--border-2,#cbd5e1)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#rip-arr-mu)"/>
<text x="450" y="238" text-anchor="middle" class="elbl mu">league</text>
<rect x="520" y="280" width="190" height="46" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3"/>
<text x="530" y="302" class="node mu">-&gt; La Liga (Spain)</text>
<text x="530" y="317" class="flag wn">! should be MLS</text>


<line x1="298" y1="180" x2="171" y2="278" stroke="var(--border-2,#cbd5e1)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#rip-arr-mu)"/>
<text x="220" y="238" text-anchor="middle" class="elbl mu">country of work</text>
<rect x="76" y="280" width="190" height="46" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.3"/>
<text x="86" y="302" class="node mu">-&gt; Spain</text>
<text x="86" y="317" class="flag wn">! should be USA</text>


<rect x="30" y="390" width="700" height="112" rx="10" fill="var(--surface-3,#ece7da)" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
<text x="50" y="414" class="tag wn">CONTRADICTION</text>
<text x="50" y="440" class="quote">"Messi plays for Inter Miami."</text>
<text x="50" y="462" class="quote">"Messi plays in the Spanish league."</text>
<text x="50" y="485" class="note mu">The same model asserts both — the edited edge and the stale neighbor were never reconciled.</text>


<line x1="330" y1="184" x2="330" y2="360" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.7"/>
<line x1="330" y1="360" x2="330" y2="390" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.7" marker-end="url(#rip-arr-mu)"/>
<text x="338" y="350" class="note mu">both direct outputs of the</text>
<text x="338" y="363" class="note mu">same edited model</text>


<text x="380" y="525" text-anchor="middle" class="note mu">One edge turned. Every logical consequence left stale. An edit installs an association; a belief would update its neighbors too.</text>

</svg>
<figcaption><b>A rank-one edit flips one direct association but leaves the fact's logical neighborhood untouched.</b> Editing "Messi plays for" to Inter Miami (accent) changes only that single edge; the multi-hop consequents that should follow — his league, his country of work, even the reverse lookup from the new club back to him — stay stale (dashed, flagged), so the model happily asserts mutually contradictory facts. This is the RippleEdits finding: a surgical edit installs an association, not a belief that propagates to its neighbors.</figcaption>
</figure>
