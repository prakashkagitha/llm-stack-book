<figure class="viz" id="fig-trtllm-triton-serving-pipeline">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 640 730" role="img" aria-label="Top-to-bottom request flow: HTTP/gRPC client sends a request into Triton Inference Server (preprocessing, tensorrtllm model, postprocessing sub-models), which calls the TensorRT-LLM Executor that schedules batches on the compiled TensorRT engine on GPU.">
<defs>
  <marker id="tp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" class="v-stroke" fill="var(--ink-soft,#45413a)"/>
  </marker>
  
  <style>
    #fig-trtllm-triton-serving-pipeline text { fill: var(--ink-soft,#45413a); }
    #fig-trtllm-triton-serving-pipeline .title { font: 700 13px var(--sans,sans-serif); }
    #fig-trtllm-triton-serving-pipeline .sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-trtllm-triton-serving-pipeline .note { font: italic 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-trtllm-triton-serving-pipeline .note-sm { font: italic 400 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-trtllm-triton-serving-pipeline .edge-lbl { font: italic 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-trtllm-triton-serving-pipeline .gpu-title { font: 700 12px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-trtllm-triton-serving-pipeline .accent-title { font: 700 13px var(--sans,sans-serif); fill: var(--accent,#c15b39); }

    @keyframes tp-travel {
      0%   { transform: translateY(0px);   opacity: 0; }
      5%   { opacity: 1; }
      90%  { opacity: 1; }
      95%  { transform: translateY(590px); opacity: 0; }
      100% { transform: translateY(590px); opacity: 0; }
    }
    #fig-trtllm-triton-serving-pipeline .tp-dot {
      animation: tp-travel 3.2s ease-in-out infinite;
      transform-origin: 320px 105px;
    }
    #fig-trtllm-triton-serving-pipeline.paused .tp-dot { animation-play-state: paused; }
  </style>
</defs>


<rect x="200" y="24" width="240" height="54" rx="8"
      class="v-fill v-stroke" fill="var(--surface-3,#ece7da)" stroke="var(--ink-soft,#45413a)" stroke-width="1.5"/>
<text x="320" y="48" text-anchor="middle" class="title">Client (HTTP / gRPC)</text>
<text x="320" y="66" text-anchor="middle" class="sub">external caller</text>


<line x1="320" y1="78" x2="320" y2="110"
      stroke="var(--ink-soft,#45413a)" stroke-width="1.8" marker-end="url(#tp-arrow)" class="v-stroke"/>
<text x="336" y="98" class="edge-lbl">request</text>



<rect x="100" y="112" width="440" height="242" rx="10"
      class="v-fill v-stroke" fill="var(--surface-3,#ece7da)" stroke="var(--ink-soft,#45413a)" stroke-width="1.5"/>

<rect x="100" y="112" width="440" height="34" rx="10"
      fill="var(--accent,#c15b39)" opacity="0.15"/>
<rect x="100" y="130" width="440" height="28"
      fill="var(--accent,#c15b39)" opacity="0.15"/>
<text x="320" y="134" text-anchor="middle" style="font:700 13px var(--sans,sans-serif); fill:var(--accent,#c15b39);">Triton Inference Server</text>
<text x="320" y="146" text-anchor="middle" class="note-sm">HTTP/gRPC front-end / dynamic batching</text>
<text x="320" y="157" text-anchor="middle" class="note-sm">health checks / metrics</text>


<rect x="122" y="170" width="396" height="48" rx="6"
      class="v-fill v-stroke" fill="var(--surface,#fff)" stroke="var(--ink-soft,#45413a)" stroke-width="1.2"/>
<text x="320" y="191" text-anchor="middle" class="title">preprocessing model</text>
<text x="320" y="208" text-anchor="middle" class="sub">tokenization (Python backend)</text>


<rect x="122" y="226" width="396" height="48" rx="6"
      fill="var(--surface,#fff)" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
<text x="320" y="247" text-anchor="middle" class="accent-title">tensorrtllm model</text>
<text x="320" y="264" text-anchor="middle" class="sub">TRT-LLM engine backend</text>


<rect x="122" y="282" width="396" height="48" rx="6"
      class="v-fill v-stroke" fill="var(--surface,#fff)" stroke="var(--ink-soft,#45413a)" stroke-width="1.2"/>
<text x="320" y="303" text-anchor="middle" class="title">postprocessing model</text>
<text x="320" y="320" text-anchor="middle" class="sub">detokenization (Python backend)</text>


<line x1="320" y1="354" x2="320" y2="378"
      stroke="var(--ink-soft,#45413a)" stroke-width="1.8" marker-end="url(#tp-arrow)" class="v-stroke"/>
<text x="336" y="370" class="edge-lbl">GPU scheduling</text>


<rect x="130" y="380" width="380" height="72" rx="8"
      class="v-fill" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="2"/>
<text x="320" y="405" text-anchor="middle" class="accent-title">TensorRT-LLM Executor</text>
<text x="320" y="422" text-anchor="middle" class="sub">manages KV blocks,</text>
<text x="320" y="438" text-anchor="middle" class="sub">batches requests (in-flight batching)</text>


<line x1="320" y1="452" x2="320" y2="487"
      stroke="var(--ink-soft,#45413a)" stroke-width="1.8" marker-end="url(#tp-arrow)" class="v-stroke"/>


<rect x="110" y="489" width="420" height="130" rx="10"
      class="v-fill v-stroke" fill="var(--surface-3,#ece7da)" stroke="var(--ink-soft,#45413a)" stroke-width="1.5"/>
<text x="130" y="511" class="gpu-title">GPU</text>


<rect x="136" y="518" width="368" height="82" rx="7"
      fill="var(--surface,#fff)" stroke="var(--accent,#c15b39)" stroke-width="2"/>
<text x="320" y="549" text-anchor="middle" class="accent-title">compiled TensorRT engine</text>
<text x="320" y="568" text-anchor="middle" class="sub">pre-fused, hardware-specific kernels</text>
<text x="320" y="584" text-anchor="middle" class="sub">AOT-compiled for target GPU SKU</text>


<circle cx="320" cy="105" r="5" fill="var(--accent,#c15b39)" opacity="0.85" class="tp-dot"/>

</svg>
<figcaption><b>Serving a TensorRT-LLM engine via Triton Inference Server.</b> A client request enters Triton's HTTP/gRPC front-end and passes through three sub-models in sequence: a Python preprocessing model (tokenization), the TRT-LLM engine backend, and a Python postprocessing model (detokenization). The TensorRT-LLM Executor below Triton manages KV-cache blocks and in-flight batching before dispatching to the AOT-compiled TensorRT engine on the GPU.</figcaption>
</figure>
