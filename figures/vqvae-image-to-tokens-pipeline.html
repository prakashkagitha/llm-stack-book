<figcaption><b>VQ-VAE turns a continuous image into a flat sequence of integers by snapping every spatial feature to its nearest codebook vector.</b> The encoder produces a small grid of continuous features; each feature is replaced by the index of its closest entry in a learned codebook (argmin over Euclidean distance), yielding a grid of discrete indices that flattens row-major into a 1-D token sequence — a 256px image at downsampling factor 8 becomes 1024 tokens, about the length of a paragraph. The decoder half (bottom) is only used to train the codebook by reconstruction; it plays no role once the tokens feed a downstream autoregressive model.</figcaption>
