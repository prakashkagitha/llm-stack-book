<figure class="viz" id="fig-cuda-memory-hierarchy-bandwidth-latency">
<svg viewBox="0 0 760 480" role="img" aria-label="A100 GPU memory hierarchy: six levels from fastest (Register file ~20 TB/s ~1 cycle per-thread) at top to slowest (NVLink/PCIe ~600 GB/s to host) at bottom, with a dashed line separating on-chip from off-chip levels.">
<defs>
  <marker id="mh-up" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent,#c15b39)"/>
  </marker>
  <marker id="mh-dn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>
<style>
  #fig-cuda-memory-hierarchy-bandwidth-latency text   { fill: var(--ink-soft,#45413a); }
  #fig-cuda-memory-hierarchy-bandwidth-latency .name  { font: 700 12px var(--sans,sans-serif); }
  #fig-cuda-memory-hierarchy-bandwidth-latency .bw    { font: 700 11px var(--mono,monospace); }
  #fig-cuda-memory-hierarchy-bandwidth-latency .lat   { font: 500 10px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-cuda-memory-hierarchy-bandwidth-latency .axlbl { font: 600 11px var(--sans,sans-serif); }
  #fig-cuda-memory-hierarchy-bandwidth-latency .cliff { font: 700 10px var(--sans,sans-serif); }
  #fig-cuda-memory-hierarchy-bandwidth-latency .clfsub{ font: 400 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-cuda-memory-hierarchy-bandwidth-latency .foot  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-cuda-memory-hierarchy-bandwidth-latency .bdry  { font: 700 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
</style>


<line x1="18" y1="365" x2="18" y2="22"
      stroke="var(--accent,#c15b39)" stroke-width="2"
      marker-end="url(#mh-up)"/>
<text x="16" y="196" text-anchor="middle" class="axlbl" fill="var(--accent,#c15b39)"
      transform="rotate(-90,16,196)">faster / smaller / more private</text>


<line x1="742" y1="22" x2="742" y2="365"
      stroke="var(--muted,#6d675d)" stroke-width="2"
      marker-end="url(#mh-dn)"/>
<text x="744" y="196" text-anchor="middle" class="axlbl" fill="var(--muted,#6d675d)"
      transform="rotate(90,744,196)">slower / larger / more shared</text>




<rect x="236" y="22" width="288" height="44" rx="6"
      fill="var(--accent,#c15b39)" fill-opacity="0.22"
      stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
<rect x="240" y="30" width="66" height="18" rx="3"
      fill="var(--accent,#c15b39)" fill-opacity="0.52"/>
<text x="273" y="43" text-anchor="middle" class="bw" fill="var(--accent,#c15b39)">~20 TB/s</text>
<text x="415" y="39" text-anchor="middle" class="name">Register file</text>
<text x="415" y="53" text-anchor="middle" class="lat">~1 cycle  |  per thread, not addressable</text>


<rect x="202" y="78" width="356" height="44" rx="6"
      fill="var(--accent,#c15b39)" fill-opacity="0.14"
      stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
<rect x="206" y="86" width="66" height="18" rx="3"
      fill="var(--accent,#c15b39)" fill-opacity="0.36"/>
<text x="239" y="99" text-anchor="middle" class="bw" fill="var(--accent,#c15b39)">~19 TB/s</text>
<text x="407" y="95" text-anchor="middle" class="name">Shared memory</text>
<text x="407" y="110" text-anchor="middle" class="lat">~20 cycles  |  per block, programmer-managed</text>


<rect x="168" y="134" width="424" height="44" rx="6"
      fill="var(--accent2,#3b82f6)" fill-opacity="0.13"
      stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
<rect x="172" y="142" width="66" height="18" rx="3"
      fill="var(--accent2,#3b82f6)" fill-opacity="0.32"/>
<text x="205" y="155" text-anchor="middle" class="bw" fill="var(--accent2,#3b82f6)">~19 TB/s</text>
<text x="400" y="151" text-anchor="middle" class="name">L1 / Texture cache</text>
<text x="400" y="165" text-anchor="middle" class="lat">~30 cycles  |  per SM, automatic</text>


<line x1="108" y1="184" x2="652" y2="184"
      stroke="var(--border-2,#d8d1c0)" stroke-width="1.3" stroke-dasharray="6 4"/>

<rect x="318" y="178" width="124" height="14" rx="3"
      fill="var(--surface,#f8fafc)" fill-opacity="0.95"
      stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
<text x="380" y="189" text-anchor="middle" class="bdry">on-chip  |  off-chip</text>


<rect x="130" y="188" width="500" height="44" rx="6"
      fill="var(--surface-3,#ece7da)" fill-opacity="0.60"
      stroke="var(--muted,#6d675d)" stroke-width="1.6"/>
<rect x="134" y="196" width="62" height="18" rx="3"
      fill="var(--muted,#6d675d)" fill-opacity="0.28"/>
<text x="165" y="209" text-anchor="middle" class="bw" fill="var(--muted,#6d675d)">~4 TB/s</text>
<text x="397" y="205" text-anchor="middle" class="name">L2 cache</text>
<text x="397" y="220" text-anchor="middle" class="lat">~200 cycles  |  GPU-wide</text>


<rect x="94" y="244" width="572" height="44" rx="6"
      fill="var(--warn,#e0a106)" fill-opacity="0.12"
      stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
<rect x="98" y="252" width="62" height="18" rx="3"
      fill="var(--warn,#e0a106)" fill-opacity="0.38"/>
<text x="129" y="265" text-anchor="middle" class="bw" fill="var(--warn,#e0a106)">~2 TB/s</text>
<text x="397" y="261" text-anchor="middle" class="name">HBM (global memory)</text>
<text x="397" y="276" text-anchor="middle" class="lat">~800 cycles  |  DRAM, ~80 GB on A100-80GB</text>


<rect x="44" y="300" width="672" height="44" rx="6"
      fill="var(--surface,#f8fafc)" fill-opacity="0.40"
      stroke="var(--muted,#6d675d)" stroke-width="1.4" stroke-dasharray="5 3"/>
<rect x="48" y="308" width="70" height="18" rx="3"
      fill="var(--muted,#6d675d)" fill-opacity="0.20"/>
<text x="83" y="321" text-anchor="middle" class="bw" fill="var(--muted,#6d675d)">~600 GB/s</text>
<text x="397" y="317" text-anchor="middle" class="name">NVLink / PCIe</text>
<text x="397" y="332" text-anchor="middle" class="lat">multi-us latency  |  to other GPUs / host CPU</text>


<rect x="598" y="136" width="136" height="44" rx="5"
      fill="var(--surface,#ffffff)" fill-opacity="0.94"
      stroke="var(--warn,#e0a106)" stroke-width="1.2" stroke-dasharray="3 2"/>
<text x="666" y="151" text-anchor="middle" class="cliff" fill="var(--warn,#e0a106)">~5x BW drop</text>
<text x="666" y="163" text-anchor="middle" class="clfsub">19 TB/s to 4 TB/s</text>
<text x="666" y="174" text-anchor="middle" class="clfsub">on-chip to off-chip</text>

<line x1="598" y1="158" x2="592" y2="158"
      stroke="var(--warn,#e0a106)" stroke-width="1" stroke-dasharray="3 2"/>


<rect x="598" y="224" width="136" height="44" rx="5"
      fill="var(--surface,#ffffff)" fill-opacity="0.94"
      stroke="var(--warn,#e0a106)" stroke-width="1.2" stroke-dasharray="3 2"/>
<text x="666" y="239" text-anchor="middle" class="cliff" fill="var(--warn,#e0a106)">~10x latency</text>
<text x="666" y="251" text-anchor="middle" class="clfsub">200 cyc to 800 cyc</text>
<text x="666" y="262" text-anchor="middle" class="clfsub">L2 to HBM</text>

<line x1="598" y1="244" x2="666" y2="244"
      stroke="var(--warn,#e0a106)" stroke-width="1" stroke-dasharray="3 2"/>


<text x="380" y="368" text-anchor="middle" class="foot">A100 figures; order-of-magnitude estimates. On-chip (top 3) vs off-chip (bottom 3).</text>
<text x="380" y="382" text-anchor="middle" class="foot">Key: maximise reuse in shared memory and registers to avoid costly HBM round-trips.</text>

</svg>
<figcaption><b>A100 GPU memory hierarchy: bandwidth, latency, and scope across six levels.</b> The pyramid narrows toward the top encoding speed and capacity simultaneously — registers are fast and tiny (per-thread), HBM is slow and large (GPU-wide, ~80 GB). The dashed line marks the on-chip/off-chip boundary where bandwidth drops ~5x and latency jumps ~10x. The key design principle is to maximise reuse in shared memory and registers before touching HBM.</figcaption>
</figure>
