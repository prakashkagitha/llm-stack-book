<figcaption><b>The residual stream is an additive, shared communication bus.</b> Every sub-layer reads the current vector and adds its contribution back — nothing is ever overwritten — and attention (orange) is the <em>only</em> sub-layer that exchanges information across token positions; MLPs act strictly within a position. The blue channel makes the deeper point concrete: <code>Attn_0</code> writes into a subspace <code>v</code> of the stream, the intervening <code>MLP_0</code> and <code>Attn_1</code> leave it untouched, and <code>MLP_1</code> reads it back out — a <b>virtual weight</b> connecting two components that share no weight matrix, only the bus between them.</figcaption>
