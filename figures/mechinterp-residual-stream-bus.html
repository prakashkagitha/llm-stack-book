<figcaption><b>The residual stream is an additive, shared communication bus.</b> Every sub-layer reads the current vector and adds its contribution back — nothing is ever overwritten — so the state at any layer is the running sum of all prior contributions. Attention (highlighted in orange) is the <em>only</em> sub-layer that exchanges information across token positions; MLP sub-layers operate strictly within each position.</figcaption>
</figure>
