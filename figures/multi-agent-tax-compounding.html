<figure class="viz" id="fig-multi-agent-tax-compounding">
<svg viewBox="0 0 780 480" role="img" aria-label="Comparison of a single agent, which can self-correct because a contradiction is visible in one context, versus a four-stage pipeline where forwarded context grows at every handoff and an early wrong claim is passed unchanged as ground truth to every later stage.">
  <defs>
    <marker id="tax-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#555)"/>
    </marker>
    <marker id="tax-arr-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--warn,#e0a106)"/>
    </marker>
  </defs>
  <style>
    #fig-multi-agent-tax-compounding text {
      font: 400 11px var(--sans,sans-serif);
      fill: var(--ink-soft,#333);
    }
    #fig-multi-agent-tax-compounding .h2 {
      font: 700 13px var(--sans,sans-serif);
      fill: var(--ink-soft,#333);
    }
    #fig-multi-agent-tax-compounding .sub {
      font: 400 10px var(--sans,sans-serif);
      fill: var(--muted,#666);
    }
    #fig-multi-agent-tax-compounding .stage-lbl {
      font: 700 11px var(--sans,sans-serif);
      fill: var(--ink-soft,#333);
    }
    #fig-multi-agent-tax-compounding .mono-sm {
      font: 400 9px var(--mono,monospace);
      fill: var(--muted,#666);
    }
    #fig-multi-agent-tax-compounding .cap {
      font: 400 10px var(--sans,sans-serif);
      fill: var(--muted,#666);
    }
  </style>

  
  <g data-anim="1">
    <text x="14" y="24" class="h2">Baseline: single agent</text>

    <rect x="14" y="34" width="230" height="70" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-opacity="0.7" stroke-width="1.2"/>
    <text x="129" y="52" text-anchor="middle" class="stage-lbl">single agent</text>

    
    <rect x="30" y="60" width="60" height="14" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.25" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
    <text x="60" y="70" text-anchor="middle" class="mono-sm">system</text>
    <rect x="94" y="60" width="120" height="14" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
    <text x="154" y="70" text-anchor="middle" class="mono-sm">task context</text>

    <text x="129" y="92" text-anchor="middle" class="sub">one self-contained context</text>

    
    <path d="M 260 55 C 300 55 300 95 260 95" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.6" marker-end="url(#tax-arr)"/>
    <rect x="280" y="34" width="330" height="70" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.08" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1.2"/>
    <text x="295" y="55" class="sub" fill="var(--good,#2f9e6e)" font-weight="600">can self-correct:</text>
    <text x="295" y="70" class="sub" fill="var(--good,#2f9e6e)" font-weight="600">a contradiction is visible</text>
    <text x="295" y="85" class="sub" fill="var(--good,#2f9e6e)" font-weight="600">within one context</text>
  </g>

  <line x1="14" y1="122" x2="766" y2="122" stroke="var(--border-2,#ccc)" stroke-opacity="0.5" stroke-width="1"/>

  
  <text x="14" y="146" class="h2" data-anim="2">Pipeline: four sequential stages</text>

  
  <g data-anim="2">
    
    
    
    <rect x="20" y="160" width="150" height="30" rx="6" class="v-fill" stroke="var(--border-2,#bbb)" stroke-width="1.2"/>
    <text x="95" y="180" text-anchor="middle" class="stage-lbl">Stage 1</text>

    
    <rect x="210" y="160" width="150" height="30" rx="6" class="v-fill" stroke="var(--border-2,#bbb)" stroke-width="1.2"/>
    <text x="285" y="180" text-anchor="middle" class="stage-lbl">Stage 2</text>

    
    <rect x="400" y="160" width="150" height="30" rx="6" class="v-fill" stroke="var(--border-2,#bbb)" stroke-width="1.2"/>
    <text x="475" y="180" text-anchor="middle" class="stage-lbl">Stage 3</text>

    
    <rect x="590" y="160" width="150" height="30" rx="6" class="v-fill" stroke="var(--border-2,#bbb)" stroke-width="1.2"/>
    <text x="665" y="180" text-anchor="middle" class="stage-lbl">Stage 4</text>

    
    <line x1="170" y1="175" x2="206" y2="175" stroke="var(--ink-soft,#555)" stroke-width="1.6" marker-end="url(#tax-arr)"/>
    <line x1="360" y1="175" x2="396" y2="175" stroke="var(--ink-soft,#555)" stroke-width="1.6" marker-end="url(#tax-arr)"/>
    <line x1="550" y1="175" x2="586" y2="175" stroke="var(--ink-soft,#555)" stroke-width="1.6" marker-end="url(#tax-arr)"/>
  </g>

  
  <g data-anim="3">
    <text x="20" y="212" class="sub" font-weight="700">1. Token growth - input paid at each stage</text>

    
    <rect x="20" y="220" width="150" height="16" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.28" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
    <text x="95" y="232" text-anchor="middle" class="mono-sm">system</text>
    <text x="95" y="248" text-anchor="middle" class="mono-sm">forwarded: 0 blocks</text>

    
    <rect x="210" y="220" width="150" height="16" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.28" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
    <text x="285" y="232" text-anchor="middle" class="mono-sm">system</text>
    <rect x="210" y="238" width="150" height="14" rx="2" fill="var(--accent,#c15b39)" fill-opacity="0.20" stroke="var(--accent,#c15b39)" stroke-width="1"/>
    <text x="285" y="249" text-anchor="middle" class="mono-sm">fwd x1</text>
    <text x="285" y="266" text-anchor="middle" class="mono-sm">forwarded: 1 block</text>

    
    <rect x="400" y="220" width="150" height="16" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.28" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
    <text x="475" y="232" text-anchor="middle" class="mono-sm">system</text>
    <rect x="400" y="238" width="150" height="14" rx="2" fill="var(--accent,#c15b39)" fill-opacity="0.20" stroke="var(--accent,#c15b39)" stroke-width="1"/>
    <rect x="400" y="254" width="150" height="14" rx="2" fill="var(--accent,#c15b39)" fill-opacity="0.20" stroke="var(--accent,#c15b39)" stroke-width="1"/>
    <text x="475" y="265" text-anchor="middle" class="mono-sm">fwd x2</text>
    <text x="475" y="282" text-anchor="middle" class="mono-sm">forwarded: 2 blocks</text>

    
    <rect x="590" y="220" width="150" height="16" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.28" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
    <text x="665" y="232" text-anchor="middle" class="mono-sm">system</text>
    <rect x="590" y="238" width="150" height="14" rx="2" fill="var(--accent,#c15b39)" fill-opacity="0.20" stroke="var(--accent,#c15b39)" stroke-width="1"/>
    <rect x="590" y="254" width="150" height="14" rx="2" fill="var(--accent,#c15b39)" fill-opacity="0.20" stroke="var(--accent,#c15b39)" stroke-width="1"/>
    <rect x="590" y="270" width="150" height="14" rx="2" fill="var(--accent,#c15b39)" fill-opacity="0.20" stroke="var(--accent,#c15b39)" stroke-width="1"/>
    <text x="665" y="281" text-anchor="middle" class="mono-sm">fwd x3</text>
    <text x="665" y="298" text-anchor="middle" class="mono-sm">forwarded: 3 blocks</text>

    <text x="20" y="318" class="sub">overhead paid at every boundary - system prompt repeats, forwarded context accretes</text>
  </g>

  
  <g data-anim="4">
    <text x="20" y="350" class="sub" font-weight="700">2. Error amplification - one wrong claim, carried unchanged</text>

    
    <g>
      
      <rect x="30" y="362" width="130" height="26" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.14" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
      <text x="95" y="379" text-anchor="middle" class="mono-sm" fill="var(--warn,#e0a106)" font-weight="700">! wrong claim</text>

      <line x1="160" y1="375" x2="220" y2="375" stroke="var(--warn,#e0a106)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#tax-arr-warn)"/>

      <rect x="220" y="362" width="130" height="26" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.14" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
      <text x="285" y="379" text-anchor="middle" class="mono-sm" fill="var(--warn,#e0a106)" font-weight="700">! wrong claim</text>

      <line x1="350" y1="375" x2="410" y2="375" stroke="var(--warn,#e0a106)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#tax-arr-warn)"/>

      <rect x="410" y="362" width="130" height="26" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.14" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
      <text x="475" y="379" text-anchor="middle" class="mono-sm" fill="var(--warn,#e0a106)" font-weight="700">! wrong claim</text>

      <line x1="540" y1="375" x2="600" y2="375" stroke="var(--warn,#e0a106)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#tax-arr-warn)"/>

      <rect x="600" y="362" width="130" height="26" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.14" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
      <text x="665" y="379" text-anchor="middle" class="mono-sm" fill="var(--warn,#e0a106)" font-weight="700">! wrong claim</text>
    </g>

    <text x="20" y="410" class="sub">treated as ground truth downstream - no cross-context contradiction to catch it</text>
  </g>

  
  <g data-anim="5">
    <rect x="14" y="424" width="752" height="42" rx="7" class="v-fill" stroke="var(--border-2,#ccc)" stroke-opacity="0.6" stroke-width="1"/>
    <text x="390" y="443" text-anchor="middle" class="cap" font-weight="600">Two costs compound across boundaries: tokens (overhead + growing context)</text>
    <text x="390" y="457" text-anchor="middle" class="cap" font-weight="600">and undetected errors.</text>
  </g>
</svg>
<figcaption><b>A single agent can self-correct within one context; a multi-stage pipeline pays for that decomposition twice over.</b> Every handoff repeats the system-prompt overhead and adds another block of forwarded context, while an early wrong claim rides unchanged through every later stage because no downstream agent has the original context needed to contradict it.</figcaption>
</figure>
