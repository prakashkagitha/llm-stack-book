</style>

<figcaption><b>Per-tensor vs. blockwise FP8 scaling: outlier containment.</b> Under per-tensor scaling (left), a single large value forces a tiny global scale that collapses all 16 tiles' values into the bottom two FP8 codes. Under DeepSeek-V3's 128×128 blockwise scaling (right), the same outlier is confined to tile s₁₁; the remaining 15 tiles retain their own amax and scale, preserving full FP8 resolution—the key reason fine-grained scaling made full-FP8 training of a 671B-parameter model feasible.</figcaption>
</figure>
