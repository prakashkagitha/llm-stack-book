<figure class="viz" id="fig-triton-pointer-block-arithmetic">
<style>
  #fig-triton-pointer-block-arithmetic .title { font: 700 14px var(--sans,sans-serif); }
  #fig-triton-pointer-block-arithmetic .panel-label { font: 600 11.5px var(--sans,sans-serif); }
  #fig-triton-pointer-block-arithmetic .formula { font: 600 12px var(--mono,monospace); }
  #fig-triton-pointer-block-arithmetic .cell-label { font: 600 9.5px var(--mono,monospace); }
  #fig-triton-pointer-block-arithmetic .idx-label { font: 700 10.5px var(--mono,monospace); }
  #fig-triton-pointer-block-arithmetic .annot { font: 500 9.5px var(--mono,monospace); }
  #fig-triton-pointer-block-arithmetic .caption-strip { font: 600 11.5px var(--sans,sans-serif); }
  #fig-triton-pointer-block-arithmetic .small-note { font: 500 10px var(--sans,sans-serif); }
  #fig-triton-pointer-block-arithmetic text { fill: var(--ink-soft); }
</style>
<svg viewBox="0 0 800 500" role="img" aria-label="Two panels: left shows how a base pointer plus row and column arange vectors and strides build a 2-D tile of memory addresses; right shows the same tile overhanging the matrix edge, with out-of-bounds lanes masked off.">
  <defs>
    <marker id="tpba-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1.5 L8 5 L0 8.5 z" fill="var(--accent)"/>
    </marker>
    <pattern id="tpba-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="var(--surface,#f8f9fa)"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="var(--muted)" stroke-width="1.5" opacity="0.6"/>
    </pattern>
  </defs>

  
  <text x="205" y="24" text-anchor="middle" class="title">building the tile of addresses</text>
  <text x="595" y="24" text-anchor="middle" class="title">the mask for the ragged tail</text>

  
  <line x1="400" y1="36" x2="400" y2="410" stroke="var(--border-2,#cbd5e1)" stroke-width="1" opacity="0.5"/>

  
  <g transform="translate(24,42)">
    
    <rect x="0" y="0" width="352" height="42" rx="6" fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
    <text x="10" y="17" class="formula">ptrs = base + row[:,None]*stride_m</text>
    <text x="10" y="33" class="formula">              + col[None,:]*stride_n</text>

    
    <text x="0" y="60" class="panel-label" fill="var(--muted)">matrix, row-major, stride_m=4, stride_n=1</text>

    
    <text x="0" y="76" class="annot" fill="var(--accent)">base_ptr -&gt; element (0,0)</text>

    
    <g transform="translate(70,90)">
      <text x="14" y="0" text-anchor="middle" class="idx-label" fill="var(--accent)">0</text>
      <text x="42" y="0" text-anchor="middle" class="idx-label" fill="var(--accent)">1</text>
      <text x="70" y="0" text-anchor="middle" class="idx-label" fill="var(--accent)">2</text>
      <text x="118" y="0" class="annot" fill="var(--muted)">col = tl.arange(0,3)</text>
    </g>

    
    <g transform="translate(70,100)">
      
      <text x="-14" y="14+18" text-anchor="middle" class="idx-label" fill="var(--accent)">0</text>
      <text x="-14" y="42+18" text-anchor="middle" class="idx-label" fill="var(--accent)">1</text>
      <text x="-14" y="70+18" text-anchor="middle" class="idx-label" fill="var(--accent)">2</text>
      <text x="-14" y="98+18" text-anchor="middle" class="idx-label" fill="var(--accent)">3</text>
      <text x="-46" y="140" class="annot" fill="var(--muted)">row =</text>
      <text x="-46" y="152" class="annot" fill="var(--muted)">tl.arange(0,4)</text>

      
      <line x1="-40" y1="-30" x2="4" y2="15" stroke="var(--accent)" stroke-width="2" marker-end="url(#tpba-arrow)"/>

      <g transform="translate(0,18)">
        
        <rect x="0" y="0" width="112" height="140" rx="4" fill="none" stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="3 3"/>

        
        <rect x="84" y="0" width="28" height="112" fill="var(--muted)" fill-opacity="0.12" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8" stroke-dasharray="2 2"/>
        <rect x="0" y="112" width="112" height="28" fill="var(--muted)" fill-opacity="0.12" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8" stroke-dasharray="2 2"/>
        <text x="98" y="60" text-anchor="middle" class="annot" fill="var(--muted)" transform="rotate(90 98 60)">rest of matrix</text>

        
        <rect x="0"  y="0"  width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="28" y="0"  width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="56" y="0"  width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="0"  y="28" width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="28" y="28" width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="56" y="28" width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="0"  y="56" width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="28" y="56" width="28" height="28" fill="var(--accent)" fill-opacity="0.34" stroke="var(--accent)" stroke-width="2"/>
        <rect x="56" y="56" width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="0"  y="84" width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="28" y="84" width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>
        <rect x="56" y="84" width="28" height="28" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1"/>

        
        <text x="14" y="17" text-anchor="middle" class="cell-label" opacity="0.85">0</text>
        <text x="42" y="17" text-anchor="middle" class="cell-label" opacity="0.85">1</text>
        <text x="70" y="17" text-anchor="middle" class="cell-label" opacity="0.85">2</text>
        <text x="14" y="45" text-anchor="middle" class="cell-label" opacity="0.85">4</text>
        <text x="42" y="45" text-anchor="middle" class="cell-label" opacity="0.85">5</text>
        <text x="70" y="45" text-anchor="middle" class="cell-label" opacity="0.85">6</text>
        <text x="14" y="73" text-anchor="middle" class="cell-label" opacity="0.85">8</text>
        <text x="42" y="73" text-anchor="middle" class="cell-label" fill="var(--accent)" font-weight="700">9</text>
        <text x="70" y="73" text-anchor="middle" class="cell-label" opacity="0.85">10</text>
        <text x="14" y="101" text-anchor="middle" class="cell-label" opacity="0.85">12</text>
        <text x="42" y="101" text-anchor="middle" class="cell-label" opacity="0.85">13</text>
        <text x="70" y="101" text-anchor="middle" class="cell-label" opacity="0.85">14</text>
      </g>
    </g>

    
    <g transform="translate(0,268)">
      <rect x="0" y="0" width="352" height="82" rx="6" fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
      <text x="10" y="17" class="annot" fill="var(--muted)">stride_m = 4 (elements/row), stride_n = 1</text>
      <text x="10" y="36" class="formula" fill="var(--ink-soft)">(0,0): base + 0*4 + 0*1 = base + 0</text>
      <text x="10" y="54" class="formula" fill="var(--accent)" font-weight="700">(2,1): base + 2*4 + 1*1 = base + 9</text>
      <text x="10" y="72" class="formula" fill="var(--ink-soft)">(3,2): base + 3*4 + 2*1 = base + 14</text>
    </g>
  </g>

  
  <g transform="translate(20,420)">
    <rect x="0" y="0" width="760" height="30" rx="6" fill="var(--accent)" fill-opacity="0.1" stroke="var(--accent)" stroke-opacity="0.35" stroke-width="1"/>
    <text x="380" y="20" text-anchor="middle" class="caption-strip" fill="var(--accent)">rows down, columns across; strides convert logical indices to memory offsets</text>
  </g>

  
  <g transform="translate(424,42)">
    <text x="0" y="0" class="panel-label" fill="var(--muted)">valid matrix: 5 rows x 4 cols</text>
    <text x="0" y="14" class="panel-label" fill="var(--muted)">tile: BLOCK_M=4, BLOCK_N=4 at row 2, col 1</text>
    <text x="0" y="28" class="panel-label" fill="var(--muted)">-- overhangs the bottom and right edges</text>

    <g transform="translate(20,44)">
      
      <rect x="0" y="0" width="112" height="140" rx="4" fill="var(--surface,#f8f9fa)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>

      
      <g transform="translate(28,56)">
        
        <rect x="0"  y="0" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="28" y="0" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="56" y="0" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="84" y="0" width="28" height="28" fill="url(#tpba-hatch)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="2 2"/>

        
        <rect x="0"  y="28" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="28" y="28" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="56" y="28" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="84" y="28" width="28" height="28" fill="url(#tpba-hatch)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="2 2"/>

        
        <rect x="0"  y="56" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="28" y="56" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="56" y="56" width="28" height="28" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="84" y="56" width="28" height="28" fill="url(#tpba-hatch)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="2 2"/>

        
        <rect x="0"  y="84" width="28" height="28" fill="url(#tpba-hatch)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="2 2"/>
        <rect x="28" y="84" width="28" height="28" fill="url(#tpba-hatch)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="2 2"/>
        <rect x="56" y="84" width="28" height="28" fill="url(#tpba-hatch)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="2 2"/>
        <rect x="84" y="84" width="28" height="28" fill="url(#tpba-hatch)" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="2 2"/>

        
        <rect x="0" y="0" width="112" height="112" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4 3" rx="3"/>
      </g>
    </g>

    
    <g transform="translate(20,230)">
      <rect x="0" y="0" width="16" height="16" fill="var(--accent)" fill-opacity="0.3" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="24" y="13" class="small-note">mask=True -&gt; loaded/stored normally</text>
    </g>
    <g transform="translate(20,252)">
      <rect x="0" y="0" width="16" height="16" fill="url(#tpba-hatch)" stroke="var(--muted)" stroke-width="1.2"/>
      <text x="24" y="13" class="small-note">mask=False -&gt; row&gt;=5 or col&gt;=4, skipped</text>
    </g>

    <g transform="translate(20,284)">
      <rect x="0" y="0" width="336" height="84" rx="6" fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
      <text x="10" y="17" class="formula" fill="var(--ink-soft)">mask = (row &lt; M) &amp; (col &lt; N)</text>
      <text x="10" y="35" class="annot" fill="var(--muted)">tl.load(ptrs, mask=mask, other=0.0)</text>
      <text x="10" y="55" class="small-note">masked lanes: skipped on store, or</text>
      <text x="10" y="71" class="small-note">filled with other= (0.0 add, -inf softmax)</text>
    </g>
  </g>
</svg>
<figcaption><b>A Triton pointer block is base_ptr plus a broadcast of two arange vectors scaled by the tensor's strides.</b> The mask (offset &lt; bound) is what keeps the same tile idiom correct when the block overhangs the ragged edge of a tensor that isn't an exact multiple of the block size.</figcaption>
</figure>
