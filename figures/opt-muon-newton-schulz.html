<figure class="viz" id="fig-opt-muon-newton-schulz">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 800 480" role="img" aria-label="Filmstrip of the Newton-Schulz iteration: the momentum matrix's singular-value spectrum starts spiky and low-rank at frame zero, then over five matmul-only iterations every singular value converges to one, shown by a dashed target line all bars reach; the final panel overlays the original spiky spectrum as a faint ghost behind the flattened result.">
<style>

  #fig-opt-muon-newton-schulz .small      { font: 500 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-opt-muon-newton-schulz .mono       { font: 600 8.5px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-opt-muon-newton-schulz .axis       { stroke: var(--border-2,#d8d1c0); stroke-width: 1.1; }
  #fig-opt-muon-newton-schulz .target     { stroke: var(--accent,#c15b39); stroke-width: 1.3; stroke-dasharray: 4 3; }

  #fig-opt-muon-newton-schulz .ghost      { fill: none; stroke: var(--muted,#6d675d); stroke-width: 1; stroke-dasharray: 2 2; opacity: 0.65; }
  #fig-opt-muon-newton-schulz .arrow      { font: 700 15px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-opt-muon-newton-schulz .takebox    { fill: var(--surface-3,#ece7da); fill-opacity: 0.4; stroke: var(--border-2,#d8d1c0); stroke-width: 1.1; }
</style>

<text x="18" y="22" class="ttl">Newton-Schulz: matmul-only iteration flattens the spectrum to 1</text>
<text x="18" y="39" class="sub">Each panel is the sorted singular-value spectrum of the momentum matrix; the dashed line is the target every singular value converges to.</text>

<text x="18" y="55" class="small" fill="var(--accent,#c15b39)">dashed line every panel shares: target, all singular values = 1</text>
<line class="target" x1="18" y1="180" x2="782" y2="180"/>

<g data-anim="1">
  <text x="18" y="72" class="hdr">Frame 0: X0 = M / ||M||_F</text>
  <line class="axis" x1="18" y1="260" x2="158" y2="260"/>
  <rect class="bar" x="28"  y="132" width="10" height="128"/>
  <rect class="bar" x="43"  y="156" width="10" height="104"/>
  <rect class="bar" x="58"  y="188" width="10" height="72"/>
  <rect class="bar" x="73"  y="216" width="10" height="44"/>
  <rect class="bar" x="88"  y="236" width="10" height="24"/>
  <rect class="bar" x="103" y="248" width="10" height="12"/>
  <rect class="bar" x="118" y="255" width="10" height="5"/>

  <text x="33"  y="270" text-anchor="middle" class="mono">s1</text>
  <text x="138" y="270" text-anchor="middle" class="mono">s8</text>
  <text x="18" y="286" class="small">momentum is low-rank:</text>
  <text x="18" y="298" class="small" font-weight="700">a few directions carry the energy</text>
</g>

<g data-anim="2">
  <text x="166" y="196" text-anchor="middle" class="arrow">-&gt;</text>
  <text x="174" y="72" class="hdr">k = 1</text>
  <line class="axis" x1="174" y1="260" x2="314" y2="260"/>
  <rect class="bar" x="184" y="144" width="10" height="116"/>
  <rect class="bar" x="199" y="156" width="10" height="104"/>
  <rect class="bar" x="214" y="172" width="10" height="88"/>
  <rect class="bar" x="229" y="192" width="10" height="68"/>
  <rect class="bar" x="244" y="208" width="10" height="52"/>
  <rect class="bar" x="259" y="224" width="10" height="36"/>
  <rect class="bar" x="274" y="236" width="10" height="24"/>
  <rect class="bar" x="289" y="244" width="10" height="16"/>
  <text x="174" y="320" class="small">iteration: matmul-only</text>
  <text x="174" y="332" class="small">(X X^T then polynomial)</text>
</g>

<g data-anim="3">
  <text x="322" y="196" text-anchor="middle" class="arrow">-&gt;</text>
  <text x="330" y="72" class="hdr">k = 2</text>
  <line class="axis" x1="330" y1="260" x2="470" y2="260"/>
  <rect class="bar" x="340" y="156" width="10" height="104"/>
  <rect class="bar" x="355" y="164" width="10" height="96"/>
  <rect class="bar" x="370" y="168" width="10" height="92"/>
  <rect class="bar" x="385" y="176" width="10" height="84"/>
  <rect class="bar" x="400" y="184" width="10" height="76"/>
  <rect class="bar" x="415" y="192" width="10" height="68"/>
  <rect class="bar" x="430" y="200" width="10" height="60"/>
  <rect class="bar" x="445" y="208" width="10" height="52"/>
  <text x="330" y="320" class="small">runs at full GPU</text>
  <text x="330" y="332" class="small">throughput in bf16</text>
</g>

<g data-anim="4">
  <text x="478" y="196" text-anchor="middle" class="arrow">-&gt;</text>
  <text x="486" y="72" class="hdr">k = 3</text>
  <line class="axis" x1="486" y1="260" x2="626" y2="260"/>
  <rect class="bar" x="496" y="168" width="10" height="92"/>
  <rect class="bar" x="511" y="172" width="10" height="88"/>
  <rect class="bar" x="526" y="174" width="10" height="86"/>
  <rect class="bar" x="541" y="176" width="10" height="84"/>
  <rect class="bar" x="556" y="180" width="10" height="80"/>
  <rect class="bar" x="571" y="184" width="10" height="76"/>
  <rect class="bar" x="586" y="188" width="10" height="72"/>
  <rect class="bar" x="601" y="192" width="10" height="68"/>
  <text x="486" y="320" class="small">small values rise, any</text>
  <text x="486" y="332" class="small">overshoot settles</text>

<g data-anim="5">
  <text x="634" y="196" text-anchor="middle" class="arrow">-&gt;</text>
  <text x="642" y="72" class="hdr" fill="var(--accent,#c15b39)">k = 5 (final)</text>
  <line class="axis" x1="642" y1="260" x2="782" y2="260"/>

  <rect class="ghost" x="652" y="132" width="10" height="128"/>
  <rect class="ghost" x="667" y="156" width="10" height="104"/>
  <rect class="ghost" x="682" y="188" width="10" height="72"/>
  <rect class="ghost" x="697" y="216" width="10" height="44"/>
  <rect class="ghost" x="712" y="236" width="10" height="24"/>
  <rect class="ghost" x="727" y="248" width="10" height="12"/>
  <rect class="ghost" x="742" y="255" width="10" height="5"/>
  <rect class="ghost" x="757" y="258" width="10" height="2"/>

  <rect class="abar" x="652" y="180" width="10" height="80"/>
  <rect class="abar" x="667" y="180" width="10" height="80"/>
  <rect class="abar" x="682" y="180" width="10" height="80"/>
  <rect class="abar" x="697" y="180" width="10" height="80"/>
  <rect class="abar" x="712" y="180" width="10" height="80"/>
  <rect class="abar" x="727" y="180" width="10" height="80"/>
  <rect class="abar" x="742" y="180" width="10" height="80"/>
  <rect class="abar" x="757" y="180" width="10" height="80"/>

  <text x="642" y="286" class="small" fill="var(--accent,#c15b39)">singular values -&gt; 1:</text>
  <text x="642" y="298" class="small" fill="var(--accent,#c15b39)" font-weight="700">spectrally uniform</text>
  <text x="642" y="310" class="small">(dashed = before, frame 0)</text>

  <text x="18" y="356" class="small">Directions U, V^T are unchanged across iterations -- only the magnitudes (singular values) move toward 1.</text>
  <text x="18" y="370" class="small">Coefficients (a,b,c) approx (3.4445, -4.7750, 2.0315), tuned so ~5 iterations suffice.</text>

  <rect class="takebox" x="18" y="386" width="764" height="76" rx="8"/>
  <text x="34" y="408" class="hdr">Big takeaway</text>
  <text x="34" y="426" class="small" font-size="10.5">No SVD is ever computed. A fixed cubic polynomial in X, applied ~5 times, pushes every</text>
  <text x="34" y="442" class="small" font-size="10.5">singular value from a spiky, low-rank spectrum to <tspan font-weight="700" fill="var(--accent,#c15b39)">exactly 1</tspan> -- and every step is just matmuls, so it runs at full bf16 throughput.</text>
</g>

</svg>
<figcaption><b>Newton-Schulz replaces an SVD with ~5 matmul-only steps that push every singular value of the momentum matrix to 1.</b> Starting from a spiky, effectively low-rank spectrum (a few directions dominate), the cubic map <code>X &lt;- aX + b(XX^T)X + c(XX^T)^2X</code> is applied repeatedly until, by iteration 5, every singular value sits on the dashed target line; the directions (U, V^T) never change, only their magnitudes do, and because every step is a matrix multiply it runs at full GPU throughput in bf16.</figcaption>
</figure>
