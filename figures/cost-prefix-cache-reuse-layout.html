<figure class="viz" id="fig-cost-prefix-cache-reuse-layout">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 780 400" role="img" aria-label="Two prompt layouts compared: a stable-first layout puts the long unchanging system-prompt-plus-context segment before the short variable user message, so the cache breakpoint falls late and most of the KV cache is reused at roughly 10 percent of input price; a variable-first layout puts the variable segment early, so the cache breakpoint falls early and almost all tokens must be recomputed at full price.">

<style>
  #fig-cost-prefix-cache-reuse-layout text { font: 500 12px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-cost-prefix-cache-reuse-layout .title { font: 700 13px var(--sans,sans-serif); fill: var(--ink,#211f1b); }
  #fig-cost-prefix-cache-reuse-layout .seg-lbl { font: 600 11px var(--sans,sans-serif); }
  #fig-cost-prefix-cache-reuse-layout .seg-sub { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-cost-prefix-cache-reuse-layout .kv-lbl { font: 700 11px var(--sans,sans-serif); }
  #fig-cost-prefix-cache-reuse-layout .brk-lbl { font: 600 10px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-cost-prefix-cache-reuse-layout .cap { font: 400 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-cost-prefix-cache-reuse-layout .cap-b { font: 700 11.5px var(--sans,sans-serif); fill: var(--ink,#211f1b); }
  #fig-cost-prefix-cache-reuse-layout .reused { fill: var(--good,#2f9e6e); fill-opacity: 0.28; stroke: var(--good,#2f9e6e); }
  #fig-cost-prefix-cache-reuse-layout .neutral { fill: var(--surface-3,#ece7da); stroke: var(--border-2,#d8d1c0); }
  #fig-cost-prefix-cache-reuse-layout .prefix-seg { fill: var(--accent,#c15b39); fill-opacity: 0.22; stroke: var(--accent,#c15b39); }
  #fig-cost-prefix-cache-reuse-layout .var-seg { fill: var(--surface-3,#ece7da); stroke: var(--border-2,#d8d1c0); }
  #fig-cost-prefix-cache-reuse-layout .brk-line { stroke: var(--ink-soft,#45413a); stroke-width: 1.6; stroke-dasharray: 5 4; }
</style>


<g data-anim="1">
  <text x="16" y="24" class="title">Stable-first (cache-friendly)</text>

  
  <rect x="16" y="34" width="500" height="42" rx="4" class="prefix-seg" stroke-width="1.5"/>
  <text x="266" y="52" text-anchor="middle" class="seg-lbl">stable prefix: system instructions + few-shot + retrieved context</text>
  <text x="266" y="67" text-anchor="middle" class="seg-sub">~2000 tokens</text>

  <rect x="516" y="34" width="130" height="42" rx="4" class="var-seg" stroke-width="1.5"/>
  <text x="581" y="52" text-anchor="middle" class="seg-lbl">variable:</text>
  <text x="581" y="67" text-anchor="middle" class="seg-lbl">user message</text>
  <text x="581" y="80" text-anchor="middle" class="seg-sub">~500 tokens</text>

  
  <line x1="516" y1="26" x2="516" y2="150" class="brk-line"/>
  <text x="516" y="18" text-anchor="middle" class="brk-lbl">cache breakpoint</text>

  
  <text x="16" y="98" class="seg-lbl">KV cache:</text>

  <rect x="16" y="106" width="500" height="34" rx="4" class="reused" stroke-width="1.5"/>
  <text x="266" y="127" text-anchor="middle" class="kv-lbl" fill="var(--good,#2f9e6e)">reused KV — billed ~10% of input price</text>

  <rect x="516" y="106" width="130" height="34" rx="4" class="neutral" stroke-width="1.5"/>
  <text x="581" y="127" text-anchor="middle" class="seg-lbl">recomputed —</text>
  <text x="581" y="139" text-anchor="middle" class="seg-lbl">full price</text>
</g>


<line x1="16" y1="172" x2="764" y2="172" class="v-grid" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3"/>


<g data-anim="2">
  <text x="16" y="196" class="title">Variable-first (cache-hostile)</text>

  <rect x="16" y="206" width="130" height="42" rx="4" class="var-seg" stroke-width="1.5"/>
  <text x="81" y="224" text-anchor="middle" class="seg-lbl">variable:</text>
  <text x="81" y="239" text-anchor="middle" class="seg-lbl">user message</text>
  <text x="81" y="252" text-anchor="middle" class="seg-sub">~500 tokens</text>

  <rect x="162" y="206" width="500" height="42" rx="4" class="prefix-seg" stroke-width="1.5"/>
  <text x="412" y="224" text-anchor="middle" class="seg-lbl">stable content: system instructions + few-shot + retrieved context</text>
  <text x="412" y="239" text-anchor="middle" class="seg-sub">~2000 tokens</text>

  
  <line x1="146" y1="204" x2="146" y2="322" class="brk-line"/>
  <text x="172" y="264" text-anchor="start" class="brk-lbl">cache breakpoint (early!)</text>

  <text x="16" y="270" class="seg-lbl">KV cache:</text>

  <rect x="16" y="278" width="130" height="34" rx="4" class="reused" stroke-width="1.5"/>
  <text x="81" y="299" text-anchor="middle" class="kv-lbl" fill="var(--good,#2f9e6e)" font-size="9.5">tiny reuse</text>

  <rect x="162" y="278" width="500" height="34" rx="4" class="neutral" stroke-width="1.5"/>
  <text x="412" y="299" text-anchor="middle" class="seg-lbl">recomputed — full input price (almost the whole prompt)</text>
</g>


<g data-anim="3">
  <line x1="16" y1="326" x2="764" y2="326" class="v-grid" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="16" y="349" class="cap">
    <tspan class="cap-b">The cache hit begins at the first token that differs.</tspan>
  </text>
  <text x="16" y="368" class="cap">Everything before it is near-free; everything after is recomputed —</text>
  <text x="16" y="386" class="cap">so put the stable content on top.</text>
</g>

</svg>
<figcaption><b>Provider-side prompt-prefix caching reuses KV tensors only up to the first token that differs from a previous request.</b> Placing the stable content (system prompt, few-shot examples, retrieved context) first and the variable user message last maximizes the region billed at the cheap cached-read rate; interleaving or front-loading the variable part moves the cache breakpoint early and forces near-full-price recomputation of almost the whole prompt.</figcaption>
</figure>
