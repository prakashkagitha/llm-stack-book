<figure class="viz" id="fig-kedit-rome-memit-alphaedit-progression">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 820 650" role="img" aria-label="Progression diagram: ROME edits 1 fact in 1 layer with a rank-1 update; MEMIT extends to N facts across a band of layers with low-rank least-squares; AlphaEdit adds a null-space projection so the update stays orthogonal to preserved-fact keys, shown as a 2D vector-projection inset.">

  </marker>
  <marker id="rma-arr-mu" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">

  #fig-kedit-rome-memit-alphaedit-progression .ax    { font: 400 10px var(--sans,sans-serif); }

<text x="410" y="26" text-anchor="middle" class="title">One update rule, three scales</text>


<line x1="36" y1="50" x2="36" y2="636" stroke="var(--border-2,#cbd5e1)" stroke-width="1.4" stroke-dasharray="4 3"/>
<line x1="36" y1="158" x2="36" y2="178" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5" marker-end="url(#rma-arr)"/>

<rect x="240" y="64" width="72" height="22" rx="4"

<text x="276" y="79" text-anchor="middle" class="pt">1 fact</text>

<rect x="324" y="64" width="72" height="22" rx="4"

<text x="360" y="79" text-anchor="middle" class="pt">1 layer</text>

<rect x="408" y="64" width="108" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="462" y="79" text-anchor="middle" class="pt">rank-1 update</text>

<text x="170" y="114" class="verd mu">great for a single edit</text>
<text x="170" y="138" class="fml mu">delta = (v*-W0 k*)(C^-1 k*)^T / ((C^-1 k*)^T k*)</text>
</g>

<rect x="52" y="178" width="758" height="128" rx="8"

<g fill="var(--accent,#6366f1)" opacity="0.85">

  <circle cx="90" cy="213" r="2.6"/><circle cx="98" cy="213" r="2.6"/><circle cx="106" cy="213" r="2.6"/>
  <circle cx="90" cy="221" r="2.6"/><circle cx="98" cy="221" r="2.6"/><circle cx="106" cy="221" r="2.6"/>
</g>

<line x1="128" y1="190" x2="128" y2="294" stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>

<rect x="170" y="202" width="70" height="22" rx="5"

<text x="205" y="217" text-anchor="middle" class="chip ac">MEMIT</text>

<rect x="252" y="202" width="118" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="311" y="217" text-anchor="middle" class="pt">N facts (batch)</text>

<rect x="382" y="202" width="142" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="453" y="217" text-anchor="middle" class="pn ac">band of layers (3-8)</text>

<rect x="536" y="202" width="100" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="586" y="217" text-anchor="middle" class="pn ac">low-rank LSQ</text>

<text x="170" y="252" class="verd mu">thousands of edits in one batch</text>
<text x="170" y="286" class="fml mu">delta = R K1^T (C + K1 K1^T)^-1</text>
</g>



<g data-anim="3">
<rect x="52" y="326" width="758" height="310" rx="8"
      fill="var(--accent,#6366f1)" fill-opacity="0.13" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="52" y="326" width="9" height="310" rx="3" fill="var(--accent,#6366f1)"/>


<g fill="var(--accent,#6366f1)" opacity="0.85">
  <circle cx="94" cy="346" r="2"/><circle cx="102" cy="346" r="2"/><circle cx="94" cy="352" r="2"/><circle cx="102" cy="352" r="2"/>
  <circle cx="94" cy="365" r="2"/><circle cx="102" cy="365" r="2"/><circle cx="94" cy="371" r="2"/><circle cx="102" cy="371" r="2"/>
  <circle cx="94" cy="384" r="2"/><circle cx="102" cy="384" r="2"/><circle cx="94" cy="390" r="2"/><circle cx="102" cy="390" r="2"/>
</g>
<line x1="98" y1="356" x2="98" y2="361" stroke="var(--muted,#64748b)" stroke-width="1.2" marker-end="url(#rma-arr-mu)"/>
<line x1="98" y1="375" x2="98" y2="380" stroke="var(--muted,#64748b)" stroke-width="1.2" marker-end="url(#rma-arr-mu)"/>
<text x="98" y="406" text-anchor="middle" class="gl mu">batches over time</text>
<line x1="128" y1="338" x2="128" y2="428" stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>

<rect x="170" y="342" width="90" height="22" rx="5"
      fill="var(--accent,#6366f1)" fill-opacity="0.22" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<text x="215" y="357" text-anchor="middle" class="chip ac">AlphaEdit</text>

<rect x="270" y="342" width="100" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="320" y="357" text-anchor="middle" class="pt">MEMIT solve</text>
<rect x="380" y="342" width="190" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="475" y="357" text-anchor="middle" class="pn ac">+ null-space projection P</text>

<rect x="170" y="370" width="196" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="268" y="385" text-anchor="middle" class="pn ac">delta * K_preserved ~= 0</text>
<text x="384" y="385" class="verd mu">long sequential editing, less drift</text>

<text x="170" y="410" class="fml mu">delta_Alpha = P * delta_MEMIT</text>


<g data-anim="4">
<rect x="170" y="422" width="610" height="198" rx="7"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<text x="182" y="440" class="cap mu">Geometric view: projecting delta_MEMIT onto the null space of preserved keys</text>


<rect x="210" y="583" width="540" height="14" fill="var(--warn,#e0a106)" fill-opacity="0.10"/>
<line x1="210" y1="590" x2="750" y2="590" stroke="var(--warn,#e0a106)" stroke-width="1.2" opacity="0.55"/>
<text x="744" y="564" text-anchor="end" class="dl wn">preserved-key subspace</text>
<text x="744" y="577" text-anchor="end" class="gl mu">(old facts live here - must stay untouched)</text>


<line x1="250" y1="590" x2="250" y2="468" stroke="var(--good,#2f9e6e)" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.55"/>
<text x="196" y="480" class="dl gd">null-space direction</text>
<text x="196" y="492" class="gl mu">(edits are safe here)</text>


<path d="M242,590 L242,582 L250,582" fill="none" stroke="var(--muted,#64748b)" stroke-width="1"/>
<circle cx="250" cy="590" r="3" fill="var(--ink-soft,#334155)"/>

<text x="440" y="509" class="gl mu">(raw update, before projection)</text>


<line x1="250" y1="590" x2="250" y2="500" stroke="var(--good,#2f9e6e)" stroke-width="2.5" marker-end="url(#rma-arr-good)"
      class="viz-draw" style="--len:90"/>
<text x="256" y="510" class="dl gd">delta_Alpha</text>
<text x="256" y="522" class="gl mu">(kept: orthogonal to old facts)</text>
</g>
</g>

</svg>
<figcaption><b>ROME, MEMIT, and AlphaEdit share one closed-form locate-then-edit rule, each extending it for greater scale and robustness.</b> The left-edge glyphs mark the scale jump: one dot (ROME, a single edit), a grid of dots (MEMIT, a batch of N facts solved jointly), and stacked batches over time (AlphaEdit, sequential edits). The inset shows why AlphaEdit survives sequential editing: it decomposes the raw MEMIT update into a component that leaks into the preserved-key subspace (removed) and a component orthogonal to it, in the null space, that is kept — so the applied update literally cannot "talk to" old facts.</figcaption>
</figure>
