<figure class="viz" id="fig-kedit-rome-memit-alphaedit-progression">
<svg viewBox="0 0 820 450" role="img" aria-label="Progression diagram: ROME edits 1 fact in 1 layer with a rank-1 update; MEMIT extends to N facts across a band of layers with low-rank least-squares; AlphaEdit adds null-space projection for sequential robustness.">
<defs>
  <marker id="rma-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#cbd5e1)"/>
  </marker>
</defs>
<style>
  #fig-kedit-rome-memit-alphaedit-progression .title { font: 700 13px var(--sans,sans-serif); }
  #fig-kedit-rome-memit-alphaedit-progression .chip  { font: 800 12px var(--sans,sans-serif); }
  #fig-kedit-rome-memit-alphaedit-progression .pt    { font: 500 10px var(--sans,sans-serif); }
  #fig-kedit-rome-memit-alphaedit-progression .pn    { font: 700 10px var(--sans,sans-serif); }
  #fig-kedit-rome-memit-alphaedit-progression .verd  { font: italic 500 10.5px var(--sans,sans-serif); }
  #fig-kedit-rome-memit-alphaedit-progression .fml   { font: 400 9.5px var(--mono,monospace); }
  #fig-kedit-rome-memit-alphaedit-progression .ax    { font: 400 10px var(--sans,sans-serif); }
  #fig-kedit-rome-memit-alphaedit-progression text   { fill: var(--ink-soft,#334155); }
  #fig-kedit-rome-memit-alphaedit-progression .mu    { fill: var(--muted,#64748b); }
  #fig-kedit-rome-memit-alphaedit-progression .ac    { fill: var(--accent,#6366f1); }
</style>


<text x="440" y="26" text-anchor="middle" class="title">One update rule, three scales</text>


<line x1="36" y1="50" x2="36" y2="432" stroke="var(--border-2,#cbd5e1)" stroke-width="1.4" stroke-dasharray="4 3"/>
<line x1="36" y1="178" x2="36" y2="198" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5" marker-end="url(#rma-arr)"/>
<line x1="36" y1="312" x2="36" y2="332" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5" marker-end="url(#rma-arr)"/>
<text x="13" y="240" text-anchor="middle" transform="rotate(-90,13,240)" class="ax mu">increasing scale &amp; sequential robustness</text>


<rect x="52" y="48" width="758" height="130" rx="8"
      fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="52" y="48" width="5" height="130" rx="3" fill="var(--accent,#6366f1)"/>

<rect x="66" y="64" width="60" height="22" rx="5"
      fill="var(--accent,#6366f1)" fill-opacity="0.15" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<text x="96" y="79" text-anchor="middle" class="chip ac">ROME</text>

<rect x="136" y="64" width="72" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="172" y="79" text-anchor="middle" class="pt">1 fact</text>

<rect x="220" y="64" width="72" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="256" y="79" text-anchor="middle" class="pt">1 layer</text>

<rect x="304" y="64" width="108" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="358" y="79" text-anchor="middle" class="pt">rank-1 update</text>

<text x="66" y="114" class="verd mu">great for a single edit</text>
<text x="66" y="148" class="fml mu">delta = (v*-W0 k*)(C^-1 k*)^T / ((C^-1 k*)^T k*)</text>


<rect x="52" y="198" width="758" height="134" rx="8"
      fill="var(--accent,#6366f1)" fill-opacity="0.07" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="52" y="198" width="7" height="134" rx="3" fill="var(--accent,#6366f1)"/>

<rect x="66" y="214" width="70" height="22" rx="5"
      fill="var(--accent,#6366f1)" fill-opacity="0.18" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<text x="101" y="229" text-anchor="middle" class="chip ac">MEMIT</text>

<rect x="148" y="214" width="108" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="202" y="229" text-anchor="middle" class="pt">N facts (batch)</text>

<rect x="268" y="214" width="142" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="339" y="229" text-anchor="middle" class="pn ac">band of layers (3-8)</text>

<rect x="422" y="214" width="100" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="472" y="229" text-anchor="middle" class="pn ac">low-rank LSQ</text>

<text x="66" y="264" class="verd mu">thousands of edits in one batch</text>
<text x="66" y="298" class="fml mu">delta = R K1^T (C + K1 K1^T)^-1</text>


<rect x="52" y="332" width="758" height="118" rx="8"
      fill="var(--accent,#6366f1)" fill-opacity="0.13" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
<rect x="52" y="332" width="9" height="118" rx="3" fill="var(--accent,#6366f1)"/>

<rect x="66" y="346" width="90" height="22" rx="5"
      fill="var(--accent,#6366f1)" fill-opacity="0.22" stroke="var(--accent,#6366f1)" stroke-width="1.2"/>
<text x="111" y="361" text-anchor="middle" class="chip ac">AlphaEdit</text>

<rect x="166" y="346" width="100" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="216" y="361" text-anchor="middle" class="pt">MEMIT solve</text>
<rect x="278" y="346" width="184" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="370" y="361" text-anchor="middle" class="pn ac">+ null-space projection P</text>

<rect x="166" y="374" width="196" height="22" rx="4"
      fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
<text x="264" y="389" text-anchor="middle" class="pn ac">delta * K_preserved ~= 0</text>

<text x="374" y="389" class="verd mu">long sequential editing, less drift</text>
<text x="66" y="424" class="fml mu">delta_Alpha = P * delta_MEMIT</text>

</svg>
<figcaption><b>ROME, MEMIT, and AlphaEdit share one closed-form locate-then-edit rule, each extending it for greater scale.</b> ROME makes a rank-1 update to a single layer for one fact. MEMIT solves a low-rank least-squares update across a band of layers for thousands of facts at once. AlphaEdit adds a null-space projection (purple-bordered pills mark each tier's new ingredient) so updates leave preserved knowledge untouched, enabling robust long sequential editing.</figcaption>
</figure>
