<figure class="viz" id="fig-ageval-score-noise-band">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 560" role="img" aria-label="Two part figure. Top: a probability axis from 0.20 to 0.50 with Model A plotted at 0.40 and Model B at 0.37, each with a 95 percent confidence interval error bar of about plus or minus 0.04, showing the two error bars heavily overlapping, labeled the gap lives inside the noise. Bottom: a 2 by 2 concordance table of paired task outcomes with the both pass and both fail diagonal cells greyed out as uninformative, and the A only and B only off diagonal cells highlighted as the only cells McNemar's test examines.">
<style>
  #fig-ageval-score-noise-band text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-ageval-score-noise-band .v-fill { fill: var(--surface-3,#ece7da); }
  #fig-ageval-score-noise-band .hdr { font: 700 13px var(--sans,sans-serif); }
  #fig-ageval-score-noise-band .sub { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-ageval-score-noise-band .axis-lbl { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-ageval-score-noise-band .dot-lbl { font: 700 11.5px var(--sans,sans-serif); }
  #fig-ageval-score-noise-band .overlap-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-ageval-score-noise-band .cell-lbl { font: 700 12px var(--sans,sans-serif); }
  #fig-ageval-score-noise-band .cell-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-ageval-score-noise-band .footer-txt { font: 600 11.5px var(--sans,sans-serif); }
  #fig-ageval-score-noise-band .table-hdr { font: 700 11px var(--sans,sans-serif); }
  #fig-ageval-score-noise-band .diag-lbl { font: 700 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-ageval-score-noise-band .off-lbl { font: 700 10px var(--sans,sans-serif); fill: var(--accent-2,#b04e2d); }
</style>


<g data-anim="1">
  <text x="16" y="24" class="hdr">Point estimates lie: two solve rates on N=500 tasks</text>
  <text x="16" y="40" class="sub">p ~ 0.30 -&gt; SE ~ sqrt(p(1-p)/N) ~ 0.02 -&gt; 95% CI ~ +/-4 pts (illustrative)</text>
</g>


<g data-anim="1">
  <line x1="100" y1="150" x2="700" y2="150" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
  <line x1="100" y1="144" x2="100" y2="156" stroke="var(--v-stroke,#45413a)" stroke-width="1.2"/>
  <line x1="700" y1="144" x2="700" y2="156" stroke="var(--v-stroke,#45413a)" stroke-width="1.2"/>
  <text x="100" y="170" text-anchor="middle" class="axis-lbl">0.20</text>
  <text x="300" y="170" text-anchor="middle" class="axis-lbl">0.30</text>
  <text x="500" y="170" text-anchor="middle" class="axis-lbl">0.40</text>
  <text x="700" y="170" text-anchor="middle" class="axis-lbl">0.50</text>
  <line x1="300" y1="144" x2="300" y2="156" stroke="var(--v-grid,#d8d1c0)" stroke-width="1"/>
  <line x1="500" y1="144" x2="500" y2="156" stroke="var(--v-grid,#d8d1c0)" stroke-width="1"/>
</g>



<g data-anim="2">
  <rect x="420" y="76" width="80" height="24" rx="4" fill="var(--warn,#e0a106)" opacity="0.22"/>
  <text x="460" y="72" text-anchor="middle" class="overlap-lbl">the gap lives inside the noise</text>
</g>

<g data-anim="2">
  
  <line x1="420" y1="88" x2="580" y2="88" stroke="var(--accent,#c15b39)" stroke-width="2.4"/>
  <line x1="420" y1="82" x2="420" y2="94" stroke="var(--accent,#c15b39)" stroke-width="2"/>
  <line x1="580" y1="82" x2="580" y2="94" stroke="var(--accent,#c15b39)" stroke-width="2"/>
  <circle cx="500" cy="88" r="6" fill="var(--accent,#c15b39)"/>
  <text x="500" y="107" text-anchor="middle" class="dot-lbl">Model A: 0.40</text>

  
  <line x1="390" y1="112" x2="550" y2="112" stroke="var(--accent2,#3b82f6)" stroke-width="2.4"/>
  <line x1="390" y1="106" x2="390" y2="118" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
  <line x1="550" y1="106" x2="550" y2="118" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
  <circle cx="470" cy="112" r="6" fill="var(--accent2,#3b82f6)"/>
</g>
<g data-anim="2">
  <text x="470" y="134" text-anchor="middle" class="dot-lbl" fill="var(--accent2,#3b82f6)">Model B: 0.37</text>
</g>


<g data-anim="2" opacity="0.5">
  <line x1="500" y1="94" x2="500" y2="144" stroke="var(--border-2,#ccc)" stroke-dasharray="2 3" stroke-width="1"/>
  <line x1="470" y1="118" x2="470" y2="144" stroke="var(--border-2,#ccc)" stroke-dasharray="2 3" stroke-width="1"/>
</g>

<line x1="16" y1="200" x2="764" y2="200" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 4"/>


<g data-anim="3">
  <text x="16" y="228" class="hdr">Compare paired, not raw: same task set, cross-tabulated by A vs. B outcome</text>
  <text x="16" y="244" class="sub">McNemar's test asks only: of the tasks where A and B disagree, who wins more often?</text>
</g>



<g data-anim="3">
  <text x="330" y="270" text-anchor="middle" class="table-hdr">A passes</text>
  <text x="530" y="270" text-anchor="middle" class="table-hdr">A fails</text>
  <text x="150" y="320" text-anchor="middle" class="table-hdr">B passes</text>
  <text x="150" y="410" text-anchor="middle" class="table-hdr">B fails</text>
</g>


<g data-anim="4">
  <rect x="230" y="286" width="200" height="80" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.2" opacity="0.55"/>
  <text x="330" y="322" text-anchor="middle" class="cell-lbl" opacity="0.6">both pass</text>
  <text x="330" y="340" text-anchor="middle" class="diag-lbl">ignored -</text>
  <text x="330" y="352" text-anchor="middle" class="diag-lbl">no information</text>

  <rect x="430" y="376" width="200" height="80" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.2" opacity="0.55"/>
  <text x="530" y="412" text-anchor="middle" class="cell-lbl" opacity="0.6">both fail</text>
  <text x="530" y="430" text-anchor="middle" class="diag-lbl">ignored -</text>
  <text x="530" y="442" text-anchor="middle" class="diag-lbl">no information</text>
</g>


<g data-anim="5">
  <rect x="430" y="286" width="200" height="80" rx="8" fill="var(--accent-2,#b04e2d)" opacity="0.18" stroke="var(--accent-2,#b04e2d)" stroke-width="1.6"/>
  <text x="530" y="316" text-anchor="middle" class="cell-lbl" fill="var(--accent-2,#b04e2d)">A only</text>
  <text x="530" y="334" text-anchor="middle" class="off-lbl">A passes,</text>
  <text x="530" y="346" text-anchor="middle" class="off-lbl">B fails</text>

  <rect x="230" y="376" width="200" height="80" rx="8" fill="var(--accent-2,#b04e2d)" opacity="0.18" stroke="var(--accent-2,#b04e2d)" stroke-width="1.6"/>
  <text x="330" y="406" text-anchor="middle" class="cell-lbl" fill="var(--accent-2,#b04e2d)">B only</text>
  <text x="330" y="424" text-anchor="middle" class="off-lbl">B passes,</text>
  <text x="330" y="436" text-anchor="middle" class="off-lbl">A fails</text>
</g>

<g data-anim="5">
  <text x="650" y="316" class="cell-sub" text-anchor="start">McNemar looks ONLY</text>
  <text x="650" y="330" class="cell-sub" text-anchor="start">at these two cells:</text>
  <text x="650" y="344" class="cell-sub" text-anchor="start">the disagreements</text>
  <path d="M645 320 Q640 330 632 330" fill="none" stroke="var(--accent-2,#b04e2d)" stroke-width="1.2"/>
  <path d="M645 420 Q640 410 632 396" fill="none" stroke="var(--accent-2,#b04e2d)" stroke-width="1.2"/>
  <text x="650" y="405" class="cell-sub" text-anchor="start">(same two cells,</text>
  <text x="650" y="419" class="cell-sub" text-anchor="start">other diagonal)</text>
</g>

<g data-anim="5">
  <text x="330" y="472" text-anchor="middle" class="sub" font-weight="700">significance depends on A-only vs B-only, not on 0.40 vs 0.37</text>
</g>

<g data-anim="5">
  <rect x="16" y="494" width="748" height="52" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="390" y="516" text-anchor="middle" class="footer-txt">Report CIs and run a paired test (McNemar) on identical tasks;</text>
  <text x="390" y="534" text-anchor="middle" class="footer-txt">never compare two raw percentages.</text>
</g>

</svg>
<figcaption><b>A few-point score gap can sit entirely inside the confidence interval, and the right comparison ignores raw percentages in favor of paired disagreements.</b> With N=500 and p~0.30, a 95% CI of roughly +/-4 points means 0.40 vs. 0.37 heavily overlap; McNemar's test resolves this correctly by looking only at the tasks where the two models disagree (A-only, B-only), not the two agreement cells.</figcaption>
</figure>
