<figure class="viz" id="fig-lrsched-critical-batch-size">
<style>
  #fig-lrsched-critical-batch-size .lbl       { font: 600 12px var(--sans,sans-serif); }
  #fig-lrsched-critical-batch-size .tick-lbl  { font: 500 11px var(--mono,monospace); }
  #fig-lrsched-critical-batch-size .axis-lbl  { font: 600 13px var(--sans,sans-serif); }
  #fig-lrsched-critical-batch-size .regime-lbl{ font: 700 12px var(--sans,sans-serif); }
  #fig-lrsched-critical-batch-size .sub-lbl   { font: 500 11px var(--sans,sans-serif); }
  #fig-lrsched-critical-batch-size .annot     { font: 500 10.5px var(--mono,monospace); }
  #fig-lrsched-critical-batch-size text       { fill: var(--ink-soft,#64748b); }
  #fig-lrsched-critical-batch-size .muted-text{ fill: var(--muted,#94a3b8); }
  #fig-lrsched-critical-batch-size .accent-text{ fill: var(--accent,#6366f1); }
  #fig-lrsched-critical-batch-size .accent2-text{ fill: var(--accent2,#3b82f6); }
</style>
<svg viewBox="0 0 760 420" role="img" aria-label="Log-log schematic of steps-to-converge versus batch size, showing a linear speedup regime where doubling batch size halves steps, transitioning at critical batch size B-star to a saturated regime where adding batch size barely reduces steps.">
<defs>
  <marker id="cbs-arx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="cbs-ary" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="90">
    <path d="M0 9 L5 0 L10 9 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
</defs>


<rect x="80" y="50" width="300" height="310" fill="var(--accent,#6366f1)"  opacity="0.06" rx="2"/>
<rect x="380" y="50" width="340" height="310" fill="var(--accent2,#3b82f6)" opacity="0.06" rx="2"/>


<line x1="378" y1="325" x2="722" y2="325" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.4"/>
<text x="588" y="319" class="annot muted-text" text-anchor="middle">minimum steps (serial-time floor)</text>


<line x1="380" y1="50" x2="380" y2="368" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.45"/>


<line x1="80" y1="360" x2="80" y2="42" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#cbs-ary)"/>


<line x1="80" y1="360" x2="728" y2="360" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#cbs-arx)"/>


<text x="22" y="205" class="axis-lbl" text-anchor="middle" transform="rotate(-90,22,205)">Steps to converge</text>
<text x="38" y="222" class="annot muted-text" text-anchor="middle" transform="rotate(-90,38,222)">(log scale)</text>


<text x="555" y="393" class="axis-lbl" text-anchor="middle">Batch size B</text>
<text x="555" y="408" class="annot muted-text" text-anchor="middle">(log scale)</text>


<path
  d="M110,92 C175,92 255,148 338,214 C358,229 370,241 380,252
     C392,265 420,298 480,314 C540,322 625,326 720,327"
  stroke="var(--accent,#6366f1)"
  stroke-width="3"
  fill="none"
  stroke-linecap="round"
  stroke-linejoin="round"
/>


<circle cx="380" cy="252" r="5.5" fill="var(--surface,#fff)" stroke="var(--accent,#6366f1)" stroke-width="2.2"/>


<text x="380" y="377" class="lbl accent-text" text-anchor="middle">B*</text>
<text x="380" y="390" class="annot muted-text" text-anchor="middle">(critical batch size)</text>


<text x="228" y="142" class="regime-lbl accent-text" text-anchor="middle">Linear speedup regime</text>
<text x="228" y="158" class="sub-lbl muted-text" text-anchor="middle">B &lt;&lt; B_noise</text>


<line x1="115" y1="96" x2="370" y2="242" stroke="var(--ink-soft,#64748b)" stroke-width="1" stroke-dasharray="3 3" opacity="0.32"/>


<text x="552" y="198" class="regime-lbl accent2-text" text-anchor="middle">Saturated regime</text>
<text x="552" y="214" class="sub-lbl muted-text" text-anchor="middle">B &gt;&gt; B_noise</text>
<text x="552" y="231" class="sub-lbl muted-text" text-anchor="middle">more data per step wasted</text>

</svg>
<figcaption><b>Critical batch size separates two compute-efficiency regimes.</b> Below <i>B*</i> (the gradient-noise scale), doubling batch size roughly halves the steps needed, giving near-linear speedup. Above <i>B*</i>, gradient noise is already small and adding more samples per step yields diminishing returns — the curve flattens toward an irreducible serial-time floor. Exceeding <i>B*</i> wastes compute without proportionally reducing wall-clock time.</figcaption>
</figure>
