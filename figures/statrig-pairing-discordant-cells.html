<figure class="viz" id="fig-statrig-pairing-discordant-cells">
<svg viewBox="0 0 760 480" role="img" aria-label="A 2 by 2 contingency table of model A correct versus model B correct on the same 500 items. The concordant diagonal cells, both right at 372 items and both wrong at 38 items, are greyed out and carry no comparative signal. The off-diagonal discordant cells, A right and B wrong at 51 items and A wrong and B right at 33 items, are highlighted in accent color as the only items that vote on which model is better. A coin icon illustrates the McNemar intuition: under the null hypothesis each of the 84 discordant items is a fair coin flip, and 51 versus 33 is tested for being more lopsided than chance.">
  <style>
    #fig-statrig-pairing-discordant-cells text{ fill:var(--ink-soft); }
    #fig-statrig-pairing-discordant-cells .hdr{ font:700 13.5px var(--sans,sans-serif); }
    #fig-statrig-pairing-discordant-cells .sub{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-pairing-discordant-cells .axhd{ font:600 11.5px var(--sans,sans-serif); }
    #fig-statrig-pairing-discordant-cells .celln{ font:700 22px var(--mono,monospace); }
    #fig-statrig-pairing-discordant-cells .celllbl{ font:600 10.5px var(--sans,sans-serif); }
    #fig-statrig-pairing-discordant-cells .tag{ font:700 9.5px var(--sans,sans-serif); letter-spacing:.02em; }
    #fig-statrig-pairing-discordant-cells .note{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-statrig-pairing-discordant-cells .strip{ font:600 11.5px var(--sans,sans-serif); }
    #fig-statrig-pairing-discordant-cells .coinlbl{ font:600 10px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  <text x="14" y="24" class="hdr">Only the discordant cells carry comparative signal</text>
  <text x="14" y="40" class="sub">worked example from the text: 500-item paired eval, A = 82.6%, B = 79.0%</text>


  <text x="234" y="66" text-anchor="middle" class="axhd">B correct</text>
  <text x="404" y="66" text-anchor="middle" class="axhd">B wrong</text>

  <text x="146" y="150" text-anchor="middle" class="axhd" transform="rotate(-90 146 150)">A correct</text>
  <text x="146" y="292" text-anchor="middle" class="axhd" transform="rotate(-90 146 292)">A wrong</text>


  <rect x="164" y="78" width="140" height="140" rx="10" class="v-fill v-grid" stroke-width="1.2" opacity="0.55"/>
  <text x="234" y="140" text-anchor="middle" class="celln" style="fill:var(--muted)">372</text>
  <text x="234" y="162" text-anchor="middle" class="celllbl" style="fill:var(--muted)">both right</text>
  <text x="234" y="200" text-anchor="middle" class="tag" style="fill:var(--muted)">CONCORDANT</text>


  <rect x="334" y="220" width="140" height="140" rx="10" class="v-fill v-grid" stroke-width="1.2" opacity="0.55"/>
  <text x="404" y="282" text-anchor="middle" class="celln" style="fill:var(--muted)">38</text>
  <text x="404" y="304" text-anchor="middle" class="celllbl" style="fill:var(--muted)">both wrong</text>
  <text x="404" y="342" text-anchor="middle" class="tag" style="fill:var(--muted)">CONCORDANT</text>


  <rect x="334" y="78" width="140" height="140" rx="10" fill="none" stroke="var(--accent)" stroke-width="2.4"/>
  <text x="404" y="140" text-anchor="middle" class="celln" style="fill:var(--accent)">b = 51</text>
  <text x="404" y="162" text-anchor="middle" class="celllbl" style="fill:var(--accent)">A right, B wrong</text>
  <text x="404" y="200" text-anchor="middle" class="tag" style="fill:var(--accent)">DISCORDANT</text>

  <rect x="164" y="220" width="140" height="140" rx="10" fill="none" stroke="var(--accent)" stroke-width="2.4"/>
  <text x="234" y="282" text-anchor="middle" class="celln" style="fill:var(--accent)">c = 33</text>
  <text x="234" y="304" text-anchor="middle" class="celllbl" style="fill:var(--accent)">A wrong, B right</text>
  <text x="234" y="342" text-anchor="middle" class="tag" style="fill:var(--accent)">DISCORDANT</text>


  <line x1="164" y1="218" x2="474" y2="218" stroke="var(--v-grid)" stroke-width="1.4"/>
  <line x1="304" y1="78" x2="304" y2="360" stroke="var(--v-grid)" stroke-width="1.4"/>

  <text x="319" y="386" text-anchor="middle" class="note">concordant -- no comparative signal, discarded</text>
  <text x="319" y="403" text-anchor="middle" class="note" style="fill:var(--accent)">discordant -- the ONLY items that vote</text>


  <g transform="translate(552,148)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="var(--v-grid)" stroke-width="1.4"/>
    <line x1="-46" y1="0" x2="46" y2="0" stroke="var(--v-grid)" stroke-width="1"/>
    <text x="0" y="-58" text-anchor="middle" class="coinlbl">McNemar intuition</text>
    <text x="-5" y="6" text-anchor="end" style="font:700 13px var(--mono,monospace)" fill="var(--ink-soft)">H</text>
    <text x="-4" y="10" style="font:700 9px var(--mono,monospace)" fill="var(--ink-soft)">0</text>
    <text x="0" y="26" text-anchor="middle" style="font:600 10px var(--sans,sans-serif)" fill="var(--ink-soft)">fair coin</text>
    <text x="0" y="72" text-anchor="middle" class="coinlbl">84 discordant items,</text>
    <text x="0" y="88" text-anchor="middle" class="coinlbl">each a coin flip. Is</text>
    <text x="0" y="108" text-anchor="middle" style="font:700 12px var(--sans,sans-serif); fill:var(--accent)">51 vs 33</text>
    <text x="0" y="126" text-anchor="middle" class="coinlbl">more lopsided than</text>
    <text x="0" y="142" text-anchor="middle" class="coinlbl">chance allows?</text>
  </g>

  <rect x="14" y="440" width="732" height="32" rx="8" class="v-fill v-grid" stroke-width="1"/>
  <text x="380" y="461" text-anchor="middle" class="strip">pairing cancels the difficulty variance living in the diagonal -- worth a 4-10x larger unpaired test set</text>
</svg>
<figcaption><b>In a paired comparison, only the off-diagonal cells vote.</b> The 372 items both models got right and the 38 both got wrong (the diagonal) tell you nothing about which model is better -- they're discarded. McNemar's test looks only at the 51-vs-33 split of the 84 discordant items, asking whether that split is more lopsided than a fair coin would produce.</figcaption>
</figure>
