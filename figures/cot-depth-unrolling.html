<figure class="viz" id="fig-cot-depth-unrolling">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 430" role="img" aria-label="Left panel: a single forward pass through four stacked transformer layers L1 to L4 is a fixed-depth computation that emits one answer token. Right panel: chain-of-thought emits a growing sequence of steps s1, s2, s3, answer, each looping back into context and each later step attending to earlier steps, giving variable depth governed by trace length rather than layer count.">
<defs>
  <marker id="cdu-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-stroke-fill"/>
  </marker>
  <marker id="cdu-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-cot-depth-unrolling text { fill: var(--ink-soft,#374151); font: 400 12px var(--sans,sans-serif); }
  #fig-cot-depth-unrolling .panel-title { font: 700 14px var(--sans,sans-serif); fill: var(--ink-soft,#1f2937); }
  #fig-cot-depth-unrolling .layer-lbl   { font: 700 12px var(--mono,monospace); }
  #fig-cot-depth-unrolling .tok-lbl     { font: 600 11px var(--mono,monospace); }
  #fig-cot-depth-unrolling .ann-text    { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-cot-depth-unrolling .ann-text tspan.b { font-weight: 700; }
  #fig-cot-depth-unrolling .cap-box     { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-cot-depth-unrolling .v-stroke-fill { fill: var(--border-2,#94a3b8); }
  #fig-cot-depth-unrolling .layer-box   { fill: var(--surface,#f8fafc); stroke: var(--border-2,#94a3b8); stroke-width: 1.5; }
  #fig-cot-depth-unrolling .step-box    { fill: var(--surface,#f8fafc); stroke: var(--accent,#c15b39); stroke-width: 1.6; }
  #fig-cot-depth-unrolling .ans-box     { fill: var(--accent,#c15b39); stroke: var(--accent,#c15b39); stroke-width: 1.6; }
  #fig-cot-depth-unrolling .divider     { stroke: var(--border-2,#94a3b8); stroke-width: 1; stroke-dasharray: 3 4; opacity: 0.6; }
  #fig-cot-depth-unrolling .feedback    { fill: none; stroke: var(--accent,#c15b39); stroke-width: 1.6; }
  #fig-cot-depth-unrolling .attn        { fill: none; stroke: var(--accent2,#3b82f6); stroke-width: 1.3; stroke-dasharray: 3 3; opacity: 0.85; }
  #fig-cot-depth-unrolling [data-anim] { opacity: 0; animation: cdu-in .5s ease forwards; }
  #fig-cot-depth-unrolling [data-anim="1"] { animation-delay: .05s; }
  #fig-cot-depth-unrolling [data-anim="2"] { animation-delay: .35s; }
  #fig-cot-depth-unrolling [data-anim="3"] { animation-delay: .65s; }
  #fig-cot-depth-unrolling [data-anim="4"] { animation-delay: .95s; }
  #fig-cot-depth-unrolling [data-anim="5"] { animation-delay: 1.25s; }
  @keyframes cdu-in { to { opacity: 1; } }
  #fig-cot-depth-unrolling .viz-draw { stroke-dasharray: var(--len); stroke-dashoffset: var(--len); animation: cdu-draw 0.6s ease forwards; }
  @keyframes cdu-draw { to { stroke-dashoffset: 0; } }
</style>


<line x1="392" y1="14" x2="392" y2="368" class="divider"/>


<g data-anim="1">
  <text x="20" y="30" class="panel-title">Single forward pass = FIXED depth</text>

  
  <rect x="110" y="340" width="150" height="24" rx="5" class="v-fill" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#94a3b8)" stroke-width="1"/>
  <text x="185" y="356" text-anchor="middle" class="tok-lbl">input tokens</text>
  <line x1="185" y1="340" x2="185" y2="316" stroke="var(--border-2,#94a3b8)" stroke-width="1.6" marker-end="url(#cdu-arrow)"/>

  
  <rect x="120" y="272" width="130" height="40" rx="6" class="layer-box"/>
  <text x="185" y="297" text-anchor="middle" class="layer-lbl">L1</text>

  <rect x="120" y="224" width="130" height="40" rx="6" class="layer-box"/>
  <text x="185" y="249" text-anchor="middle" class="layer-lbl">L2</text>

  <rect x="120" y="176" width="130" height="40" rx="6" class="layer-box"/>
  <text x="185" y="201" text-anchor="middle" class="layer-lbl">L3</text>

  <rect x="120" y="128" width="130" height="40" rx="6" class="layer-box"/>
  <text x="185" y="153" text-anchor="middle" class="layer-lbl">L4</text>

  
  <line x1="185" y1="272" x2="185" y2="264" stroke="var(--border-2,#94a3b8)" stroke-width="1.6" marker-end="url(#cdu-arrow)"/>
  <line x1="185" y1="224" x2="185" y2="216" stroke="var(--border-2,#94a3b8)" stroke-width="1.6" marker-end="url(#cdu-arrow)"/>
  <line x1="185" y1="176" x2="185" y2="168" stroke="var(--border-2,#94a3b8)" stroke-width="1.6" marker-end="url(#cdu-arrow)"/>

  
  <line x1="185" y1="128" x2="185" y2="104" stroke="var(--border-2,#94a3b8)" stroke-width="1.6" marker-end="url(#cdu-arrow)"/>
  <rect x="130" y="76" width="110" height="26" rx="6" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>
  <text x="185" y="94" text-anchor="middle" class="tok-lbl">answer token</text>

  
  <line x1="266" y1="128" x2="266" y2="312" stroke="var(--muted,#6b7280)" stroke-width="1" opacity="0.6"/>
  <line x1="260" y1="128" x2="272" y2="128" stroke="var(--muted,#6b7280)" stroke-width="1" opacity="0.6"/>
  <line x1="260" y1="312" x2="272" y2="312" stroke="var(--muted,#6b7280)" stroke-width="1" opacity="0.6"/>
  <text x="280" y="215" class="ann-text">
    <tspan x="280" dy="0">depth capped at</tspan>
    <tspan x="280" dy="14">number of</tspan>
    <tspan x="280" dy="14">layers L</tspan>
  </text>
</g>


<g data-anim="2">
  <text x="20" y="398" class="cap-box">
    <tspan x="20" dy="0">A problem needing more steps than L layers cannot be solved,</tspan>
    <tspan x="20" dy="14">and the model can't look back to fix an early error.</tspan>
  </text>
</g>


<g data-anim="3">
  <text x="412" y="30" class="panel-title">Chain-of-thought = VARIABLE depth</text>

  
  <rect x="412" y="90" width="72" height="34" rx="7" class="step-box"/>
  <text x="448" y="111" text-anchor="middle" class="tok-lbl">s1</text>

  <rect x="522" y="90" width="72" height="34" rx="7" class="step-box"/>
  <text x="558" y="111" text-anchor="middle" class="tok-lbl">s2</text>

  <rect x="632" y="90" width="72" height="34" rx="7" class="step-box"/>
  <text x="668" y="111" text-anchor="middle" class="tok-lbl">s3</text>

  <line x1="484" y1="107" x2="516" y2="107" stroke="var(--border-2,#94a3b8)" stroke-width="1.6" marker-end="url(#cdu-arrow)"/>
  <line x1="594" y1="107" x2="626" y2="107" stroke="var(--border-2,#94a3b8)" stroke-width="1.6" marker-end="url(#cdu-arrow)"/>

  
  <rect x="632" y="190" width="88" height="34" rx="7" class="ans-box"/>
  <text x="676" y="211" text-anchor="middle" class="tok-lbl" fill="#fff">answer</text>
  <line x1="668" y1="124" x2="668" y2="170" stroke="var(--border-2,#94a3b8)" stroke-width="1.6"/>
  <path d="M668,170 Q668,186 676,186 L676,186" fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.6" marker-end="url(#cdu-arrow)"/>
</g>


<g data-anim="4">
  <path class="feedback" d="M448,124 Q448,146 490,146 Q516,146 522,124" marker-end="url(#cdu-arrow-accent)"/>
  <path class="feedback" d="M558,124 Q558,152 600,152 Q632,152 632,124" marker-end="url(#cdu-arrow-accent)"/>
  <text x="524" y="163" text-anchor="middle" class="ann-text" fill="var(--accent,#c15b39)">externalised state</text>
</g>


<g data-anim="5">
  <path class="attn" d="M448,90 Q548,50 660,88"/>
  <path class="attn" d="M558,90 Q600,64 656,88"/>
  <text x="558" y="44" text-anchor="middle" class="ann-text" fill="var(--accent2,#3b82f6)">earlier steps become attention targets</text>

  
  <line x1="412" y1="256" x2="720" y2="256" stroke="var(--muted,#6b7280)" stroke-width="1" opacity="0.6"/>
  <line x1="412" y1="250" x2="412" y2="262" stroke="var(--muted,#6b7280)" stroke-width="1" opacity="0.6"/>
  <line x1="720" y1="250" x2="720" y2="262" stroke="var(--muted,#6b7280)" stroke-width="1" opacity="0.6"/>
  <text x="566" y="278" text-anchor="middle" class="ann-text">
    <tspan x="566" dy="0">each step is a shallow computation; chaining N steps reaches</tspan>
    <tspan x="566" dy="14">effective depth ~ N x L, governed by TRACE LENGTH, not layer count</tspan>
  </text>
</g>


<g data-anim="5">
  <text x="412" y="398" class="cap-box">
    <tspan x="412" dy="0">Intermediate tokens re-enter context as attention targets -</tspan>
    <tspan x="412" dy="14">depth grows with trace length, not layer count.</tspan>
  </text>
</g>

</svg>
<figcaption><b>Chain-of-thought converts a fixed-depth forward pass into a variable-depth sequential computation.</b> The left panel shows a plain forward pass: computation is capped at the number of transformer layers L, and an error made early can never be revisited. The right panel shows CoT: each emitted step is fed back into the context (externalised state) and becomes an attention target for later steps, so effective reasoning depth scales with trace length rather than network depth.</figcaption>
</figure>
