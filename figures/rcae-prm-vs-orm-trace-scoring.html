<figcaption><b>An outcome reward model (ORM) and a process reward model (PRM) disagree exactly on the failure modes that matter.</b> On the left, a flawed step at step 3 happens to cancel out, so the ORM passes the final answer while the PRM flags the bad step -- a reasoning red flag the outcome alone hides. On the right, every step scores high but a last-step slip makes the final answer wrong, so the ORM fails a trace whose reasoning was sound throughout. Running both a final-answer check and a PRM on sampled traces catches what either check alone would miss.</figcaption>
