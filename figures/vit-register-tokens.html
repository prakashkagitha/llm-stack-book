<figure class="viz" id="fig-vit-register-tokens">
<button class="viz-replay" type="button">&#x21BB; replay</button>

<figcaption><b>Without a scratch slot, the model parks global information in random patches; register tokens give it a dedicated home instead.</b> Plain ViT attention maps show isolated high-norm "artifact" patches unrelated to image content, because the model has nowhere else to store global context; appending R learnable register tokens (no positional embedding, pure scratch space) absorbs that global information, leaving patch attention clean and semantic. Registers are discarded after the final block — only CLS and patch tokens are used downstream.</figcaption>
