<figure class="viz" id="fig-valle-ar-nar-architecture">
<svg viewBox="0 0 820 660" role="img" aria-label="VALL-E architecture: text tokens and a 3-second acoustic prompt feed an AR decoder that produces coarse level-1 speech codec tokens, then a NAR decoder fills RVQ levels 2-8 in parallel, then the EnCodec decoder synthesizes the waveform.">
<defs>
  <marker id="ve-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6aa9ff)" class="v-accent"/>
  </marker>
  <marker id="ve-arrow-s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#978f83)"/>
  </marker>
</defs>
<style>
  #fig-valle-ar-nar-architecture text { fill: var(--ink-soft,#45413a); font: 400 12px var(--sans,sans-serif); }
  #fig-valle-ar-nar-architecture .lbl { font: 700 12px var(--sans,sans-serif); }
  #fig-valle-ar-nar-architecture .small { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#978f83); }
  #fig-valle-ar-nar-architecture .mono { font: 400 10px var(--mono,monospace); fill: var(--muted,#978f83); }
  #fig-valle-ar-nar-architecture .bandlbl { font: 600 10px var(--sans,sans-serif); fill: var(--muted,#978f83); letter-spacing:1px; }
</style>


<text x="8" y="44" class="bandlbl">CONDITIONING</text>

<line x1="0" y1="50" x2="820" y2="50" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>


<rect x="16" y="56" width="310" height="60" rx="7" class="v-fill" stroke="var(--accent,#6aa9ff)" stroke-width="1.5"/>
<text x="171" y="80" text-anchor="middle" class="lbl">Text tokens: [BOS, t1, t2, …, tN, EOS]</text>
<text x="171" y="97" text-anchor="middle" class="small">text encoder (standard LLM)</text>


<rect x="344" y="56" width="310" height="60" rx="7" class="v-fill" stroke="var(--accent,#6aa9ff)" stroke-width="1.5"/>
<text x="499" y="78" text-anchor="middle" class="lbl">Prompt codec: [c1_1 … c1_P]</text>
<text x="499" y="96" text-anchor="middle" class="small">3 s @ 75 fps = 225 coarse codes</text>


<line x1="171" y1="116" x2="340" y2="170" stroke="var(--accent,#6aa9ff)" stroke-width="1.6" marker-end="url(#ve-arrow)"/>
<line x1="499" y1="116" x2="360" y2="170" stroke="var(--accent,#6aa9ff)" stroke-width="1.6" marker-end="url(#ve-arrow)"/>


<line x1="0" y1="175" x2="820" y2="175" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
<text x="8" y="188" class="bandlbl">AR STAGE</text>


<rect x="100" y="192" width="200" height="66" rx="8" fill="var(--accent,#6aa9ff)" fill-opacity="0.22" stroke="var(--accent,#6aa9ff)" stroke-width="2"/>
<text x="200" y="223" text-anchor="middle" class="lbl">AR decoder</text>
<text x="200" y="242" text-anchor="middle" class="small">autoregressive, sequential</text>


<path d="M 300 218 Q 332 208 332 225 Q 332 242 300 238" fill="none" stroke="var(--muted,#978f83)" stroke-width="1.2" marker-end="url(#ve-arrow-s)"/>


<text x="380" y="205" class="small">speech COARSE codes — level 1</text>
<text x="380" y="218" class="small">(prosody + speaker identity)</text>

<g>
  <rect x="380" y="226" width="34" height="24" rx="3" fill="var(--accent,#6aa9ff)" fill-opacity="0.55" stroke="var(--accent,#6aa9ff)" stroke-width="1.2"/>
  <text x="397" y="243" text-anchor="middle" style="font:400 8px var(--mono,monospace);fill:var(--ink-soft,#45413a)">c1_1</text>
  <rect x="418" y="226" width="34" height="24" rx="3" fill="var(--accent,#6aa9ff)" fill-opacity="0.55" stroke="var(--accent,#6aa9ff)" stroke-width="1.2"/>
  <text x="435" y="243" text-anchor="middle" style="font:400 8px var(--mono,monospace);fill:var(--ink-soft,#45413a)">c1_2</text>
  <rect x="456" y="226" width="34" height="24" rx="3" fill="var(--accent,#6aa9ff)" fill-opacity="0.55" stroke="var(--accent,#6aa9ff)" stroke-width="1.2"/>
  <text x="473" y="243" text-anchor="middle" style="font:400 8px var(--mono,monospace);fill:var(--ink-soft,#45413a)">c1_3</text>
  <rect x="494" y="226" width="22" height="24" rx="3" fill="none" stroke="var(--muted,#978f83)" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="505" y="243" text-anchor="middle" style="font:400 8px var(--mono,monospace);fill:var(--muted,#978f83)">…</text>
  <rect x="520" y="226" width="34" height="24" rx="3" fill="var(--accent,#6aa9ff)" fill-opacity="0.55" stroke="var(--accent,#6aa9ff)" stroke-width="1.2"/>
  <text x="537" y="243" text-anchor="middle" style="font:400 8px var(--mono,monospace);fill:var(--ink-soft,#45413a)">c1_S</text>
</g>


<line x1="340" y1="260" x2="340" y2="305" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#ve-arrow)"/>
<text x="348" y="287" class="small">condition on level-1 + all context</text>


<line x1="0" y1="308" x2="820" y2="308" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
<text x="8" y="322" class="bandlbl">NAR STAGE</text>


<rect x="100" y="326" width="200" height="66" rx="8" fill="var(--accent-2,#ec9069)" fill-opacity="0.18" stroke="var(--accent-2,#ec9069)" stroke-width="2"/>
<text x="200" y="357" text-anchor="middle" class="lbl">NAR decoder</text>
<text x="200" y="376" text-anchor="middle" class="small">non-autoregressive, parallel</text>


<line x1="312" y1="340" x2="356" y2="340" stroke="var(--muted,#978f83)" stroke-width="1.2" marker-end="url(#ve-arrow-s)"/>
<line x1="312" y1="352" x2="356" y2="352" stroke="var(--muted,#978f83)" stroke-width="1.2" marker-end="url(#ve-arrow-s)"/>
<line x1="312" y1="364" x2="356" y2="364" stroke="var(--muted,#978f83)" stroke-width="1.2" marker-end="url(#ve-arrow-s)"/>
<text x="362" y="344" class="small">parallel</text>
<text x="362" y="357" class="small">steps</text>


<text x="420" y="330" class="small">FINE levels 2–8 — O(1) parallel steps</text>
<g>
  
  <rect x="420" y="334" width="30" height="16" rx="2" fill="var(--accent-2,#ec9069)" fill-opacity="0.55" stroke="var(--accent-2,#ec9069)" stroke-width="1"/>
  <text x="435" y="346" text-anchor="middle" style="font:400 7px var(--mono,monospace);fill:var(--ink-soft,#45413a)">c2_1</text>
  <rect x="454" y="334" width="30" height="16" rx="2" fill="var(--accent-2,#ec9069)" fill-opacity="0.55" stroke="var(--accent-2,#ec9069)" stroke-width="1"/>
  <text x="469" y="346" text-anchor="middle" style="font:400 7px var(--mono,monospace);fill:var(--ink-soft,#45413a)">c2_2</text>
  <text x="490" y="346" class="small">…</text>
  
  <rect x="420" y="352" width="30" height="16" rx="2" fill="var(--accent-2,#ec9069)" fill-opacity="0.40" stroke="var(--accent-2,#ec9069)" stroke-width="1"/>
  <text x="435" y="364" text-anchor="middle" style="font:400 7px var(--mono,monospace);fill:var(--ink-soft,#45413a)">c3_1</text>
  <rect x="454" y="352" width="30" height="16" rx="2" fill="var(--accent-2,#ec9069)" fill-opacity="0.40" stroke="var(--accent-2,#ec9069)" stroke-width="1"/>
  <text x="469" y="364" text-anchor="middle" style="font:400 7px var(--mono,monospace);fill:var(--ink-soft,#45413a)">c3_2</text>
  
  <text x="430" y="386" class="small">levels 4–8 …</text>
</g>


<line x1="340" y1="395" x2="340" y2="438" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#ve-arrow)"/>


<line x1="0" y1="440" x2="820" y2="440" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
<text x="8" y="453" class="bandlbl">SYNTHESIS</text>


<rect x="180" y="458" width="200" height="48" rx="7" class="v-fill" stroke="var(--muted,#978f83)" stroke-width="1.5"/>
<text x="280" y="486" text-anchor="middle" class="lbl">EnCodec decoder</text>


<line x1="380" y1="482" x2="444" y2="482" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#ve-arrow)"/>


<rect x="446" y="462" width="96" height="40" rx="20" class="v-fill" stroke="var(--muted,#978f83)" stroke-width="1.5"/>
<text x="494" y="487" text-anchor="middle" class="lbl">Waveform</text>


<rect x="80" y="558" width="660" height="88" rx="6" class="v-fill" stroke="var(--muted,#978f83)" stroke-width="1" stroke-dasharray="4 2"/>
<text x="410" y="576" text-anchor="middle" class="small" style="font:700 10px var(--sans,sans-serif);fill:var(--ink-soft,#45413a)">Key insight</text>
<text x="410" y="592" text-anchor="middle" class="small">Level-1 = WHAT is said + HOW (prosody, speaker identity);</text>
<text x="410" y="607" text-anchor="middle" class="small">higher levels = acoustic rendering quality.</text>
<text x="410" y="622" text-anchor="middle" class="small">This decomposition separates semantic control from acoustic fidelity.</text>

</svg>
<figcaption><b>VALL-E two-stage codec-LM TTS architecture.</b> Text tokens and a 3-second acoustic prompt condition an autoregressive (AR) decoder that predicts level-1 (coarse) EnCodec tokens capturing prosody and speaker identity. A non-autoregressive (NAR) decoder then fills RVQ levels 2–8 in a single parallel pass, adding acoustic detail. The EnCodec decoder synthesizes the final waveform from all 8 code levels.</figcaption>
</figure>
