<figcaption><b>A sparse autoencoder decomposes one dense, polysemantic activation into a few crisp, monosemantic features.</b> The wide encoder produces a mostly-zero code where only a handful of features fire per token, each corresponding to a human-nameable concept; the decoder reconstructs the original activation as a sparse sum of those features' directions, scaled by how strongly each fired. This turns an opaque residual-stream vector into a small, legible vocabulary that can be monitored -- or added to the residual stream to steer behavior.</figcaption>
</figure>
