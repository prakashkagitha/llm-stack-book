<figure class="viz" id="fig-ckpt-async-vs-sync-timeline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 900 420" role="img" aria-label="Synchronous checkpointing blocks all GPUs for ~4 minutes while saving; asynchronous checkpointing only blocks for a ~30-second CPU snapshot then continues training while the disk write runs in the background.">
<defs>
  <marker id="cas-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6b7280)"/>
  </marker>
  <marker id="cas-arrow-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  <marker id="cas-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6b7280)"/>
  </marker>
  <pattern id="cas-hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="var(--warn,#e0a106)" stroke-width="1.5" stroke-opacity="0.4"/>
  </pattern>
  <clipPath id="cas-clip-sync-save">
    <rect id="cas-sync-save-clip-rect" x="152" y="60" width="0" height="56"/>
  </clipPath>
  <clipPath id="cas-clip-step-n1">
    <rect id="cas-step-n1-clip-rect" x="622" y="60" width="0" height="56"/>
  </clipPath>
  <clipPath id="cas-clip-snapshot">
    <rect id="cas-snapshot-clip-rect" x="152" y="248" width="0" height="44"/>
  </clipPath>
  <clipPath id="cas-clip-async-steps">
    <rect id="cas-async-steps-clip-rect" x="252" y="248" width="0" height="44"/>
  </clipPath>
  <clipPath id="cas-clip-bg-write">
    <rect id="cas-bg-write-clip-rect" x="252" y="325" width="0" height="44"/>
  </clipPath>
</defs>
<style>
  #fig-ckpt-async-vs-sync-timeline text { fill: var(--ink-soft, #374151); }
  #fig-ckpt-async-vs-sync-timeline .lbl { font: 600 12px var(--sans,sans-serif); }
  #fig-ckpt-async-vs-sync-timeline .lbl-sm { font: 500 10px var(--sans,sans-serif); }
  #fig-ckpt-async-vs-sync-timeline .row-lbl { font: 700 13px var(--sans,sans-serif); }
  #fig-ckpt-async-vs-sync-timeline .caption { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-ckpt-async-vs-sync-timeline .warn-caption { font: 600 10px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-ckpt-async-vs-sync-timeline .good-caption { font: 500 10px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }

  @keyframes cas-widen {
    from { width: 0; }
  }
  @keyframes cas-fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes cas-pulse-warn {
    0%, 100% { opacity: 0.18; }
    50% { opacity: 0.38; }
  }

  /* Sync row: phase A */
  #fig-ckpt-async-vs-sync-timeline .cas-phase-a-1 {
    animation: cas-fade-in 0.4s ease 0.2s both;
  }
  #fig-ckpt-async-vs-sync-timeline #cas-sync-save-clip-rect {
    animation: cas-widen 0.8s ease 0.8s both;
    animation-fill-mode: both;
  }
  /* Override: fill to 470px wide */
  #fig-ckpt-async-vs-sync-timeline #cas-sync-save-clip-rect {
    animation: cas-sync-save-grow 0.8s ease 0.8s both;
  }
  @keyframes cas-sync-save-grow {
    from { width: 0; }
    to { width: 470; }
  }
  #fig-ckpt-async-vs-sync-timeline .cas-sync-save-g {
    clip-path: url(#cas-clip-sync-save);
  }
  #fig-ckpt-async-vs-sync-timeline #cas-step-n1-clip-rect {
    animation: cas-step-n1-grow 0.3s ease 1.8s both;
  }
  @keyframes cas-step-n1-grow {
    from { width: 0; }
    to { width: 80; }
  }
  #fig-ckpt-async-vs-sync-timeline .cas-sync-step-n1-g {
    clip-path: url(#cas-clip-step-n1);
  }
  /* warn pulse on the save block */
  #fig-ckpt-async-vs-sync-timeline .cas-warn-fill {
    animation: cas-pulse-warn 1.5s ease 0.8s 4;
  }

  /* Async row: phase B */
  #fig-ckpt-async-vs-sync-timeline .cas-phase-b-1 {
    animation: cas-fade-in 0.4s ease 2.4s both;
  }
  #fig-ckpt-async-vs-sync-timeline #cas-snapshot-clip-rect {
    animation: cas-snapshot-grow 0.25s ease 2.9s both;
  }
  @keyframes cas-snapshot-grow {
    from { width: 0; }
    to { width: 100; }
  }
  #fig-ckpt-async-vs-sync-timeline .cas-snapshot-g {
    clip-path: url(#cas-clip-snapshot);
  }
  #fig-ckpt-async-vs-sync-timeline #cas-async-steps-clip-rect {
    animation: cas-async-steps-grow 0.7s ease 3.3s both;
  }
  @keyframes cas-async-steps-grow {
    from { width: 0; }
    to { width: 390; }
  }
  #fig-ckpt-async-vs-sync-timeline .cas-async-steps-g {
    clip-path: url(#cas-clip-async-steps);
  }
  #fig-ckpt-async-vs-sync-timeline #cas-bg-write-clip-rect {
    animation: cas-bg-write-grow 0.7s ease 3.3s both;
  }
  @keyframes cas-bg-write-grow {
    from { width: 0; }
    to { width: 390; }
  }
  #fig-ckpt-async-vs-sync-timeline .cas-bg-write-g {
    clip-path: url(#cas-clip-bg-write);
  }
  #fig-ckpt-async-vs-sync-timeline .cas-phase-b-labels {
    animation: cas-fade-in 0.4s ease 4.2s both;
  }

  @media (prefers-reduced-motion: reduce) {
    #fig-ckpt-async-vs-sync-timeline * {
      animation: none !important;
      clip-path: none !important;
      opacity: 1 !important;
    }
    #fig-ckpt-async-vs-sync-timeline .cas-warn-fill {
      opacity: 0.25 !important;
    }
  }
</style>

  <rect x="632" y="62" width="70" height="52" rx="4" fill="var(--surface,#f5f5f5)" stroke="var(--border-2,#d0d0d0)" stroke-width="1.5"/>
  <text x="667" y="93" text-anchor="middle" class="lbl">step N+1</text>

<text x="12" y="349" class="caption" text-anchor="start">disk I/O</text>

  <rect x="70" y="248" width="82" height="44" rx="4" fill="var(--surface,#f5f5f5)" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>

<figcaption><b>Synchronous checkpointing blocks all GPUs for the full ~4-minute save; asynchronous checkpointing only stalls for a fast ~30-second GPU→CPU snapshot, then resumes training immediately while a background thread writes to disk.</b> The key insight is that the slow disk write (bottom bar, ~4 min) runs concurrently with training steps N+1, N+2, N+3 — recovering nearly all the "dead compute" of the synchronous approach.</figcaption>
</figure>
