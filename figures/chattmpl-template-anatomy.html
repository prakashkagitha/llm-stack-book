<figure class="viz" id="fig-chattmpl-template-anatomy">
<svg viewBox="0 0 760 410" role="img" aria-label="A token ribbon dissecting one rendered ChatML assistant turn into special delimiter tokens, an ordinary-text role string, and content tokens, with a prompt boundary separating masked prompt tokens from supervised generated tokens, plus an inset showing what the server appends at inference.">
<defs>
  <marker id="cta-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#888)"/>
  </marker>
</defs>
<style>
  #fig-chattmpl-template-anatomy text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-chattmpl-template-anatomy .title { font: 700 16px var(--sans,sans-serif); fill: var(--ink,#1a1a1a); }
  #fig-chattmpl-template-anatomy .sub   { font: 400 11.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-chattmpl-template-anatomy .leg-lbl { font: 400 10px var(--sans,sans-serif); fill: var(--ink-soft,#333); }
  #fig-chattmpl-template-anatomy .chip-txt { font: 700 12.5px var(--mono,monospace); }
  #fig-chattmpl-template-anatomy .chip-txt-sm { font: 700 11px var(--mono,monospace); }
  #fig-chattmpl-template-anatomy .mask-lbl { font: 700 10.5px var(--sans,sans-serif); }
  #fig-chattmpl-template-anatomy .callout { font: 600 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-chattmpl-template-anatomy .strip-txt { font: 400 11px var(--mono,monospace); fill: var(--muted,#777); opacity: 0.85; }
  #fig-chattmpl-template-anatomy .inset-title { font: 700 11px var(--sans,sans-serif); letter-spacing: 0.06em; fill: var(--muted,#666); }
  #fig-chattmpl-template-anatomy .chip-special { fill: var(--accent); fill-opacity: 0.22; stroke: var(--accent); stroke-width: 2; }
  #fig-chattmpl-template-anatomy .chip-role    { fill: var(--surface-3); stroke: var(--border-2); stroke-width: 1.3; }
  #fig-chattmpl-template-anatomy .chip-content { fill: var(--accent2); fill-opacity: 0.16; stroke: var(--accent2); stroke-width: 1.6; }
  #fig-chattmpl-template-anatomy .chip-content-dash { fill: var(--accent2); fill-opacity: 0.10; stroke: var(--accent2); stroke-width: 1.3; stroke-dasharray: 3 2; }
  #fig-chattmpl-template-anatomy .txt-special { fill: var(--accent); }
  #fig-chattmpl-template-anatomy .txt-role    { fill: var(--ink-soft,#333); }
  #fig-chattmpl-template-anatomy .txt-content { fill: var(--accent2); }
</style>

<text x="40" y="28" class="title">Anatomy of one rendered turn (ChatML)</text>
<text x="40" y="46" class="sub">Three distinct token categories make up a single assistant turn</text>


<rect x="40" y="58" width="14" height="14" rx="3" class="chip-special"/>
<text x="60" y="69" class="leg-lbl">SPECIAL (single vocab token)</text>
<rect x="222" y="58" width="14" height="14" rx="3" class="chip-role"/>
<text x="242" y="69" class="leg-lbl">ROLE STRING (ordinary text, not special)</text>
<rect x="468" y="58" width="14" height="14" rx="3" class="chip-content"/>
<text x="488" y="69" class="leg-lbl">CONTENT (reply tokens)</text>


<text x="40" y="94" class="sub">preceding turn (user) &#8212; collapsed</text>
<rect x="40" y="100" width="680" height="30" rx="5" fill="var(--surface-3)" fill-opacity="0.45" stroke="var(--border-2)" stroke-width="1" stroke-dasharray="4 3"/>
<text x="380" y="120" text-anchor="middle" class="strip-txt">&#8230;&lt;|im_start|&gt;user\nWhat is the capital of France?&lt;|im_end|&gt;</text>

<line x1="380" y1="130" x2="380" y2="160" stroke="var(--muted)" stroke-width="1.3" marker-end="url(#cta-arrow)"/>


<g>
  
  <rect x="113" y="168" width="118" height="46" rx="6" class="chip-special"/>
  <text x="172" y="196" text-anchor="middle" class="chip-txt txt-special">&lt;|im_start|&gt;</text>

  
  <rect x="235" y="168" width="86" height="46" rx="6" class="chip-role"/>
  <text x="278" y="196" text-anchor="middle" class="chip-txt txt-role">assistant</text>

  
  <rect x="325" y="168" width="34" height="46" rx="6" class="chip-role"/>
  <text x="342" y="196" text-anchor="middle" class="chip-txt-sm txt-role">\n</text>

  
  <rect x="363" y="168" width="58" height="46" rx="6" class="chip-content"/>
  <text x="392" y="196" text-anchor="middle" class="chip-txt txt-content">Paris</text>

  
  <rect x="425" y="168" width="26" height="46" rx="6" class="chip-content"/>
  <text x="438" y="196" text-anchor="middle" class="chip-txt txt-content">.</text>

  
  <rect x="455" y="168" width="46" height="46" rx="6" class="chip-content-dash"/>
  <text x="478" y="196" text-anchor="middle" class="chip-txt-sm txt-content">&#8230;</text>

  
  <rect x="505" y="168" width="104" height="46" rx="6" class="chip-special"/>
  <text x="557" y="196" text-anchor="middle" class="chip-txt txt-special">&lt;|im_end|&gt;</text>

  
  <rect x="613" y="168" width="34" height="46" rx="6" class="chip-role"/>
  <text x="630" y="196" text-anchor="middle" class="chip-txt-sm txt-role">\n</text>
</g>

<text x="172" y="162" text-anchor="middle" class="callout" font-size="9.5">role header</text>
<text x="557" y="162" text-anchor="middle" class="callout" font-size="9.5">turn end</text>


<line x1="361" y1="168" x2="361" y2="242" stroke="var(--warn)" stroke-width="1.6" stroke-dasharray="5 3"/>


<rect x="113" y="222" width="248" height="20" rx="4" fill="var(--surface-3)" stroke="var(--border-2)" stroke-width="1"/>
<text x="237" y="236" text-anchor="middle" class="mask-lbl" fill="var(--muted)">masked (no loss)</text>
<rect x="361" y="222" width="286" height="20" rx="4" fill="var(--accent2)" fill-opacity="0.14" stroke="var(--accent2)" stroke-width="1.2"/>
<text x="504" y="236" text-anchor="middle" class="mask-lbl txt-content">supervised (loss)</text>

<text x="361" y="256" text-anchor="middle" class="callout" fill="var(--warn)">prompt boundary</text>
<text x="380" y="270" text-anchor="middle" class="sub" font-size="10.5">everything left is prompt (masked) &#8212; everything right is generated (supervised)</text>


<text x="40" y="286" class="inset-title">AT INFERENCE</text>
<rect x="40" y="292" width="680" height="98" rx="6" fill="var(--surface)" fill-opacity="0.4" stroke="var(--border-2)" stroke-width="1.2" stroke-dasharray="4 3"/>

<text x="115" y="308" text-anchor="middle" class="callout" font-size="9.5">prior turn ends</text>
<rect x="60" y="314" width="110" height="30" rx="5" class="chip-role"/>
<text x="115" y="334" text-anchor="middle" class="chip-txt-sm txt-role">&#8230;&lt;|im_end|&gt;</text>

<line x1="170" y1="329" x2="196" y2="329" stroke="var(--muted)" stroke-width="1.3" marker-end="url(#cta-arrow)"/>

<text x="298" y="308" text-anchor="middle" class="callout" font-size="9.5">server appends header</text>
<rect x="200" y="314" width="196" height="30" rx="5" class="chip-special"/>
<text x="298" y="334" text-anchor="middle" class="chip-txt-sm txt-special">&lt;|im_start|&gt;assistant\n</text>

<line x1="396" y1="329" x2="422" y2="329" stroke="var(--muted)" stroke-width="1.3" marker-end="url(#cta-arrow)"/>

<text x="558" y="308" text-anchor="middle" class="callout" font-size="9.5">model decodes content</text>
<rect x="426" y="314" width="264" height="30" rx="5" class="chip-content-dash"/>
<text x="558" y="334" text-anchor="middle" class="chip-txt-sm txt-content">tokens &#8230; until &lt;|im_end|&gt;</text>

<text x="380" y="374" text-anchor="middle" class="sub" font-size="10.5">The server appends only the role header; the model itself must emit &lt;|im_end|&gt; to stop.</text>

</svg>
<figcaption><b>One rendered assistant turn decomposes into three token categories: special delimiters, an ordinary-text role string, and content.</b> <code>&lt;|im_start|&gt;</code> and <code>&lt;|im_end|&gt;</code> are single indivisible vocabulary entries, while <code>assistant</code> and the newlines around it are tokenized like any other text — the prompt boundary falls right after the role header, so everything left of it is masked context and everything right of it is the model's own generated, loss-supervised output. At inference the server appends only <code>&lt;|im_start|&gt;assistant\n</code> and lets the model decode until it emits <code>&lt;|im_end|&gt;</code> itself.</figcaption>
</figure>
