<style>
  #fig-sampling-logit-pipeline .node-lbl { font: 600 13px var(--mono,monospace); }
  #fig-sampling-logit-pipeline .node-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-logit-pipeline .ann { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-logit-pipeline .group-lbl { font: 600 10px var(--sans,sans-serif); fill: var(--muted,#64748b); writing-mode: tb; }
  #fig-sampling-logit-pipeline .step-lbl { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-logit-pipeline .final-lbl { font: 700 13px var(--sans,sans-serif); fill: #fff; }
  #fig-sampling-logit-pipeline .compose-ann { font: italic 9px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-logit-pipeline text { fill: var(--ink-soft,#334155); }
  /* animated pill traveling down */
  #fig-sampling-logit-pipeline .token-pill {
    animation: slp-travel 4s ease-in-out infinite;
    animation-delay: 0.5s;
  }
  @keyframes slp-travel {
    0%   { transform: translateY(0px);   opacity: 1; }
    85%  { transform: translateY(580px); opacity: 1; }
    90%  { transform: translateY(580px); opacity: 0; }
    100% { transform: translateY(0px);   opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    #fig-sampling-logit-pipeline .token-pill { animation: none; opacity: 0; }
    #fig-sampling-logit-pipeline [data-anim] { opacity: 1 !important; }
  }
  /* stage pulse animations */
  #fig-sampling-logit-pipeline .pulse-1 { animation: slp-pulse 4s ease-in-out infinite; animation-delay: 0.7s; }
  #fig-sampling-logit-pipeline .pulse-2 { animation: slp-pulse 4s ease-in-out infinite; animation-delay: 1.1s; }
  #fig-sampling-logit-pipeline .pulse-3 { animation: slp-pulse 4s ease-in-out infinite; animation-delay: 1.5s; }
  #fig-sampling-logit-pipeline .pulse-4 { animation: slp-pulse 4s ease-in-out infinite; animation-delay: 1.9s; }
  #fig-sampling-logit-pipeline .pulse-5 { animation: slp-pulse 4s ease-in-out infinite; animation-delay: 2.3s; }
  #fig-sampling-logit-pipeline .pulse-6 { animation: slp-pulse 4s ease-in-out infinite; animation-delay: 2.7s; }
  #fig-sampling-logit-pipeline .pulse-7 { animation: slp-pulse 4s ease-in-out infinite; animation-delay: 3.1s; }
  @keyframes slp-pulse {
    0%   { fill-opacity: 0; }
    5%   { fill-opacity: 0.35; }
    15%  { fill-opacity: 0; }
    100% { fill-opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    #fig-sampling-logit-pipeline .pulse-1,
    #fig-sampling-logit-pipeline .pulse-2,
    #fig-sampling-logit-pipeline .pulse-3,
    #fig-sampling-logit-pipeline .pulse-4,
    #fig-sampling-logit-pipeline .pulse-5,
    #fig-sampling-logit-pipeline .pulse-6,
    #fig-sampling-logit-pipeline .pulse-7 { animation: none; fill-opacity: 0; }
  }
  /* drop tick fade-out for filter nodes */
  #fig-sampling-logit-pipeline .drop-tick {
    animation: slp-drop 4s ease-in-out infinite;
  }
  #fig-sampling-logit-pipeline .drop-tk4 { animation-delay: 1.9s; }
  #fig-sampling-logit-pipeline .drop-tk5 { animation-delay: 2.3s; }
  #fig-sampling-logit-pipeline .drop-tk6 { animation-delay: 2.7s; }
  @keyframes slp-drop {
    0%   { opacity: 0; transform: translateX(0); }
    5%   { opacity: 0.7; transform: translateX(0); }
    25%  { opacity: 0; transform: translateX(18px); }
    100% { opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    #fig-sampling-logit-pipeline .drop-tick { animation: none; opacity: 0; }
  }
</style>

<figcaption><b>The logit-processor pipeline processes a single logit vector sequentially.</b> Raw logits enter at the top and are first scaled (temperature, repetition/frequency penalties), then vocabulary-truncated (top-k, top-p, min-p each composing on the already-masked vector), then optionally constrained (forced tokens), and finally converted to a probability distribution from which a single token is sampled. The order of operations matters: penalties run before truncation so that penalized tokens can still be trimmed.</figcaption>
</figure>
