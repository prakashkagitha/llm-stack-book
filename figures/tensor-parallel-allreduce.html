<figure class="viz" id="fig-tensor-parallel-allreduce">
<svg viewBox="0 0 820 380" role="img" aria-label="Data flow across two GPUs for one MLP block under tensor parallelism: a replicated input X feeds a column-parallel up-projection that needs no communication, whose partitioned outputs feed a row-parallel down-projection producing two partial sums, which are then summed by an all-reduce to recover the true full result Z.">
<style>
  #fig-tensor-parallel-allreduce text { font: 12px var(--sans, sans-serif); fill: var(--ink-soft, #45413a); }
  #fig-tensor-parallel-allreduce .banner  { font: 700 12px var(--sans, sans-serif); }
  #fig-tensor-parallel-allreduce .lane-lbl{ font: 700 11px var(--sans, sans-serif); }
  #fig-tensor-parallel-allreduce .box-ttl { font: 700 11.5px var(--sans, sans-serif); }
  #fig-tensor-parallel-allreduce .box-eq  { font: 600 10.5px var(--mono, monospace); }
  #fig-tensor-parallel-allreduce .tag     { font: 500 9.5px var(--sans, sans-serif); font-style: italic; fill: var(--muted); }
  #fig-tensor-parallel-allreduce .big     { font: 700 17px var(--sans, sans-serif); }
  #fig-tensor-parallel-allreduce .small   { font: 500 8.5px var(--sans, sans-serif); fill: var(--muted); }
  #fig-tensor-parallel-allreduce .ar-ttl  { font: 700 14px var(--sans, sans-serif); fill: var(--accent); }
  #fig-tensor-parallel-allreduce .ar-eq   { font: 600 11px var(--mono, monospace); fill: var(--accent); }
  #fig-tensor-parallel-allreduce .caption { font: 500 10.5px var(--sans, sans-serif); fill: var(--muted); }
</style>

<defs>
  <marker id="tpar-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--v-stroke)"/>
  </marker>
  <marker id="tpar-arr-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
  </marker>
</defs>


<rect x="14" y="14" width="792" height="28" rx="6" class="v-fill" stroke="var(--v-grid)" stroke-width="1" fill-opacity="0.5"/>
<text x="410" y="33" text-anchor="middle" class="banner">column-parallel (no comm)  --&gt;  row-parallel (partial)  --&gt;  all-reduce (recover)</text>


<rect x="118" y="64" width="422" height="100" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.06" stroke="var(--v-grid)" stroke-width="0.8"/>
<rect x="118" y="204" width="422" height="100" rx="8" fill="var(--muted)" fill-opacity="0.06" stroke="var(--v-grid)" stroke-width="0.8"/>
<text x="128" y="80" class="lane-lbl" fill="var(--accent2,#3b82f6)">GPU0</text>
<text x="128" y="220" class="lane-lbl" fill="var(--muted)">GPU1</text>


<rect x="30" y="149" width="80" height="70" rx="6" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.4"/>
<text x="70" y="178" text-anchor="middle" class="big">X</text>
<text x="70" y="194" text-anchor="middle" class="small">(replicated on</text>
<text x="70" y="206" text-anchor="middle" class="small">both GPUs)</text>


<line x1="110" y1="184" x2="146" y2="114" stroke="var(--v-stroke)" stroke-width="1.3" marker-end="url(#tpar-arr)"/>
<line x1="110" y1="184" x2="146" y2="254" stroke="var(--v-stroke)" stroke-width="1.3" marker-end="url(#tpar-arr)"/>


<rect x="150" y="79" width="130" height="70" rx="6" fill="var(--accent2,#3b82f6)" fill-opacity="0.15" stroke="var(--v-stroke)" stroke-width="1.3"/>
<text x="215" y="101" text-anchor="middle" class="box-ttl">W1 (cols 1..k/2)</text>
<text x="215" y="119" text-anchor="middle" class="box-eq">Y1 = X * W1</text>

<rect x="150" y="219" width="130" height="70" rx="6" fill="var(--muted)" fill-opacity="0.15" stroke="var(--v-stroke)" stroke-width="1.3"/>
<text x="215" y="241" text-anchor="middle" class="box-ttl">W2 (cols k/2..k)</text>
<text x="215" y="259" text-anchor="middle" class="box-eq">Y2 = X * W2</text>

<text x="215" y="178" text-anchor="middle" class="tag">no communication --</text>
<text x="215" y="192" text-anchor="middle" class="tag">output is partitioned</text>


<line x1="280" y1="114" x2="306" y2="114" stroke="var(--v-stroke)" stroke-width="1.3" marker-end="url(#tpar-arr)"/>
<line x1="280" y1="254" x2="306" y2="254" stroke="var(--v-stroke)" stroke-width="1.3" marker-end="url(#tpar-arr)"/>


<rect x="310" y="79" width="130" height="70" rx="6" fill="var(--accent2,#3b82f6)" fill-opacity="0.15" stroke="var(--v-stroke)" stroke-width="1.3"/>
<text x="375" y="101" text-anchor="middle" class="box-ttl">W1' (rows 1..k/2)</text>
<text x="375" y="119" text-anchor="middle" class="box-eq">Z1 = Y1 * W1'</text>

<rect x="310" y="219" width="130" height="70" rx="6" fill="var(--muted)" fill-opacity="0.15" stroke="var(--v-stroke)" stroke-width="1.3"/>
<text x="375" y="241" text-anchor="middle" class="box-ttl">W2' (rows k/2..k)</text>
<text x="375" y="259" text-anchor="middle" class="box-eq">Z2 = Y2 * W2'</text>

<text x="375" y="178" text-anchor="middle" class="tag">each output is only</text>
<text x="375" y="192" text-anchor="middle" class="tag">PART of the true sum</text>


<line x1="440" y1="114" x2="540" y2="180" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#tpar-arr-accent)"/>
<line x1="440" y1="254" x2="540" y2="188" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#tpar-arr-accent)"/>


<rect x="490" y="44" width="170" height="280" rx="12" fill="var(--accent)" fill-opacity="0.10" stroke="var(--accent)" stroke-width="2.4"/>
<text x="575" y="76" text-anchor="middle" class="ar-ttl">ALL-REDUCE (sum)</text>
<text x="575" y="96" text-anchor="middle" class="ar-eq">Z1 + Z2 = Z</text>

<circle cx="545" cy="184" r="4.5" fill="var(--accent)"/>
<text x="545" y="203" text-anchor="middle" class="tag" fill="var(--accent)">sum</text>

<text x="575" y="340" text-anchor="middle" class="caption">moves ~2 x d_model bytes per rank --</text>
<text x="575" y="353" text-anchor="middle" class="caption">trivial on NVLink, costly across PCIe / IB</text>


<line x1="545" y1="184" x2="686" y2="184" stroke="var(--accent)" stroke-width="2.2" marker-end="url(#tpar-arr-accent)"/>


<rect x="690" y="149" width="110" height="70" rx="6" class="v-fill" stroke="var(--accent)" stroke-width="1.8"/>
<text x="745" y="178" text-anchor="middle" class="big">Z</text>
<text x="745" y="196" text-anchor="middle" class="box-eq">= Z1 + Z2</text>
<text x="745" y="210" text-anchor="middle" class="tag">(full, correct)</text>

</svg>
<figcaption><b>Column-parallel needs no communication; row-parallel needs an all-reduce to undo the partitioning it inherited.</b> The up-projection splits the weight matrix by columns, so each GPU's output <code>Y_i</code> is simply a disjoint slice — nothing to synchronize. The down-projection then splits by rows, so each GPU's output <code>Z_i</code> is full-width but only <i>part</i> of the true sum; the all-reduce adds the two partial results together to recover the correct <code>Z</code>. This pattern (column-parallel then row-parallel, one all-reduce at the boundary) repeats for both the attention block and the MLP block in every transformer layer.</figcaption>
</figure>
