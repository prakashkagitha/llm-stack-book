<figcaption><b>The RAG pipeline separates into an offline indexing phase (Stages 1-3) and an online query phase (Stages 4-5).</b> Raw documents are chunked into 256-512 token windows with 10-20% overlap (Stage 1), encoded by a bi-encoder into dense vectors (Stage 2), and stored in a persistent vector database using an HNSW or IVF index (Stage 3). At query time, the same encoder embeds the user question; an ANN search retrieves k=5-20 candidates; an optional cross-encoder reranker narrows to k'=3-5; and the LLM generates a grounded answer conditioned on the retrieved passages (Stage 5).</figcaption>
