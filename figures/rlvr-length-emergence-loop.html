<figure class="viz" id="fig-rlvr-length-emergence-loop">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 580" role="img" aria-label="Animated causal loop showing why response length grows under pure correctness reward: winners in each sample group (those that reached the correct answer) are up-weighted by the gradient, and the behaviors that distinguish winners — checking steps, trying alternatives, self-verifying — mean more tokens spent reasoning; over thousands of training steps this compounds into long chain-of-thought.">
<defs>
  <marker id="le-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--border-2,#cbd2dc)"/>
  </marker>
  <marker id="le-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent2,#3b82f6)"/>
  </marker>
  <marker id="le-arr-grn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--good,#27a05f)"/>
  </marker>
  <marker id="le-arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--danger,#c0392b)"/>
  </marker>
  
  <clipPath id="le-bar-clip">
    <rect x="18" y="82" width="20" height="400"/>
  </clipPath>
</defs>
<style>
  #fig-rlvr-length-emergence-loop text { fill: var(--ink-soft,#1c2330); font-family: var(--sans,sans-serif); }
  #fig-rlvr-length-emergence-loop .hdr  { font: 700 13px var(--sans,sans-serif); }
  #fig-rlvr-length-emergence-loop .lbl  { font: 600 12px var(--sans,sans-serif); }
  #fig-rlvr-length-emergence-loop .sub  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-length-emergence-loop .albl { font: 500 10px var(--sans,sans-serif); }
  #fig-rlvr-length-emergence-loop .ftr  { font: italic 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-length-emergence-loop .good   { fill: var(--good,#27a05f); }
  #fig-rlvr-length-emergence-loop .accent { fill: var(--accent2,#3b82f6); }
  #fig-rlvr-length-emergence-loop .danger { fill: var(--danger,#c0392b); }
  #fig-rlvr-length-emergence-loop .chip   { font: 600 10px var(--sans,sans-serif); }
  @media (prefers-reduced-motion: reduce) {
    #fig-rlvr-length-emergence-loop .anim-pulse,
    #fig-rlvr-length-emergence-loop .anim-flow,
    #fig-rlvr-length-emergence-loop .anim-grow { animation: none !important; }
  }
  /* winner chip pulse */
  @keyframes le-pulse-win {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  /* loser chip dim */
  @keyframes le-dim-lose {
    0%,100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }
  /* arrow dash flow */
  @keyframes le-dashflow {
    0% { stroke-dashoffset: 20; }
    100% { stroke-dashoffset: 0; }
  }
  /* feedback loop dash */
  @keyframes le-loopflow {
    0% { stroke-dashoffset: 200; }
    100% { stroke-dashoffset: 0; }
  }
  /* length bar grow */
  @keyframes le-bargrow {
    0%   { transform: scaleY(0.15); }
    100% { transform: scaleY(1); }
  }
  /* Node E emphasis */
  @keyframes le-emerge {
    0%,80% { opacity: 0.3; }
    100%   { opacity: 1; }
  }
  /* sequential step reveals */
  .le-s1 { animation: le-pulse-win 1.5s 0.5s ease-in-out infinite; }
  .le-s1d{ animation: le-dim-lose 1.5s 0.5s ease-in-out infinite; }
  .le-s2 { animation: le-dashflow 1s 1.8s linear infinite; stroke-dasharray: 5 3; }
  .le-s3a{ animation: le-pulse-win 1.2s 2.8s ease-in-out infinite; }
  .le-s3b{ animation: le-pulse-win 1.2s 3.2s ease-in-out infinite; }
  .le-s3c{ animation: le-pulse-win 1.2s 3.6s ease-in-out infinite; }
  .le-s4 { animation: le-dashflow 1s 4.2s linear infinite; stroke-dasharray: 5 3; }
  .le-loop{ animation: le-loopflow 3s 4.8s linear infinite; stroke-dasharray: 8 4; }
  .le-bar { animation: le-bargrow 3s 1s ease-out forwards; transform-origin: 28px 482px; }
  .le-nodeE { animation: le-emerge 7s 5s ease-in forwards; }
</style>


<text x="400" y="26" text-anchor="middle" class="hdr">Why length grows under pure correctness reward</text>
<text x="400" y="42" text-anchor="middle" class="sub">(correctness is rewarded; length is a side effect)</text>


<rect x="18" y="82" width="20" height="400" rx="4" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1"/>
<rect x="18" y="82" width="20" height="400" rx="4" fill="var(--accent2,#3b82f6)" opacity="0.25" class="le-bar"/>
<text x="28" y="74" text-anchor="middle" class="sub" font-size="9">length</text>
<text x="28" y="495" text-anchor="middle" class="sub" font-size="9">short</text>
<text x="28" y="95" text-anchor="middle" class="sub" font-size="9">long</text>


<g data-anim="1">
  <rect x="55" y="58" width="460" height="58" rx="8" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.2"/>
  <text x="285" y="82" text-anchor="middle" class="lbl">STEP 0 — base model</text>
  <text x="285" y="99" text-anchor="middle" class="sub">single-shot, short answers · ~10% correct</text>
</g>


<line x1="285" y1="116" x2="285" y2="132" stroke="var(--border-2,#cbd2dc)" stroke-width="1.5" marker-end="url(#le-arr)" class="le-s2"/>
<text x="298" y="128" class="albl" fill="var(--muted,#6b7280)">sample group of G</text>


<g data-anim="2">
  <rect x="55" y="134" width="460" height="72" rx="8" fill="var(--surface,#ffffff)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.2"/>
  <text x="100" y="153" class="sub">sample group</text>

  
  <rect x="62" y="160" width="50" height="22" rx="5" fill="var(--good,#27a05f)" opacity="0.85" class="le-s1"/>
  <text x="87" y="175" text-anchor="middle" class="chip" fill="white">win +</text>

  <rect x="118" y="160" width="50" height="22" rx="5" fill="var(--good,#27a05f)" opacity="0.85" class="le-s1"/>
  <text x="143" y="175" text-anchor="middle" class="chip" fill="white">win +</text>


  <rect x="174" y="160" width="50" height="22" rx="5" fill="var(--surface-3,#eef1f5)" stroke="var(--danger,#c0392b)" stroke-width="1" opacity="0.7" class="le-s1d"/>
  <text x="199" y="175" text-anchor="middle" class="chip danger">lose -</text>

  <rect x="230" y="160" width="50" height="22" rx="5" fill="var(--surface-3,#eef1f5)" stroke="var(--danger,#c0392b)" stroke-width="1" opacity="0.7" class="le-s1d"/>
  <text x="255" y="175" text-anchor="middle" class="chip danger">lose -</text>

  <rect x="286" y="160" width="50" height="22" rx="5" fill="var(--surface-3,#eef1f5)" stroke="var(--danger,#c0392b)" stroke-width="1" opacity="0.7" class="le-s1d"/>
  <text x="311" y="175" text-anchor="middle" class="chip danger">lose -</text>

  <rect x="342" y="160" width="50" height="22" rx="5" fill="var(--surface-3,#eef1f5)" stroke="var(--danger,#c0392b)" stroke-width="1" opacity="0.7" class="le-s1d"/>
  <text x="367" y="175" text-anchor="middle" class="chip danger">lose -</text>

  <text x="470" y="175" class="sub" font-size="9">few winners, many losers</text>
</g>


<line x1="285" y1="206" x2="285" y2="228" stroke="var(--border-2,#cbd2dc)" stroke-width="1.5" marker-end="url(#le-arr)" class="le-s2"/>
<text x="298" y="221" class="albl good" font-size="10">adv. on winners</text>
<text x="298" y="234" class="albl danger" font-size="10">adv. on losers</text>


<g data-anim="3">
  <rect x="55" y="244" width="460" height="78" rx="8" fill="var(--surface,#ffffff)" stroke="var(--accent2,#3b82f6)" stroke-width="1.3"/>
  <text x="285" y="264" text-anchor="middle" class="lbl accent">What distinguishes the WINNERS?</text>
  <text x="285" y="279" text-anchor="middle" class="sub">(these behaviors correlate with reaching the gold answer)</text>

  
  <rect x="66" y="285" width="158" height="24" rx="6" fill="var(--surface,#ffffff)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2" class="le-s3a"/>
  <text x="145" y="301" text-anchor="middle" class="chip accent" font-size="9.5">check intermediate steps</text>

  <rect x="232" y="285" width="132" height="24" rx="6" fill="var(--surface,#ffffff)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2" class="le-s3b"/>
  <text x="298" y="301" text-anchor="middle" class="chip accent" font-size="9.5">try alt. approaches</text>

  <rect x="372" y="285" width="128" height="24" rx="6" fill="var(--surface,#ffffff)" stroke="var(--accent2,#3b82f6)" stroke-width="1.2" class="le-s3c"/>
  <text x="436" y="301" text-anchor="middle" class="chip accent" font-size="9.5">verify final result</text>
</g>


<line x1="285" y1="322" x2="285" y2="344" stroke="var(--accent2,#3b82f6)" stroke-width="1.8" marker-end="url(#le-arr-acc)" class="le-s4"/>
<text x="298" y="337" class="albl accent" font-size="10">gradient up-weights these</text>


<g data-anim="4">
  <rect x="55" y="346" width="460" height="52" rx="8" fill="var(--surface,#ffffff)" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
  <text x="285" y="369" text-anchor="middle" class="lbl accent">Gradient up-weights:</text>
  <text x="285" y="387" text-anchor="middle" class="lbl accent">"spend more tokens reasoning"</text>
</g>


<path d="M 515,372 C 725,372 725,87 515,87" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.2" marker-end="url(#le-arr-acc)" class="le-loop"/>
<text x="750" y="300" text-anchor="middle" class="albl accent" font-size="10" transform="rotate(-90,750,300)">repeat over thousands of steps</text>


<line x1="285" y1="398" x2="285" y2="420" stroke="var(--good,#27a05f)" stroke-width="1.8" marker-end="url(#le-arr-grn)"/>


<g data-anim="5" class="le-nodeE">
  <rect x="55" y="422" width="460" height="76" rx="8" fill="var(--surface,#ffffff)" stroke="var(--good,#27a05f)" stroke-width="2"/>
  <text x="285" y="446" text-anchor="middle" class="lbl good">STEP N — emergent behavior</text>
  <text x="285" y="462" text-anchor="middle" class="sub">long CoT · self-verification · backtracking · "aha" · ~70%+ correct</text>
  <text x="285" y="478" text-anchor="middle" class="ftr">(no reasoning demonstrations were ever provided)</text>
</g>

</svg>
<figcaption><b>Why response length grows under pure correctness reward.</b> At step 0, a base model with ~10% accuracy generates a group of samples; the few winners (those that reached the correct answer) happen to have spent more tokens checking steps and verifying results. The gradient up-weights exactly those behaviors, creating a compounding loop: more reasoning tokens raise correctness, raising those behaviors' probability, making completions longer and more accurate until, at step N, long chain-of-thought, self-verification, and backtracking emerge — none of it trained directly.</figcaption>
</figure>
