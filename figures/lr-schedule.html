<figure class="viz" id="fig-lr-schedule">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 700 300" role="img" aria-label="A learning-rate schedule: the rate ramps linearly from near zero to a peak during warmup, then follows a cosine curve smoothly decaying to a small floor at one tenth of the peak.">
  <style>
    #fig-lr-schedule text{ fill:var(--ink-soft); }
    #fig-lr-schedule .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-lr-schedule .sm{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-lr-schedule .tag{ font:600 12px var(--sans,sans-serif); }
    #fig-lr-schedule .mono{ font:500 11px var(--mono,monospace); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <rect x="92" y="56" width="86" height="194" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.07"/>
    <rect x="178" y="56" width="462" height="194" rx="3" fill="var(--accent)" fill-opacity="0.07"/>
  </g>

  
  <g data-anim="1">
    <line x1="92" y1="56" x2="92" y2="250" class="v-stroke" stroke="currentColor" stroke-width="1.4"/>
    <line x1="92" y1="250" x2="652" y2="250" class="v-stroke" stroke="currentColor" stroke-width="1.4"/>
    
    <text x="40" y="44" class="ax">learning</text>
    <text x="40" y="60" class="ax">rate η</text>
    
    <text x="372" y="288" text-anchor="middle" class="ax">training step t</text>
  </g>

  
  <g data-anim="2">
    <line x1="92" y1="70" x2="640" y2="70" class="v-grid" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="86" y="74" text-anchor="end" class="sm">η_max</text>
    <line x1="92" y1="228" x2="640" y2="228" class="v-grid" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="86" y="232" text-anchor="end" class="sm">η_min</text>
    <text x="80" y="220" text-anchor="end" class="mono">= η_max/10</text>
  </g>

  
  <g data-anim="2">
    <line x1="178" y1="56" x2="178" y2="256" class="v-grid" stroke-width="1.1"/>
    <text x="178" y="270" text-anchor="middle" class="mono">T_w</text>
    <line x1="640" y1="244" x2="640" y2="256" class="v-grid" stroke-width="1.1"/>
    <text x="640" y="270" text-anchor="middle" class="mono">T</text>
    <text x="92" y="270" text-anchor="middle" class="mono">0</text>
  </g>

  
  <g data-anim="3">
    <path d="M92 250 L178 70" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.6"
          class="viz-draw" style="--len:199" stroke-linecap="round"/>
    <path d="M178 70 L197.2 70.7 L216.5 72.7 L235.8 76 L255 80.6 L274.2 86.3 L293.5 93.1 L312.8 100.9 L332 109.5 L351.2 118.8 L370.5 128.6 L389.8 138.7 L409 149 L428.2 159.3 L447.5 169.4 L466.8 179.2 L486 188.5 L505.2 197.1 L524.5 204.9 L543.8 211.7 L563 217.4 L582.2 222 L601.5 225.3 L620.8 227.3 L640 228"
          fill="none" stroke="var(--accent)" stroke-width="2.6" class="viz-draw" style="--len:494" stroke-linecap="round"/>
  </g>

  
  <g data-anim="4">
    <circle cx="178" cy="70" r="4.2" fill="var(--accent)" stroke="var(--surface,#fff)" stroke-width="1.3"/>
    <circle cx="178" cy="70" r="4.2" fill="none" stroke="var(--accent)" stroke-width="1.3" class="viz-pulse"/>
  </g>

  
  <g data-anim="4">
    <text x="136" y="182" text-anchor="middle" class="tag" fill="var(--accent2,#3b82f6)">warmup</text>
    <text x="136" y="198" text-anchor="middle" class="sm">linear ramp</text>

    <text x="430" y="86" text-anchor="middle" class="tag" fill="var(--accent)">cosine decay</text>
    <text x="430" y="102" text-anchor="middle" class="sm">flat near the peak, then a soft tail</text>
  </g>

  
  <g data-anim="5">
    <circle cx="640" cy="228" r="3.6" fill="none" stroke="var(--accent)" stroke-width="1.6"/>
    <text x="634" y="244" text-anchor="end" class="sm">floor</text>
  </g>
</svg>
<figcaption><b>Warmup then cosine decay — the default pretraining schedule.</b> The learning rate climbs linearly from near zero to its peak <b>η_max</b> over the first <b>T_w</b> warmup steps (letting Adam's moment estimates calibrate), then follows the right half of a cosine curve down to a small floor <b>η_min = η_max/10</b>. Because the cosine is flat near its maximum, the run spends most of its budget at an aggressive learning rate and only slows for fine-grained convergence at the end.</figcaption>
</figure>
