<figure class="viz" id="fig-quant-perplexity-quality-spectrum">
<svg viewBox="0 0 920 240" role="img" aria-label="Horizontal perplexity quality spectrum for a 7B model showing quantization formats from best quality on the left (BF16 approximately equal to FP8) to most lossy on the right (Q2_K), with Q4_K_M and NF4 highlighted as the recommended sweet spot.">
<defs>
  <linearGradient id="pqs-bar-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="var(--good,#2f9e6e)"/>
    <stop offset="50%"  stop-color="var(--good,#2f9e6e)" stop-opacity="0.6"/>
    <stop offset="72%"  stop-color="var(--warn,#e0a106)"/>
    <stop offset="88%"  stop-color="var(--danger,#ef4444)" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="var(--danger,#ef4444)"/>
  </linearGradient>
</defs>
<style>
  #fig-quant-perplexity-quality-spectrum text      { fill: var(--ink-soft,#0f172a); }

  #fig-quant-perplexity-quality-spectrum .sub-lbl  { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-quant-perplexity-quality-spectrum .axis-lbl { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }

  #fig-quant-perplexity-quality-spectrum .gt-lbl   { font: 700 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
</style>

</svg>
<figcaption><b>Perplexity cost hierarchy of quantization formats for a 7B model.</b> The spectrum runs left (highest quality, lowest perplexity) to right (most lossy). <b>Q4_K_M and NF4</b> (highlighted) sit at a practical sweet spot: only 0.1&amp;ndash;0.5 perplexity points above BF16, imperceptible in most downstream tasks, while halving weight memory versus FP16. Q2_K offers the smallest footprint but with noticeable quality degradation.</figcaption>
</figure>
