<figure class="viz" id="fig-audio-llm-transfer-curriculum">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 1040 480" role="img" aria-label="Audio-LLM transfer learning curriculum: 4 steps showing progressive unfreezing. Step 1 pre-trains audio encoder alone. Step 2 trains projection adapter with encoder and LLM frozen. Step 3 jointly fine-tunes encoder, adapter, and LLM with LoRA. Step 4 applies RLHF preference tuning.">
<defs>
  <marker id="tc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6aa9ff)" class="v-accent"/>
  </marker>
  
  <symbol id="tc-lock" viewBox="0 0 14 16">
    <rect x="2" y="7" width="10" height="8" rx="2" fill="none" stroke="var(--muted,#978f83)" stroke-width="1.5"/>
    <path d="M4 7V5a3 3 0 1 1 6 0v2" fill="none" stroke="var(--muted,#978f83)" stroke-width="1.5"/>
  </symbol>
</defs>
<style>
  #fig-audio-llm-transfer-curriculum text { fill: var(--ink-soft,#45413a); font: 400 10.5px var(--sans,sans-serif); }
  #fig-audio-llm-transfer-curriculum .lbl { font: 700 11px var(--sans,sans-serif); }
  #fig-audio-llm-transfer-curriculum .small { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#978f83); }
  #fig-audio-llm-transfer-curriculum .cardtitle { font: 700 11px var(--sans,sans-serif); }
  #fig-audio-llm-transfer-curriculum .rowlbl { font: 600 9px var(--sans,sans-serif); fill: var(--muted,#978f83); text-transform:uppercase; letter-spacing:0.5px; }

  /* Card highlight animation */
  #fig-audio-llm-transfer-curriculum .tc-card { transition: opacity 0.3s; }

  #fig-audio-llm-transfer-curriculum #tc-card-1 { animation: tc-hl 6s ease-in-out infinite; }
  #fig-audio-llm-transfer-curriculum #tc-card-2 { animation: tc-hl 6s ease-in-out 1.5s infinite; }
  #fig-audio-llm-transfer-curriculum #tc-card-3 { animation: tc-hl 6s ease-in-out 3s infinite; }
  #fig-audio-llm-transfer-curriculum #tc-card-4 { animation: tc-hl 6s ease-in-out 4.5s infinite; }
  @keyframes tc-hl {
    0%,14%,100% { filter: brightness(1); }
    16%,30%     { filter: brightness(1.3); }
  }

  /* Trainable block highlight */
  #fig-audio-llm-transfer-curriculum .tc-trainable { opacity: 0.3; }
  #fig-audio-llm-transfer-curriculum #tc-enc1 { animation: tc-light 6s ease-in-out infinite; }
  #fig-audio-llm-transfer-curriculum #tc-adp2 { animation: tc-light 6s ease-in-out 1.5s infinite; }
  #fig-audio-llm-transfer-curriculum #tc-enc3, #fig-audio-llm-transfer-curriculum #tc-adp3, #fig-audio-llm-transfer-curriculum #tc-llm3 { animation: tc-light 6s ease-in-out 3s infinite; }
  #fig-audio-llm-transfer-curriculum #tc-rlhf4 { animation: tc-light 6s ease-in-out 4.5s infinite; }
  @keyframes tc-light {
    0%,14%,100% { opacity: 0.25; }
    16%,30%     { opacity: 0.95; }
  }
</style>


<text x="520" y="22" text-anchor="middle" style="font:700 13px var(--sans,sans-serif);fill:var(--ink-soft,#45413a)">Audio-LLM Transfer Learning Curriculum</text>


<g id="tc-card-1" class="tc-card">
  
  <rect x="16" y="34" width="228" height="330" rx="8" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  
  <rect x="16" y="34" width="228" height="30" rx="8" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <rect x="16" y="52" width="228" height="12" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <text x="130" y="54" text-anchor="middle" class="cardtitle">Step 1</text>
  <text x="130" y="72" text-anchor="middle" class="small">Pre-train audio encoder alone</text>

  
  
  <rect id="tc-enc1" x="36" y="86" width="186" height="36" rx="4" fill="var(--accent,#6aa9ff)" fill-opacity="0.25" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" class="tc-trainable"/>
  <text x="130" y="108" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">Audio Encoder</text>
  
  <rect x="36" y="130" width="186" height="30" rx="4" fill="none" stroke="var(--muted,#978f83)" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="130" y="150" text-anchor="middle" class="small">Adapter (not yet present)</text>
  
  <rect x="36" y="168" width="186" height="30" rx="4" fill="none" stroke="var(--muted,#978f83)" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="130" y="188" text-anchor="middle" class="small">LLM (not yet connected)</text>

  
  <text x="36" y="220" class="rowlbl">Data:</text>
  <text x="36" y="234" class="small">~1B unlabeled audio frames</text>
  <text x="36" y="247" class="small">(HuBERT-style self-supervised)</text>
  
  <text x="36" y="270" class="rowlbl">Loss:</text>
  <text x="36" y="284" class="small">masked-unit prediction</text>
</g>


<line x1="244" y1="198" x2="268" y2="198" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#tc-arrow)"/>


<g id="tc-card-2" class="tc-card">
  <rect x="270" y="34" width="228" height="330" rx="8" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  <rect x="270" y="34" width="228" height="30" rx="8" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <rect x="270" y="52" width="228" height="12" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <text x="384" y="54" text-anchor="middle" class="cardtitle">Step 2</text>
  <text x="384" y="72" text-anchor="middle" class="small">Train projection adapter</text>

  
  <rect x="290" y="86" width="186" height="36" rx="4" class="v-fill" stroke="var(--muted,#978f83)" stroke-width="1.2"/>
  <text x="384" y="108" text-anchor="middle" class="small">Audio Encoder (frozen)</text>
  <use href="#tc-lock" x="457" y="89" width="14" height="16" stroke="var(--muted,#978f83)"/>
  
  <rect id="tc-adp2" x="290" y="130" width="186" height="30" rx="4" fill="var(--accent,#6aa9ff)" fill-opacity="0.25" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" class="tc-trainable"/>
  <text x="384" y="149" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">Adapter (trainable)</text>
  
  <rect x="290" y="168" width="186" height="30" rx="4" class="v-fill" stroke="var(--muted,#978f83)" stroke-width="1.2"/>
  <text x="384" y="188" text-anchor="middle" class="small">LLM (frozen)</text>
  <use href="#tc-lock" x="457" y="170" width="14" height="16" stroke="var(--muted,#978f83)"/>

  <text x="290" y="220" class="rowlbl">Data:</text>
  <text x="290" y="234" class="small">~1000 h paired speech-text</text>
  <text x="290" y="247" class="small">(LibriSpeech, GigaSpeech)</text>
  <text x="290" y="270" class="rowlbl">Loss:</text>
  <text x="290" y="284" class="small">ASR cross-entropy (text tokens only)</text>
</g>


<line x1="498" y1="198" x2="522" y2="198" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#tc-arrow)"/>


<g id="tc-card-3" class="tc-card">
  <rect x="524" y="34" width="228" height="330" rx="8" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  <rect x="524" y="34" width="228" height="30" rx="8" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <rect x="524" y="52" width="228" height="12" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <text x="638" y="54" text-anchor="middle" class="cardtitle">Step 3</text>
  <text x="638" y="72" text-anchor="middle" class="small">Joint fine-tune (+ LLM LoRA)</text>

  
  <rect id="tc-enc3" x="544" y="86" width="186" height="36" rx="4" fill="var(--accent,#6aa9ff)" fill-opacity="0.25" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" class="tc-trainable"/>
  <text x="638" y="108" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">Audio Encoder</text>
  
  <rect id="tc-adp3" x="544" y="130" width="186" height="30" rx="4" fill="var(--accent,#6aa9ff)" fill-opacity="0.25" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" class="tc-trainable"/>
  <text x="638" y="149" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">Adapter</text>
  
  <rect id="tc-llm3" x="544" y="168" width="186" height="36" rx="4" fill="var(--accent,#6aa9ff)" fill-opacity="0.25" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" class="tc-trainable"/>
  <text x="638" y="186" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">LLM + LoRA</text>
  <text x="638" y="198" text-anchor="middle" class="small">LoRA adapters only</text>

  <text x="544" y="228" class="rowlbl">Data:</text>
  <text x="544" y="242" class="small">mixed speech/text instruction data</text>
  <text x="544" y="270" class="rowlbl">Loss:</text>
  <text x="544" y="284" class="small">multimodal cross-entropy</text>
  <text x="544" y="297" class="small">(text + audio tokens)</text>
</g>


<line x1="752" y1="198" x2="776" y2="198" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#tc-arrow)"/>


<g id="tc-card-4" class="tc-card">
  <rect x="778" y="34" width="246" height="330" rx="8" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1.5"/>
  <rect x="778" y="34" width="246" height="30" rx="8" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <rect x="778" y="52" width="246" height="12" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <text x="901" y="54" text-anchor="middle" class="cardtitle">Step 4</text>
  <text x="901" y="72" text-anchor="middle" class="small">RLHF / preference tuning</text>

  
  <rect id="tc-rlhf4" x="798" y="86" width="206" height="118" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1.8" stroke-dasharray="5 2" class="tc-trainable"/>
  <text x="901" y="134" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">Full model stack</text>
  <text x="901" y="151" text-anchor="middle" class="small">preference / RLHF</text>
  <text x="901" y="165" text-anchor="middle" class="small">optimization</text>
  <text x="901" y="179" text-anchor="middle" class="small">over all components</text>

  <text x="798" y="228" class="rowlbl">Data:</text>
  <text x="798" y="242" class="small">preference pairs for voice</text>
  <text x="798" y="255" class="small">quality / naturalness</text>
  <text x="798" y="270" class="rowlbl">Loss:</text>
  <text x="798" y="284" class="small">RLHF reward signal</text>
</g>


<rect x="20" y="390" width="14" height="14" rx="2" fill="var(--accent,#6aa9ff)" fill-opacity="0.55" stroke="var(--accent,#6aa9ff)" stroke-width="1.5"/>
<text x="38" y="402" class="small" fill="var(--ink-soft,#45413a)">trainable (lit)</text>
<rect x="130" y="390" width="14" height="14" rx="2" class="v-fill" stroke="var(--muted,#978f83)" stroke-width="1"/>
<text x="148" y="402" class="small" fill="var(--ink-soft,#45413a)">frozen (muted + lock)</text>
<rect x="270" y="390" width="14" height="14" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.25" stroke="var(--good,#2f9e6e)" stroke-width="1"/>
<text x="288" y="402" class="small" fill="var(--ink-soft,#45413a)">RLHF / preference badge</text>

</svg>
<figcaption><b>Four-step transfer learning curriculum for an audio-LLM, showing progressive unfreezing.</b> Step 1 pre-trains the audio encoder alone with self-supervised masked prediction. Step 2 trains only the projection adapter while keeping the encoder and LLM frozen. Step 3 jointly fine-tunes all components (encoder, adapter, and LLM via LoRA) on mixed multimodal instruction data. Step 4 applies RLHF preference tuning for voice quality and naturalness. Each card lights up in sequence in the animation to emphasize the unfreezing progression.</figcaption>
</figure>
