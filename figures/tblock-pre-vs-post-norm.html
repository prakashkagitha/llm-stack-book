<figcaption><b>Post-Norm places LayerNorm after the residual add; Pre-Norm places it before the sublayer.</b> In Post-Norm (top), the gradient through the skip path scales as 1/std of the residual sum, requiring careful learning-rate warmup. In Pre-Norm (bottom), the dashed blue skip carries raw, unnormalized x directly to the add node, providing a clean unit-variance gradient highway that makes training stable without warmup — the reason GPT-3, Llama, and Mistral all use Pre-Norm.</figcaption>
