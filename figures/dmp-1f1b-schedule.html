<figcaption><b>PipeDream/Megatron 1F1B steady-state pipeline schedule (p=4 stages).</b> Unlike GPipe, backward passes interleave with forward passes as soon as stage 3 completes its first forward, so each stage only keeps at most p live activation sets at once — independent of the total microbatch count m. The bubble fraction (p-1)/(m+p-1) matches GPipe, but 1F1B's memory footprint is bounded by p rather than m, making it practical with large m.</figcaption>
