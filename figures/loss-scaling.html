<figure class="viz" id="fig-loss-scaling">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 402" role="img" aria-label="A magnitude number line for fp16: small gradients underflow into the denormal-or-zero zone; multiplying the loss by a scale S shifts the whole gradient distribution up into the representable range, then it is unscaled before the optimizer step.">
  <defs>
    <marker id="ls-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="ls-arrow-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-loss-scaling text{ fill:var(--ink-soft); }
    #fig-loss-scaling .lbl{ font:600 13px var(--sans,sans-serif); }
    #fig-loss-scaling .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-loss-scaling .tick{ font:500 10px var(--mono,monospace); fill:var(--muted); }
    #fig-loss-scaling .mono{ font:600 12px var(--mono,monospace); }
    #fig-loss-scaling .zone{ font:600 11px var(--sans,sans-serif); }
  </style>

  
  
  <g data-anim="1">
    
    <rect x="120" y="54" width="120" height="162" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
    <text x="180" y="42" text-anchor="middle" class="zone" fill="var(--good,#2f9e6e)">fp16 representable</text>
    <text x="180" y="73" text-anchor="middle" class="tick">max 65504</text>

    
    <rect x="120" y="216" width="120" height="100" rx="6" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.4" stroke-dasharray="5 3"/>
    <text x="180" y="336" text-anchor="middle" class="zone" fill="var(--warn,#e0a106)">underflow to 0</text>

    
    <line x1="112" y1="216" x2="240" y2="216" class="v-stroke" stroke-width="1.4"/>

    
    <line x1="112" y1="54" x2="112" y2="316" class="v-grid" stroke-width="1.2"/>
    <text x="108" y="58" text-anchor="end" class="tick">2¹⁶</text>
    <text x="108" y="146" text-anchor="end" class="tick">2⁰</text>
    <text x="108" y="220" text-anchor="end" class="tick">6e-5</text>
    <text x="108" y="312" text-anchor="end" class="tick">2⁻²⁴</text>
    <text x="40" y="180" text-anchor="middle" class="sm" transform="rotate(-90 40 180)">gradient magnitude (log scale)</text>
  </g>

  
  <g data-anim="2">
    <path d="M132 304 Q150 244 168 268 Q180 284 192 272 Q204 260 228 300 Z"
          fill="var(--warn,#e0a106)" fill-opacity="0.28" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
    <text x="180" y="294" text-anchor="middle" class="mono" fill="var(--warn,#e0a106)">dL/dw</text>
  </g>

  
  <g data-anim="3">
    <line x1="266" y1="280" x2="266" y2="158" stroke="var(--accent)" stroke-width="2.4" marker-end="url(#ls-arrow)" class="viz-draw" style="--len:122"/>
    <rect x="276" y="206" width="92" height="40" rx="8" class="v-fill" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="322" y="224" text-anchor="middle" class="mono" fill="var(--accent)">× S</text>
    <text x="322" y="239" text-anchor="middle" class="sm">S = 2¹⁶</text>
  </g>

  
  <g data-anim="4">
    <path d="M132 204 Q150 144 168 168 Q180 184 192 172 Q204 160 228 200 Z"
          fill="var(--accent)" fill-opacity="0.30" stroke="var(--accent)" stroke-width="1.4" class="viz-pulse"/>
    <text x="180" y="194" text-anchor="middle" class="mono" fill="var(--accent)">S·dL/dw</text>
  </g>

  
  <g data-anim="4">
    <text x="276" y="150" class="sm">scaled grads land</text>
    <text x="276" y="164" class="sm">in the safe band</text>
    <line x1="272" y1="160" x2="234" y2="174" class="v-accent-s" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3"/>
  </g>
  <g data-anim="2">
    <text x="276" y="290" class="sm">raw grads fall</text>
    <text x="276" y="304" class="sm">below 6e-5, to 0</text>
    <line x1="272" y1="294" x2="232" y2="288" class="v-muted" stroke="currentColor" stroke-width="1" stroke-dasharray="3 3"/>
  </g>

  
  <g data-anim="5">
    <text x="418" y="42" class="lbl" fill="var(--accent)">loss-scaling pipeline</text>

    <g class="lbl">
      <rect x="418" y="58" width="88" height="34" rx="7" class="v-fill v-accent-s" stroke-width="1.4"/>
      <text x="462" y="79" text-anchor="middle" class="mono" fill="var(--accent)">L × S</text>

      <rect x="418" y="106" width="88" height="34" rx="7" class="v-fill v-grid" stroke-width="1.4"/>
      <text x="462" y="127" text-anchor="middle" class="mono">backward</text>

      <rect x="524" y="106" width="74" height="34" rx="7" class="v-fill v-grid" stroke-width="1.4"/>
      <text x="561" y="127" text-anchor="middle" class="mono">grads ×S</text>

      <rect x="616" y="106" width="92" height="34" rx="7" class="v-fill v-accent-s" stroke-width="1.4"/>
      <text x="662" y="127" text-anchor="middle" class="mono" fill="var(--accent)">÷ S unscale</text>

      <rect x="616" y="58" width="92" height="34" rx="7" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
      <text x="662" y="79" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">step fp32</text>
    </g>

    
    <line x1="462" y1="92" x2="462" y2="106" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ls-arrow-m)"/>
    <line x1="506" y1="123" x2="524" y2="123" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ls-arrow-m)"/>
    <line x1="598" y1="123" x2="616" y2="123" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ls-arrow-m)"/>
    <line x1="662" y1="106" x2="662" y2="92" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ls-arrow-m)"/>
  </g>

  
  <g data-anim="5">
    <line x1="276" y1="328" x2="700" y2="328" class="v-grid" stroke-width="1"/>
    <text x="284" y="350" class="sm">The rescaling is a <tspan font-family="var(--mono,monospace)" fill="var(--accent)">no-op</tspan> on the final update — it</text>
    <text x="284" y="365" class="sm">only buys representable precision during backprop.</text>
  </g>
</svg>
<figcaption><b>Loss scaling lifts gradients out of the fp16 underflow zone.</b> A transformer's gradients routinely fall below fp16's smallest normal (~6e-5), where they round to zero. Multiplying the loss by a scale <b>S = 2¹⁶</b> multiplies every gradient by S (chain rule), shifting the whole distribution up into the representable band; the gradients are then <b>unscaled (÷S)</b> before the fp32 optimizer step, so the rescaling is mathematically a no-op.</figcaption>
</figure>
