<figcaption><b>Tiny per-token drifts multiply into an exploding sequence ratio, and two independent effects drive that drift: staleness (trainer vs. logged old policy) and engine mismatch (inference vs. training numerics).</b> PPO clipping bounds each token's move, truncated importance sampling caps the behavior-side ratio at a constant C to contain engine mismatch, and dropping wildly off-policy rollouts removes what would otherwise be pure noise.</figcaption>
</figure>
