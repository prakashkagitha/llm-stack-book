<figure class="viz" id="fig-kv-cache-vs-weights-budget">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 720 480" role="img" aria-label="Two HBM capacity bars of equal total height. Both have the same fixed weights slab and overhead sliver at the bottom. The remaining KV cache budget is divided into many thin slots for GQA with few KV heads, fitting many concurrent sequences, versus a few fat slots for MHA with many KV heads, fitting only a few concurrent sequences.">

<defs>
  <marker id="bw-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#6b7280)"/>
  </marker>
</defs>

<style>
  #fig-kv-cache-vs-weights-budget text { fill: var(--ink-soft,#374151); font-family: var(--sans,sans-serif); }
  #fig-kv-cache-vs-weights-budget .hdr   { font: 700 12.5px var(--sans,sans-serif); }
  #fig-kv-cache-vs-weights-budget .hbm   { font: 500 8.5px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-kv-cache-vs-weights-budget .slab  { font: 600 10px var(--sans,sans-serif); }
  #fig-kv-cache-vs-weights-budget .slabs { font: 400 8px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-kv-cache-vs-weights-budget .ovh   { font: 400 7px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-kv-cache-vs-weights-budget .spine { font: 600 9.5px var(--sans,sans-serif); }
  #fig-kv-cache-vs-weights-budget .spines{ font: 400 8px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-kv-cache-vs-weights-budget .note  { font: 500 9.5px var(--sans,sans-serif); }
  #fig-kv-cache-vs-weights-budget .cap   { font: 600 10.5px var(--sans,sans-serif); }
  @media (prefers-reduced-motion: reduce) {
    #fig-kv-cache-vs-weights-budget [data-anim] { opacity: 1 !important; animation: none !important; }
  }
</style>


<g data-anim="1">
  <text x="220" y="26" text-anchor="middle" class="hdr" fill="var(--good,#2f9e6e)">GQA (8 KV heads)</text>
  <text x="220" y="40" text-anchor="middle" class="hbm">HBM</text>

  <text x="500" y="26" text-anchor="middle" class="hdr" fill="var(--warn,#e0a106)">MHA (32 KV heads)</text>
  <text x="500" y="40" text-anchor="middle" class="hbm">HBM</text>

  
  <rect x="140" y="50"  width="160" height="264" fill="var(--good,#2f9e6e)" fill-opacity="0.10" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <rect x="140" y="314" width="160" height="14"  fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <rect x="140" y="328" width="160" height="92"  fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1.4"/>

  
  <rect x="420" y="50"  width="160" height="264" fill="var(--warn,#e0a106)" fill-opacity="0.10" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <rect x="420" y="314" width="160" height="14"  fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <rect x="420" y="328" width="160" height="92"  fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#d1d5db)" stroke-width="1.4"/>

  
  <text x="220" y="368" text-anchor="middle" class="slab">model weights</text>
  <text x="220" y="381" text-anchor="middle" class="slabs">(fixed)</text>
  <text x="500" y="368" text-anchor="middle" class="slab">model weights</text>
  <text x="500" y="381" text-anchor="middle" class="slabs">(fixed)</text>
  <text x="220" y="324" text-anchor="middle" class="ovh">activations / overhead</text>
  <text x="500" y="324" text-anchor="middle" class="ovh">activations / overhead</text>
</g>


<g data-anim="2">
  <line x1="140" y1="72"  x2="300" y2="72"  stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="94"  x2="300" y2="94"  stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="116" x2="300" y2="116" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="138" x2="300" y2="138" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="160" x2="300" y2="160" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="182" x2="300" y2="182" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="204" x2="300" y2="204" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="226" x2="300" y2="226" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="248" x2="300" y2="248" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="270" x2="300" y2="270" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="140" y1="292" x2="300" y2="292" stroke="var(--good,#2f9e6e)" stroke-opacity="0.5" stroke-width="1"/>

  <line x1="140" y1="182" x2="100" y2="182" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <text x="94" y="178" text-anchor="end" class="note" fill="var(--good,#2f9e6e)">many concurrent</text>
  <text x="94" y="190" text-anchor="end" class="note" fill="var(--good,#2f9e6e)">sequences</text>
</g>


<g data-anim="3">
  <line x1="420" y1="138" x2="580" y2="138" stroke="var(--warn,#e0a106)" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="420" y1="226" x2="580" y2="226" stroke="var(--warn,#e0a106)" stroke-opacity="0.5" stroke-width="1"/>

  <line x1="580" y1="182" x2="620" y2="182" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  <text x="626" y="178" text-anchor="start" class="note" fill="var(--warn,#e0a106)">few concurrent</text>
  <text x="626" y="190" text-anchor="start" class="note" fill="var(--warn,#e0a106)">sequences</text>
</g>


<g data-anim="4">
  <text x="360" y="178" text-anchor="middle" class="spine">KV cache budget</text>
  <text x="360" y="190" text-anchor="middle" class="spines">(same total space, both bars)</text>
  <line x1="338" y1="182" x2="304" y2="182" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2" marker-end="url(#bw-arrow)"/>
  <line x1="382" y1="182" x2="416" y2="182" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2" marker-end="url(#bw-arrow)"/>

  <text x="360" y="371" text-anchor="middle" class="spine">weights slab</text>
  <text x="360" y="383" text-anchor="middle" class="spines">(identical on both bars)</text>
  <line x1="338" y1="374" x2="304" y2="374" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2" marker-end="url(#bw-arrow)"/>
  <line x1="382" y1="374" x2="416" y2="374" stroke="var(--ink-soft,#6b7280)" stroke-width="1.2" marker-end="url(#bw-arrow)"/>
</g>


<g data-anim="5">
  <text x="360" y="452" text-anchor="middle" class="cap">the KV cache, not the weights, usually limits how many users you can serve.</text>
</g>

</svg>
<figcaption><b>Both bars are the same total HBM capacity, and both give the same fixed slab to model weights &#8212; but GQA's few KV heads let the remaining KV-cache budget split into many thin per-sequence slots, while MHA's many KV heads make each slot roughly 4x fatter and fit far fewer.</b> Once weights are subtracted, concurrency is set entirely by how many KV-cache slots fit in what's left, which is why shrinking KV heads (GQA/MLA) directly multiplies how many users one GPU can serve.</figcaption>
</figure>
