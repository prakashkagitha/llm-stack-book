<figure class="viz" id="fig-execution-model-warp-simt">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 600" role="img" aria-label="The CUDA execution hierarchy -- grid, block, warp, thread -- mapped row by row onto GPU hardware -- GPU, SM, warp scheduler, lane. A zoom shows one warp of 32 lanes fed by a single fetch/decode and program counter, executing in lockstep (SIMT). Two side panels show warp divergence, where an if-split makes both branch paths run serially for up to 2x slower, and memory coalescing, where contiguous per-lane addresses collapse into 1-2 transactions but scattered addresses cost up to 32 transactions.">
<defs>
  <marker id="ews-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6b7280)"/>
  </marker>
</defs>

  #fig-execution-model-warp-simt .lvl-big{ font:700 13px var(--sans,sans-serif); }
  #fig-execution-model-warp-simt .lvl-sm{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }

  #fig-execution-model-warp-simt .sect{ font:700 13px var(--sans,sans-serif); }
  #fig-execution-model-warp-simt .sub{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
  #fig-execution-model-warp-simt .cap{ font:700 11px var(--sans,sans-serif); }
  #fig-execution-model-warp-simt .capsm{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }

</style>

<figcaption><b>Software maps onto hardware row by row, and the warp is the real unit of execution.</b> A grid of blocks runs across a GPU's SMs; each block owns one SM for its life and shares fast on-chip SMEM; each warp of 32 threads shares one instruction stream (SIMT) issued by a warp scheduler. Two consequences follow directly: a warp that diverges on a branch runs both paths serially (up to 2x slower), and a warp's memory access coalesces into 1-2 transactions when contiguous but up to 32 when scattered.</figcaption>
