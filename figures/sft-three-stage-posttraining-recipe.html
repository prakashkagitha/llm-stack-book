<figure class="viz" id="fig-sft-three-stage-posttraining-recipe">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 820 490" role="img" aria-label="Three-stage post-training pipeline: Stage 1 SFT turns a base model into the SFT model; Stage 2 reward modeling uses the SFT model plus preference data to build a reward model; Stage 3 RL alignment uses the SFT model plus reward model to produce the aligned model. Dotted lines show the SFT model being reused in stages 2 and 3, and the reward model reused in stage 3.">

  <marker id="tp-arr"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">

</defs>
<style>
  #fig-sft-three-stage-posttraining-recipe text  { fill: currentColor; }

  #fig-sft-three-stage-posttraining-recipe .nlbl { font: 600 11px var(--sans,sans-serif); }
  #fig-sft-three-stage-posttraining-recipe .slbl { font: 600 9.5px var(--sans,sans-serif); }
  #fig-sft-three-stage-posttraining-recipe .albl { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sft-three-stage-posttraining-recipe .clbl { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sft-three-stage-posttraining-recipe .plus { font: 700 13px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sft-three-stage-posttraining-recipe .rlbl { font: 500 8px var(--sans,sans-serif); }
  #fig-sft-three-stage-posttraining-recipe .optl { font: italic 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sft-three-stage-posttraining-recipe .legl { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

  @keyframes tp-gblue  { 0%,100%{stroke-width:2; stroke-opacity:1} 50%{stroke-width:3.5; stroke-opacity:1} }
  @keyframes tp-ggreen { 0%,100%{stroke-width:2; stroke-opacity:1} 50%{stroke-width:3.5; stroke-opacity:1} }
  @keyframes tp-fi  { from{opacity:0} to{opacity:1} }
  @keyframes tp-da  { from{stroke-dashoffset:240} to{stroke-dashoffset:0} }
  @keyframes tp-do  { from{stroke-dashoffset:120} to{stroke-dashoffset:0} }

  /* Static/declared state = FINAL state (all visible, lines drawn) so the
     figure is correct in print, static rasterizers, and before/after the
     intro animation. The hide-then-reveal lives entirely in each keyframe's
     `from` step, applied during the delay via `both` fill-mode in a live
     browser. */
  .s1       { animation: tp-fi .4s ease .1s both; }
  .s1arr    { stroke-dasharray:240; animation: tp-da .7s ease .5s both; }
  .s1out    { animation: tp-fi .4s ease 1.2s both; }
  .s1glow   { animation: tp-gblue 1.6s ease 1.5s 3; }
  .rc12     { stroke-dasharray:6 4; animation: tp-do .5s ease 2.2s both; }
  .rc13     { stroke-dasharray:6 4; animation: tp-do .5s ease 2.3s both; }
  .rl12     { animation: tp-fi .3s ease 2.7s both; }
  .rl13     { animation: tp-fi .3s ease 2.9s both; }
  .s2       { animation: tp-fi .4s ease 3.0s both; }
  .s2arr    { stroke-dasharray:240; animation: tp-da .7s ease 3.4s both; }
  .s2out    { animation: tp-fi .4s ease 4.1s both; }
  .rc23     { stroke-dasharray:6 4; animation: tp-do .5s ease 4.5s both; }
  .rl23     { animation: tp-fi .3s ease 5.0s both; }
  .s3       { animation: tp-fi .4s ease 5.1s both; }
  .s3arr    { stroke-dasharray:240; animation: tp-da .7s ease 5.5s both; }
  .s3out    { animation: tp-fi .4s ease 6.2s both; }
  .s3glow   { animation: tp-ggreen 1.6s ease 6.4s 3; }

  @media (prefers-reduced-motion: reduce) {
    #fig-sft-three-stage-posttraining-recipe * {
      animation: none !important;
      opacity: 1 !important;
      stroke-dashoffset: 0 !important;
    }
  }
</style>

<figcaption><b>The three-stage post-training recipe: SFT &#x2192; Reward Modeling &#x2192; RL Alignment.</b> The SFT model (blue) is the pivotal shared artifact &#x2014; it seeds the reward model in Stage 2 and provides the behavioral prior in Stage 3. Dotted connectors show both reuse paths explicitly. DPO collapses Stages 2 and 3, skipping explicit reward model training entirely.</figcaption>
