<figcaption><b>One MoE layer's round trip under expert parallelism: route locally, dispatch across GPUs, compute, then gather and combine.</b> The router picks each token's top-2 experts with no communication (stage 1); a first all-to-all physically moves each token to the GPU holding its chosen expert (stage 2, colored by token so you can trace each one's path); experts compute on the tokens they received (stage 3); a second all-to-all returns the two expert outputs to the token's home GPU, where they are combined by a weighted sum into the final output token (stage 4). Because the all-to-all is a synchronization barrier, a batch too small to give every expert at least one token leaves some expert GPUs idle while others work — the reason production serving batches many concurrent requests before running a MoE layer.</figcaption>
