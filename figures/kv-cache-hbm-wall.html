<figure class="viz" id="fig-kv-cache-hbm-wall">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 760 580" role="img" aria-label="Two panels showing GPU HBM as a fixed budget: model weights take a fixed slab at the bottom, and the KV cache fills the space above it up to a memory-wall ceiling. Under MHA only about 4 sequences fit; under GQA, with 8x narrower per-sequence KV blocks, about 32 sequences fit under the same ceiling.">
  <defs>
    <marker id="wall-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-kv-cache-hbm-wall text { fill: var(--ink-soft); }
    #fig-kv-cache-hbm-wall .title { font: 700 14px var(--sans,sans-serif); }
    #fig-kv-cache-hbm-wall .wall-lbl { font: 700 10.5px var(--sans,sans-serif); fill: var(--warn,#e0a106); letter-spacing: 0.5px; }
    #fig-kv-cache-hbm-wall .blk-lbl { font: 500 8.6px var(--sans,sans-serif); fill: var(--accent); text-anchor: middle; }
    #fig-kv-cache-hbm-wall .wt-lbl { font: 600 11px var(--sans,sans-serif); fill: var(--muted); text-anchor: middle; }
    #fig-kv-cache-hbm-wall .callout { font: 500 10px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-kv-cache-hbm-wall .callout-muted { font: 400 9px var(--sans,sans-serif); fill: var(--muted); font-style: italic; }
    #fig-kv-cache-hbm-wall .note { font: 400 9.5px var(--mono,monospace); fill: var(--muted); }
    #fig-kv-cache-hbm-wall .arr { stroke: var(--ink-soft); fill: none; stroke-width: 1.3; marker-end: url(#wall-arrow); }
    #fig-kv-cache-hbm-wall .kvblock { fill: var(--v-fill); stroke: var(--accent); stroke-width: 1.4; }
    #fig-kv-cache-hbm-wall .gqablock { fill: var(--v-fill); stroke: var(--accent); stroke-width: 1; }
    #fig-kv-cache-hbm-wall .wtblock { fill: var(--v-fill); stroke: var(--border-2); stroke-width: 1.4; }
    #fig-kv-cache-hbm-wall .ghost { fill: var(--warn,#e0a106); fill-opacity: 0.14; stroke: var(--warn,#e0a106); stroke-width: 1.3; stroke-dasharray: 4 3; }
  </style>


  <text x="185" y="24" text-anchor="middle" class="title">MHA</text>
  <text x="585" y="24" text-anchor="middle" class="title">GQA (g = h/8)</text>


  <text x="380" y="38" text-anchor="middle" class="wall-lbl">MEMORY WALL</text>
  <line x1="40" y1="96" x2="730" y2="96" stroke="var(--warn,#e0a106)" stroke-width="2.6"/>


  <g data-anim="1">
    <rect x="62" y="44" width="246" height="46" rx="4" class="ghost"/>
    <path d="M312 66 L360 66" class="arr"/>
    <text x="366" y="61" class="callout">grows with context length S</text>
    <text x="366" y="74" class="callout-muted">(longer context = fewer users)</text>
  </g>


  <g data-anim="2">
    <rect x="62" y="303" width="246" height="63" rx="4" class="kvblock"/>
    <text x="185" y="338" class="blk-lbl">1 sequence's KV cache</text>

    <rect x="62" y="234" width="246" height="63" rx="4" class="kvblock"/>
    <text x="185" y="269" class="blk-lbl">1 sequence's KV cache</text>

    <rect x="62" y="165" width="246" height="63" rx="4" class="kvblock"/>
    <text x="185" y="200" class="blk-lbl">1 sequence's KV cache</text>

    <rect x="62" y="96" width="246" height="63" rx="4" class="kvblock"/>
    <text x="185" y="131" class="blk-lbl">1 sequence's KV cache</text>
  </g>


  <g data-anim="3">
    <rect x="62" y="366" width="246" height="150" rx="4" class="wtblock"/>
    <text x="185" y="445" class="wt-lbl">model weights (fixed)</text>
  </g>


  <g data-anim="4">
    
    <g class="gqablock">
      <rect x="462" y="303" width="29" height="63" rx="2"/><rect x="493" y="303" width="29" height="63" rx="2"/>
      <rect x="524" y="303" width="29" height="63" rx="2"/><rect x="555" y="303" width="29" height="63" rx="2"/>
      <rect x="586" y="303" width="29" height="63" rx="2"/><rect x="617" y="303" width="29" height="63" rx="2"/>
      <rect x="648" y="303" width="29" height="63" rx="2"/><rect x="679" y="303" width="29" height="63" rx="2"/>

      <rect x="462" y="234" width="29" height="63" rx="2"/><rect x="493" y="234" width="29" height="63" rx="2"/>
      <rect x="524" y="234" width="29" height="63" rx="2"/><rect x="555" y="234" width="29" height="63" rx="2"/>
      <rect x="586" y="234" width="29" height="63" rx="2"/><rect x="617" y="234" width="29" height="63" rx="2"/>
      <rect x="648" y="234" width="29" height="63" rx="2"/><rect x="679" y="234" width="29" height="63" rx="2"/>

      <rect x="462" y="165" width="29" height="63" rx="2"/><rect x="493" y="165" width="29" height="63" rx="2"/>
      <rect x="524" y="165" width="29" height="63" rx="2"/><rect x="555" y="165" width="29" height="63" rx="2"/>
      <rect x="586" y="165" width="29" height="63" rx="2"/><rect x="617" y="165" width="29" height="63" rx="2"/>
      <rect x="648" y="165" width="29" height="63" rx="2"/><rect x="679" y="165" width="29" height="63" rx="2"/>

      <rect x="462" y="96" width="29" height="63" rx="2"/><rect x="493" y="96" width="29" height="63" rx="2"/>
      <rect x="524" y="96" width="29" height="63" rx="2"/><rect x="555" y="96" width="29" height="63" rx="2"/>
      <rect x="586" y="96" width="29" height="63" rx="2"/><rect x="617" y="96" width="29" height="63" rx="2"/>
      <rect x="648" y="96" width="29" height="63" rx="2"/><rect x="679" y="96" width="29" height="63" rx="2"/>
    </g>

    <rect x="462" y="366" width="246" height="150" rx="4" class="wtblock"/>
    <text x="585" y="445" class="wt-lbl">model weights (fixed)</text>
  </g>


  <g data-anim="5">
    <path d="M310 214 L344 214" class="arr"/>
    <text x="349" y="218" class="callout" style="font-weight:700">fits ~4 sequences</text>

    <path d="M460 252 L426 252" class="arr"/>
    <text x="421" y="256" class="callout" style="font-weight:700" text-anchor="end">fits ~32 sequences</text>
  </g>


  <text x="380" y="550" text-anchor="middle" class="note">block size is proportional to  2 * L_layers * S * (KV-head count) * d_h * P</text>
</svg>
<figcaption><b>The KV cache, not the model weights, is what hits the memory wall first.</b> GPU HBM is a fixed budget: model weights occupy a fixed slab, and the space above it fills with one KV-cache block per concurrent sequence until a hard ceiling. Shrinking the per-sequence cache (GQA's ~8x narrower blocks here) doesn't just save memory &#8212; it multiplies how many users or how much context fit under the same ceiling.</figcaption>
</figure>
