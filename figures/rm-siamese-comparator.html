<svg viewBox="0 0 800 500" role="img" aria-label="The reward model trains as a Siamese weight-tied comparator: chosen and rejected responses pass through the same network to produce two scalars whose difference feeds the Bradley-Terry loss, and both forward passes update one shared set of weights. All C(K,2) pairs from one prompt are formed from K completions encoded exactly once.">

    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>

  <line x1="180" y1="192" x2="212" y2="192" stroke="var(--ink-soft,#64748b)" stroke-width="1.4" marker-end="url(#sc-arr)"/>

  <text x="265" y="295" text-anchor="middle" class="lbl-xs accent" font-weight="700">ONLY THE DIFFERENCE ENTERS THE LOSS</text>

  <line x1="300" y1="266" x2="270" y2="303" stroke="var(--ink-soft,#64748b)" stroke-width="1.4" marker-end="url(#sc-arr)"/>

  <rect x="150" y="305" width="230" height="46" rx="7" fill="var(--accent,#c15b39)" fill-opacity="0.12" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <text x="265" y="324" text-anchor="middle" class="mono accent">-log sigma(Delta)</text>
  <text x="265" y="339" text-anchor="middle" class="lbl-xs muted">(Bradley-Terry loss)</text>
</g>

<g data-anim="5">

  <path d="M 300 305 C 400 288, 400 165, 320 146 L 284 142" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#sc-arr-a2)"/>
  <text x="34" y="230" class="lbl-xs accent2">gradient flows backward through</text>
  <text x="34" y="242" class="lbl-xs accent2" font-weight="700">BOTH forward passes to the</text>
  <text x="34" y="254" class="lbl-xs accent2" font-weight="700">SAME shared weights phi</text>
</g>

<g data-anim="1">
  <text x="602" y="60" text-anchor="middle" class="ttl">ALL K PAIRS FROM ONE PROMPT, ENCODED ONCE</text>

  <rect x="547" y="70" width="110" height="32" rx="6" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="602" y="91" text-anchor="middle" class="mono-sm">prompt x</text>
</g>

<g data-anim="2">

  <line x1="602" y1="102" x2="475" y2="118" stroke="var(--ink-soft,#64748b)" stroke-width="1.3" marker-end="url(#sc-arr)"/>
  <line x1="602" y1="102" x2="555" y2="118" stroke="var(--ink-soft,#64748b)" stroke-width="1.3" marker-end="url(#sc-arr)"/>
  <line x1="602" y1="102" x2="649" y2="118" stroke="var(--ink-soft,#64748b)" stroke-width="1.3" marker-end="url(#sc-arr)"/>
  <line x1="602" y1="102" x2="729" y2="118" stroke="var(--ink-soft,#64748b)" stroke-width="1.3" marker-end="url(#sc-arr)"/>

  <rect x="440" y="120" width="70" height="32" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="475" y="140" text-anchor="middle" class="mono-sm">y_1</text>
  <rect x="520" y="120" width="70" height="32" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="555" y="140" text-anchor="middle" class="mono-sm">y_2</text>
  <rect x="614" y="120" width="70" height="32" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="649" y="140" text-anchor="middle" class="mono-sm">y_3</text>
  <rect x="694" y="120" width="70" height="32" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="729" y="140" text-anchor="middle" class="mono-sm">y_4</text>

  <text x="602" y="166" text-anchor="middle" class="lbl-xs muted">ranked by the human - y_1 best ... y_4 worst  (K = 4)</text>
</g>

<g data-anim="3">
  <line x1="475" y1="152" x2="475" y2="180" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" marker-end="url(#sc-arr)"/>
  <line x1="555" y1="152" x2="555" y2="180" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" marker-end="url(#sc-arr)"/>
  <line x1="649" y1="152" x2="649" y2="180" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" marker-end="url(#sc-arr)"/>
  <line x1="729" y1="152" x2="729" y2="180" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" marker-end="url(#sc-arr)"/>

  <rect x="435" y="182" width="335" height="34" rx="6" fill="var(--accent,#c15b39)" fill-opacity="0.12" stroke="var(--accent,#c15b39)" stroke-width="1.8"/>
  <text x="602" y="199" text-anchor="middle" class="mono accent">shared r_phi</text>
  <text x="602" y="211" text-anchor="middle" class="lbl-xs muted">same tied weights, applied 4x (not 4 networks)</text>

  <line x1="475" y1="216" x2="475" y2="236" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" marker-end="url(#sc-arr)"/>

  <line x1="649" y1="216" x2="649" y2="236" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" marker-end="url(#sc-arr)"/>
  <line x1="729" y1="216" x2="729" y2="236" stroke="var(--ink-soft,#64748b)" stroke-width="1.2" marker-end="url(#sc-arr)"/>

  <circle cx="475" cy="250" r="14" fill="var(--accent2,#3b82f6)" fill-opacity="0.18" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="475" y="254" text-anchor="middle" class="mono-sm accent2">r_1</text>
  <circle cx="555" cy="250" r="14" fill="var(--accent2,#3b82f6)" fill-opacity="0.18" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="555" y="254" text-anchor="middle" class="mono-sm accent2">r_2</text>
  <circle cx="649" cy="250" r="14" fill="var(--accent2,#3b82f6)" fill-opacity="0.18" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="649" y="254" text-anchor="middle" class="mono-sm accent2">r_3</text>
  <circle cx="729" cy="250" r="14" fill="var(--accent2,#3b82f6)" fill-opacity="0.18" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <text x="729" y="254" text-anchor="middle" class="mono-sm accent2">r_4</text>

<g data-anim="4">
  <text x="602" y="282" text-anchor="middle" class="lbl-xs muted">arithmetic only - no new encoder calls</text>
  <line x1="602" y1="286" x2="602" y2="298" stroke="var(--ink-soft,#64748b)" stroke-width="1.3" marker-end="url(#sc-arr)"/>

  <text x="496" y="344" text-anchor="middle" class="mono-sm">r_1 - r_2</text>
  <rect x="553" y="327" width="98" height="26" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="602" y="344" text-anchor="middle" class="mono-sm">r_1 - r_3</text>
  <rect x="659" y="327" width="98" height="26" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="708" y="344" text-anchor="middle" class="mono-sm">r_1 - r_4</text>

  <rect x="447" y="360" width="98" height="26" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="496" y="377" text-anchor="middle" class="mono-sm">r_2 - r_3</text>
  <rect x="553" y="360" width="98" height="26" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="602" y="377" text-anchor="middle" class="mono-sm">r_2 - r_4</text>
  <rect x="659" y="360" width="98" height="26" rx="5" class="v-fill v-stroke" stroke-width="1.1"/>

  <text x="602" y="414" text-anchor="middle" class="lbl-xs muted">on 4 already-computed scalars</text>

<g data-anim="5">
  <rect x="435" y="425" width="335" height="30" rx="6" class="v-grid" fill="none" stroke-width="1"/>
  <text x="602" y="437" text-anchor="middle" class="lbl-xs accent" font-weight="700">InstructGPT's efficiency win AND</text>
  <text x="602" y="449" text-anchor="middle" class="lbl-xs accent" font-weight="700">anti-overfitting regularizer</text>
</g>

</svg>
<figcaption><b>The reward model is a Siamese, weight-tied comparator.</b> Chosen and rejected responses pass through the <i>same</i> network r<sub>&amp;phi;</sub> — two forward passes, one shared set of weights — and only the scalar difference &amp;Delta; = r<sub>w</sub> &amp;minus; r<sub>l</sub> ever enters the Bradley&amp;ndash;Terry loss, whose gradient flows back through both passes into that one set of weights. <b>Right:</b> because encoding is the expensive part, InstructGPT encodes all K completions of a prompt once and forms every one of the C(K,2) pairwise differences as cheap arithmetic on the resulting scalars — both a compute win and, by tying all pairs from one prompt into a single gradient step, a regularizer against overfitting.</figcaption>
</figure>
