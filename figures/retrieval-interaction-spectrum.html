<figcaption><b>Late interaction is the middle path between cross-encoders and bi-encoders.</b> A cross-encoder runs full attention across every query-document pair (expressive but too slow to scan a corpus); a bi-encoder crushes each side into one vector (fast but loses fine-grained detail); late interaction keeps a vector per token or patch and lets each query token find only its single best-matching document element at the very end, staying both expressive and fully precomputable.</figcaption>
