<figure class="viz" id="fig-promptiter-eval-loop">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 920 560" role="img" aria-label="Evals-driven prompt iteration loop: five nodes arranged clockwise (Write, Run, Read, Form, Update) connected by arrows forming a cycle, with a Stop diamond in the center and a one-way exit lane to Lock, Test, and Ship.">
<style>
  #fig-promptiter-eval-loop text { fill: var(--ink-soft); }
  #fig-promptiter-eval-loop .node-title { font: 700 12px var(--sans,sans-serif); fill: #fff; }
  #fig-promptiter-eval-loop .body { font: 400 10.5px var(--sans,sans-serif); }
  #fig-promptiter-eval-loop .edge-lbl { font: italic 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-promptiter-eval-loop .caption { font: 400 11px var(--sans,sans-serif); fill: var(--muted); }
  #fig-promptiter-eval-loop .warn { font: 600 10px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-promptiter-eval-loop .stop-body { font: 400 9.5px var(--sans,sans-serif); }

  @keyframes pil-fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pil-token {
    0%   { offset-distance: 0%; opacity: 1; }
    85%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  @keyframes pil-nodeglow { 0%,100% { filter: none; } 40%,60% { filter: drop-shadow(0 0 6px var(--accent,#4f46e5)); } }
  @keyframes pil-exitglow { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pil-warnflash { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

  @media (prefers-reduced-motion: no-preference) {
    #fig-promptiter-eval-loop [data-anim="1"] { opacity: 0; animation: pil-fadein 0.4s ease 0.2s forwards; }
    #fig-promptiter-eval-loop [data-anim="2"] { opacity: 0; animation: pil-fadein 0.4s ease 0.6s forwards; }
    #fig-promptiter-eval-loop [data-anim="3"] { opacity: 0; animation: pil-fadein 0.4s ease 1.0s forwards; }
    #fig-promptiter-eval-loop [data-anim="4"] { opacity: 0; animation: pil-fadein 0.4s ease 1.4s forwards; }
    #fig-promptiter-eval-loop [data-anim="5"] { opacity: 0; animation: pil-fadein 0.4s ease 1.8s forwards; }
    #fig-promptiter-eval-loop [data-anim="stop"] { opacity: 0; animation: pil-fadein 0.4s ease 2.2s forwards; }
    #fig-promptiter-eval-loop [data-anim="exit"] { opacity: 0; animation: pil-exitglow 0.8s ease 3.4s forwards; }
    #fig-promptiter-eval-loop .warn-callout { animation: pil-warnflash 1s ease 4.4s 3; }
    #fig-promptiter-eval-loop .loop-node { animation: pil-nodeglow 2.4s ease 2.2s infinite; }
  }
</style>
<defs>
  <marker id="pil-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  <marker id="pil-arr-exit" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="pil-arr-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
  </marker>
</defs>





<g data-anim="1">
  <rect x="210" y="40" width="168" height="72" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#9994d4)" stroke-width="2" class="loop-node"/>
  <rect x="210" y="40" width="168" height="22" rx="8" fill="var(--accent,#4f46e5)"/>
  <rect x="210" y="52" width="168" height="10" fill="var(--accent,#4f46e5)"/>
  <text x="294" y="54" text-anchor="middle" class="node-title" dominant-baseline="middle">1 · WRITE</text>
  <text x="220" y="73" class="body">Write prompt variant v_n</text>
</g>


<g data-anim="2">
  <rect x="458" y="148" width="168" height="72" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#9994d4)" stroke-width="2"/>
  <rect x="458" y="148" width="168" height="22" rx="8" fill="var(--accent,#4f46e5)"/>
  <rect x="458" y="160" width="168" height="10" fill="var(--accent,#4f46e5)"/>
  <text x="542" y="162" text-anchor="middle" class="node-title" dominant-baseline="middle">2 · RUN</text>
  <text x="468" y="181" class="body">Run eval harness on dev</text>
  <text x="468" y="194" class="body">set (50–200 examples)</text>
</g>


<g data-anim="3">
  <rect x="418" y="352" width="168" height="72" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#9994d4)" stroke-width="2"/>
  <rect x="418" y="352" width="168" height="22" rx="8" fill="var(--accent,#4f46e5)"/>
  <rect x="418" y="364" width="168" height="10" fill="var(--accent,#4f46e5)"/>
  <text x="502" y="366" text-anchor="middle" class="node-title" dominant-baseline="middle">3 · READ</text>
  <text x="428" y="385" class="body">Read failure cases —</text>
  <text x="428" y="398" class="body">shared patterns?</text>
</g>


<g data-anim="4">
  <rect x="96" y="352" width="168" height="72" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#9994d4)" stroke-width="2"/>
  <rect x="96" y="352" width="168" height="22" rx="8" fill="var(--accent,#4f46e5)"/>
  <rect x="96" y="364" width="168" height="10" fill="var(--accent,#4f46e5)"/>
  <text x="180" y="366" text-anchor="middle" class="node-title" dominant-baseline="middle">4 · FORM</text>
  <text x="106" y="385" class="body">Form hypothesis</text>
  <text x="106" y="398" class="body">(e.g. fails on negation…)</text>
</g>


<g data-anim="5">
  <rect x="36" y="148" width="168" height="84" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#9994d4)" stroke-width="2"/>
  <rect x="36" y="148" width="168" height="22" rx="8" fill="var(--accent,#4f46e5)"/>
  <rect x="36" y="160" width="168" height="10" fill="var(--accent,#4f46e5)"/>
  <text x="120" y="162" text-anchor="middle" class="node-title" dominant-baseline="middle">5 · UPDATE</text>
  <text x="46" y="181" class="body">Update prompt: add</text>
  <text x="46" y="194" class="body">instruction / example /</text>
  <text x="46" y="207" class="body">rephrase / GOTO 2</text>
</g>


<g data-anim="stop">
  <polygon points="295,206 390,260 295,314 200,260" fill="var(--surface,#f8f8fb)" stroke="var(--accent,#4f46e5)" stroke-width="2"/>
  <text x="295" y="240" text-anchor="middle" class="node-title" dominant-baseline="middle" fill="var(--accent,#4f46e5)" style="font:700 12px var(--sans,sans-serif)">STOP?</text>
  <text x="295" y="261" text-anchor="middle" class="stop-body">dev plateaus 3 iters</text>
  <text x="295" y="274" text-anchor="middle" class="stop-body">exceeds threshold</text>
  <text x="295" y="287" text-anchor="middle" class="stop-body">budget exhausted</text>
  
  <path d="M542 220 Q542 252 392 260" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#pil-arr)"/>
  <text x="480" y="232" class="edge-lbl">check after eval</text>
</g>



<path d="M378 76 Q430 76 458 148" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#pil-arr)"/>

<path d="M542 220 Q600 280 586 352" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#pil-arr)"/>

<path d="M418 388 L264 388" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#pil-arr)"/>

<path d="M96 374 Q56 330 120 232" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#pil-arr)"/>

<path d="M120 148 Q156 80 210 76" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#pil-arr)"/>


<g data-anim="exit">
  <path d="M390 260 L650 260" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.8" marker-end="url(#pil-arr-exit)"/>
  <text x="520" y="250" text-anchor="middle" class="edge-lbl" fill="var(--good,#2f9e6e)">stop conditions met</text>

  
  
  <rect x="652" y="226" width="136" height="48" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <rect x="652" y="226" width="136" height="20" rx="6" fill="var(--good,#2f9e6e)" opacity="0.7"/>
  <rect x="652" y="236" width="136" height="10" fill="var(--good,#2f9e6e)" opacity="0.7"/>
  <text x="720" y="238" text-anchor="middle" class="node-title" dominant-baseline="middle" style="font:700 11px var(--sans,sans-serif);">LOCK the prompt</text>
  <text x="720" y="262" text-anchor="middle" class="body" style="font-size:10px">version control it</text>

  
  <line x1="720" y1="274" x2="720" y2="306" stroke="var(--good,#2f9e6e)" stroke-width="1.5" marker-end="url(#pil-arr-exit)"/>

  
  <rect x="652" y="308" width="136" height="52" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <rect x="652" y="308" width="136" height="20" rx="6" fill="var(--good,#2f9e6e)" opacity="0.5"/>
  <rect x="652" y="318" width="136" height="10" fill="var(--good,#2f9e6e)" opacity="0.5"/>
  <text x="720" y="320" text-anchor="middle" class="node-title" dominant-baseline="middle" style="font:700 11px var(--sans,sans-serif);">RUN held-out TEST</text>
  <text x="720" y="342" text-anchor="middle" class="body" style="font-size:10px">once per shipped version</text>
  <text x="720" y="354" text-anchor="middle" class="body" style="font-size:10px">only</text>

  
  <rect x="652" y="364" width="230" height="36" rx="5" fill="var(--surface,#f8f8fb)" stroke="var(--warn,#e0a106)" stroke-width="1.5" stroke-dasharray="5 3" class="warn-callout"/>
  <text x="767" y="378" text-anchor="middle" class="warn">Cardinal sin: never run the</text>
  <text x="767" y="392" text-anchor="middle" class="warn">test set during iteration.</text>

  
  <line x1="720" y1="360" x2="720" y2="408" stroke="var(--good,#2f9e6e)" stroke-width="1.5" marker-end="url(#pil-arr-exit)"/>

  
  <rect x="666" y="410" width="108" height="44" rx="8" fill="var(--accent,#4f46e5)"/>
  <text x="720" y="436" text-anchor="middle" class="node-title" dominant-baseline="middle" style="font-size:16px">SHIP</text>
</g>


<text x="460" y="532" text-anchor="middle" class="caption">Loop until dev score plateaus, threshold met, or budget exhausted — then exit to the one-way test/ship lane.</text>
</svg>
<figcaption><b>The evals-driven prompt iteration loop cycles through Write, Run, Read, Form, and Update until a stop condition fires.</b> Once stopped, the prompt is locked and evaluated on the held-out test set exactly once before shipping. Running the test set during iteration is the cardinal sin — it collapses your test set into a de facto dev set.</figcaption>
</figure>
