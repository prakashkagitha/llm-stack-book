<figure class="viz" id="fig-trl-vllm-colocate-rollout-flow">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 900 480" role="img" aria-label="TRL vLLM backend: Training Process (GPU 0-3) on the left exchanges weights and prompts with vLLM Server (GPU 4-7) on the right through four numbered steps, then loops back.">
<defs>
  <marker id="vcr-arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent,#f59e0b)"/>
  </marker>
  <marker id="vcr-arr-l" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent-2,#3b82f6)"/>
  </marker>
  <marker id="vcr-arr-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--ink-soft,#64748b)"/>
  </marker>
</defs>
<style>
  #fig-trl-vllm-colocate-rollout-flow text { fill: currentColor; }
  #fig-trl-vllm-colocate-rollout-flow .panel-lbl { font: 700 13px var(--sans,sans-serif); }
  #fig-trl-vllm-colocate-rollout-flow .box-lbl   { font: 600 12px var(--sans,sans-serif); }
  #fig-trl-vllm-colocate-rollout-flow .step-lbl  { font: 500 11.5px var(--sans,sans-serif); }
  #fig-trl-vllm-colocate-rollout-flow .snum      { font: 700 11px var(--sans,sans-serif); fill: var(--surface-3,#f1f5f9); }
  #fig-trl-vllm-colocate-rollout-flow .arr-lbl   { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-trl-vllm-colocate-rollout-flow .callout   { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-trl-vllm-colocate-rollout-flow .self-lbl  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }

  /* packet animation keyframes */
  @keyframes vcr-pkt-a {
    0%,5%    { opacity:0; transform: translateX(0); }
    10%      { opacity:1; transform: translateX(0); }
    28%      { opacity:1; transform: translateX(180px); }
    32%,100% { opacity:0; transform: translateX(180px); }
  }
  @keyframes vcr-pkt-b {
    0%,28%   { opacity:0; transform: translateX(0); }
    33%      { opacity:1; transform: translateX(0); }
    50%      { opacity:1; transform: translateX(180px); }
    54%,100% { opacity:0; transform: translateX(180px); }
  }
  @keyframes vcr-pkt-c {
    0%,50%   { opacity:0; transform: translateX(0); }
    55%      { opacity:1; transform: translateX(0); }
    72%      { opacity:1; transform: translateX(-180px); }
    76%,100% { opacity:0; transform: translateX(-180px); }
  }
  @keyframes vcr-self-loop {
    0%,72%   { opacity:0; }
    75%,92%  { opacity:1; }
    96%,100% { opacity:0; }
  }
  @keyframes vcr-vllm-pulse {
    0%,28%   { opacity:0.3; }
    33%,72%  { opacity:1; }
    73%,100% { opacity:0.3; }
  }
  @keyframes vcr-train-back {
    0%,72%   { opacity:0.3; }
    76%,92%  { opacity:1; }
    96%,100% { opacity:0.3; }
  }

  #fig-trl-vllm-colocate-rollout-flow .pkt-a { animation: vcr-pkt-a 6s ease-in-out infinite; }
  #fig-trl-vllm-colocate-rollout-flow .pkt-b { animation: vcr-pkt-b 6s ease-in-out infinite; }
  #fig-trl-vllm-colocate-rollout-flow .pkt-c { animation: vcr-pkt-c 6s ease-in-out infinite; }
  #fig-trl-vllm-colocate-rollout-flow .self-pulse { animation: vcr-self-loop 6s ease-in-out infinite; }
  #fig-trl-vllm-colocate-rollout-flow .vllm-active { animation: vcr-vllm-pulse 6s ease-in-out infinite; }
  #fig-trl-vllm-colocate-rollout-flow .train-back  { animation: vcr-train-back 6s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    #fig-trl-vllm-colocate-rollout-flow .pkt-a,
    #fig-trl-vllm-colocate-rollout-flow .pkt-b,
    #fig-trl-vllm-colocate-rollout-flow .pkt-c  { animation: none; opacity: 0.8; }
    #fig-trl-vllm-colocate-rollout-flow .self-pulse { animation: none; opacity: 0.8; }
    #fig-trl-vllm-colocate-rollout-flow .vllm-active,
    #fig-trl-vllm-colocate-rollout-flow .train-back { animation: none; opacity: 1; }
  }
</style>


<rect x="22" y="30" width="420" height="400" rx="12"
      fill="var(--surface-3,#e2e8f0)" fill-opacity="0.35"
      stroke="var(--accent,#f59e0b)" stroke-width="2"/>
<text x="232" y="54" text-anchor="middle" class="panel-lbl">Training Process (GPU 0-3)</text>


<rect x="44" y="66" width="376" height="340" rx="8"
      fill="var(--accent,#f59e0b)" fill-opacity="0.08"
      stroke="var(--accent,#f59e0b)" stroke-width="1.5"/>
<text x="232" y="88" text-anchor="middle" class="box-lbl">GRPOTrainer</text>



<circle cx="72" cy="118" r="11" fill="var(--accent,#f59e0b)"/>
<text x="72" y="122" text-anchor="middle" class="snum">1</text>
<text x="92" y="122" class="step-lbl">push updated weights</text>

<circle cx="72" cy="184" r="11" fill="var(--accent,#f59e0b)"/>
<text x="72" y="188" text-anchor="middle" class="snum">2</text>
<text x="92" y="188" class="step-lbl">send prompts</text>

<circle cx="72" cy="260" r="11" fill="var(--accent,#f59e0b)"/>
<text x="72" y="264" text-anchor="middle" class="snum">3</text>
<text x="92" y="264" class="step-lbl">receive completions</text>

<rect x="58" y="316" width="330" height="68" rx="6"
      fill="var(--accent,#f59e0b)" fill-opacity="0.12"
      stroke="var(--accent,#f59e0b)" stroke-width="1" class="train-back"/>
<circle cx="72" cy="346" r="11" fill="var(--accent,#f59e0b)"/>
<text x="72" y="350" text-anchor="middle" class="snum">4</text>
<text x="92" y="342" class="step-lbl">compute reward, loss, update</text>
<text x="92" y="358" class="self-lbl">(back-prop on training GPUs)</text>


<path d="M 50 316 C 34 280 34 155 50 130"
      fill="none" stroke="var(--accent,#f59e0b)" stroke-width="1.5"
      stroke-dasharray="4,3" marker-end="url(#vcr-arr-r)" class="self-pulse"/>


<rect x="570" y="30" width="308" height="400" rx="12"
      fill="var(--accent-2,#3b82f6)" fill-opacity="0.08"
      stroke="var(--accent-2,#3b82f6)" stroke-width="2" class="vllm-active"/>
<text x="724" y="54" text-anchor="middle" class="panel-lbl">vLLM Server (GPU 4-7)</text>


<rect x="590" y="100" width="268" height="80" rx="7"
      fill="var(--accent-2,#3b82f6)" fill-opacity="0.14"
      stroke="var(--accent-2,#3b82f6)" stroke-width="1.5"/>
<text x="724" y="130" text-anchor="middle" class="box-lbl">AsyncLLMEngine</text>
<text x="724" y="152" text-anchor="middle" class="callout">receives prompts, manages queue</text>
<text x="724" y="166" text-anchor="middle" class="callout">serves updated model weights</text>


<rect x="590" y="210" width="268" height="80" rx="7"
      fill="var(--accent-2,#3b82f6)" fill-opacity="0.14"
      stroke="var(--accent-2,#3b82f6)" stroke-width="1.5"/>
<text x="724" y="242" text-anchor="middle" class="box-lbl">PagedAttention rollout</text>
<text x="724" y="264" text-anchor="middle" class="callout">KV-cache paged memory</text>
<text x="724" y="278" text-anchor="middle" class="callout">generates completions in parallel</text>


<rect x="590" y="328" width="268" height="72" rx="7"
      fill="var(--good,#2f9e6e)" fill-opacity="0.10"
      stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
<text x="724" y="350" text-anchor="middle" class="callout" style="fill:var(--good,#2f9e6e);font-weight:600;font-size:10px">OVERLAP</text>
<text x="724" y="366" text-anchor="middle" class="callout">vLLM generates while training GPUs</text>
<text x="724" y="380" text-anchor="middle" class="callout">run back-prop  ->  1.5-2x wall-clock</text>
<text x="724" y="394" text-anchor="middle" class="callout">throughput improvement</text>




<line x1="442" y1="120" x2="568" y2="128" stroke="var(--accent,#f59e0b)" stroke-width="2"
      marker-end="url(#vcr-arr-r)"/>
<text x="505" y="98" text-anchor="middle" class="arr-lbl" style="fill:var(--accent,#f59e0b)">push updated weights</text>
<text x="505" y="109" text-anchor="middle" class="arr-lbl">(shared mem / RDMA)</text>


<line x1="442" y1="186" x2="568" y2="168" stroke="var(--accent,#f59e0b)" stroke-width="2"
      marker-end="url(#vcr-arr-r)"/>
<text x="505" y="200" text-anchor="middle" class="arr-lbl" style="fill:var(--accent,#f59e0b)">prompts</text>


<line x1="568" y1="252" x2="444" y2="262" stroke="var(--accent-2,#3b82f6)" stroke-width="2"
      marker-end="url(#vcr-arr-l)"/>
<text x="506" y="243" text-anchor="middle" class="arr-lbl" style="fill:var(--accent-2,#3b82f6)">completions</text>



<rect class="pkt-a" x="446" y="113" width="44" height="16" rx="4"
      fill="var(--accent,#f59e0b)" fill-opacity="0.95"/>
<text class="pkt-a" x="468" y="125" text-anchor="middle"
      style="font:600 9px var(--sans,sans-serif);fill:var(--surface-3,#f1f5f9)">weights</text>


<rect class="pkt-b" x="446" y="179" width="44" height="16" rx="4"
      fill="var(--accent,#f59e0b)" fill-opacity="0.95"/>
<text class="pkt-b" x="468" y="191" text-anchor="middle"
      style="font:600 9px var(--sans,sans-serif);fill:var(--surface-3,#f1f5f9)">prompts</text>


<rect class="pkt-c" x="524" y="245" width="44" height="16" rx="4"
      fill="var(--accent-2,#3b82f6)" fill-opacity="0.95"/>
<text class="pkt-c" x="546" y="257" text-anchor="middle"
      style="font:600 9px var(--sans,sans-serif);fill:var(--surface-3,#f1f5f9)">output</text>
</svg>
<figcaption><b>TRL's vLLM backend decouples generation from gradient computation.</b> After each optimizer step, the trainer pushes updated weights to the vLLM server (step 1), sends a new prompt batch (step 2), and receives completions back (step 3) while the training GPUs simultaneously run back-propagation on the previous batch (step 4). This overlap of generation and training delivers a 1.5–2x wall-clock throughput improvement over the default colocated mode.</figcaption>
</figure>
