<figure class="viz" id="fig-reliability-multiprovider-gateway">
<button class="viz-replay" type="button">↻ replay</button>
<style>
  #fig-reliability-multiprovider-gateway text { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-reliability-multiprovider-gateway .lbl-bold { font: 700 12px var(--sans,sans-serif); }
  #fig-reliability-multiprovider-gateway .lbl-sm { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-reliability-multiprovider-gateway .lbl-code { font: 600 10px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-reliability-multiprovider-gateway .cap { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-reliability-multiprovider-gateway .route-lbl { font: 700 10px var(--sans,sans-serif); fill: var(--accent,#7c3aed); }

  /* Packet animation: normal flow to Provider A */
  @keyframes gw-pkt-normal {
    0%   { cx: 90px; cy: 230px; opacity: 0; r: 5px; }
    5%   { opacity: 1; }
    25%  { cx: 240px; cy: 230px; opacity: 1; }
    40%  { cx: 530px; cy: 175px; opacity: 1; }
    55%  { cx: 530px; cy: 175px; opacity: 1; }
    65%  { opacity: 0; }
    100% { opacity: 0; }
  }
  /* Fault flash on Provider A */
  @keyframes gw-fault-flash {
    0%,59%  { opacity: 0; }
    60%,67% { opacity: 0.7; }
    68%,73% { opacity: 0; }
    74%,79% { opacity: 0.7; }
    80%,100%{ opacity: 0; }
  }
  /* Circuit OPEN label appear */
  @keyframes gw-open-lbl {
    0%,64%  { opacity: 0; }
    65%,88% { opacity: 1; }
    89%,100%{ opacity: 0; }
  }
  /* Packet failover to Provider B */
  @keyframes gw-pkt-failover {
    0%,64%  { cx: 90px; cy: 230px; opacity: 0; r: 5px; }
    65%     { opacity: 0; }
    70%     { cx: 240px; cy: 230px; opacity: 1; }
    85%     { cx: 530px; cy: 280px; opacity: 1; }
    92%     { opacity: 1; }
    95%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  /* Provider B border brightens during failover */
  @keyframes gw-b-active {
    0%,69%  { stroke: var(--border-2,#94a3b8); stroke-width: 1.5px; }
    70%,94% { stroke: var(--good,#2f9e6e); stroke-width: 2.5px; }
    95%,100%{ stroke: var(--border-2,#94a3b8); stroke-width: 1.5px; }
  }
  /* A path dims during failover */
  @keyframes gw-a-dim {
    0%,64%  { opacity: 1; }
    65%,94% { opacity: 0.25; }
    95%,100%{ opacity: 1; }
  }

  #fig-reliability-multiprovider-gateway #gw-pkt { animation: gw-pkt-normal 8s ease-in-out infinite; }
  #fig-reliability-multiprovider-gateway #gw-pkt2 { animation: gw-pkt-failover 8s ease-in-out infinite; }
  #fig-reliability-multiprovider-gateway #gw-fault { animation: gw-fault-flash 8s ease-in-out infinite; }
  #fig-reliability-multiprovider-gateway #gw-open-lbl { animation: gw-open-lbl 8s ease-in-out infinite; }
  #fig-reliability-multiprovider-gateway #gw-path-a { animation: gw-a-dim 8s ease-in-out infinite; }
  #fig-reliability-multiprovider-gateway #gw-prov-b { animation: gw-b-active 8s ease-in-out infinite; }
</style>
<svg viewBox="0 0 880 440" role="img" aria-label="Multi-provider LLM gateway: requests flow to Provider A normally; when Provider A fails the circuit opens and the gateway automatically reroutes to Provider B.">
<defs>
  <marker id="gw-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--border-2,#94a3b8)"/>
  </marker>
  <marker id="gw-arr-ok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="gw-arr-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#7c3aed)"/>
  </marker>
</defs>


<rect x="14" y="202" width="112" height="52" rx="9" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<text x="70" y="225" text-anchor="middle" class="lbl-bold">Request</text>
<text x="70" y="241" text-anchor="middle" class="lbl-sm">from application</text>


<line x1="126" y1="228" x2="190" y2="228" stroke="var(--border-2,#94a3b8)" stroke-width="1.5" marker-end="url(#gw-arr)"/>


<rect x="194" y="80" width="234" height="300" rx="12" fill="var(--accent,#7c3aed)" fill-opacity="0.07" stroke="var(--accent,#7c3aed)" stroke-width="1.8"/>
<text x="311" y="104" text-anchor="middle" class="lbl-bold" style="fill:var(--accent,#7c3aed)">LLM Gateway</text>
<text x="311" y="120" text-anchor="middle" class="lbl-sm">(your code)</text>


<rect x="218" y="148" width="186" height="26" rx="13" fill="var(--accent,#7c3aed)" fill-opacity="0.15" stroke="var(--accent,#7c3aed)" stroke-width="1" stroke-opacity="0.5"/>
<text x="311" y="166" text-anchor="middle" class="route-lbl">Primary route</text>

<rect x="218" y="218" width="186" height="26" rx="13" fill="var(--border-2,#94a3b8)" fill-opacity="0.15" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<text x="311" y="236" text-anchor="middle" class="route-lbl" style="fill:var(--muted,#64748b)">Fallback route</text>

<rect x="218" y="288" width="186" height="26" rx="13" fill="var(--border-2,#94a3b8)" fill-opacity="0.10" stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="4 2"/>
<text x="311" y="306" text-anchor="middle" class="route-lbl" style="fill:var(--muted,#64748b)">Emergency route</text>


<text x="214" y="334" class="lbl-sm">&#x2022; Health probing (synthetic every 30s)</text>
<text x="214" y="346" class="lbl-sm">&#x2022; Circuit breaking (&gt;5% err / 60s)</text>
<text x="214" y="358" class="lbl-sm">&#x2022; Latency SLO enforcement (p95)</text>
<text x="214" y="370" class="lbl-sm">&#x2022; Model equivalence (alias -&gt; model id)</text>



<g id="gw-path-a">
  <line x1="404" y1="161" x2="546" y2="161" stroke="var(--good,#2f9e6e)" stroke-width="2" marker-end="url(#gw-arr-ok)"/>
  <text x="475" y="153" text-anchor="middle" class="lbl-sm" style="fill:var(--good,#2f9e6e)">priority by weight</text>
  
  <circle cx="476" cy="165" r="6" fill="var(--good,#2f9e6e)" opacity="0.9"/>
  <text x="476" y="169" text-anchor="middle" style="font:700 8px sans-serif;fill:#fff">C</text>
</g>

<rect x="550" y="126" width="284" height="70" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
<text x="692" y="154" text-anchor="middle" class="lbl-bold" style="fill:var(--good,#2f9e6e)">Provider A (e.g., OpenAI)</text>
<text x="692" y="172" text-anchor="middle" class="lbl-code">gpt-4o-2024-08-06</text>
<circle cx="628" cy="184" r="3.5" fill="var(--good,#2f9e6e)"/>
<text x="638" y="188" text-anchor="start" class="lbl-sm" style="fill:var(--good,#2f9e6e)">Healthy / serving</text>


<line x1="428" y1="231" x2="546" y2="251" stroke="var(--border-2,#94a3b8)" stroke-width="1.5" marker-end="url(#gw-arr)"/>

<circle cx="487" cy="241" r="6" fill="var(--border-2,#94a3b8)" fill-opacity="0.5"/>
<text x="487" y="245" text-anchor="middle" style="font:700 8px sans-serif;fill:var(--ink-soft,#334155)">C</text>

<rect id="gw-prov-b" x="550" y="216" width="284" height="70" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
<text x="692" y="244" text-anchor="middle" class="lbl-bold">Provider B (e.g., Anthropic)</text>
<text x="692" y="262" text-anchor="middle" class="lbl-code">claude-opus-4-5</text>
<circle cx="660" cy="274" r="3.5" fill="none" stroke="var(--muted,#64748b)" stroke-width="1.2"/>
<text x="670" y="278" text-anchor="start" class="lbl-sm" style="fill:var(--muted,#64748b)">Standby</text>


<line x1="428" y1="301" x2="546" y2="326" stroke="var(--border-2,#94a3b8)" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#gw-arr)"/>
<circle cx="487" cy="313" r="6" fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>
<text x="487" y="317" text-anchor="middle" style="font:700 8px sans-serif;fill:var(--muted,#64748b)">C</text>

<rect x="550" y="306" width="284" height="60" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#94a3b8)" stroke-width="1.2" stroke-dasharray="5 3"/>
<text x="692" y="330" text-anchor="middle" class="lbl-bold" style="fill:var(--muted,#64748b)">Provider C (self-hosted)</text>
<text x="692" y="348" text-anchor="middle" class="lbl-sm">last resort / emergency</text>



<circle id="gw-pkt" cx="70" cy="228" r="5" fill="var(--good,#2f9e6e)" opacity="0">
  <animate attributeName="cx" dur="8s" repeatCount="indefinite"
    keyTimes="0;0.05;0.25;0.40;0.55;0.65;1"
    values="70;70;240;530;530;530;70"/>
  <animate attributeName="cy" dur="8s" repeatCount="indefinite"
    keyTimes="0;0.05;0.25;0.40;0.55;0.65;1"
    values="228;228;228;161;161;161;228"/>
  <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
    keyTimes="0;0.02;0.05;0.50;0.65;0.68;1"
    values="0;0;1;1;1;0;0"/>
</circle>


<circle id="gw-pkt2" cx="70" cy="228" r="5" fill="var(--accent,#7c3aed)" opacity="0">
  <animate attributeName="cx" dur="8s" repeatCount="indefinite"
    keyTimes="0;0.65;0.70;0.85;0.92;0.96;1"
    values="70;70;240;530;530;530;70"/>
  <animate attributeName="cy" dur="8s" repeatCount="indefinite"
    keyTimes="0;0.65;0.70;0.85;0.92;0.96;1"
    values="228;228;228;251;251;251;228"/>
  <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
    keyTimes="0;0.65;0.67;0.70;0.88;0.93;0.96;1"
    values="0;0;0;1;1;1;0;0"/>
</circle>


<rect id="gw-fault" x="550" y="126" width="284" height="70" rx="10" fill="var(--bad,#dc2626)" opacity="0">
  <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
    keyTimes="0;0.59;0.60;0.67;0.68;0.73;0.74;0.79;0.80;1"
    values="0;0;0.5;0.5;0;0;0.5;0.5;0;0"/>
</rect>


<g id="gw-open-lbl" opacity="0">
  <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
    keyTimes="0;0.64;0.65;0.88;0.89;1"
    values="0;0;1;1;0;0"/>
  <rect x="558" y="198" width="196" height="18" rx="4" fill="var(--warn,#e0a106)"/>
  <text x="656" y="211" text-anchor="middle" style="font:700 10px var(--sans,sans-serif);fill:#fff">circuit OPEN — cooldown 30s</text>
</g>


<text x="440" y="422" text-anchor="middle" class="cap">Gateway auto-reroutes on failure — circuit opens, traffic shifts to next available provider</text>

</svg>
<figcaption><b>The LLM gateway absorbs provider failures through automatic circuit-breaking and weighted failover.</b> Under normal operation a request flows to the primary provider (Provider A). When A accumulates errors, the circuit trips to OPEN and subsequent requests are transparently rerouted to the standby provider (Provider B) without application changes. The gateway also handles health probing, latency SLO enforcement, and model-alias mapping.</figcaption>
</figure>
