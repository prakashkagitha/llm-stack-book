<text x="540" y="275" text-anchor="middle" class="caption">each expert -&gt; its top-C tokens</text>
<text x="540" y="291" text-anchor="middle" class="caption" fill="var(--good,#2f9e6e)">exactly C tokens/expert -&gt; balanced</text>
<text x="540" y="307" text-anchor="middle" class="caption">variable compute per token</text>
<text x="540" y="323" text-anchor="middle" class="caption">awkward for causal decode</text>

</svg>
<figcaption><b>Token-choice vs. expert-choice routing.</b> In token-choice (left), each token selects its top-k experts; multiple tokens can choose the same expert, causing overload and token drops (highlighted in amber). In expert-choice (right), each expert picks exactly C tokens, guaranteeing balanced load by construction, but some tokens may receive extra compute (T3) or none at all (T5, ghosted), making it ill-suited for autoregressive decoding.</figcaption>
</figure>
