<text x="470" y="450" text-anchor="middle" class="caption-strip">Logical contiguity (token order) is decoupled from physical contiguity (where bytes sit in HBM);</text>
<text x="470" y="470" text-anchor="middle" class="caption-strip">the block table is the only indirection the kernel needs.</text>

<figcaption><b>Logical KV blocks map to scattered physical blocks via per-sequence block tables.</b> Sequence A's three contiguous logical blocks (tokens 0-40) live in physical blocks 7, 1, and 4 — scattered and out of order. The deliberate crossing of arrows makes the scattering visible. Sequence B's blocks land in 3 and 6, interleaved with A's. Free blocks (0, 2, 5) can be assigned to any future sequence, eliminating external fragmentation entirely.</figcaption>
