<figure class="viz" id="fig-gov-eu-ai-act-risk-pyramid">
<style>
  #fig-gov-eu-ai-act-risk-pyramid text { fill: var(--ink-soft); }
  #fig-gov-eu-ai-act-risk-pyramid .tier-title { font: 700 13px var(--sans,sans-serif); }
  #fig-gov-eu-ai-act-risk-pyramid .tier-desc  { font: 400 11px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-gov-eu-ai-act-risk-pyramid .tier-ex    { font: 400 10px var(--sans,sans-serif); font-style: italic; fill: var(--muted); }
  #fig-gov-eu-ai-act-risk-pyramid .num        { font: 700 10px var(--sans,sans-serif); fill: var(--accent); text-anchor: middle; }
  #fig-gov-eu-ai-act-risk-pyramid .rail-txt   { font: 400 11px var(--sans,sans-serif); font-style: italic; fill: var(--muted); }
  #fig-gov-eu-ai-act-risk-pyramid .callout-h  { font: 700 13px var(--sans,sans-serif); fill: var(--accent); }
  #fig-gov-eu-ai-act-risk-pyramid .callout-b  { font: 400 11.5px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-gov-eu-ai-act-risk-pyramid .band-lbl   { font: 700 10px var(--sans,sans-serif); fill: var(--surface); text-anchor: middle; }
</style>
<svg viewBox="0 0 780 620" role="img" aria-label="Pyramid of the EU AI Act's four risk tiers -- prohibited at the narrow apex, high-risk, limited-risk, and minimal-risk at the wide base -- with obligation weight and compliance burden increasing toward the top, and a callout marking where most LLM applications land.">
  <defs>
    <marker id="rp-arrow" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 z" fill="var(--muted)"/>
    </marker>
    <pattern id="rp-hatch" width="9" height="9" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="9" height="9" fill="var(--accent)"/>
      <line x1="0" y1="0" x2="0" y2="9" stroke="var(--surface)" stroke-width="3.2" opacity="0.55"/>
    </pattern>
  </defs>


  <polygon points="130,60 157.5,170 102.5,170" fill="url(#rp-hatch)" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="102.5,170 157.5,170 185,280 75,280" fill="var(--accent)" fill-opacity="0.5" stroke="var(--accent)" stroke-width="1.2"/>
  <polygon points="75,280 185,280 212.5,390 47.5,390" fill="var(--accent)" fill-opacity="0.24" stroke="var(--border-2)" stroke-width="1.2"/>
  <polygon points="47.5,390 212.5,390 240,500 20,500" fill="var(--surface-3)" stroke="var(--border-2)" stroke-width="1.2"/>


  <text x="130" y="132" text-anchor="middle" class="band-lbl">!</text>


  <line x1="143.75" y1="115" x2="243" y2="115" stroke="var(--border-2)" stroke-width="1"/>
  <line x1="171.25" y1="225" x2="243" y2="225" stroke="var(--border-2)" stroke-width="1"/>
  <line x1="198.75" y1="335" x2="243" y2="335" stroke="var(--border-2)" stroke-width="1"/>
  <line x1="226.25" y1="445" x2="243" y2="445" stroke="var(--border-2)" stroke-width="1"/>


  <circle cx="250" cy="115" r="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.3"/>
  <text x="250" y="119" class="num">1</text>
  <circle cx="250" cy="225" r="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.3"/>
  <text x="250" y="229" class="num">2</text>
  <circle cx="250" cy="335" r="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.3"/>
  <text x="250" y="339" class="num">3</text>
  <circle cx="250" cy="445" r="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.3"/>
  <text x="250" y="449" class="num">4</text>


  <text x="264" y="97" class="tier-title">Prohibited</text>
  <text x="264" y="113" class="tier-desc">No compliance path; simply illegal</text>
  <text x="264" y="129" class="tier-ex">e.g. social scoring, real-time public biometric</text>
  <text x="264" y="145" class="tier-ex">surveillance, exploitation of vulnerable groups</text>


  <text x="264" y="199" class="tier-title">High-risk (Annex III)</text>
  <text x="264" y="215" class="tier-desc">Full compliance programme: conformity</text>
  <text x="264" y="231" class="tier-desc">assessment, Art. 9-15 controls</text>
  <text x="264" y="247" class="tier-ex">e.g. biometric ID, hiring, credit</text>
  <text x="264" y="263" class="tier-ex">scoring, medical triage, law enforcement</text>


  <text x="264" y="317" class="tier-title">Limited-risk</text>
  <text x="264" y="333" class="tier-desc">Transparency only: disclose</text>
  <text x="264" y="349" class="tier-desc">AI-generated content</text>
  <text x="264" y="365" class="tier-ex">e.g. chatbots, deepfakes, emotion recognition</text>


  <text x="264" y="435" class="tier-title">Minimal-risk</text>
  <text x="264" y="451" class="tier-desc">No mandatory obligations</text>
  <text x="264" y="467" class="tier-ex">e.g. spam filters, AI in video games</text>


  <path d="M578,170 H584 V390 M578,390 H584" fill="none" stroke="var(--accent)" stroke-width="1.3"/>
  <path d="M584,280 H620 V520" fill="none" stroke="var(--accent)" stroke-width="1.3" stroke-dasharray="4 3"/>


  <rect x="20" y="520" width="740" height="64" rx="8" fill="var(--accent)" fill-opacity="0.07" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="40" y="546" class="callout-h">Most LLM apps land here</text>
  <text x="40" y="566" class="callout-b">Consumer chat = limited-risk; enterprise hiring / credit / triage tip into high-risk.</text>


  <line x1="700" y1="500" x2="700" y2="72" stroke="var(--muted)" stroke-width="1.6" marker-end="url(#rp-arrow)"/>
  <line x1="694" y1="170" x2="706" y2="170" stroke="var(--border-2)" stroke-width="1.2"/>
  <line x1="694" y1="280" x2="706" y2="280" stroke="var(--border-2)" stroke-width="1.2"/>
  <line x1="694" y1="390" x2="706" y2="390" stroke="var(--border-2)" stroke-width="1.2"/>
  <text x="722" y="286" class="rail-txt" transform="rotate(-90 722 286)" text-anchor="middle">compliance burden increases</text>

</svg>
<figcaption><b>The EU AI Act sorts every AI system into one of four risk tiers, and obligation weight climbs sharply toward the narrow top.</b> Prohibited practices (apex) have no compliance path at all -- they are simply illegal -- while high-risk systems face a full conformity-assessment programme; limited- and minimal-risk systems face only transparency duties or none. Most consumer LLM products sit at limited-risk, but enterprise deployments in hiring, credit, or medical triage tip into the much heavier high-risk tier.</figcaption>
</figure>
