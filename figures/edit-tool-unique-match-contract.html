<figure class="viz" id="fig-edit-tool-unique-match-contract">
<style>
  #fig-edit-tool-unique-match-contract .lbl      { font: 600 12.5px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-edit-tool-unique-match-contract .lbl-sm   { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-edit-tool-unique-match-contract .lbl-xs   { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-edit-tool-unique-match-contract .tag      { font: 700 11px var(--sans,sans-serif); }
  #fig-edit-tool-unique-match-contract .code     { font: 500 10.5px var(--mono,monospace); fill: var(--ink-soft,#334155); }
  #fig-edit-tool-unique-match-contract .code-hit { font: 700 10.5px var(--mono,monospace); }
  #fig-edit-tool-unique-match-contract .head     { font: 700 13px var(--sans,sans-serif); fill: var(--ink,#211f1b); }
  #fig-edit-tool-unique-match-contract .take     { font: 700 12.5px var(--sans,sans-serif); }
  #fig-edit-tool-unique-match-contract .strike   { text-decoration: line-through; }
  #fig-edit-tool-unique-match-contract [data-anim] { opacity: 0; animation: fig-fade 0.55s ease forwards; }
  #fig-edit-tool-unique-match-contract [data-anim="1"] { animation-delay: 0.0s; }
  #fig-edit-tool-unique-match-contract [data-anim="2"] { animation-delay: 0.25s; }
  #fig-edit-tool-unique-match-contract [data-anim="3"] { animation-delay: 0.55s; }
  #fig-edit-tool-unique-match-contract [data-anim="4"] { animation-delay: 0.85s; }
  #fig-edit-tool-unique-match-contract [data-anim="5"] { animation-delay: 1.1s; }
  #fig-edit-tool-unique-match-contract [data-anim="6"] { animation-delay: 1.4s; }
  @keyframes fig-fade { to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    #fig-edit-tool-unique-match-contract [data-anim] { animation: none; opacity: 1; }
  }
</style>
<svg viewBox="0 0 800 620" role="img" aria-label="Decision infographic for the edit_file tool: it counts occurrences of old_string in the file and branches into three outcomes. Zero matches fails loudly because the model hallucinated the context. Exactly one match applies the edit and returns a terse success message. Two or more matches fails loudly as ambiguous. Only the single-match case mutates the file; both failure cases return a recoverable error. A crossed-out alternative at the top shows that rewriting the whole file must reproduce every unchanged line perfectly, so one dropped line silently corrupts it.">

<defs>
  <marker id="etu-arrow-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <marker id="etu-arrow-good" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="etu-arrow-mut" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#d8d1c0)"/>
  </marker>
</defs>


<g data-anim="1">
  <rect x="10" y="10" width="780" height="46" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="26" y="29" class="lbl strike" fill="var(--muted,#6d675d)">Alternative: "rewrite the whole file"</text>
  <text x="26" y="45" class="lbl-xs" fill="var(--muted,#6d675d)">must reproduce every unchanged line perfectly -&gt; one dropped line silently corrupts the file</text>
  <line x1="746" y1="20" x2="770" y2="46" stroke="var(--muted,#6d675d)" stroke-width="1.6"/>
  <line x1="770" y1="20" x2="746" y2="46" stroke="var(--muted,#6d675d)" stroke-width="1.6"/>
</g>


<g data-anim="2">
  <text x="10" y="80" class="head">edit_file(old_string, new_string)</text>

  <rect x="10" y="92" width="230" height="118" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <text x="22" y="110" class="lbl-xs" fill="var(--muted,#6d675d)">config.py</text>
  <text x="22" y="128" class="code">1  def load():</text>
  <text x="22" y="144" class="code-hit" fill="var(--accent,#c15b39)">2      timeout = 30</text>
  <text x="22" y="160" class="code">3      retries = 3</text>
  <text x="22" y="176" class="code">4      return Config(</text>
  <text x="22" y="192" class="code">5          timeout, retries)</text>

  <rect x="250" y="92" width="185" height="118" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="342" y="124" text-anchor="middle" class="lbl">count occurrences of</text>
  <text x="342" y="142" text-anchor="middle" class="code-hit" fill="var(--ink,#211f1b)">old_string</text>
  <text x="342" y="160" text-anchor="middle" class="lbl">in the file</text>
  <text x="342" y="184" text-anchor="middle" class="lbl-xs">text.count(old_string)</text>
</g>


<g data-anim="6">
  <rect x="10" y="240" width="425" height="300" rx="10" fill="var(--surface-3,#ece7da)" fill-opacity="0.55" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="26" y="266" class="take" fill="var(--ink,#211f1b)">Only the unique-match case</text>
  <text x="26" y="284" class="take" fill="var(--ink,#211f1b)">touches the file:</text>

  <text x="26" y="316" class="code">0 matches   -&gt;</text>
  <text x="185" y="316" class="tag" fill="var(--warn,#e0a106)">X</text>
  <text x="205" y="316" class="lbl-xs">error, no mutation</text>

  <text x="26" y="348" class="code">1 match     -&gt;</text>
  <text x="185" y="348" class="tag" fill="var(--good,#2f9e6e)">OK</text>
  <text x="215" y="348" class="lbl-xs">applied, only mutation</text>

  <text x="26" y="380" class="code">2+ matches  -&gt;</text>
  <text x="185" y="380" class="tag" fill="var(--warn,#e0a106)">X</text>
  <text x="205" y="380" class="lbl-xs">error, no mutation</text>

  <line x1="26" y1="404" x2="410" y2="404" stroke="var(--border-2,#d8d1c0)" stroke-width="1" stroke-dasharray="3 3"/>

  <rect x="30" y="420" width="385" height="104" rx="8" fill="var(--accent,#c15b39)" fill-opacity="0.14" stroke="var(--accent,#c15b39)" stroke-width="1.3"/>
  <text x="222" y="450" text-anchor="middle" class="take" fill="var(--accent,#c15b39)">Silent corruption becomes an</text>
  <text x="222" y="470" text-anchor="middle" class="take" fill="var(--accent,#c15b39)">observable, recoverable failure.</text>
  <text x="222" y="494" text-anchor="middle" class="lbl-xs">(the two error paths teach the</text>
  <text x="222" y="510" text-anchor="middle" class="lbl-xs">model how to fix its next call)</text>
</g>


<g data-anim="3">
  <line x1="435" y1="157" x2="465" y2="157" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <line x1="465" y1="116" x2="465" y2="466" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <line x1="465" y1="116" x2="485" y2="116" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2" marker-end="url(#etu-arrow-mut)"/>
  <line x1="465" y1="290" x2="485" y2="290" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2" marker-end="url(#etu-arrow-mut)"/>
  <line x1="465" y1="466" x2="485" y2="466" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2" marker-end="url(#etu-arrow-mut)"/>
</g>


<g data-anim="3">
  <text x="485" y="76" class="lbl" fill="var(--ink,#211f1b)">CASE: 0 matches</text>
  <rect x="485" y="86" width="305" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="497" y="106" class="lbl-xs">"timeout = 30" not found</text>
  <text x="497" y="124" class="tag" fill="var(--warn,#e0a106)">tag: the model hallucinated the context</text>
  <line x1="637" y1="146" x2="637" y2="164" stroke="var(--warn,#e0a106)" stroke-width="1.6" marker-end="url(#etu-arrow-warn)"/>
  <rect x="485" y="164" width="305" height="66" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <text x="637" y="186" text-anchor="middle" class="tag" fill="var(--warn,#e0a106)">FAIL LOUD</text>
  <text x="637" y="204" text-anchor="middle" class="lbl-xs">Error: old_string not found.</text>
  <text x="637" y="220" text-anchor="middle" class="lbl-xs">Re-read the file; text does not match.</text>
</g>


<g data-anim="4">
  <text x="485" y="254" class="lbl" fill="var(--ink,#211f1b)">CASE: exactly 1 match</text>
  <rect x="485" y="264" width="305" height="52" rx="8" fill="var(--surface,#fff)" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="497" y="284" class="lbl-xs">matched span highlighted:</text>
  <text x="497" y="302" class="code-hit" fill="var(--good,#2f9e6e)">"timeout = 30"  (unique)</text>
  <line x1="637" y1="316" x2="637" y2="334" stroke="var(--good,#2f9e6e)" stroke-width="1.8" marker-end="url(#etu-arrow-good)"/>
  <text x="700" y="330" class="lbl-xs" fill="var(--good,#2f9e6e)">APPLY</text>
  <rect x="485" y="336" width="305" height="66" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="637" y="358" text-anchor="middle" class="tag" fill="var(--good,#2f9e6e)">file updated</text>
  <text x="637" y="376" text-anchor="middle" class="lbl-xs">terse success:</text>
  <text x="637" y="392" text-anchor="middle" class="code-hit" fill="var(--good,#2f9e6e)">"Edited: 1 replacement"</text>
</g>


<g data-anim="5">
  <text x="485" y="426" class="lbl" fill="var(--ink,#211f1b)">CASE: 2+ matches</text>
  <rect x="485" y="436" width="305" height="60" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="497" y="456" class="lbl-xs">"timeout = 30" appears twice</text>
  <text x="497" y="474" class="tag" fill="var(--warn,#e0a106)">tag: ambiguous</text>
  <line x1="637" y1="496" x2="637" y2="514" stroke="var(--warn,#e0a106)" stroke-width="1.6" marker-end="url(#etu-arrow-warn)"/>
  <rect x="485" y="514" width="305" height="66" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <text x="637" y="536" text-anchor="middle" class="tag" fill="var(--warn,#e0a106)">FAIL LOUD</text>
  <text x="637" y="554" text-anchor="middle" class="lbl-xs">Error: old_string appears 2 times.</text>
  <text x="637" y="570" text-anchor="middle" class="lbl-xs">Provide more surrounding context.</text>
</g>

</svg>
<figcaption><b>The edit tool has exactly one input contract: <code>old_string</code> must match uniquely, or the harness fails loudly instead of guessing.</b> Only the middle, exactly-one-match case is allowed to mutate the file; both the zero-match and ambiguous-match cases return a recoverable error the model can read and act on. This converts a class of silent corruptions into observable, recoverable failures.</figcaption>
</figure>
