<figure class="viz" id="fig-mcp-arch">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 428" role="img" aria-label="MCP architecture: a host app with an LLM engine and one MCP client per server connects over a single standard JSON-RPC protocol -- the USB-C for tools -- to filesystem, GitHub, and database servers, each exposing tools, resources, and prompts.">
  <defs>
    <marker id="mcp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-mcp-arch text{ fill:var(--ink-soft); }
    #fig-mcp-arch .title{ font:700 13px var(--sans,sans-serif); }
    #fig-mcp-arch .tag{ font:700 10px var(--mono,monospace); fill:var(--muted); }
    #fig-mcp-arch .lbl{ font:600 12px var(--sans,sans-serif); }
    #fig-mcp-arch .sub{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-mcp-arch .chip{ font:600 9.5px var(--mono,monospace); }
    #fig-mcp-arch .proto{ font:700 11px var(--mono,monospace); fill:var(--accent); }
    #fig-mcp-arch .cap{ font:600 10px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <rect x="14" y="40" width="216" height="332" rx="11" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="28" y="32" class="tag">HOST PROCESS</text>
    <text x="122" y="62" text-anchor="middle" class="title" fill="var(--accent)">Claude Desktop / IDE</text>

    
    <rect x="34" y="78" width="176" height="50" rx="8" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="122" y="100" text-anchor="middle" class="lbl">LLM engine</text>
    <text x="122" y="116" text-anchor="middle" class="sub">owns the conversation loop</text>

    
    <text x="122" y="150" text-anchor="middle" class="sub">one MCP client per server</text>
    <rect x="34" y="160" width="176" height="32" rx="7" class="v-fill v-grid" stroke-width="1.3"/>
    <text x="122" y="180" text-anchor="middle" class="chip">MCP client A</text>
    <rect x="34" y="200" width="176" height="32" rx="7" class="v-fill v-grid" stroke-width="1.3"/>
    <text x="122" y="220" text-anchor="middle" class="chip">MCP client B</text>
    <rect x="34" y="240" width="176" height="32" rx="7" class="v-fill v-grid" stroke-width="1.3"/>
    <text x="122" y="260" text-anchor="middle" class="chip">MCP client C</text>

    
    <text x="122" y="300" text-anchor="middle" class="sub">host mediates every call;</text>
    <text x="122" y="314" text-anchor="middle" class="sub">the LLM never talks to a server</text>

    
    <rect x="210" y="170" width="14" height="12" rx="3" class="v-accent" fill="var(--accent)"/>
    <rect x="210" y="210" width="14" height="12" rx="3" class="v-accent" fill="var(--accent)"/>
    <rect x="210" y="250" width="14" height="12" rx="3" class="v-accent" fill="var(--accent)"/>
  </g>

  
  <g data-anim="2">

    <path d="M224 176 H244 V96 H372" fill="none" stroke="var(--accent)" class="v-accent-s viz-draw" style="--len:230" stroke-width="1.6" marker-end="url(#mcp-arrow)"/>
    <path d="M224 216 H372" fill="none" stroke="var(--accent)" class="v-accent-s viz-draw" style="--len:148" stroke-width="1.6" marker-end="url(#mcp-arrow)"/>
    <path d="M224 256 H244 V336 H372" fill="none" stroke="var(--accent)" class="v-accent-s viz-draw" style="--len:230" stroke-width="1.6" marker-end="url(#mcp-arrow)"/>


    <text x="300" y="160" text-anchor="middle" class="cap" fill="var(--accent)">one standard protocol</text>
    <rect x="252" y="200" width="96" height="32" rx="8" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="300" y="214" text-anchor="middle" class="proto">JSON-RPC 2.0</text>
    <text x="300" y="226" text-anchor="middle" class="sub">stdio · HTTP</text>
    <text x="300" y="270" text-anchor="middle" class="cap viz-pulse">"USB-C for tools"</text>
  </g>

  
  
  <g data-anim="3">
    <rect x="372" y="56" width="372" height="80" rx="10" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="388" y="48" class="tag">MCP SERVER A</text>
    <text x="438" y="80" text-anchor="middle" class="lbl" fill="var(--accent)">filesystem</text>
    <text x="438" y="96" text-anchor="middle" class="sub">files</text>
    <rect x="498" y="66" width="76" height="26" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
    <text x="536" y="83" text-anchor="middle" class="chip" fill="var(--good,#2f9e6e)">tools</text>
    <rect x="582" y="66" width="76" height="26" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="620" y="83" text-anchor="middle" class="chip">resources</text>
    <rect x="666" y="66" width="68" height="26" rx="6" class="v-fill v-grid" stroke-width="1.3"/>
    <text x="700" y="83" text-anchor="middle" class="chip">prompts</text>
    <text x="388" y="120" class="sub">read_file · list_dir · file:///… · summarise_dir</text>
  </g>

  
  <g data-anim="4">
    <rect x="372" y="176" width="372" height="80" rx="10" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="388" y="168" class="tag">MCP SERVER B</text>
    <text x="438" y="200" text-anchor="middle" class="lbl" fill="var(--accent)">GitHub</text>
    <text x="438" y="216" text-anchor="middle" class="sub">issues / PRs</text>
    <rect x="498" y="186" width="76" height="26" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
    <text x="536" y="203" text-anchor="middle" class="chip" fill="var(--good,#2f9e6e)">tools</text>
    <rect x="582" y="186" width="76" height="26" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="620" y="203" text-anchor="middle" class="chip">resources</text>
    <rect x="666" y="186" width="68" height="26" rx="6" class="v-fill v-grid" stroke-width="1.3"/>
    <text x="700" y="203" text-anchor="middle" class="chip">prompts</text>
    <text x="388" y="240" class="sub">create_issue · git://repo/HEAD · summarise_pr</text>
  </g>

  
  <g data-anim="5">
    <rect x="372" y="296" width="372" height="80" rx="10" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="388" y="288" class="tag">MCP SERVER C</text>
    <text x="438" y="320" text-anchor="middle" class="lbl" fill="var(--accent)">Postgres</text>
    <text x="438" y="336" text-anchor="middle" class="sub">database</text>
    <rect x="498" y="306" width="76" height="26" rx="6" fill="var(--good,#2f9e6e)" fill-opacity="0.16" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
    <text x="536" y="323" text-anchor="middle" class="chip" fill="var(--good,#2f9e6e)">tools</text>
    <rect x="582" y="306" width="76" height="26" rx="6" class="v-fill v-accent-s" stroke-width="1.3"/>
    <text x="620" y="323" text-anchor="middle" class="chip">resources</text>
    <rect x="666" y="306" width="68" height="26" rx="6" class="v-fill v-grid" stroke-width="1.3"/>
    <text x="700" y="323" text-anchor="middle" class="chip">prompts</text>
    <text x="388" y="360" class="sub">query_database · db/orders · explain_query</text>
  </g>


  <g data-anim="5">
    <text x="380" y="404" text-anchor="middle" class="cap">One host, one thin client per server, one wire format -- every server exposes the same three primitives.</text>
  </g>
</svg>
<figcaption><b>MCP is the USB-C port for AI tools.</b> A host app runs the LLM and one thin <b>MCP client</b> per server, all speaking the same <span class="chip">JSON-RPC 2.0</span> protocol over stdio or HTTP to independent <b>servers</b> — filesystem, GitHub, a database — each exposing the same three primitives: <b>tools</b>, <b>resources</b>, and <b>prompts</b>.</figcaption>
</figure>
