<figcaption><b>Transfusion's block-causal mask is a lower-triangular causal mask with one bidirectional square cut into it.</b> For the sequence text-text-text | image-image-image-image | text-text, text queries (rows 0-2, 7-8) attend causally to everything at or before them, but an image query (rows 3-6) additionally attends to <i>every</i> position in its own image block -- including positions that come later in the sequence -- while still never seeing text that follows the block. This one bidirectional square is what lets the diffusion head see the whole image it is denoising.</figcaption>
</figure>
