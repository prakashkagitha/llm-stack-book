<figure class="viz" id="fig-agentloop-reflexion-outer-loop">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 740 500" role="img" aria-label="Reflexion outer retry loop: the ReAct agent runs a trial, if it succeeds the answer is returned; if it fails a Reflector LLM diagnoses the error, appends a reflection to an accumulating memory store, and the reflections are injected into the next trial's context.">
<defs>
  <marker id="rx-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="rx-arrow-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  <marker id="rx-arrow-w" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--warn,#d97706)"/>
  </marker>
  <marker id="rx-arrow-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
</defs>
<style>
  #fig-agentloop-reflexion-outer-loop text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-agentloop-reflexion-outer-loop .hdr-txt { font: 700 13px var(--sans,sans-serif); fill: #fff; }
  #fig-agentloop-reflexion-outer-loop .body-sm { font: 400 11px var(--sans,sans-serif); }
  #fig-agentloop-reflexion-outer-loop .lbl-sm { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-agentloop-reflexion-outer-loop .badge-txt { font: 600 9px var(--sans,sans-serif); fill: var(--accent,#4f46e5); }
  #fig-agentloop-reflexion-outer-loop .chip-sm { font: 400 9px var(--sans,sans-serif); }
</style>


<g data-anim="1">
  <rect x="16" y="175" width="108" height="36" rx="18" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <text x="70" y="197" text-anchor="middle" style="font:600 12px var(--sans,sans-serif);">Task</text>
  
  <line x1="124" y1="193" x2="158" y2="193" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#rx-arrow)"/>
</g>


<g data-anim="2">
  <rect x="160" y="148" width="190" height="90" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  
  <rect x="160" y="148" width="190" height="30" rx="8" fill="var(--accent,#4f46e5)"/>
  <rect x="160" y="164" width="190" height="14" fill="var(--accent,#4f46e5)"/>
  <text x="255" y="168" text-anchor="middle" class="hdr-txt">Run ReAct agent</text>
  <text x="180" y="196" class="body-sm">Generates a trajectory</text>
  <text x="180" y="212" class="body-sm">via Thought / Action / Obs</text>

  
  <rect x="176" y="120" width="158" height="20" rx="5" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>
  <text x="255" y="134" text-anchor="middle" class="badge-txt">trial t of max_trials</text>

  
  <line x1="350" y1="193" x2="394" y2="193" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#rx-arrow)"/>
  <text x="372" y="185" text-anchor="middle" class="lbl-sm">trajectory</text>
</g>


<g data-anim="3">
  <polygon points="450,158 510,193 450,228 390,193" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>
  <text x="450" y="189" text-anchor="middle" style="font:600 11px var(--sans,sans-serif);">succeeded</text>
  <text x="450" y="204" text-anchor="middle" style="font:600 11px var(--sans,sans-serif);">?</text>
</g>


<g data-anim="4">
  <line x1="510" y1="193" x2="562" y2="193" stroke="var(--good,#2f9e6e)" stroke-width="1.6" marker-end="url(#rx-arrow-g)"/>
  <text x="536" y="185" text-anchor="middle" class="lbl-sm" style="fill:var(--good,#2f9e6e);">yes</text>
  
  <rect x="562" y="172" width="156" height="42" rx="21" fill="var(--accent,#4f46e5)"/>
  <text x="640" y="197" text-anchor="middle" style="font:600 12px var(--sans,sans-serif); fill:#fff;">return answer</text>
</g>


<g data-anim="5">
  <line x1="450" y1="228" x2="450" y2="310" stroke="var(--warn,#d97706)" stroke-width="1.6" marker-end="url(#rx-arrow-w)"/>
  <text x="464" y="275" class="lbl-sm" style="fill:var(--warn,#d97706);">no</text>
</g>


<g data-anim="6">
  <rect x="358" y="314" width="218" height="86" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <rect x="358" y="314" width="218" height="30" rx="8" fill="var(--accent2,#3b82f6)" style="fill:var(--accent2,#3b82f6)"/>
  <rect x="358" y="330" width="218" height="14" fill="var(--accent2,#3b82f6)" style="fill:var(--accent2,#3b82f6)"/>
  <text x="467" y="333" text-anchor="middle" class="hdr-txt">Reflector LLM</text>
  <text x="378" y="364" class="body-sm">What went wrong?</text>
  <text x="378" y="380" class="body-sm">What to do differently?</text>

  
  <line x1="358" y1="384" x2="296" y2="384" stroke="var(--ink-soft,#555)" stroke-width="1.4" marker-end="url(#rx-arrow)"/>
  <text x="327" y="378" text-anchor="middle" class="lbl-sm">append</text>
</g>


<g data-anim="7">
  
  <rect x="90" y="314" width="200" height="28" rx="6" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
  <text x="190" y="332" text-anchor="middle" style="font:700 11px var(--sans,sans-serif);">Reflection memory</text>
  
  
  <rect x="90" y="396" width="200" height="22" rx="4" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1" fill-opacity="0.7"/>
  <text x="100" y="411" class="chip-sm" style="fill:var(--muted,#888);">trial 1: tried X, use Y instead</text>
  
  <rect x="90" y="372" width="200" height="22" rx="4" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="100" y="387" class="chip-sm" style="fill:var(--muted,#888);">trial 2: missed step Z</text>
  
  <rect x="90" y="348" width="200" height="22" rx="4" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>
  <text x="100" y="363" class="chip-sm" style="fill:var(--accent,#4f46e5);">trial 3 (new): check case</text>

  <text x="190" y="448" text-anchor="middle" class="lbl-sm">(accumulates across trials)</text>
</g>


<g data-anim="8">
  <path d="M 150 320 C 35 300 35 248 200 240" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#rx-arrow-a)"/>
  <text x="108" y="280" class="lbl-sm" style="fill:var(--accent,#4f46e5);">inject reflections</text>
  <text x="108" y="293" class="lbl-sm" style="fill:var(--accent,#4f46e5);">into next trial's</text>
  <text x="108" y="306" class="lbl-sm" style="fill:var(--accent,#4f46e5);">context</text>
</g>

</svg>
<figcaption><b>Reflexion wraps the ReAct agent in an outer retry loop where each failed trial produces a verbal reflection that accumulates in memory.</b> On each failed trial a Reflector LLM diagnoses what went wrong; the reflection is appended to an episodic memory store; all accumulated reflections are then injected into the next trial's context. Because the memory grows with each trial rather than being overwritten, the agent receives progressively stronger guidance.</figcaption>
</figure>
