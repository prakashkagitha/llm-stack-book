<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 900 610" role="img" aria-label="Beam search with beam size 2: from BOS at step 0, candidates fan out at each step, top-2 are kept and the rest pruned, until the highest-scoring complete hypothesis is output.">
<defs>
  <marker id="sbst-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--border-2,#94a3b8)"/>
  </marker>
  <marker id="sbst-arr-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#6366f1)"/>
  </marker>
  
  <g id="sbst-rarr">
    <path d="M0 0 L11 0 M7 -3 L11 0 L7 3" fill="none"
          stroke="var(--muted,#64748b)" stroke-width="1.3"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</defs>
<style>
  #fig-sampling-beam-search-tree .col-hdr  { font: 700 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-beam-search-tree .node-lbl { font: 600 11px var(--mono,monospace); fill: var(--ink-soft,#334155); }
  #fig-sampling-beam-search-tree .cap      { font: italic 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-beam-search-tree .score    { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-sampling-beam-search-tree .leg      { font: 500 10px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-sampling-beam-search-tree .out-lbl  { font: 700 12px var(--sans,sans-serif); fill: #fff; }
  #fig-sampling-beam-search-tree .prune-x  { font: bold 13px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  /* ── Animation ── */
  /* step1-cands: opacity 0 -> 1 after 0.5s */
  #fig-sampling-beam-search-tree .s1c {
    animation: bst-in 7s ease-in-out infinite; animation-delay: 0.5s;
  }
  /* step1-prune: appear then fade to 0.22 */
  #fig-sampling-beam-search-tree .s1p {
    animation: bst-prune 7s ease-in-out infinite; animation-delay: 1.4s;
  }
  /* step1-kept: pulse accent after prune */
  #fig-sampling-beam-search-tree .s1k {
    animation: bst-in 7s ease-in-out infinite; animation-delay: 1.4s;
  }
  /* step2 candidates */
  #fig-sampling-beam-search-tree .s2c {
    animation: bst-in 7s ease-in-out infinite; animation-delay: 2.4s;
  }
  #fig-sampling-beam-search-tree .s2p {
    animation: bst-prune 7s ease-in-out infinite; animation-delay: 3.2s;
  }
  #fig-sampling-beam-search-tree .s2k {
    animation: bst-in 7s ease-in-out infinite; animation-delay: 3.2s;
  }
  /* output node */
  #fig-sampling-beam-search-tree .out {
    animation: bst-in 7s ease-in-out infinite; animation-delay: 4.4s;
  }
  @keyframes bst-in {
    0%   { opacity: 0; }
    6%   { opacity: 1; }
    88%  { opacity: 1; }
    96%  { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes bst-prune {
    0%    { opacity: 1; }
    10%   { opacity: 0.22; }
    88%   { opacity: 0.22; }
    96%   { opacity: 0; }
    100%  { opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    #fig-sampling-beam-search-tree .s1c,
    #fig-sampling-beam-search-tree .s1k,
    #fig-sampling-beam-search-tree .s2c,
    #fig-sampling-beam-search-tree .s2k,
    #fig-sampling-beam-search-tree .out  { animation: none; opacity: 1; }
    #fig-sampling-beam-search-tree .s1p,
    #fig-sampling-beam-search-tree .s2p  { animation: none; opacity: 0.22; }
  }
</style>

<figcaption><b>Beam search (B=2) expands all beams then prunes to the top-B at every step.</b> From the root [BOS], four candidates are scored; only the top-2 are kept (highlighted) while the rest are pruned (&#10005;). The same expand-and-prune loop repeats until EOS or max length. The final output is the surviving hypothesis with the highest length-normalized log-probability (exponent a ~ 0.6-0.8 prevents the beam from preferring shorter sequences).</figcaption>
</figure>
