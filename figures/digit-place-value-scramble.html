<figure class="viz" id="fig-digit-place-value-scramble">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 460" role="img" aria-label="Two-panel comparison of adding 12345 and 6789 in column form. Left panel: frequency-trained BPE splits the numbers into 123 plus 45 and 67 plus 89, boundaries that fall mid-column and misalign with place value. Right panel: per-digit or 1-to-3-digit grouping splits every digit into its own token, so token boundaries line up exactly with the units, tens, hundreds, thousands and ten-thousands columns, making carrying learnable.">
  <style>
    #fig-digit-place-value-scramble text{ fill:var(--ink-soft); }
    #fig-digit-place-value-scramble .title{ font:700 13px var(--sans,sans-serif); }
    #fig-digit-place-value-scramble .title-bad{ fill:var(--warn); }
    #fig-digit-place-value-scramble .title-good{ fill:var(--good); }
    #fig-digit-place-value-scramble .colhead{ font:600 9.5px var(--mono,monospace); fill:var(--muted); }
    #fig-digit-place-value-scramble .digit{ font:700 17px var(--mono,monospace); text-anchor:middle; }
    #fig-digit-place-value-scramble .op{ font:700 15px var(--mono,monospace); text-anchor:middle; fill:var(--muted); }
    #fig-digit-place-value-scramble .note{ font:500 10.5px var(--sans,sans-serif); }
    #fig-digit-place-value-scramble .note-bad{ fill:var(--warn); }
    #fig-digit-place-value-scramble .note-good{ fill:var(--good); }
    #fig-digit-place-value-scramble .brack-bad{ stroke:var(--warn); fill:none; stroke-width:1.6; }
    #fig-digit-place-value-scramble .brack-good{ stroke:var(--good); fill:none; stroke-width:1.6; }
    #fig-digit-place-value-scramble .label-bad{ font:600 10px var(--mono,monospace); fill:var(--warn); text-anchor:middle; }
    #fig-digit-place-value-scramble .label-good{ font:600 10px var(--mono,monospace); fill:var(--good); text-anchor:middle; }
    #fig-digit-place-value-scramble .gridline{ stroke:var(--v-grid,var(--border-2)); stroke-width:1; }
  </style>


  <text x="16" y="24" class="title title-bad">Frequency-trained BPE (inconsistent)</text>
  <text x="410" y="24" class="title title-good">Per-digit / 1-3-digit grouping (consistent)</text>

  <line x1="390" y1="14" x2="390" y2="345" stroke="var(--border-2)" stroke-width="1"/>


  <g data-anim="1">

    <g transform="translate(30,40)">

      <g class="colhead" text-anchor="middle">
        <text x="30">10k</text><text x="70">1k</text><text x="110">100</text><text x="150">10</text><text x="190">1</text>
      </g>
      <g class="gridline">
        <line x1="10" y1="30" x2="10" y2="130"/>
        <line x1="50" y1="30" x2="50" y2="130"/>
        <line x1="90" y1="30" x2="90" y2="130"/>
        <line x1="130" y1="30" x2="130" y2="130"/>
        <line x1="170" y1="30" x2="170" y2="130"/>
        <line x1="210" y1="30" x2="210" y2="130"/>
      </g>

      <g class="digit">
        <text x="30" y="52">1</text><text x="70" y="52">2</text><text x="110" y="52">3</text><text x="150" y="52">4</text><text x="190" y="52">5</text>
      </g>

      <text x="-6" y="82" class="op">+</text>
      <g class="digit">
        <text x="70" y="82">6</text><text x="110" y="82">7</text><text x="150" y="82">8</text><text x="190" y="82">9</text>
      </g>
      <line x1="4" y1="94" x2="212" y2="94" stroke="var(--ink-soft)" stroke-width="1.6"/>


      <path class="brack-bad" d="M 10 108 v10 h100 v-10"/>
      <text x="60" y="132" class="label-bad">[123]</text>
      <path class="brack-bad" d="M 130 108 v10 h80 v-10"/>
      <text x="170" y="132" class="label-bad">[45]</text>


      <path class="brack-bad" d="M 50 148 v10 h80 v-10"/>
      <text x="90" y="172" class="label-bad">[67]</text>
      <path class="brack-bad" d="M 130 148 v10 h80 v-10"/>
      <text x="170" y="172" class="label-bad">[89]</text>


      <line x1="110" y1="30" x2="110" y2="130" stroke="var(--warn)" stroke-width="1.4" stroke-dasharray="3,3"/>
      <line x1="130" y1="30" x2="130" y2="130" stroke="var(--warn)" stroke-width="1.4" stroke-dasharray="3,3"/>
    </g>

    <text x="30" y="222" class="note note-bad">12345 -&gt; [123][45]   6789 -&gt; [67][89]</text>
    <text x="30" y="240" class="note note-bad">token cuts don't match place value --</text>
    <text x="30" y="256" class="note note-bad">can't line up units with units,</text>
    <text x="30" y="272" class="note note-bad">so carrying is hard to learn.</text>
    <text x="30" y="294" class="note" fill="var(--muted)">Equal-length numbers can even chunk</text>
    <text x="30" y="310" class="note" fill="var(--muted)">differently run to run, depending on</text>
    <text x="30" y="326" class="note" fill="var(--muted)">which digit strings were frequent.</text>
  </g>


  <g data-anim="2">
    <g transform="translate(410,40)">
      <g class="colhead" text-anchor="middle">
        <text x="30">10k</text><text x="70">1k</text><text x="110">100</text><text x="150">10</text><text x="190">1</text>
      </g>
      <g class="gridline">
        <line x1="10" y1="30" x2="10" y2="130"/>
        <line x1="50" y1="30" x2="50" y2="130"/>
        <line x1="90" y1="30" x2="90" y2="130"/>
        <line x1="130" y1="30" x2="130" y2="130"/>
        <line x1="170" y1="30" x2="170" y2="130"/>
        <line x1="210" y1="30" x2="210" y2="130"/>
      </g>
      <g class="digit">
        <text x="30" y="52">1</text><text x="70" y="52">2</text><text x="110" y="52">3</text><text x="150" y="52">4</text><text x="190" y="52">5</text>
      </g>
      <text x="-6" y="82" class="op">+</text>
      <g class="digit">
        <text x="70" y="82">6</text><text x="110" y="82">7</text><text x="150" y="82">8</text><text x="190" y="82">9</text>
      </g>
      <line x1="4" y1="94" x2="212" y2="94" stroke="var(--ink-soft)" stroke-width="1.6"/>


      <path class="brack-good" d="M 10 108 v9 h40 v-9"/><text x="30" y="130" class="label-good">[1]</text>
      <path class="brack-good" d="M 50 108 v9 h40 v-9"/><text x="70" y="130" class="label-good">[2]</text>
      <path class="brack-good" d="M 90 108 v9 h40 v-9"/><text x="110" y="130" class="label-good">[3]</text>
      <path class="brack-good" d="M 130 108 v9 h40 v-9"/><text x="150" y="130" class="label-good">[4]</text>
      <path class="brack-good" d="M 170 108 v9 h40 v-9"/><text x="190" y="130" class="label-good">[5]</text>


      <path class="brack-good" d="M 50 148 v9 h40 v-9"/><text x="70" y="170" class="label-good">[6]</text>
      <path class="brack-good" d="M 90 148 v9 h40 v-9"/><text x="110" y="170" class="label-good">[7]</text>
      <path class="brack-good" d="M 130 148 v9 h40 v-9"/><text x="150" y="170" class="label-good">[8]</text>
      <path class="brack-good" d="M 170 148 v9 h40 v-9"/><text x="190" y="170" class="label-good">[9]</text>
    </g>

    <text x="410" y="222" class="note note-good">12345 -&gt; [1][2][3][4][5]   6789 -&gt; [6][7][8][9]</text>
    <text x="410" y="240" class="note note-good">every digit is its own stable token --</text>
    <text x="410" y="256" class="note note-good">place value is positional and consistent,</text>
    <text x="410" y="272" class="note note-good">so carrying is learnable.</text>
    <text x="410" y="294" class="note" fill="var(--muted)">(Llama splits every digit; GPT-4 and</text>
    <text x="410" y="310" class="note" fill="var(--muted)">Llama-3 group 1-3 digits at a time)</text>
  </g>


  <g data-anim="3">
    <rect x="16" y="356" width="748" height="94" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
    <text x="34" y="380" class="note" fill="var(--ink-soft)" font-weight="600">Same disease, different word: "strawberry"</text>
    <text x="34" y="400" class="note" font-family="var(--mono,monospace)" fill="var(--ink-soft)">strawberry -&gt; [str][aw][berry]: individual letters are never exposed,</text>
    <text x="34" y="418" class="note" fill="var(--muted)">so the model cannot count its r's -- the same boundary-vs-unit mismatch.</text>
    <g transform="translate(34,432)">
      <rect x="0" y="0" width="20" height="12" rx="2" class="v-fill" stroke="var(--warn)" stroke-width="1.4"/>
      <text x="26" y="10" class="note" fill="var(--muted)" font-size="10">inconsistent token boundary</text>
      <rect x="230" y="0" width="20" height="12" rx="2" class="v-fill" stroke="var(--good)" stroke-width="1.4"/>
      <text x="256" y="10" class="note" fill="var(--muted)" font-size="10">stable, aligned token boundary</text>
    </g>
  </g>

</svg>
<figcaption><b>Inconsistent token boundaries scramble place value; fixed-size or per-digit chunking keeps it aligned.</b> When a frequency-trained BPE tokenizer splits <code>12345</code> as <code>[123][45]</code> and <code>6789</code> as <code>[67][89]</code>, the token cuts fall mid-column and units no longer line up with units, so the model can't learn to carry. Splitting every digit into its own token (or grouping a consistent 1-3 digits at a time) makes each token exactly one place-value column wide — the same failure mode that keeps LLMs from reliably counting letters in words like "strawberry".</figcaption>
</figure>
