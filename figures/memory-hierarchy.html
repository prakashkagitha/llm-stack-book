<figure class="viz" id="fig-memory-hierarchy">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 360" role="img" aria-label="The GPU memory hierarchy as four stacked bars from registers to shared memory to L2 to HBM: capacity grows from kilobytes to gigabytes while bandwidth falls off a cliff from tens of terabytes per second on-chip to a few terabytes per second off-chip.">
  <defs>
    <marker id="mh-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-memory-hierarchy text{ fill:var(--ink-soft); }
    #fig-memory-hierarchy .tier{ font:600 14px var(--sans,sans-serif); }
    #fig-memory-hierarchy .scope{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-memory-hierarchy .num{ font:600 12px var(--mono,monospace); }
    #fig-memory-hierarchy .cap{ font:500 11px var(--mono,monospace); fill:var(--ink-soft); }
    #fig-memory-hierarchy .hdr{ font:600 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-memory-hierarchy .note{ font:600 12px var(--sans,sans-serif); }
    #fig-memory-hierarchy .small{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  
  <text x="44"  y="30" class="hdr">tier</text>
  <text x="200" y="30" text-anchor="middle" class="hdr">bandwidth  (bar length ∝ speed)</text>
  <text x="612" y="30" class="hdr">capacity</text>
  <text x="612" y="44" class="small">latency</text>

  
  <g data-anim="1">
    <path d="M22 56 h-8 v176 h8" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.3"/>
    <text x="8" y="148" text-anchor="middle" transform="rotate(-90 8 148)" class="note v-accent" fill="var(--accent)">on-chip SRAM · tens of TB/s</text>
  </g>

  
  <g data-anim="2">
    <rect x="40" y="58" width="500" height="34" rx="6" class="v-fill v-accent-s" stroke-width="1.5"/>
    <rect x="40" y="58" width="500" height="34" rx="6" class="v-accent viz-sweep" fill="var(--accent)" fill-opacity="0.30"/>
    <text x="52" y="80" class="tier v-accent" fill="var(--accent)">Registers</text>
    <text x="168" y="80" class="scope">per-thread</text>
    <text x="528" y="76" text-anchor="end" class="num v-accent" fill="var(--accent)">~tens of TB/s</text>
    <text x="556" y="76" class="cap">256 KB / SM</text>
    <text x="556" y="89" class="small">~1 cyc</text>
  </g>

  
  <g data-anim="3">
    <rect x="40" y="104" width="476" height="34" rx="6" class="v-fill v-accent-s" stroke-width="1.5"/>
    <rect x="40" y="104" width="476" height="34" rx="6" class="v-accent viz-sweep" fill="var(--accent)" fill-opacity="0.30"/>
    <text x="52" y="126" class="tier v-accent" fill="var(--accent)">SMEM / L1</text>
    <text x="168" y="126" class="scope">per-block</text>
    <text x="504" y="122" text-anchor="end" class="num v-accent" fill="var(--accent)">~tens of TB/s</text>
    <text x="556" y="122" class="cap">~228 KB / SM</text>
    <text x="556" y="135" class="small">~30 cyc</text>
  </g>

  
  <g data-anim="4">
    <rect x="40" y="150" width="452" height="34" rx="6" class="v-fill v-accent-s" stroke-width="1.5"/>
    <rect x="40" y="150" width="452" height="34" rx="6" class="v-accent viz-sweep" fill="var(--accent)" fill-opacity="0.30"/>
    <text x="52" y="172" class="tier v-accent" fill="var(--accent)">L2 cache</text>
    <text x="168" y="172" class="scope">whole GPU</text>
    <text x="480" y="168" text-anchor="end" class="num v-accent" fill="var(--accent)">~tens of TB/s</text>
    <text x="556" y="168" class="cap">~50 MB</text>
    <text x="556" y="181" class="small">~200 cyc</text>
  </g>

  
  <g data-anim="5">
    <line x1="138" y1="190" x2="138" y2="222" class="v-stroke" stroke="var(--warn,#e0a106)" stroke-width="1.6" stroke-dasharray="4 3"/>
    <path d="M138 196 L150 196" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.6" marker-end="url(#mh-arr)" opacity="0"/>
    <text x="150" y="208" class="note" fill="var(--warn,#e0a106)">bandwidth cliff</text>
    <text x="150" y="221" class="small">on-chip → off-chip: ~10×</text>
  </g>

  
  <g data-anim="5">
    <path d="M22 230 h-8 v34 h8" fill="none" class="v-stroke" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
    <text x="8" y="247" text-anchor="middle" transform="rotate(-90 8 247)" class="note" fill="var(--warn,#e0a106)">off-chip DRAM</text>
  </g>

  
  <g data-anim="5">
    <rect x="40" y="230" width="112" height="34" rx="6" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
    <rect x="40" y="230" width="112" height="34" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.28" class="viz-pulse"/>
    <text x="52" y="252" class="tier" fill="var(--warn,#e0a106)">HBM</text>
    <text x="168" y="245" class="scope">whole GPU ·</text>
    <text x="168" y="258" class="scope">off-chip DRAM</text>
    <text x="300" y="252" class="num" fill="var(--warn,#e0a106)">~3.35 TB/s</text>
    <text x="556" y="248" class="cap">80 GB</text>
    <text x="556" y="261" class="small">~500 cyc</text>
  </g>

  
  <g data-anim="5">
    <line x1="40" y1="296" x2="700" y2="296" class="v-grid" stroke-width="1.2" marker-end="url(#mh-arr)"/>
    <text x="40"  y="312" class="small">registers · KB</text>
    <text x="700" y="312" text-anchor="end" class="small">HBM · tens of GB</text>
    <text x="370" y="312" text-anchor="middle" class="hdr">capacity: each tier ≈ 10× larger going down  →</text>
  </g>
</svg>
<figcaption><b>Fast and tiny, or slow and huge — never both.</b> The three on-chip SRAM tiers (registers, SMEM/L1, L2) all deliver <b>tens of TB/s</b> but hold only kilobytes to tens of megabytes; the step to off-chip <b>HBM</b> drops bandwidth roughly 10× to a few TB/s while capacity jumps to tens of gigabytes. Kernel performance is the art of keeping reused data above that bandwidth cliff. (Illustrative H100-class orders of magnitude.)</figcaption>
</figure>
