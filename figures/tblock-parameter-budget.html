<figure class="viz" id="fig-tblock-parameter-budget">
<svg viewBox="0 0 780 390" role="img" aria-label="Parameter budget of one pre-norm transformer block. A single stacked bar splits into attention, about one third, fused QKV plus output projection, 4 d squared, and FFN, about two thirds, gated MLP, 3 times d times d_ff, with a thin sliver at the join for the two negligible RMSNorms. Below, the FFN segment expands into three equal matrices: W_gate, W_up, and W_down, each roughly d times d_ff, three matrices not two because the FFN is gated. A takeaway strip notes attention routes between tokens while the FFN computes per token and is the bulk of the weights, the part Mixture-of-Experts later swaps out.">
<defs>
  <marker id="pb-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
</defs>
<style>
  #fig-tblock-parameter-budget text     { font-family: var(--sans,sans-serif); fill: var(--ink-soft,#0f172a); }
  #fig-tblock-parameter-budget .h1      { font: 700 14px var(--sans,sans-serif); }
  #fig-tblock-parameter-budget .seg-t   { font: 700 13px var(--sans,sans-serif); fill: #fff; }
  #fig-tblock-parameter-budget .seg-s   { font: 500 10.5px var(--sans,sans-serif); }
  #fig-tblock-parameter-budget .cap     { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-tblock-parameter-budget .cap-sm  { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-tblock-parameter-budget .boxlbl  { font: 700 12.5px var(--mono,monospace); }
  #fig-tblock-parameter-budget .mono    { font: 500 10px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-tblock-parameter-budget .take    { font: 600 11.5px var(--sans,sans-serif); }
</style>

<text x="390" y="24" text-anchor="middle" class="h1">Parameter budget: one pre-norm transformer block</text>


<text x="277.3" y="58" text-anchor="middle" class="cap-sm">norms: negligible (2d)</text>
<line x1="277.3" y1="64" x2="277.3" y2="100" stroke="var(--muted,#64748b)" stroke-width="1" stroke-dasharray="3 3"/>


<text x="156.7" y="90" text-anchor="middle" class="h1" fill="var(--accent,#c15b39)">Attention ~ 1/3</text>
<text x="510.7" y="90" text-anchor="middle" class="h1" fill="var(--good,#2f9e6e)">FFN ~ 2/3</text>


<rect x="40"    y="100" width="233.3" height="54" fill="var(--accent,#c15b39)"/>
<rect x="273.3" y="100" width="8"     height="54" fill="var(--border-2,#94a3b8)"/>
<rect x="281.3" y="100" width="458.7" height="54" fill="var(--good,#2f9e6e)"/>
<rect x="40" y="100" width="700" height="54" fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>


<text x="156.7" y="174" text-anchor="middle" class="cap">fused QKV + output projection, 4d^2</text>
<text x="510.7" y="174" text-anchor="middle" class="cap">gated MLP, 3 x d x d_ff</text>


<text x="510.7" y="198" text-anchor="middle" class="cap">three matrices, not two (gated)</text>


<line x1="510.7" y1="204" x2="510.7" y2="221" stroke="var(--good,#2f9e6e)" stroke-width="1.6" marker-end="url(#pb-arrow)"/>
<line x1="281.3" y1="224" x2="740"   y2="224" stroke="var(--muted,#64748b)" stroke-width="1"/>
<line x1="281.3" y1="224" x2="281.3" y2="232" stroke="var(--muted,#64748b)" stroke-width="1"/>
<line x1="740"   y1="224" x2="740"   y2="232" stroke="var(--muted,#64748b)" stroke-width="1"/>


<rect x="281.3" y="232" width="143.6" height="50" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
<rect x="438.9" y="232" width="143.6" height="50" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
<rect x="596.5" y="232" width="143.6" height="50" rx="6" fill="var(--surface-3,#eef2f7)" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>

<text x="353.1" y="255" text-anchor="middle" class="boxlbl">W_gate</text>
<text x="510.7" y="255" text-anchor="middle" class="boxlbl">W_up</text>
<text x="668.3" y="255" text-anchor="middle" class="boxlbl">W_down</text>

<text x="353.1" y="272" text-anchor="middle" class="mono">approx d x d_ff</text>
<text x="510.7" y="272" text-anchor="middle" class="mono">approx d x d_ff</text>
<text x="668.3" y="272" text-anchor="middle" class="mono">approx d x d_ff</text>


<rect x="40" y="306" width="700" height="54" rx="8" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1"/>
<text x="390" y="329" text-anchor="middle" class="take">Attention routes between tokens; the FFN computes per token and is the bulk</text>
<text x="390" y="345" text-anchor="middle" class="take">of the weights -- the part Mixture-of-Experts later swaps out.</text>

</svg>
<figcaption><b>The FFN, not attention, owns most of a transformer block's weights.</b> In one pre-norm block, attention (fused QKV plus output projection, 4d^2) accounts for roughly a third of the parameters and the gated FFN (3 x d x d_ff across W_gate, W_up, and W_down) for roughly two-thirds; the two RMSNorms are negligible by comparison. Attention is the part that routes information between tokens, while the FFN -- the larger budget -- is the per-token computation that Mixture-of-Experts later replaces with a sparse, routed set of experts.</figcaption>
</figure>
