<figcaption><b>HBM splits into a fixed weights segment and a KV-cache region tiled into per-sequence slots, and the scheduler policy decides what happens when those slots run out.</b> Each slot's size is set by per-token KV cost times context length, so once the region fills, <code>guaranteed_no_evict</code> queues new requests to protect latency while <code>max_utilization</code> evicts and recomputes KV blocks from running sequences to admit more. Quantizing the KV cache to INT8 halves the per-slot cost, packing roughly twice as many concurrent sequences into the same memory region.</figcaption>
</figure>
