<figure class="viz" id="fig-lrsched-why-warmup">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 430" role="img" aria-label="With warmup the loss descends smoothly from step zero; without warmup, applying the full peak learning rate immediately inside the cold-start danger zone causes a sharp loss spike and divergence.">
  <style>
    #fig-lrsched-why-warmup text{ fill:var(--ink-soft); }
    #fig-lrsched-why-warmup .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-lrsched-why-warmup .sm{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-lrsched-why-warmup .tag{ font:600 12px var(--sans,sans-serif); }
    #fig-lrsched-why-warmup .mono{ font:500 11px var(--mono,monospace); fill:var(--muted); }
    #fig-lrsched-why-warmup .zone{ font:600 11.5px var(--sans,sans-serif); }
  </style>

  
  <g data-anim="1">
    <line x1="250" y1="26" x2="250" y2="350" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>
  </g>

  
  <g data-anim="1">
    <rect x="90" y="26" width="160" height="94" fill="var(--warn)" fill-opacity="0.10"/>
    <text x="170" y="16" text-anchor="middle" class="zone" fill="var(--warn)">cold-start danger zone</text>
  </g>

  <g data-anim="1">
    <line x1="90" y1="26" x2="90" y2="120" class="v-stroke" stroke="currentColor" stroke-width="1.2"/>
    <line x1="90" y1="120" x2="710" y2="120" class="v-stroke" stroke="currentColor" stroke-width="1.2"/>
    <text x="36" y="34" class="ax">LR</text>
  </g>

  <g data-anim="1">
    <line x1="90" y1="40" x2="702" y2="40" class="v-grid" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="82" y="44" text-anchor="end" class="sm">eta_max</text>
    <line x1="90" y1="112" x2="250" y2="112" class="v-grid" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="82" y="116" text-anchor="end" class="sm">eta_min</text>
  </g>

  
  <g data-anim="2">
    <path d="M90 40 L710 40" fill="none" stroke="var(--muted)" stroke-width="2.4"
          stroke-dasharray="7 5" class="viz-draw" style="--len:620"/>
    <text x="620" y="30" text-anchor="end" class="sm">no warmup</text>
  </g>

  
  <g data-anim="2">
    <path d="M90 112 L250 44 L710 44" fill="none" stroke="var(--accent)" stroke-width="2.6"
          class="viz-draw" style="--len:596" stroke-linecap="round"/>
    <text x="176" y="88" text-anchor="middle" class="sm" fill="var(--accent)">with warmup</text>
  </g>

  
  <g data-anim="1">
    <rect x="90" y="160" width="160" height="190" fill="var(--warn)" fill-opacity="0.10"/>
  </g>

  <g data-anim="1">
    <line x1="90" y1="160" x2="90" y2="350" class="v-stroke" stroke="currentColor" stroke-width="1.4"/>
    <line x1="90" y1="350" x2="710" y2="350" class="v-stroke" stroke="currentColor" stroke-width="1.4"/>
    <text x="36" y="176" class="ax">loss</text>
  </g>

  <text x="170" y="176" text-anchor="middle" class="zone" fill="var(--warn)">v_t ~ 0, gradients large &amp; erratic</text>

  
  <g data-anim="4">
    <path d="M90 200 L150 215 L210 228 L270 242 L330 262 L390 278 L450 292 L510 304 L570 314 L630 321 L690 327 L710 330"
          fill="none" stroke="var(--accent)" stroke-width="2.8" class="viz-draw" style="--len:660"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="90" cy="200" r="4" fill="var(--accent)" stroke="var(--surface,#fff)" stroke-width="1.2"/>
    <text x="550" y="272" text-anchor="middle" class="tag" fill="var(--accent)">with warmup: smooth, monotonic</text>
  </g>

  
  <g data-anim="4">
    <path d="M90 200 L130 190 L165 172 L195 150 L220 124 L238 100"
          fill="none" stroke="var(--muted)" stroke-width="2.4" stroke-dasharray="7 5"
          class="viz-draw" style="--len:150" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(238,100)">
      <line x1="-7" y1="-7" x2="7" y2="7" stroke="var(--muted)" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="-7" y1="7" x2="7" y2="-7" stroke="var(--muted)" stroke-width="2.6" stroke-linecap="round"/>
    </g>
  </g>

  <g data-anim="5">
    <path d="M296 96 Q262 96 246 98" fill="none" stroke="var(--muted)" stroke-width="1.3" marker-end="url(#wu-arrow)"/>
    <text x="302" y="100" class="sm">diverged / NaN</text>
  </g>

  <g data-anim="5">
    <text x="260" y="130" class="sm" fill="var(--ink-soft)">full LR x random weights -&gt;</text>
    <text x="260" y="145" class="sm" fill="var(--ink-soft)">update overshoots, logits saturate</text>
  </g>

  <g data-anim="1">
    <text x="90" y="368" text-anchor="middle" class="mono">0</text>
    <text x="250" y="368" text-anchor="middle" class="mono">T_w</text>
    <text x="710" y="368" text-anchor="middle" class="mono">step t</text>
  </g>

  <defs>
    <marker id="wu-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--muted)"/>
    </marker>
  </defs>
</svg>
<figcaption><b>Warmup prevents the cold-start blowup.</b> In the shaded danger zone Adam's second-moment estimate <b>v_t</b> is still near zero while raw gradients are large and erratic; applying the full peak learning rate <b>eta_max</b> from step 0 (dashed) drives updates large enough to saturate logits and blow up norms, spiking the loss into divergence. Ramping the LR linearly over <b>T_w</b> steps (solid) keeps updates small exactly while the optimizer is still calibrating, giving a smooth, monotonic descent instead.</figcaption>
</figure>
