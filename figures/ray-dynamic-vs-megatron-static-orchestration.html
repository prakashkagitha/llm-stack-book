<figcaption><b>Ray and Megatron sit at opposite ends of one flexibility-versus-communication-efficiency trade.</b> OpenRLHF's Python controller dispatches dashed <code>.remote()</code> futures to differently sized role actors, serializing every tensor that crosses an actor boundary through the object store; NeMo-Aligner instead launches one uniform grid of identical workers wired by pre-established NCCL communicators with no controller in the hot path, at the cost of forcing every role into the same parallelism config. veRL's HybridFlow design sits between the two, using Ray for orchestration but raw NCCL inside each resource pool.</figcaption>
</figure>
