<figure class="viz" id="fig-ties-merge-pipeline">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 760 725" role="img" aria-label="TIES-Merging pipeline on a toy example of three task vectors with six parameters: stage 1 trims small-magnitude entries to zero, stage 2 elects a majority sign per parameter column, and stage 3 averages only the entries that agree with the elected sign, producing a merged task vector that avoids the cancellation a naive sum would suffer.">

<figcaption><b>TIES-Merging resolves interference in three stages before combining task vectors.</b> A toy example with three task vectors (tau_1, tau_2, tau_3) over six parameters: <b>Trim</b> zeros out small-magnitude entries (dashed ghosts) that are more noise than signal; <b>Elect Sign</b> takes a per-column majority vote (shape-coded triangles) to pick one sign gamma even where task vectors disagree, as at the hero column p4 where + wins 2 votes to 1; <b>Disjoint Merge</b> then excludes the minority entry (crossed out) and averages only the entries that agree with gamma. At p4 this gives 2.0, versus the 0.67 a naive three-way average would produce once the conflicting -2 partially cancels it &amp;mdash; the interference TIES was designed to avoid.</figcaption>
