<figcaption><b>ReLU, GELU, and Swish compared, with SwiGLU shown as a two-path gate.</b> ReLU (gray dashed) has a hard zero threshold and can produce dead neurons. GELU (blue) and Swish (green) are smooth everywhere and dip slightly below zero in the negative region — Swish's lobe is deeper (~-0.28 vs GELU's ~-0.17). SwiGLU (right) is architecturally different: the gate branch applies Swish and the value branch is linear; their elementwise product lets the network suppress irrelevant features entirely, which is why SwiGLU and GeGLU consistently outperform plain activations on language tasks.</figcaption>
</figure>
