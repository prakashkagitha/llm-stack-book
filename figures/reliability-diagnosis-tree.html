  </marker>
  <marker id="dt-arrow-yes" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1 0 L5 9 L9 0 z" fill="var(--accent,#7c3aed)"/>
  </marker>
</defs>
<style>

<text x="556" y="269" text-anchor="middle" class="yes-lbl">Yes</text>
<line x1="556" y1="278" x2="556" y2="308" stroke="var(--accent,#7c3aed)" stroke-width="1.5" marker-end="url(#dt-arrow-yes)"/>
<rect x="461" y="312" width="190" height="64" rx="8" fill="var(--surface,#f8fafc)" stroke="var(--accent,#7c3aed)" stroke-width="1.5"/>
<text x="556" y="331" text-anchor="middle" class="res-lbl">Retrieval drift</text>
<text x="556" y="345" text-anchor="middle" class="res-lbl">-&gt; Re-index / revert</text>
<text x="556" y="362" text-anchor="middle" class="res-lbl" style="font-size:9.5px">corpus / expand reranker</text>

<text x="748" y="179" text-anchor="middle" class="q-lbl">Did upstream data or</text>

<rect x="653" y="312" width="190" height="64" rx="8" fill="var(--surface,#f8fafc)" stroke="var(--accent,#7c3aed)" stroke-width="1.5"/>
<text x="748" y="331" text-anchor="middle" class="res-lbl">Upstream data</text>

<text x="460" y="448" text-anchor="middle" class="cap">Triage guide, not an ML decision tree — check all four branches in parallel; causes can coincide.</text>


<text x="175" y="132" text-anchor="middle" style="font:700 9px var(--sans,sans-serif);fill:var(--ink-soft,#475569)">Provider / Model</text>
<text x="368" y="132" text-anchor="middle" style="font:700 9px var(--sans,sans-serif);fill:var(--ink-soft,#475569)">Prompt</text>
<text x="556" y="132" text-anchor="middle" style="font:700 9px var(--sans,sans-serif);fill:var(--ink-soft,#475569)">Retrieval</text>
<text x="748" y="132" text-anchor="middle" style="font:700 9px var(--sans,sans-serif);fill:var(--ink-soft,#475569)">Upstream Data</text>

</svg>
<figcaption><b>The four-root-cause diagnosis tree fans one alert into four parallel branches.</b> When a quality or latency SLO fires, engineers must simultaneously investigate all four potential causes — provider regression, prompt change, retrieval drift, and upstream data regression — because two or more can coincide. Checking sequentially wastes critical minutes.</figcaption>
</figure>
