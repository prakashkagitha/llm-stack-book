<figure class="viz" id="fig-mcp-nxm-vs-hub">
<button class="viz-replay" type="button">/replay</button>
<style>
  #fig-mcp-nxm-vs-hub text{ fill:var(--ink-soft); }
  #fig-mcp-nxm-vs-hub .ttl{ font:700 14px var(--sans,sans-serif); }
  #fig-mcp-nxm-vs-hub .sub{ font:600 10px var(--sans,sans-serif); fill:var(--muted); }
  #fig-mcp-nxm-vs-hub .node{ font:600 11px var(--sans,sans-serif); }
  #fig-mcp-nxm-vs-hub .count{ font:700 15px var(--mono,monospace); }
  #fig-mcp-nxm-vs-hub .cap{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
  #fig-mcp-nxm-vs-hub .spine-lbl{ font:700 10.5px var(--mono,monospace); fill:var(--accent); }
</style>
<svg viewBox="0 0 760 400" role="img" aria-label="Two panels contrast connecting 3 hosts to 4 servers directly, which needs 3 by 4 equals 12 tangled bespoke integrations, versus connecting both sides through a single MCP protocol spine, which needs only 3 plus 4 equals 7 clean connectors.">

<g data-anim="1">
  <rect x="10" y="10" width="352" height="380" rx="12" class="v-fill v-stroke" stroke-width="1.3" fill-opacity="0.4"/>
  <text x="186" y="34" text-anchor="middle" class="ttl">Without a standard: N x M</text>


  <rect x="30" y="70" width="118" height="30" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="89" y="89" text-anchor="middle" class="node">Claude Desktop</text>
  <rect x="30" y="150" width="118" height="30" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="89" y="169" text-anchor="middle" class="node">IDE agent</text>
  <rect x="30" y="230" width="118" height="30" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="89" y="249" text-anchor="middle" class="node">CI bot</text>


  <rect x="240" y="52" width="102" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="291" y="69" text-anchor="middle" class="node">filesystem</text>
  <rect x="240" y="112" width="102" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="291" y="129" text-anchor="middle" class="node">database</text>
  <rect x="240" y="172" width="102" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="291" y="189" text-anchor="middle" class="node">GitHub</text>
  <rect x="240" y="232" width="102" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="291" y="249" text-anchor="middle" class="node">Slack</text>


  <g class="v-grid" stroke="currentColor" stroke-width="1" opacity="0.75" fill="none">
    <line x1="148" y1="80"  x2="240" y2="65"/>
    <line x1="148" y1="80"  x2="240" y2="125"/>
    <line x1="148" y1="80"  x2="240" y2="185"/>
    <line x1="148" y1="80"  x2="240" y2="245"/>

    <line x1="148" y1="160" x2="240" y2="65"/>
    <line x1="148" y1="160" x2="240" y2="125"/>
    <line x1="148" y1="160" x2="240" y2="185"/>
    <line x1="148" y1="160" x2="240" y2="245"/>

    <line x1="148" y1="240" x2="240" y2="65"/>
    <line x1="148" y1="240" x2="240" y2="125"/>
    <line x1="148" y1="240" x2="240" y2="185"/>
    <line x1="148" y1="240" x2="240" y2="245"/>
  </g>

  <text x="186" y="290" text-anchor="middle" class="cap">each pair = a bespoke integration:</text>
  <text x="186" y="303" text-anchor="middle" class="cap">its own schema, auth, error handling</text>

  <rect x="123" y="322" width="126" height="30" rx="8" class="v-fill v-stroke" stroke-width="1.4" fill-opacity="0.7"/>
  <text x="186" y="342" text-anchor="middle" class="count">3 x 4 = 12</text>
  <text x="186" y="366" text-anchor="middle" class="cap">integrations</text>
</g>


<g data-anim="2">
  <rect x="398" y="10" width="352" height="380" rx="12" fill="var(--accent)" fill-opacity="0.04" stroke="var(--accent)" stroke-width="1.6"/>
  <text x="574" y="34" text-anchor="middle" class="ttl">With MCP: N + M</text>


  <rect x="418" y="70" width="118" height="30" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="477" y="89" text-anchor="middle" class="node">Claude Desktop</text>
  <rect x="418" y="150" width="118" height="30" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="477" y="169" text-anchor="middle" class="node">IDE agent</text>
  <rect x="418" y="230" width="118" height="30" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="477" y="249" text-anchor="middle" class="node">CI bot</text>


  <rect x="628" y="52" width="102" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="679" y="69" text-anchor="middle" class="node">filesystem</text>
  <rect x="628" y="112" width="102" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="679" y="129" text-anchor="middle" class="node">database</text>
  <rect x="628" y="172" width="102" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="679" y="189" text-anchor="middle" class="node">GitHub</text>
  <rect x="628" y="232" width="102" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="679" y="249" text-anchor="middle" class="node">Slack</text>


  <rect x="577" y="46" width="18" height="228" rx="9" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="1.6"/>


  <g stroke="var(--accent)" stroke-width="1.6" fill="none" class="v-accent-s">
    <line x1="536" y1="85"  x2="577" y2="85"/>
    <line x1="536" y1="165" x2="577" y2="165"/>
    <line x1="536" y1="245" x2="577" y2="245"/>

    <line x1="595" y1="65"  x2="628" y2="65"/>
    <line x1="595" y1="125" x2="628" y2="125"/>
    <line x1="595" y1="185" x2="628" y2="185"/>
    <line x1="595" y1="245" x2="628" y2="245"/>
  </g>

  <text x="586" y="160" text-anchor="middle" class="spine-lbl" transform="rotate(-90 586 160)">MCP</text>
  <text x="574" y="292" text-anchor="middle" class="cap">one wire protocol</text>
  <text x="574" y="305" text-anchor="middle" class="cap">(JSON-RPC 2.0)</text>

  <rect x="511" y="332" width="126" height="30" rx="8" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="1.4"/>
  <text x="574" y="352" text-anchor="middle" class="count" fill="var(--accent)">3 + 4 = 7</text>
  <text x="574" y="376" text-anchor="middle" class="cap">connectors</text>
</g>

</svg>
<figcaption><b>A shared protocol turns a tangle into a hub.</b> Wiring 3 hosts directly to 4 servers takes 3 x 4 = 12 bespoke integrations, each with its own schema, auth, and error handling; routing both sides through the single MCP spine needs only 3 + 4 = 7 connectors, and every server becomes reachable from every host for free.</figcaption>
</figure>
