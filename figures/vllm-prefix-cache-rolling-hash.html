</svg>
<figcaption><b>vLLM hashes each full KV block together with the hash of every block before it, so identical prefixes hash identically block-for-block.</b> Because Request A and B's first two blocks contain the same tokens and start the same chain, they land on the same physical blocks (refcount 2, no extra memory) — the moment token content diverges, the hash chain diverges too, and only the divergent tail needs fresh blocks and fresh compute. Only full, committed blocks are hashable; the trailing partial block is never looked up in the cache.</figcaption>
</figure>
