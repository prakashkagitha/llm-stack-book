<figcaption><b>InternVL 2's four-stage training recipe progresses from vision pretraining to high-resolution fine-tuning.</b> The freeze/unfreeze pattern is the key design decision: stage 1 trains only the projector bridge with everything else locked; stage 2 unlocks the LLM and optionally the vision encoder at 10× lower LR to prevent catastrophic forgetting; stage 3 adds tiled inputs for OCR-heavy use-cases.</figcaption>
</figure>
