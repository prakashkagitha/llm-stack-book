<figure class="viz" id="fig-paged-kv">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 800 392" role="img" aria-label="PagedAttention as OS paging: a sequence's logically contiguous KV blocks are mapped through a per-sequence block table to non-contiguous physical KV blocks scattered across the GPU memory pool, interleaved with another sequence's blocks.">
  <defs>
    <marker id="pk-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-paged-kv text{ fill:var(--ink-soft); }
    #fig-paged-kv .head{ font:700 13.5px var(--sans,sans-serif); }
    #fig-paged-kv .sub{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-paged-kv .blk{ font:600 11px var(--mono,monospace); }
    #fig-paged-kv .tok{ font:500 9px var(--mono,monospace); fill:var(--muted); }
    #fig-paged-kv .bt{ font:700 12px var(--mono,monospace); }
    #fig-paged-kv .pid{ font:700 11px var(--mono,monospace); fill:var(--muted); }
    #fig-paged-kv .free{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-paged-kv .note{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <text x="128" y="26" text-anchor="middle" class="head">Logical KV (sequence A)</text>
    <text x="128" y="42" text-anchor="middle" class="sub">contiguous token positions 0…40</text>

    <text x="392" y="26" text-anchor="middle" class="head">Block table[A]</text>
    <text x="392" y="42" text-anchor="middle" class="sub">logical block maps to physical block</text>

    <text x="672" y="26" text-anchor="middle" class="head">Physical KV pool (HBM)</text>
    <text x="672" y="42" text-anchor="middle" class="sub">fixed-size blocks, any order</text>
  </g>

  
  <g data-anim="2">
    
    <rect x="34" y="78" width="168" height="40" rx="6" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="60" y="103" text-anchor="middle" class="blk v-accent" fill="var(--accent)">lb0</text>
    <text x="135" y="95" text-anchor="middle" class="tok">tokens</text>
    <text x="135" y="107" text-anchor="middle" class="tok">0–15</text>

    
    <rect x="34" y="124" width="168" height="40" rx="6" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="60" y="149" text-anchor="middle" class="blk v-accent" fill="var(--accent)">lb1</text>
    <text x="135" y="141" text-anchor="middle" class="tok">tokens</text>
    <text x="135" y="153" text-anchor="middle" class="tok">16–31</text>

    
    <rect x="34" y="170" width="168" height="40" rx="6" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="60" y="195" text-anchor="middle" class="blk v-accent" fill="var(--accent)">lb2</text>
    <text x="135" y="187" text-anchor="middle" class="tok">tokens</text>
    <text x="135" y="199" text-anchor="middle" class="tok">32–40</text>
    
    <rect x="158" y="171" width="43" height="38" rx="5" class="v-grid" fill="var(--surface-3)" fill-opacity="0.55"/>
    <text x="179" y="245" text-anchor="middle" class="note">last block</text>
    <text x="179" y="258" text-anchor="middle" class="note">partly filled</text>
    <line x1="179" y1="214" x2="179" y2="232" class="v-stroke" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
  </g>

  
  <g data-anim="3">
    <rect x="330" y="78" width="124" height="132" rx="8" class="v-fill v-grid" stroke-width="1.3"/>
    <line x1="392" y1="78" x2="392" y2="210" class="v-grid" stroke-width="1"/>
    <line x1="330" y1="122" x2="454" y2="122" class="v-grid" stroke-width="1"/>
    <line x1="330" y1="166" x2="454" y2="166" class="v-grid" stroke-width="1"/>

    
    <text x="361" y="105" text-anchor="middle" class="bt v-accent" fill="var(--accent)">lb0</text>
    <text x="423" y="105" text-anchor="middle" class="bt">7</text>
    <text x="361" y="149" text-anchor="middle" class="bt v-accent" fill="var(--accent)">lb1</text>
    <text x="423" y="149" text-anchor="middle" class="bt">1</text>
    <text x="361" y="193" text-anchor="middle" class="bt v-accent" fill="var(--accent)">lb2</text>
    <text x="423" y="193" text-anchor="middle" class="bt">4</text>

    <text x="392" y="228" text-anchor="middle" class="sub">block_table[A] = [7, 1, 4]</text>
  </g>

  
  <g data-anim="3" class="v-muted" fill="currentColor" stroke="currentColor" stroke-width="1.3" marker-end="url(#pk-arrow)" opacity="0.85">
    <line x1="204" y1="98"  x2="326" y2="98"/>
    <line x1="204" y1="144" x2="326" y2="144"/>
    <line x1="204" y1="190" x2="326" y2="190"/>
  </g>

  
  
  <g data-anim="4">
    <rect x="566" y="64" width="212" height="290" rx="10" class="v-fill v-grid" stroke-width="1.3" fill-opacity="0.35"/>
  </g>

  
  
  <g data-anim="4">
    <rect x="580" y="72"  width="184" height="28" rx="5" class="v-fill v-stroke" stroke-width="1.2" stroke-dasharray="4 3" fill-opacity="0.25"/>
    <text x="556" y="90" text-anchor="end" class="pid">0</text>
    <text x="672" y="91" text-anchor="middle" class="free">free</text>
  </g>
  
  <g data-anim="4">
    <rect x="580" y="107" width="184" height="28" rx="5" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="556" y="125" text-anchor="end" class="pid">1</text>
    <text x="672" y="125" text-anchor="middle" class="blk v-accent" fill="var(--accent)">A · lb1</text>
  </g>
  
  <g data-anim="4">
    <rect x="580" y="142" width="184" height="28" rx="5" class="v-fill v-stroke" stroke-width="1.2" stroke-dasharray="4 3" fill-opacity="0.25"/>
    <text x="556" y="160" text-anchor="end" class="pid">2</text>
    <text x="672" y="161" text-anchor="middle" class="free">free</text>
  </g>
  
  <g data-anim="4">
    <rect x="580" y="177" width="184" height="28" rx="5" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
    <text x="556" y="195" text-anchor="end" class="pid">3</text>
    <text x="672" y="195" text-anchor="middle" class="blk" fill="var(--good,#2f9e6e)">B · lb0</text>
  </g>
  
  <g data-anim="4">
    <rect x="580" y="212" width="184" height="28" rx="5" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="556" y="230" text-anchor="end" class="pid">4</text>
    <text x="672" y="230" text-anchor="middle" class="blk v-accent" fill="var(--accent)">A · lb2</text>
  </g>
  
  <g data-anim="4">
    <rect x="580" y="247" width="184" height="28" rx="5" class="v-fill v-stroke" stroke-width="1.2" stroke-dasharray="4 3" fill-opacity="0.25"/>
    <text x="556" y="265" text-anchor="end" class="pid">5</text>
    <text x="672" y="266" text-anchor="middle" class="free">free</text>
  </g>
  
  <g data-anim="4">
    <rect x="580" y="282" width="184" height="28" rx="5" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
    <text x="556" y="300" text-anchor="end" class="pid">6</text>
    <text x="672" y="300" text-anchor="middle" class="blk" fill="var(--good,#2f9e6e)">B · lb1</text>
  </g>
  
  <g data-anim="4">
    <rect x="580" y="317" width="184" height="28" rx="5" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="556" y="335" text-anchor="end" class="pid">7</text>
    <text x="672" y="335" text-anchor="middle" class="blk v-accent" fill="var(--accent)">A · lb0</text>
  </g>

  
  
  <g data-anim="5" fill="none" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#pk-arrow)" opacity="0.9">
    
    <path class="viz-draw" style="--len:330" d="M454 98 C 510 98, 512 331, 574 331"/>
    
    <path class="viz-draw" style="--len:160" d="M454 144 C 510 144, 512 121, 574 121"/>
    
    <path class="viz-draw" style="--len:160" d="M454 190 C 510 190, 512 226, 574 226"/>
  </g>

  
  <g data-anim="5">
    <text x="128" y="300" text-anchor="middle" class="note">logical order</text>
    <text x="128" y="313" text-anchor="middle" class="note">stays contiguous</text>
    <text x="128" y="350" text-anchor="middle" class="sub">no external fragmentation;</text>
    <text x="128" y="365" text-anchor="middle" class="sub">scattered blocks, packed pool</text>
  </g>
</svg>
<figcaption><b>The block table decouples logical order from physical placement.</b> Sequence A's three logically-contiguous KV blocks (lb0, lb1, lb2) live in physical blocks 7, 1, 4 — scattered, out of order, and interleaved with sequence B's blocks. Attention follows the per-sequence block table to gather from the right physical block, so fixed-size pages can be packed anywhere in the pool, eliminating external fragmentation.</figcaption>
</figure>
