    <rect x="510" y="154" width="170" height="46" rx="6" class="v-fill v-stroke" stroke-width="1"/>

    <rect x="510" y="208" width="170" height="46" rx="6" class="v-fill v-stroke" stroke-width="1"/>
    <text x="595" y="235" text-anchor="middle" class="blk">Self-Attn + MLP</text>

    <rect x="510" y="262" width="170" height="46" rx="6" class="v-fill v-stroke" stroke-width="1"/>

<figcaption><b>Vision reaches the LLM either as tokens in the sequence or as a side channel through gated cross-attention.</b> LLaVA's projector prepends N projected patch tokens directly into the input, so every image costs real context (N proportional to resolution, e.g. 576). Flamingo instead freezes the LLM's own sequence and self-attention layers untouched, and injects vision through new gated cross-attention layers whose tanh(alpha) gate starts at 0 — closed at initialization, so the pretrained LLM is unperturbed until vision gradually fades in during training.</figcaption>
</figure>
