<figure class="viz" id="fig-benchmark-score-informative-band">
<svg viewBox="0 0 760 400" role="img" aria-label="A horizontal benchmark-score axis from 0 to 100 percent showing a below-chance zone, a noise floor, the informative 20 to 80 percent band, and a saturation zone with two overlapping model score markers and their confidence intervals.">

<style>
  #fig-benchmark-score-informative-band text { fill: var(--ink-soft,#374151); font-family: var(--sans,sans-serif); }
  #fig-benchmark-score-informative-band .lead   { font: 600 12.5px var(--sans,sans-serif); }
  #fig-benchmark-score-informative-band .zone-t { font: 700 11px var(--sans,sans-serif); }
  #fig-benchmark-score-informative-band .zone-s { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-benchmark-score-informative-band .tick   { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#9ca3af); }
  #fig-benchmark-score-informative-band .chance { font: 600 10px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-benchmark-score-informative-band .callout{ font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#9ca3af); }
  #fig-benchmark-score-informative-band .mklbl  { font: 600 9.5px var(--sans,sans-serif); }
</style>

<defs>
  <marker id="bsib-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#9ca3af)"/>
  </marker>
</defs>

<text x="18" y="22" class="lead">Where on the 0-100% axis is a benchmark score informative?</text>






<g data-anim="1">
  
  <rect x="60" y="70" width="160" height="90" fill="var(--warn,#e0a106)" fill-opacity="0.10"/>
  
  <rect x="220" y="70" width="32" height="90" fill="var(--muted,#9ca3af)" fill-opacity="0.14"/>
  
  <rect x="188" y="70" width="384" height="90" fill="var(--good,#2f9e6e)" fill-opacity="0.16"/>
  
  <rect x="188" y="70" width="384" height="90" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  
  <rect x="572" y="70" width="128" height="90" fill="var(--accent,#c15b39)" fill-opacity="0.10"/>
</g>


<g data-anim="1">
  <line x1="60" y1="160" x2="700" y2="160" stroke="var(--ink-soft,#6b7280)" stroke-width="2" marker-end="url(#bsib-arr)"/>
  <text x="712" y="164" class="tick">score</text>

  <line x1="60" y1="154" x2="60" y2="166" stroke="var(--ink-soft,#6b7280)" stroke-width="1.5"/>
  <text x="60" y="180" text-anchor="middle" class="tick">0%</text>

  <line x1="188" y1="154" x2="188" y2="166" stroke="var(--ink-soft,#6b7280)" stroke-width="1.5"/>
  <text x="188" y="180" text-anchor="middle" class="tick">20%</text>

  <line x1="572" y1="154" x2="572" y2="166" stroke="var(--ink-soft,#6b7280)" stroke-width="1.5"/>
  <text x="572" y="180" text-anchor="middle" class="tick">80%</text>

  <line x1="700" y1="154" x2="700" y2="166" stroke="var(--ink-soft,#6b7280)" stroke-width="1.5"/>
  <text x="700" y="180" text-anchor="middle" class="tick">100%</text>
</g>


<g data-anim="2">
  <line x1="220" y1="55" x2="220" y2="175" stroke="var(--warn,#e0a106)" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="220" y="46" text-anchor="middle" class="chance">random chance ~25% (4-choice)</text>
</g>


<g data-anim="2">
  <text x="376" y="88" text-anchor="middle" class="zone-t" fill="var(--good,#2f9e6e)">INFORMATIVE BAND</text>
  <text x="376" y="102" text-anchor="middle" class="zone-s">scores track real capability</text>

  <text x="638" y="88" text-anchor="middle" class="zone-t" fill="var(--accent,#c15b39)">SATURATION / CEILING</text>
  <text x="638" y="102" text-anchor="middle" class="zone-s">gaps dominated by question</text>
  <text x="638" y="114" text-anchor="middle" class="zone-s">quality &amp; noise</text>
</g>


<g data-anim="2">
  <text x="140" y="198" text-anchor="middle" class="zone-s" font-weight="600" fill="var(--warn,#e0a106)">below chance =</text>
  <text x="140" y="211" text-anchor="middle" class="zone-s">broken answer extractor /</text>
  <text x="140" y="224" text-anchor="middle" class="zone-s">unparsed outputs,</text>
  <text x="140" y="237" text-anchor="middle" class="zone-s" font-weight="600">NOT a weak model</text>

  <text x="236" y="211" text-anchor="middle" class="zone-s" font-style="italic">noise floor</text>
</g>


<g data-anim="3">
  
  <text x="606" y="200" text-anchor="middle" class="mklbl" fill="var(--accent2,#3b82f6)">Model A</text>
  <line x1="595" y1="212" x2="617" y2="212" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <line x1="595" y1="207" x2="595" y2="217" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <line x1="617" y1="207" x2="617" y2="217" stroke="var(--accent2,#3b82f6)" stroke-width="1.6"/>
  <circle cx="606" cy="212" r="4.5" fill="var(--accent2,#3b82f6)"/>

  
  <line x1="612" y1="230" x2="634" y2="230" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
  <line x1="612" y1="225" x2="612" y2="235" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
  <line x1="634" y1="225" x2="634" y2="235" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
  <circle cx="623" cy="230" r="4.5" fill="var(--accent,#c15b39)"/>
  <text x="623" y="248" text-anchor="middle" class="mklbl" fill="var(--accent,#c15b39)">Model B</text>
</g>


<g data-anim="4">
  <path d="M470,272 C505,262 555,250 592,222" fill="none" stroke="var(--muted,#9ca3af)" stroke-width="1.3" marker-end="url(#bsib-arr)"/>
  <rect x="330" y="256" width="200" height="34" rx="6" fill="var(--surface,#fff)" stroke="var(--muted,#9ca3af)" stroke-width="1"/>
  <text x="430" y="270" text-anchor="middle" class="callout" font-weight="600">difference &lt; CI</text>
  <text x="430" y="283" text-anchor="middle" class="callout">-&gt; within noise</text>
</g>


<g data-anim="5">
  <line x1="60" y1="330" x2="700" y2="330" stroke="var(--border-2,#d1d5db)" stroke-width="1"/>
  <text x="60" y="316" class="zone-s" font-weight="600">CI width shrinks as n grows:</text>

  <line x1="300" y1="335" x2="330" y2="335" stroke="var(--muted,#9ca3af)" stroke-width="1.6"/>
  <line x1="300" y1="330" x2="300" y2="340" stroke="var(--muted,#9ca3af)" stroke-width="1.6"/>
  <line x1="330" y1="330" x2="330" y2="340" stroke="var(--muted,#9ca3af)" stroke-width="1.6"/>
  <circle cx="315" cy="335" r="3.5" fill="var(--muted,#9ca3af)"/>
  <text x="315" y="352" text-anchor="middle" class="zone-s">full set (n large)</text>

  <line x1="450" y1="335" x2="540" y2="335" stroke="var(--muted,#9ca3af)" stroke-width="1.6"/>
  <line x1="450" y1="328" x2="450" y2="342" stroke="var(--muted,#9ca3af)" stroke-width="1.6"/>
  <line x1="540" y1="328" x2="540" y2="342" stroke="var(--muted,#9ca3af)" stroke-width="1.6"/>
  <circle cx="495" cy="335" r="3.5" fill="var(--muted,#9ca3af)"/>
  <text x="495" y="352" text-anchor="middle" class="zone-s">small subset (n small)</text>
</g>

</svg>
<figcaption><b>A benchmark score is only informative between roughly 20% and 80%.</b> Below the random-chance line a low score usually means a broken answer extractor rather than a weak model; above 80% differences are dominated by question quality; and even within the informative band, two close scores whose confidence intervals overlap (which widen sharply on smaller evaluation sets) are indistinguishable from noise.</figcaption>
</figure>
