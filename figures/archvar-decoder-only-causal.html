<text x="360" y="390" text-anchor="middle" style="font:500 10px var(--sans,sans-serif); fill:var(--accent-2,#ea580c);">input col k predicts output col k (= input col k+1); [EOS] is the final target</text>


<text x="360" y="455" text-anchor="middle" style="font:500 10px var(--sans,sans-serif); fill:var(--accent,#4f46e5);">Causal mask: lower-triangular — token i cannot attend to any j > i</text>

</svg>
<figcaption><b>Decoder-only (GPT) predicts every next token in parallel at training time, constrained by the causal mask.</b> Each token embedding enters a stack of causal self-attention blocks where token i can only attend to positions 0..i (leftward arrows in the motif). The output at each position predicts the next token (shifted by one), so input "The" predicts "cat", "cat" predicts "sat", and so on. Despite being causal, all positions are computed simultaneously under the lower-triangular mask during training.</figcaption>
</figure>
