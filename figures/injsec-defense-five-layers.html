<figcaption><b>Defense-in-depth turns imperfect layers into near-impenetrable protection through multiplication.</b> Each layer blocks a fraction of attacks independently; five layers with pass-through rates of 40%, 30%, 20%, 10%, and 5% reduce 100 daily injection attempts to roughly one successful breach every 83 days. Layer 1 (model alignment) is training-time and porous; Layers 2-5 are enforceable at runtime.</figcaption>
