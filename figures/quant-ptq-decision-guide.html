<figure class="viz" id="fig-quant-ptq-decision-guide">
<svg viewBox="0 0 860 360" role="img" aria-label="Decision guide mapping three practitioner needs to recommended quantization methods: weight-only INT4 for memory and decode speed, SmoothQuant W8A8 for max prefill throughput, and LLM.int8() for zero-tuning deployment.">
<defs>
  <marker id="dg-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
</defs>
<style>
  #fig-quant-ptq-decision-guide text { font: 400 12px var(--sans,sans-serif); fill: var(--ink-soft,#374151); }
  #fig-quant-ptq-decision-guide .header { font: 600 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); letter-spacing: 0.04em; }
  #fig-quant-ptq-decision-guide .need-text { font: 500 12px var(--sans,sans-serif); fill: var(--ink-soft,#374151); }
  #fig-quant-ptq-decision-guide .method-text { font: 600 12px var(--sans,sans-serif); fill: var(--ink-soft,#1f2937); }
  #fig-quant-ptq-decision-guide .sub-text { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-quant-ptq-decision-guide .chip-text { font: 700 11px var(--mono,monospace); fill: var(--ink-soft,#374151); }
  #fig-quant-ptq-decision-guide .arrow-label { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
</style>


<text x="165" y="22" text-anchor="middle" class="header">PRACTITIONER NEED</text>
<text x="630" y="22" text-anchor="middle" class="header">RECOMMENDED METHOD</text>


<line x1="330" y1="30" x2="330" y2="345"
      stroke="var(--border-2,#cbd5e1)" stroke-width="0.8" stroke-dasharray="5 4"/>


<rect x="20" y="36" width="280" height="70" rx="10"
      fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.4"/>
<text x="160" y="64" text-anchor="middle" class="need-text">"I just need it to fit</text>
<text x="160" y="82" text-anchor="middle" class="need-text">&amp; decode fast"</text>

<line x1="302" y1="71" x2="398" y2="71"
      stroke="var(--ink-soft,#94a3b8)" stroke-width="1.6" marker-end="url(#dg-arrow)"/>
<text x="350" y="64" text-anchor="middle" class="arrow-label">use</text>

<rect x="402" y="36" width="440" height="70" rx="10"
      fill="var(--accent,#6c8cff)" fill-opacity="0.14"
      stroke="var(--accent,#6c8cff)" stroke-width="1.6"/>
<text x="622" y="61" text-anchor="middle" class="method-text">Weight-only INT4 (GPTQ / AWQ)</text>
<text x="622" y="79" text-anchor="middle" class="method-text">group size 128, activations FP16</text>


<rect x="734" y="114" width="66" height="20" rx="6"
      fill="var(--accent,#6c8cff)" fill-opacity="0.22"
      stroke="var(--accent,#6c8cff)" stroke-width="1.2"/>
<text x="767" y="128" text-anchor="middle" class="chip-text">W4A16</text>


<rect x="20" y="144" width="280" height="70" rx="10"
      fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.4"/>
<text x="160" y="170" text-anchor="middle" class="need-text">"I need max prefill</text>
<text x="160" y="188" text-anchor="middle" class="need-text">throughput / INT8 tensor cores"</text>

<line x1="302" y1="179" x2="398" y2="179"
      stroke="var(--ink-soft,#94a3b8)" stroke-width="1.6" marker-end="url(#dg-arrow)"/>
<text x="350" y="172" text-anchor="middle" class="arrow-label">use</text>

<rect x="402" y="144" width="440" height="70" rx="10"
      fill="var(--accent-2,#34b3a8)" fill-opacity="0.13"
      stroke="var(--accent-2,#34b3a8)" stroke-width="1.6"/>
<text x="622" y="177" text-anchor="middle" class="method-text">SmoothQuant &#x2192; W8A8</text>
<text x="622" y="197" text-anchor="middle" class="method-text">INT8 matmuls on tensor cores</text>


<rect x="734" y="222" width="66" height="20" rx="6"
      fill="var(--accent-2,#34b3a8)" fill-opacity="0.20"
      stroke="var(--accent-2,#34b3a8)" stroke-width="1.2"/>
<text x="767" y="236" text-anchor="middle" class="chip-text">W8A8</text>


<rect x="20" y="252" width="280" height="70" rx="10"
      fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.4"/>
<text x="160" y="278" text-anchor="middle" class="need-text">"Zero tuning,</text>
<text x="160" y="296" text-anchor="middle" class="need-text">just load in 8-bit"</text>

<line x1="302" y1="287" x2="398" y2="287"
      stroke="var(--ink-soft,#94a3b8)" stroke-width="1.6" marker-end="url(#dg-arrow)"/>
<text x="350" y="280" text-anchor="middle" class="arrow-label">use</text>

<rect x="402" y="252" width="440" height="78" rx="10"
      fill="var(--surface,#f8fafc)" stroke="var(--muted,#94a3b8)" stroke-width="1.4" stroke-dasharray="5 3"/>
<text x="622" y="279" text-anchor="middle" class="method-text">LLM.int8() (bitsandbytes)</text>
<text x="622" y="296" text-anchor="middle" class="sub-text">zero-calibration; mixed-precision decomp</text>
<text x="622" y="312" text-anchor="middle" class="sub-text">some kernel overhead vs. pure INT8</text>

</svg>
<figcaption><b>Three common PTQ deployment paths mapped to practitioner needs.</b> Weight-only INT4 (W4A16) is the go-to for fitting large models on fewer GPUs and fast decode; W8A8 with SmoothQuant is needed when prefill compute is the bottleneck; LLM.int8() via bitsandbytes offers a calibration-free drop-in option with modest throughput overhead.</figcaption>
</figure>
