<figure class="viz" id="fig-data-parallel">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 392" role="img" aria-label="Four GPU replicas each hold the full model and process a different data shard to produce a local gradient; an all-reduce averages the gradients so every replica applies the same optimizer step and stays identical.">
  <defs>
    <marker id="dp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-data-parallel text{ fill:var(--ink-soft); }
    #fig-data-parallel .gpu{ font:600 12px var(--sans,sans-serif); }
    #fig-data-parallel .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-data-parallel .mono{ font:600 11px var(--mono,monospace); }
    #fig-data-parallel .grad{ font:600 12px var(--mono,monospace); }
    #fig-data-parallel .hdr{ font:600 12.5px var(--sans,sans-serif); }
    #fig-data-parallel .big{ font:600 17px var(--mono,monospace); }
  </style>

  
  <g class="sm" text-anchor="start">
    <text x="12" y="64">data shard</text>
    <text x="12" y="125">replica</text>
    <text x="12" y="170">fwd / bwd</text>
    <text x="12" y="210">local grad</text>
  </g>

  
  <g data-anim="1">
    <text x="400" y="22" text-anchor="middle" class="hdr">Global mini-batch split across N = 4 replicas into local batches</text>
    <text x="400" y="38" text-anchor="middle" class="sm">each replica processes a different shard of b = B / N = 64 examples</text>
  </g>

  
  
  <g data-anim="2">
    
    <g class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.3">
      <rect x="118" y="48" width="84" height="22" rx="5"/>
      <rect x="278" y="48" width="84" height="22" rx="5"/>
      <rect x="438" y="48" width="84" height="22" rx="5"/>
      <rect x="598" y="48" width="84" height="22" rx="5"/>
    </g>
    <g class="mono" text-anchor="middle" fill="var(--accent2,#3b82f6)">
      <text x="160" y="63">shard 0</text>
      <text x="320" y="63">shard 1</text>
      <text x="480" y="63">shard 2</text>
      <text x="640" y="63">shard 3</text>
    </g>
    
    <g stroke="currentColor" class="v-muted" stroke-width="1.3" marker-end="url(#dp-arrow)">
      <line x1="160" y1="70" x2="160" y2="92"/>
      <line x1="320" y1="70" x2="320" y2="92"/>
      <line x1="480" y1="70" x2="480" y2="92"/>
      <line x1="640" y1="70" x2="640" y2="92"/>
    </g>
  </g>

  
  <g data-anim="3">
    <g class="v-fill v-accent-s" stroke-width="1.6">
      <rect x="100" y="94" width="120" height="78" rx="9"/>
      <rect x="260" y="94" width="120" height="78" rx="9"/>
      <rect x="420" y="94" width="120" height="78" rx="9"/>
      <rect x="580" y="94" width="120" height="78" rx="9"/>
    </g>
    
    <g class="gpu" text-anchor="middle" fill="var(--accent)">
      <text x="160" y="113">GPU 0</text>
      <text x="320" y="113">GPU 1</text>
      <text x="480" y="113">GPU 2</text>
      <text x="640" y="113">GPU 3</text>
    </g>
    
    <g class="v-accent" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="0.9">
      <g transform="translate(122,124)"><rect width="76" height="9" rx="2"/><rect y="13" width="76" height="9" rx="2"/><rect y="26" width="76" height="9" rx="2"/></g>
      <g transform="translate(282,124)"><rect width="76" height="9" rx="2"/><rect y="13" width="76" height="9" rx="2"/><rect y="26" width="76" height="9" rx="2"/></g>
      <g transform="translate(442,124)"><rect width="76" height="9" rx="2"/><rect y="13" width="76" height="9" rx="2"/><rect y="26" width="76" height="9" rx="2"/></g>
      <g transform="translate(602,124)"><rect width="76" height="9" rx="2"/><rect y="13" width="76" height="9" rx="2"/><rect y="26" width="76" height="9" rx="2"/></g>
    </g>
    <g class="sm" text-anchor="middle" fill="var(--muted)">
      <text x="160" y="167">full model copy</text>
      <text x="320" y="167">full model copy</text>
      <text x="480" y="167">full model copy</text>
      <text x="640" y="167">full model copy</text>
    </g>
  </g>

  
  <g data-anim="3" stroke="currentColor" class="v-muted" stroke-width="1.3" marker-end="url(#dp-arrow)">
    <line x1="160" y1="172" x2="160" y2="194"/>
    <line x1="320" y1="172" x2="320" y2="194"/>
    <line x1="480" y1="172" x2="480" y2="194"/>
    <line x1="640" y1="172" x2="640" y2="194"/>
  </g>

  
  <g data-anim="3" class="grad" text-anchor="middle">
    <text x="160" y="214" class="v-accent" fill="var(--accent)">g₀</text>
    <text x="320" y="214" class="v-accent" fill="var(--accent)">g₁</text>
    <text x="480" y="214" class="v-accent" fill="var(--accent)">g₂</text>
    <text x="640" y="214" class="v-accent" fill="var(--accent)">g₃</text>
  </g>

  
  <g data-anim="4">
    
    <g stroke="var(--accent)" class="v-accent-s" stroke-width="1.4" marker-end="url(#dp-arrow)">
      <line x1="160" y1="220" x2="160" y2="240"/>
      <line x1="320" y1="220" x2="320" y2="240"/>
      <line x1="480" y1="220" x2="480" y2="240"/>
      <line x1="640" y1="220" x2="640" y2="240"/>
    </g>
    
    <rect x="100" y="242" width="600" height="38" rx="10" class="v-accent" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.6"/>
    <rect x="100" y="242" width="600" height="38" rx="10" fill="none" stroke="var(--accent)" stroke-width="1.6" class="viz-sweep"/>
    <text x="400" y="266" text-anchor="middle" class="hdr v-accent" fill="var(--accent)">ALL-REDUCE (mean)  —  ḡ = (g₀ + g₁ + g₂ + g₃) / N</text>
  </g>

  
  <g data-anim="5">
    <g stroke="var(--good,#2f9e6e)" stroke-width="1.5" marker-end="url(#dp-arrow)">
      <line x1="160" y1="280" x2="160" y2="304"/>
      <line x1="320" y1="280" x2="320" y2="304"/>
      <line x1="480" y1="280" x2="480" y2="304"/>
      <line x1="640" y1="280" x2="640" y2="304"/>
    </g>
    
    <g fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.5">
      <rect x="108" y="306" width="104" height="40" rx="8"/>
      <rect x="268" y="306" width="104" height="40" rx="8"/>
      <rect x="428" y="306" width="104" height="40" rx="8"/>
      <rect x="588" y="306" width="104" height="40" rx="8"/>
    </g>
    <g class="mono" text-anchor="middle" fill="var(--good,#2f9e6e)">
      <text x="160" y="324">step(ḡ)</text>
      <text x="320" y="324">step(ḡ)</text>
      <text x="480" y="324">step(ḡ)</text>
      <text x="640" y="324">step(ḡ)</text>
    </g>
    <g class="sm" text-anchor="middle" fill="var(--muted)">
      <text x="160" y="339">same ḡ</text>
      <text x="320" y="339">same ḡ</text>
      <text x="480" y="339">same ḡ</text>
      <text x="640" y="339">same ḡ</text>
    </g>
  </g>

  
  <g data-anim="5">
    <text x="400" y="372" text-anchor="middle" class="hdr">Same ḡ, same update: <tspan class="v-accent" fill="var(--good,#2f9e6e)">replicas stay in lockstep</tspan></text>
  </g>
</svg>
<figcaption><b>Data parallelism: replicate the model, shard the batch, average the gradients.</b> Each of the N GPUs holds a full copy of the model and runs forward/backward on its own data shard, producing a local gradient gᵢ. A single <b>all-reduce</b> averages them into ḡ = (Σ gᵢ)/N — exactly the true full-batch gradient by linearity — so every replica applies the same optimizer step and stays identical for the next iteration.</figcaption>
</figure>
