<figure class="viz" id="fig-sft-loss-masking-tool-use">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 550" role="img" aria-label="A five-turn SFT training example for function calling: system, user, and tool turns are masked fixed context with no loss, while the assistant's tool-call JSON and its final grounded answer are highlighted as the only turns where loss is computed and the model learns to generate tokens.">
<defs>
  <marker id="slm-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>
<style>
  #fig-sft-loss-masking-tool-use text { fill: var(--ink-soft,#333); font: 400 11px var(--sans,sans-serif); }
  #fig-sft-loss-masking-tool-use .title    { font: 700 15px var(--sans,sans-serif); fill: var(--ink,#1a1a1a); }
  #fig-sft-loss-masking-tool-use .subtitle { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sft-loss-masking-tool-use .role     { font: 700 12px var(--mono,monospace); text-anchor: middle; }
  #fig-sft-loss-masking-tool-use .mono     { font: 400 10.5px var(--mono,monospace); }
  #fig-sft-loss-masking-tool-use .mono-sm  { font: 400 9.5px var(--mono,monospace); }
  #fig-sft-loss-masking-tool-use .callout  { font: 400 italic 10px var(--sans,sans-serif); }
  #fig-sft-loss-masking-tool-use .tag-m    { font: 600 10px var(--sans,sans-serif); text-anchor: middle; fill: var(--muted,#6d675d); }
  #fig-sft-loss-masking-tool-use .tag-h    { font: 700 10px var(--sans,sans-serif); text-anchor: middle; fill: var(--accent2,#3b82f6); }
  #fig-sft-loss-masking-tool-use .leg-lbl  { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sft-loss-masking-tool-use .foot     { font: 600 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#333); }

  #fig-sft-loss-masking-tool-use .row-masked { opacity: 0.62; }

  @keyframes slm-fade { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }
  #fig-sft-loss-masking-tool-use [data-anim] { animation: slm-fade .5s ease-out both; }
  #fig-sft-loss-masking-tool-use [data-anim="1"] { animation-delay: 0s; }
  #fig-sft-loss-masking-tool-use [data-anim="2"] { animation-delay: .28s; }
  #fig-sft-loss-masking-tool-use [data-anim="3"] { animation-delay: .56s; }
  #fig-sft-loss-masking-tool-use [data-anim="4"] { animation-delay: .84s; }
  #fig-sft-loss-masking-tool-use [data-anim="5"] { animation-delay: 1.12s; }
  #fig-sft-loss-masking-tool-use [data-anim="6"] { animation-delay: 1.4s; }
  @media (prefers-reduced-motion: reduce) {
    #fig-sft-loss-masking-tool-use [data-anim] { animation: none !important; opacity:1 !important; transform:none !important; }
    #fig-sft-loss-masking-tool-use .row-masked { opacity: 0.62 !important; }
  }
</style>

<rect x="8" y="8" width="764" height="534" rx="12" fill="var(--surface,#fafafa)" fill-opacity="0.35" stroke="var(--border-2,#ccc)" stroke-width="1.4"/>

<text x="22" y="28" class="title">One training example, five turns</text>
<text x="22" y="44" class="subtitle">loss is computed only on the assistant's generated tokens</text>

<g>
  <rect x="600" y="14" width="12" height="12" rx="2" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="617" y="24" class="leg-lbl">masked (no loss)</text>
  <rect x="600" y="32" width="12" height="12" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.16" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="617" y="42" class="leg-lbl">loss computed here</text>
</g>

<g data-anim="1" class="row-masked">
  <rect x="20" y="66" width="90" height="56" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="65" y="99" class="role">system</text>
  <rect x="124" y="66" width="460" height="56" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="140" y="99" class="mono">{ } tools: [{"name": "calculate", "parameters": {...}}]</text>
  <rect x="596" y="74" width="154" height="40" rx="6" fill="none" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="673" y="90" class="tag-m">masked</text>
  <text x="673" y="103" class="tag-m">fixed context, no loss</text>
</g>

<g data-anim="2" class="row-masked">
  <rect x="20" y="134" width="90" height="56" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="65" y="167" class="role">user</text>
  <rect x="124" y="134" width="460" height="56" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="140" y="167" class="mono">"What is 847 times 12?"</text>
  <rect x="596" y="142" width="154" height="40" rx="6" fill="none" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="673" y="158" class="tag-m">masked</text>
  <text x="673" y="171" class="tag-m">fixed context, no loss</text>
</g>

<g data-anim="3">
  <rect x="20" y="202" width="90" height="92" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.10" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
  <text x="65" y="252" class="role" fill="var(--accent2,#3b82f6)">assistant</text>
  <rect x="124" y="202" width="460" height="92" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.08" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
  <text x="140" y="234" class="mono-sm">&lt;tool_call&gt;{"name": "calculate", "arguments":</text>
  <text x="140" y="248" class="mono-sm">{"expr": "847*12"}}&lt;/tool_call&gt;</text>
  <text x="140" y="274" class="callout">-&gt; learns WHEN to call + WHICH tool + how to</text>
  <text x="140" y="288" class="callout">   form the argument JSON</text>
  <rect x="596" y="210" width="154" height="76" rx="6" fill="var(--accent2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="673" y="238" class="tag-h">loss computed here</text>
  <text x="673" y="254" class="tag-h">model learns to</text>
  <text x="673" y="270" class="tag-h">generate these tokens</text>
</g>

<g data-anim="4" class="row-masked">
  <rect x="20" y="306" width="90" height="56" rx="8" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="65" y="339" class="role">tool</text>
  <rect x="124" y="306" width="460" height="56" rx="8" fill="var(--surface,#fff)" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="140" y="339" class="mono">{"result": 10164}</text>
  <rect x="596" y="314" width="154" height="40" rx="6" fill="none" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="673" y="330" class="tag-m">masked</text>
  <text x="673" y="343" class="tag-m">fixed context, no loss</text>
</g>

<g data-anim="5">
  <rect x="20" y="374" width="90" height="92" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.10" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
  <text x="65" y="424" class="role" fill="var(--accent2,#3b82f6)">assistant</text>
  <rect x="124" y="374" width="460" height="92" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.08" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
  <text x="140" y="410" class="mono">"847 times 12 is 10,164."</text>
  <text x="140" y="440" class="callout">-&gt; learns to ground the answer in the</text>
  <text x="140" y="454" class="callout">   tool result</text>
  <rect x="596" y="382" width="154" height="76" rx="6" fill="var(--accent2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="673" y="410" class="tag-h">loss computed here</text>
  <text x="673" y="426" class="tag-h">model learns to</text>
  <text x="673" y="442" class="tag-h">generate these tokens</text>
</g>

<line x1="65" y1="122" x2="65" y2="134" stroke="var(--border-2,#ccc)" stroke-width="1.2" data-anim="2"/>
<line x1="65" y1="190" x2="65" y2="202" stroke="var(--border-2,#ccc)" stroke-width="1.2" data-anim="3"/>
<line x1="65" y1="294" x2="65" y2="306" stroke="var(--border-2,#ccc)" stroke-width="1.2" data-anim="4"/>
<line x1="65" y1="362" x2="65" y2="374" stroke="var(--border-2,#ccc)" stroke-width="1.2" data-anim="5"/>

<g data-anim="6">
  <rect x="20" y="480" width="730" height="44" rx="8" fill="var(--surface-3,#ece7da)" fill-opacity="0.5" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
  <text x="390" y="497" text-anchor="middle" class="foot">Schema lives in the (masked) context -&gt; the model learns the meta-skill, not specific tool names</text>
  <text x="390" y="513" text-anchor="middle" class="foot">-&gt; it generalizes to unseen tools.</text>
</g>

</svg>
<figcaption><b>Only two of the five turns in a function-calling SFT example carry gradient.</b> The system prompt (tool schemas), the user query, and the tool result are fixed context the model conditions on but never has to generate — they are masked out of the loss. The assistant's tool-call JSON and its final grounded answer are the only tokens the model is trained to produce, which is why the capability generalizes to tools it never saw during training: it learns to read a schema and respond, not to memorize tool names.</figcaption>
</figure>
