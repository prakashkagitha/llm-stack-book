<figure class="viz" id="fig-openrlhf-ray-role-decomposition">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 900 660" role="img" aria-label="OpenRLHF maps four RLHF roles onto separate Ray actor groups inside one Ray cluster. The vLLM Rollout Engine and Reference Actor feed tokens and log-probs into the central Experience Buffer. The Reward Model scores rollouts. The Experience Buffer fans out to the Critic Actor and Policy Training Actor. A weight-sync feedback loop closes the PPO cycle from the Policy Training Actor back to the vLLM engine.">
<defs>
  <marker id="ord-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#666)"/>
  </marker>
  <marker id="ord-arr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#d97706)"/>
  </marker>
  <style>
    #fig-openrlhf-ray-role-decomposition .lbl {
      font: 600 13px var(--sans, sans-serif);
      fill: var(--ink-soft, #333);
    }
    #fig-openrlhf-ray-role-decomposition .sub {
      font: 400 10.5px var(--sans, sans-serif);
      fill: var(--ink-soft, #555);
    }
    #fig-openrlhf-ray-role-decomposition .mono {
      font: 400 10px var(--mono, monospace);
      fill: var(--ink-soft, #444);
    }
    #fig-openrlhf-ray-role-decomposition .cluster-lbl {
      font: 700 11.5px var(--sans, sans-serif);
      fill: var(--ink-soft, #444);
      letter-spacing: 1px;
    }
    #fig-openrlhf-ray-role-decomposition .edge-lbl {
      font: 400 10px var(--sans, sans-serif);
      fill: var(--ink-soft, #555);
    }
    #fig-openrlhf-ray-role-decomposition .sync-lbl {
      font: 600 10px var(--sans, sans-serif);
      fill: var(--accent, #d97706);
    }
    /* Phase 1: tokens+logprobs into buffer */
    #fig-openrlhf-ray-role-decomposition .flow-p1 {
      stroke-dasharray: 8 5;
      animation: ord-dash 2.4s linear infinite;
    }
    /* Phase 2: ref logprobs + reward into buffer */
    #fig-openrlhf-ray-role-decomposition .flow-p2 {
      stroke-dasharray: 8 5;
      animation: ord-dash 2.4s linear 0.6s infinite;
    }
    /* Phase 3: experience batch fan-out */
    #fig-openrlhf-ray-role-decomposition .flow-p3 {
      stroke-dasharray: 8 5;
      animation: ord-dash 2.4s linear 1.2s infinite;
    }
    /* Phase 4: weight sync loop */
    #fig-openrlhf-ray-role-decomposition .flow-p4 {
      stroke-dasharray: 10 5;
      animation: ord-dash 2.4s linear 1.8s infinite;
    }
    @keyframes ord-dash {
      to { stroke-dashoffset: -52; }
    }
  </style>
</defs>


<rect x="8" y="8" width="884" height="644" rx="14"
      fill="var(--surface-3,rgba(128,128,128,0.07))"
      stroke="var(--border-2,#999)" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="22" y="28" class="cluster-lbl">RAY CLUSTER</text>




<rect x="30" y="40" width="320" height="115" rx="10"
      fill="var(--accent,#d97706)" fill-opacity="0.15"
      stroke="var(--accent,#d97706)" stroke-width="1.8"/>
<text x="190" y="62" text-anchor="middle" class="lbl">vLLM Rollout Engine</text>
<text x="190" y="79" text-anchor="middle" class="sub">policy weights (read-only copy)</text>
<text x="190" y="94" text-anchor="middle" class="sub">fast generation, PagedAttention</text>
<text x="190" y="110" text-anchor="middle" class="sub" style="font-style:italic">generates tokens &amp; logprobs</text>
<text x="190" y="126" text-anchor="middle" class="sub" style="font-style:italic">during rollout phase</text>


<rect x="420" y="40" width="300" height="115" rx="10"
      fill="var(--surface-3,rgba(128,128,128,0.07))"
      stroke="var(--border-2,#999)" stroke-width="1.5"/>
<text x="570" y="62" text-anchor="middle" class="lbl">Reference Actor</text>
<text x="570" y="79" text-anchor="middle" class="sub">frozen policy, no optimizer</text>
<text x="570" y="94" text-anchor="middle" class="sub">ZeRO-3 sharding</text>
<text x="570" y="110" text-anchor="middle" class="sub" style="font-style:italic">computes ref log-probs</text>
<text x="570" y="126" text-anchor="middle" class="sub" style="font-style:italic">for KL penalty</text>



<line x1="190" y1="155" x2="190" y2="213"
      stroke="var(--ink-soft,#666)" stroke-width="2"
      marker-end="url(#ord-arr)"
      class="flow-p1"/>
<text x="198" y="189" class="edge-lbl">tokens, logprobs</text>


<line x1="570" y1="155" x2="570" y2="213"
      stroke="var(--ink-soft,#666)" stroke-width="2"
      marker-end="url(#ord-arr)"
      class="flow-p2"/>
<text x="578" y="189" class="edge-lbl">ref logprobs</text>


<rect x="30" y="216" width="720" height="80" rx="10"
      fill="var(--accent2,#3b82f6)" fill-opacity="0.12"
      stroke="var(--accent2,#3b82f6)" stroke-width="2.2"/>
<text x="390" y="240" text-anchor="middle" class="lbl">Experience Buffer (Ray Object Store)</text>
<text x="390" y="257" text-anchor="middle" class="mono">{ prompt, response, reward, adv, logp, ref_logp }</text>
<text x="390" y="273" text-anchor="middle" class="sub" style="font-style:italic">zero-copy shared store — central data hub</text>
<text x="390" y="288" text-anchor="middle" class="sub" style="font-style:italic">consumed by all training actors</text>


<line x1="390" y1="296" x2="390" y2="322"
      stroke="var(--ink-soft,#666)" stroke-width="1.8"
      class="flow-p3"/>
<text x="396" y="312" class="edge-lbl">experience batch</text>


<line x1="390" y1="322" x2="220" y2="350"
      stroke="var(--ink-soft,#666)" stroke-width="1.8"
      marker-end="url(#ord-arr)"
      class="flow-p3"/>

<line x1="390" y1="322" x2="580" y2="350"
      stroke="var(--ink-soft,#666)" stroke-width="1.8"
      marker-end="url(#ord-arr)"
      class="flow-p3"/>




<rect x="30" y="353" width="330" height="110" rx="10"
      fill="var(--surface,rgba(128,128,128,0.1))"
      stroke="var(--border-2,#999)" stroke-width="1.5"/>
<text x="195" y="376" text-anchor="middle" class="lbl">Critic Actor</text>
<text x="195" y="393" text-anchor="middle" class="sub">value head</text>
<text x="195" y="408" text-anchor="middle" class="sub">ZeRO-1 / 2 / 3 optimizer</text>
<text x="195" y="424" text-anchor="middle" class="sub" style="font-style:italic">computes value estimates V(s)</text>
<text x="195" y="439" text-anchor="middle" class="sub" style="font-style:italic">for GAE advantage computation</text>
<text x="195" y="454" text-anchor="middle" class="sub" style="font-style:italic">updates value head weights</text>


<rect x="420" y="353" width="330" height="110" rx="10"
      fill="var(--surface,rgba(128,128,128,0.1))"
      stroke="var(--accent,#d97706)" stroke-width="2"/>
<text x="585" y="376" text-anchor="middle" class="lbl">Policy Training Actor</text>
<text x="585" y="393" text-anchor="middle" class="sub">PPO gradient updates</text>
<text x="585" y="408" text-anchor="middle" class="sub">DeepSpeed ZeRO-3</text>
<text x="585" y="424" text-anchor="middle" class="sub" style="font-style:italic; fill:var(--accent,#d97706)">calls sync_weights_to_vllm()</text>
<text x="585" y="439" text-anchor="middle" class="sub" style="font-style:italic">broadcasts params via NCCL</text>
<text x="585" y="454" text-anchor="middle" class="sub" style="font-style:italic">or Ray object store</text>


<rect x="30" y="500" width="720" height="72" rx="10"
      fill="var(--surface-3,rgba(128,128,128,0.07))"
      stroke="var(--border-2,#999)" stroke-width="1.5"/>
<text x="390" y="524" text-anchor="middle" class="lbl">Reward Model Actor</text>
<text x="390" y="541" text-anchor="middle" class="sub">separate RM, or rule-based verifier</text>
<text x="390" y="557" text-anchor="middle" class="sub" style="font-style:italic">scores rollout responses, feeds reward to buffer</text>


<path d="M 100 500 C 100 460, 100 316, 200 296"
      fill="none"
      stroke="var(--ink-soft,#666)" stroke-width="1.8"

      class="flow-p2"/>
<text x="68" y="400" class="edge-lbl" text-anchor="middle"

<path d="M 750 408 C 820 408, 855 98, 760 80 C 720 72, 400 52, 350 97"

<text x="840" y="280" text-anchor="middle" class="sync-lbl"
      transform="rotate(-90,840,280)">sync_weights_to_vllm()</text>
<text x="824" y="280" text-anchor="middle" class="sync-lbl"
      style="font-size:9px; font-weight:400"
      transform="rotate(-90,824,280)">NCCL broadcast / object store</text>

</svg>
<figcaption><b>OpenRLHF maps every RLHF role onto a dedicated Ray actor group, with the Ray object store as the shared Experience Buffer.</b> After each PPO update the Policy Training Actor calls <code>sync_weights_to_vllm()</code>, broadcasting updated weights back to the vLLM Rollout Engine (amber arc) — closing the RL cycle. Animated arrows show the temporal order of the six PPO phases: rollout generation, scoring, buffer population, and gradient updates.</figcaption>
</figure>
