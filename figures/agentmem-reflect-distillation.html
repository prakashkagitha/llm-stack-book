<figcaption><b>Reflection is a distillation funnel: an LLM reads a batch of noisy, timestamped episodic entries and writes back a handful of compact semantic facts.</b> Redundant and low-signal rows (dimmed) are the norm in an append-only log, which is exactly why reflection — not raw retrieval — is what keeps the semantic store high-signal. Generative Agents (Park et al., 2023) showed this reflect loop is what makes long-running agents coherent.</figcaption>
</figure>
