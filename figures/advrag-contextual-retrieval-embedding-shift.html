<figure class="viz" id="fig-advrag-contextual-retrieval-embedding-shift">
<svg viewBox="0 0 800 560" role="img" aria-label="A 2D embedding space plane showing a query star for 'constructive dismissal ruling' near a cluster of employment-discrimination-2019 chunks and away from a cluster of unrelated legal boilerplate chunks. A chunk embedded in isolation from raw text 'the plaintiff argued...' lands as a hollow dot near the boilerplate cluster, ambiguous and in the wrong neighbourhood. A dashed arrow labelled 'prepend LLM context' shows the same chunk, after contextualization, moving to a filled dot next to the query star in the right neighbourhood.">

</defs>

  #fig-advrag-contextual-retrieval-embedding-shift .mono { font: 500 10px var(--mono,monospace); fill: var(--ink-soft,#334155); }

  <circle cx="398" cy="188" r="4" fill="var(--good,#2f9e6e)"/>

  <path d="M 455 165 l 5 13 l 14 1 l -11 9 l 4 14 l -12 -8 l -12 8 l 4 -14 l -11 -9 l 14 -1 z"
        fill="var(--accent,#c15b39)" stroke="var(--accent,#c15b39)" stroke-width="1"/>

  <text x="556" y="108" class="mono">"the plaintiff argued...."</text>

  <text x="556" y="140" class="mono-b">+ context sentence:</text>
  <text x="556" y="154" class="mono">"2019 employment</text>
  <text x="556" y="166" class="mono">discrimination ruling..."</text>

  <text x="556" y="184" class="mono-b" fill="var(--accent,#c15b39)">-&gt; embed(context + chunk)</text>
</g>


<g data-anim="1">
  <rect x="540" y="210" width="240" height="70" rx="10" fill="var(--surface,#fff)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
  <circle cx="558" cy="232" r="6" fill="none" stroke="var(--ink-soft,#334155)" stroke-width="2"/>
  <text x="572" y="236" class="mono">raw chunk (isolated)</text>
  <circle cx="558" cy="258" r="6" fill="var(--accent,#c15b39)" stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
  <text x="572" y="262" class="mono">contextualized chunk</text>
</g>


<rect x="20" y="450" width="760" height="70" rx="8" fill="var(--surface-3,#ece7da)" fill-opacity="0.5" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2" data-anim="4"/>
<text x="400" y="476" text-anchor="middle" class="cap" data-anim="4">the prefix resolves the ambiguity and pushes the embedding toward</text>
<text x="400" y="494" text-anchor="middle" class="cap" data-anim="4">the right neighbourhood -- the raw chunk alone was too generic to</text>
<text x="400" y="512" text-anchor="middle" class="cap" data-anim="4">disambiguate which case, era, or ruling it belongs to</text>

</svg>
<figcaption><b>Prepending a generated context sentence moves an ambiguous chunk's embedding from the wrong neighbourhood into the query's neighbourhood.</b> Embedded alone, "the plaintiff argued..." carries no signal about which case or era it belongs to, so it drifts toward unrelated boilerplate; prepending a short LLM-generated context sentence ("from a 2019 employment discrimination ruling...") pulls the same chunk's embedding next to the query it should actually match.</figcaption>
</figure>
