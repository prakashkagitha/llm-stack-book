<figure class="viz" id="fig-catastrophic-forgetting-loss-landscape">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 820 540" role="img" aria-label="A 1D loss landscape with a wide shallow basin on the left, the pretraining general-capabilities optimum, and a narrower basin on the right, the SFT-task optimum, separated by a ridge. A large-learning-rate, many-epoch update leaps over the ridge and lands deep in the SFT basin, forgetting general skills. A small-learning-rate, few-epoch update only nudges up the near wall, staying close to the general optimum so both skills are retained. A side panel lists four mitigations: low learning rate, short training, data mixing, and LoRA.">
<defs>
  <marker id="cfl-arr-warn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <marker id="cfl-arr-good" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="cfl-arr-muted" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
  </marker>
</defs>
<style>
  #fig-catastrophic-forgetting-loss-landscape text       { fill: var(--ink-soft); }
  #fig-catastrophic-forgetting-loss-landscape .title     { font: 700 14px var(--sans,sans-serif); fill: var(--ink); }
  #fig-catastrophic-forgetting-loss-landscape .axis-lbl  { font: 500 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-catastrophic-forgetting-loss-landscape .basin-lbl { font: 700 10.5px var(--sans,sans-serif); fill: var(--ink); }
  #fig-catastrophic-forgetting-loss-landscape .basin-sub { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-catastrophic-forgetting-loss-landscape .arr-lbl-warn   { font: 700 9.5px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-catastrophic-forgetting-loss-landscape .arr-lbl-good   { font: 700 9.5px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
  #fig-catastrophic-forgetting-loss-landscape .note-warn  { font: 400 9px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-catastrophic-forgetting-loss-landscape .note-good  { font: 400 9px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
  #fig-catastrophic-forgetting-loss-landscape .lock-lbl   { font: 400 8px var(--sans,sans-serif); fill: var(--muted); }
  #fig-catastrophic-forgetting-loss-landscape .panel-title{ font: 700 12px var(--sans,sans-serif); fill: var(--ink); }
  #fig-catastrophic-forgetting-loss-landscape .mit-lbl    { font: 600 9.5px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-catastrophic-forgetting-loss-landscape .mit-sub    { font: 400 8.5px var(--sans,sans-serif); fill: var(--muted); }

  #fig-catastrophic-forgetting-loss-landscape .curve   { fill: none; stroke: var(--ink-soft); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  #fig-catastrophic-forgetting-loss-landscape .curve-fill { fill: var(--surface-3); opacity: .35; }
  #fig-catastrophic-forgetting-loss-landscape .divider { stroke: var(--border-2); stroke-width: 1; }
  #fig-catastrophic-forgetting-loss-landscape .mit-row { fill: var(--surface); stroke: var(--border-2); stroke-width: 1; }
  #fig-catastrophic-forgetting-loss-landscape .mit-badge { fill: var(--surface-3); stroke: var(--ink-soft); stroke-width: 1; }
</style>

<text x="320" y="26" text-anchor="middle" class="title">Fine-tuning as a jump in the loss landscape</text>

<line class="divider" x1="632" y1="42" x2="632" y2="486"/>


<g data-anim="1">
  <path class="curve-fill" d="M50,180 Q90,300 150,300 L190,300 Q260,300 280,220 Q320,120 350,90 Q390,110 430,190 Q460,280 470,340 L510,340 Q550,340 580,150 L580,400 L50,400 Z"/>
  <path class="curve" d="M50,180 Q90,300 150,300 L190,300 Q260,300 280,220 Q320,120 350,90 Q390,110 430,190 Q460,280 470,340 L510,340 Q550,340 580,150"/>

  <text x="320" y="418" text-anchor="middle" class="axis-lbl">parameter configuration -&gt;</text>
  <text x="45" y="60" class="axis-lbl">loss</text>
  <path d="M45,66 L45,80" stroke="var(--muted)" stroke-width="1.2" marker-end="url(#cfl-arr-muted)"/>
  <text x="50" y="88" class="axis-lbl" font-style="italic">lower</text>
</g>


<g data-anim="2">
  <text x="140" y="248" text-anchor="middle" class="basin-lbl">General capabilities</text>
  <text x="140" y="261" text-anchor="middle" class="basin-sub">(pretraining optimum)</text>

  <text x="490" y="268" text-anchor="middle" class="basin-lbl">SFT-task optimum</text>


  <rect x="58" y="322" width="16" height="12" rx="2" fill="none" stroke="var(--muted)" stroke-width="1.3"/>
  <path d="M61,322 v-5 a5,5 0 0 1 10,0 v5" fill="none" stroke="var(--muted)" stroke-width="1.3"/>
  <text x="66" y="346" text-anchor="middle" class="lock-lbl">LoRA: base</text>
  <text x="66" y="356" text-anchor="middle" class="lock-lbl">frozen</text>
</g>


<g data-anim="3">
  <circle cx="170" cy="300" r="6" fill="var(--ink)"/>
  <text x="170" y="316" text-anchor="middle" class="basin-sub" font-weight="600">pretrained model</text>


  <path d="M176,297 Q215,272 248,235" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="2.2" marker-end="url(#cfl-arr-good)"/>
  <circle cx="252" cy="230" r="5" fill="var(--good,#2f9e6e)"/>

  <text x="196" y="205" class="arr-lbl-good">small LR (1e-5..5e-5),</text>
  <text x="196" y="217" class="arr-lbl-good">1-3 epochs</text>
  <text x="266" y="224" class="note-good">still near general optimum</text>
  <text x="266" y="235" class="note-good">-&gt; both skills retained</text>
</g>


<g data-anim="4">
  <path d="M172,293 C210,220 240,120 260,90 C290,55 320,45 350,45 C380,45 410,55 420,90 C440,160 465,260 480,332" fill="none" stroke="var(--warn,#e0a106)" stroke-width="2.2" marker-end="url(#cfl-arr-warn)"/>
  <text x="350" y="62" text-anchor="middle" class="arr-lbl-warn">large LR /</text>
  <text x="350" y="74" text-anchor="middle" class="arr-lbl-warn">many epochs</text>

  <circle cx="486" cy="337" r="5" fill="var(--warn,#e0a106)"/>
  <text x="500" y="366" class="note-warn">general skills forgotten</text>
  <text x="500" y="377" class="note-warn">(MMLU drops)</text>
</g>


<g data-anim="2">
  <text x="720" y="66" text-anchor="middle" class="panel-title">Mitigations</text>

  <g>
    <rect class="mit-row" x="650" y="82" width="150" height="34" rx="7"/>
    <circle class="mit-badge" cx="670" cy="99" r="10"/>
    <text x="670" y="103" text-anchor="middle" font-size="9.5" font-weight="700" fill="var(--ink)">1</text>
    <text x="688" y="103" class="mit-lbl">Low learning rate</text>
  </g>

  <g>
    <rect class="mit-row" x="650" y="124" width="150" height="34" rx="7"/>
    <circle class="mit-badge" cx="670" cy="141" r="10"/>
    <text x="670" y="145" text-anchor="middle" font-size="9.5" font-weight="700" fill="var(--ink)">2</text>
    <text x="688" y="139" class="mit-lbl">Short training</text>
    <text x="688" y="150" class="mit-sub">(1-3 epochs)</text>
  </g>

  <g>
    <rect class="mit-row" x="650" y="166" width="150" height="42" rx="7"/>
    <circle class="mit-badge" cx="670" cy="187" r="10"/>
    <text x="670" y="191" text-anchor="middle" font-size="9.5" font-weight="700" fill="var(--ink)">3</text>
    <text x="688" y="181" class="mit-lbl">Data mixing / replay</text>
    <text x="688" y="192" class="mit-sub">(5-10% pretraining</text>
    <text x="688" y="202" class="mit-sub">data)</text>
  </g>

  <g>
    <rect class="mit-row" x="650" y="216" width="150" height="42" rx="7"/>
    <circle class="mit-badge" cx="670" cy="237" r="10"/>
    <text x="670" y="241" text-anchor="middle" font-size="9.5" font-weight="700" fill="var(--ink)">4</text>
    <text x="688" y="231" class="mit-lbl">LoRA</text>
    <text x="688" y="242" class="mit-sub">(freezes base -&gt;</text>
    <text x="688" y="252" class="mit-sub">structurally immune)</text>
  </g>
</g>

</svg>
<figcaption><b>SFT nudges a pretrained model's weights out of a broad general-capabilities optimum; how far determines whether general skills survive.</b> A small learning rate and few epochs (accent path) only reach the near wall, staying close to the general optimum so both capabilities are retained; a large learning rate or many epochs (warning path) leaps the ridge into the narrower SFT-task optimum, overwriting the weights that encoded general skills. Low LR, short training, data mixing, and LoRA (which structurally freezes the base) are the standard levers to keep the update small.</figcaption>
</figure>
