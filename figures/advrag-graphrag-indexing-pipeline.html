<figure class="viz" id="fig-advrag-graphrag-indexing-pipeline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 720" role="img" aria-label="GraphRAG indexing pipeline: raw corpus flows through an LLM extraction pass to an entity graph, then community detection with Leiden algorithm, and finally LLM summarization of each community into a vector database.">
<defs>
  <marker id="gip-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#94a3b8)"/>
  </marker>
</defs>
<style>
  #fig-advrag-graphrag-indexing-pipeline .lbl { font: 600 13px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-advrag-graphrag-indexing-pipeline .lbl-bold { font: 700 14px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-advrag-graphrag-indexing-pipeline .lbl-sm { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-advrag-graphrag-indexing-pipeline .mono { font: 500 11px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-advrag-graphrag-indexing-pipeline .ann { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-advrag-graphrag-indexing-pipeline .arrow-lbl { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-advrag-graphrag-indexing-pipeline .db-lbl { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
</style>


<g data-anim="1">
  <rect x="300" y="14" width="160" height="44" rx="8"
        fill="var(--surface-3,#e8eef5)" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
  <text x="380" y="41" text-anchor="middle" class="lbl">Raw corpus</text>
</g>


<g data-anim="1">
  <line x1="380" y1="58" x2="380" y2="84"
        stroke="var(--border-2,#94a3b8)" stroke-width="1.8"
        marker-end="url(#gip-arrow)"
        class="viz-draw" style="--len:26"/>
</g>


<g data-anim="2">
  <rect x="160" y="88" width="440" height="128" rx="10"
        fill="var(--accent,#dbeafe)" fill-opacity="0.35"
        stroke="var(--accent,#3b82f6)" stroke-width="1.8"/>
  <text x="380" y="110" text-anchor="middle" class="lbl-bold">LLM extraction pass (per chunk)</text>
  <text x="184" y="136" text-anchor="start" class="mono">entities: {ACME Corp, Alice Lee, Series B, 2019}</text>
  <text x="184" y="158" text-anchor="start" class="mono">relations: {(ACME, CEO, Alice), (Alice, joined, 2019)}</text>
  <text x="184" y="180" text-anchor="start" class="mono">relations: {(ACME, raised, Series B, 2019)}</text>
</g>


<g data-anim="2">
  <line x1="380" y1="216" x2="380" y2="252"
        stroke="var(--border-2,#94a3b8)" stroke-width="1.8"
        marker-end="url(#gip-arrow)"
        class="viz-draw" style="--len:36"/>
  <text x="390" y="238" text-anchor="start" class="arrow-lbl">extracted elements</text>
</g>


<g data-anim="3">
  <rect x="220" y="256" width="300" height="96" rx="10"
        fill="var(--surface,#ffffff)" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"/>
  <text x="280" y="282" text-anchor="middle" class="lbl-bold">Entity graph</text>
  <text x="280" y="300" text-anchor="middle" class="lbl-sm">(nodes + edges)</text>

  
  
  <circle cx="376" cy="274" r="7" fill="var(--accent,#3b82f6)" fill-opacity="0.7" stroke="var(--accent,#3b82f6)" stroke-width="1"/>
  <circle cx="404" cy="290" r="7" fill="var(--accent,#3b82f6)" fill-opacity="0.7" stroke="var(--accent,#3b82f6)" stroke-width="1"/>
  <circle cx="390" cy="316" r="7" fill="var(--accent,#3b82f6)" fill-opacity="0.7" stroke="var(--accent,#3b82f6)" stroke-width="1"/>
  <circle cx="358" cy="310" r="7" fill="var(--accent,#3b82f6)" fill-opacity="0.7" stroke="var(--accent,#3b82f6)" stroke-width="1"/>
  <circle cx="420" cy="314" r="5" fill="var(--accent,#3b82f6)" fill-opacity="0.5" stroke="var(--accent,#3b82f6)" stroke-width="1"/>
  
  <line x1="376" y1="274" x2="404" y2="290" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>
  <line x1="404" y1="290" x2="390" y2="316" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>
  <line x1="390" y1="316" x2="358" y2="310" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>
  <line x1="376" y1="274" x2="358" y2="310" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>
  <line x1="404" y1="290" x2="420" y2="314" stroke="var(--border-2,#94a3b8)" stroke-width="1.2"/>
</g>


<g data-anim="3">
  <text x="532" y="294" text-anchor="start" class="ann">merge by entity</text>
  <text x="532" y="308" text-anchor="start" class="ann">name / alias</text>
</g>


<g data-anim="3">
  <line x1="380" y1="352" x2="380" y2="388"
        stroke="var(--border-2,#94a3b8)" stroke-width="1.8"
        marker-end="url(#gip-arrow)"
        class="viz-draw" style="--len:36"/>
</g>


<g data-anim="4">
  <rect x="200" y="392" width="360" height="130" rx="10"
        fill="var(--accent-2,#c7d2fe)" fill-opacity="0.3"
        stroke="var(--accent-2,#818cf8)" stroke-width="1.8"/>
  <text x="380" y="416" text-anchor="middle" class="lbl-bold">Community detection (Leiden)</text>

  
  <rect x="218" y="426" width="324" height="24" rx="6"
        fill="var(--accent-2,#c7d2fe)" fill-opacity="0.4" stroke="var(--accent-2,#818cf8)" stroke-width="1"/>
  <text x="380" y="443" text-anchor="middle" class="lbl-sm">level 0: coarse (industries)</text>

  <rect x="226" y="456" width="308" height="24" rx="6"
        fill="var(--accent-2,#c7d2fe)" fill-opacity="0.55" stroke="var(--accent-2,#818cf8)" stroke-width="1"/>
  <text x="380" y="473" text-anchor="middle" class="lbl-sm">level 1: medium (companies)</text>

  <rect x="234" y="486" width="292" height="24" rx="6"
        fill="var(--accent-2,#c7d2fe)" fill-opacity="0.75" stroke="var(--accent-2,#818cf8)" stroke-width="1"/>
  <text x="380" y="503" text-anchor="middle" class="lbl-sm">level 2: fine (products)</text>
</g>


<g data-anim="4">
  <line x1="380" y1="522" x2="380" y2="558"
        stroke="var(--border-2,#94a3b8)" stroke-width="1.8"
        marker-end="url(#gip-arrow)"
        class="viz-draw" style="--len:36"/>
  <text x="390" y="544" text-anchor="start" class="arrow-lbl">clustered communities</text>
</g>


<g data-anim="5">
  <rect x="160" y="562" width="440" height="104" rx="10"
        fill="var(--accent,#dbeafe)" fill-opacity="0.35"
        stroke="var(--accent,#3b82f6)" stroke-width="1.8"/>
  <text x="340" y="588" text-anchor="middle" class="lbl-bold">LLM summarizes each community</text>
  <text x="340" y="610" text-anchor="middle" class="lbl-sm">community report stored in vector DB</text>
  <text x="340" y="632" text-anchor="middle" class="lbl-sm">(one report per community per level)</text>

  
  <ellipse cx="548" cy="594" rx="18" ry="6" fill="var(--accent,#3b82f6)" fill-opacity="0.25" stroke="var(--accent,#3b82f6)" stroke-width="1.2"/>
  <rect x="530" y="594" width="36" height="30" fill="var(--accent,#3b82f6)" fill-opacity="0.12" stroke="var(--accent,#3b82f6)" stroke-width="1.2"/>
  <ellipse cx="548" cy="624" rx="18" ry="6" fill="var(--accent,#3b82f6)" fill-opacity="0.25" stroke="var(--accent,#3b82f6)" stroke-width="1.2"/>
  <text x="548" y="643" text-anchor="middle" class="db-lbl">vector DB</text>
</g>

</svg>
<figcaption><b>GraphRAG indexing pipeline: four stages from raw text to searchable community reports.</b> The two LLM-driven stages (extraction and summarization, shown in blue) bracket a purely structural phase — entity merging and Leiden community detection — highlighted in purple to distinguish algorithmic from generative work. The output is a hierarchy of community reports indexed in a vector database, enabling both local and global retrieval at query time.</figcaption>
</figure>
