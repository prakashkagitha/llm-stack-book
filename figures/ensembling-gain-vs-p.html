<figcaption><b>Ensembling gain from multiple independent agents is largest at moderate per-agent success probability and vanishes at the extremes.</b> The shaded gap between the N=1 diagonal and the N=3 curve, P(at least one correct) = 1-(1-p)^N, peaks near the middle of the p range and pinches to zero as p approaches 0 (all attempts fail) or 1 (every attempt already succeeds) - at p=0.7 three agents raise the odds to about 0.973.</figcaption>
