<figure class="viz" id="fig-agentloop-grounded-vs-hallucinated-observation">
<svg viewBox="0 0 800 480" role="img" aria-label="Side-by-side comparison of a ReAct step with and without the stop=Observation: sequence. With the stop sequence, generation halts after the Action and the harness runs a real tool, injecting a grounded observation. Without it, the model writes its own fabricated Observation line in the same generation and the tool is never called.">
<defs>
  <marker id="gh-arr-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  <marker id="gh-arr-good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--good,#2f9e6e)"/>
  </marker>
</defs>
<style>
  #fig-agentloop-grounded-vs-hallucinated-observation text { fill: var(--ink-soft,#333); font: 400 11px var(--sans,sans-serif); }
  #fig-agentloop-grounded-vs-hallucinated-observation .title-txt { font: 700 14px var(--sans,sans-serif); }
  #fig-agentloop-grounded-vs-hallucinated-observation .subtitle-txt { font: 400 10px var(--mono,monospace); fill: var(--muted,#888); }
  #fig-agentloop-grounded-vs-hallucinated-observation .col-hdr { font: 700 10px var(--sans,sans-serif); fill: var(--muted,#888); letter-spacing: 0.4px; }
  #fig-agentloop-grounded-vs-hallucinated-observation .body-txt { font: 400 10.5px var(--sans,sans-serif); }
  #fig-agentloop-grounded-vs-hallucinated-observation .small-lbl { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-agentloop-grounded-vs-hallucinated-observation .tag-txt { font: 700 9.5px var(--sans,sans-serif); }
  #fig-agentloop-grounded-vs-hallucinated-observation .stop-txt { font: 700 10px var(--sans,sans-serif); fill: #fff; }
  #fig-agentloop-grounded-vs-hallucinated-observation .caption-txt { font: 600 12px var(--sans,sans-serif); }
</style>


<g data-anim="1">
  <rect x="10" y="50" width="380" height="386" rx="12" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>

  <circle cx="200" cy="58" r="9" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <path d="M195.5 58 L198.5 61 L204.5 54.5" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="200" y="81" text-anchor="middle" class="title-txt" style="fill:var(--good,#2f9e6e);">GROUNDED</text>
  <text x="200" y="97" text-anchor="middle" class="subtitle-txt">stop at "Observation:"</text>

  <text x="145" y="113" text-anchor="middle" class="col-hdr">MODEL</text>
  <text x="322" y="113" text-anchor="middle" class="col-hdr">HARNESS / TOOL</text>
  <line x1="263" y1="119" x2="263" y2="426" class="v-grid" stroke-dasharray="4 4" stroke-width="1"/>
</g>

<g data-anim="2">
  <rect x="25" y="119" width="232" height="55" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="35" y="139" class="body-txt">Thought: I need Tokyo's population</text>
  <text x="35" y="156" class="body-txt">Action: search("Tokyo population")</text>
</g>

<g data-anim="3">
  <rect x="25" y="182" width="232" height="22" rx="4" fill="var(--accent,#4f46e5)"/>
  <text x="141" y="197" text-anchor="middle" class="stop-txt">stop="Observation:"</text>
</g>

<g data-anim="4">
  <line x1="257" y1="215" x2="300" y2="215" stroke="var(--accent,#4f46e5)" stroke-width="1.8" marker-end="url(#gh-arr-accent)"/>
  <circle cx="322" cy="215" r="11" fill="var(--v-fill)" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <line x1="330" y1="223" x2="337" y2="230" stroke="var(--accent,#4f46e5)" stroke-width="2" stroke-linecap="round"/>
  <text x="322" y="242" text-anchor="middle" class="small-lbl">search tool (runs)</text>
</g>

<g data-anim="5">
  <path d="M 318 227 C 300 245 285 245 257 256" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.6" marker-end="url(#gh-arr-good)"/>
  <text x="330" y="253" text-anchor="middle" class="small-lbl" style="fill:var(--good,#2f9e6e);">real result</text>

  <rect x="25" y="257" width="232" height="50" rx="8" fill="var(--v-fill)" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <text x="141" y="286" text-anchor="middle" class="body-txt">Observation: Tokyo metro ~37M</text>

  <text x="141" y="327" text-anchor="middle" class="tag-txt" style="fill:var(--good,#2f9e6e);">ground-truth, from the environment</text>
</g>


<g data-anim="1">
  <rect x="410" y="50" width="380" height="386" rx="12" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>

  <path d="M600 50 L609 65 L591 65 z" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.8" stroke-linejoin="round"/>
  <text x="600" y="61.5" text-anchor="middle" style="font:700 9px var(--sans,sans-serif); fill:var(--warn,#e0a106);">!</text>
  <text x="600" y="81" text-anchor="middle" class="title-txt" style="fill:var(--warn,#e0a106);">UNGROUNDED</text>
  <text x="600" y="97" text-anchor="middle" class="subtitle-txt">no stop sequence</text>

  <text x="545" y="113" text-anchor="middle" class="col-hdr">MODEL</text>
  <text x="722" y="113" text-anchor="middle" class="col-hdr">HARNESS / TOOL</text>
  <line x1="663" y1="119" x2="663" y2="426" class="v-grid" stroke-dasharray="4 4" stroke-width="1"/>
</g>

<g data-anim="2">
  <rect x="425" y="119" width="232" height="101" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>
  <text x="435" y="139" class="body-txt">Thought: I need Tokyo's population</text>
  <text x="435" y="156" class="body-txt">Action: search("Tokyo population")</text>

  <rect x="435" y="165" width="212" height="45" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.1" stroke="var(--warn,#e0a106)" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="443" y="183" class="body-txt" opacity="0.65" font-style="italic">Observation: Tokyo metro ~37M</text>
  <text x="443" y="200" class="tag-txt" style="fill:var(--warn,#e0a106);">(fabricated - not from tool)</text>
</g>

<g data-anim="3">
  <rect x="425" y="228" width="232" height="20" rx="4" fill="none" class="v-grid" stroke-dasharray="3 3" stroke-width="1.2"/>
  <text x="541" y="242" text-anchor="middle" class="small-lbl">(no stop sequence)</text>
</g>

<g data-anim="4">
  <line x1="657" y1="273" x2="683" y2="273" class="v-grid" stroke-width="1.6" stroke-dasharray="4 3"/>
  <line x1="672" y1="267" x2="684" y2="279" stroke="var(--warn,#e0a106)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="684" y1="267" x2="672" y2="279" stroke="var(--warn,#e0a106)" stroke-width="1.8" stroke-linecap="round"/>
  <text x="670" y="259" text-anchor="middle" class="small-lbl">tool never ran</text>

  <circle cx="722" cy="273" r="11" fill="var(--v-fill)" class="v-grid" stroke-width="1.6" opacity="0.55"/>
  <line x1="730" y1="281" x2="737" y2="288" class="v-grid" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <text x="722" y="300" text-anchor="middle" class="small-lbl">search tool (unused)</text>
</g>

<g data-anim="5">
  <text x="541" y="325" text-anchor="middle" class="tag-txt" style="fill:var(--warn,#e0a106);">Context now holds a fabricated</text>
  <text x="541" y="340" text-anchor="middle" class="tag-txt" style="fill:var(--warn,#e0a106);">"observation" indistinguishable from a real one</text>
</g>


<g data-anim="5">
  <text x="400" y="462" text-anchor="middle" class="caption-txt">The model can invent a plausible observation. Only a real tool call grounds the loop.</text>
</g>

</svg>
<figcaption><b>The <code>stop=["Observation:"]</code> sequence is what keeps a ReAct agent grounded.</b> Left: generation halts right after the Action line, so the harness actually calls the tool and injects a real result. Right: without the stop sequence, the model keeps generating and writes its own plausible-looking Observation in the same pass — the tool is bypassed entirely, and the fabricated line is indistinguishable from a real one to everything downstream.</figcaption>
</figure>
