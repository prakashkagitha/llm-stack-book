<figure class="viz" id="fig-verl-reshard-p-to-q">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 500" role="img" aria-label="The 3D-HybridEngine reshards a column-parallel weight from p=4 training shards to q=2 rollout shards: it all-gathers the bf16 parameters within the small TP group while optimizer state and gradients stay anchored in the training layout, then re-splits the gathered weight into the rollout layout and injects it into vLLM in place.">
<defs>
  <marker id="vrq-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="vrq-arrow-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#4f46e5)"/>
  </marker>
</defs>
<style>
  #fig-verl-reshard-p-to-q text { fill: var(--ink-soft,#333); font: 400 11px var(--sans,sans-serif); }
  #fig-verl-reshard-p-to-q .panel-lbl { font: 700 12.5px var(--sans,sans-serif); fill: var(--ink-soft,#222); }
  #fig-verl-reshard-p-to-q .rank-lbl { font: 600 10.5px var(--sans,sans-serif); }
  #fig-verl-reshard-p-to-q .body-sm { font: 400 10px var(--sans,sans-serif); }
  #fig-verl-reshard-p-to-q .note-txt { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-verl-reshard-p-to-q .note-txt-a { font: 600 10.5px var(--sans,sans-serif); fill: var(--accent,#4f46e5); }
  #fig-verl-reshard-p-to-q .callout { font: 600 11px var(--sans,sans-serif); fill: var(--ink-soft,#222); }
  #fig-verl-reshard-p-to-q .mono-sm { font: 400 9.5px var(--mono,monospace); fill: var(--muted,#888); }
  #fig-verl-reshard-p-to-q .lock-glyph { fill: none; stroke: var(--muted,#888); stroke-width: 1.3; }

  #fig-verl-reshard-p-to-q [data-anim] { opacity: 0; animation: vrq-in 0.5s ease-out forwards; }
  #fig-verl-reshard-p-to-q [data-anim="1"] { animation-delay: 0.0s; }
  #fig-verl-reshard-p-to-q [data-anim="2"] { animation-delay: 0.5s; }
  #fig-verl-reshard-p-to-q [data-anim="3"] { animation-delay: 1.1s; }
  #fig-verl-reshard-p-to-q [data-anim="4"] { animation-delay: 1.7s; }
  @keyframes vrq-in { to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    #fig-verl-reshard-p-to-q [data-anim] { opacity: 1; animation: none; }
  }
</style>


<g data-anim="1">
  <text x="16" y="22" class="panel-lbl">TRAIN LAYOUT (TP=p, p=4)</text>
  <text x="16" y="40" class="mono-sm">W: out_dim, column-parallel</text>

  
  <rect x="16" y="50" width="40" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.22" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>
  <rect x="56" y="50" width="40" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.38" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>
  <rect x="96" y="50" width="40" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.54" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>
  <rect x="136" y="50" width="40" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.70" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>

  <text x="36" y="84" text-anchor="middle" class="rank-lbl" style="fill:#fff;">r0</text>
  <text x="76" y="84" text-anchor="middle" class="rank-lbl" style="fill:#fff;">r1</text>
  <text x="116" y="84" text-anchor="middle" class="rank-lbl" style="fill:#fff;">r2</text>
  <text x="156" y="84" text-anchor="middle" class="rank-lbl" style="fill:#fff;">r3</text>

  <text x="36" y="126" text-anchor="middle" class="body-sm">rank0</text>
  <text x="76" y="126" text-anchor="middle" class="body-sm">rank1</text>
  <text x="116" y="126" text-anchor="middle" class="body-sm">rank2</text>
  <text x="156" y="126" text-anchor="middle" class="body-sm">rank3</text>

  
  <g>
    <rect x="16" y="144" width="160" height="50" rx="6" fill="var(--surface-3,#eee)" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
    <text x="96" y="162" text-anchor="middle" class="body-sm" style="font-weight:600;">optimizer state + grads</text>
    <text x="96" y="176" text-anchor="middle" class="note-txt">(fp32 Adam, all 4 ranks)</text>
    
    <rect x="90" y="181" width="10" height="8" rx="1.5" class="lock-glyph"/>
    <path d="M92 181 L92 177 Q92 173 95 173 Q98 173 98 177 L98 181" class="lock-glyph"/>
  </g>
  <text x="96" y="212" text-anchor="middle" class="note-txt-a">STAYS in train layout</text>
  <text x="96" y="226" text-anchor="middle" class="note-txt-a">-- never gathered</text>
</g>


<g data-anim="2">
  <line x1="198" y1="80" x2="238" y2="80" stroke="var(--accent,#4f46e5)" stroke-width="1.6" marker-end="url(#vrq-arrow-a)"/>
</g>


<g data-anim="2">
  <text x="254" y="22" class="panel-lbl">GATHER within TP group</text>

  
  <rect x="254" y="50" width="17" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.22" stroke="var(--accent,#4f46e5)" stroke-width="1"/>
  <rect x="271" y="50" width="17" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.38" stroke="var(--accent,#4f46e5)" stroke-width="1"/>
  <rect x="288" y="50" width="17" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.54" stroke="var(--accent,#4f46e5)" stroke-width="1"/>
  <rect x="305" y="50" width="17" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.70" stroke="var(--accent,#4f46e5)" stroke-width="1"/>

  
  <path d="M262 110 L288 138" fill="none" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <path d="M279 110 L288 138" fill="none" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <path d="M296 110 L288 138" fill="none" stroke="var(--muted,#888)" stroke-width="1.1"/>
  <path d="M313 110 L288 138" fill="none" stroke="var(--muted,#888)" stroke-width="1.1" marker-end="url(#vrq-arrow)"/>
  <text x="345" y="128" text-anchor="middle" class="note-txt">all-gather</text>

  
  <rect x="248" y="142" width="80" height="42" fill="var(--accent,#4f46e5)" fill-opacity="0.46" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
  <text x="288" y="167" text-anchor="middle" class="rank-lbl" style="fill:#fff;">full W</text>

  <text x="288" y="200" text-anchor="middle" class="note-txt-a">bf16 params only</text>

  
  <rect x="248" y="212" width="80" height="34" rx="6" fill="var(--surface-3,#eee)" fill-opacity="0.5" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="288" y="228" text-anchor="middle" class="note-txt">optimizer state</text>
  <text x="288" y="240" text-anchor="middle" class="note-txt">left behind</text>

  
  <rect x="236" y="264" width="106" height="72" rx="6" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>
  <text x="289" y="281" text-anchor="middle" style="font:600 10px var(--sans,sans-serif); fill:var(--accent,#4f46e5);">transient extra</text>
  <text x="289" y="294" text-anchor="middle" style="font:600 10px var(--sans,sans-serif); fill:var(--accent,#4f46e5);">memory = ONE</text>
  <text x="289" y="307" text-anchor="middle" style="font:600 10px var(--sans,sans-serif); fill:var(--accent,#4f46e5);">TP group of weights,</text>
  <text x="289" y="320" text-anchor="middle" style="font:600 10px var(--sans,sans-serif); fill:var(--accent,#4f46e5);">not the whole model</text>

  <text x="254" y="358" class="note-txt">intra-node all-gather,</text>
  <text x="254" y="371" class="note-txt">overlapped with compute</text>
</g>


<g data-anim="3">
  <line x1="352" y1="163" x2="428" y2="163" stroke="var(--accent,#4f46e5)" stroke-width="1.6" marker-end="url(#vrq-arrow-a)"/>
  <text x="390" y="153" text-anchor="middle" class="note-txt">re-split</text>
</g>


<g data-anim="3">
  <text x="448" y="22" class="panel-lbl">ROLLOUT LAYOUT (TP=q, q=2)</text>

  
  <rect x="448" y="50" width="100" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.30" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
  <rect x="548" y="50" width="100" height="60" fill="var(--accent,#4f46e5)" fill-opacity="0.60" stroke="var(--accent,#4f46e5)" stroke-width="1.4"/>
  <text x="498" y="84" text-anchor="middle" class="rank-lbl" style="fill:#fff;">rank0</text>
  <text x="598" y="84" text-anchor="middle" class="rank-lbl" style="fill:#fff;">rank1</text>
  <text x="498" y="126" text-anchor="middle" class="body-sm">vLLM TP rank0</text>
  <text x="598" y="126" text-anchor="middle" class="body-sm">vLLM TP rank1</text>

  
  <rect x="664" y="50" width="60" height="60" fill="var(--muted,#888)" fill-opacity="0.10" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="730" y="50" width="60" height="60" fill="var(--muted,#888)" fill-opacity="0.10" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="694" y="84" text-anchor="middle" class="note-txt">rank2</text>
  <text x="760" y="84" text-anchor="middle" class="note-txt">rank3</text>
  <text x="727" y="126" text-anchor="middle" class="note-txt">idle during rollout --</text>
  <text x="727" y="139" text-anchor="middle" class="note-txt">gathered weights freed</text>

  
  <line x1="448" y1="158" x2="790" y2="158" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <line x1="448" y1="153" x2="448" y2="163" stroke="var(--muted,#888)" stroke-width="1"/>
  <line x1="548" y1="153" x2="548" y2="163" stroke="var(--muted,#888)" stroke-width="1"/>
  <line x1="648" y1="153" x2="648" y2="163" stroke="var(--muted,#888)" stroke-width="1"/>
  <text x="619" y="174" text-anchor="middle" class="note-txt">4 thin stripes (train) -&gt;</text>
  <text x="619" y="188" text-anchor="middle" class="note-txt">2 wide stripes (rollout), same total width</text>

  
  <rect x="448" y="204" width="342" height="68" rx="6" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.2"/>
  <text x="619" y="224" text-anchor="middle" class="callout">injected into vLLM in place</text>
  <text x="619" y="242" text-anchor="middle" class="note-txt">via update_weights -- device-to-device,</text>
  <text x="619" y="257" text-anchor="middle" class="note-txt">no disk checkpoint round-trip</text>
</g>


<g data-anim="4">
  <line x1="16" y1="392" x2="750" y2="392" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <rect x="16" y="406" width="360" height="52" rx="6" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="196" y="428" text-anchor="middle" class="callout">gather-within-small-group,</text>
  <text x="196" y="446" text-anchor="middle" class="callout">then re-split -- pure partition arithmetic</text>

  <rect x="390" y="406" width="360" height="52" rx="6" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.1"/>
  <text x="570" y="428" text-anchor="middle" class="callout">optimizer state + gradients never move --</text>
  <text x="570" y="446" text-anchor="middle" class="callout">only bf16 params flow through this pipeline</text>
</g>

</svg>
<figcaption><b>The 3D-HybridEngine reshards a training weight into the rollout layout by gathering within a small TP group and re-splitting, never touching optimizer state.</b> A column-parallel weight sharded p=4 ways for training is all-gathered intra-node (transient memory bounded by one TP group, not the whole model), then re-split into q=2 rollout shards and injected into vLLM's parameter buffers in place; the fp32 optimizer state and gradients stay anchored in the training layout the entire time.</figcaption>
</figure>
