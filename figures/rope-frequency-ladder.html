<figure class="viz" id="fig-rope-frequency-ladder">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 400" role="img" aria-label="Each RoPE dimension pair rotates at its own frequency: fast pairs spin many times per token window while slow pairs barely move, so the slow pairs stay inside the trained angular range only up to the training length and drift into unfamiliar angles beyond it.">
  <defs>
    <marker id="rfl-tip" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-rope-frequency-ladder text{ fill:var(--ink-soft); }
    #fig-rope-frequency-ladder .ttl{ font:600 13px var(--sans,sans-serif); }
    #fig-rope-frequency-ladder .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-rope-frequency-ladder .lbl{ font:600 10.5px var(--sans,sans-serif); }
    #fig-rope-frequency-ladder .mono{ font:500 10px var(--mono,monospace); fill:var(--muted); }
    #fig-rope-frequency-ladder .cap{ font:600 11px var(--sans,sans-serif); }
    #fig-rope-frequency-ladder .fast{ color:var(--accent); }
    #fig-rope-frequency-ladder .mid{ color:var(--accent2,#3b82f6); }
    #fig-rope-frequency-ladder .slow{ color:var(--good,#2f9e6e); }
  </style>

  
  <g data-anim="1">
    <text x="12" y="24" class="ttl">One position, three spin rates</text>

    
    <circle cx="70" cy="76" r="34" fill="none" class="v-grid" stroke-width="1.2"/>
    <line x1="70" y1="76" x2="70" y2="46" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <path d="M70 76 L92 58" class="fast" stroke="currentColor" stroke-width="2.4" marker-end="url(#rfl-tip)"/>
    <path d="M46 62 A 28 28 0 0 1 92 58" fill="none" class="fast" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
    <text x="70" y="122" text-anchor="middle" class="lbl fast" fill="currentColor">x many turns</text>
    <text x="70" y="150" text-anchor="middle" class="lbl">fast pair k=0</text>
    <text x="70" y="164" text-anchor="middle" class="mono">theta approx 1 rad/tok</text>
    <text x="70" y="177" text-anchor="middle" class="mono">wavelength approx 6 tok</text>

    
    <circle cx="70" cy="216" r="34" fill="none" class="v-grid" stroke-width="1.2"/>
    <line x1="70" y1="216" x2="70" y2="186" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <path d="M70 216 L96 198" class="mid" stroke="currentColor" stroke-width="2.4" marker-end="url(#rfl-tip)"/>
    <text x="70" y="264" text-anchor="middle" class="lbl">mid pair</text>
    <text x="70" y="278" text-anchor="middle" class="mono">moderate theta</text>

    
    <circle cx="70" cy="322" r="34" fill="none" class="v-grid" stroke-width="1.2"/>
    <line x1="70" y1="322" x2="70" y2="292" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <path d="M70 322 L74 292.3" class="slow" stroke="currentColor" stroke-width="2.4" marker-end="url(#rfl-tip)"/>
    <text x="70" y="362" text-anchor="middle" class="lbl slow" fill="currentColor">slow pair k=d/2-1</text>

    <text x="12" y="374" class="sm" style="font-size:9.5px">theta approx 1e-4 rad/tok, wavelength approx 50k tok</text>
  </g>

  
  <line x1="200" y1="16" x2="200" y2="366" class="v-grid" stroke="currentColor" stroke-width="1" stroke-dasharray="3 4"/>

  
  <g data-anim="2">
    <text x="220" y="24" class="ttl">Rotation angle vs. token position</text>

    
    <line x1="248" y1="330" x2="760" y2="330" class="v-muted" stroke="currentColor" stroke-width="1.2" marker-end="url(#rfl-tip)"/>
    <line x1="248" y1="330" x2="248" y2="50" class="v-muted" stroke="currentColor" stroke-width="1.2" marker-end="url(#rfl-tip)"/>
    <text x="760" y="346" text-anchor="end" class="sm">token position</text>
    <text x="252" y="46" class="sm">angle (rad)</text>
    <text x="238" y="334" text-anchor="end" class="mono">0</text>
    <text x="238" y="212" text-anchor="end" class="mono">pi</text>
    <text x="238" y="90" text-anchor="end" class="mono">2pi</text>
    <line x1="248" y1="212" x2="760" y2="212" class="v-grid" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2 3"/>
    <line x1="248" y1="90" x2="760" y2="90" class="v-grid" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2 3"/>

    
    <rect x="248" y="50" width="180" height="280" class="v-fill" opacity="0.55"/>
    <rect x="428" y="50" width="332" height="280" fill="var(--surface-3)" opacity="0.35"/>
    <line x1="428" y1="50" x2="428" y2="330" class="v-grid" stroke="currentColor" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="428" y="345" text-anchor="middle" class="mono">4K (L_train, illustrative)</text>

    <text x="252" y="62" class="sm" style="font-size:9px">trained window -</text>
    <text x="252" y="74" class="sm" style="font-size:9px">angles the model has seen</text>
    <text x="436" y="62" class="sm" style="font-size:9px">never seen</text>
    <text x="436" y="74" class="sm" style="font-size:9px">in training</text>

    
    <path d="M248,330 L260,90 L260.5,330 L273,90 L273.5,330 L285,90 L285.5,330 L298,90 L298.5,330 L310,90 L310.5,330 L323,90 L323.5,330 L335,90 L335.5,330 L348,90 L348.5,330 L360,90 L360.5,330 L373,90 L373.5,330 L385,90 L385.5,330 L398,90 L398.5,330 L410,90 L410.5,330 L423,90 L423.5,330 L428,278
      L440,90 L440.5,330 L453,90 L453.5,330 L465,90 L465.5,330 L478,90 L478.5,330 L490,90 L490.5,330 L503,90 L503.5,330 L515,90 L515.5,330 L528,90 L528.5,330 L540,90 L540.5,330 L553,90 L553.5,330 L565,90 L565.5,330 L578,90 L578.5,330 L590,90 L590.5,330 L603,90 L603.5,330 L615,90 L615.5,330 L628,90 L628.5,330 L640,90 L640.5,330 L653,90 L653.5,330 L665,90 L665.5,330 L678,90 L678.5,330 L690,90 L690.5,330 L703,90 L703.5,330 L715,90 L715.5,330 L728,90 L728.5,330 L740,90 L740.5,330 L753,90 L753.5,330 L760,210"
      fill="none" class="fast" stroke="currentColor" stroke-width="1.6" opacity="0.85"/>

    
    <path d="M248,330 C 300,90 340,330 380,150 C 410,60 420,180 428,235 C 470,60 520,330 570,150 C 610,60 640,200 680,120 C 710,70 735,180 760,140"
      fill="none" class="mid" stroke="currentColor" stroke-width="2" opacity="0.9"/>

    
    <path d="M248,330 C 320,325 380,318 428,312 C 520,300 620,280 700,240 C 730,222 748,206 760,196"
      fill="none" class="slow" stroke="currentColor" stroke-width="2.4"/>

    
    <text x="266" y="82" class="lbl fast" fill="currentColor">fast pair - many full cycles</text>
    <text x="590" y="128" class="lbl mid" fill="currentColor">mid pair - a couple cycles</text>
    <text x="440" y="302" class="lbl slow" fill="currentColor">slow pair: less than 8% of a turn at L_train</text>
    <text x="755" y="188" text-anchor="end" class="lbl slow" fill="currentColor" style="font-size:9.5px">past L_train: unfamiliar angles</text>
    <text x="755" y="200" text-anchor="end" class="lbl slow" fill="currentColor" style="font-size:9.5px;opacity:0.85">-&gt;&#160;RoPE degrades</text>
  </g>

  <g data-anim="3">
    <line x1="248" y1="378" x2="400" y2="378" class="v-muted" stroke="currentColor" stroke-width="1.2" marker-end="url(#rfl-tip)"/>
    <text x="410" y="382" class="cap" style="font-size:10.5px">context extension = keep the slow-pair curve inside the trained band</text>
  </g>
</svg>
<figcaption><b>Position is a spectrum of rotation frequencies.</b> Fast dimension pairs sweep many full turns per token window while the slowest pair barely tilts off vertical even at the training length — so when inference pushes past that length, it is the slow pairs that rotate into angles the model never saw during training, which is exactly why naive RoPE degrades on long context.</figcaption>
</figure>
