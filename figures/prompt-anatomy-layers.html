<figure class="viz" id="fig-prompt-anatomy-layers">
<svg viewBox="0 0 760 560" role="img" aria-label="The four layers of a production prompt shown as stacked horizontal bands: System Turn, Few-Shot Examples, Runtime Context Injection, and User Turn, with a reading-order arrow on the left.">
<style>
  #fig-prompt-anatomy-layers text { fill: var(--ink-soft); }
  #fig-prompt-anatomy-layers .title { font: 700 14px var(--sans,sans-serif); }
  #fig-prompt-anatomy-layers .bullet { font: 400 12px var(--mono,monospace); }
  #fig-prompt-anatomy-layers .subcap { font: italic 11px var(--sans,sans-serif); fill: var(--muted); }
  #fig-prompt-anatomy-layers .caption { font: 400 12px var(--sans,sans-serif); fill: var(--muted); }
  #fig-prompt-anatomy-layers .axislbl { font: 500 11px var(--sans,sans-serif); fill: var(--muted); }
</style>
<defs>
  <marker id="pa-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
  </marker>
</defs>


<line x1="28" y1="30" x2="28" y2="510" stroke="var(--accent,#4f46e5)" stroke-width="2" marker-end="url(#pa-arrow)"/>
<text x="24" y="275" text-anchor="middle" class="axislbl" transform="rotate(-90,24,275)">read order</text>


<rect x="48" y="20" width="700" height="118" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#9994d4)" stroke-width="2"/>
<rect x="48" y="20" width="700" height="30" rx="8" fill="var(--accent,#4f46e5)" opacity="1"/>
<rect x="48" y="38" width="700" height="12" rx="0" fill="var(--accent,#4f46e5)" opacity="1"/>
<text x="68" y="41" class="title" fill="#fff" dominant-baseline="middle">SYSTEM TURN</text>
<text x="68" y="67" class="bullet">• Role declaration</text>
<text x="68" y="84" class="bullet">• Task specification + constraints</text>
<text x="68" y="101" class="bullet">• Output format instructions</text>
<text x="68" y="118" class="bullet">• Persona / tone directives</text>
<text x="738" y="78" text-anchor="end" class="subcap">sets priors applied throughout</text>


<rect x="48" y="150" width="700" height="118" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
<rect x="48" y="150" width="700" height="30" rx="8" fill="var(--accent,#4f46e5)" opacity="0.5"/>
<rect x="48" y="168" width="700" height="12" rx="0" fill="var(--accent,#4f46e5)" opacity="0.5"/>
<text x="68" y="171" class="title" dominant-baseline="middle">FEW-SHOT EXAMPLES (0–N)</text>
<text x="68" y="197" class="bullet">• user: &lt;example input&gt;</text>
<text x="68" y="214" class="bullet">• assistant: &lt;gold output&gt;</text>
<text x="68" y="231" class="bullet">• (repeats)</text>
<text x="738" y="208" text-anchor="end" class="subcap">in-context training signal</text>


<rect x="48" y="280" width="700" height="118" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
<rect x="48" y="280" width="700" height="30" rx="8" fill="var(--accent,#4f46e5)" opacity="0.35"/>
<rect x="48" y="298" width="700" height="12" rx="0" fill="var(--accent,#4f46e5)" opacity="0.35"/>
<text x="68" y="301" class="title" dominant-baseline="middle">RUNTIME CONTEXT INJECTION</text>
<text x="68" y="327" class="bullet">• Retrieved documents (RAG)</text>
<text x="68" y="344" class="bullet">• Tool schemas / conversation history</text>
<text x="68" y="361" class="bullet">• Memory summaries</text>
<text x="738" y="338" text-anchor="end" class="subcap">extends knowledge base</text>


<rect x="48" y="410" width="700" height="82" rx="8" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
<rect x="48" y="410" width="700" height="30" rx="8" fill="var(--accent,#4f46e5)" opacity="0.25"/>
<rect x="48" y="428" width="700" height="12" rx="0" fill="var(--accent,#4f46e5)" opacity="0.25"/>
<text x="68" y="431" class="title" dominant-baseline="middle">USER TURN</text>
<text x="68" y="462" class="bullet">• Actual user query</text>
<text x="738" y="455" text-anchor="end" class="subcap">triggers generation</text>


<text x="398" y="516" text-anchor="middle" class="caption">Each layer sets priors / signal the next layers inherit.</text>
</svg>
<figcaption><b>The four layers of a production prompt, read top-to-bottom.</b> The system turn anchors role and format; few-shot examples provide in-context training signal; runtime context extends the knowledge base; and the user turn triggers generation. The fading accent headers reflect decreasing structural authority from top to bottom.</figcaption>
</figure>
