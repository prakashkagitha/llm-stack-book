<figcaption><b>Tiling turns a bandwidth-bound matmul into a compute-bound one by reusing each shared-memory value T times.</b> A thread block cooperatively stages a T&amp;times;T tile of A and a T&amp;times;T tile of B into fast shared memory (<code>As</code>, <code>Bs</code>), synchronizes, then every thread reuses each loaded element across a full row or column of the output tile while accumulating into a register — before the block marches to the next K-tile. Each global-memory element is read once per tile pass instead of once per output element, cutting HBM traffic by roughly a factor of T.</figcaption>
</figure>
