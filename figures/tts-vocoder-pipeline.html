<figure class="viz" id="fig-tts-vocoder-pipeline">
<svg viewBox="0 0 880 220" role="img" aria-label="Neural TTS pipeline: Text input feeds into an Acoustic model (e.g. FastSpeech2) which produces a Mel spectrogram, then a Vocoder (e.g. HiFi-GAN) converts it to a Waveform output.">
<defs>
  <marker id="tts-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6aa9ff)" class="v-accent"/>
  </marker>
</defs>
<style>
  #fig-tts-vocoder-pipeline text { fill: var(--ink-soft,#45413a); font: 400 12px var(--sans,sans-serif); }
  #fig-tts-vocoder-pipeline .lbl { font: 700 13px var(--sans,sans-serif); }
  #fig-tts-vocoder-pipeline .sub { font: italic 10px var(--sans,sans-serif); fill: var(--muted,#978f83); }
  #fig-tts-vocoder-pipeline .cap { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#978f83); }
</style>


<rect x="24" y="72" width="110" height="60" rx="28" class="v-fill" stroke="var(--muted,#978f83)" stroke-width="1.5"/>
<text x="79" y="107" text-anchor="middle" class="lbl">Text</text>


<line x1="134" y1="102" x2="186" y2="102" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#tts-arrow)"/>


<rect x="188" y="70" width="160" height="64" rx="8" fill="var(--accent,#6aa9ff)" fill-opacity="0.22" stroke="var(--accent,#6aa9ff)" stroke-width="1.8"/>
<text x="268" y="100" text-anchor="middle" class="lbl">Acoustic model</text>
<text x="268" y="122" text-anchor="middle" class="sub">e.g., FastSpeech2</text>


<line x1="348" y1="102" x2="400" y2="102" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#tts-arrow)"/>


<rect x="402" y="66" width="158" height="72" rx="8" class="v-fill" stroke="var(--accent,#6aa9ff)" stroke-width="1.5"/>
<text x="481" y="95" text-anchor="middle" class="lbl">Mel spectrogram</text>

<g transform="translate(440,102)">
  <rect x="0"  y="0" width="6" height="20" fill="var(--accent,#6aa9ff)" fill-opacity="0.30"/>
  <rect x="8"  y="4" width="6" height="16" fill="var(--accent,#6aa9ff)" fill-opacity="0.50"/>
  <rect x="16" y="2" width="6" height="18" fill="var(--accent,#6aa9ff)" fill-opacity="0.70"/>
  <rect x="24" y="6" width="6" height="14" fill="var(--accent,#6aa9ff)" fill-opacity="0.55"/>
  <rect x="32" y="8" width="6" height="12" fill="var(--accent,#6aa9ff)" fill-opacity="0.40"/>
  <rect x="40" y="3" width="6" height="17" fill="var(--accent,#6aa9ff)" fill-opacity="0.65"/>
  <rect x="48" y="10" width="6" height="10" fill="var(--accent,#6aa9ff)" fill-opacity="0.35"/>
  <rect x="56" y="1" width="6" height="19" fill="var(--accent,#6aa9ff)" fill-opacity="0.80"/>
  <rect x="64" y="5" width="6" height="15" fill="var(--accent,#6aa9ff)" fill-opacity="0.50"/>
</g>


<line x1="560" y1="102" x2="612" y2="102" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#tts-arrow)"/>


<rect x="614" y="70" width="140" height="64" rx="8" fill="var(--accent,#6aa9ff)" fill-opacity="0.22" stroke="var(--accent,#6aa9ff)" stroke-width="1.8"/>
<text x="684" y="100" text-anchor="middle" class="lbl">Vocoder</text>
<text x="684" y="122" text-anchor="middle" class="sub">e.g., HiFi-GAN</text>


<line x1="754" y1="102" x2="792" y2="102" stroke="var(--accent,#6aa9ff)" stroke-width="1.8" marker-end="url(#tts-arrow)"/>


<rect x="794" y="72" width="84" height="60" rx="28" class="v-fill" stroke="var(--muted,#978f83)" stroke-width="1.5"/>
<text x="836" y="107" text-anchor="middle" class="lbl" style="font-size:12px">Waveform</text>


<text x="440" y="180" text-anchor="middle" class="cap">Classic neural TTS decomposes synthesis into acoustic modeling then waveform generation.</text>

</svg>
<figcaption><b>Neural vocoder TTS pipeline: Text → Acoustic model → Mel spectrogram → Vocoder → Waveform.</b> The acoustic model (e.g., FastSpeech2) maps text to a mel spectrogram capturing timing and pitch; the vocoder (e.g., HiFi-GAN) then inverts that spectrogram to a high-fidelity audio waveform. This two-stage decomposition separates linguistic modeling from acoustic rendering.</figcaption>
</figure>
