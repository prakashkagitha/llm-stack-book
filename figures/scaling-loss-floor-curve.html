<figure class="viz" id="fig-scaling-loss-floor-curve">
<svg viewBox="0 0 720 460" role="img" aria-label="Log-log plot of loss versus model size showing a smooth decreasing curve with empirical data points that bends toward an irreducible floor E — the entropy of natural text.">
  <defs>
    <marker id="slfc-arrow-up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="7" markerHeight="7" orient="0">
      <path d="M0 10 L5 0 L10 10 z" fill="var(--ink-soft,currentColor)"/>
    </marker>
    <marker id="slfc-arrow-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="0">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,currentColor)"/>
    </marker>
    <marker id="slfc-arrow-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="0">
      <path d="M0 0 L10 0 L5 10 z" fill="var(--muted,#64748b)"/>
    </marker>
  </defs>
  <style>
    #fig-scaling-loss-floor-curve .ax-lbl  { font: 500 12px var(--sans,sans-serif); fill: var(--ink-soft,currentColor); }
    #fig-scaling-loss-floor-curve .ann-lbl { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-scaling-loss-floor-curve .floor-lbl { font: 500 11.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-scaling-loss-floor-curve .arr-lbl { font: italic 10.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  </style>

  
  
  <line x1="90" y1="380" x2="90" y2="50"
        stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"
        marker-end="url(#slfc-arrow-up)"/>
  
  <line x1="90" y1="380" x2="660" y2="380"
        stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"
        marker-end="url(#slfc-arrow-right)"/>

  
  <text x="56" y="220" text-anchor="middle" class="ax-lbl"
        transform="rotate(-90, 56, 220)">log L  (loss, nats/token)</text>
  <text x="375" y="418" text-anchor="middle" class="ax-lbl">log N  (model parameters, data held fixed)</text>

  
  <line x1="120" y1="308" x2="648" y2="308"
        stroke="var(--muted,#94a3b8)" stroke-width="1.6"
        stroke-dasharray="6,4"/>

  
  <text x="120" y="294" class="floor-lbl">E  (irreducible loss = entropy of text)</text>

  
  
  <path d="M120,80 C200,90 290,160 380,230 C460,280 540,300 640,306"
        fill="none"
        stroke="var(--accent,#6366f1)"
        stroke-width="1.5"
        stroke-opacity="0.35"/>

  
  
  
  <circle cx="120" cy="80"  r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="152" cy="97"  r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="190" cy="120" r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="234" cy="148" r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="285" cy="181" r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="345" cy="213" r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="418" cy="246" r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="497" cy="270" r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="566" cy="286" r="4.5" fill="var(--accent,#6366f1)"/>
  <circle cx="624" cy="297" r="4.5" fill="var(--accent,#6366f1)"/>

  
  
  <line x1="210" y1="165" x2="268" y2="135"
        stroke="var(--muted,#64748b)" stroke-width="1.2"/>
  
  <line x1="246" y1="155" x2="260" y2="162"
        stroke="var(--muted,#64748b)" stroke-width="0.9" stroke-dasharray="3,2"/>
  <text x="155" y="158" class="ann-lbl">slope = -alpha_N  (power law on log-log)</text>

  
  
  <line x1="562" y1="291" x2="562" y2="303"
        stroke="var(--muted,#64748b)" stroke-width="1.1"
        marker-end="url(#slfc-arrow-down)"/>
  <text x="456" y="278" class="arr-lbl">-- approaches floor E</text>

</svg>
<figcaption><b>Loss versus model size bends toward an irreducible floor.</b> Each data point represents an empirical training run. The curve falls steeply at small N (slope -alpha_N on a log-log plot) and flattens as N grows, asymptotically approaching the floor E — the entropy of natural text — which no model, however large, can beat. This is the defining visual signature of the Chinchilla joint form L(N,D) = E + A/N^alpha + B/D^beta.</figcaption>
</figure>
