<figure class="viz" id="fig-trl-trainer-landscape-pipeline">
<svg viewBox="0 0 800 620" role="img" aria-label="TRL's five trainers (SFTTrainer, RewardTrainer, PPOTrainer, DPOTrainer, GRPOTrainer) positioned at stages of the alignment pipeline, branching at Stage 3 into three alternative paths.">
<defs>
  <marker id="tlp-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="tlp-arr-rev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M10,1 L1,5 L10,9 Z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="tlp-arr-acc2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="var(--accent-2,#3b82f6)"/>
  </marker>
</defs>
<style>
  #fig-trl-trainer-landscape-pipeline text { fill: currentColor; }
  #fig-trl-trainer-landscape-pipeline .lbl   { font: 600 13px var(--sans,sans-serif); }
  #fig-trl-trainer-landscape-pipeline .cap   { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-trl-trainer-landscape-pipeline .stage { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-trl-trainer-landscape-pipeline .rm-lbl{ font: 600 12px var(--sans,sans-serif); }
</style>


<g data-anim="1">
  <rect x="200" y="20" width="200" height="44" rx="8"
        fill="var(--surface-3,#e2e8f0)" stroke="var(--ink-soft,#64748b)" stroke-width="1.5"/>
  <text x="300" y="47" text-anchor="middle" class="lbl">Raw Pretrained Model</text>
</g>


<line x1="300" y1="64" x2="300" y2="96" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#tlp-arr)" data-anim="1"/>


<g data-anim="2">
  <rect x="200" y="96" width="200" height="48" rx="8"
        fill="var(--accent,#f59e0b)" fill-opacity="0.12" stroke="var(--accent,#f59e0b)" stroke-width="2"/>
  <text x="300" y="125" text-anchor="middle" class="lbl">SFTTrainer</text>
</g>
<text x="408" y="120" class="cap">Stage 1: supervised instruction following</text>


<line x1="300" y1="144" x2="300" y2="176" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#tlp-arr)" data-anim="2"/>


<g data-anim="3">
  <rect x="190" y="176" width="220" height="48" rx="8"
        fill="var(--accent,#f59e0b)" fill-opacity="0.12" stroke="var(--accent,#f59e0b)" stroke-width="2"/>
  <text x="300" y="205" text-anchor="middle" class="lbl">RewardTrainer</text>
</g>
<text x="422" y="200" class="cap">Stage 2: train a reward model on preference data</text>


<line x1="300" y1="224" x2="300" y2="286" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#tlp-arr)" data-anim="3"/>


<line x1="168" y1="224" x2="168" y2="392" stroke="var(--ink-soft,#64748b)" stroke-width="1.2"
      stroke-dasharray="5,4" opacity="0.5" data-anim="3"/>

<line x1="300" y1="230" x2="168" y2="230" stroke="var(--ink-soft,#64748b)" stroke-width="1.2"
      stroke-dasharray="5,4" opacity="0.5" data-anim="3"/>

<line x1="168" y1="392" x2="218" y2="392" stroke="var(--ink-soft,#64748b)" stroke-width="1.2"
      stroke-dasharray="5,4" opacity="0.5" marker-end="url(#tlp-arr)" data-anim="3"/>

<line x1="168" y1="395" x2="168" y2="478" stroke="var(--ink-soft,#64748b)" stroke-width="1.2"
      stroke-dasharray="5,4" opacity="0.5" data-anim="3"/>
<line x1="168" y1="478" x2="218" y2="478" stroke="var(--ink-soft,#64748b)" stroke-width="1.2"
      stroke-dasharray="5,4" opacity="0.5" marker-end="url(#tlp-arr)" data-anim="3"/>


<g data-anim="4">
  <rect x="178" y="286" width="190" height="48" rx="8"
        fill="var(--accent,#f59e0b)" fill-opacity="0.12" stroke="var(--accent,#f59e0b)" stroke-width="2"/>
  <text x="273" y="315" text-anchor="middle" class="lbl">PPOTrainer</text>
</g>


<g data-anim="4">
  <rect x="448" y="290" width="150" height="40" rx="7"
        fill="var(--accent-2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent-2,#3b82f6)" stroke-width="1.8"/>
  <text x="523" y="315" text-anchor="middle" class="rm-lbl">RewardModel</text>
</g>

<line x1="448" y1="310" x2="370" y2="310" stroke="var(--accent-2,#3b82f6)" stroke-width="1.5"
      marker-end="url(#tlp-arr-acc2)" data-anim="4"/>
<text x="409" y="305" text-anchor="middle" class="stage" style="fill:var(--accent-2,#3b82f6);font-size:9px">reward</text>

<text x="412" y="300" class="cap" style="visibility:hidden">x</text>

<text x="400" y="345" class="cap">Stage 3a: online RL with reward model</text>


<g data-anim="4">
  <rect x="178" y="368" width="190" height="48" rx="8"
        fill="var(--accent,#f59e0b)" fill-opacity="0.12" stroke="var(--accent,#f59e0b)" stroke-width="2"/>
  <text x="273" y="397" text-anchor="middle" class="lbl">DPOTrainer</text>
</g>
<text x="380" y="397" class="cap">Stage 3b: offline RL from preference pairs (no RM)</text>


<g data-anim="5">
  <rect x="178" y="454" width="190" height="48" rx="8"
        fill="var(--accent,#f59e0b)" fill-opacity="0.18" stroke="var(--accent,#f59e0b)" stroke-width="3"/>
  <text x="273" y="483" text-anchor="middle" class="lbl">GRPOTrainer</text>
</g>
<text x="380" y="478" class="cap">Stage 3c: critic-free online RL (DeepSeek-R1 recipe)</text>


<text x="80" y="350" text-anchor="middle" class="stage" transform="rotate(-90,80,350)">alternative Stage-3 paths</text>


<text x="16" y="124" text-anchor="start" class="stage">Stage 1</text>
<text x="16" y="204" text-anchor="start" class="stage">Stage 2</text>
<text x="16" y="314" text-anchor="start" class="stage">Stage 3a</text>
<text x="16" y="394" text-anchor="start" class="stage">Stage 3b</text>
<text x="16" y="478" text-anchor="start" class="stage">Stage 3c</text>
</svg>
<figcaption><b>TRL's five trainers span the full alignment pipeline in three stages.</b> Stages 1 and 2 are sequential (SFT then reward model training); Stage 3 branches into three alternatives — PPO (uses the reward model), DPO (offline, no reward model), and GRPO (critic-free online RL). Dashed arrows indicate that DPO and GRPO are independent entry points that bypass the reward model, as in the DeepSeek-R1 recipe.</figcaption>
</figure>
