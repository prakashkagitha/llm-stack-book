<figure class="viz" id="fig-rldata-replay-halflife">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 760 570" role="img" aria-label="As staleness (policy versions since a trajectory was generated) increases from tau=0 past tau_max, the importance ratio rho_t drifts away from 1.0 and out of the fixed PPO clip corridor, the gradient-contribution bar shrinks to near zero by tau_max, and the fraction of clipped tokens rises; trajectories past tau_max are evicted.">
<defs>
  <marker id="rh-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-muted"/>
  </marker>
</defs>
<style>
  #fig-rldata-replay-halflife text { font: 400 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#1e293b); }

  #fig-rldata-replay-halflife .tick { font: 600 10.5px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-rldata-replay-halflife .axis-lbl { font: 600 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-rldata-replay-halflife .side-lbl { font: 600 10.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-rldata-replay-halflife .note { font: 400 10.5px var(--sans,sans-serif); font-style: italic; fill: var(--muted,#64748b); }
  #fig-rldata-replay-halflife .cap { font: 400 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#1e293b); }
  #fig-rldata-replay-halflife .v-fill { fill: var(--surface,#fff); }
  #fig-rldata-replay-halflife .v-stroke { stroke: var(--ink-soft,#334155); }
  #fig-rldata-replay-halflife .v-accent { fill: var(--accent,#c15b39); }
  #fig-rldata-replay-halflife .v-accent-s { stroke: var(--accent,#c15b39); }
  #fig-rldata-replay-halflife .v-muted { fill: var(--muted,#64748b); }
  #fig-rldata-replay-halflife .v-grid { stroke: var(--border-2,#cbd5e1); }
</style>

<g data-anim="1">
  <text x="20" y="24" class="title-sm">importance ratio rho_t = pi_theta(a|s) / pi_old(a|s), sampled per stored token</text>

  
  <rect x="60" y="152" width="660" height="36" fill="var(--accent,#c15b39)" fill-opacity="0.12"
        class="v-accent-s" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="60" y1="170" x2="720" y2="170" class="v-grid" stroke-width="1.2" stroke-dasharray="2 4"/>

  <text x="52" y="174" text-anchor="end" class="tick">1.0</text>
  <text x="52" y="192" text-anchor="end" class="tick">0.8</text>
  <text x="250" y="147" text-anchor="start" class="note" fill="var(--accent,#c15b39)">PPO clip corridor [1-eps, 1+eps]</text>

  <text transform="rotate(-90,18,155)" x="18" y="155" text-anchor="middle" class="side-lbl">rho_t</text>

  
  <line x1="80" y1="100" x2="80" y2="395" class="v-grid" stroke-width="1" stroke-dasharray="1 4" opacity="0.6"/>
  <line x1="204" y1="100" x2="204" y2="395" class="v-grid" stroke-width="1" stroke-dasharray="1 4" opacity="0.6"/>
  <line x1="328" y1="100" x2="328" y2="395" class="v-grid" stroke-width="1" stroke-dasharray="1 4" opacity="0.6"/>
  <line x1="452" y1="100" x2="452" y2="395" class="v-grid" stroke-width="1" stroke-dasharray="1 4" opacity="0.6"/>
  <line x1="576" y1="100" x2="576" y2="395" class="v-grid" stroke-width="1" stroke-dasharray="1 4" opacity="0.6"/>
  <line x1="700" y1="100" x2="700" y2="395" class="v-grid" stroke-width="1" stroke-dasharray="1 4" opacity="0.6"/>
</g>

  <circle cx="66" cy="170.9" r="3.4" class="v-accent"/><circle cx="73" cy="170" r="3.4" class="v-accent"/>
  <circle cx="80" cy="169.1" r="3.4" class="v-accent"/><circle cx="87" cy="170" r="3.4" class="v-accent"/>
  <circle cx="94" cy="168.2" r="3.4" class="v-accent"/>
  
  <circle cx="190" cy="172.7" r="3.4" class="v-accent"/><circle cx="197" cy="168.2" r="3.4" class="v-accent"/>
  <circle cx="204" cy="165.5" r="3.4" class="v-accent"/><circle cx="211" cy="169.1" r="3.4" class="v-accent"/>
  <circle cx="218" cy="162.8" r="3.4" class="v-accent"/>
  
  <circle cx="314" cy="174.5" r="3.4" class="v-accent"/><circle cx="321" cy="165.5" r="3.4" class="v-accent"/>
  <circle cx="328" cy="159.2" r="3.4" class="v-fill v-stroke" stroke-width="1.3"/><circle cx="335" cy="162.8" r="3.4" class="v-accent"/>
  <circle cx="342" cy="156.5" r="3.4" class="v-fill v-stroke" stroke-width="1.3"/>
  
  <circle cx="438" cy="179" r="3.4" class="v-accent"/><circle cx="445" cy="161" r="3.4" class="v-accent"/>
  <circle cx="452" cy="153.8" r="3.4" class="v-fill v-stroke" stroke-width="1.3"/><circle cx="459" cy="150.2" r="3.4" class="v-fill v-stroke" stroke-width="1.3"/>
  <circle cx="466" cy="165.5" r="3.4" class="v-accent"/>
  
  <circle cx="562" cy="183.5" r="3.4" class="v-muted" fill-opacity="0.8"/><circle cx="569" cy="152" r="3.4" class="v-fill v-stroke" stroke-width="1.3"/>
  <circle cx="576" cy="143" r="3.4" class="v-fill v-stroke" stroke-width="1.3"/><circle cx="583" cy="138.5" r="3.4" class="v-fill v-stroke" stroke-width="1.3"/>
  <circle cx="590" cy="156.5" r="3.4" class="v-fill v-stroke" stroke-width="1.3"/>
  
  <circle cx="686" cy="188" r="3.4" class="v-muted" fill-opacity="0.6"/><circle cx="693" cy="143" r="3.4" class="v-fill v-stroke" stroke-width="1.3" opacity="0.7"/>
  <circle cx="700" cy="129.5" r="3.4" class="v-fill v-stroke" stroke-width="1.3" opacity="0.7"/><circle cx="707" cy="125" r="3.4" class="v-fill v-stroke" stroke-width="1.3" opacity="0.7"/>
  <circle cx="714" cy="147.5" r="3.4" class="v-fill v-stroke" stroke-width="1.3" opacity="0.7"/>
</g>


<g data-anim="3">
  <text transform="rotate(-90,18,265)" x="18" y="265" text-anchor="middle" class="side-lbl">grad.</text>
  <line x1="60" y1="300" x2="720" y2="300" class="v-grid" stroke-width="1.3"/>
  <rect x="67" y="230" width="26" height="70" rx="2" class="v-accent"/>
  <rect x="191" y="252" width="26" height="48" rx="2" class="v-accent" opacity="0.85"/>
  <rect x="315" y="278" width="26" height="22" rx="2" class="v-accent" opacity="0.65"/>
  <rect x="439" y="292" width="26" height="8" rx="2" class="v-accent" opacity="0.45"/>
  <rect x="563" y="298" width="26" height="2" rx="1" class="v-muted" opacity="0.8"/>
  <rect x="687" y="299" width="26" height="1" rx="1" class="v-muted" opacity="0.6"/>
  <text x="393" y="316" text-anchor="middle" class="note">gradient contribution collapses to ~0 by tau_max</text>
</g>


<g data-anim="4">
  <text transform="rotate(-90,18,355)" x="18" y="355" text-anchor="middle" class="side-lbl">clipped</text>
  <line x1="60" y1="380" x2="720" y2="380" class="v-grid" stroke-width="1.3"/>
  <path d="M 80,377.5 L 204,372.5 L 328,362.5 L 452,352.5 L 576,342.5 L 700,337.5"
        fill="none" class="v-accent-s" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="80" cy="377.5" r="3" class="v-accent"/><circle cx="204" cy="372.5" r="3" class="v-accent"/>
  <circle cx="328" cy="362.5" r="3" class="v-accent"/><circle cx="452" cy="352.5" r="3" class="v-accent"/>
  <circle cx="576" cy="342.5" r="3" class="v-accent"/><circle cx="700" cy="337.5" r="3" class="v-accent"/>
  <text x="715" y="328" text-anchor="end" class="note">health metric: clipped-token fraction, rising with staleness</text>
</g>


<g data-anim="4">
  <line x1="60" y1="395" x2="720" y2="395" class="v-grid" stroke-width="1.4" marker-end="url(#rh-arrow)"/>
  <text x="80" y="412" text-anchor="middle" class="tick">tau=0</text>
  <text x="204" y="412" text-anchor="middle" class="tick">1</text>
  <text x="328" y="412" text-anchor="middle" class="tick">2</text>
  <text x="452" y="412" text-anchor="middle" class="tick">3 (tau_max)</text>
  <text x="576" y="412" text-anchor="middle" class="tick">4</text>
  <text x="700" y="412" text-anchor="middle" class="tick">5</text>
  <text x="330" y="431" text-anchor="middle" class="axis-lbl">staleness (policy versions since generation) -&gt;</text>
</g>


<g data-anim="5">
  <line x1="514" y1="100" x2="514" y2="402" class="v-muted" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="519" y="98" class="axis-lbl" fill="var(--warn,#e0a106)">evict beyond tau_max</text>

  <path d="M 520,406 C 535,428 565,440 600,446" fill="none" class="v-muted" stroke-width="1.6"
        stroke-dasharray="4 3" marker-end="url(#rh-arrow)"/>

  <g transform="translate(636,448)">
    <path d="M -12,0 L 12,0 L 9,26 a4,4 0 0 1 -4,4 L -5,30 a4,4 0 0 1 -4,-4 Z" class="v-fill v-stroke" stroke-width="1.4"/>
    <path d="M -15,-4 L 15,-4" class="v-stroke" stroke-width="1.6"/>
    <path d="M -5,-4 L -3,-9 L 3,-9 L 5,-4" fill="none" class="v-stroke" stroke-width="1.4"/>
    <line x1="-5" y1="6" x2="-4" y2="24" class="v-muted" stroke-width="1.2"/>
    <line x1="0" y1="6" x2="0" y2="24" class="v-muted" stroke-width="1.2"/>
    <line x1="5" y1="6" x2="4" y2="24" class="v-muted" stroke-width="1.2"/>
  </g>
  <text x="636" y="494" text-anchor="middle" class="side-lbl">evicted</text>
</g>


<g data-anim="5">
  <text x="380" y="545" text-anchor="middle" class="cap" font-style="italic" fill="var(--muted,#64748b)">shallow buffer, not a million-transition reservoir -- staleness is the trajectory's half-life.</text>
</g>

</svg>
<figcaption><b>A stored trajectory's gradient contribution decays with staleness because the importance ratio drifts out of the fixed PPO clip corridor.</b> At tau=0 the ratio sits at 1.0 and the sample carries full gradient; as the policy moves on, rho_t spreads and drifts away from 1, clipping increasingly flattens the objective, and by tau_max the gradient contribution is already near zero -- which is why a practical buffer evicts on a short staleness bound rather than accumulating a large reservoir.</figcaption>
</figure>
