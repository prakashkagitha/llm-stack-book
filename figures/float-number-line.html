<figcaption><b>Representable floats are not evenly spaced: each binade holds the same handful of values, but binade width doubles at every power-of-two boundary.</b> The result is a constant number of ticks per binade with spacing (ULP) that doubles left to right — fine-grained near small magnitudes, coarse near large ones — while relative precision stays the same everywhere. Subnormals plug the gap between the smallest normal number and zero with fixed, evenly-spaced steps rather than another halving.</figcaption>
</figure>
