<figcaption><b>The same decoder layer executes as roughly ten separately-dispatched kernels in PyTorch eager mode but as roughly three fused mega-kernels inside a compiled TensorRT-LLM engine.</b> Eager mode pays a Python dispatch cost and an HBM round-trip between every op; the compiled engine keeps intermediates on-chip in SRAM and touches HBM only once at the layer's input and output -- fewer launches and less memory traffic, at the cost of an engine that is fixed to one GPU SKU and must be rebuilt to change.</figcaption>
</figure>
