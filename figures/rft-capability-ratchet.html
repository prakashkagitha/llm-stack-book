<figure class="viz" id="fig-rft-capability-ratchet">
<button class="viz-replay" type="button">&#8635; replay</button>

<svg viewBox="0 0 800 470" role="img"
  aria-label="Left panel: one round of rejection-sampling fine-tuning, where k sampled completions are filtered by a reward gate into kept and dropped sets, the kept set becomes new SFT data, and fine-tuning produces the next policy in a ratchet-like loop. Right panel: across iterations 0, 1, 2 the greedy pass-at-1 accuracy climbs toward the best-of-k pass-at-k accuracy, and the gap between them shrinks each round.">
<defs>
  <marker id="rr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--ink-soft,#555)"/></marker>
  <marker id="rr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--accent,#3a6ea5)"/></marker>
</defs>
<style>
  #fig-rft-capability-ratchet text        { font:400 10px var(--sans,sans-serif); fill:var(--ink-soft,#333); }
  #fig-rft-capability-ratchet .T          { font:700 15px var(--sans,sans-serif); fill:var(--ink-soft,#222); }
  #fig-rft-capability-ratchet .PT         { font:700 12px var(--sans,sans-serif); fill:var(--ink-soft,#222); }
  #fig-rft-capability-ratchet .SUB        { font:400 9.5px var(--sans,sans-serif); fill:var(--muted,#777); }
  #fig-rft-capability-ratchet .LBL        { font:600 9.5px var(--sans,sans-serif); fill:var(--ink-soft,#333); }
  #fig-rft-capability-ratchet .NS         { font:400 8.8px var(--sans,sans-serif); fill:var(--muted,#666); }
  #fig-rft-capability-ratchet .MONO       { font:600 9px var(--mono,monospace); fill:var(--ink-soft,#333); }
  #fig-rft-capability-ratchet .GOOD       { fill:var(--good,#2f9e6e); }
  #fig-rft-capability-ratchet .GOODS      { stroke:var(--good,#2f9e6e); }
  #fig-rft-capability-ratchet .CAP        { font:italic 9.5px var(--sans,sans-serif); fill:var(--muted,#777); }

  #fig-rft-capability-ratchet [data-anim]              { opacity:0; }
  #fig-rft-capability-ratchet:not(.playing) [data-anim]{ opacity:1; }
  #fig-rft-capability-ratchet.playing [data-anim="1"] { animation:rra .35s .05s ease forwards; }
  #fig-rft-capability-ratchet.playing [data-anim="2"] { animation:rra .35s .5s  ease forwards; }
  #fig-rft-capability-ratchet.playing [data-anim="3"] { animation:rra .35s .95s ease forwards; }
  #fig-rft-capability-ratchet.playing [data-anim="4"] { animation:rra .35s 1.4s ease forwards; }
  #fig-rft-capability-ratchet.playing [data-anim="5"] { animation:rra .35s 1.85s ease forwards; }
  #fig-rft-capability-ratchet.playing [data-anim="6"] { animation:rra .35s 2.3s  ease forwards; }
  @keyframes rra { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>

<rect x="10" y="10" width="780" height="418" rx="12"
  fill="var(--surface,#fff)" stroke="var(--border-2,#888)" stroke-width="1.5"/>
<text x="400" y="31" text-anchor="middle" class="T">RFT: One Round Converts Sampled Compute Into a Capability Ratchet</text>

<line x1="400" y1="46" x2="400" y2="412" stroke="var(--border-2,#ccc)" stroke-width="1"/>


<text x="205" y="63" text-anchor="middle" class="PT">one round of RFT</text>

<g data-anim="1">

  <text x="55" y="114" text-anchor="middle" class="LBL">x</text>
  <text x="55" y="135" text-anchor="middle" class="NS">problem</text>

  
  <path d="M71,105 L110,80"  stroke="var(--ink-soft,#777)" stroke-width="1.1" fill="none"/>
  <path d="M71,108 L110,95"  stroke="var(--ink-soft,#777)" stroke-width="1.1" fill="none"/>
  <path d="M71,110 L110,110" stroke="var(--ink-soft,#777)" stroke-width="1.1" fill="none"/>
  <path d="M71,112 L110,125" stroke="var(--ink-soft,#777)" stroke-width="1.1" fill="none"/>
  <path d="M71,115 L110,140" stroke="var(--ink-soft,#777)" stroke-width="1.1" fill="none"/>
</g>

<g data-anim="2">
  
  <g>
    <rect x="110" y="70" width="46" height="20" rx="5" fill="var(--surface-3,#eef2f7)" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
    <text x="133" y="84" text-anchor="middle" class="MONO">y1</text>
  </g>
  <g>
    <rect x="110" y="85" width="46" height="20" rx="5" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.2"/>
    <text x="133" y="99" text-anchor="middle" class="MONO">y2</text>
  </g>
  <g>
    <rect x="110" y="100" width="46" height="20" rx="5" fill="var(--surface-3,#eef2f7)" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
    <text x="133" y="114" text-anchor="middle" class="MONO">y3</text>
  </g>
  <g>
    <rect x="110" y="115" width="46" height="20" rx="5" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.2"/>
    <text x="133" y="129" text-anchor="middle" class="MONO">y4</text>
  </g>
  <g>
    <rect x="110" y="130" width="46" height="20" rx="5" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.2"/>
    <text x="133" y="144" text-anchor="middle" class="MONO">y5</text>
  </g>
  <text x="133" y="160" text-anchor="middle" class="NS">k sampled</text>
  <text x="133" y="171" text-anchor="middle" class="NS">completions</text>
</g>

<g data-anim="3">
  
  <path d="M156,80 L200,80"   stroke="var(--good,#2f9e6e)" stroke-width="1.2" fill="none" marker-end="url(#rr-acc)"/>
  <path d="M156,95 L200,95"   stroke="var(--muted,#999)"   stroke-width="1.1" fill="none" marker-end="url(#rr-a)"/>
  <path d="M156,110 L200,110" stroke="var(--good,#2f9e6e)" stroke-width="1.2" fill="none" marker-end="url(#rr-acc)"/>
  <path d="M156,125 L200,125" stroke="var(--muted,#999)"   stroke-width="1.1" fill="none" marker-end="url(#rr-a)"/>
  <path d="M156,140 L200,140" stroke="var(--muted,#999)"   stroke-width="1.1" fill="none" marker-end="url(#rr-a)"/>

  <rect x="200" y="66" width="60" height="88" rx="8" fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="2"/>
  <text x="230" y="92" text-anchor="middle" class="LBL" fill="var(--accent,#3a6ea5)">reward</text>
  <text x="230" y="105" text-anchor="middle" class="LBL" fill="var(--accent,#3a6ea5)">filter</text>
  <text x="230" y="122" text-anchor="middle" class="MONO">r(x,y)=1?</text>

  
  <text x="188" y="84"  text-anchor="middle" class="GOOD" font-size="12" font-weight="700">&#10003;</text>
  <text x="188" y="99"  text-anchor="middle" class="NS" font-size="12" fill="var(--muted,#999)">&#10007;</text>
  <text x="188" y="114" text-anchor="middle" class="GOOD" font-size="12" font-weight="700">&#10003;</text>
  <text x="188" y="129" text-anchor="middle" class="NS" font-size="12" fill="var(--muted,#999)">&#10007;</text>
  <text x="188" y="144" text-anchor="middle" class="NS" font-size="12" fill="var(--muted,#999)">&#10007;</text>
</g>

<g data-anim="4">
  
  <path d="M260,90 Q285,95 300,105" stroke="var(--good,#2f9e6e)" stroke-width="1.6" fill="none" marker-end="url(#rr-acc)"/>
  <path d="M260,110 Q280,110 300,115" stroke="var(--good,#2f9e6e)" stroke-width="1.6" fill="none" marker-end="url(#rr-acc)"/>
  
  <path d="M260,120 Q275,150 260,170" stroke="var(--muted,#999)" stroke-width="1" fill="none" opacity="0.6" marker-end="url(#rr-a)"/>
  <text x="248" y="185" text-anchor="middle" class="NS" opacity="0.75">dropped</text>

  <rect x="300" y="90" width="90" height="40" rx="7" fill="var(--surface-3,#eef2f7)" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="345" y="107" text-anchor="middle" class="LBL">new SFT</text>
  <text x="345" y="121" text-anchor="middle" class="LBL">data</text>
</g>

<g data-anim="5">
  
  <path d="M340,130 Q345,175 290,205" stroke="var(--accent,#3a6ea5)" stroke-width="1.6" fill="none" marker-end="url(#rr-acc)"/>
  <text x="345" y="180" text-anchor="middle" class="NS">fine-tune</text>

  
  <g transform="translate(200,213)">
    <circle r="17" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.6"/>
    <g stroke="var(--accent,#3a6ea5)" stroke-width="2.2">
      <line x1="0" y1="-17" x2="0" y2="-23"/>
      <line x1="12" y1="-12" x2="16" y2="-16"/>
      <line x1="17" y1="0" x2="23" y2="0"/>
      <line x1="12" y1="12" x2="16" y2="16"/>
      <line x1="-12" y1="12" x2="-16" y2="16"/>
    </g>
    <path d="M-6,3 L2,-5 L2,-1 L8,-1 L8,3 L2,3 L2,7 Z" fill="var(--accent,#3a6ea5)"/>
  </g>
  <text x="200" y="245" text-anchor="middle" class="NS">ratchet: monotonic</text>
  <text x="200" y="256" text-anchor="middle" class="NS">(only tightens toward correct)</text>

  <path d="M183,213 Q140,213 100,180 Q75,155 63,132" stroke="var(--accent,#3a6ea5)" stroke-width="1.6" fill="none" marker-end="url(#rr-acc)"/>
  <text x="90" y="215" text-anchor="middle" class="NS">next policy</text>
  <text x="90" y="226" text-anchor="middle" class="NS">samples x again</text>
</g>

<g data-anim="6">
  
  <rect x="10" y="280" width="185" height="52" rx="7" fill="var(--surface-3,#f5f1e6)" stroke="var(--border-2,#888)" stroke-width="1"/>
  <text x="18" y="295" class="LBL" font-size="9.5">STaR rescue:</text>
  <text x="18" y="308" class="NS">no correct sample? reveal gold</text>
  <text x="18" y="319" class="NS">answer, rationalize backward.</text>
  <path d="M133,144 Q40,240 40,280" stroke="var(--muted,#999)" stroke-width="1" fill="none" stroke-dasharray="2,2" marker-end="url(#rr-a)"/>

  
  <rect x="215" y="280" width="175" height="52" rx="7" fill="var(--surface-3,#f5f1e6)" stroke="var(--border-2,#888)" stroke-width="1"/>
  <text x="223" y="295" class="LBL" font-size="9.5">ReST filter:</text>
  <text x="223" y="308" class="NS">threshold tau rises each</text>
  <text x="223" y="319" class="NS">round -- bar gets higher.</text>
  <path d="M230,154 Q225,220 250,280" stroke="var(--muted,#999)" stroke-width="1" fill="none" stroke-dasharray="2,2" marker-end="url(#rr-a)"/>
</g>

<text x="205" y="352" text-anchor="middle" class="CAP">keep only correct completions,</text>
<text x="205" y="365" text-anchor="middle" class="CAP">fine-tune, repeat -- the loop only tightens</text>


<text x="600" y="63" text-anchor="middle" class="PT">capability ratchet across rounds</text>

<g data-anim="1">
  
  <line x1="450" y1="330" x2="450" y2="90" stroke="var(--v-grid,#ccc)" stroke-width="1.2"/>
  <text x="440" y="330" text-anchor="end" class="NS">low</text>
  <text x="440" y="96" text-anchor="end" class="NS">high</text>
  <text x="440" y="215" text-anchor="middle" class="NS" transform="rotate(-90 440 215)">performance</text>

  <line x1="450" y1="330" x2="770" y2="330" stroke="var(--v-grid,#ccc)" stroke-width="1.2"/>
  <text x="500" y="348" text-anchor="middle" class="NS">iteration 0</text>
  <text x="610" y="348" text-anchor="middle" class="NS">iteration 1</text>
  <text x="720" y="348" text-anchor="middle" class="NS">iteration 2</text>
</g>


<g data-anim="2">
  <line x1="500" y1="290" x2="500" y2="180" stroke="var(--v-grid,#ddd)" stroke-width="1" stroke-dasharray="2,3"/>
  <circle cx="500" cy="290" r="5" class="GOODS" fill="var(--surface,#fff)" stroke-width="2"/>
  <circle cx="500" cy="180" r="5" fill="var(--muted,#999)"/>
  <path d="M492,290 L492,180" stroke="var(--muted,#999)" stroke-width="1" marker-start="url(#rr-a)" marker-end="url(#rr-a)"/>
  <text x="480" y="238" text-anchor="middle" class="NS" transform="rotate(-90 480 238)">gap</text>
</g>


<g data-anim="3">
  <line x1="610" y1="255" x2="610" y2="150" stroke="var(--v-grid,#ddd)" stroke-width="1" stroke-dasharray="2,3"/>
  <circle cx="610" cy="255" r="5" class="GOODS" fill="var(--surface,#fff)" stroke-width="2"/>
  <circle cx="610" cy="150" r="5" fill="var(--muted,#999)"/>
  <path d="M602,255 L602,150" stroke="var(--muted,#999)" stroke-width="1" marker-start="url(#rr-a)" marker-end="url(#rr-a)"/>
</g>


<g data-anim="4">
  <line x1="720" y1="200" x2="720" y2="125" stroke="var(--v-grid,#ddd)" stroke-width="1" stroke-dasharray="2,3"/>
  <circle cx="720" cy="200" r="5" class="GOODS" fill="var(--surface,#fff)" stroke-width="2"/>
  <circle cx="720" cy="125" r="5" fill="var(--muted,#999)"/>
  <path d="M712,200 L712,125" stroke="var(--muted,#999)" stroke-width="1" marker-start="url(#rr-a)" marker-end="url(#rr-a)"/>
</g>


<g data-anim="5">
  <path d="M500,290 L610,255 L720,200" fill="none" class="GOODS" stroke-width="2"/>
  <path d="M500,180 L610,150 L720,125" fill="none" stroke="var(--muted,#999)" stroke-width="1.6" stroke-dasharray="3,2"/>
</g>

<g data-anim="6">
  <text x="735" y="203" class="LBL" fill="var(--good,#2f9e6e)" font-size="10">pass@1</text>
  <text x="733" y="121" class="NS" font-size="9.5">pass@k</text>
  <text x="722" y="114" class="NS" font-size="9.5">(best-of-k)</text>

  <text x="600" y="378" text-anchor="middle" class="CAP">each round keeps only correct completions -&gt;</text>
  <text x="600" y="391" text-anchor="middle" class="CAP">policy concentrates on correct answers -&gt;</text>
  <text x="600" y="404" text-anchor="middle" class="CAP">greedy accuracy rises toward best-of-k</text>
</g>

</svg>
<figcaption><b>Rejection-sampling iteration turns sampling-time compute into trained-in capability.</b> Each round filters k sampled completions through a reward gate, keeps only the correct ones as new SFT data, and fine-tunes the next policy -- a ratchet that only tightens toward correct answers, so greedy pass@1 climbs toward best-of-k and the gap between them shrinks round over round.</figcaption>
</figure>
