<figcaption><b>FSDP unit lifecycle: just-in-time gather, compute, and free bounds peak memory.</b> In both forward and backward, parameter shards are <b>all-gathered</b> into a full block only when needed, then immediately freed after the block's compute. Gradients are <b>reduce-scattered</b> so each rank keeps only its 1/N slice. The optimizer steps solely on each rank's own shard — no cross-rank communication. At most one block is ever fully materialized, keeping peak memory proportional to one block's size plus 1/N of the whole model.</figcaption>
</figure>
