  </style>

  

  
  <rect x="100" y="20" width="120" height="34" rx="17" fill="var(--accent,#6366f1)" fill-opacity="0.15" stroke="var(--accent,#6366f1)" stroke-width="1.4"/>
  <text x="160" y="42" text-anchor="middle" class="lbl">Query q</text>

  
  <line x1="160" y1="54" x2="160" y2="108" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  
  <rect x="96" y="108" width="128" height="48" rx="8" fill="var(--surface,#f5f5f4)" stroke="var(--border-2,#d6d3d1)" stroke-width="1.4"/>
  <text x="160" y="131" text-anchor="middle" class="lbl">[Transformer]</text>
  <text x="160" y="148" text-anchor="middle" class="soft">encoder</text>

  
  <line x1="160" y1="156" x2="160" y2="204" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  <text x="160" y="229" text-anchor="middle" class="lbl">Pooling</text>

  
  <line x1="160" y1="244" x2="160" y2="288" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  
  <rect x="101" y="288" width="118" height="36" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.15" stroke="var(--accent,#6366f1)" stroke-width="1.4"/>
  
  <line x1="121" y1="288" x2="121" y2="324" stroke="var(--accent,#6366f1)" stroke-width="0.7" opacity="0.5"/>
  <line x1="140" y1="288" x2="140" y2="324" stroke="var(--accent,#6366f1)" stroke-width="0.7" opacity="0.5"/>

  <line x1="180" y1="288" x2="180" y2="324" stroke="var(--accent,#6366f1)" stroke-width="0.7" opacity="0.5"/>
  <line x1="200" y1="288" x2="200" y2="324" stroke="var(--accent,#6366f1)" stroke-width="0.7" opacity="0.5"/>
  <text x="160" y="311" text-anchor="middle" class="math">E_q in R^d</text>

  

  
  <rect x="340" y="20" width="120" height="34" rx="17" fill="var(--accent,#6366f1)" fill-opacity="0.15" stroke="var(--accent,#6366f1)" stroke-width="1.4"/>
  <text x="400" y="42" text-anchor="middle" class="lbl">Document d</text>

  
  <line x1="400" y1="54" x2="400" y2="108" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  
  <rect x="336" y="108" width="128" height="48" rx="8" fill="var(--surface,#f5f5f4)" stroke="var(--border-2,#d6d3d1)" stroke-width="1.4"/>

  <text x="400" y="148" text-anchor="middle" class="soft">encoder</text>

  
  <line x1="224" y1="132" x2="336" y2="132" stroke="var(--muted,#78716c)" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
  <text x="280" y="126" text-anchor="middle" class="soft">same weights</text>

  
  <line x1="400" y1="156" x2="400" y2="204" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  
  <rect x="341" y="204" width="118" height="40" rx="8" fill="var(--surface,#f5f5f4)" stroke="var(--border-2,#d6d3d1)" stroke-width="1.4"/>
  <text x="400" y="229" text-anchor="middle" class="lbl">Pooling</text>

  
  <line x1="400" y1="244" x2="400" y2="288" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  <line x1="380" y1="288" x2="380" y2="324" stroke="var(--accent,#6366f1)" stroke-width="0.7" opacity="0.5"/>
  <line x1="400" y1="288" x2="400" y2="324" stroke="var(--accent,#6366f1)" stroke-width="0.7" opacity="0.5"/>
  <line x1="420" y1="288" x2="420" y2="324" stroke="var(--accent,#6366f1)" stroke-width="0.7" opacity="0.5"/>
  <line x1="440" y1="288" x2="440" y2="324" stroke="var(--accent,#6366f1)" stroke-width="0.7" opacity="0.5"/>
  <text x="400" y="311" text-anchor="middle" class="math">E_d in R^d</text>

  

  
  <text x="280" y="344" text-anchor="middle" class="soft">dot product</text>

  
  <line x1="160" y1="324" x2="258" y2="374" stroke="var(--accent,#6366f1)" stroke-width="1.8" marker-end="url(#bec-arrow-acc)"/>
  <line x1="400" y1="324" x2="302" y2="374" stroke="var(--accent,#6366f1)" stroke-width="1.8" marker-end="url(#bec-arrow-acc)"/>

  
  <circle cx="280" cy="375" r="18" fill="var(--accent,#6366f1)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
  <text x="280" y="380" text-anchor="middle" font="700 12px var(--sans,sans-serif)" fill="#ffffff" style="font:700 12px var(--sans,sans-serif)">score</text>

  
  <text x="280" y="412" text-anchor="middle" class="cap">Document embeddings precomputed offline;</text>
  <text x="280" y="428" text-anchor="middle" class="cap">only the query is encoded at query time.</text>
</svg>
<figcaption><b>The bi-encoder encodes query and document independently through identical transformer pipelines.</b> Each tower produces a fixed-size <em>d</em>-dimensional embedding; the shared-weights tie means the same model parameters process both. Similarity is computed as a single dot product between the two vectors, enabling document embeddings to be precomputed and stored offline.</figcaption>
</figure>
