<svg viewBox="0 0 760 462" role="img" aria-label="Bi-encoder two-tower diagram: the document tower runs offline and its embedding is stored in an ANN index ahead of time, while the query tower runs online at query time; both towers share weights, and the final score is a dot product against the precomputed index.">

      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="bec-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
    </marker>
  </defs>
  <style>

    #fig-emb-biencoder-concept .cap { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-emb-biencoder-concept .tag { font: 700 11px var(--sans,sans-serif); letter-spacing: 0.03em; }
    #fig-emb-biencoder-concept .tagsub { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
  </style>

  
  <rect x="164" y="10" width="196" height="382" rx="12" fill="var(--accent)" fill-opacity="0.06" stroke="var(--accent)" stroke-opacity="0.28" stroke-width="1.2"/>
  <text x="262" y="26" text-anchor="middle" class="tag" fill="var(--accent)">ONLINE</text>
  <text x="262" y="38" text-anchor="middle" class="tagsub">at query time</text>

  <rect x="400" y="10" width="196" height="382" rx="12" fill="var(--muted)" fill-opacity="0.08" stroke="var(--muted)" stroke-opacity="0.32" stroke-width="1.2"/>

  <text x="498" y="38" text-anchor="middle" class="tagsub">precomputed &amp; indexed</text>

  
  <rect x="200" y="48" width="120" height="34" rx="17" fill="var(--accent)" fill-opacity="0.15" stroke="var(--accent)" stroke-width="1.4"/>
  <text x="260" y="70" text-anchor="middle" class="lbl">Query q</text>

  <line x1="260" y1="82" x2="260" y2="130" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  <rect x="196" y="130" width="128" height="48" rx="8" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.4"/>
  <text x="260" y="153" text-anchor="middle" class="lbl">Transformer</text>
  <text x="260" y="170" text-anchor="middle" class="soft">encoder</text>

  <line x1="260" y1="178" x2="260" y2="220" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  <rect x="201" y="220" width="118" height="40" rx="8" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.4"/>
  <text x="260" y="245" text-anchor="middle" class="lbl">Pooling</text>

  <rect x="201" y="300" width="118" height="36" rx="4" fill="var(--accent)" fill-opacity="0.15" stroke="var(--accent)" stroke-width="1.4"/>
  <line x1="221" y1="300" x2="221" y2="336" stroke="var(--accent)" stroke-width="0.7" opacity="0.5"/>
  <line x1="240" y1="300" x2="240" y2="336" stroke="var(--accent)" stroke-width="0.7" opacity="0.5"/>

  <rect x="440" y="48" width="120" height="34" rx="17" fill="var(--muted)" fill-opacity="0.16" stroke="var(--muted)" stroke-width="1.4"/>
  <text x="500" y="70" text-anchor="middle" class="lbl">Document d</text>

  <line x1="500" y1="82" x2="500" y2="130" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  <rect x="436" y="130" width="128" height="48" rx="8" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.4"/>
  <text x="500" y="153" text-anchor="middle" class="lbl">Transformer</text>
  <text x="500" y="170" text-anchor="middle" class="soft">encoder</text>

  <line x1="324" y1="154" x2="436" y2="154" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>

  <line x1="500" y1="178" x2="500" y2="220" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  <rect x="441" y="220" width="118" height="40" rx="8" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.4"/>
  <text x="500" y="245" text-anchor="middle" class="lbl">Pooling</text>

  <line x1="500" y1="260" x2="500" y2="300" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#bec-arrow)"/>

  <text x="500" y="323" text-anchor="middle" class="math">E_d in R^d</text>

  
  <line x1="500" y1="336" x2="500" y2="348" stroke="var(--muted)" stroke-width="1.3" marker-end="url(#bec-arrow-muted)"/>
  <rect x="472" y="350" width="56" height="11" rx="3" fill="var(--surface-3)" stroke="var(--muted)" stroke-width="1.1"/>
  <rect x="472" y="358" width="56" height="11" rx="3" fill="var(--surface-3)" stroke="var(--muted)" stroke-width="1.1"/>
  <rect x="472" y="366" width="56" height="11" rx="3" fill="var(--surface-3)" stroke="var(--muted)" stroke-width="1.1"/>
  <text x="500" y="390" text-anchor="middle" class="soft">ANN index</text>

  
  <text x="380" y="356" text-anchor="middle" class="soft">dot product</text>

  <line x1="260" y1="336" x2="358" y2="386" stroke="var(--accent)" stroke-width="1.8" marker-end="url(#bec-arrow-acc)"/>
  <line x1="489" y1="368" x2="402" y2="386" stroke="var(--accent)" stroke-width="1.8" marker-end="url(#bec-arrow-acc)"/>

  <circle cx="380" cy="387" r="18" fill="var(--accent)" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="380" y="392" text-anchor="middle" font="700 12px var(--sans,sans-serif)" fill="#ffffff" style="font:700 12px var(--sans,sans-serif)">score</text>

  <text x="380" y="426" text-anchor="middle" class="cap">Document embeddings are precomputed once and stored in the ANN index;</text>
  <text x="380" y="442" text-anchor="middle" class="cap">only the query tower runs at query time, then is scored against the index.</text>
</svg>
<figcaption><b>The bi-encoder's two towers do not run at the same time.</b> The document tower runs offline: it is computed once per document and stored in an ANN index. The query tower runs online, at query time, against that already-built index. Both towers share the same encoder weights (dashed link); the final score is a dot product between the fresh query vector and the precomputed document vector.</figcaption>
</figure>
