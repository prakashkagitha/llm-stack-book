<figcaption><b>An end-to-end pretraining schedule across four phases: fraction, context, LR, and mixture.</b> Phase widths are proportional to token fractions — stable training dominates (~75%), while long-context (~7%) and anneal/decay (~17%) are short but distinctive. The 128K context badge and the anneal LR decay share the accent color, linking the two phases with the most distinctive settings. Mixture emphasis (bottom lane) shifts from broad web-heavy in stable to high-quality math/code/textbooks in anneal, exactly when the LR is settling toward zero.</figcaption>
