<figcaption><b>Multiple-choice scoring never generates text -- it ranks the choices by log-likelihood.</b> On this illustrative question, the raw summed log-likelihood (<code>acc</code>) picks choice A because it is least negative overall, but dividing each score by its token count (<code>acc_norm</code>) flips the winner to D -- because the long choice C, and to a lesser extent B, accumulated extra negative mass simply from having more tokens. A harness must fix which metric it reports before scores are comparable.</figcaption>
