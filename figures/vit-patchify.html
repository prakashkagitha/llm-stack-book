<figure class="viz" id="fig-vit-patchify">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 372" role="img" aria-label="A Vision Transformer input pipeline: an image is split into a grid of fixed-size patches, each patch is flattened and linearly projected into a patch embedding, a learnable CLS token is prepended, learned position embeddings are added, and the resulting token sequence is fed to a Transformer encoder.">
  <defs>
    <marker id="vp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-vit-patchify text{ fill:var(--ink-soft); }
    #fig-vit-patchify .ttl{ font:600 12.5px var(--sans,sans-serif); }
    #fig-vit-patchify .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-vit-patchify .mono{ font:600 11px var(--mono,monospace); }
    #fig-vit-patchify .dim{ font:500 10px var(--mono,monospace); fill:var(--muted); }
    #fig-vit-patchify .op{ font:600 11px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <text x="100" y="28" text-anchor="middle" class="ttl">Image -&gt; patches</text>
    
    <rect x="32" y="42" width="136" height="136" rx="4" class="v-fill v-accent-s" stroke-width="1.5"/>
    <g class="v-grid" stroke-width="1">
      <line x1="66" y1="42" x2="66" y2="178"/>
      <line x1="100" y1="42" x2="100" y2="178"/>
      <line x1="134" y1="42" x2="134" y2="178"/>
      <line x1="32" y1="76" x2="168" y2="76"/>
      <line x1="32" y1="110" x2="168" y2="110"/>
      <line x1="32" y1="144" x2="168" y2="144"/>
    </g>
    
    <rect x="100" y="76" width="34" height="34" class="v-accent" fill="var(--accent)" fill-opacity="0.32"/>
    <rect x="100" y="76" width="34" height="34" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1.8"/>
    <text x="100" y="200" text-anchor="middle" class="dim">224x224x3</text>
    <text x="100" y="214" text-anchor="middle" class="sm">16x16 patches -&gt; N=196</text>
  </g>

  
  <line x1="172" y1="93" x2="214" y2="93" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#vp-arrow)"/>
  <text x="193" y="84" text-anchor="middle" class="op">flatten</text>

  
  <g data-anim="2">
    <text x="300" y="28" text-anchor="middle" class="ttl">Flatten + project</text>
    
    <rect x="226" y="60" width="148" height="20" rx="3" class="v-fill v-accent-s" stroke-width="1.4"/>
    <g class="v-grid" stroke-width="0.8" opacity="0.8">
      <line x1="248" y1="60" x2="248" y2="80"/><line x1="270" y1="60" x2="270" y2="80"/>
      <line x1="292" y1="60" x2="292" y2="80"/><line x1="314" y1="60" x2="314" y2="80"/>
      <line x1="336" y1="60" x2="336" y2="80"/><line x1="358" y1="60" x2="358" y2="80"/>
    </g>
    <text x="300" y="96" text-anchor="middle" class="dim">p_i : 16x16x3 = 768</text>

    
    <line x1="300" y1="104" x2="300" y2="122" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#vp-arrow)"/>
    <rect x="234" y="126" width="132" height="34" rx="5" class="v-fill" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="300" y="148" text-anchor="middle" class="mono" fill="var(--accent)" style="font-size:10.5px">E * p_i  (D x 768)</text>
    <text x="300" y="174" text-anchor="middle" class="sm">linear patch embedding</text>

    
    <line x1="300" y1="180" x2="300" y2="198" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#vp-arrow)"/>
    <rect x="270" y="202" width="60" height="20" rx="3" class="v-accent" fill="var(--accent)" fill-opacity="0.32" stroke="var(--accent)" stroke-width="1.6"/>
    <text x="300" y="238" text-anchor="middle" class="dim">patch token : D=768</text>
  </g>

  
  <line x1="376" y1="212" x2="418" y2="212" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#vp-arrow)"/>

  
  <g data-anim="3">
    <text x="588" y="28" text-anchor="middle" class="ttl">Token sequence z0</text>

    
    <rect x="426" y="186" width="42" height="52" rx="5" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="447" y="216" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">CLS</text>

    
    <g>
      <rect x="474" y="186" width="22" height="52" rx="4" class="v-fill v-accent-s" stroke-width="1.4"/>
      <rect x="500" y="186" width="22" height="52" rx="4" class="v-fill v-accent-s" stroke-width="1.4"/>
      <rect x="526" y="186" width="22" height="52" rx="4" class="v-fill v-accent-s" stroke-width="1.4"/>
      <rect x="552" y="186" width="22" height="52" rx="4" class="v-fill v-accent-s" stroke-width="1.4"/>
      
      <rect x="578" y="186" width="22" height="52" rx="4" class="v-accent" fill="var(--accent)" fill-opacity="0.32" stroke="var(--accent)" stroke-width="1.8"/>
      <rect x="612" y="186" width="22" height="52" rx="4" class="v-fill v-accent-s" stroke-width="1.4"/>
      <rect x="638" y="186" width="22" height="52" rx="4" class="v-fill v-accent-s" stroke-width="1.4"/>
      <text x="603" y="206" text-anchor="middle" class="dim" fill="var(--accent)">p_i</text>
      <text x="625" y="213" text-anchor="middle" class="sm">...</text>
      <rect x="666" y="186" width="22" height="52" rx="4" class="v-fill v-accent-s" stroke-width="1.4"/>
    </g>
    <text x="447" y="256" text-anchor="middle" class="sm">[CLS]</text>
    <text x="582" y="256" text-anchor="middle" class="sm">N patch tokens</text>
    <text x="588" y="270" text-anchor="middle" class="dim">N+1 = 197 tokens</text>
  </g>

  
  <g data-anim="4">
    <text x="447" y="300" text-anchor="middle" class="op">+</text>
    
    <rect x="426" y="306" width="262" height="20" rx="4" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
    <g class="v-grid" stroke-width="0.8" opacity="0.75">
      <line x1="468" y1="306" x2="468" y2="326"/><line x1="496" y1="306" x2="496" y2="326"/>
      <line x1="524" y1="306" x2="524" y2="326"/><line x1="552" y1="306" x2="552" y2="326"/>
      <line x1="580" y1="306" x2="580" y2="326"/><line x1="612" y1="306" x2="612" y2="326"/>
      <line x1="640" y1="306" x2="640" y2="326"/><line x1="666" y1="306" x2="666" y2="326"/>
    </g>
    <text x="557" y="320" text-anchor="middle" class="mono" fill="var(--accent2,#3b82f6)">+ E_pos  (learned)</text>
  </g>

  
  <g data-anim="5">
    <line x1="557" y1="330" x2="557" y2="346" class="v-muted" stroke="currentColor" stroke-width="1.4" marker-end="url(#vp-arrow)"/>
    <rect x="426" y="348" width="262" height="20" rx="6" class="v-accent" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="1.5"/>
    <text x="557" y="362" text-anchor="middle" class="ttl" fill="var(--accent)">Transformer encoder  (L blocks)</text>
  </g>
</svg>
<figcaption><b>An image becomes a token sequence.</b> The image is cut into a grid of fixed 16×16 patches; each patch is <b>flattened</b> (16·16·3 = 768 values) and <b>linearly projected</b> by a shared matrix <b>E</b> into a D-dim patch embedding. A learnable <b>[CLS]</b> token is prepended and learned <b>position embeddings</b> are added, giving 197 tokens that an ordinary Transformer encoder consumes — patches treated exactly like words.</figcaption>
</figure>
