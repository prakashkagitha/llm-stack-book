<svg viewBox="0 0 760 450" role="img" aria-label="Iterative RLHF: a fast inner RL loop cycles through policy rollout, reward model scoring, and policy gradient update every step; every N steps a slower outer branch sends outputs to human annotators, fine-tunes the reward model on fresh preferences, and re-injects the updated reward model back into the inner loop.">

<style>
  #fig-rewardhack-online-rm-loop text  { fill: var(--ink-soft,#211f1b); }
  #fig-rewardhack-online-rm-loop .ttl  { font: 700 13px var(--sans,sans-serif); }
  #fig-rewardhack-online-rm-loop .blbl { font: 600 10.5px var(--sans,sans-serif); }
  #fig-rewardhack-online-rm-loop .bsub { font: 500 9px var(--mono,monospace); fill: var(--ink-soft,#211f1b); }
  #fig-rewardhack-online-rm-loop .elbl { font: 500 9px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-rewardhack-online-rm-loop .note { font: 500 8.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-rewardhack-online-rm-loop .gate { font: 600 9px var(--sans,sans-serif); }

  /* animated highlight ring on active box */
  @keyframes rh4-ring {
    0%,100% { stroke-opacity: 0.3; stroke-width: 2; }
    50%     { stroke-opacity: 1;   stroke-width: 4; }
  }
  /* token along a path */
  @keyframes rh4-tok {
    0%   { offset-distance:0%;   opacity:1; }
    72%  { offset-distance:100%; opacity:1; }
    87%  { opacity:0; }
    100% { offset-distance:100%; opacity:0; }
  }
  @keyframes rh4-slow {
    0%,42%  { offset-distance:0%;   opacity:0; }
    45%     { opacity:1; }
    88%     { offset-distance:100%; opacity:1; }
    94%     { opacity:0; }
    100%    { offset-distance:100%; opacity:0; }
  }
  @keyframes rh4-flash {
    0%,55%  { opacity:0; }
    60%,88% { opacity:1; }
    95%,100%{ opacity:0; }
  }

  #fig-rewardhack-online-rm-loop .ring-a { animation: rh4-ring 2.4s 0.1s  infinite ease-in-out; }
  #fig-rewardhack-online-rm-loop .ring-b { animation: rh4-ring 2.4s 0.95s infinite ease-in-out; }
  #fig-rewardhack-online-rm-loop .ring-c { animation: rh4-ring 2.4s 1.7s  infinite ease-in-out; }

  #fig-rewardhack-online-rm-loop .tok-ab { offset-path:path("M 224 129 L 340 129"); animation: rh4-tok  2.4s 0s    infinite ease-in-out; }
  #fig-rewardhack-online-rm-loop .tok-bc { offset-path:path("M 397 158 L 333 212"); animation: rh4-tok  2.4s 0.85s infinite ease-in-out; }
  #fig-rewardhack-online-rm-loop .tok-ca { offset-path:path("M 214 250 C 106 288 68 244 96 170 L 108 146"); animation: rh4-tok 2.4s 1.6s infinite ease-in-out; }
  #fig-rewardhack-online-rm-loop .tok-out{ offset-path:path("M 599 250 L 599 302 L 599 354 L 599 400"); animation: rh4-slow 6.0s 0s    infinite ease-in-out; }
  #fig-rewardhack-online-rm-loop .tok-fb { offset-path:path("M 536 390 C 478 434 442 420 420 302 L 420 162"); animation: rh4-slow 6.0s 0.55s infinite ease-in-out; }
  #fig-rewardhack-online-rm-loop .rf     { animation: rh4-flash 6.0s 0s infinite; }

  @media (prefers-reduced-motion: reduce) {
    #fig-rewardhack-online-rm-loop .ring-a,
    #fig-rewardhack-online-rm-loop .ring-b,
    #fig-rewardhack-online-rm-loop .ring-c,
    #fig-rewardhack-online-rm-loop .tok-ab,
    #fig-rewardhack-online-rm-loop .tok-bc,
    #fig-rewardhack-online-rm-loop .tok-ca,
    #fig-rewardhack-online-rm-loop .tok-out,
    #fig-rewardhack-online-rm-loop .tok-fb,
    #fig-rewardhack-online-rm-loop .rf
    { animation: none !important; opacity: 1 !important; }
  }
</style>

<figcaption><b>Iterative RLHF keeps the reward model in-distribution with the evolving policy.</b> The fast inner RL loop (boxes A-B-C) generates rollouts, scores them, and applies policy-gradient updates every step. Every N steps the slower outer branch samples fresh outputs, collects human pairwise preferences (D2), fine-tunes the reward model (D3-D4), and re-injects the updated model into the inner loop. The contrasting cadences — rapid policy updates vs. periodic RM refreshes — prevent the policy from drifting into unscored regions where proxy reward diverges from true reward.</figcaption>
</figure>
