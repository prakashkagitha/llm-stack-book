<figure class="viz" id="fig-torchcompile-three-layer-stack">
<svg viewBox="0 0 720 560" role="img" aria-label="torch.compile four-stage lowering pipeline: User Python code is traced by TorchDynamo into an FX Graph, differentiated by AOTAutograd into a joint forward+backward FX Graph, then lowered by TorchInductor to generated Triton or CUDA C++ kernels.">
  <defs>
    <marker id="tc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#94a3b8)"/>
    </marker>
  </defs>
  <style>
    #fig-torchcompile-three-layer-stack text { fill: var(--ink-soft,#1a1a1a); }
    #fig-torchcompile-three-layer-stack .box-title { font: 600 14px var(--sans,sans-serif); }
    #fig-torchcompile-three-layer-stack .box-sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-torchcompile-three-layer-stack .pass-name { font: 700 12px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
    #fig-torchcompile-three-layer-stack .pass-sub { font: 400 11px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
    #fig-torchcompile-three-layer-stack .spine-line { stroke: var(--border-2,#94a3b8); stroke-width: 1; stroke-dasharray: 3 3; }
  </style>

  
  <line x1="90" y1="20" x2="90" y2="530" class="spine-line"/>

  
  <rect x="70" y="20" width="580" height="82" rx="8" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"/>
  
  <rect x="70" y="20" width="6" height="82" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.4"/>
  <text x="370" y="56" text-anchor="middle" class="box-title">User Python code</text>
  <text x="370" y="76" text-anchor="middle" class="box-sub">(eager PyTorch)</text>

  
  <line x1="360" y1="102" x2="360" y2="150" stroke="var(--border-2,#94a3b8)" stroke-width="2" marker-end="url(#tc-arrow)"/>
  
  <rect x="410" y="110" width="188" height="42" rx="16" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.3"/>
  <text x="504" y="128" text-anchor="middle" class="pass-name">TorchDynamo</text>
  <text x="504" y="144" text-anchor="middle" class="pass-sub">bytecode tracing</text>

  
  <rect x="70" y="160" width="580" height="82" rx="8" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"/>
  <rect x="70" y="160" width="6" height="82" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.4"/>
  <text x="370" y="196" text-anchor="middle" class="box-title">FX Graph</text>
  <text x="370" y="216" text-anchor="middle" class="box-sub">(pure tensor ops, no Python control flow)</text>

  
  <line x1="360" y1="242" x2="360" y2="290" stroke="var(--border-2,#94a3b8)" stroke-width="2" marker-end="url(#tc-arrow)"/>
  
  <rect x="410" y="250" width="188" height="42" rx="16" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.3"/>
  <text x="504" y="268" text-anchor="middle" class="pass-name">AOTAutograd</text>
  <text x="504" y="284" text-anchor="middle" class="pass-sub">differentiation ahead-of-time</text>

  
  <rect x="70" y="300" width="580" height="82" rx="8" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"/>
  <rect x="70" y="300" width="6" height="82" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.4"/>
  <text x="370" y="336" text-anchor="middle" class="box-title">Joint forward + backward FX Graph</text>
  <text x="370" y="357" text-anchor="middle" class="box-sub">(fwd and bwd ops in a single differentiable graph)</text>

  
  <line x1="360" y1="382" x2="360" y2="430" stroke="var(--border-2,#94a3b8)" stroke-width="2" marker-end="url(#tc-arrow)"/>
  
  <rect x="410" y="390" width="188" height="42" rx="16" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.3"/>
  <text x="504" y="408" text-anchor="middle" class="pass-name">TorchInductor</text>
  <text x="504" y="424" text-anchor="middle" class="pass-sub">(or other backend)</text>

  
  <rect x="70" y="440" width="580" height="82" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
  <rect x="70" y="440" width="6" height="82" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.7"/>
  <text x="370" y="478" text-anchor="middle" class="box-title" style="fill:var(--accent2,#3b82f6)">Generated Triton / CUDA C++ kernels</text>
  <text x="370" y="499" text-anchor="middle" class="box-sub">(fused, tile-optimized GPU code)</text>

</svg>
<figcaption><b>torch.compile is a three-pass lowering pipeline.</b> TorchDynamo rewrites Python bytecode to capture an FX Graph without requiring user code changes; AOTAutograd traces through the autograd engine at compile time to produce a joint forward+backward graph; and TorchInductor lowers that graph to fused Triton or CUDA kernels, enabling cross-boundary optimizations like fusing an activation function with its gradient.</figcaption>
</figure>
