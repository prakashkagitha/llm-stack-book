<figure class="viz" id="fig-compounding-flywheel-moat">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 840 420" role="img" aria-label="Left: three ascending loop icons show each flywheel round (k=1, k=2, k=3) getting larger, with growing chips of data volume, tail coverage, and quality gains. Right: a line chart plots an incumbent's quality and tail coverage rising super-linearly across flywheel rounds k=0 to 10, while a new entrant starting from the same base model but with no traffic stays nearly flat, opening a widening shaded band labeled the moat, or distribution gap.">
<defs>
  <marker id="cfw-arr" viewBox="0 0 10 10" refX="9" refY="5"
    markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  <marker id="cfw-spin" viewBox="0 0 10 10" refX="9" refY="5"
    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#4f46e5)"/>
  </marker>
  <style>
    @media (prefers-reduced-motion: reduce) {
      #fig-compounding-flywheel-moat .cfw-draw { animation: none !important; stroke-dashoffset: 0 !important; }
    }
    #fig-compounding-flywheel-moat text { font-family: var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .t-title { font: 700 13px var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .t-sub { font: 400 10px var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .t-chip { font: 600 9.5px var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .t-tick { font: 400 10px var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .t-axis { font: 600 11px var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .t-legend { font: 400 10.5px var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .t-note { font: 400 10px var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .t-moat { font: 700 11.5px var(--sans, sans-serif); }
    #fig-compounding-flywheel-moat .loop-k { font: 800 10px var(--sans, sans-serif); }
  </style>
</defs>


<line x1="340" y1="42" x2="340" y2="404" class="v-grid" stroke-width="1" stroke-dasharray="3 4"/>


<g data-anim="1">
  <text class="t-title" x="170" y="26" text-anchor="middle" fill="var(--ink-soft)">Each flywheel round compounds</text>

  
  <rect x="60" y="50" width="260" height="50" rx="10" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
  <text class="t-chip" x="190" y="65" text-anchor="middle" fill="var(--ink-soft)">D_k up</text>
  <text class="t-chip" x="190" y="79" text-anchor="middle" fill="var(--ink-soft)">tail coverage up</text>
  <text class="t-chip" x="190" y="93" text-anchor="middle" fill="var(--ink-soft)">Q_k up</text>

  
  <path d="M 168.4,246.6 Q 195,210 221,174" fill="none" class="v-accent-s" stroke-width="2" marker-end="url(#cfw-arr)"/>

  
  <circle cx="245" cy="150" r="34" fill="none" class="v-grid" stroke-width="1.2"/>
  <path d="M 245,116 A 34,34 0 1,1 215.6,167" fill="none" class="v-accent-s" stroke-width="3" marker-end="url(#cfw-spin)"/>
  <text class="loop-k" x="245" y="154" text-anchor="middle" fill="var(--ink)">k=3</text>

  <text class="t-sub" x="245" y="205" text-anchor="middle" fill="var(--muted)">... continues through k=10</text>

  
  <rect x="195" y="248" width="125" height="34" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
  <text class="t-chip" x="257" y="261" text-anchor="middle" fill="var(--ink-soft)">D_k up</text>
  <text class="t-chip" x="257" y="275" text-anchor="middle" fill="var(--ink-soft)">tail coverage up</text>

  
  <path d="M 77.7,352.3 Q 105,320 131.6,283.4" fill="none" class="v-accent-s" stroke-width="1.8" marker-end="url(#cfw-arr)"/>

  
  <circle cx="150" cy="265" r="26" fill="none" class="v-grid" stroke-width="1.1"/>
  <path d="M 150,239 A 26,26 0 1,1 127.5,278" fill="none" class="v-accent-s" stroke-width="2.4" marker-end="url(#cfw-spin)"/>
  <text class="loop-k" x="150" y="269" text-anchor="middle" fill="var(--ink)">k=2</text>

  
  <rect x="95" y="352" width="90" height="22" rx="11" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
  <text class="t-chip" x="140" y="367" text-anchor="middle" fill="var(--ink-soft)">D_k up</text>

  
  <circle cx="65" cy="365" r="18" fill="none" class="v-grid" stroke-width="1"/>
  <path d="M 65,347 A 18,18 0 1,1 49.4,374" fill="none" class="v-accent-s" stroke-width="1.8" marker-end="url(#cfw-spin)"/>
  <text class="loop-k" x="65" y="369" text-anchor="middle" fill="var(--ink)">k=1</text>

  <text class="t-note" x="170" y="397" text-anchor="middle" fill="var(--muted)">each turn: more users -&gt; more signal -&gt; sharper tail</text>
</g>


<g data-anim="2">
  <text class="t-title" x="600" y="26" text-anchor="middle" fill="var(--ink-soft)">Quality &amp; tail coverage across flywheel rounds</text>

  
  <line x1="480" y1="45" x2="512" y2="45" class="v-accent-s" stroke-width="3"/>
  <text class="t-legend" x="518" y="49" fill="var(--ink-soft)">incumbent (flywheel active)</text>
  <line x1="480" y1="61" x2="512" y2="61" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 3"/>
  <text class="t-legend" x="518" y="65" fill="var(--ink-soft)">new entrant (no traffic)</text>

  
  <line x1="400" y1="70" x2="400" y2="340" class="v-stroke" stroke-width="1.3"/>
  <line x1="400" y1="340" x2="800" y2="340" class="v-stroke" stroke-width="1.3"/>

  
  <g class="v-stroke" stroke-width="1">
    <line x1="400" y1="340" x2="400" y2="345"/>
    <line x1="480" y1="340" x2="480" y2="345"/>
    <line x1="560" y1="340" x2="560" y2="345"/>
    <line x1="640" y1="340" x2="640" y2="345"/>
    <line x1="720" y1="340" x2="720" y2="345"/>
    <line x1="800" y1="340" x2="800" y2="345"/>
  </g>
  <g class="t-tick" fill="var(--muted)" text-anchor="middle">
    <text x="400" y="356">0</text>
    <text x="480" y="356">2</text>
    <text x="560" y="356">4</text>
    <text x="640" y="356">6</text>
    <text x="720" y="356">8</text>
    <text x="800" y="356">10</text>
  </g>
  <text class="t-axis" x="600" y="376" text-anchor="middle" fill="var(--ink-soft)">flywheel rounds k</text>
  <text class="t-axis" x="372" y="205" text-anchor="middle" fill="var(--ink-soft)" transform="rotate(-90 372 205)">model quality / tail coverage (qualitative)</text>

  
  <path d="M 400,290 C 440,285 460,282 480,279 C 520,273 540,265 560,252 C 600,235 620,225 640,210 C 680,185 700,175 720,156 C 760,120 780,105 800,90 L 800,273 C 780,274 760,275 720,277 C 700,278 680,279 640,280 C 620,281 600,282 560,283 C 540,284 520,285 480,286 C 460,287 440,288 400,290 Z"
    fill="var(--accent)" fill-opacity="0.13" stroke="none"/>

  
  <path d="M 400,290 C 440,288 460,287 480,286 C 520,285 540,284 560,283 C 600,282 620,281 640,280 C 680,279 700,278 720,277 C 760,275 780,274 800,273"
    fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 3"/>

  
  <path d="M 400,290 C 440,285 460,282 480,279 C 520,273 540,265 560,252 C 600,235 620,225 640,210 C 680,185 700,175 720,156 C 760,120 780,105 800,90"
    fill="none" class="v-accent-s" stroke-width="3.2" stroke-linecap="round"/>

  
  <circle cx="400" cy="290" r="4.5" class="v-accent"/>
  <line x1="400" y1="290" x2="392" y2="312" class="v-stroke" stroke-width="1"/>
  <text class="t-note" x="388" y="322" text-anchor="end" fill="var(--ink-soft)">same open-weight</text>
  <text class="t-note" x="388" y="334" text-anchor="end" fill="var(--ink-soft)">base at k=0</text>

  
  <text class="t-moat" x="730" y="196" text-anchor="middle" fill="var(--ink-soft)">the moat =</text>
  <text class="t-moat" x="730" y="212" text-anchor="middle" fill="var(--ink-soft)">distribution gap</text>
  <text class="t-note" x="730" y="230" text-anchor="middle" fill="var(--muted)">(closes via better data,</text>
  <text class="t-note" x="730" y="242" text-anchor="middle" fill="var(--muted)">not better architecture)</text>

  
  <text class="t-note" x="408" y="92" fill="var(--muted)">user growth is multiplicative;</text>
  <text class="t-note" x="408" y="104" fill="var(--muted)">quality grows with log(data)</text>
</g>

</svg>
<figcaption><b>Each turn of the flywheel is bigger than the last, and that compounding is what turns a shared starting point into an unbridgeable gap.</b> A new entrant launching from the same open-weight base model matches the incumbent's day-zero quality, but with no traffic its curve stays flat while the incumbent's quality and tail coverage grow super-linearly round over round — the widening band between the two curves is a data-distribution moat, closed by better data rather than a better architecture.</figcaption>
</figure>
