<figure class="viz" id="fig-lora-qlora-training-memory-breakdown">
<svg viewBox="0 0 780 415" role="img" aria-label="Three stacked bars comparing training-memory composition in bytes per parameter for full fine-tuning, LoRA, and QLoRA. Full fine-tuning pays base weight, gradient, fp32 master copy, and Adam moments on 100% of params, totaling 16 bytes per parameter. LoRA keeps only the bf16 base weight band paid and greys out gradient, master copy, and Adam bands as not allocated because the base is frozen, adding only a tiny adapter sliver. QLoRA further shrinks the paid base band to about 0.5 bytes per parameter by storing it in 4-bit NF4, one quarter the height of LoRA's base band. An identical hatched activations band on top of every bar shows activation memory is unchanged across all three.">
  <defs>
    <pattern id="lqm-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="var(--surface,#1e293b)" fill-opacity="0.2"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="var(--muted,#94a3b8)" stroke-width="1.4"/>
    </pattern>
  </defs>
  <style>
    #fig-lora-qlora-training-memory-breakdown text { fill: var(--ink-soft,#e2e8f0); }
    #fig-lora-qlora-training-memory-breakdown .leg   { font:600 9.5px var(--sans,sans-serif); }
    #fig-lora-qlora-training-memory-breakdown .note  { font:400 9px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-lora-qlora-training-memory-breakdown .axis  { font:600 9px var(--mono,monospace); fill:var(--muted,#94a3b8); }
    #fig-lora-qlora-training-memory-breakdown .axtitle{ font:600 9.5px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-lora-qlora-training-memory-breakdown .bandlbl{ font:600 8.6px var(--sans,sans-serif); fill:var(--ink-soft,#e2e8f0); }
    #fig-lora-qlora-training-memory-breakdown .bandlbl2{ font:400 8px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-lora-qlora-training-memory-breakdown .inlbl  { font:700 9px var(--sans,sans-serif); }
    #fig-lora-qlora-training-memory-breakdown .inlbl2 { font:400 7.6px var(--sans,sans-serif); }
    #fig-lora-qlora-training-memory-breakdown .cat    { font:700 11.5px var(--sans,sans-serif); }
    #fig-lora-qlora-training-memory-breakdown .sub    { font:400 8.4px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-lora-qlora-training-memory-breakdown .paid   { fill:var(--accent,#6c8cff); fill-opacity:0.20; stroke:var(--accent,#6c8cff); stroke-width:1.6; }
    #fig-lora-qlora-training-memory-breakdown .sliver { fill:var(--accent,#6c8cff); fill-opacity:0.32; stroke:var(--accent,#6c8cff); stroke-width:1.4; }
    #fig-lora-qlora-training-memory-breakdown .hollow { fill:var(--surface,#1e293b); fill-opacity:0.25; stroke:var(--muted,#94a3b8); stroke-width:1.2; stroke-dasharray:4 3; }
    #fig-lora-qlora-training-memory-breakdown .strike { stroke:var(--muted,#94a3b8); stroke-width:1.1; }
    #fig-lora-qlora-training-memory-breakdown .hatch  { fill:url(#lqm-hatch); stroke:var(--muted,#94a3b8); stroke-width:1.1; }
  </style>

  
  <rect x="16" y="16" width="16" height="13" rx="2" class="paid"/>
  <text x="36" y="27" class="leg">paid / allocated</text>
  <rect x="176" y="16" width="16" height="13" rx="2" class="hollow"/>
  <text x="196" y="27" class="leg">not allocated (base frozen)</text>
  <rect x="392" y="16" width="16" height="13" rx="2" class="hatch"/>
  <text x="412" y="27" class="leg">activations (unaffected)</text>

  <text x="390" y="48" text-anchor="middle" class="note">Sliver and activations bands above the 16 B/param line are schematic heights, not drawn to the axis scale.</text>

  
  <g transform="translate(0,-100)">
  
  <line x1="182" y1="460" x2="182" y2="236" stroke="var(--muted,#94a3b8)" stroke-width="1.3"/>
  <text x="172" y="463" text-anchor="end" class="axis">0</text>
  <text x="172" y="239" text-anchor="end" class="axis">16</text>
  <line x1="176" y1="460" x2="182" y2="460" stroke="var(--muted,#94a3b8)" stroke-width="1.3"/>
  <line x1="176" y1="236" x2="182" y2="236" stroke="var(--muted,#94a3b8)" stroke-width="1.3"/>
  <text x="30" y="352" text-anchor="middle" class="axtitle" transform="rotate(-90 30 352)">memory, bytes / parameter</text>

  
  <line x1="182" y1="432" x2="705" y2="432" stroke="var(--border-2,#334155)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="182" y1="404" x2="705" y2="404" stroke="var(--border-2,#334155)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="182" y1="348" x2="705" y2="348" stroke="var(--border-2,#334155)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="182" y1="460" x2="705" y2="460" stroke="var(--muted,#94a3b8)" stroke-width="1.3"/>
  <line x1="182" y1="236" x2="705" y2="236" stroke="var(--border-2,#334155)" stroke-width="1" stroke-dasharray="3 3"/>

  
  <text x="186" y="219" text-anchor="end" class="bandlbl">activations (unchanged)</text>
  <text x="186" y="230" text-anchor="end" class="bandlbl2">same on LoRA &amp; QLoRA</text>
  <text x="186" y="295" text-anchor="end" class="bandlbl">Adam moments (2x)  8</text>
  <text x="186" y="379" text-anchor="end" class="bandlbl">fp32 master copy  4</text>
  <text x="186" y="421" text-anchor="end" class="bandlbl">base gradient  2</text>
  <text x="186" y="449" text-anchor="end" class="bandlbl">base weight (bf16)  2</text>

  
  <g data-anim="1">
    <rect x="190" y="432" width="150" height="28" rx="2" class="paid"/>
    <text x="265" y="450" text-anchor="middle" class="inlbl">base wt (bf16)  2</text>

    <rect x="190" y="404" width="150" height="28" rx="2" class="paid"/>
    <text x="265" y="422" text-anchor="middle" class="inlbl">base grad  2</text>

    <rect x="190" y="348" width="150" height="56" rx="3" class="paid"/>
    <text x="265" y="374" text-anchor="middle" class="inlbl">fp32 master</text>
    <text x="265" y="388" text-anchor="middle" class="inlbl">copy  4</text>

    <rect x="190" y="236" width="150" height="112" rx="3" class="paid"/>
    <text x="265" y="286" text-anchor="middle" class="inlbl">Adam moments</text>
    <text x="265" y="300" text-anchor="middle" class="inlbl">(2x)  8</text>

    <rect x="190" y="196" width="150" height="40" rx="3" class="hatch"/>
    <text x="265" y="212" text-anchor="middle" class="inlbl2">activations</text>
    <text x="265" y="224" text-anchor="middle" class="inlbl2">unchanged</text>

    <text x="265" y="478" text-anchor="middle" class="cat">Full fine-tuning</text>
    <text x="265" y="492" text-anchor="middle" class="sub">16 B/param, all bands full-width</text>
    <text x="265" y="503" text-anchor="middle" class="sub">= 100% of params</text>
  </g>

  
  <g data-anim="2">
    <rect x="365" y="432" width="150" height="28" rx="2" class="paid"/>
    <text x="440" y="447" text-anchor="middle" class="inlbl">2</text>
    <text x="440" y="457" text-anchor="middle" class="inlbl2">(bf16, kept)</text>

    <rect x="365" y="404" width="150" height="28" rx="2" class="hollow"/>
    <text x="440" y="422" text-anchor="middle" class="inlbl2">2</text>
    <line x1="428" y1="418" x2="452" y2="418" class="strike"/>

    <rect x="365" y="348" width="150" height="56" rx="3" class="hollow"/>
    <text x="440" y="374" text-anchor="middle" class="inlbl2">x  not allocated</text>
    <text x="440" y="386" text-anchor="middle" class="inlbl2">(base is frozen)</text>

    <rect x="365" y="236" width="150" height="112" rx="3" class="hollow"/>
    <text x="440" y="294" text-anchor="middle" class="inlbl2">8</text>
    <line x1="428" y1="290" x2="452" y2="290" class="strike"/>

    <rect x="365" y="216" width="150" height="20" rx="2" class="sliver"/>
    <text x="440" y="230" text-anchor="middle" class="inlbl2">adapter, &lt;1% of params</text>

    <rect x="365" y="176" width="150" height="40" rx="3" class="hatch"/>
    <text x="440" y="200" text-anchor="middle" class="inlbl2">activations</text>

    <text x="440" y="478" text-anchor="middle" class="cat">LoRA (bf16 base)</text>
    <text x="440" y="492" text-anchor="middle" class="sub">16 B/param, but only on</text>
    <text x="440" y="503" text-anchor="middle" class="sub">the &lt;1% adapter slice</text>
  </g>

  
  <g data-anim="3">
    
    <rect x="540" y="432" width="150" height="28" rx="2" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1.1" stroke-dasharray="3 2"/>
    <text x="615" y="443" text-anchor="middle" class="inlbl2">~0.5 (NF4)</text>
    <text x="615" y="452" text-anchor="middle" class="inlbl2">+ scale overhead</text>
    <rect x="540" y="453" width="150" height="7" rx="1.5" class="paid"/>

    <rect x="540" y="404" width="150" height="28" rx="2" class="hollow"/>
    <text x="615" y="422" text-anchor="middle" class="inlbl2">2</text>
    <line x1="603" y1="418" x2="627" y2="418" class="strike"/>

    <rect x="540" y="348" width="150" height="56" rx="3" class="hollow"/>
    <text x="615" y="374" text-anchor="middle" class="inlbl2">x  not allocated</text>
    <text x="615" y="386" text-anchor="middle" class="inlbl2">(base is frozen)</text>

    <rect x="540" y="236" width="150" height="112" rx="3" class="hollow"/>
    <text x="615" y="294" text-anchor="middle" class="inlbl2">8</text>
    <line x1="603" y1="290" x2="627" y2="290" class="strike"/>

    <rect x="540" y="216" width="150" height="20" rx="2" class="sliver"/>
    <text x="615" y="230" text-anchor="middle" class="inlbl2">adapter, &lt;1% of params</text>

    <rect x="540" y="176" width="150" height="40" rx="3" class="hatch"/>
    <text x="615" y="200" text-anchor="middle" class="inlbl2">activations</text>

    <text x="615" y="478" text-anchor="middle" class="cat">QLoRA (4-bit base)</text>
    <text x="615" y="492" text-anchor="middle" class="sub">base shrunk to NF4,</text>
    <text x="615" y="503" text-anchor="middle" class="sub">~1/4 of LoRA's base band</text>
  </g>
  </g>
</svg>
<figcaption><b>LoRA removes gradient and optimizer state on the frozen 99%+ of parameters; QLoRA then compresses the frozen base itself to 4-bit.</b> Every bar pays the same activations line item (hatched, unchanged) — LoRA and QLoRA save memory by shrinking or zeroing out the <i>weight-storage and optimizer</i> bands, not by touching activation memory, which is why they still pair with gradient checkpointing.</figcaption>
</figure>
