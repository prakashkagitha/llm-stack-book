<figure class="viz" id="fig-rag-pipeline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 820 400" role="img" aria-label="The online RAG pipeline: a user query is embedded into a vector, used to retrieve the top-k nearest chunks from a vector store, those chunks augment the prompt, and the LLM generates an answer grounded in the retrieved context with inline citations.">
  <defs>
    <marker id="rg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-rag-pipeline text{ fill:var(--ink-soft); }
    #fig-rag-pipeline .stage{ font:700 12.5px var(--sans,sans-serif); }
    #fig-rag-pipeline .step{ font:500 11px var(--sans,sans-serif); }
    #fig-rag-pipeline .sub{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-rag-pipeline .mono{ font:600 10.5px var(--mono,monospace); }
    #fig-rag-pipeline .tag{ font:700 9.5px var(--mono,monospace); fill:var(--muted); }
    #fig-rag-pipeline .cap{ font:600 10px var(--sans,sans-serif); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <rect x="14" y="150" width="118" height="62" rx="9" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="73" y="166" text-anchor="middle" class="stage" fill="var(--accent)">Query</text>
    <text x="73" y="184" text-anchor="middle" class="sub">"How does Flash-</text>
    <text x="73" y="196" text-anchor="middle" class="sub">Attention save</text>
    <text x="73" y="206" text-anchor="middle" class="sub">memory?"</text>
  </g>

  
  <g data-anim="1">
    <line x1="132" y1="181" x2="166" y2="181" stroke="currentColor" class="v-muted" stroke-width="1.5" marker-end="url(#rg-arrow)"/>
  </g>

  
  <g data-anim="2">
    <rect x="168" y="150" width="118" height="62" rx="9" class="v-fill v-grid" stroke-width="1.3"/>
    <text x="227" y="166" text-anchor="middle" class="stage">Embed</text>
    <text x="227" y="183" text-anchor="middle" class="sub">bi-encoder -&gt;</text>
    <text x="227" y="201" text-anchor="middle" class="mono" fill="var(--accent)">q in R^h</text>
  </g>

  
  <g data-anim="2">
    <line x1="286" y1="181" x2="320" y2="181" stroke="currentColor" class="v-muted" stroke-width="1.5" marker-end="url(#rg-arrow)"/>
  </g>

  
  <g data-anim="3">
    <rect x="322" y="40" width="156" height="304" rx="10" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="334" y="32" class="tag">VECTOR STORE · ANN</text>
    <text x="400" y="62" text-anchor="middle" class="stage" fill="var(--accent)">Retrieve top-k</text>
    <text x="400" y="78" text-anchor="middle" class="sub">nearest chunks · cosine</text>

    
    <g class="mono">
      
      <rect x="338" y="92"  width="124" height="26" rx="5" class="v-accent" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="1.4"/>
      <text x="350" y="109" class="mono" fill="var(--accent)">c12</text>
      <text x="452" y="109" text-anchor="end" class="mono" fill="var(--accent)">0.83</text>

      <rect x="338" y="122" width="124" height="26" rx="5" class="v-accent" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="1.4"/>
      <text x="350" y="139" class="mono" fill="var(--accent)">c07</text>
      <text x="452" y="139" text-anchor="end" class="mono" fill="var(--accent)">0.79</text>

      <rect x="338" y="152" width="124" height="26" rx="5" class="v-accent" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="1.4"/>
      <text x="350" y="169" class="mono" fill="var(--accent)">c31</text>
      <text x="452" y="169" text-anchor="end" class="mono" fill="var(--accent)">0.74</text>


      <rect x="338" y="186" width="124" height="22" rx="5" class="v-fill v-grid" stroke-width="1"/>
      <text x="350" y="201" class="mono" fill="var(--muted)">c45</text>
      <text x="452" y="201" text-anchor="end" class="mono" fill="var(--muted)">0.41</text>

      <rect x="338" y="212" width="124" height="22" rx="5" class="v-fill v-grid" stroke-width="1"/>
      <text x="350" y="227" class="mono" fill="var(--muted)">c02</text>
      <text x="452" y="227" text-anchor="end" class="mono" fill="var(--muted)">0.38</text>
    </g>

    <text x="400" y="256" text-anchor="middle" class="sub">… N indexed chunk vectors …</text>

    
    <rect x="356" y="272" width="88" height="22" rx="11" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.2"/>
    <text x="400" y="287" text-anchor="middle" class="mono" fill="var(--accent)">k = 3</text>

    <text x="400" y="316" text-anchor="middle" class="sub">offline: chunk -&gt; embed -&gt;</text>
    <text x="400" y="330" text-anchor="middle" class="sub">index (HNSW / IVF)</text>
  </g>


  <g data-anim="4">
    <line x1="478" y1="135" x2="512" y2="135" stroke="currentColor" class="v-muted" stroke-width="1.5" marker-end="url(#rg-arrow)"/>
    <text x="495" y="124" text-anchor="middle" class="cap">top-k</text>
  </g>


  <g data-anim="4">
    <rect x="514" y="44" width="270" height="178" rx="10" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="526" y="36" class="tag">PROMPT TEMPLATE</text>
    <text x="649" y="64" text-anchor="middle" class="stage" fill="var(--accent)">Augment</text>

    <rect x="528" y="76" width="242" height="20" rx="4" class="v-fill v-grid" stroke-width="1"/>
    <text x="538" y="90" class="mono">system: answer from context only</text>

    <rect x="528" y="100" width="242" height="60" rx="4" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)" stroke-width="1.2"/>
    <text x="538" y="115" class="mono" fill="var(--accent)">context:</text>
    <text x="544" y="130" class="mono" fill="var(--accent)">[1] c12  [2] c07  [3] c31</text>
    <text x="538" y="148" class="sub">retrieved chunks, numbered</text>

    <rect x="528" y="164" width="242" height="20" rx="4" class="v-fill v-grid" stroke-width="1"/>
    <text x="538" y="178" class="mono">user: {query}</text>

    <text x="649" y="206" text-anchor="middle" class="sub">grounding + numbered passages</text>
  </g>


  <g data-anim="5">
    <line x1="649" y1="222" x2="649" y2="256" stroke="currentColor" class="v-muted" stroke-width="1.5" marker-end="url(#rg-arrow)"/>
  </g>


  <g data-anim="5">
    <rect x="514" y="258" width="270" height="100" rx="10" fill="var(--good,#2f9e6e)" fill-opacity="0.14" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="649" y="280" text-anchor="middle" class="stage" fill="var(--good,#2f9e6e)">LLM -&gt; grounded answer</text>
    <text x="528" y="302" class="step">It tiles Q,K,V into SRAM blocks and</text>
    <text x="528" y="317" class="step">never materializes the N x N matrix,</text>
    <text x="528" y="332" class="step">cutting memory to O(N)
      <tspan class="mono" fill="var(--good,#2f9e6e)" dx="3">[1]</tspan>.</text>
    <text x="649" y="350" text-anchor="middle" class="sub">claims trace back to cited chunks</text>
  </g>


  <g data-anim="5">
    <text x="170" y="300" text-anchor="middle" class="cap">P(y | q)  -&gt;  P(y | q, D_q)</text>
    <text x="170" y="320" text-anchor="middle" class="sub">condition generation on retrieved</text>
    <text x="170" y="333" text-anchor="middle" class="sub">documents, not parametric memory</text>
  </g>
</svg>
<figcaption><b>RAG conditions generation on retrieved documents instead of parametric memory.</b> The query is embedded by the same bi-encoder as the corpus, the vector store returns the top-<span class="mono">k</span> nearest chunks by cosine similarity, those numbered passages augment the prompt, and the LLM answers grounded in that context with inline citations — turning <span class="mono">P(y | q)</span> into <span class="mono">P(y | q, D_q)</span>.</figcaption>
</figure>
