<figure class="viz" id="fig-structgen-xgrammar-mask-architecture">
<svg viewBox="0 0 760 560" role="img" aria-label="XGrammar compiles a JSON Schema through EBNF into an Adaptive Token Mask Cache, which splits tokens into context-independent bitmasks (precomputed per rule, ~95%+ of tokens) and context-dependent tokens (computed per stack state), then combines them via bitmap OR into a per-step mask applied to logits, setting forbidden token positions to -inf.">
  <defs>
    <marker id="xg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#374151)"/>
    </marker>
    <marker id="xg-arrow-acc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
    </marker>
  </defs>
  <style>
    #fig-structgen-xgrammar-mask-architecture text { fill: var(--ink-soft,#374151); }
    #fig-structgen-xgrammar-mask-architecture .ttl { font: 700 13.5px var(--sans,sans-serif); }
    #fig-structgen-xgrammar-mask-architecture .sub { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-structgen-xgrammar-mask-architecture .ann { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-structgen-xgrammar-mask-architecture .cap { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-structgen-xgrammar-mask-architecture .lbl { font: 400 11.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
    #fig-structgen-xgrammar-mask-architecture .mono { font: 500 11px var(--mono,monospace); fill: var(--ink-soft,#374151); }
    #fig-structgen-xgrammar-mask-architecture .formula { font: 500 10.5px var(--mono,monospace); fill: var(--ink-soft,#374151); }
  </style>

  

  
  <rect x="20" y="28" width="140" height="52" rx="7" class="v-fill" stroke="var(--border-2,#d1d5db)" stroke-width="1.5"/>
  <text x="90" y="51" text-anchor="middle" class="ttl">JSON Schema</text>

  
  <line x1="161" y1="54" x2="208" y2="54" stroke="var(--ink-soft,#374151)" stroke-width="1.5" marker-end="url(#xg-arrow)"/>

  
  <rect x="210" y="28" width="150" height="52" rx="7" class="v-fill" stroke="var(--border-2,#d1d5db)" stroke-width="1.5"/>
  <text x="285" y="51" text-anchor="middle" class="ttl">EBNF Grammar</text>

  
  <line x1="361" y1="54" x2="420" y2="54" stroke="var(--ink-soft,#374151)" stroke-width="1.5" marker-end="url(#xg-arrow)"/>

  
  <rect x="422" y="18" width="312" height="72" rx="7" fill="var(--accent,#4f46e5)" fill-opacity="0.08" stroke="var(--accent,#4f46e5)" stroke-width="2"/>
  <text x="578" y="46" text-anchor="middle" class="ttl" fill="var(--accent,#4f46e5)">Adaptive Token Mask Cache</text>
  <text x="578" y="63" text-anchor="middle" class="cap">built once per schema</text>

  

  
  <line x1="578" y1="90" x2="578" y2="168" stroke="var(--ink-soft,#374151)" stroke-width="1.5"/>

  
  <circle cx="578" cy="168" r="4" fill="var(--ink-soft,#374151)"/>

  
  <polyline points="578,168 220,168 220,200" fill="none" stroke="var(--ink-soft,#374151)" stroke-width="1.5" marker-end="url(#xg-arrow)"/>

  
  <polyline points="578,168 578,200" fill="none" stroke="var(--ink-soft,#374151)" stroke-width="1.5" marker-end="url(#xg-arrow)"/>

  

  
  <rect x="60" y="200" width="320" height="72" rx="7" fill="var(--accent,#4f46e5)" fill-opacity="0.08" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <text x="220" y="224" text-anchor="middle" class="ttl" fill="var(--accent,#4f46e5)">Context-Independent Bitmask</text>
  <text x="220" y="242" text-anchor="middle" class="sub">precomputed per grammar rule</text>
  <text x="220" y="260" text-anchor="middle" class="ann">~95%+ of tokens for typical JSON</text>

  
  <rect x="420" y="200" width="310" height="72" rx="7" fill="var(--warn,#e0a106)" fill-opacity="0.10" stroke="var(--warn,#e0a106)" stroke-width="1.8"/>
  <text x="575" y="224" text-anchor="middle" class="ttl" fill="var(--warn,#e0a106)">Context-Dependent Token Set</text>
  <text x="575" y="242" text-anchor="middle" class="sub">computed per stack state</text>
  <text x="575" y="260" text-anchor="middle" class="ann">e.g. closing } needs matching { on stack</text>

  

  
  <line x1="220" y1="272" x2="220" y2="340" stroke="var(--ink-soft,#374151)" stroke-width="1.5"/>

  
  <line x1="575" y1="272" x2="575" y2="340" stroke="var(--ink-soft,#374151)" stroke-width="1.5"/>

  
  <line x1="220" y1="340" x2="575" y2="340" stroke="var(--ink-soft,#374151)" stroke-width="1.5"/>

  
  <line x1="395" y1="340" x2="395" y2="358" stroke="var(--ink-soft,#374151)" stroke-width="1.5" marker-end="url(#xg-arrow)"/>

  
  <circle cx="395" cy="340" r="4" fill="var(--ink-soft,#374151)"/>

  
  <text x="290" y="332" text-anchor="middle" class="lbl">bitmap OR</text>

  

  
  <rect x="255" y="358" width="280" height="62" rx="7" class="v-fill" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <text x="395" y="381" text-anchor="middle" class="ttl">Combined Mask</text>
  <text x="395" y="397" text-anchor="middle" class="sub">per decode step</text>
  <text x="395" y="412" text-anchor="middle" class="formula">mask = rule_mask[rule] | eval_ctx(stack)</text>

  
  <line x1="395" y1="420" x2="395" y2="448" stroke="var(--accent,#4f46e5)" stroke-width="1.5" marker-end="url(#xg-arrow-acc)"/>
  <text x="415" y="438" class="lbl" fill="var(--accent,#4f46e5)">apply</text>

  

  
  <rect x="265" y="450" width="260" height="54" rx="7" fill="var(--accent,#4f46e5)" fill-opacity="0.08" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <text x="395" y="476" text-anchor="middle" class="ttl" fill="var(--accent,#4f46e5)">Logit Masking</text>
  <text x="395" y="493" text-anchor="middle" class="sub">applied to raw model logits</text>

  
  <text x="395" y="528" text-anchor="middle" class="ann">set -inf on invalid logit indices</text>

</svg>
<figcaption><b>XGrammar's compile-once, apply-fast mask pipeline.</b> A JSON Schema is compiled to EBNF and then to an Adaptive Token Mask Cache. The cache splits tokens into a context-independent bitmask (precomputed per grammar rule, covering ~95%+ of tokens) and a small context-dependent set (resolved per PDA stack state at decode time). Each step the two halves are OR-combined and applied to the logit vector, setting forbidden token positions to -inf.</figcaption>
</figure>
