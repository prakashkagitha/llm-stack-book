<figcaption><b>Tree attention: token tree, flattened sequence, and ancestor-only mask.</b> The drafter proposes a token tree branching top-2 at each depth (Panel A); it is flattened into a single packed sequence where each node's position id equals its depth, not its flattened index (Panel B), so RoPE treats every root-to-leaf path as contiguous. The custom attention mask (Panel C) restricts each node to attending only to its ancestors and itself, allowing one target forward pass to correctly verify all paths simultaneously.</figcaption>
