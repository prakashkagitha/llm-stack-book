<figure class="viz" id="fig-lora">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 360" role="img" aria-label="LoRA: a frozen d-by-d weight matrix W computes Wx, while a parallel trainable low-rank path projects x down to rank r with A then up to d with B; the two outputs are summed to give h equals Wx plus B times A times x.">
  <defs>
    <marker id="lora-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-lora text{ fill:var(--ink-soft); }
    #fig-lora .lbl{ font:700 14px var(--sans,sans-serif); }
    #fig-lora .dim{ font:500 10.5px var(--mono,monospace); fill:var(--muted); }
    #fig-lora .op{ font:600 20px var(--serif,serif); }
    #fig-lora .cap{ font:600 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-lora .tag{ font:700 11px var(--sans,sans-serif); }
    #fig-lora .eq{ font:600 16px var(--mono,monospace); }
    #fig-lora .lock{ font:13px var(--sans,sans-serif); }
  </style>

  
  <g data-anim="1">
    <rect x="16" y="150" width="40" height="60" rx="6" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="36" y="186" text-anchor="middle" class="lbl">x</text>
    <text x="36" y="226" text-anchor="middle" class="dim">d</text>
  </g>

  
  <circle cx="84" cy="180" r="3.5" fill="currentColor"/>
  <line x1="56" y1="180" x2="84" y2="180" stroke="currentColor" stroke-width="1.5"/>

  
  <g data-anim="2">
    
    <path d="M84 180 L84 96 L150 96" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#lora-arrow)"/>
    
    <rect x="152" y="60" width="116" height="92" rx="8" class="v-fill" stroke="var(--muted)" stroke-width="1.6"/>
    <text x="210" y="96" text-anchor="middle" class="lbl" fill="var(--ink-soft)">W</text>
    
    <g transform="translate(187,114)" stroke="var(--muted)" stroke-width="1.3" fill="none">
      <rect x="0" y="4" width="10" height="7" rx="1.5" fill="var(--muted)" stroke="none"/>
      <path d="M2.2 4 V2.6 a2.8 2.8 0 0 1 5.6 0 V4"/>
    </g>
    <text x="226" y="124" text-anchor="middle" class="cap">frozen</text>
    <text x="210" y="170" text-anchor="middle" class="dim">d × d  (full rank)</text>
    
    <text x="210" y="46" text-anchor="middle" class="tag" fill="var(--muted)">d² params · 0 trained</text>
    
    <path d="M268 96 L560 96 L560 168" fill="none" stroke="var(--muted)" stroke-width="1.6" marker-end="url(#lora-arrow)"/>
    <text x="320" y="88" class="cap">W x</text>
  </g>

  
  <g data-anim="3">
    
    <path d="M84 180 L84 270 L150 270" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#lora-arrow)"/>

    
    <rect x="152" y="252" width="92" height="36" rx="6" class="v-fill v-accent-s" stroke-width="1.6"/>
    <text x="198" y="276" text-anchor="middle" class="lbl" fill="var(--accent)">A</text>
    <text x="198" y="306" text-anchor="middle" class="dim">r × d</text>
    <text x="198" y="320" text-anchor="middle" class="cap">down-project</text>

    
    <path d="M244 270 L300 270" fill="none" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#lora-arrow)"/>
    <text x="272" y="261" text-anchor="middle" class="tag" fill="var(--accent)">rank r</text>
    <text x="272" y="290" text-anchor="middle" class="dim">r &lt;&lt; d</text>

    
    <rect x="308" y="252" width="92" height="36" rx="6" class="v-fill v-accent-s" stroke-width="1.6"/>
    <text x="354" y="276" text-anchor="middle" class="lbl" fill="var(--accent)">B</text>
    <text x="354" y="306" text-anchor="middle" class="dim">d × r</text>
    <text x="354" y="320" text-anchor="middle" class="cap">up-project</text>

    
    <text x="276" y="238" text-anchor="middle" class="tag" fill="var(--accent)">2 d r params · all trained</text>

    
    <path d="M400 270 L560 270 L560 196" fill="none" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#lora-arrow)"/>
    <text x="430" y="262" class="cap" fill="var(--accent)">B(A x)</text>
  </g>

  
  <g data-anim="4">
    <circle cx="560" cy="182" r="18" class="v-fill v-stroke" stroke-width="1.6"/>
    <text x="560" y="189" text-anchor="middle" class="op">+</text>
    <path d="M578 182 L636 182" fill="none" stroke="currentColor" stroke-width="1.6" marker-end="url(#lora-arrow)"/>

    
    <rect x="640" y="152" width="40" height="60" rx="6" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
    <text x="660" y="188" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">h</text>
    <text x="660" y="228" text-anchor="middle" class="dim">d</text>
  </g>

  
  <g data-anim="5">
    <line x1="16" y1="338" x2="744" y2="338" class="v-grid" stroke-width="1"/>
    <text y="356" text-anchor="middle" class="eq">
      <tspan x="288" fill="var(--ink-soft)">h  =  W x</tspan><tspan x="372">+</tspan><tspan x="468" fill="var(--accent)">(α/r)·B(A x)</tspan>
    </text>
  </g>
</svg>
<figcaption><b>LoRA adds a tiny trainable low-rank path beside a frozen weight matrix.</b> The full-rank <b>W</b> (d × d) stays locked and contributes <b>Wx</b> unchanged, while the parallel adapter squeezes <b>x</b> down to rank <b>r ≪ d</b> through <b>A</b> and back up through <b>B</b>; their sum is the output <b>h</b>. Only A and B train — just <b>2dr</b> parameters versus W's <b>d²</b>, the entire source of LoRA's savings.</figcaption>
</figure>
