<figcaption><b>IVF's coarse quantizer carves the space into Voronoi cells around k-means centroids, and n_probe controls how many of those cells get scanned.</b> The query only scans its n_probe nearest cells (shaded); every other cell -- and every vector inside it -- is skipped entirely. That is the source of the approximation: a true nearest neighbor sitting just across a cell wall in an un-probed cell is missed, exactly the boundary problem the tradeoff knob controls.</figcaption>
</figure>
