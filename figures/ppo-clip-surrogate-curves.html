<figcaption><b>PPO clipped surrogate L as a function of the importance ratio r = &amp;pi;<sub>&amp;theta;</sub>/&amp;pi;<sub>old</sub>, for the two advantage-sign cases.</b> When A &gt; 0 (left), the objective rises with r until r = 1+&amp;epsilon;, then goes flat — there is no gradient incentive to push the ratio further. When A &lt; 0 (right), the objective is already flat (capped) for r &lt; 1&amp;minus;&amp;epsilon; and only descends (becomes more negative) as r grows past 1&amp;minus;&amp;epsilon;. The shaded zones mark where the clip is active and the gradient is zero, enforcing a one-sided trust region.</figcaption>
</figure>
