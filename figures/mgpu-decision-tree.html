<figure class="viz" id="fig-mgpu-decision-tree">
<style>
  #fig-mgpu-decision-tree text { font-family: var(--sans, sans-serif); fill: var(--fg, #e6e8ee); }
  #fig-mgpu-decision-tree .lbl { font: 600 14px var(--sans, sans-serif); }
  #fig-mgpu-decision-tree .outcome-txt { font: 500 13px var(--sans, sans-serif); fill: #c9f5d8; }
  #fig-mgpu-decision-tree .branch-lbl { font: 700 11px var(--sans, sans-serif); }
  #fig-mgpu-decision-tree .legend-txt { font: 500 11px var(--sans, sans-serif); }
  #fig-mgpu-decision-tree .title-txt { font: 700 18px var(--sans, sans-serif); fill: #fff; }
</style>
<svg viewBox="0 0 900 1116" role="img" aria-label="Multi-GPU inference strategy decision tree: a flowchart guiding practitioners from model size and topology through five decision points to a concrete parallelism configuration.">
  <defs>
    <marker id="dt-arrow-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 0 L5 9 L9 0 z" fill="var(--muted,#8b93a7)"/>
    </marker>
    <marker id="dt-arrow-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--ok,#22c55e)"/>
    </marker>
    <marker id="dt-arrow-down-green" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 0 L5 9 L9 0 z" fill="var(--ok,#22c55e)"/>
    </marker>
    <marker id="dt-arrow-down-accent" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 0 L5 9 L9 0 z" fill="var(--accent,#6366f1)"/>
    </marker>
  </defs>

  
  <rect x="10" y="8" width="880" height="52" rx="8"
        fill="var(--accent,#6366f1)" stroke="none"/>
  <text x="450" y="40" text-anchor="middle" class="title-txt">MULTI-GPU INFERENCE DECISION TREE</text>

  
  
  <polygon points="300,77 440,115 300,153 160,115"
           fill="var(--surface,#1e2233)" stroke="var(--border,#3a4256)" stroke-width="1.8"/>
  <text x="300" y="110" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">Model fits on</text>
  <text x="300" y="128" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">1 GPU?</text>

  
  <text x="448" y="108" class="branch-lbl" fill="var(--ok,#22c55e)">YES</text>
  
  <line x1="440" y1="115" x2="535" y2="115"
        stroke="var(--ok,#22c55e)" stroke-width="1.8" marker-end="url(#dt-arrow-right)"/>

  
  <rect x="538" y="88" width="348" height="54" rx="7"
        fill="#14321f" stroke="var(--ok,#22c55e)" stroke-width="2"/>
  <text x="712" y="110" text-anchor="middle" class="outcome-txt">Use DP replicas for throughput.</text>
  <text x="712" y="128" text-anchor="middle" class="outcome-txt">Done.</text>

  
  <text x="268" y="168" class="branch-lbl" fill="var(--muted,#8b93a7)">NO</text>
  <line x1="300" y1="153" x2="300" y2="210"
        stroke="var(--muted,#8b93a7)" stroke-width="1.8" marker-end="url(#dt-arrow-down)"/>
  <text x="308" y="185" class="branch-lbl" fill="var(--muted,#8b93a7)" font-size="10">need model parallelism</text>

  
  <polygon points="300,217 440,255 300,293 160,255"
           fill="var(--surface,#1e2233)" stroke="var(--border,#3a4256)" stroke-width="1.8"/>
  <text x="300" y="248" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">Model fits in 1 NVLink</text>
  <text x="300" y="266" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">island? (e.g., 8×H100)</text>

  
  <text x="448" y="248" class="branch-lbl" fill="var(--ok,#22c55e)">YES</text>
  <line x1="440" y1="255" x2="535" y2="255"
        stroke="var(--ok,#22c55e)" stroke-width="1.8" marker-end="url(#dt-arrow-right)"/>

  
  <rect x="538" y="228" width="348" height="54" rx="7"
        fill="#14321f" stroke="var(--ok,#22c55e)" stroke-width="2"/>
  <text x="712" y="250" text-anchor="middle" class="outcome-txt">Start with TP=8, PP=1.</text>
  <text x="712" y="268" text-anchor="middle" class="outcome-txt" font-size="11"> </text>

  
  <text x="268" y="308" class="branch-lbl" fill="var(--muted,#8b93a7)">NO</text>
  <line x1="300" y1="293" x2="300" y2="336"
        stroke="var(--muted,#8b93a7)" stroke-width="1.8" marker-end="url(#dt-arrow-down)"/>

  
  <rect x="110" y="338" width="380" height="46" rx="7"
        fill="var(--surface-3,#252c3e)" stroke="var(--accent,#6366f1)" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="300" y="357" text-anchor="middle" class="outcome-txt" fill="var(--fg,#e6e8ee)">Use TP=8 per node +</text>
  <text x="300" y="375" text-anchor="middle" class="outcome-txt" fill="var(--fg,#e6e8ee)">PP across nodes.</text>

  
  <line x1="300" y1="384" x2="300" y2="424"
        stroke="var(--muted,#8b93a7)" stroke-width="1.8" marker-end="url(#dt-arrow-down)"/>

  
  <polygon points="300,424 440,460 300,496 160,460"
           fill="var(--surface,#1e2233)" stroke="var(--border,#3a4256)" stroke-width="1.8"/>
  <text x="300" y="453" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">Is it a</text>
  <text x="300" y="471" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">MoE model?</text>

  
  <text x="448" y="453" class="branch-lbl" fill="var(--ok,#22c55e)">YES</text>
  <line x1="440" y1="460" x2="535" y2="460"
        stroke="var(--ok,#22c55e)" stroke-width="1.8" marker-end="url(#dt-arrow-right)"/>

  
  <rect x="538" y="428" width="348" height="64" rx="7"
        fill="#14321f" stroke="var(--ok,#22c55e)" stroke-width="2"/>
  <text x="712" y="450" text-anchor="middle" class="outcome-txt">Add EP: EP=G within or across nodes.</text>
  <text x="712" y="468" text-anchor="middle" class="outcome-txt">Tune EP so each GPU has &gt;=2 experts.</text>
  <text x="712" y="484" text-anchor="middle" class="outcome-txt" font-size="10"> </text>

  
  <text x="268" y="510" class="branch-lbl" fill="var(--muted,#8b93a7)">NO</text>
  <line x1="300" y1="496" x2="300" y2="548"
        stroke="var(--muted,#8b93a7)" stroke-width="1.8" marker-end="url(#dt-arrow-down)"/>

  
  <polygon points="300,556 440,600 300,644 160,600"
           fill="var(--surface,#1e2233)" stroke="var(--border,#3a4256)" stroke-width="1.8"/>
  <text x="300" y="591" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">Latency-critical?</text>
  <text x="300" y="609" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">(TTFT &lt;500ms, TPOT &lt;50ms)</text>

  
  <text x="448" y="591" class="branch-lbl" fill="var(--ok,#22c55e)">YES</text>
  <line x1="440" y1="600" x2="535" y2="600"
        stroke="var(--ok,#22c55e)" stroke-width="1.8" marker-end="url(#dt-arrow-right)"/>

  
  <rect x="538" y="568" width="348" height="64" rx="7"
        fill="#14321f" stroke="var(--ok,#22c55e)" stroke-width="2"/>
  <text x="712" y="592" text-anchor="middle" class="outcome-txt">Maximize TP, minimize PP,</text>
  <text x="712" y="610" text-anchor="middle" class="outcome-txt">avoid wide-EP.</text>

  
  <text x="268" y="660" class="branch-lbl" fill="var(--muted,#8b93a7)">NO</text>
  <line x1="300" y1="644" x2="300" y2="690"
        stroke="var(--muted,#8b93a7)" stroke-width="1.8" marker-end="url(#dt-arrow-down)"/>

  
  <rect x="110" y="692" width="380" height="46" rx="7"
        fill="var(--surface-3,#252c3e)" stroke="var(--accent,#6366f1)" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="300" y="711" text-anchor="middle" class="outcome-txt" fill="var(--fg,#e6e8ee)">Can sacrifice latency; add</text>
  <text x="300" y="729" text-anchor="middle" class="outcome-txt" fill="var(--fg,#e6e8ee)">PP + DP for throughput.</text>

  
  <line x1="300" y1="738" x2="300" y2="778"
        stroke="var(--muted,#8b93a7)" stroke-width="1.8" marker-end="url(#dt-arrow-down)"/>

  
  <polygon points="300,784 440,820 300,856 160,820"
           fill="var(--surface,#1e2233)" stroke="var(--border,#3a4256)" stroke-width="1.8"/>
  <text x="300" y="813" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">High throughput required?</text>
  <text x="300" y="831" text-anchor="middle" class="lbl" fill="var(--accent,#6366f1)">(10k+ tokens/sec)</text>

  
  <text x="448" y="813" class="branch-lbl" fill="var(--ok,#22c55e)">YES</text>
  <line x1="440" y1="820" x2="535" y2="820"
        stroke="var(--ok,#22c55e)" stroke-width="1.8" marker-end="url(#dt-arrow-right)"/>

  
  <rect x="538" y="793" width="348" height="54" rx="7"
        fill="#14321f" stroke="var(--ok,#22c55e)" stroke-width="2"/>
  <text x="712" y="815" text-anchor="middle" class="outcome-txt">Add DP replicas until</text>
  <text x="712" y="833" text-anchor="middle" class="outcome-txt">throughput SLO met.</text>

  
  <text x="268" y="870" class="branch-lbl" fill="var(--muted,#8b93a7)">NO</text>
  <line x1="300" y1="856" x2="300" y2="904"
        stroke="var(--muted,#8b93a7)" stroke-width="1.8" marker-end="url(#dt-arrow-down)"/>

  
  <rect x="168" y="906" width="264" height="48" rx="7"
        fill="var(--surface,#1e2233)" stroke="var(--border,#3a4256)" stroke-width="1.8"/>
  <text x="300" y="926" text-anchor="middle" class="lbl" fill="var(--fg,#e6e8ee)">Done — deploy</text>
  <text x="300" y="944" text-anchor="middle" class="lbl" fill="var(--fg,#e6e8ee)">chosen config.</text>

  
  <rect x="10" y="1000" width="880" height="102" rx="6"
        fill="var(--surface,#1e2233)" stroke="var(--border,#3a4256)" stroke-width="1"/>
  <text x="450" y="1020" text-anchor="middle" class="legend-txt" fill="var(--muted,#8b93a7)">LEGEND</text>

  
  
  <polygon points="150,1060 175,1045 200,1060 175,1075"
           fill="var(--surface,#1e2233)" stroke="var(--accent,#6366f1)" stroke-width="1.8"/>
  <text x="175" y="1062" text-anchor="middle" class="legend-txt" fill="var(--accent,#6366f1)">?</text>
  <text x="175" y="1090" text-anchor="middle" class="legend-txt" fill="var(--fg,#e6e8ee)">Decision point</text>

  
  <rect x="396" y="1045" width="108" height="28" rx="5"
        fill="#14321f" stroke="var(--ok,#22c55e)" stroke-width="1.8"/>
  <text x="450" y="1063" text-anchor="middle" class="legend-txt" fill="#c9f5d8">Outcome</text>
  <text x="450" y="1090" text-anchor="middle" class="legend-txt" fill="var(--fg,#e6e8ee)">Recommended action / terminal</text>

  
  <rect x="666" y="1045" width="108" height="28" rx="5"
        fill="var(--surface-3,#252c3e)" stroke="var(--accent,#6366f1)" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="720" y="1063" text-anchor="middle" class="legend-txt" fill="var(--fg,#e6e8ee)">Action</text>
  <text x="720" y="1090" text-anchor="middle" class="legend-txt" fill="var(--fg,#e6e8ee)">Continue / routing step</text>
</svg>
<figcaption><b>Multi-GPU inference strategy decision tree.</b> Starting from whether the model fits on a single GPU, five sequential decision points route a practitioner to the appropriate combination of tensor parallelism (TP), pipeline parallelism (PP), expert parallelism (EP), and data parallelism (DP). Each green box is a terminal recommendation; dashed boxes are intermediate routing actions that feed into the next question.</figcaption>
</figure>
