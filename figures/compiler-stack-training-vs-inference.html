<figure class="viz" id="fig-compiler-stack-training-vs-inference">
<svg viewBox="0 0 760 440" role="img" aria-label="Compiler stack comparison: Training uses torch.compile with Dynamo and Inductor, FSDP/ZeRO, and mixed precision, all feeding into AOTAutograd joint forward+backward graph. Inference offers three alternative stacks: torch.compile with CUDA graphs, TensorRT-LLM, or vLLM without compilation, all leading to static graph capture and engine build.">
  <defs>
    <marker id="cs-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--border-2,#94a3b8)"/>
    </marker>
  </defs>
  <style>
    #fig-compiler-stack-training-vs-inference text { fill: var(--ink-soft,#1a1a1a); }
    #fig-compiler-stack-training-vs-inference .header { font: 700 15px var(--sans,sans-serif); }
    #fig-compiler-stack-training-vs-inference .item { font: 600 12px var(--sans,sans-serif); }
    #fig-compiler-stack-training-vs-inference .item-sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-compiler-stack-training-vs-inference .or-sep { font: 600 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
    #fig-compiler-stack-training-vs-inference .term-title { font: 600 13px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
    #fig-compiler-stack-training-vs-inference .term-sub { font: 400 11px var(--sans,sans-serif); fill: var(--accent2,#3b82f6); }
    #fig-compiler-stack-training-vs-inference .divider { stroke: var(--border-2,#94a3b8); stroke-width: 1; stroke-dasharray: 4 4; }
  </style>

  
  <line x1="380" y1="10" x2="380" y2="430" class="divider"/>

  
  <text x="190" y="34" text-anchor="middle" class="header">Training</text>
  <text x="570" y="34" text-anchor="middle" class="header">Inference</text>

  
  
  <rect x="30" y="50" width="320" height="190" rx="8" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"/>
  
  <rect x="30" y="50" width="6" height="190" rx="3" fill="var(--accent2,#3b82f6)" fill-opacity="0.5"/>

  
  <text x="190" y="90" text-anchor="middle" class="item">torch.compile</text>
  <text x="190" y="108" text-anchor="middle" class="item-sub">(TorchDynamo + TorchInductor)</text>
  
  <line x1="50" y1="118" x2="340" y2="118" stroke="var(--border-2,#94a3b8)" stroke-width="0.6" stroke-dasharray="2 3"/>
  <text x="190" y="136" text-anchor="middle" class="item">+ FSDP / ZeRO</text>
  <text x="190" y="152" text-anchor="middle" class="item-sub">(distributed sharding)</text>
  <line x1="50" y1="162" x2="340" y2="162" stroke="var(--border-2,#94a3b8)" stroke-width="0.6" stroke-dasharray="2 3"/>
  <text x="190" y="180" text-anchor="middle" class="item">+ Mixed precision</text>
  <text x="190" y="196" text-anchor="middle" class="item-sub">(BF16 / FP8 AMP)</text>
  
  <text x="190" y="232" text-anchor="middle" class="or-sep">[components stack additively]</text>

  
  <line x1="190" y1="240" x2="190" y2="298" stroke="var(--border-2,#94a3b8)" stroke-width="2" marker-end="url(#cs-arrow)"/>

  
  <rect x="60" y="300" width="260" height="86" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
  <text x="190" y="334" text-anchor="middle" class="term-title">AOTAutograd</text>
  <text x="190" y="354" text-anchor="middle" class="term-sub">(joint fwd + bwd graph)</text>
  <text x="190" y="372" text-anchor="middle" class="term-sub">cross-boundary fusion</text>

  
  
  <rect x="410" y="50" width="320" height="190" rx="8" fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#94a3b8)" stroke-width="1.8"/>

  
  <text x="570" y="85" text-anchor="middle" class="item">torch.compile + CUDA graphs</text>
  <text x="570" y="100" text-anchor="middle" class="item-sub">(PyTorch-native path)</text>

  
  <line x1="425" y1="110" x2="715" y2="110" stroke="var(--muted,#64748b)" stroke-width="0.8"/>
  <text x="570" y="123" text-anchor="middle" class="or-sep">— OR —</text>
  <line x1="425" y1="130" x2="715" y2="130" stroke="var(--muted,#64748b)" stroke-width="0.8"/>

  <text x="570" y="148" text-anchor="middle" class="item">TensorRT-LLM</text>
  <text x="570" y="163" text-anchor="middle" class="item-sub">(NVIDIA, aggressive engine build)</text>

  
  <line x1="425" y1="172" x2="715" y2="172" stroke="var(--muted,#64748b)" stroke-width="0.8"/>
  <text x="570" y="185" text-anchor="middle" class="or-sep">— OR —</text>
  <line x1="425" y1="192" x2="715" y2="192" stroke="var(--muted,#64748b)" stroke-width="0.8"/>

  <text x="570" y="210" text-anchor="middle" class="item">vLLM (no compile)</text>
  <text x="570" y="232" text-anchor="middle" class="or-sep">[alternatives — pick one]</text>

  
  <line x1="570" y1="240" x2="570" y2="298" stroke="var(--border-2,#94a3b8)" stroke-width="2" marker-end="url(#cs-arrow)"/>

  
  <rect x="440" y="300" width="260" height="86" rx="8" fill="var(--accent2,#3b82f6)" fill-opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
  <text x="570" y="334" text-anchor="middle" class="term-title">Static graph capture</text>
  <text x="570" y="354" text-anchor="middle" class="term-sub">+ engine build</text>
  <text x="570" y="372" text-anchor="middle" class="term-sub">fixed-shape, max throughput</text>

</svg>
<figcaption><b>Training and inference use different compiler stacks with different composition models.</b> In training (left), torch.compile, FSDP/ZeRO, and mixed precision stack additively on the same model, and AOTAutograd produces a joint forward+backward graph enabling cross-boundary kernel fusion. In inference (right), the stacks are mutually exclusive alternatives — each trades flexibility for throughput differently — all targeting a statically-captured, engine-built graph optimized for a fixed serving shape.</figcaption>
</figure>
