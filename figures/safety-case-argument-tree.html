<figure class="viz" id="fig-safety-case-argument-tree">
<svg viewBox="0 0 860 560" role="img" aria-label="Argument tree for an AI safety case: a root claim that catastrophic harm probability is below acceptable threshold is supported by at least one of three branches — Inability, Control, or Trustworthiness — arranged left to right by increasing trust required, with a trend arrow indicating the load-bearing argument migrates from Inability through Control to Trustworthiness as capabilities scale.">
<defs>
  <marker id="scat-arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)"/>
  </marker>
  <marker id="scat-arrow-acc" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
  </marker>
</defs>
<style>
  #fig-safety-case-argument-tree text   { fill: var(--ink-soft); }
  #fig-safety-case-argument-tree .sm    { font: 400 9.3px var(--sans, sans-serif); }
  #fig-safety-case-argument-tree .smb   { font: 700 9.3px var(--sans, sans-serif); }
  #fig-safety-case-argument-tree .hdr   { font: 700 13px var(--sans, sans-serif); fill: #fff; }
  #fig-safety-case-argument-tree .foot  { font: 400 9px var(--sans, sans-serif); font-style: italic; fill: var(--muted); }
  #fig-safety-case-argument-tree .root-lbl { font: 700 13.5px var(--sans, sans-serif); }
  #fig-safety-case-argument-tree .root-sub { font: 400 11px var(--sans, sans-serif); }
  #fig-safety-case-argument-tree .trend { font: 600 11px var(--sans, sans-serif); fill: var(--accent); }
  #fig-safety-case-argument-tree .cap   { font: 400 10.5px var(--sans, sans-serif); fill: var(--muted); }
  #fig-safety-case-argument-tree .or-lbl { font: 500 10px var(--sans,sans-serif); font-style: italic; fill: var(--muted); }
</style>


<rect x="76" y="24" width="708" height="62" rx="7"
      fill="var(--accent)" fill-opacity="0.14"
      stroke="var(--accent)" stroke-width="2"/>
<text x="430" y="47" text-anchor="middle" class="root-lbl">CLAIM</text>
<text x="430" y="65" text-anchor="middle" class="root-sub">P(catastrophic harm from M on task T) &lt; acceptable threshold</text>

<line x1="430" y1="86" x2="430" y2="104" stroke="var(--ink-soft)" stroke-width="1.6"/>
<text x="430" y="101" text-anchor="middle" class="or-lbl">supported by AT LEAST ONE of:</text>

<line x1="188" y1="112" x2="672" y2="112" stroke="var(--ink-soft)" stroke-width="1.6"/>
<line x1="188" y1="112" x2="188" y2="150" stroke="var(--ink-soft)" stroke-width="1.6" marker-end="url(#scat-arrow)"/>
<line x1="430" y1="112" x2="430" y2="150" stroke="var(--ink-soft)" stroke-width="1.6" marker-end="url(#scat-arrow)"/>
<line x1="672" y1="112" x2="672" y2="150" stroke="var(--ink-soft)" stroke-width="1.6" marker-end="url(#scat-arrow)"/>


<rect x="76" y="152" width="224" height="300" rx="7" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.4"/>
<rect x="76" y="152" width="224" height="30" rx="7" fill="var(--good,#2f9e6e)"/>
<rect x="76" y="170" width="224" height="12" fill="var(--good,#2f9e6e)"/>
<text x="188" y="172" text-anchor="middle" class="hdr">INABILITY</text>

<text x="92" y="204" class="smb">The model CANNOT</text>
<text x="92" y="217" class="smb">cause harm X</text>
<text x="92" y="230" class="sm">-- it lacks the</text>
<text x="92" y="243" class="sm">capability.</text>

<line x1="92" y1="254" x2="284" y2="254" stroke="var(--border-2)" stroke-width="0.8"/>

<text x="92" y="270" class="smb">Demonstrated by:</text>
<text x="92" y="283" class="sm">Dangerous-capability</text>
<text x="92" y="296" class="sm">evals under strong</text>
<text x="92" y="309" class="sm">elicitation with a</text>
<text x="92" y="322" class="sm">safety buffer.</text>

<line x1="92" y1="333" x2="284" y2="333" stroke="var(--border-2)" stroke-width="0.8"/>

<text x="188" y="349" text-anchor="middle" class="foot">Strongest when it</text>
<text x="188" y="362" text-anchor="middle" class="foot">holds, but expires</text>
<text x="188" y="375" text-anchor="middle" class="foot">as M scales.</text>


<rect x="318" y="152" width="224" height="300" rx="7" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.4"/>
<rect x="318" y="152" width="224" height="30" rx="7" fill="var(--warn,#e0a106)"/>
<rect x="318" y="170" width="224" height="12" fill="var(--warn,#e0a106)"/>
<text x="430" y="172" text-anchor="middle" class="hdr">CONTROL</text>

<text x="334" y="204" class="smb">The model MIGHT be</text>
<text x="334" y="217" class="smb">able &amp; willing --</text>
<text x="334" y="230" class="sm">but the protocol</text>
<text x="334" y="243" class="sm">stops it from</text>
<text x="334" y="256" class="sm">succeeding.</text>

<line x1="334" y1="267" x2="526" y2="267" stroke="var(--border-2)" stroke-width="0.8"/>

<text x="334" y="283" class="smb">Demonstrated by:</text>
<text x="334" y="296" class="sm">Trusted monitoring +</text>
<text x="334" y="309" class="sm">human audit +</text>
<text x="334" y="322" class="sm">restricted actions,</text>
<text x="334" y="335" class="sm">validated by</text>
<text x="334" y="348" class="sm">red-team/blue-team</text>
<text x="334" y="361" class="sm">evals.</text>

<line x1="334" y1="372" x2="526" y2="372" stroke="var(--border-2)" stroke-width="0.8"/>

<text x="430" y="388" text-anchor="middle" class="foot">The near-term</text>
<text x="430" y="401" text-anchor="middle" class="foot">workhorse -- buys</text>
<text x="430" y="414" text-anchor="middle" class="foot">margin in transition.</text>


<rect x="560" y="152" width="224" height="300" rx="7" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.4"/>
<rect x="560" y="152" width="224" height="46" rx="7" fill="var(--accent)"/>
<rect x="560" y="182" width="224" height="16" fill="var(--accent)"/>
<text x="672" y="172" text-anchor="middle" class="hdr">TRUSTWORTHINESS</text>
<text x="672" y="188" text-anchor="middle" class="hdr">/ ALIGNMENT</text>

<text x="576" y="218" class="smb">The model WILL NOT</text>
<text x="576" y="231" class="smb">try to cause harm X</text>
<text x="576" y="244" class="sm">-- it is aligned.</text>

<line x1="576" y1="255" x2="768" y2="255" stroke="var(--border-2)" stroke-width="0.8"/>

<text x="576" y="271" class="smb">Demonstrated by:</text>
<text x="576" y="284" class="sm">Scalable-oversight</text>
<text x="576" y="297" class="sm">training +</text>
<text x="576" y="310" class="sm">faithfulness audits +</text>
<text x="576" y="323" class="sm">no scheming on</text>
<text x="576" y="336" class="sm">deception evals.</text>

<line x1="576" y1="347" x2="768" y2="347" stroke="var(--border-2)" stroke-width="0.8"/>

<text x="672" y="363" text-anchor="middle" class="foot">Most desirable,</text>
<text x="672" y="376" text-anchor="middle" class="foot">hardest to prove --</text>
<text x="672" y="389" text-anchor="middle" class="foot">the real goal.</text>


<line x1="100" y1="480" x2="760" y2="480"
      stroke="var(--accent)" stroke-width="2.2"
      marker-end="url(#scat-arrow-acc)"/>
<text x="430" y="472" text-anchor="middle" class="trend">increasing trust required</text>

<text x="430" y="502" text-anchor="middle" class="cap">As capabilities rise, the load-bearing argument migrates:</text>
<text x="430" y="518" text-anchor="middle" class="cap">inability  --&gt;  control  --&gt;  trustworthiness.</text>
</svg>
<figcaption><b>The safety case: three alternative load-bearing arguments for deployment.</b> A frontier safety case must establish that the probability of catastrophic harm is acceptably low via <em>at least one</em> of three arguments — Inability (the model cannot cause harm X), Control (it might be capable but the deployment protocol prevents success), or Trustworthiness (it is aligned and will not try). As model capabilities scale, inability expires first, making control the near-term workhorse, while trustworthiness — backed by scalable oversight and interpretability — is the long-term goal.</figcaption>
</figure>
