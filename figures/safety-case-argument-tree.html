<figure class="viz" id="fig-safety-case-argument-tree">
<svg viewBox="0 0 860 580" role="img" aria-label="Argument tree for an AI safety case: a root claim that catastrophic harm probability is below acceptable threshold is supported by at least one of three branches — Inability, Control, or Trustworthiness — arranged left to right by increasing trust required, with a trend arrow indicating the load-bearing argument migrates from Inability through Control to Trustworthiness as capabilities scale.">
<defs>
  <marker id="scat-arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#475569)"/>
  </marker>
  <marker id="scat-arrow-acc" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6366f1)"/>
  </marker>
</defs>
<style>
  #fig-safety-case-argument-tree text   { fill: var(--ink-soft, #1e293b); }
  #fig-safety-case-argument-tree .sm    { font: 400 9.8px var(--sans, sans-serif); }
  #fig-safety-case-argument-tree .smb   { font: 700 9.8px var(--sans, sans-serif); }
  #fig-safety-case-argument-tree .hdr   { font: 700 13px var(--sans, sans-serif); fill: #fff; }
  #fig-safety-case-argument-tree .foot  { font: 400 9.5px var(--sans, sans-serif); font-style: italic; fill: var(--muted,#64748b); }
  #fig-safety-case-argument-tree .root-lbl { font: 700 13.5px var(--sans, sans-serif); }
  #fig-safety-case-argument-tree .root-sub { font: 400 11px var(--sans, sans-serif); }
  #fig-safety-case-argument-tree .trend { font: 600 11px var(--sans, sans-serif); fill: var(--accent,#6366f1); }
  #fig-safety-case-argument-tree .cap   { font: 400 10.5px var(--sans, sans-serif); fill: var(--muted,#475569); }
  #fig-safety-case-argument-tree .or-lbl { font: 500 10px var(--sans,sans-serif); font-style: italic; fill: var(--muted,#475569); }
</style>


<rect x="125" y="24" width="610" height="62" rx="7"
      fill="var(--accent,#6366f1)" fill-opacity="0.12"
      stroke="var(--accent,#6366f1)" stroke-width="2"/>
<text x="430" y="47" text-anchor="middle" class="root-lbl">CLAIM</text>
<text x="430" y="65" text-anchor="middle" class="root-sub">P(catastrophic harm from M on task T) &lt; acceptable threshold</text>


<line x1="430" y1="86" x2="430" y2="104"
      stroke="var(--ink-soft,#475569)" stroke-width="1.6"/>

<text x="430" y="101" text-anchor="middle" class="or-lbl">supported by AT LEAST ONE of:</text>

<line x1="208" y1="112" x2="652" y2="112"
      stroke="var(--ink-soft,#475569)" stroke-width="1.6"/>

<line x1="208" y1="112" x2="208" y2="150"
      stroke="var(--ink-soft,#475569)" stroke-width="1.6"
      marker-end="url(#scat-arrow)"/>
<line x1="430" y1="112" x2="430" y2="150"
      stroke="var(--ink-soft,#475569)" stroke-width="1.6"
      marker-end="url(#scat-arrow)"/>
<line x1="652" y1="112" x2="652" y2="150"
      stroke="var(--ink-soft,#475569)" stroke-width="1.6"
      marker-end="url(#scat-arrow)"/>


<rect x="108" y="152" width="200" height="268" rx="7"
      fill="var(--surface,#fff)"
      stroke="var(--border-2,#cbd5e1)" stroke-width="1.4"/>

<rect x="108" y="152" width="200" height="30" rx="7"
      fill="var(--good,#10b981)"/>
<rect x="108" y="170" width="200" height="12" fill="var(--good,#10b981)"/>
<text x="208" y="172" text-anchor="middle" class="hdr">INABILITY</text>


<text x="120" y="199" class="smb">The model CANNOT</text>
<text x="120" y="213" class="smb">cause harm X</text>
<text x="120" y="227" class="sm">— it lacks the capability.</text>

<line x1="120" y1="236" x2="296" y2="236" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>

<text x="120" y="251" class="smb">Demonstrated by:</text>
<text x="120" y="265" class="sm">Dangerous-capability evals</text>
<text x="120" y="279" class="sm">under strong elicitation</text>
<text x="120" y="293" class="sm">with a safety buffer.</text>

<line x1="120" y1="304" x2="296" y2="304" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>

<text x="208" y="320" text-anchor="middle" class="foot">Strongest when it holds —</text>
<text x="208" y="334" text-anchor="middle" class="foot">but expires as M scales.</text>


<rect x="330" y="152" width="200" height="268" rx="7"
      fill="var(--surface,#fff)"
      stroke="var(--border-2,#cbd5e1)" stroke-width="1.4"/>
<rect x="330" y="152" width="200" height="30" rx="7"
      fill="var(--warn,#f59e0b)"/>
<rect x="330" y="170" width="200" height="12" fill="var(--warn,#f59e0b)"/>
<text x="430" y="172" text-anchor="middle" class="hdr">CONTROL</text>

<text x="342" y="199" class="smb">The model MIGHT be able</text>
<text x="342" y="213" class="smb">&amp; willing — but the</text>
<text x="342" y="227" class="sm">protocol stops it from</text>
<text x="342" y="241" class="sm">succeeding.</text>

<line x1="342" y1="250" x2="518" y2="250" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>

<text x="342" y="265" class="smb">Demonstrated by:</text>
<text x="342" y="279" class="sm">Trusted monitoring +</text>
<text x="342" y="293" class="sm">human audit + restricted</text>
<text x="342" y="307" class="sm">actions, validated by</text>
<text x="342" y="321" class="sm">red-team/blue-team evals.</text>

<line x1="342" y1="332" x2="518" y2="332" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>

<text x="430" y="348" text-anchor="middle" class="foot">The near-term workhorse —</text>
<text x="430" y="361" text-anchor="middle" class="foot">buys margin in transition.</text>


<rect x="552" y="152" width="200" height="268" rx="7"
      fill="var(--surface,#fff)"
      stroke="var(--border-2,#cbd5e1)" stroke-width="1.4"/>
<rect x="552" y="152" width="200" height="42" rx="7"
      fill="var(--accent,#6366f1)"/>
<rect x="552" y="182" width="200" height="12" fill="var(--accent,#6366f1)"/>
<text x="652" y="172" text-anchor="middle" class="hdr">TRUSTWORTHINESS</text>
<text x="652" y="187" text-anchor="middle" class="hdr">/ ALIGNMENT</text>

<text x="564" y="213" class="smb">The model WILL NOT try</text>
<text x="564" y="227" class="smb">to cause harm X</text>
<text x="564" y="241" class="sm">— it is aligned.</text>

<line x1="564" y1="250" x2="740" y2="250" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>

<text x="564" y="265" class="smb">Demonstrated by:</text>
<text x="564" y="279" class="sm">Scalable-oversight training</text>
<text x="564" y="293" class="sm">+ faithfulness audits +</text>
<text x="564" y="307" class="sm">no scheming on deception</text>
<text x="564" y="321" class="sm">evals.</text>

<line x1="564" y1="332" x2="740" y2="332" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>

<text x="652" y="348" text-anchor="middle" class="foot">Most desirable, hardest</text>
<text x="652" y="361" text-anchor="middle" class="foot">to prove — the real goal.</text>


<line x1="148" y1="455" x2="718" y2="455"
      stroke="var(--accent,#6366f1)" stroke-width="2.2"
      marker-end="url(#scat-arrow-acc)"/>
<text x="430" y="447" text-anchor="middle" class="trend">increasing trust required</text>


<text x="430" y="480" text-anchor="middle" class="cap">As capabilities rise, the load-bearing argument migrates:</text>
<text x="430" y="496" text-anchor="middle" class="cap">inability  --&gt;  control  --&gt;  trustworthiness.</text>
</svg>
<figcaption><b>The safety case: three alternative load-bearing arguments for deployment.</b> A frontier safety case must establish that the probability of catastrophic harm is acceptably low via <em>at least one</em> of three arguments — Inability (the model cannot cause harm X), Control (it might be capable but the deployment protocol prevents success), or Trustworthiness (it is aligned and will not try). As model capabilities scale, inability expires first, making control the near-term workhorse, while trustworthiness — backed by scalable oversight and interpretability — is the long-term goal.</figcaption>
</figure>
