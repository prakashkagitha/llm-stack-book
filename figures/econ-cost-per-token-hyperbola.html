<figure class="viz" id="fig-econ-cost-per-token-hyperbola">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 860 460" role="img" aria-label="Hyperbola chart of cost per million output tokens versus sustained throughput: cost starts high at low throughput and falls steeply then flattens as throughput rises, with a low-traffic point near 550 tokens per second at about 10 dollars and a saturated point near 1800 tokens per second at about 3 dollars.">
  <defs>
    <marker id="ecph-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-econ-cost-per-token-hyperbola .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-econ-cost-per-token-hyperbola .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-econ-cost-per-token-hyperbola .lbl{ font:700 12.5px var(--sans,sans-serif); }
    #fig-econ-cost-per-token-hyperbola .sub{ font:500 10.5px var(--sans,sans-serif); }
    #fig-econ-cost-per-token-hyperbola .tick{ font:500 10.5px var(--mono,monospace); }
    #fig-econ-cost-per-token-hyperbola .note{ font:600 11px var(--sans,sans-serif); }
    #fig-econ-cost-per-token-hyperbola .eq{ font:700 12.5px var(--mono,monospace); }
    #fig-econ-cost-per-token-hyperbola text{ fill: var(--ink-soft); }
    #fig-econ-cost-per-token-hyperbola .dim{ fill: var(--muted); }
  </style>

  <text x="430" y="24" text-anchor="middle" class="ttl">Fixed rent, variable throughput: cost per token is a hyperbola</text>

  
  <g data-anim="1">
    <line x1="95" y1="46" x2="95" y2="352" class="v-stroke" stroke-width="1.6" marker-start="url(#ecph-arrow)"/>
    <line x1="95" y1="352" x2="820" y2="352" class="v-stroke" stroke-width="1.6" marker-end="url(#ecph-arrow)"/>
    <text x="34" y="199" class="ax" text-anchor="middle" transform="rotate(-90 34 199)">cost per 1M output tokens ($)</text>
    <text x="460" y="420" class="ax" text-anchor="middle">sustained output throughput (tokens/s per node)</text>
  </g>

  
  <g data-anim="2">
    <rect x="95" y="46" width="290" height="306" fill="var(--warn)" opacity="0.08"/>
    <rect x="385" y="46" width="435" height="306" fill="var(--good)" opacity="0.07"/>
    <text x="150" y="330" class="sub" text-anchor="middle" fill="var(--warn)">half-empty GPU: expensive</text>
    <text x="480" y="66" class="sub" text-anchor="middle" fill="var(--good)">cost-efficient / high utilization</text>
  </g>

  
  <g data-anim="3">
    <path d="M 110 58
             C 150 75, 190 105, 230 133
             C 290 178, 350 205, 400 222
             C 460 242, 550 268, 631 286
             C 700 300, 760 320, 812 335"
          fill="none" class="viz-draw v-accent-s" style="--len:900" stroke="var(--accent)" stroke-width="3.4" stroke-linecap="round"/>
  </g>

  
  <g data-anim="2">
    <rect x="605" y="54" width="205" height="52" rx="7" class="v-fill" stroke="var(--accent)" stroke-width="1.5"/>
    <text x="707" y="73" class="eq" text-anchor="middle" fill="var(--accent)">$/1M = R &#215; 1e6</text>
    <text x="707" y="89" class="eq" text-anchor="middle" fill="var(--accent)">/ (T &#215; 3600)</text>
    <text x="707" y="102" class="sub dim" text-anchor="middle">rent R fixed</text>
  </g>

  
  <g data-anim="4">
    <line x1="230" y1="133" x2="230" y2="352" stroke="var(--warn)" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>
    <line x1="95" y1="133" x2="230" y2="133" stroke="var(--warn)" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>
    <circle cx="230" cy="133" r="7" fill="var(--warn)"/>
    <circle cx="230" cy="133" r="12" fill="none" stroke="var(--warn)" stroke-width="1.4" class="viz-pulse" opacity="0.6"/>
    <text x="230" y="370" class="tick" text-anchor="middle">550</text>
    <rect x="130" y="50" width="190" height="44" rx="6" class="v-fill" stroke="var(--warn)" stroke-width="1.4"/>
    <text x="225" y="68" class="note" text-anchor="middle" fill="var(--warn)">batch 4 (idle GPU):</text>
    <text x="225" y="84" class="note" text-anchor="middle" fill="var(--warn)">&#126;$10 / 1M tokens</text>
  </g>

  
  <g data-anim="5">
    <line x1="631" y1="286" x2="631" y2="352" stroke="var(--good)" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>
    <line x1="95" y1="286" x2="631" y2="286" stroke="var(--good)" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
    <circle cx="631" cy="286" r="7" fill="var(--good)"/>
    <circle cx="631" cy="286" r="12" fill="none" stroke="var(--good)" stroke-width="1.4" class="viz-pulse" opacity="0.6"/>
    <text x="631" y="370" class="tick" text-anchor="middle">1800</text>
    <rect x="540" y="196" width="195" height="44" rx="6" class="v-fill" stroke="var(--good)" stroke-width="1.4"/>
    <text x="637" y="214" class="note" text-anchor="middle" fill="var(--good)">batch 32 (saturated):</text>
    <text x="637" y="230" class="note" text-anchor="middle" fill="var(--good)">&#126;$3 / 1M tokens</text>
  </g>

  
  <g data-anim="5">
    <path d="M230 133 L230 322 L631 322 L631 286" fill="none" stroke="var(--ink-soft)" stroke-width="1.2" stroke-dasharray="2 4" opacity="0.6"/>
    <rect x="325" y="304" width="210" height="36" rx="6" class="v-fill" stroke="var(--border-2)" stroke-width="1.2"/>
    <text x="430" y="326" class="note" text-anchor="middle">&#126;1/8 the traffic -&gt; &#126;3x the cost/token</text>
  </g>

  
  <g data-anim="1">
    <rect x="95" y="380" width="725" height="4" class="v-grid" opacity="0.4"/>
    <text x="95" y="398" class="sub dim" text-anchor="start">batch small</text>
    <text x="820" y="398" class="sub dim" text-anchor="end">batch -&gt; B* (saturated)</text>
  </g>

  <text x="820" y="444" text-anchor="end" class="sub dim">rent per hour is constant; only throughput moves you along the curve. Numbers illustrative (4xH100 node, &#126;$20/hr).</text>
</svg>
<figcaption><b>Because rent is fixed, cost per token is purely the inverse of sustained throughput.</b> Running below saturation slides you up the steep part of the hyperbola, which is why low utilization multiplies cost: the chapter's own numbers move from ~$10/1M tokens at batch 4 to ~$3/1M tokens at batch 32 &amp;mdash; roughly 1/8th the traffic, roughly 3x the cost.</figcaption>
</figure>
