<figure class="viz" id="fig-curse-distance-concentration">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 470" role="img" aria-label="At low dimension the histogram of query-to-point distances is wide, so the nearest and farthest points are clearly different; at high dimension the histogram collapses into a narrow spike, so all points are nearly equidistant and tree-based pruning fails.">
  <style>
    #fig-curse-distance-concentration text{ fill: var(--ink-soft); }
    #fig-curse-distance-concentration .ttl{ font:700 12.5px var(--sans,sans-serif); }
    #fig-curse-distance-concentration .panel-ttl{ font:700 12px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-curse-distance-concentration .lbl{ font:600 10px var(--sans,sans-serif); }
    #fig-curse-distance-concentration .note{ font:500 9.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-curse-distance-concentration .mono{ font:600 10px var(--mono,monospace); }
    #fig-curse-distance-concentration .axis{ font:500 9.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-curse-distance-concentration .hist{ fill: var(--v-fill); stroke: var(--v-stroke); stroke-width: 1.2; }
    #fig-curse-distance-concentration .axline{ stroke: var(--v-grid); stroke-width: 1; }
    #fig-curse-distance-concentration .tick{ stroke: var(--v-stroke); stroke-width: 1.4; }
    #fig-curse-distance-concentration .span{ stroke: var(--accent); stroke-width: 2; fill: none; }
    #fig-curse-distance-concentration .spantxt{ font:700 10px var(--sans,sans-serif); fill: var(--accent); }
    #fig-curse-distance-concentration .strip{ fill: var(--surface-3); stroke: var(--border-2); stroke-width: 1; }
    #fig-curse-distance-concentration .striptxt{ font:500 10.3px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-curse-distance-concentration .illus{ font:500 8.7px var(--sans,sans-serif); fill: var(--muted); font-style: italic; }
  </style>

  <text x="390" y="18" text-anchor="middle" class="ttl">In high dimensions, distances concentrate: nearest and farthest points become almost equidistant</text>

  
  
  
  
  

  <g data-anim="1">
    
    <text x="145" y="42" text-anchor="middle" class="panel-ttl">d = 2</text>
    <text x="400" y="42" text-anchor="middle" class="panel-ttl">d = 100</text>
    <text x="655" y="42" text-anchor="middle" class="panel-ttl">d = 1000</text>
  </g>

  
  <g data-anim="2">
    
    <line x1="35" y1="230" x2="255" y2="230" class="axline"/>
    
    <path d="M 35,230
             L 35,225 L 48,214 L 61,196 L 74,178 L 87,158 L 100,140
             L 113,120 L 126,108 L 139,100 L 152,98 L 165,102 L 178,112
             L 191,128 L 204,148 L 217,170 L 230,192 L 243,210 L 255,222
             L 255,230 Z" class="hist"/>
    
    <line x1="52" y1="230" x2="52" y2="240" class="tick"/>
    <text x="52" y="253" text-anchor="middle" class="lbl">nearest</text>
    <text x="52" y="264" text-anchor="middle" class="mono" style="font-size:9px">dmin</text>
    
    <line x1="238" y1="230" x2="238" y2="240" class="tick"/>
    <text x="238" y="253" text-anchor="middle" class="lbl">farthest</text>
    <text x="238" y="264" text-anchor="middle" class="mono" style="font-size:9px">dmax</text>
    
    <path d="M 52,278 L 238,278" class="span" marker-start="url(#arrS)" marker-end="url(#arrS)"/>
    <text x="145" y="292" text-anchor="middle" class="spantxt">ratio dmax/dmin ~ 50x</text>
    <text x="145" y="304" text-anchor="middle" class="note">strong contrast -- NN is meaningful</text>
    <text x="145" y="316" text-anchor="middle" class="illus">(illustrative)</text>
    
    <text x="145" y="338" text-anchor="middle" class="axis">query-to-point distance -&gt;</text>
  </g>

  
  <g data-anim="3">
    <line x1="290" y1="230" x2="510" y2="230" class="axline"/>
    
    <path d="M 290,230
             L 330,229 L 350,224 L 365,208 L 378,175 L 388,135
             L 396,105 L 404,110 L 412,140 L 422,178 L 435,210
             L 450,225 L 470,229 L 510,230 Z" class="hist"/>
    <line x1="378" y1="230" x2="378" y2="240" class="tick"/>
    <text x="378" y="253" text-anchor="middle" class="lbl">nearest</text>
    <text x="378" y="264" text-anchor="middle" class="mono" style="font-size:9px">dmin</text>
    <line x1="422" y1="230" x2="422" y2="240" class="tick"/>
    <text x="422" y="253" text-anchor="middle" class="lbl">farthest</text>
    <text x="422" y="264" text-anchor="middle" class="mono" style="font-size:9px">dmax</text>
    <path d="M 378,278 L 422,278" class="span" marker-start="url(#arrS)" marker-end="url(#arrS)"/>
    <text x="400" y="292" text-anchor="middle" class="spantxt">ratio ~ 3x</text>
    <text x="400" y="304" text-anchor="middle" class="note">contrast fading</text>
    <text x="400" y="316" text-anchor="middle" class="illus">(illustrative)</text>
    <text x="400" y="338" text-anchor="middle" class="axis">query-to-point distance -&gt;</text>
  </g>

  
  <g data-anim="4">
    <line x1="545" y1="230" x2="765" y2="230" class="axline"/>
    
    <path d="M 545,230
             L 625,229 L 638,220 L 646,180 L 651,120 L 655,100
             L 659,120 L 664,180 L 672,220 L 685,229 L 765,230 Z" class="hist"/>
    <line x1="649" y1="230" x2="649" y2="240" class="tick"/>
    <line x1="661" y1="230" x2="661" y2="240" class="tick"/>
    <path d="M 649,242 L 620,250" class="axline"/>
    <path d="M 661,242 L 692,250" class="axline"/>
    <text x="608" y="257" text-anchor="middle" class="lbl">nearest</text>
    <text x="608" y="268" text-anchor="middle" class="mono" style="font-size:9px">dmin</text>
    <text x="702" y="257" text-anchor="middle" class="lbl">farthest</text>
    <text x="702" y="268" text-anchor="middle" class="mono" style="font-size:9px">dmax</text>
    <path d="M 649,282 L 661,282" class="span" marker-start="url(#arrS)" marker-end="url(#arrS)"/>
    <text x="655" y="296" text-anchor="middle" class="spantxt">ratio ~ 1.1x</text>
    <text x="655" y="304" text-anchor="middle" class="note">everything roughly equidistant</text>
    <text x="655" y="316" text-anchor="middle" class="illus">(illustrative)</text>
    <text x="655" y="338" text-anchor="middle" class="axis">query-to-point distance -&gt;</text>
  </g>

  <defs>
    <marker id="arrS" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent)"/>
    </marker>
  </defs>

  
  <g data-anim="5">
    <rect x="20" y="360" width="740" height="98" rx="8" class="strip"/>
    <text x="390" y="378" text-anchor="middle" class="striptxt" style="font-weight:700">A k-d tree prunes a branch only when the split is farther than the best-so-far.</text>
    <text x="390" y="396" text-anchor="middle" class="striptxt">When all distances are nearly equal, the query ball intersects almost every cell -&gt; nothing prunes -&gt;</text>
    <text x="390" y="412" text-anchor="middle" class="striptxt">the tree degrades to a linear scan (empirically around d = 20-30).</text>
    <text x="390" y="432" text-anchor="middle" class="striptxt" style="font-style:italic">ANN survives only because real embeddings live on a low-dimensional manifold, not uniformly in R^d.</text>
    <text x="390" y="450" text-anchor="middle" class="illus">50x and 1.1x are the chapter's own illustrative figures, not a universal law.</text>
  </g>

</svg>
<figcaption><b>In high dimensions, distances concentrate: the histogram of query-to-point distances collapses from a broad spread into a narrow spike.</b> At <span style="font-family:var(--mono,monospace)">d=2</span> the farthest point is ~50x farther than the nearest, so pruning has something to work with; by <span style="font-family:var(--mono,monospace)">d=1000</span> that ratio has fallen to ~1.1x, every branch of a k-d tree looks equally promising, and the "tree" collapses to a linear scan.</figcaption>
</figure>
