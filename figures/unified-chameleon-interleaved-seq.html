  <text x="374" y="225" text-anchor="middle" class="cap v-muted">All token types share one embedding table; the transformer uses a uniform causal mask.</text>
  <text x="374" y="238" text-anchor="middle" class="cap v-muted">No separate vision encoder. No modality-specific pathway.</text>

<figcaption><b>Chameleon's interleaved sequence draws all tokens from one shared vocabulary of 65,536 entries.</b> Text BPE tokens (blue), VQ-VAE image codes (amber), and special boundary markers (violet) all pass through the same embedding table before entering the standard decoder-only transformer. There is no separate vision encoder; the causal mask is uniform across modalities.</figcaption>
</figure>
