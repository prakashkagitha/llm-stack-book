<figcaption><b>Resharding from trainer TP=8 (separate Q/K/V) to inference TP=2 (fused QKV).</b> The three steps — all-gather across 8 shards, concatenate Q/K/V into one fused tensor honoring GQA head grouping, then re-split across 2 inference ranks — are the core of the weight-sync resharding manager. The animation stages reveal each step in sequence; the inference rank boxes show a single contiguous fused tensor contrasting with the trainer's three separate sub-cells per rank.</figcaption>
</figure>
