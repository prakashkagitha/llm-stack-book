<figcaption><b>The portability spectrum: how much of the NVIDIA programming model survives.</b> NVIDIA CUDA is the origin — 100% of the model survives because it <i>is</i> the model. AMD Instinct sits at the easy end (SIMT-to-SIMT, mostly API renaming via HIP), while Google TPU sits at the hard end (systolic MXU, fully compiler-driven via XLA). The key insight is that the move from CUDA to a systolic accelerator is not a translation problem but a paradigm shift — you stop writing kernels and start describing shapes and sharding for the compiler.</figcaption>
