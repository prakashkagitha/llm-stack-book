<figure class="viz" id="fig-weak-to-strong-generalization">
<button class="viz-replay" type="button">&#8635; replay</button>

<svg viewBox="0 0 800 470" role="img"
  aria-label="A vertical performance axis showing three levels: weak supervisor at the bottom, strong student trained on the weak supervisor's noisy labels landing clearly above it, and a strong-supervised ceiling above that. The weak supervisor emits noisy labels, some flipped wrong, toward the strong student, which generalizes past the noise to exceed its supervisor. The remaining distance to the ceiling is bracketed as the elicitation gap, which bootstrapping, confidence-weighted loss, and consistency regularization shrink.">
<defs>
  <marker id="ws-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--ink-soft,#555)"/></marker>
  <marker id="ws-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--accent,#3a6ea5)"/></marker>
  <marker id="ws-mut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--muted,#999)"/></marker>
</defs>
<style>
  #fig-weak-to-strong-generalization text        { font:400 10px var(--sans,sans-serif); fill:var(--ink-soft,#333); }
  #fig-weak-to-strong-generalization .T          { font:700 15px var(--sans,sans-serif); fill:var(--ink-soft,#222); }
  #fig-weak-to-strong-generalization .SUB        { font:400 9.5px var(--sans,sans-serif); fill:var(--muted,#777); }
  #fig-weak-to-strong-generalization .LBL        { font:600 10px var(--sans,sans-serif); fill:var(--ink-soft,#333); }
  #fig-weak-to-strong-generalization .NS         { font:400 9px var(--sans,sans-serif); fill:var(--muted,#666); }
  #fig-weak-to-strong-generalization .XMARK      { font:700 10px var(--mono,monospace); fill:var(--muted,#666); }
  #fig-weak-to-strong-generalization .CAP        { font:italic 10px var(--sans,sans-serif); fill:var(--muted,#777); }
  #fig-weak-to-strong-generalization .TAG        { font:600 8.6px var(--sans,sans-serif); fill:var(--ink-soft,#333); }

  #fig-weak-to-strong-generalization [data-anim]              { opacity:0; }
  #fig-weak-to-strong-generalization:not(.playing) [data-anim]{ opacity:1; }
  #fig-weak-to-strong-generalization.playing [data-anim="1"] { animation:wsa .35s .05s ease forwards; }
  #fig-weak-to-strong-generalization.playing [data-anim="2"] { animation:wsa .35s .5s  ease forwards; }
  #fig-weak-to-strong-generalization.playing [data-anim="3"] { animation:wsa .35s .95s ease forwards; }
  #fig-weak-to-strong-generalization.playing [data-anim="4"] { animation:wsa .35s 1.4s ease forwards; }
  #fig-weak-to-strong-generalization.playing [data-anim="5"] { animation:wsa .35s 1.85s ease forwards; }
  #fig-weak-to-strong-generalization.playing [data-anim="6"] { animation:wsa .35s 2.3s  ease forwards; }
  @keyframes wsa { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>

<rect x="10" y="10" width="780" height="418" rx="12"
  fill="var(--surface,#fff)" stroke="var(--border-2,#888)" stroke-width="1.5"/>
<text x="400" y="31" text-anchor="middle" class="T">Weak-to-Strong Generalization: the Student Exceeds Its Teacher</text>
<text x="400" y="47" text-anchor="middle" class="SUB">future models will surpass human raters -- can weak supervision still elicit strong capability?</text>


<g data-anim="1">
  <line x1="150" y1="380" x2="150" y2="70" stroke="var(--v-grid,#ccc)" stroke-width="1.2"/>
  <text x="140" y="380" text-anchor="end" class="NS">low</text>
  <text x="140" y="76" text-anchor="end" class="NS">high</text>
  <text x="120" y="225" text-anchor="middle" class="NS" transform="rotate(-90 120 225)">performance</text>
</g>


<g data-anim="2">
  
  <rect x="180" y="330" width="130" height="16" rx="4" fill="var(--surface-3,#eef2f7)" stroke="var(--muted,#999)" stroke-width="1.4"/>
  <text x="245" y="326" text-anchor="middle" class="LBL">weak supervisor</text>
  <text x="245" y="358" text-anchor="middle" class="NS">(1) small / degraded model</text>
</g>

<g data-anim="3">
  
  <rect x="180" y="220" width="130" height="16" rx="4" fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="1.8"/>
  <text x="245" y="216" text-anchor="middle" class="LBL" fill="var(--accent,#3a6ea5)">strong student</text>
  <text x="245" y="248" text-anchor="middle" class="NS">(2) trained on weak labels</text>
</g>

<g data-anim="4">
  
  <rect x="180" y="105" width="130" height="16" rx="4" fill="var(--surface-3,#f5f1e6)" stroke="var(--border-2,#888)" stroke-width="1.4" stroke-dasharray="4,2"/>
  <text x="245" y="101" text-anchor="middle" class="LBL">strong-supervised ceiling</text>
  <text x="245" y="133" text-anchor="middle" class="NS">(3) strong model, clean labels</text>
</g>


<g data-anim="2">
  <path d="M300,330 Q330,300 300,236" stroke="var(--muted,#999)" stroke-width="1.2" fill="none" marker-end="url(#ws-mut)"/>
  <path d="M270,330 Q290,285 268,236" stroke="var(--muted,#999)" stroke-width="1.2" fill="none" marker-end="url(#ws-mut)"/>
  <path d="M240,330 Q255,283 236,236" stroke="var(--muted,#999)" stroke-width="1.2" fill="none" marker-end="url(#ws-mut)"/>
  
  <text x="322" y="298" text-anchor="middle" class="XMARK">x</text>
  <text x="222" y="283" text-anchor="middle" class="XMARK">x</text>
  <text x="345" y="270" text-anchor="middle" class="NS">noisy labels</text>
  <text x="345" y="281" text-anchor="middle" class="NS">(some flipped)</text>
</g>


<g data-anim="5">
  <path d="M245,220 L245,192" stroke="var(--accent,#3a6ea5)" stroke-width="1.9" fill="none" marker-end="url(#ws-acc)"/>
  <text x="245" y="172" text-anchor="middle" class="LBL" fill="var(--accent,#3a6ea5)">generalizes past the noise --</text>
  <text x="245" y="184" text-anchor="middle" class="LBL" fill="var(--accent,#3a6ea5)">exceeds its supervisor</text>
</g>


<g data-anim="6">
  <path d="M360,220 L372,220 L372,121 L360,121" fill="none" stroke="var(--ink-soft,#666)" stroke-width="1.3"/>
  <text x="411" y="171" text-anchor="middle" class="LBL">elicitation</text>
  <text x="411" y="183" text-anchor="middle" class="LBL">gap</text>

  <text x="450" y="90" class="LBL">interventions that shrink the gap:</text>

  
  <rect x="450" y="98" width="280" height="42" rx="7" fill="var(--surface-3,#f5f1e6)" stroke="var(--border-2,#888)" stroke-width="1"/>
  <text x="460" y="113" class="TAG">bootstrapping</text>
  <text x="460" y="125" class="NS" font-size="8.4">train a medium model first, then relabel</text>
  <text x="460" y="136" class="NS" font-size="8.4">for the strong one</text>

  <rect x="450" y="150" width="133" height="28" rx="7" fill="var(--surface-3,#f5f1e6)" stroke="var(--border-2,#888)" stroke-width="1"/>
  <text x="460" y="168" class="TAG">confidence-weighted loss</text>

  <rect x="597" y="150" width="133" height="28" rx="7" fill="var(--surface-3,#f5f1e6)" stroke="var(--border-2,#888)" stroke-width="1"/>
  <text x="607" y="163" class="TAG">consistency</text>
  <text x="607" y="173" class="NS" font-size="8">regularization</text>
</g>

<text x="380" y="395" text-anchor="middle" class="CAP">the student rises above its supervisor -- interventions above narrow the remaining gap to the ceiling</text>

</svg>
<figcaption><b>A strong student fine-tuned on a weak supervisor's noisy labels ends up better than the supervisor -- but still short of what strong supervision would achieve.</b> The remaining "elicitation gap" between the weak-supervised student and the strong-supervised ceiling is the scalable-oversight problem: bootstrapping, confidence-weighted loss, and consistency regularization are interventions studied to shrink it.</figcaption>
</figure>
