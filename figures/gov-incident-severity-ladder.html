<figure class="viz" id="fig-gov-incident-severity-ladder">
<style>
  #fig-gov-incident-severity-ladder text { fill: var(--ink-soft); }
  #fig-gov-incident-severity-ladder .hdr        { font: 700 12px var(--sans,sans-serif); letter-spacing: 0.02em; fill: var(--muted); }
  #fig-gov-incident-severity-ladder .subcap     { font: 400 10px var(--sans,sans-serif); fill: var(--muted); font-style: italic; }
  #fig-gov-incident-severity-ladder .box-lbl    { font: 600 11.5px var(--sans,sans-serif); text-anchor: middle; }
  #fig-gov-incident-severity-ladder .q-lbl      { font: 700 12px var(--sans,sans-serif); text-anchor: middle; }
  #fig-gov-incident-severity-ladder .chip-lbl   { font: 600 8.5px var(--sans,sans-serif); text-anchor: middle; }
  #fig-gov-incident-severity-ladder .out-lbl    { font: 600 10px var(--sans,sans-serif); text-anchor: middle; fill: var(--muted); }
  #fig-gov-incident-severity-ladder .path-lbl   { font: 700 9.5px var(--mono,monospace); text-anchor: middle; }
  #fig-gov-incident-severity-ladder .col-h      { font: 700 10px var(--sans,sans-serif); letter-spacing: 0.04em; fill: var(--muted); }
  #fig-gov-incident-severity-ladder .sev-name   { font: 700 15px var(--sans,sans-serif); }
  #fig-gov-incident-severity-ladder .sev-name-m { font: 600 13px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-gov-incident-severity-ladder .sev-name-mut{ font: 600 13px var(--sans,sans-serif); fill: var(--muted); }
  #fig-gov-incident-severity-ladder .deadline   { font: 700 12.5px var(--sans,sans-serif); }
  #fig-gov-incident-severity-ladder .deadline-m { font: 600 11.5px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-gov-incident-severity-ladder .deadline-mut{ font: 400 11.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-gov-incident-severity-ladder .recip      { font: 500 10.5px var(--sans,sans-serif); fill: var(--ink-soft); }
  #fig-gov-incident-severity-ladder .recip-mut  { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-gov-incident-severity-ladder .footer-cap { font: 400 11px var(--sans,sans-serif); fill: var(--muted); }
</style>
<svg viewBox="0 0 820 500" role="img" aria-label="A serious-incident triage diagram: an event that causes harm or potential harm to people is routed into a four-rung EU AI Act severity ladder -- minor, significant, serious, and systemic -- each mapped to a reporting deadline and recipient, while events without harm to people, such as a DDoS, are routed to ordinary security incident response instead.">
  <defs>
    <marker id="isl-arrow" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 z" fill="var(--muted)"/>
    </marker>
    <marker id="isl-arrow-accent" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 z" fill="var(--accent)"/>
    </marker>
  </defs>

  
  <g data-anim="1">
    <text x="16" y="28" class="hdr">TRIGGER GATE</text>
    <line x1="16" y1="36" x2="270" y2="36" stroke="var(--border-2)" stroke-width="1"/>

    
    <rect x="16" y="50" width="254" height="32" rx="16" class="v-fill" stroke="var(--border-2)" stroke-width="1.2"/>
    <text x="143" y="70" class="box-lbl">Incoming event</text>

    <line x1="143" y1="82" x2="143" y2="96" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#isl-arrow)"/>

    
    <rect x="16" y="96" width="254" height="56" rx="10" fill="var(--accent)" fill-opacity="0.07" stroke="var(--accent)" stroke-width="1.4"/>
    <text x="143" y="119" class="q-lbl">Harm or potential harm</text>
    <text x="143" y="136" class="q-lbl">to PEOPLE?</text>

    
    <path d="M113 152 Q90 170 78 186" fill="none" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#isl-arrow)"/>
    <text x="83" y="170" class="path-lbl" fill="var(--muted)">NO</text>

    <path d="M173 152 Q198 170 210 186" fill="none" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#isl-arrow-accent)"/>
    <text x="203" y="170" class="path-lbl" fill="var(--accent)">YES</text>

    
    <rect x="16" y="190" width="124" height="46" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1.2"/>
    <text x="78" y="209" class="chip-lbl">DDoS on</text>
    <text x="78" y="222" class="chip-lbl">inference API</text>

    
    <rect x="146" y="190" width="124" height="46" rx="8" fill="var(--accent)" fill-opacity="0.09" stroke="var(--accent)" stroke-width="1.3"/>
    <text x="208" y="203" class="chip-lbl">biased mental-</text>
    <text x="208" y="215" class="chip-lbl">health advice</text>
    <text x="208" y="227" class="chip-lbl">-&gt; self-harm</text>

    
    <line x1="72" y1="236" x2="72" y2="250" stroke="var(--muted)" stroke-width="1.4" marker-end="url(#isl-arrow)"/>

    
    <rect x="16" y="254" width="112" height="86" rx="8" class="v-fill" stroke="var(--border-2)" stroke-width="1.1" stroke-dasharray="4 3" opacity="0.75"/>
    <text x="72" y="278" class="out-lbl">Security / SRE</text>
    <text x="72" y="294" class="out-lbl">incident</text>
    <text x="72" y="314" class="out-lbl">(out of scope</text>
    <text x="72" y="330" class="out-lbl">for Art. 62)</text>
  </g>

  
  <g data-anim="2">
    <path d="M270 213 C 294 213, 302 208, 330 207" fill="none" stroke="var(--accent)" stroke-width="1.8" marker-end="url(#isl-arrow-accent)"/>
  </g>

  
  <g data-anim="3">
    <text x="330" y="28" class="hdr">SEVERITY LADDER (rising severity, top rung = most urgent)</text>
    <text x="330" y="44" class="subcap">top two rungs require external reporting</text>
    <line x1="330" y1="54" x2="806" y2="54" stroke="var(--border-2)" stroke-width="1"/>

    <text x="348" y="70" class="col-h">SEVERITY</text>
    <text x="478" y="70" class="col-h">DEADLINE</text>
    <text x="636" y="70" class="col-h">RECIPIENT</text>
  </g>

  
  <g data-anim="3">
    <rect x="330" y="82" width="476" height="74" rx="9" fill="var(--accent)" fill-opacity="0.13" stroke="var(--accent)" stroke-width="2"/>
    <rect x="330" y="82" width="6" height="74" rx="3" fill="var(--accent)"/>
    <text x="348" y="124" class="sev-name v-accent">SYSTEMIC</text>
    <text x="478" y="124" class="deadline" fill="var(--warn)">within 2 days</text>
    <text x="636" y="113" class="recip">European AI Office</text>
    <text x="636" y="131" class="recip">(Art. 55(1)(b))</text>
  </g>

  
  <g data-anim="4">
    <rect x="330" y="170" width="476" height="74" rx="9" fill="var(--accent)" fill-opacity="0.055" stroke="var(--accent)" stroke-width="1.4"/>
    <rect x="330" y="170" width="6" height="74" rx="3" fill="var(--accent)" opacity="0.6"/>
    <text x="348" y="212" class="sev-name-m v-accent">SERIOUS</text>
    <text x="478" y="212" class="deadline-m">within 15 days</text>
    <text x="636" y="196" class="recip">national market</text>
    <text x="636" y="212" class="recip">surveillance</text>
    <text x="636" y="228" class="recip">authority (Art. 62)</text>
  </g>

  
  <g data-anim="5">
    <rect x="330" y="258" width="476" height="74" rx="9" class="v-fill" stroke="var(--border-2)" stroke-width="1.1"/>
    <text x="348" y="300" class="sev-name-m">SIGNIFICANT</text>
    <text x="478" y="300" class="deadline-m">72h internal review</text>
    <text x="636" y="300" class="recip-mut">log, no authority</text>
  </g>

  
  <g data-anim="5">
    <rect x="330" y="346" width="476" height="74" rx="9" class="v-fill" stroke="var(--border-2)" stroke-width="1" stroke-dasharray="4 3" opacity="0.85"/>
    <text x="348" y="388" class="sev-name-mut">MINOR</text>
    <text x="478" y="388" class="deadline-mut">internal only</text>
    <text x="636" y="388" class="recip-mut">no external report</text>
  </g>

  
  <g data-anim="5">
    <rect x="16" y="442" width="790" height="34" rx="6" fill="var(--accent)" fill-opacity="0.06" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="411" y="463" text-anchor="middle" class="footer-cap">Trigger = harm to people, not service outages -- keep this triage path separate from SRE.</text>
  </g>

</svg>
<figcaption><b>Serious-incident triage under the EU AI Act keys off harm to people, not system outages, and routes qualifying events onto a four-rung severity ladder.</b> A DDoS on the inference API stays inside ordinary security incident response, while an event like biased mental-health advice that leads a user to self-harm is routed into the ladder; the top two rungs, SERIOUS (15 days, national market surveillance authority) and SYSTEMIC (2 days, European AI Office), are the ones with an external reporting deadline.</figcaption>
</figure>
