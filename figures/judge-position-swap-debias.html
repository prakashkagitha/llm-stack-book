<figure class="viz" id="fig-judge-position-swap-debias">
<svg viewBox="0 0 800 400" role="img" aria-label="Diagram of the swap-and-aggregate protocol for canceling judge position bias: run the pair in order A,B and again in order B,A, flip the second verdict back into A/B terms, then crown a winner only if the two orderings agree, otherwise call it a tie.">
<defs>
  <marker id="psd-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" class="v-label"/>
  </marker>
  <marker id="psd-arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--warn,#e0a106)"/>
  </marker>
  <style>
    #fig-judge-position-swap-debias text { font: 400 11px var(--sans,sans-serif); }
    #fig-judge-position-swap-debias .title { font: 700 14px var(--sans,sans-serif); }
    #fig-judge-position-swap-debias .lane-lbl { font: 700 11px var(--sans,sans-serif); }
    #fig-judge-position-swap-debias .box-lbl { font: 700 12px var(--sans,sans-serif); }
    #fig-judge-position-swap-debias .sm { font: 400 10px var(--sans,sans-serif); }
    #fig-judge-position-swap-debias .verdict { font: 700 12px var(--mono,monospace); }
    #fig-judge-position-swap-debias .rule-good { font: 700 11px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
    #fig-judge-position-swap-debias .rule-warn { font: 700 11px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
    #fig-judge-position-swap-debias .caption-line { font: italic 11.5px var(--sans,sans-serif); }
    #fig-judge-position-swap-debias .badge-txt { font: 700 11px var(--mono,monospace); }
  </style>
</defs>

<text x="400" y="24" text-anchor="middle" class="title v-label">Swap-and-aggregate: canceling position bias</text>


<g data-anim="1">
  <rect x="14" y="90" width="112" height="130" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="70" y="108" text-anchor="middle" class="lane-lbl v-label">Input pair</text>
  <text x="70" y="126" text-anchor="middle" class="sm v-muted">question +</text>
  <rect x="26" y="134" width="88" height="26" rx="4" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="70" y="151" text-anchor="middle" class="box-lbl v-label">Response A</text>
  <rect x="26" y="168" width="88" height="26" rx="4" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="70" y="185" text-anchor="middle" class="box-lbl v-label">Response B</text>
  <text x="70" y="212" text-anchor="middle" class="sm v-muted">fans into 2 lanes</text>
</g>


<g data-anim="2">
  <path d="M 126 130 L 146 130 L 146 105" fill="none" class="v-stroke" stroke-width="1.4"/>
  <path d="M 146 105 L 176 105" fill="none" class="v-stroke" stroke-width="1.4" marker-end="url(#psd-arrow)"/>
  <path d="M 126 180 L 146 180 L 146 276" fill="none" class="v-stroke" stroke-width="1.4"/>
  <path d="M 146 276 L 176 276" fill="none" class="v-stroke" stroke-width="1.4" marker-end="url(#psd-arrow)"/>
</g>


<g data-anim="2">
  <text x="178" y="72" class="lane-lbl v-label">Top lane — order (A, B)</text>

  <rect x="178" y="80" width="66" height="50" rx="4" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="211" y="102" text-anchor="middle" class="sm v-label">A shown</text>
  <text x="211" y="116" text-anchor="middle" class="sm v-label">first</text>

  <line x1="244" y1="105" x2="270" y2="105" class="v-stroke" stroke-width="1.5" marker-end="url(#psd-arrow)"/>

  <rect x="272" y="80" width="80" height="50" rx="8" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="312" y="109" text-anchor="middle" class="box-lbl" fill="var(--accent)">Judge</text>

  <line x1="352" y1="105" x2="378" y2="105" class="v-stroke" stroke-width="1.5" marker-end="url(#psd-arrow)"/>

  <rect x="380" y="80" width="86" height="50" rx="4" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="423" y="100" text-anchor="middle" class="sm v-muted">raw verdict</text>
  <text x="423" y="119" text-anchor="middle" class="verdict v-label">"A"</text>
</g>


<g data-anim="3">
  <text x="178" y="243" class="lane-lbl v-label">Bottom lane — SWAPPED order (B, A)</text>

  <rect x="178" y="251" width="66" height="50" rx="4" class="v-fill v-stroke" stroke-width="1.1"/>
  <text x="211" y="273" text-anchor="middle" class="sm v-label">B shown</text>
  <text x="211" y="287" text-anchor="middle" class="sm v-label">first</text>

  <line x1="244" y1="276" x2="270" y2="276" class="v-stroke" stroke-width="1.5" marker-end="url(#psd-arrow)"/>

  <rect x="272" y="251" width="80" height="50" rx="8" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="312" y="280" text-anchor="middle" class="box-lbl" fill="var(--accent)">Judge</text>

  <line x1="352" y1="276" x2="378" y2="276" class="v-stroke" stroke-width="1.5" marker-end="url(#psd-arrow)"/>

  <rect x="380" y="251" width="86" height="50" rx="4" class="v-fill v-stroke" stroke-width="1.3"/>
  <text x="423" y="271" text-anchor="middle" class="sm v-muted">raw verdict</text>
  <text x="423" y="288" text-anchor="middle" class="verdict v-label" style="font-size:10.5px;">"A" (1st slot)</text>

  
  <line x1="466" y1="276" x2="490" y2="276" class="v-stroke" stroke-width="1.5" marker-end="url(#psd-arrow-warn)"/>
  <rect x="492" y="248" width="112" height="56" rx="6" fill="var(--warn,#e0a106)" fill-opacity="0.14" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <text x="548" y="264" text-anchor="middle" class="sm" fill="var(--warn,#e0a106)" style="font-weight:700;">flip back to</text>
  <text x="548" y="277" text-anchor="middle" class="sm" fill="var(--warn,#e0a106)" style="font-weight:700;">A/B space</text>
  <text x="548" y="295" text-anchor="middle" class="verdict v-label">-&gt; "B"</text>
</g>


<g data-anim="4">
  <path d="M 466 105 L 630 105 L 630 176" fill="none" class="v-stroke" stroke-width="1.5" marker-end="url(#psd-arrow)"/>
  <path d="M 604 276 L 630 276 L 630 224" fill="none" class="v-stroke" stroke-width="1.5" marker-end="url(#psd-arrow)"/>
</g>


<g data-anim="4">
  <rect x="620" y="178" width="166" height="120" rx="8" class="v-fill v-stroke" stroke-width="1.6"/>
  <text x="703" y="196" text-anchor="middle" class="lane-lbl v-label">RESOLVER</text>

  <rect x="632" y="204" width="142" height="30" rx="4" fill="var(--good,#2f9e6e)" fill-opacity="0.14"/>
  <text x="640" y="223" class="rule-good">agree -&gt; winner</text>

  <rect x="632" y="240" width="142" height="30" rx="4" fill="var(--warn,#e0a106)" fill-opacity="0.14"/>
  <text x="640" y="259" class="rule-warn">disagree -&gt; tie</text>

  <text x="703" y="286" text-anchor="middle" class="sm v-muted" style="font-size:9px;">top="A" bottom="B": disagree</text>
</g>


<g data-anim="5">
  <line x1="703" y1="298" x2="703" y2="322" class="v-stroke" stroke-width="1.5" marker-end="url(#psd-arrow-warn)"/>
  <rect x="634" y="324" width="138" height="34" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
  <text x="703" y="346" text-anchor="middle" class="verdict" fill="var(--warn,#e0a106)">output: "tie"</text>
</g>


<g data-anim="5">
  <rect x="178" y="330" width="330" height="30" rx="15" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="343" y="349" text-anchor="middle" class="badge-txt v-muted">cost x2, position bias ~eliminated</text>
</g>

<text x="400" y="383" text-anchor="middle" class="caption-line v-muted">the position-favored slot cancels: whichever response won by sitting first, wins in only one of the two lanes</text>

</svg>
<figcaption><b>Running each pair through the judge twice — once as (A, B), once as the swapped (B, A) — cancels the first-slot advantage that position bias creates.</b> The second lane's raw verdict must be flipped back into true A/B terms before comparison; if the flipped verdict disagrees with the first lane, the disagreement itself is the signal that the "winner" was really just whichever response sat first, so the pair is called a tie rather than trusted.</figcaption>
</figure>
