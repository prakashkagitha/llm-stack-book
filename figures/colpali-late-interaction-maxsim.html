<figure class="viz" id="fig-colpali-late-interaction-maxsim">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 760 590" role="img" aria-label="ColPali late-interaction pipeline: a PDF page passes through the VLM vision encoder to produce 1024 patch vectors in R^128, a text query passes through the VLM language tower to produce n query-token vectors in R^128, and both are combined by the MaxSim operator to yield a single page score.">
<defs>

    <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
  </marker>
  <marker id="cpm-arr-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>

</defs>
<style>
  #fig-colpali-late-interaction-maxsim text  { fill: var(--ink-soft,#374151); }
  #fig-colpali-late-interaction-maxsim .lbl  { font: 600 13px var(--sans,sans-serif); }
  #fig-colpali-late-interaction-maxsim .sub  { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-colpali-late-interaction-maxsim .cod  { font: 500 11px var(--mono,monospace); }
  #fig-colpali-late-interaction-maxsim .mut  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-colpali-late-interaction-maxsim .on-acc { font: 700 14px var(--sans,sans-serif); fill: #fff; }

  /* patch squares and query chips */
  #fig-colpali-late-interaction-maxsim .patch { fill: var(--accent,#c15b39); fill-opacity: 0.4; }
  #fig-colpali-late-interaction-maxsim .chip  { fill: var(--accent,#c15b39); fill-opacity: 0.4; }

  @keyframes cpm-fade  { from{opacity:0} to{opacity:1} }
  @keyframes cpm-pulse { 0%,100%{fill-opacity:.4} 50%{fill-opacity:.9} }
  @keyframes cpm-glow  { 0%,20%{fill-opacity:.4} 40%,70%{fill-opacity:.9} 90%,100%{fill-opacity:.4} }
  @keyframes cpm-fan   { 0%,25%{opacity:0} 45%,75%{opacity:.7} 95%,100%{opacity:0} }

  #fig-colpali-late-interaction-maxsim [data-anim] { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    #fig-colpali-late-interaction-maxsim [data-anim] { opacity:1 !important; animation:none !important; }
    #fig-colpali-late-interaction-maxsim .patch,
    #fig-colpali-late-interaction-maxsim .chip  { animation:none !important; fill-opacity:.4 !important; }
  }
</style>

  <rect x="308" y="484" width="152" height="38" rx="19" fill="var(--accent,#c15b39)"/>
  <text x="384" y="508" text-anchor="middle" class="on-acc">page score</text>

</svg>
<figcaption><b>ColPali late interaction: two multi-vector towers meet at MaxSim.</b> The VLM vision encoder converts a PDF page into 1024 patch vectors (R^128) while the VLM language tower converts the query into n token vectors (R^128). The only query-document interaction is the cheap MaxSim sum — each query token independently finds its single best-matching patch — making the page representation fully precomputable offline with no cross-attention needed.</figcaption>
</figure>
