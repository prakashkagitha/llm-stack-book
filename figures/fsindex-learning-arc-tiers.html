<figure class="viz" id="fig-fsindex-learning-arc-tiers">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 960" role="img" aria-label="Five stacked tiers of the book's from-scratch code, bottom to top: mathematical foundations (scalar autograd), the transformer (BPE, embeddings and RoPE, attention, GPT), post-training and alignment (LoRA, DPO, GRPO), hardware kernels (FlashAttention), and inference-time algorithms (samplers, speculative decoding, RAG). Solid arrows show build-on dependencies such as autograd underlying every tier and attention feeding GPT; dashed double-headed connectors mark swappable slots such as FlashAttention as a drop-in replacement for attention and BPE versus a unigram tokenizer.">

<defs>
  <marker id="falt-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <marker id="falt-swap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>

<style>
  #fig-fsindex-learning-arc-tiers text { font: 400 11px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-fsindex-learning-arc-tiers .note   { font: italic 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-fsindex-learning-arc-tiers .tierlbl{ font: 700 12px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); letter-spacing: 0.6px; }
  #fig-fsindex-learning-arc-tiers .badge-n{ font: 700 11px var(--sans,sans-serif); fill: var(--accent,#c15b39); text-anchor: middle; }
  #fig-fsindex-learning-arc-tiers .lbl    { font: 700 11.5px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); text-anchor: middle; }
  #fig-fsindex-learning-arc-tiers .lbl-lg { font: 700 12.5px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); text-anchor: middle; }
  #fig-fsindex-learning-arc-tiers .sub    { font: 400 9px var(--mono,monospace); fill: var(--muted,#6d675d); text-anchor: middle; }
  #fig-fsindex-learning-arc-tiers .swaptxt{ font: italic 600 9px var(--sans,sans-serif); fill: var(--accent,#c15b39); text-anchor: middle; }
  #fig-fsindex-learning-arc-tiers .arclbl { font: italic 400 9.5px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-fsindex-learning-arc-tiers .swaparclbl { font: italic 600 9.5px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-fsindex-learning-arc-tiers .band   { fill: var(--surface,#faf8f3); stroke: var(--border-2,#d8d1c0); stroke-width: 1; }
  #fig-fsindex-learning-arc-tiers .card   { fill: var(--surface-3,#ece7da); stroke: var(--border-2,#d8d1c0); stroke-width: 1.4; }
  #fig-fsindex-learning-arc-tiers .ghost  { fill: var(--surface-3,#ece7da); fill-opacity: 0.5; stroke: var(--accent,#c15b39); stroke-width: 1.1; stroke-dasharray: 3 2.5; }
  #fig-fsindex-learning-arc-tiers .buildline{ stroke: var(--ink-soft,#45413a); stroke-width: 1.5; fill: none; }
  #fig-fsindex-learning-arc-tiers .swapline { stroke: var(--accent,#c15b39); stroke-width: 1.4; fill: none; stroke-dasharray: 5 3.5; }
  #fig-fsindex-learning-arc-tiers .badge  { fill: var(--surface,#faf8f3); stroke: var(--accent,#c15b39); stroke-width: 1.3; }
</style>

<text x="400" y="26" text-anchor="middle" class="note">Reads bottom-to-top = build order; left-to-right within a tier = pipeline order</text>

<line x1="35" y1="832" x2="35" y2="66" class="buildline" stroke-width="2" marker-end="url(#falt-arr)"/>
<text class="tierlbl" transform="rotate(-90 22 450)" x="22" y="450" text-anchor="middle" style="font-size:10.5px; letter-spacing:1px;">BUILDS ON (BOTTOM-UP)</text>

<g data-anim="5">
  <rect class="band" x="58" y="55" width="722" height="150" rx="10"/>
  <circle class="badge" cx="68" cy="75" r="10"/>
  <text class="badge-n" x="68" y="79">5</text>
  <text class="tierlbl" x="90" y="79">(5) INFERENCE-TIME ALGORITHMS</text>

  <rect class="card" x="90" y="91" width="216" height="90" rx="8"/>
  <text class="lbl" x="198" y="128">Samplers</text>
  <text class="sub" x="198" y="146">temp -&gt; top-k -&gt; top-p</text>
  <text class="sub" x="198" y="159">Sec 11</text>

  <rect class="card" x="326" y="91" width="216" height="90" rx="8"/>
  <text class="lbl" x="434" y="122">Speculative</text>
  <text class="lbl" x="434" y="137">Decoding</text>
  <text class="sub" x="434" y="155">draft tokens + verify pass</text>
  <text class="sub" x="434" y="168">Sec 9</text>

  <rect class="card" x="562" y="91" width="216" height="90" rx="8"/>
  <text class="lbl" x="670" y="128">RAG Pipeline</text>
  <text class="sub" x="670" y="146">retrieve, then generate</text>
  <text class="sub" x="670" y="159">Sec 10</text>
</g>

<g data-anim="4">
  <rect class="band" x="58" y="221" width="722" height="130" rx="10"/>
  <circle class="badge" cx="68" cy="241" r="10"/>
  <text class="badge-n" x="68" y="245">4</text>
  <text class="tierlbl" x="90" y="245">(4) HARDWARE KERNELS</text>

  <rect class="card" x="90" y="257" width="330" height="80" rx="8"/>
  <text class="lbl-lg" x="255" y="292">FlashAttention</text>
  <text class="sub" x="255" y="310">tiled online softmax - Sec 8</text>
</g>

<g data-anim="3">
  <rect class="band" x="58" y="367" width="722" height="150" rx="10"/>
  <circle class="badge" cx="68" cy="387" r="10"/>
  <text class="badge-n" x="68" y="391">3</text>
  <text class="tierlbl" x="90" y="391">(3) POST-TRAINING &amp; ALIGNMENT</text>

  <rect class="card" x="90" y="403" width="183" height="90" rx="8"/>
  <text class="lbl-lg" x="181.5" y="440">LoRA</text>
  <text class="sub" x="181.5" y="459">B@A adapter, r &lt;&lt; d</text>
  <text class="sub" x="181.5" y="472">Sec 6</text>

  <rect class="card" x="293" y="403" width="183" height="90" rx="8"/>
  <text class="lbl-lg" x="384.5" y="440">DPO</text>
  <text class="sub" x="384.5" y="459">implicit reward</text>
  <text class="sub" x="384.5" y="472">Sec 7</text>

  <rect class="card" x="496" y="403" width="183" height="90" rx="8"/>
  <text class="lbl-lg" x="587.5" y="440">GRPO</text>
  <text class="sub" x="587.5" y="459">group-relative advantage</text>
  <text class="sub" x="587.5" y="472">Sec 7</text>

  <path class="buildline" d="M273,448 L293,448" marker-end="url(#falt-arr)"/>
  <path class="buildline" d="M230,493 C230,508 587,508 587,493" marker-end="url(#falt-arr)"/>
</g>

<g data-anim="2">
  <rect class="band" x="58" y="533" width="722" height="170" rx="10"/>
  <circle class="badge" cx="68" cy="553" r="10"/>
  <text class="badge-n" x="68" y="557">2</text>
  <text class="tierlbl" x="90" y="557">(2) THE TRANSFORMER</text>

  <rect class="ghost" x="82" y="559" width="160" height="18" rx="9"/>
  <text class="swaptxt" x="162" y="572">Unigram (alt)</text>
  <path class="swapline" d="M170,577 L170,593" marker-start="url(#falt-swap)" marker-end="url(#falt-swap)"/>

  <rect class="card" x="90" y="593" width="160" height="90" rx="8"/>
  <text class="lbl" x="170" y="628">BPE Tokenizer</text>
  <text class="sub" x="170" y="646">train_bpe(), encode()</text>
  <text class="sub" x="170" y="659">Sec 2</text>

  <rect class="card" x="266" y="593" width="160" height="90" rx="8"/>
  <text class="lbl" x="346" y="620">Embeddings</text>
  <text class="lbl" x="346" y="634">+ RoPE</text>
  <text class="swaptxt" x="346" y="650">(sinusoidal &lt;-&gt; RoPE)</text>
  <text class="sub" x="346" y="663">Sec 3-4</text>

  <rect class="card" x="442" y="593" width="160" height="90" rx="8"/>
  <text class="lbl" x="522" y="628">Attention</text>
  <text class="sub" x="522" y="646">scaled dot-product</text>
  <text class="sub" x="522" y="659">Sec 5</text>

  <rect class="card" x="618" y="593" width="160" height="90" rx="8"/>
  <text class="lbl" x="698" y="628">GPT</text>
  <text class="sub" x="698" y="644">(assembles all)</text>
  <text class="sub" x="698" y="659">Sec 5</text>

  <path class="buildline" d="M602,638 L618,638" marker-end="url(#falt-arr)"/>
</g>

<g data-anim="1">
  <rect class="band" x="58" y="719" width="722" height="130" rx="10"/>
  <circle class="badge" cx="68" cy="739" r="10"/>
  <text class="badge-n" x="68" y="743">1</text>
  <text class="tierlbl" x="90" y="743">(1) MATHEMATICAL FOUNDATIONS</text>

  <rect class="card" x="300" y="763" width="200" height="74" rx="8"/>
  <text class="lbl-lg" x="400" y="796">Scalar Autograd</text>
  <text class="sub" x="400" y="814">Value class - Sec 1</text>
</g>

<g data-anim="2">
  <path class="buildline" d="M400,763 C480,720 600,700 698,683" marker-end="url(#falt-arr)"/>
  <text class="arclbl" x="428" y="722">autograd underlies every tier above</text>
</g>

<g data-anim="3">
  <path class="buildline" d="M698,593 C550,550 300,520 181,493" marker-end="url(#falt-arr)"/>
</g>

<g data-anim="5">
  <path class="buildline" d="M760,593 L760,213 L298,213 L298,91" marker-end="url(#falt-arr)"/>
  <text class="arclbl" x="600" y="202" text-anchor="middle">GPT logits feed the samplers</text>
</g>

<g data-anim="4">
  <path class="swapline" d="M420,297 L725,297 L725,525 L522,525 L522,593" marker-start="url(#falt-swap)" marker-end="url(#falt-swap)"/>
  <text class="swaparclbl" x="723" y="410" text-anchor="end">drop-in replaces</text>
  <text class="swaparclbl" x="723" y="423" text-anchor="end">the attention kernel</text>
</g>

<g data-anim="5">
  <rect x="90" y="865" width="620" height="66" rx="8" fill="var(--surface,#faf8f3)" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <line x1="106" y1="888" x2="196" y2="888" class="buildline" marker-end="url(#falt-arr)"/>
  <text x="206" y="892">Builds on (dependency; see table above)</text>
  <line x1="106" y1="913" x2="196" y2="913" class="swapline" marker-start="url(#falt-swap)" marker-end="url(#falt-swap)"/>
  <text x="206" y="917" style="fill:var(--accent,#c15b39);">Swappable slot (drop-in alternative)</text>
</g>

</svg>
<figcaption><b>The book's from-scratch code as five tiers, built bottom-up.</b> Mathematical foundations (scalar autograd) underlie the transformer (BPE, embeddings/RoPE, attention, GPT), which is fine-tuned by post-training methods (LoRA, DPO, GRPO), accelerated by hardware kernels (FlashAttention), and consumed by inference-time algorithms (samplers, speculative decoding, RAG). Solid arrows trace "builds on" dependencies; dashed double-headed connectors mark swappable slots — BPE vs. a unigram tokenizer, sinusoidal vs. RoPE positions, and FlashAttention as a drop-in replacement for the attention kernel.</figcaption>
</figure>
