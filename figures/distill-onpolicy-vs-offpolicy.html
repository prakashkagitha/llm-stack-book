<figure class="viz" id="fig-distill-onpolicy-vs-offpolicy">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 545" role="img" aria-label="Off-policy distillation trains a student only on points along the teacher's own fixed trajectories inside a shaded region of sequence space; at test time the student's own dashed path wanders outside that shaded region into space the teacher signal never covered, causing distribution mismatch. On-policy distillation instead lets the student generate its own dashed rollout trajectory first, and the teacher scores that same rollout, so training coverage matches the test-time distribution.">

<text x="18" y="22" class="ttl">Off-policy vs. on-policy distillation: whose trajectory gets trained on?</text>
<text x="18" y="38" class="sub">Off-policy trains on the teacher's fixed sequences; on-policy trains on the student's own rollout, matching test-time coverage.</text>

  <marker id="onp-arr-acc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent,#c15b39)"/>
  </marker>
  <marker id="onp-arr-acc2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent2,#3b82f6)"/>
  </marker>
</defs>

<path class="warn-tri" d="M55,352 L67,372 L43,372 Z"/>
<text x="55" y="367" text-anchor="middle" class="lbl-warn" font-size="9">!</text>
<text x="197" y="354" text-anchor="middle" class="small" font-weight="700">student drifts at test time --</text>
<text x="197" y="369" text-anchor="middle" class="small" font-weight="700">teacher signal never covered here</text>
<text x="197" y="384" text-anchor="middle" class="small" fill="var(--warn,#e0a106)" font-weight="700">(distribution mismatch)</text>

<text x="197" y="410" text-anchor="middle" class="small">solid = fixed teacher trajectories (trained on)</text>
<text x="197" y="424" text-anchor="middle" class="small">dashed = student's own path (never trained on)</text>
</g>

  <text x="127" y="524" class="small">teacher-scored point</text>
  <line x1="255" y1="520" x2="285" y2="520" class="teach-line"/>
  <text x="291" y="524" class="small">solid = fixed teacher trajectory</text>
  <line x1="470" y1="520" x2="500" y2="520" class="student-line"/>

</svg>
<figcaption><b>Off-policy distillation trains only on points along the teacher's fixed trajectories, so a student that drifts elsewhere at test time gets no signal there; on-policy distillation lets the student generate its own rollout first and scores that rollout with the teacher.</b> Because the training distribution in the on-policy loop is literally the student's own output distribution, coverage automatically matches what the student encounters at test time -- the same consistency argument that motivates on-policy RL methods like PPO.</figcaption>
</figure>
