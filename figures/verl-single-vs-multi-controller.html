  <text x="500" y="438" text-anchor="middle" class="leg" font-size="10" fill="var(--muted,#64748b)">HybridFlow: single-controller BETWEEN stages + multi-controller WITHIN stages</text>

</svg>
<figcaption><b>Two architectures, two failure modes.</b> A single-controller system puts all RL logic in one readable driver loop but funnels all batch data back through the driver, creating a serialization bottleneck that prevents composing intra-stage parallelism. A multi-controller SPMD system eliminates the driver bottleneck and natively supports TP/PP/DP, but buries the RL control flow in replicated SPMD code full of explicit collectives, making algorithm iteration painful. HybridFlow resolves this by using single-controller <em>between</em> stages and multi-controller <em>within</em> each stage.</figcaption>
</figure>
