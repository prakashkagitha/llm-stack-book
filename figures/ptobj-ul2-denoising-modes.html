<figure class="viz" id="fig-ptobj-ul2-denoising-modes">
<svg viewBox="0 0 820 330" role="img" aria-label="The same eight-token sentence, The cat sat on the old mat quietly, shown under three UL2 denoising modes. R-denoising replaces two short single-token spans with sentinels and the target is those two spans keyed by sentinel. X-denoising replaces most of the sentence, keeping only the first and last words as anchors, with a wide sentinel span whose target is the whole removed middle. S-denoising keeps a causal prefix, The cat sat on, and predicts the suffix the old mat quietly directly, with no sentinels.">

  #fig-ptobj-ul2-denoising-modes .tag { font: 700 10px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-ul2-denoising-modes .leg { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-ul2-denoising-modes .note { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-ul2-denoising-modes .split-lbl { font: 700 9.5px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
</style>

    <line x1="0" y1="0" x2="0" y2="6" stroke="var(--border-2,#ccc)" stroke-width="1.6"/>
  </pattern>
</defs>


<g data-anim="1">

  <text x="38" y="19" class="leg">kept token</text>
  <rect x="130" y="8" width="14" height="14" rx="2" fill="var(--accent,#c15b39)" opacity="0.28" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>

    <rect x="612" y="140" width="36" height="34" rx="4" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>

    <rect x="648" y="140" width="36" height="34" rx="4" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="666" y="162" font-size="9">on</text>
    <rect x="684" y="140" width="36" height="34" rx="4" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>

    <rect x="756" y="140" width="36" height="34" rx="4" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="774" y="162" font-size="9">mat</text>
  </g>
</g>


<g data-anim="4">
  <text x="20" y="206" class="title">S-denoising (Sequential / prefix causal): predict the suffix from the prefix</text>

  
  <g class="cell">
    <rect x="100" y="226" width="52" height="34" rx="4" fill="var(--v-fill,#eee)" stroke="var(--v-stroke,#666)" stroke-width="1.1"/>

    <rect x="204" y="226" width="52" height="34" rx="4" fill="var(--v-fill,#eee)" stroke="var(--v-stroke,#666)" stroke-width="1.1"/>
    <text x="230" y="248">sat</text>
    <rect x="256" y="226" width="52" height="34" rx="4" fill="var(--v-fill,#eee)" stroke="var(--v-stroke,#666)" stroke-width="1.1"/>

  </g>

  <line x1="308" y1="222" x2="308" y2="268" stroke="var(--accent,#c15b39)" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="308" y="220" text-anchor="middle" class="split-lbl">prefix | suffix -&gt;</text>

  <g class="cell">
    <rect x="308" y="226" width="52" height="34" rx="4" fill="url(#ul2-topred-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>

    <text x="438" y="248" style="fill:var(--muted,#666)">mat</text>
    <rect x="464" y="226" width="52" height="34" rx="4" fill="url(#ul2-topred-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
    <text x="490" y="248" style="fill:var(--muted,#666)">quietly</text>
  </g>

  <text x="540" y="220" class="tag">TARGET</text>
  <g class="cell">
    <rect x="540" y="226" width="40" height="34" rx="4" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="560" y="248" font-size="9">the</text>
    <rect x="580" y="226" width="40" height="34" rx="4" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="600" y="248" font-size="9">old</text>
    <rect x="620" y="226" width="40" height="34" rx="4" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="640" y="248" font-size="9">mat</text>
    <rect x="660" y="226" width="64" height="34" rx="4" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
    <text x="692" y="248" font-size="9">quietly</text>
  </g>
</g>


<g data-anim="5">
  <text x="20" y="294" class="note">One model (UL2) is pretrained on a MIXTURE of these modes; at inference a mode sentinel</text>
  <text x="20" y="308" class="note">([S2S] or [NLG]) selects which behavior the model performs.</text>
</g>

</svg>
<figcaption><b>UL2 pretrains one model on a mixture of denoising modes that differ in how much of the same sentence is corrupted, in what shape, and what must be predicted.</b> R-denoising masks short spans (~15%) for recall, X-denoising masks long spans (~50-70%) for generation, and S-denoising keeps a causal prefix and predicts the suffix directly with no sentinels; a mode sentinel at inference selects which behavior to invoke.</figcaption>
</figure>
