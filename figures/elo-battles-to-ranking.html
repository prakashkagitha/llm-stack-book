<figure class="viz" id="fig-elo-battles-to-ranking">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 348" role="img" aria-label="How noisy pairwise battles converge to a stable Elo ranking: the logistic expected-score curve, one worked battle update between a 1050-rated and a 980-rated model with K=32, and a leaderboard of four illustrative models whose error whiskers shrink as battle count grows.">
<defs>
  <marker id="elo-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" class="v-label"/>
  </marker>
  <marker id="elo-arrow-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--accent)"/>
  </marker>
  <style>
    #fig-elo-battles-to-ranking text { font: 400 10px var(--sans,sans-serif); }
    #fig-elo-battles-to-ranking .region-title { font: 700 13px var(--sans,sans-serif); }
    #fig-elo-battles-to-ranking .axis-lbl { font: 400 9px var(--mono,monospace); }
    #fig-elo-battles-to-ranking .axis-title { font: 400 8.5px var(--sans,sans-serif); }
    #fig-elo-battles-to-ranking .chip-name { font: 700 11px var(--sans,sans-serif); }
    #fig-elo-battles-to-ranking .chip-val { font: 700 14px var(--mono,monospace); }
    #fig-elo-battles-to-ranking .sm { font: 400 9.5px var(--sans,sans-serif); }
    #fig-elo-battles-to-ranking .sm-b { font: 700 9.5px var(--sans,sans-serif); }
    #fig-elo-battles-to-ranking .mono { font: 400 10px var(--mono,monospace); }
    #fig-elo-battles-to-ranking .mono-b { font: 700 11px var(--mono,monospace); }
    #fig-elo-battles-to-ranking .cap { font: italic 12px var(--sans,sans-serif); }
    #fig-elo-battles-to-ranking .row-rank { font: 700 10px var(--sans,sans-serif); }
  </style>
</defs>

<text x="410" y="20" text-anchor="middle" class="v-label" style="font:700 14.5px var(--sans,sans-serif);">Elo: from one noisy battle to a stable global ranking</text>

<line x1="290" y1="34" x2="290" y2="320" class="v-grid" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
<line x1="560" y1="34" x2="560" y2="320" class="v-grid" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>


<text x="150" y="44" text-anchor="middle" class="region-title v-label">Expected score</text>

<g data-anim="1">
  <line x1="45" y1="260" x2="255" y2="260" class="v-stroke" stroke-width="1.3"/>
  <line x1="45" y1="260" x2="45" y2="70" class="v-stroke" stroke-width="1.3"/>

  <text x="45" y="273" text-anchor="middle" class="axis-lbl v-muted">-400</text>
  <text x="150" y="273" text-anchor="middle" class="axis-lbl v-muted">0</text>
  <text x="255" y="273" text-anchor="middle" class="axis-lbl v-muted">+400</text>
  <text x="150" y="288" text-anchor="middle" class="axis-title v-muted">rating gap (theta_A - theta_B)</text>

  <text x="38" y="74" text-anchor="end" class="axis-lbl v-muted">1</text>
  <text x="38" y="169" text-anchor="end" class="axis-lbl v-muted">.5</text>
  <text x="38" y="264" text-anchor="end" class="axis-lbl v-muted">0</text>
  <text x="14" y="165" text-anchor="middle" class="axis-title v-muted" transform="rotate(-90,14,165)">P(A beats B)</text>

  <path d="M45,242.7 L58.1,237.6 L71.2,231.3 L84.4,223.6 L97.5,214.4 L110.6,203.6 L123.8,191.6 L136.9,178.6 L150,165 L163.1,151.4 L176.2,138.4 L189.4,126.4 L202.5,115.6 L215.6,106.4 L228.8,98.7 L241.9,92.4 L255,87.3"
        fill="none" stroke="var(--accent)" stroke-width="2.2" class="viz-draw" style="--len:265"/>
</g>

<g data-anim="2">
  <circle cx="150" cy="165" r="3" class="v-stroke" fill="var(--surface)" stroke-width="1.4"/>
  <line x1="150" y1="165" x2="150" y2="260" class="v-grid" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="45" y1="165" x2="150" y2="165" class="v-grid" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="154" y="178" class="sm v-muted">(0, 0.5)</text>

  <line x1="255" y1="87.3" x2="255" y2="260" class="v-grid" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
  <text x="199" y="60" text-anchor="middle" class="sm-b v-label">+400 -&gt; ~0.9 (10:1)</text>
  <line x1="230" y1="63" x2="253" y2="85" class="v-grid" stroke-width="1"/>
</g>

<g data-anim="3">
  <circle cx="168.4" cy="146.1" r="5" fill="var(--accent)" stroke="var(--surface)" stroke-width="1.5"/>
  <line x1="168.4" y1="146.1" x2="168.4" y2="260" stroke="var(--accent)" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="168.4" y1="146.1" x2="45" y2="146.1" stroke="var(--accent)" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="172" y="140" class="sm-b" fill="var(--accent)">gap=70, P~0.6</text>

  <path d="M 173 148 C 230 175 270 180 305 178" fill="none" stroke="var(--accent)" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#elo-arrow-a)"/>
</g>


<text x="427" y="44" text-anchor="middle" class="region-title v-label">One battle -&gt; update</text>

<g data-anim="4">
  <rect x="310" y="60" width="100" height="54" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="360" y="80" text-anchor="middle" class="chip-name v-label">Model A</text>
  <text x="360" y="101" text-anchor="middle" class="chip-val v-label">1050</text>

  <text x="427" y="93" text-anchor="middle" class="sm-b v-muted">vs</text>

  <rect x="445" y="60" width="100" height="54" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="495" y="80" text-anchor="middle" class="chip-name v-label">Model B</text>
  <text x="495" y="101" text-anchor="middle" class="chip-val v-label">980</text>

  <text x="427" y="132" text-anchor="middle" class="sm-b" fill="var(--accent)">expected: P(A) ~ 0.6</text>
  <text x="427" y="144" text-anchor="middle" class="sm v-muted">(read off the curve)</text>
</g>

<g data-anim="5">
  <text x="427" y="166" text-anchor="middle" class="sm-b" fill="var(--good,#2f9e6e)">actual outcome: A wins</text>
  <text x="427" y="182" text-anchor="middle" class="mono v-muted">delta = K x (actual - expected), K=32</text>

  <path d="M 355 197 l 0 -9 l -4 0 l 6 -8 l 6 8 l -4 0 l 0 9 z" fill="var(--good,#2f9e6e)"/>
  <text x="368" y="200" class="mono-b" fill="var(--good,#2f9e6e)">A: +12.8 -&gt; 1062.8</text>

  <path d="M 355 214 l 0 9 l -4 0 l 6 8 l 6 -8 l -4 0 l 0 -9 z" fill="var(--warn,#e0a106)"/>
  <text x="368" y="226" class="mono-b" fill="var(--warn,#e0a106)">B: -12.8 -&gt; 967.2</text>
</g>

<g data-anim="6">
  <rect x="310" y="242" width="235" height="52" rx="8" class="v-fill v-stroke" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="427" y="259" text-anchor="middle" class="sm-b v-label">if the underdog B had won instead:</text>
  <text x="427" y="273" text-anchor="middle" class="mono-b v-label">B: +19.2 (bigger swing)</text>
  <text x="427" y="288" text-anchor="middle" class="sm v-muted" style="font-style:italic;">upsets move ratings more</text>
</g>


<text x="687" y="44" text-anchor="middle" class="region-title v-label">Leaderboard converges</text>

<g data-anim="7">
  <g class="viz-pulse">
    <rect x="580" y="52" width="200" height="20" rx="10" class="v-fill v-stroke" stroke-width="1.1"/>
    <text x="680" y="66" text-anchor="middle" class="sm v-label">battle: 3 vs 1 -&gt; 3 wins</text>
  </g>

  <line x1="575" y1="88" x2="800" y2="88" class="v-grid" stroke-width="1" opacity="0.4"/>

  <text x="580" y="106" class="row-rank v-label">#1</text>
  <text x="605" y="106" class="sm-b v-label">Model 2</text>
  <text x="700" y="106" text-anchor="end" class="mono v-muted">1046</text>
  <line x1="720" y1="102" x2="774" y2="102" class="v-grid" stroke-width="1.4"/>
  <circle cx="762" cy="102" r="3.5" fill="var(--accent)"/>

  <text x="580" y="144" class="row-rank v-label">#2</text>
  <text x="605" y="144" class="sm-b v-label">Model 4</text>
  <text x="700" y="144" text-anchor="end" class="mono v-muted">1021</text>
  <line x1="720" y1="140" x2="774" y2="140" class="v-grid" stroke-width="1.4"/>
  <circle cx="750" cy="140" r="3.5" fill="var(--accent)"/>

  <text x="580" y="182" class="row-rank v-label">#3</text>
  <text x="605" y="182" class="sm-b v-label">Model 1</text>
  <text x="700" y="182" text-anchor="end" class="mono v-muted">1005</text>
  <line x1="720" y1="178" x2="774" y2="178" class="v-grid" stroke-width="1.4"/>
  <circle cx="742" cy="178" r="3.5" fill="var(--accent)"/>

  <text x="580" y="220" class="row-rank v-label">#4</text>
  <text x="605" y="220" class="sm-b v-label">Model 3</text>
  <text x="700" y="220" text-anchor="end" class="mono v-muted">968</text>
  <line x1="720" y1="216" x2="774" y2="216" class="v-grid" stroke-width="1.4"/>
  <circle cx="726" cy="216" r="3.5" fill="var(--accent)"/>
</g>

<g data-anim="8">
  <line x1="580" y1="240" x2="640" y2="240" class="v-muted-s" stroke="var(--muted)" stroke-width="2" opacity="0.5"/>
  <text x="646" y="243" class="sm v-muted">early (wide)</text>
  <line x1="580" y1="256" x2="600" y2="256" stroke="var(--accent)" stroke-width="2"/>
  <text x="606" y="259" class="sm v-muted">now (tight)</text>
  <text x="687" y="276" text-anchor="middle" class="sm v-muted" style="font-style:italic;">whiskers shrink as battles accumulate</text>

  <rect x="637" y="288" width="100" height="22" rx="11" class="v-fill v-stroke" stroke-width="1.2"/>
  <text x="687" y="303" text-anchor="middle" class="sm-b v-label">battles: 500</text>
</g>

<text x="410" y="337" text-anchor="middle" class="cap v-label">noisy pairwise battles -&gt; stable global ranking</text>

</svg>
<figcaption><b>Every Elo update is the same rule: move each rating toward the outcome by a step proportional to how surprising it was.</b> The logistic curve converts a rating gap into a win probability; a single battle between a 1050-rated and a 980-rated model (K=32) nudges both ratings by about 13 points when the favorite wins, but a bigger ~19-point swing when the underdog wins, since upsets carry more information. Run enough battles and the noisy per-game updates average out into a stable, low-uncertainty leaderboard.</figcaption>
</figure>
