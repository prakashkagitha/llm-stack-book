<figure class="viz" id="fig-moe-routing">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 402" role="img" aria-label="A token enters a router that computes six raw logits; only the top-2 highest logits are kept and renormalized with a softmax into gate weights that sum to one, and the two selected experts run and are combined in a weighted sum that returns to the residual stream.">
  <defs>
    <marker id="moe-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-moe-routing text{ fill:var(--ink-soft); }
    #fig-moe-routing .lbl{ font:600 13px var(--sans,sans-serif); }
    #fig-moe-routing .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-moe-routing .mono{ font:500 11px var(--mono,monospace); }
    #fig-moe-routing .score{ font:600 11px var(--mono,monospace); }
    #fig-moe-routing .op{ font:600 17px var(--serif,serif); }
    #fig-moe-routing .ex{ font:600 12px var(--sans,sans-serif); }
  </style>


  <text x="404" y="24" text-anchor="middle" class="sm">E = 6 experts — a bank of FFNs</text>
  <text x="590" y="24" text-anchor="middle" class="sm">raw logit -&gt; renorm -&gt; gate wt</text>

  
  <g data-anim="1">
    <rect x="14" y="172" width="60" height="44" rx="7" class="v-fill v-accent-s" stroke-width="1.6"/>
    <text x="44" y="192" text-anchor="middle" class="op v-accent" fill="var(--accent)">x</text>
    <text x="44" y="208" text-anchor="middle" class="sm">token</text>
    <text x="44" y="236" text-anchor="middle" class="sm">d_model</text>
  </g>
  <line x1="76" y1="194" x2="110" y2="194" class="v-muted" stroke="currentColor" stroke-width="1.5" marker-end="url(#moe-arrow)"/>

  
  <g data-anim="2">
    <rect x="112" y="160" width="80" height="68" rx="8" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.7"/>
    <text x="152" y="188" text-anchor="middle" class="lbl" fill="var(--accent2,#3b82f6)">Router</text>
    <text x="152" y="206" text-anchor="middle" class="sm">W_g · x</text>
    <text x="152" y="222" text-anchor="middle" class="sm">6 logits</text>
    <text x="152" y="248" text-anchor="middle" class="sm">tiny linear gate</text>
  </g>

  
  
  <g data-anim="3">
    
    <path d="M192 194 C 280 60,  330 60,  360 60"  fill="none" class="v-grid" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.75"/>
    <path d="M192 194 C 280 176, 330 176, 360 176" fill="none" class="v-grid" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.75"/>
    <path d="M192 194 C 280 234, 330 234, 360 234" fill="none" class="v-grid" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.75"/>
    <path d="M192 194 C 280 350, 330 350, 360 350" fill="none" class="v-grid" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.75"/>
    
    <path d="M192 194 C 280 118, 330 118, 360 118" fill="none" class="v-accent-s viz-draw" style="--len:210" stroke="var(--accent)" stroke-width="2.3"/>
    <path d="M192 194 C 280 292, 330 292, 360 292" fill="none" class="v-accent-s viz-draw" style="--len:210" stroke="var(--accent)" stroke-width="2.3"/>
  </g>

  
  
  <g data-anim="3">
    <g class="v-fill v-grid" stroke-width="1.3">
      <rect x="360" y="42"  width="120" height="36" rx="6"/>
      <rect x="360" y="158" width="120" height="36" rx="6"/>
      <rect x="360" y="216" width="120" height="36" rx="6"/>
      <rect x="360" y="332" width="120" height="36" rx="6"/>
    </g>
    <text x="420" y="65"  text-anchor="middle" class="ex sm">FFN&#8321;</text>
    <text x="420" y="181" text-anchor="middle" class="ex sm">FFN&#8323;</text>
    <text x="420" y="239" text-anchor="middle" class="ex sm">FFN&#8324;</text>
    <text x="420" y="355" text-anchor="middle" class="ex sm">FFN&#8326;</text>
    <text x="494" y="65"  class="score sm">0.4</text>
    <text x="494" y="181" class="score sm">0.7</text>
    <text x="494" y="239" class="score sm">-0.3</text>
    <text x="494" y="355" class="score sm">-0.6</text>
  </g>


  <g data-anim="4">
    <rect x="360" y="100" width="120" height="36" rx="6" class="v-fill" stroke="var(--accent)" stroke-width="2"/>
    <rect x="360" y="100" width="120" height="36" rx="6" class="viz-pulse" fill="var(--accent)" fill-opacity="0.16"/>
    <text x="420" y="123" text-anchor="middle" class="ex v-accent" fill="var(--accent)">FFN&#8322; active</text>
    <text x="494" y="123" class="score sm">1.5</text>

    <rect x="360" y="274" width="120" height="36" rx="6" class="v-fill" stroke="var(--accent)" stroke-width="2"/>
    <rect x="360" y="274" width="120" height="36" rx="6" class="viz-pulse" fill="var(--accent)" fill-opacity="0.16"/>
    <text x="420" y="297" text-anchor="middle" class="ex v-accent" fill="var(--accent)">FFN&#8325; active</text>
    <text x="494" y="297" class="score sm">1.0</text>
  </g>


  <text x="524" y="112" class="sm" fill="var(--muted)">top-2,</text>
  <text x="524" y="124" class="sm" fill="var(--muted)">renorm:</text>
  <text x="524" y="286" class="sm" fill="var(--muted)">top-2,</text>
  <text x="524" y="298" class="sm" fill="var(--muted)">renorm:</text>
  <text x="580" y="118" class="score v-accent" fill="var(--accent)">0.62</text>
  <text x="580" y="292" class="score v-accent" fill="var(--accent)">0.38</text>


  <g data-anim="5">
    <path d="M614 118 C 620 130, 622 150, 620 172" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="2" marker-end="url(#moe-arrow)"/>
    <path d="M614 292 C 620 280, 622 250, 620 208" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="2" marker-end="url(#moe-arrow)"/>


    <circle cx="610" cy="190" r="24" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
    <text x="610" y="197" text-anchor="middle" class="op" fill="var(--good,#2f9e6e)">&#931;</text>
    <text x="610" y="246" text-anchor="middle" class="sm">weighted sum</text>

    <line x1="634" y1="190" x2="668" y2="190" class="v-muted" stroke="currentColor" stroke-width="1.5" marker-end="url(#moe-arrow)"/>


    <rect x="670" y="168" width="60" height="44" rx="7" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.7"/>
    <rect x="670" y="168" width="60" height="44" rx="7" class="viz-pulse" fill="var(--good,#2f9e6e)" fill-opacity="0.16"/>
    <text x="700" y="197" text-anchor="middle" class="op" fill="var(--good,#2f9e6e)">y</text>
    <text x="700" y="160" text-anchor="middle" class="sm">to residual</text>
  </g>

  
  <text x="14" y="300" class="mono">MoE(x) = g&#8322;·FFN&#8322;(x) + g&#8325;·FFN&#8325;(x)</text>
  <text x="14" y="317" class="sm">softmax over the 2 selected experts: 0.62 + 0.38 = 1</text>
  <g data-anim="5">
    <text x="14" y="348" class="lbl" fill="var(--accent)">Sparse activation</text>
    <text x="14" y="365" class="sm">k = 2 of E = 6 experts run — the model holds 6 FFNs,</text>
    <text x="14" y="380" class="sm">but each token pays the compute of only 2.</text>
  </g>
</svg>
<figcaption><b>Sparse top-2 routing: a model with many experts, a bill for only two.</b> A tiny linear <b>router</b> scores all six expert FFNs; only the <b>top-2</b> highest-scoring experts (FFN&#8322;, FFN&#8325;) actually run, and a softmax over just those two gives gate weights (0.62, 0.38) that sum to one. The layer output is their <b>weighted sum</b> — so the model has the capacity of six FFNs while each token pays the compute of two.</figcaption>
</figure>
