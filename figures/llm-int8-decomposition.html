<figure class="viz" id="fig-llm-int8-decomposition">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 450" role="img" aria-label="LLM.int8() splits the matmul by feature column: a handful of outlier columns, detected at runtime because their magnitude exceeds a threshold of about 6, are routed with their matching weight rows into a small exact FP16 matmul, while the remaining ninety-nine point nine percent of regular columns are routed into a large fast INT8 matmul, and the two partial products are summed to give the final output.">

    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>

  #fig-llm-int8-decomposition .badge{ font:600 10.5px var(--sans,sans-serif); }
</style>

<text x="410" y="20" text-anchor="middle" class="title">LLM.int8(): split the matmul by outlier vs. regular feature columns</text>

  <rect x="20" y="240" width="150" height="11" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>

  <rect x="20" y="284" width="150" height="11" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>
  <rect x="20" y="295" width="150" height="11" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>
  <rect x="20" y="306" width="150" height="11" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#cbd5e1)" stroke-width="0.8"/>
  <rect x="20" y="317" width="150" height="11" fill="var(--accent,#c15b39)" fill-opacity="0.22" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>

  <text x="95" y="363" text-anchor="middle" class="mono">W: weights  [features x out]</text>
</g>


<g data-anim="3">
  
  <line x1="170" y1="105" x2="330" y2="80" stroke="var(--accent,#c15b39)" stroke-width="1.5" marker-end="url(#int8dc-arrow-accent)"/>
  <line x1="170" y1="267" x2="330" y2="110" stroke="var(--accent,#c15b39)" stroke-width="1.5" marker-end="url(#int8dc-arrow-accent)"/>

  <text x="200" y="205" class="mono-sm" fill="var(--accent,#c15b39)">W[O,:]</text>

  
  <line x1="170" y1="160" x2="330" y2="205" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#int8dc-arrow)"/>
  <line x1="170" y1="300" x2="330" y2="280" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#int8dc-arrow)"/>
  <text x="220" y="178" class="mono-sm">X[:,R]</text>
  <text x="220" y="325" class="mono-sm">W[R,:]</text>
</g>


<g data-anim="4">
  
  <rect x="330" y="58" width="150" height="72" rx="8" fill="var(--accent,#c15b39)" fill-opacity="0.08" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
  <text x="405" y="80" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">FP16 matmul</text>
  <text x="405" y="96" text-anchor="middle" class="note">exact, no quant error</text>
  <text x="405" y="109" text-anchor="middle" class="note">few dozen channels,</text>
  <text x="405" y="121" text-anchor="middle" class="note">cheap</text>

  
  <rect x="330" y="172" width="185" height="140" rx="8" fill="var(--ink-soft,#374151)" fill-opacity="0.06" stroke="var(--ink-soft,#64748b)" stroke-width="1.6"/>
  <text x="422" y="200" text-anchor="middle" class="lbl">INT8 matmul</text>
  <text x="422" y="220" text-anchor="middle" class="note">tensor cores</text>
  <text x="422" y="238" text-anchor="middle" class="note">~99.9% of the FLOPs,</text>
  <text x="422" y="254" text-anchor="middle" class="note">fast</text>
</g>


<g data-anim="5">
  <text x="405" y="145" text-anchor="middle" class="accent-note">outlier columns -&gt; FP16 (exact)</text>
  <text x="422" y="333" text-anchor="middle" class="lbl">regular columns -&gt; INT8 (tensor cores)</text>
</g>


<g data-anim="6">
  <line x1="480" y1="94" x2="548" y2="168" stroke="var(--ink-soft,#64748b)" stroke-width="1.4" marker-end="url(#int8dc-arrow)"/>
  <line x1="515" y1="242" x2="552" y2="182" stroke="var(--ink-soft,#64748b)" stroke-width="1.4" marker-end="url(#int8dc-arrow)"/>

  <circle cx="562" cy="176" r="15" fill="var(--surface,#fff)" stroke="var(--ink-soft,#64748b)" stroke-width="1.6"/>
  <text x="562" y="181" text-anchor="middle" font-size="16" font-weight="700" fill="var(--ink-soft,#1f2937)">+</text>
  <text x="562" y="206" text-anchor="middle" class="lbl">sum partial products</text>

  <line x1="577" y1="176" x2="612" y2="176" stroke="var(--ink-soft,#64748b)" stroke-width="1.4" marker-end="url(#int8dc-arrow)"/>

  <rect x="612" y="140" width="188" height="72" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.08" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <text x="706" y="164" text-anchor="middle" class="mono">Y = X W  [tokens x out]</text>
  <text x="706" y="182" text-anchor="middle" class="mono-sm">= X[:,R] W[R,:]</text>
  <text x="706" y="196" text-anchor="middle" class="mono-sm">+ X[:,O] W[O,:]</text>
</g>


<g data-anim="7">
  <rect x="20" y="388" width="370" height="34" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.08" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
  <text x="205" y="404" text-anchor="middle" class="badge" fill="var(--good,#2f9e6e)">zero calibration / no Hessian /</text>
  <text x="205" y="417" text-anchor="middle" class="badge" fill="var(--good,#2f9e6e)">no scale search</text>

  <rect x="400" y="388" width="400" height="34" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.08" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
  <text x="600" y="404" text-anchor="middle" class="badge" fill="var(--warn,#e0a106)">cost: split-matmul kernel overhead -&gt;</text>
  <text x="600" y="417" text-anchor="middle" class="badge" fill="var(--warn,#e0a106)">better for fitting than for peak throughput</text>
</g>

</svg>
<figcaption><b>LLM.int8() decomposes the matmul by feature column: outlier columns, detected at runtime once their magnitude crosses a threshold (~6), are routed with their matching weight rows into a tiny exact FP16 matmul, while the remaining ~99.9% of regular columns run through a large fast INT8 matmul.</b> The two partial products share the same output shape and are simply summed, so the split costs zero calibration but adds kernel overhead — better for fitting a model in memory than for peak throughput.</figcaption>
</figure>
