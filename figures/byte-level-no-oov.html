<figure class="viz" id="fig-byte-level-no-oov">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 700" role="img" aria-label="Top-to-bottom pipeline showing byte-level BPE guarantees no unk. Stage 1: the input string cafe with an accented e and a robot emoji. Stage 2: UTF-8 encoding expands each character into one or more bytes, with the accented e taking two bytes and the emoji taking four bytes. Stage 3: a 16 by 16 grid of all 256 possible byte values, with the bytes from stage 2 highlighted, showing the base alphabet is complete and finite so any byte is a guaranteed token. Stage 4: frequent byte pairs merge into subword tokens, while the novel emoji in the worst case simply stays as its four individual byte tokens, still valid and lossless.">
  <style>
    #fig-byte-level-no-oov text{ fill:var(--ink-soft); }
    #fig-byte-level-no-oov .stage{ font:700 13px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-byte-level-no-oov .stage-num{ font:700 11px var(--sans,sans-serif); fill:var(--accent); }
    #fig-byte-level-no-oov .ch{ font:600 15px var(--mono,monospace); }
    #fig-byte-level-no-oov .byte{ font:600 9px var(--mono,monospace); }
    #fig-byte-level-no-oov .ann{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-byte-level-no-oov .ann-good{ font:600 11px var(--sans,sans-serif); fill:var(--good,#2f9e6e); }
    #fig-byte-level-no-oov .callout{ font:500 10px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-byte-level-no-oov .divider{ stroke:var(--border-2); stroke-width:1; }
  </style>

  
  <g data-anim="1">
    <text x="20" y="26" class="stage-num">STAGE 1</text>
    <text x="90" y="26" class="stage">input string (never seen at training time)</text>
    <rect x="20" y="36" width="740" height="46" rx="8" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="370" y="66" text-anchor="end" class="ch">caf&#233; [robot emoji]</text>
    <text x="380" y="66" class="ann">(accented e, robot emoji -- glyphs a training run may never have seen)</text>
  </g>

  <line x1="20" y1="96" x2="760" y2="96" class="divider"/>

  
  <g data-anim="2">
    <text x="20" y="122" class="stage-num">STAGE 2</text>
    <text x="90" y="122" class="stage">UTF-8 encode -&gt; each character expands into one or more bytes</text>

    
    <g class="v-fill v-stroke" stroke-width="1.1">
      <rect x="20" y="136" width="40" height="30" rx="5"/>
      <rect x="64" y="136" width="40" height="30" rx="5"/>
      <rect x="108" y="136" width="40" height="30" rx="5"/>
    </g>
    <g class="byte" text-anchor="middle">
      <text x="40" y="156">0x63</text><text x="84" y="156">0x61</text><text x="128" y="156">0x66</text>
    </g>
    <text x="84" y="180" text-anchor="middle" class="ann">c a f: 1 byte each</text>

    
    <path d="M156 132 h64 v-6 M156 132 v6 M220 132 v-6" fill="none" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <g class="v-fill" stroke="var(--accent)" stroke-width="1.5">
      <rect x="156" y="136" width="40" height="30" rx="5"/>
      <rect x="200" y="136" width="40" height="30" rx="5"/>
    </g>
    <g class="byte" text-anchor="middle" fill="var(--accent)">
      <text x="176" y="156">0xC3</text><text x="220" y="156">0xA9</text>
    </g>
    <text x="188" y="180" text-anchor="middle" class="ann" fill="var(--accent)">&#233;: 2 bytes</text>

    
    <g class="v-fill v-stroke" stroke-width="1.1">
      <rect x="252" y="136" width="40" height="30" rx="5"/>
    </g>
    <text x="272" y="156" text-anchor="middle" class="byte">0x20</text>
    <text x="272" y="180" text-anchor="middle" class="ann">space: 1 byte</text>

    
    <path d="M300 132 h176 v-6 M300 132 v6 M476 132 v-6" fill="none" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <g class="v-fill" stroke="var(--accent)" stroke-width="1.5">
      <rect x="300" y="136" width="42" height="30" rx="5"/>
      <rect x="346" y="136" width="42" height="30" rx="5"/>
      <rect x="392" y="136" width="42" height="30" rx="5"/>
      <rect x="438" y="136" width="42" height="30" rx="5"/>
    </g>
    <g class="byte" text-anchor="middle" fill="var(--accent)">
      <text x="321" y="156">0xF0</text><text x="367" y="156">0x9F</text>
      <text x="413" y="156">0xA4</text><text x="459" y="156">0x96</text>
    </g>
    <text x="388" y="180" text-anchor="middle" class="ann" fill="var(--accent)">robot emoji: 4 bytes</text>

    <text x="620" y="156" class="ann-good">1 char -&gt; several bytes</text>
  </g>

<figcaption><b>Byte-level BPE starts from the 256 possible byte values, so the base alphabet is provably complete.</b> Any string first becomes UTF-8 bytes; frequent byte sequences merge into subword tokens, but even a character never seen in training falls back to its individual bytes losslessly — there is no escape hatch to <span class="v-mono">&#60;unk&#62;</span>.</figcaption>
