<figure class="viz" id="fig-ssm-scan">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 372" role="img" aria-label="A state-space model carries one fixed-size state left to right, updating it with h_t = A h_{t-1} + B x_t in O(N) sequential steps, while attention instead connects every token to every other token in O(N squared) pairs.">
  <defs>
    <marker id="ss-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-ssm-scan text{ fill:var(--ink-soft); }
    #fig-ssm-scan .ttl{ font:700 13px var(--sans,sans-serif); }
    #fig-ssm-scan .sub{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-ssm-scan .tok{ font:600 12px var(--mono,monospace); }
    #fig-ssm-scan .st{ font:700 13px var(--mono,monospace); }
    #fig-ssm-scan .rec{ font:600 12.5px var(--mono,monospace); }
    #fig-ssm-scan .tag{ font:600 10px var(--mono,monospace); fill:var(--muted); }
    #fig-ssm-scan .big{ font:700 12px var(--sans,sans-serif); }
  </style>

  
  <g data-anim="1">
    <text x="20" y="24" class="ttl" fill="var(--accent)">State-space scan</text>
    <text x="146" y="24" class="ttl" fill="var(--accent)">— one rolling state, left to right</text>
    <rect x="630" y="11" width="112" height="20" rx="10" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
    <text x="686" y="25" text-anchor="middle" class="big" fill="var(--good,#2f9e6e)">O(N) · 4 steps</text>
  </g>

  
  <g data-anim="1">
    <rect x="20" y="40" width="356" height="26" rx="6" class="v-fill v-grid" stroke-width="1.1"/>
    <text x="34" y="58" class="rec"><tspan fill="var(--accent)">h</tspan><tspan baseline-shift="sub" font-size="9">t</tspan> = A·h<tspan baseline-shift="sub" font-size="9">t-1</tspan> + B·x<tspan baseline-shift="sub" font-size="9">t</tspan><tspan dx="14" fill="var(--muted)">·</tspan><tspan dx="14"> y</tspan><tspan baseline-shift="sub" font-size="9">t</tspan> = C·h<tspan baseline-shift="sub" font-size="9">t</tspan></text>
  </g>

  
  <g data-anim="2">
    <g class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.3">
      <rect x="74"  y="84" width="40" height="26" rx="5"/>
      <rect x="234" y="84" width="40" height="26" rx="5"/>
      <rect x="394" y="84" width="40" height="26" rx="5"/>
      <rect x="554" y="84" width="40" height="26" rx="5"/>
    </g>
    <text x="94"  y="102" text-anchor="middle" class="tok" fill="var(--accent2,#3b82f6)">x₁</text>
    <text x="254" y="102" text-anchor="middle" class="tok" fill="var(--accent2,#3b82f6)">x₂</text>
    <text x="414" y="102" text-anchor="middle" class="tok" fill="var(--accent2,#3b82f6)">x₃</text>
    <text x="574" y="102" text-anchor="middle" class="tok" fill="var(--accent2,#3b82f6)">x₄</text>
    <text x="638" y="102" class="tag">inputs</text>
  </g>

  
  <g data-anim="3" class="v-accent2" color="var(--accent2,#3b82f6)">
    <g fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.4" marker-end="url(#ss-arrow)">
      <line x1="94"  y1="110" x2="94"  y2="146"/>
      <line x1="254" y1="110" x2="254" y2="146"/>
      <line x1="414" y1="110" x2="414" y2="146"/>
      <line x1="574" y1="110" x2="574" y2="146"/>
    </g>
    <text x="116" y="132" class="tag" fill="var(--accent2,#3b82f6)">B·x₁</text>
  </g>

  
  <g data-anim="3">
    
    <g class="v-accent-s viz-draw" style="--len:150" fill="none" stroke="var(--accent)" stroke-width="2" marker-end="url(#ss-arrow)" color="var(--accent)">
      <line x1="58"  y1="170" x2="70"  y2="170"/>
      <line x1="118" y1="170" x2="228" y2="170"/>
      <line x1="278" y1="170" x2="388" y2="170"/>
      <line x1="438" y1="170" x2="548" y2="170"/>
      <line x1="598" y1="170" x2="618" y2="170"/>
    </g>
    
    <text x="173" y="162" text-anchor="middle" class="tag" fill="var(--accent)">A</text>
    <text x="333" y="162" text-anchor="middle" class="tag" fill="var(--accent)">A</text>
    <text x="493" y="162" text-anchor="middle" class="tag" fill="var(--accent)">A</text>

    
    <text x="44" y="174" text-anchor="middle" class="tag" fill="var(--muted)">h₀</text>

    
    <g>
      <rect x="74"  y="150" width="40" height="40" rx="7" class="v-fill" stroke="var(--accent)" stroke-width="1.7"/>
      <rect x="234" y="150" width="40" height="40" rx="7" class="v-fill" stroke="var(--accent)" stroke-width="1.7"/>
      <rect x="394" y="150" width="40" height="40" rx="7" class="v-fill" stroke="var(--accent)" stroke-width="1.7"/>
      <rect x="554" y="150" width="40" height="40" rx="7" class="v-fill" stroke="var(--accent)" stroke-width="1.7"/>
    </g>
    <rect x="554" y="150" width="40" height="40" rx="7" class="viz-pulse" fill="var(--accent)" fill-opacity="0.18"/>
    <text x="94"  y="175" text-anchor="middle" class="st" fill="var(--accent)">h₁</text>
    <text x="254" y="175" text-anchor="middle" class="st" fill="var(--accent)">h₂</text>
    <text x="414" y="175" text-anchor="middle" class="st" fill="var(--accent)">h₃</text>
    <text x="574" y="175" text-anchor="middle" class="st" fill="var(--accent)">h₄</text>
    <text x="630" y="158" class="tag">fixed-size</text>
    <text x="630" y="186" class="tag">state</text>
  </g>

  
  <g data-anim="4">
    <g fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.4" marker-end="url(#ss-arrow)">
      <line x1="94"  y1="190" x2="94"  y2="226"/>
      <line x1="254" y1="190" x2="254" y2="226"/>
      <line x1="414" y1="190" x2="414" y2="226"/>
      <line x1="574" y1="190" x2="574" y2="226"/>
    </g>
    <text x="116" y="212" class="tag" fill="var(--good,#2f9e6e)">C·h₁</text>
  </g>

  
  <g data-anim="4">
    <g class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.3">
      <rect x="74"  y="230" width="40" height="26" rx="5"/>
      <rect x="234" y="230" width="40" height="26" rx="5"/>
      <rect x="394" y="230" width="40" height="26" rx="5"/>
      <rect x="554" y="230" width="40" height="26" rx="5"/>
    </g>
    <text x="94"  y="248" text-anchor="middle" class="tok" fill="var(--good,#2f9e6e)">y₁</text>
    <text x="254" y="248" text-anchor="middle" class="tok" fill="var(--good,#2f9e6e)">y₂</text>
    <text x="414" y="248" text-anchor="middle" class="tok" fill="var(--good,#2f9e6e)">y₃</text>
    <text x="574" y="248" text-anchor="middle" class="tok" fill="var(--good,#2f9e6e)">y₄</text>
    <text x="638" y="248" class="tag">outputs</text>
  </g>

  
  <line x1="20" y1="276" x2="740" y2="276" class="v-grid" stroke-width="1"/>

  
  <g data-anim="5">
    <text x="20" y="300" class="ttl">Attention</text>
    <text x="92" y="300" class="ttl">— every token looks at every other token</text>
    <rect x="606" y="287" width="136" height="20" rx="10" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <text x="674" y="301" text-anchor="middle" class="big" fill="var(--warn,#e0a106)">O(N²) · 10 pairs</text>
  </g>

  
  <g data-anim="5">
    <g fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.3" opacity="0.9">
      
      <path d="M94 348 Q174 326 254 348"/>
      <path d="M254 348 Q334 326 414 348"/>
      <path d="M414 348 Q494 326 574 348"/>
      
      <path d="M94 348 Q254 318 414 348"/>
      <path d="M254 348 Q414 318 574 348"/>
      
      <path d="M94 348 Q334 312 574 348"/>
    </g>
    <g class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.3">
      <rect x="74"  y="348" width="40" height="14" rx="5"/>
      <rect x="234" y="348" width="40" height="14" rx="5"/>
      <rect x="394" y="348" width="40" height="14" rx="5"/>
      <rect x="554" y="348" width="40" height="14" rx="5"/>
    </g>
    <text x="94"  y="358" text-anchor="middle" class="tok" fill="var(--warn,#e0a106)">x₁</text>
    <text x="254" y="358" text-anchor="middle" class="tok" fill="var(--warn,#e0a106)">x₂</text>
    <text x="414" y="358" text-anchor="middle" class="tok" fill="var(--warn,#e0a106)">x₃</text>
    <text x="574" y="358" text-anchor="middle" class="tok" fill="var(--warn,#e0a106)">x₄</text>
    <text x="624" y="358" class="sub">pairs grow as N²</text>
  </g>
</svg>
<figcaption><b>A scan, not all-pairs.</b> An SSM compresses the whole past into one fixed-size state and updates it left to right with <b>h<sub>t</sub> = A·h<sub>t-1</sub> + B·x<sub>t</sub></b>, reading out <b>y<sub>t</sub> = C·h<sub>t</sub></b> — a linear O(N) sweep with constant per-step cost. Attention instead wires every token to every earlier token, so the work and memory grow as O(N²).</figcaption>
</figure>
