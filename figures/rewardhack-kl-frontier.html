<text x="380" y="358" text-anchor="middle" class="cap muted">Dashed line: same KL in both panels. Past peak, proxy rises while true reward falls (rate ~ sqrt(KL)).</text>

<figcaption><b>The KL-reward frontier reveals reward hacking.</b> As the KL penalty beta decreases (policy drifts further from pi_ref), proxy reward r_theta rises monotonically (left), but true reward r* forms an inverted-U: it peaks at moderate KL (~3 nats per Gao et al. 2022) then falls as the policy exploits proxy blind spots. The dashed vertical line marks the same KL in both panels — once you pass the peak, every additional optimization step increases proxy reward while decreasing true reward, at a rate proportional to sqrt(KL).</figcaption>
</figure>
