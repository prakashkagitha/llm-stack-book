<figure class="viz" id="fig-test-time-scaling-curves">

<svg viewBox="0 0 780 560" role="img" aria-label="Schematic chart of accuracy versus test-time compute: best-of-N with an ORM rises then flattens early, while PRM-guided search rises steeper and keeps climbing much longer before its own gentle flattening; an inset shows that train-time and test-time compute compose, with frontier models pushing both.">

</g>

  <line x1="452" y1="95" x2="478" y2="70" stroke="var(--good,#2f9e6e)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>

  <text x="360" y="86" text-anchor="start" class="anno-strong prm-fill">steeper scaling.</text>

<g data-anim="5">
  <line x1="107" y1="176" x2="181" y2="178" stroke="var(--muted,#888)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <circle cx="100" cy="175" r="5.5" fill="var(--surface,#fff)" class="orm-stroke" stroke-width="2.2"/>
  <text x="100" y="158" text-anchor="middle" class="point-lbl">large model,</text>
  <text x="100" y="171" text-anchor="middle" class="point-lbl">greedy</text>

  <circle cx="188" cy="177.8" r="4.5" class="prm-fill"/>
  <text x="205" y="205" text-anchor="start" class="anno">small model + more samples can</text>
  <text x="205" y="220" text-anchor="start" class="anno">match a bigger model run greedily.</text>
</g>


<g data-anim="2">
  <text x="670" y="86" text-anchor="middle" class="inset-title">the two axes compose</text>
  <rect x="585" y="98" width="170" height="160" rx="4" fill="url(#ttsc-inset-grad)" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>

  
  <path d="M755,258 A140,140 0 0,0 645,98" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1" opacity="0.35"/>

  <line x1="600" y1="243" x2="722" y2="128" stroke="var(--muted,#888)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ttsc-arrow)"/>

  <text x="670" y="278" text-anchor="middle" class="inset-axis">train-time compute</text>
  <text x="576" y="178" text-anchor="middle" class="inset-axis" transform="rotate(-90,576,178)">test-time compute</text>

  <circle cx="734" cy="118" r="4" fill="var(--accent,#c15b39)"/>
  <text x="670" y="235" text-anchor="middle" class="inset-lbl" fill="var(--accent,#c15b39)">frontier models</text>
  <text x="670" y="249" text-anchor="middle" class="inset-lbl" fill="var(--accent,#c15b39)">push BOTH</text>
</g>
</svg>

<figcaption><b>Accuracy vs. test-time compute is a saturating curve, and the shape of the saturation depends on the verifier.</b> Best-of-N search guided by an outcome reward model (ORM) rises quickly but flattens early -- once N is large, the verifier can no longer tell many wrong-but-similar answers apart, and reward hacking sets in. Search guided by a process reward model (PRM) rises steeper and keeps paying off much longer before its own gentle flattening, because it scores every intermediate step rather than only the final answer. This lets a small model with many samples match a large model run greedily (inset points) -- and the same logic composes with train-time scale: frontier systems push both axes at once.</figcaption>
</figure>
