<figcaption><b>PPO requires a second transformer (the critic / value network) to estimate advantages; GRPO and RLOO replace it with a free group baseline.</b> On the left, PPO's flow runs through a full Value Network V(s) and GAE to produce an advantage — an extra learned model with its own optimizer state. On the right, sampling G responses to the same prompt is sufficient: the group mean is the baseline, and the advantage is simply each reward minus that mean. No second network, no GAE, no additional parameter memory.</figcaption>
</figure>
