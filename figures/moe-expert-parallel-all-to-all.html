<figcaption><b>Expert parallelism: two all-to-all collectives wrap each MoE layer.</b> Tokens start on their home GPUs (left), an all-to-all dispatch sends each token to the GPU holding its chosen expert (crossing arrows show the all-to-all pattern), experts compute locally, then a second all-to-all returns results home for the residual add. The all-to-all is a synchronization barrier, so GPU1 processing more tokens (overloaded) stalls all other GPUs — making load balance a direct throughput concern.</figcaption>
