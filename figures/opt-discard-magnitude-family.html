<figure class="viz" id="fig-opt-discard-magnitude-family">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 480" role="img" aria-label="Three optimizers on a shared spectrum from scalar to matrix, all discarding magnitude and keeping direction: Adam softly divides each coordinate by its running magnitude toward roughly unit size, Lion snaps each coordinate exactly to plus or minus one, and Muon orthogonalizes a weight matrix so every singular value becomes exactly one.">
<style>
  #fig-opt-discard-magnitude-family text        { fill: var(--ink-soft,#45413a); }
  #fig-opt-discard-magnitude-family .ttl        { font: 700 15px var(--sans,sans-serif); fill: currentColor; }
  #fig-opt-discard-magnitude-family .sub        { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-opt-discard-magnitude-family .hdr        { font: 700 12px var(--sans,sans-serif); fill: currentColor; }
  #fig-opt-discard-magnitude-family .lbl        { font: 600 9.5px var(--sans,sans-serif); }
  #fig-opt-discard-magnitude-family .small      { font: 500 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-opt-discard-magnitude-family .mono       { font: 700 9.5px var(--mono,monospace); }
  #fig-opt-discard-magnitude-family .axis       { stroke: var(--border-2,#d8d1c0); stroke-width: 1.2; }
  #fig-opt-discard-magnitude-family .refline    { stroke: var(--muted,#6d675d); stroke-width: 1; stroke-dasharray: 4 3; }
  #fig-opt-discard-magnitude-family .accline    { stroke: var(--accent,#c15b39); stroke-width: 1.3; stroke-dasharray: 4 3; }
  #fig-opt-discard-magnitude-family .bar        { fill: var(--surface-3,#ece7da); stroke: var(--muted,#6d675d); stroke-width: 1; }
  #fig-opt-discard-magnitude-family .abar       { fill: var(--accent,#c15b39); fill-opacity: 0.85; stroke: var(--accent,#c15b39); stroke-width: 1.1; }
  #fig-opt-discard-magnitude-family .col        { fill: var(--surface-3,#ece7da); fill-opacity: 0.28; stroke: var(--border-2,#d8d1c0); stroke-width: 1.1; }
</style>

<text x="18" y="24" class="ttl">Adam, Lion, Muon: discard magnitude, keep direction</text>
<text x="18" y="41" class="sub">Same design axis at three granularities: soft per-coordinate normalization, hard per-coordinate sign, and per-singular-value orthogonalization.</text>

<g data-anim="1">
  <rect class="col" x="18"  y="58" width="240" height="368" rx="8"/>
  <rect class="col" x="270" y="58" width="240" height="368" rx="8"/>
  <rect class="col" x="522" y="58" width="240" height="368" rx="8"/>

  <text x="138" y="80" text-anchor="middle" class="hdr">Adam (soft, per-coordinate)</text>
  <text x="390" y="80" text-anchor="middle" class="hdr">Lion (sign, per-coordinate)</text>
  <text x="642" y="80" text-anchor="middle" class="hdr">Muon (orthogonalize, per singular value)</text>
</g>


<g data-anim="2">
  <text x="38" y="104" class="small">input: raw coordinates c</text>
  <line class="axis" x1="45" y1="220" x2="235" y2="220"/>
  <rect class="bar" x="55"  y="130" width="20" height="90"/>
  <rect class="bar" x="85"  y="196" width="20" height="24"/>
  <rect class="bar" x="115" y="160" width="20" height="60"/>
  <rect class="bar" x="145" y="205" width="20" height="15"/>
  <rect class="bar" x="175" y="145" width="20" height="75"/>

  <text x="65"  y="266" text-anchor="middle" class="lbl">divide each coord</text>
  <text x="65"  y="278" text-anchor="middle" class="lbl">by sqrt(v_hat)</text>
  <line x1="45" y1="290" x2="235" y2="290" stroke="var(--muted,#6d675d)" stroke-width="1.4" marker-end="url(#arr)"/>

  <line class="accline" x1="45" y1="368" x2="235" y2="368"/>
  <text x="238" y="371" class="small" fill="var(--accent,#c15b39)">approx unit</text>
  <line class="axis" x1="45" y1="416" x2="235" y2="416"/>
  <rect class="abar" x="55"  y="360" width="20" height="56"/>
  <rect class="abar" x="85"  y="358" width="20" height="58"/>
  <rect class="abar" x="115" y="362" width="20" height="54"/>
  <rect class="abar" x="145" y="365" width="20" height="51"/>
  <rect class="abar" x="175" y="359" width="20" height="57"/>

  <text x="138" y="440" text-anchor="middle" class="small">divide each coord by sqrt(v_hat)</text>
  <text x="138" y="452" text-anchor="middle" class="small" font-weight="700">-&gt; approximately unit</text>
</g>


<g data-anim="3">
  <text x="290" y="104" class="small">input: raw coordinates c</text>
  <line class="axis" x1="297" y1="220" x2="487" y2="220"/>
  <rect class="bar" x="307" y="130" width="20" height="90"/>
  <rect class="bar" x="337" y="196" width="20" height="24"/>
  <rect class="bar" x="367" y="160" width="20" height="60"/>
  <rect class="bar" x="397" y="205" width="20" height="15"/>
  <rect class="bar" x="427" y="145" width="20" height="75"/>

  <text x="317" y="266" text-anchor="middle" class="lbl">sign(c): snap to</text>
  <text x="317" y="278" text-anchor="middle" class="lbl">+1 or -1, exactly</text>
  <line x1="297" y1="290" x2="487" y2="290" stroke="var(--muted,#6d675d)" stroke-width="1.4" marker-end="url(#arr)"/>

  <line class="accline" x1="297" y1="368" x2="487" y2="368"/>
  <text x="490" y="371" class="small" fill="var(--accent,#c15b39)">exactly +eta</text>
  <line class="axis" x1="297" y1="392" x2="487" y2="392"/>
  <line class="accline" x1="297" y1="416" x2="487" y2="416"/>
  <text x="490" y="419" class="small" fill="var(--accent,#c15b39)">exactly -eta</text>
  <rect class="abar" x="307" y="368" width="20" height="24"/>
  <rect class="abar" x="337" y="368" width="20" height="24"/>
  <rect class="abar" x="367" y="368" width="20" height="24"/>
  <rect class="abar" x="427" y="368" width="20" height="24"/>

  <rect class="abar" x="397" y="392" width="20" height="24"/>
  <text x="407" y="386" text-anchor="middle" class="small" fill="var(--accent,#c15b39)" font-size="8">(-1, points down)</text>

  <text x="390" y="440" text-anchor="middle" class="small">sign(c): every coord = +/- eta</text>
  <text x="390" y="452" text-anchor="middle" class="small" font-weight="700">-&gt; exactly uniform</text>
</g>


<g data-anim="4">
  <text x="542" y="104" class="small">momentum M = U Sigma V^T</text>
  <text x="542" y="117" class="small">(singular values, sorted)</text>
  <line class="axis" x1="549" y1="220" x2="739" y2="220"/>
  <rect class="bar" x="559" y="132" width="24" height="88"/>
  <rect class="bar" x="593" y="158" width="24" height="62"/>
  <rect class="bar" x="627" y="182" width="24" height="38"/>
  <rect class="bar" x="661" y="200" width="24" height="20"/>
  <rect class="bar" x="695" y="212" width="24" height="8"/>
  <text x="571" y="240" text-anchor="middle" class="small" font-size="8">s1</text>
  <text x="605" y="240" text-anchor="middle" class="small" font-size="8">s2</text>
  <text x="639" y="240" text-anchor="middle" class="small" font-size="8">s3</text>
  <text x="673" y="240" text-anchor="middle" class="small" font-size="8">s4</text>
  <text x="707" y="240" text-anchor="middle" class="small" font-size="8">s5</text>

  <text x="644" y="266" text-anchor="middle" class="lbl">a few directions</text>
  <text x="644" y="278" text-anchor="middle" class="lbl">carry the energy</text>
  <line x1="549" y1="292" x2="739" y2="292" stroke="var(--muted,#6d675d)" stroke-width="1.4" marker-end="url(#arr)"/>

  <line class="accline" x1="549" y1="368" x2="739" y2="368"/>
  <text x="644" y="352" text-anchor="middle" class="small" fill="var(--accent,#c15b39)">all singular values = 1</text>
  <line class="axis" x1="549" y1="416" x2="739" y2="416"/>
  <rect class="abar" x="559" y="368" width="24" height="48"/>
  <rect class="abar" x="593" y="368" width="24" height="48"/>
  <rect class="abar" x="627" y="368" width="24" height="48"/>
  <rect class="abar" x="661" y="368" width="24" height="48"/>
  <rect class="abar" x="695" y="368" width="24" height="48"/>

  <text x="644" y="440" text-anchor="middle" class="small">U V^T: every singular value = 1</text>
  <text x="644" y="452" text-anchor="middle" class="small" font-weight="700">-&gt; the matrix analogue of Lion's sign</text>
</g>

<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>

<g data-anim="5">
  <line x1="18" y1="466" x2="762" y2="466" class="axis"/>
  <text x="30" y="464" class="small" font-weight="700">scalar</text>
  <text x="750" y="464" text-anchor="end" class="small" font-weight="700">matrix</text>
  <text x="138" y="464" text-anchor="middle" class="small">Adam (soft precursor)</text>
  <text x="390" y="464" text-anchor="middle" class="small" font-weight="700">Lion</text>
  <text x="642" y="464" text-anchor="middle" class="small" font-weight="700">Muon</text>
</g>

</svg>
<figcaption><b>Adam, Lion, and Muon all discard magnitude and keep direction — they just differ in what unit they operate on.</b> Adam softly rescales each coordinate toward roughly unit size; Lion hardens that into an exact per-coordinate sign, <code>+eta</code> or <code>-eta</code>; Muon performs the same "spiky to uniform" move on a weight matrix's singular values instead of its scalar entries, making Muon the matrix-valued analogue of Lion's sign.</figcaption>
</figure>
