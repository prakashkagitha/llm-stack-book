<figure class="viz" id="fig-trusted-monitoring-control-loop">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 800 500" role="img" aria-label="A control protocol flow: an untrusted strong model's action is scored by a trusted weak monitor for suspicion, then routed to fast acceptance, human audit, or deferral to a trusted fallback depending on suspicion level and remaining audit budget, with an inset showing the resulting safety versus usefulness trade-off.">
<defs>
  <marker id="tmc-arrow" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)"/>
  </marker>
  <marker id="tmc-arrow-w" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
  </marker>
</defs>
<style>
  #fig-trusted-monitoring-control-loop text { fill: var(--ink-soft); }
  #fig-trusted-monitoring-control-loop .sm  { font: 400 9.3px var(--sans, sans-serif); }
  #fig-trusted-monitoring-control-loop .smb { font: 700 9.3px var(--sans, sans-serif); }
  #fig-trusted-monitoring-control-loop .lab { font: 700 10.5px var(--sans, sans-serif); }
  #fig-trusted-monitoring-control-loop .cap { font: 400 8.8px var(--sans, sans-serif); fill: var(--muted); }
  #fig-trusted-monitoring-control-loop .foot{ font: 500 11px var(--sans, sans-serif); }
  #fig-trusted-monitoring-control-loop .box  { fill: var(--surface); stroke: var(--border-2); stroke-width: 1.3; }
  #fig-trusted-monitoring-control-loop [data-anim] { animation: tmcFade .5s ease-out both; }
  #fig-trusted-monitoring-control-loop [data-anim="2"] { animation-delay: .18s; }
  #fig-trusted-monitoring-control-loop [data-anim="3"] { animation-delay: .36s; }
  #fig-trusted-monitoring-control-loop [data-anim="4"] { animation-delay: .54s; }
  @keyframes tmcFade { from { opacity:0; transform: translateY(4px);} to { opacity:1; transform: translateY(0);} }
  @media (prefers-reduced-motion: reduce) { #fig-trusted-monitoring-control-loop [data-anim] { animation: none; } }
</style>


<text x="400" y="20" text-anchor="middle" class="lab" fill="var(--good,#2f9e6e)">the WEAK model is the GUARD here, not the student (inverse of weak-to-strong)</text>


<g data-anim="1">
<rect class="box" x="12" y="58" width="128" height="66" rx="8" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
<text x="76" y="80" text-anchor="middle" class="smb">Untrusted model</text>
<text x="76" y="93" text-anchor="middle" class="sm">(strong, maybe</text>
<text x="76" y="105" text-anchor="middle" class="sm">scheming)</text>

<line x1="140" y1="91" x2="182" y2="91" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#tmc-arrow)"/>
<text x="161" y="81" text-anchor="middle" class="sm" font-size="7.4">proposed</text>
<text x="161" y="138" text-anchor="middle" class="sm" font-size="7.4">action (e.g. code</text>
<text x="161" y="149" text-anchor="middle" class="sm" font-size="7.4">submission)</text>
</g>


<g data-anim="2">
<rect class="box" x="184" y="58" width="140" height="66" rx="8" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
<text x="254" y="80" text-anchor="middle" class="smb">Trusted monitor</text>
<text x="254" y="93" text-anchor="middle" class="sm">(weak, safe)</text>
<text x="254" y="106" text-anchor="middle" class="sm" font-size="8">scores suspicion</text>

<line x1="324" y1="91" x2="366" y2="91" stroke="var(--ink-soft)" stroke-width="1.4" marker-end="url(#tmc-arrow)"/>
<text x="345" y="81" text-anchor="middle" class="sm" font-size="7.4">suspicion</text>
<text x="345" y="138" text-anchor="middle" class="sm" font-size="7.4">score in [0,1]</text>
</g>


<g data-anim="3">
<text x="404" y="42" text-anchor="middle" class="smb">Suspicion gauge</text>
<rect x="392" y="50" width="24" height="150" rx="5" fill="var(--surface-3)" stroke="var(--border-2)" stroke-width="1.2"/>
<rect x="392" y="50" width="24" height="60" rx="5" fill="var(--warn,#e0a106)" fill-opacity="0.35"/>
<line x1="386" y1="110" x2="422" y2="110" stroke="var(--warn,#e0a106)" stroke-width="2"/>
<text x="428" y="107" class="sm" fill="var(--warn,#e0a106)" font-size="8">audit</text>
<text x="428" y="118" class="sm" fill="var(--warn,#e0a106)" font-size="8">threshold</text>
<text x="404" y="64" text-anchor="middle" class="sm" font-size="8">high</text>
<text x="404" y="192" text-anchor="middle" class="sm" font-size="8">low</text>


<line x1="404" y1="200" x2="404" y2="228" stroke="var(--ink-soft)" stroke-width="1.3"/>
<line x1="200" y1="228" x2="404" y2="228" stroke="var(--ink-soft)" stroke-width="1.3"/>
<line x1="200" y1="228" x2="200" y2="256" stroke="var(--ink-soft)" stroke-width="1.3" marker-end="url(#tmc-arrow)"/>
<text x="302" y="221" text-anchor="middle" class="sm" font-size="8">LOW suspicion</text>


<line x1="416" y1="70" x2="470" y2="70" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
<circle cx="470" cy="70" r="3.2" fill="var(--warn,#e0a106)"/>
<text x="474" y="67" class="sm" fill="var(--warn,#e0a106)" font-size="8">HIGH suspicion</text>


<line x1="470" y1="70" x2="600" y2="70" stroke="var(--warn,#e0a106)" stroke-width="1.3"/>
<line x1="600" y1="70" x2="600" y2="256" stroke="var(--warn,#e0a106)" stroke-width="1.3" marker-end="url(#tmc-arrow-w)"/>
<text x="600" y="60" text-anchor="middle" class="sm" fill="var(--warn,#e0a106)" font-size="7.8">+ budget remaining</text>


<line x1="470" y1="70" x2="470" y2="40" stroke="var(--muted)" stroke-width="1.3"/>
<line x1="470" y1="40" x2="740" y2="40" stroke="var(--muted)" stroke-width="1.3"/>
<line x1="740" y1="40" x2="740" y2="256" stroke="var(--muted)" stroke-width="1.3" marker-end="url(#tmc-arrow)"/>
<text x="605" y="33" text-anchor="middle" class="sm" fill="var(--muted)" font-size="7.8">but audit budget SPENT</text>
</g>


<g data-anim="4">

<rect class="box" x="132" y="258" width="136" height="58" rx="8"/>
<text x="200" y="278" text-anchor="middle" class="smb">Accept untrusted</text>
<text x="200" y="291" text-anchor="middle" class="smb">action</text>
<text x="200" y="306" text-anchor="middle" class="cap">(fast path)</text>


<rect class="box" x="532" y="258" width="136" height="98" rx="8" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
<text x="600" y="277" text-anchor="middle" class="smb">Human audit</text>
<rect x="548" y="286" width="104" height="10" rx="4" fill="var(--surface-3)" stroke="var(--border-2)" stroke-width="1"/>
<rect x="548" y="286" width="21" height="10" rx="4" fill="var(--warn,#e0a106)"/>
<text x="600" y="309" text-anchor="middle" class="cap">budget: top ~2% of</text>
<text x="600" y="320" text-anchor="middle" class="cap">actions by suspicion</text>
<text x="600" y="338" text-anchor="middle" class="sm" fill="var(--good,#2f9e6e)" font-size="8.4">outcome: "safe"</text>
<text x="600" y="349" text-anchor="middle" class="sm" fill="var(--warn,#e0a106)" font-size="8.4">or BACKDOOR caught</text>


<rect class="box" x="672" y="258" width="116" height="98" rx="8" stroke="var(--muted)" stroke-width="1.4"/>
<text x="730" y="277" text-anchor="middle" class="smb" font-size="8.6">Defer to trusted</text>
<text x="730" y="289" text-anchor="middle" class="smb" font-size="8.6">model output</text>
<text x="730" y="303" text-anchor="middle" class="cap">(weaker but safe)</text>
<text x="730" y="315" text-anchor="middle" class="cap">or resample</text>
<text x="730" y="327" text-anchor="middle" class="cap">untrusted model</text>
</g>


<line x1="12" y1="368" x2="788" y2="368" stroke="var(--border-2)" stroke-width="1"/>
<text x="400" y="386" text-anchor="middle" class="foot">Reading order: untrusted model -&gt; trusted monitor -&gt; suspicion gauge -&gt; one of three routed outcomes.</text>


<g data-anim="4">
<rect class="box" x="12" y="400" width="230" height="86" rx="8"/>
<text x="127" y="416" text-anchor="middle" class="sm" font-size="8.4">P(catch backdoor)</text>
<line x1="36" y1="470" x2="36" y2="426" stroke="var(--ink-soft)" stroke-width="1.1" marker-end="url(#tmc-arrow)"/>
<line x1="36" y1="470" x2="226" y2="470" stroke="var(--ink-soft)" stroke-width="1.1" marker-end="url(#tmc-arrow)"/>
<text x="226" y="481" text-anchor="end" class="sm" font-size="8.4">usefulness</text>
<path d="M40 432 Q 95 438 138 458 T 222 468" fill="none" stroke="var(--accent)" stroke-width="1.8"/>
<circle cx="150" cy="453" r="4" fill="var(--accent)"/>
</g>
<text x="256" y="432" class="cap">More auditing / deferring</text>
<text x="256" y="444" class="cap">-&gt; safer but less useful.</text>

</svg>
<figcaption><b>One step of a control protocol: a weak trusted monitor guards a strong untrusted model.</b> The untrusted model's proposed action is scored for suspicion by a trusted (weaker but safe) monitor; low-suspicion actions are accepted immediately, high-suspicion actions consume a scarce human-audit budget, and once that budget is spent the protocol falls back to a trusted, weaker-but-safe output or a resample. The inset frontier makes the resulting trade-off explicit: pushing more actions to audit or deferral raises the probability of catching a backdoor at the cost of usefulness.</figcaption>
</figure>
