<figure class="viz" id="fig-mcp-stdio-transport">
<svg viewBox="0 0 800 312" role="img" aria-label="MCP stdio transport: the host process spawns the MCP server as a child subprocess and communicates via stdin and stdout using newline-delimited JSON-RPC 2.0 messages on the same machine.">
  <defs>
    <marker id="stdio-fwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--accent,#2563eb)"/>
    </marker>
    <marker id="stdio-rev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M10 1 L1 5 L10 9 z" fill="var(--accent,#2563eb)"/>
    </marker>
    <marker id="stdio-int-dn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="var(--border-2,#94a3b8)"/>
    </marker>
    <marker id="stdio-int-up" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10 1 L1 5 L10 9 z" fill="var(--border-2,#94a3b8)"/>
    </marker>
  </defs>
  <style>
    #fig-mcp-stdio-transport text { fill: var(--ink-soft,#0f172a); }
    #fig-mcp-stdio-transport .lbl  { font: 700 13px var(--sans,sans-serif); }
    #fig-mcp-stdio-transport .sub  { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#475569); }
    #fig-mcp-stdio-transport .mono { font: 400 10px var(--mono,monospace); fill: var(--muted,#475569); }
    #fig-mcp-stdio-transport .hdr  { font: 700 12px var(--sans,sans-serif); }
    #fig-mcp-stdio-transport .note { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#475569); }
  </style>

  
  <rect x="8" y="8" width="784" height="296" rx="14"
        fill="none" stroke="var(--border-2,#94a3b8)" stroke-width="1.3" stroke-dasharray="6 4" opacity="0.65"/>
  <text x="400" y="294" text-anchor="middle" class="note">same machine</text>

  
  <rect x="20" y="22" width="290" height="240" rx="10"
        fill="var(--surface,#f5f7fa)" stroke="var(--border-2,#334155)" stroke-width="1.5"/>
  <text x="36" y="44" class="hdr">HOST PROCESS</text>

  
  <rect x="40" y="54" width="252" height="62" rx="7"
        fill="var(--surface-3,#e7edf5)" stroke="var(--border-2,#334155)" stroke-width="1.2"/>
  <text x="166" y="76" text-anchor="middle" class="lbl">LLM Engine</text>
  <text x="166" y="93" text-anchor="middle" class="sub">+ conversation loop</text>
  <text x="166" y="108" text-anchor="middle" class="sub">decides when to call tools</text>

  
  <line x1="166" y1="118" x2="166" y2="145"
        stroke="var(--border-2,#94a3b8)" stroke-width="1.5"
        marker-end="url(#stdio-int-dn)" marker-start="url(#stdio-int-up)"/>

  
  <rect x="40" y="145" width="252" height="66" rx="7"
        fill="var(--accent2,#dbeafe)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
  <text x="166" y="170" text-anchor="middle" class="lbl" style="fill:var(--accent,#2563eb)">MCP Client</text>
  <text x="166" y="188" text-anchor="middle" class="sub">one per server</text>
  <text x="166" y="204" text-anchor="middle" class="sub">writes stdin / reads stdout</text>

  
  
  <text x="420" y="161" text-anchor="middle" class="mono">spawn: python my_server.py</text>

  
  <line x1="314" y1="175" x2="526" y2="175"
        stroke="var(--accent,#2563eb)" stroke-width="2.2"
        marker-end="url(#stdio-fwd)" marker-start="url(#stdio-rev)"/>

  
  <text x="420" y="191" text-anchor="middle" class="mono">stdin / stdout  (JSON-RPC lines)</text>

  
  <rect x="530" y="145" width="240" height="66" rx="7"
        fill="var(--surface-3,#e7edf5)" stroke="var(--border-2,#334155)" stroke-width="1.5"/>
  <text x="650" y="170" text-anchor="middle" class="lbl">MCP Server</text>
  <text x="650" y="188" text-anchor="middle" class="sub">(child subprocess)</text>
  <text x="650" y="204" text-anchor="middle" class="sub">local machine only</text>
</svg>
<figcaption><b>The stdio transport spawns the MCP server as a child subprocess of the host.</b> The host's MCP client writes JSON-RPC 2.0 requests to the server's stdin and reads responses from stdout; the LLM engine communicates with the MCP client internally rather than directly with the server. Because communication is over OS pipes, both processes must reside on the same machine.</figcaption>
</figure>
