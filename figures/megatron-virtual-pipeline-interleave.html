<figure class="viz" id="fig-megatron-virtual-pipeline-interleave">
<svg viewBox="0 0 720 470" role="img" aria-label="Two-panel comparison: Panel A shows contiguous layer assignment (GPU k owns layers 2k and 2k+1), Panel B shows interleaved assignment with v=2 chunks (GPU k owns layers k and k+4), illustrating how interleaving halves the pipeline bubble.">

  </marker>
</defs>
<style>

</style>

<text x="360" y="174" text-anchor="middle" class="sm">each GPU owns one contiguous block — layers flow left-to-right in one pass</text>
<text x="360" y="189" text-anchor="middle" class="sm">bubble fraction ~ (PP-1) / (PP-1 + m)  =  3 / (3 + m)</text>

<text x="360" y="258" text-anchor="middle" class="sub">GPU k owns layers k and k+4  |  two non-contiguous virtual stages</text>

<rect x="392" y="290" width="90" height="32" rx="6" fill="var(--accent2,#eff6ff)" stroke="var(--border-2,#93c5fd)" stroke-width="1.3"/>

<rect x="557" y="290" width="90" height="32" rx="6" fill="var(--accent2,#eff6ff)" stroke="var(--border-2,#93c5fd)" stroke-width="1.3"/>
<text x="602" y="310" text-anchor="middle" class="chip">L3</text>


<rect x="62"  y="334" width="90" height="32" rx="6" fill="var(--surface,#f8fafc)" stroke="var(--accent,#2563eb)" stroke-width="1.8"/>
<text x="107" y="354" text-anchor="middle" class="chip" fill="var(--accent,#2563eb)">L4</text>
<rect x="227" y="334" width="90" height="32" rx="6" fill="var(--surface,#f8fafc)" stroke="var(--accent,#2563eb)" stroke-width="1.8"/>
<text x="272" y="354" text-anchor="middle" class="chip" fill="var(--accent,#2563eb)">L5</text>
<rect x="392" y="334" width="90" height="32" rx="6" fill="var(--surface,#f8fafc)" stroke="var(--accent,#2563eb)" stroke-width="1.8"/>

<text x="37" y="388" class="sm">Round 1 (virtual stage 0): L0, L1, L2, L3  — first pass across all GPUs</text>
<rect x="20" y="394" width="12" height="10" rx="2" fill="var(--surface,#f8fafc)" stroke="var(--accent,#2563eb)" stroke-width="1.8"/>
<text x="37" y="404" class="sm">Round 2 (virtual stage 1): L4, L5, L6, L7  — second pass across all GPUs</text>


<line x1="714" y1="218" x2="714" y2="456" stroke="var(--muted,#94a3b8)" stroke-width="1" stroke-dasharray="3 2"/>

<text x="360" y="422" text-anchor="middle" class="sm">each GPU owns 2 non-contiguous chunks — pipeline makes TWO passes per micro-batch</text>
<text x="360" y="437" text-anchor="middle" class="sm">bubble fraction ~ (PP-1) / (PP-1 + v*m) = 3 / (3 + 2m)  — approx half of Panel A</text>
<text x="360" y="452" text-anchor="middle" class="sm">trade-off: 2x pipeline messages per micro-batch (v=2 sends per stage boundary)</text>

</svg>
<figcaption><b>Interleaved (virtual) pipeline parallelism halves the bubble by giving each GPU two non-contiguous layer chunks instead of one contiguous block.</b> In Panel A, reading order L0→L7 sweeps left-to-right once; in Panel B the pipeline makes two full sweeps (round 1: L0–L3, round 2: L4–L7 in accent), reducing the bubble fraction from approximately (PP-1)/(PP-1+m) to (PP-1)/(PP-1+v·m), at the cost of twice as many inter-stage messages per micro-batch.</figcaption>
</figure>
