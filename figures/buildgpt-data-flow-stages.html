<figcaption><b>Anatomy of a GPT: from token IDs to next-token logits.</b> Token and positional embeddings are summed to start the <em>residual stream</em> — a width-<code>n_embd</code> highway (orange) that is never overwritten. Each Transformer block branches two sublayers off that highway and adds their outputs back via the circled&amp;nbsp;<b>+</b>&amp;nbsp;nodes; after <code>n_layer</code> such additions the stream passes through a final layer norm and a linear <code>lm_head</code> (weight-tied to the token embedding table) to yield per-position logits over the full vocabulary.</figcaption>
</figure>
