<figure class="viz" id="fig-ptobj-crossentropy-entropy-floor">
<svg viewBox="0 0 780 460" role="img" aria-label="Left: a vertical loss bar in nats per token split into a bottom segment, the irreducible entropy floor of the data that no model can beat, and a top segment, the KL divergence gap that training shrinks toward that floor. Right: two branching fans illustrate perplexity as effective branching factor -- a narrow fan tied to a low point on the loss axis meaning few confident choices, and a wide fan tied to a high point meaning many uncertain choices.">
<style>
  #fig-ptobj-crossentropy-entropy-floor text { fill: var(--ink-soft,#333); font: 400 11px var(--sans,sans-serif); }
  #fig-ptobj-crossentropy-entropy-floor .title { font: 700 13px var(--sans,sans-serif); }
  #fig-ptobj-crossentropy-entropy-floor .sub { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-crossentropy-entropy-floor .seg-lbl { font: 700 11px var(--sans,sans-serif); }
  #fig-ptobj-crossentropy-entropy-floor .note { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-crossentropy-entropy-floor .tick { font: 400 10px var(--mono,monospace); fill: var(--muted,#666); }
  #fig-ptobj-crossentropy-entropy-floor .eqn { font: 700 12.5px var(--mono,monospace); text-anchor: middle; }
  #fig-ptobj-crossentropy-entropy-floor .fan-lbl { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-crossentropy-entropy-floor .axis-lbl { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
</style>


<g data-anim="1">
  <text x="20" y="24" class="title">Cross-entropy loss decomposes into a floor plus a shrinkable gap</text>

  
  <line x1="120" y1="90" x2="120" y2="390" stroke="var(--v-grid,#999)" stroke-width="1.2"/>
  <line x1="115" y1="390" x2="120" y2="390" stroke="var(--v-grid,#999)" stroke-width="1.2"/>
  <text x="108" y="393" text-anchor="end" class="tick">0</text>
  <text x="66" y="245" class="axis-lbl" transform="rotate(-90 66 245)" text-anchor="middle">loss (nats/token, generic scale)</text>

  
  <rect x="150" y="260" width="60" height="130" fill="var(--v-fill,#ddd)" stroke="var(--v-stroke,#666)" stroke-width="1.2"/>
  <rect x="150" y="100" width="60" height="160" fill="var(--accent,#c15b39)" opacity="0.85" stroke="var(--v-stroke,#666)" stroke-width="1.2"/>

  
  <line x1="95" y1="260" x2="470" y2="260" stroke="var(--ink-soft,#333)" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="478" y="264" class="seg-lbl">floor</text>

  
  <defs>
    <marker id="ptce-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--accent,#c15b39)"/>
    </marker>
  </defs>
  <line x1="225" y1="106" x2="225" y2="252" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#ptce-arrow)"/>

  <text x="248" y="122" class="seg-lbl">D_KL(p_data || p_theta):</text>
  <text x="248" y="136" class="note">the gap training shrinks</text>

  <text x="248" y="163" class="note">training pushes the model down,</text>
  <text x="248" y="177" class="note">closing the KL gap toward the</text>
  <text x="248" y="191" class="note">floor -- it can never cross below it</text>

  <text x="248" y="278" class="seg-lbl">H(p_data): irreducible</text>
  <text x="248" y="292" class="note">entropy floor -- the loss no</text>
  <text x="248" y="306" class="note">model can beat</text>

  
  <line x1="210" y1="110" x2="560" y2="110" stroke="var(--v-grid,#999)" stroke-width="1.1" stroke-dasharray="3 3"/>
  <line x1="210" y1="330" x2="560" y2="330" stroke="var(--v-grid,#999)" stroke-width="1.1" stroke-dasharray="3 3"/>

  
  <rect x="20" y="405" width="460" height="34" rx="7" fill="none" stroke="var(--v-grid,#999)" stroke-width="1.1"/>
  <text x="250" y="426" class="eqn">H(p_data, p_theta) = H(p_data) + D_KL(p_data || p_theta)</text>
</g>


<g data-anim="2">
  <text x="520" y="24" class="title">Perplexity: same loss, read as a</text>
  <text x="520" y="40" class="title">branching factor</text>
  <text x="520" y="58" class="sub">PPL = exp(loss)</text>

  
  <circle cx="560" cy="110" r="3.4" fill="var(--accent,#c15b39)"/>
  <g stroke="var(--accent,#c15b39)" stroke-width="1.6" opacity="0.85">
    <line x1="560" y1="110" x2="630" y2="58"/>
    <line x1="560" y1="110" x2="636" y2="82"/>
    <line x1="560" y1="110" x2="639" y2="107"/>
    <line x1="560" y1="110" x2="636" y2="132"/>
    <line x1="560" y1="110" x2="630" y2="156"/>
    <line x1="560" y1="110" x2="622" y2="178"/>
  </g>
  <g fill="var(--accent,#c15b39)">
    <circle cx="630" cy="58" r="3"/><circle cx="636" cy="82" r="3"/><circle cx="639" cy="107" r="3"/>
    <circle cx="636" cy="132" r="3"/><circle cx="630" cy="156" r="3"/><circle cx="622" cy="178" r="3"/>
  </g>
  <text x="560" y="200" class="fan-lbl">high loss = uncertain,</text>
  <text x="560" y="213" class="fan-lbl">many effective choices</text>

  
  <circle cx="560" cy="330" r="3.4" fill="var(--v-muted,#888)"/>
  <g stroke="var(--v-muted,#888)" stroke-width="1.6" opacity="0.85">
    <line x1="560" y1="330" x2="620" y2="316"/>
    <line x1="560" y1="330" x2="628" y2="330"/>
    <line x1="560" y1="330" x2="620" y2="344"/>
  </g>
  <g fill="var(--v-muted,#888)">
    <circle cx="620" cy="316" r="3"/><circle cx="628" cy="330" r="3"/><circle cx="620" cy="344" r="3"/>
  </g>
  <text x="560" y="366" class="fan-lbl">low loss = confident,</text>
  <text x="560" y="379" class="fan-lbl">few effective choices</text>

  <text x="520" y="405" class="note">perplexity = effective branching factor:</text>
  <text x="520" y="419" class="note">as uncertain as a uniform choice</text>
  <text x="520" y="433" class="note">among PPL tokens (branch counts</text>
  <text x="520" y="447" class="note" font-style="italic">here are illustrative, not measured)</text>
</g>

</svg>
<figcaption><b>Cross-entropy loss is the data's irreducible entropy plus a KL gap that training shrinks; perplexity re-reads that same number as an effective branching factor.</b> <code>H(p_data, p_theta) = H(p_data) + D_KL(p_data || p_theta)</code> — the floor never moves, only the gap above it closes, and a lower point on that same loss scale corresponds to a narrower fan of effective next-token choices.</figcaption>
</figure>
