<figure class="viz" id="fig-rlvr-reasoning-recipe-pipeline">
<svg viewBox="0 0 820 980" role="img" aria-label="The RLVR reasoning recipe: a six-stage numbered pipeline from Stage 0 (BASE) through Stage 5 (BANK and BROADEN), showing the data-and-reward recipe an engineer would follow to train a reasoning model.">
<defs>
  <marker id="rr-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 1 L10 5 L0 9 z" fill="var(--border-2,#9ca3af)"/>
  </marker>
</defs>
<style>
  #fig-rlvr-reasoning-recipe-pipeline text { fill: var(--ink-soft, #374151); }
  #fig-rlvr-reasoning-recipe-pipeline .title { font: 700 16px var(--sans,sans-serif); letter-spacing: 0.05em; }
  #fig-rlvr-reasoning-recipe-pipeline .stage-name { font: 700 13px var(--sans,sans-serif); }
  #fig-rlvr-reasoning-recipe-pipeline .body { font: 400 11.5px var(--sans,sans-serif); }
  #fig-rlvr-reasoning-recipe-pipeline .body-muted { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-reasoning-recipe-pipeline .accent-dominant { font: 700 12.5px var(--sans,sans-serif); fill: var(--accent,#2563eb); }
  #fig-rlvr-reasoning-recipe-pipeline .badge-num { font: 700 15px var(--sans,sans-serif); fill: #ffffff; }
  #fig-rlvr-reasoning-recipe-pipeline .verifier-label { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-reasoning-recipe-pipeline .verifier-arrow { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
</style>


<rect x="50" y="12" width="720" height="36" rx="6" fill="var(--surface-3,#f3f4f6)" stroke="var(--border-2,#9ca3af)" stroke-width="1"/>
<text x="410" y="35" text-anchor="middle" class="title" fill="var(--ink-soft,#374151)">THE RLVR REASONING RECIPE</text>



<line x1="410" y1="186" x2="410" y2="204" stroke="var(--border-2,#9ca3af)" stroke-width="2" marker-end="url(#rr-arrow)"/>

<line x1="410" y1="338" x2="410" y2="356" stroke="var(--border-2,#9ca3af)" stroke-width="2" marker-end="url(#rr-arrow)"/>


<rect x="50" y="62" width="720" height="120" rx="8"
      fill="var(--surface,#f9fafb)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>

<circle cx="92" cy="122" r="18" fill="var(--accent,#2563eb)"/>
<text x="92" y="128" text-anchor="middle" class="badge-num">0</text>

<text x="120" y="112" class="stage-name">BASE</text>

<text x="120" y="132" class="body">Start from a strong base model (latent math/code ability is the fuel).</text>
<text x="120" y="150" class="body">Optional small cold-start SFT on a few thousand clean long-CoT examples</text>
<text x="120" y="167" class="body">to fix readability and stabilize early RL.</text>


<rect x="50" y="208" width="720" height="128" rx="8"
      fill="var(--surface,#f9fafb)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>

<circle cx="92" cy="272" r="18" fill="var(--accent,#2563eb)"/>
<text x="92" y="278" text-anchor="middle" class="badge-num">1</text>

<text x="120" y="232" class="stage-name">DATA</text>

<text x="120" y="252" class="body">Assemble prompts with KNOWN, CHECKABLE answers:</text>

<text x="136" y="272" class="body">math with gold final answers</text>
<text x="366" y="272" class="body">-&gt;  symbolic/numeric verifier</text>
<text x="136" y="289" class="body">code with hidden unit tests</text>
<text x="366" y="289" class="body">-&gt;  sandboxed execution</text>
<text x="136" y="306" class="body">constraint/format tasks</text>
<text x="366" y="306" class="body">-&gt;  programmatic checks</text>

<text x="120" y="326" class="body-muted">Calibrate difficulty so pass@G is mixed (~20-80%), not 0 or 1.</text>


<rect x="50" y="360" width="720" height="142" rx="8"
      fill="var(--surface,#f9fafb)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>

<circle cx="92" cy="431" r="18" fill="var(--accent,#2563eb)"/>
<text x="92" y="437" text-anchor="middle" class="badge-num">2</text>

<text x="120" y="384" class="stage-name">REWARD</text>

<text x="120" y="404" class="body">total  =  </text>
<text x="176" y="404" class="accent-dominant">accuracy</text>
<text x="263" y="404" class="body-muted">  (dominant, exact: the verifier)</text>

<text x="136" y="424" class="body-muted">+  small format bonus</text>
<text x="307" y="424" class="body-muted">  (contingent on a parseable attempt)</text>

<text x="136" y="444" class="body-muted">+  small language/length guard</text>
<text x="380" y="444" class="body-muted">  (optional)</text>

<text x="120" y="466" class="body-muted">Robust verifier (normalize, do not string-match);</text>
<text x="120" y="484" class="body-muted">airtight sandbox (isolation + rlimits + no net/FS).</text>


<line x1="410" y1="506" x2="410" y2="524" stroke="var(--border-2,#9ca3af)" stroke-width="2" marker-end="url(#rr-arrow)"/>


<rect x="50" y="528" width="720" height="108" rx="8"
      fill="var(--surface,#f9fafb)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>

<circle cx="92" cy="582" r="18" fill="var(--accent,#2563eb)"/>
<text x="92" y="588" text-anchor="middle" class="badge-num">3</text>

<text x="120" y="552" class="stage-name">RL</text>
<text x="120" y="572" class="body">GRPO / RLOO with group-relative advantage (no reward model, no critic).</text>
<text x="120" y="590" class="body">Token-level loss + clip-higher (DAPO); drop std-normalization (Dr. GRPO).</text>
<text x="120" y="608" class="body">KL to ref often 0 for R1-Zero, &gt;0 when preserving an SFT persona.</text>


<line x1="410" y1="640" x2="410" y2="658" stroke="var(--border-2,#9ca3af)" stroke-width="2" marker-end="url(#rr-arrow)"/>


<rect x="50" y="662" width="720" height="110" rx="8"
      fill="var(--surface,#f9fafb)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>

<circle cx="92" cy="717" r="18" fill="var(--accent,#2563eb)"/>
<text x="92" y="723" text-anchor="middle" class="badge-num">4</text>

<text x="120" y="688" class="stage-name">MONITOR</text>
<text x="120" y="708" class="body">Track: mean accuracy reward (NOT total), fraction of non-dead groups,</text>
<text x="120" y="726" class="body">verifier false-negative rate, response length, entropy,</text>
<text x="120" y="744" class="body">pass@1 vs pass@k on held-out eval.</text>


<line x1="410" y1="776" x2="410" y2="794" stroke="var(--border-2,#9ca3af)" stroke-width="2" marker-end="url(#rr-arrow)"/>


<rect x="50" y="798" width="720" height="130" rx="8"
      fill="var(--surface,#fffbf5)" stroke="var(--warn,#d97706)" stroke-width="1.8"/>

<circle cx="92" cy="863" r="18" fill="var(--warn,#d97706)"/>
<text x="92" y="869" text-anchor="middle" class="badge-num">5</text>

<text x="120" y="822" class="stage-name" fill="var(--warn,#d97706)">BANK &amp; BROADEN</text>
<text x="120" y="842" class="body">Rejection-sampling SFT on the RL model's best outputs to lock in gains;</text>
<text x="120" y="860" class="body">add non-verifiable (chat/safety) data;</text>
<text x="120" y="878" class="body-muted">then a final mixed-reward RL pass (verifier + reward model)</text>
<text x="120" y="896" class="body-muted">for a deployable general model.</text>


<line x1="50" y1="942" x2="770" y2="942" stroke="var(--border-2,#9ca3af)" stroke-width="0.8" opacity="0.5"/>
<text x="410" y="960" text-anchor="middle" style="font: italic 11px var(--sans,sans-serif); fill: var(--muted,#6b7280);">Stages 0-4 use pure verifiable rewards; Stage 5 reintroduces non-verifiable data and a learned RM.</text>
</svg>
<figcaption><b>The RLVR reasoning recipe: six stages from base model to deployable reasoner.</b> Stages 0-4 form the pure RLVR core — verifiable rewards only, critic-free RL, and disciplined monitoring; Stage 5 banks the gains via rejection-sampling SFT and broadens to general tasks by blending in non-verifiable data and a learned reward model.</figcaption>
</figure>
