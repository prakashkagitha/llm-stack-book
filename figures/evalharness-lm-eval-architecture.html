  <text x="450" y="470" text-anchor="middle" class="zone-label">Execution Backends</text>

<figcaption><b>lm-evaluation-harness module architecture.</b> A YAML or Python config is parsed into a <em>Task object</em> that exposes four callbacks (<code>doc_to_text</code>, <code>doc_to_target</code>, <code>doc_to_choice</code>, <code>process_results</code>); the Task object drives the <em>LM Interface</em> (the abstract model backend) while <code>process_results</code> feeds the <em>Metric Aggregator</em>. This clean separation of declarative task description from the model backend makes it possible to swap any LM backend without touching task logic.</figcaption>
</figure>
