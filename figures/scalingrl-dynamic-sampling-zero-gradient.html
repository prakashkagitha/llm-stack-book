<figcaption><b>Same-outcome groups vanish from the gradient; mixed-outcome groups are exactly the ones DAPO keeps.</b> An all-correct or all-wrong group has <code>std(r) = 0</code>, so every group-relative advantage is zero and the rollout is wasted; DAPO discards these and oversamples until enough non-degenerate groups survive to fill the batch. The side plot makes the reason explicit: reward variance <code>p(1-p)</code> peaks at pass-rate 0.5 and is exactly zero at the two ends that dynamic sampling filters out.</figcaption>
</figure>
