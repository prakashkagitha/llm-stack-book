<figcaption><b>Architectural lineage: Dense FFN to GShard/Switch MoE to DeepSeek-MoE.</b> A single dense FFN (left) is replaced in GShard/Switch by E coarse experts with a router, keeping per-token FLOPs low by activating only k. DeepSeek-MoE (right) adds two refinements: always-on shared experts (teal) absorb universal knowledge, while a larger bank of fine-grained routed experts (each 1/m the size, top-mk selection) enables richer compositional routing; their outputs are added together.</figcaption>
