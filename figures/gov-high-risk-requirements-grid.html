<figcaption><b>Eight mandatory technical controls for a high-risk LLM application under EU AI Act Annex III.</b> Each deployer must implement all eight controls before going live; the <b>Logging &amp; Audit Trail</b> requirement (Article 12, highlighted) is the most operationally demanding — every inference must be auto-logged with input references, output, invoker identity, and timestamp.</figcaption>
