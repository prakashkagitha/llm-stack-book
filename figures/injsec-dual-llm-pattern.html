<figure class="viz" id="fig-injsec-dual-llm-pattern">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 810 430" role="img"
     aria-label="Dual-LLM pattern: untrusted source feeds a quarantined reader LLM (zero tools), which emits structured-only output across a privilege boundary to the orchestrator LLM that fires real tool calls.">
<defs>
  <marker id="dp-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c62828)"/>
  </marker>
  <marker id="dp-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
  </marker>
  <marker id="dp-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent2,#3b82f6)"/>
  </marker>
  <style>
    #fig-injsec-dual-llm-pattern text { font-family:var(--sans,sans-serif); fill:var(--ink-soft,#333); }
    #fig-injsec-dual-llm-pattern .bt  { font:700 11px var(--sans,sans-serif); }
    #fig-injsec-dual-llm-pattern .bs  { font:400 9.5px var(--sans,sans-serif); fill:var(--muted,#666); }
    #fig-injsec-dual-llm-pattern .bdg { font:700 7px var(--sans,sans-serif); }
    #fig-injsec-dual-llm-pattern .al  { font:italic 9px var(--sans,sans-serif); fill:var(--muted,#777); }
    #fig-injsec-dual-llm-pattern .bl  { font:700 9px var(--sans,sans-serif); fill:var(--muted,#888); }
    #fig-injsec-dual-llm-pattern .il  { font:italic 9.5px var(--sans,sans-serif); fill:var(--muted,#666); }
    #fig-injsec-dual-llm-pattern .mn  { font:400 8.5px var(--mono,monospace); fill:var(--muted,#666); }
    #fig-injsec-dual-llm-pattern .tl  { font:600 8.5px var(--mono,monospace); }

    #fig-injsec-dual-llm-pattern .praw   { animation: raw4  4s ease-in-out infinite; }
    #fig-injsec-dual-llm-pattern .pinj   { animation: inj4  4s ease-in-out infinite; }
    #fig-injsec-dual-llm-pattern .pclean { animation: cln4  4s ease-in-out infinite; }
    @keyframes raw4 {
      0%,4%  { transform:translateX(0);    opacity:0 }
      8%     { opacity:1 }
      35%    { transform:translateX(24px); opacity:1 }
      42%    { transform:translateX(24px); opacity:0 }
      100%   { transform:translateX(0);    opacity:0 }
    }
    @keyframes inj4 {
      0%,38% { opacity:0; transform:translateY(0) }
      44%    { opacity:1 }
      52%    { transform:translateY(-18px); opacity:1 }
      59%    { opacity:0 }
      100%   { opacity:0 }
    }
    @keyframes cln4 {
      0%,56% { transform:translateX(0);    opacity:0 }
      61%    { opacity:1 }
      86%    { transform:translateX(72px); opacity:1 }
      93%    { opacity:0 }
      100%   { opacity:0 }
    }
  </style>
</defs>

<rect x="15" y="384" width="780" height="40" rx="6"
      fill="var(--surface-3,#eee)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<text x="405" y="400" text-anchor="middle" class="il" font-size="9px">Key insight: injection in the reader can only corrupt structured field VALUES — to reach a tool it must smuggle</text>
<text x="405" y="415" text-anchor="middle" class="il" font-size="9px">an instruction through a constrained schema (fixed keys, length caps, enum values) — harder and more detectable.</text>

</svg>
<figcaption><b>The dual-LLM pattern enforces a privilege boundary that raw untrusted text cannot cross.</b> The quarantined reader LLM (zero tool access) ingests raw documents and emits only validated structured output. The privileged orchestrator never sees raw text — any injection is contained to corrupting structured field values, not issuing direct tool calls.</figcaption>
</figure>
