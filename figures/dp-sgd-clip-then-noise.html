<figure class="viz" id="fig-dp-sgd-clip-then-noise">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 820 470" role="img" aria-label="Four-stage left-to-right diagram of DP-SGD. Stage 1: per-example gradients of varying length radiate from an origin, one conspicuously long as a rare outlier, with a dashed clip ball of radius C drawn around them. Stage 2: the same gradients after clipping, with any arrow longer than C shortened to land exactly on the circle boundary. Stage 3: the clipped gradients composed tip to tail into one resultant sum arrow, then a fuzzy Gaussian noise cloud added at its tip. Stage 4: the final noisy, averaged update arrow the optimizer actually takes, slightly perturbed from the true sum direction. A bottom caption reads: clipping bounds influence, noise blurs it, together giving an epsilon delta differential privacy bound on every membership attack.">
  <defs>
    <marker id="dpg-arrow-ink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)"/>
    </marker>
    <marker id="dpg-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="dpg-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
    </marker>
  </defs>
  <style>
    #fig-dp-sgd-clip-then-noise .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-dp-sgd-clip-then-noise .stage-ttl{ font:700 12.5px var(--sans,sans-serif); }
    #fig-dp-sgd-clip-then-noise .badge-n{ font:700 11px var(--sans,sans-serif); fill: var(--surface); }
    #fig-dp-sgd-clip-then-noise .cap-b{ font:700 10.8px var(--mono,monospace); }
    #fig-dp-sgd-clip-then-noise .cap{ font:500 11px var(--sans,sans-serif); }
    #fig-dp-sgd-clip-then-noise .note{ font:500 10.3px var(--sans,sans-serif); }
    #fig-dp-sgd-clip-then-noise .lbl{ font:600 10.3px var(--sans,sans-serif); }
    #fig-dp-sgd-clip-then-noise .syn{ font:700 13px var(--sans,sans-serif); }
    #fig-dp-sgd-clip-then-noise text{ fill: var(--ink-soft); }
    #fig-dp-sgd-clip-then-noise .dim{ fill: var(--muted); }
  </style>

  <text x="410" y="24" text-anchor="middle" class="ttl">DP-SGD: clip every example's influence, then noise the sum</text>

  
  <g class="v-grid" stroke-width="1" stroke-dasharray="3 4" opacity="0.6">
    <line x1="215" y1="44" x2="215" y2="350"/>
    <line x1="410" y1="44" x2="410" y2="350"/>
    <line x1="605" y1="44" x2="605" y2="350"/>
  </g>

  
  <g>
    <circle cx="35" cy="58" r="10" fill="var(--accent)"/><text x="35" y="62" text-anchor="middle" class="badge-n">1</text>
    <text x="117.5" y="62" text-anchor="middle" class="stage-ttl">Per-example gradients</text>

    <circle cx="230" cy="58" r="10" fill="var(--accent)"/><text x="230" y="62" text-anchor="middle" class="badge-n">2</text>
    <text x="312.5" y="62" text-anchor="middle" class="stage-ttl">Clip to radius C</text>

    <circle cx="425" cy="58" r="10" fill="var(--accent)"/><text x="425" y="62" text-anchor="middle" class="badge-n">3</text>
    <text x="507.5" y="62" text-anchor="middle" class="stage-ttl">Sum + Gaussian noise</text>

    <circle cx="620" cy="58" r="10" fill="var(--accent)"/><text x="620" y="62" text-anchor="middle" class="badge-n">4</text>
    <text x="702.5" y="62" text-anchor="middle" class="stage-ttl">Noisy averaged step</text>
  </g>

  
  <g data-anim="1">
    <circle cx="117.5" cy="235" r="50" fill="none" stroke="var(--muted)" stroke-width="1.4" stroke-dasharray="4 4"/>
    <text x="117.5" y="296" text-anchor="middle" class="note dim">clip ball, radius C</text>

    <circle cx="117.5" cy="235" r="3" class="v-fill" stroke="var(--ink-soft)" stroke-width="1.2"/>

    <line x1="117.5" y1="235" x2="135.5" y2="205" class="v-stroke" stroke-width="1.8" marker-end="url(#dpg-arrow-ink)"/>
    <line x1="117.5" y1="235" x2="159.5" y2="220" class="v-stroke" stroke-width="1.8" marker-end="url(#dpg-arrow-ink)"/>
    <line x1="117.5" y1="235" x2="167.5" y2="267" class="v-stroke" stroke-width="1.8" marker-end="url(#dpg-arrow-ink)"/>
    <line x1="117.5" y1="235" x2="109.5" y2="211" class="v-stroke" stroke-width="1.8" marker-end="url(#dpg-arrow-ink)"/>
    <line x1="117.5" y1="235" x2="47.5" y2="290" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#dpg-arrow-accent)"/>

    <line x1="47.5" y1="290" x2="35" y2="308" class="v-stroke" stroke-width="1" opacity="0.55"/>
    <text x="117.5" y="323" text-anchor="middle" class="lbl" fill="var(--accent)">a rare/outlier example -&gt;</text>
    <text x="117.5" y="336" text-anchor="middle" class="lbl" fill="var(--accent)">large, distinctive gradient</text>
  </g>

  
  <g data-anim="2">
    <circle cx="312.5" cy="235" r="50" fill="none" stroke="var(--muted)" stroke-width="1.4" stroke-dasharray="4 4"/>
    <circle cx="312.5" cy="235" r="3" class="v-fill" stroke="var(--ink-soft)" stroke-width="1.2"/>

    
    <line x1="312.5" y1="235" x2="330.5" y2="205" class="v-stroke" stroke-width="1.8" marker-end="url(#dpg-arrow-ink)"/>
    <line x1="312.5" y1="235" x2="354.5" y2="220" class="v-stroke" stroke-width="1.8" marker-end="url(#dpg-arrow-ink)"/>
    <line x1="312.5" y1="235" x2="304.5" y2="211" class="v-stroke" stroke-width="1.8" marker-end="url(#dpg-arrow-ink)"/>

    
    <line x1="312.5" y1="235" x2="354.6" y2="261.9" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#dpg-arrow-accent)"/>
    <line x1="312.5" y1="235" x2="273.2" y2="265.9" stroke="var(--accent)" stroke-width="2.6" marker-end="url(#dpg-arrow-accent)"/>

    <text x="312.5" y="299" text-anchor="middle" class="note dim">clipped arrows land ON the circle</text>

    <text x="312.5" y="316" text-anchor="middle" class="lbl" fill="var(--accent)">the tail (long gradients) is</text>
    <text x="312.5" y="329" text-anchor="middle" class="lbl" fill="var(--accent)">clipped most -&gt; DP taxes</text>
    <text x="312.5" y="342" text-anchor="middle" class="lbl" fill="var(--accent)">rare examples hardest</text>
  </g>

  
  <g data-anim="3">
    <circle cx="507.5" cy="235" r="3" class="v-fill" stroke="var(--ink-soft)" stroke-width="1.2"/>

    
    <polyline points="507.5,235 537.5,220 564.5,228 579.5,208 589.5,214"
              fill="none" stroke="var(--muted)" stroke-width="1.3" opacity="0.6"/>

    
    <line x1="507.5" y1="235" x2="589.5" y2="214" stroke="var(--accent)" stroke-width="3" marker-end="url(#dpg-arrow-accent)"/>

    
    <circle cx="589.5" cy="214" r="20" fill="var(--muted)" fill-opacity="0.12"/>
    <g fill="var(--muted)">
      <circle cx="582" cy="204" r="2"/>
      <circle cx="597" cy="201" r="1.6"/>
      <circle cx="602" cy="216" r="2.2"/>
      <circle cx="586" cy="222" r="1.6"/>
      <circle cx="596" cy="228" r="1.8"/>
      <circle cx="577" cy="216" r="1.6"/>
    </g>

    <text x="507.5" y="298" text-anchor="middle" class="note dim">sum of clipped grads, tip-to-tail</text>
    <text x="507.5" y="315" text-anchor="middle" class="lbl" fill="var(--accent)">+ N(0, sigma^2 C^2 I)</text>
    <text x="507.5" y="332" text-anchor="middle" class="lbl" fill="var(--accent)">noise blurs any one record's presence</text>
  </g>

  
  <g data-anim="4">
    <circle cx="702.5" cy="235" r="3" class="v-fill" stroke="var(--ink-soft)" stroke-width="1.2"/>

    
    <line x1="702.5" y1="235" x2="784.5" y2="214" stroke="var(--muted)" stroke-width="1.6" stroke-dasharray="3 4" marker-end="url(#dpg-arrow-muted)"/>
    <text x="736" y="200" text-anchor="middle" class="note dim">true sum direction</text>
    <text x="736" y="212" text-anchor="middle" class="note dim">(unnoised)</text>

    
    <line x1="702.5" y1="235" x2="767.4" y2="239" stroke="var(--accent)" stroke-width="3" marker-end="url(#dpg-arrow-accent)"/>

    <text x="702.5" y="298" text-anchor="middle" class="note dim">shorter (divided by B),</text>
    <text x="702.5" y="311" text-anchor="middle" class="note dim">nudged off-course by noise</text>
  </g>

  
  <g>
    <text x="117.5" y="366" text-anchor="middle" class="cap">raw per-example gradients</text>
    <text x="117.5" y="382" text-anchor="middle" class="cap dim">vary wildly in norm</text>

    <text x="312.5" y="366" text-anchor="middle" class="cap-b">g~ = g &#183; min(1, C/||g||)</text>
    <text x="312.5" y="382" text-anchor="middle" class="cap dim">no example can push harder than C</text>

    <text x="507.5" y="366" text-anchor="middle" class="cap-b">sum g~ + N(0, sigma^2 C^2 I)</text>
    <text x="507.5" y="382" text-anchor="middle" class="cap dim">makes membership undetectable</text>

    <text x="702.5" y="366" text-anchor="middle" class="cap-b">g_hat = (1/B)(sum + noise)</text>
    <text x="702.5" y="382" text-anchor="middle" class="cap dim">the update the optimizer takes</text>
  </g>

  <line x1="20" y1="398" x2="800" y2="398" class="v-grid" stroke-width="1"/>

  <text x="410" y="420" text-anchor="middle" class="syn">clipping bounds influence + noise blurs it</text>
  <text x="410" y="440" text-anchor="middle" class="syn">-&gt; (epsilon,delta)-DP: a worst-case bound on every membership attack</text>
</svg>
<figcaption><b>DP-SGD turns two simple operations into a formal privacy guarantee: clip, then noise.</b> Per-example gradient clipping caps how much any single record -- especially a rare, outlier example with a large, distinctive gradient -- can push the update; adding calibrated Gaussian noise to the clipped sum then makes any one record's presence in or out of the batch statistically undetectable. Composing this over every step is exactly what the privacy accountant turns into an <span class="v-mono">(epsilon,delta)</span> bound on every possible membership-inference attack.</figcaption>
</figure>
