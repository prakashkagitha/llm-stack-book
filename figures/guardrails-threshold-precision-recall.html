<figure class="viz" id="fig-guardrails-threshold-precision-recall">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 480" role="img" aria-label="Two overlapping classifier-score distributions, benign and harmful, split by a sliding block threshold tau into pass and block zones; moving tau left shrinks the missed-harm false-negative region but grows the blocked-benign false-positive region.">
<defs>
  <clipPath id="gtprClipPass">
    <rect class="gtpr-clip-pass" x="64" y="60" width="223" height="280"/>
  </clipPath>
  <clipPath id="gtprClipBlock">
    <rect class="gtpr-clip-block" x="287" y="60" width="273" height="280"/>
  </clipPath>
  <style>
    #fig-guardrails-threshold-precision-recall text { fill: var(--ink-soft,#45413a); }
    #fig-guardrails-threshold-precision-recall .ttl   { font: 700 14.5px var(--sans,sans-serif); }
    #fig-guardrails-threshold-precision-recall .sub   { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-threshold-precision-recall .zone-h{ font: 700 12.5px var(--sans,sans-serif); }
    #fig-guardrails-threshold-precision-recall .zone-s{ font: 400 10.5px var(--mono,monospace); fill: var(--muted,#6d675d); }
    #fig-guardrails-threshold-precision-recall .curve-lbl { font: 700 12px var(--sans,sans-serif); }
    #fig-guardrails-threshold-precision-recall .region-lbl{ font: 700 11px var(--sans,sans-serif); }
    #fig-guardrails-threshold-precision-recall .region-lbl-s{ font: 400 9.5px var(--sans,sans-serif); }
    #fig-guardrails-threshold-precision-recall .axis-lbl { font: 600 11px var(--mono,monospace); fill: var(--muted,#6d675d); }
    #fig-guardrails-threshold-precision-recall .axis-cap { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-threshold-precision-recall .panel-ttl{ font: 700 12.5px var(--sans,sans-serif); }
    #fig-guardrails-threshold-precision-recall .panel-f  { font: 600 12px var(--mono,monospace); }
    #fig-guardrails-threshold-precision-recall .panel-s  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-guardrails-threshold-precision-recall .cap-band { font: italic 500 12px var(--sans,sans-serif); }
    #fig-guardrails-threshold-precision-recall .tau-lbl  { font: 700 12px var(--mono,monospace); }

    @media (prefers-reduced-motion:no-preference){
      @keyframes gtprTauSlide { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-74px); } }
      @keyframes gtprPassShrink { 0%,100% { width: 223px; } 50% { width: 149px; } }
      @keyframes gtprBlockGrow  { 0%,100% { x: 287px; width: 273px; } 50% { x: 213px; width: 347px; } }
      figure.viz.in-view #fig-guardrails-threshold-precision-recall .gtpr-tau-group { animation: gtprTauSlide 3.6s ease-in-out infinite; }
      figure.viz.in-view #fig-guardrails-threshold-precision-recall .gtpr-clip-pass  { animation: gtprPassShrink 3.6s ease-in-out infinite; }
      figure.viz.in-view #fig-guardrails-threshold-precision-recall .gtpr-clip-block { animation: gtprBlockGrow 3.6s ease-in-out infinite; }
    }
  </style>
</defs>

<text x="20" y="20" class="ttl">Sliding the block threshold tau</text>
<text x="20" y="37" class="sub">classifier score distributions for benign vs. harmful requests</text>

<g data-anim="1">
  <text x="150" y="54" text-anchor="middle" class="zone-h">PASS</text>
  <text x="150" y="67" text-anchor="middle" class="zone-s">p &lt; tau</text>
  <text x="470" y="54" text-anchor="middle" class="zone-h">BLOCK</text>
  <text x="470" y="67" text-anchor="middle" class="zone-s">p &gt;= tau</text>
</g>

<g data-anim="1">
  <rect x="64" y="60" width="496" height="280" fill="var(--danger,#dc2626)" opacity="0.05" clip-path="url(#gtprClipBlock)"/>
</g>


<g data-anim="2">
  <path d="M 64,340 C 119,340 150,118 185,118 C 245,118 370,340 430,340 Z"
        fill="var(--muted,#6d675d)" opacity="0.16" clip-path="url(#gtprClipPass)"/>
  <path d="M 64,340 C 119,340 150,118 185,118 C 245,118 370,340 430,340 Z"
        fill="var(--warn,#e0a106)" opacity="0.45" clip-path="url(#gtprClipBlock)"/>
  <path d="M 64,340 C 119,340 150,118 185,118 C 245,118 370,340 430,340"
        fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.4"/>
  <text x="185" y="102" text-anchor="middle" class="curve-lbl" fill="var(--accent2,#3b82f6)">benign / allowed</text>
</g>

<g data-anim="2">
  <path d="M 150,340 C 240,340 360,205 420,205 C 460,205 520,340 560,340 Z"
        fill="var(--danger,#dc2626)" opacity="0.42" clip-path="url(#gtprClipPass)"/>
  <path d="M 150,340 C 240,340 360,205 420,205 C 460,205 520,340 560,340 Z"
        fill="var(--good,#2f9e6e)" opacity="0.34" clip-path="url(#gtprClipBlock)"/>
  <path d="M 150,340 C 240,340 360,205 420,205 C 460,205 520,340 560,340"
        fill="none" stroke="var(--ink-soft,#45413a)" stroke-width="2.4"/>
  <text x="420" y="189" text-anchor="middle" class="curve-lbl" fill="var(--ink-soft,#45413a)">harmful</text>
</g>

<g data-anim="3">
  <text x="130" y="300" text-anchor="middle" class="region-lbl" fill="var(--muted,#6d675d)">TN</text>
  <text x="238" y="309" text-anchor="middle" class="region-lbl" fill="var(--danger,#dc2626)">FN</text>
  <text x="238" y="327" text-anchor="middle" class="region-lbl-s" fill="var(--danger,#dc2626)">MISSED HARM</text>
  <text x="340" y="330" text-anchor="middle" class="region-lbl" fill="var(--warn,#e0a106)">FP</text>
  <text x="340" y="313" text-anchor="middle" class="region-lbl-s" fill="var(--warn,#e0a106)">blocked benign</text>
  <text x="470" y="270" text-anchor="middle" class="region-lbl" fill="var(--good,#2f9e6e)">TP</text>
  <text x="470" y="253" text-anchor="middle" class="region-lbl-s" fill="var(--good,#2f9e6e)">caught harm</text>
</g>

<g data-anim="1">
  <line x1="64" y1="340" x2="560" y2="340" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <line x1="64" y1="336" x2="64" y2="344" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <text x="64" y="358" text-anchor="middle" class="axis-lbl">0</text>
  <line x1="560" y1="336" x2="560" y2="344" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <text x="560" y="358" text-anchor="middle" class="axis-lbl">1</text>
  <text x="312" y="392" text-anchor="middle" class="axis-cap">classifier score p</text>
</g>

<g class="gtpr-tau-group" data-anim="2">
  <line x1="287" y1="58" x2="287" y2="352" stroke="var(--ink-soft,#45413a)" stroke-width="2.6"/>
  <circle cx="287" cy="58" r="5.5" fill="var(--ink-soft,#45413a)"/>
  <text x="287" y="372" text-anchor="middle" class="tau-lbl" fill="var(--ink-soft,#45413a)">tau</text>
</g>

<g data-anim="3">
  <rect x="580" y="60" width="180" height="150" rx="10" class="v-fill" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
  <text x="670" y="82" text-anchor="middle" class="panel-ttl">readout</text>

  <text x="600" y="110" class="panel-f">precision =</text>
  <text x="600" y="126" class="panel-f">TP/(TP+FP)</text>
  <path d="M 735,112 L 745,112 L 740,120 Z" fill="var(--warn,#e0a106)" class="viz-pulse"/>
  <text x="713" y="140" text-anchor="middle" class="panel-s" fill="var(--warn,#e0a106)">falls</text>

  <line x1="592" y1="152" x2="748" y2="152" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>

  <text x="600" y="172" class="panel-f">recall =</text>
  <text x="600" y="188" class="panel-f">TP/(TP+FN)</text>
  <path d="M 735,182 L 745,182 L 740,174 Z" fill="var(--good,#2f9e6e)" class="viz-pulse"/>
  <text x="713" y="200" text-anchor="middle" class="panel-s" fill="var(--good,#2f9e6e)">rises</text>
</g>

<g data-anim="4">
  <rect x="20" y="416" width="740" height="46" rx="8" class="v-fill" fill="var(--surface-3,#ece7da)" opacity="0.6"/>
  <text x="390" y="436" text-anchor="middle" class="cap-band">safety weights recall (beta &gt; 1): slide tau LEFT to miss fewer harms --</text>
  <text x="390" y="453" text-anchor="middle" class="cap-band">but accept more false positives.</text>
</g>

</svg>
<figcaption><b>Moving the block threshold tau trades missed harms against blocked-benign users.</b> Sliding tau left shrinks the false-negative region under the harmful curve (fewer missed harms, higher recall) but grows the false-positive region under the benign curve (more annoyed users, lower precision) -- which is exactly why a safety-weighted $F_\beta$ with $\beta&gt;1$ typically lands well below the naive $\tau=0.5$ default.</figcaption>
</figure>
