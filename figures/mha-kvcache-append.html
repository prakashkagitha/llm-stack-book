<figure class="viz" id="fig-mha-kvcache-append">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="-18 0 838 420" role="img" aria-label="KV cache append during autoregressive decoding: at step t, a new token produces one query vector q_t and one key-value pair k_t/v_t; k_t and v_t are appended to growing K and V caches; q_t attends over the entire accumulated prefix to produce the output.">
  <defs>
    <marker id="kvc-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
    <marker id="kvc-arr-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6c5ce7)"/>
    </marker>
  </defs>
  <style>
    #fig-mha-kvcache-append text { fill: var(--ink-soft); }
    #fig-mha-kvcache-append .lbl  { font: 600 12px var(--sans,sans-serif); }
    #fig-mha-kvcache-append .sub  { font: 400 9.5px var(--mono,monospace); fill: var(--muted); }
    #fig-mha-kvcache-append .cap  { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
    #fig-mha-kvcache-append .mono { font: 500 10px var(--mono,monospace); }
    #fig-mha-kvcache-append .rowlbl { font: 600 10px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-mha-kvcache-append .arr { stroke: var(--ink-soft); fill: none; stroke-width: 1.3; marker-end: url(#kvc-arr); }
    #fig-mha-kvcache-append .arr-acc { stroke: var(--accent,#6c5ce7); fill: none; stroke-width: 1.5; marker-end: url(#kvc-arr-accent); }
    #fig-mha-kvcache-append .cell { stroke: var(--border-2); stroke-width: 1; }
    #fig-mha-kvcache-append .cell-new { stroke: var(--accent,#6c5ce7); stroke-width: 1.8; }

    /* animation: chip slides */
    #fig-mha-kvcache-append .chip-k { animation: kvcSlideK 4.5s 0s ease-in-out infinite; opacity: 0; }
    #fig-mha-kvcache-append .chip-v { animation: kvcSlideV 4.5s 0.2s ease-in-out infinite; opacity: 0; }
    #fig-mha-kvcache-append .chip-q { animation: kvcPulseQ 4.5s 0.4s ease-in-out infinite; opacity: 0; }

    @keyframes kvcSlideK {
      0%,5%   { opacity: 0; transform: translateX(0); }
      12%     { opacity: 1; transform: translateX(0); }
      28%     { opacity: 1; transform: translateX(180px); }
      40%     { opacity: 0; transform: translateX(180px); }
      100%    { opacity: 0; transform: translateX(0); }
    }
    @keyframes kvcSlideV {
      0%,7%   { opacity: 0; transform: translateX(0); }
      14%     { opacity: 1; transform: translateX(0); }
      30%     { opacity: 1; transform: translateX(180px); }
      42%     { opacity: 0; transform: translateX(180px); }
      100%    { opacity: 0; transform: translateX(0); }
    }
    @keyframes kvcPulseQ {
      0%,20%  { opacity: 0; }
      30%     { opacity: 1; }
      50%     { opacity: 1; }
      65%     { opacity: 0; }
      100%    { opacity: 0; }
    }

    /* sweep highlight across K row */
    #fig-mha-kvcache-append .sweep {
      animation: kvcSweep 4.5s 1.8s ease-in-out infinite;
      opacity: 0;
    }
    @keyframes kvcSweep {
      0%,2%   { opacity: 0; transform: translateX(0); }
      8%      { opacity: 0.4; transform: translateX(0); }
      30%     { opacity: 0.4; transform: translateX(290px); }
      40%     { opacity: 0; transform: translateX(290px); }
      100%    { opacity: 0; transform: translateX(0); }
    }

    /* result box flash */
    #fig-mha-kvcache-append .res-flash {
      animation: resFlash 4.5s 2.8s ease-in-out infinite;
    }
    @keyframes resFlash {
      0%,2%  { stroke-opacity: 0.6; }
      8%     { stroke-opacity: 1; }
      18%    { stroke-opacity: 0.6; }
      100%   { stroke-opacity: 0.6; }
    }

    @media (prefers-reduced-motion: reduce) {
      #fig-mha-kvcache-append .chip-k,
      #fig-mha-kvcache-append .chip-v,
      #fig-mha-kvcache-append .chip-q,
      #fig-mha-kvcache-append .sweep { animation: none; opacity: 0; display: none; }
      #fig-mha-kvcache-append .res-flash { animation: none; }
    }
  </style>

  
  <g data-anim="1">
    <rect x="10" y="48" width="146" height="38" rx="7" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>
    <text x="83" y="71" text-anchor="middle" class="lbl">new token (step t)</text>
  </g>

  
  <g data-anim="1">
    
    <rect x="24" y="108" width="44" height="24" rx="5" class="v-fill" stroke="var(--accent,#6c5ce7)" stroke-width="1.6"/>
    <text x="46" y="124" text-anchor="middle" class="mono" fill="var(--accent,#6c5ce7)">q_t</text>
    <text x="-8" y="190" text-anchor="start" class="sub">q_t: 1 query vec,</text>
    <text x="-8" y="202" text-anchor="start" class="sub">recomputed each step</text>

    
    <rect x="88" y="108" width="44" height="24" rx="5" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>
    <text x="110" y="124" text-anchor="middle" class="mono">k_t</text>

    
    <rect x="88" y="142" width="44" height="24" rx="5" class="v-fill" stroke="var(--border-2)" stroke-width="1.4"/>
    <text x="110" y="158" text-anchor="middle" class="mono">v_t</text>
  </g>

  
  <line x1="60" y1="86" x2="46" y2="106" class="arr"/>
  <line x1="92" y1="86" x2="110" y2="106" class="arr"/>
  <line x1="92" y1="86" x2="110" y2="140" class="arr"/>

  
  <g data-anim="2">
    <rect x="168" y="78" width="430" height="192" rx="10"
          fill="var(--surface-3,rgba(108,92,231,0.04))"
          stroke="var(--accent,#6c5ce7)" stroke-width="1.8"/>
    <text x="383" y="98" text-anchor="middle" style="font:600 11px var(--sans,sans-serif); fill:var(--ink-soft)">KV cache (grows by one column per step)</text>

    
    <text x="182" y="138" class="rowlbl">K:</text>

    
    
    <rect x="200" y="122" width="40" height="26" rx="3" class="v-fill cell"/><text x="220" y="139" text-anchor="middle" class="sub">k_1</text>
    <rect x="244" y="122" width="40" height="26" rx="3" class="v-fill cell"/><text x="264" y="139" text-anchor="middle" class="sub">k_2</text>
    <rect x="288" y="122" width="40" height="26" rx="3" class="v-fill cell"/><text x="308" y="139" text-anchor="middle" class="sub">k_3</text>
    <rect x="332" y="122" width="40" height="26" rx="3" class="v-fill cell"/><text x="352" y="139" text-anchor="middle" class="sub">...</text>
    <rect x="376" y="122" width="52" height="26" rx="3" class="v-fill cell"/><text x="402" y="139" text-anchor="middle" class="sub">k_{t-1}</text>
    
    <rect x="432" y="122" width="40" height="26" rx="3"
          fill="var(--surface-3,rgba(108,92,231,0.12))"
          stroke="var(--accent,#6c5ce7)" stroke-width="1.8"/>
    <text x="452" y="139" text-anchor="middle" class="sub" fill="var(--accent,#6c5ce7)">k_t</text>

    
    <text x="182" y="196" class="rowlbl">V:</text>

    
    <rect x="200" y="180" width="40" height="26" rx="3" class="v-fill cell"/><text x="220" y="197" text-anchor="middle" class="sub">v_1</text>
    <rect x="244" y="180" width="40" height="26" rx="3" class="v-fill cell"/><text x="264" y="197" text-anchor="middle" class="sub">v_2</text>
    <rect x="288" y="180" width="40" height="26" rx="3" class="v-fill cell"/><text x="308" y="197" text-anchor="middle" class="sub">v_3</text>
    <rect x="332" y="180" width="40" height="26" rx="3" class="v-fill cell"/><text x="352" y="197" text-anchor="middle" class="sub">...</text>
    <rect x="376" y="180" width="52" height="26" rx="3" class="v-fill cell"/><text x="402" y="197" text-anchor="middle" class="sub">v_{t-1}</text>
    
    <rect x="432" y="180" width="40" height="26" rx="3"
          fill="var(--surface-3,rgba(108,92,231,0.12))"
          stroke="var(--accent,#6c5ce7)" stroke-width="1.8"/>
    <text x="452" y="197" text-anchor="middle" class="sub" fill="var(--accent,#6c5ce7)">v_t</text>

    
    
    <line x1="200" y1="154" x2="472" y2="154" stroke="var(--border-2)" stroke-width="0.8"/>
    <line x1="200" y1="154" x2="200" y2="160" stroke="var(--border-2)" stroke-width="0.8"/>
    <line x1="472" y1="154" x2="472" y2="160" stroke="var(--border-2)" stroke-width="0.8"/>
    <text x="336" y="172" text-anchor="middle" class="cap">whole prefix (length t)</text>

    
    <line x1="200" y1="212" x2="472" y2="212" stroke="var(--border-2)" stroke-width="0.8"/>
    <line x1="200" y1="212" x2="200" y2="218" stroke="var(--border-2)" stroke-width="0.8"/>
    <line x1="472" y1="212" x2="472" y2="218" stroke="var(--border-2)" stroke-width="0.8"/>
    <text x="336" y="232" text-anchor="middle" class="cap">whole prefix (length t)</text>

    
    <rect x="200" y="122" width="28" height="26" rx="3" class="sweep"
          fill="var(--accent,#6c5ce7)" opacity="0"/>
  </g>

  
  <path d="M132,118 C155,108 190,118 230,128" class="arr-acc" fill="none"/>
  
  <path d="M132,152 C155,172 190,178 230,185" class="arr-acc" fill="none"/>

  
  <path d="M46,132 C100,160 150,178 150,215 C150,278 235,322 352,333" class="arr-acc" fill="none"/>

  
  <line x1="336" y1="270" x2="336" y2="330" class="arr" stroke="var(--ink-soft)"/>

  
  <g data-anim="3">
    <rect x="170" y="332" width="428" height="56" rx="8" class="v-fill res-flash" stroke="var(--border-2)" stroke-width="1.4" stroke-opacity="0.6"/>
    <text x="384" y="355" text-anchor="middle" class="mono" style="font-size:10px">attention = softmax(q_t . [k_1..k_t]T / sqrt(d_h)) . [v_1..v_t]</text>
    <text x="384" y="374" text-anchor="middle" class="cap">query reads the ENTIRE prefix; keys/values reused from cache</text>
  </g>

  
  <text x="18" y="406" class="cap">per-step cost O(t), not O(t^2) -- values reused, not recomputed</text>

  
  
  <g class="chip-k" opacity="0">
    <rect x="88" y="108" width="44" height="24" rx="5" fill="var(--surface,#fff)" stroke="var(--accent,#6c5ce7)" stroke-width="1.6"/>
    <text x="110" y="124" text-anchor="middle" class="mono" fill="var(--accent,#6c5ce7)">k_t</text>
  </g>
  
  <g class="chip-v" opacity="0">
    <rect x="88" y="142" width="44" height="24" rx="5" fill="var(--surface,#fff)" stroke="var(--accent,#6c5ce7)" stroke-width="1.6"/>
    <text x="110" y="158" text-anchor="middle" class="mono" fill="var(--accent,#6c5ce7)">v_t</text>
  </g>
</svg>
<figcaption><b>KV cache: append one column per decode step, attend over the whole prefix.</b> At each step t the model computes a fresh single-vector query q_t and a new key-value pair (k_t, v_t). The new k_t and v_t are appended to the growing K and V caches; then q_t attends over the full accumulated prefix [k_1..k_t] and [v_1..v_t]. This makes the per-step cost O(t) rather than O(t^2), at the expense of linear memory growth.</figcaption>
</figure>
