<figure class="viz" id="fig-grpo-group-relative-advantage">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 800 600" role="img" aria-label="One prompt is sampled into a group of six completions with illustrative correctness rewards 1,0,1,0,0,1. Plotted on a reward axis, the group mean of 0.5 is the baseline: advantage arrows point up for reward-1 completions (reinforce) and down for reward-0 completions (suppress). A contrast panel below shows PPO needing a learned value head to produce this baseline while GRPO gets it for free as the group mean.">
  <defs>
    <marker id="ggra-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
    <marker id="ggra-arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
  </defs>
  <style>
    #fig-grpo-group-relative-advantage text{ fill:var(--ink-soft); }
    #fig-grpo-group-relative-advantage .lbl{ font:600 13px var(--sans,sans-serif); }
    #fig-grpo-group-relative-advantage .sm{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-grpo-group-relative-advantage .xs{ font:500 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-grpo-group-relative-advantage .mono{ font:600 11.5px var(--mono,monospace); }
    #fig-grpo-group-relative-advantage .monos{ font:500 10px var(--mono,monospace); fill:var(--muted); }
    #fig-grpo-group-relative-advantage .head{ font:700 13.5px var(--sans,sans-serif); }
    #fig-grpo-group-relative-advantage .tiny{ font:500 9px var(--mono,monospace); fill:var(--muted); }
  </style>

  
  <g data-anim="1">
    <rect x="14" y="140" width="120" height="112" rx="10" class="v-fill v-accent-s" stroke-width="1.6"/>
    <text x="74" y="168" text-anchor="middle" class="lbl" fill="var(--accent)">prompt x</text>
    <text x="74" y="188" text-anchor="middle" class="monos">What is 15 x 8?</text>
    <text x="74" y="212" text-anchor="middle" class="sm">sample G = 6</text>
    <text x="74" y="228" text-anchor="middle" class="sm">completions</text>
    <text x="74" y="244" text-anchor="middle" class="sm">y_1 ... y_6</text>

    <g class="v-muted" stroke="currentColor" stroke-width="1.2">
      <line x1="134" y1="185" x2="170" y2="60"  marker-end="url(#ggra-arrow)"/>
      <line x1="134" y1="190" x2="170" y2="114" marker-end="url(#ggra-arrow)"/>
      <line x1="134" y1="195" x2="170" y2="168" marker-end="url(#ggra-arrow)"/>
      <line x1="134" y1="200" x2="170" y2="222" marker-end="url(#ggra-arrow)"/>
      <line x1="134" y1="205" x2="170" y2="276" marker-end="url(#ggra-arrow)"/>
      <line x1="134" y1="210" x2="170" y2="330" marker-end="url(#ggra-arrow)"/>
    </g>

    
    <rect x="170" y="40" width="150" height="40" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="182" y="58" class="mono">y_1</text>
    <text x="182" y="72" class="monos">... = 120</text>
    <rect x="332" y="47" width="40" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="352" y="64" text-anchor="middle" class="mono">r=1</text>

    
    <rect x="170" y="94" width="150" height="40" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="182" y="112" class="mono">y_2</text>
    <text x="182" y="126" class="monos">... = 118</text>
    <rect x="332" y="101" width="40" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="352" y="118" text-anchor="middle" class="mono">r=0</text>

    
    <rect x="170" y="148" width="150" height="40" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="182" y="166" class="mono">y_3</text>
    <text x="182" y="180" class="monos">... = 120</text>
    <rect x="332" y="155" width="40" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="352" y="172" text-anchor="middle" class="mono">r=1</text>

    
    <rect x="170" y="202" width="150" height="40" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="182" y="220" class="mono">y_4</text>
    <text x="182" y="234" class="monos">... = 130</text>
    <rect x="332" y="209" width="40" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="352" y="226" text-anchor="middle" class="mono">r=0</text>

    
    <rect x="170" y="256" width="150" height="40" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="182" y="274" class="mono">y_5</text>
    <text x="182" y="288" class="monos">... = 15</text>
    <rect x="332" y="263" width="40" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="352" y="280" text-anchor="middle" class="mono">r=0</text>

    
    <rect x="170" y="310" width="150" height="40" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="182" y="328" class="mono">y_6</text>
    <text x="182" y="342" class="monos">... = 120</text>
    <rect x="332" y="317" width="40" height="26" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="352" y="334" text-anchor="middle" class="mono">r=1</text>
  </g>

  
  <g data-anim="2">
    <line x1="460" y1="34" x2="460" y2="380" class="v-grid" stroke="var(--border-2)" stroke-width="1.3"/>
    <line x1="452" y1="40" x2="466" y2="40" class="v-stroke" stroke-width="1.3"/>
    <line x1="452" y1="380" x2="466" y2="380" class="v-stroke" stroke-width="1.3"/>
    <text x="446" y="44" text-anchor="end" class="xs">reward = 1</text>
    <text x="446" y="384" text-anchor="end" class="xs">reward = 0</text>

    
    <line x1="430" y1="210" x2="620" y2="210" class="v-accent-s" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="630" y="206" class="sm" fill="var(--accent)">group mean reward</text>
    <text x="630" y="220" class="sm" fill="var(--accent)">= baseline (0.5)</text>
    <text x="630" y="236" class="tiny">A_i = r_i - mean(r)</text>

    
    <circle cx="500" cy="40" r="5.5" class="v-accent" fill="var(--accent)"/>
    <circle cx="530" cy="40" r="5.5" class="v-accent" fill="var(--accent)"/>
    <circle cx="560" cy="40" r="5.5" class="v-accent" fill="var(--accent)"/>
    <text x="500" y="27" text-anchor="middle" class="tiny">y_1</text>
    <text x="530" y="27" text-anchor="middle" class="tiny">y_3</text>
    <text x="560" y="27" text-anchor="middle" class="tiny">y_6</text>

    
    <circle cx="500" cy="380" r="5.5" class="v-stroke" fill="var(--surface)" stroke-width="1.6"/>
    <circle cx="530" cy="380" r="5.5" class="v-stroke" fill="var(--surface)" stroke-width="1.6"/>
    <circle cx="560" cy="380" r="5.5" class="v-stroke" fill="var(--surface)" stroke-width="1.6"/>
    <text x="500" y="398" text-anchor="middle" class="tiny">y_2</text>
    <text x="530" y="398" text-anchor="middle" class="tiny">y_4</text>
    <text x="560" y="398" text-anchor="middle" class="tiny">y_5</text>
  </g>

  
  <g data-anim="3">
    <text x="530" y="15" text-anchor="middle" class="sm" fill="var(--accent)">A_i = +0.5  -&gt;  reinforce</text>
    <g stroke="var(--accent)" stroke-width="1.6" marker-end="url(#ggra-arrow-accent)">
      <line x1="500" y1="204" x2="500" y2="50"/>
      <line x1="530" y1="204" x2="530" y2="50"/>
      <line x1="560" y1="204" x2="560" y2="50"/>
    </g>

    <text x="530" y="424" text-anchor="middle" class="sm">A_i = -0.5  -&gt;  suppress</text>
    <g class="v-muted" stroke="currentColor" stroke-width="1.6" marker-end="url(#ggra-arrow)">
      <line x1="500" y1="216" x2="500" y2="370"/>
      <line x1="530" y1="216" x2="530" y2="370"/>
      <line x1="560" y1="216" x2="560" y2="370"/>
    </g>
  </g>

  
  <g data-anim="4">
    <rect x="14" y="452" width="772" height="134" rx="12" class="v-fill v-grid" stroke-width="1.2"/>
    <text x="400" y="476" text-anchor="middle" class="head">Where does the baseline come from?</text>

    
    <text x="34" y="500" class="lbl">PPO</text>
    <rect x="80" y="488" width="150" height="34" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
    <circle cx="96" cy="500" r="3" class="v-muted" fill="currentColor"/>
    <circle cx="96" cy="512" r="3" class="v-muted" fill="currentColor"/>
    <circle cx="110" cy="506" r="3" class="v-accent" fill="var(--accent)"/>
    <line x1="99" y1="500" x2="107" y2="506" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <line x1="99" y1="512" x2="107" y2="506" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <text x="120" y="509" class="xs">value head / critic</text>

    <line x1="230" y1="505" x2="254" y2="505" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ggra-arrow)"/>
    <rect x="254" y="488" width="110" height="34" rx="7" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="309" y="509" text-anchor="middle" class="sm">predicted baseline</text>

    <line x1="364" y1="505" x2="388" y2="505" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ggra-arrow)"/>
    <line x1="388" y1="505" x2="428" y2="505" class="v-stroke" stroke-width="1.4" stroke-dasharray="4 3"/>
    <circle cx="428" cy="505" r="4" class="v-stroke" fill="var(--surface)" stroke-width="1.4"/>

    <text x="450" y="500" class="sm">extra parameters +</text>
    <text x="450" y="515" class="sm">optimizer state to learn the baseline</text>

    
    <text x="34" y="558" class="lbl">GRPO</text>
    <text x="220" y="546" text-anchor="middle" class="sm">baseline = mean(group)</text>
    <line x1="80" y1="558" x2="428" y2="558" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6" stroke-dasharray="6 4"/>

    <text x="450" y="562" class="sm">baseline is the group mean -- no critic, free</text>
  </g>
</svg>
<figcaption><b>GRPO gets its baseline for free from the group itself.</b> Sample six completions to one prompt, score each with an illustrative 0/1 correctness reward, and the group's mean reward (0.5 here) becomes the baseline: above-average completions get a positive advantage and are reinforced, below-average ones get a negative advantage and are suppressed. PPO needs a learned value head with its own optimizer state to produce this same baseline; GRPO just averages the group.</figcaption>
</figure>
