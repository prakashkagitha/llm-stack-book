<figure class="viz" id="fig-rlhf-three-stage-pipeline">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 1180 620" role="img" aria-label="The InstructGPT three-stage RLHF pipeline: Stage 1 produces pi_SFT via supervised fine-tuning on demonstrations; Stage 2 trains a reward model r_phi from human rankings of K responses; Stage 3 uses PPO to optimize the policy under a KL penalty anchored to pi_SFT.">
<defs>
  <marker id="rp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
  <marker id="rp-arr-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#4f46e5)"/>
  </marker>
</defs>
<style>
  #fig-rlhf-three-stage-pipeline text { fill: var(--ink-soft,#334155); }
  #fig-rlhf-three-stage-pipeline .lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-rlhf-three-stage-pipeline .lbl-sm { font: 400 11px var(--sans,sans-serif); }
  #fig-rlhf-three-stage-pipeline .lbl-xs { font: 400 10px var(--sans,sans-serif); }
  #fig-rlhf-three-stage-pipeline .bold { font: 700 13px var(--sans,sans-serif); }
  #fig-rlhf-three-stage-pipeline .title { font: 700 14px var(--sans,sans-serif); fill: #fff; }
  #fig-rlhf-three-stage-pipeline .accent { fill: var(--accent,#4f46e5); }
  #fig-rlhf-three-stage-pipeline .muted { fill: var(--muted,#94a3b8); }
  #fig-rlhf-three-stage-pipeline .mono { font: 600 12px var(--mono,monospace); }
</style>


<g data-anim="1">
  
  <rect x="20" y="60" width="340" height="370" rx="12" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  
  <rect x="20" y="60" width="340" height="42" rx="12" fill="var(--accent,#4f46e5)"/>
  <rect x="20" y="84" width="340" height="18" fill="var(--accent,#4f46e5)"/>
  <text x="190" y="86" text-anchor="middle" class="title">STAGE 1: SFT</text>

  
  <rect x="50" y="130" width="280" height="60" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
  <text x="190" y="154" text-anchor="middle" class="lbl">prompts + human</text>
  <text x="190" y="171" text-anchor="middle" class="lbl">demonstrations</text>

  
  <line x1="190" y1="190" x2="190" y2="220" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#rp-arr)"/>

  
  <rect x="50" y="220" width="280" height="60" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
  <text x="190" y="244" text-anchor="middle" class="lbl">fine-tune base model</text>
  <text x="190" y="261" text-anchor="middle" class="mono accent">yields π_SFT</text>

  
  <rect x="120" y="330" width="140" height="34" rx="16" fill="var(--accent,#4f46e5)" opacity="0.15" stroke="var(--accent,#4f46e5)" stroke-width="1.8"/>
  <text x="190" y="352" text-anchor="middle" class="mono accent">π_SFT</text>
</g>


<g data-anim="2">
  <rect x="420" y="60" width="340" height="370" rx="12" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <rect x="420" y="60" width="340" height="42" rx="12" fill="var(--accent,#4f46e5)"/>
  <rect x="420" y="84" width="340" height="18" fill="var(--accent,#4f46e5)"/>
  <text x="590" y="86" text-anchor="middle" class="title">STAGE 2: Reward Model</text>

  
  <rect x="450" y="114" width="280" height="52" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
  <text x="590" y="136" text-anchor="middle" class="lbl">prompt, then sample K responses</text>
  <text x="590" y="153" text-anchor="middle" class="lbl-sm muted">from π_SFT  (K = 4–9)</text>

  <line x1="590" y1="166" x2="590" y2="196" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#rp-arr)"/>

  
  <rect x="450" y="196" width="280" height="46" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
  <text x="590" y="216" text-anchor="middle" class="bold accent">humans RANK them</text>
  <text x="590" y="232" text-anchor="middle" class="lbl-sm muted">pairwise preferences extracted</text>

  <line x1="590" y1="242" x2="590" y2="272" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#rp-arr)"/>

  
  <rect x="450" y="272" width="280" height="52" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
  <text x="590" y="294" text-anchor="middle" class="lbl">train RM on pairwise</text>
  <text x="590" y="311" text-anchor="middle" class="lbl">preferences</text>
  <text x="590" y="326" text-anchor="middle" class="mono accent">yields r_φ</text>
</g>


<g data-anim="3">
  <rect x="820" y="60" width="340" height="370" rx="12" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
  <rect x="820" y="60" width="340" height="42" rx="12" fill="var(--accent,#4f46e5)"/>
  <rect x="820" y="84" width="340" height="18" fill="var(--accent,#4f46e5)"/>
  <text x="990" y="86" text-anchor="middle" class="title">STAGE 3: RL (PPO)</text>

  
  <rect x="850" y="114" width="280" height="52" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
  <text x="990" y="136" text-anchor="middle" class="lbl">prompt, then policy samples</text>
  <text x="990" y="153" text-anchor="middle" class="lbl">a response</text>

  <line x1="990" y1="166" x2="990" y2="196" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#rp-arr)"/>

  
  <rect x="850" y="196" width="280" height="46" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
  <text x="990" y="216" text-anchor="middle" class="lbl">reward model r_φ</text>
  <text x="990" y="232" text-anchor="middle" class="lbl">scores it</text>

  <line x1="990" y1="242" x2="990" y2="272" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#rp-arr)"/>

  
  <rect x="850" y="272" width="280" height="66" rx="8" fill="var(--surface-3,#eef2ff)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.2"/>
  <text x="990" y="294" text-anchor="middle" class="lbl">PPO update on policy,</text>
  <text x="990" y="311" text-anchor="middle" class="bold accent">KL-anchored</text>
  <text x="990" y="328" text-anchor="middle" class="lbl">to frozen π_SFT reference</text>
</g>


<g data-anim="4">
  
  
  <path d="M 260 347 Q 340 400 420 340" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#rp-arr-accent)"/>
  
  <path d="M 260 355 Q 600 430 820 340" fill="none" stroke="var(--accent,#4f46e5)" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#rp-arr-accent)"/>

  
  <rect x="340" y="400" width="500" height="46" rx="8" fill="var(--surface,#f8fafc)" stroke="var(--accent,#4f46e5)" stroke-width="1" opacity="0.85"/>
  <text x="590" y="418" text-anchor="middle" class="lbl-sm accent">π_SFT used as: init for the RM, init for the policy,</text>
  <text x="590" y="435" text-anchor="middle" class="lbl-sm accent">and the frozen reference (the KL anchor)</text>
</g>


<g data-anim="5">
  
  <line x1="990" y1="338" x2="990" y2="515" stroke="var(--ink-soft,#64748b)" stroke-width="1.5" marker-end="url(#rp-arr)"/>
  
  <rect x="840" y="515" width="300" height="46" rx="23" fill="var(--accent,#4f46e5)"/>
  <text x="990" y="533" text-anchor="middle" class="title" style="font-size:13px">π_RL — the aligned model</text>
  <text x="990" y="550" text-anchor="middle" style="font:400 10px var(--sans,sans-serif); fill:#c7d2fe">output of the full pipeline</text>
</g>


<text x="590" y="38" text-anchor="middle" class="lbl-xs muted">Each stage produces an artifact the next stage consumes</text>


<g data-anim="2" opacity="0.5">
  <line x1="360" y1="250" x2="420" y2="250" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5" marker-end="url(#rp-arr)"/>
  <line x1="760" y1="250" x2="820" y2="250" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5" marker-end="url(#rp-arr)"/>
</g>
</svg>
<figcaption><b>The InstructGPT three-stage RLHF pipeline.</b> Stage 1 fine-tunes the base model on human demonstrations, producing <code>π_SFT</code>. Stage 2 collects human rankings of K responses and trains a reward model <code>r_φ</code> using Bradley–Terry pairwise loss. Stage 3 uses PPO to optimize the policy for reward while a KL penalty keeps it anchored to the frozen <code>π_SFT</code> reference. The <code>π_SFT</code> artifact (purple arrows) seeds both Stages 2 and 3, making it the critical cross-stage thread.</figcaption>
</figure>
