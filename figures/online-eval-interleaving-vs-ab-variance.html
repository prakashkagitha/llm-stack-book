<figcaption><b>The same treatment effect looks very different depending on what you difference against.</b> A/B testing must dig the signal out of large between-user variance (each user has their own baseline enthusiasm), so wide, noisy distributions require many sessions to separate; interleaving shows both models to the same user and takes a per-user paired difference, which cancels that baseline and leaves a narrow, crisp distribution around the same effect — hence the 10-30x reduction in required sessions.</figcaption>
