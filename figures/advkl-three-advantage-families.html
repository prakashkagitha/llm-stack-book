<figcaption><b>One reward signal, three ways to turn it into a per-token advantage.</b> Monte-Carlo/RLOO subtracts a scalar baseline so every token in a sequence gets the identical advantage; GAE uses a learned critic V(s_t) to give each token its own advantage, trading bias for variance via lambda; GRPO drops the critic and instead standardizes rewards within a group of completions for the same prompt, so each completion (not each token) gets its own group-relative advantage. All three are just different ways of estimating the same subtracted-baseline quantity, R minus something.</figcaption>
</figure>
