<figcaption><b>Sampling many chain-of-thought traces per problem and keeping only the ones a verifier confirms turns a noisy generator into a precise dataset.</b> Out of 8 sampled traces, only the ones whose final answer matches the gold answer are kept for SFT; because coverage grows as <code>1-(1-p)^K</code>, even a modest per-attempt success rate compounds into near-complete coverage once K is large enough.</figcaption>
</figure>
