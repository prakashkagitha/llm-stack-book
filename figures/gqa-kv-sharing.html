    <g class="hd" fill="var(--good,#2f9e6e)" text-anchor="middle">

      <rect x="632" y="64" width="15" height="26" rx="3"/>
      <rect x="649" y="64" width="15" height="26" rx="3"/>
      <rect x="666" y="64" width="15" height="26" rx="3"/>
      <rect x="683" y="64" width="15" height="26" rx="3"/>

  <g data-anim="4">
    <line x1="62" y1="266" x2="744" y2="266" class="v-accent-s" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#gq-arrow)" opacity="0.8"/>
    <text x="403" y="284" text-anchor="middle" class="note">fewer KV heads -&gt; smaller KV cache: query heads stay at 8 (expressivity kept), only K/V are shared</text>
    <text x="403" y="300" text-anchor="middle" class="sub">KV cache is proportional to (KV-head count) x d_head &#160;&#160;-&#160;&#160; MHA 8 -&gt; GQA 2 -&gt; MQA 1</text>
  </g>

<figcaption><b>Query heads stay; key/value heads get shared.</b> All three schemes keep eight query heads, but they differ in how many distinct KV heads those queries attend against — eight (MHA), two groups (GQA), or one (MQA). Since the KV cache scales with the number of KV heads, this single knob shrinks the cache from 8× to 2× to 1× while leaving query-side expressivity untouched.</figcaption>
</figure>
