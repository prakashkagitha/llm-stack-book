<figcaption><b>Raw query/key norms of ~100 push the attention logit to ~880 &amp;mdash; still under the fp16 ceiling of 65,504, but enough to collapse the softmax to a single-token delta and underflow the exponential sum into NaN.</b> QK-Norm applies RMSNorm to Q and K before the dot product, so the logit magnitude grows at most as O(sqrt(d<sub>k</sub>)) regardless of how large the raw activations get, keeping the softmax spread and the gradients finite &amp;mdash; this is the fix behind Story 3's fp16 head-7 near-miss at logits ~60,000.</figcaption>
</figure>
