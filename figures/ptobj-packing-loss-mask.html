<figure class="viz" id="fig-ptobj-packing-loss-mask">
<svg viewBox="0 0 780 400" role="img" aria-label="Three aligned tracks over a 16-cell context window. Track 1, unpacked and padded, shows Doc A followed by a long tail of PAD cells with no gradient signal. Track 2, packed, concatenates Doc A, a SEP token, Doc B, a SEP token, Doc C, and a short PAD tail, filling almost the whole window. Track 3, the loss mask, marks every position as trained except PAD cells and the first token of Doc B and Doc C, whose prediction is poisoned by the unrelated prior document.">
<defs>
  <pattern id="ptpl-pad-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
    <rect width="7" height="7" fill="var(--surface-3,#eee)"/>
    <line x1="0" y1="0" x2="0" y2="7" stroke="var(--border-2,#ccc)" stroke-width="2"/>
  </pattern>
  <marker id="ptpl-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-ptobj-packing-loss-mask text { fill: var(--ink-soft,#333); font: 400 11px var(--sans,sans-serif); }
  #fig-ptobj-packing-loss-mask .title { font: 700 13px var(--sans,sans-serif); }
  #fig-ptobj-packing-loss-mask .grp-lbl { font: 700 10.5px var(--sans,sans-serif); text-anchor: middle; }
  #fig-ptobj-packing-loss-mask .cell-lbl { font: 700 11px var(--mono,monospace); text-anchor: middle; }
  #fig-ptobj-packing-loss-mask .note { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-packing-loss-mask .leg { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-packing-loss-mask .mark { font: 700 13px var(--mono,monospace); text-anchor: middle; }
</style>


<g data-anim="1">
  <rect x="70" y="10" width="14" height="14" rx="2" fill="var(--accent,#c15b39)" opacity="0.55"/>
  <text x="88" y="21" class="leg">doc token</text>
  <rect x="170" y="10" width="14" height="14" rx="2" fill="none" stroke="var(--v-stroke,#666)" stroke-width="1.3"/>
  <text x="188" y="21" class="leg">SEP</text>
  <rect x="230" y="10" width="14" height="14" rx="2" fill="url(#ptpl-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <text x="248" y="21" class="leg">PAD</text>
  <text x="300" y="21" class="leg" style="fill:var(--good,#2f9e6e)" font-weight="700">check</text>
  <text x="350" y="21" class="leg">= train on this position</text>
  <text x="500" y="21" class="leg" style="fill:var(--muted,#666)" font-weight="700">x</text>
  <text x="512" y="21" class="leg">= masked (ignore_index = -100)</text>
</g>


<g data-anim="2">
  <text x="70" y="50" class="title">Unpacked (padded) -- one short document per 16-token window</text>

  
  <rect x="70"  y="58" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="110" y="58" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="150" y="58" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="190" y="58" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="230" y="58" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <text x="170" y="78" class="grp-lbl">Doc A</text>

  
  <g>
    <rect x="270" y="58" width="440" height="32" fill="url(#ptpl-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
    <text x="490" y="78" class="grp-lbl" style="fill:var(--muted,#666)">PAD x 11</text>
  </g>

  <line x1="270" y1="98" x2="270" y2="104" stroke="var(--muted,#888)" stroke-width="1"/>
  <line x1="270" y1="102" x2="710" y2="102" stroke="var(--muted,#888)" stroke-width="1"/>
  <line x1="710" y1="98" x2="710" y2="104" stroke="var(--muted,#888)" stroke-width="1"/>
  <text x="490" y="118" text-anchor="middle" class="note">wasted compute -- no gradient signal</text>
</g>

  <path d="M 250,216 C 250,188 330,188 330,216" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#ptpl-arrow)"/>

  
  <text x="170" y="210" class="grp-lbl">Doc A</text>
  <text x="290" y="210" class="grp-lbl">SEP</text>
  <text x="390" y="210" class="grp-lbl">Doc B</text>
  <text x="490" y="210" class="grp-lbl">SEP</text>
  <text x="570" y="210" class="grp-lbl">Doc C</text>
  <text x="670" y="210" class="grp-lbl" style="fill:var(--muted,#666)">PAD</text>

  
  <rect x="70"  y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="110" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="150" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="190" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="230" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.55" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  
  <rect x="270" y="218" width="40" height="32" fill="none" stroke="var(--v-stroke,#666)" stroke-width="1.4" stroke-dasharray="3 2"/>
  
  <rect x="310" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.3" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="350" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.3" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="390" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.3" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="430" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.3" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  
  <rect x="470" y="218" width="40" height="32" fill="none" stroke="var(--v-stroke,#666)" stroke-width="1.4" stroke-dasharray="3 2"/>
  
  <rect x="510" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.15" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="550" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.15" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  <rect x="590" y="218" width="40" height="32" fill="var(--accent,#c15b39)" opacity="0.15" stroke="var(--v-stroke,#666)" stroke-width="1"/>
  
  <rect x="630" y="218" width="40" height="32" fill="url(#ptpl-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
  <rect x="670" y="218" width="40" height="32" fill="url(#ptpl-pad-hatch)" stroke="var(--border-2,#ccc)" stroke-width="1"/>
</g>


<g data-anim="4">
  <text x="70" y="282" class="title">Loss mask (train on this position?)</text>

  <rect x="70" y="290" width="640" height="32" rx="4" fill="var(--v-fill,#eee)" opacity="0.35"/>

  
  
  <g stroke="var(--good,#2f9e6e)" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="82,306 88,312 98,298"/>
    <polyline points="122,306 128,312 138,298"/>
    <polyline points="162,306 168,312 178,298"/>
    <polyline points="202,306 208,312 218,298"/>

  </g>

<g data-anim="5">
  <text x="70" y="348" class="note">Packing recovers the wasted tokens; padding AND cross-document boundary positions are excluded from the loss</text>
  <text x="70" y="362" class="note">(ignore_index = -100), and the remaining loss is normalized by active-token count.</text>
</g>

</svg>
<figcaption><b>Packing fills the context window instead of wasting it on padding, but the loss mask must still zero out both padding and the first token of every new document.</b> Predicting the first token of Doc B or Doc C is conditioned on an unrelated prior document's tail, so those positions are excluded from the loss along with PAD, and the remaining loss is normalized by the count of active (unmasked) tokens.</figcaption>
</figure>
