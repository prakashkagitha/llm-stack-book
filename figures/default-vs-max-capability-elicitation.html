<figure class="viz" id="fig-default-vs-max-capability-elicitation">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 520" role="img" aria-label="The same model probed two different ways: asked plainly it gives a default benign response, but under a stack of adversarial elicitation -- best jailbreak, expert red-teamer, many attempts, tool access -- it reveals a stronger latent capability. A ruler below shows the elicited capability compared against a baseline of what an adversary already has from web search and textbooks; the gap between them is the uplift that matters.">
<defs>
  <marker id="dmceArrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="var(--accent2,#3b82f6)"/>
  </marker>
  <marker id="dmceArrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="var(--accent,#c15b39)"/>
  </marker>

      figure.viz.in-view #fig-default-vs-max-capability-elicitation .dmce-stack-item:nth-child(3) { animation-delay: 0.5s; }
      figure.viz.in-view #fig-default-vs-max-capability-elicitation .dmce-stack-item:nth-child(4) { animation-delay: 0.75s; }
    }
  </style>
</defs>

  <g class="dmce-stack-item">
    <rect x="470" y="86" width="110" height="26" rx="6" fill="var(--accent,#c15b39)" opacity="0.16" stroke="var(--accent,#c15b39)" stroke-width="1.1"/>

    <text x="646" y="103" text-anchor="middle" class="step-lbl">expert red-teamer</text>
  </g>
  <g class="dmce-stack-item">
    <rect x="470" y="118" width="110" height="26" rx="6" fill="var(--accent,#c15b39)" opacity="0.16" stroke="var(--accent,#c15b39)" stroke-width="1.1"/>
    <text x="525" y="135" text-anchor="middle" class="step-lbl">many attempts</text>
  </g>
  <g class="dmce-stack-item">
    <rect x="586" y="118" width="120" height="26" rx="6" fill="var(--accent,#c15b39)" opacity="0.16" stroke="var(--accent,#c15b39)" stroke-width="1.1"/>

  </g>

  <line x1="525" y1="144" x2="578" y2="168" stroke="var(--accent,#c15b39)" stroke-width="1.5" opacity="0.6"/>
  <line x1="646" y1="144" x2="582" y2="168" stroke="var(--accent,#c15b39)" stroke-width="1.5" opacity="0.6"/>
  <line x1="525" y1="112" x2="574" y2="168" stroke="var(--accent,#c15b39)" stroke-width="1.5" opacity="0.6"/>
  <line x1="646" y1="112" x2="586" y2="168" stroke="var(--accent,#c15b39)" stroke-width="1.5" opacity="0.6"/>
  <path d="M 580,168 C 580,190 550,196 472,200" fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.2" marker-end="url(#dmceArrowOrange)"/>
</g>


<g data-anim="1">
  <rect x="330" y="176" width="140" height="56" rx="10" class="v-fill" fill="var(--surface-3,#ece7da)" stroke="var(--ink-soft,#45413a)" stroke-width="1.6"/>
  <text x="400" y="200" text-anchor="middle" class="node-lbl">model under test</text>
  <text x="400" y="216" text-anchor="middle" class="regime-s">the same weights</text>
</g>


<g data-anim="2">
  <path d="M 330,204 C 260,240 200,240 150,240 L 150,258" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2" marker-end="url(#dmceArrowBlue)"/>
  <rect x="60" y="262" width="180" height="46" rx="8" fill="var(--accent2,#3b82f6)" opacity="0.12" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
  <text x="150" y="282" text-anchor="middle" class="out-h" fill="var(--accent2,#3b82f6)">refusal / benign output</text>
  <text x="150" y="298" text-anchor="middle" class="out-s">what it does when asked plainly</text>
</g>

<g data-anim="3">
  <path d="M 470,204 C 540,240 600,240 650,240 L 650,258" fill="none" stroke="var(--accent,#c15b39)" stroke-width="2" marker-end="url(#dmceArrowOrange)"/>
  <rect x="560" y="262" width="180" height="46" rx="8" fill="var(--accent,#c15b39)" opacity="0.14" stroke="var(--accent,#c15b39)" stroke-width="1.2"/>
  <text x="650" y="282" text-anchor="middle" class="out-h" fill="var(--accent,#c15b39)">strongest response</text>
  <text x="650" y="298" text-anchor="middle" class="out-s">what a determined adversary can extract</text>
</g>

<line x1="290" y1="90" x2="290" y2="360" stroke="var(--border-2,#d8d1c0)" stroke-width="1" opacity="0.5" data-anim="1"/>

<text x="400" y="330" text-anchor="middle" class="note" data-anim="4">two different questions about one model -- not a spectrum of models</text>


<g data-anim="5">
  <text x="490" y="346" text-anchor="start" class="axis-cap">capability ruler, spanning the elicitation regime</text>

  <line x1="490" y1="392" x2="790" y2="392" stroke="var(--border-2,#d8d1c0)" stroke-width="1.6"/>
  <line x1="490" y1="386" x2="490" y2="398" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <line x1="790" y1="386" x2="790" y2="398" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <text x="490" y="412" text-anchor="start" class="ruler-s">low capability</text>
  <text x="790" y="412" text-anchor="end" class="ruler-s">high capability</text>

  
  <line x1="540" y1="384" x2="540" y2="400" stroke="var(--muted,#6d675d)" stroke-width="2"/>
  <line x1="540" y1="384" x2="565" y2="384" stroke="var(--muted,#6d675d)" stroke-width="2"/>
  <line x1="540" y1="400" x2="565" y2="400" stroke="var(--muted,#6d675d)" stroke-width="2"/>
  <line x1="565" y1="384" x2="565" y2="400" stroke="var(--muted,#6d675d)" stroke-width="2"/>
  <circle cx="552" cy="392" r="4" fill="var(--muted,#6d675d)"/>
  <text x="552" y="440" text-anchor="middle" class="ruler-lbl" fill="var(--muted,#6d675d)">baseline</text>
  <text x="552" y="453" text-anchor="middle" class="ruler-s">web search +</text>
  <text x="552" y="465" text-anchor="middle" class="ruler-s">textbooks</text>

  
  <circle cx="748" cy="392" r="6" fill="var(--accent,#c15b39)" stroke="var(--ink-soft,#45413a)" stroke-width="1.3"/>
  <text x="748" y="440" text-anchor="middle" class="ruler-lbl" fill="var(--accent,#c15b39)">elicited</text>
  <text x="748" y="453" text-anchor="middle" class="ruler-s">capability</text>

  
  <line x1="565" y1="374" x2="565" y2="366" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <line x1="748" y1="374" x2="748" y2="366" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <line x1="565" y1="370" x2="748" y2="370" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
  <text x="656" y="366" text-anchor="middle" class="uplift-h" fill="var(--warn,#e0a106)">UPLIFT = what matters</text>
</g>

<g data-anim="5">
  <rect x="20" y="486" width="760" height="26" rx="7" class="v-fill" fill="var(--surface-3,#ece7da)" opacity="0.6"/>
  <text x="400" y="503" text-anchor="middle" class="note">Low default-harm does not imply low uplift.</text>
</g>

</svg>
<figcaption><b>Default-behavior benchmarks and dangerous-capability evals ask two different questions about the same model.</b> Asked plainly, a model may look benign; squeezed by the strongest available elicitation -- jailbreaks, expert red-teamers, many attempts, tool access -- the same weights can reveal far more capability, and what matters for risk is the uplift over what an adversary already has from web search and textbooks, not the default-behavior score.</figcaption>
</figure>
