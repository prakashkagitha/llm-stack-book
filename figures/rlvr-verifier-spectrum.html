<figure class="viz" id="fig-rlvr-verifier-spectrum">
<svg viewBox="0 0 900 360" role="img" aria-label="The verifier spectrum from most exact and least hackable on the left (symbolic/exact-match, code execution) to most general and most hackable on the right (LLM-as-judge, learned reward model), with the guiding principle: prefer the leftmost verifier the task allows.">
<defs>
  <linearGradient id="vvs-axis-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="var(--accent,#2563eb)"/>
    <stop offset="100%" stop-color="var(--warn,#d97706)"/>
  </linearGradient>
  <marker id="vvs-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
    <path d="M0 1 L11 6 L0 11 z" fill="url(#vvs-axis-grad)"/>
  </marker>
</defs>
<style>
  #fig-rlvr-verifier-spectrum text { fill: var(--ink-soft, #374151); }
  #fig-rlvr-verifier-spectrum .lbl-bold { font: 700 13px var(--sans,sans-serif); }
  #fig-rlvr-verifier-spectrum .lbl-sm { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-verifier-spectrum .node-label { font: 700 12px var(--sans,sans-serif); }
  #fig-rlvr-verifier-spectrum .example-text { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-verifier-spectrum .caption { font: italic 12px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-rlvr-verifier-spectrum .end-label { font: 700 14px var(--sans,sans-serif); }
</style>


<rect x="70" y="145" width="780" height="14" rx="7"
      fill="url(#vvs-axis-grad)" opacity="0.85"/>

<line x1="845" y1="152" x2="855" y2="152" stroke="url(#vvs-axis-grad)" stroke-width="2" marker-end="url(#vvs-arrow)"/>


<text x="70" y="58" text-anchor="start" class="end-label" fill="var(--accent,#2563eb)">MOST EXACT</text>
<text x="70" y="74" text-anchor="start" class="lbl-sm">least hackable,</text>
<text x="70" y="88" text-anchor="start" class="lbl-sm">narrowest</text>


<text x="860" y="58" text-anchor="end" class="end-label" fill="var(--warn,#d97706)">MOST GENERAL</text>
<text x="860" y="74" text-anchor="end" class="lbl-sm">most hackable,</text>
<text x="860" y="88" text-anchor="end" class="lbl-sm">broadest</text>



<circle cx="185" cy="152" r="7" fill="var(--accent,#2563eb)" stroke="var(--surface,#fff)" stroke-width="2"/>

<line x1="185" y1="145" x2="185" y2="115" stroke="var(--accent,#2563eb)" stroke-width="1.5" stroke-dasharray="3 2"/>

<rect x="105" y="96" width="160" height="26" rx="5"
      fill="var(--surface,#f0f4ff)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
<text x="185" y="113" text-anchor="middle" class="node-label" fill="var(--accent,#2563eb)">symbolic / exact-match</text>

<line x1="185" y1="159" x2="185" y2="185" stroke="var(--accent,#2563eb)" stroke-width="1.5" stroke-dasharray="3 2"/>

<text x="185" y="199" text-anchor="middle" class="example-text">math, logic</text>
<text x="185" y="213" text-anchor="middle" class="example-text">exact extraction</text>


<circle cx="395" cy="152" r="7" fill="var(--accent,#2563eb)" stroke="var(--surface,#fff)" stroke-width="2"/>
<line x1="395" y1="145" x2="395" y2="115" stroke="var(--accent,#2563eb)" stroke-width="1.5" stroke-dasharray="3 2"/>
<rect x="330" y="96" width="130" height="26" rx="5"
      fill="var(--surface,#f0f4ff)" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>
<text x="395" y="113" text-anchor="middle" class="node-label" fill="var(--accent,#2563eb)">code execution</text>
<line x1="395" y1="159" x2="395" y2="185" stroke="var(--accent,#2563eb)" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="395" y="199" text-anchor="middle" class="example-text">unit tests</text>


<circle cx="615" cy="152" r="7" fill="var(--warn,#d97706)" stroke="var(--surface,#fff)" stroke-width="2"/>
<line x1="615" y1="145" x2="615" y2="115" stroke="var(--warn,#d97706)" stroke-width="1.5" stroke-dasharray="3 2"/>
<rect x="550" y="96" width="130" height="26" rx="5"
      fill="var(--surface,#fff8ed)" stroke="var(--warn,#d97706)" stroke-width="1.5"/>
<text x="615" y="113" text-anchor="middle" class="node-label" fill="var(--warn,#d97706)">LLM-as-judge</text>
<line x1="615" y1="159" x2="615" y2="185" stroke="var(--warn,#d97706)" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="615" y="199" text-anchor="middle" class="example-text">entailment,</text>
<text x="615" y="213" text-anchor="middle" class="example-text">style checks</text>


<circle cx="810" cy="152" r="7" fill="var(--warn,#d97706)" stroke="var(--surface,#fff)" stroke-width="2"/>
<line x1="810" y1="145" x2="810" y2="115" stroke="var(--warn,#d97706)" stroke-width="1.5" stroke-dasharray="3 2"/>
<rect x="725" y="96" width="170" height="26" rx="5"
      fill="var(--surface,#fff8ed)" stroke="var(--warn,#d97706)" stroke-width="1.5"/>
<text x="810" y="113" text-anchor="middle" class="node-label" fill="var(--warn,#d97706)">learned reward model</text>
<line x1="810" y1="159" x2="810" y2="185" stroke="var(--warn,#d97706)" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="810" y="199" text-anchor="middle" class="example-text">helpfulness,</text>
<text x="810" y="213" text-anchor="middle" class="example-text">safety, tone</text>


<text x="450" y="330" text-anchor="middle" class="caption">Prefer the leftmost verifier the task allows; fall right only as needed.</text>
</svg>
<figcaption><b>The verifier spectrum: from exact-but-narrow to general-but-hackable.</b> Symbolic and execution-based verifiers (left) are deterministic and unhackable in the statistical sense; learned reward models (right) are flexible but subject to Goodhart drift. The RLVR principle is to occupy the leftmost position the task permits.</figcaption>
</figure>
