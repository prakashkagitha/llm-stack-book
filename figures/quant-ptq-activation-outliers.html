<figcaption><b>Activation outliers make per-tensor INT8 fail for large language models.</b> Across 4096 hidden channels most activations are tiny (|x| ~ 0.3), but a handful of channels (e.g. 411 and 1922) spike to 40–50x larger. Because per-tensor quantization scales the whole vector to the outlier's range, all normal values collapse toward zero — the core motivation for SmoothQuant and LLM.int8().</figcaption>
