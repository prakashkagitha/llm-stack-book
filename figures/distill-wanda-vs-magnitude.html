<button class="viz-replay" type="button">/replay</button>

<figcaption><b>Wanda's score multiplies weight magnitude by the input feature's activation norm, so the same weight matrix gets pruned differently once you account for which features are actually active.</b> Magnitude-only pruning drops a small weight sitting on a busy, high-activation feature (a mistake) while keeping a large weight on a nearly-dead feature; Wanda's <code>|w_ij| . ||x_j||_2</code> score reverses both calls without needing any Hessian computation.</figcaption>
</figure>
