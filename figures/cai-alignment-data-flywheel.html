<figure class="viz" id="fig-cai-alignment-data-flywheel">
<button class="viz-replay" type="button">&#8635; replay</button>

</defs>
<style>

  #fig-cai-alignment-data-flywheel [data-anim] { opacity: 0; }
  #fig-cai-alignment-data-flywheel.playing [data-anim="1"]  { animation: fly-in 0.4s 0.1s ease forwards; }

  @keyframes fly-in { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }

  #fig-cai-alignment-data-flywheel:not(.playing) [data-anim] { opacity: 1; }

  /* flowing dash on feedback arc */
  #fig-cai-alignment-data-flywheel.playing .arc-flow {
    stroke-dasharray: 12 8;
    stroke-dashoffset: 0;
    animation: arc-dash 2s 6.8s linear infinite;
  }
  @keyframes arc-dash { to { stroke-dashoffset: -80; } }
</style>

<figcaption><b>The alignment data flywheel: a small human seed compounds through iterated RLAIF.</b> A tiny set of expert-labeled examples trains an SFT model; RLAIF then labels millions of AI-generated pairs to train successive reward models; a human spot-check QA gate catches failures before production; and the production model becomes the seed for the next round — each iteration producing higher-quality AI labels that make the next round even better.</figcaption>
</figure>
