<figure class="viz" id="fig-autodiff-mm-fullstack-trace">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 740 600" role="img" aria-label="End-to-end trace of torch.mm(a,b) descending through 7 stages: Python call, Python binding, Autograd layer (creates MmBackward), Dispatcher (routes to CUDA backend), ATen CUDA kernel, cuBLAS GEMM, and result tensor with grad_fn=MmBackward. A side panel shows the MmBackward derivative formulas.">
<defs>
  <marker id="mmft-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M1 0 L9 0 L5 9 z" fill="var(--ink-soft,#555)"/>
  </marker>
  <marker id="mmft-dash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent-2,#d9730d)"/>
  </marker>
</defs>
<style>
  #fig-autodiff-mm-fullstack-trace text    { fill: currentColor; }
  #fig-autodiff-mm-fullstack-trace .badge  { font: 700 12px var(--sans,sans-serif); }
  #fig-autodiff-mm-fullstack-trace .title  { font: 600 12.5px var(--sans,sans-serif); }
  #fig-autodiff-mm-fullstack-trace .detail { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-autodiff-mm-fullstack-trace .pnl    { font: 600 10px var(--sans,sans-serif); fill: var(--accent-2,#d9730d); }
  #fig-autodiff-mm-fullstack-trace .pnl-f  { font: 500 11px var(--mono,monospace); fill: var(--accent-2,#d9730d); }
  #fig-autodiff-mm-fullstack-trace .pnl-n  { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-autodiff-mm-fullstack-trace .ovl    { text-decoration: overline; }
</style>




<g data-anim="1">
  <rect x="14" y="20" width="372" height="56" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <rect x="20" y="30" width="22" height="22" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="31" y="46" text-anchor="middle" class="badge" fill="white" fill-opacity="0.95">1</text>
  <text x="54" y="45" class="title">Python call</text>
  <text x="54" y="62" class="detail">torch.mm(a, b)</text>
</g>


<line x1="200" y1="76" x2="200" y2="95" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#mmft-down)"/>


<g data-anim="2">
  <rect x="14" y="98" width="372" height="56" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <rect x="20" y="108" width="22" height="22" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="31" y="124" text-anchor="middle" class="badge" fill="white" fill-opacity="0.95">2</text>
  <text x="54" y="123" class="title">Python binding</text>
  <text x="54" y="140" class="detail">torch._C._VariableFunctions.mm</text>
</g>


<line x1="200" y1="154" x2="200" y2="173" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#mmft-down)"/>


<g data-anim="3">
  <rect x="14" y="176" width="372" height="56" rx="8" fill="var(--accent-2,#d9730d)" fill-opacity="0.10" stroke="var(--accent-2,#d9730d)" stroke-width="1.8"/>
  <rect x="20" y="186" width="22" height="22" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="31" y="202" text-anchor="middle" class="badge" fill="white" fill-opacity="0.95">3</text>
  <text x="54" y="200" class="title">Autograd layer</text>
  <text x="54" y="216" class="detail">checks requires_grad; if set, creates MmBackward</text>
</g>


<line x1="200" y1="232" x2="200" y2="251" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#mmft-down)"/>


<g data-anim="4">
  <rect x="14" y="254" width="372" height="56" rx="8" fill="var(--accent,#6366f1)" fill-opacity="0.16" stroke="var(--accent,#6366f1)" stroke-width="2.5"/>
  <rect x="20" y="264" width="22" height="22" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="31" y="280" text-anchor="middle" class="badge" fill="white" fill-opacity="0.95">4</text>
  <text x="54" y="278" class="title" fill="var(--accent,#6366f1)">Dispatcher</text>
  <text x="54" y="295" class="detail">keys {CUDA, AutogradCUDA}; picks at::mm CUDA</text>
</g>


<line x1="200" y1="310" x2="200" y2="329" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#mmft-down)"/>


<g data-anim="5">
  <rect x="14" y="332" width="372" height="56" rx="8" class="v-fill" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
  <rect x="20" y="342" width="22" height="22" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="31" y="358" text-anchor="middle" class="badge" fill="white" fill-opacity="0.95">5</text>
  <text x="54" y="356" class="title">ATen CUDA kernel</text>
  <text x="54" y="373" class="detail">at::mm (CUDA) delegates to cuBLAS gemm</text>
</g>


<line x1="200" y1="388" x2="200" y2="407" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#mmft-down)"/>


<g data-anim="6">
  <rect x="14" y="410" width="372" height="56" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.12" stroke="var(--good,#2f9e6e)" stroke-width="1.8"/>
  <rect x="20" y="420" width="22" height="22" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="31" y="436" text-anchor="middle" class="badge" fill="white" fill-opacity="0.95">6</text>
  <text x="54" y="433" class="title" fill="var(--good,#2f9e6e)">cuBLAS</text>
  <text x="54" y="450" class="detail">optimal tiled GEMM on the GPU (hardware library)</text>
</g>


<line x1="200" y1="466" x2="200" y2="485" stroke="var(--ink-soft,#555)" stroke-width="1.5" marker-end="url(#mmft-down)"/>


<g data-anim="7">
  <rect x="14" y="488" width="372" height="56" rx="8" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
  <rect x="20" y="498" width="22" height="22" rx="4" fill="var(--accent,#6366f1)" fill-opacity="0.85"/>
  <text x="31" y="514" text-anchor="middle" class="badge" fill="white" fill-opacity="0.95">7</text>
  <text x="54" y="512" class="title">Result returned</text>
  <text x="54" y="529" class="detail">output tensor; grad_fn = MmBackward (if grad needed)</text>
</g>


<g data-anim="3">

  <line x1="386" y1="204" x2="452" y2="204" stroke="var(--accent-2,#d9730d)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#mmft-dash)"/>
  <line x1="452" y1="204" x2="452" y2="516" stroke="var(--accent-2,#d9730d)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="452" y1="516" x2="386" y2="516" stroke="var(--accent-2,#d9730d)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#mmft-dash)"/>


  <rect x="456" y="284" width="270" height="172" rx="8" fill="var(--accent-2,#d9730d)" fill-opacity="0.08" stroke="var(--accent-2,#d9730d)" stroke-width="1.5"/>


  <text x="591" y="306" text-anchor="middle" class="pnl">MmBackward</text>
  <text x="591" y="321" text-anchor="middle" class="pnl">(registered in ATen)</text>

  <text x="470" y="348" class="pnl-f">C = A · B</text>

  <text x="470" y="376" class="pnl-f"><tspan class="ovl">A</tspan> = <tspan class="ovl">C</tspan> B&#x1D40;</text>
  <text x="470" y="398" class="pnl-f"><tspan class="ovl">B</tspan> = A&#x1D40; <tspan class="ovl">C</tspan></text>

  <text x="470" y="424" class="pnl-n">each is itself an mm call, so it</text>
  <text x="470" y="438" class="pnl-n">re-enters the Dispatcher</text>
  <text x="470" y="452" class="pnl-n">(another cuBLAS GEMM).</text>
</g>

</svg>
<figcaption><b>torch.mm(a, b) traced end-to-end through the PyTorch stack.</b> The call descends through seven stages — Python call, C++ binding stub, Autograd (where MmBackward is created and a, b are recorded), the <b>Dispatcher</b> (which routes to the CUDA backend), ATen, and finally cuBLAS. On the return path the output tensor carries grad_fn = MmBackward; when backward is later called, that node computes the gradients of A and B — themselves mm calls that re-enter the same Dispatcher path.</figcaption>
</figure>
