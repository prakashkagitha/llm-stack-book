<figure class="viz" id="fig-colpali-ocrfree-rag-pipeline">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 880 740" role="img" aria-label="OCR-free RAG pipeline: offline indexing builds a multi-vector index from PDF pages via ColPali patch embeddings; online query produces ColPali query embeddings; both meet at MaxSim retrieval returning top-k page images; a VLM generator produces a grounded answer.">
<defs>
  <marker id="orp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
  </marker>
  <marker id="orp-arr-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
  </marker>
</defs>
<style>
  #fig-colpali-ocrfree-rag-pipeline text   { fill: var(--ink-soft,#374151); }
  #fig-colpali-ocrfree-rag-pipeline .lbl   { font: 600 13px var(--sans,sans-serif); }
  #fig-colpali-ocrfree-rag-pipeline .sub   { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-colpali-ocrfree-rag-pipeline .cod   { font: 500 11px var(--mono,monospace); }
  #fig-colpali-ocrfree-rag-pipeline .mut   { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6b7280); }
  #fig-colpali-ocrfree-rag-pipeline .hdr   { font: 700 13px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-colpali-ocrfree-rag-pipeline .on-acc{ font: 700 14px var(--sans,sans-serif); fill: #fff; }

  @keyframes orp-fade { from{opacity:0} to{opacity:1} }
  @keyframes orp-drop { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  #fig-colpali-ocrfree-rag-pipeline [data-anim] { opacity:0; }

  @media (prefers-reduced-motion: reduce) {
    #fig-colpali-ocrfree-rag-pipeline [data-anim] { opacity:1 !important; animation:none !important; }
  }
</style>


<g data-anim="1" style="animation:orp-fade .4s ease 0s forwards">
  <text x="210" y="30" text-anchor="middle" class="hdr">Offline indexing</text>
  <line x1="50" y1="36" x2="370" y2="36" stroke="var(--accent,#c15b39)" stroke-width="1.2" opacity=".4"/>

  <text x="660" y="30" text-anchor="middle" class="hdr">Online query</text>
  <line x1="510" y1="36" x2="810" y2="36" stroke="var(--accent,#c15b39)" stroke-width="1.2" opacity=".4"/>
</g>




<g data-anim="2" style="animation:orp-drop .45s ease .15s forwards">
  <rect x="86" y="50" width="248" height="50" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
  <rect x="98" y="60" width="13" height="16" rx="2" fill="none" stroke="var(--muted,#9ca3af)" stroke-width="1.1"/>
  <rect x="102" y="56" width="13" height="16" rx="2" fill="none" stroke="var(--muted,#9ca3af)" stroke-width=".9"/>
  <text x="210" y="72" text-anchor="middle" class="lbl">PDFs</text>
  <text x="210" y="89" text-anchor="middle" class="sub">source documents</text>
</g>


<g data-anim="2" style="animation:orp-fade .4s ease .25s forwards">
  <line x1="210" y1="100" x2="210" y2="136" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#orp-arr)"/>
  <text x="224" y="123" text-anchor="start" class="mut">render pages to PNG</text>
</g>


<g data-anim="3" style="animation:orp-drop .45s ease .5s forwards">
  <rect x="68" y="136" width="284" height="56" rx="8" class="v-fill v-accent-s" stroke-width="2"/>
  <text x="210" y="158" text-anchor="middle" class="lbl">ColPali / ColQwen2</text>
  <text x="210" y="174" text-anchor="middle" class="sub">patch embeddings</text>
  <text x="210" y="186" text-anchor="middle" class="sub">1024 vectors x R^128 per page</text>
</g>


<g data-anim="3" style="animation:orp-fade .4s ease .6s forwards">
  <line x1="210" y1="192" x2="210" y2="228" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#orp-arr)"/>
  <text x="224" y="215" text-anchor="start" class="mut">token-pool + quantize</text>
</g>


<g data-anim="4" style="animation:orp-drop .45s ease .9s forwards">
  <rect x="72" y="228" width="276" height="62" rx="7" class="v-fill v-accent-s" stroke-width="2"/>
  
  <line x1="82" y1="241" x2="338" y2="241" stroke="var(--accent,#c15b39)" stroke-width=".8" stroke-dasharray="3 2" opacity=".55"/>
  <line x1="82" y1="249" x2="338" y2="249" stroke="var(--accent,#c15b39)" stroke-width=".8" stroke-dasharray="3 2" opacity=".35"/>
  <text x="210" y="270" text-anchor="middle" class="lbl">multi-vector index</text>
  <text x="210" y="284" text-anchor="middle" class="sub">PLAID / HNSW over patch vectors</text>
</g>




<g data-anim="2" style="animation:orp-drop .45s ease .2s forwards">
  <rect x="540" y="50" width="240" height="50" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="660" y="72" text-anchor="middle" class="lbl">user question (text)</text>
  <text x="660" y="89" text-anchor="middle" class="sub">"How did margin change in 2022?"</text>
</g>


<g data-anim="2" style="animation:orp-fade .4s ease .3s forwards">
  <line x1="660" y1="100" x2="660" y2="136" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#orp-arr)"/>
</g>


<g data-anim="3" style="animation:orp-drop .45s ease .55s forwards">
  <rect x="534" y="136" width="252" height="56" rx="8" class="v-fill v-accent-s" stroke-width="2"/>
  <text x="660" y="158" text-anchor="middle" class="lbl">ColPali query embeddings</text>
  <text x="660" y="176" text-anchor="middle" class="sub">n token vectors in R^128</text>
</g>


<g data-anim="5" style="animation:orp-fade .5s ease 1.3s forwards">
  
  <polyline points="348,259 426,259 426,378 456,378" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#orp-arr-a)"/>
  <text x="438" y="300" text-anchor="start" class="mut">candidate gen</text>
  <text x="438" y="313" text-anchor="start" class="mut">+ exact rerank</text>
  
  <polyline points="660,192 660,259 754,259 754,378 728,378" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6" marker-end="url(#orp-arr-a)"/>
  <text x="716" y="250" text-anchor="middle" class="mut">query vectors</text>
</g>


<g data-anim="5" style="animation:orp-fade .55s ease 1.5s forwards">
  <rect x="456" y="352" width="272" height="52" rx="9" class="v-fill v-accent-s" stroke-width="2.5"/>
  
  <rect x="456" y="352" width="272" height="52" rx="9" fill="var(--accent,#c15b39)" fill-opacity=".08"/>
  <text x="592" y="374" text-anchor="middle" class="lbl">MaxSim retrieval</text>
  <text x="592" y="393" text-anchor="middle" class="cod">S = sum_i  max_j  q_i . patch_j</text>
</g>


<g data-anim="6" style="animation:orp-fade .5s ease 1.9s forwards">
  <line x1="592" y1="404" x2="592" y2="444" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#orp-arr)"/>
  
  <text x="592" y="438" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">top-k PAGE IMAGES</text>

  
  <rect x="496" y="450" width="60" height="46" rx="5" class="v-fill v-stroke" stroke-width="1.1" transform="rotate(-4 526 473)"/>
  <rect x="502" y="450" width="60" height="46" rx="5" class="v-fill v-stroke" stroke-width="1.1" transform="rotate(-1.5 532 473)"/>
  <rect x="508" y="450" width="60" height="46" rx="5" class="v-fill v-accent-s" stroke-width="1.5"/>
  
  <polyline points="514,488 524,472 533,480 540,471 564,488" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.2" opacity=".7"/>
  <circle cx="556" cy="460" r="4" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1" opacity=".6"/>

  <text x="588" y="464" text-anchor="start" class="lbl">top-k page images</text>
  <text x="588" y="479" text-anchor="start" class="sub">raw pixels — no OCR reconstruction</text>
</g>


<g data-anim="7" style="animation:orp-fade .4s ease 2.3s forwards">
  <line x1="592" y1="500" x2="592" y2="534" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#orp-arr)"/>
</g>


<g data-anim="7" style="animation:orp-fade .5s ease 2.3s forwards">
  <rect x="268" y="534" width="648" height="78" rx="9" class="v-fill v-accent-s" stroke-width="2"/>
  <text x="592" y="558" text-anchor="middle" class="lbl">VLM generator</text>
  <text x="592" y="576" text-anchor="middle" class="sub">Qwen2-VL, GPT-4o, Gemini, InternVL ...</text>
  <text x="592" y="594" text-anchor="middle" class="sub">prompt = question + k page images  (no OCR text)</text>
</g>


<g data-anim="7" style="animation:orp-fade .4s ease 2.4s forwards">
  <path d="M 778 100 C 840 100 840 560 870 573" fill="none" stroke="var(--muted,#9ca3af)" stroke-width="1" stroke-dasharray="4 3" opacity=".5"/>
  <text x="766" y="310" text-anchor="middle" class="mut" font-style="italic">question</text>
  <text x="766" y="323" text-anchor="middle" class="mut" font-style="italic">also passed</text>
  <text x="766" y="336" text-anchor="middle" class="mut" font-style="italic">to VLM</text>
</g>


<g data-anim="8" style="animation:orp-fade .4s ease 2.7s forwards">
  <line x1="592" y1="612" x2="592" y2="648" stroke="currentColor" class="v-muted" stroke-width="1.4" marker-end="url(#orp-arr)"/>
  <text x="606" y="636" text-anchor="start" class="mut">generate</text>
</g>


<g data-anim="8" style="animation:orp-fade .5s ease 2.9s forwards">
  <rect x="390" y="648" width="404" height="42" rx="21" fill="var(--accent,#c15b39)"/>
  <text x="592" y="674" text-anchor="middle" class="on-acc">grounded answer (+ page cites)</text>
</g>

</svg>
<figcaption><b>The OCR-free page-as-image RAG pipeline, offline and online.</b> Offline, PDFs are rendered to images and encoded by ColPali into multi-vector patch embeddings, then compressed and stored in a PLAID or HNSW index. Online, the query is encoded to token vectors by the same model; MaxSim retrieval finds the top-k matching page images — raw pixels, no OCR reconstruction — which are passed with the question to a VLM generator that produces a grounded, page-cited answer.</figcaption>
</figure>
