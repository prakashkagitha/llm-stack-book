<figure class="viz" id="fig-contbatch-throughput-vs-batchsize">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 820 460" role="img" aria-label="Token throughput plotted against running batch size B rises steeply at low B, then flattens toward the compute roofline 1 over beta. Static batching sits low on the steep part where the batch drains to a lone straggler; continuous batching sits high on the flat part with B pinned near B max, and the gap between the two throughput levels is the throughput multiplier.">
  <defs>
    <marker id="ctb-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-contbatch-throughput-vs-batchsize text{ fill:var(--ink-soft); }
    #fig-contbatch-throughput-vs-batchsize .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-contbatch-throughput-vs-batchsize .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-contbatch-throughput-vs-batchsize .tick{ font:600 11px var(--mono,monospace); fill:var(--muted); }
    #fig-contbatch-throughput-vs-batchsize .note{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-contbatch-throughput-vs-batchsize .lbl{ font:700 12px var(--sans,sans-serif); }
    #fig-contbatch-throughput-vs-batchsize .roof{ font:700 12px var(--mono,monospace); }
    #fig-contbatch-throughput-vs-batchsize .gap{ font:700 11.5px var(--sans,sans-serif); }
  </style>

  <text x="410" y="24" text-anchor="middle" class="ttl">Token throughput vs. running batch size B</text>

  <g data-anim="1">
    <line x1="80" y1="40" x2="80" y2="380" class="v-stroke" stroke-width="1.6" marker-start="url(#ctb-arrow)"/>
    <line x1="80" y1="380" x2="660" y2="380" class="v-stroke" stroke-width="1.6" marker-end="url(#ctb-arrow)"/>
    <text x="370" y="414" text-anchor="middle" class="ax">batch size B</text>
    <text x="26" y="210" text-anchor="middle" class="ax" transform="rotate(-90 26 210)">token throughput (tokens/sec)</text>

    <g class="tick">
      <line x1="88.3" y1="380" x2="88.3" y2="385" class="v-grid" stroke-width="1.4"/>
      <text x="88.3" y="398" text-anchor="middle">1</text>
      <line x1="146.3" y1="380" x2="146.3" y2="385" class="v-grid" stroke-width="1.4"/>
      <text x="146.3" y="398" text-anchor="middle">8</text>
      <line x1="212.6" y1="380" x2="212.6" y2="385" class="v-grid" stroke-width="1.4"/>
      <text x="212.6" y="398" text-anchor="middle">16</text>
      <line x1="345.1" y1="380" x2="345.1" y2="385" class="v-grid" stroke-width="1.4"/>
      <text x="345.1" y="398" text-anchor="middle">32</text>
      <line x1="610.3" y1="380" x2="610.3" y2="385" class="v-grid" stroke-width="1.4"/>
      <text x="610.3" y="398" text-anchor="middle">64</text>
    </g>
  </g>

  <g data-anim="2">
    <line x1="80" y1="82.7" x2="660" y2="82.7" class="v-grid" stroke-width="1.6" stroke-dasharray="3 5"/>
    <text x="655" y="72" text-anchor="end" class="roof v-accent" fill="var(--accent)">compute roofline = 1/beta</text>

    <path d="M 80.0 380.0 L 84.1 374.5 L 88.3 369.3 L 92.4 364.2 L 96.6 359.3 L 104.9 349.9 L 113.1 341.2 L 121.4 333.1 L 129.7 325.4 L 146.3 311.4 L 162.9 298.9 L 179.4 287.7 L 196.0 277.7 L 212.6 268.5 L 245.7 252.6 L 278.9 239.2 L 312.0 227.7 L 345.1 217.8 L 394.9 205.3 L 444.6 194.9 L 494.3 186.1 L 544.0 178.6 L 593.7 172.1 L 643.4 166.4 L 660.0 164.7"
      fill="none" class="viz-draw v-accent-s" style="--len:900" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g data-anim="3">
    <path d="M100 358 Q90 320 100 300" fill="none" class="v-muted" stroke-width="1.4"/>
    <text x="106" y="298" class="note" text-anchor="start">steep region: amortizing the</text>
    <text x="106" y="312" class="note" text-anchor="start">fixed weight-load tau0 over</text>
    <text x="106" y="326" class="note" text-anchor="start">more requests</text>

    <path d="M470 176 Q500 150 540 145" fill="none" class="v-muted" stroke-width="1.4"/>
    <text x="470" y="132" class="note" text-anchor="start">flat region: near the roofline,</text>
    <text x="470" y="146" class="note" text-anchor="start">extra requests barely cost more</text>
  </g>

  <g data-anim="4">
    <line x1="88.3" y1="369.3" x2="60" y2="405" class="v-muted" stroke-width="1.6" stroke-dasharray="2 4" marker-end="url(#ctb-arrow)"/>
    <circle cx="88.3" cy="369.3" r="6" class="v-fill v-accent-s" stroke-width="2"/>
    <text x="20" y="425" text-anchor="start" class="lbl">static batching at the tail:</text>
    <text x="20" y="440" text-anchor="start" class="note">batch drains to a lone straggler (B-&gt;1),</text>
    <text x="20" y="453" text-anchor="start" class="note">throughput collapses</text>

    <circle cx="610.3" cy="170.1" r="6" class="v-fill v-accent-s" stroke-width="2"/>
    <text x="440" y="270" text-anchor="start" class="lbl">continuous batching:</text>
    <text x="440" y="285" text-anchor="start" class="note">B pinned near B_max by backfilling</text>
    <line x1="610.3" y1="170.1" x2="500" y2="262" class="v-muted" stroke-width="1.2" stroke-dasharray="2 4"/>
  </g>

  <g data-anim="5">
    <line x1="88.3" y1="369.3" x2="694" y2="369.3" class="v-grid" stroke-width="1" stroke-dasharray="1 4" opacity="0.6"/>
    <line x1="610.3" y1="170.1" x2="694" y2="170.1" class="v-grid" stroke-width="1" stroke-dasharray="1 4" opacity="0.6"/>
    <line x1="700" y1="176" x2="700" y2="363" class="v-accent-s" stroke="var(--accent)" stroke-width="2.2" marker-start="url(#ctb-arrow)" marker-end="url(#ctb-arrow)"/>
    <text x="712" y="258" class="gap v-accent" fill="var(--accent)" text-anchor="start">this gap =</text>
    <text x="712" y="274" class="gap v-accent" fill="var(--accent)" text-anchor="start">the throughput</text>
    <text x="712" y="290" class="gap v-accent" fill="var(--accent)" text-anchor="start">multiplier</text>
  </g>
</svg>
<figcaption><b>Token throughput per iteration climbs steeply as batch size grows, then flattens toward the compute roofline 1/beta.</b> Static batching decays toward the starved low-B tail as its cohort finishes together (batch drains to B=1), while continuous batching backfills finished slots so B stays pinned near the memory-limited maximum, B_max &amp;mdash; the vertical gap between those two operating points is where the throughput multiplier comes from.</figcaption>
</figure>
