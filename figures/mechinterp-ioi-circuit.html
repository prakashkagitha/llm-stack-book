  #fig-mechinterp-ioi-circuit [data-anim="2"] .viz-draw{ animation-delay:1.0s }

    #fig-mechinterp-ioi-circuit [data-anim],.viz-draw,.viz-pulse{
      animation:none!important; opacity:1; stroke-dashoffset:0; transform:none }
  }
</style>

<text x="22" y="411" style="font:600 10px var(--sans,sans-serif); fill:var(--ink-soft,#45413a);">Key insight:</text>
<text x="22" y="424" class="cap">The circuit reveals WHY naive ablation underestimates a head: the dashed backup heads are normally</text>
<text x="22" y="437" class="cap">silent but activate when primary name-movers are knocked out — built-in redundancy explains why</text>
<text x="22" y="450" class="cap">denoising (sufficient?) and noising (necessary?) patching can disagree on the same component.</text>

</svg>
<figcaption><b>The IOI circuit: four head classes implement indirect object identification in GPT-2.</b> The pipeline flows left to right through the residual stream — detecting the repeated name, suppressing it, then copying the other name to the output. Backup name-mover heads (dashed) activate only when primary movers are ablated, explaining why noising and denoising patching can give different answers about the same component's importance.</figcaption>
</figure>
