<figcaption><b>The same 3-turn trajectory scored two ways.</b> Trajectory-level credit (top) takes one terminal reward and broadcasts an identical advantage onto every turn -- turn 1, which fixed nothing, still gets +1.36 along with the turns that mattered. Turn-level credit with discounting (bottom) computes each turn's own return-to-go from the per-turn reward deltas, so turn 1's contribution comes out visibly smaller and near-neutral while the decisive turns keep their larger share.</figcaption>
