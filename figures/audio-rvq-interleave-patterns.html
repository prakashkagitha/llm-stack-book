<figcaption><b>Two RVQ flattening strategies for 3 levels × 4 time steps.</b> The Flattened scheme (Panel A) emits all K levels for each timestep before advancing, producing a simple interleaved tape. The Delay pattern (Panel B) staggers level k by k−1 steps, forming a staircase where each level sees only past timesteps — enabling the autoregressive model to condition higher-fidelity levels on all prior context without lookahead.</figcaption>
