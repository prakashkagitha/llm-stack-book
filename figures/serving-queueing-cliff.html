<text x="26" y="270" text-anchor="middle" class="axis-lbl" transform="rotate(-90,26,270)">mean time in system  W (relative)  =  service_time / (1 - rho)</text>

<text x="410" y="548" text-anchor="middle" class="cap">Latency is flat, then vertical. Running near saturation blows p99 even when the mean keeps up.</text>

</svg>
<figcaption><b>Waiting time does not grow linearly with utilization -- it grows like 1/(1-rho), flat for most of the range and then vertical near saturation.</b> Provisioning at 60-75% utilization (green) keeps the queueing multiplier near flat; pushing into 90%+ (red) means a small rise in load turns into an enormous rise in latency -- the same 15-point jump in utilization that takes the multiplier from x5 to x20. This is why you provision headroom instead of chasing 95% GPU utilization.</figcaption>
</figure>
