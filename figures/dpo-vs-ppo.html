<figure class="viz" id="fig-dpo-vs-ppo">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 426" role="img" aria-label="Two contrasting alignment pipelines: PPO needs a reward model, online rollouts and a value critic in a feedback loop, while DPO directly optimizes the policy on chosen-versus-rejected preference pairs with one log-sigmoid loss.">
  <defs>
    <marker id="dp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
    <marker id="dp-arrow-w" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--warn,#e0a106)"/>
    </marker>
    <marker id="dp-arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
    </marker>
  </defs>
  <style>
    #fig-dpo-vs-ppo text{ fill:var(--ink-soft); }
    #fig-dpo-vs-ppo .lbl{ font:600 12px var(--sans,sans-serif); }
    #fig-dpo-vs-ppo .sm{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-dpo-vs-ppo .mono{ font:600 11px var(--mono,monospace); }
    #fig-dpo-vs-ppo .tag{ font:700 12.5px var(--sans,sans-serif); }
    #fig-dpo-vs-ppo .badge{ font:700 10px var(--sans,sans-serif); }
    #fig-dpo-vs-ppo .op{ font:600 15px var(--serif,serif); }
  </style>

  
  <g data-anim="1">
    <rect x="10" y="14" width="740" height="186" rx="12" class="v-fill v-grid" fill-opacity="0.35" stroke-width="1.2"/>
    <rect x="22" y="26" width="184" height="22" rx="11" fill="var(--warn,#e0a106)" fill-opacity="0.16" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <text x="114" y="41" text-anchor="middle" class="tag" fill="var(--warn,#e0a106)">PPO — online RL loop</text>
    <text x="738" y="42" text-anchor="end" class="sm">4 components · samples on-policy · tune KL &amp; clip</text>
  </g>

  
  <g data-anim="1">
    <rect x="26" y="92" width="76" height="44" rx="7" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="64" y="112" text-anchor="middle" class="lbl">prompts</text>
    <text x="64" y="128" text-anchor="middle" class="sm">x ~ D</text>
  </g>
  <line x1="102" y1="114" x2="134" y2="114" class="v-muted" stroke="currentColor" stroke-width="1.5" marker-end="url(#dp-arrow)"/>

  
  <g data-anim="1">
    <rect x="136" y="84" width="96" height="60" rx="8" class="v-fill" stroke="var(--accent)" stroke-width="1.8"/>
    <rect x="136" y="84" width="96" height="60" rx="8" class="viz-pulse" fill="var(--accent)" fill-opacity="0.12"/>
    <text x="184" y="108" text-anchor="middle" class="lbl" fill="var(--accent)">Policy &#960;&#952;</text>
    <text x="184" y="125" text-anchor="middle" class="sm">generate</text>
    <text x="184" y="138" text-anchor="middle" class="sm">rollouts</text>
  </g>

  
  <g data-anim="2">
    <line x1="232" y1="100" x2="270" y2="100" class="v-muted" stroke="currentColor" stroke-width="1.5" marker-end="url(#dp-arrow)"/>
    <text x="251" y="92" text-anchor="middle" class="sm">y</text>
  </g>

  
  <g data-anim="2">
    <rect x="270" y="72" width="112" height="52" rx="8" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
    <text x="326" y="93" text-anchor="middle" class="lbl" fill="var(--warn,#e0a106)">Reward model</text>
    <text x="326" y="109" text-anchor="middle" class="sm">r&#966;(x, y) score</text>
    <text x="326" y="64" text-anchor="middle" class="badge" fill="var(--warn,#e0a106)">extra model</text>
  </g>

  
  <g data-anim="2">
    <rect x="270" y="132" width="112" height="46" rx="8" class="v-fill" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
    <text x="326" y="153" text-anchor="middle" class="lbl" fill="var(--warn,#e0a106)">Value critic</text>
    <text x="326" y="169" text-anchor="middle" class="sm">V(x, y) baseline</text>
  </g>
  <line x1="326" y1="124" x2="326" y2="132" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#dp-arrow)"/>

  
  <g data-anim="3">
    <line x1="382" y1="112" x2="416" y2="112" stroke="var(--warn,#e0a106)" stroke-width="1.6" marker-end="url(#dp-arrow-w)"/>
    <text x="399" y="104" text-anchor="middle" class="sm">r - KL</text>
  </g>

  
  <g data-anim="3">
    <rect x="418" y="86" width="110" height="56" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="473" y="107" text-anchor="middle" class="lbl">PPO update</text>
    <text x="473" y="123" text-anchor="middle" class="sm">clipped policy</text>
    <text x="473" y="135" text-anchor="middle" class="sm">gradient</text>
  </g>

  
  <g data-anim="4">
    <path d="M473 142 C 473 184, 184 188, 184 148" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#dp-arrow-w)" class="viz-draw" style="--len:560"/>
    <text x="330" y="200" text-anchor="middle" class="badge" fill="var(--warn,#e0a106)">loop: regenerate every step — the RL feedback loop</text>
  </g>

  
  <g data-anim="3">
    <rect x="546" y="86" width="92" height="56" rx="8" class="v-fill v-stroke" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="592" y="107" text-anchor="middle" class="sm" fill="var(--ink-soft)">ref &#960;_ref</text>
    <text x="592" y="123" text-anchor="middle" class="sm">KL anchor</text>
    <text x="592" y="136" text-anchor="middle" class="sm">(frozen)</text>
  </g>
  <line x1="546" y1="114" x2="528" y2="114" class="v-grid" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 3"/>

  
  <g data-anim="4">
    <line x1="638" y1="114" x2="676" y2="114" class="v-muted" stroke="currentColor" stroke-width="1.5" marker-end="url(#dp-arrow)"/>
    <rect x="678" y="90" width="60" height="48" rx="7" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="708" y="112" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">aligned</text>
    <text x="708" y="127" text-anchor="middle" class="sm">&#960;&#952;</text>
  </g>

  
  <g data-anim="5">
    <rect x="10" y="222" width="740" height="150" rx="12" class="v-fill v-accent-s" fill-opacity="0.06" stroke-width="1.4"/>
    <rect x="22" y="234" width="210" height="22" rx="11" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.2"/>
    <text x="127" y="249" text-anchor="middle" class="tag" fill="var(--accent)">DPO — direct, no RL loop</text>
    <text x="738" y="250" text-anchor="end" class="sm">1 model · offline · trains like SFT</text>
  </g>

  
  <g data-anim="5">
    <rect x="26" y="280" width="118" height="78" rx="8" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="85" y="298" text-anchor="middle" class="lbl">preference pair</text>
    <rect x="36" y="306" width="98" height="20" rx="5" fill="var(--good,#2f9e6e)" fill-opacity="0.14" stroke="var(--good,#2f9e6e)" stroke-width="1.1"/>
    <text x="85" y="320" text-anchor="middle" class="sm" fill="var(--good,#2f9e6e)">y_w  chosen</text>
    <rect x="36" y="330" width="98" height="20" rx="5" fill="var(--muted)" fill-opacity="0.12" stroke="var(--muted)" stroke-width="1.1"/>
    <text x="85" y="344" text-anchor="middle" class="sm">y_l  rejected</text>
  </g>
  <line x1="146" y1="319" x2="182" y2="319" class="v-muted" stroke="currentColor" stroke-width="1.5" marker-end="url(#dp-arrow)"/>
  <text x="164" y="312" text-anchor="middle" class="sm">fixed</text>

  
  <g data-anim="5">
    <rect x="184" y="288" width="104" height="62" rx="8" class="v-fill" stroke="var(--accent)" stroke-width="1.8"/>
    <rect x="184" y="288" width="104" height="62" rx="8" class="viz-pulse" fill="var(--accent)" fill-opacity="0.12"/>
    <text x="236" y="309" text-anchor="middle" class="lbl" fill="var(--accent)">Policy &#960;&#952;</text>
    <text x="236" y="325" text-anchor="middle" class="sm">log-probs of</text>
    <text x="236" y="338" text-anchor="middle" class="sm">y_w &amp; y_l</text>
  </g>
  <line x1="288" y1="319" x2="324" y2="319" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#dp-arrow)"/>

  
  <g data-anim="5">
    <rect x="326" y="290" width="150" height="58" rx="8" class="v-fill v-accent-s" stroke-width="1.5"/>
    <text x="401" y="309" text-anchor="middle" class="lbl" fill="var(--accent)">implicit reward</text>
    <text x="401" y="328" text-anchor="middle" class="mono">β·log πθ/π_ref</text>
    <text x="401" y="342" text-anchor="middle" class="sm">no reward model needed</text>
  </g>
  <line x1="476" y1="319" x2="512" y2="319" class="v-accent-s" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#dp-arrow)"/>

  
  <g data-anim="5">
    <rect x="514" y="290" width="132" height="58" rx="8" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.7"/>
    <text x="580" y="309" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">DPO loss</text>
    <text x="580" y="328" text-anchor="middle" class="mono">-log &#963;(&#916;)</text>
    <text x="580" y="342" text-anchor="middle" class="sm">backprop, one pass</text>
  </g>

  
  <g data-anim="5">
    <line x1="646" y1="319" x2="678" y2="319" stroke="var(--good,#2f9e6e)" stroke-width="1.6" marker-end="url(#dp-arrow-g)"/>
    <rect x="678" y="295" width="60" height="48" rx="7" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
    <text x="708" y="317" text-anchor="middle" class="lbl" fill="var(--good,#2f9e6e)">aligned</text>
    <text x="708" y="332" text-anchor="middle" class="sm">&#960;&#952;</text>
  </g>

  
  <g data-anim="5">
    <text x="236" y="372" text-anchor="middle" class="badge" fill="var(--accent)">straight through — no rollouts, no critic, no RL loop</text>
  </g>

  
  <text x="724" y="217" text-anchor="end" class="sm">vs.</text>
</svg>
<figcaption><b>DPO removes the entire RL loop.</b> PPO carries four moving parts — a trained <b>reward model</b>, on-policy <b>rollouts</b>, a <b>value critic</b>, and a feedback loop that regenerates samples every step. DPO reads an <b>implicit reward</b> straight off the policy's log-ratio to the reference (<b>β·log πθ/π_ref</b>) and trains directly on fixed chosen-vs-rejected pairs with a single <b>−log σ(Δ)</b> loss — no reward model, no sampling, no critic.</figcaption>
</figure>
