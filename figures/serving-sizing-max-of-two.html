<figure class="viz" id="fig-serving-sizing-max-of-two">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 680" role="img" aria-label="Diagram showing fleet size is the maximum of a throughput-bound replica count and a memory-bound replica count, with the memory side broken down into a per-replica HBM budget of weights, reserve, and a KV cache split into request slots that grow with context length.">
  <style>
    #fig-serving-sizing-max-of-two .ttl{ font:700 14.5px var(--sans,sans-serif); }
    #fig-serving-sizing-max-of-two .note{ font:600 10.5px var(--sans,sans-serif); }
    #fig-serving-sizing-max-of-two .col-ttl{ font:700 13px var(--sans,sans-serif); }
    #fig-serving-sizing-max-of-two .formula{ font:600 11px var(--mono,monospace); }
    #fig-serving-sizing-max-of-two .sub{ font:500 10px var(--sans,sans-serif); }
    #fig-serving-sizing-max-of-two .gate{ font:700 12.5px var(--mono,monospace); }
    #fig-serving-sizing-max-of-two .gate-note{ font:600 9.5px var(--sans,sans-serif); font-style:italic; }
    #fig-serving-sizing-max-of-two .result{ font:700 11.5px var(--sans,sans-serif); }
    #fig-serving-sizing-max-of-two .tag{ font:600 9.5px var(--sans,sans-serif); }
    #fig-serving-sizing-max-of-two .seglbl{ font:600 10px var(--sans,sans-serif); }
    #fig-serving-sizing-max-of-two .caption{ font:600 9.5px var(--sans,sans-serif); font-style:italic; }
    #fig-serving-sizing-max-of-two text{ fill: var(--ink-soft); }
    #fig-serving-sizing-max-of-two .dim{ fill: var(--muted); }
  </style>

  <defs>
    <marker id="siz-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--v-stroke)"/>
    </marker>
    <marker id="siz-arrow-good" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--good,#2f9e6e)"/>
    </marker>
    <marker id="siz-arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
    </marker>
  </defs>

  <text x="390" y="22" text-anchor="middle" class="ttl">Fleet size = MAX(throughput-bound replicas, memory-bound replicas)</text>
  <rect x="185" y="30" width="410" height="18" rx="9" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
  <text x="390" y="43" text-anchor="middle" class="note">block counts (7 and 5) are illustrative, not real benchmark figures</text>

  
  <g data-anim="1">
    <text x="145" y="64" text-anchor="middle" class="col-ttl">Throughput-bound</text>
    <text x="145" y="80" text-anchor="middle" class="formula">c &gt;= lambda / (0.7 * mu)</text>

    <rect x="48" y="92" width="196" height="244" rx="7" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.6" stroke-dasharray="5 3"/>

    <rect x="55" y="302" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="55" y="268" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="55" y="234" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="55" y="200" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="55" y="166" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="55" y="132" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="55" y="98" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <text x="145" y="116" text-anchor="middle" class="sub dim">7 replicas</text>

    <text x="145" y="352" text-anchor="middle" class="sub">set by prefill rate + Little's</text>
    <text x="145" y="367" text-anchor="middle" class="sub">Law + the rho&lt;=0.7 headroom</text>
  </g>

  
  <g data-anim="2">
    <text x="635" y="64" text-anchor="middle" class="col-ttl">Memory-bound</text>
    <text x="635" y="80" text-anchor="middle" class="formula">N_requests / N_concurrent</text>

    <rect x="545" y="302" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="545" y="268" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="545" y="234" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="545" y="200" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <rect x="545" y="166" width="180" height="28" rx="3" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.1"/>
    <text x="635" y="184" text-anchor="middle" class="sub dim">5 replicas</text>

    <text x="635" y="352" text-anchor="middle" class="sub">set by KV bytes/token vs HBM</text>
    <text x="635" y="367" text-anchor="middle" class="sub">capacity (GQA shrinks KV</text>
    <text x="635" y="382" text-anchor="middle" class="sub">bytes/token)</text>
  </g>

  
  <g data-anim="3">
    <text x="385" y="180" text-anchor="middle" class="gate-note dim">take the binding constraint</text>
    <rect x="325" y="190" width="120" height="50" rx="8" class="v-fill" stroke="var(--v-stroke)" stroke-width="1.8"/>
    <text x="385" y="221" text-anchor="middle" class="gate">MAX( , )</text>

    <line x1="235" y1="214" x2="325" y2="214" stroke="var(--v-stroke)" stroke-width="1.6" marker-end="url(#siz-arrow)"/>
    <line x1="545" y1="214" x2="445" y2="214" stroke="var(--v-stroke)" stroke-width="1.6" marker-end="url(#siz-arrow)"/>

    <line x1="385" y1="240" x2="385" y2="256" stroke="var(--good,#2f9e6e)" stroke-width="1.8" marker-end="url(#siz-arrow-good)"/>

    <rect x="270" y="258" width="230" height="64" rx="8" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
    <text x="385" y="277" text-anchor="middle" class="result">Fleet size =</text>
    <text x="385" y="293" text-anchor="middle" class="result">MAX(throughput, memory)</text>
    <text x="385" y="309" text-anchor="middle" class="result" fill="var(--good,#2f9e6e)">= 7 replicas (illustrative)</text>

    <path d="M270 288 C 250 288, 250 260, 235 232" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#siz-arrow-good)"/>
  </g>

  
  <g data-anim="4">
    <rect x="260" y="326" width="250" height="30" rx="15" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
    <text x="385" y="338" text-anchor="middle" class="tag">long prompts, short outputs -&gt;</text>
    <text x="385" y="350" text-anchor="middle" class="tag">compute / throughput-bound</text>

    <rect x="260" y="362" width="250" height="30" rx="15" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
    <text x="385" y="374" text-anchor="middle" class="tag">many concurrent long-context</text>
    <text x="385" y="386" text-anchor="middle" class="tag">chats -&gt; memory-bound</text>
  </g>

  
  <g data-anim="5">
    <path d="M726 178 C 745 186, 755 196, 755 212 L 755 386 C 755 396, 748 400, 634 401" fill="none" stroke="var(--muted)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#siz-arrow-muted)"/>

    <rect x="560" y="400" width="70" height="70" fill="var(--muted)" fill-opacity="0.20" stroke="var(--v-stroke)" stroke-width="1.2"/>
    <rect x="560" y="470" width="70" height="22" fill="var(--muted)" fill-opacity="0.40" stroke="var(--v-stroke)" stroke-width="1.2"/>

    <rect x="560" y="492" width="12" height="98" fill="var(--accent2,#3b82f6)" fill-opacity="0.18" stroke="var(--v-stroke)" stroke-width="1"/>
    <rect x="572" y="492" width="16" height="98" fill="var(--accent2,#3b82f6)" fill-opacity="0.30" stroke="var(--v-stroke)" stroke-width="1"/>
    <rect x="588" y="492" width="20" height="98" fill="var(--accent2,#3b82f6)" fill-opacity="0.42" stroke="var(--v-stroke)" stroke-width="1"/>
    <rect x="608" y="492" width="22" height="98" fill="var(--accent2,#3b82f6)" fill-opacity="0.54" stroke="var(--v-stroke)" stroke-width="1"/>
    <rect x="560" y="400" width="70" height="190" fill="none" stroke="var(--v-stroke)" stroke-width="1.6"/>

    <line x1="630" y1="435" x2="645" y2="435" stroke="var(--v-stroke)" stroke-width="1"/>
    <text x="650" y="432" class="seglbl">weights</text>
    <text x="650" y="444" class="seglbl dim">(fixed)</text>

    <line x1="630" y1="481" x2="645" y2="481" stroke="var(--v-stroke)" stroke-width="1"/>
    <text x="650" y="485" class="seglbl">reserve</text>

    <line x1="630" y1="541" x2="645" y2="541" stroke="var(--v-stroke)" stroke-width="1"/>
    <text x="650" y="524" class="seglbl">KV cache -&gt;</text>
    <text x="650" y="537" class="seglbl">N_concurrent</text>
    <text x="650" y="550" class="seglbl">slots</text>

    <text x="595" y="602" text-anchor="middle" class="caption dim">one replica's HBM budget (zoomed in)</text>
    <text x="595" y="616" text-anchor="middle" class="caption dim">KV slots widen as context length grows</text>
  </g>
</svg>
<figcaption><b>Fleet size is set by whichever constraint binds first, not by throughput alone.</b> A throughput-bound replica count (from prefill rate, Little's Law, and the rho&lt;=0.7 headroom) and a memory-bound replica count (from how many concurrent sequences fit in one replica's HBM, weights plus reserve plus a KV cache that grows with context length) feed a MAX gate — the real fleet size is the larger of the two, so know which regime a workload is in before sizing.</figcaption>
</figure>
