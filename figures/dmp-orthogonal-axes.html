<figure class="viz" id="fig-dmp-orthogonal-axes">
<svg viewBox="0 0 900 570" role="img" aria-label="The four orthogonal parallelism axes (TP, PP, SP/CP, DP) shown on one transformer: PP cuts across layers, TP cuts within a layer, SP/CP cuts along the token sequence, DP replicates the whole stack.">
  <defs>
    <marker id="oa-arrowup" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 10 L5 0 L10 10 z" fill="currentColor"/>
    </marker>
    <marker id="oa-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-dmp-orthogonal-axes text { fill: var(--ink-soft); }
    #fig-dmp-orthogonal-axes .lbl { font: 600 11px var(--sans,sans-serif); }
    #fig-dmp-orthogonal-axes .sm  { font: 500 10px var(--sans,sans-serif); fill: var(--muted); }
    #fig-dmp-orthogonal-axes .axlbl { font: 700 11px var(--sans,sans-serif); }
    #fig-dmp-orthogonal-axes .layerlbl { font: 500 10px var(--mono,monospace); fill: var(--muted); }
    #fig-dmp-orthogonal-axes .lgd { font: 500 10.5px var(--sans,sans-serif); }
  </style>

  
  <rect x="132" y="42" width="512" height="430" rx="14"
        fill="none" stroke="var(--ink-soft)" stroke-width="1" stroke-dasharray="5 3" opacity="0.22"/>

  
  <rect x="120" y="54" width="512" height="430" rx="14"
        fill="none" stroke="var(--ink-soft)" stroke-width="1.6" stroke-dasharray="6 4" opacity="0.5"/>

  
  <text x="132" y="50" class="axlbl" fill="var(--muted)">DATA (DP): whole stack REPLICATED over data shards</text>

  
  
  <rect x="148" y="70" width="474" height="68" rx="7"
        fill="var(--accent,#c15b39)" fill-opacity="0.18" stroke="var(--ink-soft)" stroke-width="1.2" stroke-opacity="0.35"/>

  <line x1="148" y1="141" x2="622" y2="141" stroke="var(--ink-soft)" stroke-width="1.2"
        stroke-dasharray="6 3" opacity="0.6"/>
  <text x="616" y="135" text-anchor="end" class="sm" fill="var(--muted)">PP stage boundary: point-to-point send/recv</text>

  
  <rect x="148" y="144" width="474" height="68" rx="7"
        fill="var(--accent,#c15b39)" fill-opacity="0.35" stroke="var(--ink-soft)" stroke-width="1.2" stroke-opacity="0.35"/>
  <rect x="148" y="218" width="474" height="68" rx="7"
        fill="var(--accent,#c15b39)" fill-opacity="0.35" stroke="var(--ink-soft)" stroke-width="1.2" stroke-opacity="0.35"/>

  
  <text x="136" y="108" text-anchor="end" class="layerlbl">layer L-1</text>
  <text x="136" y="182" text-anchor="end" class="layerlbl">layer k</text>
  <text x="136" y="256" text-anchor="end" class="layerlbl">layer 0</text>

  
  <text x="156" y="92" class="sm" fill="var(--muted)">GPU0 owns layers k+1 .. L-1</text>
  <text x="156" y="240" class="sm" fill="var(--muted)">GPU1 owns layers 0 .. k</text>

  
  
  <rect x="270" y="148" width="100" height="60" rx="4"
        fill="var(--accent2,#3b82f6)" fill-opacity="0.18" stroke="var(--accent2,#3b82f6)" stroke-width="1" stroke-opacity="0.7"/>
  <rect x="374" y="148" width="100" height="60" rx="4"
        fill="var(--accent2,#3b82f6)" fill-opacity="0.33" stroke="var(--accent2,#3b82f6)" stroke-width="1" stroke-opacity="0.7"/>
  <rect x="478" y="148" width="100" height="60" rx="4"
        fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1" stroke-opacity="0.7"/>
  <text x="320" y="177" text-anchor="middle" class="sm" fill="var(--accent2,#3b82f6)">GPU0</text>
  <text x="424" y="177" text-anchor="middle" class="sm" fill="var(--accent2,#3b82f6)">GPU1</text>
  <text x="528" y="177" text-anchor="middle" class="sm" fill="var(--accent2,#3b82f6)">GPU2</text>
  <text x="208" y="162" text-anchor="middle" class="sm">one matmul</text>
  <text x="208" y="174" text-anchor="middle" class="sm">split across GPUs</text>
  
  <line x1="370" y1="148" x2="370" y2="208" stroke="var(--accent2,#3b82f6)" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
  <line x1="474" y1="148" x2="474" y2="208" stroke="var(--accent2,#3b82f6)" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>

  
  <line x1="634" y1="73" x2="634" y2="283" stroke="var(--accent,#c15b39)" stroke-width="1.4" opacity="0.7"/>
  <line x1="629" y1="73" x2="639" y2="73" stroke="var(--accent,#c15b39)" stroke-width="1.4" opacity="0.7"/>
  <line x1="629" y1="283" x2="639" y2="283" stroke="var(--accent,#c15b39)" stroke-width="1.4" opacity="0.7"/>

  
  <text x="647" y="140" class="axlbl" fill="var(--accent,#c15b39)">PIPELINE (PP):</text>
  <text x="647" y="153" class="sm" fill="var(--muted)">GPU owns a contiguous</text>
  <text x="647" y="165" class="sm" fill="var(--muted)">BLOCK of layers</text>

  
  <line x1="622" y1="178" x2="637" y2="178" stroke="var(--accent2,#3b82f6)" stroke-width="1.2" marker-end="url(#oa-arrow)" opacity="0.7"/>
  <text x="647" y="197" class="axlbl" fill="var(--accent2,#3b82f6)">TENSOR (TP):</text>
  <text x="647" y="210" class="sm" fill="var(--muted)">split WITHIN a layer</text>
  <text x="647" y="222" class="sm" fill="var(--muted)">(matmul sharded)</text>

  
  <rect x="148" y="308" width="237" height="48" rx="6"
        fill="var(--warn,#e0a106)" fill-opacity="0.18" stroke="var(--warn,#e0a106)" stroke-width="1.2" stroke-opacity="0.6"/>
  <rect x="385" y="308" width="237" height="48" rx="6"
        fill="var(--warn,#e0a106)" fill-opacity="0.38" stroke="var(--warn,#e0a106)" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="385" y1="308" x2="385" y2="356" stroke="var(--ink-soft)" stroke-width="1.2" stroke-dasharray="4 2" opacity="0.7"/>

  <text x="266" y="332" text-anchor="middle" class="lbl" fill="var(--warn,#e0a106)">tokens 0 .. s/2</text>
  <text x="503" y="332" text-anchor="middle" class="lbl" fill="var(--warn,#e0a106)">tokens s/2 .. s</text>

  
  <line x1="266" y1="308" x2="266" y2="293" stroke="var(--warn,#e0a106)" stroke-width="1.4" marker-end="url(#oa-arrowup)" opacity="0.7"/>
  <line x1="503" y1="308" x2="503" y2="293" stroke="var(--warn,#e0a106)" stroke-width="1.4" marker-end="url(#oa-arrowup)" opacity="0.7"/>

  
  <text x="647" y="305" class="axlbl" fill="var(--warn,#e0a106)">SEQUENCE (SP/CP):</text>
  <text x="647" y="318" class="sm" fill="var(--muted)">split ALONG the</text>
  <text x="647" y="330" class="sm" fill="var(--muted)">token sequence</text>
  <line x1="622" y1="332" x2="637" y2="332" stroke="var(--warn,#e0a106)" stroke-width="1.2" marker-end="url(#oa-arrow)" opacity="0.7"/>

  
  <text x="376" y="500" text-anchor="middle" class="axlbl" fill="var(--muted)">DATA (DP) — whole model replicated, one all-reduce per step</text>

  
  <rect x="12" y="522" width="876" height="34" rx="6"
        fill="var(--surface,#fff)" fill-opacity="0.06" stroke="var(--border-2,#d8d1c0)" stroke-width="1" opacity="0.7"/>
  <rect x="22" y="531" width="11" height="11" rx="2"
        fill="var(--accent,#c15b39)" fill-opacity="0.4" stroke="var(--accent,#c15b39)" stroke-width="1"/>
  <text x="39" y="541" class="lgd">PP = across layers</text>
  <rect x="185" y="531" width="11" height="11" rx="2"
        fill="var(--accent2,#3b82f6)" fill-opacity="0.5" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
  <text x="202" y="541" class="lgd">TP = within a layer</text>
  <rect x="355" y="531" width="11" height="11" rx="2"
        fill="var(--warn,#e0a106)" fill-opacity="0.5" stroke="var(--warn,#e0a106)" stroke-width="1"/>
  <text x="372" y="541" class="lgd">SP/CP = along sequence</text>
  <rect x="550" y="531" width="11" height="11" rx="2"
        fill="none" stroke="var(--ink-soft)" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="567" y="541" class="lgd">DP = replicate whole model</text>
</svg>
<figcaption><b>Four orthogonal axes for splitting one transformer.</b> <b>PP</b> gives each GPU a contiguous block of layers (cheap point-to-point at the boundary); <b>TP</b> shards a single matmul across GPUs within a layer (expensive all-reduce, must stay on NVLink); <b>SP/CP</b> partitions the token sequence so each device only processes its chunk; <b>DP</b> replicates the entire stack over independent data shards. All four compose multiplicatively: total GPUs = d &amp;times; t &amp;times; p &amp;times; c.</figcaption>
</figure>
