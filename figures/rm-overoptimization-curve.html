<figure class="viz" id="fig-rm-overoptimization-curve">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 820 520" role="img" aria-label="Reward-model over-optimization curve: true quality (gold reward) rises then falls as KL distance from the reference increases, while the proxy reward keeps rising monotonically. The peak marks the best policy; optimizing further causes reward hacking.">
<defs>
  <marker id="roc-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
</defs>
<style>
  #fig-rm-overoptimization-curve text { fill: var(--ink-soft,#334155); }
  #fig-rm-overoptimization-curve .lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-rm-overoptimization-curve .lbl-sm { font: 400 11px var(--sans,sans-serif); }
  #fig-rm-overoptimization-curve .lbl-xs { font: 400 10px var(--sans,sans-serif); }
  #fig-rm-overoptimization-curve .accent { fill: var(--accent,#c15b39); }
  #fig-rm-overoptimization-curve .muted { fill: var(--muted,#94a3b8); }
</style>


<g data-anim="1">
  <rect x="380" y="55" width="380" height="375" fill="var(--accent,#c15b39)" opacity="0.12" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-opacity="0.35"/>
  <text x="630" y="70" text-anchor="middle" class="lbl-xs muted" opacity="0.9">over-optimization zone</text>

  <line x1="90" y1="430" x2="90" y2="55" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#roc-arr)"/>
  <line x1="90" y1="430" x2="762" y2="430" stroke="var(--ink-soft,#64748b)" stroke-width="1.8" marker-end="url(#roc-arr)"/>

  <text x="30" y="250" text-anchor="middle" class="lbl" transform="rotate(-90,30,250)">true quality (gold reward)</text>
  <text x="426" y="478" text-anchor="middle" class="lbl">KL(pi_theta || pi_ref)</text>
</g>


<g data-anim="2">
  <path
    d="M 90 370
       C 140 340, 200 220, 260 160
       C 310 115, 350 108, 380 110
       C 420 112, 460 145, 510 200
       C 560 255, 620 305, 680 335
       C 710 348, 740 354, 760 358"
    fill="none"
    stroke="var(--accent,#c15b39)" stroke-width="3"
    stroke-linecap="round"/>
</g>


<g data-anim="3">
  <path
    d="M 90 395
       C 150 370, 210 340, 280 300
       C 340 265, 400 230, 460 195
       C 530 155, 610 120, 680 95
       C 720 82, 748 74, 760 70"
    fill="none"
    stroke="var(--ink-soft,#64748b)" stroke-width="2.2"
    stroke-dasharray="8 5"
    stroke-linecap="round"/>
  <text x="700" y="128" text-anchor="middle" class="lbl-sm muted">proxy reward</text>
  <text x="700" y="143" text-anchor="middle" class="lbl-sm muted">keeps rising</text>
</g>


<g data-anim="4">
  <line x1="90" y1="110" x2="380" y2="110" stroke="var(--accent,#c15b39)" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.7"/>
  <line x1="380" y1="110" x2="380" y2="430" stroke="var(--accent,#c15b39)" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.7"/>

  <rect x="363" y="432" width="34" height="16" rx="4" fill="var(--accent,#c15b39)" opacity="0.2"/>
  <text x="380" y="444" text-anchor="middle" class="lbl-xs accent">opt. KL</text>

  <circle cx="380" cy="110" r="7" fill="var(--accent,#c15b39)"/>

  <text x="398" y="80" class="lbl accent" style="font-size:12px">peak (best policy)</text>
  <text x="398" y="96" class="lbl-sm accent">early stop here</text>
</g>


<g data-anim="5">
  <text x="512" y="330" class="lbl-xs muted">over-optimization:</text>
  <text x="512" y="344" class="lbl-xs muted">proxy reward keeps rising,</text>
  <text x="512" y="358" class="lbl-xs muted">TRUE quality falls</text>

  <line x1="98" y1="70" x2="130" y2="70" stroke="var(--accent,#c15b39)" stroke-width="3"/>
  <text x="138" y="74" class="lbl-xs accent">true / gold quality</text>
  <line x1="98" y1="88" x2="130" y2="88" stroke="var(--ink-soft,#64748b)" stroke-width="2.2" stroke-dasharray="6 3"/>
  <text x="138" y="92" class="lbl-xs muted">proxy RM reward</text>

  <text x="150" y="464" class="lbl-xs muted">small beta (long leash): race rightward fast</text>
  <text x="470" y="464" class="lbl-xs muted">large beta: stay near reference (safe, less gain)</text>
</g>

</svg>
<figcaption><b>Reward-model over-optimization: true quality peaks, then falls.</b> As the policy is optimized to maximize the proxy reward (dashed line), the true quality (solid, accent color) initially rises but turns over at the peak — the best policy. Continuing past this point is <em>reward hacking</em>: the proxy reward keeps climbing while genuine quality degrades. The KL budget beta is a hyperparameter tuned to stay near the peak.</figcaption>
</figure>
