<figcaption><b>Only a mixed group of outcomes produces a learning signal in GRPO.</b> When every sample in a group fails (too hard) or every sample succeeds (too easy), the reward has zero variance, so every advantage $A_i = (R_i - \text{mean})/\sigma$ is exactly zero and no gradient flows — the group is "dead." Only the sweet-spot group, with both wins and losses, has nonzero variance: winners get pushed up, losers get pushed down, and the reasoning behaviors that distinguish them get selected — which is why R1-Zero-style runs need a curriculum that keeps problems in this mixed band.</figcaption>
</figure>
