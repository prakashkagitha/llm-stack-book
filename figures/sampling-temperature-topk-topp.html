<figure class="viz" id="fig-sampling-temperature-topk-topp">

<svg viewBox="0 0 760 645" role="img" aria-label="Two-panel infographic on decoding knobs applied to one shared example distribution over six candidate next tokens. Panel A: temperature reshapes the whole distribution -- tau=0.5 sharpens it to one dominant token with a near-zero tail, tau=1.0 is the base distribution, and tau=2.0 flattens it so the rare tail token's probability visibly rises. Panel B: top-k keeps a fixed count of two tokens regardless of shape, while top-p (nucleus) sweeps a cumulative-probability fill and cuts once it reaches p=0.9, keeping the same two tokens here but adapting to keep only one token when the model is confident and many tokens when it is uncertain.">

<figcaption><b>Temperature reshapes the whole distribution; top-k and top-p reshape it by truncating, but differently.</b> Dividing the same logits by tau &lt; 1 sharpens the distribution toward one dominant token while tau &gt; 1 flattens it, visibly lifting even the rarest candidate. Top-k always keeps a fixed count of tokens no matter how peaked or flat the distribution is; top-p instead sweeps cumulative probability and cuts once it crosses p, so it adapts -- keeping only one token when the model is confident and many when it is uncertain, then renormalizing whatever it kept before sampling.</figcaption>
</figure>
