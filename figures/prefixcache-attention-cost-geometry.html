<text x="30" y="462" class="formula-b">With warm prefix cache:</text>
<text x="230" y="462" class="formula">only the bottom S rows are computed -- cost ~ S*P + S^2/2</text>

<text x="30" y="486" class="formula-b">Speedup:</text>
<text x="130" y="486" class="formula">~ (P + S) / S, growing as the cached prefix P dominates S</text>

<text x="30" y="516" class="leg-sub">Illustrative grid: P = 7, S = 2 token-blocks (small integers for readability; P and S generalize to any length).</text>

<figcaption><b>The causal attention matrix splits cleanly into a skipped corner and a thin computed band once the prefix is cached.</b> Region (1), the P x P prefix-attends-to-prefix corner, needs no recomputation because its keys and values are already resident in the KV cache; only the bottom S rows -- the suffix attending to the cached prefix (2) and to itself (3) -- are computed at request time. As P grows relative to S, the skipped corner dominates the triangle and the speedup approaches (P + S) / S.</figcaption>
</figure>
