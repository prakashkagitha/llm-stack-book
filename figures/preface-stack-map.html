<figcaption><b>The nine-layer LLM stack, from silicon to agent.</b> Each horizontal band is one stratum mapped to one or more book parts. The bidirectional arrows capture the book's central thesis: physical constraints at the bottom (memory bandwidth, tensor-core throughput) propagate upward and shape every design decision above, while the demands of agents and applications push requirements back down to the hardware.</figcaption>
