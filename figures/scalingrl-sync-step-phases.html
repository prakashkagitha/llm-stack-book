  </defs>
  <style>

    #fig-scalingrl-sync-step-phases .seg-label { font: 700 13px var(--sans, sans-serif); }

    #fig-scalingrl-sync-step-phases .sync-label { font: 400 9px var(--sans, sans-serif); fill: var(--ink-soft); }
  </style>


  <text x="485" y="28" text-anchor="middle" class="title">one RL step (synchronous GRPO)</text>


  <rect x="40" y="55" width="480" height="90" rx="0"
        fill="var(--surface-3, #eff6ff)" stroke="var(--border-2, #93c5fd)" stroke-width="1.5"/>

  <rect x="590" y="55" width="245" height="90" rx="0"

  <text x="870" y="94" text-anchor="middle" class="sync-label">-&gt; infer</text>

  <text x="912" y="44" class="seg-pct" text-anchor="start">time</text>
  <path d="M944 40 L954 40 M950 37 L954 40 L950 43" fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1.2"/>

  <line x1="829" y1="168" x2="829" y2="188" stroke="var(--warn, #c2410c)" stroke-width="1.5"/>

    Phases run serially; generation dominates wall-clock for reasoning workloads.
  </text>
</svg>
<figcaption><b>Serial phases and the idle bubbles in one synchronous GRPO step.</b> Generation (60–85% of wall-clock) leaves the training fleet idle, while training (15–35%) leaves the inference fleet idle. The two dashed brackets mark the wasted time that the overlap and partial-rollout tricks in this chapter attack.</figcaption>
</figure>
