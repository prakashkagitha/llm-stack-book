<text x="400" y="480" text-anchor="middle" class="cap" data-anim="4">Collapse is recursive REPLACEMENT, not synthetic data itself.</text>

</svg>
<figcaption><b>Recursive re-fitting on only the model's own last-generation output collapses a Gaussian toward a spike, while keeping the original real data in the pool halts the decay.</b> In the REPLACE regime the expected variance shrinks by a factor <code>(1-1/n)^t</code> each generation, so later curves grow taller and narrower until the tails vanish; in the ACCUMULATE regime the retained real samples re-anchor every fit, so the curve family stays essentially the same width across all 20 generations.</figcaption>
</figure>
