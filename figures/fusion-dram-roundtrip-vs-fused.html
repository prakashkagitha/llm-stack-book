    #fig-fusion-dram-roundtrip-vs-fused .cap-warn { fill: var(--warn,#e0a106); font: 600 11px var(--sans,sans-serif); }
    #fig-fusion-dram-roundtrip-vs-fused .cap-danger { fill: #dc2626; font: 600 11px var(--sans,sans-serif); }
    #fig-fusion-dram-roundtrip-vs-fused .arrow-lbl { font: 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }

    /* Animated data dot — top lane (unfused, 3 round trips) */
    @keyframes fd-top-travel {
      0%   { transform: translate(88px,  120px); opacity: 0; }
      3%   { opacity: 1; }
      /* matmul → DRAM1 */
      12%  { transform: translate(200px, 120px); }
      /* dive into DRAM1 */
      17%  { transform: translate(200px, 148px); }
      22%  { transform: translate(200px, 92px); }
      /* DRAM1 → bias_add */
      30%  { transform: translate(280px, 120px); }
      /* bias_add → DRAM2 */
      40%  { transform: translate(420px, 120px); }
      /* dive into DRAM2 */
      44%  { transform: translate(420px, 148px); }
      48%  { transform: translate(420px, 92px); }
      /* DRAM2 → relu */
      56%  { transform: translate(520px, 120px); }
      /* relu → DRAM3 */
      68%  { transform: translate(660px, 120px); }
      /* dive into DRAM3 */
      72%  { transform: translate(660px, 148px); }
      76%  { transform: translate(660px, 92px); }
      /* rest */
      82%  { transform: translate(660px, 120px); opacity: 1; }
      90%  { opacity: 0; }
      100% { transform: translate(660px, 120px); opacity: 0; }
    }

    /* Animated data dot — bottom lane (fused, 1 write) */
    @keyframes fd-bottom-travel {
      0%   { transform: translate(88px,  384px); opacity: 0; }
      /* delayed start so it overlaps top lane's mid-journey */
      3%   { opacity: 0; }
      10%  { opacity: 1; transform: translate(88px, 384px); }
      /* matmul tile → fused kernel entry */
      24%  { transform: translate(192px, 384px); }
      /* through fused kernel: bias_add sub-box → relu sub-box */
      38%  { transform: translate(262px, 384px); }
      48%  { transform: translate(392px, 384px); }
      /* exit fused kernel → DRAM */
      60%  { transform: translate(550px, 384px); }
      /* arrive at DRAM (one write, no bounce) */
      70%  { transform: translate(600px, 384px); opacity: 1; }
      80%  { opacity: 0; }
      100% { transform: translate(600px, 384px); opacity: 0; }
    }

    #fig-fusion-dram-roundtrip-vs-fused .dot-top {
      animation: fd-top-travel 3s ease-in-out infinite;
    }
    #fig-fusion-dram-roundtrip-vs-fused .dot-bottom {
      animation: fd-bottom-travel 3s ease-in-out infinite;
    }
  </style>

<figcaption><b>Kernel fusion eliminates costly DRAM round-trips.</b> Without fusion (top), each operator writes its result to GPU global memory before the next kernel reads it back — three full DRAM round-trips for a simple matmul→bias_add→relu chain. With fusion (bottom), bias_add and relu execute inside the same kernel as the matmul tile, keeping intermediate values in registers or shared memory, and only the final output is written to DRAM — a 3x reduction in memory traffic for these activations.</figcaption>
</figure>
