<figure class="viz" id="fig-kl-asymmetry-mode-covering-vs-seeking">
<svg viewBox="0 0 800 460" role="img" aria-label="Forward KL versus reverse KL when fitting a single-mode approximation q to a fixed two-mode target p. Forward KL spreads q to cover both modes; reverse KL locks q onto a single mode.">
<defs>
  <style>
    #fig-kl-asymmetry-mode-covering-vs-seeking text {
      fill: var(--ink-soft,#444);
      font: 400 11.5px var(--sans,sans-serif);
    }
    #fig-kl-asymmetry-mode-covering-vs-seeking .panel-title {
      font: 700 13.5px var(--sans,sans-serif);
    }
    #fig-kl-asymmetry-mode-covering-vs-seeking .panel-sub {
      font: 600 11.5px var(--sans,sans-serif);
      fill: var(--muted,#888);
    }
    #fig-kl-asymmetry-mode-covering-vs-seeking .annot {
      font: 400 10.5px var(--sans,sans-serif);
    }
    #fig-kl-asymmetry-mode-covering-vs-seeking .annot-b {
      font: 600 10.5px var(--sans,sans-serif);
    }
    #fig-kl-asymmetry-mode-covering-vs-seeking .legend-text {
      font: 600 11px var(--sans,sans-serif);
    }
    #fig-kl-asymmetry-mode-covering-vs-seeking .footer-text {
      font: 400 11.5px var(--sans,sans-serif);
      fill: var(--ink-soft,#444);
    }
  </style>
</defs>


<text x="200" y="26" text-anchor="middle" class="panel-title" fill="var(--accent,#c0392b)">Forward KL:  D_KL(p || q)</text>
<text x="200" y="44" text-anchor="middle" class="panel-sub">inclusive / mode-covering</text>

<text x="600" y="26" text-anchor="middle" class="panel-title" fill="var(--accent2,#3b82f6)">Reverse KL:  D_KL(q || p)</text>
<text x="600" y="44" text-anchor="middle" class="panel-sub">exclusive / mode-seeking</text>


<line x1="400" y1="20" x2="400" y2="330" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>


<g data-anim="1">


<line x1="40" y1="230" x2="360" y2="230" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>


<path d="M 40 230
         C 60 230, 75 90, 110 88
         C 145 86, 155 170, 175 195
         C 190 213, 210 213, 225 195
         C 245 170, 255 86, 290 88
         C 325 90, 340 230, 360 230
         Z"
      fill="var(--muted,#888)" fill-opacity="0.28" stroke="var(--muted,#888)" stroke-width="1.6"/>


<path d="M 55 230
         C 90 195, 140 130, 200 122
         C 260 130, 310 195, 345 230"
      fill="none" stroke="var(--accent,#c0392b)" stroke-width="2.6"/>

<text x="200" y="252" text-anchor="middle" class="annot" fill="var(--muted,#888)">target p (two modes)</text>


<line x1="200" y1="122" x2="200" y2="95" stroke="var(--accent,#c0392b)" stroke-width="1" stroke-dasharray="3 2"/>
<text x="200" y="74" text-anchor="middle" class="annot-b" fill="var(--accent,#c0392b)">q's peak lands</text>
<text x="200" y="86" text-anchor="middle" class="annot-b" fill="var(--accent,#c0392b)">in the empty valley</text>

<text x="200" y="278" text-anchor="middle" class="annot">q must put mass wherever p has mass</text>

<rect x="30" y="292" width="340" height="34" rx="7" fill="var(--accent,#c0392b)" fill-opacity="0.08" stroke="var(--accent,#c0392b)" stroke-width="1"/>
<text x="200" y="307" text-anchor="middle" class="annot" fill="var(--accent,#c0392b)">penalty blows up where p&gt;0 but q~0 -&gt;</text>
<text x="200" y="321" text-anchor="middle" class="annot" fill="var(--accent,#c0392b)">q spreads to cover everything (even the valley)</text>

</g>


<g data-anim="2">

<line x1="440" y1="230" x2="760" y2="230" stroke="var(--border-2,#ccc)" stroke-width="1.3"/>


<path d="M 440 230
         C 460 230, 475 90, 510 88
         C 545 86, 555 170, 575 195
         C 590 213, 610 213, 625 195
         C 645 170, 655 86, 690 88
         C 725 90, 740 230, 760 230
         Z"
      fill="var(--muted,#888)" fill-opacity="0.28" stroke="var(--muted,#888)" stroke-width="1.6"/>


<path d="M 470 230
         C 480 155, 495 90, 510 88
         C 525 90, 540 155, 550 230"
      fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.6"/>

<text x="600" y="252" text-anchor="middle" class="annot" fill="var(--muted,#888)">target p (two modes)</text>


<line x1="690" y1="88" x2="690" y2="82" stroke="var(--accent2,#3b82f6)" stroke-width="1" stroke-dasharray="3 2"/>
<text x="690" y="62" text-anchor="middle" class="annot-b" fill="var(--accent2,#3b82f6)">q ignores this mode</text>
<text x="690" y="74" text-anchor="middle" class="annot-b" fill="var(--accent2,#3b82f6)">entirely</text>

<text x="600" y="278" text-anchor="middle" class="annot">q avoids regions where p~0</text>

<rect x="430" y="292" width="340" height="34" rx="7" fill="var(--accent2,#3b82f6)" fill-opacity="0.08" stroke="var(--accent2,#3b82f6)" stroke-width="1"/>
<text x="600" y="307" text-anchor="middle" class="annot" fill="var(--accent2,#3b82f6)">penalty blows up where q&gt;0 but p~0 -&gt;</text>
<text x="600" y="321" text-anchor="middle" class="annot" fill="var(--accent2,#3b82f6)">q retreats onto a single mode</text>

</g>


<g data-anim="3">
<rect x="24" y="336" width="18" height="10" fill="var(--muted,#888)" fill-opacity="0.28" stroke="var(--muted,#888)" stroke-width="1.4"/>
<text x="48" y="345" class="legend-text">p(x) -- fixed two-mode target (same in both panels)</text>

<line x1="24" y1="358" x2="42" y2="358" stroke="var(--accent,#c0392b)" stroke-width="2.6"/>
<text x="48" y="362" class="legend-text" fill="var(--accent,#c0392b)">q(x) forward-KL fit -- broad, covers both modes</text>

<line x1="440" y1="358" x2="458" y2="358" stroke="var(--accent2,#3b82f6)" stroke-width="2.6"/>
<text x="464" y="362" class="legend-text" fill="var(--accent2,#3b82f6)">q(x) reverse-KL fit -- narrow, sits on one mode</text>
</g>


<g data-anim="4">
<line x1="24" y1="380" x2="776" y2="380" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<text x="400" y="404" text-anchor="middle" class="footer-text">MLE / cross-entropy training minimizes forward KL(p_data || q_theta) -&gt; the model must cover all modes of the data.</text>
<text x="400" y="428" text-anchor="middle" class="footer-text">RLHF / DPO adds a reverse-KL(pi || pi_ref) penalty -&gt; the policy stays concentrated near the reference model.</text>
</g>

</svg>
<figcaption><b>Forward KL spreads a single-mode approximation to cover a two-mode target; reverse KL collapses it onto one mode.</b> Forward KL's expectation is taken under <code>p</code>, so any region where <code>p&gt;0</code> but <code>q~0</code> is punished infinitely -- <code>q</code> is forced to straddle both humps, even placing mass in the empty valley between them. Reverse KL's expectation is taken under <code>q</code>, so <code>q</code> is only punished for placing mass where <code>p~0</code> -- it is free to abandon a whole mode and concentrate narrowly on the other.</figcaption>
</figure>
