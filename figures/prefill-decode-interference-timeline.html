<figcaption><b>On a shared GPU, a single long prompt's monolithic prefill stalls every in-flight decode sequence at once, turning a steady inter-token cadence into one giant P99 latency spike.</b> Decode sequences A&#8211;D tick along at a small, steady ITL until an 8K-token prompt arrives; its prefill occupies the GPU as one uninterruptible forward pass, so no decode tokens are emitted until it finishes. Chunked prefill (next) bounds this stall to one chunk, and full prefill/decode disaggregation (below) removes it from the decode path altogether.</figcaption>
