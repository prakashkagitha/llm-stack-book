<figcaption><b>Activation-patching heatmap reveals the two-bump factual-recall signature.</b> Recovery peaks first at the <b>subject token "Tower", layer L5 (0.78) — the early site</b> where mid-layer MLPs look up entity attributes. The effect migrates to the <b>final token "of", layers L9–L11 (up to 0.96) — the late site</b> where attention moves the recalled fact to the prediction position. This two-site pattern is what knowledge-editing methods like ROME and MEMIT exploit.</figcaption>
