<figure class="viz" id="fig-dmp-axis-placement-priority">

<svg viewBox="0 0 860 520" role="img" aria-label="Five parallelism axes nested by communication intensity: TP innermost requiring NVLink, then EP, CP, PP, with DP outermost tolerating slowest interconnect.">
<defs>
  
  <linearGradient id="app-gauge" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="var(--accent,#4f46e5)" stop-opacity="1"/>
    <stop offset="100%" stop-color="var(--surface-3,#ece7da)" stop-opacity="1"/>
  </linearGradient>
  
  
  
  
  
  
</defs>


<text x="430" y="22" font="700 14px var(--sans,sans-serif)" text-anchor="middle" fill="var(--ink-soft,#45413a)" font-size="14" font-weight="700" font-family="var(--sans,sans-serif)">Parallelism Axes Ordered by Communication Intensity</text>
<text x="430" y="38" class="axis-sub" text-anchor="middle" fill="var(--muted,#6d675d)">innermost = fastest interconnect required; outermost = slowest link tolerable</text>




<rect x="40"  y="90"  width="780" height="400" rx="18"
      fill="var(--accent,#4f46e5)" fill-opacity="0.07"
      stroke="var(--accent,#4f46e5)" stroke-opacity="0.25" stroke-width="1.5"/>


<rect x="110" y="124" width="640" height="332" rx="14"
      fill="var(--accent,#4f46e5)" fill-opacity="0.10"
      stroke="var(--accent,#4f46e5)" stroke-opacity="0.32" stroke-width="1.5"/>


<rect x="176" y="156" width="508" height="268" rx="12"
      fill="var(--accent,#4f46e5)" fill-opacity="0.14"
      stroke="var(--accent,#4f46e5)" stroke-opacity="0.40" stroke-width="1.5"/>


<rect x="240" y="186" width="380" height="208" rx="10"
      fill="var(--accent,#4f46e5)" fill-opacity="0.20"
      stroke="var(--accent,#4f46e5)" stroke-opacity="0.50" stroke-width="1.8"/>


<rect x="302" y="214" width="256" height="152" rx="8"
      fill="var(--accent,#4f46e5)" fill-opacity="0.30"
      stroke="var(--accent,#4f46e5)" stroke-opacity="0.85" stroke-width="2.2"/>




<text x="430" y="282" class="axis-name" text-anchor="middle" fill="var(--accent,#4f46e5)">TP</text>
<text x="430" y="297" class="axis-sub" text-anchor="middle" fill="var(--accent,#4f46e5)" font-size="10.5">must be intra-node (NVLink)</text>
<text x="430" y="310" class="axis-sub" text-anchor="middle" fill="var(--accent,#4f46e5)" font-size="10.5">heavy all-reduce every layer</text>
<text x="430" y="323" class="axis-sub" text-anchor="middle" fill="var(--accent,#4f46e5)" font-size="10.5">t &lt;= 8 (NVLink domain)</text>
<text x="430" y="340" class="axis-sub" text-anchor="middle" fill="var(--accent,#4f46e5)" font-size="10.5">4x all-reduce/layer</text>


<text x="270" y="282" class="axis-name" text-anchor="middle" fill="var(--accent,#4f46e5)">EP</text>
<text x="270" y="297" class="axis-sub" text-anchor="middle" font-size="10">intra-node / fast</text>
<text x="270" y="309" class="axis-sub" text-anchor="middle" font-size="10">all-to-all x2</text>
<text x="270" y="321" class="axis-sub" text-anchor="middle" font-size="10">bandwidth-bound</text>

<text x="590" y="282" class="axis-name" text-anchor="middle" fill="var(--accent,#4f46e5)">EP</text>
<text x="590" y="297" class="axis-sub" text-anchor="middle" font-size="10">intra-node / fast</text>
<text x="590" y="309" class="axis-sub" text-anchor="middle" font-size="10">all-to-all x2</text>
<text x="590" y="321" class="axis-sub" text-anchor="middle" font-size="10">bandwidth-bound</text>


<text x="430" y="180" class="axis-name" text-anchor="middle" fill="var(--ink-soft,#45413a)">CP</text>
<text x="430" y="194" class="axis-sub" text-anchor="middle" font-size="10">fast: ring send/recv</text>
<text x="430" y="206" class="axis-sub" text-anchor="middle" font-size="10">overlaps with compute</text>

<text x="430" y="394" class="axis-name" text-anchor="middle" fill="var(--ink-soft,#45413a)">CP</text>
<text x="430" y="408" class="axis-sub" text-anchor="middle" font-size="10">per-step latency matters</text>


<text x="430" y="146" class="axis-name" text-anchor="middle" fill="var(--ink-soft,#45413a)">PP</text>
<text x="430" y="158" class="axis-sub" text-anchor="middle" font-size="10">tolerant of slower links</text>

<text x="430" y="436" class="axis-name" text-anchor="middle" fill="var(--ink-soft,#45413a)">PP</text>
<text x="430" y="448" class="axis-sub" text-anchor="middle" font-size="10">point-to-point at stage boundaries</text>


<text x="80"  y="116" class="axis-name" text-anchor="start" fill="var(--muted,#6d675d)">DP</text>
<text x="80"  y="130" class="axis-sub" text-anchor="start" font-size="10" fill="var(--muted,#6d675d)">outermost / slowest OK</text>
<text x="80"  y="142" class="axis-sub" text-anchor="start" font-size="10" fill="var(--muted,#6d675d)">all-reduce (or RS+AG)</text>
<text x="80"  y="154" class="axis-sub" text-anchor="start" font-size="10" fill="var(--muted,#6d675d)">once per step</text>

<text x="782" y="116" class="axis-name" text-anchor="end" fill="var(--muted,#6d675d)">DP</text>
<text x="782" y="130" class="axis-sub" text-anchor="end" font-size="10" fill="var(--muted,#6d675d)">one all-reduce per step</text>



<defs>
  <marker id="app-up" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 10 L5 0 L10 10 z" fill="var(--accent,#4f46e5)" fill-opacity="0.7"/>
  </marker>
  <marker id="app-dn" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L5 10 L10 0 z" fill="var(--muted,#6d675d)" fill-opacity="0.7"/>
  </marker>
</defs>

<rect x="16" y="90" width="14" height="400" rx="4"
      fill="url(#app-gauge)" opacity="0.8"/>

<text x="8" y="88" class="gauge-lbl" text-anchor="middle" fill="var(--accent,#4f46e5)" transform="rotate(-90,8,88)" font-size="9" font-family="var(--sans,sans-serif)">fastest interconnect (NVLink)</text>

<text x="8" y="492" class="gauge-lbl" text-anchor="middle" fill="var(--muted,#6d675d)" transform="rotate(-90,8,492)" font-size="9" font-family="var(--sans,sans-serif)">slowest link tolerable (Ethernet/IB)</text>


<text x="430" y="472" class="formula" text-anchor="middle" fill="var(--ink-soft,#45413a)">G = d x t x p x c x e</text>
<text x="430" y="488" class="cap" text-anchor="middle">e.g. TP=8 within a node (NVLink), PP across nodes (InfiniBand), DP across racks</text>
<text x="430" y="502" class="cap" text-anchor="middle">Add axes in this order: TP (intra-node) -> PP (inter-node) -> CP (long context) -> EP (MoE) -> DP (throughput)</text>
</svg>
<figcaption><b>Canonical placement of the five parallelism axes ordered by communication intensity.</b> Tensor parallelism sits innermost because its per-layer all-reduces demand NVLink bandwidth; each outer band tolerates progressively slower fabric, with data parallelism outermost because it pays only one all-reduce per training step. Mapping this nesting onto the physical topology — fast interconnect inward, slow outward — is the single most important placement decision in large-scale training.</figcaption>
</figure>
