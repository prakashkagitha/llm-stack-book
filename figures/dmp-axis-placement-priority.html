<figure class="viz" id="fig-dmp-axis-placement-priority">
<style>
#fig-dmp-axis-placement-priority .axis-name { font: 800 15px var(--sans,sans-serif); }
#fig-dmp-axis-placement-priority .axis-sub  { font: 400 10.5px var(--sans,sans-serif); }
#fig-dmp-axis-placement-priority .gauge-lbl { font: 600 10px var(--sans,sans-serif); }
#fig-dmp-axis-placement-priority .gauge-sub { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
#fig-dmp-axis-placement-priority .cap       { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
#fig-dmp-axis-placement-priority .formula   { font: 600 12px var(--mono,monospace); }
#fig-dmp-axis-placement-priority .title     { font: 800 15px var(--sans,sans-serif); }
#fig-dmp-axis-placement-priority text       { fill: var(--ink-soft,#45413a); }
</style>
<svg viewBox="0 0 860 548" role="img" aria-label="Five parallelism axes nested by communication intensity: TP and EP innermost requiring NVLink, then CP, then PP, with DP outermost tolerating the slowest interconnect.">
<defs>
  <linearGradient id="app-gauge" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="var(--accent,#4f46e5)" stop-opacity="1"/>
    <stop offset="55%"  stop-color="var(--warn,#e0a106)" stop-opacity="1"/>
    <stop offset="100%" stop-color="var(--accent2,#3b82f6)" stop-opacity="1"/>
  </linearGradient>
</defs>


<text x="430" y="22" class="title" text-anchor="middle" fill="var(--ink-soft,#45413a)">Parallelism Axes Ordered by Communication Intensity</text>
<text x="430" y="38" class="axis-sub" text-anchor="middle" fill="var(--muted,#6d675d)">innermost = fastest interconnect required; outermost = slowest link tolerable</text>



<rect x="40"  y="90"  width="780" height="400" rx="18" fill="var(--surface,#fff)"/>
<rect x="40"  y="90"  width="780" height="400" rx="18"
      fill="var(--accent2,#3b82f6)" fill-opacity="0.10"
      stroke="var(--accent2,#3b82f6)" stroke-opacity="0.55" stroke-width="1.5"/>


<rect x="110" y="124" width="640" height="332" rx="14" fill="var(--surface,#fff)"/>
<rect x="110" y="124" width="640" height="332" rx="14"
      fill="var(--good,#2f9e6e)" fill-opacity="0.12"
      stroke="var(--good,#2f9e6e)" stroke-opacity="0.55" stroke-width="1.5"/>


<rect x="176" y="156" width="508" height="268" rx="12" fill="var(--surface,#fff)"/>
<rect x="176" y="156" width="508" height="268" rx="12"
      fill="var(--warn,#e0a106)" fill-opacity="0.14"
      stroke="var(--warn,#e0a106)" stroke-opacity="0.6" stroke-width="1.8"/>


<rect x="240" y="186" width="380" height="208" rx="10" fill="var(--surface,#fff)"/>
<rect x="240" y="186" width="380" height="208" rx="10"
      fill="var(--accent,#4f46e5)" fill-opacity="0.20"
      stroke="var(--accent,#4f46e5)" stroke-opacity="0.9" stroke-width="2.4"/>



<text x="430" y="216" class="axis-name" text-anchor="middle" fill="var(--accent,#4f46e5)">TP + EP</text>
<text x="430" y="232" class="axis-sub" text-anchor="middle" fill="var(--accent,#4f46e5)" font-size="10.5">innermost tier -&gt; per-layer collectives -&gt; NVLink</text>

<line x1="430" y1="246" x2="430" y2="362" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>

<text x="335" y="256" class="axis-name" text-anchor="middle" fill="var(--accent,#4f46e5)" font-size="12.5">TP</text>
<text x="335" y="272" class="axis-sub" text-anchor="middle" font-size="10">must be intra-node (NVLink)</text>
<text x="335" y="285" class="axis-sub" text-anchor="middle" font-size="10">heavy all-reduce every layer</text>
<text x="335" y="298" class="axis-sub" text-anchor="middle" font-size="10">t &lt;= 8 (NVLink domain)</text>
<text x="335" y="311" class="axis-sub" text-anchor="middle" font-size="10">4x all-reduce/layer</text>

<text x="525" y="256" class="axis-name" text-anchor="middle" fill="var(--accent,#4f46e5)" font-size="12.5">EP</text>
<text x="525" y="272" class="axis-sub" text-anchor="middle" font-size="10">intra-node / fast</text>
<text x="525" y="285" class="axis-sub" text-anchor="middle" font-size="10">all-to-all x2</text>
<text x="525" y="298" class="axis-sub" text-anchor="middle" font-size="10">bandwidth-bound</text>

<text x="430" y="346" class="axis-sub" text-anchor="middle" font-size="10" fill="var(--muted,#6d675d)">both saturate NVLink -&gt; keep within one node</text>



<text x="430" y="169" class="axis-name" text-anchor="middle" fill="var(--warn,#e0a106)">CP</text>
<text x="430" y="181" class="axis-sub" text-anchor="middle" font-size="10">fast ring send/recv, overlaps compute</text>

<text x="430" y="407" class="axis-name" text-anchor="middle" fill="var(--warn,#e0a106)">CP</text>
<text x="430" y="419" class="axis-sub" text-anchor="middle" font-size="10">per-step latency matters</text>



<text x="430" y="139" class="axis-name" text-anchor="middle" fill="var(--good,#2f9e6e)">PP</text>
<text x="430" y="151" class="axis-sub" text-anchor="middle" font-size="10">tolerant of slower links</text>

<text x="430" y="437" class="axis-name" text-anchor="middle" fill="var(--good,#2f9e6e)">PP</text>
<text x="430" y="449" class="axis-sub" text-anchor="middle" font-size="10">point-to-point at stage boundaries</text>



<text x="80"  y="116" class="axis-name" text-anchor="start" fill="var(--accent2,#3b82f6)">DP</text>
<text x="80"  y="130" class="axis-sub" text-anchor="start" font-size="10" fill="var(--muted,#6d675d)">outermost / slowest OK</text>
<text x="80"  y="142" class="axis-sub" text-anchor="start" font-size="10" fill="var(--muted,#6d675d)">all-reduce (or RS+AG)</text>
<text x="80"  y="154" class="axis-sub" text-anchor="start" font-size="10" fill="var(--muted,#6d675d)">once per step</text>

<text x="782" y="116" class="axis-name" text-anchor="end" fill="var(--accent2,#3b82f6)">DP</text>
<text x="782" y="130" class="axis-sub" text-anchor="end" font-size="10" fill="var(--muted,#6d675d)">one all-reduce per step</text>


<rect x="16" y="90" width="14" height="400" rx="4"
      fill="url(#app-gauge)" opacity="0.85"/>

<text x="8" y="88" class="gauge-lbl" text-anchor="middle" fill="var(--accent,#4f46e5)" transform="rotate(-90,8,88)" font-size="9" font-family="var(--sans,sans-serif)">fastest interconnect (NVLink)</text>

<text x="8" y="486" class="gauge-lbl" text-anchor="start" fill="var(--accent2,#3b82f6)" transform="rotate(-90,8,486)" font-size="9" font-family="var(--sans,sans-serif)">slowest link tolerable (Ethernet/IB)</text>


<text x="430" y="510" class="formula" text-anchor="middle" fill="var(--ink-soft,#45413a)">G = d x t x p x c x e</text>
<text x="430" y="526" class="cap" text-anchor="middle">e.g. TP=8 within a node (NVLink), PP across nodes (InfiniBand), DP across racks</text>
<text x="430" y="540" class="cap" text-anchor="middle">Add axes in this order: TP (intra-node) -&gt; PP (inter-node) -&gt; CP (long context) -&gt; EP (MoE) -&gt; DP (throughput)</text>
</svg>
<figcaption><b>Canonical placement of the five parallelism axes ordered by communication intensity.</b> Tensor and expert parallelism share the innermost tier because both fire per-layer collectives that demand NVLink bandwidth; each outer band tolerates progressively slower fabric, with data parallelism outermost because it pays only one all-reduce per training step. Mapping this nesting onto the physical topology — fast interconnect inward, slow outward — is the single most important placement decision in large-scale training.</figcaption>
</figure>
