<text x="575" y="269" class="note">min value (solid)</text>
<rect x="560" y="276" width="11" height="11" rx="1" fill="url(#lb-hatch)" stroke="var(--muted,#978f83)" stroke-width="1"/>
<text x="575" y="287" class="note">range extension (hatched)</text>
<rect x="560" y="294" width="11" height="11" rx="1" fill="var(--accent,#6aa9ff)" fill-opacity="0.30" stroke="var(--accent,#6aa9ff)" stroke-width="1.5"/>
<text x="575" y="305" class="note">LLM TTFT — bottleneck</text>

</svg>
<figcaption><b>Voice pipeline latency budget: cascade vs. speech-LM.</b> Row A (cascade: ASR → LLM → TTS) stacks VAD + ASR + LLM TTFT + TTS for a total of 300–900 ms; the LLM first-token latency dominates with the widest range. Row B (native speech LM) skips ASR and TTS entirely, cutting the budget to ~150–300 ms. Solid segments show minimum values; hatched extensions show the additional worst-case overhead.</figcaption>
</figure>
