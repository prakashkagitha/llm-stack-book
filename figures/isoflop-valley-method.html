<figure class="viz" id="fig-isoflop-valley-method">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 800 520" role="img" aria-label="Left panel shows four shallow U-shaped loss valleys, one per fixed compute budget, each sweeping model size N with data D determined by D equals C over six N; the valley minimum of each is N-optimal for that budget. Right panel plots those four minima on compute versus optimal-N log-log axes, showing they fall on a straight line, the power law N-optimal proportional to C to the power a, with a about 0.5.">
  <style>
    #fig-isoflop-valley-method text{ fill:var(--ink-soft); }
    #fig-isoflop-valley-method .panel-title{ font:700 14px var(--sans,sans-serif); }
    #fig-isoflop-valley-method .heading{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-isoflop-valley-method .ax-lbl{ font:600 11.5px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-isoflop-valley-method .curve-lbl{ font:700 10.5px var(--mono,monospace); fill:var(--accent); text-anchor:middle; }
    #fig-isoflop-valley-method .arm-lbl{ font:500 10.5px var(--sans,sans-serif); fill:var(--warn,#e0a106); }
    #fig-isoflop-valley-method .trend-lbl{ font:700 12px var(--mono,monospace); fill:var(--accent); }
    #fig-isoflop-valley-method .trend-sub{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-isoflop-valley-method .strip{ font:500 12px var(--sans,sans-serif); fill:var(--ink-soft); text-anchor:middle; }
  </style>


  <g data-anim="1">
    <rect x="20" y="18" width="370" height="432" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
    <rect x="410" y="18" width="370" height="432" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
    <line x1="400" y1="30" x2="400" y2="458" stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="6,4"/>

    <text x="205" y="42" text-anchor="middle" class="panel-title">IsoFLOP valleys: sweep N at fixed C</text>
    <line x1="50" y1="50" x2="360" y2="50" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
    <text x="50" y="65" class="heading">each curve = one fixed compute C; D = C/6N along it</text>
    <circle cx="54" cy="76" r="3" fill="var(--accent)"/>
    <text x="64" y="80" class="heading">= N_opt, the loss-minimizing N for that budget</text>

    <text x="595" y="42" text-anchor="middle" class="panel-title">The allocation power law</text>
    <line x1="440" y1="50" x2="750" y2="50" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
    <text x="440" y="65" class="heading">each dot = one valley's N_opt, carried over from the left</text>
  </g>


  <g data-anim="2">
    <line x1="62" y1="330" x2="62" y2="88" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <line x1="62" y1="330" x2="388" y2="330" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <text x="225" y="356" text-anchor="middle" class="ax-lbl">model size N (log)</text>
    <text x="32" y="215" text-anchor="middle" class="ax-lbl" transform="rotate(-90 32 215)">final loss L</text>
  </g>


  <g data-anim="3">
    <path d="M70,105 Q145,195 220,105" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M125,160 Q200,250 275,160" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M180,215 Q255,295 330,215" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M227,265 Q305,345 383,265" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
  </g>


  <g data-anim="4" fill="var(--accent)" stroke="var(--surface,#ffffff)" stroke-width="1.3">
    <circle cx="145" cy="150" r="4.5"/>
    <circle cx="200" cy="205" r="4.5"/>
    <circle cx="255" cy="255" r="4.5"/>
    <circle cx="305" cy="305" r="4.5"/>
  </g>


  <g data-anim="4">
    <text x="145" y="125" class="curve-lbl">10^18</text>
    <text x="200" y="180" class="curve-lbl">10^19</text>
    <text x="255" y="230" class="curve-lbl">10^20</text>
    <text x="305" y="280" class="curve-lbl">10^21</text>
  </g>


  <g data-anim="5">
    <line x1="70" y1="101" x2="70" y2="106" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
    <text x="65" y="98" class="arm-lbl">too big (data-starved)</text>

    <line x1="220" y1="101" x2="220" y2="106" stroke="var(--warn,#e0a106)" stroke-width="1.4"/>
    <text x="388" y="98" text-anchor="end" class="arm-lbl">too small (wastes compute)</text>
  </g>


  <g data-anim="2">
    <line x1="452" y1="330" x2="452" y2="88" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <line x1="452" y1="330" x2="762" y2="330" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <text x="606" y="356" text-anchor="middle" class="ax-lbl">compute C (log)</text>
    <text x="424" y="215" text-anchor="middle" class="ax-lbl" transform="rotate(-90 424 215)">optimal N (log)</text>
  </g>


  <g data-anim="5">
    <path d="M480,313 L735,143" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round"/>
  </g>


  <g data-anim="5" fill="var(--accent)" stroke="var(--surface,#ffffff)" stroke-width="1.3">
    <circle cx="500" cy="300" r="4.5"/>
    <circle cx="575" cy="250" r="4.5"/>
    <circle cx="650" cy="200" r="4.5"/>
    <circle cx="725" cy="150" r="4.5"/>
  </g>


  <g data-anim="5">
    <text x="486" y="292" text-anchor="end" class="curve-lbl">10^18</text>
    <text x="561" y="242" text-anchor="end" class="curve-lbl">10^19</text>
    <text x="636" y="192" text-anchor="end" class="curve-lbl">10^20</text>
    <text x="711" y="142" text-anchor="end" class="curve-lbl">10^21</text>
  </g>


  <g data-anim="5">
    <rect x="560" y="88" width="196" height="42" rx="8" fill="var(--surface,#ffffff)" stroke="var(--accent)" stroke-width="1.2"/>
    <text x="572" y="105" class="trend-lbl">N_opt ~ C^a</text>
    <text x="572" y="121" class="trend-sub">a = beta/(alpha+beta) ~ 0.5</text>
  </g>


  <g data-anim="1">
    <rect x="20" y="466" width="760" height="38" rx="8" fill="var(--surface-3,#f1f5f9)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
    <text x="400" y="482" class="strip">Fix C, sweep N (D follows from D = C/6N), find the valley --</text>
    <text x="400" y="497" class="strip">the valleys trace the compute-optimal frontier.</text>
  </g>

</svg>
<figcaption><b>Chinchilla's IsoFLOP method finds N_opt by sweeping model size at fixed compute and reading off the valley bottom.</b> Every point along one curve costs the same compute C (since D = C/6N), so the left arm wastes compute starving the model of data while the right arm wastes compute on excess tokens for too small a model; the parabola's minimum is the loss-optimal split. Carrying each valley's minimum over to compute-vs-N_opt axes (right) traces a straight line on log-log scale — the allocation power law N_opt ~ C^a with a &#8776; 0.5.</figcaption>
</figure>
