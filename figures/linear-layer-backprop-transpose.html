<figure class="viz" id="fig-linear-layer-backprop-transpose">
<svg viewBox="0 0 820 350" role="img" aria-label="Forward pass Y equals X W flows left to right through tiles X, W, and Y. Backward pass reuses the transposed operands: the upstream gradient G, shaped like Y, forks right to left into X transpose times G producing dL/dW under W, and G times W transpose producing dL/dX under X.">
<defs>
  <marker id="lbt-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
    <path d="M0 1 L9 5 L0 9 z" fill="currentColor"/>
  </marker>
  <marker id="lbt-arrow-left" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
    <path d="M10 1 L1 5 L10 9 z" fill="currentColor"/>
  </marker>
  <marker id="lbt-arrow-down" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1 0 L5 9 L9 0 z" fill="currentColor"/>
  </marker>
</defs>
<style>
  #fig-linear-layer-backprop-transpose text { fill: var(--ink-soft); }
  #fig-linear-layer-backprop-transpose .banner  { font: 700 13px var(--sans,sans-serif); fill: var(--accent); }
  #fig-linear-layer-backprop-transpose .lbl     { font: 700 17px var(--sans,sans-serif); fill: var(--accent); }
  #fig-linear-layer-backprop-transpose .lbl2    { font: 700 13px var(--sans,sans-serif); fill: var(--accent); }
  #fig-linear-layer-backprop-transpose .dim     { font: 500 10px var(--mono,monospace); fill: var(--muted); }
  #fig-linear-layer-backprop-transpose .op      { font: 600 17px var(--mono,monospace); }
  #fig-linear-layer-backprop-transpose .cbanner { font: 700 12px var(--sans,sans-serif); fill: var(--accent); }
  #fig-linear-layer-backprop-transpose .flabel  { font: 600 10.5px var(--mono,monospace); }
  #fig-linear-layer-backprop-transpose .note    { font: 500 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-linear-layer-backprop-transpose .tbadge  { font: 700 7px var(--sans,sans-serif); fill: var(--surface,#fff); }
</style>


<line x1="225" y1="128" x2="225" y2="220" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>
<line x1="405" y1="128" x2="405" y2="220" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>
<line x1="590" y1="128" x2="590" y2="220" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>


<g>
  <text x="410" y="28" text-anchor="middle" class="banner">forward:  Y = X W</text>
  <line x1="155" y1="46" x2="665" y2="46" stroke="var(--accent)" stroke-width="2.2" marker-end="url(#lbt-arrow)"/>

  <rect x="160" y="64" width="130" height="64" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="225" y="102" text-anchor="middle" class="lbl">X</text>
  <text x="225" y="144" text-anchor="middle" class="dim">(B x D_in)</text>

  <text x="305" y="102" text-anchor="middle" class="op">x</text>

  <rect x="320" y="64" width="170" height="64" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="405" y="102" text-anchor="middle" class="lbl">W</text>
  <text x="405" y="144" text-anchor="middle" class="dim">(D_in x D_out)</text>

  <text x="505" y="102" text-anchor="middle" class="op">=</text>

  <rect x="520" y="64" width="140" height="64" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="590" y="102" text-anchor="middle" class="lbl">Y</text>
  <text x="590" y="144" text-anchor="middle" class="dim">(B x D_out)</text>
</g>


<rect x="270" y="145" width="280" height="24" rx="12" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-opacity="0.55" stroke-width="1"/>
<text x="410" y="161" text-anchor="middle" class="cbanner">backward = multiply by the transpose</text>


<g>
  
  <path d="M 600 220 L 600 185 L 225 185 L 225 220" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.6" marker-end="url(#lbt-arrow-down)"/>
  <text x="412" y="180" text-anchor="middle" class="flabel" fill="var(--accent2,#3b82f6)">G . W^T</text>

  
  <path d="M 560 220 L 560 203 L 405 203 L 405 220" fill="none" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#lbt-arrow-down)"/>
  <text x="482" y="198" text-anchor="middle" class="flabel" fill="var(--accent)">X^T . G</text>
</g>


<g>
  <rect x="160" y="220" width="130" height="64" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="225" y="258" text-anchor="middle" class="lbl2">dL/dX</text>
  <text x="225" y="300" text-anchor="middle" class="dim">(B x D_in)</text>

  <rect x="320" y="220" width="170" height="64" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
  <text x="405" y="258" text-anchor="middle" class="lbl2">dL/dW</text>
  <text x="405" y="300" text-anchor="middle" class="dim">(D_in x D_out)</text>

  <rect x="520" y="220" width="140" height="64" rx="6" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="1.6"/>
  <text x="590" y="258" text-anchor="middle" class="lbl">G</text>
  <text x="590" y="300" text-anchor="middle" class="dim">(B x D_out) = dL/dY</text>

  <line x1="665" y1="314" x2="155" y2="314" stroke="var(--accent)" stroke-width="2.2" marker-end="url(#lbt-arrow-left)"/>
</g>

<text x="410" y="332" text-anchor="middle" class="note">shapes must match the thing you're differentiating</text>

</svg>
<figcaption><b>Backward reuses the transposed operand from the forward pass.</b> Forward computes <code>Y = X W</code>; given the upstream gradient <code>G</code> (same shape as <code>Y</code>), the backward pass forks into <code>dL/dW = X^T G</code> (same shape as <code>W</code>) and <code>dL/dX = G W^T</code> (same shape as <code>X</code>) &#8212; the alignment guides show each gradient landing under the tensor it matches, and the shapes alone tell you which operand to transpose.</figcaption>
</figure>
