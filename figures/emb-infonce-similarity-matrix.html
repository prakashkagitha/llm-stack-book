  <text x="14" y="394" class="cap">(The loss is applied symmetrically over columns too: d -&gt; q.)</text>

<figcaption><b>InfoNCE turns each row of the batch similarity matrix into a B-way classification problem.</b> The diagonal cell (the true query-document pair) is the target class; every other cell in the row is a free in-batch negative. Dividing by temperature before the softmax sharpens or flattens how hard the loss pushes the diagonal probability toward one.</figcaption>
</figure>
