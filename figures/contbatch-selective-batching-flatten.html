<figcaption><b>Selective batching: flatten for GEMMs, split for attention.</b> All tokens from all requests — whether prefill or decode — are concatenated into a single tall matrix for the position-independent linear layers (QKV projection, MLP), giving one large GEMM with no padding. The <code>cu_seqlens</code> offsets then slice the result back by request so attention runs separately for each sequence's KV cache, using FlashAttention's varlen interface. Matching colors trace each request's tokens across all three tiers.</figcaption>
