<figure class="viz" id="fig-longctx-doc-packing-mask">
<svg viewBox="0 0 700 702" role="img" aria-label="Three-part infographic: a packed sequence of three documents (4, 3, 3 tokens); a naive causal attention mask that wrongly lets later documents attend back into earlier ones (contamination); and a block-diagonal causal mask that confines each document to itself, which FlashAttention varlen computes via cu_seqlens without ever materialising the full matrix. A loss-mask row below marks each document's first token as excluded from the loss.">
<defs>
  <marker id="ldm-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="v-muted-fill"/>
  </marker>
  <pattern id="ldm-pat-block" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="6" height="6" class="pat-block-bg"/>
    <line x1="0" y1="0" x2="0" y2="6" class="pat-block-line"/>
  </pattern>
  <pattern id="ldm-pat-contam" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" class="pat-contam-bg"/>
    <line x1="0" y1="0" x2="6" y2="6" class="pat-contam-line"/>
    <line x1="6" y1="0" x2="0" y2="6" class="pat-contam-line"/>
  </pattern>
</defs>

<figcaption><b>Packing three documents into one training window requires a mask that stops attention at document boundaries.</b> The naive causal mask (left grid) lets every later document's queries attend back into earlier, unrelated documents — at long context this cross-document "contamination" can dominate the attention window. The block-diagonal causal mask (right grid) confines each token to its own document while staying causal; FlashAttention's varlen API produces this exactly, from the four numbers in <code>cu_seqlens</code>, without ever storing a full T&amp;times;T mask. The loss mask independently zeroes out each document's first token, since it has no valid previous-token context to predict from.</figcaption>
</figure>
