<text x="390" y="474" text-anchor="middle" class="cap">GRPO learns only from the VARIANCE within a group -&gt; tune prompt difficulty into the mixed band;</text>
<text x="390" y="494" text-anchor="middle" class="cap">dynamic sampling discards and refills dead groups.</text>

</svg>
<figcaption><b>GRPO's gradient comes entirely from the spread of rewards inside a group.</b> When all four sampled responses to a prompt get the same reward -- all correct or all wrong -- the group mean equals every reward, every advantage is exactly zero, and the group contributes no gradient at all ("dead"). Only a mixed group, where some responses succeed and others fail, produces nonzero positive and negative advantages that actually move the policy -- which is why difficulty calibration and dynamic sampling (discard-and-refill dead groups) matter so much in practice.</figcaption>
</figure>
