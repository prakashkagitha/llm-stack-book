<figure class="viz" id="fig-float-formats">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 800 360" role="img" aria-label="Bit-layout comparison of FP32, TF32, FP16, BF16 and FP8 E4M3: each format is a row split into one sign bit, an exponent field, and a mantissa field, aligned to the same per-bit scale so wider exponents mean larger dynamic range and wider mantissas mean finer precision.">
  <defs>
    <marker id="ff-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-float-formats text{ fill:var(--ink-soft); }
    #fig-float-formats .name{ font:700 13px var(--mono,monospace); }
    #fig-float-formats .fld{ font:600 10px var(--mono,monospace); fill:var(--ink-soft); }
    #fig-float-formats .bits{ font:600 11px var(--mono,monospace); }
    #fig-float-formats .cap{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-float-formats .hdr{ font:700 11px var(--sans,sans-serif); }
    #fig-float-formats .note{ font:500 11px var(--sans,sans-serif); }
    #fig-float-formats .tot{ font:600 10.5px var(--mono,monospace); fill:var(--muted); }
  </style>

  

  
  <g data-anim="1">
    <text x="48" y="34" text-anchor="middle" class="hdr">format</text>
    <text x="113" y="34" text-anchor="middle" class="hdr" fill="var(--muted)">sign</text>
    <rect x="118" y="40" width="170" height="20" rx="4" fill="var(--accent)" fill-opacity="0.14"/>
    <text x="203" y="54" text-anchor="middle" class="hdr" fill="var(--accent)">exponent — dynamic range</text>
    <rect x="300" y="40" width="320" height="20" rx="4" fill="var(--good,#2f9e6e)" fill-opacity="0.14"/>
    <text x="460" y="54" text-anchor="middle" class="hdr" fill="var(--good,#2f9e6e)">mantissa — precision</text>
    <text x="735" y="34" text-anchor="middle" class="hdr" fill="var(--muted)">total</text>
  </g>

  
  <g data-anim="1">
    <text x="48" y="86" text-anchor="middle" class="name">FP32</text>
    <rect x="96" y="70" width="17" height="26" rx="2" class="v-fill v-stroke" stroke-width="1"/>
    <rect x="113" y="70" width="136" height="26" rx="2" fill="var(--accent)" fill-opacity="0.34" stroke="var(--accent)" stroke-width="1.1"/>
    <rect x="249" y="70" width="391" height="26" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.34" stroke="var(--good,#2f9e6e)" stroke-width="1.1"/>
    <text x="104" y="87" text-anchor="middle" class="fld">s</text>
    <text x="181" y="87" text-anchor="middle" class="bits" fill="var(--accent)">8</text>
    <text x="444" y="87" text-anchor="middle" class="bits" fill="var(--good,#2f9e6e)">23</text>
    <text x="735" y="87" text-anchor="middle" class="tot">32-bit</text>
  </g>

  
  <g data-anim="2">
    <text x="48" y="124" text-anchor="middle" class="name">TF32</text>
    <rect x="96" y="108" width="17" height="26" rx="2" class="v-fill v-stroke" stroke-width="1"/>
    <rect x="113" y="108" width="136" height="26" rx="2" fill="var(--accent)" fill-opacity="0.34" stroke="var(--accent)" stroke-width="1.1"/>
    <rect x="249" y="108" width="170" height="26" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.34" stroke="var(--good,#2f9e6e)" stroke-width="1.1"/>
    
    <rect x="419" y="108" width="221" height="26" rx="2" class="v-grid" fill="var(--surface-3)" fill-opacity="0.5" stroke-dasharray="3 3" stroke-width="1"/>
    <text x="104" y="125" text-anchor="middle" class="fld">s</text>
    <text x="181" y="125" text-anchor="middle" class="bits" fill="var(--accent)">8</text>
    <text x="334" y="125" text-anchor="middle" class="bits" fill="var(--good,#2f9e6e)">10</text>
    <text x="529" y="125" text-anchor="middle" class="cap">unused (pads to 32-bit register)</text>
    <text x="735" y="125" text-anchor="middle" class="tot">19-bit*</text>
  </g>

  
  <g data-anim="3">
    <text x="48" y="162" text-anchor="middle" class="name" fill="var(--accent)">BF16</text>
    <rect x="96" y="146" width="17" height="26" rx="2" class="v-fill v-stroke" stroke-width="1"/>
    <rect x="113" y="146" width="136" height="26" rx="2" fill="var(--accent)" fill-opacity="0.34" stroke="var(--accent)" stroke-width="1.1"/>
    <rect x="249" y="146" width="119" height="26" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.34" stroke="var(--good,#2f9e6e)" stroke-width="1.1"/>
    <text x="104" y="163" text-anchor="middle" class="fld">s</text>
    <text x="181" y="163" text-anchor="middle" class="bits" fill="var(--accent)">8</text>
    <text x="308" y="163" text-anchor="middle" class="bits" fill="var(--good,#2f9e6e)">7</text>
    <text x="735" y="163" text-anchor="middle" class="tot">16-bit</text>
  </g>

  
  <g data-anim="4">
    <text x="48" y="200" text-anchor="middle" class="name">FP16</text>
    <rect x="96" y="184" width="17" height="26" rx="2" class="v-fill v-stroke" stroke-width="1"/>
    <rect x="113" y="184" width="85" height="26" rx="2" fill="var(--accent)" fill-opacity="0.34" stroke="var(--accent)" stroke-width="1.1"/>
    <rect x="198" y="184" width="170" height="26" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.34" stroke="var(--good,#2f9e6e)" stroke-width="1.1"/>
    <text x="104" y="201" text-anchor="middle" class="fld">s</text>
    <text x="155" y="201" text-anchor="middle" class="bits" fill="var(--accent)">5</text>
    <text x="283" y="201" text-anchor="middle" class="bits" fill="var(--good,#2f9e6e)">10</text>
    <text x="735" y="201" text-anchor="middle" class="tot">16-bit</text>
  </g>

  
  <g data-anim="5">
    <text x="48" y="238" text-anchor="middle" class="name">FP8</text>
    <text x="48" y="251" text-anchor="middle" class="cap">E4M3</text>
    <rect x="96" y="222" width="17" height="26" rx="2" class="v-fill v-stroke" stroke-width="1"/>
    <rect x="113" y="222" width="68" height="26" rx="2" fill="var(--accent)" fill-opacity="0.34" stroke="var(--accent)" stroke-width="1.1"/>
    <rect x="181" y="222" width="51" height="26" rx="2" fill="var(--good,#2f9e6e)" fill-opacity="0.34" stroke="var(--good,#2f9e6e)" stroke-width="1.1"/>
    <text x="104" y="239" text-anchor="middle" class="fld">s</text>
    <text x="147" y="239" text-anchor="middle" class="bits" fill="var(--accent)">4</text>
    <text x="206" y="239" text-anchor="middle" class="bits" fill="var(--good,#2f9e6e)">3</text>
    <text x="735" y="239" text-anchor="middle" class="tot">8-bit</text>
  </g>

  
  <g data-anim="5">
    
    <line x1="249" y1="66" x2="249" y2="176" class="v-accent-s viz-pulse" stroke="var(--accent)" stroke-width="1.3" stroke-dasharray="4 3"/>
    <text x="262" y="270" class="note" fill="var(--accent)">FP32 · TF32 · BF16 share the same 8-bit exponent</text>
    <text x="262" y="286" class="cap">= identical dynamic range (max ~3.4×10³⁸); BF16 = top 16 bits of FP32.</text>
    
    <path d="M334 274 C 292 274 270 260 252 176" fill="none" class="v-accent-s" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>
  </g>

  
  <g data-anim="5">
    <text x="48" y="316" text-anchor="start" class="cap" fill="var(--good,#2f9e6e)">wider mantissa = finer precision</text>
    <line x1="240" y1="312" x2="360" y2="312" stroke="var(--good,#2f9e6e)" stroke-width="1.2" marker-end="url(#ff-arr)" color="var(--good,#2f9e6e)"/>
    <text x="430" y="316" text-anchor="start" class="cap" fill="var(--accent)">wider exponent = larger range</text>
    <line x1="612" y1="312" x2="720" y2="312" stroke="var(--accent)" stroke-width="1.2" marker-end="url(#ff-arr)" color="var(--accent)"/>
  </g>
</svg>
<figcaption><b>Same bits, different bargains.</b> Every float splits one sign bit, an <b>exponent</b> (sets dynamic range), and a <b>mantissa</b> (sets precision). BF16 keeps FP32's full 8-bit exponent — so it never overflows where FP32 wouldn't — and pays for it by shrinking the mantissa to 7 bits; FP16 instead spends those bits on precision (10-bit mantissa) but with only a 5-bit exponent it overflows at ~65504. FP8 E4M3 squeezes the whole number into 8 bits, which is why it needs per-tensor scaling to stay in range.</figcaption>
</figure>
