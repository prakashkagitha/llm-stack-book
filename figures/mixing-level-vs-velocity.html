<figure class="viz" id="fig-mixing-level-vs-velocity">
<svg viewBox="0 0 780 460" role="img" aria-label="Two per-domain loss-versus-tokens curves side by side. Domain X has flattened well above its reference floor, giving a large excess gap and near-zero current slope, so DoReMi upweights it while a velocity-based bandit would skip it. Domain Y is still falling steeply and sits close to its floor, giving a small excess gap and a large slope, so DoReMi would leave it while a velocity-based bandit upweights it.">
<style>
  #fig-mixing-level-vs-velocity text { fill: var(--ink-soft,#45413a); }
  #fig-mixing-level-vs-velocity .ttl   { font: 700 14px var(--sans,sans-serif); }
  #fig-mixing-level-vs-velocity .sub   { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-mixing-level-vs-velocity .axlbl { font: 400 10px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-mixing-level-vs-velocity .tag   { font: 600 11px var(--sans,sans-serif); }
  #fig-mixing-level-vs-velocity .chip  { font: 700 11.5px var(--sans,sans-serif); }
  #fig-mixing-level-vs-velocity .strap { font: 500 12px var(--sans,sans-serif); }
  #fig-mixing-level-vs-velocity .curve { fill: none; stroke: var(--v-accent,var(--accent,#c15b39)); stroke-width: 2.6; }
  #fig-mixing-level-vs-velocity .floor { stroke: var(--muted,#6d675d); stroke-width: 1.4; stroke-dasharray: 5 4; }
  #fig-mixing-level-vs-velocity .now   { stroke: var(--border-2,#94a3b8); stroke-width: 1.3; stroke-dasharray: 2 3; }
  #fig-mixing-level-vs-velocity .bracket { stroke: var(--v-accent,var(--accent,#c15b39)); stroke-width: 1.6; fill: none; }
  #fig-mixing-level-vs-velocity .tangent { stroke: var(--accent2,#3b82f6); stroke-width: 2.2; }
  #fig-mixing-level-vs-velocity .chipbox-a { fill: var(--v-accent,var(--accent,#c15b39)); fill-opacity: 0.16; stroke: var(--v-accent,var(--accent,#c15b39)); stroke-width: 1.2; }
  #fig-mixing-level-vs-velocity .chipbox-b { fill: var(--accent2,#3b82f6); fill-opacity: 0.14; stroke: var(--accent2,#3b82f6); stroke-width: 1.2; }
  #fig-mixing-level-vs-velocity .axline { stroke: var(--border-2,#94a3b8); stroke-width: 1.3; }
</style>
<defs>
  <marker id="mlv-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>

<text x="16" y="20" class="sub">per-domain loss vs. tokens seen in that domain -- two ways to read the same shape</text>


<g data-anim="1">
  <text x="185" y="42" text-anchor="middle" class="ttl">Domain X</text>

  
  <line x1="60" y1="230" x2="60" y2="70" class="axline" marker-end="url(#mlv-arr)"/>
  <line x1="60" y1="230" x2="330" y2="230" class="axline" marker-end="url(#mlv-arr)"/>
  <text x="30" y="72" class="axlbl">loss</text>
  <text x="330" y="248" text-anchor="end" class="axlbl">tokens seen -&gt;</text>

  
  <line x1="60" y1="205" x2="320" y2="205" class="floor"/>
  <text x="322" y="208" class="axlbl" fill="var(--muted,#6d675d)">floor</text>

  
  <path class="curve" d="M 65 82 C 90 120, 120 155, 160 168 C 200 178, 250 182, 300 183"/>

  
  <line x1="225" y1="70" x2="225" y2="230" class="now"/>
  <text x="225" y="241" text-anchor="middle" class="axlbl">now</text>

  
  <path class="bracket" d="M 243 180 h 8 v 25 h -8"/>
  <text x="259" y="176" class="tag" fill="var(--v-accent,var(--accent,#c15b39))">excess (LEVEL)</text>
  <text x="259" y="190" class="tag" fill="var(--v-accent,var(--accent,#c15b39))">= large</text>

  
  <line x1="197" y1="183" x2="253" y2="180" class="tangent"/>
  <text x="150" y="150" class="tag" fill="var(--accent2,#3b82f6)">velocity (slope)</text>
  <text x="150" y="164" class="tag" fill="var(--accent2,#3b82f6)">~ 0 (stuck)</text>
</g>

<g data-anim="2">
  <rect x="65" y="256" width="240" height="46" rx="6" class="chipbox-a"/>
  <text x="185" y="273" text-anchor="middle" class="chip" fill="var(--v-accent,var(--accent,#c15b39))">DoReMi (excess): UPWEIGHT</text>
  <text x="185" y="290" text-anchor="middle" class="chip" fill="var(--accent2,#3b82f6)">Bandit (velocity): skip</text>
</g>


<line x1="390" y1="34" x2="390" y2="302" stroke="var(--border-2,#94a3b8)" stroke-width="1" stroke-dasharray="3 4"/>


<g data-anim="3">
  <text x="565" y="42" text-anchor="middle" class="ttl">Domain Y</text>

  <line x1="440" y1="230" x2="440" y2="70" class="axline" marker-end="url(#mlv-arr)"/>
  <line x1="440" y1="230" x2="710" y2="230" class="axline" marker-end="url(#mlv-arr)"/>
  <text x="410" y="72" class="axlbl">loss</text>
  <text x="710" y="248" text-anchor="end" class="axlbl">tokens seen -&gt;</text>

  
  <line x1="440" y1="196" x2="700" y2="196" class="floor"/>
  <text x="702" y="199" class="axlbl" fill="var(--muted,#6d675d)">floor</text>

  
  <path class="curve" d="M 445 84 C 480 110, 520 140, 560 165 C 600 182, 650 189, 705 192"/>

  <line x1="560" y1="70" x2="560" y2="230" class="now"/>
  <text x="560" y="245" text-anchor="middle" class="axlbl">now</text>

  
  <path class="bracket" d="M 578 178 h 8 v 18 h -8"/>
  <text x="592" y="173" class="tag" fill="var(--v-accent,var(--accent,#c15b39))">excess = small</text>

  
  <line x1="520" y1="150" x2="590" y2="180" class="tangent"/>
  <path d="M 520 180 L 590 180 L 590 150" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="450" y="98" class="tag" fill="var(--accent2,#3b82f6)">velocity = large</text>
  <text x="450" y="112" class="tag" fill="var(--accent2,#3b82f6)">(improving fast)</text>
</g>

<g data-anim="4">
  <rect x="445" y="256" width="240" height="46" rx="6" class="chipbox-b"/>
  <text x="565" y="273" text-anchor="middle" class="chip" fill="var(--v-accent,var(--accent,#c15b39))">DoReMi: leave it</text>
  <text x="565" y="290" text-anchor="middle" class="chip" fill="var(--accent2,#3b82f6)">Bandit (velocity): UPWEIGHT</text>
</g>


<g data-anim="5">
  <line x1="16" y1="322" x2="764" y2="322" stroke="var(--border-2,#94a3b8)" stroke-width="1"/>
  <text x="390" y="348" text-anchor="middle" class="strap">Excess = fix what is broken (a gap).  Velocity = ride what is improving (a slope).</text>
  <text x="390" y="366" text-anchor="middle" class="strap">They can point opposite ways.</text>
</g>

</svg>
<figcaption><b>Level and slope are different signals, and they can disagree.</b> DoReMi's excess loss measures the vertical gap to an achievable reference floor at the current instant; online bandit mixing measures the tangent slope of the loss curve right now. A domain can be far above its floor but flat (DoReMi says upweight, velocity says skip), or close to its floor but still falling fast (DoReMi says leave it, velocity says upweight) — same reweighting machinery, opposite verdicts.</figcaption>
</figure>
