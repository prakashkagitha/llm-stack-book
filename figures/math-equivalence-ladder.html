<svg viewBox="0 0 780 940" role="img" aria-label="Infographic: five surface forms of the value one-half all point to the same underlying value, so naive string equality fails; below, a four-rung decision ladder (normalize, numeric, symbolic, numeric fallback) determines mathematical equivalence, each rung exiting to EQUIVALENT on success and falling through to NOT equivalent if all four fail.">

  <marker id="mel-arrow-bad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

  </marker>
</defs>

<line x1="390" y1="176" x2="390" y2="150" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>

<text x="270" y="366" text-anchor="middle" class="lbl-title">math_equivalent(pred, gold): the decision ladder</text>


<g data-anim="1">
  <rect x="40" y="392" width="380" height="80" rx="10" fill="var(--surface,#fff)" stroke="var(--v-stroke,#45413a)" stroke-width="1.6"/>

  <text x="58" y="434" class="lbl-xs">strip \boxed{...}, drop $, collapse whitespace</text>
  <text x="58" y="450" class="lbl-xs">-&gt; exact string match?</text>
  <line x1="420" y1="432" x2="470" y2="432" stroke="var(--good,#2f9e6e)" stroke-width="2" marker-end="url(#mel-arrow-good)"/>

  <line x1="420" y1="542" x2="470" y2="542" stroke="var(--good,#2f9e6e)" stroke-width="2" marker-end="url(#mel-arrow-good)"/>

</g>


<g data-anim="3">
  <rect x="40" y="612" width="380" height="80" rx="10" fill="var(--surface,#fff)" stroke="var(--v-stroke,#45413a)" stroke-width="1.6"/>
  <text x="58" y="635" class="lbl">3. Symbolic</text>
  <text x="58" y="654" class="lbl-xs">parse LaTeX with sympy</text>
  <text x="58" y="670" class="lbl-xs">-&gt; simplify(pred - gold) == 0</text>
  <line x1="420" y1="652" x2="470" y2="652" stroke="var(--good,#2f9e6e)" stroke-width="2" marker-end="url(#mel-arrow-good)"/>

</g>


<g data-anim="4">

  <text x="58" y="745" class="lbl">4. Numeric fallback</text>
  <text x="58" y="764" class="lbl-xs">evaluate expr to float, N(expr)</text>
  <text x="58" y="780" class="lbl-xs">-&gt; tolerance compare</text>
  <line x1="420" y1="762" x2="470" y2="762" stroke="var(--good,#2f9e6e)" stroke-width="2" marker-end="url(#mel-arrow-good)"/>
  <text x="426" y="754" class="lbl-xs" fill="var(--good,#2f9e6e)">yes</text>
</g>


<line x1="230" y1="472" x2="230" y2="502" stroke="var(--muted,#6d675d)" stroke-width="1.6" marker-end="url(#mel-arrow)"/>
<text x="240" y="491" class="lbl-xs" fill="var(--muted,#6d675d)">no</text>
<line x1="230" y1="582" x2="230" y2="612" stroke="var(--muted,#6d675d)" stroke-width="1.6" marker-end="url(#mel-arrow)"/>
<text x="240" y="601" class="lbl-xs" fill="var(--muted,#6d675d)">no</text>
<line x1="230" y1="692" x2="230" y2="722" stroke="var(--muted,#6d675d)" stroke-width="1.6" marker-end="url(#mel-arrow)"/>
<text x="240" y="711" class="lbl-xs" fill="var(--muted,#6d675d)">no</text>


<g data-anim="5">
  <rect x="500" y="474" width="230" height="330" rx="12" fill="var(--good,#2f9e6e)" fill-opacity="0.12" stroke="var(--good,#2f9e6e)" stroke-width="1.6"/>
  <circle cx="615" cy="540" r="24" fill="var(--good,#2f9e6e)"/>
  <path d="M604 540 l8 8 l16 -18" stroke="var(--surface,#fff)" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="470" y1="432" x2="600" y2="474" stroke="var(--good,#2f9e6e)" stroke-width="1.4" fill="none" stroke-dasharray="2,3"/>

  <line x1="470" y1="762" x2="590" y2="600" stroke="var(--good,#2f9e6e)" stroke-width="1.4" fill="none" stroke-dasharray="2,3"/>
</g>


<line x1="230" y1="812" x2="230" y2="836" stroke="var(--warn,#e0a106)" stroke-width="1.8" marker-end="url(#mel-arrow-bad)"/>
<text x="248" y="828" class="lbl-xs" fill="var(--warn,#e0a106)">all four fail</text>
<rect x="60" y="838" width="340" height="52" rx="10" fill="var(--warn,#e0a106)" fill-opacity="0.14" stroke="var(--warn,#e0a106)" stroke-width="1.6"/>
<text x="230" y="862" text-anchor="middle" class="lbl" fill="var(--warn,#e0a106)">NOT equivalent</text>
<text x="230" y="879" text-anchor="middle" class="lbl-xs">(reward = 0)</text>


<rect x="500" y="826" width="230" height="98" rx="10" fill="var(--surface-3,#ece7da)" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
<text x="514" y="847" class="lbl-xs">A buggy normalizer that</text>
<text x="514" y="862" class="lbl-xs">rejects \frac{1}{2} == 0.5 is a</text>
<text x="514" y="877" class="lbl-xs">false negative -&gt; a phantom</text>
<text x="514" y="892" class="lbl-xs">ceiling on reward (a</text>
<text x="514" y="907" class="lbl-xs">reward-hacking surface).</text>

</svg>
<figcaption><b>Mathematically equivalent values wear many surface forms, so a rule-based math verifier cannot check reward with string equality.</b> <code>math_equivalent()</code> instead runs a four-rung cascade — normalize, numeric compare, symbolic simplification, then numeric fallback — short-circuiting to EQUIVALENT the moment any rung matches, and only falling through to reward 0 if all four fail; a bug in any early rung silently caps the reward the policy can ever receive.</figcaption>
</figure>
