<figure class="viz" id="fig-sft-loss-mask-sequence">
<svg viewBox="0 0 820 260" role="img" aria-label="Response-only loss masking: the token sequence [BOS] system-prompt user-turn assistant-response [EOS] where BOS, system prompt and user turn are masked (loss weight 0) and assistant response plus EOS are supervised (loss weight 1).">
<defs>
  <marker id="lm-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>
<style>
  #fig-sft-loss-mask-sequence text { fill: currentColor; }
  #fig-sft-loss-mask-sequence .lbl  { font: 600 12px var(--mono,monospace); }
  #fig-sft-loss-mask-sequence .cap  { font: 500 11px var(--sans,sans-serif); }
  #fig-sft-loss-mask-sequence .sub  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sft-loss-mask-sequence .leg  { font: 500 11px var(--sans,sans-serif); }
  #fig-sft-loss-mask-sequence .ann  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-sft-loss-mask-sequence .boundary { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
</style>




<rect x="42" y="30" width="68" height="44" rx="6"
      fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.5"/>
<text x="76" y="57" text-anchor="middle" class="lbl" fill="var(--muted,#6d675d)">[BOS]</text>


<rect x="110" y="30" width="152" height="44" rx="0"
      fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.5"/>
<text x="186" y="57" text-anchor="middle" class="lbl" fill="var(--muted,#6d675d)">&lt;system prompt&gt;</text>


<rect x="262" y="30" width="142" height="44" rx="0"
      fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.5"/>
<text x="333" y="57" text-anchor="middle" class="lbl" fill="var(--muted,#6d675d)">&lt;user turn&gt;</text>


<rect x="404" y="30" width="186" height="44" rx="0"
      fill="var(--accent2,#3b82f6)" fill-opacity="0.13" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
<text x="497" y="57" text-anchor="middle" class="lbl" fill="var(--accent2,#3b82f6)">&lt;assistant response&gt;</text>


<rect x="590" y="30" width="68" height="44" rx="6"
      fill="var(--accent2,#3b82f6)" fill-opacity="0.13" stroke="var(--accent2,#3b82f6)" stroke-width="2"/>
<text x="624" y="57" text-anchor="middle" class="lbl" fill="var(--accent2,#3b82f6)">[EOS]</text>


<path d="M 46 100 L 46 110 L 400 110 L 400 100"
      fill="none" stroke="var(--muted,#6d675d)" stroke-width="1.5"/>
<line x1="223" y1="110" x2="223" y2="120" stroke="var(--muted,#6d675d)" stroke-width="1.5"/>
<text x="180" y="135" text-anchor="middle" class="cap" fill="var(--muted,#6d675d)">mask = 0  (no gradient)</text>
<text x="180" y="150" text-anchor="middle" class="sub" fill="var(--muted,#6d675d)">prompt / instruction tokens</text>


<path d="M 408 100 L 408 110 L 654 110 L 654 100"
      fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
<line x1="531" y1="110" x2="531" y2="120" stroke="var(--accent2,#3b82f6)" stroke-width="1.8"/>
<text x="531" y="135" text-anchor="middle" class="cap" fill="var(--accent2,#3b82f6)">mask = 1  (gradient)</text>
<text x="531" y="150" text-anchor="middle" class="sub" fill="var(--accent2,#3b82f6)">response tokens</text>


<line x1="404" y1="74" x2="404" y2="90" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#lm-arrow)"/>
<text x="406" y="86" class="ann" fill="var(--muted,#6d675d)">loss starts here</text>


<rect x="470" y="165" width="14" height="14" rx="3"
      fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.2"/>
<text x="490" y="177" class="leg" fill="var(--muted,#6d675d)">Masked (loss weight 0)</text>

<rect x="470" y="186" width="14" height="14" rx="3"
      fill="var(--accent2,#3b82f6)" fill-opacity="0.18" stroke="var(--accent2,#3b82f6)" stroke-width="1.5"/>
<text x="490" y="198" class="leg" fill="var(--accent2,#3b82f6)">Supervised (loss weight 1)</text>

</svg>
<figcaption><b>Response-only loss masking in the SFT sequence.</b> The transformer sees one flat token sequence, but the cross-entropy loss is applied only to the assistant-response and [EOS] spans (mask = 1). Instruction tokens — [BOS], system prompt, and user turn — are masked out (mask = 0), so gradients flow only from the model's own replies, concentrating learning on reply quality rather than input reconstruction.</figcaption>
</figure>
