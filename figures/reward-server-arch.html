<text x="330" y="282" text-anchor="middle" class="lbl">How a request flows</text>

<text x="28" y="300" class="note">1. Request enters Redis queue; Router dequeues it and reads task_type.</text>
<text x="28" y="316" class="note">2. Router hashes SHA256(prompt+completion) and looks up LRU Cache.</text>
<text x="28" y="332" class="note">   Cache hit: stored scalar returned immediately, skipping all workers.</text>
<text x="28" y="348" class="note">3. Cache miss: request dispatched to matching pool (math / code / judge).</text>
<text x="28" y="364" class="note">4. Code Runner pool (x64) is the bottleneck; size = rollout_rate / worker_rps.</text>
<text x="28" y="380" class="note">5. LLM Judge calls are async, hiding API latency behind the next rollout batch.</text>
<text x="28" y="396" class="note">6. Worker results written to cache on return; training loop receives the scalar.</text>

</svg>
<figcaption><b>Internal architecture of the gRPC reward server showing request routing, caching, and parallel worker pools.</b> A Redis queue decouples ingress from computation; the Router checks an LRU cache (SHA256-keyed) before dispatching — a cache hit returns immediately and skips all workers. On a miss, requests route to one of three sized pools; the Code Runner sandbox pool (x64) is the throughput-critical path and must be sized to match rollout rate.</figcaption>
</figure>
