<figure class="viz" id="fig-ptobj-teacher-forcing-shift">
<svg viewBox="0 0 780 420" role="img" aria-label="Diagram of teacher forcing: the input lane BOS, The, cat, sat is fed to the model in parallel, each position emits a logit vector glyph, and an arrow points down to the target lane cell directly beneath it -- The, cat, sat, eos -- which is the input shifted left by one. A callout states that targets equal inputs shifted by one and all predictions are computed in one parallel pass. A bottom strip contrasts parallel training with sequential inference.">
<style>
  #fig-ptobj-teacher-forcing-shift text { fill: var(--ink-soft,#333); font: 400 12px var(--sans,sans-serif); }
  #fig-ptobj-teacher-forcing-shift .lane-lbl { font: 700 12.5px var(--sans,sans-serif); }
  #fig-ptobj-teacher-forcing-shift .cell-txt { font: 700 13px var(--mono,monospace); text-anchor: middle; }
  #fig-ptobj-teacher-forcing-shift .note { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-teacher-forcing-shift .note-r { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#666); }
  #fig-ptobj-teacher-forcing-shift .band-lbl { font: 700 10.5px var(--sans,sans-serif); fill: var(--muted,#666); letter-spacing: 0.06em; }
  #fig-ptobj-teacher-forcing-shift .headline { font: 700 13px var(--mono,monospace); text-anchor: middle; }
  #fig-ptobj-teacher-forcing-shift .strip-title { font: 700 12px var(--sans,sans-serif); }
  #fig-ptobj-teacher-forcing-shift .strip-body { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#666); }
</style>


<g data-anim="1">
  <rect x="666" y="98" width="12" height="26" fill="var(--accent,#c15b39)" opacity="0.85"/>

  <text x="682" y="119" class="note-r">token</text>
  <rect x="666" y="132" width="12" height="12" fill="var(--v-muted,#999)" opacity="0.55"/>
  <text x="682" y="142" class="note-r">other vocab</text>
</g>


<g data-anim="2">
  <text x="140" y="26" class="lane-lbl">INPUT (fed to model): x[0 .. T-1]</text>

  
  <polygon points="140,74 652,74 652,36" fill="var(--v-grid,#ccc)" opacity="0.3"/>

  <g class="cell">
    <rect x="140" y="36" width="110" height="38" rx="4" fill="none" stroke="var(--v-stroke,#555)" stroke-width="1.3"/>

  <g class="cell">
    <rect x="274" y="36" width="110" height="38" rx="4" fill="none" stroke="var(--v-stroke,#555)" stroke-width="1.3"/>

  </g>
  <g class="cell">
    <rect x="408" y="36" width="110" height="38" rx="4" fill="none" stroke="var(--v-stroke,#555)" stroke-width="1.3"/>
    <text x="463" y="60" class="cell-txt">cat</text>
  </g>
  <g class="cell">
    <rect x="542" y="36" width="110" height="38" rx="4" fill="none" stroke="var(--v-stroke,#555)" stroke-width="1.3"/>
    <text x="597" y="60" class="cell-txt">sat</text>
  </g>

  <text x="406" y="87" text-anchor="middle" class="note">Causal mask: position t may read only positions &lt;= t</text>
  <text x="406" y="99" text-anchor="middle" class="note">(see the causal-mask grid in the attention chapter)</text>
</g>


<g data-anim="3">
  <rect x="132" y="106" width="528" height="56" rx="8" fill="var(--v-fill,#eee)" opacity="0.5"/>
  <text x="144" y="120" class="band-lbl">MODEL (one parallel forward pass)</text>

  
  <g>
    <rect x="169" y="140" width="9" height="14" fill="var(--v-muted,#999)" opacity="0.55"/>
    <rect x="182" y="130" width="9" height="24" fill="var(--v-muted,#999)" opacity="0.55"/>
    <rect x="195" y="112" width="9" height="42" fill="var(--accent,#c15b39)" opacity="0.85"/>
    <rect x="208" y="136" width="9" height="18" fill="var(--v-muted,#999)" opacity="0.55"/>
  </g>
  
  <g>
    <rect x="303" y="134" width="9" height="20" fill="var(--v-muted,#999)" opacity="0.55"/>
    <rect x="316" y="116" width="9" height="38" fill="var(--accent,#c15b39)" opacity="0.85"/>
    <rect x="329" y="142" width="9" height="12" fill="var(--v-muted,#999)" opacity="0.55"/>
    <rect x="342" y="128" width="9" height="26" fill="var(--v-muted,#999)" opacity="0.55"/>
  </g>
  
  <g>
    <rect x="437" y="128" width="9" height="26" fill="var(--v-muted,#999)" opacity="0.55"/>
    <rect x="450" y="138" width="9" height="16" fill="var(--v-muted,#999)" opacity="0.55"/>
    <rect x="463" y="114" width="9" height="40" fill="var(--accent,#c15b39)" opacity="0.85"/>
    <rect x="476" y="132" width="9" height="22" fill="var(--v-muted,#999)" opacity="0.55"/>
  </g>
  
  <g>
    <rect x="571" y="118" width="9" height="36" fill="var(--accent,#c15b39)" opacity="0.85"/>
    <rect x="584" y="140" width="9" height="14" fill="var(--v-muted,#999)" opacity="0.55"/>
    <rect x="597" y="130" width="9" height="24" fill="var(--v-muted,#999)" opacity="0.55"/>
    <rect x="610" y="136" width="9" height="18" fill="var(--v-muted,#999)" opacity="0.55"/>
  </g>
</g>


<g data-anim="4">
  <defs>
    <marker id="ptfs-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--accent,#c15b39)"/>
    </marker>
  </defs>
  <line x1="195" y1="164" x2="195" y2="200" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#ptfs-arrow)"/>
  <line x1="329" y1="164" x2="329" y2="200" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#ptfs-arrow)"/>
  <line x1="463" y1="164" x2="463" y2="200" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#ptfs-arrow)"/>
  <line x1="597" y1="164" x2="597" y2="200" stroke="var(--accent,#c15b39)" stroke-width="1.8" marker-end="url(#ptfs-arrow)"/>

  <text x="666" y="178" class="note-r">position t</text>
  <text x="666" y="190" class="note-r">predicts</text>
  <text x="666" y="202" class="note-r">token t+1</text>
</g>


<g data-anim="5">
  <text x="140" y="222" class="lane-lbl">TARGET (input shifted left by one): x[1 .. T]</text>

  <rect x="140" y="230" width="110" height="38" rx="4" fill="var(--v-fill,#eee)" stroke="var(--v-stroke,#555)" stroke-width="1.3"/>
  <text x="195" y="254" class="cell-txt">The</text>
  <rect x="274" y="230" width="110" height="38" rx="4" fill="var(--v-fill,#eee)" stroke="var(--v-stroke,#555)" stroke-width="1.3"/>
  <text x="329" y="254" class="cell-txt">cat</text>
  <rect x="408" y="230" width="110" height="38" rx="4" fill="var(--v-fill,#eee)" stroke="var(--v-stroke,#555)" stroke-width="1.3"/>
  <text x="463" y="254" class="cell-txt">sat</text>
  <rect x="542" y="230" width="110" height="38" rx="4" fill="var(--v-fill,#eee)" stroke="var(--v-stroke,#555)" stroke-width="1.3"/>
  <text x="597" y="254" class="cell-txt">&lt;eos&gt;</text>

  <rect x="20" y="284" width="740" height="40" rx="8" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.3" opacity="0.85"/>
  <text x="390" y="300" class="headline">targets = inputs shifted by one</text>
  <text x="390" y="317" class="headline">all T predictions computed in ONE parallel forward pass</text>
</g>


<g data-anim="6">
  <rect x="20" y="340" width="360" height="60" rx="8" fill="var(--v-fill,#eee)" opacity="0.5"/>
  <text x="34" y="360" class="strip-title">Training (teacher forcing)</text>
  <text x="34" y="376" class="strip-body">Parallel: all positions fed ground-truth</text>
  <text x="34" y="390" class="strip-body">tokens as input in one forward pass.</text>

  <rect x="400" y="340" width="360" height="60" rx="8" fill="var(--v-fill,#eee)" opacity="0.5"/>
  <text x="414" y="360" class="strip-title">Inference</text>
  <text x="414" y="376" class="strip-body">Sequential: model feeds its OWN</text>
  <text x="414" y="390" class="strip-body">previous output back as the next input.</text>
</g>

</svg>
<figcaption><b>Teacher forcing turns next-token prediction into one parallel forward pass: every input position's logit is scored against the token one column to its right.</b> The target lane is just the input shifted left by one, so all <var>T</var> predictions are computed simultaneously from ground-truth tokens, unlike inference, which must feed each generated token back in sequentially.</figcaption>
</figure>
