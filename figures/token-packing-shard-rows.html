<figcaption><b>Rows are cut to <code>ctx_len + 1</code> tokens so one contiguous slice yields both halves of a training pair.</b> Documents are concatenated with EOS separators (which can land anywhere in a row, as row 3 shows) and sliced into fixed rows; any leftover shorter than a full row is dropped. Splitting a kept row as <code>input = row[:-1]</code> and <code>target = row[1:]</code> means the three middle tokens serve as both input and target — the target window is simply the input window shifted one position to the right.</figcaption>
</figure>
