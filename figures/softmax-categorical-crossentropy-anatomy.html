<figure class="viz" id="fig-softmax-categorical-crossentropy-anatomy">
<svg viewBox="0 0 800 560" role="img" aria-label="Anatomy of one training step: raw logits pass through softmax to become a categorical distribution over a tiny vocabulary; the loss reads off only the probability assigned to the true token as -log q(x star).">
<defs>
  <style>

      fill: var(--ink-soft,#444);
      font: 400 11.5px var(--sans,sans-serif);
    }
    #fig-softmax-categorical-crossentropy-anatomy .panel-title {
      font: 700 13px var(--sans,sans-serif);
    }
    #fig-softmax-categorical-crossentropy-anatomy .caption-sm {
      font: italic 10.5px var(--sans,sans-serif);
      fill: var(--muted,#888);
    }
    #fig-softmax-categorical-crossentropy-anatomy .tok-label {
      font: 600 11px var(--mono,monospace);
    }
    #fig-softmax-categorical-crossentropy-anatomy .val-label {
      font: 600 10.5px var(--mono,monospace);
    }
    #fig-softmax-categorical-crossentropy-anatomy .formula {
      font: 600 12px var(--mono,monospace);
    }
    #fig-softmax-categorical-crossentropy-anatomy .arrow-label {
      font: 600 11px var(--sans,sans-serif);
      fill: var(--accent,#c0392b);
    }
    #fig-softmax-categorical-crossentropy-anatomy .footer-text {
      font: 400 11px var(--sans,sans-serif);
      fill: var(--ink-soft,#444);
    }
    #fig-softmax-categorical-crossentropy-anatomy .muted-text { fill: var(--muted,#888); }
  </style>
</defs>


<g data-anim="1">
<text x="20" y="26" class="panel-title">1. logits (any real numbers)</text>
<text x="20" y="42" class="caption-sm">unbounded scores from the network</text>


<line x1="20" y1="130" x2="230" y2="130" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
<text x="14" y="134" text-anchor="end" class="val-label muted-text">0</text>




<rect x="28" y="110" width="26" height="20" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="41" y="106" text-anchor="middle" class="val-label">1</text>
<text x="41" y="146" text-anchor="middle" class="tok-label">the</text>


<rect x="66" y="130" width="26" height="0.01" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="79" y="126" text-anchor="middle" class="val-label">0</text>
<text x="79" y="146" text-anchor="middle" class="tok-label">cat</text>


<rect x="104" y="70" width="26" height="60" fill="var(--accent,#c0392b)" fill-opacity="0.65" stroke="var(--accent,#c0392b)" stroke-width="1.6"/>
<text x="117" y="66" text-anchor="middle" class="val-label" fill="var(--accent,#c0392b)">3</text>
<text x="117" y="146" text-anchor="middle" class="tok-label" fill="var(--accent,#c0392b)">sat*</text>


<rect x="142" y="130" width="26" height="20" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="155" y="164" text-anchor="middle" class="val-label">-1</text>
<text x="155" y="182" text-anchor="middle" class="tok-label">on</text>


<rect x="180" y="90" width="26" height="40" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="193" y="86" text-anchor="middle" class="val-label">2</text>
<text x="193" y="146" text-anchor="middle" class="tok-label">mat</text>


<rect x="218" y="130" width="26" height="40" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="231" y="184" text-anchor="middle" class="val-label">-2</text>
<text x="231" y="200" text-anchor="middle" class="tok-label">dog</text>

</g>


<g data-anim="2">
<path d="M 254 100 L 310 100" stroke="var(--accent,#c0392b)" stroke-width="2" marker-end="url(#arrow1)"/>
<text x="282" y="88" text-anchor="middle" class="arrow-label">softmax</text>
<text x="282" y="118" text-anchor="middle" class="formula" fill="var(--ink-soft,#444)" style="font:600 10px var(--mono,monospace)">q_k=e^z_k/sum_j e^z_j</text>
</g>


<g data-anim="3">
<text x="320" y="26" class="panel-title">2. categorical distribution q</text>
<text x="320" y="42" class="caption-sm">bars sum to 1 -- this vector IS a distribution</text>


<line x1="320" y1="200" x2="530" y2="200" stroke="var(--border-2,#ccc)" stroke-width="1.5"/>
<text x="314" y="204" text-anchor="end" class="val-label muted-text">0</text>




<rect x="328" y="185.4" width="26" height="14.6" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="341" y="181" text-anchor="middle" class="val-label" style="font:600 9.5px var(--mono,monospace)">.086</text>
<text x="341" y="216" text-anchor="middle" class="tok-label">the</text>


<rect x="366" y="194.6" width="26" height="5.4" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="379" y="190.5" text-anchor="middle" class="val-label" style="font:600 9.5px var(--mono,monospace)">.032</text>
<text x="379" y="216" text-anchor="middle" class="tok-label">cat</text>


<rect x="404" y="92.3" width="26" height="107.7" fill="var(--accent,#c0392b)" fill-opacity="0.65" stroke="var(--accent,#c0392b)" stroke-width="1.6"/>
<text x="417" y="88" text-anchor="middle" class="val-label" fill="var(--accent,#c0392b)" style="font:700 11px var(--mono,monospace)">.634</text>
<text x="417" y="216" text-anchor="middle" class="tok-label" fill="var(--accent,#c0392b)">sat*</text>


<path d="M 417 76 l 3.2 6.6 7.3 1.1 -5.3 5.1 1.25 7.3 -6.45 -3.4 -6.45 3.4 1.25 -7.3 -5.3 -5.1 7.3 -1.1 z"
      fill="var(--good,#2f9e6e)" stroke="var(--good,#2f9e6e)" stroke-width="0.6"/>


<rect x="442" y="198" width="26" height="2" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="455" y="194" text-anchor="middle" class="val-label" style="font:600 9.5px var(--mono,monospace)">.012</text>
<text x="455" y="216" text-anchor="middle" class="tok-label">on</text>


<rect x="480" y="160.4" width="26" height="39.6" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="493" y="156" text-anchor="middle" class="val-label" style="font:600 9.5px var(--mono,monospace)">.233</text>
<text x="493" y="216" text-anchor="middle" class="tok-label">mat</text>


<rect x="518" y="199.3" width="26" height="0.7" class="v-fill" fill="var(--accent2,#3b82f6)" fill-opacity="0.55" stroke="var(--accent2,#3b82f6)" stroke-width="1.2"/>
<text x="531" y="195.5" text-anchor="middle" class="val-label" style="font:600 9.5px var(--mono,monospace)">.004</text>
<text x="531" y="216" text-anchor="middle" class="tok-label">dog</text>

<text x="425" y="238" text-anchor="middle" class="formula" style="font:700 12px var(--mono,monospace)" fill="var(--ink-soft,#444)">sum = 1</text>
<text x="480" y="70" text-anchor="middle" class="caption-sm" fill="var(--good,#2f9e6e)">one-hot target x*: all mass on true token</text>

</g>


<g data-anim="4">
<path d="M 554 130 L 610 130" stroke="var(--accent,#c0392b)" stroke-width="2" marker-end="url(#arrow1)"/>
<text x="582" y="118" text-anchor="middle" class="arrow-label" style="font-size:10px">read q(sat)</text>
</g>


<g data-anim="5">
<text x="620" y="26" class="panel-title">3. loss</text>

<rect x="612" y="60" width="172" height="150" rx="10" class="v-fill" fill="var(--surface-3,#f4f4f4)" fill-opacity="0.55" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>

<text x="698" y="84" text-anchor="middle" class="formula" style="font-size:12.5px" fill="var(--accent,#c0392b)">L = -log q(x*)</text>
<text x="698" y="104" text-anchor="middle" style="font:600 10px var(--mono,monospace)" fill="var(--ink-soft,#444)">= -log(0.634)</text>
<text x="698" y="122" text-anchor="middle" style="font:700 12px var(--mono,monospace)" fill="var(--accent,#c0392b)">= 0.456 nats</text>

<line x1="626" y1="134" x2="770" y2="134" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="3 3"/>

<text x="698" y="152" text-anchor="middle" style="font:600 10px var(--mono,monospace)" fill="var(--ink-soft,#444)">-sum_k p_k log q_k</text>
<text x="698" y="168" text-anchor="middle" style="font:600 10px var(--mono,monospace)" fill="var(--ink-soft,#444)">= -log q(sat)</text>
<text x="698" y="186" text-anchor="middle" style="font:italic 10px var(--sans,sans-serif); fill:var(--ink-soft,#444)">every other term is</text>
<text x="698" y="199" text-anchor="middle" style="font:italic 10px var(--sans,sans-serif); fill:var(--ink-soft,#444)">0 * log(...) = 0</text>

</g>

<defs>
  <marker id="arrow1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="var(--accent,#c0392b)"/>
  </marker>
</defs>


<path d="M 417 200 L 417 236 L 610 236 L 610 130" fill="none" stroke="var(--accent,#c0392b)" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5"/>


<g data-anim="5">
<rect x="20" y="252" width="270" height="150" rx="8" class="v-fill" fill="var(--surface-3,#f4f4f4)" fill-opacity="0.45" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<text x="34" y="272" class="panel-title" style="font-size:12px">inset: surprisal  -log(q)  vs  q</text>


<line x1="60" y1="370" x2="270" y2="370" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
<line x1="60" y1="290" x2="60" y2="370" stroke="var(--border-2,#ccc)" stroke-width="1.2"/>
<text x="270" y="384" text-anchor="end" class="caption-sm">q -&gt; 1</text>
<text x="60" y="384" text-anchor="middle" class="caption-sm">q -&gt; 0</text>
<text x="50" y="296" text-anchor="end" class="caption-sm">high</text>
<text x="50" y="368" text-anchor="end" class="caption-sm">0</text>


<path d="M 64 296 C 90 320, 110 345, 140 358 C 170 366, 210 369.5, 268 370"
      fill="none" stroke="var(--accent,#c0392b)" stroke-width="2"/>


<circle cx="252" cy="368" r="4" fill="var(--good,#2f9e6e)"/>
<text x="252" y="356" text-anchor="middle" class="caption-sm" fill="var(--good,#2f9e6e)" style="font-size:9px">confident+right</text>
<text x="252" y="346" text-anchor="middle" class="caption-sm" fill="var(--good,#2f9e6e)" style="font-size:9px">small loss</text>


<circle cx="72" cy="308" r="4" fill="var(--accent,#c0392b)"/>
<text x="98" y="300" text-anchor="middle" class="caption-sm" fill="var(--accent,#c0392b)" style="font-size:9px">confident+wrong</text>
<text x="98" y="290" text-anchor="middle" class="caption-sm" fill="var(--accent,#c0392b)" style="font-size:9px">big loss</text>

</g>


<g>
<line x1="20" y1="418" x2="784" y2="418" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<text x="20" y="438" class="footer-text">avg over positions of  -log q(x*)  =  cross-entropy loss;   exp(that average) = perplexity = effective number of options the model chooses among.</text>
<text x="20" y="458" class="footer-text">entropy H(q) = expected surprisal = how <tspan class="muted-text">spread out</tspan> these bars are (max when uniform, 0 when one-hot).</text>
</g>


<g>
<rect x="310" y="252" width="474" height="150" rx="8" class="v-fill" fill="var(--surface-3,#f4f4f4)" fill-opacity="0.3" stroke="var(--border-2,#ccc)" stroke-width="1" stroke-dasharray="4 3"/>
<text x="324" y="274" class="panel-title" style="font-size:12px">why this matters</text>
<text x="324" y="298" class="footer-text">The softmax turns arbitrary logits into a valid probability</text>
<text x="324" y="316" class="footer-text">distribution: nonnegative, sums to 1. The one-hot target</text>
<text x="324" y="334" class="footer-text">reduces cross-entropy to a single lookup: only the probability</text>
<text x="324" y="352" class="footer-text">the model assigned to the token that actually occurred matters.</text>
<text x="324" y="376" class="footer-text" fill="var(--accent,#c0392b)">Everything else the model predicted is thrown away by the</text>
<text x="324" y="394" class="footer-text" fill="var(--accent,#c0392b)">loss at this step -- only q(x*) is read.</text>
</g>

</svg>
<figcaption><b>One training step, end to end: logits become a categorical distribution via softmax, and the loss reads off exactly one number.</b> The softmax bars sum to 1 and form the model's belief q over the vocabulary; because the true target is one-hot, cross-entropy collapses to <code>-log q(x*)</code> -- the surprisal of the single correct token. A confident-and-right prediction (tall bar) costs little; a confident-and-wrong prediction (short bar on the true token) costs a lot, exactly as the inset curve shows.</figcaption>
</figure>
