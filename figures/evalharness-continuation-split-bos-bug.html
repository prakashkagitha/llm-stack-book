<figcaption><b>Log-likelihood is summed only over the continuation tokens, so a one-token boundary shift breaks scoring without an error.</b> When a separately-encoded context already includes BOS and the code adds its own "+1 for BOS" on top, <code>ctx_len</code> overshoots by one token, the continuation slice is empty for every choice, and every log-likelihood collapses to 0.0 -- so argmax always returns choice 0 and accuracy pins at the chance floor while the run looks completely normal. Two invariants catch it immediately: the four raw log-likelihoods must be distinct and strictly negative, and because " A".." D" are single tokens, <code>acc</code> must equal <code>acc_norm</code> exactly.</figcaption>
</figure>
