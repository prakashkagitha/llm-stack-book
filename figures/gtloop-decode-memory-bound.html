<figcaption><b>Decode and training read the same weights from HBM, but get wildly different work out of that read.</b> One decode step streams all N parameters to emit a single token per sequence — tiny arithmetic intensity, bandwidth-bound, MFU in the low single digits — and repeats this L_g times. One training forward+backward reuses that same weight read across every token position in the batch — high arithmetic intensity, compute-bound, 40-55% MFU. That gap in useful work per byte, not the raw FLOP count, is why the FLOP-cheaper phase (2N vs 6N) dominates the wall clock.</figcaption>
