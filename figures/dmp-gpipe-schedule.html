<figcaption><b>GPipe all-forward-then-all-backward schedule (p=4 stages, m=4 microbatches).</b> The forward wave (purple) cascades diagonally; all four microbatch activations must remain in memory simultaneously before any backward begins. The triangular idle region (hatched) is the pipeline bubble; its fraction (p-1)/(m+p-1) shrinks by increasing m, but at the cost of storing more live activations.</figcaption>
