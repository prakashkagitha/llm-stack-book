<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 630" role="img" aria-label="Late chunking pipeline: the full document is encoded once by a Transformer Encoder so every token sees the full context, then the resulting contextualized embeddings are split into spans and mean-pooled per chunk before being stored in a vector index.">

  </marker>
  
  <linearGradient id="lca-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="var(--accent,#4f46e5)" stop-opacity="0">
      <animate attributeName="offset" values="-1;2" dur="2s" repeatCount="indefinite"/>
    </stop>
    <stop offset="30%" stop-color="var(--accent,#4f46e5)" stop-opacity="0.35">
      <animate attributeName="offset" values="-0.7;2.3" dur="2s" repeatCount="indefinite"/>

      <animate attributeName="offset" values="-0.4;2.6" dur="2s" repeatCount="indefinite"/>

  </linearGradient>
</defs>

<figcaption><b>Late chunking encodes the entire document first, then pools per chunk.</b> Unlike naive chunking, every token embedding already carries full-document context from self-attention before pooling boundaries are applied — so a pronoun like "it" gets an embedding that knows its referent. The Transformer Encoder runs exactly once; the three span/pool/chunk columns represent a partition of the same contextualized embedding sequence.</figcaption>
</figure>
