  <text x="450" y="416" text-anchor="middle" class="cap">Any scenario combines with any adaptation to produce a well-defined per-metric result.</text>

<figcaption><b>HELM's three orthogonal axes: Scenario x Adaptation → Metric.</b> Each row pairs a benchmark scenario (the task and dataset) with a prompting adaptation strategy; the combination yields one or more metric scores. Because the three axes are independent, HELM can report fine-grained per-capability results rather than a single aggregate number.</figcaption>
</figure>
