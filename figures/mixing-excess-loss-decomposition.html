<figure class="viz" id="fig-mixing-excess-loss-decomposition">
<svg viewBox="0 0 780 430" role="img" aria-label="Stacked bar chart for five domains (web, code, math, books, multilingual) showing proxy loss split into an irreducible reference floor and a closeable excess segment, with a weight indicator sized to the excess segment only. Math has a tall excess and a big weight arrow; multilingual has a tall floor but tiny excess and a small weight arrow; web has a short bar and small weight.">
<style>
  #fig-mixing-excess-loss-decomposition text { fill: var(--ink-soft,#45413a); }
  #fig-mixing-excess-loss-decomposition .dom-lbl { font: 700 13px var(--sans,sans-serif); }
  #fig-mixing-excess-loss-decomposition .sub     { font: 400 10.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-mixing-excess-loss-decomposition .note    { font: 500 10.5px var(--sans,sans-serif); }
  #fig-mixing-excess-loss-decomposition .tiny    { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-mixing-excess-loss-decomposition .wlbl    { font: 700 10.5px var(--mono,monospace); }
  #fig-mixing-excess-loss-decomposition .leg     { font: 400 10.5px var(--sans,sans-serif); }
  #fig-mixing-excess-loss-decomposition .floor-fill { fill: var(--surface-3,#eef2f7); stroke: var(--border-2,#94a3b8); }
  #fig-mixing-excess-loss-decomposition .floor-hatch { stroke: var(--muted,#6d675d); stroke-width: 1; opacity: 0.45; }
  #fig-mixing-excess-loss-decomposition .excess-fill { fill: var(--accent,#6366f1); }
  #fig-mixing-excess-loss-decomposition .excess-fill-lo { fill: var(--accent,#6366f1); fill-opacity: 0.35; }
</style>
<defs>
  <marker id="eld-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--muted,#6d675d)"/>
  </marker>
  <pattern id="eld-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="0" y2="6" class="floor-hatch"/>
  </pattern>
</defs>


<line x1="40" y1="330" x2="740" y2="330" stroke="var(--border-2,#94a3b8)" stroke-width="1.5"/>
<text x="40" y="20" class="sub">proxy's per-domain loss, split into floor + closeable excess</text>


<g data-anim="1">
  
  <rect x="70" y="278" width="70" height="52" fill="url(#eld-hatch)" class="floor-fill"/>
  <rect x="70" y="266" width="70" height="12" class="excess-fill"/>
  <text x="105" y="350" text-anchor="middle" class="dom-lbl">web</text>
  <text x="105" y="365" text-anchor="middle" class="sub">short total, small excess</text>
  
  <line x1="105" y1="255" x2="105" y2="240" stroke="var(--accent,#6366f1)" stroke-width="3" marker-end="url(#eld-arr)"/>
  <text x="105" y="230" text-anchor="middle" class="wlbl" fill="var(--accent,#6366f1)">small w</text>
  <text x="105" y="392" text-anchor="middle" class="note" fill="var(--muted,#6d675d)">easy, already learned</text>
</g>


<g data-anim="2">
  
  <rect x="205" y="245" width="70" height="85" fill="url(#eld-hatch)" class="floor-fill"/>
  <rect x="205" y="197" width="70" height="48" class="excess-fill"/>
  <text x="240" y="350" text-anchor="middle" class="dom-lbl">code</text>
  <text x="240" y="365" text-anchor="middle" class="sub">tall total, decent excess</text>
  <line x1="240" y1="186" x2="240" y2="163" stroke="var(--accent,#6366f1)" stroke-width="4.5" marker-end="url(#eld-arr)"/>
  <text x="240" y="153" text-anchor="middle" class="wlbl" fill="var(--accent,#6366f1)">medium w</text>
</g>


<g data-anim="3">
  
  <rect x="340" y="255" width="70" height="75" fill="url(#eld-hatch)" class="floor-fill"/>
  <rect x="340" y="140" width="70" height="115" class="excess-fill"/>
  <text x="375" y="350" text-anchor="middle" class="dom-lbl">math</text>
  <text x="375" y="365" text-anchor="middle" class="sub">tall total AND tall excess</text>
  <line x1="375" y1="129" x2="375" y2="90" stroke="var(--accent,#6366f1)" stroke-width="8" marker-end="url(#eld-arr)"/>
  <text x="375" y="80" text-anchor="middle" class="wlbl" fill="var(--accent,#6366f1)">BIG w</text>
  <text x="375" y="392" text-anchor="middle" class="note" fill="var(--accent,#6366f1)">genuinely hard AND far</text>
  <text x="375" y="406" text-anchor="middle" class="note" fill="var(--accent,#6366f1)">from achievable -&gt; upweight</text>
</g>


<g data-anim="4">
  
  <rect x="470" y="265" width="70" height="65" fill="url(#eld-hatch)" class="floor-fill"/>
  <rect x="470" y="240" width="70" height="25" class="excess-fill"/>
  <text x="505" y="350" text-anchor="middle" class="dom-lbl">books</text>
  <text x="505" y="365" text-anchor="middle" class="sub">medium total, small excess</text>
  <line x1="505" y1="229" x2="505" y2="212" stroke="var(--accent,#6366f1)" stroke-width="3.2" marker-end="url(#eld-arr)"/>
  <text x="505" y="202" text-anchor="middle" class="wlbl" fill="var(--accent,#6366f1)">small-med w</text>
</g>


<g data-anim="5">
  
  <rect x="605" y="222" width="70" height="108" fill="url(#eld-hatch)" class="floor-fill"/>
  <rect x="605" y="215" width="70" height="7" class="excess-fill"/>
  <text x="640" y="350" text-anchor="middle" class="dom-lbl">multilingual</text>
  <text x="640" y="365" text-anchor="middle" class="sub">tall total, tiny excess</text>
  <line x1="640" y1="204" x2="640" y2="197" stroke="var(--accent,#6366f1)" stroke-width="2" marker-end="url(#eld-arr)"/>
  <text x="640" y="187" text-anchor="middle" class="wlbl" fill="var(--accent,#6366f1)">small w</text>
  <text x="640" y="392" text-anchor="middle" class="note" fill="var(--muted,#6d675d)">hard but near-irreducible</text>
  <text x="640" y="406" text-anchor="middle" class="note" fill="var(--muted,#6d675d)">-&gt; do not waste weight</text>
</g>


<line x1="275" y1="285" x2="330" y2="30" stroke="var(--muted,#6d675d)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="332" y="27" class="leg" fill="var(--muted,#6d675d)">irreducible floor -- reference already achieves this</text>


<line x1="410" y1="185" x2="560" y2="55" stroke="var(--accent,#6366f1)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="562" y="52" class="leg" fill="var(--accent,#6366f1)">closeable headroom</text>


<g>
  <rect x="40" y="405" width="14" height="14" fill="url(#eld-hatch)" class="floor-fill"/>
  <text x="60" y="416" class="tiny">reference floor (irreducible)</text>
  <rect x="240" y="405" width="14" height="14" class="excess-fill"/>
  <text x="260" y="416" class="tiny">excess = proxy loss - reference loss (closeable)</text>
</g>

</svg>
<figcaption><b>Weight tracks the excess segment, not the whole bar.</b> Each bar is the proxy's current per-domain loss split into an irreducible reference floor (hatched) and a closeable excess above it (accent); the weight arrow beside each bar is sized to the excess alone, so math (tall bar, tall excess) earns a big weight while multilingual (equally tall bar, tiny excess) earns only a small one. Raw loss would dump weight on the tallest bar (multilingual) forever; excess loss asks where the proxy can still close the gap.</figcaption>
</figure>
