<figcaption><b>Anatomy of a topology-agnostic sharded checkpoint directory.</b> Four conceptual layers are stored: shared metadata (rank-0 only), per-rank RNG state (one tiny file each), DCP-sharded model and optimizer tensors (all ranks write in parallel), and a <code>COMPLETE</code> sentinel written atomically last. The sentinel enforces the all-or-nothing invariant: any checkpoint missing it is discarded on resume.</figcaption>
</figure>
