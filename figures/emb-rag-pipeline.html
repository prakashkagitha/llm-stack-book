<figure class="viz" id="fig-emb-rag-pipeline">
<button class="viz-replay" type="button">&#x21bb; replay</button>
<svg viewBox="0 0 480 510" role="img" aria-label="Animated RAG pipeline: a user query flows through an embedding model, ANN index, optional cross-encoder reranker, LLM context assembly, and LLM generation to produce a response.">
  <defs>
    <marker id="rag-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#78716c)"/>
    </marker>
  </defs>

  <style>
    #fig-emb-rag-pipeline text { font: 13px var(--sans,sans-serif); fill: var(--ink-soft,#1c1917); }
    #fig-emb-rag-pipeline .lbl  { font: 600 13px var(--sans,sans-serif); fill: var(--ink-soft,#1c1917); }
    #fig-emb-rag-pipeline .note { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#78716c); }
    #fig-emb-rag-pipeline .ann  { font: 500 10px var(--mono,monospace); fill: var(--muted,#78716c); }

    /* per-stage highlight: momentarily brighten stroke as the marker passes */
    @keyframes hl-s1 {
      0%,100% { stroke: var(--accent,#6366f1); stroke-width:1.4; }
      8%,92%  { stroke: var(--border-2,#d6d3d1); stroke-width:1.4; }
    }
    @keyframes hl-s2 {
      0%,13%,100% { stroke: var(--border-2,#d6d3d1); stroke-width:1.4; }
      18%,22%     { stroke: var(--accent,#6366f1); stroke-width:2.2; }
    }
    @keyframes hl-s3 {
      0%,31%,100% { stroke: var(--border-2,#d6d3d1); stroke-width:1.4; }
      36%,40%     { stroke: var(--accent,#6366f1); stroke-width:2.2; }
    }
    @keyframes hl-s4 {
      0%,49%,100% { stroke: var(--border-2,#d6d3d1); stroke-width:1.4; }
      54%,58%     { stroke: var(--accent,#6366f1); stroke-width:2.2; }
    }
    @keyframes hl-s5 {
      0%,65%,100% { stroke: var(--border-2,#d6d3d1); stroke-width:1.4; }
      70%,74%     { stroke: var(--accent,#6366f1); stroke-width:2.2; }
    }
    @keyframes hl-s6 {
      0%,81%,100% { stroke: var(--border-2,#d6d3d1); stroke-width:1.4; }
      86%,90%     { stroke: var(--accent,#6366f1); stroke-width:2.2; }
    }

    #fig-emb-rag-pipeline .s1-box { animation: hl-s1 6s ease-in-out 0.3s infinite; }
    #fig-emb-rag-pipeline .s2-box { animation: hl-s2 6s ease-in-out 0.3s infinite; }
    #fig-emb-rag-pipeline .s3-box { animation: hl-s3 6s ease-in-out 0.3s infinite; }
    #fig-emb-rag-pipeline .s4-box { animation: hl-s4 6s ease-in-out 0.3s infinite; }
    #fig-emb-rag-pipeline .s5-box { animation: hl-s5 6s ease-in-out 0.3s infinite; }
    #fig-emb-rag-pipeline .s6-box { animation: hl-s6 6s ease-in-out 0.3s infinite; }

    /* traveling dot */
    @keyframes rag-travel {
      0%   { transform: translateY(0px);   opacity: 0; }
      5%   { opacity: 1; }
      14%  { transform: translateY(68px);  opacity: 1; }
      19%  { transform: translateY(130px); opacity: 1; }
      35%  { transform: translateY(196px); opacity: 1; }
      50%  { transform: translateY(272px); opacity: 1; }
      66%  { transform: translateY(352px); opacity: 1; }
      82%  { transform: translateY(432px); opacity: 1; }
      93%  { transform: translateY(500px); opacity: 1; }
      95%  { transform: translateY(500px); opacity: 0; }
      100% { transform: translateY(0px);   opacity: 0; }
    }

    #fig-emb-rag-pipeline #rag-dot {
      animation: rag-travel 6s ease-in-out 0.3s infinite;
      cx: 240; cy: 24;
    }

    @media (prefers-reduced-motion: reduce) {
      #fig-emb-rag-pipeline .s1-box,
      #fig-emb-rag-pipeline .s2-box,
      #fig-emb-rag-pipeline .s3-box,
      #fig-emb-rag-pipeline .s4-box,
      #fig-emb-rag-pipeline .s5-box,
      #fig-emb-rag-pipeline .s6-box { animation: none !important; stroke: var(--border-2,#d6d3d1); stroke-width:1.4; }
      #fig-emb-rag-pipeline #rag-dot { display: none; }
    }
  </style>

  
  <rect x="148" y="16" width="184" height="36" rx="18" class="s1-box" fill="var(--accent,#6366f1)" fill-opacity="0.15" stroke="var(--accent,#6366f1)" stroke-width="1.4"/>
  <text x="240" y="39" text-anchor="middle" class="lbl">User Query</text>

  
  <line x1="240" y1="52" x2="240" y2="78" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#rag-arrow)"/>

  
  <rect x="140" y="78" width="200" height="40" rx="8" class="s2-box" fill="var(--surface,#f5f5f4)" stroke="var(--border-2,#d6d3d1)" stroke-width="1.4"/>
  <text x="240" y="103" text-anchor="middle" class="lbl">[Embedding Model]</text>

  
  <line x1="240" y1="118" x2="240" y2="148" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#rag-arrow)"/>
  <text x="350" y="136" text-anchor="middle" class="ann">e_q in R^d</text>

  
  <rect x="70" y="148" width="340" height="40" rx="8" class="s3-box" fill="var(--surface,#f5f5f4)" stroke="var(--border-2,#d6d3d1)" stroke-width="1.4"/>
  <text x="240" y="173" text-anchor="middle" class="lbl">[ANN Index (FAISS / Milvus / Qdrant)]</text>

  
  <line x1="240" y1="188" x2="240" y2="218" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#rag-arrow)"/>
  <text x="350" y="207" text-anchor="middle" class="ann">top-k IDs + scores</text>

  
  <rect x="90" y="218" width="300" height="64" rx="8" class="s4-box" fill="var(--surface,#f5f5f4)" stroke="var(--border-2,#d6d3d1)" stroke-width="1.4" stroke-dasharray="6 3"/>
  <text x="240" y="243" text-anchor="middle" class="lbl">[Optional Reranker (Cross-Encoder)]</text>
  <text x="240" y="261" text-anchor="middle" class="note" style="font-style:italic">dashed box = optional step</text>

  
  <line x1="240" y1="282" x2="240" y2="306" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#rag-arrow)"/>
  <text x="350" y="296" text-anchor="middle" class="ann">reordered top-k</text>

  
  <rect x="100" y="306" width="280" height="62" rx="8" class="s5-box" fill="var(--surface,#f5f5f4)" stroke="var(--border-2,#d6d3d1)" stroke-width="1.4"/>
  <text x="240" y="328" text-anchor="middle" class="lbl">[LLM Context Assembly]</text>
  <text x="240" y="347" text-anchor="middle" class="note">prompt = system + retrieved_docs</text>
  <text x="240" y="361" text-anchor="middle" class="note">+ user_query</text>

  
  <line x1="240" y1="368" x2="240" y2="396" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#rag-arrow)"/>
  <text x="350" y="384" text-anchor="middle" class="ann">assembled prompt</text>

  
  <rect x="130" y="396" width="220" height="40" rx="8" class="s6-box" fill="var(--accent,#6366f1)" fill-opacity="0.12" stroke="var(--accent,#6366f1)" stroke-width="1.8"/>
  <text x="240" y="421" text-anchor="middle" class="lbl">[LLM Generation]</text>

  
  <line x1="240" y1="436" x2="240" y2="462" stroke="var(--ink-soft,#78716c)" stroke-width="1.4" marker-end="url(#rag-arrow)"/>

  
  <rect x="148" y="462" width="184" height="36" rx="18" fill="var(--accent,#6366f1)" stroke="var(--accent,#6366f1)" stroke-width="1.5"/>
  <text x="240" y="485" text-anchor="middle" style="font:700 13px var(--sans,sans-serif); fill:#ffffff;">Response</text>

  
  <circle id="rag-dot" r="6" fill="var(--accent,#6366f1)" opacity="0"/>
</svg>
<figcaption><b>The RAG pipeline converts a user query into a grounded response through five sequential stages.</b> The query is embedded into a dense vector (<code>e_q in R^d</code>), an ANN index retrieves the top-k nearest document chunks, an optional cross-encoder reranker reorders them, the context assembler formats them into a prompt, and the LLM generates the final answer. The animated marker traces the data flow in order; the dashed reranker box signals an optional component.</figcaption>
</figure>
