<figcaption><b>DDP bucketed overlap: backward compute and all-reduce run concurrently.</b> Gradients become ready in reverse layer order (L12 first, L0 last). As each ~25 MB bucket fills it immediately fires an async NCCL all-reduce while the GPU keeps computing earlier-layer gradients. Only the <b>final bucket D's</b> all-reduce is exposed past the end of backward compute — all others are hidden behind it for free.</figcaption>
