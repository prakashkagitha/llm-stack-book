<figure class="viz" id="fig-privacy-memorization-scaling">
<svg viewBox="0 0 720 460" role="img" aria-label="Line chart showing extractable fraction of training data rising with duplication count on a log scale, with a larger model curve consistently above a smaller model curve and the gap widening at higher duplication.">
  <defs>
    <marker id="pms-arrow-up" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 10 L5 0 L10 10 z" fill="var(--ink-soft,#888)" class="v-muted"/>
    </marker>
    <marker id="pms-arrow-right" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#888)" class="v-muted"/>
    </marker>
    <clipPath id="pms-plot-clip">
      <rect x="110" y="60" width="540" height="320"/>
    </clipPath>
  </defs>
  <style>
    #fig-privacy-memorization-scaling .axis-title {
      font: 400 13px var(--sans,sans-serif);
      fill: var(--muted,#888);
    }
    #fig-privacy-memorization-scaling .tick-label {
      font: 400 12px var(--mono,monospace);
      fill: var(--muted,#888);
    }
    #fig-privacy-memorization-scaling .curve-label {
      font: 700 13px var(--sans,sans-serif);
    }
    #fig-privacy-memorization-scaling .annotation {
      font: 400 11px var(--sans,sans-serif);
      fill: var(--muted,#888);
    }
  </style>

  
  
  <line x1="110" y1="380" x2="110" y2="65" stroke="var(--ink-soft,#888)" stroke-width="1.5" class="v-stroke" marker-end="url(#pms-arrow-up)"/>
  
  <line x1="110" y1="380" x2="645" y2="380" stroke="var(--ink-soft,#888)" stroke-width="1.5" class="v-stroke" marker-end="url(#pms-arrow-right)"/>

  
  <text x="28" y="220" text-anchor="middle" transform="rotate(-90,28,220)" class="axis-title">extractable fraction</text>

  
  <text x="380" y="440" text-anchor="middle" class="axis-title">duplication count (log scale)</text>

  
  
  <line x1="170" y1="380" x2="170" y2="385" stroke="var(--ink-soft,#888)" stroke-width="1.2" class="v-stroke"/>

  <line x1="410" y1="380" x2="410" y2="385" stroke="var(--ink-soft,#888)" stroke-width="1.2" class="v-stroke"/>
  <text x="410" y="398" text-anchor="middle" class="tick-label">100×</text>
  
  <line x1="530" y1="380" x2="530" y2="385" stroke="var(--ink-soft,#888)" stroke-width="1.2" class="v-stroke"/>
  <text x="530" y="398" text-anchor="middle" class="tick-label">1000×</text>

  
  <path d="M150,352 C220,320 290,300 410,210 C480,165 570,130 640,95

  <path d="M150,355 C200,345 260,335 290,330 C350,318 390,305 410,290 C450,272 500,258 530,250 C580,242 620,238 640,235"

  <path d="M150,352 C200,338 260,318 290,300 C350,272 390,240 410,210 C450,180 500,148 530,120 C570,103 615,96 640,95"

        clip-path="url(#pms-plot-clip)"/>

  
  
  <text x="556" y="80" text-anchor="start" class="curve-label" fill="var(--accent,#c15b39)">larger model</text>

  
  <text x="556" y="258" text-anchor="start" class="curve-label" fill="var(--accent2,#3b82f6)">smaller model</text>

  
  <text x="320" y="252" text-anchor="middle" class="annotation">gap = extra</text>
  <text x="320" y="266" text-anchor="middle" class="annotation">memorization from scale</text>

<figcaption><b>Extractable memorization scales with both duplication and model size.</b> Both curves rise with duplication count on a log scale, confirming that deduplication is the highest-ROI privacy intervention. Larger models memorize more at every duplication level, and the gap between the two curves widens as duplication grows — meaning scale amplifies the duplication effect.</figcaption>
</figure>
