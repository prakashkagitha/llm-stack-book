<figcaption><b>One buffer, four ways of reading it.</b> A tensor is just <code>(shape, stride, offset)</code> layered on top of a flat storage buffer: <code>reshape</code>, <code>.T</code>, and slicing move zero data because they only change that metadata, and <code>expand</code> reuses the same elements via a zero stride. Only <code>.contiguous()</code> actually copies.</figcaption>
</figure>
