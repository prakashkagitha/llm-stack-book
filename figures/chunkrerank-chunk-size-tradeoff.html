<figure class="viz" id="fig-chunkrerank-chunk-size-tradeoff">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 545" role="img" aria-label="Chunk size trade-off illustrated with one running example, Q4 revenue hit a record, it increased by 12 percent. A too-small chunk isolates the key sentence and loses its referent; a sweet-spot chunk keeps both sentences together; a too-large chunk buries the key sentence among unrelated filler lines. Below, a line chart shows precision falling and recall or context sufficiency rising as chunk size grows, crossing in a domain-dependent optimal band.">
<defs>
  <marker id="cst-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft)"/>
  </marker>
</defs>

<style>
  #fig-chunkrerank-chunk-size-tradeoff text { fill: var(--ink-soft); }
  #fig-chunkrerank-chunk-size-tradeoff .hdr { font: 700 13.5px var(--sans,sans-serif); }
  #fig-chunkrerank-chunk-size-tradeoff .lbl-sm { font: 600 10.5px var(--sans,sans-serif); }
  #fig-chunkrerank-chunk-size-tradeoff .lbl-xs { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted); }
  #fig-chunkrerank-chunk-size-tradeoff .mono { font: 600 12px var(--mono,monospace); }
  #fig-chunkrerank-chunk-size-tradeoff .callout { font: 600 9.5px var(--sans,sans-serif); }
  #fig-chunkrerank-chunk-size-tradeoff .pill-lbl { font: 700 9.5px var(--sans,sans-serif); }
  #fig-chunkrerank-chunk-size-tradeoff .axis-lbl { font: 700 11px var(--sans,sans-serif); fill: var(--muted); }
  #fig-chunkrerank-chunk-size-tradeoff .tick { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted); }
</style>


<g data-anim="1">
  <rect x="20" y="24" width="230" height="242" rx="10" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="135" y="46" text-anchor="middle" class="hdr">Too small</text>

  
  <rect x="28" y="70" width="194" height="54" rx="6" fill="none" class="v-stroke" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="42" y="102" class="mono" style="font-size:12px">
    <tspan x="42">It</tspan>
    <tspan x="66">increased</tspan>
    <tspan x="140">by</tspan>
    <tspan x="164">12%.</tspan>
  </text>
  
  <ellipse cx="49" cy="98" rx="13" ry="10" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
  
  <ellipse cx="175" cy="98" rx="15" ry="10" fill="none" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>

  
  <text x="135" y="140" text-anchor="middle" class="callout" style="fill:var(--warn,#e0a106)">referent lost --</text>
  <text x="135" y="153" text-anchor="middle" class="callout" style="fill:var(--warn,#e0a106)">12% of what?</text>

  
  <g>
    <rect x="30" y="188" width="95" height="22" rx="11" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
    <text x="77.5" y="202.5" text-anchor="middle" class="pill-lbl" style="fill:var(--good,#2f9e6e)">precision HIGH</text>
    <rect x="133" y="188" width="97" height="22" rx="11" fill="var(--warn,#e0a106)" fill-opacity="0.15" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <text x="181.5" y="202.5" text-anchor="middle" class="pill-lbl" style="fill:var(--warn,#e0a106)">context LOST</text>
  </g>
  <text x="135" y="234" text-anchor="middle" class="lbl-xs">single isolated sentence</text>
  <text x="135" y="248" text-anchor="middle" class="lbl-xs">no surrounding context</text>
</g>


<g data-anim="2">
  <rect x="270" y="24" width="230" height="242" rx="10" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="385" y="46" text-anchor="middle" class="hdr">Sweet spot</text>

  <rect x="288" y="66" width="194" height="76" rx="6" fill="none" class="v-stroke" stroke-width="1.3"/>
  <text x="298" y="90" class="lbl-sm" style="font-size:10.5px; font-weight:500;">Q4 revenue hit a record.</text>
  <rect x="294" y="100" width="182" height="22" rx="4" fill="var(--accent,#4f46e5)" fill-opacity="0.15"/>
  <text x="298" y="115" class="mono" style="font-size:11px; fill:var(--accent,#4f46e5)">It increased by 12%.</text>

  
  <circle cx="462" cy="52" r="12" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
  <path d="M456 52 L460 57 L468 47" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="385" y="163" text-anchor="middle" class="lbl-xs">referent + key sentence, together</text>

  <text x="385" y="197" text-anchor="middle" class="callout" style="fill:var(--good,#2f9e6e)">both signals present</text>
  <text x="385" y="211" text-anchor="middle" class="callout" style="fill:var(--good,#2f9e6e)">(domain-dependent)</text>

  <text x="385" y="234" text-anchor="middle" class="lbl-xs">precision and context balanced</text>
  <text x="385" y="248" text-anchor="middle" class="lbl-xs">-- the target to tune toward</text>
</g>


<g data-anim="3">
  <rect x="520" y="24" width="230" height="242" rx="10" class="v-fill v-stroke" stroke-width="1.5"/>
  <text x="635" y="46" text-anchor="middle" class="hdr">Too large</text>

  <rect x="538" y="64" width="194" height="86" rx="6" fill="none" class="v-stroke" stroke-width="1.3"/>
  
  <rect x="548" y="72" width="150" height="7" rx="3" fill="var(--muted)" opacity="0.35"/>
  <rect x="548" y="84" width="170" height="7" rx="3" fill="var(--muted)" opacity="0.35"/>
  
  <rect x="546" y="96" width="178" height="16" rx="4" fill="var(--accent,#4f46e5)" fill-opacity="0.18"/>
  <text x="551" y="107.5" class="mono" style="font-size:9px; fill:var(--accent,#4f46e5); font-weight:700;">It increased by 12%.</text>
  <rect x="548" y="118" width="130" height="7" rx="3" fill="var(--muted)" opacity="0.35"/>
  <rect x="548" y="130" width="165" height="7" rx="3" fill="var(--muted)" opacity="0.35"/>
  <rect x="548" y="142" width="145" height="7" rx="3" fill="var(--muted)" opacity="0.35"/>

  <text x="635" y="163" text-anchor="middle" class="lbl-xs">1 signal line among ~5 filler lines</text>

  <text x="635" y="197" text-anchor="middle" class="callout" style="fill:var(--warn,#e0a106)">signal buried in noise --</text>
  <text x="635" y="211" text-anchor="middle" class="callout" style="fill:var(--warn,#e0a106)">LLM may ignore or hallucinate</text>

  <g>
    <rect x="530" y="228" width="95" height="22" rx="11" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1.2"/>
    <text x="577.5" y="242.5" text-anchor="middle" class="pill-lbl" style="fill:var(--good,#2f9e6e)">recall HIGH</text>
    <rect x="633" y="228" width="97" height="22" rx="11" fill="var(--warn,#e0a106)" fill-opacity="0.15" stroke="var(--warn,#e0a106)" stroke-width="1.2"/>
    <text x="681.5" y="242.5" text-anchor="middle" class="pill-lbl" style="fill:var(--warn,#e0a106)">precision LOW</text>
  </g>
</g>


<g data-anim="4">
  <text x="390" y="285" text-anchor="middle" class="axis-lbl">chunk size</text>
  <line x1="40" y1="292" x2="740" y2="292" stroke="var(--ink-soft)" stroke-width="1.5" marker-end="url(#cst-arr)"/>
  <text x="44" y="307" class="tick">small</text>
  <text x="736" y="307" text-anchor="end" class="tick">large</text>
</g>


<g data-anim="5">
  
  <rect x="270" y="322" width="230" height="158" fill="var(--accent,#4f46e5)" fill-opacity="0.08"/>
  <line x1="270" y1="322" x2="270" y2="480" stroke="var(--accent,#4f46e5)" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="500" y1="322" x2="500" y2="480" stroke="var(--accent,#4f46e5)" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  
  <line x1="70" y1="480" x2="740" y2="480" stroke="var(--ink-soft)" stroke-width="1.5" marker-end="url(#cst-arr)"/>
  <line x1="70" y1="480" x2="70" y2="322" stroke="var(--ink-soft)" stroke-width="1.5" marker-end="url(#cst-arr)"/>

  
  <path d="M70,375 C220,375 300,426 385,426 C470,426 560,478 740,478"
    fill="none" stroke="var(--accent,#4f46e5)" stroke-width="2.5" stroke-linecap="round"/>

  
  <path d="M70,478 C220,478 300,426 385,426 C470,426 560,375 740,375"
    fill="none" stroke="var(--accent-2)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 4"/>

  
  <circle cx="385" cy="426" r="4" class="v-fill" stroke="var(--ink-soft)" stroke-width="1.5"/>

  
  <text x="385" y="335" text-anchor="middle" class="lbl-sm" style="font-size:10px; fill:var(--accent,#4f46e5)">optimal band is</text>
  <text x="385" y="347" text-anchor="middle" class="lbl-sm" style="font-size:10px; fill:var(--accent,#4f46e5)">domain-dependent</text>

  
  <line x1="82" y1="446" x2="104" y2="446" stroke="var(--accent,#4f46e5)" stroke-width="2.5"/>
  <text x="110" y="450" class="lbl-xs" style="fill:var(--ink-soft)">precision</text>
  <line x1="82" y1="461" x2="104" y2="461" stroke="var(--accent-2)" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="110" y="465" class="lbl-xs" style="fill:var(--ink-soft)">recall / context sufficiency</text>

  
  <text x="75" y="497" class="tick">small</text>
  <text x="735" y="497" text-anchor="end" class="tick">large</text>
</g>

</svg>
<figcaption><b>Chunk size trades precision against recall/context, with a domain-dependent sweet spot.</b> The same key sentence, "It increased by 12%", loses its referent when isolated in a too-small chunk, sits together with its referent in a well-sized chunk, and gets buried among unrelated filler lines in a too-large chunk. As chunk size grows, precision falls while recall/context sufficiency rises; the two curves cross in a band where both signals are usable, but the exact optimal size still depends on the domain.</figcaption>
</figure>
