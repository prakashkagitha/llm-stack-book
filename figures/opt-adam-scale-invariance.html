<figure class="viz" id="fig-opt-adam-scale-invariance">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 480" role="img" aria-label="Four example coordinates with gradient magnitudes spanning three orders of magnitude produce wildly uneven SGD steps under one global learning rate, but after Adam divides each coordinate by its own running gradient magnitude sqrt(v-hat), all four updates land at roughly the same unit height.">
<style>
  #fig-opt-adam-scale-invariance text        { fill: var(--ink-soft,#45413a); }
  #fig-opt-adam-scale-invariance .ttl        { font: 700 15px var(--sans,sans-serif); fill: currentColor; }
  #fig-opt-adam-scale-invariance .sub        { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-opt-adam-scale-invariance .hdr        { font: 700 12px var(--sans,sans-serif); fill: currentColor; }
  #fig-opt-adam-scale-invariance .lbl        { font: 600 9.5px var(--sans,sans-serif); }
  #fig-opt-adam-scale-invariance .small      { font: 500 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-opt-adam-scale-invariance .mono       { font: 700 10.5px var(--mono,monospace); }
  #fig-opt-adam-scale-invariance .val        { font: 700 9.5px var(--mono,monospace); }
  #fig-opt-adam-scale-invariance .axis       { stroke: var(--border-2,#d8d1c0); stroke-width: 1.3; }
  #fig-opt-adam-scale-invariance .refline    { stroke: var(--muted,#6d675d); stroke-width: 1; stroke-dasharray: 4 3; }
  #fig-opt-adam-scale-invariance .accline    { stroke: var(--accent,#c15b39); stroke-width: 1.4; stroke-dasharray: 4 3; }
  #fig-opt-adam-scale-invariance .bar        { fill: var(--surface-3,#ece7da); stroke: var(--muted,#6d675d); stroke-width: 1; }
  #fig-opt-adam-scale-invariance .abar       { fill: var(--accent,#c15b39); fill-opacity: 0.85; stroke: var(--accent,#c15b39); stroke-width: 1.2; }
  #fig-opt-adam-scale-invariance .divop      { fill: var(--surface,#fff); stroke: var(--muted,#6d675d); stroke-width: 1.2; }
</style>

<text x="18" y="24" class="ttl">Adam turns wildly different gradient scales into uniform steps</text>
<text x="18" y="41" class="sub">Illustrative magnitudes only. Four coordinates, three orders of magnitude apart, all end up ~unit-size after Adam's per-coordinate rescaling.</text>

<g data-anim="1">
  <text x="18" y="66" class="hdr">Raw gradient g (per-coordinate)</text>
  <line class="refline" x1="60" y1="80" x2="230" y2="80"/>
  <text x="64" y="76" class="small">one global learning rate, eta</text>

  <line class="axis" x1="60" y1="240" x2="230" y2="240"/>
  <rect class="bar" x="70"  y="239" width="26" height="1"/>
  <rect class="bar" x="70"  y="236" width="26" height="4"/>
  <rect class="bar" x="118" y="196" width="26" height="44"/>
  <rect class="bar" x="166" y="140" width="26" height="100"/>
  <rect class="bar" x="200" y="88"  width="26" height="152"/>

  <line x1="83"  y1="80" x2="83"  y2="236" class="refline"/>
  <line x1="213" y1="80" x2="213" y2="88"  class="refline"/>

  <text x="83"  y="252" text-anchor="middle" class="small">~1e-4</text>
  <text x="131" y="252" text-anchor="middle" class="small">~1e-2</text>
  <text x="179" y="252" text-anchor="middle" class="small">~1e-1</text>
  <text x="213" y="252" text-anchor="middle" class="small">~1e0</text>

  <text x="83"  y="266" text-anchor="middle" class="small" font-size="8">embed row</text>
  <text x="83"  y="276" text-anchor="middle" class="small" font-size="8">(rare tok)</text>
  <text x="131" y="266" text-anchor="middle" class="small" font-size="8">LayerNorm</text>
  <text x="131" y="276" text-anchor="middle" class="small" font-size="8">gain</text>
  <text x="179" y="266" text-anchor="middle" class="small" font-size="8">attention</text>
  <text x="179" y="276" text-anchor="middle" class="small" font-size="8">proj</text>
  <text x="213" y="266" text-anchor="middle" class="small" font-size="8">MLP</text>
  <text x="213" y="276" text-anchor="middle" class="small" font-size="8">proj</text>

  <text x="60" y="304" class="small">eta x g: a tiny step here...</text>
  <text x="60" y="318" class="small" font-weight="700">...and a huge step here (right bar)</text>
  <text x="18" y="340" class="lbl">one LR cannot serve all: SGD zig-zags</text>
</g>

<defs>
  <marker id="arrow1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="var(--muted,#6d675d)"/>
  </marker>
</defs>

<g data-anim="2">
  <text x="269" y="140" text-anchor="middle" class="small">divide each</text>
  <text x="269" y="151" text-anchor="middle" class="small">coordinate by</text>
  <text x="269" y="162" text-anchor="middle" class="small">its OWN</text>
  <rect class="divop" x="248" y="170" width="42" height="17" rx="3"/>
  <text x="269" y="182" text-anchor="middle" class="mono" font-size="8.5">sqrt(v_hat)</text>
  <text x="269" y="202" text-anchor="middle" class="small">(running grad</text>
  <text x="269" y="212" text-anchor="middle" class="small">magnitude)</text>
  <line x1="248" y1="230" x2="290" y2="230" stroke="var(--muted,#6d675d)" stroke-width="1.6" marker-end="url(#arrow1)"/>
</g>

<g data-anim="3">
  <text x="310" y="66" class="hdr">Adam step m_hat / sqrt(v_hat)</text>
  <line class="accline" x1="330" y1="80" x2="500" y2="80"/>
  <text x="504" y="83" class="small" fill="var(--accent,#c15b39)">approx eta (unit step)</text>

  <line class="axis" x1="330" y1="240" x2="500" y2="240"/>
  <rect class="abar" x="340" y="176" width="26" height="64"/>
  <rect class="abar" x="388" y="174" width="26" height="66"/>
  <rect class="abar" x="436" y="178" width="26" height="62"/>
  <rect class="abar" x="470" y="180" width="26" height="60"/>

  <text x="353" y="252" text-anchor="middle" class="small">~1e-4</text>
  <text x="401" y="252" text-anchor="middle" class="small">~1e-2</text>
  <text x="449" y="252" text-anchor="middle" class="small">~1e-1</text>
  <text x="483" y="252" text-anchor="middle" class="small">~1e0</text>

  <text x="353" y="266" text-anchor="middle" class="small" font-size="8">embed row</text>
  <text x="401" y="266" text-anchor="middle" class="small" font-size="8">LayerNorm</text>
  <text x="449" y="266" text-anchor="middle" class="small" font-size="8">attn proj</text>
  <text x="483" y="266" text-anchor="middle" class="small" font-size="8">MLP proj</text>

  <text x="330" y="304" class="small" font-weight="700" fill="var(--accent,#c15b39)">each divided by its own sqrt(v_hat)</text>
  <text x="330" y="318" class="lbl" fill="var(--accent,#c15b39)">all four coordinates land at ~equal height</text>
</g>

<g data-anim="4">
  <rect x="18" y="368" width="744" height="90" rx="8" fill="var(--surface-3,#ece7da)" fill-opacity="0.4" stroke="var(--border-2,#d8d1c0)" stroke-width="1.1"/>
  <text x="34" y="390" class="hdr">Big takeaway</text>
  <text x="34" y="410" class="small" font-size="10.5">For a consistent-gradient coordinate, m_hat approx sqrt(v_hat), so the update magnitude is approx eta --</text>
  <text x="34" y="428" class="small" font-size="10.5">a step of <tspan font-weight="700" fill="var(--accent,#c15b39)">roughly unit size in every coordinate</tspan>, independent of the gradient's raw scale.</text>
  <text x="34" y="446" class="small" font-size="10.5">That is Adam's scale-invariance: change the loss scaling and the effective step is unchanged.</text>
</g>

</svg>
<figcaption><b>Adam divides each coordinate by its own running gradient magnitude, so a single learning rate produces a roughly uniform step everywhere.</b> Four illustrative coordinates start three orders of magnitude apart under SGD (a rare embedding row barely moves while an MLP projection lurches); after Adam's <code>m_hat / sqrt(v_hat)</code> rescaling, all four land near the same <code>~eta</code> height, which is exactly the scale-invariance that lets one global learning rate work across a transformer's wildly heterogeneous parameters.</figcaption>
</figure>
