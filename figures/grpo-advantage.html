<figure class="viz" id="fig-grpo-advantage">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 800 432" role="img" aria-label="GRPO advantage: one prompt is sampled into a group of four responses, each scored by a reward; the group mean is the baseline, and each advantage is the reward minus that mean, divided by the group standard deviation - no value network.">
  <defs>
    <marker id="ga-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-grpo-advantage text{ fill:var(--ink-soft); }
    #fig-grpo-advantage .lbl{ font:600 13px var(--sans,sans-serif); }
    #fig-grpo-advantage .sm{ font:500 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-grpo-advantage .mono{ font:600 12px var(--mono,monospace); }
    #fig-grpo-advantage .monos{ font:500 10.5px var(--mono,monospace); fill:var(--muted); }
    #fig-grpo-advantage .head{ font:700 13px var(--sans,sans-serif); }
    #fig-grpo-advantage .op{ font:600 16px var(--serif,serif); }
  </style>


  <g data-anim="1">
    <rect x="14" y="150" width="92" height="56" rx="8" class="v-fill v-accent-s" stroke-width="1.6"/>
    <text x="60" y="176" text-anchor="middle" class="lbl" fill="var(--accent)">prompt q</text>
    <text x="60" y="194" text-anchor="middle" class="sm">17 + 26 = ?</text>
    <text x="60" y="226" text-anchor="middle" class="sm">sample G = 4</text>
    <text x="60" y="240" text-anchor="middle" class="sm">from π<tspan dy="2" font-size="8">old</tspan></text>

    <g class="v-muted" stroke="currentColor" stroke-width="1.3">
      <line x1="108" y1="172" x2="156" y2="76"  marker-end="url(#ga-arrow)"/>
      <line x1="108" y1="176" x2="156" y2="148" marker-end="url(#ga-arrow)"/>
      <line x1="108" y1="182" x2="156" y2="220" marker-end="url(#ga-arrow)"/>
      <line x1="108" y1="186" x2="156" y2="292" marker-end="url(#ga-arrow)"/>
    </g>
  </g>



  <g data-anim="2">
    <text x="226" y="32" text-anchor="middle" class="head">group of responses</text>
    <text x="384" y="32" text-anchor="middle" class="head">reward R<tspan dy="2" font-size="9">i</tspan></text>


    <rect x="160" y="44" width="132" height="36" rx="7" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
    <text x="172" y="62" class="mono">o₁</text>
    <text x="172" y="75" class="monos" textLength="104" lengthAdjust="spacingAndGlyphs">…&lt;answer&gt;43&lt;/answer&gt;</text>
    <circle cx="300" cy="61" r="6" fill="var(--good,#2f9e6e)"/>
    <path d="M297 61.3 L299.6 64 L303.4 58.2" stroke="var(--surface,#fff)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="311" y="66" class="sm" fill="var(--good,#2f9e6e)">correct</text>
    <rect x="364" y="48" width="44" height="28" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="386" y="67" text-anchor="middle" class="mono">1.2</text>


    <rect x="160" y="116" width="132" height="36" rx="7" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="172" y="134" class="mono">o₂</text>
    <text x="172" y="147" class="monos" textLength="104" lengthAdjust="spacingAndGlyphs">…&lt;answer&gt;41&lt;/answer&gt;</text>
    <circle cx="300" cy="133" r="6" fill="var(--warn,#e0a106)"/>
    <path d="M297.2 130.2 L302.8 135.8 M302.8 130.2 L297.2 135.8" stroke="var(--surface,#fff)" stroke-width="1.5" stroke-linecap="round"/>
    <text x="311" y="138" class="sm" fill="var(--warn,#e0a106)">wrong</text>
    <rect x="364" y="120" width="44" height="28" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="386" y="139" text-anchor="middle" class="mono">0.2</text>


    <rect x="160" y="188" width="132" height="36" rx="7" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.5"/>
    <text x="172" y="206" class="mono">o₃</text>
    <text x="172" y="219" class="monos" textLength="104" lengthAdjust="spacingAndGlyphs">…&lt;answer&gt;43&lt;/answer&gt;</text>
    <circle cx="300" cy="205" r="6" fill="var(--good,#2f9e6e)"/>
    <path d="M297 205.3 L299.6 208 L303.4 202.2" stroke="var(--surface,#fff)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="311" y="210" class="sm" fill="var(--good,#2f9e6e)">correct</text>
    <rect x="364" y="192" width="44" height="28" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="386" y="211" text-anchor="middle" class="mono">1.2</text>


    <rect x="160" y="260" width="132" height="36" rx="7" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="172" y="278" class="mono">o₄</text>
    <text x="172" y="291" class="monos" textLength="104" lengthAdjust="spacingAndGlyphs">…no tags, 50</text>
    <circle cx="300" cy="277" r="6" fill="var(--warn,#e0a106)"/>
    <path d="M297.2 274.2 L302.8 279.8 M302.8 274.2 L297.2 279.8" stroke="var(--surface,#fff)" stroke-width="1.5" stroke-linecap="round"/>
    <text x="311" y="282" class="sm" fill="var(--warn,#e0a106)">wrong</text>
    <rect x="364" y="264" width="44" height="28" rx="6" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="386" y="283" text-anchor="middle" class="mono">0.0</text>
  </g>


  <g data-anim="3">

    <line x1="420" y1="62" x2="446" y2="62"   class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ga-arrow)"/>
    <line x1="420" y1="134" x2="446" y2="134" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ga-arrow)"/>
    <line x1="420" y1="210" x2="446" y2="210" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ga-arrow)"/>
    <line x1="420" y1="283" x2="446" y2="283" class="v-muted" stroke="currentColor" stroke-width="1.3" marker-end="url(#ga-arrow)"/>

    <rect x="452" y="120" width="118" height="100" rx="9" class="v-fill v-accent-s" stroke-width="1.6"/>
    <text x="511" y="146" text-anchor="middle" class="lbl" fill="var(--accent)">baseline</text>
    <text x="511" y="167" text-anchor="middle" class="sm">= mean(R) - the</text>
    <text x="511" y="181" text-anchor="middle" class="sm">group is the critic</text>
    <text x="511" y="206" text-anchor="middle" class="mono" fill="var(--accent)">R-bar = 0.65</text>
  </g>


  <g data-anim="4">
    <line x1="570" y1="170" x2="652" y2="170" class="v-accent-s" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#ga-arrow)"/>
    <text x="732" y="32" text-anchor="middle" class="head" fill="var(--accent)">advantage Âᵢ</text>
    <text x="732" y="48" text-anchor="middle" class="sm">(Ri - Rbar) / std</text>


    <line x1="660" y1="170" x2="790" y2="170" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.8"/>
    <text x="790" y="184" text-anchor="end" class="sm" fill="var(--accent)">Â = 0  (baseline)</text>




    <rect x="660" y="62" width="55" height="20" rx="4" fill="var(--good,#2f9e6e)" fill-opacity="0.85" class="viz-sweep"/>
    <text x="723" y="77" class="mono" fill="var(--good,#2f9e6e)">+0.99</text>

    <rect x="615" y="124" width="45" height="20" rx="4" fill="var(--warn,#e0a106)" fill-opacity="0.85"/>
    <text x="611" y="139" text-anchor="end" class="mono" fill="var(--warn,#e0a106)">-0.81</text>

    <rect x="660" y="200" width="55" height="20" rx="4" fill="var(--good,#2f9e6e)" fill-opacity="0.85" class="viz-sweep"/>
    <text x="723" y="215" class="mono" fill="var(--good,#2f9e6e)">+0.99</text>

    <rect x="595" y="272" width="65" height="20" rx="4" fill="var(--warn,#e0a106)" fill-opacity="0.85"/>
    <text x="591" y="287" text-anchor="end" class="mono" fill="var(--warn,#e0a106)">-1.17</text>


    <text x="732" y="100" text-anchor="middle" class="sm" fill="var(--good,#2f9e6e)">push up (above mean)</text>
    <text x="627" y="252" text-anchor="middle" class="sm" fill="var(--warn,#e0a106)">push down (below mean)</text>
  </g>


  <g data-anim="5">
    <rect x="14" y="320" width="772" height="90" rx="11" class="v-fill v-grid" stroke-width="1.2"/>
    <text x="34" y="348" class="lbl">Group-relative advantage - no value network, no GAE:</text>
    <text x="34" y="380" class="op">Âᵢ =</text>

    <text x="92" y="372" class="mono" fill="var(--accent)">Rᵢ - mean(R₁…R_G)</text>
    <line x1="88" y1="378" x2="262" y2="378" class="v-stroke" stroke="var(--ink-soft)" stroke-width="1.3"/>
    <text x="92" y="396" class="mono" fill="var(--accent)">std(R₁…R_G) + ε</text>
    <text x="300" y="368" class="sm">subtract the mean -&gt; the <tspan font-weight="700">baseline</tspan> (variance reduction);</text>
    <text x="300" y="386" class="sm">divide by std -&gt; a scale-free <tspan font-weight="700">z-score</tspan> shared by every token of oᵢ.</text>
  </g>
</svg>
<figcaption><b>GRPO replaces PPO's critic with the group itself.</b> For one prompt we sample a group of G responses, score each with the reward, and use the group <b>mean</b> as the baseline. Each response's advantage is its reward minus that mean (divided by the group std) — a z-score that pushes above-average responses up and below-average ones down, with no value network at all.</figcaption>
</figure>
