<style>
  #fig-cai-two-stage-pipeline text      { font:400 12px var(--sans,sans-serif); fill:var(--ink-soft,#333); }

  #fig-cai-two-stage-pipeline .N        { font:600 11px var(--sans,sans-serif); fill:var(--ink-soft,#222); }

  #fig-cai-two-stage-pipeline .AL       { font:italic 9px var(--sans,sans-serif); fill:var(--muted,#888); }
  #fig-cai-two-stage-pipeline .LP       { font:400 9px var(--sans,sans-serif); fill:var(--accent,#3a6ea5); }
  #fig-cai-two-stage-pipeline .XL       { font:400 9px var(--sans,sans-serif); fill:var(--muted,#aaa); }

  #fig-cai-two-stage-pipeline [data-anim]            { opacity:0; }
  #fig-cai-two-stage-pipeline:not(.playing) [data-anim]{ opacity:1; }
  #fig-cai-two-stage-pipeline.playing [data-anim="1"] { animation:ci .35s .05s ease forwards; }
  #fig-cai-two-stage-pipeline.playing [data-anim="2"] { animation:ci .35s .5s  ease forwards; }
  #fig-cai-two-stage-pipeline.playing [data-anim="3"] { animation:ci .35s .95s ease forwards; }
  #fig-cai-two-stage-pipeline.playing [data-anim="4"] { animation:ci .35s 1.4s ease forwards; }

  #fig-cai-two-stage-pipeline.playing [data-anim="7"] { animation:ci .35s 2.85s ease forwards; }
  #fig-cai-two-stage-pipeline.playing [data-anim="8"] { animation:ci .35s 3.35s ease forwards; }
  #fig-cai-two-stage-pipeline.playing [data-anim="9"] { animation:ci .35s 3.85s ease forwards; }
  #fig-cai-two-stage-pipeline.playing [data-anim="10"]{ animation:ci .35s 4.35s ease forwards; }

  #fig-cai-two-stage-pipeline.playing [data-anim="12"]{ animation:ci .35s 5.35s ease forwards; }

</style>

  <text x="721" y="185" text-anchor="middle" class="AL">revise</text>

  <path d="M810,162 Q810,104 622,98 Q510,93 435,155"

  <text x="810" y="290" text-anchor="middle" class="NS">SFT training target</text>
</g>


<g data-anim="7">
  <text x="24" y="325" class="L">Stage 2 — RLAIF (RL from AI Feedback)</text>
</g>


<g data-anim="8">
  <rect x="20" y="436" width="96" height="60" rx="7"
    fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.3"/>
  <text x="68" y="455" text-anchor="middle" class="N">Prompt</text>
  <text x="68" y="469" text-anchor="middle" class="NS">+(A, B)</text>
  <text x="68" y="483" text-anchor="middle" class="NS">per P_j</text>

<g data-anim="8">

<g data-anim="10">
  <line x1="490" y1="466" x2="549" y2="466"

</g>


<g data-anim="11">

  <text x="610" y="456" text-anchor="middle" class="N">RL fine-tuning</text>

</g>


<g data-anim="11">
  <line x1="670" y1="466" x2="729" y2="466"

  <text x="804" y="457" text-anchor="middle" class="N" fill="#fff" font-weight="700">Constitutional</text>
  <text x="804" y="472" text-anchor="middle" class="N" fill="#fff" font-weight="700">AI model (CAI)</text>
  <text x="804" y="486" text-anchor="middle" class="NS" fill="rgba(255,255,255,0.82)">final aligned policy</text>
</g>


<g data-anim="7">
  <path d="M810,303 Q810,360 440,372 Q240,380 68,436"
    fill="none" stroke="var(--muted,#bbb)" stroke-width="1.1"
    stroke-dasharray="5 4" marker-end="url(#cp-am)" opacity="0.85"/>
  <text x="440" y="385" text-anchor="middle" class="XL">SFT-warmed policy feeds Stage 2</text>
</g>

</svg>
<figcaption><b>The Constitutional AI pipeline in two stages.</b> Stage 1 (SL-CAI) runs a critique-revision loop — guided by a sampled constitution principle — to turn harmful drafts into clean SFT training targets. Stage 2 (RLAIF) uses an AI judge to label response pairs, trains a preference model on those labels, then runs PPO to produce the final CAI model — replacing large-scale human annotation.</figcaption>
</figure>
