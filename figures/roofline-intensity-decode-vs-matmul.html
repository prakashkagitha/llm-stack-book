<figure class="viz" id="fig-roofline-intensity-decode-vs-matmul">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 800 480" role="img" aria-label="Log-log roofline chart of attainable performance versus arithmetic intensity. A rising memory-bandwidth roof meets a flat compute roof at the ridge point around a few hundred FLOP per byte. Single-token decode sits far down the sloped roof at intensity about 1, memory-bound with Tensor Cores idle. A large matmul sits on the flat compute roof at intensity in the thousands, compute-bound near peak. An animated sequence shows batching decode from 1 to 8 to 32 to 128 to 256 tokens climbing the sloped roof rightward until it crosses the ridge onto the compute roof.">
<defs>
  <marker id="rim-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted)"/>
  </marker>
</defs>
<style>
  #fig-roofline-intensity-decode-vs-matmul text{ fill:var(--ink-soft); font-family:var(--sans,sans-serif); }
  #fig-roofline-intensity-decode-vs-matmul .axttl{ font:600 11.5px var(--sans,sans-serif); fill:var(--muted); }
  #fig-roofline-intensity-decode-vs-matmul .tick{ font:500 10px var(--mono,monospace); fill:var(--muted); }
  #fig-roofline-intensity-decode-vs-matmul .ylab{ font:500 10px var(--mono,monospace); fill:var(--muted); }
  #fig-roofline-intensity-decode-vs-matmul .roof{ font:700 11.5px var(--sans,sans-serif); }
  #fig-roofline-intensity-decode-vs-matmul .roofsub{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
  #fig-roofline-intensity-decode-vs-matmul .region{ font:700 12px var(--sans,sans-serif); letter-spacing:.03em; }
  #fig-roofline-intensity-decode-vs-matmul .pt{ font:700 11.5px var(--sans,sans-serif); }
  #fig-roofline-intensity-decode-vs-matmul .ptsub{ font:500 10px var(--sans,sans-serif); }
  #fig-roofline-intensity-decode-vs-matmul .cnt{ font:600 11px var(--mono,monospace); }
  #fig-roofline-intensity-decode-vs-matmul .num{ font:700 10px var(--mono,monospace); }
  #fig-roofline-intensity-decode-vs-matmul .foot{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); font-style:italic; }
</style>


<g data-anim="1">
  <line x1="90" y1="40" x2="90" y2="400" class="v-stroke" stroke-width="1.6" marker-start="url(#rim-arr)"/>
  <line x1="90" y1="400" x2="750" y2="400" class="v-stroke" stroke-width="1.6" marker-end="url(#rim-arr)"/>
  <text x="18" y="220" text-anchor="middle" transform="rotate(-90 18 220)" class="axttl">attainable performance P (FLOP/s, log)</text>
  <text x="420" y="432" text-anchor="middle" class="axttl">arithmetic intensity I (FLOP/byte, log scale)</text>

  
  <line x1="140.1" y1="130" x2="140.1" y2="400" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="306.7" y1="130" x2="306.7" y2="400" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="473.2" y1="130" x2="473.2" y2="400" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="639.7" y1="130" x2="639.7" y2="400" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>
  <text x="140.1" y="414" text-anchor="middle" class="tick">1</text>
  <text x="306.7" y="414" text-anchor="middle" class="tick">10</text>
  <text x="473.2" y="414" text-anchor="middle" class="tick">100</text>
  <text x="639.7" y="414" text-anchor="middle" class="tick">1000</text>

  
  <line x1="90" y1="230" x2="740" y2="230" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="90" y1="330" x2="740" y2="330" class="v-grid" stroke-width="1" stroke-dasharray="2 4"/>
  <text x="82" y="134" text-anchor="end" class="ylab">peak (pi)</text>
  <text x="82" y="234" text-anchor="end" class="ylab">0.1 x pi</text>
  <text x="82" y="334" text-anchor="end" class="ylab">0.01 x pi</text>

  
  <rect x="90" y="130" width="433.3" height="270" fill="var(--accent2,#3b82f6)" fill-opacity="0.055"/>
  <rect x="523.3" y="130" width="216.7" height="270" fill="var(--accent,#c15b39)" fill-opacity="0.06"/>

  
  <line x1="90" y1="390.2" x2="523.3" y2="130" class="viz-draw v-stroke" style="--len:506" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="523.3" y1="130" x2="740" y2="130" class="viz-draw v-stroke" style="--len:217" stroke-width="2.6" stroke-linecap="round"/>

  
  <line x1="523.3" y1="130" x2="523.3" y2="400" stroke="var(--warn,#e0a106)" stroke-width="1.6" stroke-dasharray="4 3"/>
  <circle cx="523.3" cy="130" r="4.5" class="v-stroke" fill="var(--surface)" stroke-width="2"/>
</g>


<g data-anim="2">
  <text x="528" y="52" class="roof" fill="var(--warn,#e0a106)">ridge point = pi / beta</text>
  <text x="528" y="65" class="roofsub">~ a few hundred FLOP/byte (~200 here)</text>

  <text x="600" y="118" text-anchor="middle" class="roof" fill="var(--accent,#c15b39)">compute roof: P = pi, limited by Tensor Cores</text>

  <text x="110" y="176" class="roof" fill="var(--accent2,#3b82f6)">memory-bound: P = I x beta</text>
  <text x="110" y="189" class="roofsub">limited by HBM bandwidth</text>

  <text x="300" y="380" text-anchor="middle" class="region" fill="var(--accent2,#3b82f6)">MEMORY-BOUND</text>
  <text x="630" y="380" text-anchor="middle" class="region" fill="var(--accent,#c15b39)">COMPUTE-BOUND</text>

  
  <circle cx="711.6" cy="130" r="7" fill="var(--accent,#c15b39)"/>
  <circle cx="711.6" cy="130" r="11" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.4" class="viz-pulse" opacity="0.55"/>
  <line x1="711.6" y1="130" x2="711.6" y2="146" class="v-stroke" stroke-width="1" opacity="0.7"/>
  <text x="735" y="160" text-anchor="end" class="pt" fill="var(--accent,#c15b39)">large matmul: I ~ thousands</text>
  <text x="735" y="173" text-anchor="end" class="ptsub">-&gt; COMPUTE-bound, near peak</text>

  
  <rect x="45" y="240" width="222" height="76" rx="8" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.5"/>
  <text x="59" y="261" class="pt" fill="var(--accent2,#3b82f6)">single-token decode: I ~ 1</text>
  <text x="59" y="276" class="ptsub">-&gt; MEMORY-bound, TCs idle</text>
  <text x="59" y="294" class="ptsub" fill="var(--warn,#e0a106)">Tensor Cores ~99% idle here</text>
  <text x="59" y="308" class="cnt" fill="var(--ink-soft)">batch: <tspan class="num">1</tspan></text>
  <line x1="140.1" y1="316" x2="140.1" y2="353" class="v-stroke" stroke-width="1" opacity="0.7"/>
  <circle cx="140.1" cy="360.1" r="6.5" fill="var(--accent2,#3b82f6)"/>

  <text x="420" y="455" text-anchor="middle" class="foot">batching slides the same weight-load rightward until the Tensor Cores light up</text>
</g>


<g data-anim="3">
  <circle cx="290.5" cy="269.8" r="5" fill="var(--accent2,#3b82f6)"/>
  <text x="290.5" y="258" text-anchor="middle" class="num" fill="var(--accent2,#3b82f6)">8</text>
</g>
<g data-anim="4">
  <circle cx="390.8" cy="209.6" r="5" fill="var(--accent2,#3b82f6)"/>
  <text x="390.8" y="198" text-anchor="middle" class="num" fill="var(--accent2,#3b82f6)">32</text>
</g>
<g data-anim="5">
  <circle cx="491.1" cy="149.4" r="5" fill="var(--accent2,#3b82f6)"/>
  <text x="491.1" y="138" text-anchor="middle" class="num" fill="var(--accent2,#3b82f6)">128</text>

  <circle cx="541.2" cy="130" r="6" fill="var(--accent,#c15b39)"/>
  <text x="541.2" y="147" text-anchor="middle" class="num" fill="var(--accent,#c15b39)">256</text>
</g>
</svg>
<figcaption><b>The roofline sorts every kernel into one of two regimes with a single number: arithmetic intensity.</b> Single-token decode reads an entire model's weights for about one FLOP per byte and sits far down the sloped bandwidth roof with Tensor Cores idle; a large matmul reuses data thousands of times per byte and pins the flat compute roof near peak. Batching raises decode's intensity -- same weight bytes, more FLOPs -- sliding the operating point (1 -&gt; 8 -&gt; 32 -&gt; 128 -&gt; 256) rightward across the ridge until the Tensor Cores finally light up.</figcaption>
</figure>
