<figcaption><b>Hybrid layout: attention-DP (local KV, zero cross-GPU communication) + expert-EP (one all-to-all per direction per layer).</b> Each GPU's blue left half owns a disjoint shard of requests with their complete MLA KV caches — no replication, no attention collective. The orange right half holds 32 of 256 experts, joined each layer by a bidirectional all-to-all bus that mixes tokens from all 8 GPUs. Steps 3 and 5 in the per-layer sequence are the only cross-GPU collectives; all other computation is local. The key straggler risk: request-length imbalance across attention-DP ranks delays the all-to-all barrier for every GPU.</figcaption>
