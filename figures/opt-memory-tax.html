<figure class="viz" id="fig-opt-memory-tax">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 380" role="img" aria-label="Stacked bar of the 16 bytes per parameter in AdamW training memory: 2 bytes bf16 weights, 2 bytes bf16 gradients, and 12 bytes of optimizer state (4 bytes Adam m, 4 bytes Adam v, 4 bytes fp32 master weights), three times the weight size, with a side callout scaling this to a 7B model totaling 112 GB, 84 GB of which is optimizer state alone and does not fit on one 80 GB H100.">
<style>
  #fig-opt-memory-tax text        { fill: var(--ink-soft,#45413a); }
  #fig-opt-memory-tax .ttl        { font: 700 15px var(--sans,sans-serif); fill: currentColor; }
  #fig-opt-memory-tax .sub        { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-opt-memory-tax .hdr        { font: 700 12px var(--sans,sans-serif); fill: currentColor; }
  #fig-opt-memory-tax .lbl        { font: 700 10.5px var(--sans,sans-serif); }
  #fig-opt-memory-tax .small      { font: 500 9.5px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-opt-memory-tax .mono       { font: 700 10.5px var(--mono,monospace); }
  #fig-opt-memory-tax .segw       { fill: var(--surface-3,#ece7da); stroke: var(--muted,#6d675d); stroke-width: 1; }
  #fig-opt-memory-tax .sego       { fill: var(--accent,#c15b39); fill-opacity: 0.85; stroke: var(--accent,#c15b39); stroke-width: 1; }
  #fig-opt-memory-tax .bracket    { fill: none; stroke: var(--ink-soft,#45413a); stroke-width: 1.4; }
  #fig-opt-memory-tax .bracketA   { fill: none; stroke: var(--accent,#c15b39); stroke-width: 1.6; }
</style>

<text x="18" y="24" class="ttl">The 16-byte-per-parameter memory tax of AdamW</text>
<text x="18" y="41" class="sub">Every trained parameter costs 16 bytes total; 12 of those bytes are optimizer state, three times the 4-byte model (bf16 weights + grads).</text>

<g data-anim="1">
  <text x="18" y="66" class="hdr">Per-parameter memory, 16 bytes total (segment width proportional to bytes)</text>


  <rect class="segw" x="18"  y="80" width="60" height="46"/>
  <rect class="segw" x="78"  y="80" width="60" height="46"/>
  <rect class="sego" x="138" y="80" width="120" height="46"/>
  <rect class="sego" x="258" y="80" width="120" height="46"/>
  <rect class="sego" x="378" y="80" width="120" height="46"/>

  <text x="48"  y="99"  text-anchor="middle" class="mono">bf16</text>
  <text x="48"  y="112" text-anchor="middle" class="mono">weights</text>
  <text x="48"  y="125" text-anchor="middle" class="mono">2 B</text>

  <text x="108" y="99"  text-anchor="middle" class="mono">bf16</text>
  <text x="108" y="112" text-anchor="middle" class="mono">grads</text>
  <text x="108" y="125" text-anchor="middle" class="mono">2 B</text>

  <text x="198" y="99"  text-anchor="middle" class="mono" fill="var(--surface,#fff)">Adam m</text>
  <text x="198" y="112" text-anchor="middle" class="mono" fill="var(--surface,#fff)">(fp32)</text>
  <text x="198" y="125" text-anchor="middle" class="mono" fill="var(--surface,#fff)">4 B</text>

  <text x="318" y="99"  text-anchor="middle" class="mono" fill="var(--surface,#fff)">Adam v</text>
  <text x="318" y="112" text-anchor="middle" class="mono" fill="var(--surface,#fff)">(fp32)</text>
  <text x="318" y="125" text-anchor="middle" class="mono" fill="var(--surface,#fff)">4 B</text>

  <text x="438" y="99"  text-anchor="middle" class="mono" fill="var(--surface,#fff)">fp32 master</text>
  <text x="438" y="112" text-anchor="middle" class="mono" fill="var(--surface,#fff)">weights</text>
  <text x="438" y="125" text-anchor="middle" class="mono" fill="var(--surface,#fff)">4 B</text>


  <path class="bracket" d="M 18,140 Q 18,150 28,150 L 68,150 Q 78,150 78,160 M 78,160 Q 78,150 88,150 L 128,150 Q 138,150 138,140"/>
  <text x="78" y="174" text-anchor="middle" class="lbl">actual model = 4 B</text>


  <path class="bracketA" d="M 138,140 Q 138,152 148,152 L 368,152 Q 378,152 378,140 M 378,140 Q 378,152 388,152 L 488,152 Q 498,152 498,140"/>
  <text x="318" y="176" text-anchor="middle" class="lbl" fill="var(--accent,#c15b39)">OPTIMIZER STATE = 12 B/param = 3x the weights</text>
</g>

<g data-anim="2">
  <rect x="558" y="70" width="204" height="292" rx="8" fill="var(--surface-3,#ece7da)" fill-opacity="0.35" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
  <text x="574" y="92" class="hdr">7B model, in GB</text>

  <text x="574" y="112" class="small">bf16 weights</text>
  <text x="748" y="112" text-anchor="end" class="mono">14</text>
  <text x="574" y="128" class="small">bf16 grads</text>
  <text x="748" y="128" text-anchor="end" class="mono">14</text>
  <text x="574" y="144" class="small">Adam m</text>
  <text x="748" y="144" text-anchor="end" class="mono">28</text>
  <text x="574" y="160" class="small">Adam v</text>
  <text x="748" y="160" text-anchor="end" class="mono">28</text>
  <text x="574" y="176" class="small">fp32 master</text>
  <text x="748" y="176" text-anchor="end" class="mono">28</text>
  <line x1="574" y1="186" x2="748" y2="186" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <text x="574" y="202" class="small" font-weight="700">total</text>
  <text x="748" y="202" text-anchor="end" class="mono" font-weight="700">112 GB</text>


  <text x="574" y="226" class="lbl" fill="var(--accent,#c15b39)">optimizer state alone</text>
  <rect x="574" y="234" width="172" height="20" class="sego"/>
  <line x1="574" y1="228" x2="574" y2="266" stroke="var(--ink-soft,#45413a)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="740" y="248" text-anchor="end" class="mono" font-weight="700" fill="var(--surface,#fff)">84 GB</text>

  <line x1="738" y1="228" x2="738" y2="266" stroke="var(--warn,#e0a106)" stroke-width="1.6" stroke-dasharray="4 2"/>
  <text x="738" y="278" text-anchor="middle" class="small" fill="var(--warn,#e0a106)">80 GB H100</text>
  <text x="574" y="296" class="small" fill="var(--warn,#e0a106)">84 GB does not fit</text>
  <text x="574" y="309" class="small" fill="var(--warn,#e0a106)">one 80 GB H100</text>
</g>

</svg>
<figcaption><b>Optimizer state, not the weights, dominates AdamW's memory footprint.</b> Of the 16 bytes/param needed to train in mixed precision, the bf16 weights and gradients are only 4 bytes; the remaining 12 bytes — Adam's first and second moments plus the fp32 master-weight copy — are three times that 4-byte model (weights + gradients). For a 7B model that is 112 GB total, of which 84 GB is optimizer state alone, more than an 80 GB H100 can hold on its own.</figcaption>
</figure>
