<figure class="viz" id="fig-trtllm-perf-portability-spectrum">
<svg viewBox="0 0 880 310" role="img" aria-label="A horizontal spectrum axis from Peak Performance on the left to Portability on the right, with four serving frameworks marked: TensorRT-LLM, TGI, llama.cpp, and MLC in order of increasing portability.">
<defs>
  <marker id="ps-arrow-left" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M10 0 L0 5 L10 10 z" class="v-stroke" fill="var(--ink-soft,#45413a)"/>
  </marker>
  <marker id="ps-arrow-right" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" class="v-stroke" fill="var(--ink-soft,#45413a)"/>
  </marker>
</defs>
<style>
  #fig-trtllm-perf-portability-spectrum text { fill: var(--ink-soft, #45413a); }
  #fig-trtllm-perf-portability-spectrum .lbl { font: 600 13px var(--sans,sans-serif); }
  #fig-trtllm-perf-portability-spectrum .lbl-sm { font: 400 11px var(--sans,sans-serif); }
  #fig-trtllm-perf-portability-spectrum .lbl-fw { font: 700 12px var(--sans,sans-serif); }
  #fig-trtllm-perf-portability-spectrum .cap { font: 400 11px var(--sans,sans-serif); fill: var(--muted, #6d675d); }
  #fig-trtllm-perf-portability-spectrum .end-lbl { font: 700 14px var(--sans,sans-serif); }
</style>


<line x1="70" y1="120" x2="810" y2="120"
      class="v-stroke" stroke="var(--ink-soft,#45413a)" stroke-width="3"
      marker-start="url(#ps-arrow-left)" marker-end="url(#ps-arrow-right)"/>


<text x="70" y="90" text-anchor="middle" class="end-lbl v-accent" fill="var(--accent,#c15b39)">Peak performance</text>


<text x="810" y="90" text-anchor="middle" class="end-lbl v-accent" fill="var(--accent,#c15b39)">Portability</text>


<circle cx="190" cy="120" r="8" class="v-fill v-accent-s" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="2"/>

<rect x="110" y="145" width="165" height="74" rx="8" class="v-fill v-stroke" fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
<text x="192" y="165" text-anchor="middle" class="lbl-fw v-accent" fill="var(--accent,#c15b39)">TensorRT-LLM</text>
<text x="192" y="182" text-anchor="middle" class="lbl-sm cap">NVIDIA only,</text>
<text x="192" y="197" text-anchor="middle" class="lbl-sm cap">compiled (AOT engine)</text>

<line x1="190" y1="128" x2="190" y2="145" class="v-stroke" stroke="var(--ink-soft,#45413a)" stroke-width="1" stroke-dasharray="3,2"/>


<circle cx="370" cy="120" r="8" class="v-fill v-accent-s" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="2"/>

<rect x="290" y="145" width="165" height="74" rx="8" class="v-fill v-stroke" fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
<text x="372" y="165" text-anchor="middle" class="lbl-fw v-accent" fill="var(--accent,#c15b39)">TGI</text>
<text x="372" y="182" text-anchor="middle" class="lbl-sm cap">PyTorch +</text>
<text x="372" y="197" text-anchor="middle" class="lbl-sm cap">custom kernels</text>
<line x1="370" y1="128" x2="370" y2="145" class="v-stroke" stroke="var(--ink-soft,#45413a)" stroke-width="1" stroke-dasharray="3,2"/>


<circle cx="550" cy="120" r="8" class="v-fill v-accent-s" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="2"/>

<rect x="470" y="145" width="165" height="74" rx="8" class="v-fill v-stroke" fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
<text x="552" y="165" text-anchor="middle" class="lbl-fw v-accent" fill="var(--accent,#c15b39)">llama.cpp</text>
<text x="552" y="182" text-anchor="middle" class="lbl-sm cap">CPU / CUDA /</text>
<text x="552" y="197" text-anchor="middle" class="lbl-sm cap">Metal / AVX</text>
<line x1="550" y1="128" x2="550" y2="145" class="v-stroke" stroke="var(--ink-soft,#45413a)" stroke-width="1" stroke-dasharray="3,2"/>


<circle cx="730" cy="120" r="8" class="v-fill v-accent-s" fill="var(--surface-3,#ece7da)" stroke="var(--accent,#c15b39)" stroke-width="2"/>

<rect x="648" y="145" width="165" height="74" rx="8" class="v-fill v-stroke" fill="var(--surface-3,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
<text x="730" y="165" text-anchor="middle" class="lbl-fw v-accent" fill="var(--accent,#c15b39)">MLC</text>
<text x="730" y="182" text-anchor="middle" class="lbl-sm cap">WASM / Metal /</text>
<text x="730" y="197" text-anchor="middle" class="lbl-sm cap">Vulkan / WebGPU</text>
<line x1="730" y1="128" x2="730" y2="145" class="v-stroke" stroke="var(--ink-soft,#45413a)" stroke-width="1" stroke-dasharray="3,2"/>


<text x="440" y="263" text-anchor="middle" class="cap" style="font:italic 11px var(--sans,sans-serif); fill:var(--muted,#6d675d);">The closer to peak performance, the more a stack relies on compiled, hardware-specific kernels — and the less portable it becomes.</text>
</svg>
<figcaption><b>The serving-stack spectrum: peak performance vs. portability.</b> TensorRT-LLM occupies the peak-performance end with ahead-of-time compiled NVIDIA-specific engines, while MLC targets the broadest hardware reach (WebGPU, WASM, Vulkan). TGI and llama.cpp occupy the middle ground, trading some throughput for easier deployment.</figcaption>
</figure>
