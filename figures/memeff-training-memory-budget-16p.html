<figure class="viz" id="fig-memeff-training-memory-budget-16p">
<svg viewBox="0 0 780 350" role="img" aria-label="Stacked bar showing the 16P bytes-per-parameter static memory budget of an Adam mixed-precision training step, divided into bf16 weights 2P, fp32 master weights 4P, bf16 gradients 2P, and Adam m and v states 4P plus 4P, with the two Adam slabs braced as 8P dominant optimizer state, plus a separate hatched segment for activation memory.">
  <defs>
    <marker id="mb-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6d675d)"/>
    </marker>
    <pattern id="mb-hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="var(--muted,#6d675d)" stroke-width="2"/>
    </pattern>
  </defs>
  <style>
    #fig-memeff-training-memory-budget-16p text { fill: var(--ink-soft); }
    #fig-memeff-training-memory-budget-16p .hdr   { font: 700 14px var(--sans,sans-serif); }
    #fig-memeff-training-memory-budget-16p .slab-byte { font: 700 13px var(--mono,monospace); }
    #fig-memeff-training-memory-budget-16p .slab-name { font: 600 11.5px var(--sans,sans-serif); }
    #fig-memeff-training-memory-budget-16p .slab-dtype { font: 500 10px var(--mono,monospace); fill: var(--muted,#6d675d); }
    #fig-memeff-training-memory-budget-16p .brace-lbl { font: 700 12px var(--sans,sans-serif); }
    #fig-memeff-training-memory-budget-16p .side-note { font: 500 11.5px var(--sans,sans-serif); fill: var(--ink-soft); }
    #fig-memeff-training-memory-budget-16p .side-note-b { font: 700 11.5px var(--sans,sans-serif); }
    #fig-memeff-training-memory-budget-16p .act-lbl { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-memeff-training-memory-budget-16p .total-lbl { font: 700 13px var(--sans,sans-serif); }
  </style>

  <text x="390" y="24" text-anchor="middle" class="hdr">Adam mixed-precision static memory: 16P bytes per parameter</text>

  
  

  <g data-anim="1">
    <rect x="40"  y="70" width="80"  height="70" rx="4" fill="var(--v-fill,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
    <text x="80" y="98" text-anchor="middle" class="slab-byte">2P</text>
    <text x="80" y="114" text-anchor="middle" class="slab-name">weights</text>
    <text x="80" y="127" text-anchor="middle" class="slab-dtype">bf16</text>
  </g>

  <g data-anim="2">
    <rect x="120" y="70" width="160" height="70" rx="4" fill="var(--v-fill,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
    <text x="200" y="98" text-anchor="middle" class="slab-byte">4P</text>
    <text x="200" y="114" text-anchor="middle" class="slab-name">master weights</text>
    <text x="200" y="127" text-anchor="middle" class="slab-dtype">fp32</text>
  </g>

  <g data-anim="3">
    <rect x="280" y="70" width="80" height="70" rx="4" fill="var(--v-fill,#ece7da)" stroke="var(--v-stroke,#45413a)" stroke-width="1.4"/>
    <text x="320" y="98" text-anchor="middle" class="slab-byte">2P</text>
    <text x="320" y="114" text-anchor="middle" class="slab-name">gradients</text>
    <text x="320" y="127" text-anchor="middle" class="slab-dtype">bf16</text>
  </g>

  <g data-anim="4">
    <rect x="360" y="70" width="160" height="70" rx="4" class="v-accent" fill="var(--accent,#c15b39)" fill-opacity="0.85" stroke="var(--accent,#c15b39)" stroke-width="1.4"/>
    <text x="440" y="98" text-anchor="middle" class="slab-byte" fill="var(--surface,#fff)">4P</text>
    <text x="440" y="114" text-anchor="middle" class="slab-name" fill="var(--surface,#fff)">Adam m_t</text>
    <text x="440" y="127" text-anchor="middle" class="slab-dtype" fill="var(--surface,#fff)" opacity="0.9">fp32</text>
  </g>

  <g data-anim="4">
    <rect x="520" y="70" width="160" height="70" rx="4" class="v-accent" fill="var(--accent,#c15b39)" fill-opacity="0.85" stroke="var(--accent,#c15b39)" stroke-width="1.4"/>
    <text x="600" y="98" text-anchor="middle" class="slab-byte" fill="var(--surface,#fff)">4P</text>
    <text x="600" y="114" text-anchor="middle" class="slab-name" fill="var(--surface,#fff)">Adam v_t</text>
    <text x="600" y="127" text-anchor="middle" class="slab-dtype" fill="var(--surface,#fff)" opacity="0.9">fp32</text>
  </g>

  
  <line x1="40" y1="144" x2="680" y2="144" stroke="var(--muted,#6d675d)" stroke-width="1"/>
  <g class="act-lbl" text-anchor="middle">
    <text x="40" y="158">0</text>
    <text x="360" y="158">8P</text>
    <text x="680" y="158">16P</text>
  </g>

  
  <g data-anim="5">
    <path d="M 360 172 Q 360 182 372 182 L 428 182 Q 440 182 440 192 Q 440 182 452 182 L 668 182 Q 680 182 680 172"
          fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6"/>
    <text x="520" y="202" text-anchor="middle" class="brace-lbl" fill="var(--accent,#c15b39)">Optimizer states = 8P (dominant)</text>
  </g>

  
  <g data-anim="5">
    <path d="M 120 214 Q 120 224 132 224 L 388 224 Q 400 224 400 234 Q 400 224 412 224 L 668 224 Q 680 224 680 214"
          fill="none" stroke="var(--muted,#6d675d)" stroke-width="1.4"/>
    <text x="400" y="246" text-anchor="middle" class="brace-lbl" fill="var(--ink-soft)">14P you pay ON TOP of the model</text>
    <text x="400" y="261" text-anchor="middle" class="act-lbl">(master 4P + grads 2P + Adam 8P)</text>
  </g>

  
  <text x="680" y="60" text-anchor="end" class="total-lbl">16P bytes per parameter</text>

  
  <g>
    <rect x="40" y="284" width="330" height="46" rx="7" fill="var(--v-fill,#ece7da)" fill-opacity="0.6" stroke="var(--border-2,#d8d1c0)" stroke-width="1.2"/>
    <text x="54" y="304" class="side-note-b">Model in bf16 is only 2P.</text>
    <text x="54" y="320" class="side-note">The training step costs 8x that.</text>
  </g>

  
  <g data-anim="5">
    <rect x="450" y="284" width="230" height="46" rx="4" fill="url(#mb-hatch)" fill-opacity="0.5" stroke="var(--muted,#6d675d)" stroke-width="1.4" stroke-dasharray="5 3"/>
    <rect x="486" y="291" width="158" height="42" rx="3" fill="var(--bg,#faf8f3)" opacity="0.92"/>
    <text x="565" y="302" text-anchor="middle" class="act-lbl" fill="var(--ink-soft)">activations (+B&#183;T&#183;L)</text>
    <text x="565" y="317" text-anchor="middle" class="act-lbl">NOT part of 16P —</text>
    <text x="565" y="330" text-anchor="middle" class="act-lbl">see next section</text>
  </g>

</svg>
<figcaption><b>Optimizer states, not weights, dominate the training memory budget.</b> Adam mixed-precision training costs 16P bytes per parameter: the bf16 model itself is only 2P, but the fp32 master copy (4P), bf16 gradients (2P), and Adam's two fp32 moment buffers (4P+4P = 8P) add 14P on top — an 8x multiplier over the weights alone. Activation memory (hatched) scales separately with batch, sequence length, and depth, and is covered in the next section.</figcaption>
</figure>
