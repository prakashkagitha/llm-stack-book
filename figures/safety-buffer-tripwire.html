<figure class="viz" id="fig-safety-buffer-tripwire">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 780 360" role="img" aria-label="Number line from 0 to 100 of operational-plan-completeness capability score. The real danger threshold sits at 70. Subtracting a 12-point elicitation gap and a 10-point between-checkpoint capability jump lands the tripwire at 48. A checkpoint measured at 52 is below 70 but above the 48 tripwire, so it triggers ASL-3 safeguards now, before the real threshold can be silently crossed.">
  <defs>
    <marker id="sbt-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-safety-buffer-tripwire text{ fill:var(--ink-soft); font-family:var(--sans,sans-serif); }
    #fig-safety-buffer-tripwire .hdr{ font:600 13px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-safety-buffer-tripwire .axnum{ font:600 10px var(--mono,monospace); fill:var(--muted); }
    #fig-safety-buffer-tripwire .tag{ font:700 11px var(--mono,monospace); }
    #fig-safety-buffer-tripwire .lbl{ font:700 11.5px var(--sans,sans-serif); }
    #fig-safety-buffer-tripwire .lbl2{ font:600 10.5px var(--sans,sans-serif); }
    #fig-safety-buffer-tripwire .shortlbl{ font:700 10.5px var(--sans,sans-serif); }
    #fig-safety-buffer-tripwire .expl{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-safety-buffer-tripwire .buf{ font:700 10.5px var(--sans,sans-serif); fill:var(--accent); }
    #fig-safety-buffer-tripwire .cap{ font:600 11px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-safety-buffer-tripwire .capsub{ font:500 10px var(--sans,sans-serif); fill:var(--muted); }
    #fig-safety-buffer-tripwire .callout-line{ font:600 10.5px var(--sans,sans-serif); fill:var(--ink-soft); }
    #fig-safety-buffer-tripwire .callout-strong{ font:700 11px var(--sans,sans-serif); fill:var(--accent2,#3b82f6); }
  </style>

  <text x="20" y="24" class="hdr">capability number line: operational plan completeness / capability score (0-100)</text>


  <g data-anim="1">
    <rect x="386" y="144" width="154" height="12" rx="2" fill="var(--accent)" opacity="0.15"/>
    <text x="463" y="169" text-anchor="middle" class="buf">safety buffer</text>
    <line x1="50" y1="150" x2="750" y2="150" stroke="var(--ink-soft)" stroke-width="1.6" marker-end="url(#sbt-arr)"/>

    <line x1="50" y1="146" x2="50" y2="154" stroke="var(--muted)" stroke-width="1.2"/>
    <line x1="120" y1="147" x2="120" y2="153" stroke="var(--muted)" stroke-width="1"/>
    <line x1="190" y1="147" x2="190" y2="153" stroke="var(--muted)" stroke-width="1"/>
    <line x1="260" y1="147" x2="260" y2="153" stroke="var(--muted)" stroke-width="1"/>
    <line x1="330" y1="147" x2="330" y2="153" stroke="var(--muted)" stroke-width="1"/>
    <line x1="610" y1="147" x2="610" y2="153" stroke="var(--muted)" stroke-width="1"/>
    <line x1="680" y1="147" x2="680" y2="153" stroke="var(--muted)" stroke-width="1"/>
    <line x1="720" y1="146" x2="720" y2="154" stroke="var(--muted)" stroke-width="1.2"/>
    <text x="50" y="184" text-anchor="middle" class="axnum">0</text>
    <text x="720" y="184" text-anchor="middle" class="axnum">100</text>
  </g>


  <g data-anim="2">
    <line x1="540" y1="40" x2="540" y2="170" stroke="var(--warn)" stroke-width="3"/>
    <text x="546" y="52" class="lbl" fill="var(--warn)">meaningful real-world</text>
    <text x="546" y="66" class="lbl" fill="var(--warn)">uplift (ASL-3 threshold)</text>
    <text x="540" y="184" text-anchor="middle" class="tag" fill="var(--warn)">70</text>
  </g>


  <g data-anim="3">

    <line x1="386" y1="206" x2="456" y2="206" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <line x1="386" y1="200" x2="386" y2="212" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <line x1="456" y1="200" x2="456" y2="212" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <text x="450" y="228" text-anchor="end" class="shortlbl">capability jump (~10)</text>


    <line x1="456" y1="206" x2="540" y2="206" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <line x1="540" y1="200" x2="540" y2="212" stroke="var(--ink-soft)" stroke-width="1.4"/>
    <text x="462" y="228" text-anchor="start" class="shortlbl">elicitation gap (~12)</text>


    <text x="463" y="250" text-anchor="middle" class="expl">elicitation gap: attacker fine-tuning + scaffolding</text>
    <text x="463" y="263" text-anchor="middle" class="expl">extract more than our in-house eval</text>
    <text x="463" y="280" text-anchor="middle" class="expl">between-checkpoint jump: capability can rise this</text>
    <text x="463" y="293" text-anchor="middle" class="expl">much before the next eval</text>
  </g>


  <g data-anim="4">
    <line x1="386" y1="40" x2="386" y2="170" stroke="var(--accent)" stroke-width="3"/>
    <text x="376" y="52" text-anchor="end" class="lbl" fill="var(--accent)">TRIPWIRE we set</text>
    <text x="376" y="66" text-anchor="end" class="lbl" fill="var(--accent)">(48)</text>
    <text x="386" y="184" text-anchor="middle" class="tag" fill="var(--accent)">48</text>
  </g>


  <g data-anim="5">
    <path d="M414 150 L414 143 L421 150 L414 157 L407 150 Z" fill="var(--accent2,#3b82f6)" stroke="var(--ink-soft)" stroke-width="1"/>
    <text x="414" y="184" text-anchor="middle" class="tag" fill="var(--accent2,#3b82f6)">52</text>


    <line x1="437" y1="147" x2="418" y2="151" stroke="var(--ink-soft)" stroke-width="1.2" marker-end="url(#sbt-arr)"/>
    <rect x="340" y="78" width="250" height="66" rx="8" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.2"/>
    <text x="463" y="94" text-anchor="middle" class="callout-strong">measured: 52</text>
    <text x="463" y="109" text-anchor="middle" class="callout-line">not yet over 70 (naive elicitation),</text>
    <text x="463" y="123" text-anchor="middle" class="callout-line">but ABOVE the 48 tripwire --&gt;</text>
    <text x="463" y="138" text-anchor="middle" class="callout-strong">triggers ASL-3 safeguards NOW</text>


    <text x="390" y="318" text-anchor="middle" class="cap">a false alarm is cheap: build safeguards a bit early.</text>
    <text x="390" y="334" text-anchor="middle" class="capsub">a silent crossing above 70 is catastrophic and irreversible.</text>
  </g>
</svg>
<figcaption><b>Set the tripwire below the real danger threshold, not on it.</b> Starting from the real ASL-3 threshold (70), subtract the elicitation gap (~12: what a determined attacker extracts beyond in-house evals) and the between-checkpoint capability jump (~10), landing the tripwire at 48; a checkpoint scoring 52 hasn't crossed 70 under naive elicitation but is above 48, so it triggers ASL-3 safeguards immediately, before the next checkpoint can quietly cross the real line.</figcaption>
</figure>
