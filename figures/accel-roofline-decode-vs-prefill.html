<figure class="viz" id="fig-accel-roofline-decode-vs-prefill">
<button class="viz-replay" type="button">/replay</button>
<svg viewBox="0 0 780 510" role="img" aria-label="A roofline plot showing the ridge point I-star: decode sits low on the sloped bandwidth roof, ranked by HBM terabytes per second, while prefill and training sit on the flat compute roof, ranked by peak FP8 or bf16 TFLOPS.">
  <defs>
    <marker id="rdp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-accel-roofline-decode-vs-prefill .ttl{ font:700 15px var(--sans,sans-serif); }
    #fig-accel-roofline-decode-vs-prefill .ax{ font:600 12px var(--sans,sans-serif); }
    #fig-accel-roofline-decode-vs-prefill .roof{ font:700 12.5px var(--sans,sans-serif); }
    #fig-accel-roofline-decode-vs-prefill .region{ font:700 12px var(--sans,sans-serif); letter-spacing:.02em; }
    #fig-accel-roofline-decode-vs-prefill .pt{ font:700 12px var(--sans,sans-serif); }
    #fig-accel-roofline-decode-vs-prefill .sub{ font:500 10.5px var(--sans,sans-serif); }
    #fig-accel-roofline-decode-vs-prefill .tick{ font:500 10.5px var(--mono,monospace); }
    #fig-accel-roofline-decode-vs-prefill text{ fill: var(--ink-soft); }
    #fig-accel-roofline-decode-vs-prefill .dim{ fill: var(--muted); }
  </style>

  <text x="390" y="24" text-anchor="middle" class="ttl">Which spec-sheet number picks the chip? Read it off the roofline.</text>

  <g data-anim="1">
    <line x1="90" y1="60" x2="90" y2="430" class="v-stroke" stroke-width="1.6" marker-start="url(#rdp-arrow)"/>
    <line x1="90" y1="430" x2="700" y2="430" class="v-stroke" stroke-width="1.6" marker-end="url(#rdp-arrow)"/>
    <text x="30" y="245" class="ax" text-anchor="middle" transform="rotate(-90 30 245)">attainable throughput (FLOP/s)</text>
    <text x="395" y="478" class="ax" text-anchor="middle">arithmetic intensity I &#8201;(FLOPs per byte of HBM traffic)</text>
    <text x="395" y="494" class="sub dim" text-anchor="middle">schematic axes &#8212; no numeric scale implied</text>
  </g>

  <g data-anim="2">

    <path d="M90 430 L350 140 L700 140 L700 60 L90 60 Z" fill="var(--accent)" fill-opacity="0.055"/>


    <line x1="90" y1="430" x2="350" y2="140" class="viz-draw v-accent-s" style="--len:400" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>


    <line x1="350" y1="140" x2="700" y2="140" class="viz-draw v-accent-s" style="--len:340" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>


    <line x1="90" y1="430" x2="255" y2="100" class="v-grid" stroke-width="1.6" stroke-dasharray="2 5" opacity="0.55"/>
    <text x="265" y="88" class="sub dim" text-anchor="start">more HBM bandwidth lifts</text>
    <text x="265" y="102" class="sub dim" text-anchor="start">the memory-bound region</text>

    <text x="525" y="125" class="roof v-accent" fill="var(--accent)" text-anchor="middle">COMPUTE ROOF &#8212; peak FP8/bf16 TFLOPS</text>

    <text x="300" y="200" class="roof v-accent" fill="var(--accent)" text-anchor="start" transform="rotate(-48 300 200)">BANDWIDTH ROOF</text>
    <text x="298" y="216" class="sub" text-anchor="start" transform="rotate(-48 298 216)">slope = peak HBM TB/s</text>
  </g>

  <g data-anim="3">
    <line x1="350" y1="140" x2="350" y2="430" class="v-stroke" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
    <circle cx="350" cy="140" r="4.5" class="v-stroke" fill="var(--surface,#fff)" stroke-width="2"/>
    <text x="350" y="445" class="tick" text-anchor="middle">I*</text>
    <text x="350" y="459" class="sub dim" text-anchor="middle">= peak FLOP/s / peak byte/s &#8201;(the ridge point)</text>
  </g>

  <g data-anim="4">
    <text x="200" y="172" class="region" fill="var(--accent2,#3b82f6)" text-anchor="middle">MEMORY-BOUND</text>
    <text x="525" y="165" class="region" fill="var(--good,#2f9e6e)" text-anchor="middle">COMPUTE-BOUND</text>
  </g>

  <g data-anim="5">

    <circle cx="190" cy="318" r="7" fill="var(--accent2,#3b82f6)"/>
    <circle cx="190" cy="318" r="11" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="1.4" class="viz-pulse" opacity="0.6"/>
    <line x1="190" y1="300" x2="190" y2="313" class="v-stroke" stroke-width="1" opacity="0.7"/>
    <rect x="72" y="226" width="236" height="74" rx="7" class="v-fill" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
    <text x="190" y="246" class="pt" fill="var(--accent2,#3b82f6)" text-anchor="middle">DECODE (one token)</text>
    <text x="190" y="262" class="sub" text-anchor="middle">streams the whole weight matrix</text>
    <text x="190" y="276" class="sub" text-anchor="middle">per token, tiny compute -&gt; low I</text>
    <text x="190" y="290" class="sub" fill="var(--accent2,#3b82f6)" text-anchor="middle">rank chips by HBM TB/s</text>


    <circle cx="580" cy="140" r="7" fill="var(--good,#2f9e6e)"/>
    <circle cx="580" cy="140" r="11" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.4" class="viz-pulse" opacity="0.6"/>
    <rect x="470" y="180" width="220" height="70" rx="7" class="v-fill" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
    <text x="580" y="200" class="pt" fill="var(--good,#2f9e6e)" text-anchor="middle">PREFILL / TRAINING</text>
    <text x="580" y="216" class="sub" text-anchor="middle">big statically-shaped matmuls</text>
    <text x="580" y="230" class="sub" text-anchor="middle">-&gt; high I -&gt; limited by peak matmul</text>
    <text x="580" y="244" class="sub" fill="var(--good,#2f9e6e)" text-anchor="middle">rank chips by FP8/bf16 TFLOPS</text>
    <line x1="580" y1="180" x2="580" y2="147" class="v-stroke" stroke-width="1" opacity="0.7"/>
  </g>
</svg>
<figcaption><b>One roofline, two workloads, two different spec-sheet numbers.</b> Decode sits low on the sloped bandwidth roof (I &lt; I*), so its speed is set by HBM bandwidth almost regardless of peak FLOPS; prefill and training sit on the flat compute roof (I &gt; I*), so their speed is set by peak matmul throughput almost regardless of HBM bandwidth. The ridge point I* = peak FLOP/s / peak byte/s is exactly where a chip's own compute and bandwidth are balanced.</figcaption>
</figure>
