<figure class="viz" id="fig-reliability-provider-outage-runbook">
<button class="viz-replay" type="button">↻ replay</button>
<style>
  #fig-reliability-provider-outage-runbook text { font: 500 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-reliability-provider-outage-runbook .step-num { font: 800 14px var(--sans,sans-serif); fill: #fff; }
  #fig-reliability-provider-outage-runbook .step-title { font: 700 12px var(--sans,sans-serif); fill: var(--ink-soft,#1e293b); }
  #fig-reliability-provider-outage-runbook .step-sub { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-reliability-provider-outage-runbook .chip { font: 700 9.5px var(--sans,sans-serif); fill: var(--accent,#7c3aed); }
  #fig-reliability-provider-outage-runbook .cap { font: 500 10px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-reliability-provider-outage-runbook .trigger-lbl { font: 600 11px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }

  /* Step highlight animation — each card brightens in sequence */
  @keyframes rb-step1 {
    0%,4%  { opacity:0 }
    5%,18% { opacity:0.18 }
    19%,100%{ opacity:0 }
  }
  @keyframes rb-step2 {
    0%,19% { opacity:0 }
    20%,34%{ opacity:0.18 }
    35%,100%{ opacity:0 }
  }
  @keyframes rb-step3 {
    0%,34% { opacity:0 }
    35%,50%{ opacity:0.18 }
    51%,100%{ opacity:0 }
  }
  @keyframes rb-step4 {
    0%,50% { opacity:0 }
    51%,68%{ opacity:0.18 }
    69%,100%{ opacity:0 }
  }
  @keyframes rb-step5 {
    0%,68% { opacity:0 }
    69%,84%{ opacity:0.18 }
    85%,100%{ opacity:0 }
  }
  /* Spine progress fill */
  @keyframes rb-spine {
    0%   { height:0px; y:88px; }
    5%   { height:0px; y:88px; }
    18%  { height:88px; y:88px; }
    20%  { height:88px; y:88px; }
    34%  { height:176px; y:88px; }
    35%  { height:176px; y:88px; }
    50%  { height:264px; y:88px; }
    51%  { height:264px; y:88px; }
    68%  { height:352px; y:88px; }
    69%  { height:352px; y:88px; }
    84%  { height:440px; y:88px; }
    85%  { height:440px; y:88px; }
    100% { height:440px; y:88px; }
  }

  #fig-reliability-provider-outage-runbook #rb-hl1 { animation: rb-step1 10s ease-in-out infinite; }
  #fig-reliability-provider-outage-runbook #rb-hl2 { animation: rb-step2 10s ease-in-out infinite; }
  #fig-reliability-provider-outage-runbook #rb-hl3 { animation: rb-step3 10s ease-in-out infinite; }
  #fig-reliability-provider-outage-runbook #rb-hl4 { animation: rb-step4 10s ease-in-out infinite; }
  #fig-reliability-provider-outage-runbook #rb-hl5 { animation: rb-step5 10s ease-in-out infinite; }
  #fig-reliability-provider-outage-runbook #rb-spine-fill { animation: rb-spine 10s ease-in-out infinite; }
</style>
<svg viewBox="0 0 860 600" role="img" aria-label="Provider outage runbook: five time-boxed steps from confirming the outage to filing a postmortem, shown as a sequential animated procedure.">
<defs>
  <marker id="rb-arr" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1 0 L5 9 L9 0 z" fill="var(--border-2,#94a3b8)"/>
  </marker>
</defs>


<rect x="14" y="12" width="832" height="34" rx="8" fill="var(--warn,#e0a106)" fill-opacity="0.12" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
<text x="430" y="33" text-anchor="middle" class="trigger-lbl">Trigger: provider circuit opened OR status page shows major / critical</text>


<rect x="67" y="62" width="6" height="502" rx="3" fill="var(--border-2,#e2e8f0)"/>

<rect id="rb-spine-fill" x="67" y="88" width="6" height="0" rx="3" fill="var(--accent,#7c3aed)"/>


<circle cx="70" cy="100" r="18" fill="var(--accent,#7c3aed)"/>
<text x="70" y="106" text-anchor="middle" class="step-num">1</text>

<rect x="102" y="62" width="744" height="78" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>

<rect id="rb-hl1" x="102" y="62" width="744" height="78" rx="10" fill="var(--accent,#7c3aed)" opacity="0"/>

<text x="120" y="84" class="step-title">Step 1 — Confirm the outage</text>
<rect x="684" y="66" width="72" height="18" rx="9" fill="var(--accent,#7c3aed)" fill-opacity="0.15" stroke="var(--accent,#7c3aed)" stroke-width="1"/>
<text x="720" y="79" text-anchor="middle" class="chip">&lt; 5 min</text>
<text x="120" y="101" class="step-sub">a. Check provider status page (automated: diagnose_providers())</text>
<text x="120" y="116" class="step-sub">b. Run a synthetic test call to the provider API from terminal</text>
<text x="120" y="131" class="step-sub">c. Check internal latency/error dashboards for provider</text>


<circle cx="70" cy="192" r="18" fill="var(--good,#2f9e6e)"/>
<text x="70" y="198" text-anchor="middle" class="step-num">2</text>

<rect x="102" y="154" width="744" height="78" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--good,#2f9e6e)" stroke-width="2"/>
<rect id="rb-hl2" x="102" y="154" width="744" height="78" rx="10" fill="var(--good,#2f9e6e)" opacity="0"/>

<text x="120" y="176" class="step-title" style="fill:var(--good,#2f9e6e)">Step 2 — Activate failover</text>
<rect x="684" y="158" width="72" height="18" rx="9" fill="var(--good,#2f9e6e)" fill-opacity="0.15" stroke="var(--good,#2f9e6e)" stroke-width="1"/>
<text x="720" y="171" text-anchor="middle" class="chip" style="fill:var(--good,#2f9e6e)">&lt; 2 min</text>
<text x="120" y="193" class="step-sub">a. Verify gateway auto-routed to secondary (grep "Served by" logs)</text>
<text x="120" y="208" class="step-sub">b. If not auto-routed: gateway.circuits["openai"].trip(cooldown=3600)</text>
<text x="120" y="223" class="step-sub">c. Run canary eval on secondary to verify quality SLI</text>


<circle cx="70" cy="284" r="18" fill="var(--accent,#7c3aed)"/>
<text x="70" y="290" text-anchor="middle" class="step-num">3</text>

<rect x="102" y="246" width="744" height="78" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<rect id="rb-hl3" x="102" y="246" width="744" height="78" rx="10" fill="var(--accent,#7c3aed)" opacity="0"/>

<text x="120" y="268" class="step-title">Step 3 — Monitor secondary health</text>
<rect x="684" y="250" width="72" height="18" rx="9" fill="var(--accent,#7c3aed)" fill-opacity="0.15" stroke="var(--accent,#7c3aed)" stroke-width="1"/>
<text x="720" y="263" text-anchor="middle" class="chip">ongoing</text>
<text x="120" y="285" class="step-sub">a. Watch secondary latency — it may have different rate limits</text>
<text x="120" y="300" class="step-sub">b. Adjust max_tokens / batching if secondary is congested</text>
<text x="120" y="315" class="step-sub">c. Notify stakeholders if quality SLO degrades &gt;2% on secondary</text>


<circle cx="70" cy="376" r="18" fill="var(--accent,#7c3aed)"/>
<text x="70" y="382" text-anchor="middle" class="step-num">4</text>

<rect x="102" y="338" width="744" height="88" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<rect id="rb-hl4" x="102" y="338" width="744" height="88" rx="10" fill="var(--accent,#7c3aed)" opacity="0"/>

<text x="120" y="360" class="step-title">Step 4 — Recovery (when primary recovers)</text>
<rect x="672" y="342" width="84" height="18" rx="9" fill="var(--accent,#7c3aed)" fill-opacity="0.15" stroke="var(--accent,#7c3aed)" stroke-width="1"/>
<text x="714" y="355" text-anchor="middle" class="chip">30 min ramp</text>
<text x="120" y="377" class="step-sub">a. Primary status page returns to "operational"</text>
<text x="120" y="392" class="step-sub">b. Send 5% test traffic to primary; verify latency and quality</text>
<text x="120" y="407" class="step-sub">c. Restore weight gradually:</text>

<rect x="270" y="398" width="60" height="12" rx="3" fill="var(--border-2,#e2e8f0)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<rect x="270" y="398" width="12" height="12" rx="3" fill="var(--accent,#7c3aed)" fill-opacity="0.5"/>
<text x="284" y="408" text-anchor="middle" style="font:700 8px var(--sans,sans-serif);fill:#fff">20%</text>
<rect x="336" y="398" width="60" height="12" rx="3" fill="var(--border-2,#e2e8f0)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<rect x="336" y="398" width="30" height="12" rx="3" fill="var(--accent,#7c3aed)" fill-opacity="0.7"/>
<text x="351" y="408" text-anchor="middle" style="font:700 8px var(--sans,sans-serif);fill:#fff">50%</text>
<rect x="402" y="398" width="60" height="12" rx="3" fill="var(--border-2,#e2e8f0)" stroke="var(--border-2,#cbd5e1)" stroke-width="1"/>
<rect x="402" y="398" width="60" height="12" rx="3" fill="var(--accent,#7c3aed)"/>
<text x="432" y="408" text-anchor="middle" style="font:700 8px var(--sans,sans-serif);fill:#fff">100%</text>
<text x="475" y="408" class="step-sub">over 30 min</text>
<text x="120" y="420" class="step-sub">d. Close incident when 100% traffic stable for 15 min</text>


<circle cx="70" cy="476" r="18" fill="var(--accent,#7c3aed)"/>
<text x="70" y="482" text-anchor="middle" class="step-num">5</text>

<rect x="102" y="438" width="744" height="78" rx="10" fill="var(--surface,#f8fafc)" stroke="var(--border-2,#cbd5e1)" stroke-width="1.5"/>
<rect id="rb-hl5" x="102" y="438" width="744" height="78" rx="10" fill="var(--accent,#7c3aed)" opacity="0"/>

<text x="120" y="460" class="step-title">Step 5 — Postmortem</text>
<rect x="672" y="442" width="84" height="18" rx="9" fill="var(--accent,#7c3aed)" fill-opacity="0.15" stroke="var(--accent,#7c3aed)" stroke-width="1"/>
<text x="714" y="455" text-anchor="middle" class="chip">within 48 h</text>
<text x="120" y="477" class="step-sub">a. Complete postmortem template (trace evidence required)</text>
<text x="120" y="492" class="step-sub">b. File action items in project tracker</text>
<text x="120" y="507" class="step-sub">c. Update runbook with new learnings</text>


<text x="430" y="535" text-anchor="middle" class="cap">Each step has a time budget — the animated spine tracks progress through the on-call procedure</text>

</svg>
<figcaption><b>The provider outage runbook sequences five time-boxed steps from initial confirmation to postmortem.</b> Step 2 (activate failover) is the most critical restore action and should complete in under two minutes; the traffic ramp in Step 4 prevents a sudden surge from stressing a primary that just recovered. The animated spine traces execution order and reinforces the time budgets.</figcaption>
</figure>
