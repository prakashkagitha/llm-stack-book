<figure class="viz" id="fig-promptcache-prefix-ordering">
<svg viewBox="0 0 900 520" role="img" aria-label="Side-by-side comparison of bad and good prompt ordering for prefix caching. Bad: volatile date token first invalidates the entire cache. Good: static system instructions first allows the large prefix to be cached; a dashed cache boundary line separates the cacheable prefix from the dynamic suffix.">
<style>
  #fig-promptcache-prefix-ordering text { fill: var(--ink-soft); }
  #fig-promptcache-prefix-ordering .col-title { font: 700 14px var(--sans,sans-serif); }
  #fig-promptcache-prefix-ordering .seg-lbl { font: 600 12px var(--mono,monospace); }
  #fig-promptcache-prefix-ordering .annot { font: italic 10px var(--sans,sans-serif); fill: var(--muted); }
  #fig-promptcache-prefix-ordering .tag { font: 700 9.5px var(--sans,sans-serif); }
  #fig-promptcache-prefix-ordering .caption { font: 400 11px var(--sans,sans-serif); fill: var(--muted); }
  #fig-promptcache-prefix-ordering .bracket { font: 600 11px var(--sans,sans-serif); }
</style>
<defs>
  <marker id="pc-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#888)"/>
  </marker>
  
  <pattern id="pc-hatch" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
    <line x1="0" y1="8" x2="8" y2="0" stroke="var(--warn,#e0a106)" stroke-width="1" opacity="0.4"/>
  </pattern>
</defs>



<text x="200" y="26" text-anchor="middle" class="col-title">BAD - cache miss every call</text>



<rect x="40" y="40" width="340" height="56" rx="6" fill="url(#pc-hatch)" stroke="var(--warn,#e0a106)" stroke-width="2" stroke-dasharray="6 3"/>
<rect x="40" y="40" width="340" height="56" rx="6" fill="var(--surface,#f8f8fb)" opacity="0.6"/>
<text x="54" y="72" class="seg-lbl">[Today's date: {date}]</text>
<rect x="42" y="42" width="52" height="16" rx="3" fill="var(--warn,#e0a106)" opacity="0.8"/>
<text x="68" y="53" text-anchor="middle" class="tag" fill="#fff">volatile</text>
<text x="386" y="55" text-anchor="start" class="annot">changes daily -&gt;</text>
<text x="386" y="68" text-anchor="start" class="annot">invalidates cache</text>


<rect x="40" y="104" width="340" height="56" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
<text x="54" y="136" class="seg-lbl">[System instructions...]</text>


<rect x="40" y="168" width="340" height="56" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
<text x="54" y="200" class="seg-lbl">[Retrieved documents...]</text>


<rect x="40" y="232" width="340" height="56" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
<text x="54" y="264" class="seg-lbl">[User query]</text>


<rect x="40" y="300" width="340" height="28" rx="4" fill="var(--warn,#e0a106)" opacity="0.15"/>
<text x="210" y="319" text-anchor="middle" style="font:600 12px var(--sans,sans-serif); fill:var(--warn,#e0a106)">cacheable prefix: none</text>



<text x="655" y="26" text-anchor="middle" class="col-title">GOOD - system prefix cached</text>



<rect x="520" y="40" width="270" height="56" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
<rect x="520" y="40" width="6" height="56" rx="3" fill="var(--accent,#4f46e5)"/>
<rect x="520" y="40" width="270" height="56" rx="6" fill="var(--accent,#4f46e5)" fill-opacity="0.05"/>
<text x="534" y="72" class="seg-lbl">[System instructions...]</text>
<rect x="522" y="42" width="38" height="16" rx="3" fill="var(--accent,#4f46e5)"/>
<text x="541" y="53" text-anchor="middle" class="tag" fill="#fff">static</text>
<text x="802" y="58" text-anchor="start" class="annot">static, thousands</text>
<text x="802" y="70" text-anchor="start" class="annot">of tokens</text>


<rect x="520" y="104" width="270" height="56" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5"/>
<rect x="520" y="104" width="6" height="56" rx="3" fill="var(--accent,#4f46e5)"/>
<rect x="520" y="104" width="270" height="56" rx="6" fill="var(--accent,#4f46e5)" fill-opacity="0.05"/>
<text x="534" y="136" class="seg-lbl">[Persona, rules, format...]</text>
<rect x="522" y="106" width="38" height="16" rx="3" fill="var(--accent,#4f46e5)"/>
<text x="541" y="117" text-anchor="middle" class="tag" fill="#fff">static</text>


<line x1="510" y1="170" x2="800" y2="170" stroke="var(--accent,#4f46e5)" stroke-width="2" stroke-dasharray="8 4"/>
<text x="655" y="183" text-anchor="middle" style="font:700 11px var(--sans,sans-serif); fill:var(--accent,#4f46e5)">- CACHE BOUNDARY -</text>


<rect x="520" y="192" width="270" height="56" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="534" y="224" class="seg-lbl">[Retrieved documents...]</text>
<rect x="528" y="194" width="54" height="16" rx="3" fill="var(--warn,#e0a106)" opacity="0.7"/>
<text x="555" y="205" text-anchor="middle" class="tag" fill="#fff">dynamic</text>
<text x="802" y="208" text-anchor="start" class="annot">changes per</text>
<text x="802" y="220" text-anchor="start" class="annot">request</text>


<rect x="520" y="256" width="270" height="44" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="534" y="282" class="seg-lbl">[Today's date: {date}]</text>
<rect x="528" y="258" width="54" height="16" rx="3" fill="var(--warn,#e0a106)" opacity="0.5"/>
<text x="555" y="269" text-anchor="middle" class="tag" fill="#fff">dynamic</text>


<rect x="520" y="308" width="270" height="44" rx="6" fill="var(--surface,#f8f8fb)" stroke="var(--border-2,#c4c2e0)" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="534" y="334" class="seg-lbl">[User query]</text>


<line x1="502" y1="40" x2="502" y2="168" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>
<line x1="502" y1="40" x2="510" y2="40" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>
<line x1="502" y1="168" x2="510" y2="168" stroke="var(--accent,#4f46e5)" stroke-width="1.5"/>
<text x="494" y="88" text-anchor="end" class="bracket" fill="var(--accent,#4f46e5)" transform="rotate(-90,494,104)">cached (10% cost)</text>


<line x1="502" y1="170" x2="502" y2="352" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
<line x1="502" y1="170" x2="510" y2="170" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
<line x1="502" y1="352" x2="510" y2="352" stroke="var(--warn,#e0a106)" stroke-width="1.5"/>
<text x="494" y="230" text-anchor="end" class="bracket" fill="var(--warn,#e0a106)" transform="rotate(-90,494,265)">dynamic (full cost)</text>


<text x="450" y="402" text-anchor="middle" class="caption">Cache is keyed on an exact byte-for-byte prefix - put the most stable content first.</text>
<text x="450" y="416" text-anchor="middle" class="caption">Static block on top = max cache hit rate and lowest per-request token cost.</text>
</svg>
<figcaption><b>Cache-friendly prompt ordering puts static content first.</b> When volatile content (like a daily date) appears at the top of the prompt (left column), the entire KV-cache prefix is invalidated on every request. Moving static system instructions to the top (right column) creates a large cacheable prefix below which dynamic content changes freely — typically reducing input-token cost by 50% or more at scale.</figcaption>
</figure>
