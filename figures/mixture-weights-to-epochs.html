<figure class="viz" id="fig-mixture-weights-to-epochs">
<svg viewBox="0 0 820 700" role="img" aria-label="Small multiples chart, one row per domain, showing corpus size, mixture weight, and resulting epoch count for a worked example of a 2 trillion token training run. Wikipedia's epoch count reaches about 20, far past a 4-epoch repetition-risk threshold, while Web stays under 1 epoch despite the largest corpus and weight.">
<defs>
  <pattern id="mwe-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="var(--accent,#c15b39)" fill-opacity="0.25"/>
    <line x1="0" y1="0" x2="0" y2="6" stroke="var(--accent,#c15b39)" stroke-width="2" stroke-opacity="0.55"/>
  </pattern>
</defs>
<style>
  #fig-mixture-weights-to-epochs text { fill: currentColor; }
  #fig-mixture-weights-to-epochs .col-hdr { font: 700 12px var(--sans,sans-serif); }
  #fig-mixture-weights-to-epochs .col-sub { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-mixture-weights-to-epochs .domain-name { font: 700 12.5px var(--sans,sans-serif); }
  #fig-mixture-weights-to-epochs .val-lbl { font: 500 10.5px var(--mono,monospace); fill: var(--ink-soft); }
  #fig-mixture-weights-to-epochs .val-lbl-strong { font: 700 11px var(--mono,monospace); }
  #fig-mixture-weights-to-epochs .thresh-lbl { font: 600 10px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-mixture-weights-to-epochs .annot { font: 700 10.5px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-mixture-weights-to-epochs .annot2 { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#94a3b8); }
  #fig-mixture-weights-to-epochs .annot-under { font: 600 10px var(--sans,sans-serif); fill: var(--good,#2f9e6e); }
  #fig-mixture-weights-to-epochs .formula { font: 600 12.5px var(--mono,monospace); }
</style>


<g data-anim="1">
  <text x="14" y="24" class="col-hdr">Domain</text>
  <text x="150" y="24" class="col-hdr">Corpus size |D|</text>
  <text x="150" y="37" class="col-sub">not to scale / log-ordered</text>
  <text x="410" y="24" class="col-hdr">Mixture weight w</text>
  <text x="585" y="24" class="col-hdr">Epochs = N&#183;w / |D|</text>
</g>


<g data-anim="2">
  <line x1="735" y1="60" x2="735" y2="610" stroke="var(--accent,#c15b39)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="735" y="52" text-anchor="middle" class="thresh-lbl">4 epochs</text>
  <text x="735" y="65" text-anchor="middle" style="font:500 8.5px var(--sans,sans-serif); fill:var(--accent,#c15b39)">repetition risk</text>
</g>


<g data-anim="2">
  <text x="14" y="102" class="domain-name">Web / CC</text>
  <rect x="150" y="90" width="200.0" height="18" rx="3" class="v-fill" stroke="var(--ink-soft,#cbc4b8)" stroke-width="1"/>
  <text x="356" y="103" class="val-lbl">3.0T</text>
  <rect x="410" y="90" width="120.0" height="18" rx="3" fill="var(--ink-soft,#cbc4b8)" fill-opacity="0.55"/>
  <text x="536" y="103" class="val-lbl">0.65</text>
  <rect x="585" y="90" width="16.1" height="18" rx="3" fill="var(--good,#2f9e6e)"/>
  <text x="607" y="103" class="val-lbl-strong" fill="var(--good,#2f9e6e)">0.43</text>
  <text x="14" y="124" class="annot-under">&lt;1 epoch despite</text>
  <text x="14" y="137" class="annot-under">largest corpus &amp; weight</text>
</g>


<g data-anim="2">
  <text x="14" y="192" class="domain-name">Code / GitHub</text>
  <rect x="150" y="180" width="139.6" height="18" rx="3" class="v-fill" stroke="var(--ink-soft,#cbc4b8)" stroke-width="1"/>
  <text x="296" y="193" class="val-lbl">350B</text>
  <rect x="410" y="180" width="27.7" height="18" rx="3" fill="var(--ink-soft,#cbc4b8)" fill-opacity="0.55"/>
  <text x="444" y="193" class="val-lbl">0.15</text>
  <rect x="585" y="180" width="32.2" height="18" rx="3" fill="var(--accent,#c15b39)"/>
  <text x="624" y="193" class="val-lbl-strong" fill="var(--accent,#c15b39)">0.86</text>
</g>


<g data-anim="3">
  <text x="14" y="282" class="domain-name">Books</text>
  <rect x="150" y="270" width="101.5" height="18" rx="3" class="v-fill" stroke="var(--ink-soft,#cbc4b8)" stroke-width="1"/>
  <text x="258" y="283" class="val-lbl">90B</text>
  <rect x="410" y="270" width="14.8" height="18" rx="3" fill="var(--ink-soft,#cbc4b8)" fill-opacity="0.55"/>
  <text x="431" y="283" class="val-lbl">0.08</text>
  <rect x="585" y="270" width="66.8" height="18" rx="3" fill="var(--accent,#c15b39)"/>
  <text x="658" y="283" class="val-lbl-strong" fill="var(--accent,#c15b39)">1.78</text>
</g>


<g data-anim="3">
  <text x="14" y="372" class="domain-name">arXiv</text>
  <rect x="150" y="360" width="78.7" height="18" rx="3" class="v-fill" stroke="var(--ink-soft,#cbc4b8)" stroke-width="1"/>
  <text x="235" y="373" class="val-lbl">40B</text>
  <rect x="410" y="360" width="7.4" height="18" rx="3" fill="var(--ink-soft,#cbc4b8)" fill-opacity="0.55"/>
  <text x="424" y="373" class="val-lbl">0.04</text>
  <rect x="585" y="360" width="75.0" height="18" rx="3" fill="var(--accent,#c15b39)"/>
  <text x="666" y="373" class="val-lbl-strong" fill="var(--accent,#c15b39)">2.00</text>
</g>


<g data-anim="4">
  <text x="14" y="462" class="domain-name" fill="var(--accent,#c15b39)">Wikipedia</text>
  <rect x="150" y="450" width="14.0" height="18" rx="3" class="v-fill" stroke="var(--ink-soft,#cbc4b8)" stroke-width="1"/>
  <text x="170" y="463" class="val-lbl">4B</text>
  <rect x="410" y="450" width="7.4" height="18" rx="3" fill="var(--ink-soft,#cbc4b8)" fill-opacity="0.55"/>
  <text x="424" y="463" class="val-lbl">0.04</text>
  
  <rect x="585" y="450" width="150" height="18" rx="3" fill="var(--accent,#c15b39)"/>
  <rect x="735" y="450" width="40" height="18" fill="url(#mwe-hatch)" stroke="var(--accent,#c15b39)" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M 775,448 L 782,459 L 775,470" fill="none" stroke="var(--accent,#c15b39)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="14" y="481" class="annot">~20x epochs</text>
  <text x="14" y="494" class="annot2">heavy up-weight, tiny corpus</text>
</g>


<g data-anim="4">
  <text x="14" y="552" class="domain-name">Other curated</text>
  <rect x="150" y="540" width="90.1" height="18" rx="3" class="v-fill" stroke="var(--ink-soft,#cbc4b8)" stroke-width="1"/>
  <text x="248" y="553" class="val-lbl">60B</text>
  <rect x="410" y="540" width="7.4" height="18" rx="3" fill="var(--ink-soft,#cbc4b8)" fill-opacity="0.55"/>
  <text x="424" y="553" class="val-lbl">0.04</text>
  <rect x="585" y="540" width="49.9" height="18" rx="3" fill="var(--accent,#c15b39)"/>
  <text x="643" y="553" class="val-lbl-strong" fill="var(--accent,#c15b39)">1.33</text>
</g>


<g data-anim="1">
  <line x1="14" y1="628" x2="806" y2="628" stroke="var(--border-2,#413c35)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="14" y="655" class="formula">epochs_i = N &#183; w_i / |D_i|,  N = 2T tokens (worked example)</text>
</g>

</svg>
<figcaption><b>Mixture weight and corpus size jointly set how many times each domain is seen during training.</b> In this worked example (N = 2T tokens), Web/CC has the largest corpus and the highest weight yet stays under one epoch, while Wikipedia's tiny 4B-token corpus is repeated roughly 20 times despite a modest 0.04 weight -- well past the ~4-epoch threshold where repetition starts to hurt generalization.</figcaption>
</figure>
