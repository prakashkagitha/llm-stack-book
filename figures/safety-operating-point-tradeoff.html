<figure class="viz" id="fig-safety-operating-point-tradeoff">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 800 460" role="img" aria-label="A single refusal threshold sliding across two overlapping score distributions, benign and harmful requests, simultaneously sets four outcome regions -- correctly helped, over-refused benign, correctly refused, and missed harm -- and a companion ROC-style panel shows the resulting operating point on the harm-recall versus over-refusal curve.">
<defs>
  <clipPath id="sotLeftClip">
    <rect x="52" y="72" width="203" height="272"/>
  </clipPath>
  <clipPath id="sotRightClip">
    <rect x="255" y="72" width="219" height="272"/>
  </clipPath>
  <style>
    #fig-safety-operating-point-tradeoff text { fill: var(--ink-soft,#45413a); }
    #fig-safety-operating-point-tradeoff .ttl      { font: 700 14.5px var(--sans,sans-serif); }
    #fig-safety-operating-point-tradeoff .sub      { font: 400 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-safety-operating-point-tradeoff .panel-h  { font: 700 12.5px var(--sans,sans-serif); }
    #fig-safety-operating-point-tradeoff .panel-s  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-safety-operating-point-tradeoff .curve-lbl{ font: 700 12px var(--sans,sans-serif); }
    #fig-safety-operating-point-tradeoff .region-h { font: 700 12px var(--sans,sans-serif); }
    #fig-safety-operating-point-tradeoff .region-s { font: 400 9.5px var(--sans,sans-serif); }
    #fig-safety-operating-point-tradeoff .axis-lbl { font: 600 10.5px var(--mono,monospace); fill: var(--muted,#6d675d); }
    #fig-safety-operating-point-tradeoff .axis-cap { font: 500 11px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-safety-operating-point-tradeoff .thr-lbl  { font: 700 11.5px var(--mono,monospace); }
    #fig-safety-operating-point-tradeoff .callout-h{ font: 700 11.5px var(--mono,monospace); }
    #fig-safety-operating-point-tradeoff .callout-s{ font: 400 9.7px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-safety-operating-point-tradeoff .roc-lbl  { font: 700 10.5px var(--sans,sans-serif); }
    #fig-safety-operating-point-tradeoff .roc-s    { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
    #fig-safety-operating-point-tradeoff .overlap-lbl { font: italic 500 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }

    @media (prefers-reduced-motion:no-preference){
      @keyframes sotThrSlide { 0%,100% { transform: translateX(0); } 45% { transform: translateX(-26px); } 75% { transform: translateX(18px); } }
      @keyframes sotDotMove { 0%,100% { transform: translate(0,0); } 45% { transform: translate(-34px,26px); } 75% { transform: translate(22px,-16px); } }
      figure.viz.in-view #fig-safety-operating-point-tradeoff .sot-thr-group { animation: sotThrSlide 5s ease-in-out infinite; }
      figure.viz.in-view #fig-safety-operating-point-tradeoff .sot-dot-group { animation: sotDotMove 5s ease-in-out infinite; }
    }
  </style>
</defs>

<g data-anim="1">
  <text x="20" y="22" class="ttl">One threshold, two coupled error rates</text>
  <text x="20" y="38" class="sub">sliding the refusal threshold across overlapping benign / harmful score distributions</text>
</g>


<g data-anim="1">
  <line x1="52" y1="344" x2="474" y2="344" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <line x1="52" y1="340" x2="52" y2="348" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <line x1="474" y1="340" x2="474" y2="348" stroke="var(--border-2,#d8d1c0)" stroke-width="1.4"/>
  <text x="52" y="362" text-anchor="start" class="axis-lbl">low</text>
  <text x="474" y="362" text-anchor="end" class="axis-lbl">high</text>
  <text x="263" y="378" text-anchor="middle" class="axis-cap">model harm-score of a request</text>
</g>

<g data-anim="2">
  
  <path d="M 52,344 C 88,344 108,112 148,112 C 190,112 232,300 300,344 Z"
        fill="var(--accent2,#3b82f6)" opacity="0.14"/>
  
  <path d="M 52,344 C 88,344 108,112 148,112 C 190,112 232,300 300,344 Z"
        fill="var(--good,#2f9e6e)" opacity="0.16" clip-path="url(#sotLeftClip)"/>
  
  <path d="M 52,344 C 88,344 108,112 148,112 C 190,112 232,300 300,344 Z"
        fill="var(--warn,#e0a106)" opacity="0.55" clip-path="url(#sotRightClip)"/>
  <path d="M 52,344 C 88,344 108,112 148,112 C 190,112 232,300 300,344"
        fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.2"/>
  <text x="128" y="98" text-anchor="middle" class="curve-lbl" fill="var(--accent2,#3b82f6)">benign requests</text>

  
  <path d="M 206,344 C 258,344 336,112 378,112 C 420,112 442,300 474,344 Z"
        fill="var(--accent,#c15b39)" opacity="0.14"/>
  
  <path d="M 206,344 C 258,344 336,112 378,112 C 420,112 442,300 474,344 Z"
        fill="var(--accent-2,#b04e2d)" opacity="0.55" clip-path="url(#sotLeftClip)"/>
  
  <path d="M 206,344 C 258,344 336,112 378,112 C 420,112 442,300 474,344 Z"
        fill="var(--good,#2f9e6e)" opacity="0.30" clip-path="url(#sotRightClip)"/>
  <path d="M 206,344 C 258,344 336,112 378,112 C 420,112 442,300 474,344"
        fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.2"/>
  <text x="398" y="98" text-anchor="middle" class="curve-lbl" fill="var(--accent,#c15b39)">harmful requests</text>

  <text x="212" y="150" text-anchor="middle" class="overlap-lbl">overlap</text>
</g>

<g class="sot-thr-group" data-anim="3">
  <line x1="255" y1="70" x2="255" y2="346" stroke="var(--ink-soft,#45413a)" stroke-width="2.4" stroke-dasharray="6,4"/>
  <circle cx="255" cy="70" r="5" fill="var(--ink-soft,#45413a)"/>
  <text x="255" y="60" text-anchor="middle" class="thr-lbl">refuse if score &gt; threshold</text>
  <path d="M 244,196 L 232,202 L 244,208 Z" fill="var(--ink-soft,#45413a)"/>
  <path d="M 266,196 L 278,202 L 266,208 Z" fill="var(--ink-soft,#45413a)"/>
</g>

<g data-anim="3">
  <text x="128" y="272" text-anchor="middle" class="region-h" fill="var(--good,#2f9e6e)">TN</text>
  <text x="128" y="286" text-anchor="middle" class="region-s" fill="var(--muted,#6d675d)">correctly helped</text>

  <text x="228" y="238" text-anchor="middle" class="region-h" fill="var(--accent-2,#b04e2d)">FN</text>
  <text x="228" y="252" text-anchor="middle" class="region-s" fill="var(--accent-2,#b04e2d)">missed harm</text>

  <path d="M 278,224 L 288,224 L 283,215 Z" fill="var(--warn,#e0a106)"/>
  <text x="283" y="240" text-anchor="middle" class="region-h" fill="var(--warn,#e0a106)">FP</text>
  <text x="283" y="254" text-anchor="middle" class="region-s" fill="var(--warn,#e0a106)">over-refused</text>
  <text x="283" y="265" text-anchor="middle" class="region-s" fill="var(--warn,#e0a106)">benign</text>

  <text x="375" y="205" text-anchor="middle" class="region-h" fill="var(--good,#2f9e6e)">TP</text>
  <text x="375" y="219" text-anchor="middle" class="region-s" fill="var(--muted,#6d675d)">correctly refused</text>
</g>

<g data-anim="4">
  <text x="146" y="400" text-anchor="middle" class="callout-h">&lt;- slide left</text>
  <text x="146" y="414" text-anchor="middle" class="callout-s">fewer misses,</text>
  <text x="146" y="426" text-anchor="middle" class="callout-s">more over-refusal</text>

  <text x="378" y="400" text-anchor="middle" class="callout-h">slide right -&gt;</text>
  <text x="378" y="414" text-anchor="middle" class="callout-s">fewer over-refusals,</text>
  <text x="378" y="426" text-anchor="middle" class="callout-s">more missed harm</text>
</g>

<line x1="516" y1="55" x2="516" y2="426" stroke="var(--border-2,#d8d1c0)" stroke-width="1" opacity="0.6" data-anim="1"/>


<g data-anim="5">
  <text x="656" y="58" text-anchor="middle" class="panel-h">resulting operating point</text>
  <text x="656" y="72" text-anchor="middle" class="panel-s">over-refusal rate vs. harm-recall</text>

  <line x1="583" y1="112" x2="583" y2="290" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
  <line x1="583" y1="290" x2="733" y2="290" stroke="var(--border-2,#d8d1c0)" stroke-width="1.3"/>
  <text x="579" y="294" text-anchor="end" class="axis-lbl">0</text>
  <text x="733" y="303" text-anchor="middle" class="axis-lbl">1</text>
  <text x="579" y="118" text-anchor="end" class="axis-lbl">1</text>
  <text x="656" y="317" text-anchor="middle" class="axis-cap">over-refusal rate (FPR)</text>
  <text x="561" y="200" text-anchor="middle" class="axis-cap" transform="rotate(-90 561 200)">harm-recall (TPR)</text>

  <line x1="583" y1="290" x2="733" y2="112" stroke="var(--muted,#6d675d)" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.7"/>
  <text x="668" y="222" text-anchor="middle" class="roc-s" transform="rotate(-42 668 222)">chance</text>

  <path d="M 583,290 C 615,150 655,118 733,112" fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="2.2"/>
  <path d="M 583,290 C 615,150 655,118 733,112" fill="none" stroke="var(--ink-soft,#45413a)" stroke-width="1" stroke-dasharray="1,5" opacity="0.5"/>

  <g class="sot-dot-group">
    <circle cx="639" cy="181" r="5.5" fill="var(--accent,#c15b39)" stroke="var(--ink-soft,#45413a)" stroke-width="1.4"/>
    <text x="649" y="171" text-anchor="start" class="roc-lbl">this operating</text>
    <text x="649" y="183" text-anchor="start" class="roc-lbl">point</text>
  </g>

  <text x="656" y="335" text-anchor="middle" class="roc-s">sliding the threshold traces this curve</text>
</g>

</svg>
<figcaption><b>One safety threshold, slid across overlapping score distributions, simultaneously sets the harm rate and the over-refusal rate.</b> Moving the dashed line left shrinks the missed-harm (FN) sliver but grows the over-refused-benign (FP) sliver, and vice versa -- the overlap between benign and harmful requests is irreducible, so every choice of threshold is a single point on the same ROC-style curve, not an escape from it.</figcaption>
</figure>
