<figure class="viz" id="fig-rlanat-budget-memory-and-time">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 820 620" role="img" aria-label="Two panels for a 7B GRPO run: memory is dominated by the multiplicity of resident model copies, with the AdamW optimizer state the single largest block at 84 GB out of roughly 140 GB; wall-clock for one step is dominated by generation, at about 78 percent of the 51-plus second step.">

    </pattern>
    <marker id="rlanat-bmt-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="v-muted"/>
    </marker>
  </defs>
  <style>
    #fig-rlanat-budget-memory-and-time text{ fill:var(--ink-soft); }
    #fig-rlanat-budget-memory-and-time .ptitle{ font:700 14px var(--sans,sans-serif); }
    #fig-rlanat-budget-memory-and-time .seg{ font:600 10.5px var(--sans,sans-serif); }

    #fig-rlanat-budget-memory-and-time .mono{ font:600 10.5px var(--mono,monospace); }
    #fig-rlanat-budget-memory-and-time .callout{ font:600 10.5px var(--sans,sans-serif); }
    #fig-rlanat-budget-memory-and-time .strap{ font:600 12px var(--sans,sans-serif); }
    #fig-rlanat-budget-memory-and-time .divider{ stroke:var(--border-2); stroke-width:1; }
  </style>


  <line x1="425" y1="30" x2="425" y2="590" class="divider"/>


  <g data-anim="1">
    <text x="215" y="34" text-anchor="middle" class="ptitle" fill="var(--accent)">MEMORY = how many copies are resident</text>
  </g>


  <g data-anim="2">

    <rect x="155" y="457" width="120" height="38" class="v-fill v-stroke" stroke-width="1.2"/>
    <text x="220" y="480" text-anchor="middle" class="segb">Policy weights</text>


    <rect x="155" y="229" width="120" height="228" fill="var(--accent)" fill-opacity="0.22" class="v-stroke" stroke-width="1.2"/>
    <text x="220" y="323" text-anchor="middle" class="segb" fill="var(--accent)">Policy</text>
    <text x="220" y="339" text-anchor="middle" class="segb" fill="var(--accent)">optimizer</text>
    <text x="220" y="357" text-anchor="middle" class="mono" fill="var(--accent)">84 GB</text>


    <rect x="155" y="191" width="120" height="38" class="v-fill v-stroke" stroke-width="1.2"/>
    <text x="220" y="214" text-anchor="middle" class="segb">Policy gradients</text>


    <rect x="155" y="153" width="120" height="38" class="v-fill v-stroke" stroke-width="1.2"/>
    <text x="220" y="176" text-anchor="middle" class="segb">Reference</text>


    <rect x="155" y="115" width="120" height="38" class="v-fill v-stroke" stroke-width="1.2"/>
    <text x="220" y="138" text-anchor="middle" class="segb">Inference replica</text>


    <rect x="155" y="85" width="120" height="30" fill="url(#rlanat-bmt-hatch)" class="v-stroke" stroke-width="1.2"/>
  </g>


  <g data-anim="3">
    <line x1="150" y1="343" x2="30" y2="330" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="28" y="300" text-anchor="start" class="callout" fill="var(--accent)">biggest line item</text>
    <text x="28" y="315" text-anchor="start" class="sub">-&gt; why critic-free GRPO</text>
    <text x="28" y="328" text-anchor="start" class="sub">&amp; LoRA-RL win</text>
  </g>


  <g data-anim="4">
    <text x="298" y="473" text-anchor="start" class="seg">Policy weights</text>
    <text x="298" y="487" text-anchor="start" class="sub">14 GB</text>

    <text x="298" y="206" text-anchor="start" class="seg">Policy gradients</text>
    <text x="298" y="220" text-anchor="start" class="sub">14 GB</text>

    <text x="298" y="168" text-anchor="start" class="seg">Reference (frozen)</text>
    <text x="298" y="182" text-anchor="start" class="sub">14 GB</text>

    <text x="298" y="130" text-anchor="start" class="seg">Inference replica</text>
    <text x="298" y="144" text-anchor="start" class="sub">(vLLM) &#8212; 14 GB</text>

    <text x="298" y="93" text-anchor="start" class="seg">KV cache</text>
    <text x="298" y="106" text-anchor="start" class="sub">(grows with load)</text>
  </g>


  <g data-anim="5">
    <path d="M 283 115 L 289 115 L 289 495 L 283 495" fill="none" stroke="var(--muted)" stroke-width="1.3"/>
    <text x="220" y="545" text-anchor="middle" class="callout" fill="var(--warn,#e0a106)">~140 GB before activations &amp; KV</text>
    <text x="220" y="560" text-anchor="middle" class="sub">-&gt; exceeds one 80 GB GPU -&gt; multi-GPU</text>
    <line x1="220" y1="495" x2="220" y2="528" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="3 3"/>
  </g>


  <g data-anim="1">
    <text x="615" y="34" text-anchor="middle" class="ptitle" fill="var(--accent)">TIME = generation dominates</text>
  </g>


  <g data-anim="2">

    <rect x="450" y="255" width="244" height="70" fill="var(--accent)" fill-opacity="0.22" class="v-stroke" stroke-width="1.2"/>
    <text x="572" y="286" text-anchor="middle" class="segb" fill="var(--accent)">Generate</text>
    <text x="572" y="303" text-anchor="middle" class="mono" fill="var(--accent)">~40 s</text>


    <rect x="694" y="255" width="7" height="70" class="v-fill v-stroke" stroke-width="1"/>


    <rect x="701" y="255" width="61" height="70" class="v-fill v-stroke" stroke-width="1.2"/>


    <rect x="762" y="255" width="18" height="70" fill="url(#rlanat-bmt-hatch)" class="v-stroke" stroke-width="1.2"/>
  </g>


  <g data-anim="3">
    <line x1="697" y1="255" x2="697" y2="222" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="697" y="200" text-anchor="middle" class="seg">Reward</text>
    <text x="697" y="213" text-anchor="middle" class="sub">~1 s</text>

    <line x1="771" y1="255" x2="771" y2="222" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="771" y="200" text-anchor="middle" class="seg">T_sync</text>
    <text x="771" y="213" text-anchor="middle" class="sub">(varies)</text>
  </g>


  <g data-anim="4">
    <text x="731" y="352" text-anchor="middle" class="segb">Train</text>
    <text x="731" y="366" text-anchor="middle" class="mono">~10 s</text>
  </g>


  <g data-anim="5">
    <path d="M 450 340 L 450 348 L 694 348 L 694 340" fill="none" stroke="var(--muted)" stroke-width="1.2"/>
    <text x="572" y="365" text-anchor="middle" class="callout" fill="var(--warn,#e0a106)">~78% of the step</text>
  </g>


  <line x1="40" y1="590" x2="780" y2="590" class="divider"/>
  <g data-anim="5">
    <text x="410" y="613" text-anchor="middle" class="strap">Memory = model-copy multiplicity.  Time = generation.  Optimize these two and you understand ~80% of RL infra.</text>
  </g>
</svg>
<figcaption><b>Two facts explain most of RL infrastructure.</b> Memory is dominated by <i>how many copies</i> of the model are resident — the AdamW optimizer state (fp32 master + two moments) is the single biggest block, ~6x the weights themselves, which is why critic-free GRPO and LoRA-RL are so attractive. Wall-clock is dominated by <i>generation</i> — autoregressive decode eats ~78% of a synchronous step, dwarfing reward, training, and weight sync.</figcaption>
</figure>
