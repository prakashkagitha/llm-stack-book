<figure class="viz" id="fig-obs-burn-rate-vs-fixed-threshold">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 470" role="img" aria-label="Two stacked timelines of the same noisy quality signal. With a fixed threshold, brief random spikes and one genuine sustained degradation both cross the line and fire alerts, producing a cluster of false alarms and alarm fatigue. With burn-rate alerting on the same signal, the brief spikes barely move the error-budget-consumption curve and never alert, while the sustained degradation drives the burn rate past 2x the budget rate for a single, correctly timed alert.">
<defs>
  <marker id="br-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--v-muted,#888)"/>
  </marker>
</defs>
<style>
  #fig-obs-burn-rate-vs-fixed-threshold text { font-family: var(--sans, sans-serif); fill: var(--ink-soft,#333); }
  #fig-obs-burn-rate-vs-fixed-threshold .panel-title { font: 700 13px var(--sans,sans-serif); }
  #fig-obs-burn-rate-vs-fixed-threshold .panel-sub { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-obs-burn-rate-vs-fixed-threshold .legend-txt { font: 400 9px var(--sans,sans-serif); }
  #fig-obs-burn-rate-vs-fixed-threshold .axis-lbl { font: 400 9px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-obs-burn-rate-vs-fixed-threshold .tiny { font: 400 8.5px var(--sans,sans-serif); fill: var(--muted,#888); }
  #fig-obs-burn-rate-vs-fixed-threshold .alert-txt { font: 700 9px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
  #fig-obs-burn-rate-vs-fixed-threshold .callout { font: 600 10px var(--sans,sans-serif); fill: var(--accent,#c15b39); }
  #fig-obs-burn-rate-vs-fixed-threshold .band-lbl { font: 700 9px var(--sans,sans-serif); fill: var(--warn,#e0a106); }
</style>


<g data-anim="1">
  <line x1="470.4" y1="76" x2="470.4" y2="434" stroke="var(--v-grid,#ccc)" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>
  <line x1="601.6" y1="76" x2="601.6" y2="434" stroke="var(--v-grid,#ccc)" stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>
</g>


<g data-anim="1">
  <text x="44" y="30" class="panel-title">Fixed threshold</text>
  <text x="180" y="30" class="panel-sub">(alert if score &lt; 0.7)</text>

  
  <path d="M 48 48 L 44 58 L 52 58 Z" fill="var(--warn,#e0a106)"/>
  <text x="58" y="57" class="legend-txt">brief spike -&gt; <tspan font-weight="700" fill="var(--warn,#e0a106)">false alarm</tspan> (alarm fatigue)</text>
  <rect x="44" y="61" width="9" height="9" fill="var(--warn,#e0a106)" opacity="0.28"/>
  <text x="58" y="69" class="legend-txt">sustained band -&gt; <tspan font-weight="700">genuine degradation</tspan> (flagged too)</text>

  
  <rect x="44" y="76" width="656" height="134" fill="var(--surface,#faf8f3)" class="v-stroke" stroke-width="1.3"/>

  
  <rect x="470.4" y="76" width="131.2" height="134" fill="var(--warn,#e0a106)" opacity="0.16"/>
  <text x="536" y="90" text-anchor="middle" class="band-lbl">genuine degradation</text>

  
  <line x1="44" y1="150" x2="700" y2="150" stroke="var(--v-muted,#888)" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="48" y="146" class="tiny">fixed threshold</text>

  
  <polyline points="44,190 76.8,198 109.6,184 142.4,172 175.2,194 208,118 240.8,196 273.6,186 306.4,176
    339.2,114 372,190 404.8,180 437.6,198 470.4,128 503.2,124 536,132 568.8,122 601.6,130 634.4,192 667.2,116 700,188"
    fill="none" stroke="var(--ink-soft,#333)" stroke-width="1.7"/>

  
  <g fill="var(--warn,#e0a106)">
    <path d="M 208 118 L 204 106 L 216 106 Z"/>
    <path d="M 339.2 114 L 335.2 102 L 347.2 102 Z"/>
    <path d="M 470.4 128 L 466.4 116 L 478.4 116 Z"/>
    <path d="M 503.2 124 L 499.2 112 L 511.2 112 Z"/>
    <path d="M 536 132 L 532 120 L 544 120 Z"/>
    <path d="M 568.8 122 L 564.8 110 L 576.8 110 Z"/>
    <path d="M 601.6 130 L 597.6 118 L 609.6 118 Z"/>
    <path d="M 667.2 116 L 663.2 104 L 675.2 104 Z"/>
  </g>

  <text x="372" y="224" text-anchor="middle" class="axis-lbl">time</text>
</g>


<g data-anim="2">
  <text x="44" y="268" class="panel-title">Burn rate (error-budget)</text>
  <text x="240" y="268" class="panel-sub">(1% error budget &#8212; alert at 1h burn &gt; 2x budget rate)</text>

  
  <rect x="44" y="300" width="656" height="134" fill="var(--surface,#faf8f3)" class="v-stroke" stroke-width="1.3"/>
  <rect x="470.4" y="300" width="131.2" height="134" fill="var(--warn,#e0a106)" opacity="0.10"/>

  
  <line x1="44" y1="330" x2="700" y2="330" stroke="var(--v-muted,#888)" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="48" y="326" class="tiny">burn rate &gt; 2x budget</text>

  
  <polyline points="44,418 76.8,420 109.6,415 142.4,412 175.2,417 208,404 240.8,419 273.6,414 306.4,410
    339.2,402 372,416 404.8,411 437.6,420 470.4,395 503.2,350 536,300 568.8,260 601.6,230 634.4,225 667.2,222 700,220"
    fill="none" stroke="var(--accent,#c15b39)" stroke-width="2"/>

  
  <line x1="290" y1="392" x2="306" y2="410" stroke="var(--v-muted,#888)" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="288" y="388" text-anchor="end" class="tiny">barely nudges budget &#8212; no alert</text>

  
  <path d="M 536 300 L 532 288 L 544 288 Z" fill="var(--warn,#e0a106)"/>
  <text x="548" y="292" class="alert-txt">ALERT</text>
  <text x="548" y="311" class="callout" font-size="9.5">fires faster on the real</text>
  <text x="548" y="324" class="callout" font-size="9.5">problem, ignores noise</text>

  <text x="372" y="448" text-anchor="middle" class="axis-lbl">time</text>
</g>

</svg>
<figcaption><b>Burn-rate alerting ignores noise and catches real degradation faster.</b> Against a fixed threshold, both harmless noise spikes and a genuine sustained drop cross the line and fire alerts, producing alarm fatigue; the same signal fed through a rolling error-budget-consumption curve barely reacts to noise but climbs past 2x the budget rate for one correctly timed alert during the real problem.</figcaption>
</figure>
