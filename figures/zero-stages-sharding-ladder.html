<figcaption><b>ZeRO stages: per-parameter memory and communication at a glance.</b> Each row shows how 16 bytes per parameter (params 2B + grads 2B + optimizer state 12B) are distributed across GPUs at rest — solid bars are what each GPU stores; ghost outlines show what has been sharded away. ZeRO-3 shrinks storage to 16/N bytes per GPU (approaching zero as N grows), at the cost of ~1.5x the communication of plain DDP.</figcaption>
