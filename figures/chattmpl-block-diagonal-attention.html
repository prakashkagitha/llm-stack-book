<figcaption><b>The same packed sequence of three documents (3, 3, and 2 tokens) under two attention masks.</b> A plain causal mask lets later documents attend to earlier ones (highlighted leakage cells) -- a dependency that never exists at inference time. A block-diagonal causal mask keeps each document's attention within its own triangular block, matching Flash-Attention's <code>cu_seqlens</code> varlen API, which enforces the same boundaries without ever materialising the full matrix.</figcaption>
</figure>
