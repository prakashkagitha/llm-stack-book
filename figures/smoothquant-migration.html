<figure class="viz" id="fig-smoothquant-migration">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 430" role="img" aria-label="Before smoothing, one activation channel spikes far above its neighbors, forcing a coarse INT8 grid that crushes the normal channels toward zero, while the matching weight channel is modest and already fits a fine grid. A diagonal scale diag(s) migrates the difficulty: dividing the activation channel by s shrinks the spike while multiplying the matching weight channel by s grows it, so after migration both the activation and weight rows have moderate, comparable ranges that fit a fine INT8 grid feeding INT8 tensor cores, and the inverse scale folds into the upstream RMSNorm for free.">
<defs>
  <marker id="sqm-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--ink-soft,#64748b)"/>
  </marker>
</defs>
<style>
  #fig-smoothquant-migration text{ font:400 10.5px var(--sans,sans-serif); fill:var(--ink-soft,#374151); }
  #fig-smoothquant-migration .title{ font:700 14px var(--sans,sans-serif); fill:var(--ink-soft,#1f2937); }
  #fig-smoothquant-migration .panel-t{ font:700 12px var(--sans,sans-serif); fill:var(--ink-soft,#1f2937); }
  #fig-smoothquant-migration .row-lbl{ font:600 10.5px var(--sans,sans-serif); }
  #fig-smoothquant-migration .note{ font:400 9.5px var(--sans,sans-serif); fill:var(--muted,#6b7280); }
  #fig-smoothquant-migration .mono{ font:600 10px var(--mono,monospace); }
  #fig-smoothquant-migration .mono-sm{ font:400 9.5px var(--mono,monospace); fill:var(--muted,#6b7280); }
  #fig-smoothquant-migration .badge{ font:700 10.5px var(--sans,sans-serif); }
  #fig-smoothquant-migration.in-view [data-anim="6"]{ animation-delay:1.55s; }
</style>

<text x="390" y="22" text-anchor="middle" class="title">SmoothQuant: migrate quantization difficulty from activations into weights</text>

</g>

  <line x1="66" y1="140" x2="214" y2="140" stroke="var(--border-2,#cbd5e1)" stroke-width="1.4" stroke-dasharray="4 3"/>
  <line x1="66" y1="70" x2="214" y2="70" stroke="var(--border-2,#cbd5e1)" stroke-width="1.4" stroke-dasharray="4 3"/>

    <rect x="170" y="235" width="8" height="15"/>

  </g>
  <g stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="4 3">
    <line x1="66" y1="250" x2="214" y2="250"/>
    <line x1="66" y1="235" x2="214" y2="235"/>
    <line x1="66" y1="220" x2="214" y2="220"/>
    <line x1="66" y1="205" x2="214" y2="205"/>
    <line x1="66" y1="190" x2="214" y2="190"/>
  </g>
  <text x="218" y="196" class="note">fine grid</text>
  <text x="218" y="208" class="note">already fits</text>

  <text x="390" y="188" text-anchor="middle" class="note">migrate difficulty</text>

  <line x1="390" y1="126" x2="390" y2="150" stroke="var(--ink-soft,#64748b)" stroke-width="1.6" marker-end="url(#sqm-arrow)"/>
  <text x="390" y="118" text-anchor="middle" class="note">divide activation channel by s_c</text>

  <line x1="390" y1="226" x2="390" y2="202" stroke="var(--ink-soft,#64748b)" stroke-width="1.6" marker-end="url(#sqm-arrow)"/>
  <text x="390" y="240" text-anchor="middle" class="note">multiply weight channel by s_c</text>

  <text x="390" y="270" text-anchor="middle" class="mono-sm">X W = (X diag(s)^-1) (diag(s) W)</text>
</g>

<g data-anim="5">
  <g stroke="var(--border-2,#cbd5e1)" stroke-width="1" fill="var(--surface-3,#ece7da)">
    <rect x="564" y="130" width="8" height="10"/>
    <rect x="580" y="128" width="8" height="12"/>
    <rect x="596" y="131" width="8" height="9"/>
    <rect x="612" y="129" width="8" height="11"/>
    <rect x="644" y="129" width="8" height="11"/>

  </g>
  <rect x="628" y="116" width="8" height="24" fill="var(--accent,#c15b39)" stroke="var(--accent,#c15b39)"/>
  <text x="632" y="110" text-anchor="middle" class="mono-sm" fill="var(--accent,#c15b39)">shrunk</text>
  <g stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="4 3">
    <line x1="556" y1="140" x2="704" y2="140"/>
    <line x1="556" y1="120" x2="704" y2="120"/>
    <line x1="556" y1="100" x2="704" y2="100"/>
    <line x1="556" y1="80" x2="704" y2="80"/>
  </g>
  <text x="708" y="104" class="note">fine grid</text>

  <g stroke="var(--border-2,#cbd5e1)" stroke-width="1" fill="var(--surface-3,#ece7da)">
    <rect x="564" y="234" width="8" height="16"/>
    <rect x="580" y="232" width="8" height="18"/>
    <rect x="596" y="235" width="8" height="15"/>
    <rect x="612" y="233" width="8" height="17"/>
    <rect x="644" y="233" width="8" height="17"/>
    <rect x="660" y="235" width="8" height="15"/>
    <rect x="676" y="232" width="8" height="18"/>
    <rect x="692" y="234" width="8" height="16"/>
  </g>
  <rect x="628" y="216" width="8" height="34" fill="var(--accent,#c15b39)" stroke="var(--accent,#c15b39)" fill-opacity="0.8"/>
  <text x="632" y="210" text-anchor="middle" class="mono-sm" fill="var(--accent,#c15b39)">grown</text>
  <g stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="4 3">
    <line x1="556" y1="250" x2="704" y2="250"/>
    <line x1="556" y1="230" x2="704" y2="230"/>
    <line x1="556" y1="210" x2="704" y2="210"/>
    <line x1="556" y1="190" x2="704" y2="190"/>
  </g>
  <text x="708" y="214" class="note">fine grid</text>

  <text x="632" y="272" text-anchor="middle" class="badge" fill="var(--good,#2f9e6e)">both quantize cleanly</text>
  <rect x="547" y="280" width="170" height="26" rx="6" fill="none" stroke="var(--good,#2f9e6e)" stroke-width="1.4"/>
  <text x="632" y="297" text-anchor="middle" class="mono">INT8 x INT8 -&gt; INT8 tensor cores</text>
</g>

<g data-anim="6">
  <line x1="20" y1="322" x2="760" y2="322" stroke="var(--border-2,#cbd5e1)" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>

  <text x="145" y="345" text-anchor="middle" class="mono">alpha (migration strength)</text>
  <line x1="55" y1="368" x2="235" y2="368" stroke="var(--ink-soft,#64748b)" stroke-width="1.6"/>
  <circle cx="55" cy="368" r="4" fill="var(--ink-soft,#374151)"/>
  <circle cx="145" cy="368" r="4" fill="var(--ink-soft,#374151)"/>

  <text x="55" y="384" text-anchor="middle" class="note">none moved</text>
  <text x="145" y="358" text-anchor="middle" class="note">a=0.5</text>
  <text x="145" y="384" text-anchor="middle" class="note">balanced</text>
  <text x="235" y="358" text-anchor="middle" class="note">a=1</text>
  <text x="235" y="384" text-anchor="middle" class="note">all to weights</text>

  <rect x="300" y="336" width="460" height="40" rx="8" fill="var(--good,#2f9e6e)" fill-opacity="0.1" stroke="var(--good,#2f9e6e)" stroke-width="1.3"/>
  <text x="530" y="360" text-anchor="middle" class="mono" fill="var(--good,#2f9e6e)">free lunch: 1/s folds into RMSNorm affine weights (zero runtime cost)</text>
</g>

</svg>
<figcaption><b>SmoothQuant migrates the hard-to-quantize part of an outlier activation channel into its matching weight channel via a diagonal scale diag(s), leaving both tensors cleanly INT8-quantizable.</b> Before migration a single activation spike forces a coarse grid that crushes normal values toward zero while weights already fit a fine grid; the identity X W = (X diag(s)^-1)(diag(s) W) lets the spike shrink and the matching weight column grow by the same factor s_c, and because 1/s only rescales the upstream RMSNorm's affine weights, the whole migration costs nothing at inference time.</figcaption>
</figure>
