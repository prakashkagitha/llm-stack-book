<figcaption><b>One speculative decoding step: draft autoregressively, verify in parallel, accept/reject left to right.</b> The drafter q proposes gamma (g) tokens one at a time (Band 2, sequential, cheap); the target p scores all g+1 positions in a single forward pass (Band 3, parallel, same cost as 1 token); a left-to-right sweep accepts a prefix of draft tokens, then either samples a corrected token from the residual distribution p_res &#x221d; (p&#x2212;q)&#x208A; at the first rejection, or takes a free bonus token if all g were accepted — emitting 1 to g+1 tokens per expensive target forward pass without changing the output distribution.</figcaption>
</figure>
