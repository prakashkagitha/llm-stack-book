<figure class="viz" id="fig-lora-fullft-vs-lora-parallel-path">
<svg viewBox="0 0 760 360" role="img" aria-label="Side-by-side comparison: full fine-tuning uses one large trainable matrix W0+DW, while LoRA keeps W0 frozen and adds a tiny low-rank parallel path through matrices A and B that sum into the output.">
  <defs>
    <marker id="lft-arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#94a3b8)"/>
    </marker>
    <marker id="lft-arrow-acc" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#94a3b8)"/>
    </marker>
  </defs>
  <style>
    #fig-lora-fullft-vs-lora-parallel-path .ttl  { font:600 14px var(--sans,sans-serif); fill:var(--ink-soft,#e2e8f0); }
    #fig-lora-fullft-vs-lora-parallel-path .lbl  { font:600 13px var(--mono,monospace);  fill:var(--ink-soft,#e2e8f0); }
    #fig-lora-fullft-vs-lora-parallel-path .dim  { font:400 11px var(--mono,monospace);  fill:var(--muted,#94a3b8); }
    #fig-lora-fullft-vs-lora-parallel-path .cap  { font:400 11px var(--sans,sans-serif); fill:var(--muted,#94a3b8); }
    #fig-lora-fullft-vs-lora-parallel-path .node { font:700 14px var(--mono,monospace);  fill:var(--ink-soft,#e2e8f0); }
  </style>

  
  <line x1="380" y1="20" x2="380" y2="320" stroke="var(--border-2,#334155)" stroke-width="1" stroke-dasharray="4 3"/>

  
  <text x="190" y="34" text-anchor="middle" class="ttl">Full fine-tuning</text>

  
  <rect x="100" y="65" width="168" height="170" rx="8"
        fill="var(--accent,#6c8cff)" fill-opacity="0.18"
        stroke="var(--accent,#6c8cff)" stroke-width="2"/>
  <text x="184" y="118" text-anchor="middle" class="lbl" fill="var(--accent,#6c8cff)">W&#x2080; + &#x394;W</text>
  <text x="184" y="152" text-anchor="middle" class="dim">d &#xD7; k</text>
  <text x="184" y="196" text-anchor="middle" class="dim">ALL trained</text>

  
  <text x="36" y="155" text-anchor="middle" class="node">x</text>
  <line x1="50" y1="150" x2="98" y2="150"
        stroke="var(--muted,#94a3b8)" stroke-width="1.6"
        marker-end="url(#lft-arrow)"/>

  
  <line x1="268" y1="150" x2="316" y2="150"
        stroke="var(--muted,#94a3b8)" stroke-width="1.6"
        marker-end="url(#lft-arrow)"/>
  <text x="330" y="155" text-anchor="middle" class="node">h</text>

  
  <text x="570" y="34" text-anchor="middle" class="ttl">LoRA</text>

  
  <rect x="466" y="65" width="188" height="72" rx="6"
        fill="var(--surface,#1e293b)" fill-opacity="1"
        stroke="var(--muted,#94a3b8)" stroke-width="1.5"/>
  <text x="560" y="98" text-anchor="middle" class="lbl" fill="var(--muted,#94a3b8)">W&#x2080; (frozen)</text>
  <text x="560" y="120" text-anchor="middle" class="dim">d &#xD7; k</text>

  
  <rect x="484" y="192" width="62" height="44" rx="6"
        fill="var(--accent,#6c8cff)" fill-opacity="0.18"
        stroke="var(--accent,#6c8cff)" stroke-width="2"/>
  <text x="515" y="219" text-anchor="middle" class="lbl" fill="var(--accent,#6c8cff)">A</text>
  <text x="515" y="250" text-anchor="middle" class="dim">r &#xD7; k</text>

  
  <rect x="566" y="192" width="62" height="44" rx="6"
        fill="var(--accent,#6c8cff)" fill-opacity="0.18"
        stroke="var(--accent,#6c8cff)" stroke-width="2"/>
  <text x="597" y="219" text-anchor="middle" class="lbl" fill="var(--accent,#6c8cff)">B</text>
  <text x="597" y="250" text-anchor="middle" class="dim">d &#xD7; r</text>

  
  <text x="408" y="155" text-anchor="middle" class="node">x</text>

  
  <circle cx="430" cy="150" r="4" fill="var(--muted,#94a3b8)"/>

  
  <polyline points="430,150 430,100 464,100"
            fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1.6"
            marker-end="url(#lft-arrow)"/>

  
  <polyline points="430,150 430,214 482,214"
            fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1.6"
            marker-end="url(#lft-arrow)"/>

  
  <line x1="420" y1="150" x2="428" y2="150"
        stroke="var(--muted,#94a3b8)" stroke-width="1.6"/>

  
  <line x1="546" y1="214" x2="564" y2="214"
        stroke="var(--muted,#94a3b8)" stroke-width="1.6"
        marker-end="url(#lft-arrow)"/>

  
  <circle cx="688" cy="150" r="14" fill="var(--surface,#1e293b)"
          stroke="var(--accent,#6c8cff)" stroke-width="1.8"/>
  <text x="688" y="155" text-anchor="middle" class="lbl" fill="var(--accent,#6c8cff)">+</text>

  
  <line x1="654" y1="100" x2="688" y2="100"
        stroke="var(--muted,#94a3b8)" stroke-width="1.6"/>
  <line x1="688" y1="100" x2="688" y2="134"
        stroke="var(--muted,#94a3b8)" stroke-width="1.6"
        marker-end="url(#lft-arrow)"/>

  
  <polyline points="628,214 688,214 688,166"
            fill="none" stroke="var(--muted,#94a3b8)" stroke-width="1.6"
            marker-end="url(#lft-arrow)"/>

  
  <line x1="702" y1="150" x2="730" y2="150"
        stroke="var(--muted,#94a3b8)" stroke-width="1.6"
        marker-end="url(#lft-arrow)"/>
  <text x="744" y="155" text-anchor="middle" class="node">h</text>

  
  <text x="570" y="272" text-anchor="middle" class="cap">only A, B trained —</text>
  <text x="570" y="286" text-anchor="middle" class="cap">tiny low-rank path added in parallel</text>

  
  <text x="380" y="322" text-anchor="middle" class="cap">LoRA keeps W&#x2080; frozen and learns &#x394;W = BA in a rank-r bottleneck.</text>
</svg>
<figcaption><b>Full fine-tuning vs. LoRA: the parallel low-rank path.</b> Full fine-tuning moves every entry of <b>W&#x2080;+&#x394;W</b>; LoRA freezes W&#x2080; (grey, desaturated) and adds a tiny bottleneck path through <b>A</b> (r&amp;times;k) then <b>B</b> (d&amp;times;r), summing both paths at the output. Only A and B are trained, reducing trainable parameters by up to 128&amp;times; per layer.</figcaption>
</figure>
