  <text x="370" y="352" text-anchor="middle" class="caption">NF4 puts its 16 codes where the weights actually are,</text>
  <text x="370" y="368" text-anchor="middle" class="caption">so the average rounding error is smaller at the same 4-bit budget.</text>
</svg>
<figcaption><b>NF4 spends its 16 code points where the weight density is highest, not evenly.</b> INT4's uniform spacing puts several of its 16 levels in the near-empty tails of the (roughly normal) weight distribution, wasting resolution; NF4 instead places its levels at the quantiles of N(0,1), bunching them tightly around zero to minimize expected squared rounding error at the same 4-bit budget.</figcaption>
</figure>
