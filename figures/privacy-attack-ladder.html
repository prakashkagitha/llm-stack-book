<figure class="viz" id="fig-privacy-attack-ladder">
<svg viewBox="0 0 860 360" role="img" aria-label="Horizontal attack strength spectrum showing three attack families from left to right: Membership Inference (weakest, most general) to Extraction (middle) to Reconstruction (strongest, most targeted), with progressively shaded cards.">
  <defs>
    <linearGradient id="pal-bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--surface,#e8e8e8)" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="var(--accent,#c15b39)" stop-opacity="0.9"/>
    </linearGradient>
    <marker id="pal-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#c15b39)"/>
    </marker>
    <marker id="pal-chevron" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="var(--ink-soft,#888)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    #fig-privacy-attack-ladder .bar-label {
      font: 600 14px var(--sans,sans-serif);
      fill: var(--muted,#888);
      letter-spacing: 0.04em;
    }
    #fig-privacy-attack-ladder .card-header {
      font: 700 15px var(--sans,sans-serif);
      fill: var(--accent,#c15b39);
    }
    #fig-privacy-attack-ladder .card-quote {
      font: italic 12px var(--sans,sans-serif);
      fill: var(--ink-soft,#888);
    }
    #fig-privacy-attack-ladder .card-detail {
      font: 400 12px var(--sans,sans-serif);
      fill: var(--muted,#888);
    }
    #fig-privacy-attack-ladder .trait-up {
      font: 400 12px var(--sans,sans-serif);
      fill: var(--good,#5bbf8a);
    }
    #fig-privacy-attack-ladder .trait-down {
      font: 400 12px var(--sans,sans-serif);
      fill: var(--muted,#888);
    }
  </style>

  
  <rect x="40" y="48" width="780" height="16" rx="8" fill="url(#pal-bar-grad)"/>
  
  <polygon points="820,48 840,56 820,64" fill="var(--accent,#c15b39)"/>

  
  <text x="430" y="38" text-anchor="middle" class="bar-label">attack strength</text>

  
  
  <rect x="50" y="90" width="233" height="210" rx="10"
        fill="var(--accent,#c15b39)" fill-opacity="0.07"
        stroke="var(--ink-soft,#888)" stroke-width="1.5" class="v-stroke"/>
  <text x="166" y="118" text-anchor="middle" class="card-header">Membership Inference</text>
  <text x="166" y="140" text-anchor="middle" class="card-quote">"was z trained on?"</text>
  <text x="166" y="160" text-anchor="middle" class="card-detail">1 bit per record</text>
  <line x1="70" y1="172" x2="263" y2="172" stroke="var(--ink-soft,#888)" stroke-width="0.7" opacity="0.4"/>
  <g transform="translate(103,185)">
    <polygon points="5,0 10,9 0,9" fill="var(--good,#5bbf8a)"/>
    <text x="14" y="9" class="trait-up">general, cheap</text>
  </g>
  <g transform="translate(103,207)">
    <polygon points="0,0 10,0 5,9" fill="var(--muted,#888)"/>
    <text x="14" y="9" class="trait-down">weakest leakage</text>
  </g>

  
  
  <rect x="313" y="90" width="234" height="210" rx="10"
        fill="var(--accent,#c15b39)" fill-opacity="0.13"
        stroke="var(--ink-soft,#888)" stroke-width="1.5" class="v-stroke"/>
  <text x="430" y="118" text-anchor="middle" class="card-header">Extraction</text>
  <text x="430" y="140" text-anchor="middle" class="card-quote">"emit some training</text>
  <text x="430" y="156" text-anchor="middle" class="card-quote">strings verbatim"</text>
  <text x="430" y="176" text-anchor="middle" class="card-detail">no prior needed</text>
  <line x1="333" y1="188" x2="527" y2="188" stroke="var(--ink-soft,#888)" stroke-width="0.7" opacity="0.4"/>
  <g transform="translate(367,201)">
    <polygon points="5,0 10,9 0,9" fill="var(--good,#5bbf8a)"/>
    <text x="14" y="9" class="trait-up">no prior needed</text>
  </g>
  <g transform="translate(367,223)">
    <polygon points="0,0 10,0 5,9" fill="var(--muted,#888)"/>
    <text x="14" y="9" class="trait-down">medium strength</text>
  </g>

  
  
  <rect x="577" y="90" width="233" height="210" rx="10"
        fill="var(--accent,#c15b39)" fill-opacity="0.18"
        stroke="var(--accent,#c15b39)" stroke-width="1.5"/>
  <text x="693" y="118" text-anchor="middle" class="card-header">Reconstruction</text>
  <text x="693" y="140" text-anchor="middle" class="card-quote">"recover z given</text>
  <text x="693" y="156" text-anchor="middle" class="card-quote">partial info / target"</text>
  <line x1="597" y1="172" x2="790" y2="172" stroke="var(--ink-soft,#888)" stroke-width="0.7" opacity="0.4"/>
  <g transform="translate(618,185)">
    <polygon points="5,0 10,9 0,9" fill="var(--good,#5bbf8a)"/>
    <text x="14" y="9" class="trait-up">targets an individual</text>
  </g>
  <g transform="translate(618,207)">
    <polygon points="0,0 10,0 5,9" fill="var(--muted,#888)"/>
    <text x="14" y="9" class="trait-down">strongest leakage</text>
  </g>

  
  <line x1="285" y1="195" x2="311" y2="195"
        stroke="var(--ink-soft,#888)" stroke-width="1.5"
        marker-end="url(#pal-chevron)" class="v-stroke"/>
  <line x1="549" y1="195" x2="575" y2="195"
        stroke="var(--ink-soft,#888)" stroke-width="1.5"
        marker-end="url(#pal-chevron)" class="v-stroke"/>

  
  <text x="166" y="320" text-anchor="middle" class="card-detail" font-size="11">weakest / most general</text>
  <text x="693" y="320" text-anchor="middle" class="card-detail" font-size="11">strongest / most targeted</text>
</svg>
<figcaption><b>The privacy attack ladder: from membership inference to reconstruction.</b> The three canonical attack families are ordered by leakage severity — membership inference answers only a single yes/no bit per record, extraction recovers verbatim training strings without any prior knowledge, and reconstruction directly targets a specific individual given partial information. Moving right on the spectrum means stronger leakage but typically more attacker capability required.</figcaption>
</figure>
