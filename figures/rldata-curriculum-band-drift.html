<figure class="viz" id="fig-rldata-curriculum-band-drift">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 760 460" role="img" aria-label="Time-series chart showing three difficulty tiers (easy, medium, hard) rising and saturating over training steps. A translucent guide band along the p*=0.5 target line links the three points where each tier's curve crosses that target, in order easy, then medium, then hard, showing the training band riding along the diagonal of successive crossings rather than sitting still.">
<style>
  #fig-rldata-curriculum-band-drift text { font: 13px var(--sans,sans-serif); fill: var(--ink-soft,#1e293b); }
  #fig-rldata-curriculum-band-drift .axis-label { font: 600 12px var(--sans,sans-serif); fill: var(--ink-soft,#1e293b); }
  #fig-rldata-curriculum-band-drift .tick-label { font: 11px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-rldata-curriculum-band-drift .tier-label { font: 700 12px var(--sans,sans-serif); }
  #fig-rldata-curriculum-band-drift .caption-note { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-rldata-curriculum-band-drift .band-label { font: 600 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-rldata-curriculum-band-drift .chevron { fill: none; stroke: var(--muted,#94a3b8); stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; opacity: 0.55; }
</style>
<defs>
  <marker id="cbd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#94a3b8)"/>
  </marker>
  <linearGradient id="cbd-band-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="var(--accent,#c15b39)" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="var(--accent,#c15b39)" stop-opacity="0.24"/>
  </linearGradient>
</defs>

<g data-anim="1">
  <line x1="80" y1="55" x2="80" y2="370" stroke="var(--muted,#94a3b8)" stroke-width="1.5"/>
  <line x1="80" y1="360" x2="690" y2="360" stroke="var(--muted,#94a3b8)" stroke-width="1.5" marker-end="url(#cbd-arrow)"/>

  <text transform="rotate(-90,22,210)" x="22" y="210" text-anchor="middle" class="axis-label">pass rate</text>

  <text x="72" y="64" text-anchor="end" class="tick-label">1.0</text>
  <line x1="76" y1="60" x2="80" y2="60" stroke="var(--muted,#94a3b8)" stroke-width="1.2"/>

  <text x="72" y="214" text-anchor="end" class="tick-label">0.5</text>
  <line x1="76" y1="210" x2="80" y2="210" stroke="var(--muted,#94a3b8)" stroke-width="1.2"/>

  <text x="72" y="364" text-anchor="end" class="tick-label">0.0</text>

  <text x="395" y="440" text-anchor="middle" class="axis-label">training steps -&gt;</text>

  
  <rect x="185" y="195" width="420" height="30" rx="15" fill="url(#cbd-band-grad)"/>

  <line x1="80" y1="210" x2="680" y2="210" stroke="var(--accent,#c15b39)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>
  <text x="90" y="196" class="band-label">band target (p*)</text>
</g>

<g data-anim="2">
  <path class="viz-draw" style="--len:640"
    d="M 80,250 C 130,238 170,224 210,210 C 250,196 300,110 350,72 L 680,70"
    fill="none" stroke="var(--good,#2f9e6e)" stroke-width="3" stroke-linecap="round"/>
  <text x="685" y="74" class="tier-label" fill="var(--good,#2f9e6e)">easy</text>
  <circle cx="210" cy="210" r="16" fill="var(--good,#2f9e6e)" opacity="0.16"/>
  <circle cx="210" cy="210" r="5" fill="var(--surface,#fff)" stroke="var(--good,#2f9e6e)" stroke-width="2.5"/>
</g>

<g data-anim="3">
  <path class="viz-draw" style="--len:700"
    d="M 80,300 C 180,300 300,240 400,210 C 460,188 505,120 545,100 L 680,100"
    fill="none" stroke="var(--accent2,#3b82f6)" stroke-width="3" stroke-linecap="round"/>
  <text x="685" y="104" class="tier-label" fill="var(--accent2,#3b82f6)">medium</text>
  <circle cx="400" cy="210" r="16" fill="var(--accent2,#3b82f6)" opacity="0.16"/>
  <circle cx="400" cy="210" r="5" fill="var(--surface,#fff)" stroke="var(--accent2,#3b82f6)" stroke-width="2.5"/>
</g>

<g data-anim="4">
  <path class="viz-draw" style="--len:680"
    d="M 80,340 C 260,340 430,300 520,250 C 550,230 565,218 580,210 C 610,195 650,175 680,155"
    fill="none" stroke="var(--warn,#e0a106)" stroke-width="3" stroke-linecap="round"/>
  <text x="685" y="159" class="tier-label" fill="var(--warn,#e0a106)">hard</text>
  <circle cx="580" cy="210" r="16" fill="var(--warn,#e0a106)" opacity="0.16"/>
  <circle cx="580" cy="210" r="5" fill="var(--surface,#fff)" stroke="var(--warn,#e0a106)" stroke-width="2.5"/>
</g>

<g data-anim="5">
  <path class="chevron" d="M 293,204 L 301,210 L 293,216"/>
  <path class="chevron" d="M 307,204 L 315,210 L 307,216"/>
  <path class="chevron" d="M 483,204 L 491,210 L 483,216"/>
  <path class="chevron" d="M 497,204 L 505,210 L 497,216"/>
  <text x="395" y="392" text-anchor="middle" class="caption-note">band rides right, tracking each tier's crossing of p*</text>
</g>

</svg>
<figcaption><b>The training band is not the fixed strip on the left — it is the region that rides along p*=0.5, linking each tier's crossing in turn.</b> Every tier rises and saturates toward p=1 at a different rate, and the shaded guide threads through the moment each one crosses the target p*=0.5: easy first (hollow green circle), then medium, then hard, with chevrons marking the direction of travel. A good online curriculum keeps the training batch riding that diagonal — nobody authors a schedule, the band's contents simply drift from easy to hard as each tier saturates.</figcaption>
</figure>
