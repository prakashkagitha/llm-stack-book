<figure class="viz" id="fig-rldata-curriculum-band-drift">
<button class="viz-replay" type="button">&#x21BB; replay</button>
<svg viewBox="0 0 760 440" role="img" aria-label="Time-series chart showing three difficulty tiers (easy, medium, hard) rising and saturating over training steps, with the target band at p=0.5 crossed first by easy, then medium, then hard — showing the curriculum band drifting from easy to hard over time.">
<style>
  #fig-rldata-curriculum-band-drift text { font: 13px var(--sans,sans-serif); fill: var(--ink-soft,#1e293b); }
  #fig-rldata-curriculum-band-drift .axis-label { font: 600 12px var(--sans,sans-serif); fill: var(--ink-soft,#1e293b); }
  #fig-rldata-curriculum-band-drift .tick-label { font: 11px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-rldata-curriculum-band-drift .tier-label { font: 700 12px var(--sans,sans-serif); }
  #fig-rldata-curriculum-band-drift .caption-note { font: italic 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-rldata-curriculum-band-drift .band-label { font: 600 11px var(--sans,sans-serif); fill: var(--muted,#64748b); }

  /* Animated curve reveals via stroke-dashoffset */
  #fig-rldata-curriculum-band-drift .viz-draw {
    stroke-dasharray: var(--len, 800);
    stroke-dashoffset: var(--len, 800);
    animation: draw-line 1.6s ease-out forwards;
  }
  #fig-rldata-curriculum-band-drift .easy-curve { animation-delay: 0.1s; }
  #fig-rldata-curriculum-band-drift .medium-curve { animation-delay: 0.7s; }
  #fig-rldata-curriculum-band-drift .hard-curve { animation-delay: 1.3s; }

  #fig-rldata-curriculum-band-drift .band-rect {
    opacity: 0;
    animation: band-sweep 1.8s ease-in-out 0.5s forwards;
  }
  #fig-rldata-curriculum-band-drift .crossing-dot {
    opacity: 0;
    animation: dot-appear 0.4s ease forwards;
  }
  #fig-rldata-curriculum-band-drift .dot-easy { animation-delay: 0.6s; }
  #fig-rldata-curriculum-band-drift .dot-medium { animation-delay: 1.2s; }
  #fig-rldata-curriculum-band-drift .dot-hard { animation-delay: 1.8s; }

  @keyframes draw-line {
    to { stroke-dashoffset: 0; }
  }
  @keyframes dot-appear {
    to { opacity: 1; }
  }
  @keyframes band-sweep {
    0%   { opacity: 0.8; transform: translateX(0px); }
    33%  { opacity: 0.8; transform: translateX(0px); }
    66%  { opacity: 0.8; transform: translateX(195px); }
    100% { opacity: 0.8; transform: translateX(390px); }
  }

  @media (prefers-reduced-motion: reduce) {
    #fig-rldata-curriculum-band-drift .viz-draw {
      stroke-dashoffset: 0;
      animation: none;
    }
    #fig-rldata-curriculum-band-drift .band-rect {
      opacity: 0.6;
      animation: none;
      transform: translateX(390px);
    }
    #fig-rldata-curriculum-band-drift .crossing-dot {
      opacity: 1;
      animation: none;
    }
  }
</style>
<defs>
  <marker id="cbd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#94a3b8)"/>
  </marker>
</defs>


<line x1="80" y1="55" x2="80" y2="370" stroke="var(--muted,#94a3b8)" stroke-width="1.5"/>

<line x1="80" y1="360" x2="690" y2="360" stroke="var(--muted,#94a3b8)" stroke-width="1.5" marker-end="url(#cbd-arrow)"/>


<text transform="rotate(-90,22,210)" x="22" y="210" text-anchor="middle" class="axis-label">pass rate</text>



<text x="72" y="64" text-anchor="end" class="tick-label">1.0</text>
<line x1="76" y1="60" x2="80" y2="60" stroke="var(--muted,#94a3b8)" stroke-width="1.2"/>

<text x="72" y="214" text-anchor="end" class="tick-label">0.5</text>
<line x1="76" y1="210" x2="80" y2="210" stroke="var(--muted,#94a3b8)" stroke-width="1.2"/>

<text x="72" y="364" text-anchor="end" class="tick-label">0.0</text>


<text x="395" y="415" text-anchor="middle" class="axis-label">training steps -&gt;</text>


<text x="395" y="392" text-anchor="middle" class="caption-note">the band's contents drift right -&gt;</text>


<line x1="80" y1="210" x2="680" y2="210" stroke="var(--accent,#4f7cff)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>
<text x="85" y="197" class="band-label">band target (p*)</text>


<rect class="band-rect" x="135" y="60" width="30" height="300" fill="var(--accent,#4f7cff)" fill-opacity="0.15" rx="2"/>


<path class="viz-draw easy-curve" style="--len:700"
  d="M 80,225 C 110,200 130,100 300,71 L 680,71"
  fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>


<path class="viz-draw medium-curve" style="--len:750"
  d="M 80,306 C 160,305 260,215 360,210 C 460,205 540,95 600,90 L 680,90"
  fill="none" stroke="var(--accent,#4f7cff)" stroke-width="3" stroke-linecap="round"/>


<path class="viz-draw hard-curve" style="--len:700"
  d="M 80,345 C 200,345 350,340 490,280 C 530,250 550,220 560,210 C 600,188 640,160 680,150"
  fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>


<text x="685" y="68" class="tier-label" fill="#22c55e">easy</text>
<text x="685" y="87" class="tier-label" fill="var(--accent,#4f7cff)">medium</text>
<text x="685" y="147" class="tier-label" fill="#f59e0b">hard</text>



<circle class="crossing-dot dot-easy" cx="150" cy="210" r="5" fill="var(--surface,#fff)" stroke="#22c55e" stroke-width="2.5"/>

<circle class="crossing-dot dot-medium" cx="360" cy="210" r="5" fill="var(--surface,#fff)" stroke="var(--accent,#4f7cff)" stroke-width="2.5"/>

<circle class="crossing-dot dot-hard" cx="560" cy="210" r="5" fill="var(--surface,#fff)" stroke="#f59e0b" stroke-width="2.5"/>


<line x1="150" y1="210" x2="560" y2="210" stroke="var(--muted,#94a3b8)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>


<text x="355" y="228" text-anchor="middle" class="caption-note">band rides where tiers cross p*</text>

</svg>
<figcaption><b>The difficulty band slides from easy to hard as tiers saturate.</b> Each difficulty tier rises and saturates toward p=1 over training, but at different rates; the easy tier crosses the target p*=0.5 first (hollow circle), then medium, then hard. The translucent band sweeps right, tracking whichever tier is currently crossing p* — that is the emergent curriculum, automatically advancing without any authored schedule.</figcaption>
</figure>
