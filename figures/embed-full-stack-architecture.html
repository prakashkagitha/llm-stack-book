<figcaption><b>The full embedding stack: from token IDs to softmax probabilities.</b> The residual-stream width d stays constant from the token embedding through all L Transformer blocks and the final LayerNorm, then widens abruptly to V at the logit projection — the most expensive operation at inference. The dashed arc marks the optional weight-tying shortcut (W_U = W_E); the OR branch shows the two dominant positional-encoding strategies.</figcaption>
