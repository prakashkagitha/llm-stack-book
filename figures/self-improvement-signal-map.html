<figure class="viz" id="fig-self-improvement-signal-map">
<button class="viz-replay" type="button">&#8635; replay</button>

<svg viewBox="0 0 820 700" role="img"
  aria-label="Map of six self-improvement methods -- RFT, STaR, ReST, self-rewarding language models, SPIN, and weak-to-strong generalization -- organized by what plugs into the shared generate-supervise-retrain loop's SUPERVISION step, ordered from external ground truth at the top to pure self-supervision at the bottom.">
<defs>
  <marker id="sm-a"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--ink-soft,#555)"/></marker>
  <marker id="sm-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9z" fill="var(--accent,#3a6ea5)"/></marker>
  <linearGradient id="sm-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="var(--muted,#999)"/>
    <stop offset="100%" stop-color="var(--accent,#3a6ea5)"/>
  </linearGradient>
</defs>
<style>
  #fig-self-improvement-signal-map text      { font:400 10px var(--sans,sans-serif); fill:var(--ink-soft,#333); }
  #fig-self-improvement-signal-map .T        { font:700 16px var(--sans,sans-serif); fill:var(--ink-soft,#222); }
  #fig-self-improvement-signal-map .SUB      { font:400 10.5px var(--sans,sans-serif); fill:var(--muted,#777); }
  #fig-self-improvement-signal-map .N        { font:700 12px var(--sans,sans-serif); fill:var(--ink-soft,#222); }
  #fig-self-improvement-signal-map .NS       { font:400 9.5px var(--sans,sans-serif); fill:var(--muted,#666); }
  #fig-self-improvement-signal-map .CELL     { font:400 10px var(--sans,sans-serif); fill:var(--ink-soft,#333); }
  #fig-self-improvement-signal-map .HDR      { font:700 10.5px var(--sans,sans-serif); fill:var(--muted,#777); }
  #fig-self-improvement-signal-map .HDRA     { font:700 10.5px var(--sans,sans-serif); fill:var(--accent,#3a6ea5); }
  #fig-self-improvement-signal-map .CAP      { font:italic 10px var(--sans,sans-serif); fill:var(--muted,#777); }
  #fig-self-improvement-signal-map .GL       { font:600 8.5px var(--sans,sans-serif); fill:var(--accent,#3a6ea5); }
  #fig-self-improvement-signal-map .MN       { font:700 11.5px var(--sans,sans-serif); fill:var(--ink-soft,#222); }

  #fig-self-improvement-signal-map [data-anim]             { opacity:0; }
  #fig-self-improvement-signal-map:not(.playing) [data-anim]{ opacity:1; }
  #fig-self-improvement-signal-map.playing [data-anim="1"] { animation:smi .35s .05s ease forwards; }
  #fig-self-improvement-signal-map.playing [data-anim="2"] { animation:smi .35s .5s  ease forwards; }
  #fig-self-improvement-signal-map.playing [data-anim="3"] { animation:smi .35s .95s ease forwards; }
  #fig-self-improvement-signal-map.playing [data-anim="4"] { animation:smi .35s 1.4s ease forwards; }
  #fig-self-improvement-signal-map.playing [data-anim="5"] { animation:smi .35s 1.85s ease forwards; }
  #fig-self-improvement-signal-map.playing [data-anim="6"] { animation:smi .35s 2.3s  ease forwards; }
  #fig-self-improvement-signal-map.playing [data-anim="7"] { animation:smi .35s 2.75s ease forwards; }
  #fig-self-improvement-signal-map.playing [data-anim="8"] { animation:smi .35s 3.2s  ease forwards; }
  @keyframes smi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>

<rect x="10" y="10" width="800" height="668" rx="12"
  fill="var(--surface,#fff)" stroke="var(--border-2,#888)" stroke-width="1.5"/>
<text x="410" y="32" text-anchor="middle" class="T">Self-Improvement: Where Does the Supervision Signal Come From?</text>
<text x="410" y="49" text-anchor="middle" class="SUB">rows ordered by increasing reliance on the model itself -- external ground truth (top) to self-supervision (bottom)</text>


<g data-anim="1">
  <rect x="65" y="192" width="170" height="56" rx="8"
    fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.3"/>
  <text x="150" y="215" text-anchor="middle" class="N" font-size="11">current policy</text>
  <text x="150" y="232" text-anchor="middle" class="NS">generates k candidates</text>

  <path d="M225,248 L250,342" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.6" marker-end="url(#sm-acc)"/>

  <rect x="165" y="342" width="170" height="76" rx="9"
    fill="var(--surface-3,#e7f0fb)" stroke="var(--accent,#3a6ea5)" stroke-width="2.1"/>
  <text x="250" y="373" text-anchor="middle" class="N" fill="var(--accent,#3a6ea5)">[SUPERVISION]</text>
  <text x="250" y="391" text-anchor="middle" class="NS">filter / label</text>
  <text x="250" y="405" text-anchor="middle" class="NS">(each method fills this)</text>

  <line x1="165" y1="380" x2="145" y2="380" stroke="var(--accent,#3a6ea5)" stroke-width="1.6" marker-end="url(#sm-acc)"/>

  <rect x="5" y="352" width="140" height="56" rx="8"
    fill="var(--surface-3,#eef2f7)" stroke="var(--border-2,#888)" stroke-width="1.3"/>
  <text x="75" y="375" text-anchor="middle" class="N" font-size="11">retrain</text>
  <text x="75" y="392" text-anchor="middle" class="NS">(SFT or DPO)</text>

  <path d="M65,352 Q40,290 108,248" fill="none" stroke="var(--ink-soft,#777)" stroke-width="1.4" marker-end="url(#sm-a)"/>

  <text x="150" y="440" text-anchor="middle" class="CAP">SUPERVISION is the pivot;</text>
  <text x="150" y="455" text-anchor="middle" class="CAP">each method fills it differently</text>
</g>


<rect x="349" y="88" width="6" height="576" rx="3" fill="url(#sm-grad)" opacity="0.85"/>


<line x1="360" y1="118" x2="810" y2="118" stroke="var(--border-2,#ccc)" stroke-width="1"/>
<line x1="462" y1="88" x2="462" y2="664" stroke="var(--v-grid,#ddd)" stroke-width="0.8"/>
<line x1="628" y1="88" x2="628" y2="664" stroke="var(--v-grid,#ddd)" stroke-width="0.8"/>
<rect x="463" y="88" width="164" height="576" fill="var(--accent,#3a6ea5)" opacity="0.06"/>

<text x="410" y="109" text-anchor="middle" class="HDR">method</text>
<text x="545" y="100" text-anchor="middle" class="HDRA">source of CORRECT /</text>
<text x="545" y="112" text-anchor="middle" class="HDRA">chosen</text>
<text x="720" y="100" text-anchor="middle" class="HDR">source of WRONG /</text>
<text x="720" y="112" text-anchor="middle" class="HDR">rejected or filter</text>

<line x1="360" y1="213" x2="810" y2="213" stroke="var(--v-grid,#e5e5e5)" stroke-width="0.8"/>
<line x1="360" y1="311" x2="810" y2="311" stroke="var(--v-grid,#e5e5e5)" stroke-width="0.8"/>
<line x1="360" y1="399" x2="810" y2="399" stroke="var(--v-grid,#e5e5e5)" stroke-width="0.8"/>
<line x1="360" y1="487" x2="810" y2="487" stroke="var(--v-grid,#e5e5e5)" stroke-width="0.8"/>
<line x1="360" y1="575" x2="810" y2="575" stroke="var(--v-grid,#e5e5e5)" stroke-width="0.8"/>


<g data-anim="2">
  <text x="410" y="173" text-anchor="middle" class="MN">RFT</text>
  <text x="545" y="150" text-anchor="middle" class="CELL">verifiable reward</text>
  <text x="545" y="164" text-anchor="middle" class="CELL">r(x,y) = 1</text>
  <text x="545" y="178" text-anchor="middle" class="CELL">-&gt; keep</text>
  <text x="720" y="150" text-anchor="middle" class="CELL">incorrect completions</text>
  <text x="720" y="164" text-anchor="middle" class="CELL">-&gt; dropped (filter --</text>
  <text x="720" y="178" text-anchor="middle" class="CELL">no explicit reject)</text>
</g>


<g data-anim="3">
  <text x="410" y="266" text-anchor="middle" class="MN">STaR</text>
  <text x="545" y="243" text-anchor="middle" class="CELL">same verifiable</text>
  <text x="545" y="257" text-anchor="middle" class="CELL">filter (as RFT)</text>
  <text x="720" y="238" text-anchor="middle" class="CELL">zero-correct problems:</text>
  <text x="720" y="252" text-anchor="middle" class="CELL">reveal gold, rationalize</text>
  <text x="720" y="266" text-anchor="middle" class="CELL">backward (hint rescue):</text>

  
  <circle cx="668" cy="291" r="10" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.3"/>
  <text x="668" y="294" text-anchor="middle" class="GL">y*</text>
  <path d="M678,291 Q700,291 712,291" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.2" marker-end="url(#sm-acc)"/>
  <circle cx="726" cy="291" r="13" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.3"/>
  <text x="726" y="294" text-anchor="middle" class="GL">rhint</text>
  <text x="700" y="279" text-anchor="middle" class="NS">hint</text>
</g>


<g data-anim="4">
  <text x="410" y="359" text-anchor="middle" class="MN">ReST</text>
  <text x="545" y="343" text-anchor="middle" class="CELL">reward &gt;= tau_t</text>
  <text x="545" y="357" text-anchor="middle" class="CELL">(rises each round)</text>
  <text x="720" y="350" text-anchor="middle" class="CELL">reward &lt; tau_t</text>
  <text x="720" y="364" text-anchor="middle" class="CELL">-&gt; dropped this round</text>

  
  <g stroke="var(--accent,#3a6ea5)" stroke-width="1.4" fill="var(--surface-3,#e7f0fb)">
    <rect x="497" y="376" width="10" height="8"/>
    <rect x="510" y="370" width="10" height="14"/>
    <rect x="523" y="363" width="10" height="21"/>
  </g>
  <path d="M536,362 L536,350" stroke="var(--accent,#3a6ea5)" stroke-width="1.3" marker-end="url(#sm-acc)" fill="none"/>
  <text x="530" y="393" text-anchor="middle" class="NS">bar rises each round</text>
</g>


<g data-anim="5">
  <text x="410" y="434" text-anchor="middle" class="MN">Self-rewarding</text>
  <text x="410" y="450" text-anchor="middle" class="MN">LM</text>
  <circle cx="386" cy="469" r="9" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.2"/>
  <text x="386" y="472" text-anchor="middle" class="GL">P</text>
  <path d="M396,469 L424,469" stroke="var(--accent,#3a6ea5)" stroke-width="1.2" marker-end="url(#sm-acc)" marker-start="url(#sm-acc)" fill="none"/>
  <circle cx="434" cy="469" r="9" fill="none" stroke="var(--accent,#3a6ea5)" stroke-width="1.2"/>
  <text x="434" y="472" text-anchor="middle" class="GL">J</text>
  <text x="410" y="483" text-anchor="middle" class="NS">shared weights</text>

  <text x="545" y="425" text-anchor="middle" class="CELL">same model, judge</text>
  <text x="545" y="439" text-anchor="middle" class="CELL">mode: highest</text>
  <text x="545" y="453" text-anchor="middle" class="CELL">self-score = chosen</text>
  <text x="720" y="425" text-anchor="middle" class="CELL">same model, judge</text>
  <text x="720" y="439" text-anchor="middle" class="CELL">mode: lowest</text>
  <text x="720" y="453" text-anchor="middle" class="CELL">self-score = rejected</text>
</g>


<g data-anim="6">
  <text x="410" y="535" text-anchor="middle" class="MN">SPIN</text>
  <text x="545" y="522" text-anchor="middle" class="CELL">human gold</text>
  <text x="545" y="536" text-anchor="middle" class="CELL">response = chosen</text>
  <text x="720" y="515" text-anchor="middle" class="CELL">policy's own current-</text>
  <text x="720" y="529" text-anchor="middle" class="CELL">iteration output</text>
  <text x="720" y="543" text-anchor="middle" class="CELL">= rejected</text>
</g>


<g data-anim="7">
  <text x="410" y="615" text-anchor="middle" class="MN">Weak-to-</text>
  <text x="410" y="631" text-anchor="middle" class="MN">strong</text>
  <text x="545" y="610" text-anchor="middle" class="CELL">weak supervisor's</text>
  <text x="545" y="624" text-anchor="middle" class="CELL">positive label</text>
  <text x="720" y="603" text-anchor="middle" class="CELL">weak supervisor's</text>
  <text x="720" y="617" text-anchor="middle" class="CELL">negative label</text>
  <text x="720" y="631" text-anchor="middle" class="CELL">(noisy but usable)</text>
</g>

</svg>
<figcaption><b>Six self-improvement methods differ only in what plugs into one shared loop's SUPERVISION step.</b> RFT and ReST filter on a verifiable reward (ReST raises the bar each round); STaR adds a hint-conditioned rescue path for unsolved problems; self-rewarding LMs, SPIN, and weak-to-strong generalization progressively replace external ground truth with the model's own judgments, outputs, or a weaker model's labels.</figcaption>
</figure>
