<text x="400" y="335" text-anchor="middle" class="heading">[i1, i2, i3] = K integer codes for this one frame</text>


<text x="400" y="357" text-anchor="middle" class="caption">Level 1 is a coarse guess; each further codebook quantizes only what the</text>
<text x="400" y="372" text-anchor="middle" class="caption">previous ones missed, so the codes are coarse-to-fine, not independent.</text>

</svg>
<figcaption><b>Residual vector quantization turns one continuous encoder frame into K coarse-to-fine integer codes.</b> Codebook 1 quantizes the frame directly and leaves a residual; codebook 2 quantizes only that leftover residual and leaves a smaller one; codebook 3 refines further — so each level's error shrinks (left chart) while the sum of chosen codebook entries accumulates toward the original frame (right chart). Because later codes correct earlier mistakes rather than encoding independent information, the K indices per frame are ordered from coarse semantics to fine acoustic detail.</figcaption>
</figure>
