<figure class="viz" id="fig-statrig-irt-item-information">

<svg viewBox="0 0 800 580" role="img" aria-label="Two aligned panels sharing an ability axis theta. The top panel shows item characteristic curves for two items: a high-discrimination item with a steep S-curve and a low-discrimination item with a shallow S-curve, each crossing 50 percent at its own difficulty b. The bottom panel shows each item's Fisher information curve, which peaks exactly at its own difficulty: the high-discrimination item produces a tall narrow peak that cleanly separates strong from weak models, while the low-discrimination item produces a short broad peak that is mostly noise. A marker on the shared axis shows the model's current ability estimate theta-hat, where adaptive testing would pick the item whose information peak sits closest, reaching fixed-test precision in far fewer items.">

<figcaption><b>Fisher information peaks exactly where an item's difficulty matches the model's ability.</b> A high-discrimination item (solid) produces a tall, narrow information peak that cleanly separates strong from weak models right where it matters; a low-discrimination item (dashed) produces a short, broad peak that is mostly noise everywhere. Adaptive testing exploits this by serving each model items whose peak sits near its current ability estimate theta-hat, reaching a fixed test's precision in a fraction of the items.</figcaption>
</figure>
