<figure class="viz" id="fig-ppo-clip">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 372" role="img" aria-label="The PPO clipped surrogate objective plotted against the probability ratio r for a good token (advantage positive) and a bad token (advantage negative); in both panels the objective flattens to zero gradient once the ratio leaves the trust region 1 minus epsilon to 1 plus epsilon.">
  <defs>
    <marker id="pc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-ppo-clip text{ fill:var(--ink-soft); }
    #fig-ppo-clip .ax{ font:600 12.5px var(--sans,sans-serif); }
    #fig-ppo-clip .tk{ font:500 11px var(--mono,monospace); fill:var(--muted); }
    #fig-ppo-clip .ttl{ font:600 13px var(--sans,sans-serif); }
    #fig-ppo-clip .note{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-ppo-clip .flat{ font:600 10.5px var(--sans,sans-serif); }
  </style>

  
  <g data-anim="1">
    <text x="210" y="34" text-anchor="middle" class="ttl" fill="var(--good,#2f9e6e)">A &gt; 0&#8195;(good token &#183; push r up)</text>
    
    <g class="v-grid" stroke-width="1" opacity="0.55">
      <line x1="140" y1="50" x2="140" y2="250"/>
      <line x1="210" y1="50" x2="210" y2="250"/>
      <line x1="280" y1="50" x2="280" y2="250"/>
    </g>
    
    <line x1="70" y1="50" x2="70" y2="250" class="v-stroke" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <line x1="70" y1="250" x2="350" y2="250" class="v-stroke" stroke="var(--ink-soft)" stroke-width="1.6" marker-end="url(#pc-arrow)" color="var(--ink-soft)"/>
    
    <text x="140" y="266" text-anchor="middle" class="tk">1-&#949;</text>
    <text x="210" y="266" text-anchor="middle" class="tk">1</text>
    <text x="280" y="266" text-anchor="middle" class="tk">1+&#949;</text>
    <text x="338" y="266" text-anchor="middle" class="ax">r</text>
    <text x="44" y="150" text-anchor="middle" class="ax" transform="rotate(-90 44 150)">L<tspan dy="-3" font-size="9">CLIP</tspan></text>
  </g>

  
  <g data-anim="2">
    <rect x="140" y="50" width="140" height="200" fill="var(--accent)" fill-opacity="0.07"/>
    <text x="210" y="62" text-anchor="middle" class="note">trust region</text>
  </g>

  
  <g data-anim="3">
    
    <path d="M70 230 L280 90 L350 90" fill="none"
          stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          class="viz-draw" style="--len:330"/>
    
    <circle cx="210" cy="143" r="4.5" fill="var(--accent)" stroke="var(--surface,#fff)" stroke-width="1.4"/>
  </g>

  
  <g data-anim="4">
    <line x1="280" y1="90" x2="280" y2="250" stroke="var(--accent)" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.65"/>
    <text x="328" y="80" text-anchor="middle" class="flat" fill="var(--accent)">flat</text>
    <text x="328" y="105" text-anchor="middle" class="note">gradient = 0</text>
    <text x="328" y="118" text-anchor="middle" class="note">no extra</text>
    <text x="328" y="131" text-anchor="middle" class="note">reward</text>
  </g>

  
  <g data-anim="1">
    <text x="610" y="34" text-anchor="middle" class="ttl" fill="var(--warn,#e0a106)">A &lt; 0&#8195;(bad token &#183; push r down)</text>
    <g class="v-grid" stroke-width="1" opacity="0.55">
      <line x1="540" y1="50" x2="540" y2="250"/>
      <line x1="610" y1="50" x2="610" y2="250"/>
      <line x1="680" y1="50" x2="680" y2="250"/>
    </g>
    
    <line x1="470" y1="50" x2="470" y2="250" class="v-stroke" stroke="var(--ink-soft)" stroke-width="1.6"/>
    <line x1="470" y1="50" x2="750" y2="50" class="v-stroke" stroke="var(--ink-soft)" stroke-width="1.6" marker-end="url(#pc-arrow)" color="var(--ink-soft)"/>
    <text x="540" y="42" text-anchor="middle" class="tk">1&#8722;&#949;</text>
    <text x="610" y="42" text-anchor="middle" class="tk">1</text>
    <text x="680" y="42" text-anchor="middle" class="tk">1+&#949;</text>
    <text x="744" y="42" text-anchor="middle" class="ax">ratio r</text>
    <text x="446" y="150" text-anchor="middle" class="ax" transform="rotate(-90 446 150)">L<tspan dy="-3" font-size="9">CLIP</tspan></text>
  </g>

  <g data-anim="2">
    <rect x="540" y="50" width="140" height="200" fill="var(--warn,#e0a106)" fill-opacity="0.08"/>
    <text x="610" y="240" text-anchor="middle" class="note">trust region</text>
  </g>

  
  <g data-anim="3">
    
    <path d="M470 110 L540 110 L750 250" fill="none"
          stroke="var(--warn,#e0a106)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          class="viz-draw" style="--len:330"/>
    <circle cx="610" cy="157" r="4.5" fill="var(--warn,#e0a106)" stroke="var(--surface,#fff)" stroke-width="1.4"/>
  </g>

  <g data-anim="4">
    <line x1="540" y1="50" x2="540" y2="110" stroke="var(--warn,#e0a106)" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.65"/>
    <text x="505" y="92" text-anchor="middle" class="flat" fill="var(--warn,#e0a106)">flat</text>
    <text x="505" y="116" text-anchor="middle" class="note">grad = 0</text>
    <text x="505" y="129" text-anchor="middle" class="note">no extra</text>
    <text x="505" y="142" text-anchor="middle" class="note">reward</text>
  </g>

  
  <g data-anim="5">
    <text x="380" y="300" text-anchor="middle" class="ttl" fill="var(--accent)">L<tspan dy="-3" font-size="10">CLIP</tspan><tspan dy="3"> = min( r&#183;A,&#8201; clip(r, 1&#8722;&#949;, 1+&#949;)&#183;A )</tspan></text>
    <text x="380" y="324" text-anchor="middle" class="note">the min makes a one-sided trust region: full credit moving r toward the rewarding side</text>
    <text x="380" y="340" text-anchor="middle" class="note">up to 1+&#949; for good tokens, down to 1&#8722;&#949; for bad &#8212; then the gradient is clipped to zero.</text>
  </g>
</svg>
<figcaption><b>The clip turns each token's objective into a one-sided trust region.</b> For a <b>good</b> token (A&gt;0) the surrogate rises with the ratio <b>r</b> until <b>1+&#949;</b>, then goes flat — boosting it further earns nothing. For a <b>bad</b> token (A&lt;0) it falls until <b>1&#8722;&#949;</b>, then flat — over-suppressing earns nothing. The flat shoulders zero out the gradient, so no single PPO step can exploit the importance ratio too far.</figcaption>
</figure>
