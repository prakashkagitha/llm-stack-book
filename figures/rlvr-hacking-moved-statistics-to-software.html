<svg viewBox="0 0 800 520" role="img" aria-label="Contrast diagram showing RLVR does not remove reward hacking but moves it: a learned reward model can be statistically Goodharted off-distribution, while a programmatic verifier and sandbox are instead attacked with software exploits such as test leakage, parser tricks, sandbox escapes, and format farming, each paired with its engineering defense.">

<text x="400" y="22" text-anchor="middle" class="hdr">RLVR does not remove reward hacking - it moves it</text>


<g data-anim="1">
  <rect x="16" y="38" width="330" height="330" rx="10" fill="var(--surface,#fff)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.2"/>
  <text x="181" y="60" text-anchor="middle" class="panelhd">Statistical hacking (learned reward model)</text>

  
  <g transform="translate(40,76)">
    <rect x="0" y="0" width="284" height="150" rx="6" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1"/>
    <line x1="0" y1="140" x2="284" y2="140" stroke="var(--border-2,#cbd2dc)" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="150" stroke="var(--border-2,#cbd2dc)" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="72" y="14" text-anchor="middle" class="region">on-distribution</text>
    <text x="215" y="14" text-anchor="middle" class="region">off-distribution</text>

    
    <path d="M8,110 C50,70 100,50 150,44 C190,58 230,80 276,120" fill="none" stroke="var(--muted,#6b7280)" stroke-width="2.2"/>
    
    <path d="M8,116 C50,76 100,54 150,46 C195,30 235,10 276,4" fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.2"/>

    <text x="8" y="132" class="lbl" fill="var(--muted,#6b7280)" font-size="9">true quality</text>
    <text x="200" y="132" class="lbl" fill="var(--accent,#c15b39)" font-size="9">learned reward r_phi</text>

    
    <circle cx="270" cy="6" r="5" fill="var(--danger,#c0392b)"/>
    <text x="270" y="-6" text-anchor="middle" class="mono" font-size="9" fill="var(--danger,#c0392b)">policy</text>
  </g>

  <rect x="40" y="234" width="284" height="40" rx="6" fill="var(--surface-3,#eef1f5)" stroke="var(--danger,#c0392b)" stroke-width="1"/>
  <text x="182" y="250" text-anchor="middle" class="lbl" font-size="10">Goodhart: optimize the proxy,</text>
  <text x="182" y="264" text-anchor="middle" class="lbl" font-size="10">true quality falls</text>

  <text x="182" y="292" text-anchor="middle" class="sub">defense = statistics:</text>
  <text x="182" y="306" text-anchor="middle" class="sub">KL anchor, early stop,</text>
  <text x="182" y="320" text-anchor="middle" class="sub">RM ensembles, stay near data</text>

  <rect x="40" y="336" width="284" height="24" rx="12" fill="none" stroke="var(--border-2,#cbd2dc)" stroke-width="1"/>
  <text x="182" y="352" text-anchor="middle" class="sub" font-size="9.5">reward is an approximation of quality</text>
</g>


<g data-anim="2">
  <line x1="356" y1="200" x2="434" y2="200" stroke="var(--danger,#c0392b)" stroke-width="2.5" marker-end="url(#hk-arrow)"/>
  <text x="395" y="184" text-anchor="middle" class="movearr" fill="var(--danger,#c0392b)">the hacking</text>
  <text x="395" y="218" text-anchor="middle" class="movearr" fill="var(--danger,#c0392b)">MOVES</text>
  <text x="395" y="238" text-anchor="middle" class="sub" font-size="9">(does not disappear)</text>
</g>


<g data-anim="1">
  <rect x="454" y="38" width="330" height="330" rx="10" fill="var(--surface,#fff)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.2"/>
  <text x="619" y="60" text-anchor="middle" class="panelhd">Software hacking (verifier / sandbox)</text>

  
  <rect x="537" y="72" width="164" height="34" rx="6" fill="var(--surface-3,#eef1f5)" stroke="var(--accent2,#3b82f6)" stroke-width="1.4"/>
  <text x="619" y="93" text-anchor="middle" class="mono" font-size="10.5">V(q,o) / code sandbox</text>

  
  <circle cx="619" cy="140" r="16" fill="var(--danger,#c0392b)" opacity="0.85"/>
  <text x="619" y="144" text-anchor="middle" class="lbl" fill="white" font-size="9">fuzzer</text>
  <text x="619" y="164" text-anchor="middle" class="sub" font-size="9">(the policy)</text>

  
  <line x1="600" y1="126" x2="560" y2="108" stroke="var(--danger,#c0392b)" stroke-width="1.6" class="hk-fuzz" marker-end="url(#hk-arrow)"/>
  <line x1="619" y1="124" x2="619" y2="108" stroke="var(--danger,#c0392b)" stroke-width="1.6" class="hk-fuzz" marker-end="url(#hk-arrow)"/>
  <line x1="638" y1="126" x2="678" y2="108" stroke="var(--danger,#c0392b)" stroke-width="1.6" class="hk-fuzz" marker-end="url(#hk-arrow)"/>

  
  <g data-anim="3">
    <rect x="470" y="180" width="298" height="38" rx="6" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1"/>
    <text x="480" y="194" class="exploit" font-size="9.3">1. hard-code leaked test outputs</text>
    <text x="480" y="209" class="defense" font-size="9.3">-&gt; hide + randomize tests, no FS/net</text>

    <rect x="470" y="222" width="298" height="38" rx="6" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1"/>
    <text x="480" y="236" class="exploit" font-size="9.3">2. spam \boxed{} candidates / regex trick</text>
    <text x="480" y="251" class="defense" font-size="9.3">-&gt; take LAST boxed only, fuzz the extractor</text>

    <rect x="470" y="264" width="298" height="38" rx="6" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1"/>
    <text x="480" y="278" class="exploit" font-size="9.3">3. fork-bomb / crash grader for default pass</text>
    <text x="480" y="293" class="defense" font-size="9.3">-&gt; real isolation + rlimits; crash = reward 0</text>

    <rect x="470" y="306" width="298" height="38" rx="6" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1"/>
    <text x="480" y="320" class="exploit" font-size="9.3">4. farm oversized format / length bonus</text>
    <text x="480" y="335" class="defense" font-size="9.3">-&gt; keep shaping small AND contingent</text>
  </g>
</g>


<g data-anim="4">
  <rect x="16" y="382" width="768" height="60" rx="8" fill="var(--surface-3,#eef1f5)" stroke="var(--border-2,#cbd2dc)" stroke-width="1.2"/>
  <text x="400" y="404" text-anchor="middle" class="banner">RLVR converts statistical drift into software security</text>
  <text x="400" y="423" text-anchor="middle" class="sub">threat-model your grader like a public API taking untrusted input</text>
</g>
</svg>
<figcaption><b>RLVR does not eliminate reward hacking — it changes what kind of hacking you have to defend against.</b> A learned reward model can be Goodharted statistically, drifting off-distribution while looking better and better to the proxy; a programmatic verifier and sandbox instead get attacked as software, fuzzed by the policy for parser bugs, leaked tests, and sandbox escapes. The defenses move accordingly: from statistics (KL anchors, RM ensembles, early stopping) to engineering (isolation, randomized tests, extractor fuzzing, treating a crashed grader as reward zero).</figcaption>
</figure>
