<figure class="viz" id="fig-rollout-throughput-sync-vs-async">
<svg viewBox="0 0 800 410" role="img" aria-label="Gantt-style GPU timeline comparing synchronous and asynchronous agentic rollout. In the synchronous scenario, a single GPU lane alternates GEN blocks with wide hatched env-wait gaps, leaving the GPU roughly half idle. In the asynchronous scenario, the same GPU lane is packed with back-to-back GEN blocks for four concurrently fanned-out trajectories A, B, C, D with no gaps, while a pool of parallel env-worker rows below absorbs the tool waits -- so while trajectory A sits in its env-worker bar, the GPU is generating trajectory B's next action.">

  </pattern>
  <marker id="rtsa-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#6b7280)"/>
  </marker>
</defs>

<line x1="120" y1="360" x2="766" y2="360" stroke="var(--muted,#6b7280)" stroke-width="1.2" marker-end="url(#rtsa-arrow)"/>

</svg>
<figcaption><b>The GPU is the expensive resource, and environment waits create bubbles unless you fan out.</b> In the synchronous panel, the GPU alternates generating one action and waiting on an environment, so roughly half its time sits idle behind a hatched gap. In the asynchronous panel, the same GPU lane runs back-to-back GEN blocks for four concurrently fanned-out trajectories -- while trajectory A sits in its env-worker bar waiting on a tool, the GPU is already generating trajectory B's next action, so the bubbles disappear.</figcaption>
</figure>
