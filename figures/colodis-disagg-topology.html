<figcaption><b>Disaggregated RL topology: two independently-sized GPU pools exchange weights and experience over dedicated channels.</b> The training pool (left, orange) runs FSDP/Megatron and holds optimizer state; the larger rollout pool (right, teal) runs vLLM and holds the KV cache. The emphasized weight-sync rail (top, left-to-right) is the bottleneck this chapter analyzes; the experience rail (bottom, right-to-left) carries rollout tokens back for training. A reward-worker tier scores completions and routes advantages to the trainer, completing the loop.</figcaption>
</figure>
