<figure class="viz" id="fig-moshi-temporal-hierarchy">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 940 600" role="img" aria-label="Moshi temporal hierarchy: System and User audio codec streams at 75fps share coarse L1 tokens; an Inner LM fires once per codec step consuming L1 from both streams and predicting the next system L1; a Depth transformer then fills fine levels L2-L8 per step. An animated playhead sweeps left to right showing the causal streaming process.">
<defs>
  <marker id="mo-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--accent,#6aa9ff)" class="v-accent"/>
  </marker>
  <marker id="mo-arrow-s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" fill="var(--muted,#978f83)"/>
  </marker>
</defs>
<style>
  #fig-moshi-temporal-hierarchy text { fill: var(--ink-soft,#45413a); font: 400 11px var(--sans,sans-serif); }
  #fig-moshi-temporal-hierarchy .lbl { font: 700 11px var(--sans,sans-serif); }
  #fig-moshi-temporal-hierarchy .small { font: 400 9.5px var(--sans,sans-serif); fill: var(--muted,#978f83); }
  #fig-moshi-temporal-hierarchy .lanelbl { font: 700 10px var(--sans,sans-serif); letter-spacing:0.5px; }
  #fig-moshi-temporal-hierarchy .mono { font: 400 9px var(--mono,monospace); }

  /* Playhead animation */
  #fig-moshi-temporal-hierarchy #mo-playhead {
    animation: mo-sweep 4s ease-in-out infinite;
  }
  @keyframes mo-sweep {
    0%   { transform: translateX(0); opacity: 0.9; }
    80%  { transform: translateX(440px); opacity: 0.9; }
    90%  { transform: translateX(440px); opacity: 0; }
    91%  { transform: translateX(0); opacity: 0; }
    100% { transform: translateX(0); opacity: 0.9; }
  }

  /* L1 system cells pulse as playhead hits them */
  #fig-moshi-temporal-hierarchy .mo-sys-l1 {
    animation: mo-sys-pulse 4s ease-in-out infinite;
  }
  #fig-moshi-temporal-hierarchy .mo-user-l1 {
    animation: mo-user-pulse 4s ease-in-out infinite;
  }
  #fig-moshi-temporal-hierarchy .mo-ilm-node {
    animation: mo-ilm-pulse 4s ease-in-out infinite;
  }
  #fig-moshi-temporal-hierarchy .mo-fine-cells {
    animation: mo-fine-pulse 4s ease-in-out infinite;
  }
  @keyframes mo-sys-pulse {
    0%, 5%, 100%  { fill-opacity: 0.25; }
    15%, 25% { fill-opacity: 0.75; }
  }
  @keyframes mo-user-pulse {
    0%, 8%, 100%  { fill-opacity: 0.25; }
    18%, 28% { fill-opacity: 0.70; }
  }
  @keyframes mo-ilm-pulse {
    0%, 20%, 100% { fill-opacity: 0.15; }
    28%, 40% { fill-opacity: 0.65; }
  }
  @keyframes mo-fine-pulse {
    0%, 38%, 100% { fill-opacity: 0.12; }
    45%, 58% { fill-opacity: 0.55; }
  }
</style>

<text x="470" y="526" text-anchor="middle" class="small">This hierarchical design enables sub-200 ms response latency.</text>


<g id="mo-playhead">

<figcaption><b>Moshi temporal hierarchy: Inner LM + Depth transformer enable real-time full-duplex speech.</b> At each codec step (~13 ms), the Inner LM takes coarse L1 tokens from both the system and user audio streams (animated playhead), predicts the next system L1, then the Depth transformer autoregressively fills fine levels L2–L8. The causal constraint — attending only to past frames — makes the entire pipeline streamable with sub-200 ms latency.</figcaption>
</figure>
