<figure class="viz" id="fig-longctx-rope-extension-spectrum">
<svg viewBox="0 0 760 660" role="img" aria-label="Two-panel infographic. Top: why standard RoPE breaks at long positions, showing a high-frequency to low-frequency spectrum with three clock dials whose hands show trained versus extrapolated rotation angle. Bottom: how Position Interpolation, NTK-aware scaling, and YaRN each remap that spectrum, sharing the same axis so the three per-dimension scaling profiles can be compared.">
<defs>
  <pattern id="rope-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="var(--surface-3,#ece7da)"/>
    <line x1="0" y1="0" x2="0" y2="6" stroke="var(--muted,#6d675d)" stroke-width="1.4"/>
  </pattern>
  <marker id="rope-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--ink-soft,#45413a)"/>
  </marker>
</defs>
<style>
  #fig-longctx-rope-extension-spectrum text { fill: var(--ink-soft,#45413a); font: 400 10.5px var(--sans,sans-serif); }
  #fig-longctx-rope-extension-spectrum .ttl  { font: 700 14px var(--sans,sans-serif); fill: var(--ink); }
  #fig-longctx-rope-extension-spectrum .sub  { font: 700 11.5px var(--sans,sans-serif); }
  #fig-longctx-rope-extension-spectrum .lbl  { font: 400 10px var(--sans,sans-serif); fill: var(--muted,#6d675d); }
  #fig-longctx-rope-extension-spectrum .lbl-b { font: 700 10px var(--sans,sans-serif); }
  #fig-longctx-rope-extension-spectrum .mono { font: 400 10px var(--mono,monospace); fill: var(--muted,#6d675d); }
  #fig-longctx-rope-extension-spectrum .row-ttl { font: 700 12px var(--sans,sans-serif); }
  #fig-longctx-rope-extension-spectrum .cap { font: 400 10px var(--sans,sans-serif); fill: var(--ink-soft,#45413a); }
  #fig-longctx-rope-extension-spectrum .accent-t { fill: var(--accent,#c15b39); font: 700 10px var(--sans,sans-serif); }
</style>

<g data-anim="1">
  <text x="380" y="24" text-anchor="middle" class="ttl">Why standard RoPE breaks at long positions</text>

  
  <rect x="100" y="36" width="560" height="18" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <rect x="100" y="36" width="196" height="18" fill="var(--accent2,#3b82f6)" opacity="0.18"/>
  <rect x="296" y="36" width="364" height="18" fill="url(#rope-hatch)"/>
  <line x1="296" y1="34" x2="296" y2="56" stroke="var(--ink-soft,#45413a)" stroke-width="1.2"/>
  <text x="102" y="66" class="lbl">trained: positions 0..T_train</text>
  <text x="658" y="66" text-anchor="end" class="lbl">extrapolated: up to T_target (e.g. 4096 -&gt; 32768, 8x)</text>
</g>


<g data-anim="2">
  
  <line x1="190" y1="222" x2="190" y2="270" stroke="var(--v-grid,#d8d1c0)" stroke-dasharray="3 3" stroke-width="1"/>
  <line x1="380" y1="222" x2="380" y2="270" stroke="var(--v-grid,#d8d1c0)" stroke-dasharray="3 3" stroke-width="1"/>
  <line x1="570" y1="222" x2="570" y2="270" stroke="var(--v-grid,#d8d1c0)" stroke-dasharray="3 3" stroke-width="1"/>

  
  <path d="M 232,175 A 42,42 0 1 0 148,175 A 42,42 0 1 0 232,175 Z
           M 218,175 A 28,28 0 1 1 162,175 A 28,28 0 1 1 218,175 Z"
        fill-rule="evenodd" fill="url(#rope-hatch)"/>
  <circle cx="190" cy="175" r="28" class="v-fill" stroke="var(--v-stroke,#45413a)" stroke-width="1.3"/>
  <circle cx="190" cy="175" r="2" fill="var(--v-stroke,#45413a)"/>
  
  <line x1="190" y1="175" x2="200" y2="157" class="v-stroke" stroke-width="2.4" stroke-linecap="round"/>
  
  <line x1="190" y1="175" x2="172" y2="213" stroke="var(--accent,#c15b39)" stroke-width="2.2" stroke-dasharray="3 2" stroke-linecap="round"/>
  <text x="190" y="128" text-anchor="middle" class="lbl-b">i=0 (highest freq)</text>
  <text x="190" y="236" text-anchor="middle" class="lbl">out of distribution</text>
  <text x="190" y="248" text-anchor="middle" class="lbl">-&gt; pathological scores</text>
  <text x="190" y="260" text-anchor="middle" class="mono">trained ~4096 rad, target ~32768 rad</text>

  
  <circle cx="380" cy="175" r="28" class="v-fill" stroke="var(--v-stroke,#45413a)" stroke-width="1.3"/>
  <circle cx="380" cy="175" r="2" fill="var(--v-stroke,#45413a)"/>
  <line x1="380" y1="175" x2="398" y2="161" class="v-stroke" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="380" y1="175" x2="401" y2="171" stroke="var(--accent,#c15b39)" stroke-width="2.2" stroke-dasharray="3 2" stroke-linecap="round"/>
  <text x="380" y="128" text-anchor="middle" class="lbl-b">mid i</text>
  <text x="380" y="236" text-anchor="middle" class="lbl">moderate extrapolation</text>

  
  <circle cx="570" cy="175" r="28" class="v-fill" stroke="var(--v-stroke,#45413a)" stroke-width="1.3"/>
  <circle cx="570" cy="175" r="2" fill="var(--v-stroke,#45413a)"/>
  <line x1="570" y1="175" x2="573" y2="147" class="v-stroke" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="570" y1="175" x2="577" y2="149" stroke="var(--accent,#c15b39)" stroke-width="2.2" stroke-dasharray="3 2" stroke-linecap="round"/>
  <text x="570" y="128" text-anchor="middle" class="lbl-b">i=large (lowest freq)</text>
  <text x="570" y="236" text-anchor="middle" class="lbl">barely rotates --</text>
  <text x="570" y="248" text-anchor="middle" class="lbl">under-uses its range</text>
</g>

<g data-anim="3">
  
  <rect x="60" y="270" width="640" height="20" class="v-fill" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>
  <rect x="60" y="270" width="640" height="20" fill="var(--accent2,#3b82f6)" opacity="0.10"/>
  <line x1="65" y1="280" x2="695" y2="280" stroke="var(--ink-soft,#45413a)" stroke-width="1.1" marker-end="url(#rope-arr)"/>
  <text x="60" y="306" class="lbl-b">high-frequency dims (i=0):</text>
  <text x="60" y="318" class="lbl">short wavelength, fast rotation, LOCAL / short-range</text>
  <text x="700" y="306" text-anchor="end" class="lbl-b">low-frequency dims (large i):</text>
  <text x="700" y="318" text-anchor="end" class="lbl">long wavelength, slow rotation, GLOBAL / long-range</text>
</g>

<line x1="20" y1="334" x2="740" y2="334" stroke="var(--border-2,#d8d1c0)" stroke-width="1"/>


<g data-anim="4">
  <text x="380" y="358" text-anchor="middle" class="ttl">Three ways to fit the target window into the trained range</text>

  <line x1="100" y1="382" x2="660" y2="382" stroke="var(--v-grid,#d8d1c0)" stroke-width="1.2"/>
  <text x="100" y="376" class="lbl">high-freq (local)</text>
  <text x="660" y="376" text-anchor="end" class="lbl">low-freq (global)</text>
  <line x1="190" y1="382" x2="190" y2="610" stroke="var(--v-grid,#d8d1c0)" stroke-dasharray="2 3" stroke-width="1" opacity="0.7"/>
  <line x1="380" y1="382" x2="380" y2="610" stroke="var(--v-grid,#d8d1c0)" stroke-dasharray="2 3" stroke-width="1" opacity="0.7"/>
  <line x1="570" y1="382" x2="570" y2="610" stroke="var(--v-grid,#d8d1c0)" stroke-dasharray="2 3" stroke-width="1" opacity="0.7"/>
</g>


<g data-anim="4">
  <text x="20" y="404" class="row-ttl">PI</text>
  <text x="94" y="398" text-anchor="end" class="lbl">no scaling</text>
  <text x="94" y="432" text-anchor="end" class="lbl">full 1/s</text>
  <rect x="100" y="398" width="560" height="34" fill="var(--accent,#c15b39)" opacity="0.16"/>
  <line x1="100" y1="432" x2="660" y2="432" stroke="var(--accent,#c15b39)" stroke-width="2.4"/>
  <text x="100" y="447" class="cap">Position Interpolation (PI): compresses ALL frequencies equally -&gt; high-freq dims now</text>
  <text x="100" y="459" class="cap">too slow, adjacent tokens (dist 1) collapse to ~1/8 apart.</text>
</g>


<g data-anim="5">
  <text x="20" y="480" class="row-ttl">NTK</text>
  <text x="94" y="468" text-anchor="end" class="lbl">no scaling</text>
  <text x="94" y="502" text-anchor="end" class="lbl">full 1/s</text>
  <path d="M 100,468 C 300,468 460,478 660,502" fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.4"/>
  <text x="100" y="518" class="cap">NTK-aware (base rescaling): raise the base b -&gt; stretch the rope; keeps local</text>
  <text x="100" y="530" class="cap">resolution, often works zero-shot.</text>
</g>


<g data-anim="5">
  <text x="20" y="586" class="row-ttl">YaRN</text>
  <text x="94" y="568" text-anchor="end" class="lbl">no scaling</text>
  <text x="94" y="606" text-anchor="end" class="lbl">full 1/s</text>
  <rect x="100" y="568" width="196" height="38" fill="var(--v-muted,#6d675d)" opacity="0.14"/>
  <rect x="404" y="568" width="256" height="38" fill="var(--accent,#c15b39)" opacity="0.16"/>
  <path d="M 100,568 L 296,568 C 350,568 360,606 404,606 L 660,606" fill="none" stroke="var(--accent,#c15b39)" stroke-width="2.4"/>
  <line x1="296" y1="566" x2="296" y2="610" stroke="var(--ink-soft,#45413a)" stroke-dasharray="2 2" stroke-width="1"/>
  <line x1="404" y1="566" x2="404" y2="610" stroke="var(--ink-soft,#45413a)" stroke-dasharray="2 2" stroke-width="1"/>
  <text x="296" y="560" text-anchor="middle" class="mono">beta_fast</text>
  <text x="404" y="560" text-anchor="middle" class="mono">beta_slow</text>
  <text x="198" y="622" text-anchor="middle" class="lbl-b">PROTECTED: local dims untouched</text>
  <text x="532" y="622" text-anchor="middle" class="lbl-b">SCALED: global dims stretched to reach far tokens</text>
  <text x="100" y="638" class="cap">YaRN (per-frequency ramp): best of both -- plus a small softmax temperature correction.</text>
</g>

</svg>
<figcaption><b>Standard RoPE breaks because a single global scaling can't serve both ends of the frequency spectrum: high-frequency dimensions rotate many times per token and go out-of-distribution the moment positions exceed the trained window, while low-frequency dimensions barely rotate at all even inside it.</b> PI compresses every dimension by the same factor 1/s, sacrificing local resolution to buy global range; NTK-aware rescaling stretches the base so high-frequency dims stay sharp; YaRN combines both by ramping the scaling from "untouched" (protected, local) to "full PI scaling" (global) as a function of wavelength, plus a small softmax temperature correction.</figcaption>
</figure>
