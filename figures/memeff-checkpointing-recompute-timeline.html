<figcaption><b>Checkpointing trades a low, flat memory footprint for a burst of recompute in backward.</b> Storing every layer's activations (top) climbs step by step to a peak of O(L) memory at the forward/backward boundary and pierces the GPU memory limit; checkpointing only sqrt(L) layer boundaries (bottom, pins at layers 3, 6, 9) keeps memory low and roughly flat, paying for it with a recompute bump each time backward re-runs a checkpointed segment before its gradients can flow.</figcaption>
</figure>
