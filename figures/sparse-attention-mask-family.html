<figcaption><b>The same causal mask can be computed densely, or only over a sparse subset of keys.</b> Full attention lets every query see all prior keys (O(N^2) cost); sliding-window, block-sparse, and global+local masks each skip most of the grid, computing only the accent-colored cells -- trading some receptive field per layer for near-linear cost, which stacked layers (or a few global tokens) recover.</figcaption>
