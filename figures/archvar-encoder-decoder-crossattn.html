<figcaption><b>Encoder-decoder architecture (T5/BART): bidirectional source understanding feeds autoregressive generation via cross-attention.</b> The encoder processes the full source sequence bidirectionally (left), producing H_enc. Each decoder block uses causal self-attention over previous output tokens and then attends to H_enc via cross-attention (dashed orange arrows) — giving queries from the decoder full access to source keys and values.</figcaption>
</figure>
