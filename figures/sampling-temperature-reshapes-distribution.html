<figure class="viz" id="fig-sampling-temperature-reshapes-distribution">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 410" role="img" aria-label="Three bar-chart panels showing the same raw logits (token A=5.0, token B=4.0, plus three smaller tail tokens) reshaped by temperature: T=0.5 sharpens the distribution toward token A, T=1 shows the model's trained distribution, and T=2 flattens it and lifts the tail.">
<defs>
  <marker id="strd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 z" fill="var(--border-2,#94a3b8)"/>
  </marker>
</defs>
<style>
  #fig-sampling-temperature-reshapes-distribution .formula   { font: 600 13px var(--mono,monospace); fill: var(--ink-soft,#334155); }
  #fig-sampling-temperature-reshapes-distribution .p-title   { font: 700 13px var(--sans,sans-serif); fill: var(--ink-soft,#334155); }
  #fig-sampling-temperature-reshapes-distribution .val-lbl   { font: 600 9px var(--mono,monospace); fill: var(--ink-soft,#334155); }
  #fig-sampling-temperature-reshapes-distribution .val-lbl-a { font: 700 9.5px var(--mono,monospace); fill: var(--accent,#6366f1); }
  #fig-sampling-temperature-reshapes-distribution .tok-lbl   { font: 500 10px var(--mono,monospace); fill: var(--muted,#64748b); }
  #fig-sampling-temperature-reshapes-distribution .ann       { font: italic 500 10px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-temperature-reshapes-distribution .endp      { font: 500 10.5px var(--sans,sans-serif); fill: var(--muted,#64748b); }
  #fig-sampling-temperature-reshapes-distribution .bar-b     { fill: var(--surface-3,#eef2f7); stroke: var(--border-2,#94a3b8); stroke-width: 1; }
  #fig-sampling-temperature-reshapes-distribution .bar-a     { fill: var(--accent,#6366f1); stroke: var(--accent,#6366f1); stroke-width: 1; }
  #fig-sampling-temperature-reshapes-distribution .base      { stroke: var(--border-2,#94a3b8); stroke-width: 1.3; }
  #fig-sampling-temperature-reshapes-distribution [data-anim] { animation: strd-in 0.6s ease-out both; }
  #fig-sampling-temperature-reshapes-distribution [data-anim="2"] { animation-delay: 0.15s; }
  #fig-sampling-temperature-reshapes-distribution [data-anim="3"] { animation-delay: 0.3s; }
  @keyframes strd-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    #fig-sampling-temperature-reshapes-distribution [data-anim] { animation: none; opacity: 1; }
  }
</style>


<text x="390" y="24" text-anchor="middle" class="formula">P_T(t) = exp(z_t / T)  /  sum_t' exp(z_t' / T)</text>



<g data-anim="1">
<text x="150" y="54" text-anchor="middle" class="p-title">T = 0.5 (sharpen)</text>
<line x1="40" y1="260" x2="260" y2="260" class="base"/>


<rect x="56"  y="84"  width="28" height="176" class="bar-a"/>
<text x="70"  y="76"  text-anchor="middle" class="val-lbl-a">0.88</text>

<rect x="96"  y="236" width="28" height="24" class="bar-b"/>
<text x="110" y="228" text-anchor="middle" class="val-lbl">0.12</text>

<rect x="136" y="259.5" width="28" height="0.5" class="bar-b"/>
<text x="150" y="252" text-anchor="middle" class="val-lbl">~0</text>

<rect x="176" y="259.5" width="28" height="0.5" class="bar-b"/>
<text x="190" y="252" text-anchor="middle" class="val-lbl">~0</text>

<text x="230" y="274" text-anchor="middle" class="tok-lbl">E</text>

<text x="150" y="298" text-anchor="middle" class="ann">colder -&gt; concentrates on the peak</text>
<text x="150" y="312" text-anchor="middle" class="ann">(toward greedy)</text>
</g>



<g data-anim="2">
<text x="390" y="54" text-anchor="middle" class="p-title">T = 1 (trained)</text>
<line x1="280" y1="260" x2="500" y2="260" class="base"/>


<rect x="296" y="118" width="28" height="142" class="bar-a"/>
<text x="310" y="110" text-anchor="middle" class="val-lbl-a">0.73</text>

<rect x="336" y="208" width="28" height="52" class="bar-b"/>
<text x="350" y="200" text-anchor="middle" class="val-lbl">0.27</text>

<rect x="376" y="257" width="28" height="3" class="bar-b"/>
<text x="390" y="250" text-anchor="middle" class="val-lbl">0.01</text>

<rect x="416" y="258" width="28" height="2" class="bar-b"/>
<text x="430" y="250" text-anchor="middle" class="val-lbl">0.01</text>

<rect x="456" y="259" width="28" height="1" class="bar-b"/>
<text x="470" y="250" text-anchor="middle" class="val-lbl">0.00</text>

<text x="310" y="274" text-anchor="middle" class="tok-lbl">A</text>
<text x="350" y="274" text-anchor="middle" class="tok-lbl">B</text>
<text x="390" y="274" text-anchor="middle" class="tok-lbl">C</text>
<text x="430" y="274" text-anchor="middle" class="tok-lbl">D</text>

<g data-anim="3">
<text x="630" y="54" text-anchor="middle" class="p-title">T = 2 (flatten)</text>
<line x1="520" y1="260" x2="740" y2="260" class="base"/>


<rect x="536" y="156" width="28" height="104" class="bar-a"/>
<text x="550" y="148" text-anchor="middle" class="val-lbl-a">0.52</text>

<rect x="576" y="197" width="28" height="63" class="bar-b"/>
<text x="590" y="189" text-anchor="middle" class="val-lbl">0.31</text>

<rect x="616" y="246" width="28" height="14" class="bar-b"/>

<rect x="696" y="251" width="28" height="9" class="bar-b"/>
<text x="710" y="243" text-anchor="middle" class="val-lbl">0.04</text>

<text x="630" y="312" text-anchor="middle" class="ann">(toward uniform)</text>
</g>



<line x1="40" y1="348" x2="740" y2="348" stroke="var(--border-2,#94a3b8)" stroke-width="1.3" marker-end="url(#strd-arrow)"/>
<line x1="40" y1="342" x2="40" y2="354" stroke="var(--border-2,#94a3b8)" stroke-width="1.3"/>
<text x="390" y="342" text-anchor="middle" class="endp" style="font-style:italic;">T increases -&gt;</text>

<text x="40"  y="368" text-anchor="start" class="endp">T -&gt; 0: point mass at argmax = greedy</text>
<text x="740" y="368" text-anchor="end"   class="endp">T -&gt; infinity: uniform over vocab</text>

</svg>
<figcaption><b>The same raw logits, reshaped by temperature.</b> All three panels start from the identical logits used in the chapter's worked example (z<sub>A</sub>=5.0, z<sub>B</sub>=4.0, plus a small tail) and apply <code>P_T(t) = exp(z_t/T) / sum exp(z'/T)</code>; token A (accent color) stays the same token throughout, but its share of probability mass shrinks from 0.88 at T=0.5 to 0.52 at T=2 as the tail tokens rise from imperceptible to visible. Cooling (T&lt;1) sharpens toward greedy; heating (T&gt;1) flattens toward uniform.</figcaption>
</figure>
