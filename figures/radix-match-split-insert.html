<figure class="viz" id="fig-radix-match-split-insert">
<button class="viz-replay" type="button">↻ replay</button>
<svg viewBox="0 0 760 660" role="img" aria-label="A radix tree edge for a cached system prompt is matched by an incoming request, splits at the point where the request diverges into a shared node S and the original remainder node A with re-sliced KV index ranges, and the request's divergent suffix attaches as a fresh leaf with newly allocated KV slots.">
  <defs>
    <marker id="rmsi-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-radix-match-split-insert text{ fill:var(--ink-soft); }
    #fig-radix-match-split-insert .node{ font:700 11.5px var(--mono,monospace); }
    #fig-radix-match-split-insert .edge{ font:600 12px var(--mono,monospace); }
    #fig-radix-match-split-insert .role{ font:700 10.5px var(--sans,sans-serif); fill:var(--muted); letter-spacing:.2px; }
    #fig-radix-match-split-insert .tag{ font:700 10px var(--sans,sans-serif); }
    #fig-radix-match-split-insert .note{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-radix-match-split-insert .cell{ font:700 10px var(--mono,monospace); }
    #fig-radix-match-split-insert .kvlabel{ font:600 9.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-radix-match-split-insert .panel{ font:700 10.5px var(--sans,sans-serif); fill:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    #fig-radix-match-split-insert .req{ font:600 11px var(--mono,monospace); }
    #fig-radix-match-split-insert .badge{ font:700 11px var(--sans,sans-serif); }
  </style>


  <g data-anim="1">
    <text x="16" y="24" class="panel">before: current tree</text>
    <text x="16" y="322" class="panel">after: split + insert</text>
  </g>


  <g data-anim="1">
    <rect x="540" y="16" width="204" height="94" rx="9" class="v-fill v-stroke" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="642" y="34" text-anchor="middle" class="role">incoming request</text>
    <text x="558" y="56" class="req" fill="var(--accent)">"You are a helpful</text>
    <text x="558" y="72" class="req" fill="var(--accent)">assistant. "</text>
    <text x="558" y="92" class="req">+ "Summarize:"</text>
  </g>


  <g data-anim="1">
    <circle cx="300" cy="40" r="16" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="300" y="44" text-anchor="middle" class="node">root</text>
    <path d="M300 56 L300 74" fill="none" stroke="var(--v-stroke)" stroke-width="2" marker-end="url(#rmsi-arrow)"/>
  </g>


  <g data-anim="1">
    <rect x="90" y="74" width="420" height="112" rx="9" class="v-fill v-accent-s" stroke-width="2"/>
    <text x="300" y="94" text-anchor="middle" class="role">edge into A · one cached prefix</text>
    <text x="300" y="115" text-anchor="middle" class="edge" fill="var(--accent)">"You are a helpful assistant. </text>
    <text x="300" y="131" text-anchor="middle" class="edge">Be concise."</text>
    <text x="145" y="150" class="kvlabel">KV:</text>

    <g>
      <rect x="168" y="140" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="177" y="153" text-anchor="middle" class="cell" fill="var(--accent)">0</text>
      <rect x="189" y="140" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="198" y="153" text-anchor="middle" class="cell" fill="var(--accent)">1</text>
      <rect x="210" y="140" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="219" y="153" text-anchor="middle" class="cell" fill="var(--accent)">2</text>
      <rect x="231" y="140" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="240" y="153" text-anchor="middle" class="cell" fill="var(--accent)">3</text>
      <rect x="252" y="140" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="261" y="153" text-anchor="middle" class="cell" fill="var(--accent)">4</text>
      <rect x="277" y="140" width="18" height="18" rx="4" class="v-fill v-stroke" stroke-width="1.3"/><text x="286" y="153" text-anchor="middle" class="cell">5</text>
      <rect x="298" y="140" width="18" height="18" rx="4" class="v-fill v-stroke" stroke-width="1.3"/><text x="307" y="153" text-anchor="middle" class="cell">6</text>
      <rect x="319" y="140" width="18" height="18" rx="4" class="v-fill v-stroke" stroke-width="1.3"/><text x="328" y="153" text-anchor="middle" class="cell">7</text>
    </g>
    <text x="300" y="173" text-anchor="middle" class="note">slots [0..7] · one edge, one node A (leaf)</text>
  </g>
  <g data-anim="1">
    <path d="M300 186 L300 200" fill="none" stroke="var(--v-stroke)" stroke-width="2" marker-end="url(#rmsi-arrow)"/>
    <rect x="230" y="200" width="140" height="34" rx="8" class="v-fill v-stroke" stroke-width="1.5"/>
    <text x="300" y="222" text-anchor="middle" class="node">A (leaf)</text>
  </g>


  <g data-anim="2">
    <line x1="268" y1="136" x2="268" y2="234" stroke="var(--warn)" stroke-width="1.6" stroke-dasharray="5 3"/>
    <path d="M256 132 L280 132 L268 148 Z" class="v-fill" fill="var(--warn)" stroke="var(--warn)"/>
    <rect x="330" y="58" width="150" height="20" rx="5" class="v-fill" stroke="var(--warn)" stroke-width="1.3"/>
    <text x="405" y="72" text-anchor="middle" class="tag" fill="var(--warn)">matched = 5, then diverges</text>
    <rect x="145" y="140" width="123" height="18" rx="4" fill="none" stroke="var(--warn)" stroke-width="1.6" class="viz-draw" style="--len:400"/>
  </g>
  <g data-anim="2">
    <text x="300" y="252" text-anchor="middle" class="note">partial match: agrees for 5 tokens ("You are a helpful assistant. "), then</text>
    <text x="300" y="266" text-anchor="middle" class="note">diverges — the request continues "Summarize:" where the edge has "Be concise."</text>
  </g>


  <g data-anim="3">
    <path d="M300 266 L300 296" fill="none" stroke="var(--v-stroke)" stroke-width="2.2" marker-end="url(#rmsi-arrow)"/>
    <rect x="220" y="272" width="160" height="20" rx="6" class="v-fill v-stroke" stroke-width="1.3"/>
    <text x="300" y="286" text-anchor="middle" class="tag">SPLIT + INSERT</text>
  </g>


  <g data-anim="3">
    <rect x="130" y="342" width="340" height="92" rx="9" class="v-fill v-accent-s" stroke-width="2.2"/>
    <text x="300" y="360" text-anchor="middle" class="role">S · new intermediate node (shared prefix)</text>
    <text x="300" y="380" text-anchor="middle" class="edge" fill="var(--accent)">"You are a helpful assistant. "</text>
    <text x="196" y="404" class="kvlabel">KV:</text>
    <g>
      <rect x="216" y="394" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="225" y="407" text-anchor="middle" class="cell" fill="var(--accent)">0</text>
      <rect x="237" y="394" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="246" y="407" text-anchor="middle" class="cell" fill="var(--accent)">1</text>
      <rect x="258" y="394" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="267" y="407" text-anchor="middle" class="cell" fill="var(--accent)">2</text>
      <rect x="279" y="394" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="288" y="407" text-anchor="middle" class="cell" fill="var(--accent)">3</text>
      <rect x="300" y="394" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="309" y="407" text-anchor="middle" class="cell" fill="var(--accent)">4</text>
    </g>
    <text x="356" y="407" class="note">reused</text>
  </g>


  <g data-anim="4">
    <path d="M232 434 C 232 452, 190 452, 190 468" fill="none" stroke="var(--v-stroke)" stroke-width="2" marker-end="url(#rmsi-arrow)"/>
    <rect x="60" y="468" width="260" height="92" rx="9" class="v-fill" stroke="var(--accent)" stroke-width="1.8"/>
    <text x="190" y="486" text-anchor="middle" class="role">A · re-parented remainder</text>
    <text x="190" y="506" text-anchor="middle" class="edge" fill="var(--accent)">"Be concise."</text>
    <text x="86" y="530" class="kvlabel">KV:</text>
    <g>
      <rect x="106" y="520" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="115" y="533" text-anchor="middle" class="cell" fill="var(--accent)">5</text>
      <rect x="127" y="520" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="136" y="533" text-anchor="middle" class="cell" fill="var(--accent)">6</text>
      <rect x="148" y="520" width="18" height="18" rx="4" class="v-fill v-accent-s" stroke-width="1.3"/><text x="157" y="533" text-anchor="middle" class="cell" fill="var(--accent)">7</text>
    </g>
    <text x="190" y="550" text-anchor="middle" class="tag" fill="var(--accent)">original KV preserved</text>
  </g>


  <g data-anim="5">
    <path d="M368 434 C 368 452, 410 452, 410 468" fill="none" stroke="var(--v-stroke)" stroke-width="2" marker-end="url(#rmsi-arrow)"/>
    <rect x="340" y="468" width="260" height="92" rx="9" class="v-fill" stroke="var(--warn)" stroke-width="1.8" stroke-dasharray="6 3"/>
    <text x="470" y="486" text-anchor="middle" class="role">new leaf · request's suffix</text>
    <text x="470" y="506" text-anchor="middle" class="edge" fill="var(--warn)">"Summarize:"</text>
    <text x="392" y="530" class="kvlabel">KV:</text>
    <g class="viz-pulse">
      <rect x="412" y="520" width="18" height="18" rx="4" class="v-fill" stroke="var(--warn)" stroke-width="1.6"/><text x="421" y="533" text-anchor="middle" class="cell" fill="var(--warn)">8</text>
      <rect x="433" y="520" width="18" height="18" rx="4" class="v-fill" stroke="var(--warn)" stroke-width="1.6"/><text x="442" y="533" text-anchor="middle" class="cell" fill="var(--warn)">9</text>
      <rect x="454" y="520" width="26" height="18" rx="4" class="v-fill" stroke="var(--warn)" stroke-width="1.6"/><text x="467" y="533" text-anchor="middle" class="cell" fill="var(--warn)">10</text>
    </g>
    <text x="470" y="550" text-anchor="middle" class="tag" fill="var(--warn)">newly allocated</text>
  </g>


  <g data-anim="4">
    <text x="300" y="596" text-anchor="middle" class="note">no KV recomputed — index tensor is re-sliced [0..4] | [5..7]; the new leaf alone is prefilled</text>
  </g>
  <g data-anim="5">
    <rect x="150" y="608" width="300" height="30" rx="7" class="v-fill v-stroke" stroke-width="1.4"/>
    <text x="300" y="628" text-anchor="middle" class="badge">reused = shared prefix &#160;|&#160; prefilled = suffix only</text>
  </g>
</svg>
<figcaption><b>Inserting a partially-matching request splits one edge into a shared node and a remainder, then attaches the new suffix as a fresh leaf.</b> The tree walk matches token-by-token until it diverges (here after 5 tokens); the edge cleaves into <code>S</code> (shared, KV [0..4]) and the re-parented <code>A</code> (remainder, KV [5..7]) by <i>re-slicing the same index tensor</i> — no KV is recomputed. Only the request's divergent suffix gets freshly allocated slots and is actually prefilled.</figcaption>
</figure>
