<figure class="viz" id="fig-cuda-graph-cpu-launch-timeline">
<button class="viz-replay" type="button">&#8635; replay</button>
<svg viewBox="0 0 780 430" role="img" aria-label="Timeline comparison: eager kernel launches leave gaps of GPU idle time between each CPU launch call, while a captured CUDA graph replays with a single CPU call and packs the same kernels back-to-back with no idle time, finishing sooner.">
  <defs>
    <pattern id="cg-hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="var(--warn,#e0a106)" fill-opacity="0.10"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="var(--warn,#e0a106)" stroke-width="1.3" stroke-opacity="0.5"/>
    </pattern>
    <marker id="cg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    #fig-cuda-graph-cpu-launch-timeline text{ fill:var(--ink-soft); }
    #fig-cuda-graph-cpu-launch-timeline .ttl{ font:600 13.5px var(--sans,sans-serif); }
    #fig-cuda-graph-cpu-launch-timeline .lane{ font:600 11px var(--sans,sans-serif); fill:var(--muted); }
    #fig-cuda-graph-cpu-launch-timeline .blk{ font:600 9.5px var(--mono,monospace); fill:var(--ink-soft); }
    #fig-cuda-graph-cpu-launch-timeline .blk-inv{ font:600 9.5px var(--mono,monospace); fill:var(--surface); }
    #fig-cuda-graph-cpu-launch-timeline .sm{ font:500 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-cuda-graph-cpu-launch-timeline .cap{ font:600 10.5px var(--sans,sans-serif); fill:var(--muted); }
    #fig-cuda-graph-cpu-launch-timeline .note{ font:600 10px var(--sans,sans-serif); }
  </style>

  
  <g data-anim="1">
    <text x="14" y="24" class="ttl">Eager launch (CPU-bound, small kernels)</text>

    
    <text x="14" y="52" class="lane">CPU</text>
    <rect x="60" y="38" width="690" height="26" rx="4" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
    <text x="14" y="98" class="lane">GPU</text>
    <rect x="60" y="84" width="690" height="26" rx="4" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
  </g>

  <g data-anim="2">
    
    
    <g class="v-accent" fill="var(--accent)" fill-opacity="0.85">
      <rect x="70"  y="41" width="52" height="20" rx="3"/>
      <rect x="182" y="41" width="52" height="20" rx="3"/>
      <rect x="294" y="41" width="52" height="20" rx="3"/>
      <rect x="406" y="41" width="52" height="20" rx="3"/>
      <rect x="518" y="41" width="52" height="20" rx="3"/>
    </g>
    <g class="blk-inv" text-anchor="middle">
      <text x="96"  y="55">launch</text>
      <text x="208" y="55">launch</text>
      <text x="320" y="55">launch</text>
      <text x="432" y="55">launch</text>
      <text x="544" y="55">launch</text>
    </g>

    
    <g fill="var(--accent2)" fill-opacity="0.82">
      <rect x="130" y="87" width="34" height="20" rx="3"/>
      <rect x="242" y="87" width="34" height="20" rx="3"/>
      <rect x="354" y="87" width="34" height="20" rx="3"/>
      <rect x="466" y="87" width="34" height="20" rx="3"/>
      <rect x="578" y="87" width="34" height="20" rx="3"/>
    </g>
    <g class="blk-inv" text-anchor="middle">
      <text x="147" y="101">k1</text>
      <text x="259" y="101">k2</text>
      <text x="371" y="101">k3</text>
      <text x="483" y="101">k4</text>
      <text x="595" y="101">k5</text>
    </g>

    
    <g>
      <rect x="164" y="87" width="78" height="20" fill="url(#cg-hatch)"/>
      <rect x="276" y="87" width="78" height="20" fill="url(#cg-hatch)"/>
      <rect x="388" y="87" width="78" height="20" fill="url(#cg-hatch)"/>
      <rect x="500" y="87" width="78" height="20" fill="url(#cg-hatch)"/>
    </g>
    
    <rect x="612" y="87" width="138" height="20" fill="url(#cg-hatch)"/>

    <text x="400" y="132" text-anchor="middle" class="note" fill="var(--warn,#e0a106)">idle &#8212; waiting for next launch</text>
  </g>

  <g data-anim="3">
    <line x1="60" y1="150" x2="760" y2="150" class="v-muted" stroke="currentColor" stroke-width="1.2" marker-end="url(#cg-arrow)"/>
    <text x="410" y="146" text-anchor="middle" class="sm" fill="var(--muted)"></text>
    <text x="750" y="164" text-anchor="end" class="sm">time</text>
    <text x="60" y="182" class="cap">CPU launch latency (~microseconds each) dominates; GPU starves.</text>
  </g>

  
  <line x1="14" y1="205" x2="766" y2="205" class="v-grid" stroke="currentColor" stroke-width="1" stroke-dasharray="3 4"/>

  
  <g data-anim="4">
    <text x="14" y="230" class="ttl">CUDA graph replay</text>

    
    <rect x="60" y="238" width="130" height="42" rx="6" fill="none" class="v-grid" stroke="currentColor" stroke-width="1.3" stroke-dasharray="4 3"/>
    <text x="125" y="256" text-anchor="middle" class="sm" fill="var(--ink-soft)">capture: record</text>
    <text x="125" y="269" text-anchor="middle" class="sm" fill="var(--ink-soft)">launch sequence</text>
    <text x="125" y="293" text-anchor="middle" class="sm" font-style="italic" fill="var(--muted)">(warmup, one time)</text>

    <text x="14" y="313" class="lane">CPU</text>
    <rect x="60" y="300" width="690" height="26" rx="4" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
    <text x="14" y="359" class="lane">GPU</text>
    <rect x="60" y="345" width="690" height="26" rx="4" class="v-fill" stroke="var(--border-2)" stroke-width="1"/>
  </g>

  <g data-anim="5">
    
    <rect x="210" y="303" width="150" height="20" rx="3" class="v-accent" fill="var(--accent)" fill-opacity="0.85"/>
    <text x="285" y="317" text-anchor="middle" class="blk-inv">cudaGraphLaunch (1 call)</text>

    
    <g fill="var(--accent2)" fill-opacity="0.82">
      <rect x="230" y="348" width="34" height="20" rx="3"/>
      <rect x="264" y="348" width="34" height="20" rx="3"/>
      <rect x="298" y="348" width="34" height="20" rx="3"/>
      <rect x="332" y="348" width="34" height="20" rx="3"/>
      <rect x="366" y="348" width="34" height="20" rx="3"/>
    </g>
    <g class="blk-inv" text-anchor="middle">
      <text x="247" y="362">k1</text>
      <text x="281" y="362">k2</text>
      <text x="315" y="362">k3</text>
      <text x="349" y="362">k4</text>
      <text x="383" y="362">k5</text>
    </g>

    <text x="60" y="390" class="cap">One CPU call submits the whole recorded DAG; GPU runs kernels back-to-back.</text>

    
    <path d="M 400 330 L 750 330 M 400 330 L 400 336 M 750 330 L 750 336" fill="none" class="v-muted" stroke="currentColor" stroke-width="1"/>
    <line x1="750" y1="84" x2="750" y2="330" stroke="var(--good,#2f9e6e)" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="575" y="326" text-anchor="middle" class="sm" fill="var(--good,#2f9e6e)">wall-clock saved</text>
  </g>

</svg>
<figcaption><b>CUDA graphs replace many small CPU-to-GPU handoffs with one.</b> In eager mode each of the five kernels waits on its own <span class="v-mono" style="font-family:var(--mono,monospace)">cudaLaunchKernel</span> call, so the GPU idles in the gaps while the CPU re-enters the driver; after a one-time capture, <span class="v-mono" style="font-family:var(--mono,monospace)">cudaGraphLaunch</span> submits the whole recorded sequence at once and the same kernels run back-to-back with no launch-latency bubbles.</figcaption>
</figure>
