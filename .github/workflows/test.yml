name: Test book code

# Runs every runnable code extract under tests/ (assembled verbatim from the book's
# code blocks) on CPU, so "the code in this book runs" is a standing guarantee.
on:
  push:
    branches: [main]
    paths: ["tests/**", "requirements-test.txt", ".github/workflows/test.yml"]
  pull_request:
    paths: ["tests/**", "requirements-test.txt"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU PyTorch + offline-safe test deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy einops scikit-learn pytest

      - name: Run every book code test (hermetic, offline, CPU)
        run: |
          fail=0
          for f in tests/*.py; do
            echo "::group::$f"
            if python3 "$f"; then echo "PASS $f"; else echo "FAIL $f"; fail=1; fi
            echo "::endgroup::"
          done
          exit $fail
